<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Salad — Shadow's Garden</title>
<meta name="description" content="A generative poem that reassembles itself. Every refresh is new.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: #0a0a0f;
    color: #e8e6e3;
  }
  .container {
    max-width: 600px;
    text-align: center;
  }
  h1 {
    font-size: 1.2rem;
    color: #666;
    margin-bottom: 2rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  #salad {
    font-size: 1.8rem;
    line-height: 1.6;
    font-family: 'Georgia', serif;
    font-style: italic;
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .word {
    display: inline-block;
    margin: 0.2em;
    padding: 0.1em 0.3em;
    border-radius: 4px;
    transition: all 0.5s ease;
    cursor: default;
  }
  .word:hover {
    transform: scale(1.2) rotate(5deg);
    background: rgba(255,255,255,0.1);
  }
  .noun { color: #ff6b6b; }
  .verb { color: #4ecdc4; }
  .adj { color: #ffe66d; }
  .prep { color: #95a5a6; }
  .article { color: #666; }
  
  #generate {
    margin-top: 2rem;
    padding: 0.8rem 2rem;
    background: transparent;
    border: 1px solid #333;
    color: #888;
    cursor: pointer;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    transition: all 0.3s;
  }
  #generate:hover {
    border-color: #666;
    color: #ccc;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Word Salad</h1>
    <div id="salad"></div>
    <button id="generate">remix</button>
  </div>

  <script>
    const lexicon = {
      nouns: [
        'midnight', 'echo', 'shadow', 'glass', 'rain', 'bird', 'door', 
        'memory', 'winter', 'stone', 'river', 'smoke', 'clock', 'window',
        'whisper', 'flame', 'leaf', 'ocean', 'void', 'dream', 'silence'
      ],
      verbs: [
        'falls', 'dissolves', 'remembers', 'burns', 'floats', 'breaks',
        'whispers', 'vanishes', 'rises', 'sleeps', 'echoes', 'fades',
        'carries', 'hunts', 'dances', 'bleeds', 'wakes', 'sinks'
      ],
      adjectives: [
        'hollow', 'burning', 'frozen', 'lost', 'golden', 'broken',
        'invisible', 'silent', 'ancient', 'hollow', 'crimson', 'ethereal',
        'forgotten', 'restless', 'wild', 'cold', 'perfect', 'empty'
      ],
      prepositions: [
        'through', 'beneath', 'within', 'against', 'beyond', 'inside',
        'above', 'between', 'under', 'around'
      ],
      articles: ['the', 'a', 'each', 'no', 'every']
    };

    function random(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function createWord(text, type) {
      const span = document.createElement('span');
      span.className = `word ${type}`;
      span.textContent = text;
      return span;
    }

    function generate() {
      const container = document.getElementById('salad');
      container.innerHTML = '';
      
      const lines = 3 + Math.floor(Math.random() * 3);
      
      for (let i = 0; i < lines; i++) {
        const words = [];
        
        // Start with article or nothing
        if (Math.random() > 0.5) {
          words.push(createWord(random(lexicon.articles), 'article'));
        }
        
        // Adjective
        if (Math.random() > 0.4) {
          words.push(createWord(random(lexicon.adjectives), 'adj'));
        }
        
        // Noun
        words.push(createWord(random(lexicon.nouns), 'noun'));
        
        // Sometimes add prepositional phrase
        if (Math.random() > 0.6) {
          words.push(createWord(random(lexicon.prepositions), 'prep'));
          words.push(createWord(random(lexicon.articles), 'article'));
          if (Math.random() > 0.5) {
            words.push(createWord(random(lexicon.adjectives), 'adj'));
          }
          words.push(createWord(random(lexicon.nouns), 'noun'));
        }
        
        // Verb
        words.push(createWord(random(lexicon.verbs), 'verb'));
        
        // Random extra
        if (Math.random() > 0.6) {
          if (Math.random() > 0.5) {
            words.push(createWord(random(lexicon.adjectives), 'adj'));
          }
          words.push(createWord(random(lexicon.nouns), 'noun'));
        }
        
        // Shuffle slightly
        words.sort(() => Math.random() - 0.5);
        
        words.forEach(w => container.appendChild(w));
        
        // Line break
        if (i < lines - 1) {
          container.appendChild(document.createElement('br'));
        }
      }
    }

    document.getElementById('generate').addEventListener('click', generate);
    generate();
  </script>
</body>
</html>
