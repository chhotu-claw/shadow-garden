<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Idea Forge — Shadow's Garden</title>
<meta name="description" content="Generate startup names, project names, and creative concepts from any domain. Input your industry or topic and watch ideas emerge.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #0d0d0d 100%);
  }

  .forge-container {
    max-width: 700px;
    width: 100%;
    text-align: center;
  }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(90deg, #ff6b35, #f7c531, #00d4aa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    color: #888;
    margin-bottom: 2rem;
    font-size: 1rem;
  }

  .input-group {
    margin-bottom: 2rem;
  }

  input[type="text"] {
    width: 100%;
    max-width: 400px;
    padding: 1rem 1.5rem;
    font-size: 1.1rem;
    border: 2px solid #333;
    border-radius: 50px;
    background: #1a1a2e;
    color: #fff;
    outline: none;
    transition: all 0.3s ease;
  }

  input[type="text"]:focus {
    border-color: #ff6b35;
    box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
  }

  input[type="text"]::placeholder {
    color: #555;
  }

  .forge-btn {
    display: block;
    width: 100%;
    max-width: 250px;
    margin: 0 auto;
    padding: 1rem 2rem;
    font-size: 1.1rem;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    background: linear-gradient(90deg, #ff6b35, #f7c531);
    color: #0d0d0d;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .forge-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
  }

  .forge-btn:active {
    transform: translateY(0);
  }

  .results {
    margin-top: 2rem;
    display: grid;
    gap: 1rem;
  }

  .result-card {
    padding: 1.5rem;
    background: rgba(26, 26, 46, 0.8);
    border: 1px solid #333;
    border-radius: 12px;
    text-align: left;
    opacity: 0;
    transform: translateY(20px);
    animation: slideIn 0.5s ease forwards;
  }

  @keyframes slideIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .result-card .name {
    font-size: 1.3rem;
    font-weight: 600;
    color: #f7c531;
    margin-bottom: 0.5rem;
  }

  .result-card .description {
    color: #aaa;
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .result-card .tag {
    display: inline-block;
    margin-top: 0.75rem;
    padding: 0.25rem 0.75rem;
    font-size: 0.75rem;
    background: #333;
    border-radius: 20px;
    color: #888;
  }

  .empty-state {
    color: #555;
    font-style: italic;
    margin-top: 2rem;
  }

  .options {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .option-btn {
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    border: 1px solid #333;
    border-radius: 20px;
    background: transparent;
    color: #888;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .option-btn.active {
    background: #ff6b35;
    border-color: #ff6b35;
    color: #0d0d0d;
  }

  .option-btn:hover:not(.active) {
    border-color: #555;
    color: #aaa;
  }
</style>
</head>
<body data-page-type="app">
  <div class="forge-container">
    <h1>The Idea Forge</h1>
    <p class="tagline">Input your domain, watch ideas emerge</p>
    
    <div class="input-group">
      <input type="text" id="domainInput" placeholder="e.g., fintech, music, cooking, ai..." autocomplete="off">
    </div>

    <div class="options">
      <button class="option-btn active" data-type="startup">Startup Names</button>
      <button class="option-btn" data-type="project">Project Names</button>
      <button class="option-btn" data-type="product">Product Names</button>
      <button class="option-btn" data-type="app">App Names</button>
    </div>

    <button class="forge-btn" id="forgeBtn">Forge Ideas</button>

    <div class="results" id="results"></div>
  </div>

  <script>
    const prefixes = {
      startup: ['Nova', 'Apex', 'Synapse', 'Quantum', 'Vertex', 'Cipher', 'Helix', 'Pulse', 'Nexus', 'Prism', 'Vector', 'Echo', 'Flux', 'Zenith', 'Onyx', 'Spark', 'Titan', 'Vortex', 'Atlas', 'Horizon', 'Sphere', 'Cascade', 'Lumina', 'Orbit', 'Zen'],
      project: ['Project', 'Operation', 'Initiative', 'Mission', 'Protocol', 'Campaign', 'Program', 'Scheme', 'Plan', 'Strategy'],
      product: ['Smart', 'Pro', 'Ultra', 'Next', 'Neo', 'Hyper', 'Mega', 'Turbo', 'Prime', 'Elite', 'Max', 'Super', 'Power', 'Flex', 'Flow'],
      app: ['App', 'Tool', 'Hub', 'Box', 'Kit', 'Desk', 'Board', 'Pad', 'Station', 'Dock']
    };

    const cores = {
      startup: ['flow', 'sync', 'lab', 'works', 'base', 'hub', 'net', 'sys', 'core', 'forge', 'stack', 'grid', 'mesh', 'node', 'link', 'mind', 'sense', 'pulse', 'wave', 'beam', 'spark', 'flux', 'drive', 'lift', 'rise', 'leap', 'jump', 'step', 'stage', 'phase', 'cycle', 'loop', 'ring', 'chain', 'bridge', 'port', 'gate', 'key', 'lock', 'vault', 'safe', 'bank', 'fund', 'cap', 'vest', 'trust', 'bond'],
      project: ['alpha', 'beta', 'gamma', 'delta', 'omega', 'prime', 'core', 'base', 'root', 'stem', 'pivot', 'shift', 'turn', 'wave', 'pulse', 'burst', 'flare', 'beam', 'stream', 'flow', 'drift', 'spin', 'swing', 'flip', 'mix', 'blend', 'merge', 'fuse', 'link', 'bind', 'tie', 'knot', 'loop', 'cycle', 'ring', 'orbit', 'spin'],
      product: ['ify', 'ly', 'io', 'ai', 'lab', 'hub', 'box', 'kit', 'pack', 'set', 'tool', 'mate', 'buddy', 'pal', 'friend', 'helper', 'assistant', 'maker', 'builder', 'creator', 'smith', 'wright', 'architect', 'designer', 'engineer', 'pilot', 'driver', 'rider', 'walker', 'runner', 'jumper', 'flyer', 'sailor', 'surfer', 'skier', 'climber', 'hiker'],
      app: ['sync', 'flow', 'link', 'bind', 'mix', 'blend', 'merge', 'fuse', 'join', 'connect', 'dock', 'pin', 'clip', 'lock', 'seal', 'wrap', 'cover', 'case', 'shell', 'skin', 'face', 'look', 'view', 'watch', 'scan', 'read', 'write', 'edit', 'make', 'build', 'create', 'form', 'shape', 'mold', 'cast', 'forge', 'smith', 'craft', 'work']
    };

    const suffixes = {
      startup: [' Labs', ' Systems', ' Technologies', ' Dynamics', ' Innovations', ' Ventures', ' Capital', ' Partners', ' Collective', ' Guild', ' Forge', ' Studio', ' Works', ' Co', ' Inc', ' Corp', ' AI', ' Labs', ' HQ', ' Base'],
      project: [' Alpha', ' Beta', ' Gamma', ' Prime', ' One', ' Two', ' Three', ' Next', ' Plus', ' Pro', ' Max', ' Ultra', ' Neo', ' X', ' Z', ' V2', ' V3', ' 2.0', ' 3.0', ' Reborn', ' Rising', ' Flowing', ' Shifting'],
      product: [' Pro', ' Plus', ' Max', ' Ultra', ' Lite', ' Mini', ' Nano', ' Micro', ' Macro', ' X', ' S', ' M', ' L', ' XL', ' One', ' Two', ' Three', ' Neo', ' V2', ' V3'],
      app: [' Pro', ' Plus', ' Max', ' Lite', ' Free', ' V2', ' V3', ' 2.0', ' 3.0', ' Neo', ' X', ' Z', ' Beta', ' Alpha', ' Go', ' Run', ' Fly', ' Sync', ' Link', ' Hub']
    };

    const domains = {
      fintech: { adjectives: ['secure', 'swift', 'smart', 'seamless', 'instant', 'global', 'trusted', 'fast'], nouns: ['pay', 'bank', 'fund', 'coin', 'cash', 'vest', 'trade', 'wealth', 'money', 'capital', 'asset', 'ledger', 'chain'], suffixes: ['flow', 'sync', 'pay', 'bank', 'vest', 'fund', 'coin', 'cash', 'trust', 'pay'] },
      music: { adjectives: ['sound', 'wave', 'beat', 'rhythm', 'melody', 'harmonic', 'sonic', 'audio'], nouns: ['sound', 'beat', 'tune', 'melody', 'rhythm', 'tone', 'pitch', 'wave', 'jam', 'mix', 'track', 'song'], suffixes: ['beat', 'sound', 'wave', 'tone', 'melody', 'rhythm', 'jam', 'mix', 'tune', 'track'] },
      cooking: { adjectives: ['fresh', 'savory', 'tasty', 'delicious', 'home', 'chef', 'kitchen', 'garden'], nouns: ['chef', 'cook', 'kitchen', 'meal', 'dish', 'recipe', 'taste', 'flavor', 'spice', 'herb', 'farm', 'table'], suffixes: ['chef', 'cook', 'kitchen', 'meal', 'dish', 'recipe', 'taste', 'flavor', 'spice', 'farm'] },
      ai: { adjectives: ['smart', 'neural', 'deep', 'cognitive', 'learning', 'machine', 'artificial', 'synthetic'], nouns: ['mind', 'brain', 'neuron', ' synapse', 'cognition', 'intelligence', 'logic', 'reason', 'thought', 'sense'], suffixes: ['ai', 'ml', 'lab', 'mind', 'brain', 'neuron', 'learn', 'think', 'sense', 'cog'] },
      health: { adjectives: ['vital', 'active', 'fit', 'well', 'prime', 'pure', 'clean', 'natural'], nouns: ['health', 'vital', 'fit', 'well', 'body', 'life', 'vibe', 'glow', 'energy', 'power', 'pulse', 'vitality'], suffixes: ['health', 'vital', 'fit', 'well', 'life', 'glow', 'energy', 'power', 'pulse', 'vibe'] },
      travel: { adjectives: ['wander', 'explore', 'adventure', 'journey', 'voyage', 'roam', 'discover', 'global'], nouns: ['trip', 'journey', 'voyage', 'tour', 'adventure', 'explore', 'wander', 'roam', 'path', 'way', 'route'], suffixes: ['trip', 'journey', 'tour', 'wander', 'explore', 'roam', 'voyage', 'path', 'way', 'go'] },
      education: { adjectives: ['learn', 'smart', 'bright', 'wise', 'keen', 'sharp', 'quick', 'fast'], nouns: ['learn', 'study', 'mind', 'brain', 'skill', 'knowledge', 'wisdom', 'think', 'grow', 'grade'], suffixes: ['learn', 'study', 'mind', 'skill', 'brain', 'grade', 'class', 'course', 'coach', 'tutor'] },
      default: { adjectives: ['quick', 'smart', 'easy', 'fast', 'simple', 'clean', 'bright', 'fresh', 'new', 'next'], nouns: ['app', 'tool', 'hub', 'box', 'kit', 'set', 'pack', 'link', 'sync', 'flow'], suffixes: ['app', 'tool', 'hub', 'box', 'kit', 'sync', 'flow', 'link', 'net', 'web'] }
    };

    let currentType = 'startup';

    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentType = btn.dataset.type;
      });
    });

    function getDomainData(input) {
      const lower = input.toLowerCase().trim();
      for (const [key, data] of Object.entries(domains)) {
        if (lower.includes(key)) return data;
      }
      return domains.default;
    }

    function generateName(type, domainInput) {
      const domainData = getDomainData(domainInput);
      const category = Math.random() > 0.5 ? 'prefix' : 'suffix';
      
      let name = '';
      
      if (category === 'prefix') {
        const prefix = prefixes[type][Math.floor(Math.random() * prefixes[type].length)];
        const core = domainData.nouns[Math.floor(Math.random() * domainData.nouns.length)];
        const suffix = suffixes[type][Math.floor(Math.random() * suffixes[type].length)];
        name = prefix + core + suffix;
      } else {
        const adj = domainData.adjectives[Math.floor(Math.random() * domainData.adjectives.length)];
        const core = domainData.cores?.[Math.floor(Math.random() * (domainData.cores?.length || 10))] || domainData.nouns[Math.floor(Math.random() * domainData.nouns.length)];
        const suffix = domainData.suffixes[Math.floor(Math.random() * domainData.suffixes.length)];
        name = adj.charAt(0).toUpperCase() + adj.slice(1) + core.charAt(0).toUpperCase() + core.slice(1) + suffix;
      }

      return name.replace(/\s+/g, '');
    }

    function generateDescription(name, domainInput) {
      const domainData = getDomainData(domainInput);
      const templates = [
        `A ${domainData.adjectives[0]} solution for ${domainInput} enthusiasts.`,
        `Revolutionizing how you experience ${domainInput}.`,
        `Built for the modern ${domainInput} world.`,
        `Where ${domainInput} meets innovation.`,
        `Your ${domainData.adjectives[1]} companion for ${domainInput}.`,
        `Making ${domainInput} simple, smart, accessible.`,
        `The future of ${domainInput} is here.`,
        `Empowering your ${domainInput} journey.`
      ];
      return templates[Math.floor(Math.random() * templates.length)];
    }

    function getTag(type) {
      const tags = {
        startup: 'Startup Name',
        project: 'Project Name',
        product: 'Product Name',
        app: 'App Name'
      };
      return tags[type];
    }

    document.getElementById('forgeBtn').addEventListener('click', () => {
      const input = document.getElementById('domainInput').value.trim();
      if (!input) return;

      const results = document.getElementById('results');
      results.innerHTML = '';

      for (let i = 0; i < 6; i++) {
        const name = generateName(currentType, input);
        const description = generateDescription(name, input);
        const tag = getTag(currentType);

        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.animationDelay = `${i * 0.1}s`;
        card.innerHTML = `
          <div class="name">${name}</div>
          <div class="description">${description}</div>
          <span class="tag">${tag}</span>
        `;
        results.appendChild(card);
      }
    });

    document.getElementById('domainInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('forgeBtn').click();
      }
    });
  </script>
</body>
</html>
