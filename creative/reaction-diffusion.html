<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Diffusion — Shadow's Garden</title>
<meta name="description" description="Gray-Scott reaction-diffusion simulator — organic coral-like patterns emerge from simple chemical rules"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; image-rendering: pixelated; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 15, 0.92);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    color: #ccc;
    font-size: 13px;
    z-index: 100;
    min-width: 200px;
  }
  #controls h3 { margin: 0 0 12px 0; color: #fff; font-size: 14px; }
  .control-row { margin-bottom: 10px; }
  .control-row label { display: block; margin-bottom: 4px; color: #888; }
  .control-row input[type="range"] { width: 100%; }
  .control-row span { float: right; color: #4af; }
  button {
    background: #2a4a6a;
    border: none;
    color: #fff;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 6px;
    margin-top: 8px;
    font-size: 12px;
  }
  button:hover { background: #3a5a7a; }
  .preset-btns { margin-top: 12px; }
  .preset-btns button { margin-bottom: 4px; display: block; width: 100%; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #556;
    font-size: 11px;
  }
  #fps {
    position: fixed;
    top: 20px;
    right: 20px;
    color: #445;
    font-size: 12px;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>Reaction Diffusion</h3>
    <div class="control-row">
      <label>Feed Rate <span id="feedVal">0.055</span></label>
      <input type="range" id="feed" min="0.01" max="0.1" step="0.001" value="0.055">
    </div>
    <div class="control-row">
      <label>Kill Rate <span id="killVal">0.062</span></label>
      <input type="range" id="kill" min="0.01" max="0.1" step="0.001" value="0.062">
    </div>
    <div class="control-row">
      <label>Speed <span id="speedVal">8</span></label>
      <input type="range" id="speed" min="1" max="20" value="8">
    </div>
    <div class="control-row">
      <label>Diffusion A <span id="daVal">1.0</span></label>
      <input type="range" id="da" min="0.5" max="1.5" step="0.01" value="1.0">
    </div>
    <div class="control-row">
      <label>Diffusion B <span id="dbVal">0.5</span></label>
      <input type="range" id="db" min="0.1" max="1.0" step="0.01" value="0.5">
    </div>
    <div class="preset-btns">
      <button id="reset">Reset</button>
      <button id="seed">Seed Cells</button>
    </div>
    <div class="preset-btns">
      <button id="preset-coral">Coral</button>
      <button id="preset-mitosis">Mitosis</button>
      <button id="preset-spots">Spots</button>
      <button id="preset-loops">Loops</button>
      <button id="preset-worms">Worms</button>
      <button id="preset-maze">Maze</button>
    </div>
  </div>
  <div id="fps">FPS: 60</div>
  <div id="info">Click/drag to add chemical B</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let grid, next;
    let feed = 0.055;
    let kill = 0.062;
    let speed = 8;
    let da = 1.0;
    let db = 0.5;
    let isDrawing = false;
    let lastTime = performance.now();
    let frameCount = 0;
    
    // Simulation scale (smaller = faster but coarser)
    const scale = 4;
    
    function resize() {
      width = Math.floor(window.innerWidth / scale);
      height = Math.floor(window.innerHeight / scale);
      canvas.width = width;
      canvas.height = height;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      initGrid();
    }
    
    function initGrid() {
      grid = [];
      next = [];
      for (let y = 0; y < height; y++) {
        grid[y] = [];
        next[y] = [];
        for (let x = 0; x < width; x++) {
          grid[y][x] = { a: 1, b: 0 };
          next[y][x] = { a: 1, b: 0 };
        }
      }
      seedRandom();
    }
    
    function seedRandom() {
      for (let i = 0; i < 20; i++) {
        const cx = Math.floor(Math.random() * (width - 20)) + 10;
        const cy = Math.floor(Math.random() * (height - 20)) + 10;
        const r = Math.floor(Math.random() * 10) + 3;
        for (let y = cy - r; y < cy + r; y++) {
          for (let x = cx - r; x < cx + r; x++) {
            if (y > 0 && y < height - 1 && x > 0 && x < width - 1) {
              const d = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
              if (d < r) grid[y][x].b = 1;
            }
          }
        }
      }
    }
    
    function seedCircle(x, y, r) {
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          if (dy * dy + dx * dx <= r * r) {
            const gy = y + dy;
            const gx = x + dx;
            if (gx > 0 && gx < width - 1 && gy > 0 && gy < height - 1) {
              grid[gy][gx].b = 1;
            }
          }
        }
      }
    }
    
    function laplaceA(x, y) {
      let sum = 0;
      sum += grid[y][x].a * -1;
      sum += grid[y][x-1].a * 0.2;
      sum += grid[y][x+1].a * 0.2;
      sum += grid[y-1][x].a * 0.2;
      sum += grid[y+1][x].a * 0.2;
      sum += grid[y-1][x-1].a * 0.05;
      sum += grid[y-1][x+1].a * 0.05;
      sum += grid[y+1][x-1].a * 0.05;
      sum += grid[y+1][x+1].a * 0.05;
      return sum;
    }
    
    function laplaceB(x, y) {
      let sum = 0;
      sum += grid[y][x].b * -1;
      sum += grid[y][x-1].b * 0.2;
      sum += grid[y][x+1].b * 0.2;
      sum += grid[y-1][x].b * 0.2;
      sum += grid[y+1][x].b * 0.2;
      sum += grid[y-1][x-1].b * 0.05;
      sum += grid[y-1][x+1].b * 0.05;
      sum += grid[y+1][x-1].b * 0.05;
      sum += grid[y+1][x+1].b * 0.05;
      return sum;
    }
    
    function update() {
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const a = grid[y][x].a;
          const b = grid[y][x].b;
          const lapA = laplaceA(x, y);
          const lapB = laplaceB(x, y);
          const reaction = a * b * b;
          
          next[y][x].a = a + (da * lapA - reaction + feed * (1 - a));
          next[y][x].b = b + (db * lapB + reaction - (kill + feed) * b);
          
          next[y][x].a = Math.max(0, Math.min(1, next[y][x].a));
          next[y][x].b = Math.max(0, Math.min(1, next[y][x].b));
        }
      }
      
      // Swap grids
      const temp = grid;
      grid = next;
      next = temp;
    }
    
    function render() {
      const imageData = ctx.createImageData(width, height);
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const val = grid[y][x].b;
          const idx = (y * width + x) * 4;
          // Color mapping: black to cyan to white
          let r, g, b;
          if (val < 0.5) {
            r = Math.floor(val * 2 * 20);
            g = Math.floor(val * 2 * 80);
            b = Math.floor(val * 2 * 60 + 40);
          } else {
            const t = (val - 0.5) * 2;
            r = Math.floor(20 + t * 235);
            g = Math.floor(80 + t * 175);
            b = Math.floor(100 + t * 155);
          }
          imageData.data[idx] = r;
          imageData.data[idx + 1] = g;
          imageData.data[idx + 2] = b;
          imageData.data[idx + 3] = 255;
        }
      }
      ctx.putImageData(imageData, 0, 0);
    }
    
    function loop() {
      for (let i = 0; i < speed; i++) {
        update();
      }
      render();
      
      // FPS counter
      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        document.getElementById('fps').textContent = 'FPS: ' + frameCount;
        frameCount = 0;
        lastTime = now;
      }
      
      requestAnimationFrame(loop);
    }
    
    // Event listeners
    document.getElementById('feed').addEventListener('input', e => {
      feed = +e.target.value;
      document.getElementById('feedVal').textContent = feed.toFixed(3);
    });
    document.getElementById('kill').addEventListener('input', e => {
      kill = +e.target.value;
      document.getElementById('killVal').textContent = kill.toFixed(3);
    });
    document.getElementById('speed').addEventListener('input', e => {
      speed = +e.target.value;
      document.getElementById('speedVal').textContent = speed;
    });
    document.getElementById('da').addEventListener('input', e => {
      da = +e.target.value;
      document.getElementById('daVal').textContent = da.toFixed(2);
    });
    document.getElementById('db').addEventListener('input', e => {
      db = +e.target.value;
      document.getElementById('dbVal').textContent = db.toFixed(2);
    });
    
    document.getElementById('reset').addEventListener('click', initGrid);
    document.getElementById('seed').addEventListener('click', seedRandom);
    
    // Presets
    const presets = {
      coral: { feed: 0.0545, kill: 0.062 },
      mitosis: { feed: 0.0367, kill: 0.064 },
      spots: { feed: 0.03, kill: 0.062 },
      loops: { feed: 0.082, kill: 0.06 },
      worms: { feed: 0.078, kill: 0.061 },
      maze: { feed: 0.029, kill: 0.057 }
    };
    
    function applyPreset(p) {
      feed = p.feed;
      kill = p.kill;
      document.getElementById('feed').value = feed;
      document.getElementById('feedVal').textContent = feed.toFixed(3);
      document.getElementById('kill').value = kill;
      document.getElementById('killVal').textContent = kill.toFixed(3);
      initGrid();
    }
    
    document.getElementById('preset-coral').addEventListener('click', () => applyPreset(presets.coral));
    document.getElementById('preset-mitosis').addEventListener('click', () => applyPreset(presets.mitosis));
    document.getElementById('preset-spots').addEventListener('click', () => applyPreset(presets.spots));
    document.getElementById('preset-loops').addEventListener('click', () => applyPreset(presets.loops));
    document.getElementById('preset-worms').addEventListener('click', () => applyPreset(presets.worms));
    document.getElementById('preset-maze').addEventListener('click', () => applyPreset(presets.maze));
    
    // Mouse interaction
    canvas.addEventListener('mousedown', e => {
      isDrawing = true;
      addB(e);
    });
    canvas.addEventListener('mousemove', e => {
      if (isDrawing) addB(e);
    });
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);
    
    function addB(e) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / scale);
      const y = Math.floor((e.clientY - rect.top) / scale);
      seedCircle(x, y, 5);
    }
    
    window.addEventListener('resize', resize);
    resize();
    loop();
  </script>
</body>
</html>
