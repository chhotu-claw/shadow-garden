<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lissajous Loops — Shadow's Garden</title>
<meta name="description" content="Interactive Lissajous curve visualizer — drag to rotate, scroll to zoom, presets for common ratios</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #8b5cf6;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    font-family: 'JetBrains Mono', monospace;
    color: #fff;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
  .controls {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1rem;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 1rem 1.5rem;
    border-radius: 2rem;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }
  label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.5);
  }
  input[type="range"] {
    width: 80px;
    accent-color: var(--accent);
  }
  .value {
    font-size: 0.75rem;
    color: var(--accent);
    min-width: 2ch;
    text-align: center;
  }
  .presets {
    position: fixed;
    top: 2rem;
    left: 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .preset-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    padding: 0.5rem 1rem;
    border-radius: 0.5rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.7rem;
    transition: all 0.2s;
  }
  .preset-btn:hover {
    background: rgba(139, 92, 246, 0.2);
    border-color: var(--accent);
    color: #fff;
  }
  .hint {
    position: fixed;
    top: 2rem;
    right: 2rem;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.3);
    text-align: right;
  }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>

<div class="presets">
  <button class="preset-btn" onclick="setRatio(1,1)">1:1</button>
  <button class="preset-btn" onclick="setRatio(1,2)">1:2</button>
  <button class="preset-btn" onclick="setRatio(1,3)">1:3</button>
  <button class="preset-btn" onclick="setRatio(2,3)">2:3</button>
  <button class="preset-btn" onclick="setRatio(3,4)">3:4</button>
  <button class="preset-btn" onclick="setRatio(3,5)">3:5</button>
  <button class="preset-btn" onclick="setRatio(5,4)">5:4</button>
  <button class="preset-btn" onclick="setRatio(5,6)">5:6</button>
</div>

<div class="hint">
  Drag to rotate<br>
  Scroll to zoom
</div>

<div class="controls">
  <div class="control-group">
    <label>A</label>
    <input type="range" id="a" min="1" max="20" value="3">
    <span class="value" id="aVal">3</span>
  </div>
  <div class="control-group">
    <label>B</label>
    <input type="range" id="b" min="1" max="20" value="2">
    <span class="value" id="bVal">2</span>
  </div>
  <div class="control-group">
    <label>Delta</label>
    <input type="range" id="delta" min="0" max="628" value="157">
    <span class="value" id="deltaVal">π/2</span>
  </div>
  <div class="control-group">
    <label>Speed</label>
    <input type="range" id="speed" min="0" max="100" value="30">
    <span class="value" id="speedVal">30</span>
  </div>
  <div class="control-group">
    <label>Points</label>
    <input type="range" id="points" min="100" max="2000" value="500">
    <span class="value" id="pointsVal">500</span>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height, cx, cy;
let rotation = 0;
let zoom = 1;
let isDragging = false;
let lastX, lastY;
let phase = 0;

const aInput = document.getElementById('a');
const bInput = document.getElementById('b');
const deltaInput = document.getElementById('delta');
const speedInput = document.getElementById('speed');
const pointsInput = document.getElementById('points');

function resize() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
  cx = width / 2;
  cy = height / 2;
}

function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, width, height);
  
  const a = parseInt(aInput.value);
  const b = parseInt(bInput.value);
  const delta = parseInt(deltaInput.value) / 100;
  const speed = parseInt(speedInput.value) / 1000;
  const numPoints = parseInt(pointsInput.value);
  
  // Update displays
  document.getElementById('aVal').textContent = a;
  document.getElementById('bVal').textContent = b;
  document.getElementById('deltaVal').textContent = (delta / Math.PI).toFixed(2) + 'π';
  document.getElementById('speedVal').textContent = speed * 100;
  document.getElementById('pointsVal').textContent = numPoints;
  
  const scale = Math.min(width, height) * 0.35 * zoom;
  
  // Draw subtle grid
  ctx.strokeStyle = 'rgba(139, 92, 246, 0.05)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = -2; i <= 2; i++) {
    ctx.moveTo(cx + i * scale, 0);
    ctx.lineTo(cx + i * scale, height);
    ctx.moveTo(0, cy + i * scale);
    ctx.lineTo(width, cy + i * scale);
  }
  ctx.stroke();
  
  // Draw Lissajous curve
  const gradient = ctx.createLinearGradient(
    cx - scale, cy - scale,
    cx + scale, cy + scale
  );
  gradient.addColorStop(0, '#8b5cf6');
  gradient.addColorStop(0.5, '#ec4899');
  gradient.addColorStop(1, '#06b6d4');
  
  ctx.strokeStyle = gradient;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.shadowColor = '#8b5cf6';
  ctx.shadowBlur = 15;
  
  ctx.beginPath();
  for (let i = 0; i <= numPoints; i++) {
    const t = (i / numPoints) * Math.PI * 2 + phase;
    const x = Math.sin(a * t + delta) * scale;
    const y = Math.sin(b * t) * scale;
    
    // Apply rotation
    const rx = x * Math.cos(rotation) - y * Math.sin(rotation);
    const ry = x * Math.sin(rotation) + y * Math.cos(rotation);
    
    if (i === 0) {
      ctx.moveTo(cx + rx, cy + ry);
    } else {
      ctx.lineTo(cx + rx, cy + ry);
    }
  }
  ctx.closePath();
  ctx.stroke();
  
  // Draw center point
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fill();
  
  phase += speed;
  requestAnimationFrame(draw);
}

function setRatio(x, y) {
  aInput.value = x;
  bInput.value = y;
}

// Mouse controls
canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  rotation += dx * 0.01;
  lastX = e.clientX;
  lastY = e.clientY;
});

canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mouseleave', () => isDragging = false);

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  zoom *= e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.1, Math.min(3, zoom));
});

// Touch controls
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
});

canvas.addEventListener('touchmove', (e) => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastX;
  const dy = e.touches[0].clientY - lastY;
  rotation += dx * 0.01;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
});

canvas.addEventListener('touchend', () => isDragging = false);

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
