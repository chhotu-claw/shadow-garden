<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lissajous Loops — Shadow's Garden</title>
<meta name="description" content="Interactive Lissajous curve visualizer — drag to rotate, scroll to zoom, presets for common ratios">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
    background: rgba(20, 20, 30, 0.9);
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
  }
  input[type="range"] {
    width: 80px;
    accent-color: #ff6b6b;
  }
  .value {
    font-size: 12px;
    color: #ff6b6b;
    font-family: monospace;
    min-width: 24px;
    text-align: center;
  }
  .presets {
    display: flex;
    gap: 6px;
  }
  .preset {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #888;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s;
  }
  .preset:hover {
    background: rgba(255,107,107,0.2);
    color: #ff6b6b;
  }
  .hint {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #444;
    font-size: 11px;
    letter-spacing: 1px;
  }
</style>
</head>
<body data-page-type="app">
  <div class="hint">drag to rotate · scroll to zoom</div>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <div class="control-group">
      <label>A</label>
      <input type="range" id="a" min="1" max="20" value="3">
    </div>
    <span class="value" id="aVal">3</span>
    <div class="control-group">
      <label>B</label>
      <input type="range" id="b" min="1" max="20" value="2">
    </div>
    <span class="value" id="bVal">2</span>
    <div class="control-group">
      <label>Delta</label>
      <input type="range" id="delta" min="0" max="6.28" step="0.01" value="1.57">
    </div>
    <span class="value" id="deltaVal">1.57</span>
    <div class="presets">
      <button class="preset" data-a="1" data-b="1">1:1</button>
      <button class="preset" data-a="2" data-b="3">2:3</button>
      <button class="preset" data-a="3" data-b="4">3:4</button>
      <button class="preset" data-a="5" data-b="4">5:4</button>
      <button class="preset" data-a="3" data-b="2">3:2</button>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height, cx, cy;
    let rotation = 0;
    let zoom = 1;
    let isDragging = false;
    let lastX, lastY;
    
    let a = 3, b = 2, delta = Math.PI / 2;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      cx = width / 2;
      cy = height / 2;
    }
    
    window.addEventListener('resize', resize);
    resize();
    
    // Drag to rotate
    canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      rotation += dx * 0.01;
      lastX = e.clientX;
      lastY = e.clientY;
    });
    
    // Scroll to zoom
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      zoom *= e.deltaY > 0 ? 0.9 : 1.1;
      zoom = Math.max(0.1, Math.min(10, zoom));
    });
    
    // Controls
    const aInput = document.getElementById('a');
    const bInput = document.getElementById('b');
    const deltaInput = document.getElementById('delta');
    
    function update() {
      a = parseInt(aInput.value);
      b = parseInt(bInput.value);
      delta = parseFloat(deltaInput.value);
      document.getElementById('aVal').textContent = a;
      document.getElementById('bVal').textContent = b;
      document.getElementById('deltaVal').textContent = delta.toFixed(2);
    }
    
    [aInput, bInput, deltaInput].forEach(el => el.addEventListener('input', update));
    
    // Presets
    document.querySelectorAll('.preset').forEach(btn => {
      btn.addEventListener('click', () => {
        aInput.value = btn.dataset.a;
        bInput.value = btn.dataset.b;
        update();
      });
    });
    
    // Animation
    let time = 0;
    function draw() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      const scale = Math.min(width, height) * 0.35 * zoom;
      
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);
      
      // Glow
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#ff6b6b';
      
      // Draw multiple curves with phase shift
      for (let phase = 0; phase < 6; phase++) {
        ctx.beginPath();
        const phaseOffset = (phase / 6) * Math.PI * 2;
        
        for (let t = 0; t <= Math.PI * 2; t += 0.01) {
          const x = Math.sin(a * t + delta + phaseOffset) * scale;
          const y = Math.sin(b * t + phaseOffset) * scale;
          if (t === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        
        ctx.strokeStyle = `hsla(${phase * 60}, 70%, 60%, 0.6)`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      
      ctx.restore();
      
      time += 0.01;
      requestAnimationFrame(draw);
    }
    
    draw();
  </script>
</body>
</html>
