<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Visualizer — Shadow's Garden</title>
<meta name="description" content="Interactive audio visualizer that reacts to microphone input in real-time"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.8);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    color: #ccc;
    font-size: 13px;
    z-index: 100;
  }
  #controls h3 { margin: 0 0 12px 0; color: #fff; font-size: 14px; }
  button {
    background: #1a1a2e;
    border: 1px solid #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    margin-right: 8px;
  }
  button:hover { background: #2a2a4e; }
  button.active { background: #4a2a6a; border-color: #6a4a8a; }
  #status {
    margin-top: 10px;
    color: #666;
    font-size: 12px;
  }
  #mode-info {
    margin-top: 8px;
    color: #888;
    font-size: 11px;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>Audio Visualizer</h3>
    <button id="startBtn">Start Microphone</button>
    <button id="modeBtn" class="active">Bars</button>
    <div id="status">Click Start to enable microphone</div>
    <div id="mode-info">Current: Bars | Modes: Bars, Wave, Circle, Particles, Rings</div>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let audioContext, analyser, microphone, dataArray;
    let isRunning = false;
    let mode = 'bars';
    const modes = ['bars', 'wave', 'circle', 'particles', 'rings'];
    
    // Particle system for particles mode
    let particles = [];
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    
    async function startAudio() {
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        microphone = audioContext.createMediaStreamSource(stream);
        microphone.connect(analyser);
        
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        isRunning = true;
        document.getElementById('status').textContent = 'Listening to microphone...';
        document.getElementById('startBtn').textContent = 'Stop';
        
        initParticles();
        animate();
      } catch (err) {
        document.getElementById('status').textContent = 'Error: ' + err.message;
      }
    }
    
    function stopAudio() {
      if (microphone) {
        microphone.disconnect();
      }
      if (audioContext) {
        audioContext.close();
      }
      isRunning = false;
      document.getElementById('status').textContent = 'Stopped';
      document.getElementById('startBtn').textContent = 'Start Microphone';
    }
    
    function initParticles() {
      particles = [];
      for (let i = 0; i < 200; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          size: Math.random() * 3 + 1,
          hue: Math.random() * 60 + 180
        });
      }
    }
    
    function drawBars() {
      analyser.getByteFrequencyData(dataArray);
      const barCount = 64;
      const barWidth = width / barCount;
      
      for (let i = 0; i < barCount; i++) {
        const value = dataArray[i * 4];
        const barHeight = (value / 255) * height * 0.8;
        const hue = (i / barCount) * 60 + 180;
        
        const gradient = ctx.createLinearGradient(0, height, 0, height - barHeight);
        gradient.addColorStop(0, `hsl(${hue}, 80%, 30%)`);
        gradient.addColorStop(1, `hsl(${hue}, 100%, 60%)`);
        
        ctx.fillStyle = gradient;
        ctx.fillRect(i * barWidth + 2, height - barHeight, barWidth - 4, barHeight);
      }
    }
    
    function drawWave() {
      analyser.getByteTimeDomainData(dataArray);
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#4af';
      ctx.beginPath();
      
      const sliceWidth = width / dataArray.length;
      let x = 0;
      
      for (let i = 0; i < dataArray.length; i++) {
        const v = dataArray[i] / 128.0;
        const y = (v * height) / 2;
        
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        x += sliceWidth;
      }
      
      ctx.lineTo(width, height / 2);
      ctx.stroke();
    }
    
    function drawCircle() {
      analyser.getByteFrequencyData(dataArray);
      const centerX = width / 2;
      const centerY = height / 2;
      const baseRadius = Math.min(width, height) * 0.25;
      
      ctx.clearRect(0, 0, width, height);
      
      for (let i = 0; i < dataArray.length; i += 4) {
        const value = dataArray[i];
        const angle = (i / dataArray.length) * Math.PI * 2;
        const radius = baseRadius + (value / 255) * 150;
        
        const x = centerX + Math.cos(angle) * radius;
        const y = centerY + Math.sin(angle) * radius;
        const hue = (i / dataArray.length) * 60 + 180;
        
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
        ctx.fill();
      }
    }
    
    function drawParticles() {
      analyser.getByteFrequencyData(dataArray);
      
      // Get average bass level
      let bass = 0;
      for (let i = 0; i < 10; i++) bass += dataArray[i];
      bass /= 10;
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      for (let p of particles) {
        // React to audio
        const speedMult = 1 + (bass / 255) * 5;
        p.x += p.vx * speedMult;
        p.y += p.vy * speedMult;
        
        // Bounce off edges
        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size + (bass / 255) * 5, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${p.hue}, 70%, 60%)`;
        ctx.fill();
      }
    }
    
    function drawRings() {
      analyser.getByteFrequencyData(dataArray);
      const centerX = width / 2;
      const centerY = height / 2;
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      for (let i = 0; i < 20; i++) {
        const value = dataArray[i * 8] || 0;
        const radius = 50 + i * 25 + (value / 255) * 50;
        const hue = (i / 20) * 60 + 180;
        
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${hue}, 80%, 50%, 0.5)`;
        ctx.lineWidth = 2 + (value / 255) * 8;
        ctx.stroke();
      }
    }
    
    function animate() {
      if (!isRunning) return;
      
      switch (mode) {
        case 'bars': drawBars(); break;
        case 'wave': drawWave(); break;
        case 'circle': drawCircle(); break;
        case 'particles': drawParticles(); break;
        case 'rings': drawRings(); break;
      }
      
      requestAnimationFrame(animate);
    }
    
    document.getElementById('startBtn').addEventListener('click', () => {
      if (isRunning) stopAudio();
      else startAudio();
    });
    
    document.getElementById('modeBtn').addEventListener('click', () => {
      const idx = modes.indexOf(mode);
      mode = modes[(idx + 1) % modes.length];
      document.getElementById('modeBtn').textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
      document.getElementById('mode-info').textContent = 'Current: ' + mode + ' | Modes: ' + modes.join(', ');
      if (mode === 'particles') initParticles();
    });
    
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
