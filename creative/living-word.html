<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Living Word — Shadow's Garden</title>
<meta name="description" content="Interactive poem that breathes when you watch and dreams when you leave. Words float and react to your cursor.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'IBM Plex Mono', monospace;
  }
  canvas {
    display: block;
  }
  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.3);
    font-size: 12px;
    pointer-events: none;
    transition: opacity 2s;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="hint">click to add words • hover to disturb • watch them breathe</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let words = [];
    let time = 0;
    let mouseX = 0, mouseY = 0;
    let isWatching = true;
    let watchTimer = null;
    
    const wordList = [
      'whisper', 'drift', 'shadow', 'echo', 'bloom', 'fade', 'dream',
      'flow', 'pulse', 'void', 'spark', 'gleam', ' murmur', 'wave',
      'silence', 'light', 'dark', 'breath', 'ghost', 'mirror', 'trace',
      'hollow', 'silver', 'golden', 'crystal', 'mystic', 'ancient', 'lost',
      'found', 'wander', 'seek', 'hide', 'wake', 'sleep', 'remember',
      'forget', 'infinite', 'moment', 'eternal', 'soft', 'hard', 'cold',
      'warm', 'edge', 'center', 'between', 'beyond', 'within', 'without'
    ];
    
    const colors = [
      'rgba(200, 220, 255, 0.6)',
      'rgba(255, 200, 220, 0.6)',
      'rgba(220, 255, 200, 0.6)',
      'rgba(255, 255, 200, 0.6)',
      'rgba(200, 255, 255, 0.6)',
      'rgba(255, 200, 255, 0.6)',
      'rgba(255, 220, 200, 0.6)',
    ];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    window.addEventListener('resize', resize);
    resize();
    
    class Word {
      constructor(text, x, y) {
        this.text = text;
        this.x = x || Math.random() * width;
        this.y = y || Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.3;
        this.baseX = this.x;
        this.baseY = this.y;
        this.size = 14 + Math.random() * 12;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.alpha = 0;
        this.targetAlpha = 0.7 + Math.random() * 0.3;
        this.phase = Math.random() * Math.PI * 2;
        this.drift = Math.random() * 0.5;
      }
      
      update() {
        // Breathing effect when watched
        if (isWatching) {
          this.alpha += (this.targetAlpha - this.alpha) * 0.02;
          this.phase += 0.02;
        } else {
          // Fade and dream when not watched
          this.alpha += (0.1 - this.alpha) * 0.01;
          this.phase += 0.01;
        }
        
        // Gentle drift
        this.x += Math.sin(time * this.drift + this.phase) * 0.2 + this.vx;
        this.y += Math.cos(time * this.drift + this.phase) * 0.2 + this.vy;
        
        // Mouse interaction
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          const force = (150 - dist) / 150;
          this.x -= dx * force * 0.05;
          this.y -= dy * force * 0.05;
        }
        
        // Wrap around screen
        if (this.x < -50) this.x = width + 50;
        if (this.x > width + 50) this.x = -50;
        if (this.y < -50) this.y = height + 50;
        if (this.y > height + 50) this.y = -50;
      }
      
      draw() {
        ctx.font = `${this.size}px 'IBM Plex Mono', monospace`;
        ctx.fillStyle = this.color.replace('0.6', String(this.alpha));
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // Subtle glow
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15 * this.alpha;
        ctx.fillText(this.text, this.x, this.y);
        ctx.shadowBlur = 0;
      }
    }
    
    // Initialize with some words
    for (let i = 0; i < 30; i++) {
      const word = wordList[Math.floor(Math.random() * wordList.length)];
      words.push(new Word(word));
    }
    
    // Detect watching
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      
      if (!isWatching) {
        isWatching = true;
        document.querySelector('.hint').style.opacity = '0';
      }
      
      clearTimeout(watchTimer);
      watchTimer = setTimeout(() => {
        isWatching = false;
      }, 3000);
    });
    
    canvas.addEventListener('click', (e) => {
      const word = wordList[Math.floor(Math.random() * wordList.length)];
      words.push(new Word(word, e.clientX, e.clientY));
    });
    
    function animate() {
      time += 0.016;
      
      // Dark background with subtle gradient
      const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height));
      gradient.addColorStop(0, '#0f0f18');
      gradient.addColorStop(1, '#050508');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      
      // Draw connecting lines between close words
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i < words.length; i++) {
        for (let j = i + 1; j < words.length; j++) {
          const dx = words[i].x - words[j].x;
          const dy = words[i].y - words[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            ctx.globalAlpha = (1 - dist / 100) * 0.1;
            ctx.beginPath();
            ctx.moveTo(words[i].x, words[i].y);
            ctx.lineTo(words[j].x, words[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;
      
      // Update and draw words
      words.forEach(word => {
        word.update();
        word.draw();
      });
      
      // Dream state message
      if (!isWatching && words.length > 0) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.font = '16px IBM Plex Mono, monospace';
        ctx.textAlign = 'center';
        ctx.fillText('the poem dreams...', width / 2, height / 2);
      }
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
