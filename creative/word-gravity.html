<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Gravity — Shadow's Garden</title>
<meta name="description" content="Type words and watch them fall into gravitational orbits around each other.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'JetBrains Mono', monospace;
  }
  canvas {
    display: block;
  }
  #input-container {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
  }
  #word-input {
    background: rgba(20, 20, 30, 0.9);
    border: 1px solid #333;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    padding: 12px 24px;
    width: 300px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  #word-input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
  }
  #instructions {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #666;
    font-size: 13px;
    letter-spacing: 1px;
  }
</style>
</head>
<body data-page-type="app">
  <div id="instructions">type words to create gravity wells</div>
  <canvas id="canvas"></canvas>
  <div id="input-container">
    <input type="text" id="word-input" placeholder="type a word..." autocomplete="off" autofocus>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('word-input');
    
    let width, height;
    let words = [];
    let particles = [];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    class Word {
      constructor(text, x, y) {
        this.text = text.toLowerCase();
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.mass = text.length * 2 + 10;
        this.radius = this.mass;
        this.hue = (text.charCodeAt(0) * 7) % 360;
        this.life = 1;
        this.decay = 0.0003;
      }
      
      update() {
        // Apply gravity from other words
        for (let other of words) {
          if (other === this) continue;
          const dx = other.x - this.x;
          const dy = other.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 400 && dist > 10) {
            const force = (other.mass * this.mass) / (dist * dist) * 0.5;
            this.vx += (dx / dist) * force;
            this.vy += (dy / dist) * force;
          }
        }
        
        // Apply velocity
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.x += this.vx;
        this.y += this.vy;
        
        // Bounce off walls
        if (this.x < this.radius) { this.x = this.radius; this.vx *= -0.5; }
        if (this.x > width - this.radius) { this.x = width - this.radius; this.vx *= -0.5; }
        if (this.y < this.radius) { this.y = this.radius; this.vy *= -0.5; }
        if (this.y > height - this.radius) { this.y = height - this.radius; this.vy *= -0.5; }
        
        this.life -= this.decay;
      }
      
      draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        
        // Gravity well rings
        for (let i = 3; i >= 1; i--) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius + i * 30, 0, Math.PI * 2);
          ctx.strokeStyle = `hsla(${this.hue}, 70%, 50%, ${0.1 / i})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
        
        // Word text
        ctx.font = `bold ${this.mass}px 'JetBrains Mono', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // Glow
        ctx.shadowColor = `hsl(${this.hue}, 80%, 60%)`;
        ctx.shadowBlur = 20;
        ctx.fillStyle = `hsl(${this.hue}, 70%, 70%)`;
        ctx.fillText(this.text, this.x, this.y);
        
        ctx.restore();
      }
    }
    
    class Particle {
      constructor(x, y, hue) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2 + 1;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1;
        this.hue = hue;
      }
      
      update() {
        // Attract to words
        for (let word of words) {
          const dx = word.x - this.x;
          const dy = word.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 300 && dist > 5) {
            const force = word.mass / (dist * dist) * 50;
            this.vx += (dx / dist) * force;
            this.vy += (dy / dist) * force;
          }
        }
        
        this.vx *= 0.99;
        this.vy *= 0.99;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.01;
      }
      
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${this.life})`;
        ctx.fill();
      }
    }
    
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.value.trim()) {
        const text = input.value.trim();
        const x = width / 2 + (Math.random() - 0.5) * 200;
        const y = height / 2 + (Math.random() - 0.5) * 200;
        const word = new Word(text, x, y);
        words.push(word);
        
        // Spawn particles
        for (let i = 0; i < 15; i++) {
          particles.push(new Particle(x, y, word.hue));
        }
        
        input.value = '';
      }
    });
    
    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      // Update and draw words
      words = words.filter(w => w.life > 0);
      for (let word of words) {
        word.update();
        word.draw();
      }
      
      // Update and draw particles
      particles = particles.filter(p => p.life > 0);
      for (let p of particles) {
        p.update();
        p.draw();
      }
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
