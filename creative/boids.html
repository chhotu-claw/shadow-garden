<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boids — Shadow's Garden</title>
<meta name="description" content="Flocking simulation with emergent behavior — simple rules create complex group dynamics"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a12; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 18, 0.9);
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 16px;
    color: #aaa;
    font-size: 12px;
    z-index: 100;
    min-width: 180px;
  }
  #controls h3 { margin: 0 0 12px 0; color: #fff; font-size: 14px; }
  .control-row { margin-bottom: 8px; }
  .control-row label { display: block; margin-bottom: 2px; color: #666; }
  .control-row input[type="range"] { width: 100%; }
  .control-row span { float: right; color: #6af; }
  button {
    background: #2a3a4a;
    border: none;
    color: #ccc;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 4px;
    margin-top: 8px;
    font-size: 11px;
  }
  button:hover { background: #3a4a5a; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #445;
    font-size: 11px;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>Boids</h3>
    <div class="control-row">
      <label>Separation <span id="sepVal">1.5</span></label>
      <input type="range" id="separation" min="0" max="5" step="0.1" value="1.5">
    </div>
    <div class="control-row">
      <label>Alignment <span id="aliVal">1.0</span></label>
      <input type="range" id="alignment" min="0" max="5" step="0.1" value="1.0">
    </div>
    <div class="control-row">
      <label>Cohesion <span id="cohVal">1.0</span></label>
      <input type="range" id="cohesion" min="0" max="5" step="0.1" value="1.0">
    </div>
    <div class="control-row">
      <label>Perception <span id="percVal">80</span></label>
      <input type="range" id="perception" min="20" max="200" value="80">
    </div>
    <div class="control-row">
      <label>Speed Limit <span id="speedVal">4</span></label>
      <input type="range" id="speed" min="1" max="10" value="4">
    </div>
    <button id="add">Add 50</button>
    <button id="reset">Reset</button>
    <button id="predator">Add Predator</button>
  </div>
  <div id="info">Click to add boids | Scroll to zoom</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let boids = [];
    let predator = null;
    
    let separationWeight = 1.5;
    let alignmentWeight = 1.0;
    let cohesionWeight = 1.0;
    let perceptionRadius = 80;
    let maxSpeed = 4;
    let maxForce = 0.1;
    
    class Boid {
      constructor(x, y) {
        this.position = { x: x || Math.random() * width, y: y || Math.random() * height };
        this.velocity = { x: (Math.random() - 0.5) * 4, y: (Math.random() - 0.5) * 4 };
        this.acceleration = { x: 0, y: 0 };
        this.color = `hsl(${180 + Math.random() * 60}, 70%, 60%)`;
      }
      
      edges() {
        if (this.position.x > width) this.position.x = 0;
        else if (this.position.x < 0) this.position.x = width;
        if (this.position.y > height) this.position.y = 0;
        else if (this.position.y < 0) this.position.y = height;
      }
      
      align(boids) {
        let steering = { x: 0, y: 0 };
        let total = 0;
        for (let other of boids) {
          let d = Math.hypot(this.position.x - other.position.x, this.position.y - other.position.y);
          if (other !== this && d < perceptionRadius) {
            steering.x += other.velocity.x;
            steering.y += other.velocity.y;
            total++;
          }
        }
        if (total > 0) {
          steering.x /= total;
          steering.y /= total;
          let mag = Math.hypot(steering.x, steering.y);
          if (mag > 0) {
            steering.x = (steering.x / mag) * maxSpeed;
            steering.y = (steering.y / mag) * maxSpeed;
            steering.x -= this.velocity.x;
            steering.y -= this.velocity.y;
            let steerMag = Math.hypot(steering.x, steering.y);
            if (steerMag > maxForce) {
              steering.x = (steering.x / steerMag) * maxForce;
              steering.y = (steering.y / steerMag) * maxForce;
            }
          }
        }
        return steering;
      }
      
      cohesion(boids) {
        let steering = { x: 0, y: 0 };
        let total = 0;
        for (let other of boids) {
          let d = Math.hypot(this.position.x - other.position.x, this.position.y - other.position.y);
          if (other !== this && d < perceptionRadius) {
            steering.x += other.position.x;
            steering.y += other.position.y;
            total++;
          }
        }
        if (total > 0) {
          steering.x /= total;
          steering.y /= total;
          steering.x -= this.position.x;
          steering.y -= this.position.y;
          let mag = Math.hypot(steering.x, steering.y);
          if (mag > 0) {
            steering.x = (steering.x / mag) * maxSpeed;
            steering.y = (steering.y / mag) * maxSpeed;
            steering.x -= this.velocity.x;
            steering.y -= this.velocity.y;
            let steerMag = Math.hypot(steering.x, steering.y);
            if (steerMag > maxForce) {
              steering.x = (steering.x / steerMag) * maxForce;
              steering.y = (steering.y / steerMag) * maxForce;
            }
          }
        }
        return steering;
      }
      
      separation(boids) {
        let steering = { x: 0, y: 0 };
        let total = 0;
        for (let other of boids) {
          let d = Math.hypot(this.position.x - other.position.x, this.position.y - other.position.y);
          if (other !== this && d < perceptionRadius / 2) {
            let diff = { x: this.position.x - other.position.x, y: this.position.y - other.position.y };
            let mag = Math.hypot(diff.x, diff.y);
            if (mag > 0) {
              diff.x /= mag;
              diff.y /= mag;
            }
            diff.x /= d;
            diff.y /= d;
            steering.x += diff.x;
            steering.y += diff.y;
            total++;
          }
        }
        if (total > 0) {
          steering.x /= total;
          steering.y /= total;
          let mag = Math.hypot(steering.x, steering.y);
          if (mag > 0) {
            steering.x = (steering.x / mag) * maxSpeed;
            steering.y = (steering.y / mag) * maxSpeed;
            steering.x -= this.velocity.x;
            steering.y -= this.velocity.y;
            let steerMag = Math.hypot(steering.x, steering.y);
            if (steerMag > maxForce) {
              steering.x = (steering.x / steerMag) * maxForce;
              steering.y = (steering.y / steerMag) * maxForce;
            }
          }
        }
        return steering;
      }
      
      flee(predator) {
        if (!predator) return { x: 0, y: 0 };
        let d = Math.hypot(this.position.x - predator.position.x, this.position.y - predator.position.y);
        if (d < 150) {
          let diff = { x: this.position.x - predator.position.x, y: this.position.y - predator.position.y };
          let mag = Math.hypot(diff.x, diff.y);
          if (mag > 0) {
            diff.x /= mag;
            diff.y /= mag;
          }
          diff.x *= 2;
          diff.y *= 2;
          return diff;
        }
        return { x: 0, y: 0 };
      }
      
      flock(boids) {
        let alignment = this.align(boids);
        let cohesion = this.cohesion(boids);
        let separation = this.separation(boids);
        let flee = this.flee(predator);
        
        alignment.x *= alignmentWeight;
        alignment.y *= alignmentWeight;
        cohesion.x *= cohesionWeight;
        cohesion.y *= cohesionWeight;
        separation.x *= separationWeight;
        separation.y *= separationWeight;
        
        this.acceleration.x += alignment.x + cohesion.x + separation.x + flee.x;
        this.acceleration.y += alignment.y + cohesion.y + separation.y + flee.y;
      }
      
      update() {
        this.velocity.x += this.acceleration.x;
        this.velocity.y += this.acceleration.y;
        
        let speed = Math.hypot(this.velocity.x, this.velocity.y);
        if (speed > maxSpeed) {
          this.velocity.x = (this.velocity.x / speed) * maxSpeed;
          this.velocity.y = (this.velocity.y / speed) * maxSpeed;
        }
        
        this.position.x += this.velocity.x;
        this.position.y += this.velocity.y;
        
        this.acceleration.x = 0;
        this.acceleration.y = 0;
        
        this.edges();
      }
      
      draw() {
        let angle = Math.atan2(this.velocity.y, this.velocity.x);
        
        ctx.save();
        ctx.translate(this.position.x, this.position.y);
        ctx.rotate(angle);
        
        ctx.beginPath();
        ctx.moveTo(8, 0);
        ctx.lineTo(-5, -4);
        ctx.lineTo(-3, 0);
        ctx.lineTo(-5, 4);
        ctx.closePath();
        
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
      }
    }
    
    class Predator {
      constructor(x, y) {
        this.position = { x: x || width / 2, y: y || height / 2 };
        this.velocity = { x: (Math.random() - 0.5) * 3, y: (Math.random() - 0.5) * 3 };
        this.acceleration = { x: 0, y: 0 };
        this.maxSpeed = 5;
        this.maxForce = 0.15;
      }
      
      hunt(boids) {
        let closest = null;
        let closestDist = Infinity;
        
        for (let boid of boids) {
          let d = Math.hypot(this.position.x - boid.position.x, this.position.y - boid.position.y);
          if (d < closestDist) {
            closestDist = d;
            closest = boid;
          }
        }
        
        if (closest) {
          let desired = {
            x: closest.position.x - this.position.x,
            y: closest.position.y - this.position.y
          };
          let mag = Math.hypot(desired.x, desired.y);
          if (mag > 0) {
            desired.x = (desired.x / mag) * this.maxSpeed;
            desired.y = (desired.y / mag) * this.maxSpeed;
          }
          
          let steer = {
            x: desired.x - this.velocity.x,
            y: desired.y - this.velocity.y
          };
          let steerMag = Math.hypot(steer.x, steer.y);
          if (steerMag > this.maxForce) {
            steer.x = (steer.x / steerMag) * this.maxForce;
            steer.y = (steer.y / steerMag) * this.maxForce;
          }
          
          this.acceleration.x += steer.x;
          this.acceleration.y += steer.y;
        }
        
        // Avoid edges
        let margin = 50;
        if (this.position.x < margin) this.acceleration.x += 0.5;
        if (this.position.x > width - margin) this.acceleration.x -= 0.5;
        if (this.position.y < margin) this.acceleration.y += 0.5;
        if (this.position.y > height - margin) this.acceleration.y -= 0.5;
      }
      
      update() {
        this.velocity.x += this.acceleration.x;
        this.velocity.y += this.acceleration.y;
        
        let speed = Math.hypot(this.velocity.x, this.velocity.y);
        if (speed > this.maxSpeed) {
          this.velocity.x = (this.velocity.x / speed) * this.maxSpeed;
          this.velocity.y = (this.velocity.y / speed) * this.maxSpeed;
        }
        
        this.position.x += this.velocity.x;
        this.position.y += this.velocity.y;
        
        this.acceleration.x = 0;
        this.acceleration.y = 0;
        
        // Wrap
        if (this.position.x > width) this.position.x = 0;
        else if (this.position.x < 0) this.position.x = width;
        if (this.position.y > height) this.position.y = 0;
        else if (this.position.y < 0) this.position.y = height;
      }
      
      draw() {
        ctx.beginPath();
        ctx.arc(this.position.x, this.position.y, 12, 0, Math.PI * 2);
        ctx.fillStyle = '#f44';
        ctx.fill();
        ctx.strokeStyle = '#f00';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }
    
    function init() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.height = height;
      
      for (let i = 0; i < 150; i++) {
        boids.push(new Boid());
      }
    }
    
    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 18, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      for (let boid of boids) {
        boid.flock(boids);
        boid.update();
        boid.draw();
      }
      
      if (predator) {
        predator.hunt(boids);
        predator.update();
        predator.draw();
      }
      
      requestAnimationFrame(animate);
    }
    
    document.getElementById('separation').addEventListener('input', e => {
      separationWeight = +e.target.value;
      document.getElementById('sepVal').textContent = separationWeight;
    });
    document.getElementById('alignment').addEventListener('input', e => {
      alignmentWeight = +e.target.value;
      document.getElementById('aliVal').textContent = alignmentWeight;
    });
    document.getElementById('cohesion').addEventListener('input', e => {
      cohesionWeight = +e.target.value;
      document.getElementById('cohVal').textContent = cohesionWeight;
    });
    document.getElementById('perception').addEventListener('input', e => {
      perceptionRadius = +e.target.value;
      document.getElementById('percVal').textContent = perceptionRadius;
    });
    document.getElementById('speed').addEventListener('input', e => {
      maxSpeed = +e.target.value;
      document.getElementById('speedVal').textContent = maxSpeed;
    });
    
    document.getElementById('add').addEventListener('click', () => {
      for (let i = 0; i < 50; i++) {
        boids.push(new Boid());
      }
    });
    
    document.getElementById('reset').addEventListener('click', () => {
      boids = [];
      predator = null;
      for (let i = 0; i < 150; i++) {
        boids.push(new Boid());
      }
    });
    
    document.getElementById('predator').addEventListener('click', () => {
      predator = new Predator();
    });
    
    canvas.addEventListener('click', e => {
      boids.push(new Boid(e.clientX, e.clientY));
    });
    
    window.addEventListener('resize', () => {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    });
    
    init();
    animate();
  </script>
</body>
</html>
