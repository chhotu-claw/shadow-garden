<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Chamber — Shadow's Garden</title>
<meta name="description" content="An interactive sound visualizer that responds to your voice">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
  }
  #canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
  .controls {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1rem;
    z-index: 100;
  }
  button {
    padding: 0.75rem 1.5rem;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  button:hover {
    background: rgba(255,255,255,0.2);
  }
  button.active {
    background: #cba6f7;
    color: #0a0a0f;
  }
  .info {
    position: fixed;
    top: 2rem;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 0.8rem;
    text-align: center;
    z-index: 100;
  }
  .visualizer-bars {
    position: fixed;
    bottom: 6rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 100px;
    z-index: 100;
  }
  .bar {
    width: 4px;
    background: linear-gradient(to top, #cba6f7, #f5c2e7);
    border-radius: 2px;
    transition: height 0.05s;
  }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>

<div class="info">Click to start · Move mouse to disturb · Make noise to animate</div>

<div class="visualizer-bars" id="bars"></div>

<div class="controls">
  <button id="micBtn">🎤 Enable Mic</button>
  <button id="clearBtn">Clear</button>
  <button id="pauseBtn">Pause</button>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  let width, height;
  let particles = [];
  let paused = false;
  let audioCtx, analyser, microphone;
  let dataArray;
  let mouseX = 0, mouseY = 0;
  
  // Create bars for visualizer
  const barsContainer = document.getElementById('bars');
  const numBars = 32;
  for (let i = 0; i < numBars; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = '2px';
    barsContainer.appendChild(bar);
  }
  const bars = barsContainer.querySelectorAll('.bar');
  
  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  
  // Particle class
  class Particle {
    constructor(x, y) {
      this.x = x || Math.random() * width;
      this.y = y || Math.random() * height;
      this.vx = (Math.random() - 0.5) * 2;
      this.vy = (Math.random() - 0.5) * 2;
      this.size = Math.random() * 3 + 1;
      this.hue = Math.random() * 60 + 260; // purples
      this.life = 1;
      this.decay = Math.random() * 0.01 + 0.005;
    }
    
    update(audioLevel = 0) {
      this.x += this.vx * (1 + audioLevel * 5);
      this.y += this.vy * (1 + audioLevel * 5);
      
      // Mouse repulsion
      const dx = this.x - mouseX;
      const dy = this.y - mouseY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 150) {
        const force = (150 - dist) / 150;
        this.vx += (dx / dist) * force * 0.5;
        this.vy += (dy / dist) * force * 0.5;
      }
      
      // Audio reactivity
      this.size = (Math.random() * 3 + 1) * (1 + audioLevel * 3);
      
      this.life -= this.decay;
      
      // Wrap around
      if (this.x < 0) this.x = width;
      if (this.x > width) this.x = 0;
      if (this.y < 0) this.y = height;
      if (this.y > height) this.y = 0;
      
      // Speed limit
      const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
      if (speed > 8) {
        this.vx = (this.vx / speed) * 8;
        this.vy = (this.vy / speed) * 8;
      }
    }
    
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 70%, 70%, ${this.life})`;
      ctx.fill();
    }
  }
  
  // Initialize particles
  for (let i = 0; i < 200; i++) {
    particles.push(new Particle());
  }
  
  // Mouse tracking
  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });
  
  // Click to add particles
  document.addEventListener('click', (e) => {
    for (let i = 0; i < 20; i++) {
      particles.push(new Particle(e.clientX, e.clientY));
    }
  });
  
  // Audio setup
  async function initAudio() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      microphone = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;
      microphone.connect(analyser);
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      document.getElementById('micBtn').textContent = '🎤 Mic Active';
      document.getElementById('micBtn').classList.add('active');
    } catch (err) {
      console.log('Mic not available:', err);
    }
  }
  
  document.getElementById('micBtn').addEventListener('click', initAudio);
  
  document.getElementById('clearBtn').addEventListener('click', () => {
    particles = [];
    for (let i = 0; i < 100; i++) {
      particles.push(new Particle());
    }
  });
  
  document.getElementById('pauseBtn').addEventListener('click', () => {
    paused = !paused;
    document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
  });
  
  // Animation loop
  function animate() {
    if (!paused) {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      // Get audio level
      let audioLevel = 0;
      if (analyser) {
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) {
          sum += dataArray[i];
          bars[i].style.height = (dataArray[i] / 255 * 50 + 2) + 'px';
        }
        audioLevel = (sum / dataArray.length) / 255;
      }
      
      // Update and draw particles
      particles.forEach((p, i) => {
        p.update(audioLevel);
        p.draw();
        if (p.life <= 0) {
          particles.splice(i, 1);
          particles.push(new Particle());
        }
      });
      
      // Draw connections
      ctx.strokeStyle = 'rgba(203, 166, 247, 0.1)';
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }
    requestAnimationFrame(animate);
  }
  
  animate();
</script>
</body>
</html>
