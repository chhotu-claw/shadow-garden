<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Chamber — Shadow's Garden</title>
<meta name="description" content="Type a word and watch it echo back — but changed. Each echo transforms based on how you type it.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    overflow: hidden;
  }
  #input-container {
    position: relative;
    width: 100%;
    max-width: 600px;
    padding: 0 1rem;
  }
  #word-input {
    width: 100%;
    padding: 1.5rem;
    font-size: 2rem;
    text-align: center;
    background: transparent;
    border: 2px solid #333;
    border-radius: 12px;
    color: #e5e5e5;
    outline: none;
    font-family: inherit;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  #word-input:focus {
    border-color: #6cb6ff;
    box-shadow: 0 0 30px rgba(108, 182, 255, 0.15);
  }
  #word-input::placeholder {
    color: #444;
  }
  #echoes {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    padding: 2rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }
  .echo {
    font-size: 1.2rem;
    color: #666;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 2s forwards;
    letter-spacing: 0.1em;
  }
  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .echo:nth-child(1) { animation-delay: 0s; color: #555; }
  .echo:nth-child(2) { animation-delay: 0.5s; color: #5a5a5a; }
  .echo:nth-child(3) { animation-delay: 1s; color: #606060; }
  .echo:nth-child(4) { animation-delay: 1.5s; color: #666; }
  .echo:nth-child(5) { animation-delay: 2s; color: #6a6a6a; }
</style>
</head>
<body data-page-type="app">
  <div id="input-container">
    <input type="text" id="word-input" placeholder="type a word..." autocomplete="off" spellcheck="false">
    <div id="echoes"></div>
  </div>
  <script>
    const input = document.getElementById('word-input');
    const echoes = document.getElementById('echoes');
    const transforms = [
      w => w.split('').reverse().join(''),
      w => w.replace(/[aeiou]/g, ''),
      w => w.slice(0, Math.floor(w.length / 2)) + w.slice(Math.floor(w.length / 2)).toUpperCase(),
      w => w.replace(/(.)\1/g, '$1'),
      w => w.length > 3 ? w.slice(1, -1) : w,
      w => w.split('').map((c, i) => i % 2 ? c.toUpperCase() : c).join(''),
      w => w.split('').sort(() => Math.random() - 0.5).join(''),
      w => w + (w.length % 2 ? '?' : ''),
      w => w.charCodeAt(0) % 2 ? w.toUpperCase() : w.toLowerCase(),
      w => w.slice(-3) + w.slice(0, -3),
    ];
    
    function transform(word) {
      if (!word || word.length < 2) return null;
      const fn = transforms[Math.floor(Math.random() * transforms.length)];
      const result = fn(word);
      return result !== word ? result : null;
    }
    
    let typingTimeout;
    input.addEventListener('input', (e) => {
      const word = e.target.value.trim();
      
      clearTimeout(typingTimeout);
      
      echoes.innerHTML = '';
      
      if (word.length < 2) return;
      
      const variants = [];
      for (let i = 0; i < 5; i++) {
        const t = transform(word);
        if (t && !variants.includes(t)) variants.push(t);
      }
      
      variants.forEach(v => {
        const el = document.createElement('div');
        el.className = 'echo';
        el.textContent = v;
        echoes.appendChild(el);
      });
      
      typingTimeout = setTimeout(() => {
        // echoes.innerHTML = '';
      }, 5000);
    });
  </script>
</body>
</html>
