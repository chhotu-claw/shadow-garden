<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Chamber — Shadow's Garden</title>
<meta name="description" content="A game you play against your past self.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --glow: #00ff88;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: #050508;
    color: #ccc;
    font-family: 'Courier New', monospace;
  }
  .container {
    max-width: 500px;
    text-align: center;
  }
  h1 {
    font-size: 1rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 3rem;
  }
  #message {
    font-size: 1.4rem;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.6;
    color: var(--glow);
    text-shadow: 0 0 20px var(--glow);
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  .input-area {
    margin-top: 3rem;
  }
  input {
    width: 100%;
    padding: 1rem;
    background: transparent;
    border: 1px solid #222;
    color: #666;
    font-family: inherit;
    font-size: 1rem;
    text-align: center;
    outline: none;
    transition: all 0.3s;
  }
  input:focus {
    border-color: #333;
    color: #888;
  }
  input::placeholder {
    color: #333;
  }
  #submit {
    margin-top: 1rem;
    padding: 0.8rem 2rem;
    background: transparent;
    border: 1px solid #222;
    color: #444;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    transition: all 0.3s;
  }
  #submit:hover {
    border-color: var(--glow);
    color: var(--glow);
    box-shadow: 0 0 20px rgba(0,255,136,0.1);
  }
  .history {
    margin-top: 3rem;
    font-size: 0.7rem;
    color: #222;
  }
  .history-item {
    margin: 0.5rem 0;
    transition: all 0.5s;
  }
  .history-item:nth-child(odd) {
    color: #1a1a1a;
  }
  .history-item:nth-child(even) {
    color: #0a0a0a;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Echo Chamber</h1>
    <div id="message">what you say now<br>will echo back</div>
    <div class="input-area">
      <input type="text" id="input" placeholder="speak something true" maxlength="50">
      <button id="submit">speak</button>
    </div>
    <div class="history" id="history"></div>
  </div>

  <script>
    const messages = [
      "what you say now\nwill echo back",
      "the silence between\ngrows louder",
      "you are not the first\nto stand here",
      "every word falls\ninto the same void",
      "the walls listen\nbut do not hear",
      "your voice is just\nechoes of echoes",
      "nothing new under\nthis dead star",
      "the chamber remembers\nwhat you forgot",
      "you speak,\nyet nothing changes",
      "the answer was always\nthe question"
    ];

    const input = document.getElementById('input');
    const submit = document.getElementById('submit');
    const messageDiv = document.getElementById('message');
    const historyDiv = document.getElementById('history');

    function showRandomMessage() {
      const msg = messages[Math.floor(Math.random() * messages.length)];
      messageDiv.style.opacity = 0;
      setTimeout(() => {
        messageDiv.innerHTML = msg.replace(/\n/g, '<br>');
        messageDiv.style.opacity = 1;
      }, 500);
    }

    function speak() {
      const text = input.value.trim();
      if (!text) return;

      // Add to history
      const item = document.createElement('div');
      item.className = 'history-item';
      item.textContent = text;
      historyDiv.insertBefore(item, historyDiv.firstChild);

      // Limit history
      if (historyDiv.children.length > 10) {
        historyDiv.removeChild(historyDiv.lastChild);
      }

      input.value = '';
      showRandomMessage();
    }

    submit.addEventListener('click', speak);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') speak();
    });

    // Random message on load
    showRandomMessage();
  </script>
</body>
</html>
