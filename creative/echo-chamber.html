<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Chamber тАФ Shadow's Garden</title>
<meta name="description" content="An interactive text experience where your words echo back transformed">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: #0a0a0f;
    overflow: hidden;
  }
  .container {
    max-width: 700px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #cba6f7, #89b4fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    color: #6c7086;
    margin-bottom: 2rem;
    font-size: 1rem;
  }
  #input-area {
    margin-bottom: 2rem;
  }
  #word-input {
    width: 100%;
    max-width: 400px;
    padding: 1rem 1.5rem;
    font-size: 1.2rem;
    background: #181825;
    border: 2px solid #313244;
    border-radius: 50px;
    color: #cdd6f4;
    text-align: center;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  #word-input:focus {
    border-color: #cba6f7;
    box-shadow: 0 0 20px rgba(203, 166, 247, 0.3);
  }
  #word-input::placeholder {
    color: #45475a;
  }
  .echoes {
    position: relative;
    min-height: 300px;
  }
  .echo-word {
    position: absolute;
    font-size: 1.5rem;
    font-weight: 600;
    white-space: nowrap;
    animation: fadeInEcho 0.5s ease-out forwards;
    opacity: 0;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  @keyframes fadeInEcho {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  .echo-word.mirror { color: #f38ba8; }
  .echo-word.reverse { color: #fab387; }
  .echo-word.leetspeak { color: #a6e3a1; }
  .echo-word.sponge { color: #f9e2af; }
  .echo-word.emoji { font-size: 2rem; }
  .echo-word.uppercase { color: #89b4fa; }
  .echo-word.base64 { color: #cba6f7; font-family: monospace; font-size: 1rem; }
  .echo-word.morse { color: #94e2d5; font-family: monospace; font-size: 0.9rem; }
  .echo-word.atomize { color: #f5c2e7; font-size: 0.8rem; }
  .echo-word.rhythm { color: #eba0ac; }
  .echo-word.sound { color: #b4befe; }
  .center-echo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2rem;
    font-weight: 700;
    color: #cdd6f4;
    text-shadow: 0 0 30px rgba(203, 166, 247, 0.5);
  }
  .hint {
    color: #45475a;
    font-size: 0.85rem;
    margin-top: 2rem;
  }
  .stats {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    color: #313244;
    font-size: 0.75rem;
    font-family: monospace;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Echo Chamber</h1>
  <p class="subtitle">type a word. watch it transform.</p>
  
  <div id="input-area">
    <input type="text" id="word-input" placeholder="type something..." autocomplete="off" autofocus>
  </div>
  
  <div class="echoes" id="echo-container">
    <div class="center-echo" id="center-echo"></div>
  </div>
  
  <p class="hint">press enter to echo</p>
</div>

<div class="stats" id="stats">0 echoes</div>

<script>
  const input = document.getElementById('word-input');
  const container = document.getElementById('echo-container');
  const centerEcho = document.getElementById('center-echo');
  const stats = document.getElementById('stats');
  
  let echoCount = 0;
  let lastWord = '';

  const transforms = [
    { name: 'mirror', fn: s => s.split('').reverse().join('') },
    { name: 'reverse', fn: s => s.split(' ').reverse().join(' ') },
    { name: 'uppercase', fn: s => s.toUpperCase() },
    { name: 'leetspeak', fn: s => s.replace(/a/gi,'4').replace(/e/gi,'3').replace(/i/gi,'1').replace(/o/gi,'0').replace(/s/gi,'5').replace(/t/gi,'7') },
    { name: 'sponge', fn: s => s.split('').map((c,i) => i%2===0?c.toUpperCase():c.toLowerCase()).join('') },
    { name: 'base64', fn: s => btoa(s) },
    { name: 'morse', fn: s => morseEncode(s) },
    { name: 'atomize', fn: s => s.split('').join(' ') },
    { name: 'rhythm', fn: s => s.replace(/[aeiou]/gi, 'ЁЯМК').replace(/[bcdfghjklmnpqrstvwxyz]/gi, 'тЧП') },
    { name: 'sound', fn: s => s.replace(/[aeiou]/g,'ЁЯО╡').replace(/[bcdfghjklmnpqrstvwxyz]/g,'ЁЯФК') }
  ];

  const emojis = {
    happy: ['ЁЯШК','ЁЯШД','ЁЯШБ','ЁЯе│','тЬи'],
    love: ['ЁЯТЬ','тЭдя╕П','ЁЯТХ','ЁЯл╢','ЁЯТЦ'],
    star: ['тнР','ЁЯМЯ','тЬи','ЁЯТл','тШЖ'],
    fire: ['ЁЯФе','ЁЯТе','тЪб','ЁЯЪА','ЁЯТО'],
    nature: ['ЁЯМ╕','ЁЯМ║','ЁЯНА','ЁЯМ┐','ЁЯжЛ']
  };

  function morseEncode(str) {
    const morse = {'a':'.тИТ','b':'тИТ...','c':'тИТ.тИТ.','d':'тИТ..','e':'.','f':'..тИТ.','g':'тИТтИТ.','h':'....','i':'..','j':'.тИТтИТтИТ','k':'тИТ.тИТ','l':'.тИТ..','m':'тИТтИТ','n':'тИТ.','o':'тИТтИТтИТ','p':'.тИТтИТ.','q':'тИТтИТ.тИТ','r':'.тИТ.','s':'...','t':'тИТ','u':'..тИТ','v':'...тИТ','w':'.тИТтИТ','x':'тИТ..тИТ','y':'тИТ.тИТтИТ','z':'тИТтИТ..',' ':' / ','0':'тИТтИТтИТтИТтИТ','1':'.тИТтИТтИТтИТ','2':'..тИТтИТтИТ','3':'...тИТтИТ','4':'....тИТ','5':'.....','6':'тИТ....','7':'тИТтИТ...','8':'тИТтИТтИТ..','9':'тИТтИТтИТтИТ.'};
    return str.toLowerCase().split('').map(c => morse[c] || c).join(' ');
  }

  function getRandomPosition() {
    const x = 20 + Math.random() * 60;
    const y = 20 + Math.random() * 60;
    return { x, y };
  }

  function getEmoji(word) {
    const lower = word.toLowerCase();
    for (const [key, arr] of Object.entries(emojis)) {
      if (lower.includes(key)) return arr[Math.floor(Math.random() * arr.length)];
    }
    const allEmojis = Object.values(emojis).flat();
    return allEmojis[Math.floor(Math.random() * allEmojis.length)];
  }

  function createEcho(word) {
    const containerRect = container.getBoundingClientRect();
    
    // Center echo (main transformation)
    const mainTransform = transforms[Math.floor(Math.random() * transforms.length)];
    centerEcho.textContent = mainTransform.fn(word);
    centerEcho.className = 'center-echo ' + mainTransform.name;
    
    // Surrounding echoes
    for (let i = 0; i < 8; i++) {
      const transform = transforms[Math.floor(Math.random() * transforms.length)];
      const result = transform.fn(word);
      
      const el = document.createElement('div');
      el.className = 'echo-word ' + transform.name;
      el.textContent = result;
      
      const pos = getRandomPosition();
      el.style.left = pos.x + '%';
      el.style.top = pos.y + '%';
      
      container.appendChild(el);
      
      // Emoji echo
      const emojiEl = document.createElement('div');
      emojiEl.className = 'echo-word emoji';
      emojiEl.textContent = getEmoji(word);
      const emojiPos = getRandomPosition();
      emojiEl.style.left = emojiPos.x + '%';
      emojiEl.style.top = emojiPos.y + '%';
      container.appendChild(emojiEl);
    }
    
    echoCount++;
    stats.textContent = echoCount + ' echoes';
  }

  function clearEchoes() {
    const echoes = container.querySelectorAll('.echo-word');
    echoes.forEach(e => e.remove());
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && input.value.trim()) {
      const word = input.value.trim();
      if (word !== lastWord) {
        clearEchoes();
        createEcho(word);
        lastWord = word;
      }
      input.value = '';
    }
  });

  // Initial random echo on load
  const starters = ['echo','shadow','hello','test','light','dark','wave','star'];
  createEcho(starters[Math.floor(Math.random() * starters.length)]);
</script>
</body>
</html>
