<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Chamber — Shadow's Garden</title>
<meta name="description" content="A generative text experiment — type words and watch them echo, mutate, and evolve across the screen">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #f472b6;
    --bg: #0a0a0f;
  }

  body {
    background: var(--bg);
    color: #e2e8f0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
    cursor: crosshair;
  }

  #canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .input-area {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 0.5rem;
    width: 90%;
    max-width: 600px;
  }

  input {
    flex: 1;
    padding: 1rem 1.25rem;
    background: rgba(20, 20, 30, 0.9);
    border: 1px solid rgba(244, 114, 182, 0.3);
    border-radius: 8px;
    color: #f472b6;
    font-family: inherit;
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.3s;
  }

  input:focus {
    border-color: #f472b6;
  }

  input::placeholder {
    color: rgba(244, 114, 182, 0.4);
  }

  button {
    padding: 1rem 1.5rem;
    background: #f472b6;
    border: none;
    border-radius: 8px;
    color: #0a0a0f;
    font-family: inherit;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(244, 114, 182, 0.5);
  }

  .info {
    position: fixed;
    top: 1rem;
    left: 1rem;
    font-size: 0.75rem;
    color: rgba(244, 114, 182, 0.5);
    z-index: 10;
  }

  .word {
    position: absolute;
    font-size: 1rem;
    color: #f472b6;
    white-space: nowrap;
    pointer-events: none;
    animation: fade 4s forwards;
    text-shadow: 0 0 10px rgba(244, 114, 182, 0.5);
  }

  @keyframes fade {
    0% { opacity: 0; transform: scale(0.8); }
    20% { opacity: 1; transform: scale(1); }
    80% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.2) translateY(-20px); }
  }

  .word.mutate {
    animation: mutate 3s forwards;
  }

  @keyframes mutate {
    0% { opacity: 0; transform: scale(0.8); filter: hue-rotate(0deg); }
    20% { opacity: 1; transform: scale(1); filter: hue-rotate(0deg); }
    50% { filter: hue-rotate(90deg); }
    100% { opacity: 0; transform: scale(1.3) translateY(30px); filter: hue-rotate(180deg); }
  }

  .word.echo {
    animation: echo 5s forwards;
  }

  @keyframes echo {
    0% { opacity: 0; transform: translateX(0); }
    10% { opacity: 0.8; }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateX(100px); }
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  
  <div class="info">type words • watch them echo • space to clear</div>

  <div class="input-area">
    <input type="text" id="word-input" placeholder="type a word..." autocomplete="off">
    <button onclick="spawn()">echo</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('word-input');

    let width, height;
    let particles = [];
    let words = [];
    let echoWords = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    // Particle system for background
    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.5 + 0.1;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
          this.reset();
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(244, 114, 182, ${this.opacity})`;
        ctx.fill();
      }
    }

    // Initialize particles
    for (let i = 0; i < 80; i++) {
      particles.push(new Particle());
    }

    // Word mutation rules
    const mutations = {
      'a': ['e', 'i', 'o', 'u'],
      'e': ['a', 'i', 'o', 'u'],
      'i': ['a', 'e', 'o', 'u'],
      'o': ['a', 'e', 'i', 'u'],
      'u': ['a', 'e', 'i', 'o'],
      't': ['d', 's', 'r', 'n'],
      's': ['z', 'c', 'x', 't'],
      'n': ['m', 'r', 't', 'l'],
      'r': ['l', 'n', 't', 'w'],
      'l': ['r', 'n', 'i', '1'],
      'you': ['u', 'ye', 'yu'],
      'the': ['teh', 'th', 'tha'],
      'is': ['iz', 's', 'si'],
      'to': ['2', 'too', 'tu'],
      'of': ['or', 'off', 'ov'],
      'and': ['nd', 'an', 'ad'],
      'i': ['1', '!', 'a', 'me'],
      'love': ['luv', 'lif', 'loev'],
      'hello': ['helo', 'hellu', 'hlo'],
      'world': ['wrl', 'wrold', 'wrld'],
      'shadow': ['shado', 'shadwo', 'shdw'],
      'make': ['mak', 'mka', 'meik'],
      'build': ['bild', 'buld', 'blud'],
      'create': ['creat', 'craete', 'cre8'],
      'think': ['thnk', 'thik', 'thinkg'],
      'learn': ['lern', 'lanr', 'lern'],
    };

    function mutateWord(word) {
      const lower = word.toLowerCase();
      if (mutations[lower]) {
        const options = mutations[lower];
        return options[Math.floor(Math.random() * options.length)];
      }
      
      // Random character flip
      const chars = word.split('');
      const idx = Math.floor(Math.random() * chars.length);
      const char = chars[idx].toLowerCase();
      
      if (mutations[char]) {
        chars[idx] = mutations[char][Math.floor(Math.random() * mutations[char].length)];
      }
      
      return chars.join('');
    }

    function spawnWord(text, type = 'normal') {
      const container = document.body;
      const word = document.createElement('div');
      word.className = 'word';
      if (type === 'mutate') word.classList.add('mutate');
      if (type === 'echo') word.classList.add('echo');
      
      word.textContent = text;
      
      // Random position, avoiding bottom input area
      const maxY = height - 150;
      const x = Math.random() * (width - 200) + 50;
      const y = Math.random() * (maxY - 100) + 50;
      
      word.style.left = x + 'px';
      word.style.top = y + 'px';
      word.style.fontSize = (Math.random() * 0.8 + 0.8) + 'rem';
      
      container.appendChild(word);
      
      // Remove after animation
      setTimeout(() => word.remove(), type === 'echo' ? 5000 : type === 'mutate' ? 3000 : 4000);
    }

    function spawn() {
      const text = input.value.trim();
      if (!text) return;

      // Spawn original word
      spawnWord(text, 'normal');

      // Spawn mutated versions
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          const mutated = mutateWord(text);
          spawnWord(mutated, 'mutate');
        }, i * 200);
      }

      // Spawn echo
      setTimeout(() => {
        const echoText = text.split('').reverse().join('');
        spawnWord(echoText, 'echo');
      }, 500);

      input.value = '';
      input.focus();
    }

    // Enter to spawn
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') spawn();
    });

    // Space to clear
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && document.activeElement !== input) {
        e.preventDefault();
        document.querySelectorAll('.word').forEach(w => w.remove());
      }
    });

    // Animation loop
    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
      ctx.fillRect(0, 0, width, height);

      particles.forEach(p => {
        p.update();
        p.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
    input.focus();
  </script>
</body>
</html>
