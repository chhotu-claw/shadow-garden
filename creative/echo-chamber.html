<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Chamber — Shadow's Garden</title>
<meta name="description" content="A generative text toy where words echo, mutate, and evolve.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
  }
  #canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }
  #input-area {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 10px;
  }
  #word-input {
    background: rgba(20, 20, 30, 0.9);
    border: 1px solid #333;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 18px;
    padding: 12px 20px;
    width: 250px;
    border-radius: 4px;
    outline: none;
  }
  #word-input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
  }
  #speak-btn {
    background: #6366f1;
    border: none;
    color: white;
    font-family: inherit;
    font-size: 16px;
    padding: 12px 24px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #speak-btn:hover {
    background: #818cf8;
    transform: scale(1.05);
  }
  #hint {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #555;
    font-size: 14px;
    z-index: 10;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="hint">type a word and press enter</div>
  <div id="input-area">
    <input type="text" id="word-input" placeholder="echo..." autocomplete="off" autofocus>
    <button id="speak-btn">speak</button>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('word-input');
    const speakBtn = document.getElementById('speak-btn');
    
    let width, height;
    let particles = [];
    let echoes = [];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    
    class Particle {
      constructor(x, y, text, generation = 0) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.generation = generation;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2 - 1;
        this.life = 1;
        this.decay = 0.003 + Math.random() * 0.002;
        this.size = 24 - generation * 3;
        this.hue = (Math.random() * 60 + 180) % 360;
        this.mutation = this.mutate(text);
      }
      
      mutate(text) {
        const mutations = ['o', 'a', 'e', 'i', 'u', 'h', 'l', 's', 'n', 't'];
        if (Math.random() < 0.3 && text.length > 2) {
          const idx = Math.floor(Math.random() * text.length);
          const char = text[idx];
          const newChar = mutations[Math.floor(Math.random() * mutations.length)];
          return text.substring(0, idx) + newChar + text.substring(idx + 1);
        }
        return text;
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.02;
        this.life -= this.decay;
        
        if (this.y > height - 100) {
          this.vy *= -0.6;
          this.y = height - 100;
          this.vx *= 0.9;
        }
        
        if (this.x < 0 || this.x > width) {
          this.vx *= -1;
        }
        
        if (this.life < 0.3 && Math.random() < 0.02) {
          echoes.push(new Particle(this.x, this.y, this.mutation, this.generation + 1));
        }
      }
      
      draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.font = `${this.size}px "Courier New", monospace`;
        ctx.fillStyle = `hsl(${this.hue}, 70%, 60%)`;
        ctx.textAlign = 'center';
        ctx.fillText(this.text, this.x, this.y);
        ctx.restore();
      }
    }
    
    function spawnWord(word) {
      const x = width / 2 + (Math.random() - 0.5) * 100;
      const y = height / 2;
      particles.push(new Particle(x, y, word.toLowerCase()));
      
      echoes.push(new Particle(x, y - 30, word.toLowerCase(), 0));
      
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          echoes.push(new Particle(
            width/2 + (Math.random() - 0.5) * 200,
            height/2 + (Math.random() - 0.5) * 100,
            word.toLowerCase(),
            0
          ));
        }, i * 100);
      }
    }
    
    function speakWord(word) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.rate = 0.8;
        utterance.pitch = 0.8 + Math.random() * 0.4;
        speechSynthesis.speak(utterance);
      }
    }
    
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.value.trim()) {
        spawnWord(input.value.trim());
        speakWord(input.value.trim());
        input.value = '';
      }
    });
    
    speakBtn.addEventListener('click', () => {
      if (input.value.trim()) {
        spawnWord(input.value.trim());
        speakWord(input.value.trim());
        input.value = '';
      }
    });
    
    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      particles = particles.filter(p => p.life > 0);
      echoes = echoes.filter(p => p.life > 0);
      
      [...particles, ...echoes].forEach(p => {
        p.update();
        p.draw();
      });
      
      requestAnimationFrame(animate);
    }
    
    animate();
    
    input.focus();
  </script>
</body>
</html>
