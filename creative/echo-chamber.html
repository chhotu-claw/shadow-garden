<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Chamber — Shadow's Garden</title>
<meta name="description" content="A generative text toy where words echo, mutate, and evolve.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    color: #e8e6e3;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  #canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .input-area {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  #input {
    background: rgba(20, 20, 30, 0.85);
    border: 1px solid #3a3a4a;
    color: #e8e6e3;
    font-family: inherit;
    font-size: 1.4rem;
    padding: 16px 24px;
    width: 400px;
    max-width: 90vw;
    text-align: center;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  #input:focus {
    border-color: #6a6a8a;
    box-shadow: 0 0 20px rgba(100, 100, 150, 0.3);
  }

  #input::placeholder {
    color: #5a5a6a;
  }

  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    background: rgba(30, 30, 45, 0.9);
    border: 1px solid #4a4a5a;
    color: #c8c6d3;
    font-family: inherit;
    font-size: 0.85rem;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover {
    background: rgba(50, 50, 70, 0.9);
    border-color: #6a6a8a;
    color: #e8e6e3;
  }

  .hint {
    color: #4a4a5a;
    font-size: 0.8rem;
    margin-top: 10px;
  }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>

<div class="input-area">
  <input type="text" id="input" placeholder="type a word..." autocomplete="off" autofocus>
  <div class="controls">
    <button id="clearBtn">Clear</button>
    <button id="driftBtn">Drift</button>
    <button id="chaosBtn">Chaos</button>
  </div>
  <div class="hint">press enter to spawn · click words to mutate</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const input = document.getElementById('input');

let width, height;
let words = [];
let particles = [];

const mutations = {
  'a': ['e', 'i', 'o', 'u'],
  'e': ['a', 'i', 'o', 'u'],
  'i': ['a', 'e', 'o', 'u'],
  'o': ['a', 'e', 'i', 'u'],
  'u': ['a', 'e', 'i', 'o'],
  't': ['d', 's', 'th', 'rt'],
  's': ['z', 'c', 'ss', 'st'],
  'n': ['m', 'ng', 'nn', 'nd'],
  'r': ['l', 'w', 'rr', 'rd'],
  'l': ['r', 'll', 'ld', 'w'],
  'd': ['t', 'th', 'dd', 'nd'],
  'c': ['k', 's', 'ch', 'ck'],
  'm': ['n', 'mm', 'mb', 'mp'],
  'b': ['p', 'bb', 'bl', 'v'],
  'p': ['b', 'pp', 'pl', 'ph'],
  'g': ['k', 'j', 'gg', 'gh'],
  'k': ['g', 'c', 'ck', 'kk'],
  'f': ['v', 'ph', 'ff', 'gh'],
  'v': ['f', 'ph', 'vv', 'b'],
  'w': ['v', 'wr', 'ww', 'u'],
  'y': ['i', 'j', 'yy', 'ie'],
  'j': ['g', 'y', 'jj', 'ge'],
  'x': ['ks', 'z', 'xs', 'gz'],
  'q': ['kw', 'k', 'ck', 'qu'],
  'z': ['s', 'zz', 'ts', 'x']
};

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

class Word {
  constructor(text, x, y, vx = 0, vy = 0) {
    this.text = text;
    this.x = x;
    this.y = y;
    this.vx = vx + (Math.random() - 0.5) * 0.5;
    this.vy = vy + (Math.random() - 0.5) * 0.5;
    this.life = 1;
    this.decay = 0.001 + Math.random() * 0.002;
    this.size = 14 + Math.random() * 8;
    this.alpha = 0.7 + Math.random() * 0.3;
    this.hue = 200 + Math.random() * 60;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.99;
    this.vy *= 0.99;
    this.life -= this.decay;
    
    // slight floating
    this.vy += Math.sin(Date.now() * 0.001 + this.x) * 0.002;
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.life * this.alpha;
    ctx.font = `${this.size}px "Courier New", monospace`;
    ctx.fillStyle = `hsl(${this.hue}, 60%, ${50 + this.life * 30}%)`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }

  mutate() {
    const chars = this.text.toLowerCase().split('');
    if (chars.length === 0) return;
    
    const idx = Math.floor(Math.random() * chars.length);
    const char = chars[idx];
    
    if (mutations[char]) {
      const replacement = mutations[char][Math.floor(Math.random() * mutations[char].length)];
      chars[idx] = replacement;
      
      // spawn mutated child
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 40;
      words.push(new Word(
        chars.join(''),
        this.x + Math.cos(angle) * dist,
        this.y + Math.sin(angle) * dist,
        Math.cos(angle) * 0.3,
        Math.sin(angle) * 0.3
      ));
    }
  }

  contains(px, py) {
    ctx.font = `${this.size}px "Courier New", monospace`;
    const metrics = ctx.measureText(this.text);
    const w = metrics.width;
    const h = this.size;
    return px >= this.x - w/2 && px <= this.x + w/2 && 
           py >= this.y - h/2 && py <= this.y + h/2;
  }
}

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.life = 1;
    this.size = 1 + Math.random() * 2;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.98;
    this.vy *= 0.98;
    this.life -= 0.02;
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.life * 0.5;
    ctx.fillStyle = '#6a6a8a';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnWord(text) {
  const x = width / 2 + (Math.random() - 0.5) * 100;
  const y = height / 2 + (Math.random() - 0.5) * 50;
  words.push(new Word(text, x, y));
  
  // burst of particles
  for (let i = 0; i < 10; i++) {
    particles.push(new Particle(x, y));
  }
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && input.value.trim()) {
    spawnWord(input.value.trim());
    input.value = '';
  }
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  for (let word of words) {
    if (word.contains(x, y) && word.life > 0.3) {
      word.mutate();
      break;
    }
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  words = [];
  particles = [];
});

document.getElementById('driftBtn').addEventListener('click', () => {
  words.forEach(w => {
    w.vx += (Math.random() - 0.5) * 2;
    w.vy += (Math.random() - 0.5) * 2;
  });
});

document.getElementById('chaosBtn').addEventListener('click', () => {
  words.forEach(w => {
    if (Math.random() > 0.5) w.mutate();
  });
});

// initial word
spawnWord('echo');

function animate() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, width, height);
  
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  
  words = words.filter(w => w.life > 0);
  words.forEach(w => {
    w.update();
    w.draw();
  });
  
  requestAnimationFrame(animate);
}

animate();

input.focus();
</script>
</body>
</html>
