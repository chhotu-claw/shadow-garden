<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Chamber — Shadow's Garden</title>
<meta name="description" content="Type something. Get a response from the void.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    color: #888;
    font-family: 'Courier New', monospace;
  }
  .container {
    text-align: center;
    max-width: 500px;
    padding: 2rem;
  }
  input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #ccc;
    font-size: 1.2rem;
    text-align: center;
    width: 100%;
    padding: 0.5rem;
    font-family: inherit;
  }
  input:focus {
    outline: none;
    border-bottom-color: #555;
  }
  input::placeholder {
    color: #444;
  }
  .response {
    margin-top: 3rem;
    font-size: 1rem;
    line-height: 1.8;
    color: #666;
    min-height: 100px;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .response.show {
    opacity: 1;
  }
  .ripple {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(40,40,40,0.3) 0%, transparent 70%);
    pointer-events: none;
    animation: expand 2s ease-out forwards;
  }
  @keyframes expand {
    from {
      width: 0;
      height: 0;
      opacity: 0.5;
    }
    to {
      width: 500px;
      height: 500px;
      opacity: 0;
    }
  }
  .hint {
    margin-top: 4rem;
    font-size: 0.7rem;
    color: #333;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <input type="text" id="input" placeholder="speak into the void..." autocomplete="off" autofocus>
  <div class="response" id="response"></div>
  <div class="hint">press enter to send</div>
</div>

<script>
const responses = [
  "The silence understood you better than words ever could.",
  "Your words fall into a well that has no bottom.",
  "Something out there is listening. It doesn't care.",
  "You expected an answer. The void doesn't give those.",
  "The echo returns changed. Can you say the same?",
  "A thousand years from now, this will mean everything.",
  "Or nothing. Both are equally true.",
  "The chamber reflects what you cannot see in yourself.",
  "You spoke. The universe transcribed and filed it away.",
  "Behind your words, something older is waking up.",
  "The void remembers what you forgot you said.",
  "Your message was received. No reply is guaranteed.",
  "There. It heard you. Now what?",
  "The chamber doesn't judge. It only multiplies.",
  "You threw words into darkness. They grew roots."
];

const input = document.getElementById('input');
const responseEl = document.getElementById('response');

input.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && input.value.trim()) {
    const text = input.value.trim();
    
    // Create ripple effect
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.left = (e.clientX - 250) + 'px';
    ripple.style.top = (e.clientY - 250) + 'px';
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 2000);
    
    // Pick response based on text hash
    let hash = 0;
    for (let i = 0; i < text.length; i++) {
      hash = ((hash << 5) - hash) + text.charCodeAt(i);
      hash = hash & hash;
    }
    const index = Math.abs(hash) % responses.length;
    
    responseEl.classList.remove('show');
    setTimeout(() => {
      responseEl.textContent = responses[index];
      responseEl.classList.add('show');
    }, 300);
    
    input.value = '';
  }
});

// Subtle ambient drift
document.addEventListener('mousemove', (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;
  document.body.style.background = `radial-gradient(ellipse at ${50 + x}% ${50 + y}%, #0d0d0d 0%, #0a0a0a 100%)`;
});
</script>
</body>
</html>
