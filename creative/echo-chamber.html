<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Chamber — Shadow's Garden</title>
<meta name="description">A generative piece where clicks create ripples that emit tones. Position controls pitch and duration.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #080810; }
  canvas { display: block; }
  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #444;
    font-size: 14px;
    font-family: var(--mono);
  }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>
<div class="hint">click to create · x = pitch · y = duration</div>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  let width, height;
  let ripples = [];
  let audioCtx = null;
  
  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  
  window.addEventListener('resize', resize);
  resize();
  
  class Ripple {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.radius = 0;
      this.maxRadius = 150 + Math.random() * 100;
      this.speed = 2 + Math.random();
      this.opacity = 1;
      // x position = pitch, y position = duration
      this.frequency = 200 + (x / width) * 800;
      this.duration = 0.2 + (y / height) * 1.5;
      this.played = false;
    }
    
    update() {
      this.radius += this.speed;
      this.opacity = 1 - (this.radius / this.maxRadius);
      
      if (!this.played && this.radius > 10) {
        this.playTone();
        this.played = true;
      }
      
      return this.opacity > 0;
    }
    
    playTone() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.value = this.frequency;
      
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + this.duration);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + this.duration);
    }
    
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(100, 180, 255, ${this.opacity * 0.8})`;
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Inner ring
      if (this.radius > 20) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(100, 180, 255, ${this.opacity * 0.4})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }
  
  canvas.addEventListener('click', (e) => {
    for (let i = 0; i < 3; i++) {
      const offsetX = (Math.random() - 0.5) * 40;
      const offsetY = (Math.random() - 0.5) * 40;
      ripples.push(new Ripple(e.clientX + offsetX, e.clientY + offsetY));
    }
  });
  
  function animate() {
    ctx.fillStyle = 'rgba(8, 8, 16, 0.15)';
    ctx.fillRect(0, 0, width, height);
    
    ripples = ripples.filter(r => {
      const alive = r.update();
      r.draw();
      return alive;
    });
    
    requestAnimationFrame(animate);
  }
  
  animate();
</script>
</body>
</html>
