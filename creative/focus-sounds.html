<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Sounds — Shadow's Garden</title>
<meta name="description" content="Layer ambient sounds for focus — rain, cafe, fire, white noise. Mix and save your perfect soundscape.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg-card: #1a1a2e;
    --bg-card-hover: #252542;
    --accent: #7c3aed;
    --accent-glow: rgba(124, 58, 237, 0.4);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
  }
  
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    box-sizing: border-box;
  }

  .container {
    max-width: 600px;
    width: 100%;
  }

  h1 {
    text-align: center;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    text-align: center;
    color: var(--text-dim);
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }

  .sound-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .sound-card {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 2px solid transparent;
  }

  .sound-card:hover {
    background: var(--bg-card-hover);
    transform: translateY(-2px);
  }

  .sound-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .sound-card .icon {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }

  .sound-card .name {
    font-weight: 600;
    margin-bottom: 0.25rem;
  }

  .sound-card .slider-container {
    margin-top: 0.75rem;
  }

  .sound-card input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    outline: none;
  }

  .sound-card input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  .master-controls {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 1.5rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
  }

  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    filter: brightness(1.1);
    transform: scale(1.02);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.1);
  }

  .volume-display {
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  .saved-mixes {
    margin-top: 2rem;
  }

  .saved-mixes h3 {
    margin-bottom: 1rem;
    color: var(--text-dim);
  }

  .mix-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .mix-tag {
    background: var(--bg-card);
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .mix-tag:hover {
    border-color: var(--accent);
  }

  .mix-tag .delete {
    margin-left: 0.5rem;
    opacity: 0.5;
  }

  .mix-tag .delete:hover {
    opacity: 1;
    color: #ef4444;
  }

  .now-playing {
    text-align: center;
    margin-bottom: 1rem;
    min-height: 1.5rem;
    color: var(--accent);
    font-size: 0.9rem;
  }

  @media (max-width: 500px) {
    .sound-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Focus Sounds</h1>
    <p class="subtitle">Layer ambient sounds for deep work</p>
    
    <div class="now-playing" id="nowPlaying"></div>

    <div class="sound-grid" id="soundGrid">
      <!-- Sound cards generated by JS -->
    </div>

    <div class="master-controls">
      <button class="btn btn-secondary" id="stopAll">Stop All</button>
      <span class="volume-display" id="volumeDisplay">Master: 70%</span>
      <button class="btn" id="saveMix">Save Mix</button>
    </div>

    <div class="saved-mixes" id="savedMixes">
      <h3>Saved Mixes</h3>
      <div class="mix-list" id="mixList"></div>
    </div>
  </div>

  <script>
    const sounds = [
      { id: 'rain', name: 'Rain', icon: '🌧️', freq: 200, type: 'noise' },
      { id: 'fire', name: 'Fire', icon: '🔥', freq: 150, type: 'noise' },
      { id: 'wind', name: 'Wind', icon: '💨', freq: 180, type: 'noise' },
      { id: 'waves', name: 'Ocean', icon: '🌊', freq: 120, type: 'noise' },
      { id: 'birds', name: 'Birds', icon: '🐦', freq: 800, type: 'chirp' },
      { id: 'cafe', name: 'Cafe', icon: '☕', freq: 300, type: 'babble' },
      { id: 'white', name: 'White Noise', icon: '📻', freq: 1000, type: 'white' },
      { id: 'pink', name: 'Pink Noise', icon: '🎵', freq: 500, type: 'pink' }
    ];

    let audioCtx = null;
    let masterGain = null;
    const activeSounds = new Map();
    let masterVolume = 0.7;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.connect(audioCtx.destination);
      masterGain.gain.value = masterVolume;
    }

    function createNoiseBuffer(type = 'white') {
      const bufferSize = audioCtx.sampleRate * 2;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      if (type === 'white') {
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
      } else if (type === 'pink') {
        let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
        for (let i = 0; i < bufferSize; i++) {
          const white = Math.random() * 2 - 1;
          b0 = 0.99886 * b0 + white * 0.0555179;
          b1 = 0.99332 * b1 + white * 0.0750759;
          b2 = 0.96900 * b2 + white * 0.1538520;
          b3 = 0.86650 * b3 + white * 0.3104856;
          b4 = 0.55000 * b4 + white * 0.5329522;
          b5 = -0.7616 * b5 - white * 0.0168980;
          data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
          b6 = white * 0.115926;
        }
      } else if (type === 'brown') {
        let lastOut = 0;
        for (let i = 0; i < bufferSize; i++) {
          const white = Math.random() * 2 - 1;
          data[i] = (lastOut + (0.02 * white)) / 1.02;
          lastOut = data[i];
          data[i] *= 3.5;
        }
      }
      return buffer;
    }

    function playSound(soundId, volume = 0.5) {
      initAudio();
      
      if (activeSounds.has(soundId)) {
        activeSounds.get(soundId).gain.gain.value = volume;
        return;
      }

      const sound = sounds.find(s => s.id === soundId);
      if (!sound) return;

      let source;
      
      if (sound.type === 'white' || sound.type === 'pink') {
        source = audioCtx.createBufferSource();
        source.buffer = createNoiseBuffer(sound.type);
        source.loop = true;
      } else {
        // Generate procedural sound
        const osc = audioCtx.createOscillator();
        const noise = audioCtx.createBufferSource();
        noise.buffer = createNoiseBuffer('white');
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = sound.freq;
        
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.3;
        
        noise.connect(filter);
        filter.connect(noiseGain);
        
        source = noise;
      }

      const gain = audioCtx.createGain();
      gain.gain.value = volume;
      
      source.connect(gain);
      gain.connect(masterGain);
      source.start();

      activeSounds.set(soundId, { source, gain });
      updateNowPlaying();
    }

    function stopSound(soundId) {
      if (activeSounds.has(soundId)) {
        const { source, gain } = activeSounds.get(soundId);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        setTimeout(() => {
          source.stop();
          activeSounds.delete(soundId);
          updateNowPlaying();
        }, 350);
      }
    }

    function stopAll() {
      for (const soundId of [...activeSounds.keys()]) {
        stopSound(soundId);
      }
      document.querySelectorAll('.sound-card').forEach(card => {
        card.classList.remove('active');
        card.querySelector('input').value = 0;
      });
    }

    function updateNowPlaying() {
      const active = [...activeSounds.keys()];
      const display = document.getElementById('nowPlaying');
      if (active.length === 0) {
        display.textContent = '';
      } else {
        const names = active.map(id => sounds.find(s => s.id === id).name).join(' + ');
        display.textContent = `Playing: ${names}`;
      }
    }

    function setMasterVolume(vol) {
      masterVolume = vol;
      if (masterGain) {
        masterGain.gain.value = vol;
      }
      document.getElementById('volumeDisplay').textContent = `Master: ${Math.round(vol * 100)}%`;
      localStorage.setItem('focusSounds_master', vol);
    }

    function saveMix() {
      const mix = {};
      for (const [id, { gain }] of activeSounds) {
        mix[id] = gain.gain.value;
      }
      
      if (Object.keys(mix).length === 0) {
        alert('Turn on some sounds first!');
        return;
      }

      const name = prompt('Name this mix:', 'My Focus Mix');
      if (!name) return;

      const mixes = JSON.parse(localStorage.getItem('focusSounds_mixes') || '[]');
      mixes.push({ name, mix });
      localStorage.setItem('focusSounds_mixes', JSON.stringify(mixes));
      renderMixes();
    }

    function loadMix(mix) {
      stopAll();
      setTimeout(() => {
        for (const [id, vol] of Object.entries(mix)) {
          playSound(id, vol);
          const card = document.querySelector(`[data-sound="${id}"]`);
          if (card) {
            card.classList.add('active');
            card.querySelector('input').value = vol * 100;
          }
        }
      }, 400);
    }

    function deleteMix(index) {
      const mixes = JSON.parse(localStorage.getItem('focusSounds_mixes') || '[]');
      mixes.splice(index, 1);
      localStorage.setItem('focusSounds_mixes', JSON.stringify(mixes));
      renderMixes();
    }

    function renderMixes() {
      const mixes = JSON.parse(localStorage.getItem('focusSounds_mixes') || '[]');
      const list = document.getElementById('mixList');
      
      if (mixes.length === 0) {
        list.innerHTML = '<span style="color: var(--text-dim); font-size: 0.85rem;">No saved mixes yet</span>';
        return;
      }

      list.innerHTML = mixes.map((m, i) => `
        <span class="mix-tag" onclick="loadMix(${JSON.stringify(m.mix).replace(/"/g, '&quot;')})">
          ${m.name}
          <span class="delete" onclick="event.stopPropagation(); deleteMix(${i})">×</span>
        </span>
      `).join('');
    }

    function renderSounds() {
      const grid = document.getElementById('soundGrid');
      grid.innerHTML = sounds.map(sound => `
        <div class="sound-card" data-sound="${sound.id}" onclick="toggleSound('${sound.id}')">
          <div class="icon">${sound.icon}</div>
          <div class="name">${sound.name}</div>
          <div class="slider-container">
            <input type="range" min="0" max="100" value="0" 
              onchange="setVolume('${sound.id}', this.value)"
              onclick="event.stopPropagation()">
          </div>
        </div>
      `).join('');
    }

    function toggleSound(id) {
      const card = document.querySelector(`[data-sound="${id}"]`);
      const input = card.querySelector('input');
      
      if (activeSounds.has(id)) {
        stopSound(id);
        card.classList.remove('active');
        input.value = 0;
      } else {
        playSound(id, input.value / 100 || 0.5);
        card.classList.add('active');
        if (input.value == 0) input.value = 50;
      }
    }

    function setVolume(id, val) {
      const vol = val / 100;
      const card = document.querySelector(`[data-sound="${id}"]`);
      
      if (vol > 0 && !activeSounds.has(id)) {
        playSound(id, vol);
        card.classList.add('active');
      } else if (vol === 0 && activeSounds.has(id)) {
        stopSound(id);
        card.classList.remove('active');
      } else if (activeSounds.has(id)) {
        activeSounds.get(id).gain.gain.value = vol;
      }
    }

    // Initialize
    renderSounds();
    renderMixes();

    // Load saved master volume
    const savedMaster = localStorage.getItem('focusSounds_master');
    if (savedMaster) {
      setMasterVolume(parseFloat(savedMaster));
    }

    // Master volume slider
    let volTimeout;
    document.getElementById('volumeDisplay').addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'range';
      input.min = 0;
      input.max = 100;
      input.value = masterVolume * 100;
      input.style.cssText = 'position:absolute; opacity:0; width:100%; height:100%;';
      input.oninput = (e) => setMasterVolume(e.target.value / 100);
      document.getElementById('volumeDisplay').appendChild(input);
      input.click();
      setTimeout(() => input.remove(), 3000);
    });

    document.getElementById('stopAll').onclick = stopAll;
    document.getElementById('saveMix').onclick = saveMix;

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      
      const keyMap = { '1': 0, '2': 1, '3': 2, '4': 3, '5': 4, '6': 5, '7': 6, '8': 7 };
      if (keyMap[e.key] !== undefined) {
        toggleSound(sounds[keyMap[e.key]].id);
      } else if (e.key === 'Escape') {
        stopAll();
      } else if (e.key === 's' && e.ctrlKey) {
        e.preventDefault();
        saveMix();
      }
    });
  </script>
</body>
</html>
