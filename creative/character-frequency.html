<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Frequency Analyzer — Shadow's Garden</title>
<meta name="description" content="Analyze text to see character and letter frequency distributions visually.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .analyzer-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-top: 1.5rem;
  }
  @media (max-width: 800px) {
    .analyzer-container { grid-template-columns: 1fr; }
  }
  .input-section, .output-section {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  textarea {
    width: 100%;
    height: 200px;
    resize: vertical;
    font-family: monospace;
  }
  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .bar-label {
    width: 30px;
    font-family: monospace;
    font-weight: 600;
    text-align: right;
  }
  .bar-track {
    flex: 1;
    height: 24px;
    background: var(--bg-tertiary);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 8px;
    min-width: 30px;
  }
  .bar-fill span {
    font-size: 0.75rem;
    color: var(--bg);
    font-weight: 600;
  }
  .stats-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .stat-item {
    text-align: center;
  }
  .stat-value {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--accent);
  }
  .stat-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
  }
  .tab-buttons {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .tab-buttons button {
    padding: 0.5rem 1rem;
  }
  .tab-buttons button.active {
    background: var(--accent);
    color: var(--bg);
  }
  .hidden { display: none; }
  .hero {
    text-align: center;
    padding: 2rem 0;
  }
  .hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .hero p { color: var(--text-secondary); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="hero">
    <h1>Character Frequency Analyzer</h1>
    <p>See what's really in your text</p>
  </div>

  <div class="analyzer-container">
    <div class="input-section">
      <h3 style="margin-top:0;margin-bottom:1rem;">Paste Your Text</h3>
      <textarea id="input-text" placeholder="Paste any text here to analyze..." oninput="analyze()"></textarea>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-value" id="stat-chars">0</div>
          <div class="stat-label">Characters</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-letters">0</div>
          <div class="stat-label">Letters</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-digits">0</div>
          <div class="stat-label">Digits</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-spaces">0</div>
          <div class="stat-label">Spaces</div>
        </div>
      </div>
    </div>

    <div class="output-section">
      <div class="tab-buttons">
        <button class="active" onclick="switchTab('letters')" id="tab-letters">Letters</button>
        <button onclick="switchTab('digits')" id="tab-digits">Digits</button>
        <button onclick="switchTab('all')" id="tab-all">All Chars</button>
      </div>
      <div class="bar-chart" id="chart"></div>
    </div>
  </div>
</div>

<script>
  let currentData = {};
  
  function analyze() {
    const text = document.getElementById('input-text').value;
    const letters = {};
    const digits = {};
    const all = {};
    
    for (const char of text) {
      if (/[a-zA-Z]/.test(char)) {
        const l = char.toLowerCase();
        letters[l] = (letters[l] || 0) + 1;
      }
      if (/[0-9]/.test(char)) {
        digits[char] = (digits[char] || 0) + 1;
      }
      if (char.trim() || char === ' ') {
        const k = char === ' ' ? '␣' : char;
        all[k] = (all[k] || 0) + 1;
      }
    }
    
    currentData = { letters, digits, all };
    
    // Update stats
    document.getElementById('stat-chars').textContent = text.length;
    document.getElementById('stat-letters').textContent = Object.values(letters).reduce((a,b)=>a+b, 0);
    document.getElementById('stat-digits').textContent = Object.values(digits).reduce((a,b)=>a+b, 0);
    document.getElementById('stat-spaces').textContent = (text.match(/ /g) || []).length;
    
    renderChart('letters');
  }
  
  function switchTab(tab) {
    document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    renderChart(tab);
  }
  
  function renderChart(type) {
    const data = currentData[type] || {};
    const sorted = Object.entries(data).sort((a,b) => b[1] - a[1]);
    const max = sorted.length > 0 ? sorted[0][1] : 1;
    
    const chart = document.getElementById('chart');
    if (sorted.length === 0) {
      chart.innerHTML = '<p style="color:var(--text-secondary);text-align:center;">Enter text to see analysis</p>';
      return;
    }
    
    chart.innerHTML = sorted.map(([char, count]) => {
      const pct = (count / max) * 100;
      return `<div class="bar-row">
        <div class="bar-label">${escapeHtml(char)}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%"><span>${count}</span></div>
        </div>
      </div>`;
    }).join('');
  }
  
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  
  // Analyze on load with sample text
  analyze();
</script>
</body>
</html>
