<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Ring — Shadow's Garden</title>
<meta name="description" description="Type how you feel. Watch your mood become a living, breathing color.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; transition: background-color 0.8s ease; }
  .container { text-align: center; max-width: 600px; width: 100%; }
  h1 { font-size: 3rem; margin-bottom: 0.5rem; font-weight: 300; letter-spacing: 0.1em; }
  .subtitle { color: var(--text-muted, #888); margin-bottom: 2rem; font-size: 1rem; }
  textarea { width: 100%; min-height: 150px; padding: 1.5rem; font-size: 1.2rem; border: none; border-radius: 16px; background: rgba(255,255,255,0.1); color: inherit; resize: none; font-family: inherit; transition: all 0.5s ease; }
  textarea:focus { outline: none; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
  textarea::placeholder { color: rgba(255,255,255,0.4); }
  .mood-display { margin-top: 2rem; padding: 1.5rem; border-radius: 12px; background: rgba(0,0,0,0.2); }
  .mood-label { font-size: 0.9rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
  .mood-color { font-size: 2rem; font-weight: bold; }
  .mood-words { font-size: 1rem; color: rgba(255,255,255,0.8); margin-top: 0.5rem; }
  .ring { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 2rem; box-shadow: 0 0 60px currentColor, inset 0 0 30px rgba(255,255,255,0.3); animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.9; } }
  .hint { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 1rem; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <div class="ring" id="ring"></div>
    <h1>Mood Ring</h1>
    <div class="subtitle">Type how you feel. Watch your mood become a living color.</div>
    <textarea id="mood-input" placeholder="How are you feeling right now?"></textarea>
    <div class="mood-display" id="mood-display">
      <div class="mood-label">Your mood</div>
      <div class="mood-color" id="mood-color">—</div>
      <div class="mood-words" id="mood-words">type something...</div>
    </div>
    <div class="hint">the deeper you type, the richer the color</div>
  </div>
  
  <script>
    const moods = {
      happy: { color: '#FFD700', words: ['joyful', 'delighted', 'euphoric', 'blessed'] },
      sad: { color: '#4169E1', words: ['sad', 'grief', 'lonely', 'blue'] },
      angry: { color: '#DC143C', words: ['furious', 'rage', 'irritated', 'annoyed'] },
      calm: { color: '#98FB98', words: ['peaceful', 'serene', 'tranquil', 'relaxed'] },
      anxious: { color: '#FF8C00', words: ['worried', 'nervous', 'uneasy', 'tense'] },
      tired: { color: '#8B4513', words: ['exhausted', 'drained', 'sleepy', 'worn'] },
      excited: { color: '#FF1493', words: ['thrilled', 'pumped', 'electric', 'alive'] },
      confused: { color: '#9370DB', words: ['puzzled', 'lost', 'uncertain', 'bewildered'] },
      loved: { color: '#FF69B4', words: ['cherished', 'warm', 'connected', 'tender'] },
      empty: { color: '#708090', words: ['numb', 'hollow', 'blank', 'distant'] },
    };
    
    const input = document.getElementById('mood-input');
    const body = document.body;
    const ring = document.getElementById('ring');
    const moodColor = document.getElementById('mood-color');
    const moodWords = document.getElementById('mood-words');
    
    function analyzeMood(text) {
      const t = text.toLowerCase();
      let scores = {};
      
      for (const [mood, data] of Object.entries(moods)) {
        scores[mood] = 0;
        data.words.forEach(word => {
          if (t.includes(word)) scores[mood] += 3;
        });
      }
      
      // Simple keyword matching
      const keywords = {
        happy: ['happy', 'good', 'great', 'awesome', 'wonderful', 'amazing', 'love', 'excited', 'fun', 'joy'],
        sad: ['sad', 'bad', 'terrible', 'awful', 'down', 'depressed', 'cry', 'hurt', 'pain'],
        angry: ['angry', 'mad', 'hate', 'furious', 'rage', 'annoyed', 'frustrated', 'irritated'],
        calm: ['calm', 'peaceful', 'relaxed', 'quiet', 'serene', 'tranquil', 'fine', 'okay', 'alright'],
        anxious: ['anxious', 'worried', 'nervous', 'scared', 'afraid', 'fear', 'panic', 'stress', 'tense'],
        tired: ['tired', 'exhausted', 'sleepy', 'drained', 'worn', 'fatigue', 'burnout'],
        excited: ['excited', 'pumped', 'thrilled', 'electric', 'energy', 'buzz'],
        confused: ['confused', 'puzzled', 'lost', 'uncertain', 'weird', 'strange', 'don\'t know'],
        loved: ['loved', 'cherished', 'warm', 'connected', 'close', 'miss'],
        empty: ['empty', 'numb', 'hollow', 'blank', 'nothing', 'void', 'disconnected']
      };
      
      for (const [mood, words] of Object.entries(keywords)) {
        words.forEach(word => {
          if (t.includes(word)) scores[mood] += 2;
        });
      }
      
      // Length adds depth
      if (text.length > 50) scores[Object.keys(scores)[0]] = (scores[Object.keys(scores)[0]] || 0) + 1;
      if (text.length > 100) Object.keys(scores).forEach(k => scores[k] += 0.5);
      
      let best = 'empty';
      let max = 0;
      for (const [mood, score] of Object.entries(scores)) {
        if (score > max) { max = score; best = mood; }
      }
      
      return moods[best] || moods.empty;
    }
    
    function interpolateColor(c1, c2, factor) {
      const hex = (c) => parseInt(c.slice(1), 16);
      const r1 = (hex(c1) >> 16) & 255, g1 = (hex(c1) >> 8) & 255, b1 = hex(c1) & 255;
      const r2 = (hex(c2) >> 16) & 255, g2 = (hex(c2) >> 8) & 255, b2 = hex(c2) & 255;
      const r = Math.round(r1 + (r2 - r1) * factor);
      const g = Math.round(g1 + (g2 - g1) * factor);
      const b = Math.round(b1 + (b2 - b1) * factor);
      return `rgb(${r},${g},${b})`;
    }
    
    let currentMood = moods.empty;
    let targetColor = moods.empty.color;
    
    input.addEventListener('input', () => {
      const text = input.value.trim();
      if (!text) {
        targetColor = moods.empty.color;
        currentMood = moods.empty;
      } else {
        const mood = analyzeMood(text);
        targetColor = mood.color;
        currentMood = mood;
      }
      
      body.style.backgroundColor = targetColor;
      ring.style.color = targetColor;
      moodColor.textContent = targetColor;
      moodColor.style.color = targetColor;
      moodWords.textContent = currentMood.words.join(' · ');
    });
    
    // Start with empty
    body.style.backgroundColor = moods.empty.color;
    ring.style.color = moods.empty.color;
  </script>
</body>
</html>
