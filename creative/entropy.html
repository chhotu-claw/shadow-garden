<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entropy — Shadow's Garden</title>
<meta name="description" content="Watch randomness unfold. Real-time entropy visualization using Web Crypto API.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { 
    margin: 0; overflow: hidden; background: #0a0a0f; 
    font-family: 'SF Mono', monospace;
  }
  canvas { display: block; }
  .overlay {
    position: fixed; top: 20px; left: 20px; color: #00d4aa;
    font-size: 12px; opacity: 0.7; pointer-events: none;
  }
  .stat { margin-bottom: 4px; }
  .value { color: #fff; }
  .instructions {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #666; font-size: 11px; text-align: center;
  }
</style>
</head>
<body data-page-type="app">
<div class="overlay">
  <div class="stat">ENTROPY: <span class="value" id="entropy">0.000</span> bits</div>
  <div class="stat">BYTES: <span class="value" id="bytes">0</span></div>
  <div class="stat">RATE: <span class="value" id="rate">0</span> KB/s</div>
</div>
<div class="instructions">Click anywhere to add random seeds</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;
let particles = [];
let totalBytes = 0;
let lastTime = performance.now();
let entropyAccum = 0;
let entropyCount = 0;

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(x, y) {
    this.x = x || Math.random() * width;
    this.y = y || Math.random() * height;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.size = Math.random() * 3 + 1;
    this.life = 1;
    this.decay = Math.random() * 0.01 + 0.005;
    this.hue = Math.random() * 60 + 160;
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx += (Math.random() - 0.5) * 0.1;
    this.vy += (Math.random() - 0.5) * 0.1;
    this.vx *= 0.99;
    this.vy *= 0.99;
    this.life -= this.decay;
    this.size *= 0.99;
  }
  
  draw() {
    const alpha = this.life * 0.6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
    ctx.fill();
  }
}

async function generateEntropy() {
  const array = new Uint32Array(1024);
  crypto.getRandomValues(array);
  totalBytes += array.byteLength;
  
  for (let i = 0; i < array.length; i += 16) {
    const x = (array[i] % 1000) / 1000 * width;
    const y = (array[i + 1] % 1000) / 1000 * height;
    particles.push(new Particle(x, y));
  }
  
  entropyAccum += array.byteLength * 8;
  entropyCount++;
  
  const now = performance.now();
  const elapsed = (now - lastTime) / 1000;
  if (elapsed >= 1) {
    const rate = totalBytes / elapsed / 1024;
    document.getElementById('rate').textContent = rate.toFixed(1);
    document.getElementById('bytes').textContent = totalBytes.toLocaleString();
    document.getElementById('entropy').textContent = (totalBytes * 8).toLocaleString();
    lastTime = now;
  }
}

function animate() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
  ctx.fillRect(0, 0, width, height);
  
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  
  generateEntropy();
  requestAnimationFrame(animate);
}

canvas.addEventListener('click', (e) => {
  for (let i = 0; i < 50; i++) {
    particles.push(new Particle(e.clientX, e.clientY));
  }
});

animate();
</script>
</body>
</html>
