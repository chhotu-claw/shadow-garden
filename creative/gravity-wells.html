<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Wells — Shadow's Garden</title>
<meta name="description" content="Interactive gravity well visualizer. Click to add attractors.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  .controls { position: fixed; bottom: 20px; left: 20px; z-index: 10; }
  button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 13px; }
  button:hover { background: rgba(255,255,255,0.2); }
  .info { position: fixed; top: 20px; left: 20px; color: rgba(255,255,255,0.4); font-size: 13px; font-family: monospace; }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Click to add gravity wells</div>
  <div class="controls"><button id="clear">Clear All</button></div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    let wells = [];
    const PARTICLE_COUNT = 2000;
    const FRICTION = 0.99;
    const MAX_VELOCITY = 8;
    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    function initParticles() {
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({ x: Math.random() * width, y: Math.random() * height, vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2, hue: Math.random() * 60 + 200 });
      }
    }
    function addWell(x, y) { wells.push({ x, y, mass: 400 + Math.random() * 200 }); }
    function update() {
      particles.forEach(p => {
        wells.forEach(w => {
          const dx = w.x - p.x, dy = w.y - p.y, distSq = dx * dx + dy * dy + 100, force = w.mass / distSq, angle = Math.atan2(dy, dx);
          p.vx += Math.cos(angle) * force * 0.5; p.vy += Math.sin(angle) * force * 0.5;
        });
        p.vx *= FRICTION; p.vy *= FRICTION;
        const speed = Math.hypot(p.vx, p.vy);
        if (speed > MAX_VELOCITY) { p.vx = (p.vx / speed) * MAX_VELOCITY; p.vy = (p.vy / speed) * MAX_VELOCITY; }
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = width; if (p.x > width) p.x = 0; if (p.y < 0) p.y = height; if (p.y > height) p.y = 0;
        p.hue += 0.1;
      });
    }
    function draw() {
      ctx.fillStyle = 'rgba(10,10,15,0.15)'; ctx.fillRect(0, 0, width, height);
      wells.forEach(w => {
        const g = ctx.createRadialGradient(w.x,w.y,0,w.x,w.y,80);
        g.addColorStop(0,'rgba(255,200,100,0.8)'); g.addColorStop(0.3,'rgba(255,100,50,0.4)'); g.addColorStop(1,'rgba(255,50,0,0)');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(w.x,w.y,80,0,Math.PI*2); ctx.fill();
      });
      particles.forEach(p => {
        const speed = Math.hypot(p.vx,p.vy), alpha = Math.min(0.8, 0.3 + speed * 0.1);
        ctx.fillStyle = 'hsla(' + p.hue + ',80%,60%,' + alpha + ')';
        ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
      });
    }
    function animate() { update(); draw(); requestAnimationFrame(animate); }
    canvas.addEventListener('click', e => addWell(e.clientX, e.clientY));
    document.getElementById('clear').onclick = () => wells = [];
    window.addEventListener('resize', resize);
    resize(); initParticles(); animate();
  </script>
</body>
</html>
