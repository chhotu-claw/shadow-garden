<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Flow — Shadow's Garden</title>
<meta name="description" content="A generative art piece where particles flow and respond to your cursor. Click to spawn explosions.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; cursor: crosshair; }
  canvas { display: block; }
  .info { position: fixed; bottom: 1rem; left: 1rem; color: rgba(255,255,255,0.4); font-family: 'Fira Code', monospace; font-size: 12px; pointer-events: none; }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>
<div class="info">click to spawn • move to attract • watch particles flow</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w, h;
let particles = [];
const maxParticles = 800;
let mouseX = 0, mouseY = 0;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(x, y, vx, vy, hue) {
    this.x = x ?? Math.random() * w;
    this.y = y ?? Math.random() * h;
    this.vx = vx ?? (Math.random() - 0.5) * 2;
    this.vy = vy ?? (Math.random() - 0.5) * 2;
    this.hue = hue ?? Math.random() * 60 + 180;
    this.life = 1;
    this.decay = 0.002 + Math.random() * 0.003;
    this.size = 1 + Math.random() * 3;
  }
  
  update() {
    let dx = mouseX - this.x;
    let dy = mouseY - this.y;
    let dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200 && dist > 0) {
      let force = (200 - dist) / 200 * 0.3;
      this.vx += (dx / dist) * force;
      this.vy += (dy / dist) * force;
    }
    
    this.vx *= 0.99;
    this.vy *= 0.99;
    
    this.x += this.vx;
    this.y += this.vy;
    
    if (this.x < 0 || this.x > w) this.vx *= -0.8;
    if (this.y < 0 || this.y > h) this.vy *= -0.8;
    this.x = Math.max(0, Math.min(w, this.x));
    this.y = Math.max(0, Math.min(h, this.y));
    
    this.life -= this.decay;
  }
  
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.life})`;
    ctx.fill();
  }
}

for (let i = 0; i < 100; i++) {
  particles.push(new Particle());
}

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('click', e => {
  const count = 30 + Math.random() * 20;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push(new Particle(
      e.clientX,
      e.clientY,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      Math.random() * 100 + 160
    ));
  }
});

function animate() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, w, h);
  
  particles = particles.filter(p => p.life > 0);
  
  if (particles.length < maxParticles) {
    particles.push(new Particle());
  }
  
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
