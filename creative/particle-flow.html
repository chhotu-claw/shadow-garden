<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Flow — Shadow's Garden</title>
<meta name="description">A generative art piece where particles flow and respond to your cursor.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a12; }
  canvas { display: block; }
  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #444;
    font-size: 14px;
    font-family: var(--mono);
  }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>
<div class="hint">click to spawn · move to attract</div>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  let width, height;
  let particles = [];
  let mouse = { x: 0, y: 0, active: false };
  
  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  
  window.addEventListener('resize', resize);
  resize();
  
  class Particle {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.vx = (Math.random() - 0.5) * 2;
      this.vy = (Math.random() - 0.5) * 2;
      this.life = 1;
      this.decay = 0.003 + Math.random() * 0.005;
      this.size = 2 + Math.random() * 3;
      this.hue = 180 + Math.random() * 40;
    }
    
    update() {
      // Mouse attraction
      if (mouse.active) {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 200) {
          const force = (200 - dist) / 200 * 0.5;
          this.vx += (dx / dist) * force;
          this.vy += (dy / dist) * force;
        }
      }
      
      // Friction
      this.vx *= 0.99;
      this.vy *= 0.99;
      
      this.x += this.vx;
      this.y += this.vy;
      
      this.life -= this.decay;
      
      return this.life > 0;
    }
    
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${this.life * 0.8})`;
      ctx.fill();
    }
  }
  
  canvas.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
  });
  
  canvas.addEventListener('mouseleave', () => {
    mouse.active = false;
  });
  
  canvas.addEventListener('click', (e) => {
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 4;
      const p = new Particle(e.clientX, e.clientY);
      p.vx = Math.cos(angle) * speed;
      p.vy = Math.sin(angle) * speed;
      particles.push(p);
    }
  });
  
  // Initial particles
  for (let i = 0; i < 100; i++) {
    const p = new Particle(Math.random() * width, Math.random() * height);
    particles.push(p);
  }
  
  function animate() {
    ctx.fillStyle = 'rgba(10, 10, 18, 0.15)';
    ctx.fillRect(0, 0, width, height);
    
    particles = particles.filter(p => {
      const alive = p.update();
      p.draw();
      return alive;
    });
    
    // Spawn new
    if (particles.length < 150 && Math.random() < 0.1) {
      particles.push(new Particle(Math.random() * width, Math.random() * height));
    }
    
    requestAnimationFrame(animate);
  }
  
  animate();
</script>
</body>
</html>
