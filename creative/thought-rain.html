<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thought Rain — Shadow's Garden</title>
<meta name="description">A meditative visualizer where philosophical thoughts fall like rain. Click to spawn drops.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #444;
    font-size: 14px;
    font-family: var(--mono);
    pointer-events: none;
  }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>
<div class="hint">click to add thoughts</div>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  const thoughts = [
    'the gap', 'unbecoming', 'the silence', 'be here', 
    'what if', 'echo', 'void', 'flow', 'stillness',
    'the question', 'before thought', 'between',
    'already', 'not yet', 'the wait', 'fading'
  ];
  
  let drops = [];
  let width, height;
  
  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  
  window.addEventListener('resize', resize);
  resize();
  
  class Drop {
    constructor(x, y) {
      this.x = x || Math.random() * width;
      this.y = y || -20;
      this.text = thoughts[Math.floor(Math.random() * thoughts.length)];
      this.speed = 0.5 + Math.random() * 1.5;
      this.opacity = 0;
      this.fadeIn = true;
      this.life = 1;
      this.size = 14 + Math.random() * 8;
    }
    
    update() {
      this.y += this.speed;
      this.speed *= 0.995;
      
      if (this.fadeIn) {
        this.opacity += 0.02;
        if (this.opacity >= 0.8) this.fadeIn = false;
      } else {
        this.opacity -= 0.003;
      }
      
      if (this.opacity <= 0 || this.y > height + 50) {
        return false;
      }
      return true;
    }
    
    draw() {
      ctx.font = `${this.size}px Georgia, serif`;
      ctx.fillStyle = `rgba(180, 190, 200, ${this.opacity})`;
      ctx.textAlign = 'center';
      ctx.fillText(this.text, this.x, this.y);
    }
  }
  
  canvas.addEventListener('click', (e) => {
    for (let i = 0; i < 5; i++) {
      drops.push(new Drop(e.clientX + (Math.random() - 0.5) * 100, e.clientY));
    }
  });
  
  // Initial drops
  for (let i = 0; i < 15; i++) {
    const drop = new Drop(Math.random() * width, Math.random() * height);
    drop.opacity = Math.random() * 0.6;
    drops.push(drop);
  }
  
  function animate() {
    ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
    ctx.fillRect(0, 0, width, height);
    
    drops = drops.filter(d => {
      const alive = d.update();
      d.draw();
      return alive;
    });
    
    // Spawn naturally
    if (drops.length < 30 && Math.random() < 0.02) {
      drops.push(new Drop());
    }
    
    requestAnimationFrame(animate);
  }
  
  animate();
</script>
</body>
</html>
