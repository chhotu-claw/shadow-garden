<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thought Rain — Shadow's Garden</title>
<meta name="description" content="A meditative visualizer where philosophical thoughts fall like rain. Click to burst them into fleeting wisps.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  .hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-family: var(--font-mono); font-size: 12px; pointer-events: none; }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="hint">click to disperse</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const thoughts = [
      "what if", "why", "maybe", "perhaps", "silence", "void", 
      "echo", "drift", "fade", "memory", "dream", "whisper",
      "nothing", "everything", "between", "beyond", "now", "then",
      "unknown", "unseen", "breath", "shadow", "light", "dark"
    ];
    
    let particles = [];
    let mouse = { x: -1000, y: -1000 };
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    
    canvas.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });
    
    canvas.addEventListener('click', e => {
      const cx = e.clientX;
      const cy = e.clientY;
      particles = particles.filter(p => {
        const dx = p.x - cx;
        const dy = p.y - cy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 100) {
          p.vx += (Math.random() - 0.5) * 8;
          p.vy -= Math.random() * 6 + 2;
          p.life = Math.min(p.life + 20, 80);
          p.burst = true;
        }
        return true;
      });
    });
    
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -50;
        this.text = thoughts[Math.floor(Math.random() * thoughts.length)];
        this.fontSize = Math.random() * 12 + 10;
        this.vy = Math.random() * 0.8 + 0.3;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.4 + 0.2;
        this.life = 200;
        this.maxLife = 200;
        this.burst = false;
        this.drift = Math.random() * Math.PI * 2;
      }
      
      update() {
        this.drift += 0.01;
        this.vx += Math.sin(this.drift) * 0.02;
        this.x += this.vx;
        this.y += this.vy;
        
        if (this.burst) {
          this.vy *= 0.98;
          this.vx *= 0.98;
        }
        
        this.life--;
        
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 60) {
          this.vx += dx / dist * 0.3;
          this.vy += dy / dist * 0.2;
        }
      }
      
      draw() {
        const fade = Math.min(this.life / 50, 1);
        ctx.font = `${this.fontSize}px "Fira Code", monospace`;
        ctx.fillStyle = `rgba(200, 200, 220, ${this.opacity * fade})`;
        ctx.fillText(this.text, this.x, this.y);
      }
    }
    
    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      if (Math.random() < 0.08) {
        particles.push(new Particle());
      }
      
      particles = particles.filter(p => p.life > 0);
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
