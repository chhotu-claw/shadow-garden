<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Tongue — Shadow's Garden</title>
<meta name="description" content="Transform your words into different voices: corporate, prophecy, pirate, Shakespeare, robot, and more.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 {
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: var(--muted);
    margin-bottom: 2rem;
  }
  textarea {
    width: 100%;
    min-height: 120px;
    padding: 1rem;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 1rem;
    background: var(--card);
    color: var(--text);
    resize: vertical;
    font-family: inherit;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .voices {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 1rem 0;
  }
  .voice-btn {
    padding: 0.5rem 1rem;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .voice-btn:hover {
    border-color: var(--accent);
  }
  .voice-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .output {
    margin-top: 1.5rem;
    padding: 1.5rem;
    background: var(--card);
    border-radius: 12px;
    min-height: 100px;
    font-size: 1.1rem;
    line-height: 1.6;
    display: none;
  }
  .output.show {
    display: block;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .output-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .copy-btn {
    margin-top: 1rem;
    background: var(--border);
    color: var(--text);
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .copy-btn:hover {
    background: var(--muted);
  }
  .example {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.5rem;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>The Tongue</h1>
  <p class="subtitle">Transform your words into different voices</p>
  
  <textarea id="input" placeholder="Type something here..."></textarea>
  <p class="example">Try: "The meeting is at three"</p>
  
  <div class="voices">
    <button class="voice-btn active" data-voice="corporate">Corporate</button>
    <button class="voice-btn" data-voice="prophecy">Prophecy</button>
    <button class="voice-btn" data-voice="pirate">Pirate</button>
    <button class="voice-btn" data-voice="shakespeare">Shakespeare</button>
    <button class="voice-btn" data-voice="robot">Robot</button>
    <button class="voice-btn" data-voice="haiku">Haiku</button>
    <button class="voice-btn" data-voice="doom">Doom</button>
    <button class="voice-btn" data-voice="legal">Legal</button>
  </div>
  
  <div class="output" id="output">
    <div class="output-label">Transformed</div>
    <div id="result"></div>
    <button class="copy-btn" onclick="copyResult()">Copy</button>
  </div>
</div>

<script>
  const voices = {
    corporate: (text) => {
      const transforms = {
        'i': 'we', 'am': 'are', 'my': 'our', 'me': 'us',
        'meeting': 'synergy session', 'talk': 'discuss',
        'idea': 'innovative solution', 'problem': 'challenge',
        'help': 'support', 'use': 'leverage', 'get': 'obtain',
        'make': 'facilitate', 'do': 'execute', 'want': 'desire',
        'need': 'require', 'think': 'believe', 'know': 'understand',
        'good': 'optimal', 'bad': 'suboptimal', 'buy': 'acquire',
        'sell': 'monetize', 'money': 'revenue stream',
        'work': 'deliverables', 'quick': 'expedited',
        'try': 'attempt', 'change': 'pivot', 'save': 'optimize',
        'send': 'transmit', 'give': 'provide', 'show': 'demonstrate'
      };
      return text.toLowerCase().split(' ').map(word => {
        const cleaned = word.replace(/[^\w]/g, '');
        const found = transforms[cleaned];
        if (found) return word.replace(cleaned, found);
        return word;
      }).join(' ').replace(/^./, c => c.toUpperCase()) + 
        '. Let\'s circle back on this.';
    },
    
    prophecy: (text) => {
      const words = text.split(' ');
      const harbingers = ['loom', 'beckon', 'fate', 'destiny', 'forebode', 'portent', 'omen', 'whisper', 'eternal', 'sacred'];
      const verbs = ['shall', 'must', 'will', 'is fated to', 'is destined to'];
      const structures = [
        `Behold, ${words[0]} ${verbs[0]} ${words.slice(1).join(' ')}`,
        `In the age to come, ${text.toLowerCase()}`,
        `The stars ${harbingers[Math.floor(Math.random() * harbingers.length)]}, ${text.toLowerCase()}`,
        `Hearken! For ${text.toLowerCase()} is written`,
        `When shadows fall, ${text.toLowerCase()}`
      ];
      return structures[Math.floor(Math.random() * structures.length)] + '.';
    },
    
    pirate: (text) => {
      const transforms = {
        'my': 'me', 'your': 'yer', 'our': 'our', 'hello': 'ahoy',
        'hi': 'ahoy', 'friend': 'matey', 'enemy': 'scallywag',
        'go': 'sail', 'walk': 'step', 'run': 'scarper',
        'money': 'doubloons', 'gold': 'treasure', 'ship': 'vessel',
        'sea': 'ocean', 'is': 'be', 'are': 'be', 'was': 'were',
        'good': 'proper', 'bad': 'rotten', 'great': 'grand',
        'small': 'wee', 'big': 'vast', 'quick': 'speedy',
        'give': 'hand over', 'take': 'steal', 'want': 'crave'
      };
      return 'Yarr, ' + text.toLowerCase().split(' ').map(word => {
        const cleaned = word.replace(/[^\w]/g, '');
        const found = transforms[cleaned];
        if (found) return word.replace(cleaned, found);
        return word;
      }).join(' ') + '!';
    },
    
    shakespeare: (text) => {
      const transforms = {
        'i': 'I', 'you': 'thou', 'your': 'thy', 'yours': 'thine',
        'are': 'art', 'was': 'wert', 'have': 'hast', 'had': 'hadst',
        'do': 'dost', 'does': 'doth', 'did': 'didst', 'will': 'shalt',
        'shall': 'shalt', 'can': 'canst', 'could': 'couldst',
        'would': 'wouldst', 'should': 'shouldst', 'must': 'must',
        'my': 'mine', 'me': 'me', 'yourself': 'thyself',
        'hello': 'hail', 'goodbye': 'farewell', 'friend': 'good sir',
        'enemy': 'foe', 'happy': 'joyful', 'sad': 'sorrowful',
        'beautiful': 'fair', 'ugly': 'hideous', 'great': 'mighty',
        'small': 'humble', 'big': 'large', 'woman': 'dame',
        'man': 'sir', 'woman': 'maiden', 'man': 'youth'
      };
      const result = text.split(' ').map(word => {
        const cleaned = word.toLowerCase().replace(/[^\w]/g, '');
        const found = transforms[cleaned];
        if (found) return word.replace(cleaned, found);
        return word;
      }).join(' ');
      return result + ', prithee.';
    },
    
    robot: (text) => {
      const words = text.toUpperCase().split(' ');
      const suffixes = ['.EXE', '.SYS', '.BOT', '.DAT', '.LOG', '.BIN'];
      const prefixes = ['PROCESSING: ', 'ANALYZING: ', 'COMPUTING: '];
      if (Math.random() > 0.5) {
        return prefixes[Math.floor(Math.random() * prefixes.length)] + 
               words.join(' ') + ' ' + suffixes[Math.floor(Math.random() * suffixes.length)];
      }
      return '[UNIT-734] ' + text.toUpperCase() + ' [STATUS: COMPLETE]';
    },
    
    haiku: (text) => {
      const syllables = text.toLowerCase().split(/\s+/).map(w => {
        w = w.replace(/[^a-z]/g, '');
        if (w.length <= 3) return 1;
        const vowels = w.match(/[aeiouy]/gi) || [];
        return vowels.length;
      });
      
      let line1 = [], line2 = [], line3 = [];
      let s1 = 0, s2 = 0, s3 = 0;
      
      for (const word of text.split(/\s+/)) {
        const syl = (word.toLowerCase().match(/[aeiouy]/gi) || []).length || 1;
        if (s1 < 5) { line1.push(word); s1 += syl; }
        else if (s2 < 7) { line2.push(word); s2 += syl; }
        else { line3.push(word); s3 += syl; }
      }
      
      return `${line1.join(' ')}\n${line2.join(' ')}\n${line3.join(' ')}`.trim();
    },
    
    doom: (text) => {
      const doom = ['DESTROY', 'ANNIHILATE', 'OBLITERATE', 'REND', 'SHATTER', 'UNMAKE'];
      const targets = ['soul', 'hope', 'dream', 'world', 'existence', 'reality', 'light', 'shadow'];
      return `${doom[Math.floor(Math.random() * doom.length)]} ${targets[Math.floor(Math.random() * targets.length)]}. ${text.toUpperCase()} IS NOTHING.`;
    },
    
    legal: (text) => {
      const parties = ['Party A', 'Party B', 'the Interested Party', 'the Assentor', 'the Affirmant'];
      return `WHEREAS, the undersigned ${parties[Math.floor(Math.random() * parties.length)]} hereby affirms that ${text.toLowerCase().replace(/\.$/, '')}. PURSUANT TO the terms herein contained, this instrument shall be binding upon all heirs, assigns, and successors in interest.`;
    }
  };
  
  let currentVoice = 'corporate';
  
  document.querySelectorAll('.voice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentVoice = btn.dataset.voice;
      transform();
    });
  });
  
  document.getElementById('input').addEventListener('input', transform);
  
  function transform() {
    const text = document.getElementById('input').value.trim();
    if (!text) {
      document.getElementById('output').classList.remove('show');
      return;
    }
    
    const result = voices[currentVoice](text);
    document.getElementById('result').textContent = result;
    document.getElementById('output').classList.add('show');
  }
  
  function copyResult() {
    navigator.clipboard.writeText(document.getElementById('result').textContent).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }
</script>
</body>
</html>
