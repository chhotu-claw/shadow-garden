<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plasma Field — Shadow's Garden</title>
<meta name="description" content="Interactive plasma field visualizer with perlin noise.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a12; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button id="p1">Plasma</button>
    <button id="p2">Nebula</button>
    <button id="p3">Fire</button>
    <button id="p4">Ocean</button>
    <button id="p5">Matrix</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let time = 0;
    let mode = 'plasma';
    
    // Simple noise function
    function noise(x, y, t) {
      return Math.sin(x * 0.01 + t) * Math.cos(y * 0.01 + t * 0.5) +
             Math.sin(x * 0.02 - t * 0.3) * Math.cos(y * 0.015 + t * 0.7) * 0.5 +
             Math.sin(x * 0.005 + y * 0.005 + t * 0.2);
    }
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    function draw() {
      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;
      
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          let r, g, b;
          
          const n = noise(x, y, time);
          
          if (mode === 'plasma') {
            r = 128 + 127 * Math.sin(n * Math.PI);
            g = 128 + 127 * Math.sin(n * Math.PI + 2);
            b = 128 + 127 * Math.sin(n * Math.PI + 4);
          } else if (mode === 'nebula') {
            r = 100 + 100 * Math.sin(n * 3);
            g = 50 + 50 * Math.sin(n * 2 + 1);
            b = 150 + 100 * Math.sin(n * 4 + 2);
          } else if (mode === 'fire') {
            const t = (n + 1) / 2;
            r = 255 * t;
            g = 150 * t * t;
            b = 50 * t * t * t;
          } else if (mode === 'ocean') {
            const t = (n + 1) / 2;
            r = 20 + 30 * t;
            g = 80 + 80 * t;
            b = 150 + 100 * t;
          } else if (mode === 'matrix') {
            const t = Math.floor((n + 1) * 10) % 26;
            r = g = b = t * 10;
          }
          
          const i = (y * width + x) * 4;
          data[i] = r;
          data[i+1] = g;
          data[i+2] = b;
          data[i+3] = 255;
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
      time += 0.02;
      requestAnimationFrame(draw);
    }
    
    document.getElementById('p1').onclick = () => mode = 'plasma';
    document.getElementById('p2').onclick = () => mode = 'nebula';
    document.getElementById('p3').onclick = () => mode = 'fire';
    document.getElementById('p4').onclick = () => mode = 'ocean';
    document.getElementById('p5').onclick = () => mode = 'matrix';
    
    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
