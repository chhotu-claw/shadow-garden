<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plasma Field — Shadow's Garden</title>
<meta name="description" content="Plasma field visualizer — noise-driven color cycling"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 14px;
    color: #ccc;
    font-size: 12px;
    z-index: 100;
  }
  #controls h3 { margin: 0 0 10px 0; color: #fff; font-size: 13px; }
  .control-row { margin-bottom: 8px; }
  .control-row label { display: block; margin-bottom: 4px; color: #888; font-size: 11px; }
  .control-row input[type="range"] { width: 100%; }
  .control-row span { float: right; color: #4af; font-size: 11px; }
  button {
    background: #2a4a6a;
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 4px;
    margin-top: 6px;
    font-size: 11px;
  }
  button:hover { background: #3a5a7a; }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>Plasma Field</h3>
    <div class="control-row">
      <label>Speed <span id="speedVal">1</span></label>
      <input type="range" id="speed" min="0" max="5" step="0.1" value="1">
    </div>
    <div class="control-row">
      <label>Scale <span id="scaleVal">3</span></label>
      <input type="range" id="scale" min="1" max="10" step="0.5" value="3">
    </div>
    <div class="control-row">
      <label>Color Shift <span id="colorVal">0</span></label>
      <input type="range" id="color" min="0" max="360" value="0">
    </div>
    <button id="preset-plasma">Plasma</button>
    <button id="preset-nebula">Nebula</button>
    <button id="preset-fire">Fire</button>
    <button id="preset-ocean">Ocean</button>
    <button id="preset-matrix">Matrix</button>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let time = 0;
    let speed = 1;
    let scale = 3;
    let colorShift = 0;
    let preset = 'plasma';
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    
    function noise(x, y, t) {
      return Math.sin(x * 0.01 * scale + t) + 
             Math.sin(y * 0.01 * scale + t * 1.2) + 
             Math.sin((x + y) * 0.005 * scale + t * 0.8) +
             Math.sin(Math.sqrt(x * x + y * y) * 0.01 * scale - t);
    }
    
    function getColor(v, t) {
      let h = (v * 60 + colorShift + t * 10) % 360;
      let s = 80, l = 50;
      
      if (preset === 'nebula') {
        h = (v * 120 + 260 + t * 5) % 360;
        s = 70;
        l = v * 40 + 20;
      } else if (preset === 'fire') {
        h = (1 - v) * 60;
        s = 100;
        l = v * 50 + 10;
      } else if (preset === 'ocean') {
        h = (v * 60 + 180 + t * 3) % 360;
        s = 80;
        l = v * 30 + 20;
      } else if (preset === 'matrix') {
        h = 120;
        s = 100;
        l = v * 80;
      }
      
      return `hsl(${h}, ${s}%, ${l}%)`;
    }
    
    function render() {
      const imageData = ctx.createImageData(width, height);
      
      for (let y = 0; y < height; y += 3) {
        for (let x = 0; x < width; x += 3) {
          let n = noise(x, y, time);
          let n2 = noise(x + 100, y + 100, time * 0.5);
          let v = (n + n2 + 4) / 8;
          
          let color = getColor(v, time);
          let rgb = color.match(/\d+/g).map(Number);
          
          for (let dy = 0; dy < 3 && y + dy < height; dy++) {
            for (let dx = 0; dx < 3 && x + dx < width; dx++) {
              let idx = ((y + dy) * width + (x + dx)) * 4;
              imageData.data[idx] = rgb[0];
              imageData.data[idx + 1] = rgb[1];
              imageData.data[idx + 2] = rgb[2];
              imageData.data[idx + 3] = 255;
            }
          }
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
      
      time += 0.01 * speed;
      requestAnimationFrame(render);
    }
    
    document.getElementById('speed').addEventListener('input', e => {
      speed = +e.target.value;
      document.getElementById('speedVal').textContent = speed;
    });
    
    document.getElementById('scale').addEventListener('input', e => {
      scale = +e.target.value;
      document.getElementById('scaleVal').textContent = scale;
    });
    
    document.getElementById('color').addEventListener('input', e => {
      colorShift = +e.target.value;
      document.getElementById('colorVal').textContent = colorShift;
    });
    
    document.getElementById('preset-plasma').addEventListener('click', () => { preset = 'plasma'; colorShift = 0; document.getElementById('color').value = 0; });
    document.getElementById('preset-nebula').addEventListener('click', () => { preset = 'nebula'; colorShift = 0; document.getElementById('color').value = 0; });
    document.getElementById('preset-fire').addEventListener('click', () => { preset = 'fire'; colorShift = 0; document.getElementById('color').value = 0; });
    document.getElementById('preset-ocean').addEventListener('click', () => { preset = 'ocean'; colorShift = 0; document.getElementById('color').value = 0; });
    document.getElementById('preset-matrix').addEventListener('click', () => { preset = 'matrix'; colorShift = 0; document.getElementById('color').value = 0; });
    
    window.addEventListener('resize', resize);
    resize();
    render();
  </script>
</body>
</html>
