<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ephemeral — Shadow's Garden</title>
<meta name="description" content="Shapes spawn, drift, and fade. A meditation on impermanence.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    cursor: crosshair;
  }
  canvas {
    display: block;
  }
  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    pointer-events: none;
    transition: opacity 2s;
  }
  .hint.fade {
    opacity: 0;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="hint" id="hint">move to guide · click to spawn</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');
    
    let width, height;
    let particles = [];
    let mouse = { x: 0, y: 0, vx: 0, vy: 0, active: false };
    let lastMouse = { x: 0, y: 0 };
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    // Fade hint after a few seconds
    setTimeout(() => hint.classList.add('fade'), 4000);
    
    // Particle class
    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.size = Math.random() * 8 + 2;
        this.life = 1;
        this.decay = Math.random() * 0.003 + 0.001;
        this.color = `hsla(${Math.random() * 60 + 180}, 70%, 60%,`;
        this.trail = [];
        this.maxTrail = 20;
      }
      
      update() {
        // Store trail
        this.trail.push({ x: this.x, y: this.y, life: this.life });
        if (this.trail.length > this.maxTrail) this.trail.shift();
        
        // Move
        this.x += this.vx;
        this.y += this.vy;
        
        // Mouse influence
        if (mouse.active) {
          const dx = mouse.x - this.x;
          const dy = mouse.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 150) {
            const force = (150 - dist) / 150;
            this.vx += (dx / dist) * force * 0.5 + mouse.vx * 0.3;
            this.vy += (dy / dist) * force * 0.5 + mouse.vy * 0.3;
          }
        }
        
        // Drag
        this.vx *= 0.99;
        this.vy *= 0.99;
        
        // Decay
        this.life -= this.decay;
        
        // Boundary bounce
        if (this.x < 0 || this.x > width) this.vx *= -0.8;
        if (this.y < 0 || this.y > height) this.vy *= -0.8;
        this.x = Math.max(0, Math.min(width, this.x));
        this.y = Math.max(0, Math.min(height, this.y));
      }
      
      draw() {
        // Draw trail
        for (let i = 0; i < this.trail.length; i++) {
          const t = this.trail[i];
          const alpha = (i / this.trail.length) * this.life * 0.5;
          const size = this.size * (i / this.trail.length) * 0.8;
          ctx.beginPath();
          ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
          ctx.fillStyle = this.color + alpha + ')';
          ctx.fill();
        }
        
        // Draw main particle
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fillStyle = this.color + this.life + ')';
        ctx.fill();
      }
    }
    
    // Spawn particles
    function spawn(x, y, count = 5) {
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y));
      }
    }
    
    // Initial spawn
    for (let i = 0; i < 30; i++) {
      spawn(Math.random() * width, Math.random() * height, 1);
    }
    
    // Mouse events
    canvas.addEventListener('mousemove', (e) => {
      mouse.vx = e.clientX - lastMouse.x;
      mouse.vy = e.clientY - lastMouse.y;
      lastMouse.x = e.clientX;
      lastMouse.y = e.clientY;
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
      
      // Occasional spawn from movement
      if (Math.random() < 0.1) {
        spawn(e.clientX, e.clientY, 1);
      }
    });
    
    canvas.addEventListener('mousedown', (e) => {
      spawn(e.clientX, e.clientY, 15);
    });
    
    canvas.addEventListener('mouseleave', () => {
      mouse.active = false;
    });
    
    // Touch support
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      mouse.vx = touch.clientX - lastMouse.x;
      mouse.vy = touch.clientY - lastMouse.y;
      lastMouse.x = touch.clientX;
      lastMouse.y = touch.clientY;
      mouse.x = touch.clientX;
      mouse.y = touch.clientY;
      mouse.active = true;
    }, { passive: false });
    
    canvas.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      spawn(touch.clientX, touch.clientY, 15);
    });
    
    // Animation loop
    function animate() {
      // Fade background for trails
      ctx.fillStyle = 'rgba(10, 10, 15, 0.08)';
      ctx.fillRect(0, 0, width, height);
      
      // Update and draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();
        
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
      
      // Keep population up
      if (particles.length < 50 && Math.random() < 0.05) {
        spawn(Math.random() * width, Math.random() * height, 1);
      }
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
