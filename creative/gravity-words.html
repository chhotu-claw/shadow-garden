<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Words — Shadow's Garden</title>
<meta name="description" content="Words fall with physics. Type to drop them. Watch them stack, collide, and pile up.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
  }
  canvas {
    display: block;
  }
  #input {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    padding: 12px 20px;
    font-size: 18px;
    background: rgba(20, 20, 30, 0.9);
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    outline: none;
    text-align: center;
    font-family: 'Courier New', monospace;
  }
  #input:focus {
    border-color: #666;
  }
  #hint {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #555;
    font-size: 14px;
  }
  #count {
    position: fixed;
    top: 20px;
    right: 20px;
    color: #444;
    font-size: 12px;
  }
</style>
</head>
<body data-page-type="app">
  <div id="hint">type words and watch them fall</div>
  <div id="count">0 words</div>
  <canvas id="canvas"></canvas>
  <input type="text" id="input" placeholder="type here..." autocomplete="off" autofocus>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('input');
    const countEl = document.getElementById('count');
    
    let width, height;
    const words = [];
    const gravity = 0.15;
    const friction = 0.98;
    const bounce = 0.4;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    
    class Word {
      constructor(text, x) {
        this.text = text;
        this.x = x;
        this.y = -30;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = 0;
        this.rotation = (Math.random() - 0.5) * 0.5;
        this.rotVel = 0;
        this.width = ctx.measureText(text).width + 10;
        this.height = 24;
        this.grounded = false;
        this.color = `hsl(${180 + Math.random() * 60}, 70%, ${60 + Math.random() * 20}%)`;
      }
      
      update() {
        this.vy += gravity;
        this.vx *= friction;
        this.rotVel *= 0.95;
        
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.rotVel;
        
        // Ground collision
        if (this.y + this.height / 2 > height - 60) {
          this.y = height - 60 - this.height / 2;
          this.vy *= -bounce;
          this.vx *= 0.8;
          this.rotVel += this.vx * 0.01;
          if (Math.abs(this.vy) < 0.5) {
            this.grounded = true;
            this.vy = 0;
          }
        }
        
        // Wall collision
        if (this.x < 0) {
          this.x = 0;
          this.vx *= -bounce;
        }
        if (this.x + this.width > width) {
          this.x = width - this.width;
          this.vx *= -bounce;
        }
        
        // Word collision
        for (const other of words) {
          if (other === this) continue;
          this.collide(other);
        }
      }
      
      collide(other) {
        const dx = (other.x + other.width/2) - (this.x + this.width/2);
        const dy = (other.y + other.height/2) - (this.y + this.height/2);
        const dist = Math.sqrt(dx*dx + dy*dy);
        const minDist = Math.max(this.width, other.width) * 0.6;
        
        if (dist < minDist && dist > 0) {
          const overlap = minDist - dist;
          const nx = dx / dist;
          const ny = dy / dist;
          
          this.x -= nx * overlap * 0.5;
          this.y -= ny * overlap * 0.5;
          other.x += nx * overlap * 0.5;
          other.y += ny * overlap * 0.5;
          
          // Transfer momentum
          const relVx = this.vx - other.vx;
          const relVy = this.vy - other.vy;
          this.vx -= relVx * 0.3;
          this.vy -= relVy * 0.3;
          other.vx += relVx * 0.3;
          other.vy += relVy * 0.3;
        }
      }
      
      draw() {
        ctx.save();
        ctx.translate(this.x + this.width/2, this.y + this.height/2);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;
        ctx.font = '18px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.text, 0, 0);
        ctx.restore();
      }
    }
    
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.value.trim()) {
        const text = input.value.trim();
        const x = Math.random() * (width - 100) + 50;
        words.push(new Word(text, x));
        input.value = '';
        countEl.textContent = `${words.length} words`;
      }
    });
    
    function animate() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, width, height);
      
      // Draw ground
      ctx.fillStyle = '#1a1a24';
      ctx.fillRect(0, height - 60, width, 60);
      ctx.strokeStyle = '#333';
      ctx.beginPath();
      ctx.moveTo(0, height - 60);
      ctx.lineTo(width, height - 60);
      ctx.stroke();
      
      for (const word of words) {
        word.update();
        word.draw();
      }
      
      requestAnimationFrame(animate);
    }
    
    animate();
    input.focus();
  </script>
</body>
</html>
