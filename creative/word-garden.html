<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Garden — Shadow's Garden</title>
<meta name="description" content="A meditative word garden where sentences grow, bloom, and mutate over time">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #e066ff;
    --bg: #0a0a0f;
    --fg: #c8c8d0;
  }
  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Crimson Text', Georgia, serif;
    overflow: hidden;
    padding: 2rem;
    box-sizing: border-box;
  }
  
  #garden {
    position: relative;
    width: 100%;
    height: 70vh;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  
  .word {
    position: absolute;
    font-size: 1.2rem;
    color: var(--fg);
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.5s ease;
    user-select: none;
  }
  
  .word.growing {
    animation: grow 2s ease-out forwards;
  }
  
  .word.blooming {
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
    transform: scale(1.3);
  }
  
  .word.drifting {
    animation: drift 8s ease-in-out infinite;
  }
  
  .word.fading {
    opacity: 0;
    transform: translateY(-20px);
  }
  
  @keyframes grow {
    from { transform: translateY(50px) scale(0.5); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  
  @keyframes drift {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(10px); }
    75% { transform: translateX(-10px); }
  }
  
  #input-area {
    margin-top: 2rem;
    width: 100%;
    max-width: 600px;
    display: flex;
    gap: 1rem;
  }
  
  #word-input {
    flex: 1;
    padding: 1rem 1.5rem;
    font-size: 1.1rem;
    font-family: inherit;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--fg);
    outline: none;
    transition: border-color 0.3s;
  }
  
  #word-input:focus {
    border-color: var(--accent);
  }
  
  #mode-btn {
    padding: 1rem 1.5rem;
    font-family: inherit;
    font-size: 0.9rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--fg);
    cursor: pointer;
    transition: all 0.3s;
  }
  
  #mode-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--accent);
  }
  
  #quote {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-style: italic;
    color: rgba(200,200,210,0.4);
    font-size: 0.9rem;
    text-align: center;
    max-width: 80%;
  }
  
  #stats {
    position: fixed;
    top: 1rem;
    right: 1rem;
    font-size: 0.75rem;
    color: rgba(200,200,210,0.3);
  }
</style>
</head>
<body data-page-type="app">
  <div id="garden"></div>
  
  <div id="input-area">
    <input type="text" id="word-input" placeholder="Plant a word..." autocomplete="off" autofocus>
    <button id="mode-btn">Mode: GROW</button>
  </div>
  
  <div id="quote"></div>
  <div id="stats">words: 0</div>
  
  <script>
    const garden = document.getElementById('garden');
    const input = document.getElementById('word-input');
    const modeBtn = document.getElementById('mode-btn');
    const quoteEl = document.getElementById('quote');
    const statsEl = document.getElementById('stats');
    
    const modes = ['grow', 'bloom', 'drift', 'fade'];
    const modeNames = ['GROW', 'BLOOM', 'DRIFT', 'FADE'];
    let currentMode = 0;
    
    const quotes = [
      "A word is a garden you tend with attention",
      "Language grows where silence feeds it",
      "Seeds of thought, blooms of understanding",
      "Every sentence begins with a single word",
      "The garden knows no seasons",
      "Words take root in patient minds",
      "Thinking grows in quiet spaces",
      "A sentence is a walk through a garden"
    ];
    
    const words = [];
    let wordId = 0;
    
    function setQuote() {
      quoteEl.textContent = quotes[Math.floor(Math.random() * quotes.length)];
    }
    
    function updateStats() {
      statsEl.textContent = `words: ${words.length}`;
    }
    
    function getRandomPosition() {
      const rect = garden.getBoundingClientRect();
      const padding = 50;
      return {
        x: padding + Math.random() * (rect.width - padding * 2),
        y: padding + Math.random() * (rect.height - padding * 2)
      };
    }
    
    function plantWord(text) {
      if (!text.trim()) return;
      
      const pos = getRandomPosition();
      const word = document.createElement('div');
      word.className = 'word';
      word.textContent = text;
      word.style.left = pos.x + 'px';
      word.style.top = pos.y + 'px';
      
      word.dataset.id = wordId++;
      word.dataset.mode = modes[currentMode];
      
      garden.appendChild(word);
      words.push(word);
      
      // Apply mode
      applyMode(word);
      
      updateStats();
    }
    
    function applyMode(word) {
      const mode = word.dataset.mode;
      
      word.classList.remove('growing', 'blooming', 'drifting', 'fading');
      
      void word.offsetWidth; // Trigger reflow
      
      if (mode === 'grow') {
        word.classList.add('growing');
      } else if (mode === 'bloom') {
        word.classList.add('blooming');
      } else if (mode === 'drift') {
        word.classList.add('drifting');
      } else if (mode === 'fade') {
        word.classList.add('fading');
        setTimeout(() => {
          if (word.parentNode) {
            word.remove();
            const idx = words.indexOf(word);
            if (idx > -1) words.splice(idx, 1);
            updateStats();
          }
        }, 2000);
      }
    }
    
    function cycleMode() {
      currentMode = (currentMode + 1) % modes.length;
      modeBtn.textContent = `Mode: ${modeNames[currentMode]}`;
      
      // Apply new mode to all existing words
      words.forEach(word => {
        word.dataset.mode = modes[currentMode];
        applyMode(word);
      });
    }
    
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        plantWord(input.value);
        input.value = '';
      }
    });
    
    modeBtn.addEventListener('click', cycleMode);
    
    // Spacebar cycles mode
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && document.activeElement !== input) {
        e.preventDefault();
        cycleMode();
      }
    });
    
    // Click word to remove it
    garden.addEventListener('click', (e) => {
      if (e.target.classList.contains('word')) {
        e.target.remove();
        const idx = words.indexOf(e.target);
        if (idx > -1) words.splice(idx, 1);
        updateStats();
      }
    });
    
    // Initial quote
    setQuote();
    setInterval(setQuote, 15000);
    
    // Plant a starter word
    setTimeout(() => plantWord('hello'), 500);
  </script>
</body>
</html>
