<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Garden — Shadow's Garden</title>
<meta name="description" content="A meditative word garden where sentences grow, bloom, and mutate over time">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0a0a0f;
    --text: #e8e6e3;
    --accent: #7c3aed;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }
  .input-area {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 600px;
    z-index: 10;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 2rem;
    padding: 1rem 1.5rem;
    color: var(--text);
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
  }
  input:focus {
    border-color: var(--accent);
    background: rgba(255,255,255,0.08);
  }
  input::placeholder {
    color: rgba(255,255,255,0.3);
  }
  .hint {
    position: fixed;
    top: 1rem;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 0.75rem;
    text-align: center;
  }
</style>
</head>
<body data-page-type="app">
<div class="hint">type words to plant them • watch them grow and bloom</div>
<canvas id="garden"></canvas>
<div class="input-area">
  <input type="text" id="seed" placeholder="plant a seed..." autofocus>
</div>

<script>
const canvas = document.getElementById('garden');
const ctx = canvas.getContext('2d');
const input = document.getElementById('seed');

let width, height;
let words = [];

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Word particle class
class Word {
  constructor(text, x, y) {
    this.text = text;
    this.x = x || width/2;
    this.y = y || height - 100;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = -Math.random() * 3 - 2;
    this.gravity = 0.05;
    this.life = 1;
    this.decay = 0.002;
    this.size = Math.random() * 20 + 20;
    this.hue = Math.random() * 60 + 240; // purple-blue range
    this.saturation = 70;
    this.lightness = 60;
    this.grounded = false;
    this.groundY = height - 100 - Math.random() * 50;
    this.bounce = 0.6;
    this.rotation = (Math.random() - 0.5) * 0.1;
    this.opacity = 1;
    this.mutation = '';
  }
  
  update() {
    if (this.grounded) {
      // Slowly drift on ground
      this.x += this.vx * 0.1;
      this.rotation += (Math.random() - 0.5) * 0.01;
      this.opacity -= 0.001;
      // Occasional mutation
      if (Math.random() < 0.005 && this.text.length > 2) {
        const chars = this.text.split('');
        const idx = Math.floor(Math.random() * chars.length);
        chars[idx] = String.fromCharCode(97 + Math.floor(Math.random() * 26));
        this.mutation = chars.join('');
      }
      return this.opacity > 0;
    }
    
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    
    // Bounce off walls
    if (this.x < 50 || this.x > width - 50) {
      this.vx *= -0.8;
      this.x = Math.max(50, Math.min(width - 50, this.x));
    }
    
    // Ground collision
    if (this.y > this.groundY) {
      this.y = this.groundY;
      this.vy *= -this.bounce;
      this.vx *= 0.9;
      if (Math.abs(this.vy) < 0.5) {
        this.grounded = true;
      }
    }
    
    this.life -= this.decay;
    return this.life > 0;
  }
  
  draw() {
    const displayText = this.mutation || this.text;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = this.opacity;
    
    // Glow
    ctx.shadowColor = `hsl(${this.hue}, ${this.saturation}%, ${this.lightness}%)`;
    ctx.shadowBlur = 20;
    
    // Gradient text
    const gradient = ctx.createLinearGradient(0, -this.size/2, 0, this.size/2);
    gradient.addColorStop(0, `hsl(${this.hue}, ${this.saturation}%, ${this.lightness + 20}%)`);
    gradient.addColorStop(1, `hsl(${this.hue}, ${this.saturation}%, ${this.lightness - 10}%)`);
    
    ctx.font = `${this.size}px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = gradient;
    ctx.fillText(displayText, 0, 0);
    
    ctx.restore();
  }
}

// Plant word on enter
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && input.value.trim()) {
    const word = new Word(input.value.trim());
    words.push(word);
    input.value = '';
  }
});

// Also plant on space for quick words
input.addEventListener('keydown', (e) => {
  if (e.key === ' ' && input.value.trim()) {
    e.preventDefault();
    const word = new Word(input.value.trim());
    words.push(word);
    input.value = '';
  }
});

// Click to plant
canvas.addEventListener('click', (e) => {
  const word = new Word(input.placeholder.replace('plant a seed...', 'bloom'), e.clientX, e.clientY);
  words.push(word);
});

// Animation loop
function animate() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
  ctx.fillRect(0, 0, width, height);
  
  // Draw ground hint
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.beginPath();
  ctx.moveTo(0, height - 80);
  ctx.lineTo(width, height - 80);
  ctx.stroke();
  
  words = words.filter(w => w.update());
  words.forEach(w => w.draw());
  
  requestAnimationFrame(animate);
}
animate();

// Auto-plant demo words
const demos = ['dream', 'bloom', 'grow', 'flow', 'light', 'echo'];
let demoIdx = 0;
setTimeout(() => {
  input.focus();
}, 500);
</script>
</body>
</html>
