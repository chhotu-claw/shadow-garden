<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Garden — Shadow's Garden</title>
<meta name="description">Plant words and connect them into stories. A visual story-builder.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; font-family: Georgia, serif; }
  .hint {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #555;
    font-size: 14px;
    z-index: 10;
  }
  .word {
    position: absolute;
    padding: 8px 14px;
    background: rgba(20, 20, 30, 0.8);
    border: 1px solid #333;
    border-radius: 20px;
    color: #ccc;
    font-size: 16px;
    cursor: move;
    user-select: none;
    transition: transform 0.1s;
  }
  .word:hover {
    border-color: #6cb6ff;
    color: #fff;
  }
  .word.selected {
    border-color: #7af782;
    background: rgba(30, 40, 30, 0.9);
  }
  .connection {
    position: absolute;
    background: rgba(100, 150, 200, 0.3);
    pointer-events: none;
  }
  .input-area {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .input-area input {
    padding: 12px 16px;
    border: 2px solid #333;
    border-radius: 8px;
    background: #111;
    color: #ccc;
    font-size: 15px;
    width: 200px;
  }
  .input-area input:focus {
    outline: none;
    border-color: #6cb6ff;
  }
  .input-area button {
    padding: 12px 20px;
    border: 2px solid #333;
    border-radius: 8px;
    background: #222;
    color: #ccc;
    font-size: 15px;
    cursor: pointer;
  }
  .input-area button:hover {
    border-color: #6cb6ff;
  }
</style>
</head>
<body>
<div class="hint">click to select · drag to move · click canvas to scatter</div>
<div id="garden"></div>
<div class="input-area">
  <input type="text" id="wordInput" placeholder="Plant a word..." onkeypress="if(event.key==='Enter')addWord()">
  <button onclick="addWord()">Plant</button>
</div>
<script>
  const garden = document.getElementById('garden');
  const input = document.getElementById('wordInput');
  let words = [];
  let selectedWord = null;
  let connections = [];
  
  function addWord() {
    const text = input.value.trim();
    if (!text) return;
    
    const word = document.createElement('div');
    word.className = 'word';
    word.textContent = text;
    word.style.left = (Math.random() * (window.innerWidth - 200) + 50) + 'px';
    word.style.top = (Math.random() * (window.innerHeight - 200) + 50) + 'px';
    
    let isDragging = false;
    let offsetX, offsetY;
    
    word.addEventListener('mousedown', (e) => {
      isDragging = true;
      offsetX = e.clientX - word.offsetLeft;
      offsetY = e.clientY - word.offsetTop;
      word.style.zIndex = 100;
    });
    
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      word.style.left = (e.clientX - offsetX) + 'px';
      word.style.top = (e.clientY - offsetY) + 'px';
      drawConnections();
    });
    
    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        word.style.zIndex = '';
      }
    });
    
    word.addEventListener('click', (e) => {
      e.stopPropagation();
      if (selectedWord && selectedWord !== word) {
        // Create connection
        connections.push({ from: selectedWord, to: word });
        selectedWord.classList.remove('selected');
        selectedWord = null;
        drawConnections();
      } else if (!selectedWord) {
        selectedWord = word;
        word.classList.add('selected');
      }
    });
    
    garden.appendChild(word);
    words.push(word);
    input.value = '';
  }
  
  function drawConnections() {
    document.querySelectorAll('.connection').forEach(c => c.remove());
    
    connections.forEach(conn => {
      const line = document.createElement('div');
      line.className = 'connection';
      
      const fromRect = conn.from.getBoundingClientRect();
      const toRect = conn.to.getBoundingClientRect();
      
      const x1 = fromRect.left + fromRect.width / 2;
      const y1 = fromRect.top + fromRect.height / 2;
      const x2 = toRect.left + toRect.width / 2;
      const y2 = toRect.top + toRect.height / 2;
      
      const length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
      const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
      
      line.style.width = length + 'px';
      line.style.height = '2px';
      line.style.left = x1 + 'px';
      line.style.top = y1 + 'px';
      line.style.transform = `rotate(${angle}deg)`;
      line.style.transformOrigin = '0 0';
      
      garden.appendChild(line);
    });
  }
  
  document.addEventListener('click', (e) => {
    if (e.target === document.body || e.target === garden) {
      if (selectedWord) {
        selectedWord.classList.remove('selected');
        selectedWord = null;
      }
      // Scatter effect
      words.forEach(w => {
        w.style.transition = 'all 0.3s';
        w.style.left = (Math.random() * (window.innerWidth - 200) + 50) + 'px';
        w.style.top = (Math.random() * (window.innerHeight - 200) + 50) + 'px';
      });
      setTimeout(() => {
        words.forEach(w => w.style.transition = '');
        drawConnections();
      }, 300);
    }
  });
</script>
</body>
</html>
