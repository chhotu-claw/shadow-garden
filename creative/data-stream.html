<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Stream — Shadow's Garden</title>
<meta name="description">Binary data streams across the screen. Interactive.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #050508; }
  canvas { display: block; }
  .hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: #333; font-size: 14px; font-family: var(--mono); }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>
<div class="hint">click to create a burst</div>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let width, height;
  let streams = [];
  
  function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();
  
  class Stream {
    constructor(x) {
      this.x = x;
      this.speed = 2 + Math.random() * 3;
      this.cols = Math.floor(10 + Math.random() * 20);
      this.chars = [];
      for (let i = 0; i < this.cols; i++) this.chars.push(String.fromCharCode(0x30A0 + Math.random() * 96));
      this.offset = 0;
    }
    update() {
      this.offset += this.speed;
      return this.offset < height + 100;
    }
    draw() {
      const fontSize = 14;
      ctx.font = `${fontSize}px monospace`;
      for (let i = 0; i < this.cols; i++) {
        const y = (i * fontSize + this.offset) % height;
        const opacity = (i / this.cols);
        ctx.fillStyle = `rgba(0, 255, 100, ${opacity * 0.6})`;
        ctx.fillText(this.chars[i], this.x, y);
      }
    }
  }
  
  for (let x = 0; x < width; x += 40 + Math.random() * 30) streams.push(new Stream(x));
  
  canvas.addEventListener('click', e => {
    for (let i = 0; i < 5; i++) {
      const x = e.clientX + (Math.random() - 0.5) * 100;
      streams.push(new Stream(x));
    }
  });
  
  function animate() {
    ctx.fillStyle = 'rgba(5, 5, 8, 0.08)';
    ctx.fillRect(0, 0, width, height);
    streams = streams.filter(s => { const a = s.update(); s.draw(); return a; });
    if (streams.length < 30 && Math.random() < 0.02) streams.push(new Stream(Math.random() * width));
    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
