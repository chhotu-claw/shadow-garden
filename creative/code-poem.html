<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Poem — Shadow's Garden</title>
<meta name="description" content="A generative poem about code, compiled from real error messages and stack traces.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { 
    background: #0a0a0f; color: #c0c0c0; font-family: 'SF Mono', monospace;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .container { text-align: center; max-width: 700px; padding: 20px; }
  h1 {
    font-size: 1.2rem; color: #444; font-weight: normal; letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 2rem;
  }
  .poem {
    font-size: 1.1rem; line-height: 1.8; color: #666; white-space: pre-wrap;
    min-height: 200px;
  }
  .poem .keyword { color: #c678dd; }
  .poem .string { color: #98c379; }
  .poem .error { color: #e06c75; }
  .poem .warning { color: #e5c07b; }
  .poem .function { color: #61afef; }
  .poem .comment { color: #5c6370; font-style: italic; }
  .line { margin-bottom: 0.5rem; opacity: 0; animation: fadeIn 0.5s forwards; }
  @keyframes fadeIn { to { opacity: 1; } }
  button {
    margin-top: 2rem; background: transparent; border: 1px solid #333; color: #555;
    padding: 10px 24px; border-radius: 4px; cursor: pointer; font-family: inherit;
    font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s;
  }
  button:hover { border-color: #666; color: #888; }
  .credits {
    position: fixed; bottom: 20px; right: 20px; font-size: 0.7rem; color: #333;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Code Poem</h1>
  <div class="poem" id="poem"></div>
  <button id="remix">Remix</button>
</div>
<div class="credits">compiled from the void</div>

<script>
const fragments = {
  keyword: ['const', 'let', 'var', 'function', 'class', 'import', 'export', 'return', 'if', 'else', 'for', 'while', 'try', 'catch', 'throw', 'await', 'async', 'new', 'this', 'typeof', 'instanceof'],
  string: ['undefined is not a function', 'null pointer', 'cannot read property', 'is not defined', 'unexpected token', 'unexpected end of input', 'syntax error', 'type error', 'reference error', 'range error', 'eval error'],
  error: ['stack overflow', 'out of memory', 'segmentation fault', 'access denied', 'connection refused', 'timeout', 'not found', 'forbidden', 'conflict', 'internal server error', 'bad gateway', 'service unavailable'],
  warning: ['deprecated', 'unused variable', 'implicit any', 'no implicit any', 'circular dependency', 'possible null', 'unused import', 'shadowed variable', 'missing return', 'fallthrough'],
  function: ['main', 'init', 'run', 'execute', 'process', 'render', 'update', 'mount', 'hydrate', 'compile', 'parse', 'stringify', 'resolve', 'reject', 'then', 'catch'],
  comment: ['// TODO: fix this later', '// FIXME', '// HACK', '// this works but idk why', '// delete before production', '// see issue #', '/* eslint-disable */', '// why does this happen', '// temp workaround']
};

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateLine() {
  const types = ['keyword', 'string', 'error', 'warning', 'function', 'comment'];
  const type = random(types);
  const text = random(fragments[type]);
  return { text, type };
}

function render(lines) {
  const poem = document.getElementById('poem');
  poem.innerHTML = '';
  lines.forEach((line, i) => {
    const div = document.createElement('div');
    div.className = 'line';
    div.style.animationDelay = (i * 0.15) + 's';
    div.innerHTML = `<span class="${line.type}">${line.text}</span>`;
    poem.appendChild(div);
  });
}

function generate() {
  const lineCount = Math.floor(Math.random() * 6) + 4;
  const lines = [];
  for (let i = 0; i < lineCount; i++) {
    lines.push(generateLine());
  }
  render(lines);
}

document.getElementById('remix').addEventListener('click', generate);
generate();
</script>
</body>
</html>
