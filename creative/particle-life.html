<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Life — Shadow's Garden</title>
<meta name="description" content="Particles with virtual DNA interact via attraction and repulsion, forming emergent structures">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    color: #f0e6d3;
    font-family: inherit;
  }
  h1 {
    margin: 20px 0 10px;
    font-weight: 300;
    letter-spacing: 2px;
  }
  canvas {
    border: 1px solid #222;
    cursor: none;
  }
  .controls {
    display: flex;
    gap: 15px;
    margin: 15px 0;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    padding: 8px 20px;
    background: #1a1a24;
    border: 1px solid #333;
    color: #f0e6d3;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
  }
  button:hover {
    background: #252535;
    border-color: #555;
  }
  .info {
    color: #666;
    font-size: 12px;
    margin-bottom: 20px;
  }
</style>
</head>
<body data-page-type="app">
  <h1>Particle Life</h1>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button id="randomize">Randomize DNA</button>
    <button id="reset">Reset Particles</button>
  </div>
  <div class="info">Move mouse to attract • Particles form structures based on their DNA</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let W, H;
    const NUM_PARTICLES = 1200;
    const NUM_TYPES = 6;
    const INTERACTION_RADIUS = 60;
    
    let particles = [];
    let dna = [];
    let mouse = { x: 0, y: 0, active: false };
    
    function resize() {
      W = canvas.width = Math.min(800, window.innerWidth - 40);
      H = canvas.height = Math.min(500, window.innerHeight - 200);
    }
    resize();
    window.addEventListener('resize', resize);
    
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
      mouse.active = true;
    });
    canvas.addEventListener('mouseleave', () => mouse.active = false);
    
    // Initialize DNA (interaction matrix)
    function initDNA() {
      dna = [];
      for (let i = 0; i < NUM_TYPES; i++) {
        dna[i] = [];
        for (let j = 0; j < NUM_TYPES; j++) {
          dna[i][j] = (Math.random() - 0.5) * 2;
        }
      }
    }
    
    // Initialize particles
    function initParticles() {
      particles = [];
      for (let i = 0; i < NUM_PARTICLES; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          type: Math.floor(Math.random() * NUM_TYPES)
        });
      }
    }
    
    const typeColors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181', '#aa96da'];
    
    function update() {
      const gridSize = INTERACTION_RADIUS;
      const gridCols = Math.ceil(W / gridSize);
      const gridRows = Math.ceil(H / gridSize);
      const grid = new Array(gridCols * gridRows).fill(null).map(() => []);
      
      particles.forEach((p, i) => {
        const gx = Math.floor(p.x / gridSize);
        const gy = Math.floor(p.y / gridSize);
        if (gx >= 0 && gx < gridCols && gy >= 0 && gy < gridRows) {
          grid[gy * gridCols + gx].push(i);
        }
      });
      
      particles.forEach((p, i) => {
        let fx = 0, fy = 0;
        
        const gx = Math.floor(p.x / gridSize);
        const gy = Math.floor(p.y / gridSize);
        
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            const nx = gx + dx;
            const ny = gy + dy;
            if (nx < 0 || nx >= gridCols || ny < 0 || ny >= gridRows) continue;
            
            const cell = grid[ny * gridCols + nx];
            for (const j of cell) {
              if (i === j) continue;
              const other = particles[j];
              const dx = other.x - p.x;
              const dy = other.y - p.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              
              if (dist > 0 && dist < INTERACTION_RADIUS) {
                const force = dna[p.type][other.type] * (1 - dist / INTERACTION_RADIUS) * 0.5;
                fx += (dx / dist) * force;
                fy += (dy / dist) * force;
              }
            }
          }
        }
        
        if (mouse.active) {
          const mdx = mouse.x - p.x;
          const mdy = mouse.y - p.y;
          const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
          if (mdist > 0 && mdist < 200) {
            fx += (mdx / mdist) * 0.3;
            fy += (mdy / mdist) * 0.3;
          }
        }
        
        fx *= 0.95;
        fy *= 0.95;
        
        p.vx += fx;
        p.vy += fy;
        
        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (speed > 4) {
          p.vx = (p.vx / speed) * 4;
          p.vy = (p.vy / speed) * 4;
        }
        
        p.x += p.vx;
        p.y += p.vy;
        
        if (p.x < 0) { p.x = 0; p.vx *= -0.8; }
        if (p.x > W) { p.x = W; p.vx *= -0.8; }
        if (p.y < 0) { p.y = 0; p.vy *= -0.8; }
        if (p.y > H) { p.y = H; p.vy *= -0.8; }
      });
    }
    
    function render() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
      ctx.fillRect(0, 0, W, H);
      
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = typeColors[p.type];
        ctx.fill();
      });
    }
    
    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }
    
    initDNA();
    initParticles();
    
    document.getElementById('randomize').addEventListener('click', initDNA);
    document.getElementById('reset').addEventListener('click', initParticles);
    
    loop();
  </script>
</body>
</html>
