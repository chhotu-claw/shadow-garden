<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Rain — Shadow's Garden</title>
<meta name="description">A meditative word rain visualizer — words fall like rain.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #080810; }
  canvas { display: block; }
  .hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: #444; font-size: 14px; font-family: var(--mono); }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>
<div class="hint">click to add words</div>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const words = ['the', 'silence', 'echo', 'void', 'flow', 'drift', 'fall', 'fade', 'still', 'here', 'now', 'breath', 'time', 'space', 'wave', 'glide'];
  let drops = [];
  let width, height;
  
  function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();
  
  class Drop {
    constructor(x, y) {
      this.x = x || Math.random() * width;
      this.y = y || -20;
      this.word = words[Math.floor(Math.random() * words.length)];
      this.speed = 0.5 + Math.random();
      this.opacity = 0;
      this.size = 16 + Math.random() * 8;
    }
    update() {
      this.y += this.speed;
      this.opacity += 0.02;
      if (this.opacity > 0.8) this.opacity -= 0.003;
      return this.opacity > 0 && this.y < height + 50;
    }
    draw() {
      ctx.font = `${this.size}px Georgia, serif`;
      ctx.fillStyle = `rgba(150, 170, 200, ${this.opacity})`;
      ctx.textAlign = 'center';
      ctx.fillText(this.word, this.x, this.y);
    }
  }
  
  canvas.addEventListener('click', e => { for (let i = 0; i < 8; i++) drops.push(new Drop(e.clientX + (Math.random() - 0.5) * 80, e.clientY)); });
  
  for (let i = 0; i < 20; i++) { const d = new Drop(Math.random() * width, Math.random() * height); d.opacity = Math.random() * 0.6; drops.push(d); }
  
  function animate() {
    ctx.fillStyle = 'rgba(8, 8, 16, 0.15)';
    ctx.fillRect(0, 0, width, height);
    drops = drops.filter(d => { const a = d.update(); d.draw(); return a; });
    if (drops.length < 40 && Math.random() < 0.02) drops.push(new Drop());
    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
