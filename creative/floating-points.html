<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Points — Shadow's Garden</title>
<meta name="description">Particles float and connect in 3D-like space.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #040408; }
  canvas { display: block; }
  .hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: #333; font-size: 14px; font-family: var(--mono); }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>
<div class="hint">click to repel · drag to attract</div>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let width, height, particles = [];
  const mouse = { x: 0, y: 0, active: false, drag: false };
  
  function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();
  
  class Particle {
    constructor(x, y) {
      this.x = x || Math.random() * width;
      this.y = y || Math.random() * height;
      this.vx = (Math.random() - 0.5) * 0.5;
      this.vy = (Math.random() - 0.5) * 0.5;
      this.size = 1 + Math.random() * 2;
    }
    update() {
      // Mouse interaction
      if (mouse.active && mouse.drag) {
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          this.vx += (dx / dist) * 0.1;
          this.vy += (dy / dist) * 0.1;
        }
      }
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.99;
      this.vy *= 0.99;
      
      if (this.x < 0 || this.x > width) this.vx *= -1;
      if (this.y < 0 || this.y > height) this.vy *= -1;
      return true;
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(80, 140, 220, 0.6)';
      ctx.fill();
    }
  }
  
  canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  canvas.addEventListener('mousedown', () => { mouse.drag = true; });
  canvas.addEventListener('mouseup', () => { mouse.drag = false; });
  canvas.addEventListener('mouseenter', () => { mouse.active = true; });
  canvas.addEventListener('mouseleave', () => { mouse.active = false; });
  canvas.addEventListener('click', e => {
    for (let i = 0; i < 10; i++) particles.push(new Particle(e.clientX, e.clientY));
  });
  
  for (let i = 0; i < 80; i++) particles.push(new Particle());
  
  function animate() {
    ctx.fillStyle = 'rgba(4, 4, 8, 0.15)';
    ctx.fillRect(0, 0, width, height);
    
    particles = particles.filter(p => { p.update(); p.draw(); return true; });
    
    // Draw connections
    ctx.strokeStyle = 'rgba(80, 140, 220, 0.1)';
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 80) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
    
    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
