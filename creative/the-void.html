<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Void — Shadow's Garden</title>
<meta name="description" content="An interactive exploration of absence as presence — watch emptiness take shape around you</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
  }
  
  .container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  
  canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
  
  .info {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: #444;
    font-size: 12px;
    pointer-events: none;
    z-index: 10;
  }
  
  .title {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #333;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }
  
  .mode-indicator {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #333;
    font-size: 12px;
    pointer-events: none;
    z-index: 10;
  }
  
  .hint {
    position: absolute;
    bottom: 20px;
    right: 20px;
    color: #2a2a35;
    font-size: 11px;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="title">the void</div>
  <div class="mode-indicator" id="mode">absence</div>
  <div class="hint">click to toggle · move to disturb</div>
  <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const modeIndicator = document.getElementById('mode');

let width, height;
let particles = [];
let mode = 'absence'; // 'absence' or 'presence'
let mouse = { x: 0, y: 0, vx: 0, vy: 0, active: false };
let lastMouse = { x: 0, y: 0 };
let time = 0;

const PARTICLE_COUNT = 800;

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  initParticles();
}

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * width,
      y: Math.random() * height,
      baseX: Math.random() * width,
      baseY: Math.random() * height,
      vx: 0,
      vy: 0,
      size: Math.random() * 2 + 0.5,
      friction: 0.95 + Math.random() * 0.03,
      returnSpeed: 0.02 + Math.random() * 0.02,
      phase: Math.random() * Math.PI * 2,
      hue: Math.random() * 60 + 180 // cyans and blues
    });
  }
}

canvas.addEventListener('mousemove', (e) => {
  const newX = e.clientX;
  const newY = e.clientY;
  mouse.vx = newX - lastMouse.x;
  mouse.vy = newY - lastMouse.y;
  lastMouse.x = newX;
  lastMouse.y = newY;
  mouse.x = newX;
  mouse.y = newY;
  mouse.active = true;
});

canvas.addEventListener('click', () => {
  mode = mode === 'absence' ? 'presence' : 'absence';
  modeIndicator.textContent = mode;
  
  // Burst effect on mode change
  particles.forEach(p => {
    const dx = p.x - mouse.x;
    const dy = p.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200) {
      const force = (200 - dist) / 200;
      p.vx += (dx / dist) * force * 15;
      p.vy += (dy / dist) * force * 15;
    }
  });
});

canvas.addEventListener('mouseleave', () => {
  mouse.active = false;
});

function update() {
  time += 0.01;
  
  particles.forEach((p, i) => {
    // Return to base position
    const dx = p.baseX - p.x;
    const dy = p.baseY - p.y;
    p.vx += dx * p.returnSpeed;
    p.vy += dy * p.returnSpeed;
    
    // Mouse interaction
    if (mouse.active) {
      const mdx = p.x - mouse.x;
      const mdy = p.y - mouse.y;
      const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
      
      if (mdist < 150) {
        const force = (150 - mdist) / 150;
        
        if (mode === 'absence') {
          // Repel from mouse — create empty space
          p.vx += (mdx / mdist) * force * 3;
          p.vy += (mdy / mdist) * force * 3;
        } else {
          // Attract to mouse — fill the space
          p.vx -= (mdx / mdist) * force * 2;
          p.vy -= (mdy / mdist) * force * 2;
        }
      }
      
      // Add mouse velocity influence
      p.vx += mouse.vx * 0.05 * force;
      p.vy += mouse.vy * 0.05 * force;
    }
    
    // Apply friction
    p.vx *= p.friction;
    p.vy *= p.friction;
    
    // Update position
    p.x += p.vx;
    p.y += p.vy;
    
    // Add subtle drift
    p.x += Math.sin(time + p.phase) * 0.2;
    p.y += Math.cos(time + p.phase) * 0.2;
  });
  
  // Decay mouse velocity
  mouse.vx *= 0.9;
  mouse.vy *= 0.9;
}

function draw() {
  // Trail effect
  ctx.fillStyle = mode === 'absence' 
    ? 'rgba(10, 10, 15, 0.08)' 
    : 'rgba(5, 8, 15, 0.15)';
  ctx.fillRect(0, 0, width, height);
  
  particles.forEach(p => {
    const alpha = mode === 'absence' 
      ? 0.3 + Math.sin(time * 2 + p.phase) * 0.2
      : 0.5 + Math.cos(time * 2 + p.phase) * 0.3;
    
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    
    if (mode === 'absence') {
      // Void mode: dim, ghostly particles
      ctx.fillStyle = `hsla(${p.hue}, 60%, 30%, ${alpha})`;
    } else {
      // Presence mode: brighter, more connected
      ctx.fillStyle = `hsla(${p.hue + 30}, 70%, 50%, ${alpha})`;
    }
    
    ctx.fill();
  });
  
  // Draw connections in presence mode
  if (mode === 'presence' && mouse.active) {
    ctx.strokeStyle = 'rgba(100, 200, 255, 0.1)';
    ctx.lineWidth = 0.5;
    
    particles.forEach(p => {
      const dx = p.x - mouse.x;
      const dy = p.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(mouse.x, mouse.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }
    });
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
resize();
loop();
</script>
</body>
</html>
