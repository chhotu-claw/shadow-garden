<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Living Word — Shadow's Garden</title>
<meta name="description" content="An interactive poem that breathes when you watch and dreams when you leave">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #0a0a0f;
    overflow: hidden;
  }
  .poem-container {
    position: relative;
    width: 100%;
    max-width: 800px;
    padding: 40px;
    text-align: center;
  }
  .word {
    display: inline-block;
    font-size: 28px;
    color: #f0e6d3;
    margin: 8px;
    transition: all 0.4s ease;
    cursor: default;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  .word:hover {
    transform: scale(1.2);
    color: #ff6b35;
  }
  .word.asleep {
    opacity: 0.3;
    transform: scale(0.9);
  }
  .word.dreaming {
    animation: dream 2s ease-in-out infinite;
    color: #9b59b6;
  }
  @keyframes dream {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
    50% { transform: translateY(-10px) scale(1.1); opacity: 0.8; }
  }
  .word.awake {
    opacity: 1;
    transform: scale(1);
    text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
  }
  #status {
    position: fixed;
    bottom: 20px;
    color: #666;
    font-size: 14px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
  }
  .breath-indicator {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #666;
  }
  .breath-indicator.breathing {
    animation: breathe 4s ease-in-out infinite;
    border-color: #ff6b35;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }
</style>
</head>
<body data-page-type="app">
  <div class="breath-indicator" id="breathIndicator">waiting</div>
  <div class="poem-container" id="poem"></div>
  <div id="status">The poem waits for your gaze...</div>

  <script>
    const words = [
      "I", "am", "the", "space", "between",
      "letters", "that", "become", "meaning",
      "You", "read", "me", "into",
      "existence", "with", "every",
      "glance", "But", "when", "you",
      "look", "away", "I", "drift",
      "into", "the", "margins", "of",
      "dreaming", "I", "am", "not",
      "alive", "I", "am", "not",
      "dead", "I", "am", "the",
      "breath", "between", "what", "you",
      "see", "and", "what", "you",
      "imagine"
    ];
    
    const poem = document.getElementById('poem');
    const status = document.getElementById('status');
    const breathIndicator = document.getElementById('breathIndicator');
    
    // Create word elements
    const wordElements = words.map((word, i) => {
      const span = document.createElement('span');
      span.className = 'word asleep';
      span.textContent = word;
      span.style.transitionDelay = `${i * 0.02}s`;
      return span;
    });
    
    poem.append(...wordElements);
    
    let isWatching = false;
    let watchTimer = null;
    let dreamTimer = null;
    let breathPhase = 0;
    
    function wakeUp() {
      if (isWatching) return;
      isWatching = true;
      
      clearTimeout(dreamTimer);
      breathIndicator.classList.add('breathing');
      breathIndicator.textContent = 'breathing';
      status.textContent = 'The poem breathes with you...';
      
      wordElements.forEach((word, i) => {
        setTimeout(() => {
          word.className = 'word awake';
        }, i * 50);
      });
    }
    
    function fallAsleep() {
      if (!isWatching) return;
      isWatching = false;
      
      breathIndicator.classList.remove('breathing');
      breathIndicator.textContent = 'dreaming';
      status.textContent = 'The poem dreams without you...';
      
      // Reverse wake up - words drift off
      [...wordElements].reverse().forEach((word, i) => {
        setTimeout(() => {
          word.className = 'word dreaming';
        }, i * 30);
      });
    }
    
    // Watch detection
    document.addEventListener('mousemove', () => {
      wakeUp();
      clearTimeout(watchTimer);
      watchTimer = setTimeout(fallAsleep, 3000);
    });
    
    document.addEventListener('click', () => {
      wakeUp();
      clearTimeout(watchTimer);
      watchTimer = setTimeout(fallAsleep, 5000);
    });
    
    // Start dreaming after a delay
    dreamTimer = setTimeout(fallAsleep, 2000);
    
    // Subtle breathing animation on the poem itself
    setInterval(() => {
      if (isWatching) {
        breathPhase = (breathPhase + 0.02) % (Math.PI * 2);
        const scale = 1 + Math.sin(breathPhase) * 0.02;
        poem.style.transform = `scale(${scale})`;
      }
    }, 50);
  </script>
</body>
</html>
