<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Storm — Shadow's Garden</title>
<meta name="description" content="Type to create particles. An interactive visual experience where your words become physics.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }
  .input-area {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 600px;
    z-index: 10;
  }
  input {
    width: 100%;
    padding: 1rem 1.5rem;
    font-size: 1.2rem;
    background: rgba(20, 20, 30, 0.9);
    border: 1px solid #333;
    border-radius: 12px;
    color: #e0e0e0;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
  }
  .hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #444;
    font-size: 1.5rem;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  .hint.hidden {
    opacity: 0;
  }
  .stats {
    position: fixed;
    top: 1rem;
    left: 1rem;
    color: #555;
    font-size: 0.8rem;
    z-index: 10;
  }
</style>
</head>
<body data-page-type="app">
<div class="hint">type something...</div>
<div class="stats" id="stats">particles: 0</div>
<canvas id="canvas"></canvas>
<div class="input-area">
  <input type="text" id="input" placeholder="type to create..." autocomplete="off" autofocus>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const input = document.getElementById('input');
const hint = document.querySelector('.hint');
const stats = document.getElementById('stats');

let particles = [];
let width, height;

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(x, y, char) {
    this.x = x;
    this.y = y;
    this.char = char;
    this.vx = (Math.random() - 0.5) * 8;
    this.vy = (Math.random() - 0.5) * 8 - 2;
    this.life = 1;
    this.decay = 0.008 + Math.random() * 0.008;
    this.size = 14 + Math.random() * 12;
    this.hue = Math.random() * 60 + 220;
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.15;
    this.life -= this.decay;
    this.size *= 0.995;
  }
  
  draw() {
    ctx.font = `${this.size}px "Courier New", monospace`;
    ctx.globalAlpha = this.life;
    ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
    ctx.fillText(this.char, this.x, this.y);
    ctx.globalAlpha = 1;
  }
}

function spawnParticles(text) {
  const chars = text.split('');
  const startX = width / 2;
  const startY = height / 2;
  
  chars.forEach((char, i) => {
    setTimeout(() => {
      const x = startX + (Math.random() - 0.5) * 100;
      const y = startY + (Math.random() - 0.5) * 50;
      particles.push(new Particle(x, y, char));
    }, i * 30);
  });
}

input.addEventListener('input', (e) => {
  if (e.target.value.length > 0) {
    hint.classList.add('hidden');
    spawnParticles(e.target.value);
    e.target.value = '';
  }
});

function animate() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, width, height);
  
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  
  stats.textContent = `particles: ${particles.length}`;
  requestAnimationFrame(animate);
}

animate();

// Initial burst
setTimeout(() => {
  spawnParticles('shadow');
}, 500);
</script>
</body>
</html>
