<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Storm — Shadow's Garden</title>
<meta name="description" content="Type words and watch them collide in a particle storm"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
  }
  #canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }
  #input-area {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 10px;
  }
  #text-input {
    background: rgba(20, 20, 30, 0.9);
    border: 1px solid #334;
    color: #8af;
    padding: 12px 20px;
    font-size: 16px;
    font-family: 'Courier New', monospace;
    width: 300px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.3s;
  }
  #text-input:focus {
    border-color: #6af;
  }
  #speak-btn {
    background: rgba(20, 20, 30, 0.9);
    border: 1px solid #334;
    color: #8af;
    padding: 12px 20px;
    font-size: 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s;
  }
  #speak-btn:hover {
    background: rgba(100, 150, 255, 0.2);
    border-color: #6af;
  }
  #hint {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #445;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>
<div id="hint">type something...</div>
<div id="input-area">
  <input type="text" id="text-input" placeholder="type words..." autocomplete="off">
  <button id="speak-btn">🎤</button>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const input = document.getElementById('text-input');
const speakBtn = document.getElementById('speak-btn');

let width, height;
let particles = [];
let targetWords = [];

const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181', '#aa96da', '#fcbad3', '#a8d8ea'];

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(x, y, char, color) {
    this.x = x;
    this.y = y;
    this.char = char;
    this.color = color;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.life = 1;
    this.decay = 0.003 + Math.random() * 0.005;
    this.size = 14 + Math.random() * 12;
    this.angle = Math.random() * Math.PI * 2;
    this.spin = (Math.random() - 0.5) * 0.1;
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.99;
    this.vy *= 0.99;
    this.life -= this.decay;
    this.angle += this.spin;
    
    // Slight gravity
    this.vy += 0.02;
    
    // Edge bounce
    if (this.x < 0 || this.x > width) this.vx *= -0.8;
    if (this.y > height) {
      this.y = height;
      this.vy *= -0.5;
    }
  }
  
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.globalAlpha = this.life;
    ctx.font = `${this.size}px Courier New`;
    ctx.fillStyle = this.color;
    ctx.fillText(this.char, 0, 0);
    ctx.restore();
  }
}

function spawnWord(word) {
  const chars = word.split('');
  const startX = width / 2 + (Math.random() - 0.5) * 200;
  const startY = height / 2;
  
  chars.forEach((char, i) => {
    setTimeout(() => {
      const color = colors[Math.floor(Math.random() * colors.length)];
      particles.push(new Particle(
        startX + i * 15,
        startY,
        char,
        color
      ));
    }, i * 50);
  });
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && input.value.trim()) {
    const words = input.value.trim().split(/\s+/);
    words.forEach((word, i) => {
      setTimeout(() => spawnWord(word), i * 300);
    });
    input.value = '';
  }
});

// Voice input
let recognition;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = false;
  
  recognition.onresult = (event) => {
    const last = event.results.length - 1;
    const transcript = event.results[last][0].transcript.trim();
    if (transcript) {
      const words = transcript.split(/\s+/);
      words.forEach((word, i) => {
        setTimeout(() => spawnWord(word), i * 300);
      });
    }
  };
  
  recognition.onerror = () => {
    speakBtn.textContent = '🎤';
  };
  
  speakBtn.addEventListener('click', () => {
    if (recognition && recognition.recording) {
      recognition.stop();
      speakBtn.textContent = '🎤';
    } else {
      recognition.start();
      speakBtn.textContent = '🛑';
    }
  });
} else {
  speakBtn.style.display = 'none';
}

function animate() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
  ctx.fillRect(0, 0, width, height);
  
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  
  requestAnimationFrame(animate);
}
animate();

input.focus();
</script>
</body>
</html>
