<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Picker — Shadow's Garden</title>
<meta name="description" content="Enter items, pick randomly. For raffles, team selection, or deciding what to eat">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --accent: #f472b6; }
  body { --bg: #0f0f23; --fg: #e2e8f0; --border: #2d3748; }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; text-align: center; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }
  
  .input-area { margin-bottom: 1.5rem; }
  textarea { width: 100%; min-height: 120px; padding: 1rem; background: #1a1a2e; border: 2px solid var(--border); border-radius: 12px; color: var(--fg); font-size: 1rem; resize: vertical; box-sizing: border-box; }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: #64748b; }
  
  .controls { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
  button { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-pick { background: var(--accent); color: #0f0f23; }
  .btn-pick:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(244, 114, 182, 0.4); }
  .btn-pick:active { transform: scale(0.98); }
  .btn-secondary { background: #2d3748; color: #e2e8f0; }
  .btn-secondary:hover { background: #3d4a5c; }
  
  .options { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .option { display: flex; align-items: center; gap: 0.5rem; color: #94a3b8; font-size: 0.9rem; }
  .option input { width: 60px; padding: 0.4rem; background: #1a1a2e; border: 1px solid var(--border); border-radius: 6px; color: var(--fg); text-align: center; }
  
  .result { min-height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
  .result-text { font-size: 1.5rem; font-weight: 700; color: var(--accent); animation: popIn 0.3s ease; }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
  .history { text-align: left; background: #1a1a2e; border-radius: 12px; padding: 1rem; }
  .history h3 { margin: 0 0 0.75rem 0; font-size: 0.85rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
  .history-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .history-item { background: #2d3748; padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.85rem; color: #94a3b8; }
  
  .count { color: #64748b; font-size: 0.85rem; margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Random Picker</h1>
    <p class="subtitle">Enter items, pick randomly. For raffles, team selection, or deciding what to eat</p>
    
    <div class="input-area">
      <textarea id="items" placeholder="Enter items, one per line...&#10;Pizza&#10;Burger&#10;Sushi&#10;Tacos&#10;Salad"></textarea>
      <div class="count" id="count">0 items</div>
    </div>
    
    <div class="options">
      <div class="option">
        <label>Pick</label>
        <input type="number" id="pickCount" value="1" min="1" max="20">
        <label>item(s)</label>
      </div>
      <div class="option">
        <input type="checkbox" id="noDuplicates" checked>
        <label for="noDuplicates">No duplicates</label>
      </div>
    </div>
    
    <div class="controls">
      <button class="btn-pick" id="pickBtn">Pick!</button>
      <button class="btn-secondary" id="clearBtn">Clear</button>
    </div>
    
    <div class="result" id="result">
      <span style="color: #64748b;">Press Pick to choose</span>
    </div>
    
    <div class="history" id="historySection" style="display: none;">
      <h3>History</h3>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
  
  <script>
    const itemsInput = document.getElementById('items');
    const pickBtn = document.getElementById('pickBtn');
    const clearBtn = document.getElementById('clearBtn');
    const result = document.getElementById('result');
    const pickCountInput = document.getElementById('pickCount');
    const noDuplicatesCheckbox = document.getElementById('noDuplicates');
    const countDisplay = document.getElementById('count');
    const historySection = document.getElementById('historySection');
    const historyList = document.getElementById('historyList');
    
    let history = JSON.parse(localStorage.getItem('randomPickerHistory') || '[]');
    renderHistory();
    
    itemsInput.addEventListener('input', updateCount);
    pickBtn.addEventListener('click', pick);
    clearBtn.addEventListener('click', () => {
      itemsInput.value = '';
      updateCount();
    });
    
    function updateCount() {
      const items = getItems();
      countDisplay.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
    }
    
    function getItems() {
      return itemsInput.value.split('\n').map(s => s.trim()).filter(s => s);
    }
    
    function pick() {
      const items = getItems();
      if (items.length === 0) {
        result.innerHTML = '<span style="color: #f87171;">Enter some items first!</span>';
        return;
      }
      
      const pickCount = Math.min(parseInt(pickCountInput.value) || 1, items.length);
      const noDuplicates = noDuplicatesCheckbox.checked;
      
      let pool = [...items];
      let picked = [];
      
      for (let i = 0; i < pickCount; i++) {
        if (pool.length === 0) break;
        const idx = Math.floor(Math.random() * pool.length);
        picked.push(pool[idx]);
        if (noDuplicates) {
          pool.splice(idx, 1);
        }
      }
      
      if (pickCount === 1) {
        result.innerHTML = `<span class="result-text">${escapeHtml(picked[0])}</span>`;
      } else {
        result.innerHTML = picked.map(p => `<span class="result-text" style="margin: 0.25rem;">${escapeHtml(p)}</span>`).join('');
      }
      
      // Add to history
      picked.forEach(p => {
        history.unshift(p);
        if (history.length > 20) history.pop();
      });
      localStorage.setItem('randomPickerHistory', JSON.stringify(history));
      renderHistory();
    }
    
    function renderHistory() {
      if (history.length === 0) {
        historySection.style.display = 'none';
        return;
      }
      historySection.style.display = 'block';
      historyList.innerHTML = history.map(h => `<span class="history-item">${escapeHtml(h)}</span>`).join('');
    }
    
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    updateCount();
  </script>
</body>
</html>
