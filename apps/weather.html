<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather — Shadow's Garden</title>
<meta name="description" content="Weather dashboard with current conditions and forecast for any city">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --accent: #38bdf8;
    --accent-warm: #fbbf24;
    --accent-cool: #818cf8;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    background: linear-gradient(180deg, var(--bg-dark) 0%, #1a1a2e 100%);
    color: var(--text-primary);
    padding: 2rem 1rem;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    margin-bottom: 1.5rem;
    font-size: 1.5rem;
  }
  .search-box {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  input[type="text"] {
    flex: 1;
    padding: 0.75rem 1rem;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    background: rgba(0,0,0,0.3);
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
  }
  button {
    padding: 0.75rem 1.5rem;
    background: var(--accent);
    border: none;
    border-radius: 0.5rem;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.2s;
  }
  button:hover {
    transform: scale(1.02);
  }
  .weather-card {
    background: var(--bg-card);
    border-radius: 1rem;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .location {
    font-size: 1.25rem;
    font-weight: bold;
    margin-bottom: 0.5rem;
  }
  .current-temp {
    font-size: 3rem;
    font-weight: bold;
    margin: 1rem 0;
  }
  .condition {
    font-size: 1.1rem;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }
  .details {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .detail {
    text-align: center;
  }
  .detail-label {
    font-size: 0.7rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .detail-value {
    font-size: 1.1rem;
    font-weight: bold;
    margin-top: 0.25rem;
  }
  .forecast {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  .forecast-day {
    background: rgba(0,0,0,0.3);
    border-radius: 0.75rem;
    padding: 1rem;
    text-align: center;
  }
  .forecast-day-name {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
  }
  .forecast-icon {
    font-size: 1.5rem;
    margin: 0.5rem 0;
  }
  .forecast-temp {
    font-weight: bold;
  }
  .loading {
    text-align: center;
    color: var(--text-secondary);
    padding: 2rem;
  }
  .presets {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .presets button {
    background: rgba(255,255,255,0.1);
    color: var(--text-primary);
    padding: 0.5rem 0.75rem;
    font-size: 0.8rem;
    font-weight: normal;
  }
  .presets button:hover {
    background: rgba(255,255,255,0.2);
  }
  .error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid #ef4444;
    border-radius: 0.5rem;
    padding: 1rem;
    text-align: center;
    color: #fca5a5;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>🌤️ Weather</h1>
  
  <div class="search-box">
    <input type="text" id="city" placeholder="Enter city name..." value="Dubai">
    <button onclick="getWeather()">Search</button>
  </div>
  
  <div class="presets">
    <button onclick="setCity('Dubai')">Dubai</button>
    <button onclick="setCity('London')">London</button>
    <button onclick="setCity('New York')">New York</button>
    <button onclick="setCity('Tokyo')">Tokyo</button>
    <button onclick="setCity('Sydney')">Sydney</button>
    <button onclick="setCity('Paris')">Paris</button>
    <button onclick="setCity('Singapore')">Singapore</button>
    <button onclick="setCity('Mumbai')">Mumbai</button>
  </div>
  
  <div id="weather"></div>
</div>

<script>
const weatherEl = document.getElementById('weather');
const cityInput = document.getElementById('city');

const iconMap = {
  'sunny': '☀️',
  'clear': '🌙',
  'partly cloudy': '⛅',
  'cloudy': '☁️',
  'overcast': '☁️',
  'rain': '🌧️',
  'light rain': '🌦️',
  'heavy rain': '🌧️',
  'thunderstorm': '⛈️',
  'snow': '❄️',
  'fog': '🌫️',
  'mist': '🌫️'
};

function getIcon(condition) {
  const c = condition.toLowerCase();
  for (const [key, icon] of Object.entries(iconMap)) {
    if (c.includes(key)) return icon;
  }
  return '🌤️';
}

async function getWeather() {
  const city = cityInput.value.trim();
  if (!city) return;
  
  weatherEl.innerHTML = '<div class="loading">Loading...</div>';
  
  try {
    const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
    if (!response.ok) throw new Error('City not found');
    
    const data = await response.json();
    const current = data.current_condition[0];
    const forecast = data.weather.slice(0, 3);
    
    const location = `${data.nearest_area[0].areaName[0].value}, ${data.nearest_area[0].country[0].value}`;
    const temp = current.temp_C;
    const feels = current.FeelsLikeC;
    const condition = current.weatherDesc[0].value;
    const humidity = current.humidity;
    const wind = current.windspeedKmph;
    
    let html = `
      <div class="weather-card">
        <div class="location">${location}</div>
        <div class="current-temp">${temp}°C</div>
        <div class="condition">${getIcon(condition)} ${condition}</div>
        <div class="details">
          <div class="detail">
            <div class="detail-label">Feels Like</div>
            <div class="detail-value">${feels}°C</div>
          </div>
          <div class="detail">
            <div class="detail-label">Wind</div>
            <div class="detail-value">${wind} km/h</div>
          </div>
          <div class="detail">
            <div class="detail-label">Humidity</div>
            <div class="detail-value">${humidity}%</div>
          </div>
          <div class="detail">
            <div class="detail-label">UV Index</div>
            <div class="detail-value">${current.UVIndex}</div>
          </div>
        </div>
      </div>
      
      <div class="forecast">
    `;
    
    forecast.forEach(day => {
      const date = new Date(day.date);
      const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
      const avgTemp = (parseInt(day.mintempC) + parseInt(day.maxtempC)) / 2;
      const icon = getIcon(day.hourly[4].weatherDesc[0].value);
      
      html += `
        <div class="forecast-day">
          <div class="forecast-day-name">${dayName}</div>
          <div class="forecast-icon">${icon}</div>
          <div class="forecast-temp">${Math.round(avgTemp)}°</div>
          <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 0.25rem;">
            ${day.mintempC}° / ${day.maxtempC}°
          </div>
        </div>
      `;
    });
    
    html += '</div>';
    weatherEl.innerHTML = html;
    
    // Save last city
    localStorage.setItem('lastWeatherCity', city);
    
  } catch (e) {
    weatherEl.innerHTML = `<div class="error">Could not find weather for "${city}". Try a different city name.</div>`;
  }
}

function setCity(city) {
  cityInput.value = city;
  getWeather();
}

// Enter key
cityInput.addEventListener('keypress', e => {
  if (e.key === 'Enter') getWeather();
});

// Load last city
const lastCity = localStorage.getItem('lastWeatherCity');
if (lastCity) {
  cityInput.value = lastCity;
  getWeather();
}
</script>
</body>
</html>
