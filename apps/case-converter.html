<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter — Shadow's Garden</title>
<meta name="description">Convert text between different case formats. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .case-converter { max-width: 700px; margin: 0 auto; }
  .input-section { margin-bottom: 20px; }
  .input-section label {
    display: block;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  textarea {
    width: 100%;
    min-height: 100px;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    font-family: var(--mono);
    resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .options {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 20px;
  }
  .case-btn {
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .case-btn:hover {
    border-color: var(--accent);
  }
  .case-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .results {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .result-item {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .result-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .result-value {
    font-size: 15px;
    color: var(--text);
    word-break: break-all;
  }
  .copy-btn {
    margin-top: 8px;
    padding: 8px 12px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .copy-btn:hover {
    border-color: var(--accent);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="case-converter">
    <h1>Case Converter</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Convert text between case formats.</p>
    
    <div class="input-section">
      <label>Enter text</label>
      <textarea id="inputText" placeholder="Enter text to convert..." oninput="convert()"></textarea>
    </div>
    
    <div class="results" id="results">
      <div style="color: var(--text-secondary); font-size: 14px;">Enter text above to see conversions...</div>
    </div>
  </div>
</div>
<script>
  const cases = [
    { name: 'camelCase', fn: toCamelCase },
    { name: 'snake_case', fn: toSnakeCase },
    { name: 'kebab-case', fn: toKebabCase },
    { name: 'PascalCase', fn: toPascalCase },
    { name: 'CONSTANT_CASE', fn: toConstantCase },
    { name: 'Sentence case', fn: toSentenceCase },
    { name: 'Title Case', fn: toTitleCase },
    { name: 'lowercase', fn: toLowerCase },
    { name: 'UPPERCASE', fn: toUpperCase }
  ];
  
  function toCamelCase(str) {
    return str.replace(/(?:^\w|[A-Z]|\b\w)/g, (m, i) => 
      i === 0 ? m.toLowerCase() : m.toUpperCase()
    ).replace(/\s+/g, '');
  }
  
  function toSnakeCase(str) {
    return str.replace(/([A-Z])/g, '_$1').trim().replace(/[\s-]+/g, '_')
      .toLowerCase().replace(/^_/, '');
  }
  
  function toKebabCase(str) {
    return str.replace(/([A-Z])/g, '-$1').trim().replace(/[\s_]+/g, '-')
      .toLowerCase().replace(/^-/, '');
  }
  
  function toPascalCase(str) {
    return str.replace(/(?:^\w|[A-Z]|\b\w)/g, m => m.toUpperCase()).replace(/\s+/g, '');
  }
  
  function toConstantCase(str) {
    return toSnakeCase(str).toUpperCase();
  }
  
  function toSentenceCase(str) {
    return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
  }
  
  function toTitleCase(str) {
    return str.replace(/\w\S*/g, m => m.charAt(0).toUpperCase() + m.slice(1).toLowerCase());
  }
  
  function toLowerCase(str) {
    return str.toLowerCase();
  }
  
  function toUpperCase(str) {
    return str.toUpperCase();
  }
  
  function convert() {
    const text = document.getElementById('inputText').value;
    const resultsDiv = document.getElementById('results');
    
    if (!text) {
      resultsDiv.innerHTML = '<div style="color: var(--text-secondary); font-size: 14px;">Enter text above to see conversions...</div>';
      return;
    }
    
    if (!text.trim()) {
      resultsDiv.innerHTML = '<div style="color: var(--text-secondary); font-size: 14px;">Enter text above to see conversions...</div>';
      return;
    }
    
    resultsDiv.innerHTML = cases.map(c => {
      let result = c.fn(text.trim());
      if (result === text.trim() && c.name !== 'lowercase' && c.name !== 'UPPERCASE') {
        result = `(${c.name})`;
      }
      return `<div class="result-item">
        <div class="result-label">${c.name}</div>
        <div class="result-value">${result}</div>
        <button class="copy-btn" onclick="copy('${result.replace(/'/g, "\\'")}')">Copy</button>
      </div>`;
    }).join('');
  }
  
  function copy(text) {
    navigator.clipboard.writeText(text).then(() => {
      event.target.textContent = 'Copied!';
      setTimeout(() => event.target.textContent = 'Copy', 1500);
    });
  }
</script>
</body>
</html>
