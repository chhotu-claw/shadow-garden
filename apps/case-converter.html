<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter — Shadow's Garden</title>
<meta name="description" content="Convert text between camelCase, PascalCase, snake_case, kebab-case, CONSTANT_CASE, and more.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
  .io-box { display: flex; flex-direction: column; gap: 1rem; }
  @media (min-width: 640px) {
    .io-box { flex-direction: row; }
  }
  .io-col { flex: 1; display: flex; flex-direction: column; }
  label { font-weight: 600; margin-bottom: 0.5rem; display: block; }
  textarea {
    flex: 1;
    min-height: 200px;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
    font-size: 0.9rem;
    resize: vertical;
    background: #fafafa;
  }
  textarea:focus { outline: 2px solid #0066cc; border-color: transparent; }
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 1rem 0;
    justify-content: center;
  }
  button {
    padding: 0.5rem 1rem;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  button:hover { background: #f0f0f0; border-color: #ccc; }
  button.active { background: #0066cc; color: #fff; border-color: #0066cc; }
  .stats {
    margin-top: 1rem;
    padding: 0.75rem;
    background: #f5f5f5;
    border-radius: 6px;
    font-size: 0.8rem;
    color: #666;
    text-align: center;
  }
  .copy-btn {
    margin-top: 0.5rem;
    width: 100%;
  }
  .copy-btn.copied { background: #22c55e; color: #fff; border-color: #22c55e; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Case Converter</h1>
  <div class="subtitle">Convert text between different naming conventions</div>
  
  <div class="actions">
    <button class="active" data-case="camel">camelCase</button>
    <button data-case="pascal">PascalCase</button>
    <button data-case="snake">snake_case</button>
    <button data-case="kebab">kebab-case</button>
    <button data-case="constant">CONSTANT_CASE</button>
    <button data-case="lower">lower case</button>
    <button data-case="upper">UPPER CASE</button>
    <button data-case="title">Title Case</button>
    <button data-case="sentence">Sentence case</button>
  </div>

  <div class="io-box">
    <div class="io-col">
      <label for="input">Input</label>
      <textarea id="input" placeholder="Paste your text here...">hello world foo bar</textarea>
    </div>
    <div class="io-col">
      <label for="output">Output</label>
      <textarea id="output" readonly></textarea>
      <button class="copy-btn" id="copyBtn">Copy to clipboard</button>
    </div>
  </div>

  <div class="stats" id="stats">Characters: 0 | Words: 0</div>
</div>

<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const stats = document.getElementById('stats');
  const copyBtn = document.getElementById('copyBtn');
  const buttons = document.querySelectorAll('[data-case]');
  
  let currentCase = 'camel';

  const converters = {
    camel: (words) => words.map((w, i) => i === 0 ? w.toLowerCase() : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(''),
    pascal: (words) => words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(''),
    snake: (words) => words.map(w => w.toLowerCase()).join('_'),
    kebab: (words) => words.map(w => w.toLowerCase()).join('-'),
    constant: (words) => words.map(w => w.toUpperCase()).join('_'),
    lower: (words) => words.map(w => w.toLowerCase()).join(' '),
    upper: (words) => words.map(w => w.toUpperCase()).join(' '),
    title: (words) => words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' '),
    sentence: (words) => words.length ? words.map((w, i) => i === 0 ? w.charAt(0).toUpperCase() + w.slice(1).toLowerCase() : w.toLowerCase()).join(' ') : ''
  };

  function extractWords(text) {
    // Split on whitespace, underscores, hyphens, or camelCase
    return text.split(/[\s_\-]+|(?=[A-Z])/).filter(w => w.length);
  }

  function convert() {
    const text = input.value;
    const words = extractWords(text);
    const converter = converters[currentCase];
    output.value = converter(words);
    
    const charCount = output.value.length;
    const wordCount = output.value.split(/\s+/).filter(w => w.length).length;
    stats.textContent = `Characters: ${charCount} | Words: ${wordCount}`;
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCase = btn.dataset.case;
      convert();
    });
  });

  input.addEventListener('input', convert);

  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(output.value);
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy to clipboard';
        copyBtn.classList.remove('copied');
      }, 1500);
    } catch (e) {
      output.select();
      document.execCommand('copy');
      copyBtn.textContent = 'Copied!';
      setTimeout(() => copyBtn.textContent = 'Copy to clipboard', 1500);
    }
  });

  convert();
</script>
</body>
</html>
