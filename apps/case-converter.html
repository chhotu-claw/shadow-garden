<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter — Shadow's Garden</title>
<meta name="description" content="Convert text between different cases — camelCase, snake_case, kebab-case, PascalCase, and more. All local.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .intro { color: var(--fg-muted); margin-bottom: 1.5rem; }
  textarea { width: 100%; height: 150px; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-secondary); color: var(--fg); font-family: var(--font-mono); font-size: 14px; resize: vertical; box-sizing: border-box; }
  .buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
  button { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--fg); cursor: pointer; font-size: 13px; transition: background 0.2s; }
  button:hover { background: var(--bg-secondary); }
  .result-section { margin-top: 1.5rem; }
  .result-label { font-weight: 600; margin-bottom: 0.5rem; display: block; }
  .copy-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
  .copy-btn { padding: 0.3rem 0.6rem; font-size: 12px; }
  .copied { color: var(--accent); font-size: 12px; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Case Converter</h1>
  <p class="intro">Paste text, pick a case format, copy the result.</p>

  <label class="result-label" for="input">Input</label>
  <textarea id="input" placeholder="Paste your text here..."></textarea>

  <div class="buttons">
    <button onclick="convert('camel')">camelCase</button>
    <button onclick="convert('pascal')">PascalCase</button>
    <button onclick="convert('snake')">snake_case</button>
    <button onclick="convert('kebab')">kebab-case</button>
    <button onclick="convert('constant')">CONSTANT_CASE</button>
    <button onclick="convert('title')">Title Case</button>
    <button onclick="convert('lower')">lowercase</button>
    <button onclick="convert('upper')">UPPERCASE</button>
    <button onclick="convert('sentence')">Sentence case</button>
  </div>

  <div class="result-section">
    <label class="result-label">Result</label>
    <textarea id="output" readonly></textarea>
    <div class="copy-row">
      <button class="copy-btn" onclick="copyResult()">Copy</button>
      <span id="copyStatus" class="copied"></span>
    </div>
  </div>
</div>

<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const copyStatus = document.getElementById('copyStatus');

  function toWords(str) {
    return str.replace(/([a-z])([A-Z])/g, '$1 $2')
              .replace(/[\s_]+/g, ' ')
              .replace(/[^a-zA-Z0-9\s]/g, '')
              .trim()
              .split(' ')
              .filter(w => w.length > 0);
  }

  function convert(type) {
    const words = toWords(input.value);
    if (words.length === 0) {
      output.value = '';
      return;
    }

    let result;
    switch (type) {
      case 'camel':
        result = words[0].toLowerCase() + words.slice(1).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('');
        break;
      case 'pascal':
        result = words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('');
        break;
      case 'snake':
        result = words.map(w => w.toLowerCase()).join('_');
        break;
      case 'kebab':
        result = words.map(w => w.toLowerCase()).join('-');
        break;
      case 'constant':
        result = words.map(w => w.toUpperCase()).join('_');
        break;
      case 'title':
        result = words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        break;
      case 'lower':
        result = words.map(w => w.toLowerCase()).join(' ');
        break;
      case 'upper':
        result = words.map(w => w.toUpperCase()).join(' ');
        break;
      case 'sentence':
        result = words[0].charAt(0).toUpperCase() + words[0].slice(1).toLowerCase() + ' ' + words.slice(1).map(w => w.toLowerCase()).join(' ');
        break;
      default:
        result = input.value;
    }
    output.value = result;
    copyStatus.textContent = '';
  }

  function copyResult() {
    if (!output.value) return;
    navigator.clipboard.writeText(output.value);
    copyStatus.textContent = 'Copied!';
    setTimeout(() => copyStatus.textContent = '', 2000);
  }
</script>
</body>
</html>
