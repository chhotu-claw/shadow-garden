<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Counter — Shadow's Garden</title>
<meta name="description" content="Count characters, words, lines, and more. Real-time text analysis with copy buttons.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
  textarea { width: 100%; min-height: 200px; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-family: monospace; font-size: 0.9rem; resize: vertical; box-sizing: border-box; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
  .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; text-align: center; }
  .stat-value { font-size: 1.5rem; font-weight: 600; color: var(--accent); }
  .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; text-transform: uppercase; }
  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  button { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.85rem; transition: background 0.2s; }
  button:hover { background: var(--border); }
  .options { margin-bottom: 1rem; }
  .options label { display: inline-flex; align-items: center; gap: 0.5rem; margin-right: 1rem; cursor: pointer; font-size: 0.9rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Character Counter</h1>
  <div class="subtitle">Count characters, words, lines, paragraphs, and more</div>
  
  <div class="panel">
    <textarea id="input" placeholder="Paste or type your text here..."></textarea>
    <div class="btn-row" style="margin-top: 0.75rem;">
      <button id="clearBtn">Clear</button>
      <button id="sampleBtn">Sample Text</button>
    </div>
  </div>

  <div class="panel">
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value" id="chars">0</div>
        <div class="stat-label">Characters</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="charsNoSpace">0</div>
        <div class="stat-label">Chars (no space)</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="words">0</div>
        <div class="stat-label">Words</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="lines">0</div>
        <div class="stat-label">Lines</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="paragraphs">0</div>
        <div class="stat-label">Paragraphs</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="sentences">0</div>
        <div class="stat-label">Sentences</div>
      </div>
    </div>
  </div>
</div>

<script>
const input = document.getElementById('input');
const stats = {
  chars: document.getElementById('chars'),
  charsNoSpace: document.getElementById('charsNoSpace'),
  words: document.getElementById('words'),
  lines: document.getElementById('lines'),
  paragraphs: document.getElementById('paragraphs'),
  sentences: document.getElementById('sentences')
};

function count() {
  const text = input.value;
  
  // Characters
  stats.chars.textContent = text.length;
  stats.charsNoSpace.textContent = text.replace(/\s/g, '').length;
  
  // Words
  const words = text.trim() ? text.trim().split(/\s+/).filter(w => w.length > 0) : [];
  stats.words.textContent = words.length;
  
  // Lines
  const lines = text.split('\n');
  stats.lines.textContent = lines.length;
  
  // Paragraphs (separated by blank lines)
  const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
  stats.paragraphs.textContent = paragraphs.length || (text.trim() ? 1 : 0);
  
  // Sentences (rough estimate)
  const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
  stats.sentences.textContent = sentences.length;
}

input.addEventListener('input', count);

document.getElementById('clearBtn').addEventListener('click', () => {
  input.value = '';
  count();
});

document.getElementById('sampleBtn').addEventListener('click', () => {
  input.value = `The quick brown fox jumps over the lazy dog.

Pack my box with five dozen liquor jugs.

Hello, World!`;
  count();
});

count();
</script>
</body>
</html>
