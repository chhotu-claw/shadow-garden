<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Counter — Shadow's Garden</title>
<meta name="description" content="Count characters, words, sentences, paragraphs in your text. No tracking, no ads.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
  textarea {
    width: 100%; height: 200px;
    padding: 1rem; font-size: 1rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    resize: vertical;
    font-family: inherit;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    margin-top: 1.5rem;
  }
  .stat-box {
    background: var(--card-bg);
    padding: 1rem;
    border-radius: 8px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
  .stat-label { font-size: 0.875rem; color: var(--text-muted); margin-top: 0.25rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Character Counter</h1>
  <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Paste or type your text below. Counts update as you type.</p>
  <textarea id="input" placeholder="Type or paste text here..."></textarea>
  <div class="stats">
    <div class="stat-box"><div class="stat-value" id="chars">0</div><div class="stat-label">Characters</div></div>
    <div class="stat-box"><div class="stat-value" id="charsNoSpaces">0</div><div class="stat-label">Characters (no spaces)</div></div>
    <div class="stat-box"><div class="stat-value" id="words">0</div><div class="stat-label">Words</div></div>
    <div class="stat-box"><div class="stat-value" id="sentences">0</div><div class="stat-label">Sentences</div></div>
    <div class="stat-box"><div class="stat-value" id="paragraphs">0</div><div class="stat-label">Paragraphs</div></div>
    <div class="stat-box"><div class="stat-value" id="lines">0</div><div class="stat-label">Lines</div></div>
  </div>
</div>
<script>
const input = document.getElementById('input');
const stats = {
  chars: document.getElementById('chars'),
  charsNoSpaces: document.getElementById('charsNoSpaces'),
  words: document.getElementById('words'),
  sentences: document.getElementById('sentences'),
  paragraphs: document.getElementById('paragraphs'),
  lines: document.getElementById('lines')
};
function count() {
  const text = input.value;
  stats.chars.textContent = text.length;
  stats.charsNoSpaces.textContent = text.replace(/\s/g, '').length;
  stats.words.textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
  stats.sentences.textContent = text.split(/[.!?]+/).filter(s => s.trim()).length || 0;
  stats.paragraphs.textContent = text.split(/\n\n+/).filter(p => p.trim()).length || (text.trim() ? 1 : 0);
  stats.lines.textContent = text.split('\n').length;
}
input.addEventListener('input', count);
count();
</script>
</body>
</html>
