<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter — Shadow's Garden</title>
<meta name="description" content="Format, validate, and minify JSON with syntax highlighting">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
  .editor-container { display: flex; gap: 1rem; height: 60vh; }
  .panel { flex: 1; display: flex; flex-direction: column; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .panel-title { font-size: 0.875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  textarea { 
    flex: 1; 
    background: var(--bg-secondary); 
    border: 1px solid var(--border);
    border-radius: 8px; 
    padding: 1rem; 
    color: var(--text);
    font-family: inherit; 
    font-size: 0.875rem; 
    resize: none;
    line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  #output { 
    background: var(--bg); 
    border: 1px solid var(--border);
    border-radius: 8px; 
    padding: 1rem; 
    overflow: auto;
    white-space: pre-wrap;
    font-size: 0.875rem;
    line-height: 1.5;
  }
  .error { color: #ff6b6b; }
  .valid { color: #51cf66; }
  .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  button {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.875rem;
    transition: all 0.2s;
  }
  button:hover { background: var(--bg-tertiary); border-color: var(--accent); }
  button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  button.primary:hover { opacity: 0.9; }
  .status { font-size: 0.875rem; margin-top: 0.5rem; min-height: 1.5rem; }
  .help { font-size: 0.75rem; color: var(--text-muted); margin-top: 1rem; }
  
  /* JSON Syntax Highlighting */
  .json-key { color: #7c3aed; }
  .json-string { color: #10b981; }
  .json-number { color: #f59e0b; }
  .json-boolean { color: #3b82f6; }
  .json-null { color: #6b7280; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>JSON Formatter</h1>
  <p class="subtitle">Format, validate, and minify JSON</p>
  
  <div class="editor-container">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Input</span>
        <div class="btn-group">
          <button onclick="formatJSON()" class="primary">Format</button>
          <button onclick="minifyJSON()">Minify</button>
          <button onclick="clearAll()">Clear</button>
        </div>
      </div>
      <textarea id="input" placeholder="Paste your JSON here..."></textarea>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Output</span>
        <div class="btn-group">
          <button onclick="copyOutput()">Copy</button>
        </div>
      </div>
      <div id="output"></div>
    </div>
  </div>
  
  <div class="status" id="status"></div>
  
  <div class="help">
    <strong>Tips:</strong> Paste any JSON and click Format to pretty-print with syntax highlighting. 
    Minify removes whitespace. Click any row in output to copy.
  </div>
</div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const status = document.getElementById('status');

function highlight(json) {
  if (typeof json !== 'string') {
    json = JSON.stringify(json, null, 2);
  }
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
    let cls = 'json-number';
    if (/^"/.test(match)) {
      if (/:$/.test(match)) {
        cls = 'json-key';
      } else {
        cls = 'json-string';
      }
    } else if (/true|false/.test(match)) {
      cls = 'json-boolean';
    } else if (/null/.test(match)) {
      cls = 'json-null';
    }
    return '<span class="' + cls + '">' + match + '</span>';
  });
}

function formatJSON() {
  const val = input.value.trim();
  if (!val) {
    output.innerHTML = '';
    status.textContent = '';
    return;
  }
  
  try {
    const parsed = JSON.parse(val);
    const formatted = JSON.stringify(parsed, null, 2);
    output.innerHTML = highlight(formatted);
    status.innerHTML = '<span class="valid">✓ Valid JSON</span> — ' + formatted.length.toLocaleString() + ' characters';
  } catch (e) {
    output.textContent = val;
    status.innerHTML = '<span class="error">✗ ' + e.message + '</span>';
  }
}

function minifyJSON() {
  const val = input.value.trim();
  if (!val) return;
  
  try {
    const parsed = JSON.parse(val);
    const minified = JSON.stringify(parsed);
    output.textContent = minified;
    status.innerHTML = '<span class="valid">✓ Valid JSON</span> — Minified to ' + minified.length.toLocaleString() + ' characters';
  } catch (e) {
    output.textContent = val;
    status.innerHTML = '<span class="error">✗ ' + e.message + '</span>';
  }
}

function clearAll() {
  input.value = '';
  output.innerHTML = '';
  status.textContent = '';
}

function copyOutput() {
  const text = output.textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    status.innerHTML = '<span class="valid">✓ Copied to clipboard</span>';
    setTimeout(() => status.textContent = '', 2000);
  });
}

// Auto-format on paste
input.addEventListener('paste', () => {
  setTimeout(formatJSON, 0);
});

// Keyboard shortcut: Ctrl+Shift+F to format
input.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.shiftKey && e.key === 'F') {
    e.preventDefault();
    formatJSON();
  }
});
</script>
</body>
</html>
