<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter — Shadow's Garden</title>
<meta name="description" content="Format, validate, and minify JSON with syntax highlighting">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #8b5cf6;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 1rem;
    background: #0f0f1a;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }
  h1 {
    color: #fff;
    font-size: 1.5rem;
    margin-bottom: 1rem;
  }
  .toolbar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  button {
    background: rgba(139, 92, 246, 0.2);
    border: 1px solid rgba(139, 92, 246, 0.4);
    border-radius: 0.375rem;
    padding: 0.5rem 1rem;
    color: #c4b5fd;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    background: rgba(139, 92, 246, 0.3);
    border-color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    color: #fff;
  }
  button.primary:hover {
    background: #7c3aed;
  }
  .editor-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    flex: 1;
    min-height: 0;
  }
  @media (max-width: 768px) {
    .editor-container {
      grid-template-columns: 1fr;
    }
  }
  .editor-panel {
    display: flex;
    flex-direction: column;
    min-height: 400px;
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .panel-title {
    color: rgba(255,255,255,0.6);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .stats {
    color: rgba(255,255,255,0.4);
    font-size: 0.7rem;
  }
  textarea {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 1rem;
    color: #e2e8f0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    resize: none;
    outline: none;
    line-height: 1.5;
  }
  textarea:focus {
    border-color: var(--accent);
  }
  .output {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 1rem;
    color: #e2e8f0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .error {
    color: #f87171;
    padding: 1rem;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    border-radius: 0.5rem;
    margin-top: 1rem;
    display: none;
  }
  .error.show {
    display: block;
  }
  .success {
    color: #4ade80;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>📋 JSON Formatter</h1>
  
  <div class="toolbar">
    <button class="primary" onclick="formatJSON()">Format</button>
    <button onclick="minifyJSON()">Minify</button>
    <button onclick="validateJSON()">Validate</button>
    <button onclick="sortKeys()">Sort Keys</button>
    <button onclick="copyOutput()">Copy</button>
    <button onclick="clearAll()">Clear</button>
  </div>
  
  <div class="editor-container">
    <div class="editor-panel">
      <div class="panel-header">
        <span class="panel-title">Input</span>
        <span class="stats" id="inputStats">0 chars</span>
      </div>
      <textarea id="input" placeholder="Paste your JSON here..."></textarea>
    </div>
    
    <div class="editor-panel">
      <div class="panel-header">
        <span class="panel-title">Output</span>
        <span class="stats" id="outputStats">0 chars</span>
      </div>
      <div class="output" id="output"></div>
    </div>
  </div>
  
  <div class="error" id="error"></div>
</div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const error = document.getElementById('error');
const inputStats = document.getElementById('inputStats');
const outputStats = document.getElementById('outputStats');

function showError(msg) {
  error.textContent = msg;
  error.classList.add('show');
  output.textContent = '';
  updateStats();
}

function hideError() {
  error.classList.remove('show');
}

function updateStats() {
  inputStats.textContent = `${input.value.length.toLocaleString()} chars`;
  outputStats.textContent = `${output.textContent.length.toLocaleString()} chars`;
}

function formatJSON() {
  hideError();
  try {
    const parsed = JSON.parse(input.value);
    output.textContent = JSON.stringify(parsed, null, 2);
    updateStats();
  } catch (e) {
    showError('Invalid JSON: ' + e.message);
  }
}

function minifyJSON() {
  hideError();
  try {
    const parsed = JSON.parse(input.value);
    output.textContent = JSON.stringify(parsed);
    updateStats();
  } catch (e) {
    showError('Invalid JSON: ' + e.message);
  }
}

function validateJSON() {
  hideError();
  try {
    const parsed = JSON.parse(input.value);
    output.textContent = '✅ Valid JSON\n\nKeys: ' + countKeys(parsed) + '\nDepth: ' + getDepth(parsed);
    updateStats();
  } catch (e) {
    showError('Invalid JSON: ' + e.message);
  }
}

function sortKeys() {
  hideError();
  try {
    const parsed = JSON.parse(input.value);
    output.textContent = JSON.stringify(sortObjectKeys(parsed), null, 2);
    updateStats();
  } catch (e) {
    showError('Invalid JSON: ' + e.message);
  }
}

function sortObjectKeys(obj) {
  if (Array.isArray(obj)) {
    return obj.map(sortObjectKeys);
  }
  if (obj !== null && typeof obj === 'object') {
    return Object.keys(obj).sort().reduce((result, key) => {
      result[key] = sortObjectKeys(obj[key]);
      return result;
    }, {});
  }
  return obj;
}

function countKeys(obj) {
  if (Array.isArray(obj)) {
    return obj.reduce((sum, item) => sum + countKeys(item), 0);
  }
  if (obj !== null && typeof obj === 'object') {
    return Object.keys(obj).length + Object.values(obj).reduce((sum, val) => sum + countKeys(val), 0);
  }
  return 0;
}

function getDepth(obj, depth = 0) {
  if (Array.isArray(obj)) {
    return Math.max(depth, ...obj.map(item => getDepth(item, depth + 1)));
  }
  if (obj !== null && typeof obj === 'object') {
    return Math.max(depth, ...Object.values(obj).map(val => getDepth(val, depth + 1)));
  }
  return depth + 1;
}

function copyOutput() {
  if (output.textContent) {
    navigator.clipboard.writeText(output.textContent);
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  }
}

function clearAll() {
  input.value = '';
  output.textContent = '';
  hideError();
  updateStats();
}

input.addEventListener('input', updateStats);

// Auto-format on paste
input.addEventListener('paste', () => {
  setTimeout(formatJSON, 0);
});

// Load from localStorage
const saved = localStorage.getItem('jsonFormatterInput');
if (saved) {
  input.value = saved;
  updateStats();
}

input.addEventListener('input', () => {
  localStorage.setItem('jsonFormatterInput', input.value);
});
</script>
</body>
</html>
