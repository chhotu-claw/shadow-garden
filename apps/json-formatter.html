<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter — Shadow's Garden</title>
<meta name="description" content="Format, validate, and minify JSON with syntax highlighting. Paste your JSON and get clean, readable output.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  h1 { margin-bottom: 10px; }
  .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
  .editor-container { display: flex; gap: 20px; flex-wrap: wrap; }
  .editor-box { flex: 1; min-width: 300px; }
  .editor-box label { display: block; margin-bottom: 8px; font-weight: 600; color: #ddd; }
  textarea {
    width: 100%; height: 400px; background: #1a1a2e; color: #eee;
    border: 1px solid #333; border-radius: 8px; padding: 15px;
    font-family: inherit; font-size: 13px; line-height: 1.5;
    resize: vertical; box-sizing: border-box;
  }
  textarea:focus { outline: none; border-color: #4a9eff; }
  .output {
    background: #1a1a2e; color: #eee; border: 1px solid #333;
    border-radius: 8px; padding: 15px; height: 400px;
    font-size: 13px; line-height: 1.5; overflow: auto;
    white-space: pre-wrap; word-break: break-all;
  }
  .output.error { color: #ff6b6b; }
  .output.success { color: #69db7c; }
  .buttons { margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    background: #4a9eff; color: #fff; border: none; padding: 10px 20px;
    border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600;
    transition: background 0.2s;
  }
  button:hover { background: #3a8eef; }
  button.secondary { background: #333; }
  button.secondary:hover { background: #444; }
  .status { margin-top: 15px; padding: 10px; border-radius: 6px; font-size: 13px; }
  .status.valid { background: #1a3a1a; color: #69db7c; }
  .status.invalid { background: #3a1a1a; color: #ff6b6b; }
  .stats { margin-top: 10px; color: #888; font-size: 12px; }
  .sample-link { color: #4a9eff; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>JSON Formatter</h1>
  <div class="subtitle">Format, validate, and minify JSON • <span class="sample-link" onclick="loadSample()">Load sample</span></div>
  
  <div class="buttons">
    <button onclick="formatJSON()">Format</button>
    <button class="secondary" onclick="minifyJSON()">Minify</button>
    <button class="secondary" onclick="copyOutput()">Copy</button>
    <button class="secondary" onclick="clearAll()">Clear</button>
  </div>

  <div class="editor-container">
    <div class="editor-box">
      <label>Input</label>
      <textarea id="input" placeholder='{"key": "value", "number": 42}'></textarea>
    </div>
    <div class="editor-box">
      <label>Output</label>
      <div id="output" class="output"></div>
    </div>
  </div>

  <div id="status" class="status"></div>
  <div id="stats" class="stats"></div>
</div>

<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const status = document.getElementById('status');
  const stats = document.getElementById('stats');

  function formatJSON() {
    try {
      const parsed = JSON.parse(input.value);
      const formatted = JSON.stringify(parsed, null, 2);
      output.textContent = formatted;
      output.className = 'output success';
      status.textContent = '✓ Valid JSON';
      status.className = 'status valid';
      showStats(formatted);
    } catch (e) {
      output.textContent = e.message;
      output.className = 'output error';
      status.textContent = '✗ Invalid JSON';
      status.className = 'status invalid';
      stats.textContent = '';
    }
  }

  function minifyJSON() {
    try {
      const parsed = JSON.parse(input.value);
      const minified = JSON.stringify(parsed);
      output.textContent = minified;
      output.className = 'output success';
      status.textContent = '✓ Valid JSON (minified)';
      status.className = 'status valid';
      showStats(minified);
    } catch (e) {
      output.textContent = e.message;
      output.className = 'output error';
      status.textContent = '✗ Invalid JSON';
      status.className = 'status invalid';
      stats.textContent = '';
    }
  }

  function showStats(json) {
    const lines = json.split('\n').length;
    const chars = json.length;
    stats.textContent = `${lines} lines • ${chars.toLocaleString()} characters`;
  }

  function copyOutput() {
    if (output.textContent && !output.className.includes('error')) {
      navigator.clipboard.writeText(output.textContent);
      status.textContent = '✓ Copied to clipboard';
      status.className = 'status valid';
      setTimeout(() => {
        status.textContent = '✓ Valid JSON';
        status.className = 'status valid';
      }, 1500);
    }
  }

  function clearAll() {
    input.value = '';
    output.textContent = '';
    status.textContent = '';
    stats.textContent = '';
  }

  function loadSample() {
    input.value = JSON.stringify({
      "name": "Shadow's Garden",
      "version": "1.0.0",
      "description": "A collection of useful web tools",
      "tools": ["JSON Formatter", "Timestamp Converter", "Pomodoro Timer"],
      "stats": {
        "users": 1337,
        "rating": 4.8,
        "active": true
      },
      "tags": ["utility", "developer", "tools"]
    }, null, 2);
    formatJSON();
  }

  input.addEventListener('input', () => {
    if (!input.value.trim()) {
      output.textContent = '';
      status.textContent = '';
      stats.textContent = '';
    }
  });
</script>
</body>
</html>
