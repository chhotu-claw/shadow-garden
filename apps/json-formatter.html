<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter — Shadow's Garden</title>
<meta name="description" content="Format, validate, minify, and prettify JSON instantly">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
  .header { margin-bottom: 1.5rem; }
  .input-area, .output-area { margin-bottom: 1rem; }
  label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary, #a6adc8); font-size: 0.9rem; }
  textarea {
    width: 100%;
    height: 200px;
    padding: 1rem;
    border: 1px solid var(--border, #313244);
    border-radius: 8px;
    background: var(--input-bg, #11111b);
    color: var(--text, #cdd6f4);
    font-family: 'Fira Code', 'Monaco', monospace;
    font-size: 14px;
    resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus { outline: 2px solid var(--accent, #cba6f7); border-color: transparent; }
  .buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  button {
    padding: 0.75rem 1.25rem;
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  button.secondary { background: var(--button-bg, #313244); color: var(--text, #cdd6f4); }
  button.secondary:hover { background: var(--accent, #cba6f7); color: var(--bg, #11111b); }
  .error { 
    padding: 1rem; 
    background: rgba(243, 139, 168, 0.15); 
    border: 1px solid #f38ba8; 
    border-radius: 8px; 
    color: #f38ba8;
    margin-bottom: 1rem;
    display: none;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .success {
    padding: 0.75rem;
    background: rgba(166, 227, 161, 0.15);
    border: 1px solid #a6e3a1;
    border-radius: 8px;
    color: #a6e3a1;
    margin-bottom: 1rem;
    display: none;
    text-align: center;
  }
  .stats {
    display: flex;
    gap: 1.5rem;
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: var(--text-secondary, #a6adc8);
  }
  .stat { display: flex; align-items: center; gap: 0.35rem; }
  .copy-btn {
    background: transparent;
    border: 1px solid var(--accent, #cba6f7);
    color: var(--accent, #cba6f7);
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
  }
  .actions-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .sample-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .sample-btn {
    padding: 0.4rem 0.75rem;
    font-size: 0.75rem;
    background: var(--button-bg, #313244);
    color: var(--text, #cdd6f4);
  }
  .sample-btn:hover { background: var(--accent, #cba6f7); color: var(--bg, #11111b); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>{} JSON Formatter</h1>
  <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Format, validate, minify, and prettify JSON</p>

  <div class="input-area">
    <label>Input JSON</label>
    <div class="sample-btns" style="margin-bottom: 0.5rem;">
      <button class="sample-btn" onclick="loadSample('api')">API Response</button>
      <button class="sample-btn" onclick="loadSample('config')">Config File</button>
      <button class="sample-btn" onclick="loadSample('array')">Array Data</button>
      <button class="sample-btn secondary" onclick="clearInput()">Clear</button>
    </div>
    <textarea id="jsonInput" placeholder="Paste your JSON here..."></textarea>
    <div class="stats">
      <span class="stat">📝 <span id="inputChars">0</span> chars</span>
      <span class="stat">📄 <span id="inputLines">0</span> lines</span>
    </div>
  </div>

  <div class="buttons">
    <button onclick="formatJSON()">Prettify</button>
    <button class="secondary" onclick="minifyJSON()">Minify</button>
    <button class="secondary" onclick="validateJSON()">Validate Only</button>
    <button class="secondary" onclick="sortKeys()">Sort Keys</button>
  </div>

  <div class="error" id="errorBox"></div>
  <div class="success" id="successBox">✓ Valid JSON</div>

  <div class="output-area">
    <div class="actions-row">
      <label style="margin-bottom: 0;">Formatted Output</label>
      <button class="copy-btn" onclick="copyOutput()">Copy</button>
    </div>
    <textarea id="jsonOutput" readonly placeholder="Output will appear here..."></textarea>
    <div class="stats">
      <span class="stat">📝 <span id="outputChars">0</span> chars</span>
      <span class="stat">📄 <span id="outputLines">0</span> lines</span>
    </div>
  </div>
</div>

<script>
  const input = document.getElementById('jsonInput');
  const output = document.getElementById('jsonOutput');
  const errorBox = document.getElementById('errorBox');
  const successBox = document.getElementById('successBox');

  const samples = {
    api: `{"status":"success","code":200,"data":{"users":[{"id":1,"name":"Alice","email":"alice@example.com"},{"id":2,"name":"Bob","email":"bob@example.com"}],"pagination":{"page":1,"per_page":10,"total":42}},"timestamp":"2026-03-13T12:00:00Z"}`,
    config: `{"app":{"name":"MyApp","version":"1.0.0","debug":true},"server":{"host":"localhost","port":8080,"ssl":false},"database":{"type":"postgres","connection":{"host":"db.example.com","port":5432,"name":"myapp_db"}},"features":["auth","api","admin"]}`,
    array: `[{"id":1,"product":"Laptop","price":999.99,"inStock":true},{"id":2,"product":"Mouse","price":29.99,"inStock":true},{"id":3,"product":"Keyboard","price":79.99,"inStock":false},{"id":4,"product":"Monitor","price":299.99,"inStock":true}]`
  };

  function loadSample(type) {
    input.value = samples[type];
    updateStats();
    hideMessages();
  }

  function clearInput() {
    input.value = '';
    output.value = '';
    updateStats();
    hideMessages();
  }

  function hideMessages() {
    errorBox.style.display = 'none';
    successBox.style.display = 'none';
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
    successBox.style.display = 'none';
  }

  function showSuccess(msg) {
    successBox.textContent = msg || '✓ Valid JSON';
    successBox.style.display = 'block';
    errorBox.style.display = 'none';
  }

  function updateStats() {
    const inVal = input.value;
    const outVal = output.value;
    document.getElementById('inputChars').textContent = inVal.length;
    document.getElementById('inputLines').textContent = inVal.split('\n').length;
    document.getElementById('outputChars').textContent = outVal.length;
    document.getElementById('outputLines').textContent = outVal.split('\n').length;
  }

  function parseJSON() {
    hideMessages();
    const val = input.value.trim();
    if (!val) {
      showError('Please enter some JSON');
      return null;
    }
    try {
      return JSON.parse(val);
    } catch (e) {
      showError('Parse Error: ' + e.message);
      return null;
    }
  }

  function formatJSON() {
    const parsed = parseJSON();
    if (parsed === null) return;
    output.value = JSON.stringify(parsed, null, 2);
    updateStats();
    showSuccess();
  }

  function minifyJSON() {
    const parsed = parseJSON();
    if (parsed === null) return;
    output.value = JSON.stringify(parsed);
    updateStats();
    showSuccess('✓ Minified');
  }

  function validateJSON() {
    const parsed = parseJSON();
    if (parsed === null) return;
    output.value = JSON.stringify(parsed, null, 2);
    updateStats();
    showSuccess('✓ Valid JSON — ' + Object.keys(parsed).length + ' top-level keys');
  }

  function sortKeys() {
    const parsed = parseJSON();
    if (parsed === null) return;
    
    function sortObj(obj) {
      if (Array.isArray(obj)) return obj.map(sortObj);
      if (obj !== null && typeof obj === 'object') {
        return Object.keys(obj).sort().reduce((result, key) => {
          result[key] = sortObj(obj[key]);
          return result;
        }, {});
      }
      return obj;
    }
    
    output.value = JSON.stringify(sortObj(parsed), null, 2);
    updateStats();
    showSuccess('✓ Keys sorted');
  }

  function copyOutput() {
    if (!output.value) return;
    navigator.clipboard.writeText(output.value).then(() => {
      const btn = document.querySelector('.copy-btn');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }

  input.addEventListener('input', updateStats);
</script>
</body>
</html>
