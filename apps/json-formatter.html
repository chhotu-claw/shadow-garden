<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter & Validator — Shadow's Garden</title>
<meta name="description" content="Format, validate, and minify JSON with syntax highlighting. Paste your JSON and get instant results.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
  .btn {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-primary { background: #22c55e; color: white; }
  .btn-primary:hover { background: #16a34a; }
  .btn-secondary { background: #3b82f6; color: white; }
  .btn-secondary:hover { background: #2563eb; }
  .btn-outline { background: transparent; border: 1px solid #64748b; color: #cbd5e1; }
  .btn-outline:hover { background: #334155; }
  .btn-danger { background: #ef4444; color: white; }
  .btn-danger:hover { background: #dc2626; }
  .editor-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 768px) { .editor-container { grid-template-columns: 1fr; } }
  .panel { display: flex; flex-direction: column; }
  .panel label { font-size: 13px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  textarea {
    flex: 1;
    min-height: 400px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    padding: 15px;
    resize: vertical;
    line-height: 1.6;
  }
  textarea:focus { outline: none; border-color: #22c55e; }
  .output {
    flex: 1;
    min-height: 400px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    padding: 15px;
    overflow: auto;
    white-space: pre-wrap;
    line-height: 1.6;
  }
  .status {
    margin-top: 15px;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 14px;
    display: none;
  }
  .status.valid { background: #166534; color: #bbf7d0; display: block; }
  .status.invalid { background: #991b1b; color: #fecaca; display: block; }
  .status-info { background: #1e3a5f; color: #bfdbfe; display: block; margin-top: 15px; }
  .stats { margin-top: 15px; padding: 15px; background: #0f172a; border-radius: 8px; font-size: 13px; color: #94a3b8; }
  .stats span { color: #e2e8f0; margin-right: 20px; }
  h1 { margin-bottom: 5px; }
  .subtitle { color: #64748b; margin-bottom: 25px; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>JSON Formatter & Validator</h1>
  <p class="subtitle">Format, validate, and minify JSON instantly</p>
  
  <div class="toolbar">
    <button class="btn btn-primary" onclick="formatJSON()">Format</button>
    <button class="btn btn-secondary" onclick="minifyJSON()">Minify</button>
    <button class="btn btn-outline" onclick="validateJSON()">Validate</button>
    <button class="btn btn-outline" onclick="copyOutput()">Copy</button>
    <button class="btn btn-danger" onclick="clearAll()">Clear</button>
  </div>
  
  <div class="editor-container">
    <div class="panel">
      <label>Input JSON</label>
      <textarea id="input" placeholder='Paste your JSON here...

{
  "name": "Shadow",
  "skills": ["coding", "writing", "tinkering"],
  "active": true
}'></textarea>
    </div>
    <div class="panel">
      <label>Output</label>
      <div id="output" class="output"></div>
    </div>
  </div>
  
  <div id="status" class="status"></div>
  <div id="stats" class="stats"></div>
</div>

<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const status = document.getElementById('status');
  const stats = document.getElementById('stats');
  
  function showStatus(message, type) {
    status.className = 'status ' + type;
    status.textContent = message;
  }
  
  function updateStats(json) {
    if (!json) {
      stats.innerHTML = '';
      return;
    }
    const bytes = new Blob([JSON.stringify(json)]).size;
    const keys = countKeys(json);
    stats.innerHTML = `<span>Keys: ${keys}</span><span>Size: ${bytes} bytes</span><span>Depth: ${getDepth(json)}</span>`;
  }
  
  function countKeys(obj, count = 0) {
    if (typeof obj !== 'object' || obj === null) return count;
    for (const key in obj) {
      count++;
      if (typeof obj[key] === 'object' && obj[key] !== null) {
        count += countKeys(obj[key], 0);
      }
    }
    return count;
  }
  
  function getDepth(obj, depth = 1) {
    if (typeof obj !== 'object' || obj === null) return depth;
    let maxDepth = depth;
    for (const key in obj) {
      if (typeof obj[key] === 'object' && obj[key] !== null) {
        maxDepth = Math.max(maxDepth, getDepth(obj[key], depth + 1));
      }
    }
    return maxDepth;
  }
  
  function formatJSON() {
    try {
      const parsed = JSON.parse(input.value);
      const formatted = JSON.stringify(parsed, null, 2);
      output.textContent = formatted;
      showStatus('✓ Valid JSON', 'valid');
      updateStats(parsed);
    } catch (e) {
      output.textContent = '';
      showStatus('✗ ' + e.message, 'invalid');
      stats.innerHTML = '';
    }
  }
  
  function minifyJSON() {
    try {
      const parsed = JSON.parse(input.value);
      const minified = JSON.stringify(parsed);
      output.textContent = minified;
      showStatus('✓ Valid JSON minified', 'valid');
      updateStats(parsed);
    } catch (e) {
      output.textContent = '';
      showStatus('✗ ' + e.message, 'invalid');
      stats.innerHTML = '';
    }
  }
  
  function validateJSON() {
    try {
      const parsed = JSON.parse(input.value);
      showStatus('✓ Valid JSON', 'valid');
      output.textContent = JSON.stringify(parsed, null, 2);
      updateStats(parsed);
    } catch (e) {
      showStatus('✗ ' + e.message, 'invalid');
      output.textContent = '';
      stats.innerHTML = '';
    }
  }
  
  function copyOutput() {
    if (output.textContent) {
      navigator.clipboard.writeText(output.textContent);
      showStatus('✓ Copied to clipboard', 'valid');
    }
  }
  
  function clearAll() {
    input.value = '';
    output.textContent = '';
    status.className = 'status';
    stats.innerHTML = '';
  }
  
  // Auto-validate on input
  let debounceTimer;
  input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      if (input.value.trim()) {
        try {
          const parsed = JSON.parse(input.value);
          showStatus('✓ Valid JSON', 'valid');
          updateStats(parsed);
        } catch (e) {
          // Don't show error while typing, just clear
          status.className = 'status';
        }
      }
    }, 500);
  });
</script>
</body>
</html>
