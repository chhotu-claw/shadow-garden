<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter — Shadow's Garden</title>
<meta name="description" content="Format, validate, and minify JSON instantly. Paste your messy JSON and get clean, readable output.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e5e5e5; min-height: 100vh; display: flex; flex-direction: column; }
  .container { flex: 1; padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 600; }
  .description { color: #666; margin-bottom: 1.5rem; }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; flex: 1; min-height: 0; }
  .panel { display: flex; flex-direction: column; min-height: 300px; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .panel-title { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.1em; }
  textarea { flex: 1; background: #141414; border: 1px solid #222; border-radius: 8px; padding: 1rem; color: #e5e5e5; font-family: 'SF Mono', 'Monaco', 'Consolas', monospace; font-size: 0.9rem; resize: none; line-height: 1.5; }
  textarea:focus { outline: none; border-color: #333; }
  .toolbar { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
  button { background: #1a1a1a; border: 1px solid #333; color: #e5e5e5; padding: 0.6rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  button:hover { background: #252525; border-color: #444; }
  button.primary { background: #7aa2f7; color: #0d0d0d; border-color: #7aa2f7; font-weight: 500; }
  button.primary:hover { background: #89b4fa; }
  .error { color: #f7768e; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
  .error.show { display: block; }
  .stats { font-size: 0.8rem; color: #666; margin-top: 0.5rem; }
  @media (max-width: 768px) { .panels { grid-template-columns: 1fr; } }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>JSON Formatter</h1>
  <p class="description">Format, validate, and minify JSON. Paste your messy JSON and get clean output.</p>
  
  <div class="panels">
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Input</span></div>
      <textarea id="input" placeholder='{"key": "value"}'></textarea>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Output</span></div>
      <textarea id="output" placeholder="Formatted JSON will appear here..." readonly></textarea>
    </div>
  </div>
  
  <div class="toolbar">
    <button class="primary" id="format">Format</button>
    <button id="minify">Minify</button>
    <button id="validate">Validate</button>
    <button id="clear">Clear</button>
    <button id="copy">Copy Output</button>
    <button id="swap">Swap ⇄</button>
  </div>
  
  <div class="error" id="error"></div>
  <div class="stats" id="stats"></div>
</div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const error = document.getElementById('error');
const stats = document.getElementById('stats');

function showError(msg) {
  error.textContent = msg;
  error.classList.add('show');
}

function hideError() {
  error.classList.remove('show');
}

function updateStats(text) {
  const lines = text.split('\n').length;
  const chars = text.length;
  const size = new Blob([text]).size;
  stats.textContent = `${lines} lines · ${chars} chars · ${size.toLocaleString()} bytes`;
}

function format() {
  hideError();
  try {
    const parsed = JSON.parse(input.value);
    const formatted = JSON.stringify(parsed, null, 2);
    output.value = formatted;
    updateStats(formatted);
  } catch (e) {
    showError('Invalid JSON: ' + e.message);
    output.value = '';
    stats.textContent = '';
  }
}

function minify() {
  hideError();
  try {
    const parsed = JSON.parse(input.value);
    const minified = JSON.stringify(parsed);
    output.value = minified;
    updateStats(minified);
  } catch (e) {
    showError('Invalid JSON: ' + e.message);
    output.value = '';
    stats.textContent = '';
  }
}

function validate() {
  hideError();
  try {
    JSON.parse(input.value);
    showError('');
    output.value = 'Valid JSON ✓';
    stats.textContent = '';
  } catch (e) {
    showError('Invalid JSON: ' + e.message);
    output.value = '';
    stats.textContent = '';
  }
}

function clear() {
  input.value = '';
  output.value = '';
  hideError();
  stats.textContent = '';
}

async function copy() {
  if (!output.value) return;
  try {
    await navigator.clipboard.writeText(output.value);
    const btn = document.getElementById('copy');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  } catch (e) {
    showError('Failed to copy');
  }
}

function swap() {
  const temp = input.value;
  input.value = output.value;
  output.value = temp;
  updateStats(output.value);
}

document.getElementById('format').addEventListener('click', format);
document.getElementById('minify').addEventListener('click', minify);
document.getElementById('validate').addEventListener('click', validate);
document.getElementById('clear').addEventListener('click', clear);
document.getElementById('copy').addEventListener('click', copy);
document.getElementById('swap').addEventListener('click', swap);

input.addEventListener('input', () => { hideError(); });
</script>
</body>
</html>
