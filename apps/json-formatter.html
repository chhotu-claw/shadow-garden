<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter — Shadow's Garden</title>
<meta name="description" content="Format, validate, and minify JSON. Paste messy JSON, get clean output.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; padding: 1rem; box-sizing: border-box; }
  .container { width: 100%; max-width: 800px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 1.5rem; }
  .editor-row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .editor-col { flex: 1; min-width: 300px; }
  label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary); }
  textarea { width: 100%; height: 300px; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-family: var(--mono); font-size: 0.9rem; resize: vertical; box-sizing: border-box; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .btn-row { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
  button { padding: 0.6rem 1rem; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
  button:hover { opacity: 0.9; }
  button.secondary { background: var(--border); color: var(--text); }
  .status { padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; font-family: var(--mono); font-size: 0.9rem; }
  .status.error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
  .status.success { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
  .options { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .options label { display: flex; align-items: center; gap: 0.25rem; font-weight: 400; cursor: pointer; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>JSON Formatter</h1>
    <p class="subtitle">Format, validate, and minify JSON</p>
    
    <div class="editor-row">
      <div class="editor-col">
        <label>Input</label>
        <textarea id="input" placeholder='Paste JSON here... e.g. {"name":"test","value":123}'></textarea>
      </div>
      <div class="editor-col">
        <label>Output</label>
        <textarea id="output" readonly placeholder="Formatted output will appear here..."></textarea>
      </div>
    </div>
    
    <div class="btn-row">
      <button onclick="format()">Format</button>
      <button class="secondary" onclick="minify()">Minify</button>
      <button class="secondary" onclick="validate()">Validate</button>
      <button class="secondary" onclick="copy()">Copy Output</button>
      <button class="secondary" onclick="clear()">Clear</button>
    </div>
    
    <div id="status"></div>
  </div>
  
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    
    function show(msg, isError = false) {
      status.textContent = msg;
      status.className = 'status ' + (isError ? 'error' : 'success');
    }
    
    function format() {
      try {
        const obj = JSON.parse(input.value);
        output.value = JSON.stringify(obj, null, 2);
        show('Formatted successfully');
      } catch (e) {
        show('Error: ' + e.message, true);
      }
    }
    
    function minify() {
      try {
        const obj = JSON.parse(input.value);
        output.value = JSON.stringify(obj);
        show('Minified successfully');
      } catch (e) {
        show('Error: ' + e.message, true);
      }
    }
    
    function validate() {
      try {
        JSON.parse(input.value);
        show('Valid JSON');
      } catch (e) {
        show('Invalid JSON: ' + e.message, true);
      }
    }
    
    function copy() {
      if (output.value) {
        navigator.clipboard.writeText(output.value).then(() => show('Copied!')).catch(() => show('Copy failed', true));
      }
    }
    
    function clear() {
      input.value = '';
      output.value = '';
      status.textContent = '';
    }
  </script>
</body>
</html>
