<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter & Validator — Shadow's Garden</title>
<meta name="description" content="Format, validate, minify, and query JSON. All local in your browser — nothing leaves your device.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { --accent: #0d9488; }
  .container { max-width: 1000px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--accent); color: white; }
  .btn.primary { background: var(--accent); color: white; }
  .btn.primary:hover { opacity: 0.9; }
  .editor-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .editor-container { grid-template-columns: 1fr; } }
  .panel { display: flex; flex-direction: column; }
  .panel label { font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
  textarea {
    flex: 1;
    min-height: 400px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-family: 'Fira Code', monospace;
    font-size: 13px;
    resize: vertical;
  }
  .status {
    padding: 12px;
    border-radius: 6px;
    margin-top: 16px;
    font-size: 14px;
  }
  .status.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .status.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .info { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>JSON Formatter & Validator</h1>
  <div class="toolbar">
    <button class="btn primary" onclick="formatJSON()">Format</button>
    <button class="btn" onclick="minifyJSON()">Minify</button>
    <button class="btn" onclick="validateJSON()">Validate</button>
    <button class="btn" onclick="clearAll()">Clear</button>
    <button class="btn" onclick="copyOutput()">Copy</button>
  </div>
  <div class="editor-container">
    <div class="panel">
      <label>Input JSON</label>
      <textarea id="input" placeholder="Paste your JSON here..."></textarea>
    </div>
    <div class="panel">
      <label>Output</label>
      <textarea id="output" readonly placeholder="Formatted JSON will appear here..."></textarea>
    </div>
  </div>
  <div id="status"></div>
  <div class="info">Runs entirely in your browser — nothing is sent to any server.</div>
</div>
<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const status = document.getElementById('status');

  function showStatus(msg, type) {
    status.className = 'status ' + type;
    status.textContent = msg;
  }

  function formatJSON() {
    try {
      const parsed = JSON.parse(input.value);
      output.value = JSON.stringify(parsed, null, 2);
      showStatus('Valid JSON — formatted successfully', 'success');
    } catch (e) {
      showStatus('Invalid JSON: ' + e.message, 'error');
    }
  }

  function minifyJSON() {
    try {
      const parsed = JSON.parse(input.value);
      output.value = JSON.stringify(parsed);
      showStatus('Valid JSON — minified', 'success');
    } catch (e) {
      showStatus('Invalid JSON: ' + e.message, 'error');
    }
  }

  function validateJSON() {
    try {
      const parsed = JSON.parse(input.value);
      const type = Array.isArray(parsed) ? 'array' : typeof parsed;
      const keys = parsed && typeof parsed === 'object' ? Object.keys(parsed).length : 0;
      showStatus(`Valid JSON — ${type} with ${keys} top-level keys`, 'success');
      output.value = JSON.stringify(parsed, null, 2);
    } catch (e) {
      showStatus('Invalid JSON: ' + e.message, 'error');
    }
  }

  function clearAll() {
    input.value = '';
    output.value = '';
    status.textContent = '';
    status.className = 'status';
  }

  function copyOutput() {
    if (output.value) {
      navigator.clipboard.writeText(output.value);
      showStatus('Copied to clipboard', 'success');
    }
  }

  // Allow Ctrl+Enter to format
  input.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') formatJSON();
  });
</script>
</body>
</html>
