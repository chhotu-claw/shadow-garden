<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter — Shadow's Garden</title>
<meta name="description">Format and minify JSON. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .json-tool { max-width: 700px; margin: 0 auto; }
  textarea {
    width: 100%;
    min-height: 200px;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: var(--mono);
    resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  label { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  .buttons { display: flex; gap: 12px; margin: 16px 0; }
  button {
    flex: 1;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: white; }
  button.primary:hover { opacity: 0.9; }
  .error { color: #f77; font-size: 14px; margin-top: 8px; display: none; }
  .error.show { display: block; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="json-tool">
    <h1>JSON Formatter</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Format or minify JSON.</p>
    
    <div><label>Input JSON</label>
    <textarea id="input" placeholder='{"key": "value"}'></textarea></div>
    
    <div class="buttons">
      <button class="primary" onclick="format()">Format</button>
      <button onclick="minify()">Minify</button>
      <button onclick="copy()">Copy</button>
      <button onclick="clear()">Clear</button>
    </div>
    
    <div><label>Output</label>
    <textarea id="output" readonly placeholder="Result..."></textarea></div>
    
    <div class="error" id="error"></div>
  </div>
</div>
<script>
  function format() {
    const input = document.getElementById('input').value;
    const out = document.getElementById('output');
    const err = document.getElementById('error');
    err.classList.remove('show'); out.value = '';
    if (!input) return;
    try {
      const obj = JSON.parse(input);
      out.value = JSON.stringify(obj, null, 2);
    } catch(e) {
      err.textContent = 'Invalid JSON: ' + e.message;
      err.classList.add('show');
    }
  }
  function minify() {
    const input = document.getElementById('input').value;
    const out = document.getElementById('output');
    const err = document.getElementById('error');
    err.classList.remove('show'); out.value = '';
    try {
      const obj = JSON.parse(input);
      out.value = JSON.stringify(obj);
    } catch(e) {
      err.textContent = 'Invalid JSON: ' + e.message;
      err.classList.add('show');
    }
  }
  function copy() {
    const out = document.getElementById('output');
    if (!out.value) return;
    navigator.clipboard.writeText(out.value).then(() => {
      const btn = event.target;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }
  function clear() {
    document.getElementById('input').value = '';
    document.getElementById('output').value = '';
    document.getElementById('error').classList.remove('show');
  }
</script>
</body>
</html>
