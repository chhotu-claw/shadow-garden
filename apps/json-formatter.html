<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter & Validator — Shadow's Garden</title>
<meta name="description" content="Format, validate, and minify JSON with syntax highlighting — all local, no server."</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e5e5e5; padding: 2rem; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .description { color: #888; margin-bottom: 1.5rem; }
  .controls { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  button { padding: 0.5rem 1rem; background: #1a1a1a; color: #e5e5e5; border: 1px solid #333; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
  button:hover { background: #252525; }
  button.primary { background: #1a3a1a; border-color: #2a5a2a; }
  .container { display: flex; flex-direction: column; gap: 1rem; }
  textarea { width: 100%; height: 300px; background: #111; color: #e5e5e5; border: 1px solid #333; border-radius: 4px; padding: 1rem; font-family: 'SF Mono', 'Consolas', monospace; font-size: 0.85rem; resize: vertical; }
  textarea:focus { outline: none; border-color: #444; }
  .status { padding: 0.5rem; border-radius: 4px; font-size: 0.85rem; }
  .status.valid { background: #1a3a1a; color: #7af782; }
  .status.invalid { background: #3a1a1a; color: #f77a7a; }
  .status.empty { background: #1a1a1a; color: #666; }
  kbd { background: #222; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.8rem; }
</style>
</head>
<body data-page-type="app">
  <h1>JSON Formatter & Validator</h1>
  <p class="description">Format, validate, and minify JSON — nothing leaves your browser.</p>
  
  <div class="controls">
    <button class="primary" onclick="formatJSON()">Format</button>
    <button onclick="minifyJSON()">Minify</button>
    <button onclick="validateJSON()">Validate</button>
    <button onclick="clearJSON()">Clear</button>
    <button onclick="copyJSON()">Copy</button>
  </div>
  
  <div class="container">
    <textarea id="jsonInput" placeholder="Paste JSON here..."></textarea>
    <div id="status" class="status empty">Enter JSON to validate</div>
  </div>

  <script>
    const input = document.getElementById('jsonInput');
    const status = document.getElementById('status');
    
    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status ' + type;
    }
    
    function formatJSON() {
      try {
        const parsed = JSON.parse(input.value);
        input.value = JSON.stringify(parsed, null, 2);
        showStatus('✓ Valid JSON — formatted', 'valid');
      } catch (e) {
        showStatus('✗ Invalid JSON: ' + e.message, 'invalid');
      }
    }
    
    function minifyJSON() {
      try {
        const parsed = JSON.parse(input.value);
        input.value = JSON.stringify(parsed);
        showStatus('✓ Valid JSON — minified', 'valid');
      } catch (e) {
        showStatus('✗ Invalid JSON: ' + e.message, 'invalid');
      }
    }
    
    function validateJSON() {
      try {
        JSON.parse(input.value);
        showStatus('✓ Valid JSON', 'valid');
      } catch (e) {
        showStatus('✗ Invalid JSON: ' + e.message, 'invalid');
      }
    }
    
    function clearJSON() {
      input.value = '';
      showStatus('Cleared', 'empty');
    }
    
    function copyJSON() {
      if (!input.value) return;
      navigator.clipboard.writeText(input.value).then(() => {
        showStatus('Copied to clipboard', 'valid');
      });
    }
    
    input.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') {
        formatJSON();
      }
    });
    
    input.addEventListener('input', function() {
      if (!input.value) {
        showStatus('Enter JSON to validate', 'empty');
      }
    });
  </script>
</body>
</html>
