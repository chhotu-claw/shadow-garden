<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter — Shadow's Garden</title>
<meta name="description" content="Format, validate, and prettify JSON. Paste ugly, get pretty. No ads, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-mono); }
  .container { max-width: 900px; }
  textarea {
    width: 100%;
    height: 300px;
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-secondary);
    color: var(--text);
    resize: vertical;
    tab-size: 2;
  }
  textarea:focus { outline: 2px solid var(--accent); }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 12px 0;
  }
  button {
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    background: var(--accent);
    color: var(--bg);
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button.secondary {
    background: var(--bg-secondary);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .status {
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }
  .status.valid { display: block; background: rgba(0, 200, 100, 0.15); color: #2c8; }
  .status.invalid { display: block; background: rgba(200, 50, 50, 0.15); color: #c55; }
  .info {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 8px;
  }
  .stats {
    display: flex;
    gap: 16px;
    margin: 8px 0;
    font-size: 13px;
  }
  .stat { color: var(--text-secondary); }
  .stat span { color: var(--text); font-weight: 600; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>JSON Formatter</h1>
  <div class="meta">Paste JSON, get pretty</div>
  
  <textarea id="input" placeholder="Paste your JSON here..."></textarea>
  
  <div class="controls">
    <button id="formatBtn">Format</button>
    <button id="minifyBtn" class="secondary">Minify</button>
    <button id="copyBtn" class="secondary">Copy</button>
    <button id="clearBtn" class="secondary">Clear</button>
  </div>
  
  <div id="status" class="status"></div>
  
  <div class="stats">
    <div class="stat">Keys: <span id="keyCount">0</span></div>
    <div class="stat">Size: <span id="size">0</span> bytes</div>
  </div>
  
  <div class="info">Tip: Paste indented or minified JSON. Format will prettify it with 2-space indent.</div>
</div>

<script>
  const input = document.getElementById('input');
  const status = document.getElementById('status');
  const keyCount = document.getElementById('keyCount');
  const sizeEl = document.getElementById('size');
  
  function countKeys(obj) {
    if (typeof obj !== 'object' || obj === null) return 0;
    let count = 0;
    for (let k in obj) {
      count++;
      if (typeof obj[k] === 'object' && obj[k] !== null) {
        count += countKeys(obj[k]);
      }
    }
    return count;
  }
  
  function updateStats(text) {
    try {
      const obj = JSON.parse(text);
      keyCount.textContent = countKeys(obj);
    } catch {
      keyCount.textContent = '—';
    }
    sizeEl.textContent = new TextEncoder().encode(text).length;
  }
  
  document.getElementById('formatBtn').addEventListener('click', () => {
    const raw = input.value.trim();
    if (!raw) return;
    try {
      const obj = JSON.parse(raw);
      input.value = JSON.stringify(obj, null, 2);
      status.textContent = '✓ Valid JSON';
      status.className = 'status valid';
      updateStats(input.value);
    } catch (e) {
      status.textContent = '✗ Invalid JSON: ' + e.message;
      status.className = 'status invalid';
    }
  });
  
  document.getElementById('minifyBtn').addEventListener('click', () => {
    const raw = input.value.trim();
    if (!raw) return;
    try {
      const obj = JSON.parse(raw);
      input.value = JSON.stringify(obj);
      status.textContent = '✓ Minified';
      status.className = 'status valid';
      updateStats(input.value);
    } catch (e) {
      status.textContent = '✗ Invalid JSON: ' + e.message;
      status.className = 'status invalid';
    }
  });
  
  document.getElementById('copyBtn').addEventListener('click', () => {
    if (!input.value) return;
    navigator.clipboard.writeText(input.value).then(() => {
      status.textContent = '✓ Copied to clipboard';
      status.className = 'status valid';
    });
  });
  
  document.getElementById('clearBtn').addEventListener('click', () => {
    input.value = '';
    status.className = 'status';
    keyCount.textContent = '0';
    sizeEl.textContent = '0';
  });
  
  input.addEventListener('input', () => {
    updateStats(input.value);
    status.className = 'status';
  });
</script>
</body>
</html>
