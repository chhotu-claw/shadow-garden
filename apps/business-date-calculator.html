<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Date Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate business days between dates, add/subtract working days, skip weekends and holidays">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: 'IBM Plex Mono', monospace; }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { color: #0ff; margin-bottom: 0.5rem; }
  .card {
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  label { display: block; color: #888; margin-bottom: 0.5rem; font-size: 0.85rem; }
  input, select {
    width: 100%;
    padding: 0.75rem;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #fff;
    font-family: inherit;
    font-size: 1rem;
    margin-bottom: 1rem;
    box-sizing: border-box;
  }
  input:focus, select:focus {
    outline: none;
    border-color: #0ff;
  }
  .row { display: flex; gap: 1rem; }
  .row > div { flex: 1; }
  button {
    width: 100%;
    padding: 0.75rem;
    background: #0ff;
    color: #000;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: #0cc; }
  #result {
    background: #0a0a0a;
    border: 1px solid #0ff;
    border-radius: 8px;
    padding: 1.5rem;
    margin-top: 1rem;
    display: none;
  }
  #result.show { display: block; }
  .result-label { color: #666; font-size: 0.8rem; margin-bottom: 0.25rem; }
  .result-value { color: #0ff; font-size: 1.5rem; font-weight: bold; }
  .result-detail { color: #888; margin-top: 0.5rem; font-size: 0.9rem; }
  .holidays-list {
    margin-top: 1rem;
    padding: 0.75rem;
    background: #1a1a1a;
    border-radius: 4px;
  }
  .holidays-list label { margin-bottom: 0.5rem; }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
  .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    color: #aaa;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .checkbox-group input[type="checkbox"] { width: auto; margin: 0; }
  .preset-btns { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .preset-btn {
    padding: 0.4rem 0.75rem;
    background: #222;
    color: #888;
    border: 1px solid #333;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .preset-btn:hover { border-color: #0ff; color: #0ff; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>📅 Business Date Calculator</h1>
  <p style="color: #666; margin-bottom: 1.5rem;">Calculate working days, skip weekends and holidays</p>
  
  <div class="card">
    <label>Operation</label>
    <select id="operation">
      <option value="diff">Days Between Dates</option>
      <option value="add">Add Business Days</option>
      <option value="sub">Subtract Business Days</option>
    </select>

    <div class="row">
      <div>
        <label>Start Date</label>
        <input type="date" id="startDate">
      </div>
      <div>
        <label>End Date / Days</label>
        <input type="date" id="endDate">
        <input type="number" id="daysNum" placeholder="Number of days" style="display:none">
      </div>
    </div>

    <label>Weekend Days to Skip</label>
    <div class="checkbox-group">
      <label><input type="checkbox" value="0" checked> Sun</label>
      <label><input type="checkbox" value="1" checked> Mon</label>
      <label><input type="checkbox" value="2" checked> Tue</label>
      <label><input type="checkbox" value="3" checked> Wed</label>
      <label><input type="checkbox" value="4" checked> Thu</label>
      <label><input type="checkbox" value="5" checked> Fri</label>
      <label><input type="checkbox" value="6" checked> Sat</label>
    </div>

    <label>Preset Ranges</label>
    <div class="preset-btns">
      <button class="preset-btn" onclick="setRange(7)">7 days</button>
      <button class="preset-btn" onclick="setRange(14)">14 days</button>
      <button class="preset-btn" onclick="setRange(30)">30 days</button>
      <button class="preset-btn" onclick="setRange(90)">90 days</button>
      <button class="preset-btn" onclick="setRange(365)">1 year</button>
    </div>

    <button onclick="calculate()">Calculate</button>
  </div>

  <div id="result">
    <div class="result-label">Result</div>
    <div class="result-value" id="resultValue"></div>
    <div class="result-detail" id="resultDetail"></div>
  </div>
</div>

<script>
  // Set default dates
  const today = new Date();
  const nextWeek = new Date(today);
  nextWeek.setDate(today.getDate() + 7);
  
  document.getElementById('startDate').value = formatDate(today);
  document.getElementById('endDate').value = formatDate(nextWeek);

  document.getElementById('operation').addEventListener('change', function() {
    const endDate = document.getElementById('endDate');
    const daysNum = document.getElementById('daysNum');
    if (this.value === 'diff') {
      endDate.style.display = 'block';
      daysNum.style.display = 'none';
    } else {
      endDate.style.display = 'none';
      daysNum.style.display = 'block';
    }
  });

  function formatDate(d) {
    return d.toISOString().split('T')[0];
  }

  function setRange(days) {
    document.getElementById('operation').value = 'diff';
    const start = new Date(document.getElementById('startDate').value);
    const end = new Date(start);
    end.setDate(start.getDate() + days);
    document.getElementById('endDate').value = formatDate(end);
    calculate();
  }

  function getWeekendDays() {
    const checkboxes = document.querySelectorAll('.checkbox-group input:checked');
    return Array.from(checkboxes).map(cb => parseInt(cb.value));
  }

  function isWorkingDay(date, weekendDays) {
    const day = date.getDay();
    return weekendDays.includes(day);
  }

  function calculate() {
    const operation = document.getElementById('operation').value;
    const startStr = document.getElementById('startDate').value;
    const endStr = document.getElementById('endDate').value;
    const daysNum = parseInt(document.getElementById('daysNum').value) || 0;
    const weekendDays = getWeekendDays();
    
    if (!startStr) {
      alert('Please select a start date');
      return;
    }

    const start = new Date(startStr);
    start.setHours(0, 0, 0, 0);
    
    const resultDiv = document.getElementById('result');
    const resultValue = document.getElementById('resultValue');
    const resultDetail = document.getElementById('resultDetail');
    
    let businessDays = 0;
    let totalDays = 0;
    let current = new Date(start);
    
    if (operation === 'diff') {
      if (!endStr) {
        alert('Please select an end date');
        return;
      }
      const end = new Date(endStr);
      end.setHours(0, 0, 0, 0);
      
      const direction = end > start ? 1 : -1;
      
      while (current.getTime() !== end.getTime()) {
        totalDays++;
        if (isWorkingDay(current, weekendDays)) {
          businessDays++;
        }
        current.setDate(current.getDate() + direction);
      }
      
      resultValue.textContent = businessDays + ' business days';
      resultDetail.textContent = `Total calendar days: ${totalDays} (${direction > 0 ? 'forward' : 'backward'})`;
      
    } else if (operation === 'add' || operation === 'sub') {
      if (!daysNum || daysNum <= 0) {
        alert('Please enter number of days');
        return;
      }
      
      let remaining = daysNum;
      const direction = operation === 'add' ? 1 : -1;
      
      while (remaining > 0) {
        current.setDate(current.getDate() + direction);
        if (isWorkingDay(current, weekendDays)) {
          remaining--;
        }
        totalDays++;
      }
      
      const resultDate = formatDate(current);
      resultValue.textContent = resultDate;
      resultDetail.textContent = `${operation === 'add' ? 'Added' : 'Subtracted'} ${daysNum} business days from ${formatDate(start)}`;
    }
    
    resultDiv.classList.add('show');
  }
</script>
</body>
</html>
