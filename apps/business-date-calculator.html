<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Days Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate working days between two dates. Exclude weekends and optionally add holidays.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 { margin-bottom: 0.5rem; }
  .input-group {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .input-group > div {
    flex: 1;
    min-width: 200px;
  }
  .input-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: var(--text);
  }
  .input-group input {
    width: 100%;
    padding: 0.75rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    background: var(--bg);
    color: var(--text);
    box-sizing: border-box;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .checkbox-group input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: var(--accent);
  }
  .checkbox-group label {
    color: var(--text);
    cursor: pointer;
  }
  button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.75rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  .result {
    margin-top: 2rem;
    padding: 1.5rem;
    background: var(--card);
    border-radius: 12px;
    display: none;
  }
  .result.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-main {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    margin-bottom: 1rem;
  }
  .result-detail {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
  }
  .result-detail .item {
    padding: 1rem;
    background: var(--bg);
    border-radius: 8px;
    text-align: center;
  }
  .result-detail .value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }
  .result-detail .label {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .error {
    color: #e74c3c;
    margin-top: 1rem;
    display: none;
  }
  .error.show { display: block; }
  .holidays-input {
    display: none;
    margin-bottom: 1.5rem;
  }
  .holidays-input.show { display: block; }
  .holidays-input textarea {
    width: 100%;
    min-height: 100px;
    padding: 0.75rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    background: var(--bg);
    color: var(--text);
    resize: vertical;
    box-sizing: border-box;
    font-family: monospace;
  }
  .holidays-input textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .presets {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .presets button {
    background: var(--card);
    color: var(--text);
    border: 2px solid var(--border);
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
  }
  .presets button:hover {
    background: var(--border);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Business Days Calculator</h1>
  <p style="color: var(--muted); margin-bottom: 1.5rem;">Calculate working days between two dates, excluding weekends.</p>
  
  <div class="input-group">
    <div>
      <label for="startDate">Start Date</label>
      <input type="date" id="startDate">
    </div>
    <div>
      <label for="endDate">End Date</label>
      <input type="date" id="endDate">
    </div>
  </div>
  
  <div class="presets">
    <button onclick="setPreset('week')">Past Week</button>
    <button onclick="setPreset('month')">Past Month</button>
    <button onclick="setPreset('quarter')">Past Quarter</button>
    <button onclick="setPreset('year')">Past Year</button>
  </div>
  
  <div class="checkbox-group">
    <input type="checkbox" id="excludeHolidays">
    <label for="excludeHolidays">Exclude US Federal Holidays</label>
  </div>
  
  <button onclick="calculate()">Calculate</button>
  
  <div class="error" id="error"></div>
  
  <div class="result" id="result">
    <div class="result-main" id="resultMain"></div>
    <div class="result-detail">
      <div class="item">
        <div class="value" id="totalDays">0</div>
        <div class="label">Total Days</div>
      </div>
      <div class="item">
        <div class="value" id="weekendDays">0</div>
        <div class="label">Weekend Days</div>
      </div>
      <div class="item">
        <div class="value" id="holidayDays">0</div>
        <div class="label">Holidays Excluded</div>
      </div>
      <div class="item">
        <div class="value" id="workingDays">0</div>
        <div class="label">Working Days</div>
      </div>
    </div>
  </div>
</div>

<script>
  // US Federal Holidays for 2025-2027
  const usHolidays = [
    // 2025
    '2025-01-01', '2025-01-20', '2025-02-17', '2025-05-26', '2025-06-19', '2025-07-04', '2025-09-01', '2025-10-13', '2025-11-11', '2025-11-27', '2025-12-25',
    // 2026
    '2026-01-01', '2026-01-20', '2026-02-16', '2026-05-25', '2026-06-19', '2026-07-03', '2026-07-04', '2026-09-07', '2026-10-12', '2026-11-11', '2026-11-26', '2026-12-25',
    // 2027
    '2027-01-01', '2027-01-18', '2027-02-15', '2027-05-31', '2027-06-18', '2027-07-04', '2027-09-06', '2027-10-11', '2027-11-11', '2027-11-25', '2027-12-24', '2027-12-25',
  ];
  
  function setPreset(type) {
    const today = new Date();
    const startDate = document.getElementById('startDate');
    const endDate = document.getElementById('endDate');
    
    endDate.value = formatDate(today);
    
    const start = new Date(today);
    switch(type) {
      case 'week':
        start.setDate(start.getDate() - 7);
        break;
      case 'month':
        start.setMonth(start.getMonth() - 1);
        break;
      case 'quarter':
        start.setMonth(start.getMonth() - 3);
        break;
      case 'year':
        start.setFullYear(start.getFullYear() - 1);
        break;
    }
    startDate.value = formatDate(start);
  }
  
  function formatDate(date) {
    return date.toISOString().split('T')[0];
  }
  
  function isWeekend(date) {
    const day = date.getDay();
    return day === 0 || day === 6;
  }
  
  function isHoliday(dateStr) {
    return usHolidays.includes(dateStr);
  }
  
  function calculate() {
    const startInput = document.getElementById('startDate').value;
    const endInput = document.getElementById('endDate').value;
    const excludeHolidays = document.getElementById('excludeHolidays').checked;
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');
    
    errorEl.classList.remove('show');
    resultEl.classList.remove('show');
    
    if (!startInput || !endInput) {
      errorEl.textContent = 'Please select both start and end dates.';
      errorEl.classList.add('show');
      return;
    }
    
    let start = new Date(startInput);
    let end = new Date(endInput);
    
    // Swap if needed
    if (start > end) {
      [start, end] = [end, start];
    }
    
    let totalDays = 0;
    let weekendDays = 0;
    let holidayDays = 0;
    let workingDays = 0;
    
    let current = new Date(start);
    while (current <= end) {
      const dateStr = formatDate(current);
      totalDays++;
      
      if (isWeekend(current)) {
        weekendDays++;
      } else if (excludeHolidays && isHoliday(dateStr)) {
        holidayDays++;
      } else {
        workingDays++;
      }
      
      current.setDate(current.getDate() + 1);
    }
    
    document.getElementById('resultMain').textContent = `${workingDays} working days`;
    document.getElementById('totalDays').textContent = totalDays;
    document.getElementById('weekendDays').textContent = weekendDays;
    document.getElementById('holidayDays').textContent = excludeHolidays ? holidayDays : 'N/A';
    document.getElementById('workingDays').textContent = workingDays;
    
    resultEl.classList.add('show');
  }
  
  // Set defaults
  const today = new Date();
  const lastMonth = new Date(today);
  lastMonth.setMonth(lastMonth.getMonth() - 1);
  
  document.getElementById('startDate').value = formatDate(lastMonth);
  document.getElementById('endDate').value = formatDate(today);
</script>
</body>
</html>
