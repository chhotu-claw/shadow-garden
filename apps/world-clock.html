<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Clock — Shadow's Garden</title>
<meta name="description" content="A world clock showing multiple timezones at once. Add/remove cities, see current time worldwide.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: 'Fira Code', monospace; padding: 2rem; max-width: 800px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .add-city { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .add-city select, .add-city button { padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--fg); }
  .add-city button { background: var(--accent); color: var(--bg); border: none; cursor: pointer; }
  .clock-grid { display: grid; gap: 1rem; }
  .clock-card { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; }
  .clock-info { display: flex; flex-direction: column; gap: 0.25rem; }
  .clock-city { font-weight: 600; font-size: 1.1rem; }
  .clock-time { font-size: 1.5rem; color: var(--accent); }
  .clock-date { font-size: 0.85rem; color: var(--fg-muted); }
  .clock-remove { background: none; border: none; color: var(--fg-muted); cursor: pointer; font-size: 1.2rem; padding: 0.25rem; }
  .clock-remove:hover { color: var(--fg); }
  .local-badge { font-size: 0.7rem; background: var(--accent); color: var(--bg); padding: 0.15rem 0.4rem; border-radius: 4px; margin-left: 0.5rem; }
  .empty { color: var(--fg-muted); text-align: center; padding: 2rem; }
</style>
</head>
<body data-page-type="app">
  <h1>World Clock</h1>
  <p style="color: var(--fg-muted); margin-bottom: 2rem;">Track time across the world</p>
  
  <div class="add-city">
    <select id="timezoneSelect">
      <option value="">Select a city...</option>
      <option value="America/New_York">New York (EST/EDT)</option>
      <option value="America/Los_Angeles">Los Angeles (PST/PDT)</option>
      <option value="America/Chicago">Chicago (CST/CDT)</option>
      <option value="Europe/London">London (GMT/BST)</option>
      <option value="Europe/Paris">Paris (CET/CEST)</option>
      <option value="Europe/Berlin">Berlin (CET/CEST)</option>
      <option value="Asia/Dubai">Dubai (GST)</option>
      <option value="Asia/Kolkata">Mumbai (IST)</option>
      <option value="Asia/Singapore">Singapore (SGT)</option>
      <option value="Asia/Tokyo">Tokyo (JST)</option>
      <option value="Asia/Shanghai">Shanghai (CST)</option>
      <option value="Australia/Sydney">Sydney (AEST/AEDT)</option>
    </select>
    <button id="addBtn">Add City</button>
  </div>

  <div id="clockGrid" class="clock-grid"></div>

  <script>
    const cities = JSON.parse(localStorage.getItem('worldClockCities') || '["Asia/Dubai","America/New_York","Europe/London"]');
    const grid = document.getElementById('clockGrid');
    const select = document.getElementById('timezoneSelect');
    const addBtn = document.getElementById('addBtn');

    function getCityLabel(tz) {
      const map = {
        'America/New_York': 'New York',
        'America/Los_Angeles': 'Los Angeles',
        'America/Chicago': 'Chicago',
        'Europe/London': 'London',
        'Europe/Paris': 'Paris',
        'Europe/Berlin': 'Berlin',
        'Asia/Dubai': 'Dubai',
        'Asia/Kolkata': 'Mumbai',
        'Asia/Singapore': 'Singapore',
        'Asia/Tokyo': 'Tokyo',
        'Asia/Shanghai': 'Shanghai',
        'Australia/Sydney': 'Sydney'
      };
      return map[tz] || tz;
    }

    function formatTime(tz) {
      return new Date().toLocaleTimeString('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    }

    function formatDate(tz) {
      return new Date().toLocaleDateString('en-US', { timeZone: tz, weekday: 'short', month: 'short', day: 'numeric' });
    }

    function isLocal(tz) {
      return tz === Intl.DateTimeFormat().resolvedOptions().timeZone;
    }

    function render() {
      if (cities.length === 0) {
        grid.innerHTML = '<div class="empty">Add a city to get started</div>';
        return;
      }
      grid.innerHTML = cities.map((tz, i) => `
        <div class="clock-card">
          <div class="clock-info">
            <div class="clock-city">${getCityLabel(tz)}${isLocal(tz) ? '<span class="local-badge">LOCAL</span>' : ''}</div>
            <div class="clock-time">${formatTime(tz)}</div>
            <div class="clock-date">${formatDate(tz)}</div>
          </div>
          <button class="clock-remove" onclick="removeCity(${i})">×</button>
        </div>
      `).join('');
    }

    window.removeCity = function(i) {
      cities.splice(i, 1);
      localStorage.setItem('worldClockCities', JSON.stringify(cities));
      render();
    };

    addBtn.addEventListener('click', () => {
      const tz = select.value;
      if (tz && !cities.includes(tz)) {
        cities.push(tz);
        localStorage.setItem('worldClockCities', JSON.stringify(cities));
        render();
        select.value = '';
      }
    });

    setInterval(render, 1000);
    render();
  </script>
</body>
</html>
