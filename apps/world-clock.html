<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Clock — Shadow's Garden</title>
<meta name="description" content="Track multiple time zones with a beautiful clock display. Add cities, compare times across zones.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --text: #c9d1d9;
    --accent: #58a6ff;
    --border: #30363d;
  }
  
  body {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }
  
  .subtitle {
    color: #8b949e;
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  
  .controls {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  
  select, button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  button:hover, select:hover {
    border-color: var(--accent);
  }
  
  button.primary {
    background: var(--accent);
    color: #0d1117;
    border-color: var(--accent);
    font-weight: 600;
  }
  
  button.primary:hover {
    opacity: 0.9;
  }
  
  .clocks-grid {
    display: grid;
    gap: 1rem;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
  
  .clock-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    position: relative;
    animation: fadeIn 0.3s ease;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .clock-card .city {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }
  
  .clock-card .zone {
    font-size: 0.7rem;
    color: #8b949e;
    margin-bottom: 1rem;
  }
  
  .clock-card .time {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  
  .clock-card .date {
    font-size: 0.75rem;
    color: #8b949e;
    margin-top: 0.5rem;
  }
  
  .clock-card .remove {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    background: transparent;
    border: none;
    color: #8b949e;
    font-size: 1.2rem;
    padding: 0.25rem;
    opacity: 0;
    transition: opacity 0.2s;
  }
  
  .clock-card:hover .remove {
    opacity: 1;
  }
  
  .clock-card .remove:hover {
    color: #f85149;
  }
  
  .clock-card.daytime {
    border-color: #3fb950;
  }
  
  .clock-card.nighttime {
    border-color: #a371f7;
  }
  
  .empty-state {
    text-align: center;
    padding: 3rem;
    color: #8b949e;
  }
  
  .empty-state p {
    margin-bottom: 1rem;
  }
  
  @media (max-width: 600px) {
    body { padding: 1rem; }
    .clock-card .time { font-size: 1.5rem; }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>World Clock</h1>
    <p class="subtitle">Track time across zones</p>
    
    <div class="controls">
      <select id="timezoneSelect">
        <option value="">Select a city...</option>
      </select>
      <button class="primary" onclick="addClock()">Add</button>
      <button onclick="resetClocks()">Reset</button>
    </div>
    
    <div class="clocks-grid" id="clocksGrid">
      <div class="empty-state">
        <p>No clocks yet. Add a city to get started.</p>
      </div>
    </div>
  </div>

  <script>
    const cities = [
      { name: "Dubai", zone: "Asia/Dubai", offset: 4 },
      { name: "New York", zone: "America/New_York", offset: -5 },
      { name: "Los Angeles", zone: "America/Los_Angeles", offset: -8 },
      { name: "London", zone: "Europe/London", offset: 0 },
      { name: "Paris", zone: "Europe/Paris", offset: 1 },
      { name: "Tokyo", zone: "Asia/Tokyo", offset: 9 },
      { name: "Sydney", zone: "Australia/Sydney", offset: 11 },
      { name: "Singapore", zone: "Asia/Singapore", offset: 8 },
      { name: "Mumbai", zone: "Asia/Kolkata", offset: 5.5 },
      { name: "Hong Kong", zone: "Asia/Hong_Kong", offset: 8 },
      { name: "Berlin", zone: "Europe/Berlin", offset: 1 },
      { name: "Toronto", zone: "America/Toronto", offset: -5 },
      { name: "Chicago", zone: "America/Chicago", offset: -6 },
      { name: "Denver", zone: "America/Denver", offset: -7 },
      { name: "Seoul", zone: "Asia/Seoul", offset: 9 },
      { name: "Shanghai", zone: "Asia/Shanghai", offset: 8 },
      { name: "Moscow", zone: "Europe/Moscow", offset: 3 },
      { name: "São Paulo", zone: "America/Sao_Paulo", offset: -3 },
      { name: "Cairo", zone: "Africa/Cairo", offset: 2 },
      { name: "Johannesburg", zone: "Africa/Johannesburg", offset: 2 },
    ];

    let clocks = JSON.parse(localStorage.getItem('worldClocks') || '[]');
    
    // Initialize with Dubai if empty
    if (clocks.length === 0) {
      clocks = ['Asia/Dubai'];
    }

    function init() {
      const select = document.getElementById('timezoneSelect');
      cities.forEach(city => {
        const opt = document.createElement('option');
        opt.value = city.zone;
        opt.textContent = `${city.name} (UTC${city.offset >= 0 ? '+' : ''}${city.offset})`;
        select.appendChild(opt);
      });
      
      // Set to first available if not in list
      if (!clocks.includes('Asia/Dubai') && clocks.length > 0) {
        clocks = ['Asia/Dubai'];
      } else if (!clocks.includes('Asia/Dubai')) {
        clocks = ['Asia/Dubai'];
      }
      
      render();
      setInterval(updateTimes, 1000);
    }

    function addClock() {
      const select = document.getElementById('timezoneSelect');
      const zone = select.value;
      if (zone && !clocks.includes(zone)) {
        clocks.push(zone);
        save();
        render();
      }
      select.value = '';
    }

    function removeClock(zone) {
      clocks = clocks.filter(c => c !== zone);
      save();
      render();
    }

    function resetClocks() {
      clocks = ['Asia/Dubai'];
      save();
      render();
    }

    function save() {
      localStorage.setItem('worldClocks', JSON.stringify(clocks));
    }

    function getCityInfo(zone) {
      return cities.find(c => c.zone === zone) || { name: zone, zone: zone };
    }

    function getTimeInZone(zone) {
      return new Date(new Date().toLocaleString('en-US', { timeZone: zone }));
    }

    function formatTime(date) {
      return date.toLocaleTimeString('en-US', { 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit',
        hour12: false 
      });
    }

    function formatDate(date) {
      return date.toLocaleDateString('en-US', { 
        weekday: 'short', 
        month: 'short', 
        day: 'numeric' 
      });
    }

    function isDaytime(zone) {
      const time = getTimeInZone(zone);
      const hour = time.getHours();
      return hour >= 6 && hour < 18;
    }

    function render() {
      const grid = document.getElementById('clocksGrid');
      
      if (clocks.length === 0) {
        grid.innerHTML = '<div class="empty-state"><p>No clocks yet. Add a city to get started.</p></div>';
        return;
      }

      grid.innerHTML = clocks.map(zone => {
        const city = getCityInfo(zone);
        const time = getTimeInZone(zone);
        const isDay = isDaytime(zone);
        
        return `
          <div class="clock-card ${isDay ? 'daytime' : 'nighttime'}">
            <button class="remove" onclick="removeClock('${zone}')">×</button>
            <div class="city">${city.name}</div>
            <div class="zone">${city.zone}</div>
            <div class="time" data-zone="${zone}">${formatTime(time)}</div>
            <div class="date">${formatDate(time)}</div>
          </div>
        `;
      }).join('');
    }

    function updateTimes() {
      document.querySelectorAll('.clock-card .time').forEach(el => {
        const zone = el.dataset.zone;
        const time = getTimeInZone(zone);
        el.textContent = formatTime(time);
        
        // Update card class based on time
        const card = el.closest('.clock-card');
        if (isDaytime(zone)) {
          card.classList.add('daytime');
          card.classList.remove('nighttime');
        } else {
          card.classList.add('nighttime');
          card.classList.remove('daytime');
        }
      });
    }

    init();
  </script>
</body>
</html>
