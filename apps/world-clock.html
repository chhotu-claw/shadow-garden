<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Clock — Shadow's Garden</title>
<meta name="description" content="Track timezones across major cities. All local, persists to localStorage.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .clock-app { max-width: 700px; margin: 0 auto; }
  .add-city {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .add-city select {
    flex: 1;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
  }
  .add-city select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .add-city button {
    padding: 12px 20px;
    background: var(--accent);
    border: 2px solid var(--accent);
    border-radius: 8px;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }
  .clock-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .clock-card {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    position: relative;
  }
  .clock-card.my-time {
    border-color: var(--accent);
  }
  .clock-card.my-time::before {
    content: 'YOUR TIME';
    position: absolute;
    top: -8px;
    left: 12px;
    background: var(--accent);
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .city-name {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .clock-time {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    font-family: var(--mono);
  }
  .clock-seconds {
    font-size: 16px;
    color: var(--text-secondary);
  }
  .clock-date {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }
  .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .clock-card:hover .delete-btn {
    opacity: 1;
  }
  .delete-btn:hover {
    color: #f77;
  }
  .empty-state {
    text-align: center;
    color: #666;
    padding: 40px 20px;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="clock-app">
    <h1>World Clock</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Track timezones. Your local time is marked.</p>
    
    <div class="add-city">
      <select id="citySelect">
        <option value="">Select a city...</option>
        <option value="America/New_York">New York</option>
        <option value="America/Los_Angeles">Los Angeles</option>
        <option value="America/Chicago">Chicago</option>
        <option value="Europe/London">London</option>
        <option value="Europe/Paris">Paris</option>
        <option value="Europe/Berlin">Berlin</option>
        <option value="Asia/Dubai">Dubai</option>
        <option value="Asia/Kolkata">Mumbai/Delhi</option>
        <option value="Asia/Singapore">Singapore</option>
        <option value="Asia/Hong_Kong">Hong Kong</option>
        <option value="Asia/Tokyo">Tokyo</option>
        <option value="Australia/Sydney">Sydney</option>
      </select>
      <button onclick="addCity()">Add City</button>
    </div>
    
    <div class="clock-grid" id="clockGrid"></div>
  </div>
</div>
<script>
  const STORAGE_KEY = 'shadow-world-clock';
  const cityLabels = {
    'America/New_York': 'New York',
    'America/Los_Angeles': 'Los Angeles',
    'America/Chicago': 'Chicago',
    'Europe/London': 'London',
    'Europe/Paris': 'Paris',
    'Europe/Berlin': 'Berlin',
    'Asia/Dubai': 'Dubai',
    'Asia/Kolkata': 'Mumbai',
    'Asia/Singapore': 'Singapore',
    'Asia/Hong_Kong': 'Hong Kong',
    'Asia/Tokyo': 'Tokyo',
    'Australia/Sydney': 'Sydney'
  };
  
  let cities = [];
  
  function loadCities() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      cities = JSON.parse(saved);
    } else {
      // Default: Dubai + London + Tokyo
      cities = ['Asia/Dubai', 'Europe/London', 'Asia/Tokyo'];
    }
  }
  
  function saveCities() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cities));
  }
  
  function addCity() {
    const select = document.getElementById('citySelect');
    const tz = select.value;
    if (!tz || cities.includes(tz)) return;
    cities.push(tz);
    saveCities();
    render();
  }
  
  function removeCity(tz) {
    cities = cities.filter(c => c !== tz);
    saveCities();
    render();
  }
  
  function updateTimes() {
    const now = new Date();
    const cards = document.querySelectorAll('.clock-card');
    
    cards.forEach((card, idx) => {
      if (idx >= cities.length) return;
      const tz = cities[idx];
      const timeEl = card.querySelector('.clock-time');
      const secEl = card.querySelector('.clock-seconds');
      const dateEl = card.querySelector('.clock-date');
      
      try {
        const options = { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false };
        const timeStr = now.toLocaleString('en-US', options);
        const [hour, minute] = timeStr.split(':');
        const second = now.getSeconds().toString().padStart(2, '0');
        
        timeEl.textContent = `${hour}:${minute}`;
        secEl.textContent = `:${second}`;
        
        const dateStr = now.toLocaleDateString('en-US', { timeZone: tz, weekday: 'short', month: 'short', day: 'numeric' });
        dateEl.textContent = dateStr;
      } catch (e) {
        // Invalid timezone
      }
    });
  }
  
  function render() {
    const grid = document.getElementById('clockGrid');
    const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    
    if (cities.length === 0) {
      grid.innerHTML = '<div class="empty-state">No cities. Add one above to track timezones.</div>';
      return;
    }
    
    grid.innerHTML = cities.map(tz => {
      const isLocal = tz === localTz;
      return `<div class="clock-card ${isLocal ? 'my-time' : ''}" data-tz="${tz}">
        <button class="delete-btn" onclick="removeCity('${tz}')" title="Remove">×</button>
        <div class="city-name">${cityLabels[tz] || tz}</div>
        <div>
          <span class="clock-time">--:--</span><span class="clock-seconds">:--</span>
        </div>
        <div class="clock-date"></div>
      </div>`;
    }).join('');
    
    updateTimes();
  }
  
  // Update every second
  setInterval(updateTimes, 1000);
  
  loadCities();
  render();
</script>
</body>
</html>
