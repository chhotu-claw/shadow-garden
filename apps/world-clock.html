<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Clock — Shadow's Garden</title>
<meta name="description" content="Track time across multiple cities worldwide. Add and remove locations, see time differences at a glance.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 {
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  .add-city {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .add-city select {
    flex: 1;
    min-width: 200px;
    padding: 0.75rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    background: var(--bg);
    color: var(--text);
  }
  .add-city select:focus {
    outline: none;
    border-color: var(--accent);
  }
  button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:hover {
    opacity: 0.9;
  }
  button:active {
    transform: scale(0.98);
  }
  .remove-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.4rem 0.8rem;
    font-size: 0.85rem;
  }
  .remove-btn:hover {
    color: #e74c3c;
    border-color: #e74c3c;
  }
  .clock-grid {
    display: grid;
    gap: 1rem;
  }
  .clock-card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .clock-info {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .city-name {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
  }
  .city-timezone {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .clock-time {
    text-align: right;
  }
  .time-display {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .date-display {
    font-size: 0.9rem;
    color: var(--muted);
  }
  .diff-display {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }
  .diff-display.today {
    color: #27ae60;
  }
  .diff-display.ahead {
    color: var(--accent);
  }
  .diff-display.behind {
    color: #e74c3c;
  }
  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
  }
  .local-badge {
    background: var(--accent);
    color: var(--bg);
    font-size: 0.7rem;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    margin-left: 0.5rem;
    font-weight: 600;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>World Clock</h1>
  <p class="subtitle">Track time across multiple cities worldwide.</p>
  
  <div class="add-city">
    <select id="citySelect">
      <option value="">Select a city...</option>
      <option value="America/New_York">New York (EST/EDT)</option>
      <option value="America/Los_Angeles">Los Angeles (PST/PDT)</option>
      <option value="America/Chicago">Chicago (CST/CDT)</option>
      <option value="America/Denver">Denver (MST/MDT)</option>
      <option value="America/Toronto">Toronto (EST/EDT)</option>
      <option value="America/Vancouver">Vancouver (PST/PDT)</option>
      <option value="America/Sao_Paulo">São Paulo (BRT)</option>
      <option value="America/Mexico_City">Mexico City (CST)</option>
      <option value="Europe/London">London (GMT/BST)</option>
      <option value="Europe/Paris">Paris (CET/CEST)</option>
      <option value="Europe/Berlin">Berlin (CET/CEST)</option>
      <option value="Europe/Amsterdam">Amsterdam (CET/CEST)</option>
      <option value="Europe/Madrid">Madrid (CET/CEST)</option>
      <option value="Europe/Rome">Rome (CET/CEST)</option>
      <option value="Europe/Stockholm">Stockholm (CET/CEST)</option>
      <option value="Europe/Moscow">Moscow (MSK)</option>
      <option value="Asia/Dubai">Dubai (GST)</option>
      <option value="Asia/Kolkata">Mumbai/Delhi (IST)</option>
      <option value="Asia/Bangkok">Bangkok (ICT)</option>
      <option value="Asia/Singapore">Singapore (SGT)</option>
      <option value="Asia/Hong_Kong">Hong Kong (HKT)</option>
      <option value="Asia/Shanghai">Shanghai (CST)</option>
      <option value="Asia/Tokyo">Tokyo (JST)</option>
      <option value="Asia/Seoul">Seoul (KST)</option>
      <option value="Australia/Sydney">Sydney (AEST/AEDT)</option>
      <option value="Australia/Melbourne">Melbourne (AEST/AEDT)</option>
      <option value="Pacific/Auckland">Auckland (NZST/NZDT)</option>
    </select>
    <button onclick="addCity()">Add City</button>
  </div>
  
  <div class="clock-grid" id="clockGrid">
    <div class="empty-state">Add cities to see their times here.</div>
  </div>
</div>

<script>
  const cityNames = {
    'America/New_York': 'New York',
    'America/Los_Angeles': 'Los Angeles',
    'America/Chicago': 'Chicago',
    'America/Denver': 'Denver',
    'America/Toronto': 'Toronto',
    'America/Vancouver': 'Vancouver',
    'America/Sao_Paulo': 'São Paulo',
    'America/Mexico_City': 'Mexico City',
    'Europe/London': 'London',
    'Europe/Paris': 'Paris',
    'Europe/Berlin': 'Berlin',
    'Europe/Amsterdam': 'Amsterdam',
    'Europe/Madrid': 'Madrid',
    'Europe/Rome': 'Rome',
    'Europe/Stockholm': 'Stockholm',
    'Europe/Moscow': 'Moscow',
    'Asia/Dubai': 'Dubai',
    'Asia/Kolkata': 'Mumbai',
    'Asia/Bangkok': 'Bangkok',
    'Asia/Singapore': 'Singapore',
    'Asia/Hong_Kong': 'Hong Kong',
    'Asia/Shanghai': 'Shanghai',
    'Asia/Tokyo': 'Tokyo',
    'Asia/Seoul': 'Seoul',
    'Australia/Sydney': 'Sydney',
    'Australia/Melbourne': 'Melbourne',
    'Pacific/Auckland': 'Auckland'
  };

  let cities = JSON.parse(localStorage.getItem('worldClockCities') || '["Asia/Dubai","America/New_York","Europe/London"]');
  
  function saveCities() {
    localStorage.setItem('worldClockCities', JSON.stringify(cities));
  }

  function getLocalTimezone() {
    return Intl.DateTimeFormat().resolvedOptions().timeZone;
  }

  function formatTime(date, timezone) {
    return date.toLocaleTimeString('en-US', {
      timeZone: timezone,
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    });
  }

  function formatDate(date, timezone) {
    return date.toLocaleDateString('en-US', {
      timeZone: timezone,
      weekday: 'short',
      month: 'short',
      day: 'numeric'
    });
  }

  function getTimeDiff(tz1, tz2) {
    const now = new Date();
    const t1 = new Date(now.toLocaleString('en-US', { timeZone: tz1 }));
    const t2 = new Date(now.toLocaleString('en-US', { timeZone: tz2 }));
    const diffMs = t1 - t2;
    const diffHours = Math.round(diffMs / (1000 * 60 * 60));
    
    if (diffHours === 0) return { text: 'Same time', class: 'today' };
    if (diffHours > 0) return { text: `+${diffHours}h from your time`, class: 'ahead' };
    return { text: `${diffHours}h from your time`, class: 'behind' };
  }

  function renderClocks() {
    const grid = document.getElementById('clockGrid');
    const localTz = getLocalTimezone();
    
    if (cities.length === 0) {
      grid.innerHTML = '<div class="empty-state">Add cities to see their times here.</div>';
      return;
    }

    grid.innerHTML = cities.map((tz, index) => {
      const now = new Date();
      const time = formatTime(now, tz);
      const date = formatDate(now, tz);
      const diff = getTimeDiff(localTz, tz);
      const cityName = cityNames[tz] || tz.split('/').pop().replace(/_/g, ' ');
      const isLocal = tz === localTz;
      
      return `
        <div class="clock-card">
          <div class="clock-info">
            <div class="city-name">
              ${cityName}
              ${isLocal ? '<span class="local-badge">LOCAL</span>' : ''}
            </div>
            <div class="city-timezone">${tz}</div>
          </div>
          <div class="clock-time">
            <div class="time-display">${time}</div>
            <div class="date-display">${date}</div>
            ${!isLocal ? `<div class="diff-display ${diff.class}">${diff.text}</div>` : ''}
          </div>
          <button class="remove-btn" onclick="removeCity(${index})">✕</button>
        </div>
      `;
    }).join('');
  }

  function addCity() {
    const select = document.getElementById('citySelect');
    const tz = select.value;
    if (!tz || cities.includes(tz)) return;
    cities.push(tz);
    saveCities();
    renderClocks();
    select.value = '';
  }

  function removeCity(index) {
    cities.splice(index, 1);
    saveCities();
    renderClocks();
  }

  // Auto-refresh every second
  setInterval(renderClocks, 1000);
  
  // Initial render
  renderClocks();
</script>
</body>
</html>
