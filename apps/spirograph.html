<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spirograph — Shadow's Garden</title>
<meta name="description" content="Interactive spirograph — parametric curves that create beautiful geometric patterns.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'IBM Plex Mono', monospace;
  }
  canvas {
    display: block;
  }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 10;
  }
  .btn {
    background: rgba(20, 20, 30, 0.85);
    border: 1px solid rgba(255, 100, 150, 0.3);
    color: rgba(255, 180, 200, 0.9);
    padding: 10px 18px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn:hover {
    background: rgba(40, 20, 40, 0.9);
    border-color: rgba(255, 100, 150, 0.6);
    box-shadow: 0 0 20px rgba(255, 100, 150, 0.3);
  }
  .sliders {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 20, 0.9);
    border: 1px solid rgba(255, 100, 150, 0.2);
    padding: 15px;
    z-index: 10;
    min-width: 180px;
  }
  .slider-group {
    margin-bottom: 12px;
  }
  .slider-group label {
    display: block;
    color: rgba(255, 150, 180, 0.7);
    font-size: 10px;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .slider-group input {
    width: 100%;
    accent-color: #ff6496;
  }
  .slider-group span {
    color: rgba(255, 200, 220, 0.5);
    font-size: 10px;
  }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(150, 150, 180, 0.5);
    font-size: 11px;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">click to draw • space to clear • drag sliders to change</div>
  <div class="sliders">
    <div class="slider-group">
      <label>R (outer radius)</label>
      <input type="range" id="R" min="10" max="200" value="150">
      <span id="Rv">150</span>
    </div>
    <div class="slider-group">
      <label>r (inner radius)</label>
      <input type="range" id="r" min="10" max="150" value="52">
      <span id="rv">52</span>
    </div>
    <div class="slider-group">
      <label>d (pen offset)</label>
      <input type="range" id="d" min="10" max="200" value="80">
      <span id="dv">80</span>
    </div>
    <div class="slider-group">
      <label>speed</label>
      <input type="range" id="speed" min="1" max="20" value="5">
      <span id="speedv">5</span>
    </div>
    <div class="slider-group">
      <label>opacity</label>
      <input type="range" id="opacity" min="1" max="100" value="30">
      <span id="opacityv">30</span>
    </div>
  </div>
  <div class="controls">
    <button class="btn" onclick="setPreset(150, 52, 80)">Classic</button>
    <button class="btn" onclick="setPreset(120, 31, 70)">Flower</button>
    <button class="btn" onclick="setPreset(180, 18, 90)">Star</button>
    <button class="btn" onclick="setPreset(100, 33, 60)">Heart</button>
    <button class="btn" onclick="setPreset(140, 60, 120)">Spiral</button>
    <button class="btn" onclick="clearCanvas()">Clear</button>
    <button class="btn" onclick="toggleAnimate()">Pause</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let centerX, centerY;
    let R = 150, r = 52, d = 80;
    let t = 0;
    let speed = 5;
    let opacity = 0.3;
    let isAnimating = true;
    let hue = 0;
    let isDrawing = false;
    let lastX = null, lastY = null;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      centerX = width / 2;
      centerY = height / 2;
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, width, height);
    }
    
    window.addEventListener('resize', resize);
    resize();
    
    function spirographPoint(R, r, d, t) {
      const x = (R - r) * Math.cos(t) + d * Math.cos(((R - r) / r) * t);
      const y = (R - r) * Math.sin(t) - d * Math.sin(((R - r) / r) * t);
      return { x: centerX + x, y: centerY + y };
    }
    
    function draw() {
      if (!isAnimating) return;
      
      const point = spirographPoint(R, r, d, t);
      
      if (lastX !== null) {
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(point.x, point.y);
        ctx.strokeStyle = `hsla(${(hue + t * 2) % 360}, 80%, 65%, ${opacity})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      
      lastX = point.x;
      lastY = point.y;
      
      t += speed * 0.01;
      hue += 0.5;
      
      // Reset after full pattern
      const lcm = (a, b) => (a * b) / gcd(a, b);
      const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
      const period = lcm(R, r) / r * Math.PI * 2;
      
      if (t > period * 2) {
        t = 0;
        lastX = null;
        lastY = null;
      }
      
      requestAnimationFrame(draw);
    }
    
    // Sliders
    ['R', 'r', 'd', 'speed', 'opacity'].forEach(id => {
      const slider = document.getElementById(id);
      const span = document.getElementById(id + 'v');
      slider.addEventListener('input', () => {
        const val = parseInt(slider.value);
        span.textContent = val;
        if (id === 'R') R = val;
        else if (id === 'r') r = val;
        else if (id === 'd') d = val;
        else if (id === 'speed') speed = val;
        else if (id === 'opacity') opacity = val / 100;
        t = 0;
        lastX = null;
        lastY = null;
      });
    });
    
    function setPreset(newR, newr, newd) {
      R = newR; r = newr; d = newd;
      document.getElementById('R').value = R;
      document.getElementById('Rv').value = R;
      document.getElementById('r').value = r;
      document.getElementById('rv').value = r;
      document.getElementById('d').value = d;
      document.getElementById('dv').value = d;
      t = 0;
      lastX = null;
      lastY = null;
    }
    
    function clearCanvas() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, width, height);
      t = 0;
      lastX = null;
      lastY = null;
    }
    
    function toggleAnimate() {
      isAnimating = !isAnimating;
      if (isAnimating) draw();
    }
    
    canvas.addEventListener('click', (e) => {
      if (e.target === canvas) {
        t = 0;
        lastX = null;
        lastY = null;
      }
    });
    
    draw();
  </script>
</body>
</html>
