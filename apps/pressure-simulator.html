<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressure Simulator — Shadow's Garden</title>
<meta name="description" content="Particle-based pressure and temperature simulator — watch gas laws emerge from collisions.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'IBM Plex Mono', monospace;
  }
  canvas {
    display: block;
  }
  .controls {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
  }
  .btn {
    background: rgba(20, 20, 30, 0.9);
    border: 1px solid rgba(100, 150, 255, 0.3);
    color: rgba(180, 200, 255, 0.9);
    padding: 10px 16px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: inherit;
  }
  .btn:hover {
    background: rgba(40, 40, 60, 0.9);
    border-color: rgba(100, 150, 255, 0.6);
  }
  .stats {
    position: fixed;
    top: 20px;
    right: 20px;
    color: rgba(150, 180, 255, 0.7);
    font-size: 12px;
    text-align: right;
    z-index: 10;
  }
  .stat-value {
    color: rgba(100, 200, 255, 1);
    font-size: 18px;
  }
  .instructions {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: rgba(150, 180, 255, 0.5);
    font-size: 11px;
    z-index: 10;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button class="btn" onclick="setPreset('default')">Default</button>
    <button class="btn" onclick="setPreset('hot')">Hot</button>
    <button class="btn" onclick="setPreset('cold')">Cold</button>
    <button class="btn" onclick="setPreset('compressed')">Compressed</button>
    <button class="btn" onclick="setPreset('expanded')">Expanded</button>
    <button class="btn" onclick="toggleWallDrag()">Move Wall</button>
  </div>
  <div class="stats">
    <div>Particles: <span class="stat-value" id="particleCount">0</span></div>
    <div>Temperature: <span class="stat-value" id="temperature">0</span> K</div>
    <div>Pressure: <span class="stat-value" id="pressure">0</span> Pa</div>
    <div>Volume: <span class="stat-value" id="volume">0</span> px²</div>
  </div>
  <div class="instructions">
    Click to add particles • Drag orange wall to compress
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    let walls = [];
    let draggingWall = null;
    let draggingCorner = null;
    let mouseX = 0, mouseY = 0;
    let mouseDown = false;
    
    const PARTICLE_RADIUS = 4;
    const BOLTZMANN = 0.01;
    let baseTemperature = 300;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      initWalls();
    }
    
    window.addEventListener('resize', resize);
    
    function initWalls() {
      walls = [
        { x1: 50, y1: 50, x2: 50, y2: height - 50, type: 'fixed' },
        { x1: width - 50, y1: 50, x2: width - 50, y2: height - 50, type: 'fixed' },
        { x1: 50, y1: 50, x2: width - 50, y2: 50, type: 'fixed' },
        { x1: 50, y1: height - 50, x2: width - 50, y2: height - 50, type: 'movable', color: '#ff6b35' },
        { x1: 50, y1: height - 50, x2: width - 50, y2: height - 50, cornerX: (width - 50) / 2 + 50, cornerY: height - 50 }
      ];
    }
    
    function setPreset(name) {
      particles = [];
      const numParticles = 150;
      
      switch(name) {
        case 'default':
          baseTemperature = 300;
          for (let i = 0; i < numParticles; i++) {
            addParticle(width/4 + Math.random() * width/2, height/4 + Math.random() * height/2);
          }
          walls[3].y1 = height - 50;
          walls[3].y2 = height - 50;
          break;
        case 'hot':
          baseTemperature = 800;
          for (let i = 0; i < numParticles; i++) {
            addParticle(width/4 + Math.random() * width/2, height/4 + Math.random() * height/2);
          }
          break;
        case 'cold':
          baseTemperature = 100;
          for (let i = 0; i < numParticles; i++) {
            addParticle(width/4 + Math.random() * width/2, height/4 + Math.random() * height/2);
          }
          break;
        case 'compressed':
          baseTemperature = 300;
          for (let i = 0; i < numParticles; i++) {
            addParticle(width/4 + Math.random() * width/2, height/4 + Math.random() * height/4);
          }
          walls[3].y1 = height * 0.7;
          walls[3].y2 = height * 0.7;
          break;
        case 'expanded':
          baseTemperature = 300;
          for (let i = 0; i < numParticles; i++) {
            addParticle(100 + Math.random() * (width - 200), 100 + Math.random() * (height - 300));
          }
          walls[3].y1 = height - 150;
          walls[3].y2 = height - 150;
          break;
      }
    }
    
    function addParticle(x, y) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.sqrt(baseTemperature * BOLTZMANN * 2) * (0.5 + Math.random());
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color: getParticleColor(baseTemperature)
      });
    }
    
    function getParticleColor(temp) {
      if (temp < 200) return '#4fc3f7';
      if (temp < 400) return '#81c784';
      if (temp < 600) return '#fff176';
      if (temp < 800) return '#ffb74d';
      return '#e57373';
    }
    
    function updateParticles() {
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        
        // Wall collisions
        walls.forEach(wall => {
          if (wall.type === 'fixed') {
            if (wall.x1 === wall.x2) { // Vertical wall
              if (p.x - PARTICLE_RADIUS < wall.x1 && p.y >= Math.min(wall.y1, wall.y2) && p.y <= Math.max(wall.y1, wall.y2)) {
                p.x = wall.x1 + PARTICLE_RADIUS;
                p.vx *= -0.9;
              }
              if (p.x + PARTICLE_RADIUS > wall.x1 && p.y >= Math.min(wall.y1, wall.y2) && p.y <= Math.max(wall.y1, wall.y2)) {
                p.x = wall.x1 - PARTICLE_RADIUS;
                p.vx *= -0.9;
              }
            } else { // Horizontal wall
              if (p.y - PARTICLE_RADIUS < wall.y1 && p.x >= Math.min(wall.x1, wall.x2) && p.x <= Math.max(wall.x1, wall.x2)) {
                p.y = wall.y1 + PARTICLE_RADIUS;
                p.vy *= -0.9;
              }
              if (p.y + PARTICLE_RADIUS > wall.y1 && p.x >= Math.min(wall.x1, wall.x2) && p.x <= Math.max(wall.x1, wall.x2)) {
                p.y = wall.y1 - PARTICLE_RADIUS;
                p.vy *= -0.9;
              }
            }
          }
        });
        
        // Particle-particle collisions
        particles.forEach(p2 => {
          if (p === p2) return;
          const dx = p2.x - p.x;
          const dy = p2.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < PARTICLE_RADIUS * 2 && dist > 0) {
            const nx = dx / dist;
            const ny = dy / dist;
            
            const dvx = p.vx - p2.vx;
            const dvy = p.vy - p2.vy;
            const dvn = dvx * nx + dvy * ny;
            
            if (dvn > 0) {
              p.vx -= dvn * nx;
              p.vy -= dvn * ny;
              p2.vx += dvn * nx;
              p2.vy += dvn * ny;
              
              const overlap = PARTICLE_RADIUS * 2 - dist;
              p.x -= overlap * nx * 0.5;
              p.y -= overlap * ny * 0.5;
              p2.x += overlap * nx * 0.5;
              p2.y += overlap * ny * 0.5;
            }
          }
        });
        
        // Calculate current speed and update color
        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        const temp = (speed * speed) / (2 * BOLTZMANN);
        p.color = getParticleColor(temp);
      });
    }
    
    function calculateStats() {
      // Calculate volume (bounding box of container)
      const minX = Math.min(...walls.filter(w => w.x1 === w.x2).map(w => w.x1));
      const maxX = Math.max(...walls.filter(w => w.x1 === w.x2).map(w => w.x1));
      const minY = Math.min(...walls.filter(w => w.y1 !== w.y2).map(w => w.y1));
      const maxY = Math.max(...walls.filter(w => w.y1 !== w.y2).map(w => w.y1));
      const volume = (maxX - minX - 100) * (maxY - minY - 100);
      
      // Calculate temperature (average kinetic energy)
      let totalKE = 0;
      particles.forEach(p => {
        totalKE += 0.5 * (p.vx * p.vx + p.vy * p.vy);
      });
      const temperature = particles.length > 0 ? totalKE / (particles.length * BOLTZMANN) : 0;
      
      // Calculate pressure (impulse against walls per unit area)
      let totalImpulse = 0;
      particles.forEach(p => {
        walls.forEach(wall => {
          if (wall.x1 === wall.x2) { // Vertical
            if (Math.abs(p.x - wall.x1) < PARTICLE_RADIUS + 5) {
              totalImpulse += Math.abs(p.vx);
            }
          } else { // Horizontal
            if (Math.abs(p.y - wall.y1) < PARTICLE_RADIUS + 5) {
              totalImpulse += Math.abs(p.vy);
            }
          }
        });
      });
      
      const wallArea = (maxX - minX - 100) * 2 + (maxY - minY - 100) * 2;
      const pressure = wallArea > 0 ? (totalImpulse * 2) / wallArea : 0;
      
      document.getElementById('particleCount').textContent = particles.length;
      document.getElementById('temperature').textContent = Math.round(temperature);
      document.getElementById('pressure').textContent = Math.round(pressure * 100);
      document.getElementById('volume').textContent = Math.max(0, Math.round(volume));
    }
    
    function draw() {
      // Background
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, width, height);
      
      // Draw walls
      walls.forEach((wall, i) => {
        ctx.beginPath();
        ctx.moveTo(wall.x1, wall.y1);
        ctx.lineTo(wall.x2, wall.y2);
        ctx.strokeStyle = wall.type === 'movable' ? '#ff6b35' : 'rgba(100, 150, 255, 0.5)';
        ctx.lineWidth = wall.type === 'movable' ? 4 : 2;
        ctx.stroke();
        
        if (wall.type === 'movable') {
          ctx.beginPath();
          ctx.arc((wall.x1 + wall.x2) / 2, wall.y1, 8, 0, Math.PI * 2);
          ctx.fillStyle = '#ff6b35';
          ctx.fill();
        }
      });
      
      // Draw particles
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PARTICLE_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      });
    }
    
    function animate() {
      updateParticles();
      calculateStats();
      draw();
      requestAnimationFrame(animate);
    }
    
    function toggleWallDrag() {
      // Already implemented via mousedown
    }
    
    canvas.addEventListener('mousedown', (e) => {
      mouseDown = true;
      mouseX = e.clientX;
      mouseY = e.clientY;
      
      // Check if clicking on movable wall
      const wall = walls[3];
      const wallMidX = (wall.x1 + wall.x2) / 2;
      if (Math.abs(e.clientY - wall.y1) < 20 && e.clientX > wall.x1 && e.clientX < wall.x2) {
        draggingWall = wall;
      }
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (mouseDown && draggingWall) {
        draggingWall.y1 = Math.max(100, Math.min(height - 50, e.clientY));
        draggingWall.y2 = Math.max(100, Math.min(height - 50, e.clientY));
      }
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    
    canvas.addEventListener('mouseup', () => {
      mouseDown = false;
      draggingWall = null;
    });
    
    canvas.addEventListener('click', (e) => {
      if (!draggingWall) {
        addParticle(e.clientX, e.clientY);
      }
    });
    
    resize();
    setPreset('default');
    animate();
  </script>
</body>
</html>
