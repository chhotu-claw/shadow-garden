<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressure Simulator — Shadow's Garden</title>
<meta name="description" content="Particle-based pressure and temperature simulator — drag walls, watch pressure build"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    color: #ccc;
    font-size: 13px;
    z-index: 100;
    min-width: 180px;
  }
  #controls h3 { margin: 0 0 12px 0; color: #fff; font-size: 14px; }
  .control-row { margin-bottom: 10px; }
  .control-row label { display: block; margin-bottom: 4px; color: #888; }
  .control-row input[type="range"] { width: 100%; }
  .control-row span { float: right; color: #4af; }
  button {
    background: #2a4a6a;
    border: none;
    color: #fff;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 6px;
    margin-top: 8px;
    font-size: 12px;
  }
  button:hover { background: #3a5a7a; }
  .preset-btns button { margin-bottom: 4px; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #556;
    font-size: 11px;
  }
  #stats {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    color: #ccc;
    font-size: 12px;
  }
  #stats div { margin-bottom: 4px; }
  #stats span { color: #4af; }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>Pressure Simulator</h3>
    <div class="control-row">
      <label>Particles <span id="particlesVal">800</span></label>
      <input type="range" id="particles" min="100" max="2000" value="800">
    </div>
    <div class="control-row">
      <label>Temperature <span id="tempVal">1.0</span></label>
      <input type="range" id="temp" min="0.1" max="3.0" step="0.1" value="1.0">
    </div>
    <div class="control-row">
      <label>Particle Size <span id="sizeVal">3</span></label>
      <input type="range" id="size" min="1" max="8" value="3">
    </div>
    <div class="control-row">
      <label>Gravity <span id="gravityVal">0</span></label>
      <input type="range" id="gravity" min="0" max="1" step="0.05" value="0">
    </div>
    <div class="preset-btns">
      <button id="reset">Reset</button>
      <button id="addWall">Add Wall</button>
      <button id="clearWalls">Clear Walls</button>
    </div>
    <div class="preset-btns">
      <button id="preset-box">Box Container</button>
      <button id="preset-chamber">Gas Chamber</button>
      <button id="preset-piston">Piston</button>
      <button id="preset-vase">Vase</button>
      <button id="preset-hourglass">Hourglass</button>
    </div>
  </div>
  <div id="stats">
    <div>Pressure: <span id="pressureVal">0</span></div>
    <div>Temperature: <span id="statTemp">0</span></div>
    <div>Collisions: <span id="collisions">0</span></div>
  </div>
  <div id="info">Drag blue walls | Click to add particles</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    let walls = [];
    let particleCount = 800;
    let temperature = 1.0;
    let particleSize = 3;
    let gravity = 0;
    let collisionCount = 0;
    let draggingWall = null;
    let mouseX = 0, mouseY = 0;
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      initWalls();
    }
    
    function initWalls() {
      walls = [
        { x1: 100, y1: 100, x2: width - 100, y2: 100, dragging: false },
        { x1: width - 100, y1: 100, x2: width - 100, y2: height - 100, dragging: false },
        { x1: width - 100, y1: height - 100, x2: 100, y2: height - 100, dragging: false },
        { x1: 100, y1: height - 100, x2: 100, y2: 100, dragging: false }
      ];
    }
    
    function initParticles() {
      particles = [];
      for (let i = 0; i < particleCount; i++) {
        let x = 150 + Math.random() * (width - 300);
        let y = 150 + Math.random() * (height - 300);
        let angle = Math.random() * Math.PI * 2;
        let speed = (0.5 + Math.random() * 1.5) * temperature;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed
        });
      }
      collisionCount = 0;
    }
    
    function lineIntersection(x1, y1, x2, y2, x3, y3, x4, y4) {
      const denom = (x1-x2)*(y3-y4) - (y1-y2)*(x3-x4);
      if (Math.abs(denom) < 0.0001) return null;
      const t = ((x1-x3)*(y3-y4) - (y1-y3)*(x3-x4)) / denom;
      const u = -((x1-x2)*(y1-y3) - (y1-y2)*(x1-x3)) / denom;
      if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
        return { x: x1 + t*(x2-x1), y: y1 + t*(y2-y1), t, u };
      }
      return null;
    }
    
    function pointToLineDistance(px, py, x1, y1, x2, y2) {
      const A = px - x1;
      const B = py - y1;
      const C = x2 - x1;
      const D = y2 - y1;
      const dot = A * C + B * D;
      const lenSq = C * C + D * D;
      let param = -1;
      if (lenSq !== 0) param = dot / lenSq;
      let xx, yy;
      if (param < 0) { xx = x1; yy = y1; }
      else if (param > 1) { xx = x2; yy = y2; }
      else { xx = x1 + param * C; yy = y1 + param * D; }
      const dx = px - xx;
      const dy = py - yy;
      return Math.sqrt(dx * dx + dy * dy);
    }
    
    function update() {
      const speedMult = temperature;
      
      for (let p of particles) {
        p.vy += gravity * 0.1;
        p.vx *= 0.999;
        p.vy *= 0.999;
        
        let nextX = p.x + p.vx * speedMult;
        let nextY = p.y + p.vy * speedMult;
        
        for (let wall of walls) {
          let dist = pointToLineDistance(nextX, nextY, wall.x1, wall.y1, wall.x2, wall.y2);
          if (dist < particleSize + 2) {
            let dx = wall.x2 - wall.x1;
            let dy = wall.y2 - wall.y1;
            let len = Math.sqrt(dx * dx + dy * dy);
            let nx = -dy / len;
            let ny = dx / len;
            
            let dot = p.vx * nx + p.vy * ny;
            if (dot < 0) {
              p.vx -= 2 * dot * nx;
              p.vy -= 2 * dot * ny;
              p.vx *= 0.9;
              p.vy *= 0.9;
              collisionCount++;
            }
            
            let closest = lineIntersection(wall.x1, wall.y1, wall.x2, wall.y2, p.x - nx * 10, p.y - ny * 10, p.x + nx * 10, p.y + ny * 10);
            if (closest) {
              nextX = closest.x + nx * (particleSize + 3);
              nextY = closest.y + ny * (particleSize + 3);
            }
          }
        }
        
        p.x = nextX;
        p.y = nextY;
      }
      
      // Particle-particle collisions
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          let dx = particles[j].x - particles[i].x;
          let dy = particles[j].y - particles[i].y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < particleSize * 2 && dist > 0) {
            let nx = dx / dist;
            let ny = dy / dist;
            let overlap = particleSize * 2 - dist;
            particles[i].x -= nx * overlap / 2;
            particles[i].y -= ny * overlap / 2;
            particles[j].x += nx * overlap / 2;
            particles[j].y += ny * overlap / 2;
            
            let dvx = particles[j].vx - particles[i].vx;
            let dvy = particles[j].vy - particles[i].vy;
            let dvDotN = dvx * nx + dvy * ny;
            if (dvDotN < 0) {
              particles[i].vx += dvDotN * nx;
              particles[i].vy += dvDotN * ny;
              particles[j].vx -= dvDotN * nx;
              particles[j].vy -= dvDotN * ny;
              collisionCount++;
            }
          }
        }
      }
    }
    
    function render() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, width, height);
      
      // Draw walls
      ctx.strokeStyle = '#4af';
      ctx.lineWidth = 3;
      for (let wall of walls) {
        ctx.beginPath();
        ctx.moveTo(wall.x1, wall.y1);
        ctx.lineTo(wall.x2, wall.y2);
        ctx.stroke();
      }
      
      // Draw particles
      for (let p of particles) {
        let speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        let hue = 180 + speed * 20;
        ctx.fillStyle = `hsl(${hue}, 70%, 60%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, particleSize, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Calculate pressure
      let pressure = (collisionCount / particles.length).toFixed(2);
      document.getElementById('pressureVal').textContent = pressure;
      document.getElementById('statTemp').textContent = temperature.toFixed(1);
      document.getElementById('collisions').textContent = collisionCount;
      
      requestAnimationFrame(render);
    }
    
    function gameLoop() {
      update();
    }
    
    // Event listeners
    document.getElementById('particles').addEventListener('input', e => {
      particleCount = +e.target.value;
      document.getElementById('particlesVal').textContent = particleCount;
      initParticles();
    });
    document.getElementById('temp').addEventListener('input', e => {
      temperature = +e.target.value;
      document.getElementById('tempVal').textContent = temperature.toFixed(1);
    });
    document.getElementById('size').addEventListener('input', e => {
      particleSize = +e.target.value;
      document.getElementById('sizeVal').textContent = particleSize;
    });
    document.getElementById('gravity').addEventListener('input', e => {
      gravity = +e.target.value;
      document.getElementById('gravityVal').textContent = gravity.toFixed(2);
    });
    document.getElementById('reset').addEventListener('click', initParticles);
    document.getElementById('clearWalls').addEventListener('click', () => { walls = []; });
    document.getElementById('addWall').addEventListener('click', () => {
      walls.push({ x1: width/2 - 100, y1: height/2, x2: width/2 + 100, y2: height/2, dragging: false });
    });
    
    document.getElementById('preset-box').addEventListener('click', () => {
      walls = [
        { x1: 100, y1: 100, x2: width - 100, y2: 100, dragging: false },
        { x1: width - 100, y1: 100, x2: width - 100, y2: height - 100, dragging: false },
        { x1: width - 100, y1: height - 100, x2: 100, y2: height - 100, dragging: false },
        { x1: 100, y1: height - 100, x2: 100, y2: 100, dragging: false }
      ];
    });
    document.getElementById('preset-chamber').addEventListener('click', () => {
      walls = [
        { x1: 200, y1: 200, x2: width - 200, y2: 200, dragging: false },
        { x1: width - 200, y1: 200, x2: width - 200, y2: height - 200, dragging: false },
        { x1: width - 200, y1: height - 200, x2: 200, y2: height - 200, dragging: false },
        { x1: 200, y1: height - 200, x2: 200, y2: 200, dragging: false },
        { x1: width/2 - 50, y1: 200, x2: width/2 + 50, y2: height - 200, dragging: false }
      ];
    });
    document.getElementById('preset-piston').addEventListener('click', () => {
      walls = [
        { x1: 200, y1: 150, x2: width - 200, y2: 150, dragging: false },
        { x1: width - 200, y1: 150, x2: width - 200, y2: height - 100, dragging: false },
        { x1: width - 200, y1: height - 100, x2: 200, y2: height - 100, dragging: false },
        { x1: 200, y1: height - 100, x2: 200, y2: 150, dragging: false },
        { x1: 200, y1: height/2, x2: width - 200, y2: height/2, dragging: false }
      ];
    });
    document.getElementById('preset-vase').addEventListener('click', () => {
      walls = [
        { x1: width/2 - 80, y1: 150, x2: width/2 - 40, y2: height - 150, dragging: false },
        { x1: width/2 - 40, y1: height - 150, x2: width/2 + 40, y2: height - 150, dragging: false },
        { x1: width/2 + 40, y1: height - 150, x2: width/2 + 80, y2: 150, dragging: false }
      ];
    });
    document.getElementById('preset-hourglass').addEventListener('click', () => {
      walls = [
        { x1: 200, y1: 150, x2: width - 200, y2: 150, dragging: false },
        { x1: width - 200, y1: 150, x2: width - 200, y2: height - 150, dragging: false },
        { x1: width - 200, y1: height - 150, x2: 200, y2: height - 150, dragging: false },
        { x1: 200, y1: height - 150, x2: 200, y2: 150, dragging: false },
        { x1: width/2 - 60, y1: 150, x2: width/2 - 20, y2: height/2, dragging: false },
        { x1: width/2 + 60, y1: 150, x2: width/2 + 20, y2: height/2, dragging: false },
        { x1: width/2 - 20, y1: height/2, x2: width/2 - 60, y2: height - 150, dragging: false },
        { x1: width/2 + 20, y1: height/2, x2: width/2 + 60, y2: height - 150, dragging: false }
      ];
    });
    
    canvas.addEventListener('mousedown', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      for (let wall of walls) {
        let d1 = Math.hypot(mouseX - wall.x1, mouseY - wall.y1);
        let d2 = Math.hypot(mouseX - wall.x2, mouseY - wall.y2);
        if (d1 < 20 || d2 < 20) {
          draggingWall = wall;
          return;
        }
      }
      // Add particle at click
      if (particles.length < 3000) {
        let angle = Math.random() * Math.PI * 2;
        let speed = (0.5 + Math.random()) * temperature;
        particles.push({
          x: mouseX, y: mouseY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed
        });
      }
    });
    
    canvas.addEventListener('mousemove', e => {
      if (draggingWall) {
        let dx = e.clientX - mouseX;
        let dy = e.clientY - mouseY;
        draggingWall.x1 += dx;
        draggingWall.y1 += dy;
        draggingWall.x2 += dx;
        draggingWall.y2 += dy;
        mouseX = e.clientX;
        mouseY = e.clientY;
      }
    });
    
    canvas.addEventListener('mouseup', () => { draggingWall = null; });
    
    window.addEventListener('resize', resize);
    resize();
    initParticles();
    setInterval(gameLoop, 16);
    render();
  </script>
</body>
</html>
