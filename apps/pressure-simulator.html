<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressure Simulator — Shadow's Garden</title>
<meta name="description" content="Particle-based pressure and temperature simulator. Drag walls to change volume.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a12; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    font-family: monospace;
  }
  .stats {
    position: fixed;
    top: 20px;
    right: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    font-family: monospace;
    text-align: right;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Drag walls to change volume</div>
  <div class="stats" id="stats">Particles: 500 | Temp: 300K</div>
  <div class="controls">
    <button id="p1">Gas</button>
    <button id="p2">Cold</button>
    <button id="p3">Hot</button>
    <button id="p4">Liquid</button>
    <button id="p5">Vacuum</button>
    <button id="reset">Reset</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    let walls = [];
    let dragging = null;
    let mouseX, mouseY;
    
    const NUM_PARTICLES = 500;
    const PARTICLE_RADIUS = 3;
    const WALL_THICKNESS = 10;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      initWalls();
    }
    
    function initWalls() {
      walls = [
        { x: 100, y: 100, w: width - 200, h: WALL_THICKNESS, dir: 'h' },  // top
        { x: 100, y: height - 100 - WALL_THICKNESS, w: width - 200, h: WALL_THICKNESS, dir: 'h' },  // bottom
        { x: 100, y: 100, w: WALL_THICKNESS, h: height - 200, dir: 'v' },  // left
        { x: width - 100 - WALL_THICKNESS, y: 100, w: WALL_THICKNESS, h: height - 200, dir: 'v' }  // right
      ];
    }
    
    function initParticles(temp = 300) {
      particles = [];
      
      // Find bounds
      const minX = Math.min(...walls.filter(w => w.dir === 'v').map(w => w.x));
      const maxX = Math.max(...walls.filter(w => w.dir === 'v').map(w => w.x + w.w));
      const minY = Math.min(...walls.filter(w => w.dir === 'h').map(w => w.y));
      const maxY = Math.max(...walls.filter(w => w.dir === 'h').map(w => w.y + w.h));
      
      for (let i = 0; i < NUM_PARTICLES; i++) {
        particles.push({
          x: minX + WALL_THICKNESS + Math.random() * (maxX - minX - WALL_THICKNESS * 2),
          y: minY + WALL_THICKNESS + Math.random() * (maxY - minY - WALL_THICKNESS * 2),
          vx: (Math.random() - 0.5) * temp * 0.02,
          vy: (Math.random() - 0.5) * temp * 0.02
        });
      }
    }
    
    function update() {
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        
        // Wall collisions
        walls.forEach(w => {
          if (w.dir === 'h') {
            if (p.y - PARTICLE_RADIUS < w.y + w.h && p.y + PARTICLE_RADIUS > w.y &&
                p.x > w.x && p.x < w.x + w.w) {
              p.y = w.y + w.h + PARTICLE_RADIUS;
              p.vy *= -0.9;
            }
            if (p.y + PARTICLE_RADIUS > w.y && p.y - PARTICLE_RADIUS < w.y + w.h &&
                p.x > w.x && p.x < w.x + w.w) {
              p.y = w.y - PARTICLE_RADIUS;
              p.vy *= -0.9;
            }
          } else {
            if (p.x - PARTICLE_RADIUS < w.x + w.w && p.x + PARTICLE_RADIUS > w.x &&
                p.y > w.y && p.y < w.y + w.h) {
              p.x = w.x + w.w + PARTICLE_RADIUS;
              p.vx *= -0.9;
            }
            if (p.x + PARTICLE_RADIUS > w.x && p.x - PARTICLE_RADIUS < w.x + w.w &&
                p.y > w.y && p.y < w.y + w.h) {
              p.x = w.x - PARTICLE_RADIUS;
              p.vx *= -0.9;
            }
          }
        });
        
        // Particle collisions
        particles.forEach(other => {
          if (other === p) return;
          const dx = other.x - p.x;
          const dy = other.y - p.y;
          const dist = Math.hypot(dx, dy);
          if (dist < PARTICLE_RADIUS * 2 && dist > 0) {
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = PARTICLE_RADIUS * 2 - dist;
            p.x -= nx * overlap * 0.5;
            p.y -= ny * overlap * 0.5;
            other.x += nx * overlap * 0.5;
            other.y += ny * overlap * 0.5;
            
            // Velocity exchange
            const dvx = p.vx - other.vx;
            const dvy = p.vy - other.vy;
            const dvn = dvx * nx + dvy * ny;
            if (dvn > 0) {
              p.vx -= dvn * nx;
              p.vy -= dvn * ny;
              other.vx += dvn * nx;
              other.vy += dvn * ny;
            }
          }
        });
      });
    }
    
    function draw() {
      ctx.fillStyle = '#0a0a12';
      ctx.fillRect(0, 0, width, height);
      
      // Draw walls
      ctx.fillStyle = '#2d3436';
      walls.forEach(w => {
        ctx.fillRect(w.x, w.y, w.w, w.h);
      });
      
      // Draw particles
      particles.forEach(p => {
        const speed = Math.hypot(p.vx, p.vy);
        const temp = Math.min(1, speed / 3);
        const r = Math.floor(temp * 255);
        const b = Math.floor((1 - temp) * 255);
        ctx.fillStyle = `rgb(${r}, 100, ${b})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, PARTICLE_RADIUS, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    
    function updateStats() {
      let totalSpeed = 0;
      particles.forEach(p => totalSpeed += Math.hypot(p.vx, p.vy));
      const avgSpeed = totalSpeed / particles.length;
      const temp = Math.round(avgSpeed * 5000);
      
      let count = 0;
      walls.forEach(w => {
        if (w.dir === 'h') count += w.w;
        else count += w.h;
      });
      
      document.getElementById('stats').innerText = `Particles: ${particles.length} | Temp: ${temp}K`;
    }
    
    function animate() {
      update();
      draw();
      updateStats();
      requestAnimationFrame(animate);
    }
    
    canvas.addEventListener('mousedown', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      dragging = walls.findIndex(w => 
        e.clientX >= w.x && e.clientX <= w.x + w.w &&
        e.clientY >= w.y && e.clientY <= w.y + w.h
      );
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (dragging !== null) {
        const w = walls[dragging];
        const dx = e.clientX - mouseX;
        const dy = e.clientY - mouseY;
        
        if (w.dir === 'h') {
          w.w = Math.max(50, w.w + dx);
        } else {
          w.h = Math.max(50, w.h + dy);
        }
        
        mouseX = e.clientX;
        mouseY = e.clientY;
      }
    });
    
    canvas.addEventListener('mouseup', () => dragging = null);
    
    document.getElementById('p1').onclick = () => initParticles(300);
    document.getElementById('p2').onclick = () => initParticles(100);
    document.getElementById('p3').onclick = () => initParticles(600);
    document.getElementById('p4').onclick = () => { NUM_PARTICLES = 800; initParticles(300); };
    document.getElementById('p5').onclick = () => { NUM_PARTICLES = 50; initParticles(300); };
    document.getElementById('reset').onclick = () => { NUM_PARTICLES = 500; initWalls(); initParticles(300); };
    
    window.addEventListener('resize', resize);
    resize();
    initParticles(300);
    animate();
  </script>
</body>
</html>
