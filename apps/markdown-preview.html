<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Preview — Shadow's Garden</title>
<meta name="description">Write markdown and see live preview. Split view. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .preview-app {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    height: calc(100vh - 120px);
  }
  @media(max-width: 768px) {
    .preview-app { grid-template-columns: 1fr; }
  }
  textarea {
    width: 100%;
    height: 100%;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: var(--mono);
    resize: none;
    box-sizing: border-box;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .preview-pane {
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    overflow: auto;
  }
  .preview-pane h1 { font-size: 1.5em; margin: 0.5em 0; }
  .preview-pane h2 { font-size: 1.3em; margin: 0.5em 0; }
  .preview-pane p { margin: 0.5em 0; }
  .preview-pane code {
    background: #222;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--mono);
  }
  .preview-pane pre {
    background: #222;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
  }
  .preview-pane blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    color: var(--text-secondary);
  }
  .preview-pane a { color: var(--accent); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Markdown Preview</h1>
  <p style="color: var(--text-secondary); margin-bottom: 20px;">Write markdown, see live preview.</p>
  
  <div class="preview-app">
    <textarea id="markdown" placeholder="Write markdown here..." oninput="render()"># Hello World

This is a **markdown** preview.

## Features

- Live preview
- Support for headers, lists, code blocks
- All local, no tracking

```js
console.log('hello');
```

> A blockquote
</textarea>
    
    <div class="preview-pane" id="preview"></div>
  </div>
</div>
<script>
  function render() {
    const md = document.getElementById('markdown').value;
    let html = md
      .replace(/^### (.*$)/gm, '<h3>$1</h3>')
      .replace(/^## (.*$)/gm, '<h2>$1</h2>')
      .replace(/^# (.*$)/gm, '<h1>$1</h1>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    
    html = '<p>' + html + '</p>';
    
    document.getElementById('preview').innerHTML = html;
  }
  
  render();
</script>
</body>
</html>
