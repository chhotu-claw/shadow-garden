<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Preview — Shadow's Garden</title>
<meta name="description" content="Live markdown preview with split view, auto-save, and download">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #6366f1;
    --accent-dark: #4f46e5;
    --bg-split: #1e1e2e;
    --border: rgba(255,255,255,0.1);
  }
  body {
    margin: 0;
    padding: 0;
    font-family: 'JetBrains Mono', monospace;
    background: #0f0f1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .toolbar {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .toolbar h1 {
    font-size: 0.9rem;
    color: #fff;
    margin: 0;
    margin-right: auto;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--border);
    color: rgba(255,255,255,0.8);
    padding: 0.4rem 0.75rem;
    border-radius: 0.3rem;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: inherit;
    transition: background 0.2s;
  }
  button:hover {
    background: rgba(255,255,255,0.2);
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  button.primary:hover {
    background: var(--accent-dark);
  }
  .container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane:first-child {
    border-right: 1px solid var(--border);
  }
  .pane-header {
    padding: 0.5rem 1rem;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  textarea {
    flex: 1;
    background: var(--bg-split);
    border: none;
    color: #e0e0e0;
    padding: 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    resize: none;
    outline: none;
  }
  .preview {
    flex: 1;
    padding: 1rem;
    overflow-y: auto;
    background: #fff;
    color: #1a1a2e;
    line-height: 1.7;
  }
  .preview h1, .preview h2, .preview h3 {
    margin-top: 1.5em;
    margin-bottom: 0.5em;
    font-weight: 600;
  }
  .preview h1 { font-size: 1.8em; border-bottom: 2px solid #eee; padding-bottom: 0.3em; }
  .preview h2 { font-size: 1.4em; }
  .preview h3 { font-size: 1.2em; }
  .preview p { margin: 1em 0; }
  .preview code {
    background: #f4f4f5;
    padding: 0.2em 0.4em;
    border-radius: 0.2em;
    font-size: 0.9em;
  }
  .preview pre {
    background: #1e1e2e;
    color: #e0e0e0;
    padding: 1rem;
    border-radius: 0.5rem;
    overflow-x: auto;
  }
  .preview pre code {
    background: none;
    padding: 0;
  }
  .preview blockquote {
    border-left: 4px solid var(--accent);
    margin: 1em 0;
    padding-left: 1em;
    color: #666;
    font-style: italic;
  }
  .preview ul, .preview ol {
    padding-left: 1.5em;
  }
  .preview li {
    margin: 0.3em 0;
  }
  .preview a {
    color: var(--accent);
  }
  .preview table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
  }
  .preview th, .preview td {
    border: 1px solid #ddd;
    padding: 0.5em;
    text-align: left;
  }
  .preview th {
    background: #f9f9f9;
  }
  .preview hr {
    border: none;
    border-top: 2px solid #eee;
    margin: 2em 0;
  }
  .preview img {
    max-width: 100%;
    border-radius: 0.5rem;
  }
  .status {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
  }
  @media (max-width: 768px) {
    .container { flex-direction: column; }
    .pane:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body data-page-type="app">
<div class="toolbar">
  <h1>📝 Markdown Preview</h1>
  <button onclick="downloadMd()">⬇ Download</button>
  <button onclick="clearEditor()">🗑 Clear</button>
  <button class="primary" onclick="toggleView()">📐 Toggle View</button>
  <span class="status" id="status">Auto-saved</span>
</div>

<div class="container" id="container">
  <div class="pane">
    <div class="pane-header">Markdown</div>
    <textarea id="editor" placeholder="Type your markdown here..."></textarea>
  </div>
  <div class="pane">
    <div class="pane-header">Preview</div>
    <div class="preview" id="preview"></div>
  </div>
</div>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const status = document.getElementById('status');
const container = document.getElementById('container');

// Load from localStorage
const saved = localStorage.getItem('markdownDraft');
if (saved) {
  editor.value = saved;
  render();
}

let debounceTimer;
editor.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    localStorage.setItem('markdownDraft', editor.value);
    status.textContent = 'Saved ' + new Date().toLocaleTimeString();
    render();
  }, 300);
});

function render() {
  const md = editor.value;
  preview.innerHTML = parseMarkdown(md);
}

function parseMarkdown(text) {
  // Simple markdown parser
  let html = text
    // Escape HTML
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    // Images
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
    // Blockquotes
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    // Horizontal rules
    .replace(/^---$/gm, '<hr>')
    // Unordered lists
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // Ordered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // Line breaks
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  
  // Wrap in paragraphs
  html = '<p>' + html + '</p>';
  
  // Clean up multiple blockquotes
  html = html.replace(/<\/blockquote><br><blockquote>/g, '<br>');
  
  return html;
}

function downloadMd() {
  const blob = new Blob([editor.value], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'document.md';
  a.click();
  URL.revokeObjectURL(url);
}

function clearEditor() {
  if (confirm('Clear all text?')) {
    editor.value = '';
    localStorage.removeItem('markdownDraft');
    render();
  }
}

function toggleView() {
  const panes = document.querySelectorAll('.pane');
  if (panes[0].style.display === 'none') {
    panes[0].style.display = 'flex';
    panes[1].style.display = 'flex';
  } else {
    panes[0].style.display = 'none';
    panes[1].style.flex = '1';
  }
}
</script>
</body>
</html>
