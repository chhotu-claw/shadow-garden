<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Preview — Shadow's Garden</title>
<meta name="description" content="Write markdown, see it rendered instantly. Split view with live preview.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
    --primary: #6366f1;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header h1 {
    font-size: 1.25rem;
    margin: 0;
  }

  .btn {
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover {
    background: #4f46e5;
  }

  .btn-secondary {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--border);
  }

  .container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .pane:first-child {
    border-right: 1px solid var(--border);
  }

  .pane-header {
    padding: 0.75rem 1rem;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .editor {
    flex: 1;
    padding: 1rem;
    background: var(--bg);
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    resize: none;
    line-height: 1.6;
  }

  .editor:focus {
    outline: none;
  }

  .preview {
    flex: 1;
    padding: 1rem;
    overflow-y: auto;
    line-height: 1.7;
  }

  .preview h1, .preview h2, .preview h3, .preview h4, .preview h5, .preview h6 {
    margin-top: 1.5em;
    margin-bottom: 0.5em;
  }

  .preview h1:first-child {
    margin-top: 0;
  }

  .preview h1 { font-size: 1.75rem; }
  .preview h2 { font-size: 1.5rem; }
  .preview h3 { font-size: 1.25rem; }

  .preview p {
    margin: 0.75em 0;
  }

  .preview code {
    background: var(--card);
    padding: 0.2em 0.4em;
    border-radius: 4px;
    font-size: 0.9em;
  }

  .preview pre {
    background: var(--card);
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
  }

  .preview pre code {
    background: none;
    padding: 0;
  }

  .preview blockquote {
    border-left: 4px solid var(--primary);
    margin: 1em 0;
    padding-left: 1em;
    color: var(--text-muted);
  }

  .preview ul, .preview ol {
    padding-left: 1.5em;
  }

  .preview li {
    margin: 0.25em 0;
  }

  .preview a {
    color: var(--primary);
    text-decoration: none;
  }

  .preview a:hover {
    text-decoration: underline;
  }

  .preview table {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0;
  }

  .preview th, .preview td {
    border: 1px solid var(--border);
    padding: 0.5em;
    text-align: left;
  }

  .preview th {
    background: var(--card);
  }

  .preview hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5em 0;
  }

  .preview img {
    max-width: 100%;
    border-radius: 8px;
  }

  .empty-hint {
    color: var(--text-muted);
    font-style: italic;
  }

  .toolbar {
    display: flex;
    gap: 0.5rem;
  }

  @media (max-width: 768px) {
    .container {
      flex-direction: column;
    }
    .pane:first-child {
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
  }
</style>
</head>
<body data-page-type="app">
  <div class="header">
    <h1>📝 Markdown Preview</h1>
    <div class="toolbar">
      <button class="btn btn-secondary" onclick="loadSample()">Load Sample</button>
      <button class="btn btn-secondary" onclick="clearEditor()">Clear</button>
      <button class="btn btn-primary" onclick="downloadMd()">Download .md</button>
    </div>
  </div>

  <div class="container">
    <div class="pane">
      <div class="pane-header">Markdown</div>
      <textarea class="editor" id="editor" placeholder="Write markdown here..."></textarea>
    </div>
    <div class="pane">
      <div class="pane-header">Preview</div>
      <div class="preview" id="preview">
        <p class="empty-hint">Start typing to see preview...</p>
      </div>
    </div>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');

    // Simple markdown parser
    function parseMarkdown(text) {
      if (!text.trim()) {
        return '<p class="empty-hint">Start typing to see preview...</p>';
      }

      let html = text
        // Escape HTML
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')

        // Code blocks (must be before inline code)
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')

        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')

        // Headers
        .replace(/^###### (.+)$/gm, '<h6>$1</h6>')
        .replace(/^##### (.+)$/gm, '<h5>$1</h5>')
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')

        // Bold and italic
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/__(.+?)__/g, '<strong>$1</strong>')
        .replace(/_(.+?)_/g, '<em>$1</em>')

        // Strikethrough
        .replace(/~~(.+?)~~/g, '<del>$1</del>')

        // Links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')

        // Images
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')

        // Blockquotes
        .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')

        // Horizontal rules
        .replace(/^---$/gm, '<hr>')
        .replace(/^\*\*\*$/gm, '<hr>')

        // Unordered lists
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')

        // Ordered lists
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')

        // Paragraphs
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(.+)$/gm, (m) => {
          if (m.startsWith('<')) return m;
          return m;
        });

      // Wrap in paragraph if not already wrapped
      if (!html.startsWith('<')) {
        html = '<p>' + html + '</p>';
      }

      // Clean up multiple blockquotes
      html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');

      return html;
    }

    function updatePreview() {
      const text = editor.value;
      preview.innerHTML = parseMarkdown(text);
    }

    function loadSample() {
      editor.value = `# Markdown Preview

Write in **markdown**, see it rendered instantly.

## Features

- Live preview as you type
- Support for:
  - **Bold** and *italic*
  - ~~Strikethrough~~
  - [Links](https://example.com)
  - \`inline code\`
  - Code blocks

\`\`\`javascript
function hello() {
  console.log("Hello, world!");
}
\`\`\`

> Blockquotes work too

---

| Feature | Status |
|---------|--------|
| Headers | ✅ |
| Lists | ✅ |
| Tables | ✅ |

Enjoy!`;
      updatePreview();
    }

    function clearEditor() {
      editor.value = '';
      updatePreview();
    }

    function downloadMd() {
      const text = editor.value;
      if (!text.trim()) {
        alert('Nothing to download!');
        return;
      }
      const blob = new Blob([text], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'document.md';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Live preview on input
    editor.addEventListener('input', updatePreview);

    // Load from localStorage on page load
    const saved = localStorage.getItem('mdpreview_content');
    if (saved) {
      editor.value = saved;
      updatePreview();
    }

    // Auto-save to localStorage
    editor.addEventListener('input', () => {
      localStorage.setItem('mdpreview_content', editor.value);
    });

    // Initial sample if empty
    if (!editor.value) {
      loadSample();
    }
  </script>
</body>
</html>
