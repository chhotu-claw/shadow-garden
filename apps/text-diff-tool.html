<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff Tool — Shadow's Garden</title>
<meta name="description" content="Compare two texts and see the differences. Word, character, and line diff modes.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 20px; max-width: 1200px; margin: 0 auto; }
  h1 { margin-bottom: 20px; }
  .container { display: flex; gap: 20px; margin-bottom: 20px; }
  .input-group { flex: 1; }
  .input-group label { display: block; margin-bottom: 8px; font-weight: 600; }
  textarea { 
    width: 100%; 
    height: 200px; 
    padding: 12px; 
    border: 2px solid var(--border);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    resize: vertical;
    background: var(--bg-secondary);
    color: var(--text);
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  select, button {
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  select { border: 2px solid var(--border); background: var(--bg-secondary); color: var(--text); }
  button {
    background: var(--accent);
    color: white;
    border: none;
    font-weight: 600;
  }
  button:hover { opacity: 0.9; }
  .result {
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    background: var(--bg-secondary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    white-space: pre-wrap;
    max-height: 400px;
    overflow-y: auto;
  }
  .diff-added { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
  .diff-removed { background:239, 68, 68, 0.2); color: #ef4444; text-decoration: line-through; }
  .stats { margin-top: 16px; padding: 12px; background: var(--bg-tertiary); border-radius: 6px; }
  .stats span { margin-right: 20px; }
  .mode-buttons { display: flex; gap: 8px; }
  .mode-btn { padding: 8px 12px; font-size: 13px; background: var(--bg-tertiary); color: var(--text); border: 2px solid var(--border); }
  .mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .copy-btn { background: var(--bg-tertiary); color: var(--text); border: 2px solid var(--border); }
  .copy-btn:hover { background: var(--border); }
</style>
</head>
<body data-page-type="app">
  <h1>Text Diff Tool</h1>
  <div class="container">
    <div class="input-group">
      <label>Original Text</label>
      <textarea id="text1" placeholder="Paste original text here...">The quick brown fox jumps over the lazy dog.</textarea>
    </div>
    <div class="input-group">
      <label>Modified Text</label>
      <textarea id="text2" placeholder="Paste modified text here...">The quick red fox jumps over the active dog.</textarea>
    </div>
  </div>
  <div class="controls">
    <div class="mode-buttons">
      <button class="mode-btn active" data-mode="word">Word</button>
      <button class="mode-btn" data-mode="line">Line</button>
      <button class="mode-btn" data-mode="char">Character</button>
    </div>
    <button id="compareBtn">Compare</button>
    <button class="copy-btn" id="copyBtn">Copy Result</button>
    <button class="copy-btn" id="clearBtn">Clear</button>
  </div>
  <div class="result" id="output"></div>
  <div class="stats" id="stats"></div>
  <script>
    const text1 = document.getElementById('text1');
    const text2 = document.getElementById('text2');
    const output = document.getElementById('output');
    const stats = document.getElementById('stats');
    const compareBtn = document.getElementById('compareBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const modeBtns = document.querySelectorAll('.mode-btn');
    
    let currentMode = 'word';
    
    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        compare();
      });
    });
    
    compareBtn.addEventListener('click', compare);
    clearBtn.addEventListener('click', () => { text1.value = ''; text2.value = ''; output.textContent = ''; stats.innerHTML = ''; });
    
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(output.textContent).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy Result', 1500);
      });
    });
    
    function compare() {
      const t1 = text1.value;
      const t2 = text2.value;
      
      if (!t1 && !t2) {
        output.textContent = 'Enter text to compare.';
        stats.innerHTML = '';
        return;
      }
      
      let diff, added = 0, removed = 0;
      
      if (currentMode === 'word') {
        const words1 = t1.split(/\s+/).filter(w => w);
        const words2 = t2.split(/\s+/).filter(w => w);
        diff = wordDiff(words1, words2);
      } else if (currentMode === 'line') {
        const lines1 = t1.split('\n');
        const lines2 = t2.split('\n');
        diff = lineDiff(lines1, lines2);
      } else {
        diff = charDiff(t1, t2);
      }
      
      output.innerHTML = diff;
      
      added = (t2.length > t1.length ? t2.length - t1.length : 0);
      removed = (t1.length > t2.length ? t1.length - t2.length : 0);
      
      if (currentMode === 'word') {
        const words1 = t1.split(/\s+/).filter(w => w);
        const words2 = t2.split(/\s+/).filter(w => w);
        added = words2.filter(w => !words1.includes(w)).length;
        removed = words1.filter(w => !words2.includes(w)).length;
      } else if (currentMode === 'line') {
        const lines1 = t1.split('\n');
        const lines2 = t2.split('\n');
        added = lines2.filter(l => !lines1.includes(l)).length;
        removed = lines1.filter(l => !lines2.includes(l)).length;
      }
      
      stats.innerHTML = `<span>Mode: ${currentMode}</span><span>Added: ${added}</span><span>Removed: ${removed}</span><span>Total changes: ${added + removed}</span>`;
    }
    
    function wordDiff(arr1, arr2) {
      const lcs = longestCommonSubsequence(arr1, arr2);
      let result = '';
      let i1 = 0, i2 = 0, iL = 0;
      
      while (i1 < arr1.length || i2 < arr2.length) {
        if (iL < lcs.length && i1 < arr1.length && arr1[i1] === lcs[iL] && i2 < arr2.length && arr2[i2] === lcs[iL]) {
          result += arr1[i1] + ' ';
          i1++; i2++; iL++;
        } else {
          if (i1 < arr1.length && (iL >= lcs.length || arr1[i1] !== lcs[iL])) {
            result += `<span class="diff-removed">${arr1[i1]}</span> `;
            i1++;
          } else if (i2 < arr2.length && (iL >= lcs.length || arr2[i2] !== lcs[iL])) {
            result += `<span class="diff-added">${arr2[i2]}</span> `;
            i2++;
          } else {
            i1++; i2++;
          }
        }
      }
      return result || (arr1.length === 0 && arr2.length === 0 ? '' : arr1.join(' ') + ' → ' + arr2.join(' '));
    }
    
    function lineDiff(arr1, arr2) {
      const lcs = longestCommonSubsequence(arr1, arr2);
      let result = '';
      let i1 = 0, i2 = 0, iL = 0;
      
      while (i1 < arr1.length || i2 < arr2.length) {
        if (iL < lcs.length && i1 < arr1.length && arr1[i1] === lcs[iL] && i2 < arr2.length && arr2[i2] === lcs[iL]) {
          result += arr1[i1] + '\n';
          i1++; i2++; iL++;
        } else {
          if (i1 < arr1.length && (iL >= lcs.length || arr1[i1] !== lcs[iL])) {
            result += `<span class="diff-removed">- ${arr1[i1]}</span>\n`;
            i1++;
          }
          if (i2 < arr2.length && (iL >= lcs.length || arr2[i2] !== lcs[iL])) {
            result += `<span class="diff-added">+ ${arr2[i2]}</span>\n`;
            i2++;
          }
        }
      }
      return result || (arr1.length === 0 && arr2.length === 0 ? '' : arr1.join('\n') + '\n→\n' + arr2.join('\n'));
    }
    
    function charDiff(str1, str2) {
      const arr1 = str1.split('');
      const arr2 = str2.split('');
      const lcs = longestCommonSubsequence(arr1, arr2);
      let result = '';
      let i1 = 0, i2 = 0, iL = 0;
      
      while (i1 < arr1.length || i2 < arr2.length) {
        if (iL < lcs.length && i1 < arr1.length && arr1[i1] === lcs[iL] && i2 < arr2.length && arr2[i2] === lcs[iL]) {
          result += arr1[i1];
          i1++; i2++; iL++;
        } else {
          if (i1 < arr1.length && (iL >= lcs.length || arr1[i1] !== lcs[iL])) {
            result += `<span class="diff-removed">${arr1[i1]}</span>`;
            i1++;
          }
          if (i2 < arr2.length && (iL >= lcs.length || arr2[i2] !== lcs[iL])) {
            result += `<span class="diff-added">${arr2[i2]}</span>`;
            i2++;
          }
        }
      }
      return result || str1 + ' → ' + str2;
    }
    
    function longestCommonSubsequence(arr1, arr2) {
      const m = arr1.length, n = arr2.length;
      const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
      
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          if (arr1[i-1] === arr2[j-1]) {
            dp[i][j] = dp[i-1][j-1] + 1;
          } else {
            dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
          }
        }
      }
      
      const lcs = [];
      let i = m, j = n;
      while (i > 0 && j > 0) {
        if (arr1[i-1] === arr2[j-1]) {
          lcs.unshift(arr1[i-1]);
          i--; j--;
        } else if (dp[i-1][j] > dp[i][j-1]) {
          i--;
        } else {
          j--;
        }
      }
      return lcs;
    }
    
    compare();
  </script>
</body>
</html>
