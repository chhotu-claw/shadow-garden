<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description" content="Generate QR codes for text, URLs, WiFi, and more. All local, no server.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { width: 100%; max-width: 500px; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 1.5rem; }
  .input-section { background: var(--card); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary); }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { padding: 0.5rem 1rem; background: var(--border); border: none; border-radius: 6px; cursor: pointer; font-weight: 600; color: var(--text); }
  .tab.active { background: var(--accent); color: var(--bg); }
  textarea, input, select { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: inherit; font-size: 1rem; box-sizing: border-box; margin-bottom: 1rem; }
  textarea:focus, input:focus, select:focus { outline: none; border-color: var(--accent); }
  textarea { min-height: 100px; resize: vertical; }
  .btn { padding: 0.75rem 1.5rem; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; }
  .btn:hover { opacity: 0.9; }
  .btn.secondary { background: var(--border); color: var(--text); }
  .btn-row { display: flex; gap: 0.5rem; }
  #qrcode { margin: 1.5rem auto; padding: 1rem; background: white; border-radius: 8px; display: flex; justify-content: center; align-items: center; }
  #qrcode canvas { max-width: 100%; }
  .hidden { display: none; }
  .note { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
</style>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>QR Code Generator</h1>
    <p class="subtitle">Generate QR codes instantly — text, URLs, WiFi, and more</p>
    
    <div class="input-section">
      <div class="tabs">
        <button class="tab active" data-tab="text">Text</button>
        <button class="tab" data-tab="url">URL</button>
        <button class="tab" data-tab="wifi">WiFi</button>
        <button class="tab" data-tab="email">Email</button>
      </div>
      
      <div class="tab-content" id="tab-text">
        <label>Text Content</label>
        <textarea id="textInput" placeholder="Enter any text..."></textarea>
        <button class="btn" onclick="generateQR('text')">Generate QR Code</button>
      </div>
      
      <div class="tab-content hidden" id="tab-url">
        <label>URL</label>
        <input type="url" id="urlInput" placeholder="https://example.com">
        <button class="btn" onclick="generateQR('url')">Generate QR Code</button>
      </div>
      
      <div class="tab-content hidden" id="tab-wifi">
        <label>Network Name (SSID)</label>
        <input type="text" id="wifiSSID" placeholder="MyWiFi">
        <label>Password</label>
        <input type="text" id="wifiPassword" placeholder="Password">
        <label>Encryption</label>
        <select id="wifiEncryption">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="nopass">None</option>
        </select>
        <button class="btn" onclick="generateQR('wifi')">Generate QR Code</button>
      </div>
      
      <div class="tab-content hidden" id="tab-email">
        <label>Email Address</label>
        <input type="email" id="emailInput" placeholder="you@example.com">
        <label>Subject (optional)</label>
        <input type="text" id="emailSubject" placeholder="Subject line">
        <label>Body (optional)</label>
        <textarea id="emailBody" placeholder="Email body..." style="min-height: 60px; margin-bottom: 0;"></textarea>
        <button class="btn" onclick="generateQR('email')">Generate QR Code</button>
      </div>
    </div>
    
    <div id="qrcode"></div>
    <div class="btn-row" id="actionBtns" style="display: none; justify-content: center;">
      <button class="btn secondary" onclick="downloadQR()">Download PNG</button>
      <button class="btn secondary" onclick="copyQR()">Copy Image</button>
    </div>
  </div>
  
  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.remove('hidden');
      });
    });
    
    function generateQR(type) {
      let data = '';
      try {
        switch(type) {
          case 'text':
            data = document.getElementById('textInput').value;
            break;
          case 'url':
            data = document.getElementById('urlInput').value;
            break;
          case 'wifi':
            const ssid = document.getElementById('wifiSSID').value;
            const pass = document.getElementById('wifiPassword').value;
            const enc = document.getElementById('wifiEncryption').value;
            if (!ssid) throw new Error('SSID required');
            data = `WIFI:T:${enc};S:${escapeWifi(ssid)};P:${escapeWifi(pass)};;`;
            break;
          case 'email':
            const email = document.getElementById('emailInput').value;
            const subject = document.getElementById('emailSubject').value;
            const body = document.getElementById('emailBody').value;
            if (!email) throw new Error('Email required');
            data = `mailto:${email}`;
            if (subject || body) {
              data += '?subject=' + encodeURIComponent(subject);
              if (body) data += '&body=' + encodeURIComponent(body);
            }
            break;
        }
        
        if (!data) throw new Error('Please enter some content');
        
        const container = document.getElementById('qrcode');
        container.innerHTML = '';
        QRCode.toCanvas(document.createElement('canvas'), data, { 
          width: 250,
          margin: 2,
          color: { dark: '#000000', light: '#ffffff' }
        }, (err, canvas) => {
          if (err) {
            alert('Error generating QR: ' + err.message);
            return;
          }
          container.appendChild(canvas);
          document.getElementById('actionBtns').style.display = 'flex';
        });
      } catch(e) {
        alert(e.message);
      }
    }
    
    function escapeWifi(str) {
      return str.replace(/[\\:;]/g, c => '\\' + c);
    }
    
    function downloadQR() {
      const canvas = document.querySelector('#qrcode canvas');
      if (!canvas) return;
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    async function copyQR() {
      const canvas = document.querySelector('#qrcode canvas');
      if (!canvas) return;
      try {
        canvas.toBlob(blob => {
          navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
          alert('Copied!');
        });
      } catch(e) {
        alert('Copy failed - try downloading instead');
      }
    }
  </script>
</body>
</html>
