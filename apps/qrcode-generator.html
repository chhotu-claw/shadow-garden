<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description" content="Generate QR codes instantly. No tracking, no bloat.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }

  h1 { margin-bottom: 0.5rem; }
  
  .subtitle {
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .input-group {
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text);
    font-size: 0.875rem;
  }

  input[type="text"],
  input[type="url"],
  input[type="email"],
  textarea {
    width: 100%;
    padding: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 1rem;
    box-sizing: border-box;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: var(--surface);
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .option {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .option label {
    margin-bottom: 0;
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  select {
    padding: 0.5rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 0.875rem;
    cursor: pointer;
  }

  select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .btn {
    padding: 0.75rem 1.5rem;
    border-radius: 6px;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }

  .btn:hover {
    background: var(--border);
  }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .btn.primary:hover {
    background: #79b8ff;
  }

  .preview {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem;
    background: var(--surface);
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  #qrcode {
    margin-bottom: 1rem;
  }

  #qrcode canvas {
    border-radius: 4px;
  }

  .download-btns {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
  }

  .download-btn {
    padding: 0.5rem 1rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .download-btn:hover {
    color: var(--text);
    border-color: var(--muted);
  }

  .error-msg {
    color: #f85149;
    font-size: 0.875rem;
    margin-top: 0.5rem;
    display: none;
  }

  .error-msg.show {
    display: block;
  }

  .info {
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--surface);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 0.875rem;
    color: var(--muted);
  }

  .info strong {
    color: var(--text);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>QR Code Generator</h1>
  <p class="subtitle">Generate QR codes instantly. No tracking, no bloat.</p>

  <div class="input-group">
    <label for="content">Content (URL, text, WiFi, etc.)</label>
    <input type="text" id="content" placeholder="https://example.com or any text...">
    <div id="error" class="error-msg"></div>
  </div>

  <div class="options">
    <div class="option">
      <label>Size</label>
      <select id="size">
        <option value="128">128×128</option>
        <option value="200">200×200</option>
        <option value="256" selected>256×256</option>
        <option value="300">300×300</option>
        <option value="400">400×400</option>
      </select>
    </div>
    <div class="option">
      <label>Error Correction</label>
      <select id="errorCorrection">
        <option value="L">Low (7%)</option>
        <option value="M" selected>Medium (15%)</option>
        <option value="Q">Quartile (25%)</option>
        <option value="H">High (30%)</option>
      </select>
    </div>
    <div class="option">
      <label>Dark Color</label>
      <select id="darkColor">
        <option value="#000000" selected>Black</option>
        <option value="#1a1a1a">Dark Gray</option>
        <option value="#0d1117">GitHub Dark</option>
        <option value="#58a6ff">Blue</option>
        <option value="#3fb950">Green</option>
        <option value="#f85149">Red</option>
      </select>
    </div>
    <div class="option">
      <label>Light Color</label>
      <select id="lightColor">
        <option value="#ffffff">White</option>
        <option value="#f0f0f0">Light Gray</option>
        <option value="#0d1117" selected>Dark (inverted)</option>
        <option value="#161b22">GitHub Dark</option>
      </select>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn primary" id="generateBtn">Generate QR Code</button>
    <button class="btn" id="clearBtn">Clear</button>
  </div>

  <div class="preview">
    <div id="qrcode"></div>
    <div class="download-btns" id="downloadBtns" style="display: none;">
      <button class="download-btn" id="downloadPng">Download PNG</button>
      <button class="download-btn" id="downloadSvg">Download SVG</button>
    </div>
  </div>

  <div class="info">
    <strong>Tips:</strong> QR codes work best with short URLs. Use high error correction for printed codes or codes with logos. WiFi format: <code>WIFI:T:WPA;S:NetworkName;P:password;;</code>
  </div>
</div>

<script>
// Simple QR Code generator using canvas
// Based on qrcode.js library concepts - simplified implementation

const QRCode = (function() {
  const EC_LEVELS = { L: 1, M: 2, Q: 3, H: 4 };
  
  function getBestVersion(text, ecLevel) {
    for (let v = 1; v <= 40; v++) {
      const capacity = getCapacity(v, ecLevel);
      const bits = getBitLength(text, v);
      if (bits <= capacity) return v;
    }
    return 40;
  }

  function getCapacity(version, ecLevel) {
    const ec = EC_LEVELS[ecLevel];
    const total = [152, 272, 440, 640, 864, 1088, 1248, 1552, 1896, 2216, 2534, 2834, 3184, 3512, 4088, 4616, 5116, 5684, 6144, 6880, 7424, 8088, 8712, 9216, 9840, 10560, 11280, 11970, 12690, 13750, 14580, 15410, 16310, 17250, 18170, 19170, 20150, 21150, 22140, 23170, 24200][version - 1];
    const ecBytes = [7, 10, 15, 20, 26, 18, 24, 16, 17, 22, 22, 26, 30, 22, 22, 26, 30, 22, 22, 24, 24, 28, 28, 26, 28, 28, 28, 28, 28, 28, 28, 28, 28, 28, 28, 28, 28, 28, 28, 28][(version - 1) * 4 + ec - 1];
    const blocks = Math.ceil(total / (8 * 8));
    return (total - ecBytes * blocks * 8) * 8;
  }

  function getBitLength(text, version) {
    let mode = guessMode(text);
    if (mode === 1) return text.length * 8; // Numeric
    if (mode === 2) return Math.ceil(text.length * 5.166); // Alphanumeric
    if (mode === 4) return text.length * 8; // Byte/UTF-8
    return text.length * 8;
  }

  function guessMode(text) {
    if (/^[0-9]*$/.test(text)) return 1;
    if (/^[A-Z0-9\s\$\.\+\%\*\-\/\:]*$/.test(text)) return 2;
    return 4;
  }

  function generateQR(text, options) {
    const version = getBestVersion(text, options.ecLevel);
    const moduleCount = version * 4 + 17;
    const modules = [];

    for (let i = 0; i < moduleCount; i++) {
      modules[i] = [];
      for (let j = 0; j < moduleCount; j++) {
        modules[i][j] = 0;
      }
    }

    // Finder patterns
    addFinderPattern(modules, 0, 0);
    addFinderPattern(modules, moduleCount - 7, 0);
    addFinderPattern(modules, 0, moduleCount - 7);

    // Timing patterns
    for (let i = 8; i < moduleCount - 8; i++) {
      modules[6][i] = modules[i][6] = i % 2 === 0 ? 1 : 0;
    }

    // Alignment patterns
    if (version >= 2) {
      const positions = getAlignmentPositions(version);
      for (let i of positions) {
        for (let j of positions) {
          if ((i < 9 && j < 9) || (i < 9 && j > moduleCount - 10) || (i > moduleCount - 10 && j < 9)) continue;
          addAlignmentPattern(modules, i, j);
        }
      }
    }

    // Reserve format info areas
    for (let i = 0; i < 9; i++) {
      modules[8][i] = modules[i][8] = 0;
    }

    // Data
    const data = encodeData(text, options.ecLevel, version);
    const placed = placeData(modules, data, version);

    // Mask patterns
    let bestMask = 0;
    let bestPenalty = Infinity;
    for (let mask = 0; mask < 8; mask++) {
      applyMask(modules, mask, moduleCount);
      const penalty = calculatePenalty(modules, moduleCount);
      if (penalty < bestPenalty) {
        bestPenalty = penalty;
        bestMask = mask;
      }
      applyMask(modules, mask, moduleCount); // revert
    }
    applyMask(modules, bestMask, moduleCount);

    // Format info
    addFormatInfo(modules, bestMask, options.ecLevel);

    return { modules, moduleCount, version };
  }

  function addFinderPattern(modules, row, col) {
    for (let i = -1; i <= 7; i++) {
      for (let j = -1; j <= 7; j++) {
        const r = row + i, c = col + j;
        if (r < 0 || c < 0 || r >= modules.length || c >= modules.length) continue;
        modules[r][c] = (i === -1 || i === 7 || j === -1 || j === 7 || (i >= 2 && i <= 4 && j >= 2 && j <= 4)) ? 1 : 0;
      }
    }
  }

  function addAlignmentPattern(modules, row, col) {
    for (let i = -2; i <= 2; i++) {
      for (let j = -2; j <= 2; j++) {
        modules[row + i][col + j] = (Math.abs(i) === 2 || Math.abs(j) === 2 || (i === 0 && j === 0)) ? 1 : 0;
      }
    }
  }

  function getAlignmentPositions(version) {
    if (version === 1) return [];
    const intervals = Math.ceil(version * 4 + 4);
    const step = Math.ceil((intervals - 13) / (Math.floor(version / 7) + 1)) * 2;
    const positions = [6];
    for (let p = intervals; p > 6; p -= step) {
      if (p < modules.length - 6) positions.push(p);
    }
    positions.push(modules.length - 7);
    return positions;
  }

  function encodeData(text, ecLevel, version) {
    const mode = guessMode(text);
    let bits = '';
    
    // Mode indicator
    bits += mode.toString(2).padStart(4, '0');
    
    // Character count
    const charCount = text.length;
    bits += charCount.toString(2).padStart(getCharCountBits(mode, version), '0');
    
    // Data
    if (mode === 1) { // Numeric
      for (let i = 0; i < text.length; i += 3) {
        const chunk = text.slice(i, i + 3);
        bits += parseInt(chunk).toString(2).padStart(chunk.length * 3 + 1, '0');
      }
    } else if (mode === 2) { // Alphanumeric
      const ALPHANUM = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:';
      for (let i = 0; i < text.length; i += 2) {
        if (i + 1 < text.length) {
          const v = ALPHANUM.indexOf(text[i]) * 45 + ALPHANUM.indexOf(text[i + 1]);
          bits += v.toString(2).padStart(11, '0');
        } else {
          bits += ALPHANUM.indexOf(text[i]).toString(2).padStart(6, '0');
        }
      }
    } else { // Byte/UTF-8
      for (let i = 0; i < text.length; i++) {
        bits += text.charCodeAt(i).toString(2).padStart(8, '0');
      }
    }

    // Terminator
    const totalDataBytes = Math.floor([152, 272, 440, 640, 864, 1088, 1248, 1552, 1896, 2216, 2534, 2834, 3184, 3512, 4088, 4616, 5116, 5684, 6144, 6880][version - 1] / 8);
    bits = bits.padEnd(Math.min(bits.length + 4, totalDataBytes * 8), '0');

    // Pad to bytes
    while (bits.length % 8 !== 0) bits += '0';
    const padBytes = [0x40, 0x11];
    let i = 0;
    while (bits.length < totalDataBytes * 8) {
      bits += padBytes[i % 2].toString(2).padStart(8, '0');
      i++;
    }

    const data = [];
    for (let i = 0; i < bits.length; i += 8) {
      data.push(parseInt(bits.slice(i, i + 8), 2));
    }
    return data;
  }

  function getCharCountBits(mode, version) {
    if (version < 10) return [10, 9, 8][mode - 1] || 8;
    if (version < 27) return [12, 11, 16][mode - 1] || 16;
    return [14, 13, 16][mode - 1] || 16;
  }

  function placeData(modules, data, version) {
    let bitIndex = 0;
    const totalBits = data.length * 8;
    let col = modules.length - 1;
    let goingUp = true;

    while (col > 0) {
      if (col === 6) col--;
      for (let i = 0; i < modules.length; i++) {
        const row = goingUp ? modules.length - 1 - i : i;
        for (let j = 0; j < 2; j++) {
          const c = col - j;
          if (modules[row][c] === 0 && bitIndex < totalBits) {
            const byteIndex = Math.floor(bitIndex / 8);
            const bitPos = 7 - (bitIndex % 8);
            modules[row][c] = ((data[byteIndex] >> bitPos) & 1) ? 1 : 0;
            bitIndex++;
          }
        }
      }
      col -= 2;
      goingUp = !goingUp;
    }
    return bitIndex >= totalBits;
  }

  function applyMask(modules, mask, size) {
    for (let i = 0; i < size; i++) {
      for (let j = 0; j < size; j++) {
        if (modules[i][j] === 0) {
          let shouldMask = false;
          if (mask === 0) shouldMask = (i + j) % 2 === 0;
          else if (mask === 1) shouldMask = i % 2 === 0;
          else if (mask === 2) shouldMask = j % 3 === 0;
          else if (mask === 3) shouldMask = (i + j) % 3 === 0;
          else if (mask === 4) shouldMask = (Math.floor(i / 2) + Math.floor(j / 3)) % 2 === 0;
          else if (mask === 5) shouldMask = (i * j) % 2 + (i * j) % 3 === 0;
          else if (mask === 6) shouldMask = ((i * j) % 2 + (i * j) % 3) % 2 === 0;
          else if (mask === 7) shouldMask = ((i * j) % 3 + (i + j) % 2) % 2 === 0;
          if (shouldMask) modules[i][j] = 1;
        }
      }
    }
  }

  function calculatePenalty(modules, size) {
    let penalty = 0;
    
    // Rule 1: 5+ consecutive same color
    for (let i = 0; i < size; i++) {
      let count = 1;
      for (let j = 1; j < size; j++) {
        if (modules[i][j] === modules[i][j - 1]) count++;
        else { penalty += count >= 5 ? count - 2 : 0; count = 1; }
      }
      penalty += count >= 5 ? count - 2 : 0;
    }
    for (let j = 0; j < size; j++) {
      let count = 1;
      for (let i = 1; i < size; i++) {
        if (modules[i][j] === modules[i - 1][j]) count++;
        else { penalty += count >= 5 ? count - 2 : 0; count = 1; }
      }
      penalty += count >= 5 ? count - 2 : 0;
    }

    // Rule 2: 2x2 blocks
    for (let i = 0; i < size - 1; i++) {
      for (let j = 0; j < size - 1; j++) {
        const v = modules[i][j];
        if (v === modules[i][j + 1] && v === modules[i + 1][j] && v === modules[i + 1][j + 1]) {
          penalty += 3;
        }
      }
    }

    // Rule 3: Finder-like patterns
    const pattern = [1, 0, 1, 1, 1, 0, 1, 0, 0, 0, 0];
    for (let i = 0; i < size; i++) {
      for (let j = 0; j <= size - 11; j++) {
        let match = true;
        for (let k = 0; k < 11; k++) {
          if (modules[i][j + k] !== pattern[k]) { match = false; break; }
        }
        if (match) penalty += 40;
      }
    }
    for (let j = 0; j < size; j++) {
      for (let i = 0; i <= size - 11; i++) {
        let match = true;
        for (let k = 0; k < 11; k++) {
          if (modules[i + k][j] !== pattern[k]) { match = false; break; }
        }
        if (match) penalty += 40;
      }
    }

    // Rule 4: Balance
    let dark = 0;
    for (let i = 0; i < size; i++) {
      for (let j = 0; j < size; j++) {
        if (modules[i][j] === 1) dark++;
      }
    }
    const total = size * size;
    const percent = dark * 100 / total;
    penalty += Math.floor(Math.abs(percent - 50) / 5) * 10;

    return penalty;
  }

  function addFormatInfo(modules, mask, ecLevel) {
    const formatBits = [
      0x5412, 0x5125, 0x5E7C, 0x5B4B,
      0x45F9, 0x40CE, 0x4F97, 0x4AA0,
      0x77C4, 0x72F3, 0x7DAA, 0x789D,
      0x662F, 0x6318, 0x6C41, 0x6976
    ];
    const ecIndex = { L: 0, M: 1, Q: 2, H: 3 };
    const bits = formatBits[ecIndex[ecLevel] * 4 + mask];
    
    for (let i = 0; i < 6; i++) {
      modules[8][i] = (bits >> i) & 1;
      modules[i][8] = (bits >> i) & 1;
    }
    modules[8][7] = (bits >> 6) & 1;
    modules[8][8] = (bits >> 7) & 1;
    modules[7][8] = (bits >> 8) & 1;
    for (let i = 0; i < 6; i++) {
      modules[8][size - 1 - i] = (bits >> (i + 9)) & 1;
      modules[size - 1 - i][8] = (bits >> (i + 9)) & 1;
    }
  }

  let size = 0;
  let currentData = '';
  let currentOptions = {};

  return {
    generate: function(text, options) {
      size = 0;
      const result = generateQR(text, options);
      size = result.moduleCount;
      return result;
    },
    toCanvas: function(canvas, text, options) {
      const { modules, moduleCount } = this.generate(text, options);
      const cellSize = Math.floor(options.size / moduleCount);
      const actualSize = cellSize * moduleCount;
      
      canvas.width = actualSize;
      canvas.height = actualSize;
      
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = options.lightColor;
      ctx.fillRect(0, 0, actualSize, actualSize);
      
      ctx.fillStyle = options.darkColor;
      for (let i = 0; i < moduleCount; i++) {
        for (let j = 0; j < moduleCount; j++) {
          if (modules[i][j] === 1) {
            ctx.fillRect(j * cellSize, i * cellSize, cellSize, cellSize);
          }
        }
      }
    }
  };
})();

// UI
const contentInput = document.getElementById('content');
const sizeSelect = document.getElementById('size');
const errorCorrectionSelect = document.getElementById('errorCorrection');
const darkColorSelect = document.getElementById('darkColor');
const lightColorSelect = document.getElementById('lightColor');
const generateBtn = document.getElementById('generateBtn');
const clearBtn = document.getElementById('clearBtn');
const qrContainer = document.getElementById('qrcode');
const downloadBtns = document.getElementById('downloadBtns');
const errorDiv = document.getElementById('error');

function getOptions() {
  return {
    size: parseInt(sizeSelect.value),
    ecLevel: errorCorrectionSelect.value,
    darkColor: darkColorSelect.value,
    lightColor: lightColorSelect.value
  };
}

function showError(msg) {
  errorDiv.textContent = msg;
  errorDiv.classList.add('show');
}

function hideError() {
  errorDiv.classList.remove('show');
}

function generate() {
  hideError();
  const text = contentInput.value.trim();
  
  if (!text) {
    showError('Please enter some content');
    qrContainer.innerHTML = '';
    downloadBtns.style.display = 'none';
    return;
  }

  if (text.length > 2953) {
    showError('Content too long (max ~2953 bytes)');
    return;
  }

  const options = getOptions();
  currentOptions = options;
  currentData = text;

  qrContainer.innerHTML = '';
  const canvas = document.createElement('canvas');
  QRCode.toCanvas(canvas, text, options);
  qrContainer.appendChild(canvas);
  downloadBtns.style.display = 'flex';
}

function clear() {
  contentInput.value = '';
  qrContainer.innerHTML = '<canvas></canvas>';
  downloadBtns.style.display = 'none';
  hideError();
}

function downloadPNG() {
  const canvas = qrContainer.querySelector('canvas');
  if (!canvas) return;
  
  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadSVG() {
  const text = currentData;
  const options = currentOptions;
  
  if (!text) return;
  
  const { modules, moduleCount } = QRCode.generate(text, options);
  const cellSize = 10;
  const totalSize = cellSize * moduleCount;
  
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${totalSize}" height="${totalSize}" viewBox="0 0 ${totalSize} ${totalSize}">`;
  svg += `<rect width="100%" height="100%" fill="${options.lightColor}"/>`;
  svg += `<g fill="${options.darkColor}">`;
  
  for (let i = 0; i < moduleCount; i++) {
    for (let j = 0; j < moduleCount; j++) {
      if (modules[i][j] === 1) {
        svg += `<rect x="${j * cellSize}" y="${i * cellSize}" width="${cellSize}" height="${cellSize}"/>`;
      }
    }
  }
  svg += '</g></svg>';
  
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const link = document.createElement('a');
  link.download = 'qrcode.svg';
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}

generateBtn.addEventListener('click', generate);
clearBtn.addEventListener('click', clear);
document.getElementById('downloadPng').addEventListener('click', downloadPNG);
document.getElementById('downloadSvg').addEventListener('click', downloadSVG);

// Generate on Enter
contentInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') generate();
});

// Update on option change
[sizeSelect, errorCorrectionSelect, darkColorSelect, lightColorSelect].forEach(el => {
  el.addEventListener('change', () => {
    if (contentInput.value.trim()) generate();
  });
});
</script>
</body>
</html>
