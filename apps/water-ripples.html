<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Ripples — Shadow's Garden</title>
<meta name="description" content="Interactive 2D water ripple simulation with realistic wave physics.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #050510; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-family: monospace;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Click or drag to create ripples</div>
  <div class="controls">
    <button id="clear">Clear</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let buffer1 = [];
    let buffer2 = [];
    let damping = 0.96;
    let cols, rows;
    let cellSize = 4;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      cols = Math.ceil(width / cellSize);
      rows = Math.ceil(height / cellSize);
      init();
    }
    
    function init() {
      buffer1 = new Array(cols * rows).fill(0);
      buffer2 = new Array(cols * rows).fill(0);
    }
    
    function idx(x, y) {
      return y * cols + x;
    }
    
    function ripple(x, y, radius = 3, strength = 500) {
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          const nx = x + dx;
          const ny = y + dy;
          if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist <= radius) {
              buffer1[idx(nx, ny)] += strength * (1 - dist/radius);
            }
          }
        }
      }
    }
    
    function update() {
      // Wave equation: new = (neighbors * 2) - previous * damping
      for (let y = 1; y < rows - 1; y++) {
        for (let x = 1; x < cols - 1; x++) {
          const i = idx(x, y);
          const val = (
            buffer1[idx(x-1, y)] +
            buffer1[idx(x+1, y)] +
            buffer1[idx(x, y-1)] +
            buffer1[idx(x, y+1)]
          ) / 2 - buffer2[i];
          
          buffer2[i] = val * damping;
        }
      }
      
      // Swap buffers
      const temp = buffer1;
      buffer1 = buffer2;
      buffer2 = temp;
    }
    
    function draw() {
      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;
      
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const val = buffer1[idx(x, y)];
          const c = Math.floor(128 + val);
          
          // Only draw if there's significant wave activity
          if (Math.abs(val) > 1) {
            const r = Math.max(0, Math.min(255, 20 + val * 2));
            const g = Math.max(0, Math.min(255, 40 + val * 1.5));
            const b = Math.max(0, Math.min(255, 80 + val));
            
            for (let dy = 0; dy < cellSize; dy++) {
              for (let dx = 0; dx < cellSize; dx++) {
                const px = x * cellSize + dx;
                const py = y * cellSize + dy;
                if (px < width && py < height) {
                  const i = (py * width + px) * 4;
                  data[i] = r;
                  data[i+1] = g;
                  data[i+2] = b;
                  data[i+3] = 255;
                }
              }
            }
          }
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
    }
    
    let isDragging = false;
    
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      const x = Math.floor(e.clientX / cellSize);
      const y = Math.floor(e.clientY / cellSize);
      ripple(x, y, 5, 800);
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const x = Math.floor(e.clientX / cellSize);
        const y = Math.floor(e.clientY / cellSize);
        ripple(x, y, 3, 400);
      }
    });
    
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mouseleave', () => isDragging = false);
    
    document.getElementById('clear').onclick = init;
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    window.addEventListener('resize', resize);
    resize();
    animate();
  </script>
</body>
</html>
