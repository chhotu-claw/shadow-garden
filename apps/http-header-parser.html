<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTTP Header Parser — Shadow's Garden</title>
<meta name="description" content="Parse and build HTTP headers instantly. Paste raw headers or build custom ones.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; padding: 2rem; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
  .tab { padding: 0.5rem 1rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .tab:hover { border-color: var(--accent); }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .panel { display: none; }
  .panel.active { display: block; }
  textarea { width: 100%; min-height: 200px; padding: 1rem; font-family: monospace; font-size: 0.9rem; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; resize: vertical; }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .header-list { background: var(--card-bg); border-radius: 8px; overflow: hidden; }
  .header-row { display: flex; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); }
  .header-row:last-child { border-bottom: none; }
  .header-row.header-title { background: var(--highlight); font-weight: bold; }
  .header-key { flex: 0 0 200px; color: var(--accent); font-family: monospace; }
  .header-value { flex: 1; font-family: monospace; word-break: break-all; }
  .header-actions { flex: 0 0 80px; text-align: right; }
  .btn { padding: 0.4rem 0.8rem; font-size: 0.85rem; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; }
  .btn:hover { opacity: 0.9; }
  .btn.secondary { background: var(--border); }
  .add-header { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .add-header input { flex: 1; padding: 0.5rem; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; }
  .add-header input::placeholder { color: var(--text-muted); }
  .output-area { margin-top: 1.5rem; padding: 1rem; background: var(--highlight); border-radius: 8px; }
  .output-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
  .output-text { font-family: monospace; white-space: pre-wrap; word-break: break-all; }
  .copy-btn { float: right; font-size: 0.8rem; }
  .common-headers { margin-top: 1.5rem; }
  .common-headers h3 { font-size: 1rem; margin-bottom: 0.75rem; }
  .header-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .chip { padding: 0.4rem 0.8rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
  @media (max-width: 600px) { .header-key { flex: 0 0 120px; } .header-value { font-size: 0.85rem; } }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>🔤 HTTP Header Parser</h1>
    <div class="subtitle">Parse raw headers or build custom ones — all local, no server</div>
    
    <div class="tabs">
      <button class="tab active" data-tab="parse">Parse Headers</button>
      <button class="tab" data-tab="build">Build Headers</button>
    </div>
    
    <div class="panel active" id="parse-panel">
      <textarea id="raw-headers" placeholder="Paste raw HTTP headers here...
Accept: application/json
Authorization: Bearer token123
Content-Type: application/json
User-Agent: MyApp/1.0"></textarea>
      <div style="margin-top: 1rem;">
        <button class="btn" id="parse-btn">Parse</button>
        <button class="btn secondary" id="clear-parse">Clear</button>
      </div>
      <div id="parsed-output"></div>
    </div>
    
    <div class="panel" id="build-panel">
      <div class="header-list" id="header-list"></div>
      <div class="add-header">
        <input type="text" id="new-key" placeholder="Header name (e.g., Authorization)">
        <input type="text" id="new-value" placeholder="Header value">
        <button class="btn" id="add-btn">Add</button>
      </div>
      <div class="output-area" id="build-output" style="display: none;">
        <div class="output-label">Raw Headers <button class="btn copy-btn" id="copy-build">Copy</button></div>
        <div class="output-text" id="build-output-text"></div>
      </div>
    </div>
  </div>
  
  <script>
    const commonHeaders = [
      'Accept', 'Accept-Encoding', 'Accept-Language', 'Authorization',
      'Cache-Control', 'Content-Type', 'Cookie', 'Host',
      'Origin', 'Referer', 'User-Agent', 'X-API-Key',
      'X-Request-ID', 'X-Forwarded-For', 'Accept-Charset'
    ];
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-panel').classList.add('active');
      });
    });
    
    // Parse functionality
    const rawHeaders = document.getElementById('raw-headers');
    const parsedOutput = document.getElementById('parsed-output');
    
    function parseHeaders(text) {
      const lines = text.trim().split('\n').filter(l => l.trim());
      if (lines.length === 0) {
        parsedOutput.innerHTML = '<div class="empty-state">Paste headers above to parse</div>';
        return;
      }
      
      let html = '<div class="header-list"><div class="header-row header-title"><div class="header-key">Header</div><div class="header-value">Value</div><div class="header-actions"></div></div>';
      
      lines.forEach(line => {
        const colonIdx = line.indexOf(':');
        if (colonIdx > 0) {
          const key = line.substring(0, colonIdx).trim();
          const value = line.substring(colonIdx + 1).trim();
          html += `<div class="header-row"><div class="header-key">${escapeHtml(key)}</div><div class="header-value">${escapeHtml(value)}</div><div class="header-actions"><button class="btn" onclick="copyHeader('${escapeHtml(key)}: ${escapeHtml(value)}')">Copy</button></div></div>`;
        }
      });
      
      html += '</div>';
      parsedOutput.innerHTML = html;
    }
    
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    
    window.copyHeader = function(text) {
      navigator.clipboard.writeText(text);
    };
    
    document.getElementById('parse-btn').addEventListener('click', () => parseHeaders(rawHeaders.value));
    document.getElementById('clear-parse').addEventListener('click', () => {
      rawHeaders.value = '';
      parsedOutput.innerHTML = '';
    });
    
    // Build functionality
    let headers = {};
    
    function renderHeaders() {
      const list = document.getElementById('header-list');
      const keys = Object.keys(headers);
      
      if (keys.length === 0) {
        list.innerHTML = '<div class="empty-state">No headers added yet. Add one below or use common headers.</div>';
      } else {
        let html = '<div class="header-row header-title"><div class="header-key">Header</div><div class="header-value">Value</div><div class="header-actions"></div></div>';
        keys.forEach(key => {
          html += `<div class="header-row"><div class="header-key">${escapeHtml(key)}</div><div class="header-value">${escapeHtml(headers[key])}</div><div class="header-actions"><button class="btn" onclick="removeHeader('${key}')">×</button></div></div>`;
        });
        list.innerHTML = html;
      }
      
      // Generate raw output
      if (keys.length > 0) {
        const raw = keys.map(k => `${k}: ${headers[k]}`).join('\n');
        document.getElementById('build-output-text').textContent = raw;
        document.getElementById('build-output').style.display = 'block';
      } else {
        document.getElementById('build-output').style.display = 'none';
      }
    }
    
    window.removeHeader = function(key) {
      delete headers[key];
      renderHeaders();
    };
    
    document.getElementById('add-btn').addEventListener('click', () => {
      const key = document.getElementById('new-key').value.trim();
      const value = document.getElementById('new-value').value.trim();
      if (key && value) {
        headers[key] = value;
        document.getElementById('new-key').value = '';
        document.getElementById('new-value').value = '';
        renderHeaders();
      }
    });
    
    document.getElementById('copy-build').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('build-output-text').textContent);
    });
    
    // Initialize
    renderHeaders();
  </script>
</body>
</html>
