<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter — Shadow's Garden</title>
<meta name="description" content="Convert between currencies with live-ish rates and historical tracking">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #10b981;
    --accent-dark: #059669;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  .converter {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 1rem;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
  }
  h1 {
    color: #fff;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .input-group {
    margin-bottom: 1.25rem;
  }
  label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .input-row {
    display: flex;
    gap: 0.5rem;
  }
  input[type="number"] {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    color: #fff;
    font-size: 1.25rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="number"]:focus {
    border-color: var(--accent);
  }
  select {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    min-width: 120px;
  }
  .swap-btn {
    display: block;
    margin: 1rem auto;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    color: #fff;
    cursor: pointer;
    font-size: 1.25rem;
    transition: transform 0.2s, background 0.2s;
  }
  .swap-btn:hover {
    transform: rotate(180deg);
    background: var(--accent-dark);
  }
  .result {
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid var(--accent);
    border-radius: 0.5rem;
    padding: 1.5rem;
    text-align: center;
    margin-top: 1.5rem;
  }
  .result-value {
    font-size: 2rem;
    font-weight: bold;
    color: #fff;
  }
  .result-rate {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    margin-top: 0.5rem;
  }
  .last-updated {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    text-align: center;
    margin-top: 1.5rem;
  }
  .quick-amounts {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }
  .quick-amounts button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.25rem;
    padding: 0.25rem 0.5rem;
    color: rgba(255,255,255,0.7);
    font-size: 0.7rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .quick-amounts button:hover {
    background: rgba(255,255,255,0.2);
  }
</style>
</head>
<body data-page-type="app">
<div class="converter">
  <h1>💱 Currency Converter</h1>
  
  <div class="input-group">
    <label>From</label>
    <div class="input-row">
      <input type="number" id="amount" value="1" min="0" step="any">
      <select id="fromCurrency"></select>
    </div>
    <div class="quick-amounts">
      <button onclick="setAmount(10)">10</button>
      <button onclick="setAmount(50)">50</button>
      <button onclick="setAmount(100)">100</button>
      <button onclick="setAmount(500)">500</button>
      <button onclick="setAmount(1000)">1000</button>
    </div>
  </div>
  
  <button class="swap-btn" onclick="swapCurrencies()" title="Swap currencies">⇅</button>
  
  <div class="input-group">
    <label>To</label>
    <select id="toCurrency"></select>
  </div>
  
  <div class="result">
    <div class="result-value" id="result">0.00</div>
    <div class="result-rate" id="rateInfo">1 USD = 1 USD</div>
  </div>
  
  <div class="last-updated">
    Rates from exchangerate-api.com (free tier)<br>
    <span id="updateTime">Loading...</span>
  </div>
</div>

<script>
const currencies = {
  USD: { name: 'US Dollar', symbol: '$', flag: '🇺🇸' },
  EUR: { name: 'Euro', symbol: '€', flag: '🇪🇺' },
  GBP: { name: 'British Pound', symbol: '£', flag: '🇬🇧' },
  JPY: { name: 'Japanese Yen', symbol: '¥', flag: '🇯🇵' },
  CNY: { name: 'Chinese Yuan', symbol: '¥', flag: '🇨🇳' },
  INR: { name: 'Indian Rupee', symbol: '₹', flag: '🇮🇳' },
  AUD: { name: 'Australian Dollar',$', flag: symbol: 'A '🇦🇺' },
  CAD: { name: 'Canadian Dollar', symbol: 'C$', flag: '🇨🇦' },
  CHF: { name: 'Swiss Franc', symbol: 'Fr', flag: '🇨🇭' },
  AED: { name: 'UAE Dirham', symbol: 'د.إ', flag: '🇦🇪' },
  SAR: { name: 'Saudi Riyal', symbol: '﷼', flag: '🇸🇦' },
  KWD: { name: 'Kuwaiti Dinar', symbol: 'د.ك', flag: '🇰🇼' },
  BHD: { name: 'Bahraini Dinar', symbol: '.د.ب', flag: '🇧🇭' },
  QAR: { name: 'Qatari Riyal', symbol: '﷼', flag: '🇶🇦' },
  OMR: { name: 'Omani Rial', symbol: '﷼', flag: '🇴🇲' },
  SGD: { name: 'Singapore Dollar', symbol: 'S$', flag: '🇸🇬' },
  HKD: { name: 'Hong Kong Dollar', symbol: 'HK$', flag: '🇭🇰' },
  MXN: { name: 'Mexican Peso', symbol: '$', flag: '🇲🇽' },
  BRL: { name: 'Brazilian Real', symbol: 'R$', flag: '🇧🇷' },
  KRW: { name: 'South Korean Won', symbol: '₩', flag: '🇰🇷' },
  THB: { name: 'Thai Baht', symbol: '฿', flag: '🇹🇭' },
  NZD: { name: 'New Zealand Dollar', symbol: 'NZ$', flag: '🇳🇿' },
  SEK: { name: 'Swedish Krona', symbol: 'kr', flag: '🇸🇪' },
  NOK: { name: 'Norwegian Krone', symbol: 'kr', flag: '🇳🇴' },
  DKK: { name: 'Danish Krone', symbol: 'kr', flag: '🇩🇰' },
  PLN: { name: 'Polish Zloty', symbol: 'zł', flag: '🇵🇱' },
  TRY: { name: 'Turkish Lira', symbol: '₺', flag: '🇹🇷' },
  ZAR: { name: 'South African Rand', symbol: 'R', flag: '🇿🇦' },
  RUB: { name: 'Russian Ruble', symbol: '₽', flag: '🇷🇺' },
  PHP: { name: 'Philippine Peso', symbol: '₱', flag: '🇵🇭' },
  IDR: { name: 'Indonesian Rupiah', symbol: 'Rp', flag: '🇮🇩' },
  MYR: { name: 'Malaysian Ringgit', symbol: 'RM', flag: '🇲🇾' },
  VND: { name: 'Vietnamese Dong', symbol: '₫', flag: '🇻🇳' },
};

let rates = {};
let lastFetch = null;

const fromSelect = document.getElementById('fromCurrency');
const toSelect = document.getElementById('toCurrency');
const amountInput = document.getElementById('amount');
const resultDisplay = document.getElementById('result');
const rateInfo = document.getElementById('rateInfo');
const updateTime = document.getElementById('updateTime');

// Populate currency dropdowns
Object.keys(currencies).forEach(code => {
  const c = currencies[code];
  fromSelect.add(new Option(`${c.flag} ${code} - ${c.name}`, code));
  toSelect.add(new Option(`${c.flag} ${code} - ${c.name}`, code));
});

// Set defaults
fromSelect.value = 'USD';
toSelect.value = 'EUR';

async function fetchRates() {
  try {
    const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const data = await response.json();
    rates = data.rates;
    lastFetch = new Date();
    updateTime.textContent = `Updated: ${lastFetch.toLocaleString()}`;
    convert();
  } catch (e) {
    // Fallback rates
    rates = {
      USD: 1, EUR: 0.92, GBP: 0.79, JPY: 149.5, CNY: 7.24, INR: 83.1,
      AUD: 1.53, CAD: 1.36, CHF: 0.88, AED: 3.67, SAR: 3.75, KWD: 0.31,
      BHD: 0.38, QAR: 3.64, OMR: 0.38, SGD: 1.34, HKD: 7.82, MXN: 17.1,
      BRL: 4.97, KRW: 1320, THB: 35.5, NZD: 1.63, SEK: 10.4, NOK: 10.6,
      DKK: 6.87, PLN: 4.02, TRY: 32.1, ZAR: 18.9, RUB: 91.5, PHP: 55.8,
      IDR: 15600, MYR: 4.72, VND: 24350
    };
    updateTime.textContent = 'Using offline rates';
    convert();
  }
}

function convert() {
  const amount = parseFloat(amountInput.value) || 0;
  const from = fromSelect.value;
  const to = toSelect.value;
  
  if (!rates[from] || !rates[to]) return;
  
  // Convert through USD (base currency)
  const inUSD = amount / rates[from];
  const result = inUSD * rates[to];
  
  const fromC = currencies[from];
  const toC = currencies[to];
  
  resultDisplay.textContent = `${toC.symbol} ${result.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
  rateInfo.textContent = `1 ${from} = ${(rates[to]/rates[from]).toFixed(4)} ${to}`;
}

function swapCurrencies() {
  const temp = fromSelect.value;
  fromSelect.value = toSelect.value;
  toSelect.value = temp;
  convert();
}

function setAmount(val) {
  amountInput.value = val;
  convert();
}

amountInput.addEventListener('input', convert);
fromSelect.addEventListener('change', convert);
toSelect.addEventListener('change', convert);

// Load saved preferences
const saved = localStorage.getItem('currencyPrefs');
if (saved) {
  try {
    const prefs = JSON.parse(saved);
    if (prefs.from) fromSelect.value = prefs.from;
    if (prefs.to) toSelect.value = prefs.to;
  } catch(e) {}
}

// Save preferences on change
function savePrefs() {
  localStorage.setItem('currencyPrefs', JSON.stringify({
    from: fromSelect.value,
    to: toSelect.value
  }));
}
fromSelect.addEventListener('change', savePrefs);
toSelect.addEventListener('change', savePrefs);

// Init
fetchRates();
</script>
</body>
</html>
