<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Focus — Shadow's Garden</title>
<meta name="description" content="Pomodoro timer with work/break cycles, customizable intervals, and session tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #dc2626;
    --primary-dark: #b91c1c;
    --break: #16a34a;
    --break-dark: #15803d;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    text-align: center;
  }

  h1 {
    margin-bottom: 0.5rem;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.875rem;
    margin-bottom: 2rem;
  }

  .timer-display {
    font-size: 6rem;
    font-weight: 700;
    line-height: 1;
    margin: 2rem 0;
    font-variant-numeric: tabular-nums;
  }

  .timer-display.work { color: var(--primary); }
  .timer-display.break { color: var(--break); }
  .timer-display.paused { color: var(--text-muted); }

  .status-badge {
    display: inline-block;
    padding: 0.5rem 1rem;
    border-radius: 9999px;
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .status-badge.work {
    background: rgba(220, 38, 38, 0.2);
    color: var(--primary);
  }

  .status-badge.break {
    background: rgba(22, 163, 74, 0.2);
    color: var(--break);
  }

  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .btn {
    padding: 1rem 2rem;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover {
    background: var(--primary-dark);
  }

  .btn-break {
    background: var(--break);
    color: white;
  }

  .btn-break:hover {
    background: var(--break-dark);
  }

  .btn-secondary {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--border);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .session-info {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2rem;
    color: var(--text-muted);
    font-size: 0.875rem;
  }

  .session-info span {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .session-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
  }

  .session-dot.filled {
    background: var(--primary);
  }

  .session-dot.break-dot.filled {
    background: var(--break);
  }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
    text-align: left;
  }

  .card h3 {
    margin: 0 0 1rem 0;
    font-size: 1rem;
    color: var(--text-muted);
  }

  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .setting-row label {
    font-size: 0.875rem;
  }

  .setting-row input {
    width: 80px;
    padding: 0.5rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    text-align: center;
  }

  .setting-row input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-top: 1rem;
  }

  .stat-box {
    text-align: center;
    padding: 1rem;
    background: var(--bg);
    border-radius: 8px;
  }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary);
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
  }

  .sound-toggle {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .toggle {
    position: relative;
    width: 48px;
    height: 24px;
    background: var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle.active {
    background: var(--primary);
  }

  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle.active::after {
    transform: translateX(24px);
  }

  @media (max-width: 480px) {
    .timer-display {
      font-size: 4rem;
    }
    .controls {
      flex-direction: column;
    }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>🍅 Pomodoro Focus</h1>
    <p class="subtitle">Stay focused. Work in sprints.</p>

    <div id="status-badge" class="status-badge work">Work</div>

    <div class="timer-display work" id="timer">25:00</div>

    <div class="controls">
      <button class="btn btn-primary" id="startBtn" onclick="startTimer()">Start</button>
      <button class="btn btn-secondary" id="pauseBtn" onclick="pauseTimer()" disabled>Pause</button>
      <button class="btn btn-secondary" id="resetBtn" onclick="resetTimer()">Reset</button>
      <button class="btn btn-secondary" id="skipBtn" onclick="skipPhase()">Skip</button>
    </div>

    <div class="session-info">
      <span>
        <span id="session-dots"></span>
        Session <span id="session-num">1</span>/4
      </span>
      <span>
        Today: <span id="total-sessions">0</span> sessions
      </span>
    </div>

    <div class="card">
      <h3>Settings</h3>
      <div class="setting-row">
        <label>Work (min)</label>
        <input type="number" id="work-duration" value="25" min="1" max="60" onchange="updateSettings()">
      </div>
      <div class="setting-row">
        <label>Short break (min)</label>
        <input type="number" id="short-break" value="5" min="1" max="30" onchange="updateSettings()">
      </div>
      <div class="setting-row">
        <label>Long break (min)</label>
        <input type="number" id="long-break" value="15" min="1" max="60" onchange="updateSettings()">
      </div>
      <div class="setting-row">
        <label>Sound</label>
        <div class="sound-toggle">
          <div class="toggle active" id="sound-toggle" onclick="toggleSound()"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Today's Stats</h3>
      <div class="stats">
        <div class="stat-box">
          <div class="stat-value" id="stat-sessions">0</div>
          <div class="stat-label">Sessions</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-minutes">0</div>
          <div class="stat-label">Minutes</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-cycles">0</div>
          <div class="stat-label">Cycles</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'pomodoro_settings';
    const STATS_KEY = 'pomodoro_stats';

    let timeLeft = 25 * 60;
    let timerInterval = null;
    let isRunning = false;
    let isWork = true;
    let currentSession = 1;
    let soundEnabled = true;

    // Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playBeep() {
      if (!soundEnabled) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 800;
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    }

    // Load settings
    function loadSettings() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const settings = JSON.parse(saved);
        document.getElementById('work-duration').value = settings.work;
        document.getElementById('short-break').value = settings.shortBreak;
        document.getElementById('long-break').value = settings.longBreak;
        soundEnabled = settings.sound !== false;
      }
      
      // Load stats
      const today = new Date().toDateString();
      const savedStats = localStorage.getItem(STATS_KEY);
      if (savedStats) {
        const stats = JSON.parse(savedStats);
        if (stats.date === today) {
          updateStatsDisplay(stats);
        }
      }
      
      updateSoundToggle();
      updateTimerDisplay();
      renderSessionDots();
    }

    function updateSettings() {
      const settings = {
        work: parseInt(document.getElementById('work-duration').value),
        shortBreak: parseInt(document.getElementById('short-break').value),
        longBreak: parseInt(document.getElementById('long-break').value),
        sound: soundEnabled
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
      
      if (!isRunning && !isWork) {
        // Reset to work if not running
      } else if (!isRunning) {
        resetTimer();
      }
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      updateSoundToggle();
      updateSettings();
    }

    function updateSoundToggle() {
      const toggle = document.getElementById('sound-toggle');
      toggle.classList.toggle('active', soundEnabled);
    }

    function getDuration() {
      const work = parseInt(document.getElementById('work-duration').value);
      const shortBreak = parseInt(document.getElementById('short-break').value);
      const longBreak = parseInt(document.getElementById('long-break').value);
      
      if (isWork) return work * 60;
      if (currentSession % 4 === 0) return longBreak * 60;
      return shortBreak * 60;
    }

    function updateTimerDisplay() {
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      const display = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      document.getElementById('timer').textContent = display;
      
      const timerEl = document.getElementById('timer');
      const badgeEl = document.getElementById('status-badge');
      
      if (isWork) {
        timerEl.className = 'timer-display work';
        badgeEl.className = 'status-badge work';
        badgeEl.textContent = 'Work';
      } else {
        timerEl.className = 'timer-display break';
        badgeEl.className = 'status-badge break';
        badgeEl.textContent = 'Break';
      }
      
      if (!isRunning) {
        timerEl.classList.add('paused');
      }
    }

    function renderSessionDots() {
      const dotsContainer = document.getElementById('session-dots');
      let html = '';
      for (let i = 1; i <= 4; i++) {
        const filled = i <= currentSession && isWork;
        html += `<span class="session-dot ${filled ? 'filled' : ''}"></span>`;
      }
      dotsContainer.innerHTML = html;
      document.getElementById('session-num').textContent = currentSession;
    }

    function startTimer() {
      if (isRunning) return;
      
      // Resume audio context on user interaction
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      isRunning = true;
      document.getElementById('startBtn').disabled = true;
      document.getElementById('pauseBtn').disabled = false;
      
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        
        if (timeLeft <= 0) {
          completePhase();
        }
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      
      clearInterval(timerInterval);
      isRunning = false;
      document.getElementById('startBtn').disabled = false;
      document.getElementById('pauseBtn').disabled = true;
      updateTimerDisplay();
    }

    function resetTimer() {
      pauseTimer();
      timeLeft = getDuration();
      updateTimerDisplay();
    }

    function skipPhase() {
      pauseTimer();
      completePhase();
    }

    function completePhase() {
      pauseTimer();
      playBeep();
      
      if (isWork) {
        // Completed work session
        incrementStats();
        
        if (currentSession % 4 === 0) {
          isWork = false;
          currentSession++;
        } else {
          isWork = false;
        }
      } else {
        // Completed break
        isWork = true;
        if (currentSession % 4 === 0) {
          currentSession++;
        }
      }
      
      timeLeft = getDuration();
      renderSessionDots();
      updateTimerDisplay();
    }

    function incrementStats() {
      const today = new Date().toDateString();
      let stats = JSON.parse(localStorage.getItem(STATS_KEY)) || { date: '', sessions: 0, minutes: 0, cycles: 0 };
      
      if (stats.date !== today) {
        stats = { date: today, sessions: 0, minutes: 0, cycles: 0 };
      }
      
      const workDuration = parseInt(document.getElementById('work-duration').value);
      stats.sessions++;
      stats.minutes += workDuration;
      stats.cycles = Math.floor(stats.sessions / 4);
      
      localStorage.setItem(STATS_KEY, JSON.stringify(stats));
      updateStatsDisplay(stats);
    }

    function updateStatsDisplay(stats) {
      document.getElementById('stat-sessions').textContent = stats.sessions;
      document.getElementById('stat-minutes').textContent = stats.minutes;
      document.getElementById('stat-cycles').textContent = stats.cycles;
      document.getElementById('total-sessions').textContent = stats.sessions;
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (isRunning) pauseTimer();
        else startTimer();
      } else if (e.code === 'KeyR') {
        resetTimer();
      } else if (e.code === 'KeyS') {
        skipPhase();
      }
    });

    // Initialize
    loadSettings();
  </script>
</body>
</html>
