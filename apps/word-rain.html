<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Rain — Shadow's Garden</title>
<meta name="description" description="Words fall like rain. Click to make them explode into particles. A meditative word game.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(180deg, #0a0a12 0%, #1a1a2e 50%, #16213e 100%);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }
  #canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }
  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 14px;
    pointer-events: none;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .score {
    position: fixed;
    top: 20px;
    right: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 18px;
    font-family: 'Courier New', monospace;
  }
  .word {
    position: absolute;
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    pointer-events: none;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
    transition: opacity 0.3s;
  }
  .word.popped {
    color: #ff6b6b;
    text-shadow: 0 0 20px #ff6b6b;
  }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>
<div class="score">Score: <span id="score">0</span></div>
<div class="hint">click words to pop them</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

let width, height;
let words = [];
let particles = [];
let score = 0;
let lastWordTime = 0;

const wordList = [
  'echo', 'drift', 'void', 'flux', 'neon', 'glow', 'wave', 'fade',
  'pulse', 'spark', 'dust', 'mist', 'beam', 'glow', 'shade', 'blur',
  'noise', 'static', 'signal', 'memory', 'dream', 'thought', 'shadow',
  'light', 'dark', 'time', 'space', 'flow', 'entropy', 'chaos', 'order',
  'data', 'bit', 'byte', 'node', 'edge', 'graph', 'tree', 'path'
];

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}

function spawnWord() {
  const word = {
    text: wordList[Math.floor(Math.random() * wordList.length)],
    x: Math.random() * (width - 100) + 50,
    y: -30,
    speed: 0.3 + Math.random() * 0.5,
    opacity: 1,
    scale: 1,
    rotation: (Math.random() - 0.5) * 0.2,
    popped: false
  };
  words.push(word);
}

function spawnParticles(x, y, color) {
  const count = 12 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      size: 2 + Math.random() * 4,
      color: color || `hsl(${Math.random() * 60 + 180}, 80%, 70%)`
    });
  }
}

function update() {
  const now = Date.now();
  
  // Spawn words
  if (now - lastWordTime > 800) {
    spawnWord();
    lastWordTime = now;
  }
  
  // Update words
  words = words.filter(w => {
    w.y += w.speed;
    w.opacity -= 0.001;
    return w.y < height + 30 && w.opacity > 0;
  });
  
  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1; // gravity
    p.life -= p.decay;
    return p.life > 0;
  });
}

function draw() {
  ctx.clearRect(0, 0, width, height);
  
  // Draw words
  words.forEach(w => {
    ctx.save();
    ctx.globalAlpha = w.opacity;
    ctx.translate(w.x, w.y);
    ctx.rotate(w.rotation);
    ctx.scale(w.scale, w.scale);
    ctx.font = '16px Courier New';
    ctx.fillStyle = w.popped ? '#ff6b6b' : 'rgba(255,255,255,0.7)';
    ctx.shadowColor = w.popped ? '#ff6b6b' : 'rgba(255,255,255,0.3)';
    ctx.shadowBlur = 10;
    ctx.fillText(w.text, 0, 0);
    ctx.restore();
  });
  
  // Draw particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  
  requestAnimationFrame(draw);
}

function loop() {
  update();
  setTimeout(loop, 16);
}

// Click handling
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  
  words.forEach(w => {
    const dist = Math.sqrt((w.x - mx) ** 2 + (w.y - my) ** 2);
    if (dist < 40 && !w.popped) {
      w.popped = true;
      w.opacity = 0;
      score += 10;
      scoreEl.textContent = score;
      spawnParticles(w.x, w.y, '#ff6b6b');
    }
  });
});

// Mouse move creates subtle trail
let mouseX = 0, mouseY = 0;
canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

resize();
window.addEventListener('resize', resize);
loop();
draw();
</script>
</body>
</html>
