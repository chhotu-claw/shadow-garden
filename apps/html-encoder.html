<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Entity Encoder — Shadow's Garden</title>
<meta name="description">Encode and decode HTML entities. All local.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .tool { max-width: 600px; margin: 0 auto; }
  .toggle { display: flex; gap: 8px; margin-bottom: 20px; }
  .toggle button { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 15px; cursor: pointer; }
  .toggle button:hover { border-color: var(--accent); }
  .toggle button.active { background: var(--accent); border-color: var(--accent); color: white; }
  label { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  textarea { width: 100%; min-height: 120px; padding: 14px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; font-family: var(--mono); resize: vertical; box-sizing: border-box; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .buttons { display: flex; gap: 12px; margin: 16px 0; }
  button { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: white; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="tool">
    <h1>HTML Entity Encoder</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Encode special characters to HTML entities.</p>
    <div class="toggle">
      <button class="active" onclick="setMode('encode', this)">Encode</button>
      <button onclick="setMode('decode', this)">Decode</button>
    </div>
    <div><label>Input</label><textarea id="input" placeholder="Enter text..."></textarea></div>
    <div class="buttons">
      <button class="primary" onclick="convert()">Convert</button>
      <button onclick="copy()">Copy</button>
    </div>
    <div><label>Output</label><textarea id="output" readonly placeholder="Result..."></textarea></div>
  </div>
</div>
<script>
  let mode = 'encode';
  function setMode(m, btn) { mode = m; document.querySelectorAll('.toggle button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.getElementById('output').value = ''; }
  function convert() {
    const input = document.getElementById('input').value;
    if (mode === 'encode') document.getElementById('output').value = input.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    else document.getElementById('output').value = input.replace(/&[#\w]+;/g, e => { const d = document.createElement('div'); d.innerHTML = e; return d.textContent; });
  }
  function copy() { navigator.clipboard.writeText(document.getElementById('output').value); }
</script>
</body>
</html>
