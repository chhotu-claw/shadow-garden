<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Calculator — Shadow's Garden</title>
<meta name="description" content="Add or subtract days from any date. Calculate date differences, find past/future dates.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
    --success: #22c55e;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 500px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .description {
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.875rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .input-group {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  input[type="date"],
  input[type="number"],
  select {
    width: 100%;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    box-sizing: border-box;
  }

  input:focus,
  select:focus {
    outline: none;
    border-color: var(--primary);
  }

  .btn-row {
    display: flex;
    gap: 0.5rem;
  }

  button {
    flex: 1;
    padding: 0.75rem 1rem;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.875rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover {
    background: var(--primary-hover);
  }

  button.secondary {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
  }

  button.secondary:hover {
    background: var(--border);
  }

  .result {
    background: var(--bg);
    border: 1px solid var(--success);
    border-radius: 8px;
    padding: 1.25rem;
    text-align: center;
  }

  .result-date {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--success);
    margin-bottom: 0.5rem;
  }

  .result-details {
    font-size: 0.875rem;
    color: var(--text-muted);
  }

  .result-error {
    border-color: #ef4444;
    color: #ef4444;
  }

  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .preset-btn {
    padding: 0.375rem 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .preset-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .tab-group {
    display: flex;
    gap: 0;
    margin-bottom: 1.25rem;
  }

  .tab {
    flex: 1;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.875rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .tab:first-child {
    border-radius: 8px 0 0 8px;
  }

  .tab:last-child {
    border-radius: 0 8px 8px 0;
  }

  .tab.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }

  .mode-section {
    display: none;
  }

  .mode-section.active {
    display: block;
  }

  .history {
    margin-top: 1.5rem;
  }

  .history h3 {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
  }

  .history-item {
    background: var(--bg);
    border-radius: 6px;
    padding: 0.75rem;
    margin-bottom: 0.5rem;
    font-size: 0.875rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-item span {
    color: var(--text-muted);
  }

  .history-item strong {
    color: var(--success);
  }

  .clear-btn {
    font-size: 0.75rem;
    color: var(--text-muted);
    cursor: pointer;
    background(--text-muted: none;
    border: none;
    padding: 0;
  }

  .clear-btn:hover {
    color: #ef4444;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Date Calculator</h1>
    <p class="description">Add or subtract days from any date. Calculate differences between dates.</p>

    <div class="card">
      <div class="tab-group">
        <button class="tab active" data-mode="add">Add/Subtract</button>
        <button class="tab" data-mode="diff">Difference</button>
      </div>

      <div class="mode-section active" id="add-mode">
        <div class="input-group">
          <label>Start Date</label>
          <input type="date" id="startDate">
        </div>

        <div class="input-group">
          <label>Operation</label>
          <div class="btn-row">
            <button class="secondary" id="addBtn" onclick="setOperation('add')">+ Add</button>
            <button class="secondary" id="subBtn" onclick="setOperation('subtract')">− Subtract</button>
          </div>
        </div>

        <div class="input-group">
          <label>Days</label>
          <div class="presets">
            <button class="preset-btn" onclick="setDays(1)">+1</button>
            <button class="preset-btn" onclick="setDays(7)">+7</button>
            <button class="preset-btn" onclick="setDays(30)">+30</button>
            <button class="preset-btn" onclick="setDays(90)">+90</button>
            <button class="preset-btn" onclick="setDays(365)">+365</button>
          </div>
          <input type="number" id="days" value="1" min="0">
        </div>

        <button onclick="calculate()">Calculate</button>
      </div>

      <div class="mode-section" id="diff-mode">
        <div class="input-group">
          <label>Start Date</label>
          <input type="date" id="startDate2">
        </div>

        <div class="input-group">
          <label>End Date</label>
          <input type="date" id="endDate2">
        </div>

        <button onclick="calculateDiff()">Calculate Difference</button>
      </div>
    </div>

    <div class="result" id="result" style="display: none;">
      <div class="result-date" id="resultDate"></div>
      <div class="result-details" id="resultDetails"></div>
    </div>

    <div class="history">
      <h3>Recent <button class="clear-btn" onclick="clearHistory()">Clear</button></h3>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    let operation = 'add';
    let history = JSON.parse(localStorage.getItem('dateCalcHistory') || '[]');

    // Set default dates
    document.getElementById('startDate').valueAsDate = new Date();
    document.getElementById('startDate2').valueAsDate = new Date();
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById('endDate2').valueAsDate = tomorrow;

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.mode-section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.mode + '-mode').classList.add('active');
        hideResult();
      });
    });

    function setOperation(op) {
      operation = op;
      document.getElementById('addBtn').classList.toggle('secondary', op !== 'add');
      document.getElementById('subBtn').classList.toggle('secondary', op !== 'subtract');
      hideResult();
    }

    function setDays(val) {
      document.getElementById('days').value = val;
    }

    function calculate() {
      const startDate = new Date(document.getElementById('startDate').value);
      const days = parseInt(document.getElementById('days').value) || 0;

      if (isNaN(startDate.getTime())) {
        showError('Please select a valid start date');
        return;
      }

      const resultDate = new Date(startDate);
      resultDate.setDate(resultDate.getDate() + (operation === 'add' ? days : -days));

      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const formattedDate = resultDate.toLocaleDateString('en-US', options);

      let details = `${operation === 'add' ? '+' : '-'}${days} day${days !== 1 ? 's' : ''} from ${startDate.toLocaleDateString()}`;

      showResult(formattedDate, details);
      addToHistory(`${operation === 'add' ? '+' : '-'}${days}d`, formattedDate);
    }

    function calculateDiff() {
      const start = new Date(document.getElementById('startDate2').value);
      const end = new Date(document.getElementById('endDate2').value);

      if (isNaN(start.getTime()) || isNaN(end.getTime())) {
        showError('Please select valid dates');
        return;
      }

      const diffTime = end - start;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      const diffWeeks = Math.floor(diffDays / 7);
      const diffMonths = Math.floor(diffDays / 30);

      let details = `${Math.abs(diffDays)} day${Math.abs(diffDays) !== 1 ? 's' : ''}`;
      if (Math.abs(diffWeeks) > 0) details += ` (${Math.abs(diffWeeks)} weeks)`;
      if (Math.abs(diffMonths) > 0) details += ` (${Math.abs(diffMonths)} months)`;

      if (diffDays > 0) {
        details += ' • Future';
      } else if (diffDays < 0) {
        details += ' • Past';
      } else {
        details += ' • Same day';
      }

      showResult(Math.abs(diffDays) + ' days', details);
      addToHistory('diff', `${start.toLocaleDateString()} → ${end.toLocaleDateString()}: ${Math.abs(diffDays)}d`);
    }

    function showResult(date, details) {
      const resultEl = document.getElementById('result');
      resultEl.style.display = 'block';
      resultEl.classList.remove('result-error');
      document.getElementById('resultDate').textContent = date;
      document.getElementById('resultDetails').textContent = details;
    }

    function showError(msg) {
      const resultEl = document.getElementById('result');
      resultEl.style.display = 'block';
      resultEl.classList.add('result-error');
      document.getElementById('resultDate').textContent = 'Error';
      document.getElementById('resultDetails').textContent = msg;
    }

    function hideResult() {
      document.getElementById('result').style.display = 'none';
    }

    function addToHistory(action, result) {
      history.unshift({ action, result, time: Date.now() });
      history = history.slice(0, 10);
      localStorage.setItem('dateCalcHistory', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<p style="color: var(--text-muted); font-size: 0.875rem;">No recent calculations</p>';
        return;
      }
      list.innerHTML = history.map(h => `
        <div class="history-item">
          <span>${h.action}</span>
          <strong>${h.result}</strong>
        </div>
      `).join('');
    }

    function clearHistory() {
      history = [];
      localStorage.setItem('dateCalcHistory', JSON.stringify(history));
      renderHistory();
    }

    renderHistory();
  </script>
</body>
</html>
