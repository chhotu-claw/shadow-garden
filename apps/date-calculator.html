<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Calculator — Shadow's Garden</title>
<meta name="description">Calculate days between dates, add/subtract days, find day of week. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .date-calc { max-width: 600px; margin: 0 auto; }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tab {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .tab:hover { border-color: var(--accent); }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .panel { display: none; }
  .panel.active { display: block; }
  .input-group {
    margin-bottom: 20px;
  }
  .input-group label {
    display: block;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .input-group input {
    width: 100%;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 18px;
    box-sizing: border-box;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .result {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
  }
  .quick-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .quick-btn {
    padding: 8px 12px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .quick-btn:hover { border-color: var(--accent); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="date-calc">
    <h1>Date Calculator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Calculate days between dates, add/subtract days, day of week.</p>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('diff')">Days Between</button>
      <button class="tab" onclick="switchTab('add')">Add/Subtract</button>
      <button class="tab" onclick="switchTab('info')">Day Info</button>
    </div>
    
    <!-- Days Between -->
    <div class="panel active" id="diffPanel">
      <div class="input-group">
        <label>From</label>
        <input type="date" id="diffFrom" onchange="calcDiff()">
      </div>
      <div class="input-group">
        <label>To</label>
        <input type="date" id="diffTo" onchange="calcDiff()">
      </div>
      <div class="result" id="diffResult">Select dates</div>
    </div>
    
    <!-- Add/Subtract -->
    <div class="panel" id="addPanel">
      <div class="input-group">
        <label>Start Date</label>
        <input type="date" id="addStart" onchange="calcAdd()">
      </div>
      <div class="input-group">
        <label>Add or Subtract Days</label>
        <input type="number" id="addDays" value="7" onchange="calcAdd()">
      </div>
      <div class="result" id="addResult">Select a date</div>
    </div>
    
    <!-- Day Info -->
    <div class="panel" id="infoPanel">
      <div class="input-group">
        <label>Date</label>
        <input type="date" id="infoDate" onchange="calcInfo()">
      </div>
      <div class="result" id="infoResult">Select a date</div>
    </div>
  </div>
</div>
<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tab + 'Panel').classList.add('active');
  }
  
  function calcDiff() {
    const from = document.getElementById('diffFrom').value;
    const to = document.getElementById('diffTo').value;
    if (!from || !to) return;
    
    const d1 = new Date(from);
    const d2 = new Date(to);
    const diff = Math.abs(Math.floor((d2 - d1) / (1000 * 60 * 60 * 24)));
    
    const nights = d2 > d1 ? diff : diff;
    document.getElementById('diffResult').innerHTML = diff + ' day' + (diff !== 1 ? 's' : '');
  }
  
  function calcAdd() {
    const start = document.getElementById('addStart').value;
    const days = parseInt(document.getElementById('addDays').value) || 0;
    if (!start) return;
    
    const d = new Date(start);
    d.setDate(d.getDate() + days);
    
    document.getElementById('addResult').textContent = d.toLocaleDateString('en-US', { 
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
    });
  }
  
  function calcInfo() {
    const date = document.getElementById('infoDate').value;
    if (!date) return;
    
    const d = new Date(date);
    const dayOfWeek = d.toLocaleDateString('en-US', { weekday: 'long' });
    const weekNum = getWeekNumber(d);
    
    document.getElementById('infoResult').innerHTML = dayOfWeek + '<br><span style="font-size:16px;color:#888">Week ' + weekNum + '</span>';
  }
  
  function getWeekNumber(d) {
    const oneJan = new Date(d.getFullYear(), 0, 1);
    const weekNum = Math.ceil((((d - oneJan) / 86400000) + oneJan.getDay() + 1) / 7);
    return weekNum;
  }
  
  // Set default dates
  document.getElementById('diffTo').valueAsDate = new Date();
  document.getElementById('addStart').valueAsDate = new Date();
  document.getElementById('infoDate').valueAsDate = new Date();
</script>
</body>
</html>
