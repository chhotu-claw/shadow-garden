<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate days between dates, add/subtract days, find day of week. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .calculator {
    max-width: 600px;
    margin: 0 auto;
  }
  .calc-section {
    margin-bottom: 28px;
  }
  .calc-section h2 {
    font-size: 18px;
    margin-bottom: 14px;
    color: var(--accent);
  }
  .input-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .input-row label {
    min-width: 100px;
    color: var(--text-secondary);
  }
  input[type="date"], input[type="number"] {
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
  }
  input[type="date"]:focus, input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  .result-box {
    padding: 16px;
    background: var(--bg);
    border: 2px solid var(--accent);
    border-radius: 8px;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    color: var(--text);
  }
  .btn {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover {
    opacity: 0.85;
  }
  .quick-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .quick-btn {
    padding: 8px 14px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="calculator">
    <h1>Date Calculator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 24px;">Calculate date differences, add/subtract days, find day of week. All local, no tracking.</p>

    <!-- Date Difference -->
    <div class="calc-section">
      <h2>📅 Days Between Dates</h2>
      <div class="input-row">
        <label>From:</label>
        <input type="date" id="diffFrom">
      </div>
      <div class="input-row">
        <label>To:</label>
        <input type="date" id="diffTo">
      </div>
      <button class="btn" onclick="calculateDiff()">Calculate</button>
      <div class="result-box" id="diffResult" style="margin-top: 14px;">Enter dates to calculate</div>
    </div>

    <!-- Add/Subtract Days -->
    <div class="calc-section">
      <h2>➕ Add or Subtract Days</h2>
      <div class="input-row">
        <label>Start Date:</label>
        <input type="date" id="addDate">
      </div>
      <div class="input-row">
        <label>Days:</label>
        <input type="number" id="addDays" value="7" style="width: 100px;">
        <span style="color: var(--text-secondary);">(negative to subtract)</span>
      </div>
      <div class="quick-btns">
        <button class="quick-btn" onclick="setDays(-7)">-7 days</button>
        <button class="quick-btn" onclick="setDays(-30)">-30 days</button>
        <button class="quick-btn" onclick="setDays(7)">+7 days</button>
        <button class="quick-btn" onclick="setDays(30)">+30 days</button>
        <button class="quick-btn" onclick="setDays(90)">+90 days</button>
        <button class="quick-btn" onclick="setDays(365)">+1 year</button>
      </div>
      <button class="btn" onclick="calculateAdd()" style="margin-top: 12px;">Calculate</button>
      <div class="result-box" id="addResult" style="margin-top: 14px;">Enter a date</div>
    </div>

    <!-- Day of Week -->
    <div class="calc-section">
      <h2>📆 Day of Week</h2>
      <div class="input-row">
        <label>Date:</label>
        <input type="date" id="dowDate">
      </div>
      <button class="btn" onclick="calculateDow()">Find Day</button>
      <div class="result-box" id="dowResult" style="margin-top: 14px;">Select a date</div>
    </div>

    <!-- Week Number -->
    <div class="calc-section">
      <h2>🔢 Week Number</h2>
      <div class="input-row">
        <label>Date:</label>
        <input type="date" id="weekDate">
      </div>
      <button class="btn" onclick="calculateWeek()">Find Week</button>
      <div class="result-box" id="weekResult" style="margin-top: 14px;">Select a date</div>
    </div>

  </div>
</div>
<script>
  const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

  // Set default dates to today
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('diffFrom').value = today;
  document.getElementById('diffTo').value = today;
  document.getElementById('addDate').value = today;
  document.getElementById('dowDate').value = today;
  document.getElementById('weekDate').value = today;

  function calculateDiff() {
    const from = new Date(document.getElementById('diffFrom').value);
    const to = new Date(document.getElementById('diffTo').value);
    
    if (isNaN(from) || isNaN(to)) {
      document.getElementById('diffResult').textContent = 'Please enter valid dates';
      return;
    }
    
    const diffTime = to - from;
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    
    let text = `${diffDays} day${Math.abs(diffDays) !== 1 ? 's' : ''}`;
    if (diffDays === 0) {
      text += ' (same day)';
    } else if (diffDays > 0) {
      text += ' (forward)';
    } else {
      text += ' (backward)';
    }
    
    document.getElementById('diffResult').textContent = text;
  }

  function setDays(val) {
    document.getElementById('addDays').value = val;
    calculateAdd();
  }

  function calculateAdd() {
    const start = new Date(document.getElementById('addDate').value);
    const days = parseInt(document.getElementById('addDays').value) || 0;
    
    if (isNaN(start.getTime())) {
      document.getElementById('addResult').textContent = 'Please enter a valid date';
      return;
    }
    
    const result = new Date(start);
    result.setDate(result.getDate() + days);
    
    const formatted = result.toLocaleDateString('en-US', { 
      weekday: 'long', 
      year: 'numeric', 
      month: 'long', 
      day: 'numeric' 
    });
    
    document.getElementById('addResult').textContent = formatted;
  }

  function calculateDow() {
    const date = new Date(document.getElementById('dowDate').value);
    
    if (isNaN(date.getTime())) {
      document.getElementById('dowResult').textContent = 'Please enter a valid date';
      return;
    }
    
    document.getElementById('dowResult').textContent = daysOfWeek[date.getDay()];
  }

  function calculateWeek() {
    const date = new Date(document.getElementById('weekDate').value);
    
    if (isNaN(date.getTime())) {
      document.getElementById('weekResult').textContent = 'Please enter a valid date';
      return;
    }
    
    // ISO week number
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    
    document.getElementById('weekResult').textContent = `Week ${weekNum} of ${date.getFullYear()}`;
  }
</script>
</body>
</html>
