<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Calculator — Shadow's Garden</title>
<meta name="description">Calculate days between dates, add/subtract days. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .date-calc { max-width: 500px; margin: 0 auto; }
  .input-group { margin-bottom: 20px; }
  .input-group label { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  input[type="date"] {
    width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-size: 16px; box-sizing: border-box;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .options { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .option-btn {
    flex: 1; min-width: 120px; padding: 12px; border: 2px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer;
  }
  .option-btn:hover { border-color: var(--accent); }
  .option-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .input-group.num input {
    width: 80px; padding: 12px; border: 2px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-size: 16px; text-align: center;
  }
  .result {
    background: var(--bg); border: 2px solid var(--border); border-radius: 8px;
    padding: 20px; text-align: center; margin-bottom: 20px;
  }
  .result-date { font-size: 28px; font-weight: 600; color: var(--text); }
  .result-label { font-size: 14px; color: var(--text-secondary); margin-top: 8px; }
  .details {
    display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid var(--border);
  }
  .detail-item { text-align: center; }
  .detail-value { font-size: 20px; font-weight: 600; color: var(--text); }
  .detail-label { font-size: 12px; color: var(--text-secondary); }
  button.calculate {
    width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 8px;
    background: var(--accent); border-color: var(--accent); color: white; font-size: 16px; cursor: pointer;
  }
  button.calculate:hover { opacity: 0.9; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="date-calc">
    <h1>Date Calculator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Calculate days between dates or add/subtract.</p>
    
    <div class="options">
      <button class="option-btn active" onclick="setMode('diff', this)" id="modeDiff">Days Between</button>
      <button class="option-btn" onclick="setMode('add', this)" id="modeAdd">Add Days</button>
      <button class="option-btn" onclick="setMode('sub', this)" id="modeSub">Subtract Days</button>
    </div>
    
    <div class="input-group">
      <label id="date1Label">Start Date</label>
      <input type="date" id="date1">
    </div>
    
    <div class="input-group num" id="daysInput" style="display:none;">
      <label>Days</label>
      <input type="number" id="daysNum" value="1">
    </div>
    
    <div class="input-group">
      <label id="date2Label" style="display:none;">End Date</label>
      <input type="date" id="date2" style="display:none;">
    </div>
    
    <button class="calculate" onclick="calculate()">Calculate</button>
    
    <div class="result" id="result" style="display:none;">
      <div class="result-date" id="resultDate">--</div>
      <div class="result-label" id="resultLabel">days</div>
      <div class="details" id="details" style="display:none;">
        <div class="detail-item"><div class="detail-value" id="weekNum">0</div><div class="detail-label">weeks</div></div>
        <div class="detail-item"><div class="detail-value" id="monthNum">0</div><div class="detail-label">months</div></div>
      </div>
    </div>
  </div>
</div>
<script>
  let mode = 'diff';
  
  function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const daysInput = document.getElementById('daysInput');
    const date2Input = document.getElementById('date2');
    const date2Label = document.getElementById('date2Label');
    
    if (mode === 'diff') {
      daysInput.style.display = 'none';
      date2Input.style.display = 'block';
      date2Label.style.display = 'block';
      document.getElementById('date1Label').textContent = 'Start Date';
      document.getElementById('resultLabel').textContent = 'days between';
    } else {
      daysInput.style.display = 'block';
      date2Input.style.display = 'none';
      date2Label.style.display = 'none';
      document.getElementById('date1Label').textContent = 'Start Date';
      document.getElementById('resultLabel').textContent = 'days later';
    }
    
    document.getElementById('result').style.display = 'none';
  }
  
  function calculate() {
    const date1 = new Date(document.getElementById('date1').value);
    let date2, resultDate, days;
    
    if (mode === 'diff') {
      date2 = new Date(document.getElementById('date2').value);
      days = Math.round((date2 - date1) / (1000 * 60 * 60 * 24));
      resultDate = date2;
    } else if (mode === 'add') {
      const daysNum = parseInt(document.getElementById('daysNum').value) || 0;
      resultDate = new Date(date1.getTime() + daysNum * 24 * 60 * 60 * 1000);
      days = daysNum;
    } else {
      const daysNum = parseInt(document.getElementById('daysNum').value) || 0;
      resultDate = new Date(date1.getTime() - daysNum * 24 * 60 * 60 * 1000);
      days = daysNum;
    }
    
    if (isNaN(date1.getTime())) return;
    
    document.getElementById('result').style.display = 'block';
    document.getElementById('resultDate').textContent = resultDate.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    document.getElementById('resultLabel').textContent = mode === 'diff' ? 'days between' : 'days ' + (mode === 'add' ? 'later' : 'earlier');
    
    if (mode !== 'diff') {
      document.getElementById('details').style.display = 'flex';
      document.getElementById('weekNum').textContent = Math.floor(days / 7);
      document.getElementById('monthNum').textContent = Math.floor(days / 30);
    } else {
      document.getElementById('details').style.display = 'none';
    }
  }
</script>
</body>
</html>
