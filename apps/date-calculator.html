<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate days between dates, add or subtract days, and count working days. Free date arithmetic tool.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-mono); }
  .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
  
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  
  .card h2 {
    font-size: 1.1rem;
    margin: 0 0 1rem 0;
    color: var(--accent);
  }
  
  .input-group {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 1rem;
  }
  
  .input-group label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.3rem;
  }
  
  input[type="date"], input[type="number"] {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.8rem;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 1rem;
  }
  
  input[type="date"]:focus, input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  
  button:hover { opacity: 0.85; }
  button.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  
  .result {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem;
    margin-top: 1rem;
    font-size: 1.5rem;
    text-align: center;
    color: var(--accent);
  }
  
  .result-label {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  
  .result-small {
    font-size: 0.95rem;
    color: var(--text-muted);
  }
  
  .presets {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }
  
  .presets button {
    font-size: 0.8rem;
    padding: 0.4rem 0.7rem;
  }
  
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }
  
  .checkbox-group input {
    width: auto;
  }
  
  .checkbox-group label {
    margin: 0;
    font-size: 0.9rem;
    color: var(--text);
  }
  
  @media (max-width: 500px) {
    .input-group { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Date Calculator</h1>
  <p class="subtitle">Calculate days between dates, add/subtract days, count working days</p>
  
  <!-- Days Between Two Dates -->
  <div class="card">
    <h2>Days Between Two Dates</h2>
    <div class="input-group">
      <div>
        <label>Start Date</label>
        <input type="date" id="startDate">
      </div>
      <div>
        <label>End Date</label>
        <input type="date" id="endDate">
      </div>
      <button onclick="calculateDays()">Calculate</button>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="excludeWeekends">
      <label for="excludeWeekends">Exclude weekends (working days only)</label>
    </div>
    <div class="result" id="daysResult" style="display:none;">
      <div class="result-label">Difference</div>
      <div id="daysOutput"></div>
      <div class="result-small" id="daysDetails"></div>
    </div>
  </div>
  
  <!-- Add/Subtract Days -->
  <div class="card">
    <h2>Add or Subtract Days</h2>
    <div class="input-group">
      <div>
        <label>Start Date</label>
        <input type="date" id="calcStartDate">
      </div>
      <div>
        <label>Days to Add/Subtract</label>
        <input type="number" id="daysOffset" value="30" style="width:100px;">
      </div>
      <button onclick="calculateOffset()">Calculate</button>
    </div>
    <div class="presets">
      <button class="secondary" onclick="setOffset(7)">+7 days</button>
      <button class="secondary" onclick="setOffset(14)">+14 days</button>
      <button class="secondary" onclick="setOffset(30)">+30 days</button>
      <button class="secondary" onclick="setOffset(90)">+90 days</button>
      <button class="secondary" onclick="setOffset(365)">+1 year</button>
      <button class="secondary" onclick="setOffset(-7)">-7 days</button>
      <button class="secondary" onclick="setOffset(-30)">-30 days</button>
    </div>
    <div class="result" id="offsetResult" style="display:none;">
      <div class="result-label">Result</div>
      <div id="offsetOutput"></div>
    </div>
  </div>
  
  <!-- Working Days Calculator -->
  <div class="card">
    <h2>Working Days Calculator</h2>
    <div class="input-group">
      <div>
        <label>Start Date</label>
        <input type="date" id="workStartDate">
      </div>
      <div>
        <label>End Date</label>
        <input type="date" id="workEndDate">
      </div>
      <button onclick="calculateWorkingDays()">Calculate</button>
    </div>
    <div class="result" id="workingDaysResult" style="display:none;">
      <div class="result-label">Working Days (Mon-Fri)</div>
      <div id="workingDaysOutput"></div>
      <div class="result-small" id="workingDaysDetails"></div>
    </div>
  </div>
  
  <!-- Quick Today -->
  <div class="card">
    <h2>Quick Actions</h2>
    <div class="input-group">
      <button class="secondary" onclick="setToday()">Set to Today</button>
      <button class="secondary" onclick="clearAll()">Clear All</button>
    </div>
  </div>
</div>

<script>
  const today = new Date().toISOString().split('T')[0];
  
  function setToday() {
    document.getElementById('startDate').value = today;
    document.getElementById('calcStartDate').value = today;
    document.getElementById('workStartDate').value = today;
  }
  
  function clearAll() {
    document.querySelectorAll('input[type="date"], input[type="number"]').forEach(el => {
      if (el.type === 'number') el.value = '30';
      else el.value = '';
    });
    document.querySelectorAll('.result').forEach(el => el.style.display = 'none');
  }
  
  function formatDate(dateStr) {
    const date = new Date(dateStr + 'T00:00:00');
    return date.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
  }
  
  function getDayOfWeek(dateStr) {
    const date = new Date(dateStr + 'T00:00:00');
    return date.getDay();
  }
  
  function daysBetween(start, end) {
    const startDate = new Date(start + 'T00:00:00');
    const endDate = new Date(end + 'T00:00:00');
    const diffTime = endDate - startDate;
    return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  }
  
  function calculateDays() {
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    const excludeWeekends = document.getElementById('excludeWeekends').checked;
    
    if (!start || !end) return;
    
    const totalDays = Math.abs(daysBetween(start, end)) + 1;
    let resultDiv = document.getElementById('daysResult');
    let output = document.getElementById('daysOutput');
    let details = document.getElementById('daysDetails');
    
    resultDiv.style.display = 'block';
    
    if (excludeWeekends) {
      let workingDays = 0;
      let current = new Date(start + 'T00:00:00');
      let endDate = new Date(end + 'T00:00:00');
      
      // Ensure we iterate from earlier to later
      if (current > endDate) {
        [current, endDate] = [endDate, current];
      }
      
      while (current <= endDate) {
        const day = current.getDay();
        if (day !== 0 && day !== 6) workingDays++;
        current.setDate(current.getDate() + 1);
      }
      
      output.textContent = workingDays + ' working days';
      details.textContent = '(' + totalDays + ' total calendar days)';
    } else {
      output.textContent = totalDays + ' days';
      
      const years = Math.floor(totalDays / 365);
      const months = Math.floor((totalDays % 365) / 30);
      const remainingDays = totalDays % 30;
      
      let parts = [];
      if (years) parts.push(years + ' year' + (years > 1 ? 's' : ''));
      if (months) parts.push(months + ' month' + (months > 1 ? 's' : ''));
      if (remainingDays || parts.length === 0) parts.push(remainingDays + ' day' + (remainingDays !== 1 ? 's' : ''));
      
      details.textContent = '≈ ' + parts.join(', ');
    }
  }
  
  function setOffset(val) {
    document.getElementById('daysOffset').value = val;
    calculateOffset();
  }
  
  function calculateOffset() {
    const start = document.getElementById('calcStartDate').value;
    const offset = parseInt(document.getElementById('daysOffset').value) || 0;
    
    if (!start) return;
    
    const resultDiv = document.getElementById('offsetResult');
    const output = document.getElementById('offsetOutput');
    
    resultDiv.style.display = 'block';
    
    const startDate = new Date(start + 'T00:00:00');
    startDate.setDate(startDate.getDate() + offset);
    
    const resultStr = startDate.toISOString().split('T')[0];
    output.textContent = formatDate(resultStr);
    
    if (offset > 0) {
      output.textContent += ' (+' + offset + ' days)';
    } else if (offset < 0) {
      output.textContent += ' (' + offset + ' days)';
    }
  }
  
  function calculateWorkingDays() {
    const start = document.getElementById('workStartDate').value;
    const end = document.getElementById('workEndDate').value;
    
    if (!start || !end) return;
    
    const resultDiv = document.getElementById('workingDaysResult');
    const output = document.getElementById('workingDaysOutput');
    const details = document.getElementById('workingDaysDetails');
    
    resultDiv.style.display = 'block';
    
    let current = new Date(start + 'T00:00:00');
    let endDate = new Date(end + 'T00:00:00');
    let workingDays = 0;
    let weekends = 0;
    
    if (current > endDate) {
      [current, endDate] = [endDate, current];
    }
    
    while (current <= endDate) {
      const day = current.getDay();
      if (day !== 0 && day !== 6) workingDays++;
      else weekends++;
      current.setDate(current.getDate() + 1);
    }
    
    output.textContent = workingDays + ' days';
    details.textContent = weekends + ' weekend day' + (weekends !== 1 ? 's' : '');
  }
  
  // Initialize with today's date
  setToday();
</script>
</body>
</html>
