<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Calculator — Shadow's Garden</title>
<meta name="description" content="Add/subtract days from dates, calculate differences between dates">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #8b5cf6;
    --accent-dark: #7c3aed;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
  }
  .calculator {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 1rem;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
  }
  h1 {
    color: #fff;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .mode-toggle {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .mode-toggle button {
    flex: 1;
    padding: 0.75rem;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
    border-radius: 0.5rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .mode-toggle button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .mode-toggle button:hover:not(.active) {
    background: rgba(255,255,255,0.1);
  }
  .input-group {
    margin-bottom: 1.25rem;
  }
  label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  input[type="date"], input[type="number"] {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="date"]:focus, input[type="number"]:focus {
    border-color: var(--accent);
  }
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
  }
  .presets {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }
  .presets button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.25rem;
    padding: 0.4rem 0.75rem;
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .presets button:hover {
    background: rgba(255,255,255,0.2);
  }
  .result {
    background: rgba(139, 92, 246, 0.15);
    border: 1px solid var(--accent);
    border-radius: 0.5rem;
    padding: 1.5rem;
    text-align: center;
    margin-top: 1.5rem;
  }
  .result-value {
    font-size: 1.75rem;
    font-weight: bold;
    color: #fff;
  }
  .result-date {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
    margin-top: 0.5rem;
  }
  .history {
    margin-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 1rem;
  }
  .history h3 {
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem;
    background: rgba(0,0,0,0.2);
    border-radius: 0.25rem;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.6);
  }
  .history-item .del {
    color: #ef4444;
    cursor: pointer;
    padding: 0 0.25rem;
  }
  .hidden { display: none; }
</style>
</head>
<body data-page-type="app">
<div class="calculator">
  <h1>📅 Date Calculator</h1>
  
  <div class="mode-toggle">
    <button id="modeAdd" class="active" onclick="setMode('add')">Add/Subtract</button>
    <button id="modeDiff" onclick="setMode('diff')">Date Difference</button>
  </div>
  
  <div id="addMode">
    <div class="input-group">
      <label>Start Date</label>
      <input type="date" id="startDate">
    </div>
    
    <div class="input-group">
      <label>Add or Subtract Days</label>
      <input type="number" id="days" value="7" placeholder="Number of days">
      <div class="presets">
        <button onclick="setDays(-1)">-1 day</button>
        <button onclick="setDays(-7)">-1 week</button>
        <button onclick="setDays(-30)">-1 month</button>
        <button onclick="setDays(-365)">-1 year</button>
        <button onclick="setDays(1)">+1 day</button>
        <button onclick="setDays(7)">+1 week</button>
        <button onclick="setDays(30)">+1 month</button>
        <button onclick="setDays(365)">+1 year</button>
      </div>
    </div>
  </div>
  
  <div id="diffMode" class="hidden">
    <div class="input-group">
      <label>From Date</label>
      <input type="date" id="dateFrom">
    </div>
    
    <div class="input-group">
      <label>To Date</label>
      <input type="date" id="dateTo">
    </div>
  </div>
  
  <div class="result">
    <div class="result-value" id="result">Select a mode</div>
    <div class="result-date" id="resultDate"></div>
  </div>
  
  <div class="history">
    <h3>History</h3>
    <div id="historyList"></div>
  </div>
</div>

<script>
let mode = 'add';
let history = JSON.parse(localStorage.getItem('dateCalcHistory') || '[]');

const startDate = document.getElementById('startDate');
const daysInput = document.getElementById('days');
const dateFrom = document.getElementById('dateFrom');
const dateTo = document.getElementById('dateTo');
const result = document.getElementById('result');
const resultDate = document.getElementById('resultDate');

// Set default dates
const today = new Date();
startDate.value = today.toISOString().split('T')[0];
dateFrom.value = today.toISOString().split('T')[0];
dateTo.value = new Date(today.getTime() + 30*24*60*60*1000).toISOString().split('T')[0];

function setMode(m) {
  mode = m;
  document.getElementById('modeAdd').classList.toggle('active', m === 'add');
  document.getElementById('modeDiff').classList.toggle('active', m === 'diff');
  document.getElementById('addMode').classList.toggle('hidden', m !== 'add');
  document.getElementById('diffMode').classList.toggle('hidden', m !== 'diff');
  calculate();
}

function setDays(n) {
  daysInput.value = n;
  calculate();
}

function calculate() {
  if (mode === 'add') {
    const start = new Date(startDate.value);
    const days = parseInt(daysInput.value) || 0;
    const resultDateObj = new Date(start.getTime() + days * 24 * 60 * 60 * 1000);
    
    result.textContent = resultDateObj.toLocaleDateString('en-US', { 
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
    });
    
    const diff = resultDateObj - today;
    const diffDays = Math.ceil(diff / (24*60*60*1000));
    resultDate.textContent = diffDays === 0 ? 'Today' : 
      diffDays > 0 ? `In ${diffDays} days` : `${Math.abs(diffDays)} days ago`;
    
    addToHistory(`${days > 0 ? '+' : ''}${days} days from ${formatShort(start)}`, resultDateObj);
  } else {
    const from = new Date(dateFrom.value);
    const to = new Date(dateTo.value);
    const diffTime = Math.abs(to - from);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    
    const years = Math.floor(diffDays / 365);
    const months = Math.floor((diffDays % 365) / 30);
    const days = diffDays % 30;
    
    let breakdown = [];
    if (years) breakdown.push(`${years} year${years > 1 ? 's' : ''}`);
    if (months) breakdown.push(`${months} month${months > 1 ? 's' : ''}`);
    if (days) breakdown.push(`${days} day${days > 1 ? 's' : ''}`);
    
    result.textContent = diffDays + ' day' + (diffDays !== 1 ? 's' : '');
    resultDate.textContent = breakdown.join(', ') || 'Same day';
    
    addToHistory(`${formatShort(from)} → ${formatShort(to)}`, null, diffDays);
  }
}

function formatShort(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function addToHistory(label, dateObj, days) {
  const entry = { label, days, time: Date.now() };
  
  // Avoid duplicates
  if (history.some(h => h.label === label && Date.now() - h.time < 60000)) return;
  
  history.unshift(entry);
  history = history.slice(0, 10);
  localStorage.setItem('dateCalcHistory', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!history.length) {
    list.innerHTML = '<div style="color:rgba(255,255,255,0.4);font-size:0.75rem">No history yet</div>';
    return;
  }
  list.innerHTML = history.map((h, i) => `
    <div class="history-item">
      <span>${h.label}${h.days !== undefined ? ` (${h.days}d)` : ''}</span>
      <span class="del" onclick="deleteHistory(${i})">×</span>
    </div>
  `).join('');
}

function deleteHistory(i) {
  history.splice(i, 1);
  localStorage.setItem('dateCalcHistory', JSON.stringify(history));
  renderHistory();
}

startDate.addEventListener('change', calculate);
daysInput.addEventListener('input', calculate);
dateFrom.addEventListener('change', calculate);
dateTo.addEventListener('change', calculate);

renderHistory();
calculate();
</script>
</body>
</html>
