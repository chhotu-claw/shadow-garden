<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate the number of days between two dates. Add or subtract days from any date.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
  input, select { padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 1rem; }
  input[type="date"] { width: 100%; box-sizing: border-box; }
  .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 6px; background: var(--accent); color: var(--bg); font-size: 1rem; cursor: pointer; font-weight: 500; }
  .btn:hover { opacity: 0.9; }
  .result { font-size: 2rem; font-weight: 600; text-align: center; padding: 1.5rem; background: var(--bg); border-radius: 8px; margin-top: 1rem; }
  .result span { color: var(--accent); }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .tab { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; }
  .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .hidden { display: none; }
  .row { display: flex; gap: 1rem; align-items: center; margin-top: 1rem; }
  .row input { flex: 1; }
  .mode-section { margin-bottom: 1rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Date Calculator</h1>
  <div class="subtitle">Calculate days between dates or add/subtract from a date</div>

  <div class="panel">
    <div class="tabs">
      <button class="tab active" data-mode="diff">Days Between</button>
      <button class="tab" data-mode="add">Add Days</button>
      <button class="tab" data-mode="sub">Subtract Days</button>
    </div>

    <div id="diffSection" class="mode-section">
      <label>Start Date</label>
      <input type="date" id="startDate">
      <label style="margin-top: 1rem;">End Date</label>
      <input type="date" id="endDate">
    </div>

    <div id="addSection" class="mode-section hidden">
      <label>Start Date</label>
      <input type="date" id="addStartDate">
      <label style="margin-top: 1rem;">Days to Add</label>
      <input type="number" id="daysToAdd" value="30" min="0">
    </div>

    <div id="subSection" class="mode-section hidden">
      <label>Start Date</label>
      <input type="date" id="subStartDate">
      <label style="margin-top: 1rem;">Days to Subtract</label>
      <input type="number" id="daysToSub" value="30" min="0">
    </div>

    <div class="row">
      <button class="btn" id="calculateBtn">Calculate</button>
      <button class="btn" style="background: var(--border);" id="todayBtn">Today</button>
    </div>

    <div class="result" id="result">—</div>
  </div>
</div>

<script>
const tabs = document.querySelectorAll('.tab');
const sections = {
  diff: document.getElementById('diffSection'),
  add: document.getElementById('addSection'),
  sub: document.getElementById('subSection')
};
let currentMode = 'diff';

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    Object.values(sections).forEach(s => s.classList.add('hidden'));
    sections[currentMode].classList.remove('hidden');
    document.getElementById('result').textContent = '—';
  });
});

document.getElementById('todayBtn').addEventListener('click', () => {
  const today = new Date().toISOString().split('T')[0];
  if (currentMode === 'diff') {
    document.getElementById('startDate').value = today;
    document.getElementById('endDate').value = today;
  } else if (currentMode === 'add') {
    document.getElementById('addStartDate').value = today;
  } else {
    document.getElementById('subStartDate').value = today;
  }
});

document.getElementById('calculateBtn').addEventListener('click', calculate);

function calculate() {
  const result = document.getElementById('result');
  
  try {
    if (currentMode === 'diff') {
      const start = new Date(document.getElementById('startDate').value);
      const end = new Date(document.getElementById('endDate').value);
      if (isNaN(start) || isNaN(end)) {
        result.innerHTML = '<span style="color: var(--text-secondary)">Select both dates</span>';
        return;
      }
      const diff = Math.round((end - start) / (1000 * 60 * 60 * 24));
      const absDiff = Math.abs(diff);
      if (diff === 0) {
        result.innerHTML = '<span>Same day</span>';
      } else if (diff > 0) {
        result.innerHTML = `<span>${absDiff}</span> days`;
      } else {
        result.innerHTML = `<span>${absDiff}</span> days ago`;
      }
    } else if (currentMode === 'add') {
      const start = new Date(document.getElementById('addStartDate').value);
      const days = parseInt(document.getElementById('daysToAdd').value) || 0;
      if (isNaN(start)) {
        result.innerHTML = '<span style="color: var(--text-secondary)">Select a date</span>';
        return;
      }
      start.setDate(start.getDate() + days);
      result.innerHTML = `Result: <span>${start.toISOString().split('T')[0]}</span>`;
    } else {
      const start = new Date(document.getElementById('subStartDate').value);
      const days = parseInt(document.getElementById('daysToSub').value) || 0;
      if (isNaN(start)) {
        result.innerHTML = '<span style="color: var(--text-secondary)">Select a date</span>';
        return;
      }
      start.setDate(start.getDate() - days);
      result.innerHTML = `Result: <span>${start.toISOString().split('T')[0]}</span>`;
    }
  } catch (e) {
    result.innerHTML = '<span style="color: var(--text-secondary)">Error</span>';
  }
}

document.getElementById('todayBtn').click();
</script>
</body>
</html>
