<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate days between dates, add/subtract days, find weekdays, week numbers, and more">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .calculator {
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem;
  }
  .card {
    background: var(--card-bg, #1e1e2e);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border, #313244);
  }
  .card h2 {
    margin-top: 0;
    font-size: 1.1rem;
    color: var(--accent, #cba6f7);
    margin-bottom: 1rem;
  }
  .input-group {
    margin-bottom: 1rem;
  }
  label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text-secondary, #a6adc8);
    font-size: 0.9rem;
  }
  input[type="date"], input[type="number"], select {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--border, #313244);
    border-radius: 8px;
    background: var(--input-bg, #11111b);
    color: var(--text, #cdd6f4);
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 0.875rem;
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:hover {
    opacity: 0.9;
  }
  button:active {
    transform: scale(0.98);
  }
  .result {
    margin-top: 1rem;
    padding: 1rem;
    background: var(--result-bg, #181825);
    border-radius: 8px;
    text-align: center;
  }
  .result-number {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--accent, #cba6f7);
  }
  .result-label {
    color: var(--text-secondary, #a6adc8);
    margin-top: 0.25rem;
  }
  .today-btn {
    background: transparent;
    border: 1px solid var(--accent, #cba6f7);
    color: var(--accent, #cba6f7);
    margin-top: 0.5rem;
  }
  .quick-dates {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .quick-btn {
    padding: 0.4rem 0.75rem;
    font-size: 0.8rem;
    background: var(--button-bg, #313244);
    color: var(--text, #cdd6f4);
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .quick-btn:hover {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .history {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border, #313244);
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    font-size: 0.9rem;
    color: var(--text-secondary, #a6adc8);
    border-bottom: 1px solid var(--border, #313244);
  }
  .history-item:last-child {
    border-bottom: none;
  }
  .clear-history {
    font-size: 0.8rem;
    color: var(--text-secondary, #a6adc8);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    width: auto;
    padding: 0;
    margin-top: 0.5rem;
  }
  .weekday-result {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--accent, #cba6f7);
  }
</style>
</head>
<body data-page-type="app">
<div class="calculator">
  <h1>📅 Date Calculator</h1>
  
  <!-- Days Between Two Dates -->
  <div class="card">
    <h2>Days Between Two Dates</h2>
    <div class="input-group">
      <label>From</label>
      <input type="date" id="date1">
      <button class="today-btn" onclick="setToday('date1')">Today</button>
    </div>
    <div class="input-group">
      <label>To</label>
      <input type="date" id="date2">
      <button class="today-btn" onclick="setToday('date2')">Today</button>
    </div>
    <button onclick="calcDaysBetween()">Calculate</button>
    <div class="result" id="days-result" style="display:none">
      <div class="result-number" id="days-number"></div>
      <div class="result-label" id="days-label"></div>
    </div>
  </div>

  <!-- Add/Subtract Days -->
  <div class="card">
    <h2>Add or Subtract Days</h2>
    <div class="input-group">
      <label>Start Date</label>
      <input type="date" id="start-date">
      <button class="today-btn" onclick="setToday('start-date')">Today</button>
    </div>
    <div class="input-group">
      <label>Days to Add (negative to subtract)</label>
      <input type="number" id="days-to-add" placeholder="e.g., 30 or -7">
    </div>
    <button onclick="calcNewDate()">Calculate</button>
    <div class="result" id="add-result" style="display:none">
      <div class="result-number" id="new-date"></div>
      <div class="result-label" id="new-date-weekday"></div>
    </div>
  </div>

  <!-- Day of Week -->
  <div class="card">
    <h2>What Day Is It?</h2>
    <div class="input-group">
      <label>Select Date</label>
      <input type="date" id="weekday-date">
      <button class="today-btn" onclick="setToday('weekday-date')">Today</button>
    </div>
    <button onclick="calcWeekday()">Find Day</button>
    <div class="result" id="weekday-result" style="display:none">
      <div class="weekday-result" id="weekday-name"></div>
      <div class="result-label" id="weekday-relative"></div>
    </div>
  </div>

  <!-- Week Number -->
  <div class="card">
    <h2>Week Number</h2>
    <div class="input-group">
      <label>Date</label>
      <input type="date" id="weeknum-date">
      <button class="today-btn" onclick="setToday('weeknum-date')">Today</button>
    </div>
    <button onclick="calcWeekNumber()">Get Week Number</button>
    <div class="result" id="weeknum-result" style="display:none">
      <div class="result-number" id="weeknum-number"></div>
      <div class="result-label">of <span id="weeknum-year"></span></div>
    </div>
  </div>

  <!-- Quick Calculator -->
  <div class="card">
    <h2>Quick — Days From Today</h2>
    <div class="quick-dates">
      <button class="quick-btn" onclick="quickDays(7)">+7 days</button>
      <button class="quick-btn" onclick="quickDays(14)">+14 days</button>
      <button class="quick-btn" onclick="quickDays(30)">+30 days</button>
      <button class="quick-btn" onclick="quickDays(60)">+60 days</button>
      <button class="quick-btn" onclick="quickDays(90)">+90 days</button>
      <button class="quick-btn" onclick="quickDays(365)">+1 year</button>
    </div>
    <div class="result" id="quick-result" style="display:none">
      <div class="result-number" id="quick-date"></div>
      <div class="result-label" id="quick-weekday"></div>
    </div>
  </div>

  <div class="history" id="history-section" style="display:none">
    <h3>Recent Calculations</h3>
    <div id="history-list"></div>
    <button class="clear-history" onclick="clearHistory()">Clear History</button>
  </div>
</div>

<script>
  // Load history from localStorage
  let history = JSON.parse(localStorage.getItem('dateCalcHistory') || '[]');

  function setToday(id) {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById(id).value = today;
  }

  function formatDate(date) {
    return date.toLocaleDateString('en-US', { 
      weekday: 'long', 
      year: 'numeric', 
      month: 'long', 
      day: 'numeric' 
    });
  }

  function addToHistory(text) {
    history.unshift({ text, time: new Date().toISOString() });
    if (history.length > 10) history.pop();
    localStorage.setItem('dateCalcHistory', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('history-section');
    const list = document.getElementById('history-list');
    if (history.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';
    list.innerHTML = history.map(h => `<div class="history-item"><span>${h.text}</span></div>`).join('');
  }

  function clearHistory() {
    history = [];
    localStorage.setItem('dateCalcHistory', '[]');
    renderHistory();
  }

  function calcDaysBetween() {
    const d1 = new Date(document.getElementById('date1').value);
    const d2 = new Date(document.getElementById('date2').value);
    if (isNaN(d1) || isNaN(d2)) return;

    const diff = Math.abs(Math.floor((d2 - d1) / (1000 * 60 * 60 * 24)));
    const label = diff === 1 ? 'day' : 'days';
    
    document.getElementById('days-number').textContent = diff;
    document.getElementById('days-label').textContent = label;
    document.getElementById('days-result').style.display = 'block';
    
    addToHistory(`${diff} days between ${d1.toLocaleDateString()} and ${d2.toLocaleDateString()}`);
  }

  function calcNewDate() {
    const start = new Date(document.getElementById('start-date').value);
    const days = parseInt(document.getElementById('days-to-add').value);
    if (isNaN(start) || isNaN(days)) return;

    const result = new Date(start);
    result.setDate(result.getDate() + days);
    
    document.getElementById('new-date').textContent = result.toLocaleDateString();
    document.getElementById('new-date-weekday').textContent = result.toLocaleDateString('en-US', { weekday: 'long' });
    document.getElementById('add-result').style.display = 'block';
    
    const sign = days >= 0 ? '+' : '';
    addToHistory(`${start.toLocaleDateString()} ${sign}${days} days = ${result.toLocaleDateString()}`);
  }

  function calcWeekday() {
    const date = new Date(document.getElementById('weekday-date').value);
    if (isNaN(date)) return;

    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const dayName = days[date.getDay()];
    
    document.getElementById('weekday-name').textContent = dayName;
    
    const today = new Date();
    const diff = Math.floor((date - today) / (1000 * 60 * 60 * 24));
    let relative = '';
    if (diff === 0) relative = '(Today)';
    else if (diff === 1) relative = '(Tomorrow)';
    else if (diff === -1) relative = '(Yesterday)';
    else if (diff > 0) relative = `(${diff} days from now)`;
    else relative = `(${Math.abs(diff)} days ago)`;
    
    document.getElementById('weekday-relative').textContent = relative;
    document.getElementById('weekday-result').style.display = 'block';
    
    addToHistory(`${date.toLocaleDateString()} is a ${dayName}`);
  }

  function calcWeekNumber() {
    const date = new Date(document.getElementById('weeknum-date').value);
    if (isNaN(date)) return;

    const start = new Date(date.getFullYear(), 0, 1);
    const diff = date - start;
    const oneWeek = 604800000;
    const weekNum = Math.ceil((diff + start.getDay() * 86400000) / oneWeek);
    
    document.getElementById('weeknumber').textContent = weekNum;
    document.getElementById('weeknum-number').textContent = weekNum;
    document.getElementById('weeknum-year').textContent = date.getFullYear();
    document.getElementById('weeknum-result').style.display = 'block';
    
    addToHistory(`${date.toLocaleDateString()} is in week ${weekNum} of ${date.getFullYear()}`);
  }

  function quickDays(days) {
    const today = new Date();
    const result = new Date(today);
    result.setDate(result.getDate() + days);
    
    document.getElementById('quick-date').textContent = result.toLocaleDateString();
    document.getElementById('quick-weekday').textContent = result.toLocaleDateString('en-US', { weekday: 'long' });
    document.getElementById('quick-result').style.display = 'block';
    
    addToHistory(`+${days} days from today = ${result.toLocaleDateString()}`);
  }

  // Initialize
  setToday('date1');
  setToday('date2');
  setToday('start-date');
  setToday('weekday-date');
  setToday('weeknum-date');
  renderHistory();
</script>
</body>
</html>
