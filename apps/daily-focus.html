<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Focus — Shadow's Garden</title>
<meta name="description" content="A minimal daily focus tool without the bloat of full todo apps"> 
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .focus-container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  .date-display { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 2rem; }
  .input-group { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
  .input-group input { flex: 1; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 1rem; }
  .input-group input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .input-group button { padding: 0.75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: transform 0.1s; }
  .input-group button:hover { transform: scale(1.02); }
  .task-list { list-style: none; padding: 0; margin: 0; }
  .task-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 0.5rem; transition: opacity 0.2s; }
  .task-item.completed { opacity: 0.5; }
  .task-item.completed .task-text { text-decoration: line-through; }
  .task-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent); }
  .task-text { flex: 1; }
  .delete-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.25rem; font-size: 1.2rem; opacity: 0; transition: opacity 0.2s; }
  .task-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--error); }
  .clear-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; margin-top: 1rem; font-size: 0.85rem; }
  .clear-btn:hover { border-color: var(--text); color: var(--text); }
  .empty-state { text-align: center; color: var(--text-muted); padding: 2rem; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  .progress-text { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="focus-container">
  <div class="date-display" id="dateDisplay"></div>
  <div class="progress-text" id="progressText">0 of 0 tasks done</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
  <div class="input-group">
    <input type="text" id="taskInput" placeholder="What needs to get done today?" autocomplete="off">
    <button id="addBtn">Add</button>
  </div>
  <ul class="task-list" id="taskList"></ul>
  <div style="text-align: center;">
    <button class="clear-btn" id="clearCompleted">Clear completed</button>
  </div>
</div>
<script>
const STORAGE_KEY = 'shadow-daily-focus-tasks';
const DATE_KEY = 'shadow-daily-focus-date';

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function loadTasks() {
  const storedDate = localStorage.getItem(DATE_KEY);
  const today = getToday();
  
  if (storedDate !== today) {
    localStorage.setItem(DATE_KEY, today);
    localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
    return [];
  }
  
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch {
    return [];
  }
}

function saveTasks(tasks) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function render() {
  const tasks = loadTasks();
  const list = document.getElementById('taskList');
  const input = document.getElementById('taskInput');
  const progressText = document.getElementById('progressText');
  const progressFill = document.getElementById('progressFill');
  
  const completed = tasks.filter(t => t.done).length;
  const total = tasks.length;
  
  progressText.textContent = `${completed} of ${total} tasks done`;
  progressFill.style.width = total > 0 ? `${(completed / total) * 100}%` : '0%';
  
  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty-state">No tasks yet. Add one above.</div>';
    return;
  }
  
  list.innerHTML = tasks.map((task, i) => `
    <li class="task-item ${task.done ? 'completed' : ''}">
      <input type="checkbox" class="task-checkbox" ${task.done ? 'checked' : ''} data-index="${i}">
      <span class="task-text">${escapeHtml(task.text)}</span>
      <button class="delete-btn" data-index="${i}">×</button>
    </li>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;
  
  const tasks = loadTasks();
  tasks.push({ text, done: false });
  saveTasks(tasks);
  input.value = '';
  render();
}

function toggleTask(index) {
  const tasks = loadTasks();
  tasks[index].done = !tasks[index].done;
  saveTasks(tasks);
  render();
}

function deleteTask(index) {
  const tasks = loadTasks();
  tasks.splice(index, 1);
  saveTasks(tasks);
  render();
}

function clearCompleted() {
  const tasks = loadTasks().filter(t => !t.done);
  saveTasks(tasks);
  render();
}

document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') addTask();
});
document.getElementById('taskList').addEventListener('click', e => {
  if (e.target.classList.contains('task-checkbox')) {
    toggleTask(parseInt(e.target.dataset.index));
  } else if (e.target.classList.contains('delete-btn')) {
    deleteTask(parseInt(e.target.dataset.index));
  }
});
document.getElementById('clearCompleted').addEventListener('click', clearCompleted);

// Display today's date nicely
const dateOpts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', dateOpts);

// Initial render
render();
</script>
</body>
</html>
