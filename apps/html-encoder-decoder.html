<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode/decode HTML entities for safe rendering">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { --bg: #0d1117; --fg: #c9d1d9; --accent: #58a6ff; --border: #30363d; }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
  
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  
  textarea, input[type="text"] { width: 100%; padding: 0.75rem 1rem; background: #161b22; border: 2px solid var(--border); border-radius: 8px; color: var(--fg); font-family: 'Fira Code', monospace; font-size: 0.95rem; line-height: 1.6; resize: vertical; box-sizing: border-box; }
  textarea:focus, input[type="text"]:focus { outline: none; border-color: var(--accent); }
  textarea { min-height: 120px; }
  
  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .btn { padding: 0.6rem 1.2rem; background: #21262d; border: 1px solid var(--border); border-radius: 6px; color: var(--fg); font-family: inherit; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: #30363d; }
  .btn.primary { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  .btn.primary:hover { background: #79b8ff; }
  
  .output { background: #161b22; border: 2px solid var(--border); border-radius: 8px; padding: 1rem; min-height: 80px; font-family: 'Fira Code', monospace; white-space: pre-wrap; word-break: break-all; }
  .output.empty { color: #8b949e; font-style: italic; }
  
  .stats { display: flex; gap: 2rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .stat { text-align: center; }
  .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .preset-btn { padding: 0.35rem 0.7rem; background: #21262d; border: 1px solid var(--border); border-radius: 4px; color: #8b949e; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
  .preset-btn:hover { background: #30363d; color: var(--fg); }
  
  .quick-ref { margin-top: 2rem; padding: 1rem; background: #161b22; border-radius: 8px; border: 1px solid var(--border); }
  .quick-ref h3 { margin: 0 0 0.75rem 0; font-size: 0.9rem; color: var(--accent); }
  .ref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.5rem; }
  .ref-item { font-family: monospace; font-size: 0.8rem; }
  .ref-item code { background: #21262d; padding: 0.15rem 0.4rem; border-radius: 3px; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>HTML Encoder/Decoder</h1>
    <p class="subtitle">Encode and decode HTML entities for safe rendering</p>
    
    <div class="input-group">
      <label>Input</label>
      <div class="presets">
        <button class="preset-btn" data-preset="script">Script Tag</button>
        <button class="preset-btn" data-preset="quotes">Quote Marks</button>
        <button class="preset-btn" data-preset="special">Special Chars</button>
        <button class="preset-btn" data-preset="emoji">Emoji</button>
      </div>
      <textarea id="input" placeholder="Enter text to encode or decode...">&lt;script&gt;alert('XSS')&lt;/script&gt;</textarea>
    </div>
    
    <div class="btn-row">
      <button class="btn primary" id="encodeBtn">Encode</button>
      <button class="btn" id="decodeBtn">Decode</button>
      <button class="btn" id="swapBtn">Swap ↕</button>
      <button class="btn" id="clearBtn">Clear</button>
      <button class="btn" id="copyBtn">Copy Output</button>
    </div>
    
    <div class="input-group">
      <label>Output</label>
      <div class="output empty" id="output">Output will appear here...</div>
    </div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="charCount">0</div>
        <div class="stat-label">Chars</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="entityCount">0</div>
        <div class="stat-label">Entities</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="diffCount">0</div>
        <div class="stat-label">Diff</div>
      </div>
    </div>
    
    <div class="quick-ref">
      <h3>Common Entities</h3>
      <div class="ref-grid">
        <div class="ref-item"><code>&lt;</code> &lt;</div>
        <div class="ref-item"><code>&gt;</code> &gt;</div>
        <div class="ref-item"><code>&amp;</code> &amp;</div>
        <div class="ref-item"><code>&quot;</code> "</div>
        <div class="ref-item"><code>&#39;</code> '</div>
        <div class="ref-item"><code>&nbsp;</code> space</div>
        <div class="ref-item"><code>&copy;</code> ©</div>
        <div class="ref-item"><code>&reg;</code> ®</div>
        <div class="ref-item"><code>&trade;</code> ™</div>
        <div class="ref-item"><code>&amp;</code> &amp;</div>
      </div>
    </div>
  </div>
  
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const charCount = document.getElementById('charCount');
    const entityCount = document.getElementById('entityCount');
    const diffCount = document.getElementById('diffCount');
    
    const presets = {
      script: '<script>alert("XSS")<\/script>',
      quotes: 'He said "Hello" and she said \'Hi\'',
      special: '<div class="test">Hello & World © 2024</div>',
      emoji: 'Hello 👋 World 🌍 Test 🎉'
    };
    
    function encode(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    function decode(str) {
      const div = document.createElement('div');
      div.innerHTML = str;
      return div.textContent;
    }
    
    function countEntities(str) {
      const matches = str.match(/&[a-zA-Z]+;|&#\d+;|&#x[a-fA-F0-9]+;/g);
      return matches ? matches.length : 0;
    }
    
    function updateStats(inp, out) {
      charCount.textContent = out.length;
      entityCount.textContent = countEntities(out);
      diffCount.textContent = out.length - inp.length;
    }
    
    document.getElementById('encodeBtn').addEventListener('click', () => {
      const result = encode(input.value);
      output.textContent = result;
      output.classList.remove('empty');
      updateStats(input.value, result);
    });
    
    document.getElementById('decodeBtn').addEventListener('click', () => {
      try {
        const result = decode(input.value);
        output.textContent = result;
        output.classList.remove('empty');
        updateStats(input.value, result);
      } catch (e) {
        output.textContent = 'Error: Invalid HTML entities';
        output.classList.add('empty');
      }
    });
    
    document.getElementById('swapBtn').addEventListener('click', () => {
      const temp = input.value;
      input.value = output.classList.contains('empty') ? '' : output.textContent;
      output.textContent = temp;
      output.classList.toggle('empty', !temp);
      updateStats(output.textContent, input.value);
    });
    
    document.getElementById('clearBtn').addEventListener('click', () => {
      input.value = '';
      output.textContent = 'Output will appear here...';
      output.classList.add('empty');
      charCount.textContent = '0';
      entityCount.textContent = '0';
      diffCount.textContent = '0';
    });
    
    document.getElementById('copyBtn').addEventListener('click', async () => {
      if (output.classList.contains('empty')) return;
      await navigator.clipboard.writeText(output.textContent);
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Output', 1500);
    });
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const preset = presets[btn.dataset.preset];
        if (preset) {
          input.value = preset;
          const result = encode(preset);
          output.textContent = result;
          output.classList.remove('empty');
          updateStats(preset, result);
        }
      });
    });
    
    // Initialize with preset
    input.value = presets.script;
    const initial = encode(input.value);
    output.textContent = initial;
    output.classList.remove('empty');
    updateStats(input.value, initial);
  </script>
</body>
</html>
