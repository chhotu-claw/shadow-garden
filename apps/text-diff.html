<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff Tool — Shadow's Garden</title>
<meta name="description" content="Compare two texts and see the differences instantly. Highlights additions in green, deletions in red.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #666; margin-bottom: 2rem; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .input-group { display: flex; flex-direction: column; }
  .input-group label { font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; }
  textarea { 
    width: 100%; height: 200px; 
    background: #1a1a1a; border: 1px solid #333; 
    color: #e5e5e5; padding: 1rem; font-family: monospace;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: #6cb6ff; }
  .controls { display: flex; gap: 1rem; margin-bottom: 1rem; }
  button {
    background: #333; color: #e5e5e5; border: none;
    padding: 0.75rem 1.5rem; cursor: pointer; font-size: 0.9rem;
    border-radius: 4px;
  }
  button:hover { background: #444; }
  button.primary { background: #6cb6ff; color: #0d0d0d; font-weight: 600; }
  button.primary:hover { background: #5aa3ef; }
  .output { 
    background: #1a1a1a; border: 1px solid #333; 
    padding: 1rem; min-height: 150px; max-height: 400px; overflow: auto;
    font-family: monospace; white-space: pre-wrap;
  }
  .diff-added { background: #1a3d1a; color: #7af782; }
  .diff-removed { background: #3d1a1a; color: #f77a7a; }
  .empty-state { color: #666; text-align: center; padding: 2rem; }
  .stats { font-size: 0.85rem; color: #666; margin-bottom: 1rem; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Text Diff Tool</h1>
    <p class="subtitle">Compare two texts and see what's different. Green = added, red = removed.</p>
    
    <div class="input-row">
      <div class="input-group">
        <label>Original Text</label>
        <textarea id="original" placeholder="Paste original text here..."></textarea>
      </div>
      <div class="input-group">
        <label>Modified Text</label>
        <textarea id="modified" placeholder="Paste modified text here..."></textarea>
      </div>
    </div>
    
    <div class="controls">
      <button class="primary" onclick="computeDiff()">Compare</button>
      <button onclick="clearAll()">Clear</button>
    </div>
    
    <div class="stats" id="stats"></div>
    <div class="output" id="output"><div class="empty-state">Enter both texts and click Compare to see differences</div></div>
  </div>

  <script>
    function computeDiff() {
      const original = document.getElementById('original').value;
      const modified = document.getElementById('modified').value;
      const output = document.getElementById('output');
      const stats = document.getElementById('stats');
      
      if (!original && !modified) {
        output.innerHTML = '<div class="empty-state">Enter both texts and click Compare to see differences</div>';
        return;
      }
      
      const origLines = original.split('\n');
      const modLines = modified.split('\n');
      
      // Simple line-by-line diff using LCS approach
      const lcs = longestCommonSubsequence(origLines, modLines);
      
      let result = [];
      let adds = 0, removes = 0;
      
      let i = 0, j = 0, k = 0;
      while (i < origLines.length || j < modLines.length) {
        if (k < lcs.length && i < origLines.length && origLines[i] === lcs[k]) {
          if (j < modLines.length && modLines[j] === lcs[k]) {
            result.push({ type: 'same', text: lcs[k] });
            i++; j++; k++;
          } else {
            result.push({ type: 'removed', text: origLines[i] });
            removes++;
            i++;
          }
        } else if (k < lcs.length && j < modLines.length && modLines[j] === lcs[k]) {
          result.push({ type: 'added', text: modLines[j] });
          adds++;
          j++;
        } else if (j < modLines.length) {
          result.push({ type: 'added', text: modLines[j] });
          adds++;
          j++;
        } else if (i < origLines.length) {
          result.push({ type: 'removed', text: origLines[i] });
          removes++;
          i++;
        } else {
          break;
        }
      }
      
      stats.textContent = `${adds} additions, ${removes} deletions`;
      
      output.innerHTML = result.map(line => {
        if (line.type === 'same') {
          return escapeHtml(line.text);
        } else if (line.type === 'added') {
          return `<span class="diff-added">+ ${escapeHtml(line.text)}</span>`;
        } else {
          return `<span class="diff-removed">- ${escapeHtml(line.text)}</span>`;
        }
      }).join('\n');
    }
    
    function longestCommonSubsequence(a, b) {
      const m = a.length, n = b.length;
      const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
      
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          if (a[i-1] === b[j-1]) {
            dp[i][j] = dp[i-1][j-1] + 1;
          } else {
            dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
          }
        }
      }
      
      const result = [];
      let i = m, j = n;
      while (i > 0 && j > 0) {
        if (a[i-1] === b[j-1]) {
          result.unshift(a[i-1]);
          i--; j--;
        } else if (dp[i-1][j] > dp[i][j-1]) {
          i--;
        } else {
          j--;
        }
      }
      return result;
    }
    
    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    function clearAll() {
      document.getElementById('original').value = '';
      document.getElementById('modified').value = '';
      document.getElementById('output').innerHTML = '<div class="empty-state">Enter both texts and click Compare to see differences</div>';
      document.getElementById('stats').textContent = '';
    }
  </script>
</body>
</html>
