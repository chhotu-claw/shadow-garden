<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff — Shadow's Garden</title>
<meta name="description" content="Compare two texts and see the differences highlighted. Side-by-side or unified view.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 20px; }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { color: var(--accent); margin-bottom: 0.5rem; }
  .description { color: var(--text-muted); margin-bottom: 1.5rem; }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 768px) { .panels { grid-template-columns: 1fr; } }
  label { display: block; margin-bottom: 6px; font-weight: 600; }
  textarea {
    width: 100%; height: 200px; padding: 12px; border: 2px solid var(--border);
    border-radius: 8px; background: var(--bg); color: var(--text);
    font-family: 'SF Mono', monospace; font-size: 13px; resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  button {
    background: var(--accent); color: var(--bg); border: none;
    padding: 10px 20px; border-radius: 8px; cursor: pointer;
    font-weight: 600; font-size: 14px;
  }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--border); color: var(--text); }
  select {
    padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-size: 14px;
  }
  .result {
    background: var(--bg-secondary); border: 2px solid var(--border);
    border-radius: 8px; padding: 16px; font-family: 'SF Mono', monospace;
    font-size: 13px; white-space: pre-wrap; overflow-x: auto;
  }
  .added { background: rgba(0, 212, 170, 0.2); color: #00d4aa; }
  .removed { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
  .stats { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }
  .stats span { margin-right: 16px; }
  .added span { color: #00d4aa; }
  .removed span { color: #ff6b6b; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Text Diff</h1>
  <p class="description">Compare two texts and see exactly what changed.</p>

  <div class="panels">
    <div>
      <label>Original</label>
      <textarea id="original" placeholder="Paste original text..."></textarea>
    </div>
    <div>
      <label>Modified</label>
      <textarea id="modified" placeholder="Paste modified text..."></textarea>
    </div>
  </div>

  <div class="controls">
    <button id="compare-btn">Compare</button>
    <button class="secondary" id="swap-btn">Swap</button>
    <button class="secondary" id="clear-btn">Clear</button>
    <select id="mode">
      <option value="word">Word by word</option>
      <option value="char">Character by character</option>
      <option value="line">Line by line</option>
    </select>
  </div>

  <div class="stats" id="stats" style="display:none">
    <span class="added">+<span id="added-count">0</span> added</span>
    <span class="removed">-<span id="removed-count">0</span> removed</span>
  </div>
  <div class="result" id="output"></div>
</div>

<script>
function diffWords(a, b) {
  const aWords = a.split(/(\s+)/);
  const bWords = b.split(/(\s+)/);
  const result = [];
  let i = 0, j = 0;
  
  while (i < aWords.length || j < bWords.length) {
    if (i < aWords.length && j < bWords.length && aWords[i] === bWords[j]) {
      result.push({ type: 'same', text: aWords[i] });
      i++; j++;
    } else if (j < bWords.length && (!aWords[i] || !aWords[i].match(/\S/) || bWords[j] !== aWords[i])) {
      result.push({ type: 'added', text: bWords[j] });
      j++;
    } else if (i < aWords.length) {
      result.push({ type: 'removed', text: aWords[i] });
      i++;
    }
  }
  return result;
}

function diffChars(a, b) {
  const result = [];
  let i = 0, j = 0;
  
  while (i < a.length || j < b.length) {
    if (i < a.length && j < b.length && a[i] === b[j]) {
      result.push({ type: 'same', text: a[i] });
      i++; j++;
    } else if (j < b.length && (i >= a.length || b[j] !== a[i])) {
      result.push({ type: 'added', text: b[j] });
      j++;
    } else if (i < a.length) {
      result.push({ type: 'removed', text: a[i] });
      i++;
    }
  }
  return result;
}

function diffLines(a, b) {
  const aLines = a.split('\n');
  const bLines = b.split('\n');
  const result = [];
  let i = 0, j = 0;
  
  while (i < aLines.length || j < bLines.length) {
    if (i < aLines.length && j < bLines.length && aLines[i] === bLines[j]) {
      result.push({ type: 'same', text: aLines[i] + '\n' });
      i++; j++;
    } else if (j < bLines.length && (!aLines[i] || bLines[j] !== aLines[i])) {
      result.push({ type: 'added', text: bLines[j] + '\n' });
      j++;
    } else if (i < aLines.length) {
      result.push({ type: 'removed', text: aLines[i] + '\n' });
      i++;
    }
  }
  return result;
}

function render(diff) {
  let html = '';
  let added = 0, removed = 0;
  
  diff.forEach(part => {
    const escaped = part.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    if (part.type === 'added') {
      html += `<span class="added">${escaped}</span>`;
      added += part.text.length;
    } else if (part.type === 'removed') {
      html += `<span class="removed">${escaped}</span>`;
      removed += part.text.length;
    } else {
      html += escaped;
    }
  });
  
  document.getElementById('added-count').textContent = added;
  document.getElementById('removed-count').textContent = removed;
  document.getElementById('stats').style.display = 'block';
  document.getElementById('output').innerHTML = html || '<span style="color:var(--text-muted)">No differences found</span>';
}

document.getElementById('compare-btn').addEventListener('click', () => {
  const a = document.getElementById('original').value;
  const b = document.getElementById('modified').value;
  const mode = document.getElementById('mode').value;
  
  let diff;
  if (mode === 'char') diff = diffChars(a, b);
  else if (mode === 'line') diff = diffLines(a, b);
  else diff = diffWords(a, b);
  
  render(diff);
});

document.getElementById('swap-btn').addEventListener('click', () => {
  const a = document.getElementById('original').value;
  const b = document.getElementById('modified').value;
  document.getElementById('original').value = b;
  document.getElementById('modified').value = a;
});

document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('original').value = '';
  document.getElementById('modified').value = '';
  document.getElementById('output').innerHTML = '';
  document.getElementById('stats').style.display = 'none';
});
</script>
</body>
</html>
