<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff — Shadow's Garden</title>
<meta name="description" content="Compare two texts and see the differences line by line">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --add: #10b981;
    --add-bg: rgba(16, 185, 129, 0.15);
    --del: #ef4444;
    --del-bg: rgba(239, 68, 68, 0.15);
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 2rem;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 {
    color: #fff;
    margin-bottom: 1.5rem;
  }
  .input-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 768px) {
    .input-area {
      grid-template-columns: 1fr;
    }
  }
  .input-group label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  textarea {
    width: 100%;
    height: 200px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 1rem;
    color: #fff;
    font-family: inherit;
    font-size: 0.85rem;
    resize: vertical;
    outline: none;
  }
  textarea:focus {
    border-color: var(--accent, #6366f1);
  }
  .controls {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 0.5rem;
    padding: 0.75rem 1.5rem;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  button:hover {
    background: rgba(255,255,255,0.2);
  }
  button.primary {
    background: var(--accent, #6366f1);
    border-color: var(--accent, #6366f1);
  }
  button.primary:hover {
    opacity: 0.9;
  }
  .stats {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
  }
  .stats span {
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }
  .stats .add { color: var(--add); }
  .stats .del { color: var(--del); }
  .result {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    overflow: hidden;
  }
  .diff-line {
    display: flex;
    font-size: 0.85rem;
    line-height: 1.5;
  }
  .diff-line.add {
    background: var(--add-bg);
  }
  .diff-line.del {
    background: var(--del-bg);
  }
  .line-num {
    min-width: 40px;
    padding: 0 0.5rem;
    text-align: right;
    color: rgba(255,255,255,0.3);
    user-select: none;
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  .diff-line.add .line-num {
    color: var(--add);
  }
  .diff-line.del .line-num {
    color: var(--del);
  }
  .line-content {
    flex: 1;
    padding: 0 0.75rem;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .empty-state {
    padding: 3rem;
    text-align: center;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>🔍 Text Diff</h1>
  
  <div class="input-area">
    <div class="input-group">
      <label>Original Text</label>
      <textarea id="left" placeholder="Paste original text here..."></textarea>
    </div>
    <div class="input-group">
      <label>Changed Text</label>
      <textarea id="right" placeholder="Paste changed text here..."></textarea>
    </div>
  </div>
  
  <div class="controls">
    <button class="primary" onclick="compare()">Compare</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="sampleData()">Load Sample</button>
  </div>
  
  <div class="stats" id="stats" style="display:none;">
    <span class="add">+ <span id="addCount">0</span> additions</span>
    <span class="del">- <span id="delCount">0</span> deletions</span>
    <span>≡ <span id="sameCount">0</span> unchanged</span>
  </div>
  
  <div class="result" id="result">
    <div class="empty-state">Paste text in both boxes and click Compare</div>
  </div>
</div>

<script>
function compare() {
  const left = document.getElementById('left').value;
  const right = document.getElementById('right').value;
  
  if (!left && !right) {
    document.getElementById('result').innerHTML = '<div class="empty-state">Paste text in both boxes and click Compare</div>';
    return;
  }
  
  const leftLines = left.split('\n');
  const rightLines = right.split('\n');
  
  // LCS-based diff
  const lcs = computeLCS(leftLines, rightLines);
  const diff = buildDiff(leftLines, rightLines, lcs);
  
  let html = '';
  let adds = 0, dels = 0, same = 0;
  let leftLineNum = 1, rightLineNum = 1;
  
  diff.forEach(item => {
    if (item.type === 'same') {
      html += `<div class="diff-line">
        <div class="line-num">${leftLineNum}</div>
        <div class="line-content">${escapeHtml(item.left)}</div>
      </div>`;
      leftLineNum++;
      rightLineNum++;
      same++;
    } else if (item.type === 'del') {
      html += `<div class="diff-line del">
        <div class="line-num">${leftLineNum}</div>
        <div class="line-content">- ${escapeHtml(item.left)}</div>
      </div>`;
      leftLineNum++;
      dels++;
    } else if (item.type === 'add') {
      html += `<div class="diff-line add">
        <div class="line-num">${rightLineNum}</div>
        <div class="line-content">+ ${escapeHtml(item.right)}</div>
      </div>`;
      rightLineNum++;
      adds++;
    }
  });
  
  document.getElementById('result').innerHTML = html;
  
  document.getElementById('addCount').textContent = adds;
  document.getElementById('delCount').textContent = dels;
  document.getElementById('sameCount').textContent = same;
  document.getElementById('stats').style.display = 'flex';
}

function computeLCS(a, b) {
  const m = a.length, n = b.length;
  const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
  
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (a[i-1] === b[j-1]) {
        dp[i][j] = dp[i-1][j-1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
      }
    }
  }
  
  // Backtrack to find LCS
  const lcs = [];
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (a[i-1] === b[j-1]) {
      lcs.unshift({ aIdx: i - 1, bIdx: j - 1 });
      i--; j--;
    } else if (dp[i-1][j] > dp[i][j-1]) {
      i--;
    } else {
      j--;
    }
  }
  
  return lcs;
}

function buildDiff(a, b, lcs) {
  const diff = [];
  let aIdx = 0, bIdx = 0, lcsIdx = 0;
  
  while (aIdx < a.length || bIdx < b.length) {
    if (lcsIdx < lcs.length && aIdx === lcs[lcsIdx].aIdx && bIdx === lcs[lcsIdx].bIdx) {
      diff.push({ type: 'same', left: a[aIdx], right: b[bIdx] });
      aIdx++; bIdx++; lcsIdx++;
    } else {
      // Check if we should delete or add
      const nextLcsA = lcs[lcsIdx] ? lcs[lcsIdx].aIdx : a.length;
      const nextLcsB = lcs[lcsIdx] ? lcs[lcsIdx].bIdx : b.length;
      
      if (aIdx < nextLcsA) {
        diff.push({ type: 'del', left: a[aIdx] });
        aIdx++;
      } else if (bIdx < nextLcsB) {
        diff.push({ type: 'add', right: b[bIdx] });
        bIdx++;
      }
    }
  }
  
  return diff;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function clearAll() {
  document.getElementById('left').value = '';
  document.getElementById('right').value = '';
  document.getElementById('result').innerHTML = '<div class="empty-state">Paste text in both boxes and click Compare</div>';
  document.getElementById('stats').style.display = 'none';
}

function sampleData() {
  document.getElementById('left').value = `function greet(name) {
  console.log("Hello, " + name);
  return true;
}

function calculate(a, b) {
  return a + b;
}`;

  document.getElementById('right').value = `function greet(user) {
  console.log("Hello, " + user + "!");
  return true;
}

function calculate(a, b, c) {
  return a + b + c;
}

function multiply(a, b) {
  return a * b;
}`;
  compare();
}

// Auto-compare on typing with debounce
let debounceTimer;
document.getElementById('left').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(compare, 500);
});
document.getElementById('right').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(compare, 500);
});
</script>
</body>
</html>
