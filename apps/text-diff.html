<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff Checker — Shadow's Garden</title>
<meta name="description" content="Compare two texts and see exactly what changed. Side-by-side diff with additions, deletions, and changes highlighted.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 0; }
  .header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .container { display: flex; flex: 1; overflow: hidden; }
  .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .panel:first-child { border-right: 1px solid var(--border); }
  .panel-header { padding: 0.5rem 1rem; background: var(--bg-secondary); border-bottom: 1px solid var(--border); font-size: 14px; color: var(--fg-muted); }
  textarea { flex: 1; border: none; resize: none; padding: 1rem; font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.5; background: var(--bg); color: var(--fg); outline: none; }
  .toolbar { display: flex; gap: 0.5rem; align-items: center; }
  button { background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 14px; }
  button:hover { background: var(--bg-secondary); }
  .stats { font-size: 13px; color: var(--fg-muted); margin-left: 1rem; }
  .diff-view { display: none; flex: 1; overflow-y: auto; padding: 1rem; font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.6; }
  .diff-view.active { display: block; }
  .diff-line { white-space: pre-wrap; padding: 2px 0; }
  .diff-add { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
  .diff-del { background: rgba(239, 68, 68, 0.15); color: #ef4444; text-decoration: line-through; }
  .diff-add::before { content: "+ "; color: #22c55e; }
  .diff-del::before { content: "- "; color: #ef4444; }
  .view-toggle { display: none; }
  textarea.hidden { display: none; }
</style>
</head>
<body data-page-type="app">
  <div class="header">
    <div class="toolbar">
      <span style="font-weight:600">Text Diff Checker</span>
      <button id="compareBtn">Compare</button>
      <button id="swapBtn">Swap</button>
      <button id="clearBtn">Clear</button>
      <button id="viewToggleBtn" class="view-toggle">Show Input</button>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="container">
    <div class="panel">
      <div class="panel-header">Original Text</div>
      <textarea id="text1" placeholder="Paste original text here..."></textarea>
    </div>
    <div class="panel">
      <div class="panel-header">Changed Text</div>
      <textarea id="text2" placeholder="Paste changed text here..."></textarea>
    </div>
  </div>
  <div class="diff-view" id="diffView"></div>
  <script>
    const text1 = document.getElementById('text1');
    const text2 = document.getElementById('text2');
    const compareBtn = document.getElementById('compareBtn');
    const swapBtn = document.getElementById('swapBtn');
    const clearBtn = document.getElementById('clearBtn');
    const viewToggleBtn = document.getElementById('viewToggleBtn');
    const stats = document.getElementById('stats');
    const diffView = document.getElementById('diffView');

    let showingDiff = false;

    function diffLines(a, b) {
      const aLines = a.split('\n');
      const bLines = b.split('\n');
      const result = [];
      let i = 0, j = 0;
      
      while (i < aLines.length || j < bLines.length) {
        if (i < aLines.length && j < bLines.length && aLines[i] === bLines[j]) {
          result.push({ type: 'same', text: aLines[i] });
          i++; j++;
        } else if (j < bLines.length && (!aLines[i] || !bLines[i] || bLines.slice(j).includes(aLines[i]))) {
          result.push({ type: 'add', text: bLines[j] });
          j++;
        } else if (i < aLines.length) {
          result.push({ type: 'del', text: aLines[i] });
          i++;
        } else {
          result.push({ type: 'add', text: bLines[j] });
          j++;
        }
      }
      return result;
    }

    function computeSimpleDiff(a, b) {
      const aWords = a.split(/(\s+)/);
      const bWords = b.split(/(\s+)/);
      const result = [];
      let i = 0, j = 0;
      
      while (i < aWords.length || j < bWords.length) {
        if (i < aWords.length && j < bWords.length && aWords[i] === bWords[j]) {
          result.push({ type: 'same', text: aWords[i] });
          i++; j++;
        } else if (j < bWords.length && (!aWords[i] || !bWords[j] || bWords.slice(j).includes(aWords[i]))) {
          result.push({ type: 'add', text: bWords[j] });
          j++;
        } else if (i < aWords.length) {
          result.push({ type: 'del', text: aWords[i] });
          i++;
        } else {
          result.push({ type: 'add', text: bWords[j] });
          j++;
        }
      }
      return result;
    }

    function showDiff() {
      const t1 = text1.value;
      const t2 = text2.value;
      
      if (!t1 && !t2) {
        stats.textContent = '';
        return;
      }

      let diffResult;
      const useLineDiff = t1.split('\n').length > 3 && t2.split('\n').length > 3;
      
      if (useLineDiff) {
        diffResult = diffLines(t1, t2);
      } else {
        diffResult = computeSimpleDiff(t1, t2);
      }

      let adds = 0, dels = 0;
      diffView.innerHTML = diffResult.map(d => {
        if (d.type === 'add') adds++;
        if (d.type === 'del') dels++;
        const cls = d.type === 'add' ? 'diff-add' : d.type === 'del' ? 'diff-del' : '';
        return `<div class="diff-line ${cls}">${escapeHtml(d.text)}</div>`;
      }).join('');

      stats.textContent = `+${adds} −${dels}`;
      diffView.classList.add('active');
      text1.classList.add('hidden');
      text2.classList.add('hidden');
      viewToggleBtn.style.display = 'block';
      showingDiff = true;
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    compareBtn.addEventListener('click', showDiff);

    swapBtn.addEventListener('click', () => {
      const temp = text1.value;
      text1.value = text2.value;
      text2.value = temp;
    });

    clearBtn.addEventListener('click', () => {
      text1.value = '';
      text2.value = '';
      stats.textContent = '';
      diffView.innerHTML = '';
      diffView.classList.remove('active');
      text1.classList.remove('hidden');
      text2.classList.remove('hidden');
      viewToggleBtn.style.display = 'none';
      showingDiff = false;
    });

    viewToggleBtn.addEventListener('click', () => {
      text1.classList.remove('hidden');
      text2.classList.remove('hidden');
      diffView.classList.remove('active');
      viewToggleBtn.style.display = 'none';
      showingDiff = false;
    });
  </script>
</body>
</html>
