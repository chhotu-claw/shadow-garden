<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Validator — Shadow's Garden</title>
<meta name="description" content="Validate and format JSON — check syntax, find errors, pretty print. All local.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 0; }
  .header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; gap: 1rem; align-items: center; }
  .title { font-weight: 600; }
  .container { display: flex; flex: 1; overflow: hidden; }
  .editor { flex: 1; padding: 1rem; display: flex; flex-direction: column; }
  textarea { flex: 1; border: none; resize: none; background: var(--bg-secondary); color: var(--fg); font-family: var(--font-mono); font-size: 14px; padding: 1rem; border-radius: 8px; outline: none; }
  textarea:focus { background: var(--bg); }
  textarea::placeholder { color: var(--fg-muted); }
  .sidebar { width: 300px; border-left: 1px solid var(--border); padding: 1rem; overflow-y: auto; }
  .result { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .error-line { display: block; font-family: var(--font-mono); font-size: 0.85em; background: #fce8e8; color: #c00; padding: 0.5rem; border-radius: 4px; margin-top: 0.5rem; }
  .success { color: #2ecc71; font-weight: 600; }
  .info { font-size: 0.85em; color: var(--fg-muted); margin-top: 0.5rem; }
  button { background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 14px; }
  button:hover { opacity: 0.9; }
</style>
</head>
<body data-page-type="app">
  <div class="header">
    <span class="title">JSON Validator</span>
    <button id="formatBtn">Format</button>
    <button id="minifyBtn">Minify</button>
    <button id="clearBtn">Clear</button>
  </div>
  <div class="container">
    <div class="editor">
      <textarea id="input" placeholder="Paste your JSON here..."></textarea>
    </div>
    <div class="sidebar">
      <div id="output"></div>
    </div>
  </div>
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const formatBtn = document.getElementById('formatBtn');
    const minifyBtn = document.getElementById('minifyBtn');
    const clearBtn = document.getElementById('clearBtn');

    function validate() {
      const value = input.value.trim();
      if (!value) {
        output.innerHTML = '<p class="info">Paste JSON to validate</p>';
        return;
      }
      
      try {
        const parsed = JSON.parse(value);
        const isValid = true;
        let formatted = JSON.stringify(parsed, null, 2);
        
        if (formatted.length > 50000) {
          formatted = formatted.substring(0, 50000) + '\n\n... (truncated)';
        }
        
        output.innerHTML = `
          <p class="success">✓ Valid JSON</p>
          <div class="info">Keys: ${Object.keys(parsed).length} | Values: ${JSON.stringify(parsed).length}</div>
          <pre class="result"><code>${formatted.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>
        `;
      } catch (e) {
        const match = e.message.match(/position (\d+)/);
        let lineInfo = '';
        if (match) {
          const pos = parseInt(match[1]);
          const lines = value.substring(0, pos).split('\n');
          const line = lines.length;
          const col = lines[lines.length - 1].length + 1;
          lineInfo = ` at line ${line}, column ${col}`;
        }
        output.innerHTML = `
          <p class="error-line">✗ Invalid JSON${lineInfo}</p>
          <p class="error-line">${e.message}</p>
        `;
      }
    }

    function format() {
      const value = input.value.trim();
      if (!value) return;
      try {
        const parsed = JSON.parse(value);
        input.value = JSON.stringify(parsed, null, 2);
        validate();
      } catch (e) {
        validate();
      }
    }

    function minify() {
      const value = input.value.trim();
      if (!value) return;
      try {
        const parsed = JSON.parse(value);
        input.value = JSON.stringify(parsed);
        validate();
      } catch (e) {
        validate();
      }
    }

    input.addEventListener('input', validate);
    formatBtn.addEventListener('click', format);
    minifyBtn.addEventListener('click', minify);
    clearBtn.addEventListener('click', () => {
      input.value = '';
      validate();
    });

    validate();
  </script>
</body>
</html>
