<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Shadow's Garden</title>
<meta name="description" content="Generate lorem ipsum text in words, sentences, or paragraphs. Plain text or HTML. All local, no server.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e5e5e5; padding: 2rem; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .description { color: #888; margin-bottom: 2rem; }
  .controls { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
  label { font-size: 0.85rem; color: #888; }
  select, input { padding: 0.5rem; border: 1px solid #333; border-radius: 4px; background: #1a1a1a; color: #e5e5e5; font-size: 0.9rem; }
  input[type="number"] { width: 80px; }
  button { padding: 0.6rem 1.2rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
  button:hover { background: #3b82f6; }
  button.secondary { background: #333; }
  button.secondary:hover { background: #444; }
  .output-container { position: relative; }
  textarea { width: 100%; min-height: 300px; padding: 1rem; border: 1px solid #333; border-radius: 4px; background: #111; color: #e5e5e5; font-family: 'SF Mono', Monaco, monospace; font-size: 0.85rem; line-height: 1.6; resize: vertical; }
  .output-actions { position: absolute; top: 0.5rem; right: 0.5rem; display: flex; gap: 0.5rem; }
  .output-actions button { padding: 0.3rem 0.6rem; font-size: 0.75rem; }
  .presets { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .preset-btn { padding: 0.4rem 0.8rem; background: #1e1e1e; border: 1px solid #333; color: #888; font-size: 0.8rem; }
  .preset-btn:hover { border-color: #555; color: #e5e5e5; }
  .mode-toggle { display: flex; gap: 1rem; margin-bottom: 1rem; }
  .mode-toggle label { display: flex; align-items: center; gap: 0.5rem; color: #e5e5e5; cursor: pointer; }
</style>
</head>
<body data-page-type="app">
  <h1>Lorem Ipsum Generator</h1>
  <p class="description">Generate placeholder text in words, sentences, or paragraphs. Plain text or HTML.</p>
  
  <div class="controls">
    <div class="control-group">
      <label>Type</label>
      <select id="type">
        <option value="paragraphs">Paragraphs</option>
        <option value="sentences">Sentences</option>
        <option value="words">Words</option>
      </select>
    </div>
    <div class="control-group">
      <label>Count</label>
      <input type="number" id="count" value="3" min="1" max="100">
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <button onclick="generate()">Generate</button>
    </div>
  </div>
  
  <div class="mode-toggle">
    <label><input type="checkbox" id="htmlMode"> Output as HTML (&lt;p&gt;, &lt;span&gt;)</label>
  </div>
  
  <div class="presets">
    <button class="preset-btn" onclick="setPreset(3, 'paragraphs')">3 paragraphs</button>
    <button class="preset-btn" onclick="setPreset(5, 'paragraphs')">5 paragraphs</button>
    <button class="preset-btn" onclick="setPreset(10, 'sentences')">10 sentences</button>
    <button class="preset-btn" onclick="setPreset(50, 'words')">50 words</button>
  </div>
  
  <div class="output-container">
    <div class="output-actions">
      <button class="secondary" onclick="copyOutput()">Copy</button>
      <button class="secondary" onclick="clearOutput()">Clear</button>
    </div>
    <textarea id="output" readonly placeholder="Click Generate to create lorem ipsum..."></textarea>
  </div>

  <script>
    const loremWords = [
      'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit', 'sed', 'do',
      'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore', 'magna', 'aliqua', 'enim',
      'ad', 'minim', 'veniam', 'quis', 'nostrud', 'exercitation', 'ullamco', 'laboris', 'nisi',
      'aliquip', 'ex', 'ea', 'commodo', 'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit',
      'voluptate', 'velit', 'esse', 'cillum', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint',
      'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia', 'deserunt',
      'mollit', 'anim', 'id', 'est', 'laborum', 'neque', 'porro', 'quisquam', 'nihil', 'impedit',
      'quo', 'minus', 'quod', 'maxime', 'placeat', 'facere', 'possimus', 'omnis', 'voluptas',
      'assumenda', 'repellendus', 'temporibus', 'autem', 'quibusdam', 'officiis', 'debitis',
      'aut', 'rerum', 'necessitatibus', 'saepe', 'eveniet', 'voluptates', 'repudiandae', 'sint',
      'molestiae', 'recusandae', 'itaque', 'earum', 'hic', 'tenetur', 'sapiente', 'delectus',
      'reiciendis', 'voluptatibus', 'maiores', 'alias', 'perferendis', 'doloribus', 'asperiores',
      'repellat'
    ];

    function randomWord() {
      return loremWords[Math.floor(Math.random() * loremWords.length)];
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function generateWords(n) {
      let words = [];
      for (let i = 0; i < n; i++) {
        words.push(randomWord());
      }
      return words.join(' ');
    }

    function generateSentences(n) {
      let sentences = [];
      for (let i = 0; i < n; i++) {
        let wordCount = 8 + Math.floor(Math.random() * 12);
        let words = [];
        for (let j = 0; j < wordCount; j++) {
          words.push(randomWord());
        }
        let text = words.join(' ');
        text = capitalize(text) + '.';
        sentences.push(text);
      }
      return sentences.join(' ');
    }

    function generateParagraphs(n) {
      let paragraphs = [];
      for (let i = 0; i < n; i++) {
        let sentenceCount = 5 + Math.floor(Math.random() * 5);
        paragraphs.push(generateSentences(sentenceCount));
      }
      return paragraphs.join('\n\n');
    }

    function generate() {
      const type = document.getElementById('type').value;
      const count = parseInt(document.getElementById('count').value) || 3;
      const htmlMode = document.getElementById('htmlMode').checked;
      
      let text = '';
      if (type === 'words') {
        text = capitalize(generateWords(count)) + '.';
      } else if (type === 'sentences') {
        text = generateSentences(count);
      } else {
        text = generateParagraphs(count);
      }
      
      if (htmlMode && type === 'paragraphs') {
        text = text.split('\n\n').map(p => `<p>${p}</p>`).join('\n');
      } else if (htmlMode && type === 'sentences') {
        text = text.split('. ').map(s => `<span>${s.trim()}.</span>`).join(' ');
      } else if (htmlMode && type === 'words') {
        text = `<span>${text}</span>`;
      }
      
      document.getElementById('output').value = text;
    }

    function setPreset(c, t) {
      document.getElementById('count').value = c;
      document.getElementById('type').value = t;
      generate();
    }

    function copyOutput() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
    }

    function clearOutput() {
      document.getElementById('output').value = '';
    }

    generate();
  </script>
</body>
</html>
