<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Shadow's Garden</title>
<meta name="description" content="Generate placeholder text instantly. Copy to clipboard. Boring but essential.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 2rem; max-width: 800px; margin: 0 auto; }
  .controls { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
  .controls label { font-weight: 500; }
  .controls input[type="number"] { 
    width: 80px; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; 
  }
  .controls select {
    padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;
  }
  .btn {
    padding: 0.6rem 1.2rem; background: #333; color: #fff; border: none; border-radius: 4px;
    cursor: pointer; font-size: 1rem; transition: background 0.2s;
  }
  .btn:hover { background: #555; }
  .btn-secondary { background: #666; }
  .btn-secondary:hover { background: #777; }
  .output {
    background: #f5f5f5; padding: 1.5rem; border-radius: 8px; min-height: 200px;
    white-space: pre-wrap; line-height: 1.6; font-size: 1rem; margin-bottom: 1rem;
  }
  .actions { display: flex; gap: 0.5rem; }
  .copied { color: #2a9d8f; font-size: 0.9rem; margin-left: 0.5rem; opacity: 0; transition: opacity 0.3s; }
  .copied.show { opacity: 1; }
</style>
</head>
<body data-page-type="app">
  <h1>Lorem Ipsum Generator</h1>
  <p style="color: #666; margin-bottom: 1.5rem;">Generate placeholder text for mockups. Copy with one click.</p>
  
  <div class="controls">
    <label>Paragraphs:</label>
    <input type="number" id="count" value="3" min="1" max="50">
    
    <label>Type:</label>
    <select id="type">
      <option value="classic">Classic Lorem Ipsum</option>
      <option value="bacon">Bacon Ipsum</option>
      <option value="hipster">Hipster Ipsum</option>
      <option value="corporate">Corporate Speak</option>
    </select>
    
    <button class="btn" onclick="generate()">Generate</button>
  </div>
  
  <div class="output" id="output"></div>
  
  <div class="actions">
    <button class="btn btn-secondary" onclick="copyText()">Copy to Clipboard</button>
    <span class="copied" id="copied">Copied!</span>
  </div>

  <script>
    const corpora = {
      classic: [
        "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.",
        "Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.",
        "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.",
        "Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.",
        "Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium.",
        "Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit.",
        "Neque porro quisquam est, qui dolorem ipsum quia dolor sit amet, consectetur, adipisci velit.",
        "At vero eos et accusamus et iusto odio dignissimos ducimus qui blanditiis praesentium voluptatum."
      ],
      bacon: [
        "Bacon ipsum dolor sit amet beef ribs pork belly, ham hock pork loin cow turkey boudin chicken.",
        "Beef ribs turkey pastrami, pork chop short ribs ham hock porchetta bacon pork belly swine.",
        "Pork belly short ribs bacon biltong, turducken cow beef ribs ham hamburger.",
        "Turkey pork loin pork chop ribeye, pork belly beef ham hock brisket beef turkey.",
        "Shankle beef ribs pork, pastrami turducken pork belly brisket turkey swine.",
        "Tenderloin pork chop turkey, bacon pork belly ham hock beef ribs swine brisket."
      ],
      hipster: [
        "Viral actually disrupt, typewriter squid literally heirloom. Hammock flexitarian 3 wolf moon, irony 90s bushwick.",
        "Tilde echo park meditation, typewriter PBR&B 8-bit. Kale chips adaptogen distillery.",
        "Craft beer stumptown hot chicken, lo-fi williamsburg ethical meditation. Echo park listicle.",
        "Jean shorts +1 bicycle rights, shabby chic actually locavore sustainable. Mlkshk four dollar toast.",
        "Freegan art party man braid, typewriter sustainable. 90s cronut YOLO, shabby chic."
      ],
      corporate: [
        "Leverage agile frameworks to provide a robust synopsis for high level overviews.",
        "Iterative approaches to corporate strategy foster collaborative thinking to further the overall value proposition.",
        "Organically grow the holistic world view of disruptive innovation via workplace diversity and empowerment.",
        "Bring to the table win-win survival strategies to ensure proactive domination.",
        "At the end of the day, going forward, a new normal that has evolved from generation X is on the runway heading towards a streamlined cloud solution.",
        "Capitalize on low hanging fruit to identify a ballpark value added activity to beta test."
      ]
    };

    function generate() {
      const count = parseInt(document.getElementById('count').value);
      const type = document.getElementById('type').value;
      const output = document.getElementById('output');
      
      let text = [];
      const source = corpora[type];
      
      for (let i = 0; i < count; i++) {
        text.push(source[i % source.length]);
      }
      
      output.textContent = text.join('\n\n');
    }

    function copyText() {
      const text = document.getElementById('output').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const copied = document.getElementById('copied');
        copied.classList.add('show');
        setTimeout(() => copied.classList.remove('show'), 2000);
      });
    }

    generate();
  </script>
</body>
</html>
