<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Shadow's Garden</title>
<meta name="description" content="Generate placeholder text for designs. Paragraphs, sentences, or words — all local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .generator { max-width: 700px; margin: 0 auto; }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  label {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  input[type="number"], select {
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
  }
  input[type="number"]:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .btn-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  button {
    padding: 12px 24px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover {
    opacity: 0.9;
  }
  .output {
    padding: 20px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    min-height: 150px;
    line-height: 1.7;
    color: var(--text);
  }
  .output:empty::before {
    content: 'Click Generate to create placeholder text...';
    color: var(--text-secondary);
  }
  .copy-btn {
    margin-top: 12px;
    width: 100%;
  }
  @media (max-width: 500px) {
    .controls { grid-template-columns: 1fr; }
    .btn-row { flex-direction: column; }
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="generator">
    <h1>Lorem Ipsum Generator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 24px;">Generate placeholder text for your designs. All local, no tracking.</p>
    
    <div class="controls">
      <div class="control-group">
        <label>Type</label>
        <select id="type">
          <option value="paragraphs">Paragraphs</option>
          <option value="sentences">Sentences</option>
          <option value="words">Words</option>
        </select>
      </div>
      <div class="control-group">
        <label>Count</label>
        <input type="number" id="count" value="3" min="1" max="50">
      </div>
    </div>
    
    <div class="btn-row">
      <button class="primary" onclick="generate()">Generate</button>
      <button onclick="copyOutput()">Copy Text</button>
    </div>
    
    <div class="output" id="output"></div>
    <button class="copy-btn" onclick="copyOutput()">Copy to Clipboard</button>
  </div>
</div>
<script>
  const loremWords = [
    'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit',
    'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore',
    'magna', 'aliqua', 'ut', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud',
    'exercitation', 'ullamco', 'laboris', 'nisi', 'ut', 'aliquip', 'ex', 'ea',
    'commodo', 'consequat', 'duis', 'aute', 'irure', 'dolor', 'in', 'reprehenderit',
    'in', 'voluptate', 'velit', 'esse', 'cillum', 'dolore', 'eu', 'fugiat', 'nulla',
    'pariatur', 'excepteur', 'sint', 'occaecat', 'cupidatat', 'non', 'proident',
    'sunt', 'in', 'culpa', 'qui', 'officia', 'deserunt', 'mollit', 'anim', 'id',
    'est', 'laborum', 'nam', 'libero', 'justo', 'laoreet', 'sit', 'amet', 'viverra',
    'maecenas', 'accumsan', 'lacus', 'vel', 'facilisis', 'praesent', 'interdum',
    'massa', 'tincidunt', 'nibh', 'ipsum', 'donec', 'odio', 'quis', 'nisl', 'tincidunt',
    'bibendum', 'nulla', 'vitae', 'ultricies', 'leo', 'integer', 'feugiat', 'scelerisque',
    'metus', 'vitae', 'justo', 'sollicitudin', 'tellus', 'nisi', 'quis', 'nunc', 'vel',
    'eros', 'donec', 'odio', 'ante', 'primis', 'faucibus', 'orci', 'luctus', 'ultrices',
    'posuere', 'cubilia', 'curae', 'morbi', 'leo', 'rhoncus', 'sed', 'interdum', 'sit'
  ];

  function randomWord() {
    return loremWords[Math.floor(Math.random() * loremWords.length)];
  }

  function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  function generateSentence(minWords = 5, maxWords = 15) {
    const count = Math.floor(Math.random() * (maxWords - minWords + 1)) + minWords;
    const words = [];
    for (let i = 0; i < count; i++) {
      words.push(randomWord());
    }
    let sentence = words.join(' ');
    sentence = capitalize(sentence);
    return sentence + '.';
  }

  function generateParagraph(sentences = 5) {
    const paraSentences = [];
    for (let i = 0; i < sentences; i++) {
      paraSentences.push(generateSentence());
    }
    return paraSentences.join(' ');
  }

  function generate() {
    const type = document.getElementById('type').value;
    const count = parseInt(document.getElementById('count').value) || 3;
    let output = '';

    if (type === 'paragraphs') {
      const paragraphs = [];
      for (let i = 0; i < count; i++) {
        paragraphs.push('<p>' + generateParagraph(5 + Math.floor(Math.random() * 4)) + '</p>');
      }
      output = paragraphs.join('\n');
    } else if (type === 'sentences') {
      const sentences = [];
      for (let i = 0; i < count; i++) {
        sentences.push(generateSentence());
      }
      output = sentences.join(' ');
    } else if (type === 'words') {
      const words = [];
      for (let i = 0; i < count; i++) {
        words.push(randomWord());
      }
      output = words.join(' ');
    }

    document.getElementById('output').innerHTML = output;
  }

  function copyOutput() {
    const output = document.getElementById('output');
    const text = output.innerText;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.target;
      const original = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = original, 1500);
    });
  }

  // Generate on load
  generate();
</script>
</body>
</html>
