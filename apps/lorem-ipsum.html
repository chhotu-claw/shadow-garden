<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Shadow's Garden</title>
<meta name="description" content="Generate lorem ipsum in words, paragraphs, bytes, or bytes with shuffle. Copy to clipboard or download.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: 'IBM Plex Mono', monospace; background: #0a0a0f; color: #c9d1d9; min-height: 100vh; padding: 2rem; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: #58a6ff; font-size: 1.8rem; margin-bottom: 0.5rem; }
  .controls { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1.5rem 0; align-items: center; }
  .controls select, .controls input { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 0.5rem 1rem; border-radius: 6px; font-family: inherit; font-size: 0.9rem; }
  .controls input[type="number"] { width: 80px; }
  .controls button { background: #238636; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: background 0.2s; }
  .controls button:hover { background: #2ea043; }
  .controls button.secondary { background: #30363d; }
  .controls button.secondary:hover { background: #484f58; }
  .output { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; min-height: 200px; max-height: 400px; overflow-y: auto; line-height: 1.8; font-size: 0.95rem; white-space: pre-wrap; word-wrap: break-word; }
  .output.empty { color: #484f58; font-style: italic; }
  .options { display: flex; gap: 1rem; align-items: center; margin-top: 1rem; flex-wrap: wrap; }
  .options label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.9rem; }
  .options input[type="checkbox"] { accent-color: #238636; }
  .meta { color: #8b949e; font-size: 0.85rem; margin-top: 1rem; }
  @media (max-width: 600px) { .controls { flex-direction: column; align-items: stretch; } }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Lorem Ipsum Generator</h1>
  <p style="color: #8b949e; margin-top: 0;">Generate placeholder text in various formats.</p>
  
  <div class="controls">
    <select id="type">
      <option value="words">Words</option>
      <option value="paragraphs">Paragraphs</option>
      <option value="bytes">Bytes</option>
      <option value="shuffle">Bytes (Shuffle)</option>
    </select>
    <input type="number" id="count" value="50" min="1" max="1000">
    <button onclick="generate()">Generate</button>
    <button class="secondary" onclick="copy()">Copy</button>
    <button class="secondary" onclick="download()">Download</button>
  </div>
  
  <div class="options">
    <label><input type="checkbox" id="startWithLorum"> Start with "Lorem ipsum..."</label>
    <label><input type="checkbox" id="translatePangrams"> Include translated pangrams</label>
  </div>
  
  <div id="output" class="output empty">Click "Generate" to create lorem ipsum...</div>
  <div class="meta" id="meta"></div>
</div>

<script>
const lorem = "lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua Ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur Excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum".split(" ");
const pangrams = {
  latin: "Lorem ipsum dolor sit amet, consectetur adipiscing elit.",
  english: "The quick brown fox jumps over the lazy dog.",
  french: "Portez ce vieux whisky au juge blond qui fume.",
  german: "Falsches Üben von Xylophonmusik quält jeden größeren Zwerg.",
  spanish: "El veloz murciélago hindú comía feliz cardillo y kiwi.",
  italian: " Pranzo d'acqua fa volti sgraziosi e il naufragi addio.",
  portuguese: "À noite, vovô Kowalsky vê o ímã cair no pé do pinguim queixoso.",
  mixed: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. The quick brown fox jumps over the lazy dog. Portez ce vieux whisky au juge blond qui fume."
};

let currentText = "";

function generate() {
  const type = document.getElementById("type").value;
  const count = parseInt(document.getElementById("count").value) || 50;
  const startWithLorum = document.getElementById("startWithLorum").checked;
  const translatePangrams = document.getElementById("translatePangrams").checked;
  
  let result = "";
  
  if (type === "words") {
    result = generateWords(count, startWithLorum);
  } else if (type === "paragraphs") {
    result = generateParagraphs(count, startWithLorum);
  } else if (type === "bytes") {
    result = generateBytes(count, false);
  } else if (type === "shuffle") {
    result = generateBytes(count, true);
  }
  
  if (translatePangrams && type !== "bytes" && type !== "shuffle") {
    result += "\n\n" + pangrams.mixed;
  }
  
  currentText = result;
  const output = document.getElementById("output");
  output.textContent = result;
  output.classList.remove("empty");
  
  const byteSize = new Blob([result]).length;
  document.getElementById("meta").textContent = `${result.split(/\s+/).filter(w => w).length} words • ${result.split('\n\n').filter(p => p).length} paragraphs • ~${byteSize} bytes`;
}

function generateWords(count, startWithLorum) {
  const words = [];
  for (let i = 0; i < count; i++) {
    words.push(lorem[Math.floor(Math.random() * lorem.length)]);
  }
  let text = words.join(" ");
  if (startWithLorum && !text.startsWith("lorem")) {
    text = "lorem ipsum dolor sit amet " + text.substring(text.indexOf(" ") + 1);
  }
  return text.charAt(0).toUpperCase() + text.slice(1);
}

function generateParagraphs(count, startWithLorum) {
  const paras = [];
  for (let i = 0; i < count; i++) {
    const sentenceCount = 4 + Math.floor(Math.random() * 6);
    const sentences = [];
    for (let j = 0; j < sentenceCount; j++) {
      const wordCount = 8 + Math.floor(Math.random() * 12);
      const words = [];
      for (let k = 0; k < wordCount; k++) {
        words.push(lorem[Math.floor(Math.random() * lorem.length)]);
      }
      let sentence = words.join(" ");
      sentence = sentence.charAt(0).toUpperCase() + sentence.slice(1) + ".";
      sentences.push(sentence);
    }
    paras.push(sentences.join(" "));
  }
  return paras.join("\n\n");
}

function generateBytes(count, shuffle) {
  let chars = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. ";
  const source = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  for (let i = 0; i < count; i++) {
    chars += source[Math.floor(Math.random() * source.length)];
  }
  if (shuffle) {
    chars = chars.split("").sort(() => Math.random() - 0.5).join("");
  }
  return chars;
}

function copy() {
  if (!currentText) { generate(); }
  navigator.clipboard.writeText(currentText).then(() => {
    const btn = document.querySelector(".controls button.secondary");
    const original = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = original, 1500);
  });
}

function download() {
  if (!currentText) { generate(); }
  const blob = new Blob([currentText], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "lorem-ipsum.txt";
  a.click();
  URL.revokeObjectURL(url);
}

// Generate on load
generate();
</script>
</body>
</html>
