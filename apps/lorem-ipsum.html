<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Shadow's Garden</title>
<meta name="description" content="Generate lorem ipsum placeholder text instantly. Control paragraphs, words, or bytes. Copy with one click.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }
  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .control-group label {
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .control-group input,
  .control-group select {
    padding: 0.6rem;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.95rem;
  }
  .control-group input:focus,
  .control-group select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .control-group input[type="number"] {
    width: 100%;
  }
  .btn-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  button {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.7rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s ease;
  }
  button:hover {
    background: var(--bg-hover);
    border-color: var(--text-muted);
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  button.primary:hover {
    opacity: 0.9;
  }
  .output {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    min-height: 200px;
    max-height: 500px;
    overflow-y: auto;
    margin-bottom: 1rem;
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
  }
  .output.copied {
    border-color: #22c55e;
  }
  .stats {
    display: flex;
    gap: 1rem;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }
  .stats span {
    background: var(--bg-elevated);
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
  }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 1000;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast.success {
    border-color: #22c55e;
    color: #22c55e;
  }
  .presets {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .presets button {
    padding: 0.4rem 0.8rem;
    font-size: 0.8rem;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Lorem Ipsum Generator</h1>
    <p class="subtitle">Generate placeholder text instantly</p>
    
    <div class="controls">
      <div class="control-group">
        <label>Type</label>
        <select id="type">
          <option value="paras">Paragraphs</option>
          <option value="words">Words</option>
          <option value="bytes">Bytes</option>
          <option value="sentences">Sentences</option>
        </select>
      </div>
      <div class="control-group">
        <label>Count</label>
        <input type="number" id="count" value="3" min="1" max="100">
      </div>
      <div class="control-group">
        <label>Start with...</label>
        <select id="start">
          <option value="classic">Lorem ipsum...</option>
          <option value="zante">Zante haz...</option>
          <option value="none">No opening</option>
        </select>
      </div>
    </div>
    
    <div class="presets">
      <button onclick="setPreset(3, 'paras')">3 Paragraphs</button>
      <button onclick="setPreset(5, 'paras')">5 Paragraphs</button>
      <button onclick="setPreset(50, 'words')">50 Words</button>
      <button onclick="setPreset(100, 'words')">100 Words</button>
      <button onclick="setPreset(10, 'sentences')">10 Sentences</button>
    </div>
    
    <div class="btn-row">
      <button id="generate" class="primary">Generate</button>
      <button id="copy">Copy</button>
    </div>
    
    <div class="stats">
      <span id="stat-count">0 words</span>
      <span id="stat-bytes">0 bytes</span>
    </div>
    
    <div id="output" class="output"></div>
  </div>
  
  <div id="toast" class="toast">Copied!</div>
  
  <script>
    // Classic lorem ipsum words
    const loremWords = [
      'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit',
      'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore',
      'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud',
      'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo',
      'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit', 'voluptate',
      'velit', 'esse', 'cillum', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint',
      'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia',
      'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum', 'at', 'vero', 'eos',
      'accusamus', 'iusto', 'odio', 'dignissimos', 'ducimus', 'blanditiis',
      'praesentium', 'voluptatum', 'deleniti', 'atque', 'corrupti', 'quos', 'dolores',
      'quas', 'molestias', 'excepturi', 'obcaecati', 'cupiditate', 'provident',
      'similique', 'mollitia', 'animi', 'perspiciatis', 'unde', 'omnis', 'iste',
      'natus', 'error', 'voluptatem', 'accusantium', 'doloremque', 'laudantium',
      'totam', 'rem', 'aperiam', 'eaque', 'ipsa', 'quae', 'ab', 'illo', 'inventore',
      'veritatis', 'quasi', 'architecto', 'beatae', 'vitae', 'dicta', 'explicabo',
      'aspernatur', 'odit', 'fugit', 'harum', 'quidem', 'rerum', 'facilis',
      'expedita', 'distinctio', 'nam', 'libero', 'tempore', 'cum', 'soluta',
      'nobis', 'est', 'eligendi', 'optio', 'cumque', 'nihil', 'impedit', 'quo',
      'minus', 'quod', 'maxime', 'placeat', 'facere', 'possimus', 'assumenda',
      'repellendus', 'temporibus', 'autem', 'quibusdam', 'officiis', 'debitis',
      'aut', 'rerum', 'necessitatibus', 'saepe', 'eveniet', 'voluptates',
      'repudiandae', 'recusandae', 'itaque', 'earum', 'hic', 'tenetur', 'sapiente',
      'delectus', 'reiciendis', 'voluptatibus', 'maiores', 'alias', 'perferendis',
      'doloribus', 'asperiores', 'repellat'
    ];
    
    // Alternative: Zante haz
    const zanteWords = [
      'zante', 'haz', 'cl廖', 'kar', 'ni', 'pav', 'ga', 'nae', 'ke', 'tae',
      'guk', 'hwa', 'sal', 'go', 'eum', 'na', 'da', 'il', 'gong', 'bang',
      'mul', 'li', 'je', 'ja', 'gi', 'go', 'da', 'roe', 'ul', 'su', 'eop',
      'seo', 'yeon', 'haneul', 'ttara', 'ge', 'olk', 'key', 'ddeon', 'jane',
      'ne', 'ga', 'ke', 'tae', 'ya', 'bo', 'ta', 'neun', 'ge', 'dwe', 'seo',
      'wae', 'hae', 'ya', 'hae', 'tteol', 'lyeo', 'geo', 'ya', 'beo', 'rin',
      'ge', 'seo', 'ye', 'ol', 'eo', 'neun', 'ae', 'seo', 'haneul', 'ttara'
    ];
    
    let currentText = '';
    let currentWordList = loremWords;
    
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    function generateWords(count, wordList) {
      const words = [];
      while (words.length < count) {
        words.push(...shuffle(wordList));
      }
      return words.slice(0, count);
    }
    
    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }
    
    function generateText() {
      const type = document.getElementById('type').value;
      const count = parseInt(document.getElementById('count').value) || 1;
      const start = document.getElementById('start').value;
      
      if (start === 'zante') {
        currentWordList = zanteWords;
      } else {
        currentWordList = loremWords;
      }
      
      let text = '';
      
      switch (type) {
        case 'paras': {
          const paras = [];
          for (let p = 0; p < count; p++) {
            const wordCount = 30 + Math.floor(Math.random() * 40);
            const words = generateWords(wordCount, currentWordList);
            let sentence = '';
            let sentenceCount = 0;
            
            for (let i = 0; i < words.length; i++) {
              if (sentenceCount < 5 + Math.floor(Math.random() * 8)) {
                sentence += (sentence ? ' ' : (p === 0 && start !== 'none' && i === 0 && sentenceCount === 0 ? (start === 'classic' ? 'Lorem ipsum dolor sit amet' : capitalize(zanteWords[0])) : '')) + words[i];
                if (sentence && Math.random() < 0.1) {
                  sentence = capitalize(sentence) + '.';
                  sentenceCount++;
                }
              }
            }
            if (sentence && !sentence.endsWith('.')) {
              sentence = capitalize(sentence) + '.';
            }
            paras.push(sentence.trim());
          }
          text = paras.join('\n\n');
          break;
        }
        
        case 'words': {
          const words = generateWords(count, currentWordList);
          if (start !== 'none' && words.length > 0) {
            if (start === 'classic') {
              words[0] = 'lorem';
              words[1] = 'ipsum';
              words[2] = 'dolor';
            } else if (start === 'zante') {
              words[0] = 'zante';
              words[1] = 'haz';
            }
          }
          text = words.join(' ');
          break;
        }
        
        case 'sentences': {
          const sentences = [];
          for (let i = 0; i < count; i++) {
            const wordCount = 8 + Math.floor(Math.random() * 10);
            const words = generateWords(wordCount, currentWordList);
            let sentence = words.join(' ');
            sentence = capitalize(sentence) + '.';
            sentences.push(sentence);
          }
          text = sentences.join(' ');
          break;
        }
        
        case 'bytes': {
          const targetBytes = count;
          const words = generateWords(1000, currentWordList);
          let sentence = '';
          let byteCount = 0;
          
          for (const word of words) {
            if (byteCount >= targetBytes) break;
            sentence += (sentence ? ' ' : '') + word;
            byteCount = new TextEncoder().encode(sentence).length;
          }
          
          while (byteCount < targetBytes && words.length > 0) {
            sentence += ' ' + words[Math.floor(Math.random() * words.length)];
            byteCount = new TextEncoder().encode(sentence).length;
          }
          
          text = sentence.slice(0, targetBytes);
          break;
        }
      }
      
      currentText = text;
      document.getElementById('output').textContent = text;
      updateStats();
    }
    
    function updateStats() {
      const text = currentText || '';
      const words = text.trim().split(/\s+/).filter(w => w.length > 0);
      const bytes = new TextEncoder().encode(text).length;
      
      document.getElementById('stat-count').textContent = `${words.length} words`;
      document.getElementById('stat-bytes').textContent = `${bytes} bytes`;
    }
    
    function setPreset(cnt, type) {
      document.getElementById('count').value = cnt;
      document.getElementById('type').value = type;
      generateText();
    }
    
    function showToast(message, success = true) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (success ? ' success' : '');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }
    
    function copyToClipboard() {
      if (!currentText) return;
      navigator.clipboard.writeText(currentText).then(() => {
        showToast('Copied!');
        document.getElementById('output').classList.add('copied');
        setTimeout(() => document.getElementById('output').classList.remove('copied'), 500);
      });
    }
    
    document.getElementById('generate').addEventListener('click', generateText);
    document.getElementById('copy').addEventListener('click', copyToClipboard);
    document.getElementById('type').addEventListener('change', generateText);
    document.getElementById('count').addEventListener('change', generateText);
    document.getElementById('start').addEventListener('change', generateText);
    
    // Initial generate
    generateText();
  </script>
</body>
</html>
