<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Shadow's Garden</title>
<meta name="description" content="Generate lorem ipsum placeholder text in paragraphs, words, bytes, or lists. Copy to clipboard or download as .txt.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 700px; margin: 0 auto; padding: 2rem; }
  .controls { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; align-items: center; }
  .control-group { display: flex; align-items: center; gap: 0.5rem; }
  label { font-weight: 500; }
  select, input[type="number"] { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
  input[type="number"] { width: 70px; }
  button { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; transition: background 0.2s; }
  .btn-primary { background: #2d2d2d; color: #fff; }
  .btn-primary:hover { background: #444; }
  .btn-secondary { background: #e0e0e0; color: #333; }
  .btn-secondary:hover { background: #ccc; }
  #output { 
    background: #f8f8f8; 
    padding: 1.5rem; 
    border-radius: 6px; 
    white-space: pre-wrap; 
    max-height: 400px;
    overflow-y: auto;
    line-height: 1.6;
    font-family: Georgia, serif;
  }
  .stats { margin-top: 1rem; font-size: 0.85rem; color: #666; }
  .copy-feedback { margin-left: 0.5rem; color: #2a7; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; }
  .copy-feedback.show { opacity: 1; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Lorem Ipsum Generator</h1>
  <p>Generate placeholder text for designs. All local, no tracking.</p>
  
  <div class="controls">
    <div class="control-group">
      <label>Type:</label>
      <select id="type">
        <option value="paragraphs">Paragraphs</option>
        <option value="words">Words</option>
        <option value="bytes">Bytes</option>
        <option value="lists">List items</option>
      </select>
    </div>
    <div class="control-group">
      <label>Count:</label>
      <input type="number" id="count" value="3" min="1" max="100">
    </div>
    <button class="btn-primary" onclick="generate()">Generate</button>
    <button class="btn-secondary" onclick="copy()">Copy</button>
  </div>
  
  <div id="output"></div>
  <div class="stats" id="stats"></div>
</div>

<script>
const words = ['lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit', 'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore', 'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud', 'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo', 'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit', 'voluptate', 'velit', 'esse', 'cillum', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint', 'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia', 'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum'];

function randomWord() {
  return words[Math.floor(Math.random() * words.length)];
}

function generateParagraph(minWords = 30, maxWords = 60) {
  const len = Math.floor(Math.random() * (maxWords - minWords + 1)) + minWords;
  const paragraph = [];
  let sentenceLen = 0;
  for (let i = 0; i < len; i++) {
    const word = randomWord();
    paragraph.push(word);
    sentenceLen++;
    if (sentenceLen > 8 && Math.random() > 0.8) {
      paragraph[paragraph.length - 1] += '.';
      sentenceLen = 0;
    }
  }
  // Capitalize first word, end with period
  paragraph[0] = paragraph[0].charAt(0).toUpperCase() + paragraph[0].slice(1);
  if (!paragraph[paragraph.length - 1].endsWith('.')) {
    paragraph[paragraph.length - 1] += '.';
  }
  return paragraph.join(' ');
}

function generate() {
  const type = document.getElementById('type').value;
  const count = parseInt(document.getElementById('count').value) || 3;
  let output = '';
  let stats = '';
  
  if (type === 'paragraphs') {
    const paras = [];
    for (let i = 0; i < count; i++) {
      paras.push(generateParagraph());
    }
    output = paras.join('\n\n');
    stats = `${count} paragraph${count > 1 ? 's' : ''}`;
  } else if (type === 'words') {
    const w = [];
    for (let i = 0; i < count; i++) {
      w.push(randomWord());
    }
    output = w.join(' ');
    stats = `${count} word${count > 1 ? 's' : ''}`;
  } else if (type === 'bytes') {
    // Generate exactly N bytes of lorem-style text
    const targetBytes = count;
    let result = '';
    while (result.length < targetBytes) {
      const para = generateParagraph(15, 30);
      if (result.length + para.length + 2 <= targetBytes) {
        result += para + '\n\n';
      } else {
        const remaining = targetBytes - result.length;
        result += para.substring(0, remaining);
      }
    }
    output = result;
    stats = `${result.length} bytes`;
  } else if (type === 'lists') {
    const items = [];
    for (let i = 0; i < count; i++) {
      items.push(`${i + 1}. ${generateParagraph(5, 10)}`);
    }
    output = items.join('\n');
    stats = `${count} list item${count > 1 ? 's' : ''}`;
  }
  
  document.getElementById('output').textContent = output;
  document.getElementById('stats').textContent = stats;
}

function copy() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const feedback = document.getElementById('stats');
    feedback.textContent += ' — Copied!';
    setTimeout(() => generate(), 2000);
  });
}

// Generate on load
generate();
</script>
</body>
</html>
