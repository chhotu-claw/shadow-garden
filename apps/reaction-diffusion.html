<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Diffusion — Shadow's Garden</title>
<meta name="description" content="Interactive reaction-diffusion simulator using the Gray-Scott model — click to add chemicals, watch patterns emerge">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background: #0a0a0f;
  }
  h1 {
    color: #f0e6d3;
    margin-bottom: 10px;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .control-group label {
    color: #888;
    font-size: 11px;
    text-transform: uppercase;
  }
  input[type="range"] {
    width: 100px;
  }
  button {
    padding: 8px 16px;
    border: 2px solid #333;
    background: #1a1a24;
    color: #f0e6d3;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s;
  }
  button:hover {
    background: #252535;
  }
  button.active {
    border-color: #ff6b35;
    background: #2a1a14;
  }
  canvas {
    border: 2px solid #333;
    cursor: crosshair;
    image-rendering: pixelated;
  }
  .presets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 10px;
  }
  .presets button {
    padding: 5px 10px;
    font-size: 12px;
  }
  .info {
    color: #666;
    font-size: 12px;
    margin-top: 10px;
  }
</style>
</head>
<body data-page-type="app">
  <h1>Reaction Diffusion</h1>
  <div class="controls">
    <div class="control-group">
      <label>Feed Rate</label>
      <input type="range" id="feed" min="0.01" max="0.1" step="0.001" value="0.055">
    </div>
    <div class="control-group">
      <label>Kill Rate</label>
      <input type="range" id="kill" min="0.01" max="0.1" step="0.001" value="0.062">
    </div>
    <div class="control-group">
      <label>Speed</label>
      <input type="range" id="speed" min="1" max="20" step="1" value="8">
    </div>
    <button id="resetBtn">Reset</button>
    <button id="pauseBtn">Pause</button>
  </div>
  <div class="presets">
    <button data-feed="0.0367" data-kill="0.0649">Coral</button>
    <button data-feed="0.029" data-kill="0.057">Spots</button>
    <button data-feed="0.025" data-kill="0.060">Worms</button>
    <button data-feed="0.078" data-kill="0.061">Mazes</button>
    <button data-feed="0.014" data-kill="0.054">Solitons</button>
  </div>
  <canvas id="canvas" width="400" height="300"></canvas>
  <div class="info">Click to add chemicals • Drag to draw • Gray-Scott model</div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    const SCALE = 4;
    const COLS = Math.floor(W / SCALE);
    const ROWS = Math.floor(H / SCALE);
    
    let gridA = new Float32Array(COLS * ROWS);
    let gridB = new Float32Array(COLS * ROWS);
    let nextA = new Float32Array(COLS * ROWS);
    let nextB = new Float32Array(COLS * ROWS);
    
    // Initialize with chemical A everywhere
    gridA.fill(1);
    
    let feed = 0.055;
    let kill = 0.062;
    let diffusionA = 1.0;
    let diffusionB = 0.5;
    let speed = 8;
    let paused = false;
    let isDrawing = false;
    
    // UI
    document.getElementById('feed').addEventListener('input', e => feed = parseFloat(e.target.value));
    document.getElementById('kill').addEventListener('input', e => kill = parseFloat(e.target.value));
    document.getElementById('speed').addEventListener('input', e => speed = parseInt(e.target.value));
    
    document.getElementById('resetBtn').addEventListener('click', () => {
      gridA.fill(1);
      gridB.fill(0);
    });
    
    document.getElementById('pauseBtn').addEventListener('click', e => {
      paused = !paused;
      e.target.textContent = paused ? 'Resume' : 'Pause';
    });
    
    // Presets
    document.querySelectorAll('.presets button').forEach(btn => {
      btn.addEventListener('click', () => {
        feed = parseFloat(btn.dataset.feed);
        kill = parseFloat(btn.dataset.kill);
        document.getElementById('feed').value = feed;
        document.getElementById('kill').value = kill;
        gridA.fill(1);
        gridB.fill(0);
      });
    });
    
    // Drawing
    function addChemical(cx, cy, radius) {
      for (let y = -radius; y <= radius; y++) {
        for (let x = -radius; x <= radius; x++) {
          if (x*x + y*y <= radius*radius) {
            const px = cx + x;
            const py = cy + y;
            if (px >= 0 && px < COLS && py >= 0 && py < ROWS) {
              gridB[py * COLS + px] = 1;
            }
          }
        }
      }
    }
    
    canvas.addEventListener('mousedown', e => {
      isDrawing = true;
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / SCALE);
      const y = Math.floor((e.clientY - rect.top) / SCALE);
      addChemical(x, y, 5);
    });
    
    canvas.addEventListener('mousemove', e => {
      if (isDrawing) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / SCALE);
        const y = Math.floor((e.clientY - rect.top) / SCALE);
        addChemical(x, y, 3);
      }
    });
    
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);
    
    function update() {
      const dA = diffusionA;
      const dB = diffusionB;
      
      for (let iter = 0; iter < speed; iter++) {
        for (let y = 1; y < ROWS - 1; y++) {
          for (let x = 1; x < COLS - 1; x++) {
            const i = y * COLS + x;
            
            const a = gridA[i];
            const b = gridB[i];
            
            // Laplacian
            const lapA = (gridA[i-1] + gridA[i+1] + gridA[i-COLS] + gridA[i+COLS]) / 4 - a;
            const lapB = (gridB[i-1] + gridB[i+1] + gridB[i-COLS] + gridB[i+COLS]) / 4 - b;
            
            const reaction = a * b * b;
            
            nextA[i] = a + (dA * lapA - reaction + feed * (1 - a));
            nextB[i] = b + (dB * lapB + reaction - (kill + feed) * b);
            
            // Clamp
            nextA[i] = Math.max(0, Math.min(1, nextA[i]));
            nextB[i] = Math.max(0, Math.min(1, nextB[i]));
          }
        }
        
        // Swap buffers
        [gridA, nextA] = [nextA, gridA];
        [gridB, nextB] = [nextB, gridB];
      }
    }
    
    function render() {
      const imageData = ctx.createImageData(W, H);
      const data = imageData.data;
      
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const i = y * COLS + x;
          const a = gridA[i];
          const b = gridB[i];
          
          const c = Math.floor((a - b) * 255);
          const idx = (y * SCALE * W + x * SCALE) * 4;
          
          for (let sy = 0; sy < SCALE; sy++) {
            for (let sx = 0; sx < SCALE; sx++) {
              const pi = ((y * SCALE + sy) * W + (x * SCALE + sx)) * 4;
              const v = Math.max(0, Math.min(255, c));
              data[pi] = v * 0.2;
              data[pi + 1] = v * 0.6;
              data[pi + 2] = v * 0.8;
              data[pi + 3] = 255;
            }
          }
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
    }
    
    function loop() {
      if (!paused) {
        update();
      }
      render();
      requestAnimationFrame(loop);
    }
    
    // Initial splash
    addChemical(Math.floor(COLS/2), Math.floor(ROWS/2), 10);
    
    loop();
  </script>
</body>
</html>
