<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Diffusion — Shadow's Garden</title>
<meta name="description" content="Gray-Scott reaction-diffusion simulator. Coral, spots, fingerprints, worms, mazes.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-family: monospace;
  }
  .stats {
    position: fixed;
    top: 20px;
    right: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    font-family: monospace;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Click to add chemical • Space to pause</div>
  <div class="stats" id="stats">FPS: 0</div>
  <div class="controls">
    <button id="coral">Coral</button>
    <button id="spots">Spots</button>
    <button id="fingerprints">Fingerprints</button>
    <button id="worms">Worms</button>
    <button id="mazes">Mazes</button>
    <button id="clear">Clear</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let cellSize = 4;
    let cols, rows;
    let grid = [];
    let next = [];
    let running = true;
    let frameCount = 0;
    let lastTime = Date.now();
    let fps = 0;
    
    // Gray-Scott parameters
    let feed = 0.055;
    let kill = 0.062;
    let da = 1.0;
    let db = 0.5;
    
    const presets = {
      coral: { feed: 0.0545, kill: 0.062 },
      spots: { feed: 0.0367, kill: 0.0644 },
      fingerprints: { feed: 0.054, kill: 0.063 },
      worms: { feed: 0.078, kill: 0.061 },
      mazes: { feed: 0.029, kill: 0.057 }
    };
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      cols = Math.floor(width / cellSize);
      rows = Math.floor(height / cellSize);
      init();
    }
    
    function init() {
      grid = [];
      next = [];
      for (let y = 0; y < rows; y++) {
        grid[y] = [];
        next[y] = [];
        for (let x = 0; x < cols; x++) {
          grid[y][x] = { a: 1, b: 0 };
          next[y][x] = { a: 1, b: 0 };
        }
      }
      
      // Add initial seed
      for (let i = 0; i < 5; i++) {
        const cx = Math.floor(cols / 2 + (Math.random() - 0.5) * 20);
        const cy = Math.floor(rows / 2 + (Math.random() - 0.5) * 20);
        for (let y = cy - 5; y < cy + 5; y++) {
          for (let x = cx - 5; x < cx + 5; x++) {
            if (y > 0 && y < rows - 1 && x > 0 && x < cols - 1) {
              grid[y][x].b = 1;
            }
          }
        }
      }
    }
    
    function update() {
      if (!running) return;
      
      for (let y = 1; y < rows - 1; y++) {
        for (let x = 1; x < cols - 1; x++) {
          const a = grid[y][x].a;
          const b = grid[y][x].b;
          
          // Laplacian
          let lapA = 0;
          let lapB = 0;
          
          lapA += grid[y][x].a * -1;
          lapA += grid[y][x-1].a * 0.2;
          lapA += grid[y][x+1].a * 0.2;
          lapA += grid[y-1][x].a * 0.2;
          lapA += grid[y+1][x].a * 0.2;
          lapA += grid[y-1][x-1].a * 0.05;
          lapA += grid[y-1][x+1].a * 0.05;
          lapA += grid[y+1][x-1].a * 0.05;
          lapA += grid[y+1][x+1].a * 0.05;
          
          lapB += grid[y][x].b * -1;
          lapB += grid[y][x-1].b * 0.2;
          lapB += grid[y][x+1].b * 0.2;
          lapB += grid[y-1][x].b * 0.2;
          lapB += grid[y+1][x].b * 0.2;
          lapB += grid[y-1][x-1].b * 0.05;
          lapB += grid[y-1][x+1].b * 0.05;
          lapB += grid[y+1][x-1].b * 0.05;
          lapB += grid[y+1][x+1].b * 0.05;
          
          // Gray-Scott formulas
          const newA = a + (da * lapA - a * b * b + feed * (1 - a));
          const newB = b + (db * lapB + a * b * b - (kill + feed) * b);
          
          next[y][x].a = Math.max(0, Math.min(1, newA));
          next[y][x].b = Math.max(0, Math.min(1, newB));
        }
      }
      
      // Swap grids
      const temp = grid;
      grid = next;
      next = temp;
    }
    
    function draw() {
      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;
      
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const val = grid[y][x].b - grid[y][x].a;
          const c = Math.floor((1 - val) * 255);
          
          // Color mapping
          const r = Math.floor(c * 0.2);
          const g = Math.floor(c * 0.8);
          const b = Math.floor(c);
          
          for (let sy = 0; sy < cellSize; sy++) {
            for (let sx = 0; sx < cellSize; sx++) {
              const px = x * cellSize + sx;
              const py = y * cellSize + sy;
              if (px < width && py < height) {
                const i = (py * width + px) * 4;
                data[i] = r;
                data[i+1] = g;
                data[i+2] = b;
                data[i+3] = 255;
              }
            }
          }
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
    }
    
    function animate() {
      // Multiple steps per frame for speed
      for (let i = 0; i < 8; i++) {
        update();
      }
      draw();
      
      frameCount++;
      const now = Date.now();
      if (now - lastTime > 1000) {
        fps = frameCount;
        frameCount = 0;
        lastTime = now;
        document.getElementById('stats').innerText = `FPS: ${fps}`;
      }
      
      requestAnimationFrame(animate);
    }
    
    canvas.addEventListener('click', (e) => {
      const x = Math.floor(e.clientX / cellSize);
      const y = Math.floor(e.clientY / cellSize);
      for (let dy = -3; dy <= 3; dy++) {
        for (let dx = -3; dx <= 3; dx++) {
          if (y + dy > 0 && y + dy < rows - 1 && x + dx > 0 && x + dx < cols - 1) {
            grid[y + dy][x + dx].b = 1;
          }
        }
      }
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        running = !running;
        e.preventDefault();
      }
    });
    
    document.getElementById('coral').onclick = () => { feed = presets.coral.feed; kill = presets.coral.kill; init(); };
    document.getElementById('spots').onclick = () => { feed = presets.spots.feed; kill = presets.spots.kill; init(); };
    document.getElementById('fingerprints').onclick = () => { feed = presets.fingerprints.feed; kill = presets.fingerprints.kill; init(); };
    document.getElementById('worms').onclick = () => { feed = presets.worms.feed; kill = presets.worms.kill; init(); };
    document.getElementById('mazes').onclick = () => { feed = presets.mazes.feed; kill = presets.mazes.kill; init(); };
    document.getElementById('clear').onclick = init;
    
    window.addEventListener('resize', resize);
    resize();
    animate();
  </script>
</body>
</html>
