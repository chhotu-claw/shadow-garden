<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Path Query — Shadow's Garden</title>
<meta name="description" content="Query JSON with JSONPath expressions. Test paths, see results instantly.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }
  .editor-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 700px) {
    .editor-row {
      grid-template-columns: 1fr;
    }
  }
  .editor-box {
    display: flex;
    flex-direction: column;
  }
  .editor-box label {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .editor-box textarea {
    flex: 1;
    min-height: 300px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    padding: 1rem;
    resize: vertical;
  }
  .editor-box textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .path-input {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .path-input input {
    flex: 1;
    min-width: 200px;
    padding: 0.75rem 1rem;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 1rem;
  }
  .path-input input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .path-input input::placeholder {
    color: var(--text-muted);
  }
  button {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.75rem 1.25rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s ease;
  }
  button:hover {
    background: var(--bg-hover);
    border-color: var(--text-muted);
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  button.primary:hover {
    opacity: 0.9;
  }
  .results {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    min-height: 150px;
    max-height: 400px;
    overflow-y: auto;
  }
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .results-header span {
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .results pre {
    margin: 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .results .error {
    color: #ef4444;
  }
  .results .success {
    color: #22c55e;
  }
  .presets {
    margin-bottom: 1.5rem;
  }
  .presets-label {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .presets-buttons {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .presets-buttons button {
    padding: 0.4rem 0.75rem;
    font-size: 0.8rem;
  }
  .stats {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }
  .status {
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
  }
  .status.error {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.3);
  }
  .status.success {
    background: rgba(34, 197, 94, 0.1);
    color: #22c55e;
    border: 1px solid rgba(34, 197, 94, 0.3);
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>JSON Path Query</h1>
    <p class="subtitle">Query JSON with JSONPath expressions</p>
    
    <div class="editor-row">
      <div class="editor-box">
        <label>JSON Input <button id="btn-format">Format</button></label>
        <textarea id="json-input" placeholder='{"name": "Shadow", "tools": ["UUID", "QR", "JWT"]}'></textarea>
        <div class="stats" id="json-stats"></div>
      </div>
      <div class="editor-box">
        <label>Results</label>
        <textarea id="results-output" readonly placeholder="Results will appear here..."></textarea>
        <div class="stats" id="result-stats"></div>
      </div>
    </div>
    
    <div class="path-input">
      <input type="text" id="path-input" placeholder="$.store.book[*].author or $..price" value="$">
      <button id="btn-query" class="primary">Query</button>
      <button id="btn-copy">Copy Results</button>
    </div>
    
    <div class="presets">
      <div class="presets-label">Quick examples:</div>
      <div class="presets-buttons">
        <button data-path="$.*">$.* (root)</button>
        <button data-path="$..*">$..* (recursive)</button>
        <button data-path="$.store.book[*]">$.store.book[*]</button>
        <button data-path="$..author">$..author</button>
        <button data-path="$.store.book[?(@.price < 10)]">Price &lt; 10</button>
        <button data-path="$.store.book[*].author">All authors</button>
      </div>
    </div>
    
    <div id="status"></div>
  </div>
  
  <script>
    // Simple JSONPath implementation
    class JSONPath {
      constructor() {
        this.result = [];
      }
      
      query(obj, path) {
        this.result = [];
        if (!path || path === '$') {
          return [obj];
        }
        
        const tokens = this.tokenize(path);
        this.traverse(obj, tokens, 0);
        return this.result;
      }
      
      tokenize(path) {
        const tokens = [];
        let current = '';
        let inBracket = false;
        
        for (let i = 0; i < path.length; i++) {
          const char = path[i];
          
          if (char === '[' || char === '(') {
            if (current) {
              tokens.push({ type: 'key', value: current });
              current = '';
            }
            inBracket = true;
            if (char === '(') {
              tokens.push({ type: 'filter', value: '' });
            } else {
              tokens.push({ type: 'bracket', value: '' });
            }
          } else if (char === ']' || char === ')') {
            if (current) {
              if (tokens[tokens.length - 1].type === 'filter') {
                tokens[tokens.length - 1].value = current;
              } else if (tokens[tokens.length - 1].type === 'bracket') {
                tokens[tokens.length - 1].value = current;
              }
              current = '';
            }
            inBracket = false;
          } else if (char === '.' && !inBracket) {
            if (current) {
              tokens.push({ type: 'key', value: current });
              current = '';
            }
          } else if (char === '*') {
            tokens.push({ type: 'wildcard', value: '*' });
            current = '';
          } else if (char === '@') {
            tokens.push({ type: 'root', value: '@' });
            current = '';
          } else if (char === '?') {
            tokens.push({ type: 'filter', value: '' });
            inBracket = true;
          } else if (char === ':' && inBracket && tokens[tokens.length - 1].type === 'bracket') {
            tokens[tokens.length - 1].type = 'slice';
          } else {
            if (inBracket && tokens[tokens.length - 1].type === 'filter') {
              tokens[tokens.length - 1].value += char;
            } else if (inBracket && tokens[tokens.length - 1].type === 'bracket') {
              tokens[tokens.length - 1].value += char;
            } else {
              current += char;
            }
          }
        }
        
        if (current) {
          tokens.push({ type: 'key', value: current });
        }
        
        return tokens;
      }
      
      traverse(obj, tokens, index) {
        if (index >= tokens.length) {
          if (obj !== undefined) {
            this.result.push(obj);
          }
          return;
        }
        
        const token = tokens[index];
        
        if (token.type === 'key') {
          if (obj && typeof obj === 'object') {
            if (Array.isArray(obj)) {
              for (const item of obj) {
                if (item && typeof item === 'object' && token.value in item) {
                  this.traverse(item[token.value], tokens, index + 1);
                }
              }
            } else if (token.value in obj) {
              this.traverse(obj[token.value], tokens, index + 1);
            }
          }
        } else if (token.type === 'wildcard') {
          if (obj && typeof obj === 'object') {
            if (Array.isArray(obj)) {
              for (const item of obj) {
                this.traverse(item, tokens, index + 1);
              }
            } else {
              for (const key in obj) {
                this.traverse(obj[key], tokens, index + 1);
              }
            }
          }
        } else if (token.type === 'bracket') {
          if (obj && Array.isArray(obj)) {
            const expr = token.value;
            if (expr === '') {
              for (const item of obj) {
                this.traverse(item, tokens, index + 1);
              }
            } else if (!isNaN(expr)) {
              if (obj[parseInt(expr)] !== undefined) {
                this.traverse(obj[parseInt(expr)], tokens, index + 1);
              }
            } else if (expr.includes(',')) {
              const parts = expr.split(',');
              for (const part of parts) {
                const idx = parseInt(part.trim());
                if (!isNaN(idx) && obj[idx] !== undefined) {
                  this.traverse(obj[idx], tokens, index + 1);
                }
              }
            }
          }
        } else if (token.type === 'filter') {
          if (obj && Array.isArray(obj)) {
            const filterExpr = token.value;
            for (const item of obj) {
              if (this.evaluateFilter(item, filterExpr)) {
                this.traverse(item, tokens, index + 1);
              }
            }
          }
        } else if (token.type === 'slice') {
          if (obj && Array.isArray(obj)) {
            const parts = token.value.split(':').map(p => p === '' ? undefined : parseInt(p));
            const start = parts[0] ?? 0;
            const end = parts[1] ?? obj.length;
            const step = parts[2] ?? 1;
            for (let i = start; i < end; i += step) {
              if (obj[i] !== undefined) {
                this.traverse(obj[i], tokens, index + 1);
              }
            }
          }
        }
      }
      
      evaluateFilter(obj, expr) {
        try {
          const cleaned = expr.replace(/@\.(\w+)/g, 'obj.$1').replace(/@/g, 'obj');
          const fn = new Function('obj', `return ${cleaned}`);
          return fn(obj);
        } catch (e) {
          return false;
        }
      }
    }
    
    const jsonPath = new JSONPath();
    const jsonInput = document.getElementById('json-input');
    const resultsOutput = document.getElementById('results-output');
    const pathInput = document.getElementById('path-input');
    const status = document.getElementById('status');
    const jsonStats = document.getElementById('json-stats');
    const resultStats = document.getElementById('result-stats');
    
    function updateJsonStats() {
      try {
        const val = jsonInput.value.trim();
        if (!val) {
          jsonStats.textContent = '';
          return;
        }
        const parsed = JSON.parse(val);
        const keys = Object.keys(parsed).length;
        const size = new Blob([val]).size;
        jsonStats.textContent = `${Array.isArray(parsed) ? parsed.length : keys} top-level ${Array.isArray(parsed) ? 'items' : 'keys'} • ${size} bytes`;
      } catch (e) {
        jsonStats.textContent = 'Invalid JSON';
      }
    }
    
    function runQuery() {
      status.innerHTML = '';
      resultStats.textContent = '';
      
      const jsonStr = jsonInput.value.trim();
      const path = pathInput.value.trim();
      
      if (!jsonStr) {
        status.innerHTML = '<div class="status error">Enter JSON first</div>';
        return;
      }
      
      if (!path) {
        status.innerHTML = '<div class="status error">Enter a path</div>';
        return;
      }
      
      try {
        const obj = JSON.parse(jsonStr);
        const results = jsonPath.query(obj, path);
        
        if (results.length === 0) {
          resultsOutput.value = '(no matches)';
          resultStats.textContent = '0 results';
        } else {
          resultsOutput.value = results.length === 1 
            ? JSON.stringify(results[0], null, 2)
            : JSON.stringify(results, null, 2);
          resultStats.textContent = `${results.length} result${results.length > 1 ? 's' : ''}`;
        }
        status.innerHTML = '<div class="status success">Query executed successfully</div>';
      } catch (e) {
        resultsOutput.value = '';
        status.innerHTML = `<div class="status error">${e.message}</div>`;
      }
    }
    
    // Event listeners
    jsonInput.addEventListener('input', updateJsonStats);
    document.getElementById('btn-query').addEventListener('click', runQuery);
    document.getElementById('btn-format').addEventListener('click', () => {
      try {
        const val = jsonInput.value.trim();
        if (val) {
          const parsed = JSON.parse(val);
          jsonInput.value = JSON.stringify(parsed, null, 2);
          updateJsonStats();
        }
      } catch (e) {
        status.innerHTML = `<div class="status error">Invalid JSON: ${e.message}</div>`;
      }
    });
    document.getElementById('btn-copy').addEventListener('click', () => {
      navigator.clipboard.writeText(resultsOutput.value).then(() => {
        status.innerHTML = '<div class="status success">Copied!</div>';
        setTimeout(() => status.innerHTML = '', 1500);
      });
    });
    pathInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') runQuery();
    });
    
    // Preset buttons
    document.querySelectorAll('.presets-buttons button').forEach(btn => {
      btn.addEventListener('click', () => {
        pathInput.value = btn.dataset.path;
        runQuery();
      });
    });
    
    // Load sample data
    jsonInput.value = JSON.stringify({
      "store": {
        "book": [
          {"category": "reference", "author": "Nigel Rees", "title": "Sayings of the Century", "price": 8.95},
          {"category": "fiction", "author": "Evelyn Waugh", "title": "Sword of Honour", "price": 12.99},
          {"category": "fiction", "author": "Herman Melville", "title": "Moby Dick", "price": 8.99},
          {"category": "fiction", "author": "J. R. R. Tolkien", "title": "The Lord of the Rings", "price": 22.99}
        ],
        "bicycle": {"color": "red", "price": 19.95}
      },
      "expensive": 10
    }, null, 2);
    updateJsonStats();
  </script>
</body>
</html>
