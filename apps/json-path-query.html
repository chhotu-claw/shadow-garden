<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Path Query — Shadow's Garden</title>
<meta name="description" content="Query JSON with JSONPath expressions. Test and debug JSON data in browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; }
  .container { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 700px) { .container { grid-template-columns: 1fr; } }
  .panel { display: flex; flex-direction: column; }
  label { font-weight: 600; margin-bottom: 0.5rem; }
  textarea { flex: 1; min-height: 300px; font-family: monospace; font-size: 0.9rem; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
  textarea:focus { outline: none; border-color: #333; }
  .controls { margin: 1rem 0; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  input[type="text"] { flex: 1; min-width: 200px; padding: 0.5rem; font-family: monospace; border: 1px solid #ccc; border-radius: 4px; }
  input[type="text"]:focus { outline: none; border-color: #333; }
  button { padding: 0.5rem 1rem; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
  button:hover { background: #555; }
  button.secondary { background: #666; }
  .result-panel { background: #f5f5f5; border-radius: 4px; padding: 1rem; min-height: 200px; max-height: 400px; overflow: auto; font-family: monospace; font-size: 0.9rem; white-space: pre-wrap; }
  .error { color: #dc3545; }
  .success { color: #28a745; }
  .hint { font-size: 0.8rem; color: #666; margin-top: 0.5rem; }
  .result-count { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
  <h1>JSON Path Query</h1>
  <p>Query JSON with JSONPath expressions. All client-side.</p>

  <div class="controls">
    <input type="text" id="path" placeholder="$.store.book[*].author" value="$.store.book[*].author">
    <button onclick="execute()">Query</button>
    <button class="secondary" onclick="copyResult()">Copy Result</button>
  </div>

  <div class="container">
    <div class="panel">
      <label>JSON Input</label>
      <textarea id="jsonInput" placeholder='{"store": {"book": [{"category": "reference", "author": "Nigel Rees", "title": "Sayings of the Century", "price": 8.95}, {"category": "fiction", "author": "Evelyn Waugh", "title": "Sword of Honour", "price": 12.99}]}}'></textarea>
      <button class="secondary" onclick="formatJson()" style="margin-top: 0.5rem;">Format</button>
    </div>
    <div class="panel">
      <label>Result</label>
      <div class="result-panel" id="result">Run a query to see results</div>
    </div>
  </div>

  <p class="hint">Common patterns: <code>$.store.book[*].author</code> (all authors), <code>$..price</code> (all prices deep), <code>$.store.book[0]</code> (first book), <code>$.store.book[?(@.price &lt; 10)]</code> (filter by price)</p>

  <script>
    // Simple JSONPath implementation
    function jsonPath(obj, path) {
      if (!path.startsWith('$')) path = '$' + path;
      
      const tokens = tokenize(path);
      return evaluate(obj, tokens);
    }

    function tokenize(path) {
      const tokens = [];
      const regex = /(\$\.\.?|\[|\]|\*|[\w]+|\(\)|\?\(|[<>=!]+|[@]|\))|./g;
      let match;
      while ((match = regex.exec(path)) !== null) {
        const t = match[1];
        if (t) tokens.push(t);
      }
      return tokens;
    }

    function evaluate(obj, tokens) {
      let current = [obj];
      let i = 0;
      
      while (i < tokens.length) {
        const t = tokens[i];
        
        if (t === '$') {
          current = [obj];
        } else if (t === '.' || t === '..') {
          i++;
          const key = tokens[i];
          if (t === '.') {
            current = current.flatMap(item => {
              if (item && typeof item === 'object') {
                return item[key] !== undefined ? [item[key]] : [];
              }
              return [];
            });
          } else {
            // Recursive descent for ..
            current = findDeep(current, key);
          }
        } else if (t === '[') {
          i++;
          const selector = tokens[i];
          
          if (selector === '*') {
            current = current.flatMap(item => Array.isArray(item) ? item : []);
          } else if (selector.startsWith("'") && selector.endsWith("'")) {
            const key = selector.slice(1, -1);
            current = current.flatMap(item => {
              if (item && typeof item === 'object' && key in item) {
                const val = item[key];
                return Array.isArray(val) ? val : [val];
              }
              return [];
            });
          } else if (selector === '?(') {
            // Filter expression
            const expr = [];
            i++;
            while (tokens[i] !== ')' && i < tokens.length) {
              expr.push(tokens[i]);
              i++;
            }
            current = current.filter(item => evaluateFilter(item, expr));
          } else if (selector.includes(':')) {
            // Array slice
            const [start, end] = selector.split(':').map(s => s ? parseInt(s) : undefined);
            current = current.flatMap(item => {
              if (Array.isArray(item)) {
                return item.slice(start || 0, end).map(v => [v]);
              }
              return [];
            }).flat();
          } else {
            // Numeric index
            const idx = parseInt(selector);
            current = current.flatMap(item => {
              if (Array.isArray(item) && item[idx] !== undefined) {
                return [item[idx]];
              }
              return [];
            });
          }
        }
        i++;
      }
      return current;
    }

    function findDeep(obj, key) {
      const results = [];
      function search(o) {
        if (o && typeof o === 'object') {
          if (Array.isArray(o)) {
            o.forEach(search);
          } else {
            if (key === '*' || key in o) {
              results.push(o[key]);
            }
            Object.values(o).forEach(search);
          }
        }
      }
      (Array.isArray(obj) ? obj : [obj]).forEach(search);
      return results;
    }

    function evaluateFilter(item, expr) {
      const exprStr = expr.join(' ').replace(/@/g, 'item');
      try {
        return Function('"use strict"; return (' + exprStr + ')')(item);
      } catch {
        return false;
      }
    }

    function execute() {
      const jsonText = document.getElementById('jsonInput').value;
      const path = document.getElementById('path').value;
      const resultEl = document.getElementById('result');
      
      try {
        const obj = JSON.parse(jsonText);
        const result = jsonPath(obj, path);
        
        if (result.length === 0) {
          resultEl.innerHTML = '<span class="error">No matches found</span>';
        } else {
          resultEl.innerHTML = '<span class="success">Found ' + result.length + ' match(es)</span>\n' + 
            result.map(r => typeof r === 'object' ? JSON.stringify(r, null, 2) : r).join('\n---\n');
        }
      } catch (e) {
        resultEl.innerHTML = '<span class="error">Error: ' + e.message + '</span>';
      }
    }

    function formatJson() {
      const input = document.getElementById('jsonInput');
      try {
        const obj = JSON.parse(input.value);
        input.value = JSON.stringify(obj, null, 2);
      } catch (e) {
        alert('Invalid JSON: ' + e.message);
      }
    }

    function copyResult() {
      const text = document.getElementById('result').textContent;
      navigator.clipboard.writeText(text);
    }

    // Load sample
    document.getElementById('jsonInput').value = JSON.stringify({
      "store": {
        "book": [
          {"category": "reference", "author": "Nigel Rees", "title": "Sayings of the Century", "price": 8.95},
          {"category": "fiction", "author": "Evelyn Waugh", "title": "Sword of Honour", "price": 12.99},
          {"category": "fiction", "author": "Herman Melville", "title": "Moby Dick", "price": 8.99},
          {"category": "fiction", "author": "J.R.R. Tolkien", "title": "The Lord of the Rings", "price": 22.99}
        ],
        "bicycle": {"color": "red", "price": 19.95}
      }
    }, null, 2);
    
    execute();
  </script>
</body>
</html>
