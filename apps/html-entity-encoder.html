<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Entity Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode HTML entities. Paste text with special characters like &, <, >, quotes and get the encoded version for safe HTML display.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem; }
  h1 { margin-bottom: 0.5rem; }
  .meta { color: #666; margin-bottom: 2rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
  textarea { width: 100%; height: 120px; padding: 0.75rem; font-family: monospace; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; }
  .buttons { display: flex; gap: 0.5rem; margin: 1rem 0; }
  button { padding: 0.6rem 1.2rem; font-size: 14px; border: none; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
  .primary { background: #2563eb; color: white; }
  .primary:hover { background: #1d4ed8; }
  .secondary { background: #e5e7eb; color: #374151; }
  .secondary:hover { background: #d1d5db; }
  .copy-btn { background: #059669; color: white; }
  .copy-btn:hover { background: #047857; }
  .info { background: #f3f4f6; padding: 1rem; border-radius: 6px; margin-top: 1rem; font-size: 14px; color: #4b5563; }
  .result-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>HTML Entity Encoder/Decoder</h1>
  <p style="color:#666;margin-bottom:1.5rem;">Encode & decode special characters for safe HTML display</p>
  
  <label>Input Text</label>
  <textarea id="input" placeholder="Enter text with special characters like &, <, >, &quot;, '"></textarea>
  
  <div class="buttons">
    <button class="primary" onclick="encode()">Encode</button>
    <button class="secondary" onclick="decode()">Decode</button>
    <button class="secondary" onclick="clearAll()">Clear</button>
  </div>
  
  <label class="result-label">Output</label>
  <textarea id="output" placeholder="Result will appear here..." readonly></textarea>
  <div class="buttons">
    <button class="copy-btn" onclick="copyOutput()">Copy to Clipboard</button>
  </div>
  
  <div class="info">
    <strong>Common HTML Entities:</strong><br>
    &amp; (ampersand), &lt; (less than), &gt; (greater than), &quot; (double quote), &apos; (apostrophe), &nbsp; (non-breaking space)
  </div>
</div>

<script>
  const entities = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
    '/': '&#x2F;',
    '`': '&#x60;',
    '=': '&#x3D;'
  };
  
  const reverseEntities = {};
  Object.keys(entities).forEach(key => {
    reverseEntities[entities[key]] = key;
  });
  reverseEntities['&apos;'] = "'";
  
  function encode() {
    const input = document.getElementById('input').value;
    let encoded = '';
    for (const char of input) {
      encoded += entities[char] || char;
    }
    document.getElementById('output').value = encoded;
  }
  
  function decode() {
    const input = document.getElementById('input').value;
    let decoded = input;
    Object.keys(reverseEntities).sort((a, b) => b.length - a.length).forEach(entity => {
      decoded = decoded.split(entity).join(reverseEntities[entity]);
    });
    document.getElementById('output').value = decoded;
  }
  
  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('output').value = '';
  }
  
  function copyOutput() {
    const output = document.getElementById('output');
    output.select();
    document.execCommand('copy');
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy to Clipboard', 1500);
  }
</script>
</body>
</html>
