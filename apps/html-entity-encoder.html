<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Entity Encoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode HTML entities instantly. Safely handle special characters in HTML.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
  textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-family: monospace; font-size: 0.9rem; min-height: 120px; resize: vertical; box-sizing: border-box; }
  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
  button { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.85rem; transition: background 0.2s; }
  button:hover { background: var(--border); }
  button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  button.primary:hover { opacity: 0.9; }
  .mode-switch { display: flex; gap: 1rem; margin-bottom: 1rem; }
  .mode-switch label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-weight: normal; }
  .preview { margin-top: 1rem; padding: 1rem; background: var(--bg); border: 1px dashed var(--border); border-radius: 6px; }
  .preview-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
  .preview-content { word-break: break-all; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>HTML Entity Encoder</h1>
  <div class="subtitle">Encode special characters to HTML entities or decode them back</div>
  
  <div class="panel">
    <div class="mode-switch">
      <label><input type="radio" name="mode" value="encode" checked> Encode</label>
      <label><input type="radio" name="mode" value="decode"> Decode</label>
    </div>
    <label id="inputLabel">Plain Text</label>
    <textarea id="input" placeholder="Enter text to encode..."></textarea>
    <div class="btn-row">
      <button class="primary" id="convertBtn">Convert</button>
      <button id="clearBtn">Clear</button>
      <button id="sampleBtn">Sample</button>
    </div>
  </div>

  <div class="panel">
    <label id="outputLabel">Encoded Output</label>
    <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
    <div class="btn-row">
      <button id="copyBtn">Copy to Clipboard</button>
    </div>
  </div>

  <div class="panel">
    <div class="preview-label">Live Preview (how browsers render it)</div>
    <div class="preview" id="preview">
      <span class="preview-content" id="previewContent">—</span>
    </div>
  </div>
</div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const previewContent = document.getElementById('previewContent');
const modeRadios = document.querySelectorAll('input[name="mode"]');
const inputLabel = document.getElementById('inputLabel');
const outputLabel = document.getElementById('outputLabel');

function getMode() {
  return document.querySelector('input[name="mode"]:checked').value;
}

function updateLabels() {
  const mode = getMode();
  inputLabel.textContent = mode === 'encode' ? 'Plain Text' : 'Encoded Input';
  outputLabel.textContent = mode === 'encode' ? 'Encoded Output' : 'Decoded Text';
  input.placeholder = mode === 'encode' ? 'Enter text to encode...' : 'Enter encoded HTML to decode...';
}

modeRadios.forEach(radio => {
  radio.addEventListener('change', updateLabels);
});

const entities = {
  '&': '&amp;',
  '<': '&lt;',
  '>': '&gt;',
  '"': '&quot;',
  "'": '&#39;',
  '/': '&#x2F;',
  '`': '&#x60;',
  '=': '&#x3D;'
};

function encodeHTML(str) {
  return str.replace(/[&<>"'`/=]/g, c => entities[c] || c);
}

function decodeHTML(str) {
  return str.replace(/&amp;|&lt;|&gt;|&quot;|&#39;|&#x2F;|&#x60;|&#x3D;|#[0-9]+|#[xX][0-9a-fA-F]+/g, entity => {
    if (entity === '&amp;') return '&';
    if (entity === '&lt;') return '<';
    if (entity === '&gt;') return '>';
    if (entity === '&quot;') return '"';
    if (entity === '&#39;') return "'";
    if (entity === '&#x2F;') return '/';
    if (entity === '&#x60;') return '`';
    if (entity === '&#x3D;') return '=';
    if (entity.startsWith('&#x')) return String.fromCharCode(parseInt(entity.slice(3, -1), 16));
    if (entity.startsWith('&#')) return String.fromCharCode(parseInt(entity.slice(2, -1), 10));
    return entity;
  });
}

document.getElementById('convertBtn').addEventListener('click', () => {
  const text = input.value;
  const mode = getMode();
  
  if (!text) {
    output.value = '';
    previewContent.textContent = '—';
    return;
  }
  
  if (mode === 'encode') {
    output.value = encodeHTML(text);
    previewContent.textContent = output.value;
  } else {
    output.value = decodeHTML(text);
    previewContent.textContent = output.value;
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  input.value = '';
  output.value = '';
  previewContent.textContent = '—';
});

document.getElementById('sampleBtn').addEventListener('click', () => {
  const sample = '<script>alert("XSS!")</' + 'script>';
  input.value = sample;
  document.querySelector('input[name="mode"][value="encode"]').checked = true;
  updateLabels();
  document.getElementById('convertBtn').click();
});

document.getElementById('copyBtn').addEventListener('click', () => {
  if (output.value) {
    navigator.clipboard.writeText(output.value);
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy to Clipboard', 1500);
  }
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) {
    document.getElementById('convertBtn').click();
  }
});
</script>
</body>
</html>
