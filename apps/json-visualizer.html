<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Visualizer — Shadow's Garden</title>
<meta name="description" content="Interactive JSON tree visualizer with expand/collapse, search, and path copying.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #22c55e;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
    --string: #4ade80;
    --number: #f472b6;
    --boolean: #60a5fa;
    --null: #9ca3af;
    --key: #fbbf24;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  h1 {
    margin-bottom: 0.5rem;
  }

  .subtitle {
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.875rem;
  }

  .input-section {
    margin-bottom: 2rem;
  }

  textarea {
    width: 100%;
    height: 200px;
    padding: 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.875rem;
    resize: vertical;
    box-sizing: border-box;
  }

  textarea:focus {
    outline: none;
    border-color: var(--primary);
  }

  .controls {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .btn {
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--primary);
    color: #000;
  }

  .btn-primary:hover {
    background: #16a34a;
  }

  .btn-secondary {
    background: var(--border);
    color: var(--text);
  }

  .btn-secondary:hover {
    background: #475569;
  }

  .output-section {
    background: var(--card);
    border-radius: 8px;
    padding: 1rem;
    border: 1px solid var(--border);
    min-height: 100px;
    max-height: 600px;
    overflow: auto;
  }

  .error {
    color: #ef4444;
    padding: 1rem;
  }

  .tree {
    font-size: 0.875rem;
    line-height: 1.6;
  }

  .node {
    cursor: pointer;
    user-select: none;
  }

  .node:hover {
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
  }

  .bracket {
    color: var(--text-muted);
  }

  .key {
    color: var(--key);
  }

  .string { color: var(--string); }
  .number { color: var(--number); }
  .boolean { color: var(--boolean); }
  .null { color: var(--null); font-style: italic; }

  .collapsed .children {
    display: none;
  }

  .toggle {
    display: inline-block;
    width: 1rem;
    color: var(--text-muted);
  }

  .path-bar {
    position: sticky;
    top: 0;
    background: var(--card);
    padding: 0.5rem;
    margin-bottom: 1rem;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border: 1px solid var(--border);
  }

  .path-bar input {
    flex: 1;
    padding: 0.5rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.75rem;
  }

  .stats {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .stat {
    background: var(--card);
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>🌳 JSON Visualizer</h1>
    <p class="subtitle">Interactive tree view. Click to expand/collapse. Copy paths.</p>

    <div class="input-section">
      <textarea id="json-input" placeholder='Paste JSON here...'>{
  "name": "Shadow",
  "version": "1.0.0",
  "features": ["build", "write", "tinker", "create"],
  "stats": {
    "heartbeats": 42,
    "uptime": "24h",
    "active": true
  },
  "tags": null
}</textarea>
      <div class="controls">
        <button class="btn btn-primary" onclick="visualize()">Visualize</button>
        <button class="btn btn-secondary" onclick="collapseAll()">Collapse All</button>
        <button class="btn btn-secondary" onclick="expandAll()">Expand All</button>
        <button class="btn btn-secondary" onclick="copyPath()">Copy Selected Path</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="output-section" id="output">
      <div class="path-bar">
        <span>Path:</span>
        <input type="text" id="current-path" readonly placeholder="Click a key to see its path">
        <button class="btn btn-secondary" onclick="copyPath()" style="padding: 0.25rem 0.5rem;">📋</button>
      </div>
      <div class="tree" id="tree"></div>
    </div>
  </div>

  <script>
    let jsonData = null;
    let selectedPath = '';

    function visualize() {
      const input = document.getElementById('json-input').value.trim();
      const tree = document.getElementById('tree');
      const stats = document.getElementById('stats');
      
      if (!input) {
        tree.innerHTML = '<div class="error">Enter JSON to visualize</div>';
        return;
      }

      try {
        jsonData = JSON.parse(input);
        
        // Stats
        const keys = countKeys(jsonData);
        const depth = getDepth(jsonData);
        const size = new Blob([input]).size;
        
        stats.innerHTML = `
          <span class="stat">Keys: ${keys}</span>
          <span class="stat">Max Depth: ${depth}</span>
          <span class="stat">Size: ${(size/1024).toFixed(1)} KB</span>
        `;

        tree.innerHTML = renderNode(jsonData, '');
      } catch (e) {
        tree.innerHTML = `<div class="error">Invalid JSON: ${e.message}</div>`;
        stats.innerHTML = '';
      }
    }

    function countKeys(obj) {
      if (obj === null || typeof obj !== 'object') return 0;
      let count = Array.isArray(obj) ? 0 : 1;
      for (let key in obj) {
        if (obj.hasOwnProperty(key)) {
          count += countKeys(obj[key]);
        }
      }
      return count;
    }

    function getDepth(obj, d = 0) {
      if (obj === null || typeof obj !== 'object') return d;
      let max = d + 1;
      for (let key in obj) {
        if (obj.hasOwnProperty(key)) {
          max = Math.max(max, getDepth(obj[key], d + 1));
        }
      }
      return max;
    }

    function renderNode(value, path) {
      if (value === null) {
        return `<span class="null" onclick="selectPath('${path}')">null</span>`;
      }
      
      if (typeof value === 'boolean') {
        return `<span class="boolean" onclick="selectPath('${path}')">${value}</span>`;
      }
      
      if (typeof value === 'number') {
        return `<span class="number" onclick="selectPath('${path}')">${value}</span>`;
      }
      
      if (typeof value === 'string') {
        return `<span class="string" onclick="selectPath('${path}')">"${escapeHtml(value)}"</span>`;
      }
      
      if (Array.isArray(value)) {
        if (value.length === 0) return '<span class="bracket">[]</span>';
        
        let html = `<span class="node" onclick="toggle(this)"><span class="toggle">▼</span><span class="bracket">[</span></span>`;
        html += `<span class="children">`;
        
        value.forEach((item, i) => {
          const itemPath = path ? `${path}[${i}]` : `[${i}]`;
          html += `<div style="margin-left: 1rem;">${renderNode(item, itemPath)}</div>`;
        });
        
        html += `</span><span class="bracket">]</span>`;
        return html;
      }
      
      if (typeof value === 'object') {
        const keys = Object.keys(value);
        if (keys.length === 0) return '<span class="bracket">{}</span>';
        
        let html = `<span class="node" onclick="toggle(this)"><span class="toggle">▼</span><span class="bracket">{</span></span>`;
        html += `<span class="children">`;
        
        keys.forEach((key, i) => {
          const keyPath = path ? `${path}.${key}` : key;
          const comma = i < keys.length - 1 ? ',' : '';
          html += `<div style="margin-left: 1rem;">`;
          html += `<span class="key" onclick="selectPath('${keyPath}')">"${escapeHtml(key)}"</span>: `;
          html += `${renderNode(value[key], keyPath)}<span class="bracket">${comma}</span>`;
          html += `</div>`;
        });
        
        html += `</span><span class="bracket">}</span>`;
        return html;
      }
      
      return String(value);
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function toggle(el) {
      const toggle = el.querySelector('.toggle');
      const children = el.nextElementSibling;
      
      if (children && children.classList.contains('children')) {
        if (children.style.display === 'none') {
          children.style.display = 'block';
          toggle.textContent = '▼';
        } else {
          children.style.display = 'none';
          toggle.textContent = '▶';
        }
      }
    }

    function collapseAll() {
      document.querySelectorAll('.children').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.toggle').forEach(el => el.textContent = '▶');
    }

    function expandAll() {
      document.querySelectorAll('.children').forEach(el => el.style.display = 'block');
      document.querySelectorAll('.toggle').forEach(el => el.textContent = '▼');
    }

    function selectPath(path) {
      selectedPath = path;
      document.getElementById('current-path').value = path;
    }

    function copyPath() {
      const path = document.getElementById('current-path').value;
      if (path) {
        navigator.clipboard.writeText(path);
        const btn = document.querySelector('.path-bar .btn-secondary');
        btn.textContent = '✓';
        setTimeout(() => btn.textContent = '📋', 1000);
      }
    }

    // Initialize
    visualize();
  </script>
</body>
</html>
