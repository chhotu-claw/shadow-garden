<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Visualizer — Shadow's Garden</title>
<meta name="description" content="Interactive JSON tree visualizer with expand/collapse, path selection, and stats">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --accent: #f0db4f; }
  body { --accent: #f0db4f; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
  
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  
  textarea { width: 100%; min-height: 150px; padding: 0.75rem 1rem; background: #161b22; border: 2px solid #30363d; border-radius: 8px; color: #c9d1d9; font-family: 'Fira Code', monospace; font-size: 0.9rem; line-height: 1.5; resize: vertical; }
  textarea:focus { outline: none; border-color: var(--accent); }
  
  .stats-bar { display: flex; gap: 1.5rem; margin-bottom: 1rem; padding: 0.75rem 1rem; background: #161b22; border-radius: 8px; border: 1px solid #30363d; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-value { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
  
  .output { background: #161b22; border: 2px solid #30363d; border-radius: 8px; padding: 1rem; min-height: 200px; max-height: 600px; overflow: auto; font-family: 'Fira Code', monospace; font-size: 0.85rem; line-height: 1.6; }
  .output.empty { color: #8b949e; font-style: italic; }
  
  .tree { }
  .node { margin-left: 0; }
  .node-content { cursor: pointer; padding: 0.2rem 0; border-radius: 4px; display: inline-flex; align-items: center; gap: 0.3rem; }
  .node-content:hover { background: #21262d; }
  .toggle { 
    display: inline-block; width: 1rem; text-align: center; color: #8b949e; 
    font-size: 0.75rem; transition: transform 0.15s;
  }
  .toggle.collapsed { transform: rotate(-90deg); }
  .toggle.empty { visibility: hidden; }
  
  .key { color: #79c0ff; }
  .string { color: #a5d6ff; }
  .number { color: #79c0ff; }
  .boolean { color: #ff7b72; }
  .null { color: #8b949e; font-style: italic; }
  
  .children { margin-left: 1.2rem; border-left: 1px solid #30363d; padding-left: 0.5rem; }
  .children.collapsed { display: none; }
  
  .path-bar { margin-top: 1rem; padding: 0.75rem 1rem; background: #161b22; border-radius: 8px; border: 1px solid #30363d; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .path-bar label { margin: 0; font-size: 0.75rem; }
  .path-output { flex: 1; font-family: monospace; font-size: 0.85rem; color: #7ee787; word-break: break-all; min-height: 1.5rem; }
  .copy-btn { padding: 0.4rem 0.8rem; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 0.8rem; cursor: pointer; }
  .copy-btn:hover { background: #30363d; }
  
  .error { color: #f85149; font-size: 0.9rem; margin-top: 0.5rem; }
  
  .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .preset-btn { padding: 0.35rem 0.7rem; background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; font-size: 0.75rem; cursor: pointer; }
  .preset-btn:hover { background: #30363d; color: #c9d1d9; }
  
  .item-index { color: #8b949e; margin-right: 0.3rem; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>JSON Visualizer</h1>
    <p class="subtitle">Interactive JSON tree with expand/collapse and path copying</p>
    
    <div class="input-group">
      <label>JSON Input</label>
      <div class="presets">
        <button class="preset-btn" data-preset="simple">Simple</button>
        <button class="preset-btn" data-preset="nested">Nested</button>
        <button class="preset-btn" data-preset="api">API Response</button>
        <button class="preset-btn" data-preset="clear">Clear</button>
      </div>
      <textarea id="jsonInput" placeholder="Paste JSON here..." spellcheck="false">{
  "name": "JSON Visualizer",
  "version": "1.0.0",
  "features": ["tree view", "path copying", "stats"],
  "nested": {
    "deep": {
      "value": "hello"
    }
  }
}</textarea>
    </div>
    
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="keyCount">0</div>
        <div class="stat-label">Keys</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="depth">0</div>
        <div class="stat-label">Max Depth</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="size">0B</div>
        <div class="stat-label">Size</div>
      </div>
    </div>
    
    <div class="output" id="output">
      <div class="empty">Paste JSON to see tree...</div>
    </div>
    
    <div class="path-bar">
      <label>Selected Path:</label>
      <span class="path-output" id="pathOutput">—</span>
      <button class="copy-btn" id="copyPath">Copy</button>
    </div>
  </div>
  
  <script>
    const jsonInput = document.getElementById('jsonInput');
    const output = document.getElementById('output');
    const keyCount = document.getElementById('keyCount');
    const depth = document.getElementById('depth');
    const size = document.getElementById('size');
    const pathOutput = document.getElementById('pathOutput');
    const copyPath = document.getElementById('copyPath');
    
    let currentJson = null;
    let selectedPath = '';
    
    const presets = {
      simple: `{
  "name": "John",
  "age": 30,
  "active": true
}`,
      nested: `{
  "company": {
    "name": "Acme",
    "address": {
      "city": "NYC",
      "zip": "10001"
    }
  },
  "employees": ["Alice", "Bob", "Charlie"]
}`,
      api: `{
  "status": "success",
  "data": {
    "users": [
      {"id": 1, "name": "Alice", "email": null},
      {"id": 2, "name": "Bob", "verified": true}
    ],
    "meta": {
      "page": 1,
      "total": 2
    }
  },
  "timestamp": "2024-01-15T10:30:00Z"
}`,
      clear: ''
    };
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        jsonInput.value = presets[btn.dataset.preset];
        render();
      });
    });
    
    jsonInput.addEventListener('input', render);
    
    copyPath.addEventListener('click', () => {
      if (selectedPath) {
        navigator.clipboard.writeText(selectedPath);
        copyPath.textContent = 'Copied!';
        setTimeout(() => copyPath.textContent = 'Copy', 1500);
      }
    });
    
    function render() {
      const input = jsonInput.value.trim();
      
      if (!input) {
        output.innerHTML = '<div class="empty">Paste JSON to see tree...</div>';
        keyCount.textContent = '0';
        depth.textContent = '0';
        size.textContent = '0B';
        return;
      }
      
      try {
        currentJson = JSON.parse(input);
        const stats = getStats(currentJson);
        keyCount.textContent = stats.keys;
        depth.textContent = stats.depth;
        size.textContent = formatBytes(input.length);
        
        output.innerHTML = renderNode(currentJson, '', '');
        attachClickHandlers();
        
      } catch (e) {
        output.innerHTML = `<div class="error">${e.message}</div>`;
      }
    }
    
    function getStats(obj, depth = 1) {
      let keys = 0;
      let maxDepth = depth;
      
      if (obj && typeof obj === 'object') {
        keys = Object.keys(obj).length;
        
        for (const value of Object.values(obj)) {
          if (value && typeof value === 'object' && !Array.isArray(value)) {
            const child = getStats(value, depth + 1);
            keys += child.keys;
            maxDepth = Math.max(maxDepth, child.depth);
          } else if (Array.isArray(value)) {
            for (const item of value) {
              if (item && typeof item === 'object' && !Array.isArray(item)) {
                const child = getStats(item, depth + 1);
                keys += child.keys;
                maxDepth = Math.max(maxDepth, child.depth);
              }
            }
          }
        }
      }
      
      return { keys, depth: maxDepth };
    }
    
    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + 'B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
      return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
    }
    
    function renderNode(obj, path, key) {
      if (obj === null) {
        return `<span class="null" data-path="${path}">null</span>`;
      }
      
      if (typeof obj === 'boolean') {
        return `<span class="boolean" data-path="${path}">${obj}</span>`;
      }
      
      if (typeof obj === 'number') {
        return `<span class="number" data-path="${path}">${obj}</span>`;
      }
      
      if (typeof obj === 'string') {
        return `<span class="string" data-path="${path}">"${escapeHtml(obj)}"</span>`;
      }
      
      if (Array.isArray(obj)) {
        const isEmpty = obj.length === 0;
        const toggleClass = isEmpty ? 'empty' : '';
        const childrenHtml = isEmpty ? '' : `<div class="children">${obj.map((item, i) => {
          const itemPath = path ? `${path}[${i}]` : `[${i}]`;
          return `<div class="node"><span class="item-index">[${i}]</span>${renderNode(item, itemPath, i)}</div>`;
        }).join('')}</div>`;
        
        return `<span class="node-content" data-path="${path}"><span class="toggle ${toggleClass}">▼</span><span class="key">Array[${obj.length}]</span></span>${childrenHtml}`;
      }
      
      if (typeof obj === 'object') {
        const keys = Object.keys(obj);
        const isEmpty = keys.length === 0;
        const toggleClass = isEmpty ? 'empty' : '';
        const childrenHtml = isEmpty ? '' : `<div class="children">${keys.map(key => {
          const value = obj[key];
          const keyPath = path ? `${path}.${key}` : key;
          return `<div class="node"><span class="key">"${key}": </span>${renderNode(value, keyPath, key)}</div>`;
        }).join('')}</div>`;
        
        return `<span class="node-content" data-path="${path}"><span class="toggle ${toggleClass}">▼</span><span class="key">Object{${keys.length}}</span></span>${childrenHtml}`;
      }
      
      return String(obj);
    }
    
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    function attachClickHandlers() {
      document.querySelectorAll('.node-content').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const toggle = el.querySelector('.toggle');
          const children = el.nextElementSibling;
          
          if (children && children.classList.contains('children')) {
            children.classList.toggle('collapsed');
            toggle.classList.toggle('collapsed');
          }
          
          const path = el.dataset.path;
          selectPath(path);
        });
      });
      
      document.querySelectorAll('[data-path]').forEach(el => {
        if (!el.classList.contains('node-content')) {
          el.addEventListener('click', (e) => {
            e.stopPropagation();
            const path = el.dataset.path;
            if (path) selectPath(path);
          });
        }
      });
    }
    
    function selectPath(path) {
      selectedPath = path;
      pathOutput.textContent = path;
    }
    
    // Initialize
    render();
  </script>
</body>
</html>
