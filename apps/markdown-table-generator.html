<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Table Generator — Shadow's Garden</title>
<meta name="description" content="Generate markdown tables instantly. Define columns, add rows, get ready-to-use markdown.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .generator-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-top: 1.5rem;
  }
  @media (max-width: 800px) {
    .generator-container { grid-template-columns: 1fr; }
  }
  .input-panel, .output-panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  h3 { margin: 0 0 1rem 0; font-size: 1rem; color: var(--text-secondary); }
  .control-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .control-row input[type="number"] {
    width: 80px;
  }
  textarea {
    width: 100%;
    height: 300px;
    font-family: monospace;
    font-size: 0.9rem;
    resize: vertical;
  }
  .preview-box {
    background: var(--bg-tertiary);
    border-radius: 8px;
    padding: 1rem;
    font-family: monospace;
    font-size: 0.85rem;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
  }
  .btn-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .hero { text-align: center; padding: 2rem 0; }
  .hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .hero p { color: var(--text-secondary); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="hero">
    <h1>Markdown Table Generator</h1>
    <p>Build markdown tables without the pain</p>
  </div>

  <div class="generator-container">
    <div class="input-panel">
      <h3>Table Configuration</h3>
      <div class="control-row">
        <label>Columns:</label>
        <input type="number" id="col-count" value="3" min="1" max="10" onchange="updateDims()">
        <label>Rows:</label>
        <input type="number" id="row-count" value="3" min="1" max="20" onchange="updateDims()">
      </div>
      <div class="control-row">
        <label>Alignment:</label>
        <button onclick="setAlign('left')" class="active" id="btn-left">Left</button>
        <button onclick="setAlign('center')" id="btn-center">Center</button>
        <button onclick="setAlign('right')" id="btn-right">Right</button>
      </div>
      <h3>Column Headers (comma-separated)</h3>
      <input type="text" id="headers" value="Name,Email,Role" style="width:100%;margin-bottom:1rem;" oninput="generate()">
      <h3>Data (one row per line, comma-separated)</h3>
      <textarea id="data" oninput="generate()">John,john@example.com,Admin
Jane,jane@example.com,Editor
Bob,bob@example.com,User</textarea>
    </div>

    <div class="output-panel">
      <h3>Markdown Output</h3>
      <div class="preview-box" id="output"></div>
      <div class="btn-row">
        <button onclick="copy()">Copy Markdown</button>
        <button onclick="copyHtml()">Copy HTML</button>
      </div>
    </div>
  </div>
</div>

<script>
  let align = 'left';
  
  function setAlignment(a) {
    align = a;
    document.querySelectorAll('.control-row button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + a).classList.add('active');
    generate();
  }
  
  function updateDims() {
    // Headers and data will stay — just regenerate
    generate();
  }
  
  function generate() {
    const headers = document.getElementById('headers').value.split(',').map(h => h.trim()).filter(h => h);
    const dataLines = document.getElementById('data').value.split('\n').filter(l => l.trim());
    
    if (headers.length === 0) {
      document.getElementById('output').textContent = 'Add column headers to get started';
      return;
    }
    
    const alignChar = align === 'left' ? ':---' : align === 'center' ? ':---:' : '---:';
    const separator = '| ' + headers.map(() => alignChar).join(' | ') + ' |';
    
    const headerRow = '| ' + headers.join(' | ') + ' |';
    const dataRows = dataLines.map(line => {
      const cells = line.split(',').map(c => c.trim());
      // Pad cells to match header count
      while (cells.length < headers.length) cells.push('');
      return '| ' + cells.slice(0, headers.length).join(' | ') + ' |';
    });
    
    const md = [headerRow, separator, ...dataRows].join('\n');
    document.getElementById('output').textContent = md;
  }
  
  function copy() {
    const md = document.getElementById('output').textContent;
    navigator.clipboard.writeText(md).then(() => {
      alert('Copied!');
    });
  }
  
  function copyHtml() {
    const md = document.getElementById('output').textContent;
    const html = mdToHtml(md);
    navigator.clipboard.writeText(html).then(() => {
      alert('HTML copied!');
    });
  }
  
  function mdToHtml(md) {
    const lines = md.split('\n');
    if (lines.length < 2) return '';
    
    const headers = lines[0].split('|').map(c => c.trim()).filter(c => c);
    const dataLines = lines.slice(2);
    
    let html = '<table>\n  <thead>\n    <tr>\n';
    for (const h of headers) {
      html += `      <th>${escapeHtml(h)}</th>\n`;
    }
    html += '    </tr>\n  </thead>\n  <tbody>\n';
    
    for (const line of dataLines) {
      const cells = line.split('|').map(c => c.trim()).filter(c => c);
      if (cells.length === 0) continue;
      html += '    <tr>\n';
      for (const c of cells) {
        html += `      <td>${escapeHtml(c)}</td>\n`;
      }
      html += '    </tr>\n';
    }
    html += '  </tbody>\n</table>';
    return html;
  }
  
  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  
  generate();
</script>
</body>
</html>
