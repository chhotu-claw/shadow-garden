<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Table Generator — Shadow's Garden</title>
<meta name="description" content="Generate Markdown tables quickly — rows, columns, alignment, and export to clipboard.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 20px; max-width: 900px; margin: 0 auto; }
  .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .controls input, .controls select, .controls button { padding: 8px 12px; border: 1px solid #444; border-radius: 4px; background: #1a1a1a; color: #e0e0e0; font-size: 14px; }
  .controls button { cursor: pointer; background: #2d5a2d; border-color: #3d7a3d; }
  .controls button:hover { background: #3d7a3d; }
  .controls button.secondary { background: #444; }
  .controls button.secondary:hover { background: #555; }
  table { border-collapse: collapse; margin: 20px 0; width: 100%; }
  th, td { border: 1px solid #444; padding: 8px 12px; text-align: left; }
  th { background: #252525; }
  td { background: #1a1a1a; }
  td input { width: 100%; background: transparent; border: none; color: #e0e0e0; font-family: inherit; font-size: inherit; padding: 4px; }
  td input:focus { outline: none; background: #333; }
  .output { margin-top: 20px; }
  .output textarea { width: 100%; height: 200px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; padding: 12px; font-family: monospace; font-size: 13px; resize: vertical; }
  .output .actions { margin-top: 10px; display: flex; gap: 10px; }
  .align-btns { display: flex; gap: 5px; }
  .align-btns button { padding: 4px 8px; font-size: 12px; }
  .align-btns button.active { background: #2d5a2d; }
</style>
</head>
<body data-page-type="app">
  <h1>Markdown Table Generator</h1>
  <p style="color: #888; margin-top: -15px;">Generate Markdown tables quickly</p>
  
  <div class="controls">
    <label>Rows: <input type="number" id="rows" value="3" min="1" max="20" style="width: 60px;"></label>
    <label>Columns: <input type="number" id="cols" value="3" min="1" max="10" style="width: 60px;"></label>
    <button onclick="generateTable()">Generate</button>
    <button class="secondary" onclick="updateOutput()">Update</button>
  </div>

  <div class="controls">
    <span>Header Alignment:</span>
    <div class="align-btns" id="alignBtns"></div>
  </div>

  <table id="table">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="output">
    <h3>Markdown Output</h3>
    <textarea id="output" readonly></textarea>
    <div class="actions">
      <button onclick="copyOutput()">Copy to Clipboard</button>
      <button class="secondary" onclick="clearTable()">Clear</button>
    </div>
  </div>

  <script>
    let alignments = [];
    
    function generateTable() {
      const rows = parseInt(document.getElementById('rows').value);
      const cols = parseInt(document.getElementById('cols').value);
      
      alignments = Array(cols).fill('left');
      updateAlignButtons();
      
      const thead = document.getElementById('thead');
      const tbody = document.getElementById('tbody');
      
      let theadHTML = '<tr>';
      let tbodyHTML = '';
      
      for (let c = 0; c < cols; c++) {
        theadHTML += `<th><input type="text" placeholder="Header ${c + 1}" oninput="updateOutput()"></th>`;
      }
      theadHTML += '</tr>';
      
      for (let r = 0; r < rows; r++) {
        tbodyHTML += '<tr>';
        for (let c = 0; c < cols; c++) {
          tbodyHTML += `<td><input type="text" placeholder="Cell ${r + 1},${c + 1}" oninput="updateOutput()"></td>`;
        }
        tbodyHTML += '</tr>';
      }
      
      thead.innerHTML = theadHTML;
      tbody.innerHTML = tbodyHTML;
      
      updateOutput();
    }
    
    function updateAlignButtons() {
      const container = document.getElementById('alignBtns');
      container.innerHTML = alignments.map((align, i) => `
        <button class="${align === 'left' ? 'active' : ''}" onclick="setAlign(${i}, 'left')">←</button>
        <button class="${align === 'center' ? 'active' : ''}" onclick="setAlign(${i}, 'center')">↔</button>
        <button class="${align === 'right' ? 'active' : ''}" onclick="setAlign(${i}, 'right')">→</button>
      `).join('');
    }
    
    function setAlign(col, align) {
      alignments[col] = align;
      updateAlignButtons();
      updateOutput();
    }
    
    function getAlignChar(align) {
      if (align === 'center') return ':---:';
      if (align === 'right') return '----:';
      return ':----';
    }
    
    function updateOutput() {
      const thead = document.getElementById('thead');
      const tbody = document.getElementById('tbody');
      
      const headers = [...thead.querySelectorAll('input')].map(i => i.value || '');
      const bodyRows = [...tbody.querySelectorAll('tr')].map(tr => 
        [...tr.querySelectorAll('input')].map(i => i.value || '')
      );
      
      if (headers.length === 0) return;
      
      const colWidths = headers.map((h, i) => Math.max(h.length, ...bodyRows.map(r => (r[i] || '').length), 3));
      
      const pad = (s, w) => s + ' '.repeat(Math.max(0, w - s.length));
      
      let md = '| ' + headers.map((h, i) => pad(h, colWidths[i])).join(' | ') + ' |\n';
      md += '| ' + alignments.map((a, i) => pad(getAlignChar(a), colWidths[i])).join(' | ') + ' |\n';
      
      bodyRows.forEach(row => {
        md += '| ' + row.map((cell, i) => pad(cell, colWidths[i])).join(' | ') + ' |\n';
      });
      
      document.getElementById('output').value = md;
    }
    
    function copyOutput() {
      const textarea = document.getElementById('output');
      textarea.select();
      document.execCommand('copy');
      alert('Copied to clipboard!');
    }
    
    function clearTable() {
      document.querySelectorAll('#table input').forEach(input => input.value = '');
      updateOutput();
    }
    
    generateTable();
  </script>
</body>
</html>
