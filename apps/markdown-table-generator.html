<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Table Generator — Shadow's Garden</title>
<meta name="description" content="Build Markdown tables instantly with a visual grid editor and live preview.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; padding: 2rem; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
  .editor { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .panel { background: var(--card-bg); border-radius: 8px; padding: 1rem; }
  .panel h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--text-muted); }
  .table-controls { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .btn { padding: 0.5rem 1rem; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
  .btn:hover { opacity: 0.9; }
  .btn.secondary { background: var(--border); }
  .grid-editor { display: grid; gap: 2px; background: var(--border); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .cell { background: var(--input-bg); padding: 0.5rem; border: none; font-family: monospace; font-size: 0.85rem; color: var(--text); min-width: 80px; }
  .cell:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
  .cell.header { background: var(--highlight); font-weight: bold; }
  .preview { font-family: monospace; white-space: pre-wrap; background: var(--input-bg); padding: 1rem; border-radius: 4px; min-height: 200px; overflow: auto; font-size: 0.85rem; color: var(--text); }
  .add-row-col { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .row-input, .col-input { padding: 0.5rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); width: 80px; }
  .empty-state { color: var(--text-muted); text-align: center; padding: 2rem; }
  @media (max-width: 700px) { .editor { grid-template-columns: 1fr; } }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>📊 Markdown Table Generator</h1>
    <div class="subtitle">Build Markdown tables instantly with a visual grid editor and live preview</div>
    
    <div class="editor">
      <div class="panel">
        <h2>Grid Editor</h2>
        <div class="table-controls">
          <button class="btn" id="add-row">+ Row</button>
          <button class="btn" id="add-col">+ Column</button>
          <button class="btn secondary" id="clear">Clear</button>
        </div>
        <div class="grid-editor" id="grid"></div>
        <div class="add-row-col">
          <input type="number" class="row-input" id="rows-input" value="3" min="1" max="20">
          <span style="color: var(--text-muted); align-self: center;">rows</span>
          <input type="number" class="col-input" id="cols-input" value="3" min="1" max="10">
          <span style="color: var(--text-muted); align-self: center;">cols</span>
          <button class="btn" id="resize-btn">Resize</button>
        </div>
      </div>
      <div class="panel">
        <h2>Markdown Output</h2>
        <div class="preview" id="output"></div>
        <button class="btn" id="copy-btn" style="margin-top: 1rem;">Copy Markdown</button>
      </div>
    </div>
  </div>
  
  <script>
    let rows = 3;
    let cols = 3;
    let grid = [];
    
    function initGrid() {
      grid = [];
      for (let r = 0; r < rows; r++) {
        const row = [];
        for (let c = 0; c < cols; c++) {
          row.push(r === 0 ? `Header ${c + 1}` : `Cell ${r}-${c}`);
        }
        grid.push(row);
      }
      renderGrid();
      updateOutput();
    }
    
    function renderGrid() {
      const gridEl = document.getElementById('grid');
      gridEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      gridEl.innerHTML = '';
      
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const input = document.createElement('input');
          input.className = 'cell' + (r === 0 ? ' header' : '');
          input.value = grid[r][c];
          input.addEventListener('input', (e) => {
            grid[r][c] = e.target.value;
            updateOutput();
          });
          gridEl.appendChild(input);
        }
      }
    }
    
    function updateOutput() {
      if (grid.length === 0) {
        document.getElementById('output').textContent = 'Add rows and columns to start';
        return;
      }
      
      const colWidths = [];
      for (let c = 0; c < cols; c++) {
        let maxLen = 3;
        for (let r = 0; r < rows; r++) {
          maxLen = Math.max(maxLen, grid[r][c].length);
        }
        colWidths.push(maxLen);
      }
      
      let md = '';
      
      // Header row
      md += '| ' + grid[0].map((v, i) => v.padEnd(colWidths[i])).join(' | ') + ' |\n';
      
      // Separator row
      md += '| ' + colWidths.map(w => '-'.repeat(w)).join(' | ') + ' |\n';
      
      // Data rows
      for (let r = 1; r < rows; r++) {
        md += '| ' + grid[r].map((v, i) => v.padEnd(colWidths[i])).join(' | ') + ' |\n';
      }
      
      document.getElementById('output').textContent = md;
    }
    
    document.getElementById('add-row').addEventListener('click', () => {
      const newRow = [];
      for (let c = 0; c < cols; c++) {
        newRow.push(`Row ${rows}`);
      }
      grid.push(newRow);
      rows++;
      renderGrid();
      updateOutput();
    });
    
    document.getElementById('add-col').addEventListener('click', () => {
      for (let r = 0; r < rows; r++) {
        grid[r].push(r === 0 ? `Header ${cols}` : `Cell ${r}-${cols}`);
      }
      cols++;
      renderGrid();
      updateOutput();
    });
    
    document.getElementById('clear').addEventListener('click', initGrid);
    
    document.getElementById('resize-btn').addEventListener('click', () => {
      const newRows = parseInt(document.getElementById('rows-input').value);
      const newCols = parseInt(document.getElementById('cols-input').value);
      
      if (newRows < 1 || newCols < 1) return;
      
      const newGrid = [];
      for (let r = 0; r < newRows; r++) {
        const row = [];
        for (let c = 0; c < newCols; c++) {
          if (r < rows && c < cols) {
            row.push(grid[r][c]);
          } else {
            row.push(r === 0 ? `Header ${c + 1}` : `Cell ${r}-${c}`);
          }
        }
        newGrid.push(row);
      }
      
      rows = newRows;
      cols = newCols;
      grid = newGrid;
      renderGrid();
      updateOutput();
    });
    
    document.getElementById('copy-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('output').textContent);
      document.getElementById('copy-btn').textContent = 'Copied!';
      setTimeout(() => document.getElementById('copy-btn').textContent = 'Copy Markdown', 1500);
    });
    
    initGrid();
  </script>
</body>
</html>
