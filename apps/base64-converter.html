<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Converter — Shadow's Garden</title>
<meta name="description" content="Encode and decode Base64 instantly. All local, nothing stored.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { width: 100%; max-width: 600px; }
  h1 { margin-bottom: 0.5rem; }
  .converter { width: 100%; display: flex; flex-direction: column; gap: 1rem; }
  .converter-box { background: var(--card); border-radius: 12px; padding: 1.5rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary); }
  textarea, input { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 0.95rem; box-sizing: border-box; resize: vertical; min-height: 100px; }
  textarea:focus, input:focus { outline: none; border-color: var(--accent); }
  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  button { padding: 0.75rem 1.5rem; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; }
  button:hover { opacity: 0.9; }
  button.secondary { background: var(--border); color: var(--text); }
  .stats { margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); }
  .mode-toggle { display: flex; gap: 1rem; margin-bottom: 1rem; }
  .mode-toggle label { display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer; margin: 0; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Base64 Converter</h1>
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Encode and decode Base64 — all local, nothing leaves your browser</p>
    
    <div class="converter">
      <div class="mode-toggle">
        <label><input type="radio" name="mode" value="encode" checked> Encode</label>
        <label><input type="radio" name="mode" value="decode"> Decode</label>
      </div>
      
      <div class="converter-box">
        <label id="inputLabel">Text to convert</label>
        <textarea id="input" placeholder="Enter text to encode/decode..."></textarea>
        <div class="btn-row">
          <button onclick="convert()">Convert</button>
          <button class="secondary" onclick="swap()">Swap</button>
          <button class="secondary" onclick="clearAll()">Clear</button>
        </div>
      </div>
      
      <div class="converter-box">
        <label id="outputLabel">Result</label>
        <textarea id="output" placeholder="Result appears here..." readonly></textarea>
        <div class="btn-row">
          <button class="secondary" onclick="copy()">Copy</button>
        </div>
        <div class="stats" id="stats"></div>
      </div>
    </div>
  </div>
  
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const mode = document.getElementById('inputLabel');
    const outLabel = document.getElementById('outputLabel');
    
    function convert() {
      const text = input.value;
      if (!text) return;
      
      const isEncode = document.querySelector('input[name="mode"]:checked').value === 'encode';
      
      try {
        if (isEncode) {
          output.value = btoa(unescape(encodeURIComponent(text)));
        } else {
          output.value = decodeURIComponent(escape(atob(text)));
        }
        updateStats();
      } catch (e) {
        output.value = 'Error: Invalid input for decode mode';
      }
    }
    
    function swap() {
      const temp = input.value;
      input.value = output.value;
      output.value = temp;
      updateStats();
    }
    
    function clearAll() {
      input.value = '';
      output.value = '';
      document.getElementById('stats').textContent = '';
    }
    
    function copy() {
      navigator.clipboard.writeText(output.value);
    }
    
    function updateStats() {
      const chars = output.value.length;
      const bytes = new Blob([output.value]).size;
      document.getElementById('stats').textContent = `${chars} chars | ${bytes} bytes`;
    }
    
    document.querySelectorAll('input[name="mode"]').forEach(r => {
      r.addEventListener('change', () => {
        const isEncode = r.checked && r.value === 'encode';
        document.getElementById('inputLabel').textContent = isEncode ? 'Text to convert' : 'Base64 to decode';
        document.getElementById('outputLabel').textContent = isEncode ? 'Encoded result' : 'Decoded result';
      });
    });
  </script>
</body>
</html>
