<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode Base64 instantly. Paste text or Base64, get output. All local, nothing leaves your browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
  h1 { margin-bottom: 0.5rem; }
  .meta { color: #666; margin-bottom: 2rem; }
  .converter { display: flex; flex-direction: column; gap: 1rem; }
  .mode-toggle { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .mode-toggle button { 
    padding: 0.5rem 1rem; border: 1px solid #333; background: #1a1a1a; color: #888; 
    border-radius: 4px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
  }
  .mode-toggle button.active { background: #2d2d2d; color: #fff; border-color: #555; }
  .mode-toggle button:hover:not(.active) { border-color: #555; }
  textarea { 
    width: 100%; height: 150px; padding: 1rem; background: #141414; border: 1px solid #222; 
    color: #e5e5e5; font-family: 'SF Mono', Monaco, monospace; font-size: 0.9rem; 
    border-radius: 6px; resize: vertical;
  }
  textarea:focus { outline: none; border-color: #444; }
  .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  button.action { 
    padding: 0.6rem 1rem; background: #2d2d2d; border: 1px solid #333; color: #e5e5e5;
    border-radius: 4px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
  }
  button.action:hover { background: #3d3d3d; border-color: #444; }
  button.action.primary { background: #1a3d1a; border-color: #2d5a2d; color: #7af77a; }
  button.action.primary:hover { background: #2d5a2d; }
  .output-section { margin-top: 1rem; }
  .output-label { font-size: 0.85rem; color: #666; margin-bottom: 0.5rem; display: block; }
  .error { color: #f77a7a; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
  .error.show { display: block; }
  .stats { font-size: 0.8rem; color: #555; margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Base64 Encoder/Decoder</h1>
  <div class="meta">Encode and decode instantly. All local.</div>
  
  <div class="converter">
    <div class="mode-toggle">
      <button id="encodeBtn" class="active" onclick="setMode('encode')">Encode</button>
      <button id="decodeBtn" onclick="setMode('decode')">Decode</button>
    </div>
    
    <div class="input-section">
      <label class="output-label" id="inputLabel">Enter text to encode:</label>
      <textarea id="input" placeholder="Paste text here..."></textarea>
    </div>
    
    <div class="actions">
      <button class="action primary" onclick="convert()">Convert</button>
      <button class="action" onclick="swap()">Swap</button>
      <button class="action" onclick="copyOutput()">Copy Output</button>
      <button class="action" onclick="clearAll()">Clear</button>
    </div>
    
    <div class="output-section">
      <label class="output-label" id="outputLabel">Base64 output:</label>
      <textarea id="output" placeholder="Result appears here..." readonly></textarea>
      <div class="error" id="error"></div>
      <div class="stats" id="stats"></div>
    </div>
  </div>
</div>

<script>
  let mode = 'encode';
  
  function setMode(newMode) {
    mode = newMode;
    document.getElementById('encodeBtn').classList.toggle('active', mode === 'encode');
    document.getElementById('decodeBtn').classList.toggle('active', mode === 'decode');
    document.getElementById('inputLabel').textContent = mode === 'encode' ? 'Enter text to encode:' : 'Enter Base64 to decode:';
    document.getElementById('outputLabel').textContent = mode === 'encode' ? 'Base64 output:' : 'Decoded text:';
    document.getElementById('error').classList.remove('show');
  }
  
  function convert() {
    const input = document.getElementById('input').value;
    const output = document.getElementById('output');
    const error = document.getElementById('error');
    const stats = document.getElementById('stats');
    
    error.classList.remove('show');
    output.value = '';
    stats.textContent = '';
    
    if (!input) {
      output.value = '';
      return;
    }
    
    try {
      if (mode === 'encode') {
        output.value = btoa(unescape(encodeURIComponent(input)));
        stats.textContent = `Input: ${input.length} chars → Output: ${output.value.length} chars`;
      } else {
        output.value = decodeURIComponent(escape(atob(input)));
        stats.textContent = `Input: ${input.length} chars → Output: ${output.value.length} chars`;
      }
    } catch (e) {
      error.textContent = 'Invalid Base64 string';
      error.classList.add('show');
      output.value = '';
    }
  }
  
  function swap() {
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const temp = input.value;
    input.value = output.value;
    output.value = temp;
    setMode(mode === 'encode' ? 'decode' : 'encode');
  }
  
  function copyOutput() {
    const output = document.getElementById('output');
    if (output.value) {
      navigator.clipboard.writeText(output.value);
    }
  }
  
  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('output').value = '';
    document.getElementById('error').classList.remove('show');
    document.getElementById('stats').textContent = '';
  }
  
  document.getElementById('input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.ctrlKey) {
      convert();
    }
  });
</script>
</body>
</html>
