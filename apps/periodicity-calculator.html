<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodicity Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate recurring intervals — find next occurrences for every day/week/month/quarter/year. Supports business days and custom intervals.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }
  
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; color: #aaa; }
  input, select { 
    width: 100%; 
    padding: 0.75rem; 
    font-size: 1rem; 
    background: #1a1a1a; 
    border: 1px solid #333; 
    border-radius: 6px; 
    color: #e5e5e5;
  }
  input:focus, select:focus { outline: none; border-color: #6cb6ff; }
  
  .row { display: flex; gap: 1rem; }
  .row > div { flex: 1; }
  
  button {
    background: #6cb6ff; color: #0d0d0d; border: none; padding: 0.75rem 1.5rem;
    font-size: 1rem; font-weight: 600; border-radius: 6px; cursor: pointer;
    width: 100%; transition: background 0.2s;
  }
  button:hover { background: #8ec8ff; }
  
  .results { margin-top: 2rem; }
  .results h3 { font-size: 1rem; color: #888; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .occurrence {
    padding: 0.75rem; background: #141414; border: 1px solid #222; border-radius: 6px;
    margin-bottom: 0.5rem; font-size: 0.95rem;
  }
  .occurrence:first-child { border-color: #6cb6ff; }
  .occurrence .date { color: #e5e5e5; }
  .occurrence .days { color: #666; font-size: 0.85rem; margin-top: 0.25rem; }
  
  .presets { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
  .preset-btn {
    background: #222; color: #aaa; border: 1px solid #333; padding: 0.5rem 0.75rem;
    font-size: 0.8rem; border-radius: 4px; cursor: pointer; transition: all 0.2s;
  }
  .preset-btn:hover { background: #333; color: #e5e5e5; }
  
  .business-days { margin-top: 1rem; }
  .checkbox-label {
    display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.9rem; color: #aaa;
  }
  .checkbox-label input { width: auto; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Periodicity Calculator</h1>
  <p class="subtitle">Calculate recurring intervals — find the next N occurrences</p>
  
  <div class="input-group">
    <label>Start Date</label>
    <input type="datetime-local" id="startDate">
  </div>
  
  <div class="input-group">
    <label>Interval</label>
    <div class="row">
      <div>
        <input type="number" id="intervalValue" value="1" min="1" max="365">
      </div>
      <div>
        <select id="intervalUnit">
          <option value="day">Day(s)</option>
          <option value="week">Week(s)</option>
          <option value="month">Month(s)</option>
          <option value="quarter">Quarter(s)</option>
          <option value="year">Year(s)</option>
        </select>
      </div>
    </div>
  </div>
  
  <div class="input-group">
    <label>Quick Presets</label>
    <div class="presets">
      <button class="preset-btn" onclick="setPreset(1, 'week')">Every week</button>
      <button class="preset-btn" onclick="setPreset(2, 'week')">Every 2 weeks</button>
      <button class="preset-btn" onclick="setPreset(1, 'month')">Every month</button>
      <button class="preset-btn" onclick="setPreset(3, 'month')">Every quarter</button>
      <button class="preset-btn" onclick="setPreset(6, 'month')">Every half-year</button>
      <button class="preset-btn" onclick="setPreset(1, 'year')">Every year</button>
    </div>
  </div>
  
  <div class="input-group">
    <label>Show Next</label>
    <input type="number" id="count" value="10" min="1" max="100">
  </div>
  
  <div class="input-group business-days">
    <label class="checkbox-label">
      <input type="checkbox" id="businessDays">
      <span>Skip weekends (Mon-Fri)</span>
    </label>
  </div>
  
  <button onclick="calculate()">Calculate Next Occurrences</button>
  
  <div class="results" id="results"></div>
</div>

<script>
  // Set default start date to now
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('startDate').value = now.toISOString().slice(0, 16);

  function setPreset(value, unit) {
    document.getElementById('intervalValue').value = value;
    document.getElementById('intervalUnit').value = unit;
    calculate();
  }

  function addBusinessDays(date, days) {
    const result = new Date(date);
    let added = 0;
    while (added < days) {
      result.setDate(result.getDate() + 1);
      const day = result.getDay();
      if (day !== 0 && day !== 6) added++;
    }
    return result;
  }

  function getNextOccurrence(date, intervalValue, unit, isBusinessDays) {
    const result = new Date(date);
    
    switch(unit) {
      case 'day':
        if (isBusinessDays) {
          return addBusinessDays(result, intervalValue);
        }
        result.setDate(result.getDate() + intervalValue);
        break;
      case 'week':
        result.setDate(result.getDate() + (intervalValue * 7));
        break;
      case 'month':
        result.setMonth(result.getMonth() + intervalValue);
        break;
      case 'quarter':
        result.setMonth(result.getMonth() + (intervalValue * 3));
        break;
      case 'year':
        result.setFullYear(result.getFullYear() + intervalValue);
        break;
    }
    
    if (isBusinessDays) {
      while (result.getDay() === 0 || result.getDay() === 6) {
        result.setDate(result.getDate() + 1);
      }
    }
    
    return result;
  }

  function formatDate(date) {
    return date.toLocaleDateString('en-US', { 
      weekday: 'short',
      year: 'numeric', 
      month: 'short', 
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function getDaysUntil(date) {
    const now = new Date();
    const diff = date - now;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    
    if (days === 0) return `in ${hours} hour${hours !== 1 ? 's' : ''}`;
    if (days === 1) return `tomorrow`;
    if (days < 7) return `in ${days} day${days !== 1 ? 's' : ''}`;
    if (days < 30) return `in ${Math.floor(days/7)} week${Math.floor(days/7) !== 1 ? 's' : ''}`;
    if (days < 365) return `in ${Math.floor(days/30)} month${Math.floor(days/30) !== 1 ? 's' : ''}`;
    return `in ${Math.floor(days/365)} year${Math.floor(days/365) !== 1 ? 's' : ''}`;
  }

  function calculate() {
    const startDate = new Date(document.getElementById('startDate').value);
    const intervalValue = parseInt(document.getElementById('intervalValue').value) || 1;
    const intervalUnit = document.getElementById('intervalUnit').value;
    const count = parseInt(document.getElementById('count').value) || 10;
    const businessDays = document.getElementById('businessDays').checked;
    
    const results = document.getElementById('results');
    let html = '<h3>Next Occurrences</h3>';
    
    let currentDate = new Date(startDate);
    
    for (let i = 0; i < count; i++) {
      currentDate = getNextOccurrence(currentDate, intervalValue, intervalUnit, businessDays);
      html += `<div class="occurrence">
        <div class="date">${formatDate(currentDate)}</div>
        <div class="days">${getDaysUntil(currentDate)}</div>
      </div>`;
    }
    
    results.innerHTML = html;
  }

  // Calculate on load
  calculate();
</script>
</body>
</html>
