<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder/Decoder — Shadow's Garden</title>
<meta name="description">Encode special characters in URLs, decode %20-style strings. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .url-tool { max-width: 600px; margin: 0 auto; }
  .mode-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .mode-toggle button {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
  }
  .mode-toggle button:hover { border-color: var(--accent); }
  .mode-toggle button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  textarea {
    width: 100%;
    min-height: 120px;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: var(--mono);
    resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  label {
    display: block;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .output-area { margin-top: 20px; }
  .buttons {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  button {
    flex: 1;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover { opacity: 0.9; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="url-tool">
    <h1>URL Encoder/Decoder</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Encode special characters in URLs or decode %20-style strings.</p>
    
    <div class="mode-toggle">
      <button class="active" onclick="setMode('encode', this)" id="btnEncode">Encode</button>
      <button onclick="setMode('decode', this)" id="btnDecode">Decode</button>
    </div>
    
    <div class="input-area">
      <label id="inputLabel">URL to encode</label>
      <textarea id="input" placeholder="Enter URL or text to encode..."></textarea>
    </div>
    
    <div class="buttons">
      <button class="primary" onclick="convert()">Convert</button>
      <button onclick="copyOutput()">Copy</button>
      <button onclick="clearAll()">Clear</button>
    </div>
    
    <div class="output-area">
      <label id="outputLabel">Encoded URL</label>
      <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
    </div>
  </div>
</div>
<script>
  let mode = 'encode';
  
  function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('inputLabel').textContent = mode === 'encode' ? 'URL to encode' : 'URL to decode';
    document.getElementById('outputLabel').textContent = mode === 'encode' ? 'Encoded URL' : 'Decoded URL';
    document.getElementById('input').placeholder = mode === 'encode' ? 'Enter URL to encode...' : 'Enter URL to decode (e.g., hello%20world)...';
    document.getElementById('output').value = '';
  }
  
  function convert() {
    const input = document.getElementById('input').value;
    const output = document.getElementById('output');
    
    if (!input) return;
    
    if (mode === 'encode') {
      output.value = encodeURIComponent(input);
    } else {
      try {
        output.value = decodeURIComponent(input);
      } catch (e) {
        output.value = 'Error: Invalid encoded string';
      }
    }
  }
  
  function copyOutput() {
    const output = document.getElementById('output');
    if (!output.value) return;
    
    navigator.clipboard.writeText(output.value).then(() => {
      const btn = event.target;
      const original = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = original, 1500);
    });
  }
  
  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('output').value = '';
  }
</script>
</body>
</html>
