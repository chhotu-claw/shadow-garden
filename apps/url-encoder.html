<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode URLs instantly. Safe encode, component encode, and more.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --accent: #00bcd4; }
  body { --accent: #00bcd4; }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
  
  .mode-toggle { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
  .mode-btn { flex: 1; padding: 0.75rem 1.5rem; background: #21262d; border: 2px solid #30363d; border-radius: 8px; color: #8b949e; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .mode-btn:hover { background: #30363d; }
  .mode-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  
  textarea, input[type="text"] { width: 100%; padding: 0.75rem 1rem; background: #161b22; border: 2px solid #30363d; border-radius: 8px; color: #c9d1d9; font-family: 'Fira Code', monospace; font-size: 0.95rem; resize: vertical; box-sizing: border-box; }
  textarea:focus, input[type="text"]:focus { outline: none; border-color: var(--accent); }
  textarea { min-height: 120px; }
  
  .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .preset-btn { padding: 0.35rem 0.7rem; background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
  .preset-btn:hover { background: #30363d; color: #c9d1d9; }
  
  .result { background: #161b22; border: 2px solid #30363d; border-radius: 8px; padding: 1rem; min-height: 80px; font-family: 'Fira Code', monospace; word-break: break-all; white-space: pre-wrap; }
  .result.empty { color: #8b949e; font-style: italic; }
  .result.error { color: #f85149; }
  
  .actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
  .action-btn { padding: 0.6rem 1.2rem; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 0.5rem; }
  .action-btn:hover { background: #30363d; }
  .action-btn.primary { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  .action-btn.primary:hover { opacity: 0.9; }
  
  .stats { display: flex; gap: 2rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #30363d; }
  .stat { text-align: center; }
  .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .copy-feedback { color: #3fb950; font-size: 0.85rem; margin-left: 0.5rem; opacity: 0; transition: opacity 0.2s; }
  .copy-feedback.show { opacity: 1; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>URL Encoder/Decoder</h1>
    <p class="subtitle">Encode and decode URLs instantly</p>
    
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="encode">Encode</button>
      <button class="mode-btn" data-mode="decode">Decode</button>
    </div>
    
    <div class="input-group">
      <label>Input</label>
      <div class="presets">
        <button class="preset-btn" data-preset="url">URL</button>
        <button class="preset-btn" data-preset="query">Query String</button>
        <button class="preset-btn" data-preset="path">URL Path</button>
      </div>
      <textarea id="input" placeholder="Enter text to encode/decode...">Hello World! Test & example?q=1&a=2</textarea>
    </div>
    
    <div class="actions">
      <button class="action-btn primary" id="convertBtn">
        <span id="btnText">Encode</span>
      </button>
      <button class="action-btn" id="swapBtn">Swap ↕</button>
      <button class="action-btn" id="clearBtn">Clear</button>
    </div>
    
    <div class="input-group" style="margin-top: 1.5rem;">
      <label>Output <span class="copy-feedback" id="copyFeedback">Copied!</span></label>
      <div class="result" id="output">Click Encode to see result...</div>
    </div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="charCount">0</div>
        <div class="stat-label">Input Chars</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="outputLen">0</div>
        <div class="stat-label">Output Length</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="diff">0</div>
        <div class="stat-label">Change</div>
      </div>
    </div>
  </div>
  
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const presetBtns = document.querySelectorAll('.preset-btn');
    const convertBtn = document.getElementById('convertBtn');
    const btnText = document.getElementById('btnText');
    const swapBtn = document.getElementById('swapBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyFeedback = document.getElementById('copyFeedback');
    const charCount = document.getElementById('charCount');
    const outputLen = document.getElementById('outputLen');
    const diff = document.getElementById('diff');
    
    let mode = 'encode';
    
    const presets = {
      url: 'Hello World! Test & example?q=1&a=2',
      query: 'name=John Doe&email=john@example.com&message=Hello & goodbye!',
      path: '/users/john-doe/profile/settings?theme=dark&lang=en'
    };
    
    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        btnText.textContent = mode === 'encode' ? 'Encode' : 'Decode';
        runConversion();
      });
    });
    
    presetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        input.value = presets[btn.dataset.preset] || '';
        runConversion();
      });
    });
    
    convertBtn.addEventListener('click', runConversion);
    
    swapBtn.addEventListener('click', () => {
      const currentOutput = output.textContent;
      if (currentOutput && currentOutput !== 'Click Encode to see result...' && currentOutput !== 'Click Decode to see result...' && !output.classList.contains('error')) {
        input.value = currentOutput;
        mode = mode === 'encode' ? 'decode' : 'encode';
        modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        btnText.textContent = mode === 'encode' ? 'Encode' : 'Decode';
        runConversion();
      }
    });
    
    clearBtn.addEventListener('click', () => {
      input.value = '';
      output.textContent = 'Click Encode to see result...';
      output.classList.add('empty');
      output.classList.remove('error');
      updateStats('', '');
    });
    
    input.addEventListener('input', runConversion);
    
    function runConversion() {
      const text = input.value;
      
      if (!text) {
        output.textContent = mode === 'encode' ? 'Click Encode to see result...' : 'Click Decode to see result...';
        output.classList.add('empty');
        output.classList.remove('error');
        updateStats('', '');
        return;
      }
      
      try {
        let result;
        if (mode === 'encode') {
          result = encodeURIComponent(text);
        } else {
          result = decodeURIComponent(text);
        }
        
        output.textContent = result;
        output.classList.remove('empty', 'error');
        updateStats(text, result);
      } catch (e) {
        output.textContent = 'Error: Invalid input for decoding. Make sure the string is properly encoded.';
        output.classList.add('error');
        output.classList.remove('empty');
        updateStats(text, '');
      }
    }
    
    function updateStats(inputText, outputText) {
      charCount.textContent = inputText.length;
      outputLen.textContent = outputText.length;
      
      const change = outputText.length - inputText.length;
      diff.textContent = (change >= 0 ? '+' : '') + change;
      diff.style.color = change > 0 ? '#ffa657' : change < 0 ? '#f85149' : '#8b949e';
    }
    
    output.addEventListener('click', () => {
      if (!output.classList.contains('empty') && !output.classList.contains('error')) {
        navigator.clipboard.writeText(output.textContent).then(() => {
          copyFeedback.classList.add('show');
          setTimeout(() => copyFeedback.classList.remove('show'), 1500);
        });
      }
    });
    
    // Init
    runConversion();
  </script>
</body>
</html>
