<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode URLs instantly. Handle special characters, query parameters, and full URLs with ease.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .encoder { background: var(--card-bg, #1a1a2e); padding: 2rem; border-radius: 12px; width: 100%; max-width: 560px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  h1 { margin: 0 0 1.5rem 0; font-size: 1.5rem; text-align: center; }
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted, #888); }
  textarea { width: 100%; padding: 0.75rem; font-size: 1rem; border: 1px solid var(--border, #333); border-radius: 8px; background: var(--input-bg, #0f0f1a); color: var(--text, #eee); font-family: monospace; min-height: 100px; resize: vertical; }
  textarea:focus { outline: 2px solid var(--accent, #646cff); border-color: transparent; }
  .buttons { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
  .btn { flex: 1; padding: 0.75rem; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; font-weight: 500; }
  .btn-encode { background: var(--accent, #646cff); color: white; }
  .btn-decode { background: var(--highlight, #16213e); color: var(--text, #eee); border: 1px solid var(--border, #333); }
  .btn:hover { opacity: 0.9; }
  .result-section { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border, #333); }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .result-header label { margin-bottom: 0; }
  .copy-btn { padding: 0.4rem 0.8rem; font-size: 0.8rem; background: var(--highlight, #16213e); color: var(--text, #eee); border: 1px solid var(--border, #333); border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { background: var(--accent, #646cff); color: white; border-color: var(--accent, #646cff); }
  .copy-btn.copied { background: var(--success, #4ade80); color: #000; border-color: var(--success, #4ade80); }
  .result-text { width: 100%; padding: 0.75rem; font-size: 0.95rem; border: 1px solid var(--border, #333); border-radius: 8px; background: var(--input-bg, #0f0f1a); color: var(--text, #eee); font-family: monospace; min-height: 80px; resize: vertical; word-break: break-all; }
  .error { color: var(--error, #ef4444); font-size: 0.9rem; margin-top: 0.5rem; display: none; }
  .error.show { display: block; }
  .info { font-size: 0.85rem; color: var(--text-muted, #888); margin-top: 1rem; text-align: center; }
  @media (max-width: 600px) { .encoder { padding: 1.5rem; } .buttons { flex-direction: column; } }
</style>
</head>
<body data-page-type="app">
  <div class="encoder">
    <h1>🔗 URL Encoder/Decoder</h1>
    
    <div class="input-group">
      <label>Enter URL or text</label>
      <textarea id="input" placeholder="Paste your URL or text here..."></textarea>
    </div>
    
    <div class="buttons">
      <button class="btn btn-encode" id="encode-btn">Encode</button>
      <button class="btn btn-decode" id="decode-btn">Decode</button>
    </div>
    
    <div class="result-section">
      <div class="result-header">
        <label>Result</label>
        <button class="copy-btn" id="copy-btn">Copy</button>
      </div>
      <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
      <div class="error" id="error">Invalid input for decoding</div>
    </div>
    
    <div class="info">Use encode for special characters, decode to reverse</div>
  </div>
  
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const encodeBtn = document.getElementById('encode-btn');
    const decodeBtn = document.getElementById('decode-btn');
    const copyBtn = document.getElementById('copy-btn');
    const error = document.getElementById('error');
    
    function encode() {
      error.classList.remove('show');
      try {
        const result = encodeURIComponent(input.value);
        output.value = result;
      } catch (e) {
        error.textContent = 'Encoding failed';
        error.classList.add('show');
      }
    }
    
    function decode() {
      error.classList.remove('show');
      try {
        const result = decodeURIComponent(input.value);
        if (result === input.value && !input.value.includes('%')) {
          // Might not be encoded, still return but warn
          output.value = result;
        } else {
          output.value = result;
        }
      } catch (e) {
        error.textContent = 'Invalid URL-encoded string';
        error.classList.add('show');
        output.value = '';
      }
    }
    
    function copy() {
      if (!output.value) return;
      navigator.clipboard.writeText(output.value).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 1500);
      });
    }
    
    encodeBtn.addEventListener('click', encode);
    decodeBtn.addEventListener('click', decode);
    copyBtn.addEventListener('click', copy);
    
    // Also allow Enter in input (with Ctrl/Cmd for decode)
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        decode();
      } else if (e.key === 'Enter') {
        encode();
      }
    });
  </script>
</body>
</html>
