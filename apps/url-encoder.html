<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode special characters for URLs or decode URL-encoded strings. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 700px;
    margin: 0 auto;
  }
  .input-group {
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }
  textarea {
    width: 100%;
    min-height: 120px;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    box-sizing: border-box;
    resize: vertical;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  button {
    padding: 12px 20px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover {
    background: var(--accent-hover, #0077aa);
  }
  .result {
    padding: 16px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 14px;
    word-break: break-all;
    min-height: 60px;
  }
  .copy-btn {
    margin-top: 8px;
    padding: 8px 14px;
    font-size: 13px;
  }
  .info {
    padding: 12px 16px;
    background: var(--bg);
    border-left: 3px solid var(--accent);
    color: var(--text-secondary);
    font-size: 13px;
    margin-bottom: 20px;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>URL Encoder/Decoder</h1>
  <p style="color: var(--text-secondary); margin-bottom: 24px;">Encode special characters for URLs or decode URL-encoded strings. All local, no tracking.</p>

  <div class="info">
    Use this to safely embed special characters in URLs, decode %20-style encoding, or encode query parameters.
  </div>

  <div class="input-group">
    <label for="input">Input</label>
    <textarea id="input" placeholder="Enter text to encode or decode..."></textarea>
  </div>

  <div class="buttons">
    <button class="primary" onclick="encode()">Encode</button>
    <button class="primary" onclick="decode()">Decode</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <div class="input-group">
    <label for="output">Output</label>
    <div class="result" id="output">—</div>
    <button class="copy-btn" onclick="copyOutput()">Copy to Clipboard</button>
  </div>
</div>

<script>
  function encode() {
    const input = document.getElementById('input').value;
    try {
      const encoded = encodeURIComponent(input);
      document.getElementById('output').textContent = encoded;
    } catch (e) {
      document.getElementById('output').textContent = 'Error: ' + e.message;
    }
  }

  function decode() {
    const input = document.getElementById('input').value;
    try {
      const decoded = decodeURIComponent(input);
      document.getElementById('output').textContent = decoded;
    } catch (e) {
      document.getElementById('output').textContent = 'Error: Invalid encoding — make sure input is properly URL-encoded';
    }
  }

  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('output').textContent = '—';
  }

  function copyOutput() {
    const output = document.getElementById('output').textContent;
    if (output === '—') return;
    navigator.clipboard.writeText(output).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy to Clipboard', 1500);
    });
  }
</script>
</body>
</html>
