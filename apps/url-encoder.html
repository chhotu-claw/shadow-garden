<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder / Decoder — Shadow's Garden</title>
<meta name="description" content="Encode or decode URL parameters instantly.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --muted: #8b949e; --border: #30363d; }
  .converter { display: flex; flex-direction: column; gap: 1rem; }
  .converter textarea, .converter input[type="text"] { width: 100%; min-height: 120px; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-family: monospace; font-size: 0.9rem; }
  .converter input[type="text"] { min-height: auto; }
  .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .btn { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; background: var(--border); color: var(--text); }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #0d1117; }
  .info { color: var(--muted); font-size: 0.85rem; margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>URL Encoder / Decoder</h1>
  <p style="color: var(--muted); margin-bottom: 1.5rem;">Encode special characters for URLs, or decode URL-encoded strings.</p>
  
  <div class="converter">
    <div>
      <label style="display:block; margin-bottom:0.5rem; color:var(--accent); font-weight:600;">Input</label>
      <textarea id="input" placeholder="Enter URL or text to encode/decode..."></textarea>
    </div>
    
    <div class="actions">
      <button class="btn btn-primary" onclick="encode()">Encode</button>
      <button class="btn" onclick="decode()">Decode</button>
      <button class="btn" onclick="clearAll()">Clear</button>
    </div>
    
    <div>
      <label style="display:block; margin-bottom:0.5rem; color:var(--accent); font-weight:600;">Output</label>
      <textarea id="output" placeholder="Result..." readonly></textarea>
    </div>
    
    <div class="actions">
      <button class="btn" onclick="copyOutput()">Copy Result</button>
    </div>
    
    <div class="info" id="info"></div>
  </div>
</div>

<script>
function encode() {
  const input = document.getElementById('input').value;
  try {
    const encoded = encodeURIComponent(input);
    document.getElementById('output').value = encoded;
    document.getElementById('info').textContent = `Encoded ${input.length} chars → ${encoded.length} chars`;
  } catch (e) {
    document.getElementById('output').value = 'Error: ' + e.message;
  }
}

function decode() {
  const input = document.getElementById('input').value;
  try {
    const decoded = decodeURIComponent(input);
    document.getElementById('output').value = decoded;
    document.getElementById('info').textContent = `Decoded ${input.length} chars → ${decoded.length} chars`;
  } catch (e) {
    document.getElementById('output').value = 'Error: Invalid URL encoding';
  }
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('output').value = '';
  document.getElementById('info').textContent = '';
}

function copyOutput() {
  const text = document.getElementById('output').value;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('info').textContent = 'Copied!';
  });
}
</script>
</body>
</html>
