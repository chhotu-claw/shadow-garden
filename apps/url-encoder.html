<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode URLs instantly. A simple tool for developers who need to handle special characters in URLs.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 600px; margin: 0 auto; }
  .mode-toggle { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .mode-toggle button {
    flex: 1; padding: 0.75rem; background: #1a1a1a; color: #888;
    border: 1px solid #333; border-radius: 6px; cursor: pointer;
    font-size: 0.9rem; transition: all 0.2s;
  }
  .mode-toggle button.active { background: #7aa2f7; color: #0d0d0d; border-color: #7aa2f7; }
  .mode-toggle button:hover:not(.active) { border-color: #555; }
  textarea {
    width: 100%; height: 150px; background: #141414; color: #e5e5e5;
    border: 1px solid #333; border-radius: 8px; padding: 1rem;
    font-family: monospace; font-size: 0.9rem; resize: vertical;
  }
  textarea:focus { outline: none; border-color: #7aa2f7; }
  .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .actions button {
    padding: 0.75rem 1.5rem; background: #1a1a1a; color: #e5e5e5;
    border: 1px solid #333; border-radius: 6px; cursor: pointer;
    font-size: 0.9rem; transition: all 0.2s;
  }
  .actions button:hover { background: #252525; }
  .actions button.primary { background: #7aa2f7; color: #0d0d0d; border-color: #7aa2f7; }
  .actions button.primary:hover { background: #89b4ff; }
  .output { margin-top: 1rem; }
  .output textarea { background: #0f0f0f; }
  .hint { color: #666; font-size: 0.8rem; margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>URL Encoder/Decoder</h1>
  <p style="color:#888;margin-bottom:1.5rem;">Encode special characters or decode encoded URLs. Everything runs in your browser.</p>
  
  <div class="mode-toggle">
    <button id="encodeBtn" class="active" onclick="setMode('encode')">Encode</button>
    <button id="decodeBtn" onclick="setMode('decode')">Decode</button>
  </div>
  
  <textarea id="input" placeholder="Enter URL or text to encode/decode..."></textarea>
  
  <div class="actions">
    <button class="primary" onclick="process()">Convert</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="swap()">Swap</button>
  </div>
  
  <div class="output">
    <textarea id="output" placeholder="Result will appear here..." readonly></textarea>
    <button onclick="copyOutput()" style="margin-top:0.5rem;padding:0.5rem 1rem;background:#1a1a1a;color:#888;border:1px solid #333;border-radius:4px;cursor:pointer;">Copy</button>
  </div>
  
  <p class="hint">Keyboard: Ctrl+Enter to convert, Ctrl+Shift+X to swap</p>
</div>

<script>
  let mode = 'encode';
  
  function setMode(m) {
    mode = m;
    document.getElementById('encodeBtn').classList.toggle('active', m === 'encode');
    document.getElementById('decodeBtn').classList.toggle('active', m === 'decode');
    process();
  }
  
  function process() {
    const input = document.getElementById('input').value;
    const output = document.getElementById('output');
    if (!input) { output.value = ''; return; }
    output.value = mode === 'encode' ? encodeURIComponent(input) : decodeURIComponent(input);
  }
  
  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('output').value = '';
  }
  
  function swap() {
    const inVal = document.getElementById('input').value;
    const outVal = document.getElementById('output').value;
    document.getElementById('input').value = outVal;
    document.getElementById('output').value = inVal;
  }
  
  function copyOutput() {
    const out = document.getElementById('output');
    if (out.value) {
      navigator.clipboard.writeText(out.value);
      event.target.textContent = 'Copied!';
      setTimeout(() => event.target.textContent = 'Copy', 1500);
    }
  }
  
  document.getElementById('input').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') process();
    if (e.ctrlKey && e.shiftKey && e.key === 'X') { e.preventDefault(); swap(); }
  });
</script>
</body>
</html>
