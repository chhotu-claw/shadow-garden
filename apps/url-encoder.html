<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode URLs instantly. Handle special characters, query params, and full URLs with ease.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 2rem; max-width: 800px; margin: 0 auto; }
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
  textarea, input[type="text"] {
    width: 100%; padding: 0.75rem; font-family: monospace; font-size: 0.9rem;
    border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text);
    box-sizing: border-box;
  }
  textarea { min-height: 120px; resize: vertical; }
  .buttons { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  button {
    padding: 0.6rem 1.2rem; border: none; border-radius: 6px; cursor: pointer;
    font-weight: 500; transition: all 0.2s; background: var(--primary); color: white;
  }
  button:hover { opacity: 0.9; transform: translateY(-1px); }
  button.secondary { background: var(--border); color: var(--text); }
  button.secondary:hover { background: var(--text); color: var(--bg); }
  .output { position: relative; }
  .copy-btn { position: absolute; top: 0.5rem; right: 0.5rem; padding: 0.4rem 0.8rem; font-size: 0.8rem; }
  .info { font-size: 0.85rem; color: var(--muted); margin-top: 1rem; padding: 1rem; background: var(--bg); border-radius: 6px; }
  .modes { display: flex; gap: 1rem; margin-bottom: 1rem; }
  .mode-radio { display: flex; align-items: center; gap: 0.3rem; cursor: pointer; }
</style>
</head>
<body data-page-type="app">
  <h1>URL Encoder/Decoder</h1>
  <p style="color: var(--muted); margin-bottom: 1.5rem;">Encode special characters or decode URL-encoded strings instantly.</p>
  
  <div class="modes">
    <label class="mode-radio">
      <input type="radio" name="mode" value="encode" checked> Encode
    </label>
    <label class="mode-radio">
      <input type="radio" name="mode" value="decode"> Decode
    </label>
  </div>

  <div class="input-group">
    <label for="input">Input</label>
    <textarea id="input" placeholder="Enter text to encode/decode..."></textarea>
  </div>

  <div class="buttons">
    <button id="convert">Convert</button>
    <button id="swap" class="secondary">Swap</button>
    <button id="clear" class="secondary">Clear</button>
  </div>

  <div class="input-group output">
    <label for="output">Output</label>
    <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
    <button id="copy" class="secondary copy-btn">Copy</button>
  </div>

  <div class="info">
    <strong>What this does:</strong><br>
    • Encode: Converts special characters to %XX format (space → %20, ! → %21)<br>
    • Decode: Reverses encoding (%20 → space)<br>
    • Useful for API queries, query parameters, and URL manipulation
  </div>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const modeRadios = document.querySelectorAll('input[name="mode"]');

    function getMode() {
      return document.querySelector('input[name="mode"]:checked').value;
    }

    document.getElementById('convert').addEventListener('click', () => {
      const val = input.value;
      if (!val) return;
      try {
        output.value = getMode() === 'encode' 
          ? encodeURIComponent(val)
          : decodeURIComponent(val);
      } catch (e) {
        output.value = 'Error: Invalid input for ' + getMode();
      }
    });

    document.getElementById('swap').addEventListener('click', () => {
      const temp = input.value;
      input.value = output.value;
      output.value = temp;
    });

    document.getElementById('clear').addEventListener('click', () => {
      input.value = '';
      output.value = '';
    });

    document.getElementById('copy').addEventListener('click', () => {
      if (output.value) {
        navigator.clipboard.writeText(output.value);
        const btn = document.getElementById('copy');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      }
    });

    modeRadios.forEach(r => r.addEventListener('change', () => {
      const label = document.querySelector('label[for="convert"]');
      if (label) label.textContent = getMode() === 'encode' ? 'Encode' : 'Decode';
    });
  </script>
</body>
</html>
