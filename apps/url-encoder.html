<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode URLs instantly. Handles full URLs, query parameters, and special characters.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
  .panel { background: var(--bg-secondary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-primary); }
  textarea, input[type="text"] {
    width: 100%; padding: 1rem; border: 2px solid var(--border);
    border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 14px;
    background: var(--bg-primary); color: var(--text-primary); resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus, input[type="text"]:focus { outline: none; border-color: var(--accent); }
  .buttons { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
  button {
    padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; background: var(--accent); color: var(--bg-primary);
  }
  button:hover { transform: translateY(-2px); filter: brightness(1.1); }
  button.secondary { background: var(--bg-tertiary); color: var(--text-primary); }
  .output-group { margin-top: 1.5rem; }
  .output-group label { display: flex; justify-content: space-between; align-items: center; }
  .copy-hint { font-size: 0.75rem; font-weight: 400; color: var(--text-muted); }
  .history { margin-top: 2rem; }
  .history-item {
    padding: 0.75rem 1rem; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 0.5rem;
    font-family: monospace; font-size: 13px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .history-item:hover { background: var(--bg-tertiary); }
  .error { color: #ff6b6b; font-size: 0.875rem; margin-top: 0.5rem; }
  .info { background: var(--bg-tertiary); padding: 1rem; border-radius: 8px; margin-top: 1.5rem; font-size: 0.875rem; }
  .info code { background: var(--bg-primary); padding: 0.2rem 0.4rem; border-radius: 4px; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>URL Encoder/Decoder</h1>
  <p class="subtitle">Encode special characters or decode URL-encoded strings</p>

  <div class="panel">
    <label for="input">Input</label>
    <textarea id="input" rows="4" placeholder="Enter URL or text to encode/decode..."></textarea>
    <div class="buttons">
      <button onclick="encode()">Encode</button>
      <button onclick="decode()">Decode</button>
      <button class="secondary" onclick="clearAll()">Clear</button>
    </div>
    <div id="error" class="error"></div>
  </div>

  <div class="panel output-group">
    <label>Output <span class="copy-hint">Click to copy</span></label>
    <textarea id="output" rows="4" readonly placeholder="Result appears here..."></textarea>
  </div>

  <div class="info">
    <strong>What this does:</strong>
    <ul style="margin: 0.5rem 0 0 1.5rem; padding: 0;">
      <li><code>encodeURI()</code> — encodes full URLs (preserves : / ? & =)</li>
      <li><code>encodeURIComponent()</code> — encodes query string params (encodes everything)</li>
      <li>Use <code>decodeURIComponent()</code> for decoding</li>
    </ul>
  </div>

  <div class="history" id="history" style="display: none;">
    <label>Recent</label>
    <div id="historyList"></div>
  </div>
</div>

<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const error = document.getElementById('error');
  const historyDiv = document.getElementById('history');
  const historyList = document.getElementById('historyList');

  // Load history from localStorage
  let history = JSON.parse(localStorage.getItem('urlEncoderHistory') || '[]');
  renderHistory();

  function showError(msg) {
    error.textContent = msg;
    setTimeout(() => error.textContent = '', 3000);
  }

  function encode() {
    error.textContent = '';
    const val = input.value.trim();
    if (!val) return;
    
    try {
      // Try encodeURIComponent first (more aggressive)
      const encoded = encodeURIComponent(val);
      output.value = encoded;
      addToHistory(val, encoded, 'encoded');
    } catch (e) {
      showError('Error encoding: ' + e.message);
    }
  }

  function decode() {
    error.textContent = '';
    const val = input.value.trim();
    if (!val) return;
    
    try {
      const decoded = decodeURIComponent(val);
      output.value = decoded;
      addToHistory(val, decoded, 'decoded');
    } catch (e) {
      showError('Invalid URL encoding. Make sure %XX sequences are valid.');
    }
  }

  function clearAll() {
    input.value = '';
    output.value = '';
    error.textContent = '';
  }

  function addToHistory(inputVal, outputVal, type) {
    const item = { input: inputVal, output: outputVal, type, time: Date.now() };
    history = [item, ...history.filter(h => h.input !== inputVal)].slice(0, 10);
    localStorage.setItem('urlEncoderHistory', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) {
      historyDiv.style.display = 'none';
      return;
    }
    historyDiv.style.display = 'block';
    historyList.innerHTML = history.map((h, i) => 
      `<div class="history-item" onclick="loadHistory(${i})">${h.type === 'encoded' ? '→ ' : '← '}${h.input.substring(0, 60)}${h.input.length > 60 ? '...' : ''}</div>`
    ).join('');
  }

  function loadHistory(i) {
    const h = history[i];
    input.value = h.input;
    output.value = h.output;
  }

  // Copy on click
  output.addEventListener('click', async () => {
    if (!output.value) return;
    await navigator.clipboard.writeText(output.value);
    output.style.borderColor = 'var(--accent)';
    setTimeout(() => output.style.borderColor = '', 500);
  });

  // Auto-detect if input is encoded
  input.addEventListener('input', () => {
    const val = input.value;
    if (val.includes('%') && val.match(/%[0-9A-Fa-f]{2}/)) {
      // Looks like URL encoded, try preview
      try {
        const decoded = decodeURIComponent(val);
        if (/[a-zA-Z]/.test(decoded)) {
          // Has readable text, show hint
        }
      } catch (e) {}
    }
  });
</script>
</body>
</html>
