<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorenz Attractor — Shadow's Garden</title>
<meta name="description" content="Interactive Lorenz attractor visualization — the butterfly effect in 3D"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #050508; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(5, 5, 8, 0.9);
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
    color: #aaa;
    font-size: 13px;
    z-index: 100;
    min-width: 180px;
  }
  #controls h3 { margin: 0 0 12px 0; color: #fff; font-size: 14px; }
  .control-row { margin-bottom: 8px; }
  .control-row label { display: block; margin-bottom: 3px; color: #666; font-size: 11px; }
  .control-row input[type="range"] { width: 100%; }
  .control-row span { float: right; color: #4af; font-size: 11px; }
  button {
    background: #2a3a4a;
    border: none;
    color: #ccc;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 4px;
    margin-top: 8px;
    font-size: 11px;
  }
  button:hover { background: #3a4a5a; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #445;
    font-size: 11px;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>Lorenz Attractor</h3>
    <div class="control-row">
      <label>Sigma <span id="sigmaVal">10</span></label>
      <input type="range" id="sigma" min="1" max="30" value="10" step="0.5">
    </div>
    <div class="control-row">
      <label>Rho <span id="rhoVal">28</span></label>
      <input type="range" id="rho" min="0" max="50" value="28" step="0.5">
    </div>
    <div class="control-row">
      <label>Beta <span id="betaVal">2.67</span></label>
      <input type="range" id="beta" min="0.5" max="5" value="2.67" step="0.1">
    </div>
    <div class="control-row">
      <label>Speed <span id="speedVal">3</span></label>
      <input type="range" id="speed" min="1" max="10" value="3">
    </div>
    <div class="control-row">
      <label>Trail <span id="trailVal">2000</span></label>
      <input type="range" id="trail" min="100" max="10000" value="2000" step="100">
    </div>
    <button id="reset">Reset</button>
    <button id="pause">Pause</button>
  </div>
  <div id="info">Drag to rotate | Scroll to zoom</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let points = [];
    let sigma = 10, rho = 28, beta = 2.67;
    let speed = 3;
    let maxTrail = 2000;
    let paused = false;
    
    // Camera
    let rotX = 0.3;
    let rotY = 0;
    let zoom = 15;
    let isDragging = false;
    let lastMouse = { x: 0, y: 0 };
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    
    function project(x, y, z) {
      // Rotate around Y
      let x1 = x * Math.cos(rotY) - z * Math.sin(rotY);
      let z1 = x * Math.sin(rotY) + z * Math.cos(rotY);
      // Rotate around X
      let y1 = y * Math.cos(rotX) - z1 * Math.sin(rotX);
      let z2 = y * Math.sin(rotX) + z1 * Math.cos(rotX);
      // Perspective
      let scale = zoom * 30 / (z2 + 50);
      return {
        x: width / 2 + x1 * scale,
        y: height / 2 + y1 * scale,
        z: z2
      };
    }
    
    function lerp(a, b, t) { return a + (b - a) * t; }
    
    function getColor(t, total) {
      const hue = lerp(200, 340, t / total);
      return `hsl(${hue}, 80%, 60%)`;
    }
    
    function init() {
      points = [];
      let x = 0.1, y = 0, z = 0;
      for (let i = 0; i < maxTrail; i++) {
        for (let s = 0; s < speed; s++) {
          let dx = sigma * (y - x);
          let dy = x * (rho - z) - y;
          let dz = x * y - beta * z;
          x += dx * 0.005;
          y += dy * 0.005;
          z += dz * 0.005;
        }
        points.push({ x, y, z });
      }
    }
    
    function draw() {
      ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      if (points.length < 2) return;
      
      // Draw the trail
      for (let i = 1; i < points.length; i++) {
        const p1 = project(points[i - 1].x, points[i - 1].y, points[i - 1].z);
        const p2 = project(points[i].x, points[i].y, points[i].z);
        
        ctx.beginPath();
        ctx.strokeStyle = getColor(i, points.length);
        ctx.lineWidth = 2;
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
      
      // Draw current point
      const head = points[points.length - 1];
      const p = project(head.x, head.y, head.z);
      ctx.beginPath();
      ctx.fillStyle = '#fff';
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function update() {
      if (paused) return;
      
      const head = points[points.length - 1];
      let x = head.x, y = head.y, z = head.z;
      
      for (let s = 0; s < speed; s++) {
        let dx = sigma * (y - x);
        let dy = x * (rho - z) - y;
        let dz = x * y - beta * z;
        x += dx * 0.005;
        y += dy * 0.005;
        z += dz * 0.005;
      }
      
      points.push({ x, y, z });
      if (points.length > maxTrail) {
        points.shift();
      }
    }
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    // Events
    document.getElementById('sigma').addEventListener('input', e => {
      sigma = +e.target.value;
      document.getElementById('sigmaVal').textContent = sigma;
    });
    document.getElementById('rho').addEventListener('input', e => {
      rho = +e.target.value;
      document.getElementById('rhoVal').textContent = rho;
    });
    document.getElementById('beta').addEventListener('input', e => {
      beta = +e.target.value;
      document.getElementById('betaVal').textContent = beta;
    });
    document.getElementById('speed').addEventListener('input', e => {
      speed = +e.target.value;
      document.getElementById('speedVal').textContent = speed;
    });
    document.getElementById('trail').addEventListener('input', e => {
      maxTrail = +e.target.value;
      document.getElementById('trailVal').textContent = maxTrail;
    });
    document.getElementById('reset').addEventListener('click', init);
    document.getElementById('pause').addEventListener('click', e => {
      paused = !paused;
      e.target.textContent = paused ? 'Resume' : 'Pause';
    });
    
    canvas.addEventListener('mousedown', e => {
      isDragging = true;
      lastMouse = { x: e.clientX, y: e.clientY };
    });
    canvas.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - lastMouse.x;
      const dy = e.clientY - lastMouse.y;
      rotY += dx * 0.01;
      rotX += dy * 0.01;
      lastMouse = { x: e.clientX, y: e.clientY };
    });
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mouseleave', () => isDragging = false);
    
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      zoom += e.deltaY > 0 ? -1 : 1;
      zoom = Math.max(5, Math.min(50, zoom));
    });
    
    window.addEventListener('resize', resize);
    resize();
    init();
    animate();
  </script>
</body>
</html>
