<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorenz Attractor — Shadow's Garden</title>
<meta name="description" content="Interactive Lorenz attractor visualization — the butterfly effect visualized in 3D">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background: #0a0a0f;
  }
  h1 {
    color: #f0e6d3;
    margin-bottom: 10px;
  }
  .controls {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .slider-group label {
    color: #888;
    font-size: 12px;
  }
  .slider-group input[type="range"] {
    width: 100px;
    accent-color: #ff6b35;
  }
  .slider-group span {
    color: #f0e6d3;
    font-size: 11px;
  }
  button {
    padding: 8px 16px;
    border: 2px solid #333;
    background: #1a1a24;
    color: #f0e6d3;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s;
  }
  button:hover {
    background: #252535;
    border-color: #ff6b35;
  }
  canvas {
    border: 2px solid #333;
    background: #050508;
  }
  .info {
    color: #666;
    font-size: 12px;
    margin-top: 10px;
    text-align: center;
    max-width: 500px;
  }
</style>
</head>
<body data-page-type="app">
  <h1>Lorenz Attractor</h1>
  <div class="controls">
    <div class="slider-group">
      <label>σ (sigma)</label>
      <input type="range" id="sigma" min="1" max="20" value="10" step="0.5">
      <span id="sigmaVal">10</span>
    </div>
    <div class="slider-group">
      <label>ρ (rho)</label>
      <input type="range" id="rho" min="1" max="50" value="28" step="0.5">
      <span id="rhoVal">28</span>
    </div>
    <div class="slider-group">
      <label>β (beta)</label>
      <input type="range" id="beta" min="1" max="10" value="2.67" step="0.1">
      <span id="betaVal">2.67</span>
    </div>
    <div class="slider-group">
      <label>Speed</label>
      <input type="range" id="speed" min="1" max="20" value="5">
      <span id="speedVal">5</span>
    </div>
    <button id="resetBtn">Reset</button>
    <button id="rotateBtn">Auto Rotate</button>
  </div>
  <canvas id="canvas" width="600" height="450"></canvas>
  <div class="info">
    The Lorenz attractor — chaos theory's most famous visualization. Small changes in initial conditions produce vastly different outcomes. Yet within the chaos, structure emerges. Drag to rotate.
  </div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    
    // Lorenz parameters
    let sigma = 10;
    let rho = 28;
    let beta = 8/3;
    let dt = 0.005;
    
    // Camera
    let angleX = 0;
    let angleY = 0;
    let autoRotate = false;
    let zoom = 8;
    
    // Point state
    let points = [];
    const maxPoints = 3000;
    
    // Starting position
    let x = 0.1, y = 0, z = 0;
    
    // Sliders
    const sigmaSlider = document.getElementById('sigma');
    const rhoSlider = document.getElementById('rho');
    const betaSlider = document.getElementById('beta');
    const speedSlider = document.getElementById('speed');
    
    sigmaSlider.addEventListener('input', () => {
      sigma = parseFloat(sigmaSlider.value);
      document.getElementById('sigmaVal').textContent = sigma;
    });
    rhoSlider.addEventListener('input', () => {
      rho = parseFloat(rhoSlider.value);
      document.getElementById('rhoVal').textContent = rho;
    });
    betaSlider.addEventListener('input', () => {
      beta = parseFloat(betaSlider.value);
      document.getElementById('betaVal').textContent = beta;
    });
    speedSlider.addEventListener('input', () => {
      document.getElementById('speedVal').textContent = speedSlider.value;
    });
    
    document.getElementById('resetBtn').addEventListener('click', () => {
      points = [];
      x = 0.1; y = 0; z = 0;
    });
    
    document.getElementById('rotateBtn').addEventListener('click', () => {
      autoRotate = !autoRotate;
    });
    
    // Mouse rotation
    let isDragging = false;
    let lastMX = 0, lastMY = 0;
    
    canvas.addEventListener('mousedown', e => {
      isDragging = true;
      lastMX = e.clientX;
      lastMY = e.clientY;
    });
    canvas.addEventListener('mousemove', e => {
      if (isDragging) {
        const dx = e.clientX - lastMX;
        const dy = e.clientY - lastMY;
        angleY += dx * 0.01;
        angleX += dy * 0.01;
        lastMX = e.clientX;
        lastMY = e.clientY;
      }
    });
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mouseleave', () => isDragging = false);
    
    function project(x, y, z) {
      // Rotate around X
      let y1 = y * Math.cos(angleX) - z * Math.sin(angleX);
      let z1 = y * Math.sin(angleX) + z * Math.cos(angleX);
      
      // Rotate around Y
      let x2 = x * Math.cos(angleY) + z1 * Math.sin(angleY);
      let z2 = -x * Math.sin(angleY) + z1 * Math.cos(angleY);
      
      // Project
      const scale = zoom / (z2 + 50);
      return {
        x: W/2 + x2 * scale,
        y: H/2 - y1 * scale,
        z: z2
      };
    }
    
    function update() {
      const speed = parseInt(speedSlider.value);
      
      for (let s = 0; s < speed; s++) {
        // Lorenz equations
        let dx = sigma * (y - x) * dt;
        let dy = (x * (rho - z) - y) * dt;
        let dz = (x * y - beta * z) * dt;
        
        x += dx;
        y += dy;
        z += dz;
        
        points.push({ x, y, z });
        
        if (points.length > maxPoints) {
          points.shift();
        }
      }
      
      if (autoRotate) {
        angleY += 0.01;
      }
    }
    
    function render() {
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, W, H);
      
      // Draw the attractor
      for (let i = 1; i < points.length; i++) {
        const p1 = project(points[i-1].x, points[i-1].y, points[i-1].z);
        const p2 = project(points[i].x, points[i].y, points[i].z);
        
        // Color based on position
        const hue = (points[i].z * 3 + i * 0.5) % 360;
        const alpha = i / points.length;
        
        ctx.strokeStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
      
      // Glow effect
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(255, 107, 53, 0.02)';
      ctx.fillRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'source-over';
    }
    
    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }
    
    loop();
  </script>
</body>
</html>
