<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode Base64 instantly. All local, nothing leaves your device.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
  .panel { background: var(--card-bg, #1e1e2e); border-radius: 12px; padding: 1.5rem; }
  .panel h2 { margin: 0 0 1rem 0; font-size: 1.1rem; color: var(--text-dim, #a0a0b0); }
  textarea {
    width: 100%; height: 180px; background: var(--bg, #0d0d14);
    border: 1px solid var(--border, #2a2a3a); border-radius: 8px;
    color: var(--text, #e0e0f0); font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem; padding: 0.75rem; resize: vertical; box-sizing: border-box;
  }
  textarea:focus { outline: none; border-color: var(--accent, #6366f1); }
  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
  button {
    background: var(--accent, #6366f1); color: white; border: none;
    padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;
    font-size: 0.85rem; transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--border, #2a2a3a); }
  .info { font-size: 0.75rem; color: var(--text-dim, #a0a0b0); margin-top: 0.5rem; }
  @media (max-width: 600px) {
    .tool-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Base64 Encoder/Decoder</h1>
  <p style="color: var(--text-dim); margin-bottom: 1.5rem;">Encode plaintext to Base64 or decode Base64 to plaintext. Everything runs locally in your browser.</p>
  
  <div class="tool-grid">
    <div class="panel">
      <h2>Encode (Text → Base64)</h2>
      <textarea id="encode-input" placeholder="Paste text to encode..."></textarea>
      <div class="btn-row">
        <button onclick="encode()">Encode</button>
        <button class="secondary" onclick="copy('encode-input')">Copy</button>
        <button class="secondary" onclick="document.getElementById('encode-input').value=''">Clear</button>
      </div>
    </div>
    
    <div class="panel">
      <h2>Decode (Base64 → Text)</h2>
      <textarea id="decode-input" placeholder="Paste Base64 to decode..."></textarea>
      <div class="btn-row">
        <button onclick="decode()">Decode</button>
        <button class="secondary" onclick="copy('decode-input')">Copy</button>
        <button class="secondary" onclick="document.getElementById('decode-input').value=''">Clear</button>
      </div>
    </div>
  </div>
  
  <div class="info">Tip: Works with URLs, strings, and binary data. Invalid Base64 shows an error.</div>
</div>

<script>
  function encode() {
    const input = document.getElementById('encode-input').value;
    try {
      const encoded = btoa(unescape(encodeURIComponent(input)));
      document.getElementById('encode-input').value = encoded;
    } catch (e) {
      alert('Error encoding: ' + e.message);
    }
  }

  function decode() {
    const input = document.getElementById('decode-input').value;
    try {
      const decoded = decodeURIComponent(escape(atob(input)));
      document.getElementById('decode-input').value = decoded;
    } catch (e) {
      alert('Invalid Base64 string');
    }
  }

  function copy(id) {
    const el = document.getElementById(id);
    el.select();
    document.execCommand('copy');
  }
</script>
</body>
</html>
