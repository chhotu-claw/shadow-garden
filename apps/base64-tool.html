<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder/Decoder — Shadow's Garden</title>
<meta name="description">Encode text to Base64 or decode Base64 to text. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .base64-tool { max-width: 700px; margin: 0 auto; }
  .mode-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .mode-toggle button {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
  }
  .mode-toggle button:hover { border-color: var(--accent); }
  .mode-toggle button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  textarea {
    width: 100%;
    min-height: 150px;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: var(--mono);
    resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .output-area { margin: 20px 0; }
  .output-area label {
    display: block;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .buttons {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  button {
    flex: 1;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover { opacity: 0.9; }
  .error {
    color: #f77;
    font-size: 14px;
    margin-top: 8px;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="base64-tool">
    <h1>Base64 Encoder/Decoder</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Encode text to Base64 or decode Base64 to text. All local.</p>
    
    <div class="mode-toggle">
      <button class="active" onclick="setMode('encode', this)" id="btnEncode">Encode</button>
      <button onclick="setMode('decode', this)" id="btnDecode">Decode</button>
    </div>
    
    <div class="input-area">
      <label id="inputLabel">Text to encode</label>
      <textarea id="input" placeholder="Enter text to encode..."></textarea>
    </div>
    
    <div class="buttons">
      <button class="primary" onclick="convert()">Convert</button>
      <button onclick="copyOutput()">Copy</button>
      <button onclick="clearAll()">Clear</button>
    </div>
    
    <div class="output-area">
      <label id="outputLabel">Base64 output</label>
      <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
    </div>
    
    <div class="error" id="error"></div>
  </div>
</div>
<script>
  let mode = 'encode';
  
  function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('inputLabel').textContent = mode === 'encode' ? 'Text to encode' : 'Base64 to decode';
    document.getElementById('outputLabel').textContent = mode === 'encode' ? 'Base64 output' : 'Decoded text';
    document.getElementById('input').placeholder = mode === 'encode' ? 'Enter text to encode...' : 'Enter Base64 to decode...';
    document.getElementById('output').value = '';
    document.getElementById('error').classList.remove('show');
  }
  
  function convert() {
    const input = document.getElementById('input').value;
    const output = document.getElementById('output');
    const error = document.getElementById('error');
    
    error.classList.remove('show');
    output.value = '';
    
    if (!input) return;
    
    try {
      if (mode === 'encode') {
        // UTF-8 support
        const encoded = btoa(unescape(encodeURIComponent(input)));
        output.value = encoded;
      } else {
        // Decode with UTF-8 support
        const decoded = decodeURIComponent(escape(atob(input)));
        output.value = decoded;
      }
    } catch (e) {
      error.textContent = 'Error: Invalid input for ' + mode + ' mode';
      error.classList.add('show');
    }
  }
  
  function copyOutput() {
    const output = document.getElementById('output');
    if (!output.value) return;
    
    navigator.clipboard.writeText(output.value).then(() => {
      const btn = event.target;
      const original = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = original, 1500);
    });
  }
  
  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('output').value = '';
    document.getElementById('error').classList.remove('show');
  }
</script>
</body>
</html>
