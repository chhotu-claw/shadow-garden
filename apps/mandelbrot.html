<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandelbrot Explorer — Shadow's Garden</title>
<meta name="description" content="Interactive Mandelbrot fractal explorer with zoom and pan">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background: #0a0a0f;
  }
  h1 {
    color: #f0e6d3;
    margin-bottom: 10px;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  button, input[type="number"] {
    padding: 8px 12px;
    border: 2px solid #333;
    background: #1a1a24;
    color: #f0e6d3;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
  }
  input[type="number"] {
    width: 60px;
  }
  button:hover {
    background: #252535;
  }
  canvas {
    border: 2px solid #333;
    cursor: crosshair;
  }
  .info {
    color: #666;
    font-size: 12px;
    margin-top: 10px;
    text-align: center;
  }
  .coords {
    color: #888;
    font-family: monospace;
    font-size: 12px;
  }
</style>
</head>
<body data-page-type="app">
  <h1>Mandelbrot Explorer</h1>
  <div class="controls">
    <button id="resetBtn">Reset</button>
    <button id="zoomInBtn">Zoom In</button>
    <button id="zoomOutBtn">Zoom Out</button>
    <label style="color: #888;">Iterations:</label>
    <input type="number" id="iterInput" value="100" min="20" max="1000">
    <label style="color: #888;">Color:</label>
    <input type="color" id="colorPicker" value="#ff6b35">
  </div>
  <canvas id="canvas" width="600" height="450"></canvas>
  <div class="info">Click to center • Scroll to zoom • Drag to pan</div>
  <div class="coords" id="coords">x: -0.5, y: 0, zoom: 1x</div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    
    let centerX = -0.5;
    let centerY = 0;
    let zoom = 1;
    let maxIter = 100;
    let accentColor = '#ff6b35';
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let centerStart = { x: 0, y: 0 };
    
    const iterInput = document.getElementById('iterInput');
    const colorPicker = document.getElementById('colorPicker');
    const coordsDisplay = document.getElementById('coords');
    
    iterInput.addEventListener('change', () => {
      maxIter = parseInt(iterInput.value);
      render();
    });
    
    colorPicker.addEventListener('input', () => {
      accentColor = colorPicker.value;
      render();
    });
    
    document.getElementById('resetBtn').addEventListener('click', () => {
      centerX = -0.5;
      centerY = 0;
      zoom = 1;
      render();
    });
    
    document.getElementById('zoomInBtn').addEventListener('click', () => {
      zoom *= 2;
      render();
    });
    
    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      zoom /= 2;
      render();
    });
    
    canvas.addEventListener('mousedown', e => {
      isDragging = true;
      dragStart = { x: e.clientX, y: e.clientY };
      centerStart = { x: centerX, y: centerY };
    });
    
    canvas.addEventListener('mousemove', e => {
      if (isDragging) {
        const dx = (e.clientX - dragStart.x) / W * (3 / zoom);
        const dy = (e.clientY - dragStart.y) / H * (2 / zoom);
        centerX = centerStart.x - dx;
        centerY = centerStart.y + dy;
        render();
      }
    });
    
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mouseleave', () => isDragging = false);
    
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) / W * 3 / zoom + centerX - 1.5 / zoom;
      const my = (e.clientY - rect.top) / H * 2 / zoom + centerY - 1 / zoom;
      
      if (e.deltaY < 0) {
        zoom *= 1.5;
      } else {
        zoom /= 1.5;
      }
      
      centerX = mx - (1.5 / zoom) * ((e.clientX - rect.left) / W);
      centerY = my - (1 / zoom) * ((e.clientY - rect.top) / H);
      
      render();
    });
    
    canvas.addEventListener('click', e => {
      if (isDragging) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) / W * 3 / zoom + centerX - 1.5 / zoom;
      const y = (e.clientY - rect.top) / H * 2 / zoom + centerY - 1 / zoom;
      centerX = x;
      centerY = y;
      zoom *= 2;
      render();
    });
    
    function hsvToRgb(h, s, v) {
      let r, g, b;
      const i = Math.floor(h * 6);
      const f = h * 6 - i;
      const p = v * (1 - s);
      const q = v * (1 - f * s);
      const t = v * (1 - (1 - f) * s);
      switch (i % 6) {
        case 0: r = v; g = t; b = p; break;
        case 1: r = q; g = v; b = p; break;
        case 2: r = p; g = v; b = t; break;
        case 3: r = p; g = q; b = v; break;
        case 4: r = t; g = p; b = v; break;
        case 5: r = v; g = p; b = q; break;
      }
      return [Math.floor(r * 255), Math.floor(g * 255), Math.floor(b * 255)];
    }
    
    function render() {
      const imgData = ctx.createImageData(W, H);
      const data = imgData.data;
      const scale = 3 / zoom;
      const xOffset = centerX - 1.5 / zoom;
      const yOffset = centerY - 1 / zoom;
      
      for (let py = 0; py < H; py++) {
        for (let px = 0; px < W; px++) {
          let x0 = px / W * scale + xOffset;
          let y0 = py / H * scale + yOffset;
          let x = 0, y = 0;
          let iter = 0;
          
          while (x*x + y*y <= 4 && iter < maxIter) {
            const xTemp = x*x - y*y + x0;
            y = 2*x*y + y0;
            x = xTemp;
            iter++;
          }
          
          const idx = (py * W + px) * 4;
          if (iter === maxIter) {
            data[idx] = 10;
            data[idx+1] = 10;
            data[idx+2] = 15;
            data[idx+3] = 255;
          } else {
            const hue = iter / maxIter;
            const [r, g, b] = hsvToRgb(hue * 0.7 + 0.1, 0.8, 0.9);
            data[idx] = r;
            data[idx+1] = g;
            data[idx+2] = b;
            data[idx+3] = 255;
          }
        }
      }
      
      ctx.putImageData(imgData, 0, 0);
      coordsDisplay.textContent = `x: ${centerX.toFixed(6)}, y: ${centerY.toFixed(6)}, zoom: ${zoom.toFixed(1)}x`;
    }
    
    render();
  </script>
</body>
</html>
