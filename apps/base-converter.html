<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base Converter — Shadow's Garden</title>
<meta name="description">Convert between binary, octal, decimal, hex. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .converter { max-width: 600px; margin: 0 auto; }
  .input-group { margin-bottom: 20px; }
  .input-group label {
    display: block;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .input-group input {
    width: 100%;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 18px;
    font-family: var(--mono);
    box-sizing: border-box;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .bases {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .base-item {
    padding: 14px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
  }
  .base-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .base-value {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    word-break: break-all;
  }
  .copy-btn {
    margin-top: 8px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
  }
  .copy-btn:hover { border-color: var(--accent); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="converter">
    <h1>Base Converter</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Convert between binary, octal, decimal, hex.</p>
    
    <div class="input-group">
      <label>Enter a number (any base)</label>
      <input type="text" id="input" placeholder="e.g., 42, 0x2A, 0b101010" oninput="convert()">
    </div>
    
    <div class="bases">
      <div class="base-item">
        <div class="base-label">Decimal (10)</div>
        <div class="base-value" id="decimal">--</div>
        <button class="copy-btn" onclick="copy('decimal')">Copy</button>
      </div>
      <div class="base-item">
        <div class="base-label">Binary (2)</div>
        <div class="base-value" id="binary">--</div>
        <button class="copy-btn" onclick="copy('binary')">Copy</button>
      </div>
      <div class="base-item">
        <div class="base-label">Octal (8)</div>
        <div class="base-value" id="octal">--</div>
        <button class="copy-btn" onclick="copy('octal')">Copy</button>
      </div>
      <div class="base-item">
        <div class="base-label">Hexadecimal (16)</div>
        <div class="base-value" id="hex">--</div>
        <button class="copy-btn" onclick="copy('hex')">Copy</button>
      </div>
    </div>
  </div>
</div>
<script>
  function convert() {
    const input = document.getElementById('input').value.trim();
    
    if (!input) {
      ['decimal', 'binary', 'octal', 'hex'].forEach(id => {
        document.getElementById(id).textContent = '--';
      });
      return;
    }
    
    let decimal;
    
    // Try to parse the input
    if (input.startsWith('0x') || input.startsWith('0X')) {
      // Hex
      decimal = parseInt(input, 16);
    } else if (input.startsWith('0b') || input.startsWith('0B')) {
      // Binary
      decimal = parseInt(input, 2);
    } else if (input.startsWith('0o') || input.startsWith('0O')) {
      // Octal
      decimal = parseInt(input, 8);
    } else if (input.startsWith('0') && input.length > 1) {
      // Octal
      decimal = parseInt(input, 8);
    } else {
      // Decimal or auto-detect
      decimal = parseInt(input, 10);
    }
    
    if (isNaN(decimal)) {
      ['decimal', 'binary', 'octal', 'hex'].forEach(id => {
        document.getElementById(id).textContent = 'Invalid';
      });
      return;
    }
    
    document.getElementById('decimal').textContent = decimal.toString(10);
    document.getElementById('binary').textContent = '0b' + decimal.toString(2);
    document.getElementById('octal').textContent = '0o' + decimal.toString(8);
    document.getElementById('hex').textContent = '0x' + decimal.toString(16).toUpperCase();
  }
  
  function copy(id) {
    const val = document.getElementById(id).textContent;
    if (!val || val === '--' || val === 'Invalid') return;
    
    navigator.clipboard.writeText(val).then(() => {
      const btn = event.target;
      const original = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = original, 1500);
    });
  }
</script>
</body>
</html>
