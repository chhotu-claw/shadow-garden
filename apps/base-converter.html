<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Base Converter — Shadow's Garden</title>
<meta name="description" content="Convert between binary, octal, decimal, hexadecimal, and base-32. Instant conversion, copy buttons.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .input-group { margin-bottom: 1.5rem; }
  .input-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
  .input-group input, .input-group select { 
    width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; 
    background: var(--bg); color: var(--fg); font-size: 16px; font-family: 'Fira Code', monospace;
  }
  .input-group input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .results { display: grid; gap: 1rem; margin-top: 2rem; }
  .result-row { display: flex; align-items: center; gap: 1rem; background: var(--bg-secondary); padding: 1rem; border-radius: 8px; }
  .result-row .label { min-width: 80px; font-weight: 600; color: var(--fg-muted); }
  .result-row .value { flex: 1; font-family: 'Fira Code', monospace; word-break: break-all; }
  .result-row button { padding: 0.5rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--fg); }
  .result-row button:hover { background: var(--border); }
  .error { color: #ff6b6b; margin-top: 0.5rem; display: none; }
  .error.show { display: block; }
  .note { color: var(--fg-muted); font-size: 0.9rem; margin-top: 2rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Number Base Converter</h1>
  <p class="note">Enter a number in any base to see it converted to all formats.</p>
  
  <div class="input-group">
    <label for="inputValue">Enter value</label>
    <input type="text" id="inputValue" placeholder="e.g., 255, 0xFF, 11111111, 0o377" autocomplete="off">
  </div>
  
  <div class="input-group">
    <label for="inputBase">Input base</label>
    <select id="inputBase">
      <option value="auto">Auto-detect</option>
      <option value="2">Binary (2)</option>
      <option value="8">Octal (8)</option>
      <option value="10">Decimal (10)</option>
      <option value="16">Hexadecimal (16)</option>
      <option value="32">Base-32 (32)</option>
    </select>
  </div>
  
  <div id="error" class="error">Invalid number format</div>
  
  <div class="results">
    <div class="result-row">
      <span class="label">Binary</span>
      <span class="value" id="binary">—</span>
      <button onclick="copy('binary')">Copy</button>
    </div>
    <div class="result-row">
      <span class="label">Octal</span>
      <span class="value" id="octal">—</span>
      <button onclick="copy('octal')">Copy</button>
    </div>
    <div class="result-row">
      <span class="label">Decimal</span>
      <span class="value" id="decimal">—</span>
      <button onclick="copy('decimal')">Copy</button>
    </div>
    <div class="result-row">
      <span class="label">Hex</span>
      <span class="value" id="hex">—</span>
      <button onclick="copy('hex')">Copy</button>
    </div>
    <div class="result-row">
      <span class="label">Base-32</span>
      <span class="value" id="base32">—</span>
      <button onclick="copy('base32')">Copy</button>
    </div>
  </div>
</div>

<script>
const inputEl = document.getElementById('inputValue');
const baseEl = document.getElementById('inputBase');
const errorEl = document.getElementById('error');

function detectBase(str) {
  str = str.trim().toLowerCase();
  if (str.startsWith('0x') || str.startsWith('0x')) return 16;
  if (str.startsWith('0o') || str.startsWith('0o')) return 8;
  if (str.startsWith('0b') || str.startsWith('0b')) return 2;
  if (/^[01]+$/.test(str)) return 2;
  if (/^[0-7]+$/.test(str)) return 8;
  if (/^[0-9]+$/.test(str)) return 10;
  if (/^[0-9a-f]+$/.test(str)) return 16;
  return 10;
}

function toBase(str, base) {
  try {
    const bigInt = BigInt(str);
    if (base === 2) return bigInt.toString(2);
    if (base === 8) return bigInt.toString(8);
    if (base === 10) return bigInt.toString(10);
    if (base === 16) return bigInt.toString(16).toUpperCase();
    if (base === 32) return bigInt.toString(32).toUpperCase();
  } catch (e) {
    return null;
  }
}

function convert() {
  const val = inputEl.value.trim();
  if (!val) {
    ['binary', 'octal', 'decimal', 'hex', 'base32'].forEach(id => document.getElementById(id).textContent = '—');
    errorEl.classList.remove('show');
    return;
  }
  
  let base = baseEl.value;
  if (base === 'auto') {
    base = detectBase(val);
  }
  base = parseInt(base);
  
  // Normalize input
  let normalized = val.toLowerCase();
  if (base === 16 && normalized.startsWith('0x')) normalized = normalized.slice(2);
  else if (base === 8 && normalized.startsWith('0o')) normalized = normalized.slice(2);
  else if (base === 2 && normalized.startsWith('0b')) normalized = normalized.slice(2);
  
  const results = {
    binary: toBase(normalized, 2),
    octal: toBase(normalized, 8),
    decimal: toBase(normalized, 10),
    hex: toBase(normalized, 16),
    base32: toBase(normalized, 32)
  };
  
  if (Object.values(results).some(v => v === null)) {
    errorEl.classList.add('show');
    ['binary', 'octal', 'decimal', 'hex', 'base32'].forEach(id => document.getElementById(id).textContent = '—');
    return;
  }
  
  errorEl.classList.remove('show');
  document.getElementById('binary').textContent = '0b' + results.binary;
  document.getElementById('octal').textContent = '0o' + results.octal;
  document.getElementById('decimal').textContent = results.decimal;
  document.getElementById('hex').textContent = '0x' + results.hex;
  document.getElementById('base32').textContent = results.base32.toUpperCase();
}

function copy(id) {
  const text = document.getElementById(id).textContent;
  if (text === '—') return;
  navigator.clipboard.writeText(text);
}

inputEl.addEventListener('input', convert);
baseEl.addEventListener('change', convert);
</script>
</body>
</html>
