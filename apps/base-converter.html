<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base Converter — Shadow's Garden</title>
<meta name="description" content="Convert between number bases: binary, octal, decimal, hex, and base-32. Real-time conversion as you type.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: 'IBM Plex Mono', monospace; }
  .converter { max-width: 600px; margin: 0 auto; }
  .input-group { margin-bottom: 1rem; }
  .input-group label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 0.3rem; font-family: 'IBM Plex Sans', sans-serif; }
  .input-group input { 
    width: 100%; 
    padding: 0.8rem; 
    font-size: 1.1rem; 
    font-family: 'IBM Plex Mono', monospace;
    background: #1a1a2e; 
    border: 1px solid #333; 
    color: #eee; 
    border-radius: 6px;
    box-sizing: border-box;
  }
  .input-group input:focus { outline: none; border-color: #4ade80; }
  .input-group input::placeholder { color: #555; }
  h1 { text-align: center; margin-bottom: 0.5rem; }
  .subtitle { text-align: center; color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
  .copy-btn {
    background: #333; color: #ccc; border: none; padding: 0.3rem 0.6rem;
    font-size: 0.75rem; cursor: pointer; border-radius: 4px; margin-top: 0.3rem;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .copy-btn:hover { background: #444; }
  .copy-btn.copied { background: #22c55e; color: #fff; }
  .row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .col { flex: 1; min-width: 120px; }
  .bit-padding { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
  .bit-padding label { font-size: 0.8rem; color: #888; }
  .bit-padding input { width: 60px; padding: 0.4rem; background: #1a1a2e; border: 1px solid #333; color: #eee; border-radius: 4px; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="converter">
    <h1>Base Converter</h1>
    <p class="subtitle">Convert between binary, octal, decimal, hex, and base-32</p>
    
    <div class="input-group">
      <label>Decimal (base 10)</label>
      <input type="text" id="dec" placeholder="Enter a number...">
    </div>
    
    <div class="row">
      <div class="col">
        <div class="input-group">
          <label>Binary (base 2)</label>
          <input type="text" id="bin" placeholder="0b...">
        </div>
      </div>
      <div class="col">
        <div class="input-group">
          <label>Octal (base 8)</label>
          <input type="text" id="oct" placeholder="0o...">
        </div>
      </div>
    </div>
    
    <div class="row">
      <div class="col">
        <div class="input-group">
          <label>Hexadecimal (base 16)</label>
          <input type="text" id="hex" placeholder="0x...">
        </div>
      </div>
      <div class="col">
        <div class="input-group">
          <label>Base-32</label>
          <input type="text" id="b32" placeholder="ABC...">
        </div>
      </div>
    </div>
    
    <div class="bit-padding">
      <label>Bit padding:</label>
      <input type="number" id="bits" value="8" min="1" max="64">
      <span style="color:#666;font-size:0.8rem">(for binary display)</span>
    </div>
  </div>
  
  <script>
    const bases = {
      dec: { radix: 10, prefix: '', parse: v => parseInt(v, 10) },
      bin: { radix: 2, prefix: '0b', parse: v => parseInt(v.replace(/^0b/i,''), 2) },
      oct: { radix: 8, prefix: '0o', parse: v => parseInt(v.replace(/^0o/i,''), 8) },
      hex: { radix: 16, prefix: '0x', parse: v => parseInt(v.replace(/^0x/i,''), 16) },
      b32: { radix: 32, prefix: '', parse: v => base32ToInt(v.toUpperCase()) }
    };
    
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
    
    function intToBase32(n) {
      if (n === 0) return '0';
      let result = '';
      while (n > 0) {
        result = chars[n % 32] + result;
        n = Math.floor(n / 32);
      }
      return result;
    }
    
    function base32ToInt(s) {
      if (!s) return NaN;
      s = s.toUpperCase().replace(/[^A-Z2-7]/g, '');
      let n = 0;
      for (let i = 0; i < s.length; i++) {
        const d = chars.indexOf(s[i]);
        if (d === -1) return NaN;
        n = n * 32 + d;
      }
      return n;
    }
    
    function toBinary(n, bits) {
      if (isNaN(n)) return '';
      let bin = n.toString(2);
      if (bits > 0 && bin.length < bits) {
        bin = '0'.repeat(bits - bin.length) + bin;
      }
      // Group by 4
      return bin.replace(/(.{4})/g, '$1 ').trim();
    }
    
    function formatValue(id, value) {
      if (isNaN(value)) return '';
      const b = bases[id];
      if (id === 'bin') return toBinary(value, parseInt(document.getElementById('bits').value) || 8);
      if (id === 'b32') return intToBase32(value);
      if (id === 'dec') return value.toString(10);
      if (id === 'oct') return value.toString(8);
      if (id === 'hex') return value.toString(16).toUpperCase();
      return value.toString(b.radix);
    }
    
    function convert(sourceId, value) {
      const b = bases[sourceId];
      let n;
      
      if (sourceId === 'bin') {
        n = parseInt(value.replace(/\s/g, '').replace(/^0b/i,''), 2);
      } else if (sourceId === 'b32') {
        n = base32ToInt(value);
      } else {
        n = b.parse(value);
      }
      
      if (isNaN(n) || n > Number.MAX_SAFE_INTEGER || n < 0) return;
      
      Object.keys(bases).forEach(id => {
        if (id === sourceId) return;
        const el = document.getElementById(id);
        const newVal = formatValue(id, n);
        if (el.value !== newVal) el.value = newVal;
      });
    }
    
    Object.keys(bases).forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('input', () => convert(id, el.value));
    });
    
    document.getElementById('bits').addEventListener('input', () => {
      const dec = document.getElementById('dec').value;
      if (dec) convert('dec', dec);
    });
    
    // Copy buttons
    document.querySelectorAll('.input-group').forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.onclick = () => {
        const input = g.querySelector('input');
        if (input.value) {
          navigator.clipboard.writeText(input.value);
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
        }
      };
      g.appendChild(btn);
    });
  </script>
</div>
</body>
</html>
