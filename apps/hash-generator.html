<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator — Shadow's Garden</title>
<meta name="description" content="Generate SHA-1, SHA-256, SHA-512 hashes instantly. Client-side, nothing leaves your browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-mono); }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
  h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-dim); margin-bottom: 2rem; font-size: 0.9rem; }
  textarea {
    width: 100%;
    height: 150px;
    padding: 1rem;
    font-family: var(--font-mono);
    font-size: 0.95rem;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    resize: vertical;
  }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .algo-select {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin: 1rem 0;
  }
  .algo-btn {
    padding: 0.5rem 1rem;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .algo-btn:hover { border-color: var(--text-dim); }
  .algo-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .results {
    margin-top: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .result-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--bg-elevated);
    padding: 0.75rem 1rem;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .result-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    min-width: 70px;
    text-transform: uppercase;
  }
  .result-value {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    word-break: break-all;
    color: var(--text);
  }
  .copy-btn {
    padding: 0.4rem 0.8rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.75rem;
    font-family: var(--font-mono);
    transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--border); color: var(--text); }
  .copy-btn.copied { background: #22c55e; border-color: #22c55e; color: white; }
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 2rem;
    text-align: center;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 1rem;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: var(--bg-elevated); }
  .drop-zone p { margin: 0; font-size: 0.9rem; }
  .mode-toggle {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .mode-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.9rem;
    padding-bottom: 0.25rem;
    border-bottom: 2px solid transparent;
  }
  .mode-btn.active { color: var(--text); border-color: var(--accent); }
  input[type="file"] { display: none; }
  .file-info {
    background: var(--bg-elevated);
    padding: 0.75rem 1rem;
    border-radius: 6px;
    margin-bottom: 1rem;
    display: none;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border);
  }
  .file-info.visible { display: flex; }
  .file-name { font-family: var(--font-mono); font-size: 0.85rem; }
  .clear-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.2rem; }
  .note { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Hash Generator</h1>
  <p class="subtitle">Generate SHA-1, SHA-256, SHA-512 hashes. Everything runs client-side.</p>

  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="text">Text</button>
    <button class="mode-btn" data-mode="file">File</button>
  </div>

  <div id="text-mode">
    <textarea id="input-text" placeholder="Enter text to hash..."></textarea>
  </div>

  <div id="file-mode" style="display:none;">
    <div class="drop-zone" id="drop-zone">
      <p>Drop a file here or click to upload</p>
    </div>
    <input type="file" id="file-input">
    <div class="file-info" id="file-info">
      <span class="file-name" id="file-name"></span>
      <button class="clear-btn" id="clear-file">×</button>
    </div>
  </div>

  <div class="algo-select">
    <button class="algo-btn active" data-algo="sha1">SHA-1</button>
    <button class="algo-btn active" data-algo="sha256">SHA-256</button>
    <button class="algo-btn active" data-algo="sha512">SHA-512</button>
  </div>
  <p class="note">Note: MD5 omitted — it's cryptographically broken and unsuitable for security.</p>

  <div class="results" id="results"></div>
</div>

<script>
const textInput = document.getElementById('input-text');
const resultsDiv = document.getElementById('results');
const algoBtns = document.querySelectorAll('.algo-btn');
const modeBtns = document.querySelectorAll('.mode-btn');
const textMode = document.getElementById('text-mode');
const fileMode = document.getElementById('file-mode');
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const fileInfo = document.getElementById('file-info');
const fileName = document.getElementById('file-name');
const clearFile = document.getElementById('clear-file');

let selectedAlgos = ['sha1', 'sha256', 'sha512'];
let currentFile = null;
let currentMode = 'text';

function updateAlgos() {
  selectedAlgos = Array.from(algoBtns).filter(b => b.classList.contains('active')).map(b => b.dataset.algo);
  hash();
}

algoBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    updateAlgos();
  });
});

modeBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    modeBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    textMode.style.display = currentMode === 'text' ? 'block' : 'none';
    fileMode.style.display = currentMode === 'file' ? 'block' : 'none';
    hash();
  });
});

async function hash() {
  resultsDiv.innerHTML = '';
  
  let data;
  if (currentMode === 'text') {
    data = new TextEncoder().encode(textInput.value);
  } else if (currentFile) {
    data = await currentFile.arrayBuffer();
  } else {
    return;
  }

  const hashAlgos = {
    sha1: async () => {
      const buf = await crypto.subtle.digest('SHA-1', data);
      return buf2hex(buf);
    },
    sha256: async () => {
      const buf = await crypto.subtle.digest('SHA-256', data);
      return buf2hex(buf);
    },
    sha512: async () => {
      const buf = await crypto.subtle.digest('SHA-512', data);
      return buf2hex(buf);
    }
  };

  for (const algo of selectedAlgos) {
    if (hashAlgos[algo]) {
      const hash = await hashAlgos[algo]();
      const row = document.createElement('div');
      row.className = 'result-row';
      row.innerHTML = `
        <span class="result-label">${algo}</span>
        <span class="result-value">${hash}</span>
        <button class="copy-btn" data-copy="${hash}">copy</button>
      `;
      resultsDiv.appendChild(row);
    }
  }

  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      await navigator.clipboard.writeText(btn.dataset.copy);
      btn.textContent = 'copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'copy';
        btn.classList.remove('copied');
      }, 1500);
    });
  });
}

function buf2hex(buffer) {
  return [...new Uint8Array(buffer)].map(x => x.toString(16).padStart(2, '0')).join('');
}

textInput.addEventListener('input', hash);

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) {
    handleFile(e.dataTransfer.files[0]);
  }
});

fileInput.addEventListener('change', e => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

function handleFile(file) {
  currentFile = file;
  fileName.textContent = file.name + ' (' + formatSize(file.size) + ')';
  fileInfo.classList.add('visible');
  hash();
}

clearFile.addEventListener('click', () => {
  currentFile = null;
  fileInfo.classList.remove('visible');
  fileInput.value = '';
  resultsDiv.innerHTML = '';
});

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}
</script>
</body>
</html>
