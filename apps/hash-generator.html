<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator — Shadow's Garden</title>
<meta name="description" content="Generate SHA-1, SHA-256, SHA-384, SHA-512 hashes from text or files. All local, no server.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; padding: 2rem; }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
  .input-section { margin-bottom: 1.5rem; }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .tab { padding: 0.5rem 1rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
  .tab:hover { border-color: var(--accent); }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  textarea { width: 100%; min-height: 120px; padding: 1rem; font-family: monospace; font-size: 0.95rem; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; resize: vertical; }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .file-area { padding: 2rem; background: var(--card-bg); border: 2px dashed var(--border); border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .file-area:hover { border-color: var(--accent); }
  .file-area.dragover { border-color: var(--accent); background: var(--highlight); }
  .file-area input { display: none; }
  .file-name { margin-top: 1rem; font-family: monospace; color: var(--accent); }
  .file-size { font-size: 0.85rem; color: var(--text-muted); }
  .generate-btn { width: 100%; padding: 1rem; font-size: 1rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 1rem; }
  .generate-btn:hover { opacity: 0.9; }
  .results { margin-top: 2rem; display: none; }
  .results.show { display: block; }
  .result-row { margin-bottom: 1rem; }
  .result-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem; }
  .result-value { display: flex; gap: 0.5rem; align-items: center; }
  .result-value input { flex: 1; padding: 0.5rem; font-family: monospace; font-size: 0.85rem; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; }
  .copy-btn { padding: 0.5rem 0.75rem; background: var(--border); color: var(--text); border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
  .copy-btn:hover { background: var(--accent); color: white; }
  .panel { display: none; }
  .panel.active { display: block; }
  @media (max-width: 500px) { .tabs { flex-wrap: wrap; } }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>🔐 Hash Generator</h1>
    <div class="subtitle">Generate SHA-1, SHA-256, SHA-384, SHA-512 hashes — all local, no server</div>
    
    <div class="tabs">
      <button class="tab active" data-tab="text">Text</button>
      <button class="tab" data-tab="file">File</button>
    </div>
    
    <div class="panel active" id="text-panel">
      <div class="input-section">
        <textarea id="text-input" placeholder="Enter text to hash..."></textarea>
      </div>
    </div>
    
    <div class="panel" id="file-panel">
      <div class="file-area" id="file-area">
        <input type="file" id="file-input">
        <div>Drop a file here or click to browse</div>
        <div class="file-name" id="file-name"></div>
        <div class="file-size" id="file-size"></div>
      </div>
    </div>
    
    <button class="generate-btn" id="generate-btn">Generate Hashes</button>
    
    <div class="results" id="results">
      <div class="result-row">
        <div class="result-label">SHA-1</div>
        <div class="result-value">
          <input type="text" id="sha1-result" readonly>
          <button class="copy-btn" data-target="sha1-result">Copy</button>
        </div>
      </div>
      <div class="result-row">
        <div class="result-label">SHA-256</div>
        <div class="result-value">
          <input type="text" id="sha256-result" readonly>
          <button class="copy-btn" data-target="sha256-result">Copy</button>
        </div>
      </div>
      <div class="result-row">
        <div class="result-label">SHA-384</div>
        <div class="result-value">
          <input type="text" id="sha384-result" readonly>
          <button class="copy-btn" data-target="sha384-result">Copy</button>
        </div>
      </div>
      <div class="result-row">
        <div class="result-label">SHA-512</div>
        <div class="result-value">
          <input type="text" id="sha512-result" readonly>
          <button class="copy-btn" data-target="sha512-result">Copy</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.panel');
    const textInput = document.getElementById('text-input');
    const fileInput = document.getElementById('file-input');
    const fileArea = document.getElementById('file-area');
    const fileName = document.getElementById('file-name');
    const fileSize = document.getElementById('file-size');
    const generateBtn = document.getElementById('generate-btn');
    const results = document.getElementById('results');
    
    let selectedFile = null;
    
    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-panel').classList.add('active');
      });
    });
    
    // File handling
    fileArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', handleFile);
    
    fileArea.addEventListener('dragover', e => {
      e.preventDefault();
      fileArea.classList.add('dragover');
    });
    
    fileArea.addEventListener('dragleave', () => {
      fileArea.classList.remove('dragover');
    });
    
    fileArea.addEventListener('drop', e => {
      e.preventDefault();
      fileArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        handleFile({ target: { files: e.dataTransfer.files } });
      }
    });
    
    function handleFile(e) {
      const file = e.target.files[0];
      if (file) {
        selectedFile = file;
        fileName.textContent = file.name;
        fileSize.textContent = formatSize(file.size);
      }
    }
    
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
    }
    
    // Hash generation
    async function generateHashes() {
      generateBtn.textContent = 'Generating...';
      generateBtn.disabled = true;
      
      try {
        let data;
        
        if (document.querySelector('.tab[data-tab="file"].active')) {
          if (!selectedFile) {
            alert('Please select a file');
            return;
          }
          data = await selectedFile.arrayBuffer();
        } else {
          const text = textInput.value;
          if (!text) {
            alert('Please enter some text');
            return;
          }
          data = new TextEncoder().encode(text);
        }
        
        const [sha1, sha256, sha384, sha512] = await Promise.all([
          crypto.subtle.digest('SHA-1', data),
          crypto.subtle.digest('SHA-256', data),
          crypto.subtle.digest('SHA-384', data),
          crypto.subtle.digest('SHA-512', data)
        ]);
        
        document.getElementById('sha1-result').value = buf2hex(sha1);
        document.getElementById('sha256-result').value = buf2hex(sha256);
        document.getElementById('sha384-result').value = buf2hex(sha384);
        document.getElementById('sha512-result').value = buf2hex(sha512);
        
        results.classList.add('show');
      } catch (err) {
        alert('Error generating hashes: ' + err.message);
      }
      
      generateBtn.textContent = 'Generate Hashes';
      generateBtn.disabled = false;
    }
    
    function buf2hex(buffer) {
      return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    
    // Copy functionality
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        navigator.clipboard.writeText(input.value);
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      });
    });
    
    generateBtn.addEventListener('click', generateHashes);
  </script>
</body>
</html>
