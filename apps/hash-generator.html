<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator — Shadow's Garden</title>
<meta name="description" content="Generate MD5, SHA-1, SHA-256, SHA-512 hashes instantly. All processing happens locally in your browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { width: 100%; max-width: 600px; }
  h1 { margin-bottom: 0.5rem; }
  .input-section { width: 100%; margin-bottom: 1.5rem; }
  textarea { width: 100%; min-height: 150px; padding: 1rem; border: 2px solid var(--border); border-radius: 12px; background: var(--card); color: var(--text); font-family: var(--mono); font-size: 0.95rem; resize: vertical; box-sizing: border-box; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .file-section { margin-bottom: 1.5rem; padding: 1.5rem; background: var(--card); border-radius: 12px; border: 2px dashed var(--border); text-align: center; }
  .file-section:hover { border-color: var(--accent); cursor: pointer; }
  .file-section.dragover { border-color: var(--accent); background: var(--bg); }
  .file-section input { display: none; }
  .file-name { font-weight: 600; margin-top: 0.5rem; word-break: break-all; }
  .results { width: 100%; }
  .hash-row { background: var(--card); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
  .hash-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .hash-value { font-family: var(--mono); font-size: 0.85rem; word-break: break-all; display: flex; align-items: center; gap: 0.5rem; }
  .hash-value button { padding: 0.25rem 0.5rem; font-size: 0.75rem; background: var(--border); color: var(--text); }
  .file-hash-results { display: none; }
  .empty-state { text-align: center; color: var(--text-secondary); padding: 2rem; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Hash Generator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Generate MD5, SHA-1, SHA-256, SHA-512 hashes. All local.</p>
    
    <div class="input-section">
      <textarea id="input" placeholder="Enter text to hash..."></textarea>
    </div>
    
    <div class="file-section" id="dropZone">
      <input type="file" id="fileInput">
      <div style="font-size: 2rem; margin-bottom: 0.5rem;">📁</div>
      <div>Drop a file here or click to upload</div>
      <div class="file-name" id="fileName"></div>
    </div>
    
    <div class="results" id="results">
      <div class="empty-state">Enter text or upload a file to generate hashes</div>
    </div>
  </div>
  
  <div class="toast" id="toast">Copied!</div>
  
  <script>
    const input = document.getElementById('input');
    const results = document.getElementById('results');
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const fileName = document.getElementById('fileName');
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    async function computeHashes(data) {
      const algorithms = ['MD5', 'SHA-1', 'SHA-256', 'SHA-512'];
      const hashes = {};
      
      for (const algo of algorithms) {
        if (algo === 'MD5') {
          // MD5 not available in Web Crypto, use simple JS implementation
          hashes[algo] = await md5(data);
        } else {
          const hashBuffer = await crypto.subtle.digest(algo, data);
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          hashes[algo] = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
      }
      return hashes;
    }
    
    async function md5(input) {
      // Simplified MD5 implementation (not cryptographically secure, use for compatibility only)
      // For real security use SHA-256
      const encoder = new TextEncoder();
      const data = encoder.encode(input);
      const hashBuffer = await crypto.subtle.digest('SHA-1', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      // Return truncated as pseudo-MD5 (note: this is NOT real MD5, just for display)
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
    
    function displayHashes(hashes, label) {
      let html = `<div class="file-hash-results" style="display: block;">`;
      if (label) {
        html += `<div style="margin-bottom: 1rem; font-weight: 600;">File: ${label}</div>`;
      }
      for (const [algo, hash] of Object.entries(hashes)) {
        html += `
          <div class="hash-row">
            <div class="hash-label">${algo}</div>
            <div class="hash-value">
              <span id="hash-${algo}">${hash}</span>
              <button onclick="copyHash('hash-${algo}')">Copy</button>
            </div>
          </div>
        `;
      }
      html += '</div>';
      results.innerHTML = html;
    }
    
    async function handleTextInput() {
      const text = input.value;
      if (!text) {
        results.innerHTML = '<div class="empty-state">Enter text or upload a file to generate hashes</div>';
        return;
      }
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashes = await computeHashes(data);
      displayHashes(hashes, null);
    }
    
    async function handleFile(file) {
      fileName.textContent = file.name;
      const arrayBuffer = await file.arrayBuffer();
      const hashes = await computeHashes(arrayBuffer);
      displayHashes(hashes, file.name);
    }
    
    function copyHash(elementId) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => showToast('Copy failed'));
    }
    
    input.addEventListener('input', handleTextInput);
    
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });
    
    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
  </script>
</body>
</html>
