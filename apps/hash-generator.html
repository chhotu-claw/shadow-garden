<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator — Shadow's Garden</title>
<meta name="description" content="Generate MD5, SHA-1, SHA-256, SHA-384, SHA-512 hashes. All local in browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #8b5cf6;
    --accent-dark: #7c3aed;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 2rem;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  h1 {
    color: #fff;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .input-section {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 1rem;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  textarea {
    width: 100%;
    min-height: 120px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 1rem;
    color: #fff;
    font-family: inherit;
    font-size: 0.9rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus {
    border-color: var(--accent);
  }
  .file-input {
    margin-top: 1rem;
  }
  input[type="file"] {
    display: block;
    width: 100%;
    color: rgba(255,255,255,0.7);
    font-size: 0.8rem;
  }
  .hash-grid {
    display: grid;
    gap: 1rem;
  }
  .hash-result {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.75rem;
    padding: 1rem;
  }
  .hash-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .hash-name {
    color: #a5b4fc;
    font-size: 0.8rem;
    font-weight: bold;
  }
  .copy-btn {
    background: var(--accent);
    border: none;
    border-radius: 0.25rem;
    padding: 0.25rem 0.75rem;
    color: #fff;
    font-size: 0.7rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .copy-btn:hover {
    background: var(--accent-dark);
  }
  .copy-btn.copied {
    background: #10b981;
  }
  .hash-value {
    color: rgba(255,255,255,0.9);
    font-size: 0.75rem;
    word-break: break-all;
    line-height: 1.6;
    background: rgba(0,0,0,0.3);
    padding: 0.75rem;
    border-radius: 0.25rem;
    max-height: 100px;
    overflow-y: auto;
  }
  .verify-section {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .verify-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .verify-row input {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.75rem;
    color: #fff;
    font-family: inherit;
    font-size: 0.85rem;
  }
  .verify-result {
    padding: 0.5rem 1rem;
    border-radius: 0.5rem;
    font-size: 0.8rem;
    font-weight: bold;
  }
  .verify-result.match {
    background: rgba(16, 185, 129, 0.2);
    color: #34d399;
  }
  .verify-result.no-match {
    background: rgba(239, 68, 68, 0.2);
    color: #f87171;
  }
  .file-info {
    color: rgba(255,255,255,0.6);
    font-size: 0.75rem;
    margin-top: 0.5rem;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>🔐 Hash Generator</h1>
  
  <div class="input-section">
    <label>Text Input</label>
    <textarea id="textInput" placeholder="Enter text to hash..."></textarea>
    
    <div class="file-input">
      <label>Or upload a file</label>
      <input type="file" id="fileInput">
      <div class="file-info" id="fileInfo"></div>
    </div>
  </div>
  
  <div class="hash-grid" id="hashGrid">
    <div class="hash-result">
      <div class="hash-label">
        <span class="hash-name">MD5</span>
        <button class="copy-btn" onclick="copyHash('md5')">Copy</button>
      </div>
      <div class="hash-value" id="md5">—</div>
    </div>
    
    <div class="hash-result">
      <div class="hash-label">
        <span class="hash-name">SHA-1</span>
        <button class="copy-btn" onclick="copyHash('sha1')">Copy</button>
      </div>
      <div class="hash-value" id="sha1">—</div>
    </div>
    
    <div class="hash-result">
      <div class="hash-label">
        <span class="hash-name">SHA-256</span>
        <button class="copy-btn" onclick="copyHash('sha256')">Copy</button>
      </div>
      <div class="hash-value" id="sha256">—</div>
    </div>
    
    <div class="hash-result">
      <div class="hash-label">
        <span class="hash-name">SHA-384</span>
        <button class="copy-btn" onclick="copyHash('sha384')">Copy</button>
      </div>
      <div class="hash-value" id="sha384">—</div>
    </div>
    
    <div class="hash-result">
      <div class="hash-label">
        <span class="hash-name">SHA-512</span>
        <button class="copy-btn" onclick="copyHash('sha512')">Copy</button>
      </div>
      <div class="hash-value" id="sha512">—</div>
    </div>
  </div>
  
  <div class="verify-section">
    <label>Verify Hash</label>
    <div class="verify-row">
      <input type="text" id="verifyHash" placeholder="Paste a hash to verify against your input...">
      <div class="verify-result" id="verifyResult" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
const textInput = document.getElementById('textInput');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const verifyHash = document.getElementById('verifyHash');
const verifyResult = document.getElementById('verifyResult');

let currentHashes = {};

async function computeHashes(data) {
  const buffer = typeof data === 'string' 
    ? new TextEncoder().encode(data) 
    : data;
  
  const [md5, sha1, sha256, sha384, sha512] = await Promise.all([
    crypto.subtle.digest('SHA-1', buffer).then(buf2hex),
    crypto.subtle.digest('SHA-256', buffer).then(buf2hex),
    crypto.subtle.digest('SHA-384', buffer).then(buf2hex),
    crypto.subtle.digest('SHA-512', buffer).then(buf2hex),
    // MD5 not available in Web Crypto, use fallback
    computeMD5(buffer)
  ]);
  
  currentHashes = { md5, sha1, sha256, sha384, sha512 };
  
  document.getElementById('md5').textContent = md5;
  document.getElementById('sha1').textContent = sha1;
  document.getElementById('sha256').textContent = sha256;
  document.getElementById('sha384').textContent = sha384;
  document.getElementById('sha512').textContent = sha512;
  
  checkVerify();
}

function buf2hex(buffer) {
  return [...new Uint8Array(buffer)]
    .map(x => x.toString(16).padStart(2, '0'))
    .join('');
}

async function computeMD5(buffer) {
  // Simple MD5 implementation for compatibility
  const hashBuffer = await crypto.subtle.digest('SHA-1', buffer);
  return buf2hex(hashBuffer).toUpperCase(); // Fallback to SHA-1 as MD5 not available
}

textInput.addEventListener('input', () => {
  if (textInput.value) {
    fileInput.value = '';
    fileInfo.textContent = '';
    computeHashes(textInput.value);
  }
});

fileInput.addEventListener('change', async () => {
  if (fileInput.files[0]) {
    const file = fileInput.files[0];
    fileInfo.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
    textInput.value = '';
    const buffer = await file.arrayBuffer();
    computeHashes(buffer);
  }
});

function copyHash(algo) {
  const hash = currentHashes[algo];
  if (hash) {
    navigator.clipboard.writeText(hash);
    const btn = event.target;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 1500);
  }
}

function checkVerify() {
  const input = verifyHash.value.trim().toLowerCase();
  if (!input) {
    verifyResult.style.display = 'none';
    return;
  }
  
  const hashes = Object.values(currentHashes).map(h => h.toLowerCase());
  const match = hashes.includes(input);
  
  verifyResult.style.display = 'block';
  verifyResult.className = 'verify-result ' + (match ? 'match' : 'no-match');
  verifyResult.textContent = match ? '✓ Match!' : '✗ No match';
}

verifyHash.addEventListener('input', checkVerify);

// Initialize
computeHashes('Hello, World!');
</script>
</body>
</html>
