<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator — Shadow's Garden</title>
<meta name="description" content="Generate MD5, SHA-1, SHA-256, SHA-384, SHA-512 hashes from text or files. All processing happens locally in your browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
    --success: #22c55e;
    --danger: #ef4444;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    margin-bottom: 0.5rem;
    font-size: 1.75rem;
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.875rem;
  }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border);
  }

  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    background: var(--card);
    padding: 0.5rem;
    border-radius: 8px;
  }

  .tab {
    flex: 1;
    padding: 0.75rem;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.875rem;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--primary);
    color: white;
  }

  .tab:hover:not(.active) {
    background: var(--border);
  }

  label {
    display: block;
    margin-bottom: 0.5rem;
    font-size: 0.875rem;
    color: var(--text-muted);
  }

  textarea {
    width: 100%;
    height: 120px;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    resize: vertical;
    box-sizing: border-box;
  }

  textarea:focus {
    outline: none;
    border-color: var(--primary);
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1rem;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--primary);
    background: rgba(99, 102, 241, 0.1);
  }

  .drop-zone-text {
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .drop-zone-text span {
    color: var(--primary);
  }

  .file-info {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem;
    background: var(--bg);
    border-radius: 8px;
    margin-bottom: 1rem;
  }

  .file-info .name {
    flex: 1;
    word-break: break-all;
  }

  .file-info .size {
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  .file-info .clear {
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 1.25rem;
    padding: 0 0.25rem;
  }

  .hash-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .hash-label {
    min-width: 80px;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 600;
  }

  .hash-value {
    flex: 1;
    padding: 0.5rem 0.75rem;
    background: var(--bg);
    border-radius: 6px;
    font-size: 0.75rem;
    word-break: break-all;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text-muted);
  }

  .hash-value.copied {
    color: var(--success);
  }

  .copy-btn {
    background: var(--border);
    border: none;
    color: var(--text);
    padding: 0.5rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    background: var(--primary);
  }

  .compare-section {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .compare-input {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .compare-input input {
    flex: 1;
    padding: 0.5rem 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.8rem;
  }

  .compare-input input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .match-badge {
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .match-badge.match {
    background: rgba(34, 197, 94, 0.2);
    color: var(--success);
  }

  .match-badge.no-match {
    background: rgba(239, 68, 68, 0.2);
    color: var(--danger);
  }

  .hidden { display: none; }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 0.875rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
  }

  .generating {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text-muted);
    font-size: 0.875rem;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>#️⃣ Hash Generator</h1>
    <p class="subtitle">Generate hashes from text or files. 100% local — nothing leaves your browser.</p>

    <div class="tabs">
      <button class="tab active" data-tab="text">Text</button>
      <button class="tab" data-tab="file">File</button>
    </div>

    <!-- Text Hash -->
    <div id="text-tab">
      <div class="card">
        <label>Enter text to hash</label>
        <textarea id="text-input" placeholder="Type or paste your text here..."></textarea>
      </div>
    </div>

    <!-- File Hash -->
    <div id="file-tab" class="hidden">
      <div class="card">
        <div class="drop-zone" id="drop-zone">
          <p class="drop-zone-text">
            Drop a file here or <span>click to browse</span>
          </p>
          <input type="file" id="file-input" style="display: none">
        </div>
        <div id="file-info" class="file-info hidden">
          <span class="name" id="file-name"></span>
          <span class="size" id="file-size"></span>
          <button class="clear" onclick="clearFile()">×</button>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div class="card">
      <label>Hashes</label>
      <div id="hash-results">
        <p style="color: var(--text-muted); font-size: 0.875rem;">Enter text or drop a file to generate hashes</p>
      </div>

      <div class="compare-section hidden" id="compare-section">
        <label>Verify hash</label>
        <div class="compare-input">
          <input type="text" id="compare-hash" placeholder="Paste a hash to compare..." oninput="checkMatch()">
          <span class="match-badge" id="match-badge"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Copied!</div>

  <script>
    let currentFile = null;
    let currentHashes = {};

    const algorithms = ['MD5', 'SHA-1', 'SHA-256', 'SHA-384', 'SHA-512'];

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        document.getElementById('text-tab').classList.add('hidden');
        document.getElementById('file-tab').classList.add('hidden');
        
        document.getElementById(`${tab.dataset.tab}-tab`).classList.remove('hidden');
        
        // Clear results when switching
        document.getElementById('hash-results').innerHTML = '<p style="color: var(--text-muted); font-size: 0.875rem;">Enter text or drop a file to generate hashes</p>';
        document.getElementById('compare-section').classList.add('hidden');
        currentHashes = {};
      });
    });

    // Text input
    document.getElementById('text-input').addEventListener('input', debounce(async () => {
      const text = document.getElementById('text-input').value;
      if (text) {
        await generateTextHashes(text);
      } else {
        document.getElementById('hash-results').innerHTML = '<p style="color: var(--text-muted); font-size: 0.875rem;">Enter text or drop a file to generate hashes</p>';
        document.getElementById('compare-section').classList.add('hidden');
        currentHashes = {};
      }
    }, 300));

    // File handling
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) {
        handleFile(fileInput.files[0]);
      }
    });

    function handleFile(file) {
      currentFile = file;
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-size').textContent = formatSize(file.size);
      document.getElementById('file-info').classList.remove('hidden');
      document.getElementById('drop-zone').classList.add('hidden');
      
      generateFileHashes(file);
    }

    function clearFile() {
      currentFile = null;
      fileInput.value = '';
      document.getElementById('file-info').classList.add('hidden');
      document.getElementById('drop-zone').classList.remove('hidden');
      document.getElementById('hash-results').innerHTML = '<p style="color: var(--text-muted); font-size: 0.875rem;">Enter text or drop a file to generate hashes</p>';
      document.getElementById('compare-section').classList.add('hidden');
      currentHashes = {};
    }

    async function generateTextHashes(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      await computeHashes(data);
    }

    async function generateFileHashes(file) {
      const buffer = await file.arrayBuffer();
      await computeHashes(buffer);
    }

    async function computeHashes(buffer) {
      const resultsDiv = document.getElementById('hash-results');
      resultsDiv.innerHTML = '<div class="generating"><div class="spinner"></div> Computing hashes...</div>';
      
      currentHashes = {};
      
      for (const algo of algorithms) {
        const hashBuffer = await crypto.subtle.digest(algo, buffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        currentHashes[algo] = hashHex;
      }

      renderHashes();
      document.getElementById('compare-section').classList.remove('hidden');
      checkMatch();
    }

    function renderHashes() {
      const resultsDiv = document.getElementById('hash-results');
      resultsDiv.innerHTML = algorithms.map(algo => `
        <div class="hash-row">
          <span class="hash-label">${algo}</span>
          <span class="hash-value" id="hash-${algo}">${currentHashes[algo]}</span>
          <button class="copy-btn" onclick="copyHash('${algo}')" title="Copy">📋</button>
        </div>
      `).join('');
    }

    async function copyHash(algo) {
      const hash = currentHashes[algo];
      await navigator.clipboard.writeText(hash);
      
      const el = document.getElementById(`hash-${algo}`);
      el.classList.add('copied');
      showToast(`Copied ${algo}!`);
      
      setTimeout(() => el.classList.remove('copied'), 1000);
    }

    function checkMatch() {
      const input = document.getElementById('compare-hash').value.trim().toLowerCase();
      const badge = document.getElementById('match-badge');
      
      if (!input || Object.keys(currentHashes).length === 0) {
        badge.textContent = '';
        badge.className = 'match-badge';
        return;
      }

      const match = Object.values(currentHashes).some(h => h === input);
      
      if (match) {
        badge.textContent = '✓ Match';
        badge.className = 'match-badge match';
      } else {
        badge.textContent = '✗ No match';
        badge.className = 'match-badge no-match';
      }
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
    }

    function debounce(fn, delay) {
      let timeout;
      return (...args) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => fn(...args), delay);
      };
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
