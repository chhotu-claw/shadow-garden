<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator — Shadow's Garden</title>
<meta name="description" content="Generate MD5, SHA-1, SHA-256, SHA-384, SHA-512 hashes instantly">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem;
  }
  h1 {
    margin-bottom: 1.5rem;
  }
  .input-section {
    margin-bottom: 1.5rem;
  }
  label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text-secondary, #a6adc8);
  }
  textarea {
    width: 100%;
    min-height: 120px;
    padding: 1rem;
    border: 1px solid var(--border, #313244);
    border-radius: 8px;
    background: var(--input-bg, #11111b);
    color: var(--text, #cdd6f4);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.95rem;
    resize: vertical;
    box-sizing: border-box;
  }
  .file-section {
    margin-bottom: 1.5rem;
    padding: 1.5rem;
    background: var(--card-bg, #1e1e2e);
    border-radius: 12px;
    border: 1px solid var(--border, #313244);
  }
  .file-input {
    display: none;
  }
  .file-label {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  .file-label:hover {
    opacity: 0.9;
  }
  .file-name {
    margin-top: 0.75rem;
    color: var(--text-secondary, #a6adc8);
    font-size: 0.9rem;
  }
  .hash-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .hash-item {
    padding: 1rem;
    background: var(--card-bg, #1e1e2e);
    border-radius: 8px;
    border: 1px solid var(--border, #313244);
  }
  .hash-label {
    font-size: 0.8rem;
    color: var(--accent, #cba6f7);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.5rem;
  }
  .hash-value {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85rem;
    word-break: break-all;
    color: var(--text, #cdd6f4);
    background: var(--result-bg, #181825);
    padding: 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .hash-value:hover {
    background: var(--button-bg, #313244);
  }
  .hash-value::after {
    content: 'Click to copy';
    float: right;
    font-size: 0.7rem;
    color: var(--text-secondary, #a6adc8);
    font-family: inherit;
  }
  .copy-feedback {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    padding: 0.75rem 1.5rem;
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
    border-radius: 8px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .copy-feedback.show {
    opacity: 1;
  }
  .algorithms {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .algo-btn {
    padding: 0.5rem 1rem;
    background: var(--button-bg, #313244);
    color: var(--text, #cdd6f4);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .algo-btn.active {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .algo-btn:hover:not(.active) {
    background: var(--border, #45475a);
  }
  .warning {
    margin-top: 1rem;
    padding: 0.75rem;
    background: rgba(243, 139, 168, 0.1);
    border: 1px solid rgba(243, 139, 168, 0.3);
    border-radius: 6px;
    color: #f38ba8;
    font-size: 0.85rem;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>#️⃣ Hash Generator</h1>
  
  <div class="input-section">
    <label>Text to hash</label>
    <textarea id="input-text" placeholder="Enter text here..."></textarea>
  </div>

  <div class="algorithms">
    <button class="algo-btn active" data-algo="md5">MD5</button>
    <button class="algo-btn active" data-algo="sha1">SHA-1</button>
    <button class="algo-btn active" data-algo="sha256">SHA-256</button>
    <button class="algo-btn active" data-algo="sha384">SHA-384</button>
    <button class="algo-btn active" data-algo="sha512">SHA-512</button>
  </div>

  <div class="hash-list" id="hash-results"></div>

  <div class="file-section">
    <label>Or hash a file</label>
    <input type="file" id="file-input" class="file-input">
    <label for="file-input" class="file-label">Choose File</label>
    <div class="file-name" id="file-name"></div>
  </div>

  <div class="warning">
    ⚠️ MD5 and SHA-1 are cryptographically broken. Use SHA-256+ for security.
  </div>
</div>

<div class="copy-feedback" id="copy-feedback">Copied!</div>

<script>
  const inputText = document.getElementById('input-text');
  const hashResults = document.getElementById('hash-results');
  const fileInput = document.getElementById('file-input');
  const fileName = document.getElementById('file-name');
  const algoBtns = document.querySelectorAll('.algo-btn');
  const copyFeedback = document.getElementById('copy-feedback');

  let selectedAlgos = ['md5', 'sha1', 'sha256', 'sha384', 'sha512'];

  // Toggle algorithm selection
  algoBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      const algo = btn.dataset.algo;
      if (selectedAlgos.includes(algo)) {
        selectedAlgos = selectedAlgos.filter(a => a !== algo);
      } else {
        selectedAlgos.push(algo);
      }
      if (inputText.value) generateHashes(inputText.value);
    });
  });

  // Text input handler
  inputText.addEventListener('input', debounce(() => {
    if (inputText.value) generateHashes(inputText.value);
    else hashResults.innerHTML = '';
  }, 200));

  // File input handler
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    
    fileName.textContent = `${file.name} (${formatSize(file.size)})`;
    
    const arrayBuffer = await file.arrayBuffer();
    generateHashes(arrayBuffer, true);
  });

  async function generateHashes(input, isBuffer = false) {
    hashResults.innerHTML = '';
    
    const encoder = new TextEncoder();
    const data = isBuffer ? input : encoder.encode(input);

    for (const algo of selectedAlgos) {
      const hashBuffer = await crypto.subtle.digest(algo.toUpperCase().replace('MD5', 'MD5'), data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      
      const item = document.createElement('div');
      item.className = 'hash-item';
      item.innerHTML = `
        <div class="hash-label">${algo.toUpperCase()}</div>
        <div class="hash-value" data-hash="${hashHex}">${hashHex}</div>
      `;
      hashResults.appendChild(item);
    }

    // Add click-to-copy
    document.querySelectorAll('.hash-value').forEach(el => {
      el.addEventListener('click', () => {
        copyToClipboard(el.dataset.hash);
      });
    });
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
      copyFeedback.classList.add('show');
      setTimeout(() => copyFeedback.classList.remove('show'), 1500);
    });
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function debounce(fn, ms) {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn(...args), ms);
    };
  }
</script>
</body>
</html>
