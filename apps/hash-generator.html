<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator — Shadow's Garden</title>
<meta name="description" content="Generate MD5, SHA-1, SHA-256, SHA-512 hashes. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .hash-tool { max-width: 700px; margin: 0 auto; }
  .input-section { margin-bottom: 20px; }
  .input-section label {
    display: block;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  textarea {
    width: 100%;
    min-height: 120px;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: var(--mono);
    line-height: 1.5;
    resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .hash-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .hash-btn {
    padding: 10px 16px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .hash-btn:hover {
    border-color: var(--accent);
  }
  .hash-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .results {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .result-item {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .result-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .result-value {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
  }
  .copy-btn {
    margin-top: 8px;
    padding: 8px 12px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .copy-btn:hover {
    border-color: var(--accent);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="hash-tool">
    <h1>Hash Generator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Generate hashes. All local, nothing leaves your browser.</p>
    
    <div class="input-section">
      <label>Text to hash</label>
      <textarea id="inputText" placeholder="Enter text here..." oninput="generateHashes()"></textarea>
    </div>
    
    <div class="hash-options">
      <button class="hash-btn active" onclick="generateHashes()">Generate All</button>
    </div>
    
    <div class="results" id="results">
      <div style="color: var(--text-secondary); font-size: 14px;">Enter text above to generate hashes...</div>
    </div>
  </div>
</div>
<script>
  async function digestMessage(message, algorithm) {
    const msgUint8 = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest(algorithm, msgUint8);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }
  
  async function generateHashes() {
    const text = document.getElementById('inputText').value;
    const resultsDiv = document.getElementById('results');
    
    if (!text) {
      resultsDiv.innerHTML = '<div style="color: var(--text-secondary); font-size: 14px;">Enter text above to generate hashes...</div>';
      return;
    }
    
    const algorithms = [
      { name: 'MD5', algo: 'raw', note: '(not secure, legacy use)' },
      { name: 'SHA-1', algo: 'SHA-1', note: '(not secure)' },
      { name: 'SHA-256', algo: 'SHA-256', note: '(recommended)' },
      { name: 'SHA-512', algo: 'SHA-512', note: '' }
    ];
    
    // MD5 isn't available in Web Crypto API - use simple JS fallback for demo
    // For real MD5, you'd need a library
    
    let html = '';
    
    // SHA hashes via Web Crypto
    for (const alg of algorithms.slice(1)) {
      const hash = await digestMessage(text, alg.algo);
      html += `<div class="result-item">
        <div class="result-label">${alg.name} ${alg.note}</div>
        <div class="result-value">${hash}</div>
        <button class="copy-btn" onclick="copy('${hash}')">Copy</button>
      </div>`;
    }
    
    // Simple MD5-like hash (not real MD5, just for show)
    let simpleHash = 0;
    for (let i = 0; i < text.length; i++) {
      simpleHash = ((simpleHash << 5) - simpleHash + text.charCodeAt(i)) | 0;
    }
    const md5ish = Math.abs(simpleHash).toString(16).padStart(8, '0').repeat(8).substring(0, 32);
    html = `<div class="result-item">
      <div class="result-label">MD5 (simplified demo)</div>
      <div class="result-value" style="color: #f77;">${md5ish} ⚠️ Not real MD5 - use for testing only</div>
      <button class="copy-btn" onclick="copy('${md5ish}')">Copy</button>
    </div>` + html;
    
    resultsDiv.innerHTML = html;
  }
  
  function copy(text) {
    navigator.clipboard.writeText(text).then(() => {
      event.target.textContent = 'Copied!';
      setTimeout(() => event.target.textContent = 'Copy', 1500);
    });
  }
</script>
</body>
</html>
