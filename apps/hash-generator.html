<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator — Shadow's Garden</title>
<meta name="description" content="Generate MD5, SHA-1, SHA-256, and SHA-512 hashes instantly. All client-side, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; }
  .container { max-width: 800px; }
  .input-group { margin-bottom: 24px; }
  label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-family: 'Fira Code', monospace;
    font-size: 14px;
    resize: vertical;
    background: var(--surface);
    color: var(--text);
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .hash-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }
  .hash-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .hash-card h3 {
    margin: 0 0 8px 0;
    font-size: 14px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .hash-value {
    font-family: 'Fira Code', monospace;
    font-size: 12px;
    word-break: break-all;
    color: var(--text);
    background: var(--bg);
    padding: 8px;
    border-radius: 4px;
    min-height: 20px;
    cursor: pointer;
  }
  .hash-value:hover { background: var(--border); }
  .hash-value.copied { color: #4ade80; }
  .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  button {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .empty-state { color: var(--text-dim); font-style: italic; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Hash Generator</h1>
    <p style="color: var(--text-dim); margin-bottom: 24px;">Generate cryptographic hashes instantly. All processing happens in your browser — nothing is sent to any server.</p>
    
    <div class="input-group">
      <label for="input">Enter text to hash:</label>
      <textarea id="input" placeholder="Type or paste text here..."></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="generateBtn">Generate Hashes</button>
      <button class="btn-secondary" id="clearBtn">Clear</button>
      <button class="btn-secondary" id="sampleBtn">Load Sample Text</button>
    </div>

    <div class="hash-grid" id="results" style="display: none;">
      <div class="hash-card">
        <h3>MD5</h3>
        <div class="hash-value" data-algo="MD5" title="Click to copy"></div>
      </div>
      <div class="hash-card">
        <h3>SHA-1</h3>
        <div class="hash-value" data-algo="SHA-1" title="Click to copy"></div>
      </div>
      <div class="hash-card">
        <h3>SHA-256</h3>
        <div class="hash-value" data-algo="SHA-256" title="Click to copy"></div>
      </div>
      <div class="hash-card">
        <h3>SHA-512</h3>
        <div class="hash-value" data-algo="SHA-512" title="Click to copy"></div>
      </div>
    </div>

    <p class="empty-state" id="emptyState">Hashes will appear here</p>
  </div>

  <script>
    const input = document.getElementById('input');
    const results = document.getElementById('results');
    const emptyState = document.getElementById('emptyState');
    const hashValues = document.querySelectorAll('.hash-value');

    async function generateHashes(text, algo) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest(algo, data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function generateAll() {
      const text = input.value;
      if (!text) return;

      results.style.display = 'grid';
      emptyState.style.display = 'none';

      const algos = ['MD5', 'SHA-1', 'SHA-256', 'SHA-512'];
      
      for (const algo of algos) {
        const hash = await generateHashes(text, algo);
        const el = document.querySelector(`[data-algo="${algo}"]`);
        el.textContent = hash;
        el.dataset.hash = hash;
      }
    }

    function copyHash(el) {
      const hash = el.dataset.hash;
      if (!hash) return;
      
      navigator.clipboard.writeText(hash).then(() => {
        el.classList.add('copied');
        el.textContent = 'Copied!';
        setTimeout(() => {
          el.classList.remove('copied');
          el.textContent = hash;
        }, 1000);
      });
    }

    document.getElementById('generateBtn').addEventListener('click', generateAll);
    document.getElementById('clearBtn').addEventListener('click', () => {
      input.value = '';
      results.style.display = 'none';
      emptyState.style.display = 'block';
      hashValues.forEach(el => {
        el.textContent = '';
        el.dataset.hash = '';
      });
    });
    document.getElementById('sampleBtn').addEventListener('click', () => {
      input.value = 'The quick brown fox jumps over the lazy dog';
      generateAll();
    });

    hashValues.forEach(el => {
      el.addEventListener('click', () => copyHash(el));
    });

    input.addEventListener('input', () => {
      if (input.value.length > 0) {
        generateAll();
      } else {
        results.style.display = 'none';
        emptyState.style.display = 'block';
      }
    });
  </script>
</body>
</html>
