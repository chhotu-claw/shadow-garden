<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator — Shadow's Garden</title>
<meta name="description" content="Generate SHA-1, SHA-256, SHA-512 hashes locally in your browser. Nothing leaves your device.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 2rem; max-width: 800px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .description { color: #888; margin-bottom: 2rem; }
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
  textarea, input[type="text"] {
    width: 100%;
    padding: 0.75rem;
    background: #141414;
    border: 1px solid #333;
    border-radius: 6px;
    color: #e5e5e5;
    font-family: monospace;
    font-size: 0.95rem;
  }
  textarea { min-height: 100px; resize: vertical; }
  .hash-output { margin-top: 1.5rem; }
  .hash-row {
    display: flex;
    align-items: center;
    margin-bottom: 0.75rem;
    background: #141414;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 0.75rem;
  }
  .hash-label {
    min-width: 80px;
    font-weight: 600;
    color: #7aa2f7;
    font-size: 0.85rem;
  }
  .hash-value {
    flex: 1;
    font-family: monospace;
    font-size: 0.8rem;
    color: #888;
    word-break: break-all;
    margin-right: 0.5rem;
  }
  .copy-btn {
    background: #222;
    border: none;
    color: #e5e5e5;
    padding: 0.4rem 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
  }
  .copy-btn:hover { background: #333; }
  .file-input-wrapper { margin-bottom: 1.5rem; }
  .file-input-wrapper input[type="file"] {
    display: none;
  }
  .file-label {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    background: #1a1a2e;
    color: #7aa2f7;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .file-label:hover { background: #222; }
  .file-info { margin-top: 0.5rem; font-size: 0.85rem; color: #666; }
  .mode-toggle { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
  .mode-btn {
    padding: 0.5rem 1rem;
    background: #141414;
    border: 1px solid #333;
    color: #888;
    border-radius: 4px;
    cursor: pointer;
  }
  .mode-btn.active {
    background: #1a1a2e;
    border-color: #7aa2f7;
    color: #7aa2f7;
  }
</style>
</head>
<body data-page-type="app">
  <h1>Hash Generator</h1>
  <p class="description">Generate SHA-1, SHA-256, SHA-512 hashes locally. Nothing leaves your device.</p>

  <div class="mode-toggle">
    <button class="mode-btn active" id="text-btn" onclick="setMode('text')">Text</button>
    <button class="mode-btn" id="file-btn" onclick="setMode('file')">File</button>
  </div>

  <div id="text-mode">
    <div class="input-group">
      <label>Enter text to hash:</label>
      <textarea id="text-input" placeholder="Type or paste text here..."></textarea>
    </div>
  </div>

  <div id="file-mode" style="display: none;">
    <div class="file-input-wrapper">
      <label for="file-input">
        <span class="file-label">Choose File</span>
      </label>
      <input type="file" id="file-input">
      <p class="file-info" id="file-info"></p>
    </div>
  </div>

  <div class="hash-output" id="output"></div>

  <script>
    let currentMode = 'text';

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('text-btn').classList.toggle('active', mode === 'text');
      document.getElementById('file-btn').classList.toggle('active', mode === 'file');
      document.getElementById('text-mode').style.display = mode === 'text' ? 'block' : 'none';
      document.getElementById('file-mode').style.display = mode === 'file' ? 'block' : 'none';
      document.getElementById('output').innerHTML = '';
      if (mode === 'file' && document.getElementById('file-input').files.length) {
        computeFileHash();
      }
    }

    async function digestMessage(message, algorithm) {
      const msgUint8 = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest(algorithm, msgUint8);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function computeTextHash() {
      const text = document.getElementById('text-input').value;
      if (!text) {
        document.getElementById('output').innerHTML = '';
        return;
      }
      const [sha1, sha256, sha512] = await Promise.all([
        digestMessage(text, 'SHA-1'),
        digestMessage(text, 'SHA-256'),
        digestMessage(text, 'SHA-512')
      ]);
      renderHashes([sha1, sha256, sha512]);
    }

    async function computeFileHash() {
      const fileInput = document.getElementById('file-input');
      if (!fileInput.files.length) return;
      
      const file = fileInput.files[0];
      document.getElementById('file-info').textContent = `${file.name} (${formatBytes(file.size)})`;
      
      const arrayBuffer = await file.arrayBuffer();
      const [sha1, sha256, sha512] = await Promise.all([
        crypto.subtle.digest('SHA-1', arrayBuffer).then(buf => arrayToHex(buf)),
        crypto.subtle.digest('SHA-256', arrayBuffer).then(buf => arrayToHex(buf)),
        crypto.subtle.digest('SHA-512', arrayBuffer).then(buf => arrayToHex(buf))
      ]);
      renderHashes([sha1, sha256, sha512]);
    }

    function arrayToHex(buffer) {
      return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function renderHashes(hashes) {
      const labels = ['SHA-1', 'SHA-256', 'SHA-512'];
      document.getElementById('output').innerHTML = hashes.map((h, i) => `
        <div class="hash-row">
          <span class="hash-label">${labels[i]}</span>
          <span class="hash-value">${h}</span>
          <button class="copy-btn" onclick="navigator.clipboard.writeText('${h}')">Copy</button>
        </div>
      `).join('');
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    document.getElementById('text-input').addEventListener('input', computeTextHash);
    document.getElementById('file-input').addEventListener('change', computeFileHash);
  </script>
</body>
</html>
