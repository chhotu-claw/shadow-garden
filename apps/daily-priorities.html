<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Priorities — Shadow's Garden</title>
<meta name="description" content="Set 3 priorities for today, track them, see your streak.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --success: #3fb950;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
  }
  .date {
    color: var(--muted);
    font-size: 0.875rem;
    margin-bottom: 2rem;
  }
  .priority-form {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .priority-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.75rem 1rem;
    font-family: inherit;
    font-size: 0.9rem;
    border-radius: 6px;
  }
  .priority-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .add-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.75rem 1.25rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
  }
  .add-btn:hover {
    opacity: 0.9;
  }
  .priorities-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .priority-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 1rem;
    margin-bottom: 0.5rem;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .priority-item.completed {
    opacity: 0.5;
    text-decoration: line-through;
  }
  .priority-item.completed .check {
    background: var(--success);
    border-color: var(--success);
  }
  .check {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .check:hover {
    border-color: var(--accent);
  }
  .check::after {
    content: '✓';
    color: var(--bg);
    font-size: 12px;
    display: none;
  }
  .priority-item.completed .check::after {
    display: block;
  }
  .priority-text {
    flex: 1;
  }
  .delete-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 0.25rem;
    font-size: 1.2rem;
    line-height: 1;
  }
  .delete-btn:hover {
    color: #f85149;
  }
  .streak {
    margin-top: 2rem;
    padding: 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    text-align: center;
  }
  .streak-number {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
  }
  .streak-label {
    color: var(--muted);
    font-size: 0.875rem;
  }
  .history {
    margin-top: 2rem;
  }
  .history h2 {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.875rem;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 2rem;
  }
  .completed-count {
    color: var(--success);
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Today's Priorities</h1>
    <div class="date" id="currentDate"></div>
    
    <form class="priority-form" id="priorityForm">
      <input type="text" class="priority-input" id="priorityInput" placeholder="What's important today?" maxlength="100" required>
      <button type="submit" class="add-btn">Add</button>
    </form>
    
    <ul class="priorities-list" id="prioritiesList"></ul>
    
    <div class="streak">
      <div class="streak-number" id="streakCount">0</div>
      <div class="streak-label">day streak</div>
    </div>
    
    <div class="history">
      <h2>Recent Days</h2>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'daily-priorities';
    const HISTORY_KEY = 'priority-history';
    
    function getToday() {
      return new Date().toISOString().split('T')[0];
    }
    
    function loadPriorities() {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }
    
    function savePriorities(priorities) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(priorities));
    }
    
    function loadHistory() {
      const data = localStorage.getItem(HISTORY_KEY);
      return data ? JSON.parse(data) : {};
    }
    
    function saveHistory(history) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }
    
    function render() {
      const priorities = loadPriorities();
      const list = document.getElementById('prioritiesList');
      const input = document.getElementById('priorityInput');
      
      list.innerHTML = '';
      
      if (priorities.length === 0) {
        list.innerHTML = '<div class="empty">No priorities set. Add one above.</div>';
      }
      
      priorities.forEach((p, i) => {
        const li = document.createElement('li');
        li.className = 'priority-item' + (p.completed ? ' completed' : '');
        li.innerHTML = `
          <div class="check" onclick="toggleComplete(${i})"></div>
          <span class="priority-text">${escapeHtml(p.text)}</span>
          <button class="delete-btn" onclick="deletePriority(${i})">×</button>
        `;
        list.appendChild(li);
      });
      
      input.value = '';
      updateStreak();
      renderHistory();
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function addPriority(text) {
      const priorities = loadPriorities();
      priorities.push({ text, completed: false });
      savePriorities(priorities);
      render();
    }
    
    function toggleComplete(index) {
      const priorities = loadPriorities();
      priorities[index].completed = !priorities[index].completed;
      savePriorities(priorities);
      render();
    }
    
    function deletePriority(index) {
      const priorities = loadPriorities();
      priorities.splice(index, 1);
      savePriorities(priorities);
      render();
    }
    
    function updateStreak() {
      const history = loadHistory();
      const today = getToday();
      let streak = 0;
      let checkDate = new Date();
      
      while (true) {
        const dateStr = checkDate.toISOString().split('T')[0];
        const dayData = history[dateStr];
        
        if (dayData && dayData.completed >= 3) {
          streak++;
          checkDate.setDate(checkDate.getDate() - 1);
        } else if (dateStr === today) {
          checkDate.setDate(checkDate.getDate() - 1);
        } else {
          break;
        }
      }
      
      document.getElementById('streakCount').textContent = streak;
    }
    
    function renderHistory() {
      const history = loadHistory();
      const list = document.getElementById('historyList');
      const dates = Object.keys(history).sort().reverse().slice(0, 7);
      
      if (dates.length === 0) {
        list.innerHTML = '<div class="empty">No history yet</div>';
        return;
      }
      
      list.innerHTML = dates.map(date => {
        const day = history[date];
        const prettyDate = new Date(date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        return `
          <div class="history-item">
            <span>${prettyDate}</span>
            <span class="completed-count">${day.completed || 0}/3 done</span>
          </div>
        `;
      }).join('');
    }
    
    function saveTodayProgress() {
      const today = getToday();
      const priorities = loadPriorities();
      const completed = priorities.filter(p => p.completed).length;
      
      const history = loadHistory();
      history[today] = { completed };
      saveHistory(history);
    }
    
    document.getElementById('priorityForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const input = document.getElementById('priorityInput');
      if (input.value.trim()) {
        addPriority(input.value.trim());
      }
    });
    
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { 
      weekday: 'long', 
      year: 'numeric', 
      month: 'long', 
      day: 'numeric' 
    });
    
    setInterval(saveTodayProgress, 30000);
    render();
  </script>
</body>
</html>
