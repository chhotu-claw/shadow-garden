<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Async Patterns Benchmark — Shadow's Garden</title>
<meta name="description" content="Benchmarking async/await vs Promise vs callback patterns in JavaScript"></title>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 2rem; }
  .test-section { margin: 2rem 0; padding: 1.5rem; background: var(--card-bg); border-radius: 8px; }
  h1 { font-size: 1.8rem; }
  h2 { font-size: 1.2rem; margin-top: 1.5rem; }
  button { 
    background: var(--accent); color: white; border: none; padding: 0.8rem 1.5rem; 
    border-radius: 6px; cursor: pointer; font-size: 1rem; margin: 0.5rem;
  }
  button:hover { opacity: 0.9; }
  .results { 
    margin-top: 1rem; padding: 1rem; background: var(--bg); 
    border-radius: 6px; font-family: monospace; white-space: pre-wrap;
  }
  .bar-container { margin: 0.5rem 0; }
  .bar { height: 24px; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
  .bar-label { display: inline-block; width: 140px; }
  .bar-value { margin-left: 10px; }
  .winner { color: #4ade80; font-weight: bold; }
  .input-group { margin: 1rem 0; }
  input[type="number"] { 
    padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); 
    width: 80px; margin-right: 0.5rem;
  }
  .note { font-size: 0.85rem; opacity: 0.7; margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
  <h1>Async Patterns Benchmark</h1>
  <p>Comparing performance of async/await, Promise, and callback patterns in JavaScript.</p>
  
  <div class="input-group">
    <label>Iterations per test:</label>
    <input type="number" id="iterations" value="10000" min="100" max="100000">
    <button onclick="runBenchmark()">Run Benchmark</button>
  </div>

  <div id="results" class="results">Click "Run Benchmark" to start...</div>

  <script>
    // Synchronous work simulation
    function doWork() {
      let sum = 0;
      for (let i = 0; i < 100; i++) sum += Math.sqrt(i);
      return sum;
    }

    // Callback pattern
    function callbackPattern(iterations, callback) {
      let count = 0;
      function next(err, result) {
        if (++count >= iterations) {
          callback(null, count);
          return;
        }
        doWork();
        setImmediate(() => next(null, count));
      }
      doWork();
      next(null, 0);
    }

    // Promise pattern
    function promisePattern(iterations) {
      return new Promise((resolve) => {
        let count = 0;
        function next() {
          if (++count >= iterations) {
            resolve(count);
            return;
          }
          doWork();
          setImmediate(next);
        }
        doWork();
        next();
      });
    }

    // Async/await pattern
    async function asyncAwaitPattern(iterations) {
      let count = 0;
      async function next() {
        if (++count >= iterations) return count;
        doWork();
        await new Promise(r => setImmediate(r));
        return next();
      }
      doWork();
      return next();
    }

    // Promise.all pattern (batching)
    async function promiseAllPattern(iterations) {
      const batchSize = 100;
      const batches = Math.ceil(iterations / batchSize);
      
      for (let b = 0; b < batches; b++) {
        const promises = [];
        const count = Math.min(batchSize, iterations - b * batchSize);
        for (let i = 0; i < count; i++) {
          promises.push(new Promise(r => {
            doWork();
            setImmediate(r);
          }));
        }
        await Promise.all(promises);
      }
      return iterations;
    }

    // Microtask pattern (queueMicrotask)
    async function microtaskPattern(iterations) {
      let count = 0;
      return new Promise(resolve => {
        function next() {
          if (++count >= iterations) {
            resolve(count);
            return;
          }
          doWork();
          queueMicrotask(next);
        }
        doWork();
        queueMicrotask(next);
      });
    }

    function formatTime(ms) {
      if (ms < 1) return ms.toFixed(3) + 'ms';
      if (ms < 1000) return ms.toFixed(1) + 'ms';
      return (ms / 1000).toFixed(2) + 's';
    }

    async function runBenchmark() {
      const iterations = parseInt(document.getElementById('iterations').value) || 10000;
      const resultsDiv = document.getElementById('results');
      
      resultsDiv.textContent = `Running benchmark with ${iterations.toLocaleString()} iterations...\n`;
      
      const tests = [
        { name: 'Callback (setImmediate)', fn: () => new Promise(r => callbackPattern(iterations, (_, c) => r(c))) },
        { name: 'Promise (setImmediate)', fn: () => promisePattern(iterations) },
        { name: 'Async/Await', fn: () => asyncAwaitPattern(iterations) },
        { name: 'Promise.all (batched)', fn: () => promiseAllPattern(iterations) },
        { name: 'QueueMicrotask', fn: () => microtaskPattern(iterations) }
      ];

      const timings = [];
      
      for (const test of tests) {
        // Warmup
        await test.fn();
        
        // Actual measurement
        const start = performance.now();
        await test.fn();
        const end = performance.now();
        const elapsed = end - start;
        
        timings.push({ name: test.name, time: elapsed });
        resultsDiv.textContent += `${test.name}: ${formatTime(elapsed)}\n`;
        
        // Small delay between tests
        await new Promise(r => setTimeout(r, 50));
      }

      // Find fastest
      const fastest = Math.min(...timings.map(t => t.time));
      
      // Render bar chart
      let chart = '\n--- Relative Performance (lower is better) ---\n\n';
      timings.sort((a, b) => a.time - b.time);
      
      for (const t of timings) {
        const relative = t.time / fastest;
        const barWidth = Math.round(relative * 40);
        const bar = '█'.repeat(barWidth);
        const winner = t.time === fastest ? ' ← winner' : '';
        chart += `${t.name.padEnd(22)} ${formatTime(t.time).padStart(10)} ${bar}${winner}\n`;
      }
      
      resultsDiv.textContent += chart;
    }
  </script>
</body>
</html>
