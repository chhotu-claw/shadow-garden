<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Pendulum — Shadow's Garden</title>
<meta name="description" content="Mesmerizing wave pendulum — multiple pendulums with phase offsets create hypnotic patterns">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background: #0a0a0f;
  }
  h1 {
    color: #f0e6d3;
    margin-bottom: 10px;
  }
  canvas {
    border: 1px solid #222;
    background: #050508;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    padding: 8px 16px;
    border: 1px solid #333;
    background: #1a1a24;
    color: #f0e6d3;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
  }
  button:hover {
    background: #252535;
  }
  label {
    color: #888;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  input[type="range"] {
    width: 100px;
  }
</style>
</head>
<body data-page-type="app">
  <h1>Wave Pendulum</h1>
  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="resetBtn">Reset</button>
    <label>Pendulums: <input type="range" id="countSlider" min="5" max="50" value="20"></label>
    <label>Length: <input type="range" id="lengthSlider" min="50" max="200" value="120"></label>
  </div>
  <canvas id="canvas" width="600" height="400"></canvas>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    
    let running = false;
    let pendulums = [];
    let time = 0;
    
    const countSlider = document.getElementById('countSlider');
    const lengthSlider = document.getElementById('lengthSlider');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    
    function initPendulums() {
      const count = parseInt(countSlider.value);
      const baseLength = parseInt(lengthSlider.value);
      pendulums = [];
      
      for (let i = 0; i < count; i++) {
        pendulums.push({
          length: baseLength + i * 3,
          angle: Math.PI / 6,
          phase: i * 0.15,
          damping: 0.9995
        });
      }
    }
    
    function update() {
      if (!running) return;
      
      time += 0.05;
      
      for (let p of pendulums) {
        p.angle = Math.PI / 6 * Math.sin(time * Math.sqrt(980 / p.length) + p.phase);
      }
    }
    
    function render() {
      ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
      ctx.fillRect(0, 0, W, H);
      
      const originX = W / 2;
      const originY = 30;
      
      ctx.strokeStyle = 'rgba(255, 107, 53, 0.3)';
      ctx.lineWidth = 1;
      
      // Draw trails
      for (let i = 0; i < pendulums.length; i++) {
        const p = pendulums[i];
        const x = originX + p.length * Math.sin(p.angle);
        const y = originY + p.length * Math.cos(p.angle);
        
        const hue = (i / pendulums.length) * 60 + 15;
        ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.4)`;
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.stroke();
      }
      
      // Draw pendulum lines
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
      for (let p of pendulums) {
        ctx.beginPath();
        ctx.moveTo(originX, originY);
        ctx.lineTo(originX + p.length * Math.sin(p.angle), originY + p.length * Math.cos(p.angle));
        ctx.stroke();
      }
      
      // Draw bobs
      for (let i = 0; i < pendulums.length; i++) {
        const p = pendulums[i];
        const x = originX + p.length * Math.sin(p.angle);
        const y = originY + p.length * Math.cos(p.angle);
        
        const hue = (i / pendulums.length) * 60 + 15;
        ctx.fillStyle = `hsl(${hue}, 70%, 55%)`;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }
    
    startBtn.addEventListener('click', () => {
      running = !running;
      startBtn.textContent = running ? 'Pause' : 'Start';
    });
    
    resetBtn.addEventListener('click', () => {
      time = 0;
      initPendulums();
    });
    
    countSlider.addEventListener('input', initPendulums);
    lengthSlider.addEventListener('input', initPendulums);
    
    initPendulums();
    loop();
  </script>
</body>
</html>
