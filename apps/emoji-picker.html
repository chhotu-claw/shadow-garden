<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Picker — Shadow's Garden</title>
<meta name="description" content="Search emojis by name, browse by category, one-click copy to clipboard.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 20px; max-width: 900px; margin: 0 auto; }
  .search-box { width: 100%; padding: 14px 18px; font-size: 18px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); margin-bottom: 20px; box-sizing: border-box; }
  .search-box:focus { outline: none; border-color: var(--accent); }
  .categories { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .cat-btn { padding: 8px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); color: var(--text); cursor: pointer; font-size: 14px; transition: all 0.15s; }
  .cat-btn:hover { border-color: var(--accent); }
  .cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; max-height: 60vh; overflow-y: auto; padding: 4px; }
  .emoji-item { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; border-radius: 8px; transition: all 0.1s; position: relative; }
  .emoji-item:hover { background: var(--border); transform: scale(1.15); }
  .emoji-item:active { transform: scale(0.95); }
  .emoji-item .tooltip { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--bg-secondary); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 10; }
  .emoji-item:hover .tooltip { opacity: 1; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: all 0.3s; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .count { color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
</style>
</head>

    let activeCat = 'Smileys';
    const search = document.getElementById('search');
    const grid = document.getElementById('grid');
    const cats = document.getElementById('cats');
    const count = document.getElementById('count');
    const toast = document.getElementById('toast');

    // Build category buttons
    Object.keys(categories).forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (cat === activeCat ? ' active' : '');
      btn.textContent = cat;
      btn.onclick = () => { activeCat = cat; render(); };
      cats.appendChild(btn);
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function copyEmoji(e) {
      const emoji = e.target.dataset.emoji;
      navigator.clipboard.writeText(emoji).then(() => {
        showToast('Copied ' + emoji);
      });
    }

    function render() {
      const query = search.value.toLowerCase().trim();
      let emojis = [];
      
      document.querySelectorAll('.cat-btn').forEach((btn, i) => {
        btn.classList.toggle('active', Object.keys(categories)[i] === activeCat);
      });

      if (query) {
        // Search across all categories
        Object.entries(categories).forEach(([cat, list]) => {
          list.forEach(emoji => {
            emojis.push({ emoji, cat });
          });
        });
        // Simple filter - recategorize emojis and search names
        const allEmojis = Object.values(categories).flat();
        emojis = allEmojis.filter(e => e.includes(query));
        count.textContent = emojis.length + ' emojis found';
      } else {
        emojis = categories[activeCat] || [];
        count.textContent = emojis.length + ' emojis';
      }

      grid.innerHTML = '';
      emojis.forEach(emoji => {
        const div = document.createElement('div');
        div.className = 'emoji-item';
        div.textContent = emoji;
        div.dataset.emoji = emoji;
        div.onclick = copyEmoji;
        
        const tooltip = document.createElement('span');
        tooltip.className = 'tooltip';
        tooltip.textContent = emoji;
        div.appendChild(tooltip);
        
        grid.appendChild(div);
      });
    }

    search.addEventListener('input', render);
    render();
    
    // Keyboard shortcut
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement !== search) {
        e.preventDefault();
        search.focus();
      }
      if (e.key === 'Escape' && document.activeElement === search) {
        search.blur();
        search.value = '';
        render();
      }
    });
  </script>
</body>
