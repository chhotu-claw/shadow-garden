<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waveform Synthesizer — Shadow's Garden</title>
<meta name="description" content="Draw audio waveforms and hear them play back. Interactive sound synthesis with visual feedback.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; background: var(--bg, #0a0a0f); }
  .synth-container { width: 100%; max-width: 800px; }
  h1 { text-align: center; margin-bottom: 0.5rem; }
  .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2rem; }
  canvas { display: block; width: 100%; height: 200px; background: var(--card-bg, #12121a); border-radius: 12px; cursor: crosshair; border: 1px solid var(--border, #2a2a3a); }
  .controls { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; justify-content: center; }
  .btn { padding: 0.75rem 1.5rem; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--accent, #646cff); color: white; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--border, #333); color: var(--text, #eee); }
  .btn-secondary:hover { border-color: var(--accent); }
  .slider-group { display: flex; flex-direction: column; gap: 0.5rem; }
  .slider-group label { font-size: 0.85rem; color: var(--text-muted); }
  input[type="range"] { width: 150px; accent-color: var(--accent, #646cff); }
  .waveforms { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem; }
  .wave-btn { padding: 0.5rem 1rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
  .wave-btn:hover { border-color: var(--accent); }
  .wave-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .visualizer { margin-top: 1.5rem; height: 80px; background: var(--card-bg); border-radius: 8px; overflow: hidden; }
  .info { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted); }
</style>
</head>
<body data-page-type="app">
  <div class="synth-container">
    <h1>🎵 Waveform Synthesizer</h1>
    <div class="subtitle">Draw your own sound — click and drag on the canvas to create a waveform</div>
    
    <canvas id="waveCanvas" width="800" height="200"></canvas>
    
    <div class="controls">
      <button class="btn btn-primary" id="playBtn">▶ Play</button>
      <button class="btn btn-secondary" id="stopBtn">■ Stop</button>
      <button class="btn btn-secondary" id="clearBtn">Clear</button>
      <button class="btn btn-secondary" id="randomBtn">Random</button>
      
      <div class="slider-group">
        <label>Frequency: <span id="freqVal">440</span>Hz</label>
        <input type="range" id="freqSlider" min="50" max="2000" value="440">
      </div>
      
      <div class="slider-group">
        <label>Volume: <span id="volVal">50</span>%</label>
        <input type="range" id="volSlider" min="0" max="100" value="50">
      </div>
    </div>
    
    <div class="waveforms">
      <button class="wave-btn" data-type="sine">Sine</button>
      <button class="wave-btn" data-type="square">Square</button>
      <button class="wave-btn" data-type="sawtooth">Sawtooth</button>
      <button class="wave-btn" data-type="triangle">Triangle</button>
      <button class="wave-btn active" data-type="custom">Custom (drawn)</button>
    </div>
    
    <canvas id="vizCanvas" class="visualizer"></canvas>
    
    <div class="info">Click and drag on the canvas to draw your own waveform</div>
  </div>
  
  <script>
    const waveCanvas = document.getElementById('waveCanvas');
    const waveCtx = waveCanvas.getContext('2d');
    const vizCanvas = document.getElementById('vizCanvas');
    const vizCtx = vizCanvas.getContext('2d');
    
    let audioCtx = null;
    let oscillator = null;
    let gainNode = null;
    let analyser = null;
    let animationId = null;
    let isPlaying = false;
    let isDrawing = false;
    let customWaveform = null;
    let currentWaveType = 'custom';
    
    const waveformData = new Float32Array(4096);
    
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
      }
    }
    
    function drawWaveform() {
      waveCtx.fillStyle = '#12121a';
      waveCtx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);
      
      waveCtx.strokeStyle = '#646cff';
      waveCtx.lineWidth = 2;
      waveCtx.beginPath();
      
      const data = customWaveform || waveformData;
      const step = waveCanvas.width / data.length;
      
      for (let i = 0; i < data.length; i++) {
        const x = i * step;
        const y = (data[i] + 1) * (waveCanvas.height / 2);
        if (i === 0) waveCtx.moveTo(x, y);
        else waveCtx.lineTo(x, y);
      }
      waveCtx.stroke();
      
      // Grid lines
      waveCtx.strokeStyle = '#2a2a3a';
      waveCtx.lineWidth = 1;
      waveCtx.beginPath();
      waveCtx.moveTo(0, waveCanvas.height / 2);
      waveCtx.lineTo(waveCanvas.width, waveCanvas.height / 2);
      waveCtx.stroke();
    }
    
    function initCustomWaveform() {
      customWaveform = new Float32Array(4096);
      for (let i = 0; i < 4096; i++) {
        customWaveform[i] = Math.sin(i / 20) * 0.5;
      }
    }
    
    function drawViz() {
      if (!analyser) return;
      
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      analyser.getByteTimeDomainData(dataArray);
      
      vizCtx.fillStyle = '#12121a';
      vizCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);
      
      vizCtx.lineWidth = 2;
      vizCtx.strokeStyle = '#646cff';
      vizCtx.beginPath();
      
      const sliceWidth = vizCanvas.width / bufferLength;
      let x = 0;
      
      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        const y = v * (vizCanvas.height / 2);
        
        if (i === 0) vizCtx.moveTo(x, y);
        else vizCtx.lineTo(x, y);
        
        x += sliceWidth;
      }
      
      vizCtx.lineTo(vizCanvas.width, vizCanvas.height / 2);
      vizCtx.stroke();
      
      if (isPlaying) {
        animationId = requestAnimationFrame(drawViz);
      }
    }
    
    function play() {
      initAudio();
      
      if (oscillator) {
        oscillator.stop();
        oscillator.disconnect();
      }
      
      oscillator = audioCtx.createOscillator();
      gainNode = audioCtx.createGain();
      
      const freq = parseInt(document.getElementById('freqSlider').value);
      const vol = parseInt(document.getElementById('volSlider').value) / 100;
      
      oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
      
      if (currentWaveType === 'custom' && customWaveform) {
        oscillator.setCustomWaveform(customWaveform);
      } else {
        oscillator.type = currentWaveType;
      }
      
      gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
      
      oscillator.connect(gainNode);
      gainNode.connect(analyser);
      analyser.connect(audioCtx.destination);
      
      oscillator.start();
      isPlaying = true;
      drawViz();
    }
    
    function stop() {
      if (oscillator) {
        oscillator.stop();
        oscillator.disconnect();
        oscillator = null;
      }
      isPlaying = false;
      if (animationId) {
        cancelAnimationFrame(animationId);
      }
      
      // Clear viz
      vizCtx.fillStyle = '#12121a';
      vizCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);
    }
    
    // Drawing on canvas
    waveCanvas.addEventListener('mousedown', (e) => {
      isDrawing = true;
      updateWaveform(e);
    });
    
    waveCanvas.addEventListener('mousemove', (e) => {
      if (isDrawing) updateWaveform(e);
    });
    
    waveCanvas.addEventListener('mouseup', () => isDrawing = false);
    waveCanvas.addEventListener('mouseleave', () => isDrawing = false);
    
    function updateWaveform(e) {
      const rect = waveCanvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (waveCanvas.width / rect.width);
      const y = (e.clientY - rect.top) * (waveCanvas.height / rect.height);
      
      // Convert to -1 to 1 range
      const value = 1 - (y / waveCanvas.height) * 2;
      
      const index = Math.floor((x / waveCanvas.width) * customWaveform.length);
      if (index >= 0 && index < customWaveform.length) {
        customWaveform[index] = value;
        drawWaveform();
      }
    }
    
    // Controls
    document.getElementById('playBtn').addEventListener('click', play);
    document.getElementById('stopBtn').addEventListener('click', stop);
    
    document.getElementById('clearBtn').addEventListener('click', () => {
      initCustomWaveform();
      drawWaveform();
    });
    
    document.getElementById('randomBtn').addEventListener('click', () => {
      for (let i = 0; i < customWaveform.length; i++) {
        customWaveform[i] = (Math.random() * 2 - 1) * Math.exp(-i / 500);
      }
      drawWaveform();
    });
    
    document.getElementById('freqSlider').addEventListener('input', (e) => {
      document.getElementById('freqVal').textContent = e.target.value;
      if (oscillator && isPlaying) {
        oscillator.frequency.setValueAtTime(parseInt(e.target.value), audioCtx.currentTime);
      }
    });
    
    document.getElementById('volSlider').addEventListener('input', (e) => {
      document.getElementById('volVal').textContent = e.target.value;
      if (gainNode && isPlaying) {
        gainNode.gain.setValueAtTime(parseInt(e.target.value) / 100, audioCtx.currentTime);
      }
    });
    
    // Waveform type buttons
    document.querySelectorAll('.wave-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.wave-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentWaveType = btn.dataset.type;
      });
    });
    
    // Initialize
    initCustomWaveform();
    drawWaveform();
  </script>
</body>
</html>
