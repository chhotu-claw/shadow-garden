<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor — Shadow's Garden</title>
<meta name="description" content="A clean markdown editor with live preview, auto-save, and formatting toolbar. Everything stays in your browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .editor-container { display: flex; gap: 1rem; height: calc(100vh - 180px); margin-top: 1rem; }
  .editor-pane, .preview-pane { flex: 1; display: flex; flex-direction: column; }
  .editor-pane textarea { flex: 1; background: #141414; border: 1px solid #333; border-radius: 8px; color: #e5e5e5; padding: 1rem; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.9rem; resize: none; line-height: 1.6; }
  .preview-pane { background: #141414; border: 1px solid #333; border-radius: 8px; padding: 1rem; overflow-y: auto; }
  .preview-pane h1, .preview-pane h2, .preview-pane h3 { color: #7aa2f7; margin: 1rem 0 0.5rem; }
  .preview-pane h1:first-child { margin-top: 0; }
  .preview-pane p { margin: 0.5rem 0; }
  .preview-pane code { background: #1a1a1a; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; }
  .preview-pane pre { background: #1a1a1a; padding: 1rem; border-radius: 8px; overflow-x: auto; }
  .preview-pane pre code { padding: 0; }
  .preview-pane ul, .preview-pane ol { margin: 0.5rem 0; padding-left: 1.5rem; }
  .preview-pane li { margin: 0.25rem 0; }
  .preview-pane blockquote { border-left: 3px solid #444; padding-left: 1rem; color: #888; margin: 0.5rem 0; }
  .preview-pane a { color: #6cb6ff; }
  .preview-pane hr { border: none; border-top: 1px solid #333; margin: 1rem 0; }
  .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .toolbar button { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
  .toolbar button:hover { background: #252525; color: #e5e5e5; }
  .status { color: #666; font-size: 0.8rem; margin-top: 0.5rem; }
  .toolbar button.active { background: #333; color: #7aa2f7; border-color: #7aa2f7; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Markdown Editor</h1>
  <p style="color:#888;margin-bottom:1rem;">Write in markdown, see it rendered live. Auto-saves to your browser — nothing leaves your device.</p>
  <div class="toolbar">
    <button onclick="insertFormat('**', '**')">Bold</button>
    <button onclick="insertFormat('*', '*')">Italic</button>
    <button onclick="insertFormat('`', '`')">Code</button>
    <button onclick="insertFormat('[', '](url)')">Link</button>
    <button onclick="insertFormat('- ', '')">List</button>
    <button onclick="insertFormat('## ', '')">H2</button>
    <button onclick="insertFormat('### ', '')">H3</button>
    <button onclick="insertFormat('> ', '')">Quote</button>
  </div>
  <div class="editor-container">
    <div class="editor-pane">
      <textarea id="editor" placeholder="Start writing..."></textarea>
      <div class="status" id="status">Saved</div>
    </div>
    <div class="preview-pane" id="preview"></div>
  </div>
</div>
<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const status = document.getElementById('status');
const STORAGE_KEY = 'shadow-markdown-editor';

function parseMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  
  // Code blocks (must be before inline code)
  html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  
  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  
  // Horizontal rule
  html = html.replace(/^---$/gm, '<hr>');
  
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  
  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  
  // Bold and italic
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  
  // Paragraphs (lines that aren't already wrapped)
  html = html.replace(/^(?!<[hupoltcb]|<li>|<ul>|<ol>|<pre|<block|<hr)(.+)$/gm, '<p>$1</p>');
  
  // Clean up empty paragraphs
  html = html.replace(/<p><\/p>/g, '');
  
  // Join multiple blockquotes
  html = html.replace(/<\/blockquote>\s*<blockquote>/g, '<br>');
  
  return html;
}

function updatePreview() {
  preview.innerHTML = parseMarkdown(editor.value);
}

function save() {
  localStorage.setItem(STORAGE_KEY, editor.value);
  status.textContent = 'Saved ' + new Date().toLocaleTimeString();
}

let saveTimeout;
editor.addEventListener('input', () => {
  updatePreview();
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(save, 500);
});

function insertFormat(before, after) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const text = editor.value;
  const selected = text.substring(start, end);
  editor.value = text.substring(0, start) + before + selected + after + text.substring(end);
  editor.focus();
  const newPos = start + before.length + selected.length + after.length;
  editor.setSelectionRange(newPos, newPos);
  updatePreview();
  save();
}

// Load saved content
const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
  editor.value = saved;
} else {
  editor.value = '# Welcome\n\nStart writing in markdown. It auto-saves.\n\n## Features\n- Live preview\n- Auto-save to localStorage\n- Formatting toolbar\n- Everything stays in your browser\n';
}
updatePreview();
</script>
</body>
</html>
