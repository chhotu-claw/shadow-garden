<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Percentage Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate percentages, increases, and decreases instantly. What is X% of Y?">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .calculator-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    margin-top: 1.5rem;
  }
  .calc-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .calc-card h3 {
    margin: 0 0 1rem 0;
    font-size: 1rem;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .input-group {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    align-items: center;
  }
  .input-group input {
    flex: 1;
    min-width: 0;
  }
  .input-group span {
    color: var(--text-secondary);
    font-size: 0.9rem;
    white-space: nowrap;
  }
  .result-display {
    background: var(--bg-tertiary);
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--accent);
    min-height: 3.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .quick-percent {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .quick-percent button {
    padding: 0.4rem 0.8rem;
    font-size: 0.85rem;
  }
  .hero {
    text-align: center;
    padding: 2rem 0;
  }
  .hero h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }
  .hero p {
    color: var(--text-secondary);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="hero">
    <h1>Percentage Calculator</h1>
    <p>Quick percentage calculations for everyday use</p>
  </div>
  
  <div class="calculator-grid">
    <!-- What is X% of Y? -->
    <div class="calc-card">
      <h3>What is <span class="accent">X%</span> of <span class="accent">Y</span>?</h3>
      <div class="quick-percent">
        <button onclick="setPercent1(10)">10%</button>
        <button onclick="setPercent1(15)">15%</button>
        <button onclick="setPercent1(20)">20%</button>
        <button onclick="setPercent1(25)">25%</button>
        <button onclick="setPercent1(50)">50%</button>
      </div>
      <div class="input-group">
        <input type="number" id="pct1-x" placeholder="X" oninput="calc1()">
        <span>% of</span>
        <input type="number" id="pct1-y" placeholder="Y" oninput="calc1()">
      </div>
      <div class="result-display" id="result1">—</div>
    </div>

    <!-- X is what percent of Y? -->
    <div class="calc-card">
      <h3><span class="accent">X</span> is what % of <span class="accent">Y</span>?</h3>
      <div class="input-group">
        <input type="number" id="pct2-x" placeholder="X" oninput="calc2()">
        <span>is what % of</span>
        <input type="number" id="pct2-y" placeholder="Y" oninput="calc2()">
      </div>
      <div class="result-display" id="result2">—</div>
    </div>

    <!-- Percentage increase/decrease -->
    <div class="calc-card">
      <h3>Change from <span class="accent">X</span> to <span class="accent">Y</span></h3>
      <div class="input-group">
        <input type="number" id="pct3-x" placeholder="From X" oninput="calc3()">
        <span>→</span>
        <input type="number" id="pct3-y" placeholder="To Y" oninput="calc3()">
      </div>
      <div class="result-display" id="result3">—</div>
    </div>

    <!-- Reverse percentage: find original before % -->
    <div class="calc-card">
      <h3><span class="accent">X</span> is Y% of what?</h3>
      <div class="input-group">
        <input type="number" id="pct4-x" placeholder="X" oninput="calc4()">
        <span>is</span>
        <input type="number" id="pct4-y" placeholder="Y%" oninput="calc4()">
        <span>% of</span>
      </div>
      <div class="result-display" id="result4">—</div>
    </div>
  </div>
</div>

<script>
  function setPercent1(val) {
    document.getElementById('pct1-x').value = val;
    calc1();
  }

  function calc1() {
    const x = parseFloat(document.getElementById('pct1-x').value);
    const y = parseFloat(document.getElementById('pct1-y').value);
    const result = document.getElementById('result1');
    
    if (isNaN(x) || isNaN(y)) {
      result.textContent = '—';
      return;
    }
    const res = (x / 100) * y;
    result.textContent = res % 1 === 0 ? res : res.toFixed(2);
  }

  function calc2() {
    const x = parseFloat(document.getElementById('pct2-x').value);
    const y = parseFloat(document.getElementById('pct2-y').value);
    const result = document.getElementById('result2');
    
    if (isNaN(x) || isNaN(y) || y === 0) {
      result.textContent = '—';
      return;
    }
    const res = (x / y) * 100;
    result.textContent = res % 1 === 0 ? res + '%' : res.toFixed(2) + '%';
  }

  function calc3() {
    const x = parseFloat(document.getElementById('pct3-x').value);
    const y = parseFloat(document.getElementById('pct3-y').value);
    const result = document.getElementById('result3');
    
    if (isNaN(x) || isNaN(y) || x === 0) {
      result.textContent = '—';
      return;
    }
    const change = ((y - x) / x) * 100;
    const sign = change > 0 ? '+' : '';
    const color = change > 0 ? 'var(--success)' : change < 0 ? 'var(--error)' : 'var(--text)';
    result.innerHTML = `<span style="color:${color}">${sign}${change.toFixed(2)}%</span>`;
  }

  function calc4() {
    const x = parseFloat(document.getElementById('pct4-x').value);
    const y = parseFloat(document.getElementById('pct4-y').value);
    const result = document.getElementById('result4');
    
    if (isNaN(x) || isNaN(y) || y === 0) {
      result.textContent = '—';
      return;
    }
    const res = x / (y / 100);
    result.textContent = res % 1 === 0 ? res : res.toFixed(2);
  }
</script>
</body>
</html>
