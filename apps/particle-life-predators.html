<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Life: Predators — Shadow's Garden</title>
<meta name="description" content="Watch predators hunt prey in this emergent ecosystem simulation. Species evolve, populations crash — survival of the fittest in real-time.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    padding: 16px;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    max-width: 280px;
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  #controls h3 { margin: 0 0 12px 0; color: #ff6b6b; font-size: 14px; letter-spacing: 1px; }
  .control-group { margin-bottom: 10px; }
  .control-group label { display: block; margin-bottom: 4px; color: #888; }
  .control-group input[type="range"] { width: 100%; accent-color: #ff6b6b; }
  .control-group span { color: #ff6b6b; float: right; }
  button {
    background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    margin-right: 6px;
    margin-top: 8px;
    transition: transform 0.1s;
  }
  button:hover { transform: scale(1.05); }
  button:active { transform: scale(0.95); }
  #stats {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    padding: 16px;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    min-width: 160px;
    backdrop-filter: blur(10px);
  }
  #stats h4 { margin: 0 0 8px 0; color: #4ecdc4; font-size: 12px; }
  .stat-row { display: flex; justify-content: space-between; margin: 4px 0; }
  .stat-row .label { color: #666; }
  .stat-row .value { color: #fff; }
  .predator-color { color: #ff6b6b; }
  .prey-color { color: #4ecdc4; }
  .scavenger-color { color: #ffd93d; }
  #hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #444;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
</style>
</head>
<body data-page-type="app">
<canvas id="canvas"></canvas>

<div id="controls">
  <h3>⟬ PREDATOR ECOSYSTEM ⟭</h3>
  <div class="control-group">
    <label>Prey Count <span id="preyCountVal">150</span></label>
    <input type="range" id="preyCount" min="50" max="300" value="150">
  </div>
  <div class="control-group">
    <label>Predator Count <span id="predatorCountVal">15</span></label>
    <input type="range" id="predatorCount" min="2" max="50" value="15">
  </div>
  <div class="control-group">
    <label>Predator Speed <span id="predSpeedVal">2.5</span></label>
    <input type="range" id="predSpeed" min="1" max="5" step="0.1" value="2.5">
  </div>
  <div class="control-group">
    <label>Prey Speed <span id="preySpeedVal">2.0</span></label>
    <input type="range" id="preySpeed" min="0.5" max="4" step="0.1" value="2.0">
  </div>
  <div class="control-group">
    <label>Hunt Radius <span id="huntRadiusVal">80</span></label>
    <input type="range" id="huntRadius" min="30" max="150" value="80">
  </div>
  <div class="control-group">
    <label>Spawn Radius <span id="spawnRadiusVal">200</span></label>
    <input type="range" id="spawnRadius" min="50" max="400" value="200">
  </div>
  <button id="resetBtn">Reset</button>
  <button id="pauseBtn">Pause</button>
  <button id="evolveBtn">Evolve</button>
</div>

<div id="stats">
  <h4>⟡ POPULATION</h4>
  <div class="stat-row">
    <span class="label prey-color">● Prey</span>
    <span class="value" id="preyPop">150</span>
  </div>
  <div class="stat-row">
    <span class="label predator-color">◆ Predators</span>
    <span class="value" id="predPop">15</span>
  </div>
  <div class="stat-row">
    <span class="label">Time</span>
    <span class="value" id="simTime">0s</span>
  </div>
  <div class="stat-row">
    <span class="label">FPS</span>
    <span class="value" id="fps">60</span>
  </div>
</div>

<div id="hint">Click to add particles • Drag to create current</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;
let particles = [];
let paused = false;
let frameCount = 0;
let lastTime = performance.now();
let fps = 60;
let simTime = 0;

const TYPE_PREY = 0;
const TYPE_PREDATOR = 1;

const config = {
  preyCount: 150,
  predatorCount: 15,
  predSpeed: 2.5,
  preySpeed: 2.0,
  huntRadius: 80,
  spawnRadius: 200,
  predatorSize: 8,
  preySize: 4,
  predatorDNA: null,
  preyDNA: null
};

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}

function initDNA() {
  // Predator DNA - aggressive hunting, fear nothing
  config.predatorDNA = {
    // [attraction to prey, attraction to predator, attraction to nothing]
    prey: 3.5,
    predator: -2.0,
    neutral: -0.5,
    perception: 100
  };
  
  // Prey DNA - avoids predators, likes clustering
  config.preyDNA = {
    predator: -8.0,
    prey: 1.5,
    neutral: 0.3,
    perception: 80
  };
}

function createParticle(type, x, y) {
  const angle = Math.random() * Math.PI * 2;
  const dna = type === TYPE_PREDATOR ? config.predatorDNA : config.preyDNA;
  const size = type === TYPE_PREDATOR ? config.predatorSize : config.preySize;
  const speed = type === TYPE_PREDATOR ? config.predSpeed : config.preySpeed;
  
  return {
    x: x !== undefined ? x : width/2 + (Math.random() - 0.5) * config.spawnRadius * 2,
    y: y !== undefined ? y : height/2 + (Math.random() - 0.5) * config.spawnRadius * 2,
    vx: Math.cos(angle) * speed * 0.5,
    vy: Math.sin(angle) * speed * 0.5,
    type,
    size,
    speed,
    energy: type === TYPE_PREDATOR ? 100 : 100,
    age: 0
  };
}

function init() {
  resize();
  initDNA();
  particles = [];
  
  // Spawn prey in a ring
  for (let i = 0; i < config.preyCount; i++) {
    const angle = (i / config.preyCount) * Math.PI * 2;
    const r = Math.random() * config.spawnRadius;
    const x = width/2 + Math.cos(angle) * r;
    const y = height/2 + Math.sin(angle) * r;
    particles.push(createParticle(TYPE_PREY, x, y));
  }
  
  // Spawn predators in center
  for (let i = 0; i < config.predatorCount; i++) {
    particles.push(createParticle(TYPE_PREDATOR));
  }
}

function getForce(p1, p2, dna) {
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  
  if (dist === 0 || dist > dna.perception) return { fx: 0, fy: 0, dist };
  
  const nx = dx / dist;
  const ny = dy / dist;
  
  let force = 0;
  
  if (p2.type === TYPE_PREY && p1.type === TYPE_PREDATOR) {
    force = dna.prey / dist; // Hunt prey
  } else if (p2.type === TYPE_PREDATOR && p1.type === TYPE_PREY) {
    force = dna.predator / dist; // Flee predator
  } else if (p2.type === TYPE_PREDATOR && p1.type === TYPE_PREDATOR) {
    force = dna.predator * 0.5 / dist; // Slight repulsion from other predators
  } else if (p1.type === TYPE_PREY && p2.type === TYPE_PREY) {
    force = dna.prey / dist; // Attraction to other prey (flocking)
  } else {
    force = dna.neutral / dist;
  }
  
  return { fx: force * nx, fy: force * ny, dist };
}

function findNearestPrey(predator) {
  let nearest = null;
  let nearestDist = config.huntRadius;
  
  for (const p of particles) {
    if (p.type !== TYPE_PREY) continue;
    const dx = p.x - predator.x;
    const dy = p.y - predator.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < nearestDist) {
      nearestDist = dist;
      nearest = p;
    }
  }
  
  return nearest;
}

function update() {
  if (paused) return;
  
  const preyPop = particles.filter(p => p.type === TYPE_PREY).length;
  const predPop = particles.filter(p => p.type === TYPE_PREDATOR).length;
  
  // Update each particle
  for (const p of particles) {
    p.age++;
    
    // Energy decay for predators
    if (p.type === TYPE_PREDATOR) {
      p.energy -= 0.15;
      if (p.energy <= 0) {
        // Predator dies of starvation
        p.dead = true;
        continue;
      }
    }
    
    // Predator hunting behavior
    if (p.type === TYPE_PREDATOR) {
      const prey = findNearestPrey(p);
      if (prey) {
        const dx = prey.x - p.x;
        const dy = prey.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < p.size + prey.size) {
          // Caught prey!
          prey.dead = true;
          p.energy = Math.min(p.energy + 50, 150);
        } else {
          // Chase
          p.vx += (dx / dist) * 0.5;
          p.vy += (dy / dist) * 0.5;
        }
      }
    }
    
    const dna = p.type === TYPE_PREDATOR ? config.predatorDNA : config.preyDNA;
    
    // Calculate forces from all particles
    let fx = 0, fy = 0;
    for (const other of particles) {
      if (other === p || other.dead) continue;
      const force = getForce(p, other, dna);
      if (force.dist < dna.perception) {
        fx += force.fx;
        fy += force.fy;
      }
    }
    
    // Random wandering
    fx += (Math.random() - 0.5) * 0.3;
    fy += (Math.random() - 0.5) * 0.3;
    
    // Apply force
    p.vx += fx;
    p.vy += fy;
    
    // Limit speed
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    const maxSpeed = p.speed * (p.type === TYPE_PREDATOR ? 1.2 : 1.0);
    if (speed > maxSpeed) {
      p.vx = (p.vx / speed) * maxSpeed;
      p.vy = (p.vy / speed) * maxSpeed;
    }
    
    // Update position
    p.x += p.vx;
    p.y += p.vy;
    
    // Boundary wrapping
    if (p.x < 0) p.x = width;
    if (p.x > width) p.x = 0;
    if (p.y < 0) p.y = height;
    if (p.y > height) p.y = 0;
  }
  
  // Remove dead particles
  particles = particles.filter(p => !p.dead);
  
  // Auto-repopulate if population drops too low
  const currentPrey = particles.filter(p => p.type === TYPE_PREY).length;
  const currentPred = particles.filter(p => p.type === TYPE_PREDATOR).length;
  
  if (currentPrey < 20 && Math.random() < 0.05) {
    particles.push(createParticle(TYPE_PREY));
  }
  
  if (currentPred < 3 && Math.random() < 0.02) {
    particles.push(createParticle(TYPE_PREDATOR));
  }
  
  simTime += 1/60;
}

function draw() {
  // Trail effect
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, width, height);
  
  // Draw particles
  for (const p of particles) {
    ctx.beginPath();
    
    if (p.type === TYPE_PREDATOR) {
      // Predator - red diamond
      ctx.save();
      ctx.translate(p.x, p.y);
      const angle = Math.atan2(p.vy, p.vx);
      ctx.rotate(angle);
      ctx.moveTo(p.size, 0);
      ctx.lineTo(0, p.size * 0.6);
      ctx.lineTo(-p.size, 0);
      ctx.lineTo(0, -p.size * 0.6);
      ctx.closePath();
      
      const alpha = Math.min(p.energy / 100, 1);
      ctx.fillStyle = `rgba(255, 107, 107, ${alpha})`;
      ctx.fill();
      ctx.restore();
    } else {
      // Prey - teal circle
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = '#4ecdc4';
      ctx.fill();
    }
  }
}

function updateStats() {
  const preyPop = particles.filter(p => p.type === TYPE_PREY).length;
  const predPop = particles.filter(p => p.type === TYPE_PREDATOR).length;
  
  document.getElementById('preyPop').textContent = preyPop;
  document.getElementById('predPop').textContent = predPop;
  document.getElementById('simTime').textContent = Math.floor(simTime) + 's';
  document.getElementById('fps').textContent = Math.round(fps);
}

function loop() {
  frameCount++;
  const now = performance.now();
  if (now - lastTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastTime = now;
  }
  
  update();
  draw();
  updateStats();
  
  requestAnimationFrame(loop);
}

// Event listeners
window.addEventListener('resize', resize);

canvas.addEventListener('click', (e) => {
  const type = Math.random() < 0.2 ? TYPE_PREDATOR : TYPE_PREY;
  for (let i = 0; i < 5; i++) {
    particles.push(createParticle(type, e.clientX + (Math.random()-0.5)*30, e.clientY + (Math.random()-0.5)*30));
  }
});

let dragging = false;
canvas.addEventListener('mousedown', () => dragging = true);
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mousemove', (e) => {
  if (dragging) {
    for (const p of particles) {
      const dx = e.clientX - p.x;
      const dy = e.clientY - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 100) {
        p.vx += dx / dist * 0.5;
        p.vy += dy / dist * 0.5;
      }
    }
  }
});

// Controls
document.getElementById('resetBtn').addEventListener('click', () => {
  simTime = 0;
  init();
});

document.getElementById('pauseBtn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
});

document.getElementById('evolveBtn').addEventListener('click', () => {
  // Randomly mutate DNA
  config.predatorDNA.prey += (Math.random() - 0.5) * 0.5;
  config.predatorDNA.predator += (Math.random() - 0.5) * 0.3;
  config.preyDNA.predator -= (Math.random() - 0.5) * 0.5;
  config.preyDNA.prey += (Math.random() - 0.5) * 0.3;
});

// Slider handlers
['preyCount', 'predatorCount', 'predSpeed', 'preySpeed', 'huntRadius', 'spawnRadius'].forEach(id => {
  const slider = document.getElementById(id);
  const display = document.getElementById(id + 'Val');
  slider.addEventListener('input', () => {
    config[id] = parseFloat(slider.value);
    display.textContent = slider.value;
  });
});

// Start
init();
loop();
</script>
</body>
</html>
