<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Shadow's Garden</title>
<meta name="description" content="Generate placeholder text for design and layout testing. Words, paragraphs, bytes — you choose.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 2rem; max-width: 800px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--fg-muted); margin-bottom: 2rem; }
  .controls { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; align-items: center; }
  .control-group { display: flex; flex-direction: column; gap: 0.3rem; }
  label { font-size: 0.85rem; color: var(--fg-muted); }
  select, input { background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 0.5rem; border-radius: 6px; font-size: 1rem; }
  input[type="number"] { width: 80px; }
  button { background: var(--accent); color: var(--bg); border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; }
  button:hover { opacity: 0.9; }
  .buttons { display: flex; gap: 0.5rem; }
  button.secondary { background: var(--bg); color: var(--fg); border: 1px solid var(--border); }
  #output { background: var(--bg-secondary); padding: 1.5rem; border-radius: 8px; min-height: 200px; line-height: 1.7; white-space: pre-wrap; }
  .options { display: flex; gap: 1rem; margin-bottom: 1rem; }
  .radio-group { display: flex; gap: 1rem; align-items: center; }
  .radio-group label { color: var(--fg); cursor: pointer; }
</style>
</head>
<body data-page-type="app">
  <h1>Lorem Ipsum Generator</h1>
  <div class="subtitle">Generate placeholder text for design and layout testing</div>
  
  <div class="options">
    <div class="radio-group">
      <input type="radio" id="type-words" name="type" value="words" checked>
      <label for="type-words">Words</label>
      <input type="radio" id="type-paragraphs" name="type" value="paragraphs">
      <label for="type-paragraphs">Paragraphs</label>
      <input type="radio" id="type-bytes" name="type" value="bytes">
      <label for="type-bytes">Bytes</label>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label for="count">Count</label>
      <input type="number" id="count" value="50" min="1" max="1000">
    </div>
    <div class="control-group">
      <label for="start-with">Start with</label>
      <select id="start-with">
        <option value="classic">Classic Lorem ipsum</option>
        <option value="hipster">Hipster ipsum</option>
        <option value="cupcake">Cupcake ipsum</option>
        <option value=" Samuel L. Ipsum">Samuel L. Ipsum</option>
      </select>
    </div>
    <div class="buttons">
      <button id="generate">Generate</button>
      <button class="secondary" id="copy">Copy</button>
    </div>
  </div>

  <div id="output"></div>

  <script>
    const corpus = {
      classic: "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.",
      hipster: "Kale chips vinyl church-key, +1 mlkshk forage literally lo-fi. Hashtag man bun austin hell of, vinyl four dollar toast pickled aesthetic. Semiotics food truck typewriter, post-ironic man braid cornhole listicle tumblr. Sriracha poke actually, echo park retro pickled vinyl 90's.",
      cupcake: "Cupcake ipsum dolor sit amet. Jelly-o sesame snaps candy canes cotton candy. Cheesecake tart bear claw chocolate cake cake donut. Cookie jelly beans marshmallow marshmallow jelly candy. Sweet roll candy gummies jelly-o tootsie roll.",
      "samuel": "Ah, I see you have the machine that goes PING. I want to get medieval on your ass. Do you see any Teletubbies in this quarter? I want to see you six running to get to the other side. I am serious as a heart attack. Say 'what' again. Say 'what' again, I dare you, I double dare you. I want to see you six running to get to the other side. Hold on to your butts."
    };

    const countInput = document.getElementById('count');
    const typeInputs = document.getElementsByName('type');
    const startSelect = document.getElementById('start-with');
    const output = document.getElementById('output');
    const generateBtn = document.getElementById('generate');
    const copyBtn = document.getElementById('copy');

    function getType() {
      for (const r of typeInputs) if (r.checked) return r.value;
    }

    function generate() {
      const type = getType();
      const count = parseInt(countInput.value) || 50;
      const startKey = startSelect.value;
      let result = '';

      if (type === 'words') {
        const words = corpus[startKey].split(' ');
        result = Array(count).fill(0).map((_, i) => words[i % words.length]).join(' ');
      } else if (type === 'paragraphs') {
        const base = corpus[startKey].split('. ').filter(Boolean);
        result = Array(count).fill(0).map((_, i) => 
          base.map(s => s + (s.endsWith('.') ? '' : '.')).join(' ')
        ).join('\n\n');
      } else if (type === 'bytes') {
        const words = corpus[startKey].split(' ');
        let text = '';
        while (text.length < count) {
          text += words[text.split(' ').length % words.length] + ' ';
        }
        result = text.slice(0, count);
      }

      output.textContent = result;
    }

    function copy() {
      navigator.clipboard.writeText(output.textContent);
      copyBtn.textContent = 'Copied!';
      setTimeout(() => copyBtn.textContent = 'Copy', 1500);
    }

    generateBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', copy);

    generate();
  </script>
</body>
</html>
