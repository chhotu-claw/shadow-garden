<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Shadow's Garden</title>
<meta name="description" content="Generate placeholder text for design and development">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --accent: #10b981; }
  body { --accent: #10b981; }
  .tag { background: var(--accent); }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
  
  .controls { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; align-items: center; }
  .control-group { display: flex; align-items: center; gap: 0.5rem; }
  label { font-size: 0.85rem; color: #8b949e; }
  
  input[type="number"] {
    width: 80px; padding: 0.5rem; background: #161b22; border: 1px solid #30363d;
    border-radius: 6px; color: #c9d1d9; font-family: inherit; font-size: 0.9rem;
  }
  input[type="number"]:focus { outline: none; border-color: var(--accent); }
  
  select {
    padding: 0.5rem 0.75rem; background: #161b22; border: 1px solid #30363d;
    border-radius: 6px; color: #c9d1d9; font-family: inherit; font-size: 0.9rem; cursor: pointer;
  }
  select:focus { outline: none; border-color: var(--accent); }
  
  button {
    padding: 0.5rem 1rem; background: var(--accent); border: none; border-radius: 6px;
    color: #0d1117; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.9; }
  button.secondary {
    background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
  }
  
  .output {
    background: #161b22; border: 2px solid #30363d; border-radius: 8px; padding: 1.5rem;
    min-height: 200px; font-size: 0.95rem; line-height: 1.7; color: #c9d1d9;
    white-space: pre-wrap; word-wrap: break-word;
  }
  
  .stats { display: flex; gap: 2rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #30363d; }
  .stat { text-align: center; }
  .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Lorem Ipsum Generator</h1>
    <p class="subtitle">Generate placeholder text for design and development</p>
    
    <div class="controls">
      <div class="control-group">
        <label>Words:</label>
        <input type="number" id="wordCount" value="50" min="1" max="500">
      </div>
      <div class="control-group">
        <label>Type:</label>
        <select id="type">
          <option value="words">Words</option>
          <option value="sentences">Sentences</option>
          <option value="paragraphs">Paragraphs</option>
        </select>
      </div>
      <button onclick="generate()">Generate</button>
      <button class="secondary" onclick="copy()">Copy</button>
    </div>
    
    <div class="output" id="output">Click Generate to create placeholder text...</div>
    
    <div class="actions">
      <button class="secondary" onclick="setType('words')">Words</button>
      <button class="secondary" onclick="setType('sentences')">Sentences</button>
      <button class="secondary" onclick="setType('paragraphs')">Paragraphs</button>
    </div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="charCount">0</div>
        <div class="stat-label">Characters</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="wordStat">0</div>
        <div class="stat-label">Words</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="sentenceStat">0</div>
        <div class="stat-label">Sentences</div>
      </div>
    </div>
  </div>
  
  <script>
    // Classic lorem ipsum words
    const loremWords = [
      "lorem", "ipsum", "dolor", "sit", "amet", "consectetur", "adipiscing", "elit",
      "sed", "do", "eiusmod", "tempor", "incididunt", "ut", "labore", "et", "dolore",
      "magna", "aliqua", "enim", "ad", "minim", "veniam", "quis", "nostrud",
      "exercitation", "ullamco", "laboris", "nisi", "aliquip", "ex", "ea", "commodo",
      "consequat", "duis", "aute", "irure", "in", "reprehenderit", "voluptate",
      "velit", "esse", "cillum", "fugiat", "nulla", "pariatur", "excepteur", "sint",
      "occaecat", "cupidatat", "non", "proident", "sunt", "culpa", "qui", "officia",
      "deserunt", "mollit", "anim", "id", "est", "laborum", "pellentesque", "habitant",
      "morbi", "tristique", "senectus", "netus", "malesuada", "fames", "ac", "turpis",
      "egestas", "proin", "sagittis", "nisl", "rhoncus", "mattis", "massa", "vitae",
      "tortor", "condimentum", "lacinia", "quis", "vel", "eros", "donec", "odio",
      "quisque", "id", "diam", "volutpat", "commodo", "sed", "egestas", "fringilla",
      "phasellus", "faucibus", "scelerisque", "eleifend", "viverra", "maecenas",
      "accumsan", "lacus", "vel", "facilisis", "ultricies", "gravida", "cras",
      "tincidunt", "lobortis", "feugiat", "vivamus", "augue", "lobortis", "sem",
      "mauris", "aliquet", "massa", "placerat", "ultrices", "metus", "sapien"
    ];
    
    function generate() {
      const count = parseInt(document.getElementById('wordCount').value) || 50;
      const type = document.getElementById('type').value;
      let text = '';
      
      if (type === 'words') {
        text = generateWords(count);
      } else if (type === 'sentences') {
        text = generateSentences(count);
      } else {
        text = generateParagraphs(count);
      }
      
      document.getElementById('output').textContent = text;
      updateStats(text);
    }
    
    function generateWords(n) {
      const words = [];
      for (let i = 0; i < n; i++) {
        words.push(loremWords[Math.floor(Math.random() * loremWords.length)]);
      }
      return words.join(' ');
    }
    
    function generateSentences(n) {
      const sentences = [];
      let currentWords = [];
      
      for (let i = 0; i < n; i++) {
        // Random sentence length between 8-15 words
        const sentenceLength = 8 + Math.floor(Math.random() * 8);
        currentWords = [];
        
        for (let j = 0; j < sentenceLength; j++) {
          currentWords.push(loremWords[Math.floor(Math.random() * loremWords.length)]);
        }
        
        // Capitalize first letter
        currentWords[0] = currentWords[0].charAt(0).toUpperCase() + currentWords[0].slice(1);
        sentences.push(currentWords.join(' ') + '.');
      }
      
      return sentences.join(' ');
    }
    
    function generateParagraphs(n) {
      const paragraphs = [];
      
      for (let i = 0; i < n; i++) {
        // 4-7 sentences per paragraph
        const sentenceCount = 4 + Math.floor(Math.random() * 4);
        paragraphs.push(generateSentences(sentenceCount));
      }
      
      return paragraphs.join('\n\n');
    }
    
    function setType(type) {
      document.getElementById('type').value = type;
      
      // Adjust default count based on type
      const wordCountInput = document.getElementById('wordCount');
      if (type === 'words') wordCountInput.value = 50;
      else if (type === 'sentences') wordCountInput.value = 5;
      else wordCountInput.value = 3;
      
      generate();
    }
    
    function updateStats(text) {
      const chars = text.length;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      const sentences = text.split(/[.!?]+/).filter(s => s.trim()).length;
      
      document.getElementById('charCount').textContent = chars;
      document.getElementById('wordStat').textContent = words;
      document.getElementById('sentenceStat').textContent = sentences;
    }
    
    function copy() {
      const text = document.getElementById('output').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = original, 1500);
      });
    }
    
    // Generate on load
    generate();
  </script>
</body>
</html>
