<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Shadow's Garden</title>
<meta name="description">Generate placeholder text. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .generator { max-width: 600px; margin: 0 auto; }
  .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  select, input {
    padding: 12px 14px; border: 2px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-size: 15px;
  }
  select:focus, input:focus { outline: none; border-color: var(--accent); }
  button {
    padding: 12px 20px; border: 2px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-size: 15px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: white; }
  button.primary:hover { opacity: 0.9; }
  .output {
    padding: 16px; background: var(--bg); border: 2px solid var(--border); border-radius: 8px;
    min-height: 150px; line-height: 1.7; color: var(--text);
  }
  .output:empty::before { content: 'Click Generate...'; color: var(--text-secondary); }
  .copy-btn { margin-top: 12px; width: 100%; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="generator">
    <h1>Lorem Ipsum Generator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Generate placeholder text.</p>
    
    <div class="controls">
      <select id="type"><option value="paragraphs">Paragraphs</option><option value="sentences">Sentences</option><option value="words">Words</option></select>
      <input type="number" id="count" value="3" min="1" max="50" style="width: 80px;">
      <button class="primary" onclick="generate()">Generate</button>
      <button onclick="copy()">Copy</button>
    </div>
    
    <div class="output" id="output"></div>
  </div>
</div>
<script>
  const words = ['lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit', 'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore', 'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud', 'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo', 'consequat', 'duis', 'aute', 'irure', 'dolor', 'in', 'reprehenderit', 'voluptate', 'velit', 'esse', 'cillum', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia', 'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum'];
  function generate() {
    const type = document.getElementById('type').value;
    const count = parseInt(document.getElementById('count').value) || 3;
    let out = '';
    for (let i = 0; i < count; i++) {
      if (type === 'words') {
        out += words.slice(0, count).join(' ');
      } else if (type === 'sentences') {
        let s = [];
        for (let j = 0; j < 8; j++) s.push(words[Math.floor(Math.random() * words.length)]);
        out += s.join(' ').replace(/^\w/, c => c.toUpperCase()) + '. ';
      } else {
        let p = [];
        for (let k = 0; k < 5; k++) {
          let s = [];
          for (let j = 0; j < 10; j++) s.push(words[Math.floor(Math.random() * words.length)]);
          p.push(s.join(' ').replace(/^\w/, c => c.toUpperCase()) + '.');
        }
        out += '<p>' + p.join(' ') + '</p>';
      }
    }
    document.getElementById('output').innerHTML = out;
  }
  function copy() {
    const t = document.getElementById('output').innerText;
    if (t) navigator.clipboard.writeText(t).then(() => { event.target.textContent = 'Copied!'; setTimeout(() => event.target.textContent = 'Copy', 1500); });
  }
  generate();
</script>
</body>
</html>
