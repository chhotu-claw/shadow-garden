<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Shadow's Garden</title>
<meta name="description" content="Generate lorem ipsum placeholder text — paragraphs, words, or bytes mode.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --muted: #8b949e; --border: #30363d; }
  .controls { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
  .controls label { color: var(--muted); }
  .controls select, .controls input { padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.9rem; }
  .controls input { width: 80px; }
  .btn-group { display: flex; gap: 0.5rem; }
  .btn { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; background: var(--border); color: var(--text); }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #0d1117; }
  .output { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; min-height: 150px; white-space: pre-wrap; font-size: 0.9rem; color: var(--muted); line-height: 1.6; }
  .btn-copy { margin-top: 1rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Lorem Ipsum Generator</h1>
  <p style="color: var(--muted); margin-bottom: 1.5rem;">Generate placeholder text for your designs.</p>
  
  <div class="controls">
    <label>Mode:</label>
    <select id="mode">
      <option value="paragraphs">Paragraphs</option>
      <option value="words">Words</option>
      <option value="bytes">Bytes</option>
    </select>
    <label>Count:</label>
    <input type="number" id="count" value="3" min="1" max="50">
    <div class="btn-group">
      <button class="btn btn-primary" onclick="generate()">Generate</button>
      <button class="btn" onclick="copyOutput()">Copy</button>
    </div>
  </div>
  
  <div id="output" class="output">Click Generate to create lorem ipsum...</div>
  <button class="btn btn-copy" onclick="copyOutput()">Copy to Clipboard</button>
</div>

<script>
const words = ['lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit', 'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore', 'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud', 'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo', 'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit', 'voluptate', 'velit', 'esse', 'cillum', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint', 'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia', 'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum'];

function generate() {
  const mode = document.getElementById('mode').value;
  const count = parseInt(document.getElementById('count').value) || 3;
  const output = document.getElementById('output');
  
  if (mode === 'paragraphs') {
    const paras = [];
    for (let p = 0; p < count; p++) {
      const paraWords = [];
      const sentCount = Math.floor(Math.random() * 4) + 3;
      for (let s = 0; s < sentCount; s++) {
        const wordCount = Math.floor(Math.random() * 8) + 5;
        let sent = [];
        for (let i = 0; i < wordCount; i++) {
          sent.push(words[Math.floor(Math.random() * words.length)]);
        }
        sent[0] = sent[0].charAt(0).toUpperCase() + sent[0].slice(1);
        paraWords.push(sent.join(' ') + '.');
      }
      paras.push(paraWords.join(' '));
    }
    output.textContent = paras.join('\n\n');
  } else if (mode === 'words') {
    const out = [];
    for (let i = 0; i < count; i++) {
      out.push(words[Math.floor(Math.random() * words.length)]);
    }
    output.textContent = out.join(' ');
  } else if (mode === 'bytes') {
    output.textContent = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. '.repeat(count).slice(0, count * 5);
  }
}

function copyOutput() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    alert('Copied!');
  });
}

generate();
</script>
</body>
</html>
