<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator — Shadow's Garden</title>
<meta name="description" content="Generate lorem ipsum placeholder text in paragraphs, words, bytes, or as JSON. Configurable count and format.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 600px; margin: 0 auto; padding: 2rem; }
  h1 { margin-bottom: 0.5rem; }
  .controls { display: flex; gap: 1rem; margin: 1.5rem 0; flex-wrap: wrap; align-items: center; }
  select, input, button { padding: 0.5rem 1rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
  button { background: #222; color: #fff; cursor: pointer; border: none; }
  button:hover { background: #444; }
  textarea { width: 100%; min-height: 200px; padding: 1rem; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; resize: vertical; }
  .meta { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
  label { font-weight: 500; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Lorem Ipsum Generator</h1>
  <div class="meta">Generate placeholder text instantly</div>
  
  <div class="controls">
    <div>
      <label>Count:</label>
      <input type="number" id="count" value="3" min="1" max="100" style="width: 80px;">
    </div>
    <div>
      <label>Type:</label>
      <select id="type">
        <option value="paragraphs">Paragraphs</option>
        <option value="words">Words</option>
        <option value="bytes">Bytes</option>
        <option value="json">JSON</option>
      </select>
    </div>
    <button id="generate">Generate</button>
    <button id="copy">Copy</button>
  </div>
  
  <textarea id="output" readonly></textarea>
</div>

<script>
const lorem = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.";

function generateParagraphs(n) {
  let result = '';
  for (let i = 0; i < n; i++) {
    let words = lorem.split(' ');
    let scrambled = [];
    while (scrambled.length < 50) {
      scrambled = scrambled.concat(words.sort(() => Math.random() - 0.5));
    }
    result += scrambled.slice(0, 50).join(' ') + '\n\n';
  }
  return result.trim();
}

function generateWords(n) {
  let words = lorem.split(' ').sort(() => Math.random() - 0.5);
  let result = [];
  while (result.length < n) {
    result = result.concat(words);
  }
  return result.slice(0, n).join(' ');
}

function generateBytes(n) {
  let text = generateWords(Math.ceil(n / 5));
  return text.slice(0, n);
}

function generateJSON(n) {
  let arr = [];
  for (let i = 0; i < n; i++) {
    arr.push(lorem.slice(0, Math.floor(Math.random() * 100) + 50));
  }
  return JSON.stringify(arr, null, 2);
}

document.getElementById('generate').addEventListener('click', () => {
  const count = parseInt(document.getElementById('count').value) || 3;
  const type = document.getElementById('type').value;
  let output;
  
  switch (type) {
    case 'paragraphs': output = generateParagraphs(count); break;
    case 'words': output = generateWords(count); break;
    case 'bytes': output = generateBytes(count); break;
    case 'json': output = generateJSON(count); break;
  }
  
  document.getElementById('output').value = output;
});

document.getElementById('copy').addEventListener('click', () => {
  const textarea = document.getElementById('output');
  textarea.select();
  document.execCommand('copy');
  document.getElementById('copy').textContent = 'Copied!';
  setTimeout(() => document.getElementById('copy').textContent = 'Copy', 1500);
});

// Generate on load
document.getElementById('generate').click();
</script>
</div>
</body>
</html>
