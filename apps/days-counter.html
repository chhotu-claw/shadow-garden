<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Days Counter — Shadow's Garden</title>
<meta name="description" content="Count days until or since any date">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #8b5cf6;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
  }
  .counter {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 1rem;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
  }
  h1 {
    color: #fff;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .mode-toggle {
    display: flex;
    background: rgba(0,0,0,0.3);
    border-radius: 0.5rem;
    padding: 0.25rem;
    margin-bottom: 1.5rem;
  }
  .mode-toggle button {
    flex: 1;
    background: transparent;
    border: none;
    padding: 0.75rem;
    color: rgba(255,255,255,0.6);
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    border-radius: 0.375rem;
    transition: all 0.2s;
  }
  .mode-toggle button.active {
    background: var(--accent);
    color: #fff;
  }
  .input-group {
    margin-bottom: 1.25rem;
  }
  label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  input[type="date"] {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="date"]:focus {
    border-color: var(--accent);
  }
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
  }
  .result {
    background: rgba(139, 92, 246, 0.1);
    border: 1px solid var(--accent);
    border-radius: 0.5rem;
    padding: 1.5rem;
    text-align: center;
    margin-top: 1.5rem;
  }
  .result-days {
    font-size: 3rem;
    font-weight: bold;
    color: #fff;
    line-height: 1;
  }
  .result-label {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.7);
    margin-top: 0.5rem;
  }
  .presets {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .presets button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.375rem;
    padding: 0.5rem;
    color: rgba(255,255,255,0.7);
    font-family: inherit;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .presets button:hover {
    background: rgba(255,255,255,0.2);
  }
  .history {
    margin-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 1rem;
  }
  .history h3 {
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.75rem;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem;
    background: rgba(0,0,0,0.2);
    border-radius: 0.375rem;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.8);
  }
  .history-item .days {
    color: var(--accent);
    font-weight: bold;
  }
  .history-empty {
    color: rgba(255,255,255,0.4);
    font-size: 0.8rem;
    text-align: center;
    padding: 1rem;
  }
</style>
</head>
<body data-page-type="app">
<div class="counter">
  <h1>📅 Days Counter</h1>
  
  <div class="mode-toggle">
    <button id="untilBtn" class="active" onclick="setMode('until')">Until</button>
    <button id="sinceBtn" onclick="setMode('since')">Since</button>
  </div>
  
  <div class="input-group">
    <label>Target Date</label>
    <input type="date" id="targetDate">
  </div>
  
  <div class="presets">
    <button onclick="setPreset(1)">+1 day</button>
    <button onclick="setPreset(7)">+1 week</button>
    <button onclick="setPreset(30)">+1 month</button>
    <button onclick="setPreset(365)">+1 year</button>
    <button onclick="setEaster()">Easter</button>
    <button onclick="setBirthday()">Birthday</button>
  </div>
  
  <div class="result">
    <div class="result-days" id="resultDays">0</div>
    <div class="result-label" id="resultLabel">days until</div>
  </div>
  
  <div class="history">
    <h3>Recent</h3>
    <div id="historyList">
      <div class="history-empty">No recent checks</div>
    </div>
  </div>
</div>

<script>
let mode = 'until';

const targetInput = document.getElementById('targetDate');
const resultDays = document.getElementById('resultDays');
const resultLabel = document.getElementById('resultLabel');
const historyList = document.getElementById('historyList');

function setMode(m) {
  mode = m;
  document.getElementById('untilBtn').classList.toggle('active', m === 'until');
  document.getElementById('sinceBtn').classList.toggle('active', m === 'since');
  calculate();
}

function setPreset(days) {
  const date = new Date();
  date.setDate(date.getDate() + days);
  targetInput.value = formatDate(date);
  calculate();
}

function setEaster() {
  // Approximate Easter 2026
  targetInput.value = '2026-04-05';
  calculate();
}

function setBirthday() {
  targetInput.value = '2026-03-15';
  calculate();
}

function formatDate(date) {
  return date.toISOString().split('T')[0];
}

function calculate() {
  if (!targetInput.value) {
    resultDays.textContent = '0';
    resultLabel.textContent = 'select a date';
    return;
  }
  
  const target = new Date(targetInput.value + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  const diff = target - today;
  const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
  
  const absDays = Math.abs(days);
  resultDays.textContent = absDays;
  
  if (mode === 'until') {
    resultLabel.textContent = days >= 0 ? `days until ${targetInput.value}` : `days ago`;
  } else {
    resultLabel.textContent = days >= 0 ? `days since ${targetInput.value}` : `days to go`;
  }
  
  // Save to history
  if (targetInput.value) {
    saveHistory(targetInput.value, absDays, mode);
  }
}

function saveHistory(date, days, mode) {
  let history = JSON.parse(localStorage.getItem('daysCounterHistory') || '[]');
  
  // Remove duplicates
  history = history.filter(h => h.date !== date);
  
  // Add new
  history.unshift({ date, days, mode, timestamp: Date.now() });
  
  // Keep only last 5
  history = history.slice(0, 5);
  
  localStorage.setItem('daysCounterHistory', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem('daysCounterHistory') || '[]');
  
  if (history.length === 0) {
    historyList.innerHTML = '<div class="history-empty">No recent checks</div>';
    return;
  }
  
  historyList.innerHTML = history.map(h => `
    <div class="history-item">
      <span>${h.date}</span>
      <span class="days">${h.days} days</span>
    </div>
  `).join('');
}

// Load saved date
const saved = localStorage.getItem('daysCounterLast');
if (saved) {
  targetInput.value = saved;
}

// Set default to tomorrow
if (!targetInput.value) {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  targetInput.value = formatDate(tomorrow);
}

targetInput.addEventListener('change', () => {
  localStorage.setItem('daysCounterLast', targetInput.value);
  calculate();
});

// Initial calc
calculate();
renderHistory();

// Update every minute
setInterval(calculate, 60000);
</script>
</body>
</html>
