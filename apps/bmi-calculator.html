<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate your BMI with metric/imperial, category display, and health tips">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #8b5cf6;
    --accent-dark: #7c3aed;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
  }
  .calculator {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 1rem;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
  }
  h1 {
    color: #fff;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .unit-toggle {
    display: flex;
    background: rgba(0,0,0,0.3);
    border-radius: 0.5rem;
    padding: 0.25rem;
    margin-bottom: 1.5rem;
  }
  .unit-toggle button {
    flex: 1;
    background: transparent;
    border: none;
    padding: 0.5rem;
    color: rgba(255,255,255,0.6);
    font-family: inherit;
    font-size: 0.875rem;
    cursor: pointer;
    border-radius: 0.375rem;
    transition: all 0.2s;
  }
  .unit-toggle button.active {
    background: var(--accent);
    color: #fff;
  }
  .input-group {
    margin-bottom: 1rem;
  }
  label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  input[type="number"] {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    color: #fff;
    font-size: 1.25rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  input[type="number"]:focus {
    border-color: var(--accent);
  }
  .input-row {
    display: flex;
    gap: 0.75rem;
  }
  .input-row .input-group {
    flex: 1;
  }
  button.calculate {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 0.5rem;
    padding: 1rem;
    color: #fff;
    font-family: inherit;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    margin-top: 1rem;
    transition: background 0.2s;
  }
  button.calculate:hover {
    background: var(--accent-dark);
  }
  .result {
    margin-top: 1.5rem;
    padding: 1.5rem;
    border-radius: 0.5rem;
    text-align: center;
    display: none;
  }
  .result.show {
    display: block;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .bmi-value {
    font-size: 3rem;
    font-weight: bold;
    color: #fff;
  }
  .bmi-category {
    font-size: 1.25rem;
    margin-top: 0.5rem;
    padding: 0.25rem 0.75rem;
    border-radius: 1rem;
    display: inline-block;
  }
  .bmi-tips {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.7);
    line-height: 1.5;
  }
  .range-bar {
    margin-top: 1.5rem;
    position: relative;
    height: 12px;
    border-radius: 6px;
    background: linear-gradient(to right, 
      #3b82f6 0%, 
      #3b82f6 18.5%, 
      #22c55e 18.5%, 
      #22c55e 25%, 
      #eab308 25%, 
      #eab308 30%,
      #f97316 30%,
      #f97316 100%
    );
  }
  .range-marker {
    position: absolute;
    top: -6px;
    width: 4px;
    height: 24px;
    background: #fff;
    border-radius: 2px;
    transform: translateX(-50%);
    transition: left 0.3s ease;
  }
  .range-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 0.5rem;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body data-page-type="app">
<div class="calculator">
  <h1>⚖️ BMI Calculator</h1>
  
  <div class="unit-toggle">
    <button class="active" onclick="setUnit('metric')" id="metricBtn">Metric (kg/cm)</button>
    <button onclick="setUnit('imperial')" id="imperialBtn">Imperial (lb/ft)</button>
  </div>
  
  <div id="metricInputs">
    <div class="input-group">
      <label>Height (cm)</label>
      <input type="number" id="heightCm" placeholder="175" min="50" max="300">
    </div>
    <div class="input-group">
      <label>Weight (kg)</label>
      <input type="number" id="weightKg" placeholder="70" min="20" max="500">
    </div>
  </div>
  
  <div id="imperialInputs" style="display:none">
    <div class="input-row">
      <div class="input-group">
        <label>Height (ft)</label>
        <input type="number" id="heightFt" placeholder="5" min="1" max="8">
      </div>
      <div class="input-group">
        <label>Height (in)</label>
        <input type="number" id="heightIn" placeholder="9" min="0" max="11">
      </div>
    </div>
    <div class="input-group">
      <label>Weight (lb)</label>
      <input type="number" id="weightLb" placeholder="154" min="40" max="1000">
    </div>
  </div>
  
  <button class="calculate" onclick="calculate()">Calculate BMI</button>
  
  <div class="result" id="result">
    <div class="bmi-value" id="bmiValue">0.0</div>
    <div class="bmi-category" id="bmiCategory">Normal</div>
    <div class="range-bar">
      <div class="range-marker" id="rangeMarker"></div>
    </div>
    <div class="range-labels">
      <span>Underweight</span>
      <span>Normal</span>
      <span>Overweight</span>
      <span>Obese</span>
    </div>
    <div class="bmi-tips" id="bmiTips"></div>
  </div>
</div>

<script>
let unit = 'metric';

const categories = [
  { max: 18.5, label: 'Underweight', color: '#3b82f6', tip: 'Consider consulting a healthcare provider about healthy weight gain strategies.' },
  { max: 25, label: 'Normal', color: '#22c55e, tip: 'Great job! Maintain your current lifestyle with balanced nutrition and regular exercise.' },
  { max: 30, label: 'Overweight', color: '#eab308', tip: 'Consider incorporating more physical activity and reviewing your diet.' },
  { max: Infinity, label: 'Obese', color: '#f97316', tip: 'It\'s recommended to consult a healthcare provider for personalized advice.' }
];

function setUnit(u) {
  unit = u;
  document.getElementById('metricBtn').classList.toggle('active', u === 'metric');
  document.getElementById('imperialBtn').classList.toggle('active', u === 'imperial');
  document.getElementById('metricInputs').style.display = u === 'metric' ? 'block' : 'none';
  document.getElementById('imperialInputs').style.display = u === 'imperial' ? 'block' : 'none';
  document.getElementById('result').classList.remove('show');
}

function calculate() {
  let bmi;
  
  if (unit === 'metric') {
    const height = parseFloat(document.getElementById('heightCm').value);
    const weight = parseFloat(document.getElementById('weightKg').value);
    if (!height || !weight) return;
    bmi = weight / ((height / 100) ** 2);
  } else {
    const ft = parseFloat(document.getElementById('heightFt').value) || 0;
    const inch = parseFloat(document.getElementById('heightIn').value) || 0;
    const weight = parseFloat(document.getElementById('weightLb').value);
    if ((!ft && !inch) || !weight) return;
    const totalInches = (ft * 12) + inch;
    bmi = (weight / (totalInches ** 2)) * 703;
  }
  
  bmi = Math.round(bmi * 10) / 10;
  
  const category = categories.find(c => bmi <= c.max);
  
  document.getElementById('bmiValue').textContent = bmi.toFixed(1);
  const catEl = document.getElementById('bmiCategory');
  catEl.textContent = category.label;
  catEl.style.background = category.color;
  document.getElementById('bmiTips').textContent = category.tip;
  
  // Position marker on range bar (BMI 15-40 mapped to 0-100%)
  const markerPos = Math.min(Math.max((bmi - 15) / 25 * 100, 0), 100);
  document.getElementById('rangeMarker').style.left = markerPos + '%';
  
  document.getElementById('result').classList.add('show');
  
  // Save to history
  const history = JSON.parse(localStorage.getItem('bmiHistory') || '[]');
  history.unshift({ date: new Date().toISOString(), bmi, unit });
  if (history.length > 10) history.pop();
  localStorage.setItem('bmiHistory', JSON.stringify(history));
}

// Allow Enter key to calculate
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('keypress', e => {
    if (e.key === 'Enter') calculate();
  });
});
</script>
</body>
</html>
