<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate BMI with metric/imperial toggle and visual range. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .bmi-calc { max-width: 500px; margin: 0 auto; }
  .toggle {
    display: flex;
    margin-bottom: 20px;
  }
  .toggle button {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
  }
  .toggle button:first-child { border-radius: 8px 0 0 8px; }
  .toggle button:last-child { border-radius: 0 8px 8px 0; }
  .toggle button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .input-group label {
    display: block;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .input-group input {
    width: 100%;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 18px;
    box-sizing: border-box;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .result {
    text-align: center;
    padding: 24px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .bmi-value {
    font-size: 48px;
    font-weight: 600;
    color: var(--text);
  }
  .bmi-category {
    font-size: 18px;
    margin-top: 8px;
    color: var(--text-secondary);
  }
  .visual {
    height: 12px;
    border-radius: 6px;
    background: linear-gradient(to right, #6cb6ff 0%, #6cb6ff 18.5%, #7af782 18.5%, #7af782 50%, #f7b731 50%, #f7b731 75%, #f77 75%, #f77 100%);
    margin-bottom: 8px;
    position: relative;
  }
  .indicator {
    position: absolute;
    top: -4px;
    width: 4px;
    height: 20px;
    background: white;
    border: 2px solid var(--text);
    border-radius: 2px;
  }
  .ranges {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
  }
  button.calculate {
    width: 100%;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-size: 16px;
    cursor: pointer;
  }
  button.calculate:hover { opacity: 0.9; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="bmi-calc">
    <h1>BMI Calculator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Calculate your Body Mass Index.</p>
    
    <div class="toggle">
      <button class="active" onclick="setUnit('metric', this)" id="btnMetric">Metric</button>
      <button onclick="setUnit('imperial', this)" id="btnImperial">Imperial</button>
    </div>
    
    <div class="inputs" id="inputs">
      <!-- Metric: kg, cm -->
    </div>
    
    <div class="result" id="result" style="display:none;">
      <div class="bmi-value" id="bmiValue">--</div>
      <div class="bmi-category" id="bmiCategory"></div>
      <div class="visual">
        <div class="indicator" id="indicator"></div>
      </div>
      <div class="ranges">
        <span>Underweight</span>
        <span>Normal</span>
        <span>Overweight</span>
        <span>Obese</span>
      </div>
    </div>
    
    <button class="calculate" onclick="calculate()">Calculate BMI</button>
  </div>
</div>
<script>
  let unit = 'metric';
  
  function setUnit(u, btn) {
    unit = u;
    document.querySelectorAll('.toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderInputs();
  }
  
  function renderInputs() {
    const container = document.getElementById('inputs');
    if (unit === 'metric') {
      container.innerHTML = `
        <div class="input-group">
          <label>Weight (kg)</label>
          <input type="number" id="weight" placeholder="70">
        </div>
        <div class="input-group">
          <label>Height (cm)</label>
          <input type="number" id="height" placeholder="175">
        </div>
      `;
    } else {
      container.innerHTML = `
        <div class="input-group">
          <label>Weight (lbs)</label>
          <input type="number" id="weight" placeholder="154">
        </div>
        <div class="input-group">
          <label>Height (in)</label>
          <input type="number" id="height" placeholder="69">
        </div>
      `;
    }
  }
  
  function calculate() {
    const weight = parseFloat(document.getElementById('weight').value);
    const height = parseFloat(document.getElementById('height').value);
    
    if (!weight || !height) return;
    
    let bmi;
    if (unit === 'metric') {
      bmi = weight / ((height / 100) ** 2);
    } else {
      bmi = (weight / (height ** 2)) * 703;
    }
    
    bmi = Math.round(bmi * 10) / 10;
    
    let category, color;
    if (bmi < 18.5) {
      category = 'Underweight';
      color = '#6cb6ff';
    } else if (bmi < 25) {
      category = 'Normal weight';
      color = '#7af782';
    } else if (bmi < 30) {
      category = 'Overweight';
      color = '#f7b731';
    } else {
      category = 'Obese';
      color = '#f77';
    }
    
    document.getElementById('result').style.display = 'block';
    document.getElementById('bmiValue').textContent = bmi;
    document.getElementById('bmiValue').style.color = color;
    document.getElementById('bmiCategory').textContent = category;
    document.getElementById('bmiCategory').style.color = color;
    
    // Position indicator
    const pos = Math.min(100, Math.max(0, (bmi / 40) * 100));
    document.getElementById('indicator').style.left = pos + '%';
  }
  
  renderInputs();
</script>
</body>
</html>
