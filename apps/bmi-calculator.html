<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate your BMI with metric/imperial toggle, category display, and healthy range visualization.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .calculator { max-width: 480px; margin: 2rem auto; padding: 2rem; background: var(--bg-secondary); border-radius: 12px; }
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
  input, select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--fg); font-size: 16px; }
  .toggle { display: flex; gap: 1rem; margin-bottom: 1.5rem; justify-content: center; }
  .toggle label { font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
  .result { margin-top: 2rem; padding: 1.5rem; background: var(--bg); border-radius: 8px; text-align: center; }
  .bmi-value { font-size: 3rem; font-weight: 700; color: var(--accent); }
  .bmi-category { font-size: 1.25rem; margin-top: 0.5rem; padding: 0.5rem 1rem; border-radius: 4px; display: inline-block; }
  .category-underweight { background: #fef3c7; color: #92400e; }
  .category-normal { background: #d1fae5; color: #065f46; }
  .category-overweight { background: #fed7aa; color: #9a3412; }
  .category-obese { background: #fecaca; color: #991b1b; }
  .range-bar { margin-top: 1.5rem; height: 8px; background: linear-gradient(to right, #3b82f6, #22c55e, #eab308, #ef4444); border-radius: 4px; position: relative; }
  .range-marker { position: absolute; top: -8px; width: 4px; height: 24px; background: var(--fg); border-radius: 2px; transform: translateX(-50%); }
  .range-labels { display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 0.75rem; color: var(--fg-muted); }
  .dual-input { display: flex; gap: 0.5rem; }
  .dual-input input { flex: 1; }
  button { width: 100%; padding: 1rem; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
  button:hover { opacity: 0.9; }
</style>
</head>
<body data-page-type="app">
<div class="calculator">
  <h1>BMI Calculator</h1>
  <div class="toggle">
    <label><input type="radio" name="system" value="metric" checked onchange="updateUnits()"> Metric</label>
    <label><input type="radio" name="system" value="imperial" onchange="updateUnits()"> Imperial</label>
  </div>
  <div class="input-group" id="heightInput">
    <label id="heightLabel">Height (cm)</label>
    <input type="number" id="height" placeholder="175">
  </div>
  <div class="input-group" id="weightInput">
    <label id="weightLabel">Weight (kg)</label>
    <input type="number" id="weight" placeholder="70">
  </div>
  <button onclick="calculate()">Calculate BMI</button>
  <div class="result" id="result" style="display: none;">
    <div class="bmi-value" id="bmiValue">22.9</div>
    <div class="bmi-category" id="bmiCategory">Normal</div>
    <div class="range-bar">
      <div class="range-marker" id="rangeMarker" style="left: 45%;"></div>
    </div>
    <div class="range-labels">
      <span>15</span><span>18.5</span><span>25</span><span>30</span><span>40</span>
    </div>
  </div>
</div>
<script>
  let currentSystem = 'metric';

  function updateUnits() {
    const system = document.querySelector('input[name="system"]:checked').value;
    currentSystem = system;
    document.getElementById('heightLabel').textContent = system === 'metric' ? 'Height (cm)' : 'Height (ft/in)';
    document.getElementById('weightLabel').textContent = system === 'metric' ? 'Weight (kg)' : 'Weight (lbs)';
    const heightInput = document.getElementById('height');
    const weightInput = document.getElementById('weight');
    if (system === 'imperial') {
      heightInput.placeholder = "5'9\" = 5.9";
      weightInput.placeholder = "150";
    } else {
      heightInput.placeholder = "175";
      weightInput.placeholder = "70";
    }
  }

  function calculate() {
    const height = parseFloat(document.getElementById('height').value);
    const weight = parseFloat(document.getElementById('weight').value);
    
    if (!height || !weight) {
      alert('Please enter both height and weight');
      return;
    }

    let bmi;
    if (currentSystem === 'metric') {
      bmi = weight / ((height / 100) ** 2);
    } else {
      const feet = Math.floor(height);
      const inches = (height - feet) * 10;
      const totalInches = feet * 12 + inches;
      bmi = (weight / (totalInches ** 2)) * 703;
    }

    bmi = Math.round(bmi * 10) / 10;
    
    let category, className;
    if (bmi < 18.5) {
      category = 'Underweight';
      className = 'category-underweight';
    } else if (bmi < 25) {
      category = 'Normal';
      className = 'category-normal';
    } else if (bmi < 30) {
      category = 'Overweight';
      className = 'category-overweight';
    } else {
      category = 'Obese';
      className = 'category-obese';
    }

    document.getElementById('bmiValue').textContent = bmi;
    const catEl = document.getElementById('bmiCategory');
    catEl.textContent = category;
    catEl.className = 'bmi-category ' + className;
    
    const markerPos = Math.min(Math.max((bmi - 15) / 25 * 100, 0), 100);
    document.getElementById('rangeMarker').style.left = markerPos + '%';
    
    document.getElementById('result').style.display = 'block';
  }
</script>
</body>
</html>
