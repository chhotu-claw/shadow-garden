<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipboard History — Shadow's Garden</title>
<meta name="description" content="Store and reuse your last 50 clipboard items. Click to copy back.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --muted: #8b949e; --border: #30363d; --success: #3fb950; }
  .controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .controls label { color: var(--muted); font-size: 0.9rem; }
  .controls input[type="number"] { width: 60px; padding: 0.4rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 0.9rem; }
  .btn { padding: 0.5rem 1rem; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; background: var(--border); color: var(--text); }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #0d1117; }
  .clip-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .clip-item { display: flex; gap: 0.75rem; align-items: flex-start; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; }
  .clip-content { flex: 1; word-break: break-word; font-size: 0.9rem; white-space: pre-wrap; max-height: 100px; overflow-y: auto; color: var(--text); }
  .clip-actions { display: flex; flex-direction: column; gap: 0.4rem; }
  .clip-btn { padding: 0.3rem 0.6rem; font-size: 0.75rem; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--muted); cursor: pointer; }
  .clip-btn:hover { color: var(--accent); border-color: var(--accent); }
  .clip-btn.delete:hover { color: #f85149; border-color: #f85149; }
  .empty { color: var(--muted); text-align: center; padding: 2rem; font-style: italic; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--success); color: #0d1117; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Clipboard History</h1>
  <p style="color: var(--muted); margin-bottom: 1rem;">Your last 50 copies, saved locally. Click any item to copy it back.</p>
  
  <div class="controls">
    <label>Max items:</label>
    <input type="number" id="maxItems" value="50" min="5" max="100">
    <button class="btn" onclick="updateLimit()">Update</button>
    <button class="btn" onclick="clearAll()">Clear All</button>
  </div>
  
  <div id="clipList" class="clip-list"></div>
</div>

<div id="toast" class="toast">Copied!</div>

<script>
const STORAGE_KEY = 'clipboard-history';
let maxItems = 50;

function load() {
  const stored = localStorage.getItem(STORAGE_KEY);
  return stored ? JSON.parse(stored) : [];
}

function save(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items.slice(0, maxItems)));
}

function addItem(text) {
  if (!text.trim()) return;
  let items = load();
  // Remove if already exists (to move to top)
  items = items.filter(i => i.text !== text);
  items.unshift({ text, time: Date.now() });
  save(items);
  render();
}

function deleteItem(index) {
  let items = load();
  items.splice(index, 1);
  save(items);
  render();
}

function copyItem(index) {
  const items = load();
  const text = items[index].text;
  navigator.clipboard.writeText(text).then(() => {
    showToast();
  });
}

function clearAll() {
  if (!confirm('Clear all clipboard history?')) return;
  localStorage.removeItem(STORAGE_KEY);
  render();
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

function updateLimit() {
  maxItems = parseInt(document.getElementById('maxItems').value) || 50;
  let items = load();
  save(items);
  render();
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString();
}

function render() {
  const items = load();
  const container = document.getElementById('clipList');
  
  if (items.length === 0) {
    container.innerHTML = '<div class="empty">No clipboard history yet. Copy something to get started.</div>';
    return;
  }
  
  container.innerHTML = items.map((item, i) => `
    <div class="clip-item">
      <div class="clip-content">${escapeHtml(item.text)}</div>
      <div class="clip-actions">
        <button class="clip-btn" onclick="copyItem(${i})">Copy</button>
        <button class="clip-btn delete" onclick="deleteItem(${i})">Delete</button>
      </div>
    </div>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Listen for clipboard changes
let lastClipboard = '';
setInterval(() => {
  navigator.clipboard.readText().then(text => {
    if (text && text !== lastClipboard) {
      lastClipboard = text;
      addItem(text);
    }
  }).catch(() => {});
}, 2000);

render();
</script>
</body>
</html>
