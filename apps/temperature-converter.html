<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter — Shadow's Garden</title>
<meta name="description" content="Convert between Celsius, Fahrenheit, and Kelvin instantly.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .converter {
    max-width: 600px;
    margin: 0 auto;
  }
  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .input-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .input-card label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
    font-weight: 500;
  }
  .input-card input {
    width: 100%;
    font-size: 1.5rem;
    text-align: center;
    padding: 0.5rem;
  }
  .input-card .unit {
    text-align: center;
    font-size: 1rem;
    color: var(--accent);
    margin-top: 0.5rem;
  }
  .quick-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .quick-buttons button {
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
  }
  .info-panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
  }
  .info-panel h3 {
    font-size: 1rem;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }
  .common-temps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 0.75rem;
  }
  .common-temp {
    background: var(--bg-tertiary);
    padding: 0.75rem;
    border-radius: 8px;
    text-align: center;
    font-size: 0.9rem;
  }
  .common-temp .c {
    color: var(--accent);
    font-weight: 600;
  }
  .common-temp .desc {
    color: var(--text-secondary);
    font-size: 0.8rem;
    margin-top: 0.25rem;
  }
  .hero {
    text-align: center;
    padding: 1rem 0 2rem;
  }
  .hero h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }
  .hero p {
    color: var(--text-secondary);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="hero">
    <h1>Temperature Converter</h1>
    <p>Celsius, Fahrenheit, Kelvin — instant conversion</p>
  </div>

  <div class="converter">
    <div class="quick-buttons">
      <button onclick="setTemp(0)">Freezing</button>
      <button onclick="setTemp(20)">Room Temp</button>
      <button onclick="setTemp(37)">Body Temp</button>
      <button onclick="setTemp(100)">Boiling</button>
      <button onclick="setTemp(-40)">Equal Point</button>
    </div>

    <div class="input-row">
      <div class="input-card">
        <label>°Celsius</label>
        <input type="number" id="celsius" oninput="convertFrom('c')">
        <div class="unit">°C</div>
      </div>
      <div class="input-card">
        <label>°Fahrenheit</label>
        <input type="number" id="fahrenheit" oninput="convertFrom('f')">
        <div class="unit">°F</div>
      </div>
      <div class="input-card">
        <label>Kelvin</label>
        <input type="number" id="kelvin" oninput="convertFrom('k')">
        <div class="unit">K</div>
      </div>
    </div>

    <div class="info-panel">
      <h3>Common Reference Points</h3>
      <div class="common-temps">
        <div class="common-temp"><div class="c">0°C</div><div class="desc">Water freezes</div></div>
        <div class="common-temp"><div class="c">100°C</div><div class="desc">Water boils</div></div>
        <div class="common-temp"><div class="c">37°C</div><div class="desc">Human body</div></div>
        <div class="common-temp"><div class="c">-40°C</div><div class="desc">Equal point</div></div>
        <div class="common-temp"><div class="c">20°C</div><div class="desc">Room temp</div></div>
        <div class="common-temp"><div class="c">-273°C</div><div class="desc">Absolute zero</div></div>
      </div>
    </div>
  </div>
</div>

<script>
  let updating = false;

  function convertFrom(source) {
    if (updating) return;
    updating = true;

    const c = document.getElementById('celsius');
    const f = document.getElementById('fahrenheit');
    const k = document.getElementById('kelvin');

    let celsiusVal;
    if (source === 'c') {
      celsiusVal = parseFloat(c.value);
    } else if (source === 'f') {
      celsiusVal = (parseFloat(f.value) - 32) * 5/9;
    } else if (source === 'k') {
      celsiusVal = parseFloat(k.value) - 273.15;
    }

    if (!isNaN(celsiusVal)) {
      c.value = round(celsiusVal);
      f.value = round(celsiusVal * 9/5 + 32);
      k.value = round(celsiusVal + 273.15);
    }

    updating = false;
  }

  function setTemp(celsius) {
    if (updating) return;
    updating = true;
    document.getElementById('celsius').value = celsius;
    document.getElementById('fahrenheit').value = round(celsius * 9/5 + 32);
    document.getElementById('kelvin').value = round(celsius + 273.15);
    updating = false;
  }

  function round(n) {
    if (Number.isInteger(n)) return n;
    return Math.round(n * 100) / 100;
  }
</script>
</body>
</html>
