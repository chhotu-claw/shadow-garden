<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Expression Generator — Shadow's Garden</title>
<meta name="description" content="Generate and understand cron expressions. Visual builder, human-readable explanation, and next run times.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
  .container { width: 100%; max-width: 600px; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 2rem; }
  .expression-box { background: var(--card); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .expression-box label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary); }
  .expression-input { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 1.2rem; box-sizing: border-box; }
  .expression-input:focus { outline: none; border-color: var(--accent); }
  .result { margin-top: 1rem; padding: 1rem; background: var(--bg); border-radius: 8px; }
  .result-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
  .result-value { font-size: 1rem; line-height: 1.6; }
  .builder { background: var(--card); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .builder h2 { font-size: 1.1rem; margin-bottom: 1rem; }
  .field-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .field-row label { min-width: 80px; font-weight: 600; color: var(--text-secondary); }
  .field-row select { padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); }
  .field-row input { padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); width: 80px; }
  .next-runs { background: var(--card); border-radius: 12px; padding: 1.5rem; }
  .next-runs h2 { font-size: 1.1rem; margin-bottom: 1rem; }
  .run-time { padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.9rem; }
  .run-time:last-child { border-bottom: none; }
  .error { color: #ef4444; font-size: 0.9rem; margin-top: 0.5rem; }
  .common-presets { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
  .preset-btn { padding: 0.4rem 0.8rem; background: var(--border); color: var(--text); border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
  .preset-btn:hover { background: var(--accent); color: var(--bg); }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Cron Expression Generator</h1>
    <p class="subtitle">Build and understand cron schedules</p>
    
    <div class="expression-box">
      <label>Cron Expression</label>
      <input type="text" class="expression-input" id="cronInput" placeholder="* * * * *" value="* * * * *">
      <div class="common-presets">
        <button class="preset-btn" onclick="setPreset('* * * * *')">Every minute</button>
        <button class="preset-btn" onclick="setPreset('0 * * * *')">Every hour</button>
        <button class="preset-btn" onclick="setPreset('0 0 * * *')">Daily midnight</button>
        <button class="preset-btn" onclick="setPreset('0 0 * * 0')">Weekly Sunday</button>
        <button class="preset-btn" onclick="setPreset('0 0 1 * *')">Monthly 1st</button>
      </div>
      <div class="result" id="humanResult" style="display: none;">
        <div class="result-label">Human readable:</div>
        <div class="result-value" id="humanText"></div>
      </div>
      <div class="error" id="errorMsg" style="display: none;"></div>
    </div>
    
    <div class="builder">
      <h2>Visual Builder</h2>
      <div class="field-row">
        <label>Minute</label>
        <select id="minuteType" onchange="updateFromBuilder()">
          <option value="*">Every minute (*)</option>
          <option value="specific">Specific</option>
          <option value="range">Range</option>
          <option value="step">Step</option>
        </select>
        <input type="text" id="minuteValue" placeholder="0" style="display:none" onchange="updateFromBuilder()">
      </div>
      <div class="field-row">
        <label>Hour</label>
        <select id="hourType" onchange="updateFromBuilder()">
          <option value="*">Every hour (*)</option>
          <option value="specific">Specific</option>
          <option value="range">Range</option>
          <option value="step">Step</option>
        </select>
        <input type="text" id="hourValue" placeholder="0" style="display:none" onchange="updateFromBuilder()">
      </div>
      <div class="field-row">
        <label>Day</label>
        <select id="dayType" onchange="updateFromBuilder()">
          <option value="*">Every day (*)</option>
          <option value="specific">Specific</option>
          <option value="range">Range</option>
        </select>
        <input type="text" id="dayValue" placeholder="1" style="display:none" onchange="updateFromBuilder()">
      </div>
      <div class="field-row">
        <label>Month</label>
        <select id="monthType" onchange="updateFromBuilder()">
          <option value="*">Every month (*)</option>
          <option value="specific">Specific</option>
        </select>
        <input type="text" id="monthValue" placeholder="1" style="display:none" onchange="updateFromBuilder()">
      </div>
      <div class="field-row">
        <label>Weekday</label>
        <select id="weekdayType" onchange="updateFromBuilder()">
          <option value="*">Any day (*)</option>
          <option value="specific">Specific</option>
        </select>
        <input type="text" id="weekdayValue" placeholder="0" style="display:none" onchange="updateFromBuilder()">
      </div>
    </div>
    
    <div class="next-runs" id="nextRunsBox">
      <h2>Next 5 runs</h2>
      <div id="nextRuns"></div>
    </div>
  </div>
  
  <script>
    const fieldNames = ['minute', 'hour', 'day', 'month', 'weekday'];
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    
    function setPreset(expr) {
      document.getElementById('cronInput').value = expr;
      parseAndDisplay();
    }
    
    document.getElementById('cronInput').addEventListener('input', parseAndDisplay);
    
    function parseAndDisplay() {
      const expr = document.getElementById('cronInput').value.trim();
      const parts = expr.split(/\s+/);
      const errorEl = document.getElementById('errorMsg');
      const humanEl = document.getElementById('humanResult');
      
      if (parts.length !== 5) {
        errorEl.textContent = 'Cron expression must have 5 fields (minute hour day month weekday)';
        errorEl.style.display = 'block';
        humanEl.style.display = 'none';
        document.getElementById('nextRuns').innerHTML = '';
        return;
      }
      
      errorEl.style.display = 'none';
      humanEl.style.display = 'block';
      
      const human = explainCron(parts);
      document.getElementById('humanText').textContent = human;
      
      calculateNextRuns(parts);
    }
    
    function explainCron(parts) {
      const [min, hour, day, month, wd] = parts;
      let desc = [];
      
      // Minute
      if (min === '*') desc.push('Every minute');
      else if (min.includes('/')) desc.push(`Every ${min.split('/')[1]} minutes`);
      else desc.push(`At minute ${min}`);
      
      // Hour
      if (hour === '*') desc.push('of every hour');
      else if (hour.includes('/')) desc.push(`every ${hour.split('/')[1]} hours`);
      else desc.push(`at hour ${hour}`);
      
      // Day
      if (day === '*') {}
      else desc.push(`on day ${day}`);
      
      // Month
      if (month === '*') {}
      else {
        const m = parseInt(month);
        if (m >= 1 && m <= 12) desc.push(`in ${monthNames[m-1]}`);
        else desc.push(`in month ${month}`);
      }
      
      // Weekday
      if (wd !== '*') {
        const d = parseInt(wd);
        if (d >= 0 && d <= 6) desc.push(`on ${dayNames[d]}`);
        else desc.push(`on weekday ${wd}`);
      }
      
      return desc.join(', ').replace(/^./, s => s.toUpperCase());
    }
    
    function calculateNextRuns(parts) {
      const [min, hour, day, month, wd] = parts;
      const now = new Date();
      const runs = [];
      let current = new Date(now);
      current.setSeconds(0);
      current.setMilliseconds(0);
      current.setMinutes(current.getMinutes() + 1);
      
      for (let i = 0; i < 100 && runs.length < 5; i++) {
        if (matches(current, parts)) {
          runs.push(new Date(current));
        }
        current.setMinutes(current.getMinutes() + 1);
      }
      
      const container = document.getElementById('nextRuns');
      if (runs.length === 0) {
        container.innerHTML = '<div class="run-time">No upcoming runs found</div>';
      } else {
        container.innerHTML = runs.map(r => 
          `<div class="run-time">${r.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>`
        ).join('');
      }
    }
    
    function matches(date, parts) {
      const [min, hour, day, month, wd] = parts;
      const m = date.getMinutes();
      const h = date.getHours();
      const d = date.getDate();
      const mo = date.getMonth() + 1;
      const w = date.getDay();
      
      return matchesField(m, min) && matchesField(h, hour) && matchesField(d, day) && matchesField(mo, month) && matchesField(w, wd);
    }
    
    function matchesField(val, field) {
      if (field === '*') return true;
      if (field.includes('/')) {
        const [, step] = field.split('/');
        return val % parseInt(step) === 0;
      }
      if (field.includes('-')) {
        const [start, end] = field.split('-').map(Number);
        return val >= start && val <= end;
      }
      if (field.includes(',')) {
        return field.split(',').map(Number).includes(val);
      }
      return parseInt(field) === val;
    }
    
    function updateFromBuilder() {
      const parts = fieldNames.map(name => {
        const type = document.getElementById(`${name}Type`).value;
        const val = document.getElementById(`${name}Value`).value;
        
        document.getElementById(`${name}Value`).style.display = type === 'specific' || type === 'range' || type === 'step' ? 'block' : 'none';
        
        if (type === '*') return '*';
        if (type === 'specific') return val || '0';
        if (type === 'range') return val ? `${val.split('-')[0] || 0}-${val.split('-')[1] || 59}` : '0-59';
        if (type === 'step') return val ? `*/${val}` : '*/1';
        return '*';
      });
      
      document.getElementById('cronInput').value = parts.join(' ');
      parseAndDisplay();
    }
    
    // Initialize
    parseAndDisplay();
  </script>
</body>
</html>
