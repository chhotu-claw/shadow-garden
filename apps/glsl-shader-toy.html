<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLSL Shader Toy — Shadow's Garden</title>
<meta name="description" content="Interactive GLSL shader editor — write and run custom fragment shaders in real-time"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0d0d12; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
  #container { display: flex; height: 100vh; }
  #editor { width: 45%; height: 100%; display: flex; flex-direction: column; border-right: 1px solid #333; }
  #preview { flex: 1; position: relative; }
  #preview canvas { width: 100%; height: 100%; }
  #toolbar { 
    background: #16161d; padding: 10px 14px; border-bottom: 1px solid #2a2a35;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  #toolbar button {
    background: #2a2a38; border: 1px solid #3a3a48; color: #ccc; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.2s;
  }
  #toolbar button:hover { background: #3a3a4a; border-color: #5a5a6a; }
  #toolbar button.active { background: #3a5a7a; border-color: #5a7a9a; }
  #editor textarea {
    flex: 1; background: #0d0d12; color: #c8c8d0; border: none; padding: 14px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.5;
    resize: none; outline: none;
  }
  #editor textarea::selection { background: #3a4a5a; }
  #errors {
    background: #1a1215; color: #e55; padding: 8px 14px; font-size: 11px; max-height: 80px;
    overflow-y: auto; border-top: 1px solid #3a2a2a; display: none;
  }
  #errors.show { display: block; }
  .preset-chip {
    background: #252530; border: 1px solid #3a3a48; color: #888;
    padding: 4px 10px; border-radius: 12px; font-size: 10px; cursor: pointer;
    transition: all 0.2s;
  }
  .preset-chip:hover { background: #353545; color: #aaa; }
  .preset-chip.active { background: #3a5a7a; border-color: #5a7a9a; color: #fff; }
  #info {
    position: absolute; bottom: 14px; right: 14px; color: #4a4a55; font-size: 10px;
    background: rgba(13,13,18,0.8); padding: 6px 10px; border-radius: 4px;
  }
  #uniforms {
    background: #16161d; padding: 8px 14px; border-top: 1px solid #2a2a35;
    display: flex; gap: 16px; font-size: 11px; color: #6a6a7a; flex-wrap: wrap;
  }
  #uniforms label { display: flex; align-items: center; gap: 6px; }
  #uniforms input[type="range"] { width: 80px; }
</style>
</head>
<body data-page-type="app">
  <div id="container">
    <div id="editor">
      <div id="toolbar">
        <button id="compile">▶ Run</button>
        <button id="reset">Reset</button>
        <button id="download">Save</button>
        <span style="color:#4a4a55;font-size:11px;margin:0 8px;">Presets:</span>
        <span class="preset-chip active" data-preset="plasma">Plasma</span>
        <span class="preset-chip" data-preset="nebula">Nebula</span>
        <span class="preset-chip" data-preset="waves">Waves</span>
        <span class="preset-chip" data-preset="kaleidoscope">Kaleidoscope</span>
        <span class="preset-chip" data-preset="circles">Circles</span>
        <span class="preset-chip" data-preset="raymarch">Raymarch</span>
      </div>
      <textarea id="code" spellcheck="false"></textarea>
      <div id="errors"></div>
      <div id="uniforms">
        <label>Time <input type="range" id="uTime" min="0" max="10" step="0.1" value="0"></label>
        <label>Speed <input type="range" id="uSpeed" min="0" max="2" step="0.1" value="1"></label>
        <label>Scale <input type="range" id="uScale" min="0.5" max="3" step="0.1" value="1"></label>
      </div>
    </div>
    <div id="preview">
      <canvas id="canvas"></canvas>
      <div id="info">Click canvas for mouse position</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    const codeEl = document.getElementById('code');
    const errorsEl = document.getElementById('errors');
    
    let program, time = 0, mouseX = 0.5, mouseY = 0.5, speed = 1, scale = 1;
    let animationId;
    let currentPreset = 'plasma';
    
    const presets = {
      plasma: `// Plasma Shader
precision mediump float;
uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uMouse;

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;
  float t = uTime * 0.5;
  
  float v1 = sin(uv.x * 10.0 + t);
  float v2 = sin(10.0 * (uv.x * sin(t/2.0) + uv.y * cos(t/3.0)) + t);
  float v3 = sin(sqrt(100.0 * ((uv.x-0.5)*(uv.x-0.5) + (uv.y-0.5)*(uv.y-0.5))) + t);
  float v4 = sin(sqrt(50.0 * ((uv.x + 0.5)*(uv.x+0.5) + (uv.y+0.5)*(uv.y+0.5))) + t);
  
  float v = v1 + v2 + v3 + v4;
  vec3 col = vec3(
    sin(v * 3.14159) * 0.5 + 0.5,
    sin(v * 3.14159 + 2.09) * 0.5 + 0.5,
    sin(v * 3.14159 + 4.18) * 0.5 + 0.5
  );
  
  gl_FragColor = vec4(col, 1.0);
}`,
      nebula: `// Nebula Shader
precision mediump float;
uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uMouse;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0;
  float a = 0.5;
  for(int i = 0; i < 5; i++) {
    v += a * noise(p);
    p *= 2.0;
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;
  float t = uTime * 0.2;
  
  vec2 q = vec2(fbm(uv + t * 0.1), fbm(uv + vec2(1.7, 9.2) + t * 0.15));
  vec2 r = vec2(fbm(uv + q + vec2(1.7, 9.2) + t * 0.126), fbm(uv + q + vec2(8.3, 2.8) + t * 0.13));
  
  float f = fbm(uv + r);
  
  vec3 col = mix(vec3(0.1, 0.0, 0.2), vec3(0.3, 0.1, 0.4), clamp(f*f*4.0, 0.0, 1.0));
  col = mix(col, vec3(0.1, 0.3, 0.4), clamp(length(q), 0.0, 1.0));
  col = mix(col, vec3(0.6, 0.3, 0.5), clamp(length(r.x), 0.0, 1.0));
  
  col = pow(col, vec3(1.2));
  col *= f * 1.5;
  
  gl_FragColor = vec4(col, 1.0);
}`,
      waves: `// Waves Shader
precision mediump float;
uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uMouse;

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;
  float t = uTime * 0.8;
  
  float d = length(uv - 0.5);
  float wave = sin(d * 20.0 - t * 3.0) * 0.5 + 0.5;
  wave *= sin(d * 15.0 + t * 2.0) * 0.5 + 0.5;
  
  vec3 col = vec3(
    sin(wave * 3.14159 + t) * 0.5 + 0.5,
    sin(wave * 3.14159 + t + 2.09) * 0.5 + 0.5,
    sin(wave * 3.14159 + t + 4.18) * 0.5 + 0.5
  );
  
  col *= 1.0 - d * 0.8;
  
  gl_FragColor = vec4(col, 1.0);
}`,
      kaleidoscope: `// Kaleidoscope Shader
precision mediump float;
uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uMouse;

float tri(float x) { return abs(x - floor(x + 0.5)) * 2.0; }

void main() {
  vec2 uv = (gl_FragCoord.xy - uResolution * 0.5) / min(uResolution.x, uResolution.y);
  float t = uTime * 0.4;
  
  float angle = atan(uv.y, uv.x);
  float r = length(uv);
  
  float segments = 6.0;
  angle = mod(angle, 3.14159 * 2.0 / segments);
  angle = abs(angle - 3.14159 / segments);
  
  vec2 p = vec2(cos(angle), sin(angle)) * r;
  
  float pattern = sin(p.x * 10.0 + t) * sin(p.y * 10.0 - t);
  pattern += sin(p.x * 7.0 - p.y * 7.0 + t * 0.5) * 0.5;
  
  vec3 col = vec3(
    sin(pattern + t) * 0.5 + 0.5,
    sin(pattern + t + 2.09) * 0.5 + 0.5,
    sin(pattern + t + 4.18) * 0.5 + 0.5
  );
  
  gl_FragColor = vec4(col * (1.0 - r * 0.5), 1.0);
}`,
      circles: `// Circles Shader
precision mediump float;
uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uMouse;

void main() {
  vec2 uv = (gl_FragCoord.xy - uResolution * 0.5) / min(uResolution.x, uResolution.y);
  float t = uTime * 0.6;
  
  vec3 col = vec3(0.0);
  
  for(float i = 1.0; i < 8.0; i++) {
    float r = length(uv) + sin(t * 0.5 + i) * 0.1;
    float circle = smoothstep(0.02, 0.0, abs(r - i * 0.1 - sin(t + i) * 0.05));
    vec3 c = vec3(
      sin(i * 0.5 + t) * 0.5 + 0.5,
      sin(i * 0.7 + t * 1.3) * 0.5 + 0.5,
      sin(i * 0.9 + t * 0.7) * 0.5 + 0.5
    );
    col += circle * c * 0.5;
  }
  
  gl_FragColor = vec4(col, 1.0);
}`,
      raymarch: `// Raymarching - Sphere
precision mediump float;
uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uMouse;

float sdSphere(vec3 p, float r) { return length(p) - r; }
float sdBox(vec3 p, vec3 b) {
  vec3 d = abs(p) - b;
  return min(max(d.x, max(d.y, d.z)), 0.0) + length(max(d, 0.0));
}

float map(vec3 p) {
  float t = uTime * 0.5;
  vec3 q = p - vec3(sin(t) * 0.5, cos(t * 0.7) * 0.3, 0.0);
  float sphere = sdSphere(q, 0.5);
  float box = sdBox(p - vec3(-0.7, sin(t) * 0.3, 0.0), vec3(0.4));
  return min(sphere, box);
}

vec3 getNormal(vec3 p) {
  vec2 e = vec2(0.001, 0.0);
  return normalize(vec3(
    map(p + e.xyy) - map(p - e.xyy),
    map(p + e.yxy) - map(p - e.yxy),
    map(p + e.yyx) - map(p - e.yyx)
  ));
}

void main() {
  vec2 uv = (gl_FragCoord.xy - uResolution * 0.5) / uResolution.y;
  
  vec3 ro = vec3(0.0, 0.0, 3.0);
  vec3 rd = normalize(vec3(uv, -1.0));
  
  float t = 0.0;
  for(int i = 0; i < 64; i++) {
    vec3 p = ro + rd * t;
    float d = map(p);
    if(d < 0.001 || t > 20.0) break;
    t += d;
  }
  
  vec3 col = vec3(0.05, 0.05, 0.1);
  if(t < 20.0) {
    vec3 p = ro + rd * t;
    vec3 n = getNormal(p);
    vec3 light = normalize(vec3(1.0, 1.0, 1.0));
    float diff = max(dot(n, light), 0.0);
    float spec = pow(max(dot(reflect(-light, n), -rd), 0.0), 32.0);
    col = vec3(0.2, 0.4, 0.6) * diff + vec3(0.5) * spec;
  }
  
  gl_FragColor = vec4(col, 1.0);
}`
    };
    
    const vertexShaderSrc = `
      attribute vec2 a_position;
      void main() {
        gl_Position = vec4(a_position, 0.0, 1.0);
      }
    `;
    
    function createShader(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        const err = gl.getShaderInfoLog(shader);
        gl.deleteShader(shader);
        throw err;
      }
      return shader;
    }
    
    function initGL() {
      const vs = createShader(gl.VERTEX_SHADER, vertexShaderSrc);
      const fs = createShader(gl.FRAGMENT_SHADER, codeEl.value);
      
      program = gl.createProgram();
      gl.attachShader(program, vs);
      gl.attachShader(program, fs);
      gl.linkProgram(program);
      
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        throw gl.getProgramInfoLog(program);
      }
      
      const pos = gl.getAttribLocation(program, 'a_position');
      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
      gl.enableVertexAttribArray(pos);
      gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
      
      errorsEl.classList.remove('show');
      errorsEl.textContent = '';
    }
    
    function resize() {
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      gl.viewport(0, 0, canvas.width, canvas.height);
    }
    
    function render() {
      gl.useProgram(program);
      
      const uTime = gl.getUniformLocation(program, 'uTime');
      const uResolution = gl.getUniformLocation(program, 'uResolution');
      const uMouse = gl.getUniformLocation(program, 'uMouse');
      
      gl.uniform1f(uTime, time);
      gl.uniform2f(uResolution, canvas.width, canvas.height);
      gl.uniform2f(uMouse, mouseX, mouseY);
      
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }
    
    function animate() {
      time += 0.016 * speed;
      document.getElementById('uTime').value = time % 10;
      render();
      animationId = requestAnimationFrame(animate);
    }
    
    function compile() {
      try {
        initGL();
        if (animationId) cancelAnimationFrame(animationId);
        animate();
      } catch (e) {
        errorsEl.textContent = e;
        errorsEl.classList.add('show');
      }
    }
    
    function loadPreset(name) {
      currentPreset = name;
      codeEl.value = presets[name];
      document.querySelectorAll('.preset-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.preset === name);
      });
      time = 0;
      compile();
    }
    
    // Events
    document.getElementById('compile').addEventListener('click', compile);
    document.getElementById('reset').addEventListener('click', () => loadPreset(currentPreset));
    document.getElementById('download').addEventListener('click', () => {
      const blob = new Blob([codeEl.value], { type: 'text/plain' });
      const a = document.createElement('a');
      a.download = 'shader.glsl';
      a.href = URL.createObjectURL(blob);
      a.click();
    });
    
    document.querySelectorAll('.preset-chip').forEach(chip => {
      chip.addEventListener('click', () => loadPreset(chip.dataset.preset));
    });
    
    document.getElementById('uSpeed').addEventListener('input', e => speed = +e.target.value);
    document.getElementById('uScale').addEventListener('input', e => {
      scale = +e.target.value;
      // Apply scale in shader via uniform if needed
    });
    
    canvas.addEventListener('mousemove', e => {
      mouseX = e.clientX / canvas.clientWidth;
      mouseY = 1.0 - e.clientY / canvas.clientHeight;
    });
    
    window.addEventListener('resize', resize);
    
    // Init
    loadPreset('plasma');
  </script>
</body>
</html>
