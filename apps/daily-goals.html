<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Goals — Shadow's Garden</title>
<meta name="description" content="Set 3 priorities, track them daily, build streaks. Simple focus tool.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --success: #3fb950;
    --danger: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }
  .container {
    max-width: 500px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--text);
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.875rem;
    margin-bottom: 2rem;
  }
  .goals-form {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }
  .input-row {
    display: flex;
    gap: 0.5rem;
  }
  input[type="text"] {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.75rem 1rem;
    border-radius: 6px;
    font-size: 1rem;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.75rem 1.25rem;
    border-radius: 6px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button.secondary {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
  }
  button.danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    padding: 0.5rem 0.75rem;
    font-size: 0.75rem;
  }
  .goals-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .goal-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 1rem;
    border-radius: 8px;
    transition: border-color 0.2s;
  }
  .goal-item.completed {
    border-color: var(--success);
    opacity: 0.7;
  }
  .goal-item.completed .goal-text {
    text-decoration: line-through;
    color: var(--muted);
  }
  .checkbox {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .checkbox:hover { border-color: var(--accent); }
  .goal-item.completed .checkbox {
    background: var(--success);
    border-color: var(--success);
  }
  .goal-item.completed .checkbox::after {
    content: '✓';
    color: #fff;
    font-size: 14px;
  }
  .goal-text {
    flex: 1;
    font-size: 1rem;
  }
  .goal-actions {
    display: flex;
    gap: 0.25rem;
  }
  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.25rem;
    padding: 0.25rem;
    line-height: 1;
  }
  .delete-btn:hover { color: var(--danger); }
  .stats {
    margin-top: 2rem;
    padding: 1.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .stats h2 {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .streak {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
  }
  .streak-label {
    color: var(--muted);
    font-size: 0.875rem;
  }
  .history {
    margin-top: 1.5rem;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.875rem;
  }
  .history-item:last-child { border-bottom: none; }
  .history-date { color: var(--muted); }
  .history-status { color: var(--success); }
  .empty {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Daily Goals</h1>
    <p class="subtitle">Focus on 3 things. Build the streak.</p>

    <div class="goals-form">
      <div class="input-row">
        <input type="text" id="newGoal" placeholder="What's your priority today?" maxlength="100">
        <button onclick="addGoal()">Add</button>
      </div>
    </div>

    <div class="goals-list" id="goalsList"></div>

    <div class="stats">
      <h2>Current Streak</h2>
      <div class="streak" id="streakCount">0</div>
      <div class="streak-label">days in a row</div>
      
      <div class="history" id="historySection" style="display:none;">
        <h2>Recent History</h2>
        <div id="historyList"></div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'dailyGoals';
    const HISTORY_KEY = 'dailyGoalsHistory';
    const MAX_GOALS = 3;

    function getToday() {
      return new Date().toISOString().split('T')[0];
    }

    function getGoals() {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const today = getToday();
      if (data.date !== today) {
        if (data.goals && data.goals.length > 0) {
          const completed = data.goals.filter(g => g.completed).length;
          if (completed === data.goals.length && data.goals.length > 0) {
            addToHistory(data.date, true);
          } else if (data.goals.length > 0) {
            addToHistory(data.date, false);
          }
        }
        return { date: today, goals: [] };
      }
      return data;
    }

    function saveGoals(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
    }

    function addGoal() {
      const input = document.getElementById('newGoal');
      const text = input.value.trim();
      if (!text) return;

      const data = getGoals();
      if (data.goals.length >= MAX_GOALS) {
        alert('Max 3 goals per day. Complete or remove one first.');
        return;
      }

      data.goals.push({ id: Date.now(), text: text, completed: false });
      saveGoals(data);
      input.value = '';
    }

    function toggleGoal(id) {
      const data = getGoals();
      const goal = data.goals.find(g => g.id === id);
      if (goal) {
        goal.completed = !goal.completed;
        saveGoals(data);
      }
    }

    function deleteGoal(id) {
      const data = getGoals();
      data.goals = data.goals.filter(g => g.id !== id);
      saveGoals(data);
    }

    function addToHistory(date, success) {
      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      history.unshift({ date, success });
      if (history.length > 30) history.pop();
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function getHistory() {
      return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    }

    function calculateStreak() {
      const history = getHistory();
      if (history.length === 0) return 0;

      let streak = 0;
      let checkDate = new Date();
      
      for (const entry of history) {
        const entryDate = entry.date;
        const expected = checkDate.toISOString().split('T')[0];
        
        if (entry.success && entryDate === expected) {
          streak++;
          checkDate.setDate(checkDate.getDate() - 1);
        } else if (entryDate === expected && !entry.success) {
          break;
        }
      }
      return streak;
    }

    function render() {
      const data = getGoals();
      const list = document.getElementById('goalsList');
      const streakEl = document.getElementById('streakCount');
      const historySection = document.getElementById('historySection');
      const historyList = document.getElementById('historyList');

      if (data.goals.length === 0) {
        list.innerHTML = '<div class="empty">No goals for today. Add up to 3 priorities.</div>';
      } else {
        list.innerHTML = data.goals.map(goal => `
          <div class="goal-item ${goal.completed ? 'completed' : ''}">
            <div class="checkbox" onclick="toggleGoal(${goal.id})"></div>
            <span class="goal-text">${escapeHtml(goal.text)}</span>
            <div class="goal-actions">
              <button class="delete-btn" onclick="deleteGoal(${goal.id})">×</button>
            </div>
          </div>
        `).join('');
      }

      const streak = calculateStreak();
      streakEl.textContent = streak;

      const history = getHistory();
      if (history.length > 0) {
        historySection.style.display = 'block';
        historyList.innerHTML = history.slice(0, 7).map(h => `
          <div class="history-item">
            <span class="history-date">${h.date}</span>
            <span class="history-status">${h.success ? '✓ All done' : '✗ Incomplete'}</span>
          </div>
        `).join('');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('newGoal').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addGoal();
    });

    render();
  </script>
</body>
</html>
