<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Goals — Shadow's Garden</title>
<meta name="description" content="Three priorities max. Reset daily. Stay focused.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-body); }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }
  .goal-input { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
  .goal-input input { 
    flex: 1; padding: 0.75rem; border: 1px solid var(--border);
    border-radius: 6px; font-size: 1rem; background: var(--bg); color: var(--text);
  }
  .goal-input button {
    padding: 0.75rem 1.25rem; background: var(--accent); color: white;
    border: none; border-radius: 6px; cursor: pointer; font-size: 1rem;
  }
  .goal-input button:hover { opacity: 0.9; }
  .goals-list { list-style: none; padding: 0; margin: 0; }
  .goal-item { 
    display: flex; align-items: center; gap: 0.75rem; padding: 1rem;
    background: var(--bg-secondary); border-radius: 8px; margin-bottom: 0.75rem;
    transition: all 0.2s;
  }
  .goal-item.completed { opacity: 0.5; }
  .goal-item.completed .goal-text { text-decoration: line-through; }
  .goal-checkbox {
    width: 24px; height: 24px; cursor: pointer; accent-color: var(--accent);
  }
  .goal-text { flex: 1; font-size: 1.1rem; }
  .goal-delete {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 1.25rem; padding: 0.25rem 0.5rem;
  }
  .goal-delete:hover { color: var(--accent); }
  .streak { 
    margin-top: 2rem; padding: 1rem; background: var(--bg-secondary);
    border-radius: 8px; text-align: center;
  }
  .streak-number { font-size: 2rem; font-weight: bold; color: var(--accent); }
  .streak-label { font-size: 0.85rem; color: var(--text-muted); }
  .reset-btn {
    display: block; margin: 2rem auto 0; padding: 0.5rem 1rem;
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 4px; cursor: pointer; font-size: 0.85rem;
  }
  .reset-btn:hover { border-color: var(--text); color: var(--text); }
  .empty { text-align: center; color: var(--text-muted); padding: 2rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Daily Goals</h1>
  <p class="subtitle">Three priorities. That's it.</p>
  
  <div class="goal-input">
    <input type="text" id="goalInput" placeholder="What's important today?" maxlength="100">
    <button id="addBtn">Add</button>
  </div>
  
  <ul class="goals-list" id="goalsList"></ul>
  
  <div class="streak">
    <div class="streak-number" id="streakCount">0</div>
    <div class="streak-label">day streak</div>
  </div>
  
  <button class="reset-btn" id="resetBtn">Reset All</button>
</div>

<script>
const STORAGE_KEY = 'daily_goals';
const STREAK_KEY = 'goal_streak';
const DATE_KEY = 'goal_date';

const goalsList = document.getElementById('goalsList');
const goalInput = document.getElementById('goalInput');
const addBtn = document.getElementById('addBtn');
const streakCount = document.getElementById('streakCount');
const resetBtn = document.getElementById('resetBtn');

let goals = [];

function loadGoals() {
  const stored = localStorage.getItem(STORAGE_KEY);
  goals = stored ? JSON.parse(stored) : [];
  renderGoals();
  updateStreak();
}

function saveGoals() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(goals));
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function updateStreak() {
  const lastDate = localStorage.getItem(DATE_KEY);
  const today = getToday();
  const streak = parseInt(localStorage.getItem(STREAK_KEY) || '0', 10);
  
  if (lastDate !== today) {
    const completed = goals.filter(g => g.completed).length;
    if (completed >= goals.length && goals.length > 0) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().split('T')[0];
      
      if (lastDate === yesterdayStr) {
        streakCount.textContent = streak;
      } else if (lastDate !== today) {
        localStorage.setItem(STREAK_KEY, '0');
        streakCount.textContent = '0';
      }
    }
    localStorage.setItem(DATE_KEY, today);
  } else {
    streakCount.textContent = streak;
  }
}

function renderGoals() {
  goalsList.innerHTML = '';
  
  if (goals.length === 0) {
    goalsList.innerHTML = '<li class="empty">No goals yet. Add one above.</li>';
    return;
  }
  
  goals.forEach((goal, index) => {
    const li = document.createElement('li');
    li.className = 'goal-item' + (goal.completed ? ' completed' : '');
    li.innerHTML = `
      <input type="checkbox" class="goal-checkbox" ${goal.completed ? 'checked' : ''}>
      <span class="goal-text">${escapeHtml(goal.text)}</span>
      <button class="goal-delete" data-index="${index}">&times;</button>
    `;
    goalsList.appendChild(li);
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function addGoal() {
  const text = goalInput.value.trim();
  if (!text) return;
  if (goals.length >= 3) {
    alert('Max 3 goals per day. Complete one first.');
    return;
  }
  goals.push({ text, completed: false });
  goalInput.value = '';
  saveGoals();
  renderGoals();
  updateStreak();
}

function toggleGoal(index) {
  goals[index].completed = !goals[index].completed;
  saveGoals();
  renderGoals();
  
  const completed = goals.filter(g => g.completed).length;
  if (completed === goals.length && goals.length > 0) {
    const streak = parseInt(localStorage.getItem(STREAK_KEY) || '0', 10);
    localStorage.setItem(STREAK_KEY, (streak + 1).toString());
    localStorage.setItem(DATE_KEY, getToday());
    updateStreak();
  }
}

function deleteGoal(index) {
  goals.splice(index, 1);
  saveGoals();
  renderGoals();
}

addBtn.addEventListener('click', addGoal);
goalInput.addEventListener('keypress', e => {
  if (e.key === 'Enter') addGoal();
});

goalsList.addEventListener('click', e => {
  const li = e.target.closest('.goal-item');
  if (!li) return;
  
  const index = [...goalsList.children].indexOf(li);
  
  if (e.target.classList.contains('goal-checkbox')) {
    toggleGoal(index);
  } else if (e.target.classList.contains('goal-delete')) {
    deleteGoal(index);
  }
});

resetBtn.addEventListener('click', () => {
  if (confirm('Clear all goals for today?')) {
    goals = [];
    saveGoals();
    renderGoals();
  }
});

loadGoals();
</script>
</body>
</html>
