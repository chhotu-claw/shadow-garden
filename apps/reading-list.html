<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading List — Shadow's Garden</title>
<meta name="description" content="Track books you want to read, are reading, and have finished">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --accent: #f59e0b; }
  body { --accent: #f59e0b; }
  .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
  
  .add-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .add-form input { flex: 1; min-width: 200px; padding: 0.6rem 0.8rem; background: #161b22; border: 2px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 0.95rem; }
  .add-form input:focus { outline: none; border-color: var(--accent); }
  .add-form select { padding: 0.6rem 0.8rem; background: #161b22; border: 2px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 0.95rem; }
  .add-form button { padding: 0.6rem 1.2rem; background: var(--accent); border: none; border-radius: 6px; color: #0d1117; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .add-form button:hover { opacity: 0.9; }
  
  .lists { display: grid; gap: 1.5rem; }
  .list-section h2 { font-size: 1rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
  .list-section h2 .count { background: #21262d; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.75rem; color: #8b949e; }
  
  .want { border-left: 3px solid #f59e0b; }
  .reading { border-left: 3px solid #3fb950; }
  .done { border-left: 3px solid #8b949e; }
  
  .book-list { list-style: none; padding: 0; margin: 0; }
  .book-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.8rem; background: #161b22; border-radius: 6px; margin-bottom: 0.5rem; }
  .book-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
  .book-item .title { flex: 1; color: #c9d1d9; }
  .book-item .author { color: #8b949e; font-size: 0.85rem; }
  .book-item .actions { display: flex; gap: 0.5rem; }
  .book-item button { background: transparent; border: none; color: #8b949e; cursor: pointer; padding: 0.25rem; font-size: 0.9rem; }
  .book-item button:hover { color: #c9d1d9; }
  .book-item .move-select { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.75rem; }
  
  .empty { color: #8b949e; font-style: italic; font-size: 0.9rem; padding: 1rem; text-align: center; }
  
  .stats { display: flex; gap: 2rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #30363d; }
  .stat { text-align: center; }
  .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Reading List</h1>
    <p class="subtitle">Track what you want to read, are reading, and have finished</p>
    
    <div class="add-form">
      <input type="text" id="bookTitle" placeholder="Book title...">
      <input type="text" id="bookAuthor" placeholder="Author (optional)">
      <select id="bookStatus">
        <option value="want">Want to Read</option>
        <option value="reading">Reading</option>
        <option value="done">Finished</option>
      </select>
      <button onclick="addBook()">Add Book</button>
    </div>
    
    <div class="lists">
      <div class="list-section want">
        <h2>Want to Read <span class="count" id="wantCount">0</span></h2>
        <ul class="book-list" id="wantList"></ul>
      </div>
      
      <div class="list-section reading">
        <h2>Reading <span class="count" id="readingCount">0</span></h2>
        <ul class="book-list" id="readingList"></ul>
      </div>
      
      <div class="list-section done">
        <h2>Finished <span class="count" id="doneCount">0</span></h2>
        <ul class="book-list" id="doneList"></ul>
      </div>
    </div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="totalBooks">0</div>
        <div class="stat-label">Total Books</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="finishedBooks">0</div>
        <div class="stat-label">Finished</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="pagesRead">0</div>
        <div class="stat-label">Pages Tracked</div>
      </div>
    </div>
  </div>
  
  <script>
    let books = JSON.parse(localStorage.getItem('reading-list') || '[]');
    
    function save() {
      localStorage.setItem('reading-list', JSON.stringify(books));
      render();
    }
    
    function addBook() {
      const title = document.getElementById('bookTitle').value.trim();
      const author = document.getElementById('bookAuthor').value.trim();
      const status = document.getElementById('bookStatus').value;
      
      if (!title) return;
      
      books.push({
        id: Date.now(),
        title,
        author,
        status,
        pages: 0,
        rating: 0,
        dateAdded: Date.now()
      });
      
      document.getElementById('bookTitle').value = '';
      document.getElementById('bookAuthor').value = '';
      save();
    }
    
    function deleteBook(id) {
      books = books.filter(b => b.id !== id);
      save();
    }
    
    function moveBook(id, newStatus) {
      const book = books.find(b => b.id === id);
      if (book) {
        book.status = newStatus;
        save();
      }
    }
    
    function render() {
      const wantList = document.getElementById('wantList');
      const readingList = document.getElementById('readingList');
      const doneList = document.getElementById('doneList');
      
      wantList.innerHTML = '';
      readingList.innerHTML = '';
      doneList.innerHTML = '';
      
      let wantCount = 0, readingCount = 0, doneCount = 0;
      
      books.forEach(book => {
        const li = document.createElement('li');
        li.className = 'book-item';
        li.innerHTML = `
          <input type="checkbox" ${book.status === 'done' ? 'checked' : ''} onchange="moveBook(${book.id}, this.checked ? 'done' : 'reading')">
          <div class="title">${escapeHtml(book.title)}</div>
          ${book.author ? `<div class="author">${escapeHtml(book.author)}</div>` : ''}
          <div class="actions">
            <select class="move-select" onchange="moveBook(${book.id}, this.value)">
              <option value="want" ${book.status === 'want' ? 'selected' : ''}>Want</option>
              <option value="reading" ${book.status === 'reading' ? 'selected' : ''}>Reading</option>
              <option value="done" ${book.status === 'done' ? 'selected' : ''}>Done</option>
            </select>
            <button onclick="deleteBook(${book.id})" title="Delete">✕</button>
          </div>
        `;
        
        if (book.status === 'want') {
          wantList.appendChild(li);
          wantCount++;
        } else if (book.status === 'reading') {
          readingList.appendChild(li);
          readingCount++;
        } else {
          doneList.appendChild(li);
          doneCount++;
        }
      });
      
      if (wantCount === 0) wantList.innerHTML = '<div class="empty">No books yet</div>';
      if (readingCount === 0) readingList.innerHTML = '<div class="empty">Not reading anything</div>';
      if (doneCount === 0) doneList.innerHTML = '<div class="empty">No finished books</div>';
      
      document.getElementById('wantCount').textContent = wantCount;
      document.getElementById('readingCount').textContent = readingCount;
      document.getElementById('doneCount').textContent = doneCount;
      
      document.getElementById('totalBooks').textContent = books.length;
      document.getElementById('finishedBooks').textContent = doneCount;
      document.getElementById('pagesRead').textContent = books.reduce((sum, b) => sum + (b.pages || 0), 0);
    }
    
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    document.getElementById('bookTitle').addEventListener('keypress', e => {
      if (e.key === 'Enter') addBook();
    });
    
    render();
  </script>
</body>
</html>
