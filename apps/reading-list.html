<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading List — Shadow's Garden</title>
<meta name="description" content="Save links for later. Simple, fast, local. No account required.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { --bg: #0d1117; --fg: #c9d1d9; --accent: #58a6ff; --muted: #8b949e; --border: #30363d; --card: #161b22; }
  .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .add-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .add-form input { flex: 1; min-width: 200px; padding: 0.6rem 0.8rem; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--fg); font-size: 0.95rem; }
  .add-form input:focus { outline: none; border-color: var(--accent); }
  .add-form button { padding: 0.6rem 1.2rem; background: var(--accent); color: #000; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
  .add-form button:hover { opacity: 0.9; }
  .filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter { padding: 0.4rem 0.8rem; background: transparent; border: 1px solid var(--border); border-radius: 20px; color: var(--muted); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .filter:hover { border-color: var(--muted); }
  .filter.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .stats { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
  .list { display: flex; flex-direction: column; gap: 0.5rem; }
  .item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; transition: border-color 0.2s; }
  .item:hover { border-color: var(--muted); }
  .item.read { opacity: 0.5; }
  .item.read .title { text-decoration: line-through; }
  .item-checkbox { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .item:hover .item-checkbox { border-color: var(--accent); }
  .item.read .item-checkbox { background: var(--accent); border-color: var(--accent); }
  .item.read .item-checkbox::after { content: '✓'; color: #000; font-size: 12px; font-weight: bold; }
  .item-content { flex: 1; min-width: 0; }
  .title { color: var(--fg); text-decoration: none; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .item:hover .title { color: var(--accent); }
  .meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; display: flex; gap: 0.8rem; flex-wrap: wrap; }
  .tag { background: var(--border); padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; }
  .delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 0.3rem; font-size: 1rem; opacity: 0; transition: opacity 0.2s; }
  .item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #f85149; }
  .empty { text-align: center; color: var(--muted); padding: 3rem 1rem; }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .search-bar { width: 100%; padding: 0.6rem 0.8rem; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--fg); font-size: 0.95rem; margin-bottom: 1rem; }
  .search-bar:focus { outline: none; border-color: var(--accent); }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>📚 Reading List</h1>
    
    <form class="add-form" id="addForm">
      <input type="url" id="urlInput" placeholder="Paste a URL..." required>
      <input type="text" id="titleInput" placeholder="Title (optional)">
      <button type="submit">Add</button>
    </form>
    
    <input type="text" class="search-bar" id="searchInput" placeholder="Search...">
    
    <div class="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="unread">Unread</button>
      <button class="filter" data-filter="read">Read</button>
    </div>
    
    <div class="stats" id="stats"></div>
    <div class="list" id="list"></div>
  </div>

  <script>
    const STORAGE_KEY = 'reading-list';
    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let currentFilter = 'all';

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      render();
    }

    function extractDomain(url) {
      try {
        return new URL(url).hostname.replace('www.', '');
      } catch {
        return url;
      }
    }

    function addItem(url, title) {
      const domain = extractDomain(url);
      items.unshift({
        id: Date.now(),
        url,
        title: title || domain,
        domain,
        read: false,
        addedAt: new Date().toISOString()
      });
      save();
    }

    function toggleRead(id) {
      const item = items.find(i => i.id === id);
      if (item) {
        item.read = !item.read;
        save();
      }
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
    }

    function render() {
      const list = document.getElementById('list');
      const stats = document.getElementById('stats');
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = items.filter(item => {
        const matchesSearch = item.title.toLowerCase().includes(search) || 
                              item.url.toLowerCase().includes(search) ||
                              item.domain.toLowerCase().includes(search);
        const matchesFilter = currentFilter === 'all' || 
                              (currentFilter === 'read' && item.read) ||
                              (currentFilter === 'unread' && !item.read);
        return matchesSearch && matchesFilter;
      });

      const unreadCount = items.filter(i => !i.read).length;
      stats.textContent = `${items.length} items · ${unreadCount} unread`;

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div>No items yet. Add a URL above!</div></div>`;
        return;
      }

      list.innerHTML = filtered.map(item => `
        <div class="item ${item.read ? 'read' : ''}" data-id="${item.id}">
          <div class="item-checkbox" onclick="toggleRead(${item.id})"></div>
          <div class="item-content">
            <a class="title" href="${item.url}" target="_blank" rel="noopener">${item.title}</a>
            <div class="meta">
              <span>${item.domain}</span>
              <span>${new Date(item.addedAt).toLocaleDateString()}</span>
            </div>
          </div>
          <button class="delete-btn" onclick="deleteItem(${item.id})" title="Delete">×</button>
        </div>
      `).join('');
    }

    document.getElementById('addForm').addEventListener('submit', e => {
      e.preventDefault();
      const url = document.getElementById('urlInput').value.trim();
      const title = document.getElementById('titleInput').value.trim();
      if (url) {
        addItem(url, title);
        document.getElementById('urlInput').value = '';
        document.getElementById('titleInput').value = '';
      }
    });

    document.querySelectorAll('.filter').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('searchInput').addEventListener('input', render);

    render();
  </script>
</body>
</html>
