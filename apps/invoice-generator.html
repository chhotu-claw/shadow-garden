<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator — Shadow's Garden</title>
<meta name="description" content="Simple offline invoice generator — create, preview, and print invoices without signup or bloat.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
  .invoice-box { background: #fff; border: 1px solid #ddd; padding: 30px; margin-top: 20px; }
  .header { display: flex; justify-content: space-between; margin-bottom: 30px; }
  .header h1 { margin: 0; color: #333; }
  .logo { font-size: 24px; font-weight: bold; color: #333; }
  .from-to { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
  .field input, .field textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
  .meta { display: flex; gap: 20px; margin-bottom: 30px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  th { text-align: left; background: #f5f5f5; padding: 10px; border-bottom: 2px solid #ddd; }
  td { padding: 10px; border-bottom: 1px solid #eee; }
  td input { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 3px; }
  .qty-col { width: 60px; }
  .price-col { width: 100px; }
  .action-col { width: 40px; }
  .totals { text-align: right; margin-top: 20px; }
  .total-row { margin: 5px 0; }
  .grand-total { font-size: 18px; font-weight: bold; }
  .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 5px; }
  .btn-primary { background: #333; color: #fff; }
  .btn-secondary { background: #e0e0e0; color: #333; }
  .btn-danger { background: #fee; color: #c00; padding: 4px 8px; }
  .controls { margin-bottom: 20px; }
  .notes { margin-top: 30px; padding: 15px; background: #f9f9f9; border-radius: 4px; }
  .notes textarea { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 8px; min-height: 60px; }
  .currency { font-size: 12px; color: #666; }
  @media print {
    .controls, .action-col { display: none; }
    .invoice-box { border: none; }
    body { padding: 0; }
  }
</style>
</head>
<body data-page-type="app">
  <div class="controls">
    <button class="btn btn-primary" onclick="window.print()">Print / Save PDF</button>
    <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
    <span class="currency">
      Currency: 
      <select id="currency" onchange="updateCurrency()" style="padding: 4px;">
        <option value="$">$ USD</option>
        <option value="€">€ EUR</option>
        <option value="£">£ GBP</option>
        <option value="₹">₹ INR</option>
        <option value="¥">¥ JPY/CNY</option>
        <option value="AED">AED</option>
      </select>
    </span>
  </div>

  <div class="invoice-box" id="invoice">
    <div class="header">
      <div>
        <div class="logo"><input type="text" id="companyName" placeholder="Your Company Name" style="font-size:24px;font-weight:bold;border:none;width:300px;"></div>
        <div class="field"><textarea id="companyAddress" placeholder="Your address&#10;City, Country&#10;Email / Phone" rows="3" style="width:250px;"></textarea></div>
      </div>
      <div style="text-align:right;">
        <h1>INVOICE</h1>
        <div class="field">
          <label>Invoice #</label>
          <input type="text" id="invoiceNum" placeholder="001" style="text-align:right;width:100px;">
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="invoiceDate" style="text-align:right;width:130px;">
        </div>
        <div class="field">
          <label>Due Date</label>
          <input type="date" id="dueDate" style="text-align:right;width:130px;">
        </div>
      </div>
    </div>

    <div class="from-to">
      <div>
        <div class="field">
          <label>Bill To</label>
          <input type="text" id="clientName" placeholder="Client Name">
        </div>
        <div class="field">
          <textarea id="clientAddress" placeholder="Client address&#10;City, Country" rows="3"></textarea>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="field">
          <label>From</label>
          <input type="text" id="fromName" placeholder="Your Name" style="text-align:right;">
        </div>
        <div class="field">
          <textarea id="fromContact" placeholder="your@email.com" rows="2" style="text-align:right;"></textarea>
        </div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th class="qty-col">Qty</th>
          <th class="price-col">Price</th>
          <th class="price-col">Total</th>
          <th class="action-col"></th>
        </tr>
      </thead>
      <tbody id="items">
      </tbody>
    </table>

    <button class="btn btn-secondary" onclick="addItem()">+ Add Item</button>

    <div class="totals">
      <div class="total-row">Subtotal: <span id="subtotal">0.00</span></div>
      <div class="total-row">
        Tax (%): <input type="number" id="taxRate" value="0" min="0" max="100" style="width:50px;padding:4px;" onchange="calculate()"> 
        = <span id="taxAmount">0.00</span>
      </div>
      <div class="total-row grand-total">Total: <span id="grandTotal">0.00</span></div>
    </div>

    <div class="notes">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:5px;">Notes / Terms</label>
      <textarea id="notes" placeholder="Payment terms, thank you note, etc."></textarea>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'shadow_invoice_data';
    let currency = '$';

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const data = JSON.parse(saved);
        document.getElementById('companyName').value = data.companyName || '';
        document.getElementById('companyAddress').value = data.companyAddress || '';
        document.getElementById('invoiceNum').value = data.invoiceNum || '';
        document.getElementById('invoiceDate').value = data.invoiceDate || '';
        document.getElementById('dueDate').value = data.dueDate || '';
        document.getElementById('clientName').value = data.clientName || '';
        document.getElementById('clientAddress').value = data.clientAddress || '';
        document.getElementById('fromName').value = data.fromName || '';
        document.getElementById('fromContact').value = data.fromContact || '';
        document.getElementById('taxRate').value = data.taxRate || 0;
        document.getElementById('notes').value = data.notes || '';
        document.getElementById('currency').value = data.currency || '$';
        currency = data.currency || '$';
        
        if (data.items && data.items.length) {
          data.items.forEach(item => addItem(item.desc, item.qty, item.price));
        } else {
          addItem();
        }
      } else {
        document.getElementById('invoiceDate').value = new Date().toISOString().split('T')[0];
        addItem();
      }
    }

    function saveData() {
      const items = [];
      document.querySelectorAll('#items tr').forEach(row => {
        items.push({
          desc: row.querySelector('.desc').value,
          qty: row.querySelector('.qty').value,
          price: row.querySelector('.price').value
        });
      });

      const data = {
        companyName: document.getElementById('companyName').value,
        companyAddress: document.getElementById('companyAddress').value,
        invoiceNum: document.getElementById('invoiceNum').value,
        invoiceDate: document.getElementById('invoiceDate').value,
        dueDate: document.getElementById('dueDate').value,
        clientName: document.getElementById('clientName').value,
        clientAddress: document.getElementById('clientAddress').value,
        fromName: document.getElementById('fromName').value,
        fromContact: document.getElementById('fromContact').value,
        taxRate: document.getElementById('taxRate').value,
        notes: document.getElementById('notes').value,
        currency: document.getElementById('currency').value,
        items
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function addItem(desc = '', qty = '1', price = '0') {
      const tbody = document.getElementById('items');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text" class="desc" value="${desc}" placeholder="Item or service description" oninput="calculate()"></td>
        <td class="qty-col"><input type="number" class="qty" value="${qty}" min="0" oninput="calculate()"></td>
        <td class="price-col"><input type="number" class="price" value="${price}" min="0" step="0.01" oninput="calculate()"></td>
        <td class="price-col item-total">0.00</td>
        <td class="action-col"><button class="btn btn-danger" onclick="removeItem(this)">×</button></td>
      `;
      tbody.appendChild(tr);
      calculate();
    }

    function removeItem(btn) {
      const row = btn.closest('tr');
      if (document.querySelectorAll('#items tr').length > 1) {
        row.remove();
        calculate();
      }
    }

    function calculate() {
      let subtotal = 0;
      document.querySelectorAll('#items tr').forEach(row => {
        const qty = parseFloat(row.querySelector('.qty').value) || 0;
        const price = parseFloat(row.querySelector('.price').value) || 0;
        const total = qty * price;
        row.querySelector('.item-total').textContent = total.toFixed(2);
        subtotal += total;
      });

      const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
      const taxAmount = subtotal * (taxRate / 100);
      const grandTotal = subtotal + taxAmount;

      document.getElementById('subtotal').textContent = currency + subtotal.toFixed(2);
      document.getElementById('taxAmount').textContent = currency + taxAmount.toFixed(2);
      document.getElementById('grandTotal').textContent = currency + grandTotal.toFixed(2);
      
      saveData();
    }

    function updateCurrency() {
      currency = document.getElementById('currency').value;
      calculate();
    }

    function clearAll() {
      if (confirm('Clear all invoice data? This cannot be undone.')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
    }

    // Auto-save on any input change
    document.addEventListener('input', () => {
      clearTimeout(window.saveTimeout);
      window.saveTimeout = setTimeout(saveData, 500);
    });

    loadData();
  </script>
</body>
</html>
