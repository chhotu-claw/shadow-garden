<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator — Shadow's Garden</title>
<meta name="description">Generate invoices with line items, tax, export. All local, no tracking.</title>
<link rel="stylesheet" href="../style.css">
<style>
  .invoice-app { max-width: 800px; margin: 0 auto; }
  .header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }
  @media(max-width: 600px) { .header { grid-template-columns: 1fr; } }
  .input-group { margin-bottom: 16px; }
  .input-group label {
    display: block;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .input-group input, .input-group textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    box-sizing: border-box;
  }
  .input-group textarea { resize: vertical; min-height: 80px; }
  .input-group input:focus, .textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .line-items {
    margin: 24px 0;
    border: 2px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .line-item-header {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 40px;
    gap: 8px;
    padding: 12px;
    background: var(--bg);
    font-weight: 600;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .line-item {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 40px;
    gap: 8px;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }
  .line-item input {
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  .line-item .delete {
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 18px;
  }
  .line-item .delete:hover { color: #f77; }
  .add-item {
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  .add-item button {
    width: 100%;
    padding: 12px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 14px;
  }
  .add-item button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .totals {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 24px;
  }
  .total-row {
    display: flex;
    gap: 24px;
    font-size: 15px;
  }
  .total-row .label { color: var(--text-secondary); width: 100px; text-align: right; }
  .total-row .value { font-family: var(--mono); width: 120px; text-align: right; }
  .total-row.grand { font-size: 18px; font-weight: 600; color: var(--text); }
  .controls {
    display: flex;
    gap: 12px;
  }
  .controls button {
    flex: 1;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
  }
  .controls button:hover { border-color: var(--accent); }
  .controls button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="invoice-app">
    <h1>Invoice Generator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Generate an invoice with line items and tax.</p>
    
    <div class="header">
      <div>
        <div class="input-group">
          <label>From</label>
          <textarea id="from" placeholder="Your company&#10;Address&#10;Email"></textarea>
        </div>
      </div>
      <div>
        <div class="input-group">
          <label>To</label>
          <textarea id="to" placeholder="Client company&#10;Address"></textarea>
        </div>
      </div>
    </div>
    
    <div class="input-group">
      <label>Invoice #</label>
      <input type="text" id="invoiceNum" value="INV-001" style="width: 200px;">
    </div>
    
    <div class="line-items" id="lineItems">
      <div class="line-item-header">
        <span>Description</span>
        <span>Qty</span>
        <span>Rate</span>
        <span></span>
      </div>
    </div>
    
    <div class="add-item">
      <button onclick="addLineItem()">+ Add Line Item</button>
    </div>
    
    <div class="totals">
      <div class="total-row">
        <span class="label">Subtotal:</span>
        <span class="value" id="subtotal">$0.00</span>
      </div>
      <div class="total-row">
        <span class="label">Tax (%):</span>
        <input type="number" id="taxRate" value="10" style="width: 60px; text-align: right;" onchange="calculate()">
      </div>
      <div class="total-row">
        <span class="label">Tax:</span>
        <span class="value" id="taxAmount">$0.00</span>
      </div>
      <div class="total-row grand">
        <span class="label">Total:</span>
        <span class="value" id="total">$0.00</span>
      </div>
    </div>
    
    <div class="controls">
      <button class="primary" onclick="printInvoice()">Print</button>
    </div>
  </div>
</div>
<script>
  let items = [];
  
  function addLineItem() {
    const container = document.getElementById('lineItems');
    const div = document.createElement('div');
    div.className = 'line-item';
    div.innerHTML = `
      <input type="text" placeholder="Description" oninput="calculate()">
      <input type="number" value="1" min="1" oninput="calculate()">
      <input type="number" value="0" min="0" step="0.01" oninput="calculate()">
      <button class="delete" onclick="this.parentElement.remove(); calculate();">×</button>
    `;
    container.appendChild(div);
    calculate();
  }
  
  function calculate() {
    let subtotal = 0;
    document.querySelectorAll('.line-item').forEach(item => {
      const inputs = item.querySelectorAll('input');
      const qty = parseFloat(inputs[1].value) || 0;
      const rate = parseFloat(inputs[2].value) || 0;
      subtotal += qty * rate;
    });
    
    const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
    const tax = subtotal * (taxRate / 100);
    const total = subtotal + tax;
    
    document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
    document.getElementById('taxAmount').textContent = '$' + tax.toFixed(2);
    document.getElementById('total').textContent = '$' + total.toFixed(2);
  }
  
  function printInvoice() {
    window.print();
  }
  
  // Add initial line item
  addLineItem();
</script>
</body>
</html>
