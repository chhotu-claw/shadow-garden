<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator — Shadow's Garden</title>
<meta name="description" content="Create professional invoices with line items, auto-calc totals, save drafts locally">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #6366f1;
  }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    background: #f8fafc;
    padding: 2rem 1rem;
  }
  .invoice-container {
    max-width: 800px;
    margin: 0 auto;
    background: #fff;
    border-radius: 1rem;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    padding: 2rem;
  }
  h1 {
    color: #1e293b;
    margin-bottom: 1.5rem;
    font-size: 1.5rem;
  }
  .header-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-bottom: 2rem;
  }
  .field-group {
    margin-bottom: 1rem;
  }
  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.25rem;
  }
  input, textarea {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #e2e8f0;
    border-radius: 0.5rem;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
  }
  th {
    text-align: left;
    padding: 0.75rem;
    background: #f1f5f9;
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
  }
  td {
    padding: 0.5rem;
    border-bottom: 1px solid #e2e8f0;
  }
  td input {
    border: 1px solid transparent;
    padding: 0.5rem;
  }
  td input:hover, td input:focus {
    border-color: #cbd5e1;
  }
  .col-desc { width: 50%; }
  .col-qty { width: 15%; }
  .col-price { width: 20%; }
  .col-total { width: 10%; }
  .col-action { width: 5%; }
  
  .total-row {
    display: flex;
    justify-content: flex-end;
    gap: 2rem;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 2px solid #e2e8f0;
  }
  .total-row .label {
    font-weight: 600;
    color: #64748b;
  }
  .total-row .value {
    font-size: 1.5rem;
    font-weight: 700;
    color: #1e293b;
    min-width: 120px;
    text-align: right;
  }
  .btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 0.5rem;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover {
    background: #4f46e5;
  }
  .btn-secondary {
    background: #f1f5f9;
    color: #64748b;
  }
  .btn-secondary:hover {
    background: #e2e8f0;
  }
  .btn-danger {
    background: #fee2e2;
    color: #dc2626;
    padding: 0.5rem;
  }
  .btn-danger:hover {
    background: #fecaca;
  }
  .actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid #e2e8f0;
  }
  .draft-status {
    font-size: 0.75rem;
    color: #64748b;
    margin-left: auto;
    align-self: center;
  }
  .tax-row {
    display: flex;
    justify-content: flex-end;
    gap: 2rem;
    margin-top: 0.5rem;
    font-size: 0.875rem;
  }
  .tax-row .label {
    color: #64748b;
  }
  .tax-row .value {
    min-width: 80px;
    text-align: right;
  }
</style>
</head>
<body data-page-type="app">
<div class="invoice-container">
  <h1>🧾 Invoice Generator</h1>
  
  <div class="header-row">
    <div>
      <div class="field-group">
        <label>From (Your Info)</label>
        <textarea id="fromInfo" rows="3" placeholder="Your name&#10;Your address&#10;your@email.com"></textarea>
      </div>
      <div class="field-group">
        <label>To (Client)</label>
        <textarea id="toInfo" rows="3" placeholder="Client name&#10;Client address&#10;client@email.com"></textarea>
      </div>
    </div>
    <div>
      <div class="field-group">
        <label>Invoice Number</label>
        <input type="text" id="invoiceNum" value="INV-001">
      </div>
      <div class="field-group">
        <label>Date</label>
        <input type="date" id="invoiceDate">
      </div>
      <div class="field-group">
        <label>Due Date</label>
        <input type="date" id="dueDate">
      </div>
    </div>
  </div>
  
  <table>
    <thead>
      <tr>
        <th class="col-desc">Description</th>
        <th class="col-qty">Qty</th>
        <th class="col-price">Price</th>
        <th class="col-total">Total</th>
        <th class="col-action"></th>
      </tr>
    </thead>
    <tbody id="lineItems">
    </tbody>
  </table>
  
  <button class="btn btn-secondary" onclick="addLineItem()">+ Add Line Item</button>
  
  <div class="tax-row">
    <span class="label">Tax (%):</span>
    <input type="number" id="taxRate" value="0" min="0" max="100" step="0.1" style="width: 60px; padding: 0.25rem;">
  </div>
  
  <div class="total-row">
    <span class="label">Subtotal:</span>
    <span class="value" id="subtotal">$0.00</span>
  </div>
  <div class="total-row">
    <span class="label">Tax:</span>
    <span class="value" id="taxAmount">$0.00</span>
  </div>
  <div class="total-row">
    <span class="label">Total:</span>
    <span class="value" id="total">$0.00</span>
  </div>
  
  <div class="actions">
    <button class="btn btn-secondary" onclick="saveDraft()">Save Draft</button>
    <button class="btn btn-secondary" onclick="loadDraft()">Load Draft</button>
    <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
    <button class="btn btn-primary" onclick="window.print()">Print / PDF</button>
    <span class="draft-status" id="draftStatus"></span>
  </div>
</div>

<script>
const tbody = document.getElementById('lineItems');
const subtotalEl = document.getElementById('subtotal');
const taxRateEl = document.getElementById('taxRate');
const taxAmountEl = document.getElementById('taxAmount');
const totalEl = document.getElementById('total');

// Set default dates
document.getElementById('invoiceDate').value = new Date().toISOString().split('T')[0];
const dueDate = new Date();
dueDate.setDate(dueDate.getDate() + 30);
document.getElementById('dueDate').value = dueDate.toISOString().split('T')[0];

function addLineItem(desc = '', qty = 1, price = 0) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="text" class="item-desc" value="${desc}" placeholder="Item description"></td>
    <td><input type="number" class="item-qty" value="${qty}" min="0" step="1"></td>
    <td><input type="number" class="item-price" value="${price}" min="0" step="0.01"></td>
    <td class="item-total">$0.00</td>
    <td><button class="btn btn-danger" onclick="this.closest('tr').remove(); calculate();">×</button></td>
  `;
  tbody.appendChild(tr);
  
  tr.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', calculate);
  });
  
  calculate();
}

function calculate() {
  let subtotal = 0;
  tbody.querySelectorAll('tr').forEach(tr => {
    const qty = parseFloat(tr.querySelector('.item-qty').value) || 0;
    const price = parseFloat(tr.querySelector('.item-price').value) || 0;
    const total = qty * price;
    tr.querySelector('.item-total').textContent = '$' + total.toFixed(2);
    subtotal += total;
  });
  
  const taxRate = parseFloat(taxRateEl.value) || 0;
  const taxAmount = subtotal * (taxRate / 100);
  const total = subtotal + taxAmount;
  
  subtotalEl.textContent = '$' + subtotal.toFixed(2);
  taxAmountEl.textContent = '$' + taxAmount.toFixed(2);
  totalEl.textContent = '$' + total.toFixed(2);
}

taxRateEl.addEventListener('input', calculate);

function getInvoiceData() {
  return {
    fromInfo: document.getElementById('fromInfo').value,
    toInfo: document.getElementById('toInfo').value,
    invoiceNum: document.getElementById('invoiceNum').value,
    invoiceDate: document.getElementById('invoiceDate').value,
    dueDate: document.getElementById('dueDate').value,
    taxRate: taxRateEl.value,
    items: Array.from(tbody.querySelectorAll('tr')).map(tr => ({
      desc: tr.querySelector('.item-desc').value,
      qty: tr.querySelector('.item-qty').value,
      price: tr.querySelector('.item-price').value
    }))
  };
}

function loadInvoiceData(data) {
  document.getElementById('fromInfo').value = data.fromInfo || '';
  document.getElementById('toInfo').value = data.toInfo || '';
  document.getElementById('invoiceNum').value = data.invoiceNum || 'INV-001';
  document.getElementById('invoiceDate').value = data.invoiceDate || '';
  document.getElementById('dueDate').value = data.dueDate || '';
  taxRateEl.value = data.taxRate || 0;
  
  tbody.innerHTML = '';
  (data.items || []).forEach(item => {
    addLineItem(item.desc, item.qty, item.price);
  });
  if (tbody.children.length === 0) {
    addLineItem();
  }
  calculate();
}

function saveDraft() {
  localStorage.setItem('invoiceDraft', JSON.stringify(getInvoiceData()));
  document.getElementById('draftStatus').textContent = 'Draft saved!';
  setTimeout(() => {
    document.getElementById('draftStatus').textContent = '';
  }, 2000);
}

function loadDraft() {
  const saved = localStorage.getItem('invoiceDraft');
  if (saved) {
    try {
      loadInvoiceData(JSON.parse(saved));
      document.getElementById('draftStatus').textContent = 'Draft loaded!';
      setTimeout(() => {
        document.getElementById('draftStatus').textContent = '';
      }, 2000);
    } catch(e) {
      console.error('Failed to load draft', e);
    }
  }
}

function clearForm() {
  if (confirm('Clear all fields?')) {
    document.getElementById('fromInfo').value = '';
    document.getElementById('toInfo').value = '';
    document.getElementById('invoiceNum').value = 'INV-001';
    document.getElementById('invoiceDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('dueDate').value = dueDate.toISOString().split('T')[0];
    taxRateEl.value = 0;
    tbody.innerHTML = '';
    addLineItem();
  }
}

// Add initial line item
addLineItem();
</script>
</body>
</html>
