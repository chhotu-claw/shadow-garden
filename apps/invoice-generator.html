<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator — Shadow's Garden</title>
<meta name="description" content="Generate clean invoices — add line items, calculate totals, export as HTML or print. All local, no server.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 2rem; }
  .invoice-box { max-width: 800px; margin: 0 auto; background: var(--bg-secondary); border-radius: 12px; padding: 2rem; }
  .header { display: flex; justify-content: space-between; margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap; }
  .header-section { flex: 1; min-width: 200px; }
  .header-section h2 { margin: 0 0 0.5rem 0; font-size: 1.2rem; }
  .header-section input, .header-section textarea { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--fg); font-size: 14px; }
  .header-section textarea { resize: vertical; min-height: 60px; }
  .meta-row { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .meta-row > div { flex: 1; min-width: 150px; }
  .meta-row label { display: block; margin-bottom: 0.3rem; font-size: 12px; color: var(--fg-muted); }
  .meta-row input { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--fg); }
  .items-table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
  .items-table th, .items-table td { border: 1px solid var(--border); padding: 0.5rem; text-align: left; }
  .items-table th { background: var(--bg); font-size: 12px; }
  .items-table input { width: 100%; padding: 0.4rem; border: none; background: transparent; color: var(--fg); }
  .items-table .num input { text-align: right; }
  .items-table .action { width: 40px; text-align: center; }
  .items-table .action button { background: transparent; border: none; color: var(--fg-muted); cursor: pointer; padding: 4px; }
  .items-table .action button:hover { color: #e74c3c; }
  .add-row-btn { background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; margin-bottom: 1rem; }
  .add-row-btn:hover { background: var(--bg-secondary); }
  .totals { text-align: right; margin-bottom: 2rem; }
  .totals-row { display: flex; justify-content: flex-end; gap: 2rem; padding: 0.5rem 0; }
  .totals-label { color: var(--fg-muted); }
  .totals-value { font-weight: 600; min-width: 100px; text-align: right; }
  .notes textarea { width: 100%; min-height: 80px; padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--fg); resize: vertical; }
  .actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem; flex-wrap: wrap; }
  .actions button { padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .print-btn { background: var(--accent); color: white; border: none; }
  .print-btn:hover { opacity: 0.9; }
  .download-btn { background: var(--bg); color: var(--fg); border: 1px solid var(--border); }
  .download-btn:hover { background: var(--bg-secondary); }
  @media print { .actions, .add-row-btn, .items-table .action, .print-header-buttons { display: none; } body { padding: 0; } .invoice-box { box-shadow: none; } }
</style>
</head>
<body data-page-type="app">
  <div class="invoice-box">
    <div class="header">
      <div class="header-section">
        <h2>From</h2>
        <textarea id="fromDetails" placeholder="Your Name&#10;Your Address&#10;Email / Phone">Shadow's Services
123 Garden Street
shadow@example.com</textarea>
      </div>
      <div class="header-section">
        <h2>To</h2>
        <textarea id="toDetails" placeholder="Client Name&#10;Client Address">Client Name
Client Address</textarea>
      </div>
    </div>
    <div class="meta-row">
      <div>
        <label>Invoice Number</label>
        <input type="text" id="invoiceNum" value="INV-001">
      </div>
      <div>
        <label>Date</label>
        <input type="date" id="invoiceDate">
      </div>
      <div>
        <label>Due Date</label>
        <input type="date" id="dueDate">
      </div>
    </div>
    <table class="items-table">
      <thead>
        <tr>
          <th>Description</th>
          <th style="width:80px">Qty</th>
          <th style="width:100px">Rate</th>
          <th style="width:100px">Amount</th>
          <th class="action"></th>
        </tr>
      </thead>
      <tbody id="itemsBody">
        <tr>
          <td><input type="text" placeholder="Item description"></td>
          <td class="num"><input type="number" value="1" min="0" step="0.01"></td>
          <td class="num"><input type="number" value="0" min="0" step="0.01"></td>
          <td class="num">0.00</td>
          <td class="action"><button onclick="removeRow(this)">✕</button></td>
        </tr>
      </tbody>
    </table>
    <button class="add-row-btn" onclick="addRow()">+ Add Line Item</button>
    <div class="totals">
      <div class="totals-row"><span class="totals-label">Subtotal:</span><span class="totals-value" id="subtotal">0.00</span></div>
      <div class="totals-row"><span class="totals-label">Tax (%):</span><input type="number" id="taxRate" value="0" min="0" max="100" step="0.1" style="width:60px;padding:4px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--fg);"></div>
      <div class="totals-row"><span class="totals-label">Tax Amount:</span><span class="totals-value" id="taxAmount">0.00</span></div>
      <div class="totals-row" style="font-size:1.2em;margin-top:0.5rem;"><span class="totals-label">Total:</span><span class="totals-value" id="total">0.00</span></div>
    </div>
    <div class="notes">
      <label style="display:block;margin-bottom:0.5rem;font-size:12px;color:var(--fg-muted);">Notes / Terms</label>
      <textarea id="notes" placeholder="Payment due within 30 days. Thank you for your business!"></textarea>
    </div>
    <div class="actions">
      <button class="download-btn" onclick="downloadInvoice()">Download HTML</button>
      <button class="print-btn" onclick="window.print()">Print / Save PDF</button>
    </div>
  </div>
  <script>
    const itemsBody = document.getElementById('itemsBody');
    const taxRateInput = document.getElementById('taxRate');

    // Set default dates
    document.getElementById('invoiceDate').valueAsDate = new Date();
    const dueDate = new Date();
    dueDate.setDate(dueDate.getDate() + 30);
    document.getElementById('dueDate').valueAsDate = dueDate;

    function addRow() {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><input type="text" placeholder="Item description"></td>
        <td class="num"><input type="number" value="1" min="0" step="0.01"></td>
        <td class="num"><input type="number" value="0" min="0" step="0.01"></td>
        <td class="num">0.00</td>
        <td class="action"><button onclick="removeRow(this)">✕</button></td>`;
      itemsBody.appendChild(tr);
      tr.querySelectorAll('input').forEach(input => input.addEventListener('input', calculate));
    }

    function removeRow(btn) {
      if (itemsBody.rows.length > 1) btn.closest('tr').remove();
      calculate();
    }

    function calculate() {
      let subtotal = 0;
      itemsBody.querySelectorAll('tr').forEach(tr => {
        const qty = parseFloat(tr.cells[1].querySelector('input').value) || 0;
        const rate = parseFloat(tr.cells[2].querySelector('input').value) || 0;
        const amount = qty * rate;
        tr.cells[3].textContent = amount.toFixed(2);
        subtotal += amount;
      });
      const taxRate = parseFloat(taxRateInput.value) || 0;
      const tax = subtotal * (taxRate / 100);
      document.getElementById('subtotal').textContent = subtotal.toFixed(2);
      document.getElementById('taxAmount').textContent = tax.toFixed(2);
      document.getElementById('total').textContent = (subtotal + tax).toFixed(2);
    }

    itemsBody.querySelectorAll('input').forEach(input => input.addEventListener('input', calculate));
    taxRateInput.addEventListener('input', calculate);

    function downloadInvoice() {
      const invoiceNum = document.getElementById('invoiceNum').value;
      const html = document.documentElement.outerHTML;
      const blob = new Blob([html], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `invoice-${invoiceNum}.html`;
      a.click();
    }

    calculate();
  </script>
</body>
</html>
