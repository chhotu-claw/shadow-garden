<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to Base64 Converter — Shadow's Garden</title>
<meta name="description" content="Convert images to Base64 data URLs instantly — all client-side, no uploads, privacy-first">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 20px; max-width: 800px; margin: 0 auto; }
  .drop-zone {
    border: 2px dashed #666;
    border-radius: 8px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: #4a9;
    background: rgba(68, 170, 153, 0.1);
  }
  .drop-zone p { margin: 0; color: #888; }
  input[type="file"] { display: none; }
  .preview { max-width: 100%; max-height: 200px; margin: 20px 0; }
  .output-area { display: none; }
  .output-area.active { display: block; }
  textarea {
    width: 100%;
    height: 120px;
    font-family: monospace;
    font-size: 12px;
    padding: 10px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #1a1a1a;
    color: #ccc;
  }
  .info { margin: 10px 0; color: #888; font-size: 14px; }
  .btn {
    background: #4a9;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    margin-right: 10px;
  }
  .btn:hover { background: #3d8; }
  .btn.secondary { background: #555; }
  .btn.secondary:hover { background: #666; }
</style>
</head>
<body data-page-type="app">
  <h1>Image to Base64</h1>
  <p style="color:#888;margin-bottom:20px;">Convert any image to a Base64 data URL. Everything runs in your browser — nothing is uploaded.</p>
  
  <div class="drop-zone" id="dropZone">
    <p>Drop an image here or click to browse</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>
  
  <img id="preview" class="preview" style="display:none;">
  
  <div class="output-area" id="outputArea">
    <div class="info" id="fileInfo"></div>
    <textarea id="output" readonly></textarea>
    <div style="margin-top:10px;">
      <button class="btn" id="copyBtn">Copy to Clipboard</button>
      <button class="btn secondary" id="clearBtn">Clear</button>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const outputArea = document.getElementById('outputArea');
    const output = document.getElementById('output');
    const fileInfo = document.getElementById('fileInfo');

    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
    });
    
    fileInput.addEventListener('change', e => {
      if (e.target.files.length) processFile(e.target.files[0]);
    });

    function processFile(file) {
      if (!file.type.startsWith('image/')) {
        alert('Please select an image file');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        output.value = e.target.result;
        outputArea.classList.add('active');
        
        const sizeKB = (file.size / 1024).toFixed(1);
        const sizeBase64 = (e.target.result.length / 1024).toFixed(1);
        fileInfo.textContent = `Original: ${sizeKB} KB → Base64: ${sizeBase64} KB (${(sizeBase64/sizeKB*100).toFixed(0)}% overhead)`;
      };
      reader.readAsDataURL(file);
    }

    document.getElementById('copyBtn').addEventListener('click', () => {
      output.select();
      document.execCommand('copy');
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      preview.style.display = 'none';
      outputArea.classList.remove('active');
      output.value = '';
      fileInput.value = '';
    });
  </script>
</body>
</html>
