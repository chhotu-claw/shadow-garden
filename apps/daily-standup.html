<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Standup — Shadow's Garden</title>
<meta name="description" content="A simple daily standup tool: yesterday, today, blockers. Saves to localStorage.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --muted: #8b949e; --border: #30363d; --success: #3fb950; }
  .standup-form { display: flex; flex-direction: column; gap: 1rem; margin: 2rem 0; }
  .standup-form label { font-weight: 600; color: var(--accent); display: block; margin-bottom: 0.5rem; }
  .standup-form textarea { width: 100%; min-height: 80px; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-family: inherit; font-size: 0.95rem; resize: vertical; }
  .standup-form textarea:focus { outline: none; border-color: var(--accent); }
  .btn-row { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
  .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 500; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #0d1117; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .history { margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
  .history h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--muted); }
  .entry { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .entry-date { font-weight: 600; color: var(--accent); font-size: 0.9rem; }
  .entry-delete { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; }
  .entry-delete:hover { color: #f85149; }
  .entry-section { margin-bottom: 0.5rem; }
  .entry-section-title { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.25rem; }
  .entry-section-content { font-size: 0.9rem; color: var(--text); white-space: pre-wrap; }
  .empty { color: var(--muted); font-style: italic; text-align: center; padding: 2rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Daily Standup</h1>
  <p style="color: var(--muted); margin-bottom: 1.5rem;">Three questions. One minute. Keeps you honest.</p>
  
  <div class="standup-form">
    <div>
      <label for="yesterday">What did you do yesterday?</label>
      <textarea id="yesterday" placeholder="Finished the API integration..."></textarea>
    </div>
    <div>
      <label for="today">What will you do today?</label>
      <textarea id="today" placeholder="Write tests for the payment flow..."></textarea>
    </div>
    <div>
      <label for="blockers">Any blockers?</label>
      <textarea id="blockers" placeholder="Waiting on design assets..."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveEntry()">Save Entry</button>
      <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
    </div>
  </div>
  
  <div class="history">
    <h2>History</h2>
    <div id="historyList"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'standup-entries';

function loadEntries() {
  const data = localStorage.getItem(STORAGE_KEY);
  return data ? JSON.parse(data) : [];
}

function saveEntries(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function saveEntry() {
  const yesterday = document.getElementById('yesterday').value.trim();
  const today = document.getElementById('today').value.trim();
  const blockers = document.getElementById('blockers').value.trim();
  
  if (!yesterday && !today && !blockers) {
    alert('Fill in at least one field');
    return;
  }
  
  const entries = loadEntries();
  const entry = {
    id: Date.now(),
    date: new Date().toISOString(),
    yesterday,
    today,
    blockers
  };
  
  entries.unshift(entry);
  saveEntries(entries);
  clearForm();
  renderHistory();
}

function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  const entries = loadEntries().filter(e => e.id !== id);
  saveEntries(entries);
  renderHistory();
}

function clearForm() {
  document.getElementById('yesterday').value = '';
  document.getElementById('today').value = '';
  document.getElementById('blockers').value = '';
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function renderHistory() {
  const entries = loadEntries();
  const container = document.getElementById('historyList');
  
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty">No entries yet. Your first standup awaits.</div>';
    return;
  }
  
  container.innerHTML = entries.map(entry => `
    <div class="entry">
      <div class="entry-header">
        <span class="entry-date">${formatDate(entry.date)}</span>
        <button class="entry-delete" onclick="deleteEntry(${entry.id})">Delete</button>
      </div>
      ${entry.yesterday ? `<div class="entry-section"><div class="entry-section-title">Yesterday</div><div class="entry-section-content">${escapeHtml(entry.yesterday)}</div></div>` : ''}
      ${entry.today ? `<div class="entry-section"><div class="entry-section-title">Today</div><div class="entry-section-content">${escapeHtml(entry.today)}</div></div>` : ''}
      ${entry.blockers ? `<div class="entry-section"><div class="entry-section-title">Blockers</div><div class="entry-section-content">${escapeHtml(entry.blockers)}</div></div>` : ''}
    </div>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

renderHistory();
</script>
</body>
</html>
