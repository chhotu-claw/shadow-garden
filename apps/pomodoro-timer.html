<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer — Shadow's Garden</title>
<meta name="description" content="A focused pomodoro timer with customizable work/break durations, notifications, and session tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .pomodoro-container {
    max-width: 480px;
    margin: 0 auto;
    padding: 2rem;
    text-align: center;
  }
  
  .timer-display {
    font-size: 6rem;
    font-weight: 300;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    margin: 1rem 0;
    letter-spacing: -2px;
  }
  
  .timer-display.work { color: #e74c3c; }
  .timer-display.break { color: #27ae60; }
  .timer-display.paused { color: #7f8c8d; }
  
  .timer-controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin: 2rem 0;
  }
  
  .timer-btn {
    padding: 1rem 2rem;
    font-size: 1.1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }
  
  .timer-btn.primary {
    background: var(--accent);
    color: white;
  }
  
  .timer-btn.primary:hover {
    opacity: 0.9;
    transform: scale(1.02);
  }
  
  .timer-btn.secondary {
    background: var(--bg-secondary);
    color: var(--text);
    border: 1px solid var(--border);
  }
  
  .timer-settings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin: 2rem 0;
    padding: 1.5rem;
    background: var(--bg-secondary);
    border-radius: 12px;
  }
  
  .setting-group {
    text-align: left;
  }
  
  .setting-group label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
  }
  
  .setting-group input {
    width: 100%;
    padding: 0.75rem;
    font-size: 1rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
  }
  
  .session-counter {
    font-size: 1.1rem;
    color: var(--text-secondary);
    margin-top: 1rem;
  }
  
  .session-counter span {
    color: var(--accent);
    font-weight: 600;
  }
  
  .progress-ring {
    width: 200px;
    height: 200px;
    margin: 0 auto;
  }
  
  .progress-ring circle {
    fill: none;
    stroke-width: 8;
  }
  
  .progress-ring .bg {
    stroke: var(--bg-secondary);
  }
  
  .progress-ring .progress {
    stroke: var(--accent);
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 1s linear;
  }
  
  .progress-ring.work .progress { stroke: #e74c3c; }
  .progress-ring.break .progress { stroke: #27ae60; }
</style>
</head>
<body data-page-type="app">
  <div class="pomodoro-container">
    <h1>Pomodoro Timer</h1>
    
    <div class="progress-ring work" id="progressRing">
      <svg viewBox="0 0 200 200">
        <circle class="bg" cx="100" cy="100" r="90"/>
        <circle class="progress" cx="100" cy="100" r="90" 
          stroke-dasharray="565.48" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display work" id="timerDisplay">25:00</div>
    </div>
    
    <div class="timer-controls">
      <button class="timer-btn primary" id="startBtn">Start</button>
      <button class="timer-btn secondary" id="resetBtn">Reset</button>
    </div>
    
    <div class="session-counter">
      Sessions: <span id="sessionCount">0</span> | 
      Time focused: <span id="totalTime">0</span> min
    </div>
    
    <div class="timer-settings">
      <div class="setting-group">
        <label>Work Duration (min)</label>
        <input type="number" id="workDuration" value="25" min="1" max="60">
      </div>
      <div class="setting-group">
        <label>Break Duration (min)</label>
        <input type="number" id="breakDuration" value="5" min="1" max="30">
      </div>
      <div class="setting-group">
        <label>Long Break (min)</label>
        <input type="number" id="longBreak" value="15" min="1" max="60">
      </div>
      <div class="setting-group">
        <label>Sessions until long break</label>
        <input type="number" id="sessionsUntilLong" value="4" min="1" max="10">
      </div>
    </div>
  </div>

  <script>
    let timeLeft = 25 * 60;
    let totalTime = 25 * 60;
    let isRunning = false;
    let isWork = true;
    let sessionCount = 0;
    let totalMinutes = 0;
    let interval = null;
    
    const timerDisplay = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const progressRing = document.getElementById('progressRing');
    const progressCircle = progressRing.querySelector('.progress');
    const sessionCountEl = document.getElementById('sessionCount');
    const totalTimeEl = document.getElementById('totalTime');
    const workDurationInput = document.getElementById('workDuration');
    const breakDurationInput = document.getElementById('breakDuration');
    const longBreakInput = document.getElementById('longBreak');
    const sessionsUntilLongInput = document.getElementById('sessionsUntilLong');
    
    const circumference = 2 * Math.PI * 90;
    
    function updateDisplay() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      
      const offset = circumference * (1 - timeLeft / totalTime);
      progressCircle.style.strokeDashoffset = offset;
    }
    
    function updateTitle() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      document.title = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')} - Pomodoro`;
    }
    
    function tick() {
      if (timeLeft > 0) {
        timeLeft--;
        updateDisplay();
        updateTitle();
      } else {
        clearInterval(interval);
        isRunning = false;
        
        if (isWork) {
          sessionCount++;
          totalMinutes += parseInt(workDurationInput.value);
          sessionCountEl.textContent = sessionCount;
          totalTimeEl.textContent = totalMinutes;
          
          const shouldLongBreak = sessionCount % parseInt(sessionsUntilLongInput.value) === 0;
          const breakTime = shouldLongBreak ? parseInt(longBreakInput.value) : parseInt(breakDurationInput.value);
          
          startBreak(breakTime);
          playNotification();
        } else {
          startWork(parseInt(workDurationInput.value));
          playNotification();
        }
      }
    }
    
    function startWork(minutes) {
      isWork = true;
      totalTime = minutes * 60;
      timeLeft = totalTime;
      timerDisplay.className = 'timer-display work';
      progressRing.className = 'progress-ring work';
      updateDisplay();
    }
    
    function startBreak(minutes) {
      isWork = false;
      totalTime = minutes * 60;
      timeLeft = totalTime;
      timerDisplay.className = 'timer-display break';
      progressRing.className = 'progress-ring break';
      updateDisplay();
    }
    
    function playNotification() {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(isWork ? 'Time for a break!' : 'Break over! Ready to focus?');
      }
      
      // Also try audio
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.frequency.value = isWork ? 880 : 440;
        oscillator.type = 'sine';
        
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.5);
      } catch (e) {
        console.log('Audio not supported');
      }
    }
    
    function toggleTimer() {
      if (isRunning) {
        clearInterval(interval);
        isRunning = false;
        startBtn.textContent = 'Start';
        timerDisplay.classList.add('paused');
        progressRing.classList.add('paused');
      } else {
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
        interval = setInterval(tick, 1000);
        isRunning = true;
        startBtn.textContent = 'Pause';
        timerDisplay.classList.remove('paused');
        progressRing.classList.remove('paused');
      }
    }
    
    function resetTimer() {
      clearInterval(interval);
      isRunning = false;
      startBtn.textContent = 'Start';
      
      if (isWork) {
        startWork(parseInt(workDurationInput.value));
      } else {
        startBreak(parseInt(breakDurationInput.value));
      }
    }
    
    workDurationInput.addEventListener('change', () => {
      if (!isRunning && isWork) {
        startWork(parseInt(workDurationInput.value));
      }
    });
    
    breakDurationInput.addEventListener('change', () => {
      if (!isRunning && !isWork) {
        startBreak(parseInt(breakDurationInput.value));
      }
    });
    
    startBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', resetTimer);
    
    // Load saved state
    const savedState = localStorage.getItem('pomodoroState');
    if (savedState) {
      try {
        const state = JSON.parse(savedState);
        sessionCount = state.sessionCount || 0;
        totalMinutes = state.totalMinutes || 0;
        sessionCountEl.textContent = sessionCount;
        totalTimeEl.textContent = totalMinutes;
      } catch (e) {}
    }
    
    // Save state periodically
    setInterval(() => {
      localStorage.setItem('pomodoroState', JSON.stringify({
        sessionCount,
        totalMinutes
      }));
    }, 10000);
    
    // Handle page visibility for accurate timing
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && isRunning) {
        // Recalculate time based on system clock
      }
    });
    
    updateDisplay();
  </script>
</body>
</html>
