<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer — Shadow's Garden</title>
<meta name="description" content="A simple Pomodoro timer with work/break cycles, notifications, and history. Stay focused.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .timer-container {
    text-align: center;
    padding: 2rem;
    max-width: 400px;
    margin: 0 auto;
  }
  .timer-display {
    font-size: 5rem;
    font-weight: 700;
    font-family: monospace;
    margin: 1rem 0;
    color: var(--accent, #00ff88);
  }
  .timer-controls {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin: 1.5rem 0;
  }
  .timer-btn {
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    border: 2px solid var(--border, #333);
    background: transparent;
    color: var(--text, #eee);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .timer-btn:hover {
    background: var(--border, #333);
  }
  .timer-btn.active {
    background: var(--accent, #00ff88);
    color: #000;
    border-color: var(--accent, #00ff88);
  }
  .presets {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .preset-btn {
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
    border: 1px solid var(--border, #444);
    background: transparent;
    color: var(--text, #aaa);
    cursor: pointer;
    border-radius: 4px;
  }
  .preset-btn:hover {
    border-color: var(--accent, #00ff88);
    color: var(--text, #eee);
  }
  .session-type {
    font-size: 1.25rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent, #00ff88);
    margin-bottom: 0.5rem;
  }
  .session-count {
    color: var(--text-dim, #666);
    font-size: 0.875rem;
  }
  .history-list {
    margin-top: 2rem;
    text-align: left;
  }
  .history-item {
    padding: 0.5rem;
    border-bottom: 1px solid var(--border, #222);
    font-size: 0.875rem;
    color: var(--text-dim, #888);
  }
</style>
</head>
<body data-page-type="app">
<div class="timer-container">
  <div class="session-type" id="sessionType">Ready</div>
  <div class="session-count" id="sessionCount"></div>
  <div class="timer-display" id="display">25:00</div>
  
  <div class="presets">
    <button class="preset-btn" onclick="setPomodoro(25, 5)">25/5</button>
    <button class="preset-btn" onclick="setPomodoro(50, 10)">50/10</button>
    <button class="preset-btn" onclick="setPomodoro(15, 3)">15/3</button>
  </div>
  
  <div class="timer-controls">
    <button class="timer-btn" id="startBtn" onclick="startTimer()">Start</button>
    <button class="timer-btn" id="pauseBtn" onclick="pauseTimer()">Pause</button>
    <button class="timer-btn" id="resetBtn" onclick="resetTimer()">Reset</button>
    <button class="timer-btn" id="skipBtn" onclick="skipSession()">Skip</button>
  </div>
  
  <div class="history-list" id="history"></div>
</div>

<script>
let workTime = 25 * 60;
let breakTime = 5 * 60;
let timeLeft = workTime;
let isRunning = false;
let isWorkSession = true;
let currentInterval = null;
let sessionsCompleted = 0;

const display = document.getElementById('display');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const sessionType = document.getElementById('sessionType');
const sessionCount = document.getElementById('sessionCount');

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

function updateDisplay() {
  display.textContent = formatTime(timeLeft);
}

function setPodoro(work, breakM) {
  workTime = work * 60;
  breakTime = breakM * 60;
  timeLeft = workTime;
  isWorkSession = true;
  isRunning = false;
  clearInterval(currentInterval);
  sessionType.textContent = 'Ready';
  updateDisplay();
  startBtn.textContent = 'Start';
  pauseBtn.style.display = 'none';
}

function startTimer() {
  if (isRunning) return;
  isRunning = true;
  startBtn.style.display = 'none';
  pauseBtn.style.display = 'inline-block';
  sessionType.textContent = isWorkSession ? 'Work' : 'Break';
  currentInterval = setInterval(tick, 1000);
  tick();
}

function pauseTimer() {
  isRunning = false;
  clearInterval(currentInterval);
  startBtn.style.display = 'inline-block';
  pauseBtn.style.display = 'none';
  startBtn.textContent = 'Resume';
}

function resetTimer() {
  isRunning = false;
  clearInterval(currentInterval);
  timeLeft = isWorkSession ? workTime : breakTime;
  startBtn.style.display = 'inline-block';
  pauseBtn.style.display = 'none';
  startBtn.textContent = 'Start';
  sessionType.textContent = 'Ready';
  sessionCount.textContent = '';
  updateDisplay();
}

function skipSession() {
  clearInterval(currentInterval);
  completeSession(false);
}

function tick() {
  if (timeLeft > 0) {
    timeLeft--;
    updateDisplay();
  } else {
    completeSession(true);
  }
}

function completeSession(completed) {
  clearInterval(currentInterval);
  isRunning = false;
  
  if (completed) {
    addToHistory(isWorkSession ? '✓ Work done' : '✓ Break done');
    if (isWorkSession) {
      sessionsCompleted++;
    }
    notify(isWorkSession ? 'Work session complete! Time for a break.' : 'Break is over! Back to work.');
  }
  
  isWorkSession = !isWorkSession;
  timeLeft = isWorkSession ? workTime : breakTime;
  
  startBtn.style.display = 'inline-block';
  pauseBtn.style.display = 'none';
  startBtn.textContent = 'Start';
  sessionType.textContent = isWorkSession ? 'Work' : 'Break';
  sessionCount.textContent = sessionsCompleted > 0 ? `${sessionsCompleted} session${sessionsCompleted > 1 ? 's' : ''} today` : '';
  updateDisplay();
}

function notify(message) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('Pomodoro Timer', { body: message });
  } else if ('Notification' in window && Notification.permission !== 'denied') {
    Notification.requestPermission().then(perm => {
      if (perm === 'granted') {
        new Notification('Pomodoro Timer', { body: message });
      }
    });
  }
  // Also play a beep
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = 800;
  gain.gain.value = 0.3;
  osc.start();
  osc.stop(ctx.currentTime + 0.3);
}

function addToHistory(text) {
  const history = document.getElementById('history');
  const item = document.createElement('div');
  item.className = 'history-item';
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  item.textContent = `${time} — ${text}`;
  history.insertBefore(item, history.firstChild);
  
  // Save to localStorage
  const saved = JSON.parse(localStorage.getItem('pomodoro-history') || '[]');
  saved.unshift({ time, text });
  if (saved.length > 20) saved.pop();
  localStorage.setItem('pomodoro-history', JSON.stringify(saved));
}

// Load history
function loadHistory() {
  const saved = JSON.parse(localStorage.getItem('pomodoro-history') || '[]');
  const history = document.getElementById('history');
  saved.forEach(item => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.textContent = `${item.time} — ${item.text}`;
    history.appendChild(div);
  });
}

// Init
updateDisplay();
pauseBtn.style.display = 'none';
loadHistory();
</script>
</body>
</html>
