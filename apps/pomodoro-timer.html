<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer — Shadow's Garden</title>
<meta name="description" content="A minimal Pomodoro timer with customizable intervals, visual progress, and session tracking. Works entirely in your browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; background: #0d0d0d; }
  .timer-display { font-size: 5rem; font-weight: 200; font-family: 'SF Mono', monospace; letter-spacing: -0.02em; margin-bottom: 2rem; color: #e5e5e5; }
  .timer-display.break { color: #7af782; }
  .timer-display.paused { color: #f77a7a; }
  .session-label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.15em; color: #666; margin-bottom: 0.5rem; }
  .progress-ring { width: 280px; height: 280px; margin-bottom: 2rem; position: relative; }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring circle { fill: none; stroke-width: 4; }
  .progress-ring .bg { stroke: #222; }
  .progress-ring .progress { stroke: #7aa2f7; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
  .progress-ring.break .progress { stroke: #7af782; }
  .controls { display: flex; gap: 1rem; margin-bottom: 2rem; }
  button { background: #1a1a1a; border: 1px solid #333; color: #e5e5e5; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
  button:hover { background: #252525; border-color: #444; }
  button.primary { background: #7aa2f7; color: #0d0d0d; border-color: #7aa2f7; }
  button.primary:hover { background: #8fb4ff; }
  button.secondary { background: transparent; }
  .settings { display: flex; gap: 1.5rem; margin-bottom: 2rem; }
  .setting { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
  .setting label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; }
  .setting input { width: 60px; background: #1a1a1a; border: 1px solid #333; color: #e5e5e5; padding: 0.5rem; border-radius: 4px; text-align: center; font-size: 1rem; }
  .session-count { font-size: 0.85rem; color: #666; }
  .session-count span { color: #7aa2f7; }
</style>
</head>
<body data-page-type="app">
  <div class="session-label" id="sessionLabel">Focus Session</div>
  <div class="progress-ring" id="progressRing">
    <svg width="280" height="280">
      <circle class="bg" cx="140" cy="140" r="130"></circle>
      <circle class="progress" id="progressCircle" cx="140" cy="140" r="130" stroke-dasharray="816.81" stroke-dashoffset="0"></circle>
    </svg>
  </div>
  <div class="timer-display" id="timerDisplay">25:00</div>
  <div class="controls">
    <button id="startBtn" class="primary">Start</button>
    <button id="resetBtn" class="secondary">Reset</button>
  </div>
  <div class="settings">
    <div class="setting">
      <label>Focus</label>
      <input type="number" id="focusTime" value="25" min="1" max="60">
    </div>
    <div class="setting">
      <label>Break</label>
      <input type="number" id="breakTime" value="5" min="1" max="30">
    </div>
    <div class="setting">
      <label>Long Break</label>
      <input type="number" id="longBreakTime" value="15" min="1" max="60">
    </div>
  </div>
  <div class="session-count">Sessions: <span id="sessionCount">0</span></div>
  <script>
    const CIRCUMFERENCE = 2 * Math.PI * 130;
    let timeLeft = 25 * 60;
    let totalTime = 25 * 60;
    let isRunning = false;
    let isBreak = false;
    let currentSession = 0;
    let interval = null;

    const timerDisplay = document.getElementById('timerDisplay');
    const progressCircle = document.getElementById('progressCircle');
    const progressRing = document.getElementById('progressRing');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const sessionLabel = document.getElementById('sessionLabel');
    const sessionCount = document.getElementById('sessionCount');
    const focusTime = document.getElementById('focusTime');
    const breakTime = document.getElementById('breakTime');
    const longBreakTime = document.getElementById('longBreakTime');

    function updateDisplay() {
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      const offset = CIRCUMFERENCE * (1 - timeLeft / totalTime);
      progressCircle.style.strokeDashoffset = offset;
    }

    function tick() {
      if (timeLeft > 0) {
        timeLeft--;
        updateDisplay();
      } else {
        clearInterval(interval);
        isRunning = false;
        startBtn.textContent = isBreak ? 'Start Break' : 'Start';
        
        if (!isBreak) {
          currentSession++;
          sessionCount.textContent = currentSession;
          const longBreak = currentSession % 4 === 0;
          totalTime = (longBreak ? parseInt(longBreakTime.value) : parseInt(breakTime.value)) * 60;
          timeLeft = totalTime;
          isBreak = true;
          sessionLabel.textContent = longBreak ? 'Long Break' : 'Break';
          timerDisplay.classList.add('break');
          progressRing.classList.add('break');
        } else {
          totalTime = parseInt(focusTime.value) * 60;
          timeLeft = totalTime;
          isBreak = false;
          sessionLabel.textContent = 'Focus Session';
          timerDisplay.classList.remove('break');
          progressRing.classList.remove('break');
        }
        updateDisplay();
        
        if (Notification.permission === 'granted') {
          new Notification(isBreak ? 'Time for a break!' : 'Time to focus!');
        }
      }
    }

    startBtn.addEventListener('click', () => {
      if (isRunning) {
        clearInterval(interval);
        isRunning = false;
        startBtn.textContent = 'Resume';
        timerDisplay.classList.add('paused');
      } else {
        interval = setInterval(tick, 1000);
        isRunning = true;
        startBtn.textContent = 'Pause';
        timerDisplay.classList.remove('paused');
      }
    });

    resetBtn.addEventListener('click', () => {
      clearInterval(interval);
      isRunning = false;
      isBreak = false;
      currentSession = 0;
      sessionCount.textContent = '0';
      totalTime = parseInt(focusTime.value) * 60;
      timeLeft = totalTime;
      sessionLabel.textContent = 'Focus Session';
      timerDisplay.classList.remove('break', 'paused');
      progressRing.classList.remove('break');
      startBtn.textContent = 'Start';
      updateDisplay();
    });

    [focusTime, breakTime, longBreakTime].forEach(input => {
      input.addEventListener('change', () => {
        if (!isRunning && !isBreak) {
          totalTime = parseInt(focusTime.value) * 60;
          timeLeft = totalTime;
          updateDisplay();
        }
      });
    });

    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    updateDisplay();
  </script>
</body>
</html>
