<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer — Shadow's Garden</title>
<meta name="description" content="Simple, no-nonsense Pomodoro timer with customizable work/break intervals">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    font-family: 'JetBrains Mono', monospace;
  }
  
  .timer-container {
    text-align: center;
    padding: 3rem;
    background: var(--card-bg, #1a1a2e);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  
  .mode-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    justify-content: center;
  }
  
  .mode-tab {
    padding: 0.5rem 1.25rem;
    border: none;
    background: transparent;
    color: #888;
    cursor: pointer;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  
  .mode-tab.active {
    background: var(--accent, #e94560);
    color: white;
  }
  
  .timer-display {
    font-size: 6rem;
    font-weight: bold;
    letter-spacing: 0.1em;
    margin: 1rem 0;
    font-variant-numeric: tabular-nums;
  }
  
  .timer-display.work { color: #e94560; }
  .timer-display.short-break { color: #4ecca3; }
  .timer-display.long-break { color: #45b7d1; }
  
  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-top: 1.5rem;
  }
  
  button {
    padding: 0.75rem 2rem;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  
  .btn-primary {
    background: var(--accent, #e94560);
    color: white;
  }
  
  .btn-secondary {
    background: #333;
    color: #ccc;
  }
  
  .settings {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid #333;
  }
  
  .settings-toggle {
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0.5rem;
  }
  
  .settings-toggle:hover { color: #888; }
  
  .settings-panel {
    display: none;
    margin-top: 1rem;
    text-align: left;
  }
  
  .settings-panel.open { display: block; }
  
  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 0.75rem 0;
  }
  
  .setting-row label {
    color: #aaa;
    font-size: 0.9rem;
  }
  
  .setting-row input {
    width: 70px;
    padding: 0.5rem;
    border: 1px solid #444;
    border-radius: 6px;
    background: #222;
    color: white;
    text-align: center;
    font-size: 1rem;
  }
  
  .session-count {
    margin-top: 1.5rem;
    color: #666;
    font-size: 0.9rem;
  }
  
  .session-count span {
    color: var(--accent, #e94560);
    font-weight: bold;
  }
</style>
</head>
<body data-page-type="app">
  <div class="timer-container">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="work">Work</button>
      <button class="mode-tab" data-mode="short-break">Short Break</button>
      <button class="mode-tab" data-mode="long-break">Long Break</button>
    </div>
    
    <div class="timer-display work" id="display">25:00</div>
    
    <div class="controls">
      <button class="btn-primary" id="startBtn">Start</button>
      <button class="btn-secondary" id="resetBtn">Reset</button>
    </div>
    
    <div class="session-count">
      Sessions completed: <span id="sessionCount">0</span>
    </div>
    
    <div class="settings">
      <button class="settings-toggle" id="settingsToggle">⚙ Settings</button>
      <div class="settings-panel" id="settingsPanel">
        <div class="setting-row">
          <label>Work (min)</label>
          <input type="number" id="workDuration" value="25" min="1" max="60">
        </div>
        <div class="setting-row">
          <label>Short break (min)</label>
          <input type="number" id="shortBreakDuration" value="5" min="1" max="30">
        </div>
        <div class="setting-row">
          <label>Long break (min)</label>
          <input type="number" id="longBreakDuration" value="15" min="1" max="60">
        </div>
        <div class="setting-row">
          <label>Sessions until long break</label>
          <input type="number" id="sessionsUntilLong" value="4" min="2" max="10">
        </div>
      </div>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const sessionCountEl = document.getElementById('sessionCount');
    const modeTabs = document.querySelectorAll('.mode-tab');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsPanel = document.getElementById('settingsPanel');
    
    let timer = null;
    let timeLeft = 25 * 60;
    let isRunning = false;
    let currentMode = 'work';
    let sessions = 0;
    
    const defaults = {
      work: 25,
      'short-break': 5,
      'long-break': 15,
      sessionsUntilLong: 4
    };
    
    // Load settings
    function loadSettings() {
      const saved = JSON.parse(localStorage.getItem('pomodoro-settings') || '{}');
      document.getElementById('workDuration').value = saved.work || defaults.work;
      document.getElementById('shortBreakDuration').value = saved['short-break'] || defaults['short-break'];
      document.getElementById('longBreakDuration').value = saved['long-break'] || defaults['long-break'];
      document.getElementById('sessionsUntilLong').value = saved.sessionsUntilLong || defaults.sessionsUntilLong;
    }
    
    function saveSettings() {
      const settings = {
        work: parseInt(document.getElementById('workDuration').value),
        'short-break': parseInt(document.getElementById('shortBreakDuration').value),
        'long-break': parseInt(document.getElementById('longBreakDuration').value),
        sessionsUntilLong: parseInt(document.getElementById('sessionsUntilLong').value)
      };
      localStorage.setItem('pomodoro-settings', JSON.stringify(settings));
    }
    
    function formatTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }
    
    function updateDisplay() {
      display.textContent = formatTime(timeLeft);
    }
    
    function getDuration(mode) {
      const settings = JSON.parse(localStorage.getItem('pomodoro-settings') || '{}');
      return (settings[mode] || defaults[mode]) * 60;
    }
    
    function switchMode(mode) {
      currentMode = mode;
      stopTimer();
      timeLeft = getDuration(mode);
      updateDisplay();
      
      display.className = 'timer-display ' + mode;
      
      modeTabs.forEach(tab => {
        tab.classList.toggle('active', tab.dataset.mode === mode);
      });
    }
    
    function startTimer() {
      if (isRunning) {
        stopTimer();
        return;
      }
      
      isRunning = true;
      startBtn.textContent = 'Pause';
      
      timer = setInterval(() => {
        timeLeft--;
        updateDisplay();
        
        if (timeLeft <= 0) {
          completeSession();
        }
      }, 1000);
    }
    
    function stopTimer() {
      isRunning = false;
      startBtn.textContent = 'Start';
      clearInterval(timer);
    }
    
    function resetTimer() {
      stopTimer();
      timeLeft = getDuration(currentMode);
      updateDisplay();
    }
    
    function completeSession() {
      stopTimer();
      
      // Play notification sound
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.5);
      } catch(e) {}
      
      if (currentMode === 'work') {
        sessions++;
        sessionCountEl.textContent = sessions;
        
        const settings = JSON.parse(localStorage.getItem('pomodoro-settings') || '{}');
        const sessionsUntilLong = settings.sessionsUntilLong || defaults.sessionsUntilLong;
        
        if (sessions % sessionsUntilLong === 0) {
          switchMode('long-break');
        } else {
          switchMode('short-break');
        }
      } else {
        switchMode('work');
      }
      
      timeLeft = getDuration(currentMode);
      updateDisplay();
    }
    
    // Event listeners
    startBtn.addEventListener('click', startTimer);
    resetBtn.addEventListener('click', resetTimer);
    
    modeTabs.forEach(tab => {
      tab.addEventListener('click', () => switchMode(tab.dataset.mode));
    });
    
    settingsToggle.addEventListener('click', () => {
      settingsPanel.classList.toggle('open');
    });
    
    document.querySelectorAll('.settings-panel input').forEach(input => {
      input.addEventListener('change', () => {
        saveSettings();
        if (!isRunning) {
          timeLeft = getDuration(currentMode);
          updateDisplay();
        }
      });
    });
    
    // Initialize
    loadSettings();
    timeLeft = getDuration('work');
    updateDisplay();
    
    // Load session count
    const savedSessions = localStorage.getItem('pomodoro-sessions');
    if (savedSessions) {
      sessions = parseInt(savedSessions);
      sessionCountEl.textContent = sessions;
    }
    
    // Save sessions on change
    const originalComplete = completeSession;
    completeSession = function() {
      localStorage.setItem('pomodoro-sessions', sessions);
      originalComplete();
    };
  </script>
</body>
</html>
