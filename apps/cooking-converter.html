<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooking Measurement Converter — Shadow's Garden</title>
<meta name="description" content="Convert cooking measurements between US, metric, and imperial. Cups, tablespoons, grams, ounces, and more.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --text: #e0e0e0;
    --accent: #00d4aa;
    --muted: #666;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: var(--card);
    padding: 32px;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.4rem;
    margin: 0 0 6px 0;
    color: var(--accent);
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .input-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type="number"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 1.2rem;
    background: var(--bg);
    border: 2px solid #333;
    border-radius: 8px;
    color: var(--text);
    box-sizing: border-box;
    transition: border-color 0.2s;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
  }
  select {
    width: 100%;
    padding: 14px 16px;
    font-size: 1rem;
    background: var(--bg);
    border: 2px solid #333;
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
  }
  .results {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #333;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #222;
  }
  .result-row:last-child {
    border-bottom: none;
  }
  .result-label {
    color: var(--muted);
    font-size: 0.9rem;
  }
  .result-value {
    font-weight: 500;
    font-size: 1.05rem;
  }
  .note {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 16px;
    text-align: center;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Cooking Converter</h1>
  <p class="subtitle">Convert between US, metric, and imperial</p>
  
  <div class="input-group">
    <label>Amount</label>
    <input type="number" id="amount" placeholder="1" value="1" min="0" step="any">
  </div>
  
  <div class="input-group">
    <label>From Unit</label>
    <select id="fromUnit">
      <optgroup label="Volume">
        <option value="cup">Cups</option>
        <option value="tbsp">Tablespoons</option>
        <option value="tsp">Teaspoons</option>
        <option value="fl oz">Fluid Ounces</option>
        <option value="pint">Pints</option>
        <option value="quart">Quarts</option>
        <option value="gallon">Gallons</option>
        <option value="ml">Milliliters</option>
        <option value="l">Liters</option>
      </optgroup>
      <optgroup label="Weight">
        <option value="oz">Ounces</option>
        <option value="lb">Pounds</option>
        <option value="g">Grams</option>
        <option value="kg">Kilograms</option>
      </optgroup>
    </select>
  </div>
  
  <div class="results" id="results">
    <!-- Results populate here -->
  </div>
  
  <p class="note">Common cooking conversions • All client-side</p>
</div>

<script>
  // Conversion factors to milliliters (for volume) or grams (for weight)
  const conversions = {
    // Volume to ml
    cup: 236.588,
    tbsp: 14.787,
    tsp: 4.929,
    'fl oz': 29.574,
    pint: 473.176,
    quart: 946.353,
    gallon: 3785.41,
    ml: 1,
    l: 1000,
    // Weight to grams
    oz: 28.3495,
    lb: 453.592,
    g: 1,
    kg: 1000
  };
  
  const unitTypes = {
    cup: 'volume', tbsp: 'volume', tsp: 'volume', 'fl oz': 'volume',
    pint: 'volume', quart: 'volume', gallon: 'volume', ml: 'volume', l: 'volume',
    oz: 'weight', lb: 'weight', g: 'weight', kg: 'weight'
  };
  
  const displayUnits = {
    cup: { unit: 'cup', label: 'Cups' },
    tbsp: { unit: 'tbsp', label: 'Tablespoons' },
    tsp: { unit: 'tsp', label: 'Teaspoons' },
    'fl oz': { unit: 'fl oz', label: 'Fluid Ounces' },
    pint: { unit: 'pint', label: 'Pints' },
    quart: { unit: 'quart', label: 'Quarts' },
    gallon: { unit: 'gallon', label: 'Gallons' },
    ml: { unit: 'ml', label: 'Milliliters' },
    l: { unit: 'l', label: 'Liters' },
    oz: { unit: 'oz', label: 'Ounces' },
    lb: { unit: 'lb', label: 'Pounds' },
    g: { unit: 'g', label: 'Grams' },
    kg: { unit: 'kg', label: 'Kilograms' }
  };
  
  const amountInput = document.getElementById('amount');
  const fromUnitSelect = document.getElementById('fromUnit');
  const resultsDiv = document.getElementById('results');
  
  function formatNumber(num) {
    if (num >= 100) return Math.round(num);
    if (num >= 10) return Math.round(num * 10) / 10;
    if (num >= 1) return Math.round(num * 100) / 100;
    return Math.round(num * 1000) / 1000;
  }
  
  function convert() {
    const amount = parseFloat(amountInput.value) || 0;
    const fromUnit = fromUnitSelect.value;
    const type = unitTypes[fromUnit];
    
    if (amount === 0) {
      resultsDiv.innerHTML = '';
      return;
    }
    
    // Convert to base unit (ml for volume, g for weight)
    const baseValue = amount * conversions[fromUnit];
    
    let html = '';
    
    // Show conversions of same type
    for (const [unit, factor] of Object.entries(conversions)) {
      if (unitTypes[unit] !== type) continue;
      if (unit === fromUnit) continue;
      
      const result = baseValue / factor;
      if (result < 0.01 && result > 0) continue;
      if (result > 10000) continue;
      
      html += `
        <div class="result-row">
          <span class="result-label">${displayUnits[unit].label}</span>
          <span class="result-value">${formatNumber(result)}</span>
        </div>
      `;
    }
    
    resultsDiv.innerHTML = html || '<p class="note">Select a unit to convert</p>';
  }
  
  amountInput.addEventListener('input', convert);
  fromUnitSelect.addEventListener('change', convert);
  
  // Initial convert
  convert();
</script>
</body>
</html>
