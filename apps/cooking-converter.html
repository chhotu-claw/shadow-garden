<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooking Measurement Converter — Shadow's Garden</title>
<meta name="description" content="Convert between cups, tablespoons, teaspoons, grams, ounces, and milliliters.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; --accent: #00d4aa; --muted: #666; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .container { background: var(--card); padding: 32px; border-radius: 16px; width: 100%; max-width: 440px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
  h1 { font-size: 1.5rem; margin: 0 0 8px 0; color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
  .input-group { margin-bottom: 20px; }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type="number"], select { width: 100%; padding: 14px 16px; font-size: 1.1rem; background: var(--bg); border: 2px solid #333; border-radius: 8px; color: var(--text); box-sizing: border-box; transition: border-color 0.2s; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  select { cursor: pointer; }
  .results { margin-top: 24px; padding-top: 24px; border-top: 1px solid #333; }
  .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
  .result-row:last-child { border-bottom: none; }
  .result-label { color: var(--muted); }
  .result-value { font-weight: 500; }
  .note { font-size: 0.8rem; color: var(--muted); text-align: center; margin-top: 16px; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Cooking Converter</h1>
  <p class="subtitle">Cups to tablespoons to grams</p>
  
  <div class="input-group">
    <label>Amount</label>
    <input type="number" id="amount" placeholder="1" value="1" step="0.01" min="0">
  </div>
  
  <div class="input-group">
    <label>From Unit</label>
    <select id="fromUnit">
      <option value="cup">Cups</option>
      <option value="tbsp">Tablespoons</option>
      <option value="tsp">Teaspoons</option>
      <option value="ml">Milliliters</option>
      <option value="oz">Ounces</option>
      <option value="lb">Pounds</option>
      <option value="g">Grams</option>
      <option value="kg">Kilograms</option>
    </select>
  </div>
  
  <div class="results" id="results">
    <!-- Conversions show here -->
  </div>
  
  <p class="note">Enter amount and pick a unit to convert</p>
</div>

<script>
  const amountInput = document.getElementById('amount');
  const fromUnitSelect = document.getElementById('fromUnit');
  const resultsDiv = document.getElementById('results');
  
  // All conversions go through ml (base unit)
  // Approximations for common cooking measurements (water/flour ~ densities)
  const toMl = {
    cup: 236.588,
    tbsp: 14.787,
    tsp: 4.929,
    ml: 1,
    oz: 29.5735,
    lb: 453.592,
    g: 1,
    kg: 1000
  };
  
  const unitNames = {
    cup: 'Cups',
    tbsp: 'Tablespoons',
    tsp: 'Teaspoons',
    ml: 'Milliliters',
    oz: 'Ounces',
    lb: 'Pounds',
    g: 'Grams',
    kg: 'Kilograms'
  };
  
  const units = ['cup', 'tbsp', 'tsp', 'ml', 'oz', 'lb', 'g', 'kg'];
  
  function convert() {
    const amount = parseFloat(amountInput.value) || 0;
    const fromUnit = fromUnitSelect.value;
    
    if (amount === 0) {
      resultsDiv.innerHTML = '<p style="color:var(--muted)">Enter an amount to convert</p>';
      return;
    }
    
    // Convert to ml first (base)
    let mlValue;
    if (fromUnit === 'g') {
      // Grams = ml for water (close enough for cooking)
      mlValue = amount;
    } else if (fromUnit === 'kg') {
      mlValue = amount * 1000;
    } else {
      mlValue = amount * toMl[fromUnit];
    }
    
    // Convert to all units
    const results = [];
    
    // Cups
    results.push({ unit: 'cup', val: mlValue / 236.588, name: 'Cups' });
    // Tbsp
    results.push({ unit: 'tbsp', val: mlValue / 14.787, name: 'Tablespoons' });
    // Tsp
    results.push({ unit: 'tsp', val: mlValue / 4.929, name: 'Teaspoons' });
    // ml
    results.push({ unit: 'ml', val: mlValue, name: 'Milliliters' });
    // oz
    results.push({ unit: 'oz', val: mlValue / 29.5735, name: 'Ounces' });
    // g (approximation)
    results.push({ unit: 'g', val: mlValue, name: 'Grams' });
    // kg
    results.push({ unit: 'kg', val: mlValue / 1000, name: 'Kilograms' });
    
    // Build HTML
    let html = '';
    results.forEach(r => {
      if (r.unit === fromUnit) return; // Skip source unit
      const displayVal = r.val < 0.01 ? r.val.toPrecision(3) : r.val < 10 ? r.val.toFixed(2) : r.val.toFixed(1);
      html += `<div class="result-row"><span class="result-label">${r.name}</span><span class="result-value">${displayVal}</span></div>`;
    });
    
    resultsDiv.innerHTML = html;
  }
  
  amountInput.addEventListener('input', convert);
  fromUnitSelect.addEventListener('change', convert);
  
  // Initial run
  convert();
</script>
</body>
</html>
