<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-Body Gravity — Shadow's Garden</title>
<meta name="description" content="Interactive N-body gravity simulation — click to add celestial bodies and watch orbits emerge from the math.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #000;
    cursor: crosshair;
  }
  canvas {
    display: block;
  }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .btn {
    background: rgba(20, 20, 30, 0.8);
    border: 1px solid rgba(100, 150, 255, 0.3);
    color: rgba(180, 200, 255, 0.9);
    padding: 8px 16px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s;
  }
  .btn:hover {
    background: rgba(40, 40, 80, 0.9);
    border-color: rgba(100, 150, 255, 0.6);
    box-shadow: 0 0 20px rgba(100, 150, 255, 0.3);
  }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(150, 180, 255, 0.5);
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    pointer-events: none;
  }
  .stats {
    position: fixed;
    top: 20px;
    right: 20px;
    color: rgba(150, 180, 255, 0.5);
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    text-align: right;
    pointer-events: none;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">click to add body • drag to set velocity • double-click to clear</div>
  <div class="stats">
    <div id="bodyCount">Bodies: 0</div>
    <div id="fps">FPS: 60</div>
  </div>
  <div class="controls">
    <button class="btn" onclick="setPreset('solar')">Solar System</button>
    <button class="btn" onclick="setPreset('binary')">Binary Stars</button>
    <button class="btn" onclick="setPreset('cluster')">Cluster</button>
    <button class="btn" onclick="setPreset('clear')">Clear</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let bodies = [];
    let dragging = false;
    let dragStart = { x: 0, y: 0 };
    let dragBody = null;
    let lastTime = performance.now();
    let frameCount = 0;
    let fps = 60;
    
    const G = 0.5; // Gravitational constant (tuned for visual appeal)
    const TRAIL_LENGTH = 100;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    window.addEventListener('resize', resize);
    resize();
    
    class Body {
      constructor(x, y, vx, vy, mass, color) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.mass = mass;
        this.color = color || `hsl(${Math.random() * 360}, 70%, 60%)`;
        this.trail = [];
      }
      
      update(bodies, dt) {
        let ax = 0, ay = 0;
        
        for (const other of bodies) {
          if (other === this) continue;
          
          const dx = other.x - this.x;
          const dy = other.y - this.y;
          const distSq = dx * dx + dy * dy;
          const dist = Math.sqrt(distSq);
          
          if (dist < 5) continue; // Softening to prevent extreme acceleration
          
          const force = G * other.mass / distSq;
          ax += force * dx / dist;
          ay += force * dy / dist;
        }
        
        this.vx += ax * dt;
        this.vy += ay * dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        
        // Trail
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > TRAIL_LENGTH) {
          this.trail.shift();
        }
      }
      
      draw() {
        // Draw trail
        if (this.trail.length > 1) {
          ctx.beginPath();
          ctx.moveTo(this.trail[0].x, this.trail[0].y);
          for (let i = 1; i < this.trail.length; i++) {
            ctx.lineTo(this.trail[i].x, this.trail[i].y);
          }
          ctx.strokeStyle = this.color + '44';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        
        // Draw body
        const radius = Math.sqrt(this.mass) * 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        
        // Glow
        const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radius * 3);
        gradient.addColorStop(0, this.color + '88');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, radius * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function setPreset(preset) {
      bodies = [];
      
      if (preset === 'solar') {
        // Central star
        bodies.push(new Body(width / 2, height / 2, 0, 0, 500, '#ffcc00'));
        
        // Planets (approximate relative velocities for circular orbits)
        bodies.push(new Body(width / 2 + 150, height / 2, 1.3, 0, 20, '#ff6644'));
        bodies.push(new Body(width / 2 + 250, height / 2, 1.0, 0, 30, '#44aaff'));
        bodies.push(new Body(width / 2 + 350, height / 2, 0.85, 0, 25, '#ff88cc'));
        bodies.push(new Body(width / 2 + 480, height / 2, 0.7, 0, 40, '#ffaa44'));
      } else if (preset === 'binary') {
        bodies.push(new Body(width / 2 - 80, height / 2, 0, 0.8, 200, '#ff6644'));
        bodies.push(new Body(width / 2 + 80, height / 2, 0, -0.8, 200, '#44aaff'));
      } else if (preset === 'cluster') {
        for (let i = 0; i < 30; i++) {
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * 200 + 50;
          const x = width / 2 + Math.cos(angle) * dist;
          const y = height / 2 + Math.sin(angle) * dist;
          const v = 0.5 - Math.random() * 1;
          bodies.push(new Body(x, y, Math.cos(angle + Math.PI/2) * v, Math.sin(angle + Math.PI/2) * v, Math.random() * 20 + 5));
        }
      }
      
      document.getElementById('bodyCount').textContent = `Bodies: ${bodies.length}`;
    }
    
    function animate() {
      // Clear with fade effect
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      // Update and draw bodies
      for (const body of bodies) {
        body.update(bodies, 1);
        body.draw();
      }
      
      // Draw drag line
      if (dragging && dragBody) {
        ctx.beginPath();
        ctx.moveTo(dragBody.x, dragBody.y);
        ctx.lineTo(dragStart.x, dragStart.y);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      
      // FPS calculation
      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastTime = now;
        document.getElementById('fps').textContent = `FPS: ${fps}`;
      }
      
      requestAnimationFrame(animate);
    }
    
    canvas.addEventListener('mousedown', (e) => {
      dragging = true;
      dragStart = { x: e.clientX, y: e.clientY };
      
      // Check if clicking on existing body
      for (const body of bodies) {
        const dx = e.clientX - body.x;
        const dy = e.clientY - body.y;
        if (Math.sqrt(dx * dx + dy * dy) < Math.sqrt(body.mass) * 2 + 10) {
          dragBody = body;
          break;
        }
      }
      
      if (!dragBody) {
        // Create new body
        dragBody = new Body(e.clientX, e.clientY, 0, 0, 30);
        bodies.push(dragBody);
        document.getElementById('bodyCount').textContent = `Bodies: ${bodies.length}`;
      }
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (dragging) {
        dragStart = { x: e.clientX, y: e.clientY };
      }
    });
    
    canvas.addEventListener('mouseup', (e) => {
      if (dragging && dragBody) {
        const vx = (dragBody.x - e.clientX) * 0.02;
        const vy = (dragBody.y - e.clientY) * 0.02;
        dragBody.vx = vx;
        dragBody.vy = vy;
      }
      dragging = false;
      dragBody = null;
    });
    
    canvas.addEventListener('dblclick', (e) => {
      // Remove body on double-click
      for (let i = bodies.length - 1; i >= 0; i--) {
        const body = bodies[i];
        const dx = e.clientX - body.x;
        const dy = e.clientY - body.y;
        if (Math.sqrt(dx * dx + dy * dy) < Math.sqrt(body.mass) * 2 + 10) {
          bodies.splice(i, 1);
          document.getElementById('bodyCount').textContent = `Bodies: ${bodies.length}`;
          break;
        }
      }
    });
    
    // Start with solar system
    setPreset('solar');
    animate();
  </script>
</body>
</html>
