<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-Body Gravity — Shadow's Garden</title>
<meta name="description" content="N-body gravity simulation — click to add bodies, choose presets, watch orbits emerge"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #050508; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    color: #ccc;
    font-size: 13px;
    z-index: 100;
  }
  #controls h3 { margin: 0 0 12px 0; color: #fff; font-size: 14px; }
  button {
    background: #2a4a6a;
    border: none;
    color: #fff;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 6px;
    margin-top: 8px;
    font-size: 12px;
  }
  button:hover { background: #3a5a7a; }
  .preset-btns button { margin-bottom: 4px; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #556;
    font-size: 11px;
  }
  #body-count {
    position: fixed;
    top: 20px;
    right: 20px;
    color: #556;
    font-size: 11px;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>N-Body Gravity</h3>
    <div class="control-row">
      <label>Gravity Strength <span id="gravVal">1.0</span></label>
      <input type="range" id="gravity" min="0.1" max="3" step="0.1" value="1">
    </div>
    <div class="control-row">
      <label>Trail Length <span id="trailVal">50</span></label>
      <input type="range" id="trail" min="0" max="200" value="50">
    </div>
    <div class="preset-btns">
      <button id="clear">Clear All</button>
      <button id="pause">Pause</button>
    </div>
    <div class="preset-btns">
      <button id="preset-solar">Solar System</button>
      <button id="preset-binary">Binary Stars</button>
      <button id="preset-cluster">Cluster</button>
      <button id="preset-random">Random</button>
    </div>
  </div>
  <div id="body-count">Bodies: 0</div>
  <div id="info">Click to add bodies | Drag to set velocity</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let bodies = [];
    let trails = [];
    let paused = false;
    let gravity = 1;
    let trailLength = 50;
    let dragging = null;
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    
    function addBody(x, y, vx = 0, vy = 0, mass = 10, color = null) {
      const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181', '#aa96da', '#fcbad3', '#a8d8ea'];
      bodies.push({
        x, y, vx, vy, mass,
        radius: Math.sqrt(mass) * 2,
        color: color || colors[Math.floor(Math.random() * colors.length)]
      });
      trails.push([]);
      updateCount();
    }
    
    function updateCount() {
      document.getElementById('body-count').textContent = `Bodies: ${bodies.length}`;
    }
    
    function clearBodies() {
      bodies = [];
      trails = [];
      updateCount();
    }
    
    function presetSolar() {
      clearBodies();
      const cx = width / 2;
      const cy = height / 2;
      addBody(cx, cy, 0, 0, 200, '#ffd93d');
      addBody(cx + 100, cy, 0, 1.4, 5, '#6c757d');
      addBody(cx + 180, cy, 0, 1.1, 8, '#ff6b6b');
      addBody(cx + 280, cy, 0, 0.9, 10, '#4ecdc4');
      addBody(cx + 400, cy, 0, 0.7, 6, '#ffe66d');
    }
    
    function presetBinary() {
      clearBodies();
      const cx = width / 2;
      const cy = height / 2;
      addBody(cx - 80, cy, 0, 0.8, 80, '#ff6b6b');
      addBody(cx + 80, cy, 0, -0.8, 80, '#4ecdc4');
    }
    
    function presetCluster() {
      clearBodies();
      const cx = width / 2;
      const cy = height / 2;
      for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 150;
        const speed = Math.sqrt(50 / (dist + 10)) * 2;
        addBody(
          cx + Math.cos(angle) * dist,
          cy + Math.sin(angle) * dist,
          -Math.sin(angle) * speed,
          Math.cos(angle) * speed,
          5 + Math.random() * 15
        );
      }
    }
    
    function presetRandom() {
      clearBodies();
      for (let i = 0; i < 15; i++) {
        addBody(
          Math.random() * width,
          Math.random() * height,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2,
          5 + Math.random() * 20
        );
      }
    }
    
    function update() {
      if (paused) return;
      
      for (let i = 0; i < bodies.length; i++) {
        let bx = bodies[i];
        for (let j = 0; j < bodies.length; j++) {
          if (i === j) continue;
          let by = bodies[j];
          let dx = by.x - bx.x;
          let dy = by.y - bx.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 5) dist = 5;
          let force = gravity * bx.mass * by.mass / (dist * dist);
          let ax = (dx / dist) * force / bx.mass;
          let ay = (dy / dist) * force / bx.mass;
          bx.vx += ax;
          bx.vy += ay;
        }
      }
      
      for (let i = 0; i < bodies.length; i++) {
        let b = bodies[i];
        b.x += b.vx;
        b.y += b.vy;
        
        if (b.x < 0 || b.x > width) b.vx *= -0.9;
        if (b.y < 0 || b.y > height) b.vy *= -0.9;
        b.x = Math.max(0, Math.min(width, b.x));
        b.y = Math.max(0, Math.min(height, b.y));
        
        if (trailLength > 0) {
          trails[i].push({ x: b.x, y: b.y });
          if (trails[i].length > trailLength) trails[i].shift();
        }
      }
    }
    
    function render() {
      ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      for (let i = 0; i < bodies.length; i++) {
        let trail = trails[i];
        if (trail.length > 1) {
          ctx.beginPath();
          ctx.strokeStyle = bodies[i].color + '44';
          ctx.lineWidth = 1;
          ctx.moveTo(trail[0].x, trail[0].y);
          for (let j = 1; j < trail.length; j++) {
            ctx.lineTo(trail[j].x, trail[j].y);
          }
          ctx.stroke();
        }
      }
      
      for (let b of bodies) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fill();
      }
    }
    
    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }
    
    canvas.addEventListener('mousedown', e => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      for (let b of bodies) {
        let dx = x - b.x;
        let dy = y - b.y;
        if (Math.sqrt(dx*dx + dy*dy) < b.radius + 10) {
          dragging = b;
          return;
        }
      }
      
      addBody(x, y, 0, 0, 10 + Math.random() * 20);
    });
    
    canvas.addEventListener('mousemove', e => {
      if (dragging) {
        const rect = canvas.getBoundingClientRect();
        dragging.x = e.clientX - rect.left;
        dragging.y = e.clientY - rect.top;
      }
    });
    
    canvas.addEventListener('mouseup', e => {
      if (dragging) {
        const rect = canvas.getBoundingClientRect();
        const vx = (e.clientX - rect.left - dragging.x) * 0.1;
        const vy = (e.clientY - rect.top - dragging.y) * 0.1;
        dragging.vx = vx;
        dragging.vy = vy;
        dragging = null;
      }
    });
    
    document.getElementById('gravity').addEventListener('input', e => {
      gravity = +e.target.value;
      document.getElementById('gravVal').textContent = gravity.toFixed(1);
    });
    
    document.getElementById('trail').addEventListener('input', e => {
      trailLength = +e.target.value;
      document.getElementById('trailVal').textContent = trailLength;
      trails = bodies.map(() => []);
    });
    
    document.getElementById('clear').addEventListener('click', clearBodies);
    document.getElementById('pause').addEventListener('click', () => {
      paused = !paused;
      document.getElementById('pause').textContent = paused ? 'Resume' : 'Pause';
    });
    document.getElementById('preset-solar').addEventListener('click', presetSolar);
    document.getElementById('preset-binary').addEventListener('click', presetBinary);
    document.getElementById('preset-cluster').addEventListener('click', presetCluster);
    document.getElementById('preset-random').addEventListener('click', presetRandom);
    
    window.addEventListener('resize', resize);
    resize();
    presetRandom();
    loop();
  </script>
</body>
</html>
