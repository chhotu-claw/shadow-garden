<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter — Shadow's Garden</title>
<meta name="description" content="Count words, characters, sentences, paragraphs. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .counter { max-width: 700px; margin: 0 auto; }
  textarea {
    width: 100%;
    min-height: 300px;
    padding: 16px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    font-family: var(--mono);
    line-height: 1.6;
    resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin: 20px 0;
  }
  .stat-card {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
  }
  .stat-label {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
  }
  .controls {
    display: flex;
    gap: 12px;
  }
  button {
    padding: 10px 16px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    border-color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover {
    opacity: 0.9;
  }
  @media (max-width: 500px) {
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .controls {
      flex-wrap: wrap;
    }
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="counter">
    <h1>Word Counter</h1>
    <p style="color: var(--text-secondary); margin-bottom: 16px;">Count words, characters, sentences, and paragraphs. All local, no tracking.</p>
    
    <textarea id="input" placeholder="Paste or type text here..." oninput="count()"></textarea>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="wordCount">0</div>
        <div class="stat-label">Words</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="charCount">0</div>
        <div class="stat-label">Characters</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="sentenceCount">0</div>
        <div class="stat-label">Sentences</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="paragraphCount">0</div>
        <div class="stat-label">Paragraphs</div>
      </div>
    </div>
    
    <div class="controls">
      <button class="primary" onclick="count()">Refresh Count</button>
      <button onclick="clearText()">Clear</button>
      <button onclick="copyStats()">Copy Stats</button>
    </div>
  </div>
</div>
<script>
  function count() {
    const text = document.getElementById('input').value;
    
    // Words: split by whitespace, filter empty
    const words = text.trim().split(/\s+/).filter(w => w.length > 0);
    document.getElementById('wordCount').textContent = words.length.toLocaleString();
    
    // Characters
    document.getElementById('charCount').textContent = text.length.toLocaleString();
    
    // Sentences: count . ! ? followed by space or end
    const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
    document.getElementById('sentenceCount').textContent = sentences.length.toLocaleString();
    
    // Paragraphs: split by double newline or more
    const paragraphs = text.split(/\n\n+/).filter(p => p.trim().length > 0);
    document.getElementById('paragraphCount').textContent = paragraphs.length.toLocaleString();
  }
  
  function clearText() {
    document.getElementById('input').value = '';
    count();
  }
  
  function copyStats() {
    const words = document.getElementById('wordCount').textContent;
    const chars = document.getElementById('charCount').textContent;
    const sentences = document.getElementById('sentenceCount').textContent;
    const paragraphs = document.getElementById('paragraphCount').textContent;
    
    const stats = `Words: ${words}\nCharacters: ${chars}\nSentences: ${sentences}\nParagraphs: ${paragraphs}`;
    navigator.clipboard.writeText(stats).then(() => {
      const btn = event.target;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Stats', 1500);
    });
  }
  
  // Initial count (in case of page refresh with content)
  count();
</script>
</body>
</html>
