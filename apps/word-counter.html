<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter — Shadow's Garden</title>
<meta name="description" content="Count words, characters, sentences, paragraphs in any text. No tracking, no ads.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
  h1 { margin-bottom: 0.5rem; }
  .tagline { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }
  textarea {
    width: 100%;
    height: 300px;
    padding: 1rem;
    font-size: 1rem;
    font-family: inherit;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    resize: vertical;
    line-height: 1.6;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    margin-top: 1.5rem;
  }
  .stat-box {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
  }
  .stat-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .info {
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--bg-secondary);
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .info kbd {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.15rem 0.4rem;
    font-family: monospace;
    font-size: 0.8rem;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Word Counter</h1>
  <p class="tagline">Count words, characters, sentences, paragraphs. No tracking.</p>
  
  <textarea id="text" placeholder="Paste or type your text here..."></textarea>
  
  <div class="stats">
    <div class="stat-box">
      <div class="stat-value" id="words">0</div>
      <div class="stat-label">Words</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="chars">0</div>
      <div class="stat-label">Characters</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="charsNoSpaces">0</div>
      <div class="stat-label">Chars (no spaces)</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="sentences">0</div>
      <div class="stat-label">Sentences</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="paragraphs">0</div>
      <div class="stat-label">Paragraphs</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="lines">0</div>
      <div class="stat-label">Lines</div>
    </div>
  </div>
  
  <div class="info">
    <kbd>Ctrl+V</kbd> to paste · <kbd>Ctrl+Z</kbd> to undo · Counts update as you type
  </div>
</div>

<script>
const textArea = document.getElementById('text');
const stats = {
  words: document.getElementById('words'),
  chars: document.getElementById('chars'),
  charsNoSpaces: document.getElementById('charsNoSpaces'),
  sentences: document.getElementById('sentences'),
  paragraphs: document.getElementById('paragraphs'),
  lines: document.getElementById('lines')
};

function count() {
  const text = textArea.value;
  
  // Characters
  stats.chars.textContent = text.length;
  
  // Characters without spaces
  stats.charsNoSpaces.textContent = text.replace(/\s/g, '').length;
  
  // Words - split by whitespace, filter empty
  const words = text.trim().split(/\s+/).filter(w => w.length > 0);
  stats.words.textContent = words.length;
  
  // Sentences - split by . ! ?
  const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
  stats.sentences.textContent = sentences.length;
  
  // Paragraphs - split by double newline or more
  const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
  stats.paragraphs.textContent = paragraphs.length;
  
  // Lines
  const lines = text.split('\n').length;
  stats.lines.textContent = lines;
}

textArea.addEventListener('input', count);

// Count on load in case there's default content
count();
</script>
</body>
</html>
