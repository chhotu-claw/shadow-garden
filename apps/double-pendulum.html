<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Pendulum — Shadow's Garden</title>
<meta name="description" content="Interactive double pendulum simulation — chaos in motion, the math that models weather and turbulence"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    color: #ccc;
    font-size: 13px;
    z-index: 100;
  }
  #controls h3 { margin: 0 0 12px 0; color: #fff; font-size: 14px; }
  .control-row { margin-bottom: 10px; }
  .control-row label { display: block; margin-bottom: 4px; color: #888; }
  .control-row input[type="range"] { width: 100%; }
  .control-row span { float: right; color: #4af; }
  button {
    background: #2a4a6a;
    border: none;
    color: #fff;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 6px;
    margin-top: 8px;
    font-size: 12px;
  }
  button:hover { background: #3a5a7a; }
  #trace-controls {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    color: #ccc;
    font-size: 13px;
    z-index: 100;
  }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #556;
    font-size: 11px;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>Double Pendulum</h3>
    <div class="control-row">
      <label>Mass 1 <span id="m1Val">10</span></label>
      <input type="range" id="m1" min="1" max="30" value="10">
    </div>
    <div class="control-row">
      <label>Mass 2 <span id="m2Val">10</span></label>
      <input type="range" id="m2" min="1" max="30" value="10">
    </div>
    <div class="control-row">
      <label>Length 1 <span id="l1Val">150</span></label>
      <input type="range" id="l1" min="50" max="250" value="150">
    </div>
    <div class="control-row">
      <label>Length 2 <span id="l2Val">150</span></label>
      <input type="range" id="l2" min="50" max="250" value="150">
    </div>
    <div class="control-row">
      <label>Gravity <span id="gVal">1</span></label>
      <input type="range" id="g" min="0.1" max="3" step="0.1" value="1">
    </div>
    <div class="control-row">
      <label>Damping <span id="dVal">0</span></label>
      <input type="range" id="d" min="0" max="0.1" step="0.001" value="0">
    </div>
    <button id="reset">Reset</button>
    <button id="pause">Pause</button>
  </div>
  <div id="trace-controls">
    <h3>Trace</h3>
    <div class="control-row">
      <label>Trail Length <span id="trailVal">500</span></label>
      <input type="range" id="trail" min="0" max="2000" value="500">
    </div>
    <div class="control-row">
      <label>Hue Speed <span id="hueVal">1</span></label>
      <input type="range" id="hueSpeed" min="0" max="5" step="0.1" value="1">
    </div>
    <button id="clear">Clear Trail</button>
  </div>
  <div id="info">Drag bobs to set initial position | Double-click to reset</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height, cx, cy;
    let theta1 = Math.PI / 2;
    let theta2 = Math.PI / 2;
    let omega1 = 0;
    let omega2 = 0;
    let m1 = 10, m2 = 10;
    let l1 = 150, l2 = 150;
    let g = 1;
    let damping = 0;
    let trail = [];
    let maxTrail = 500;
    let hueOffset = 0;
    let hueSpeed = 1;
    let paused = false;
    let dragging = null;
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      cx = width / 2;
      cy = height / 2 + 50;
    }
    
    function derivatives(th1, th2, om1, om2) {
      let d = m1 + m2;
      let dth = th1 - th2;
      let den1 = (d) - m2 * Math.cos(dth) * Math.cos(dth);
      let den2 = (d * l2 / l1) - m2 * Math.cos(dth) * Math.cos(dth);
      
      let alpha1 = (m2 * l1 * om1 * om1 * Math.sin(dth) * Math.cos(dth) +
                    m2 * g * Math.sin(th2) * Math.cos(dth) +
                    m2 * l2 * om2 * om2 * Math.sin(dth) -
                    d * g * Math.sin(th1)) / (d * l1);
      let alpha2 = (-m2 * l2 * om2 * om2 * Math.sin(dth) * Math.cos(dth) +
                    d * g * Math.sin(th1) * Math.cos(dth) -
                    d * l1 * om1 * om1 * Math.sin(dth) -
                    d * g * Math.sin(th2)) / (d * l2);
      
      return [om1, om2, alpha1, alpha2];
    }
    
    function rk4(th1, th2, om1, om2, dt) {
      let k1 = derivatives(th1, th2, om1, om2);
      let k2 = derivatives(th1 + k1[0]*dt/2, th2 + k1[1]*dt/2, om1 + k1[2]*dt/2, om2 + k1[3]*dt/2);
      let k3 = derivatives(th1 + k2[0]*dt/2, th2 + k2[1]*dt/2, om1 + k2[2]*dt/2, om2 + k2[3]*dt/2);
      let k4 = derivatives(th1 + k3[0]*dt, th2 + k3[1]*dt, om1 + k3[2]*dt, om2 + k3[3]*dt);
      
      return [
        th1 + (k1[0] + 2*k2[0] + 2*k3[0] + k4[0]) * dt / 6,
        th2 + (k1[1] + 2*k2[1] + 2*k3[1] + k4[1]) * dt / 6,
        om1 + (k1[2] + 2*k2[2] + 2*k3[2] + k4[2]) * dt / 6,
        om2 + (k1[3] + 2*k2[3] + 2*k3[3] + k4[3]) * dt / 6
      ];
    }
    
    function update() {
      if (paused || dragging) return;
      let dt = 0.3;
      for (let i = 0; i < 3; i++) {
        [theta1, theta2, omega1, omega2] = rk4(theta1, theta2, omega1, omega2, dt);
      }
      omega1 *= (1 - damping);
      omega2 *= (1 - damping);
      
      let x2 = cx + l1 * Math.sin(theta1) + l2 * Math.sin(theta2);
      let y2 = cy + l1 * Math.cos(theta1) + l2 * Math.cos(theta2);
      trail.push({ x: x2, y: y2, hue: hueOffset });
      if (trail.length > maxTrail) trail.shift();
      hueOffset += hueSpeed;
    }
    
    function draw() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
      ctx.fillRect(0, 0, width, height);
      
      let x1 = cx + l1 * Math.sin(theta1);
      let y1 = cy + l1 * Math.cos(theta1);
      let x2 = x1 + l2 * Math.sin(theta2);
      let y2 = y1 + l2 * Math.cos(theta2);
      
      // Draw trail
      if (trail.length > 1) {
        for (let i = 1; i < trail.length; i++) {
          let alpha = i / trail.length;
          ctx.beginPath();
          ctx.moveTo(trail[i-1].x, trail[i-1].y);
          ctx.lineTo(trail[i].x, trail[i].y);
          ctx.strokeStyle = `hsla(${(trail[i].hue + i) % 360}, 80%, 60%, ${alpha})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }
      
      // Draw rods
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      
      // Draw bobs
      ctx.beginPath();
      ctx.arc(x1, y1, 8 + m1 * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = '#4af';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x2, y2, 8 + m2 * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = '#f4a';
      ctx.fill();
      
      // Draw pivot
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#888';
      ctx.fill();
    }
    
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    
    function getBobAt(x, y) {
      let x1 = cx + l1 * Math.sin(theta1);
      let y1 = cy + l1 * Math.cos(theta1);
      let x2 = x1 + l2 * Math.sin(theta2);
      let y2 = y1 + l2 * Math.cos(theta2);
      if (Math.hypot(x - x1, y - y1) < 20) return 1;
      if (Math.hypot(x - x2, y - y2) < 20) return 2;
      return null;
    }
    
    canvas.addEventListener('mousedown', e => {
      let bob = getBobAt(e.clientX, e.clientY);
      if (bob) dragging = bob;
    });
    
    canvas.addEventListener('mousemove', e => {
      if (dragging === 1) {
        theta1 = Math.atan2(e.clientX - cx, e.clientY - cy);
        omega1 = 0;
      } else if (dragging === 2) {
        let x1 = cx + l1 * Math.sin(theta1);
        let y1 = cy + l1 * Math.cos(theta1);
        theta2 = Math.atan2(e.clientX - x1, e.clientY - y1);
        omega2 = 0;
      }
    });
    
    canvas.addEventListener('mouseup', () => dragging = null);
    canvas.addEventListener('dblclick', () => {
      theta1 = Math.PI / 2;
      theta2 = Math.PI / 2;
      omega1 = 0;
      omega2 = 0;
      trail = [];
    });
    
    document.getElementById('m1').addEventListener('input', e => {
      m1 = +e.target.value;
      document.getElementById('m1Val').textContent = m1;
    });
    document.getElementById('m2').addEventListener('input', e => {
      m2 = +e.target.value;
      document.getElementById('m2Val').textContent = m2;
    });
    document.getElementById('l1').addEventListener('input', e => {
      l1 = +e.target.value;
      document.getElementById('l1Val').textContent = l1;
    });
    document.getElementById('l2').addEventListener('input', e => {
      l2 = +e.target.value;
      document.getElementById('l2Val').textContent = l2;
    });
    document.getElementById('g').addEventListener('input', e => {
      g = +e.target.value;
      document.getElementById('gVal').textContent = g;
    });
    document.getElementById('d').addEventListener('input', e => {
      damping = +e.target.value;
      document.getElementById('dVal').textContent = damping;
    });
    document.getElementById('trail').addEventListener('input', e => {
      maxTrail = +e.target.value;
      document.getElementById('trailVal').textContent = maxTrail;
    });
    document.getElementById('hueSpeed').addEventListener('input', e => {
      hueSpeed = +e.target.value;
      document.getElementById('hueVal').textContent = hueSpeed;
    });
    document.getElementById('reset').addEventListener('click', () => {
      theta1 = Math.PI / 2;
      theta2 = Math.PI / 2;
      omega1 = 0;
      omega2 = 0;
      trail = [];
    });
    document.getElementById('pause').addEventListener('click', () => {
      paused = !paused;
      document.getElementById('pause').textContent = paused ? 'Resume' : 'Pause';
    });
    document.getElementById('clear').addEventListener('click', () => trail = []);
    
    window.addEventListener('resize', resize);
    resize();
    loop();
  </script>
</body>
</html>
