<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Cost Calculator — Shadow's Garden</title>
<meta name="description" content="See how much your meeting is costing. Enter attendees, hourly rate, and duration.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
  .calculator { background: #1a1a2e; border-radius: 12px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .input-group { margin-bottom: 16px; }
  label { display: block; margin-bottom: 6px; color: #a0a0b0; font-size: 14px; }
  input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #0f0f1a; color: #fff; font-size: 16px; box-sizing: border-box; }
  input:focus { outline: none; border-color: #6366f1; }
  .result { margin-top: 24px; padding: 20px; background: #0f0f1a; border-radius: 8px; text-align: center; }
  .cost { font-size: 48px; font-weight: bold; color: #f43f5e; }
  .cost-label { color: #a0a0b0; font-size: 14px; margin-top: 4px; }
  .time-display { color: #6366f1; font-size: 18px; margin-top: 12px; }
  .presets { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .preset { background: #333; border: none; color: #a0a0b0; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .preset:hover { background: #444; }
  .tip { margin-top: 16px; padding: 12px; background: #1e1e3a; border-radius: 8px; font-size: 13px; color: #a0a0b0; border-left: 3px solid #6366f1; }
</style>
</head>
<body data-page-type="app">
  <div class="calculator">
    <h2>Meeting Cost Calculator</h2>
    <div class="input-group">
      <label>Number of Attendees</label>
      <input type="number" id="attendees" value="5" min="1">
      <div class="presets">
        <button class="preset" onclick="document.getElementById('attendees').value=2">2</button>
        <button class="preset" onclick="document.getElementById('attendees').value=5">5</button>
        <button class="preset" onclick="document.getElementById('attendees').value=10">10</button>
        <button class="preset" onclick="document.getElementById('attendees').value=20">20</button>
      </div>
    </div>
    <div class="input-group">
      <label>Average Hourly Rate ($)</label>
      <input type="number" id="rate" value="75" min="1">
      <div class="presets">
        <button class="preset" onclick="document.getElementById('rate').value=50">$50</button>
        <button class="preset" onclick="document.getElementById('rate').value=75">$75</button>
        <button class="preset" onclick="document.getElementById('rate').value=100">$100</button>
        <button class="preset" onclick="document.getElementById('rate').value=150">$150</button>
      </div>
    </div>
    <div class="input-group">
      <label>Duration (minutes)</label>
      <input type="number" id="duration" value="60" min="1">
      <div class="presets">
        <button class="preset" onclick="document.getElementById('duration').value=15">15m</button>
        <button class="preset" onclick="document.getElementById('duration').value=30">30m</button>
        <button class="preset" onclick="document.getElementById('duration').value=60">1h</button>
        <button class="preset" onclick="document.getElementById('duration').value=120">2h</button>
      </div>
    </div>
    <div class="result">
      <div class="cost" id="cost">$0</div>
      <div class="cost-label">This meeting costs</div>
      <div class="time-display" id="timeDisplay"></div>
    </div>
    <div class="tip">
      💡 A daily 1-hour meeting with 5 people at $75/hr costs <strong id="weeklyCost">$1,875</strong> per week.
    </div>
  </div>
  <script>
    const attendees = document.getElementById('attendees');
    const rate = document.getElementById('rate');
    const duration = document.getElementById('duration');
    const costEl = document.getElementById('cost');
    const timeDisplay = document.getElementById('timeDisplay');
    const weeklyCost = document.getElementById('weeklyCost');
    
    function calculate() {
      const a = parseInt(attendees.value) || 0;
      const r = parseFloat(rate.value) || 0;
      const d = parseInt(duration.value) || 0;
      
      const hourlyCost = a * r;
      const totalCost = (hourlyCost * d) / 60;
      
      costEl.textContent = '$' + totalCost.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      
      const hours = Math.floor(d / 60);
      const mins = d % 60;
      let timeStr = '';
      if (hours) timeStr += hours + 'h ';
      if (mins) timeStr += mins + 'm';
      timeDisplay.textContent = timeStr.trim() || '0m';
      
      // Weekly cost: 5 people, $75/hr, 5 days/week
      const weekly = (5 * 75 * 60) / 60 * 5;
      weeklyCost.textContent = '$' + weekly.toLocaleString();
    }
    
    [attendees, rate, duration].forEach(el => {
      el.addEventListener('input', calculate);
    });
    
    calculate();
  </script>
</body>
</html>
