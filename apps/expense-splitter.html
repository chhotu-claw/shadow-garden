<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Splitter — Shadow's Garden</title>
<meta name="description" content="Split expenses with friends — track who paid what and who owes what">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --accent: #f97316; }
  body { --accent: #f97316; }
  .tag { background: var(--accent); }
  body { font-family: 'JetBrains Mono', monospace; }
  
  .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
  
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  
  .input-group { margin-bottom: 1rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  
  input, select, textarea { 
    width: 100%; padding: 0.75rem 1rem; background: #0d1117; border: 2px solid #30363d; 
    border-radius: 8px; color: #c9d1d9; font-family: inherit; font-size: 1rem; box-sizing: border-box;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  
  .row { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; }
  .row input { flex: 1; }
  .row .btn { flex: 0 0 auto; }
  
  .btn { padding: 0.75rem 1.5rem; background: var(--accent); color: #0d1117; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.9; }
  .btn-secondary { background: #30363d; color: #c9d1d9; }
  .btn-danger { background: #f85149; color: #fff; }
  .btn-small { padding: 0.5rem 1rem; font-size: 0.8rem; }
  
  .expenses-list { margin-top: 1rem; }
  .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: #21262d; border-radius: 8px; margin-bottom: 0.5rem; }
  .expense-info { flex: 1; }
  .expense-desc { font-weight: 600; }
  .expense-meta { font-size: 0.8rem; color: #8b949e; }
  .expense-amount { font-weight: 700; color: var(--accent); margin-right: 1rem; }
  .expense-actions { display: flex; gap: 0.5rem; }
  
  .balances { margin-top: 1.5rem; }
  .balance-item { display: flex; justify-content: space-between; padding: 0.75rem; background: #21262d; border-radius: 8px; margin-bottom: 0.5rem; }
  .balance-person { font-weight: 600; }
  .balance-amount { font-weight: 700; }
  .balance-amount.owes { color: #f85149; }
  .balance-amount.gets { color: #3fb950; }
  
  .settlement { margin-top: 1.5rem; }
  .settlement-item { padding: 1rem; background: #21262d; border-radius: 8px; margin-bottom: 0.5rem; border-left: 4px solid var(--accent); }
  .settlement-from { color: #f85149; font-weight: 600; }
  .settlement-to { color: #3fb950; font-weight: 600; }
  
  .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; text-align: center; margin-bottom: 1.5rem; }
  .summary-stat { padding: 1rem; background: #21262d; border-radius: 8px; }
  .summary-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .summary-label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; }
  
  .empty { text-align: center; padding: 2rem; color: #8b949e; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Expense Splitter</h1>
    <p class="subtitle">Track group expenses and settle up with minimum transactions</p>
    
    <div class="card">
      <div class="input-group">
        <label>Add People</label>
        <div class="row">
          <input type="text" id="newPerson" placeholder="Enter name..." onkeypress="if(event.key==='Enter')addPerson()">
          <button class="btn" onclick="addPerson()">Add</button>
        </div>
        <div id="peopleList" style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem;"></div>
      </div>
    </div>
    
    <div class="card">
      <div class="input-group">
        <label>Add Expense</label>
        <div class="row">
          <input type="text" id="expenseDesc" placeholder="What was it for?">
        </div>
        <div class="row">
          <input type="number" id="expenseAmount" placeholder="Amount" step="0.01" min="0">
          <select id="expensePayer" style="flex:1"></select>
          <select id="expenseSplit" style="flex:1">
            <option value="equal">Split equally</option>
            <option value="custom">Custom split</option>
          </select>
        </div>
        <div id="customSplitInputs" class="row" style="display:none;">
          <input type="text" id="customSplit" placeholder="e.g., Alice:20, Bob:30" style="flex:1">
        </div>
        <div class="row">
          <button class="btn" onclick="addExpense()">Add Expense</button>
        </div>
      </div>
    </div>
    
    <div class="summary">
      <div class="summary-stat">
        <div class="summary-value" id="totalSpent">$0</div>
        <div class="summary-label">Total Spent</div>
      </div>
      <div class="summary-stat">
        <div class="summary-value" id="perPerson">$0</div>
        <div class="summary-label">Per Person</div>
      </div>
      <div class="summary-stat">
        <div class="summary-value" id="expenseCount">0</div>
        <div class="summary-label">Expenses</div>
      </div>
    </div>
    
    <div class="card">
      <label>Expenses</label>
      <div id="expensesList" class="expenses-list">
        <div class="empty">No expenses yet</div>
      </div>
    </div>
    
    <div class="card">
      <label>Balances (who owes whom)</label>
      <div id="balancesList" class="balances">
        <div class="empty">Add expenses to see balances</div>
      </div>
    </div>
    
    <div class="card">
      <label>Settlement (minimum transactions)</label>
      <div id="settlementList" class="settlement">
        <div class="empty">Add expenses to see settlements</div>
      </div>
    </div>
  </div>
  
  <script>
    let people = JSON.parse(localStorage.getItem('es_people') || '[]');
    let expenses = JSON.parse(localStorage.getItem('es_expenses') || '[]');
    
    function save() {
      localStorage.setItem('es_people', JSON.stringify(people));
      localStorage.setItem('es_expenses', JSON.stringify(expenses));
      render();
    }
    
    function addPerson() {
      const name = document.getElementById('newPerson').value.trim();
      if (name && !people.includes(name)) {
        people.push(name);
        document.getElementById('newPerson').value = '';
        save();
      }
    }
    
    function removePerson(name) {
      people = people.filter(p => p !== name);
      expenses = expenses.filter(e => e.payer !== name && !e.split.some(s => s.name === name));
      save();
    }
    
    function addExpense() {
      const desc = document.getElementById('expenseDesc').value.trim();
      const amount = parseFloat(document.getElementById('expenseAmount').value);
      const payer = document.getElementById('expensePayer').value;
      const splitType = document.getElementById('expenseSplit').value;
      
      if (!desc || isNaN(amount) || amount <= 0 || !payer) return;
      
      let split = [];
      if (splitType === 'equal') {
        const perPerson = amount / people.length;
        split = people.map(p => ({ name: p, amount: perPerson }));
      } else {
        const customStr = document.getElementById('customSplit').value;
        customStr.split(',').forEach(part => {
          const [name, val] = part.split(':').map(s => s.trim());
          if (name && val) split.push({ name, amount: parseFloat(val) });
        });
      }
      
      expenses.push({ desc, amount, payer, split, id: Date.now() });
      document.getElementById('expenseDesc').value = '';
      document.getElementById('expenseAmount').value = '';
      document.getElementById('customSplit').value = '';
      save();
    }
    
    function removeExpense(id) {
      expenses = expenses.filter(e => e.id !== id);
      save();
    }
    
    function calculateBalances() {
      const balances = {};
      people.forEach(p => balances[p] = 0);
      
      expenses.forEach(e => {
        balances[e.payer] += e.amount;
        e.split.forEach(s => {
          if (balances[s.name] !== undefined) balances[s.name] -= s.amount;
        });
      });
      
      return balances;
    }
    
    function calculateSettlements(balances) {
      const debtors = [];
      const creditors = [];
      
      Object.entries(balances).forEach(([name, amount]) => {
        if (amount < -0.01) debtors.push({ name, amount: -amount });
        if (amount > 0.01) creditors.push({ name, amount });
      });
      
      debtors.sort((a, b) => b.amount - a.amount);
      creditors.sort((a, b) => b.amount - a.amount);
      
      const settlements = [];
      let i = 0, j = 0;
      
      while (i < debtors.length && j < creditors.length) {
        const debtor = debtors[i];
        const creditor = creditors[j];
        const amount = Math.min(debtor.amount, creditor.amount);
        
        if (amount > 0.01) {
          settlements.push({ from: debtor.name, to: creditor.name, amount });
        }
        
        debtor.amount -= amount;
        creditor.amount -= amount;
        
        if (debtor.amount < 0.01) i++;
        if (creditor.amount < 0.01) j++;
      }
      
      return settlements;
    }
    
    function render() {
      // People
      const peopleList = document.getElementById('peopleList');
      peopleList.innerHTML = people.map(p => 
        `<span style="background:#30363d;padding:0.3rem 0.6rem;border-radius:4px;font-size:0.85rem;">${p} <span style="cursor:pointer;color:#f85149;margin-left:4px;" onclick="removePerson('${p}')">×</span></span>`
      ).join('');
      
      // Payer dropdown
      const payerSelect = document.getElementById('expensePayer');
      payerSelect.innerHTML = people.map(p => `<option value="${p}">${p}</option>`).join('');
      
      // Custom split toggle
      document.getElementById('expenseSplit').onchange = function() {
        document.getElementById('customSplitInputs').style.display = this.value === 'custom' ? 'flex' : 'none';
      };
      
      // Summary
      const total = expenses.reduce((sum, e) => sum + e.amount, 0);
      document.getElementById('totalSpent').textContent = '$' + total.toFixed(2);
      document.getElementById('perPerson').textContent = '$' + (people.length ? (total / people.length).toFixed(2) : '0');
      document.getElementById('expenseCount').textContent = expenses.length;
      
      // Expenses
      const expensesList = document.getElementById('expensesList');
      if (expenses.length === 0) {
        expensesList.innerHTML = '<div class="empty">No expenses yet</div>';
      } else {
        expensesList.innerHTML = expenses.map(e => `
          <div class="expense-item">
            <div class="expense-info">
              <div class="expense-desc">${e.desc}</div>
              <div class="expense-meta">${e.payer} paid</div>
            </div>
            <div class="expense-amount">$${e.amount.toFixed(2)}</div>
            <div class="expense-actions">
              <button class="btn btn-danger btn-small" onclick="removeExpense(${e.id})">×</button>
            </div>
          </div>
        `).join('');
      }
      
      // Balances
      const balances = calculateBalances();
      const balancesList = document.getElementById('balancesList');
      const balanceEntries = Object.entries(balances).filter(([_, a]) => Math.abs(a) > 0.01);
      
      if (balanceEntries.length === 0) {
        balancesList.innerHTML = '<div class="empty">All settled up!</div>';
      } else {
        balancesList.innerHTML = balanceEntries.map(([name, amount]) => `
          <div class="balance-item">
            <span class="balance-person">${name}</span>
            <span class="balance-amount ${amount > 0 ? 'gets' : 'owes'}">${amount > 0 ? '+' : ''}$${amount.toFixed(2)}</span>
          </div>
        `).join('');
      }
      
      // Settlements
      const settlements = calculateSettlements(balances);
      const settlementList = document.getElementById('settlementList');
      
      if (settlements.length === 0) {
        settlementList.innerHTML = '<div class="empty">All settled up!</div>';
      } else {
        settlementList.innerHTML = settlements.map(s => `
          <div class="settlement-item">
            <span class="settlement-from">${s.from}</span> pays <span class="settlement-to">${s.to}</span>: $${s.amount.toFixed(2)}
          </div>
        `).join('');
      }
    }
    
    render();
  </script>
</body>
</html>
