<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Splitter — Shadow's Garden</title>
<meta name="description" content="Split expenses with friends — track who paid what and calculate the simplest way to settle up.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149; }
  .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }
  
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
  
  .input-group { margin-bottom: 1rem; }
  label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; color: var(--muted); }
  input, select { width: 100%; padding: 0.6rem 0.8rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 1rem; box-sizing: border-box; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  
  .row { display: flex; gap: 0.75rem; }
  .row > * { flex: 1; }
  
  button { background: var(--accent); color: #fff; border: none; padding: 0.7rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: opacity 0.2s; }
  button:hover { opacity: 0.9; }
  button.secondary { background: var(--border); }
  button.danger { background: var(--red); }
  button.small { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
  
  .expense-list { margin-top: 1.5rem; }
  .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem; background: var(--bg); border-radius: 6px; margin-bottom: 0.5rem; }
  .expense-details { flex: 1; }
  .expense-desc { font-weight: 500; }
  .expense-meta { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
  .expense-amount { font-size: 1.1rem; font-weight: 600; color: var(--green); margin-right: 1rem; }
  
  .settlement { background: var(--bg); border-radius: 6px; padding: 1rem; margin-top: 1.5rem; }
  .settlement h3 { margin: 0 0 1rem 0; font-size: 1rem; color: var(--accent); }
  .settlement-item { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
  .settlement-item:last-child { border-bottom: none; }
  .settlement-from { color: var(--red); }
  .settlement-to { color: var(--green); }
  
  .empty { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.9rem; }
  
  .totals { display: flex; gap: 1rem; margin-bottom: 1rem; }
  .total-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
  .total-label { font-size: 0.8rem; color: var(--muted); }
  .total-value { font-size: 1.5rem; font-weight: 600; margin-top: 0.3rem; }
  
  .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Expense Splitter</h1>
  <div class="subtitle">Track group expenses and settle up with minimum transactions</div>
  
  <div class="card">
    <div class="input-group">
      <label>Add Person</label>
      <div class="row">
        <input type="text" id="personName" placeholder="Name (e.g., Alice)">
        <button onclick="addPerson()">Add</button>
      </div>
    </div>
    <div id="peopleList"></div>
  </div>
  
  <div class="card">
    <div class="input-group">
      <label>Add Expense</label>
      <div class="row">
        <select id="payerSelect"><option value="">Who paid?</option></select>
        <input type="number" id="amount" placeholder="Amount" min="0" step="0.01">
      </div>
    </div>
    <div class="input-group">
      <input type="text" id="description" placeholder="What for? (e.g., Dinner, Taxi)">
    </div>
    <div class="row">
      <select id="splitSelect"><option value="equal">Split equally</option></select>
      <button onclick="addExpense()">Add Expense</button>
    </div>
  </div>
  
  <div class="totals">
    <div class="total-card">
      <div class="total-label">Total Spent</div>
      <div class="total-value" id="totalSpent">$0.00</div>
    </div>
    <div class="total-card">
      <div class="total-label">Per Person</div>
      <div class="total-value" id="perPerson">$0.00</div>
    </div>
  </div>
  
  <div class="expense-list" id="expenseList">
    <div class="empty">No expenses yet. Add people first, then add expenses.</div>
  </div>
  
  <div class="settlement" id="settlement" style="display:none;">
    <h3>💰 How to Settle</h3>
    <div id="settlementList"></div>
  </div>
  
  <div class="actions">
    <button class="secondary" onclick="clearAll()">Clear All</button>
  </div>
</div>

<script>
let people = [];
let expenses = [];

function load() {
  const saved = localStorage.getItem('expenseSplitter');
  if (saved) {
    const data = JSON.parse(saved);
    people = data.people || [];
    expenses = data.expenses || [];
  }
  render();
}

function save() {
  localStorage.setItem('expenseSplitter', JSON.stringify({ people, expenses }));
  render();
}

function addPerson() {
  const name = document.getElementById('personName').value.trim();
  if (!name) return;
  if (people.includes(name)) {
    alert('Person already exists');
    return;
  }
  people.push(name);
  document.getElementById('personName').value = '';
  save();
}

function removePerson(name) {
  if (expenses.some(e => e.payer === name)) {
    alert('Cannot remove — has expenses');
    return;
  }
  people = people.filter(p => p !== name);
  save();
}

function addExpense() {
  const payer = document.getElementById('payerSelect').value;
  const amount = parseFloat(document.getElementById('amount').value);
  const desc = document.getElementById('description').value.trim() || 'Expense';
  
  if (!payer || isNaN(amount) || amount <= 0) {
    alert('Select payer and enter amount');
    return;
  }
  
  expenses.push({ payer, amount, desc, date: new Date().toISOString() });
  document.getElementById('amount').value = '';
  document.getElementById('description').value = '';
  save();
}

function removeExpense(index) {
  expenses.splice(index, 1);
  save();
}

function clearAll() {
  if (confirm('Clear all data?')) {
    people = [];
    expenses = [];
    save();
  }
}

function calculateSettlements() {
  const totals = {};
  people.forEach(p => totals[p] = 0);
  
  expenses.forEach(e => {
    totals[e.payer] += e.amount;
  });
  
  const equalShare = expenses.reduce((sum, e) => sum + e.amount, 0) / people.length;
  
  const balances = {};
  people.forEach(p => {
    balances[p] = totals[p] - equalShare;
  });
  
  const settlements = [];
  const debtors = [], creditors = [];
  
  people.forEach(p => {
    if (balances[p] < -0.01) debtors.push(p);
    if (balances[p] > 0.01) creditors.push(p);
  });
  
  debtors.sort((a, b) => balances[a] - balances[b]);
  creditors.sort((a, b) => balances[b] - balances[a]);
  
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const debtor = debtors[i];
    const creditor = creditors[j];
    const debt = -balances[debtor];
    const credit = balances[creditor];
    const amount = Math.min(debt, credit);
    
    if (amount > 0.01) {
      settlements.push({ from: debtor, to: creditor, amount });
    }
    
    balances[debtor] += amount;
    balances[creditor] -= amount;
    
    if (Math.abs(balances[debtor]) < 0.01) i++;
    if (Math.abs(balances[creditor]) < 0.01) j++;
  }
  
  return { settlements, total: expenses.reduce((s, e) => s + e.amount, 0), perPerson: equalShare };
}

function render() {
  // People
  const peopleList = document.getElementById('peopleList');
  if (people.length === 0) {
    peopleList.innerHTML = '<div class="empty" style="padding:1rem;">No people added yet</div>';
  } else {
    peopleList.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem;">' + 
      people.map(p => `<span style="background:var(--bg);padding:0.3rem 0.7rem;border-radius:20px;font-size:0.85rem;display:inline-flex;align-items:center;gap:0.4rem;">${p}<button class="small danger" style="padding:0.1rem 0.4rem;" onclick="removePerson('${p}')">×</button></span>`).join('') + 
      '</div>';
  }
  
  // Payer select
  const payerSelect = document.getElementById('payerSelect');
  payerSelect.innerHTML = '<option value="">Who paid?</option>' + people.map(p => `<option value="${p}">${p}</option>`).join('');
  
  // Expenses
  const expenseList = document.getElementById('expenseList');
  if (expenses.length === 0) {
    expenseList.innerHTML = '<div class="empty">No expenses yet. Add people first, then add expenses.</div>';
  } else {
    expenseList.innerHTML = expenses.slice().reverse().map((e, i) => {
      const actualIndex = expenses.length - 1 - i;
      return `<div class="expense-item">
        <div class="expense-details">
          <div class="expense-desc">${e.desc}</div>
          <div class="expense-meta">${e.payer} • ${new Date(e.date).toLocaleDateString()}</div>
        </div>
        <div class="expense-amount">$${e.amount.toFixed(2)}</div>
        <button class="small danger" onclick="removeExpense(${actualIndex})">×</button>
      </div>`;
    }).join('');
  }
  
  // Totals
  const { settlements, total, perPerson } = calculateSettlements();
  document.getElementById('totalSpent').textContent = '$' + (total || 0).toFixed(2);
  document.getElementById('perPerson').textContent = '$' + (perPerson || 0).toFixed(2);
  
  // Settlement
  const settlementDiv = document.getElementById('settlement');
  if (settlements.length > 0) {
    settlementDiv.style.display = 'block';
    document.getElementById('settlementList').innerHTML = settlements.map(s => 
      `<div class="settlement-item">
        <span class="settlement-from">${s.from}</span>
        <span>→</span>
        <span class="settlement-to">${s.to}</span>
        <span style="margin-left:auto;font-weight:600;">$${s.amount.toFixed(2)}</span>
      </div>`
    ).join('');
  } else {
    settlementDiv.style.display = 'none';
  }
}

load();
</script>
</body>
</html>
