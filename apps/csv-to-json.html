<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV to JSON Converter — Shadow's Garden</title>
<meta name="description" content="Convert CSV data to JSON instantly. Paste CSV, get JSON with download option.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; padding: 2rem; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  @media (max-width: 700px) { .panels { grid-template-columns: 1fr; } }
  .panel { display: flex; flex-direction: column; }
  label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
  textarea { flex: 1; min-height: 300px; padding: 1rem; font-family: monospace; font-size: 0.85rem; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; resize: vertical; }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .options { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
  .checkbox-label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; cursor: pointer; }
  .checkbox-label input { cursor: pointer; }
  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .btn { padding: 0.75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.9; }
  .btn.secondary { background: var(--border); }
  .hint { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; }
  .error { color: #f77; font-size: 0.9rem; margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>📊 CSV to JSON Converter</h1>
    <div class="subtitle">Convert CSV data to JSON — all local, no server</div>
    
    <div class="panels">
      <div class="panel">
        <label>CSV Input <button class="btn secondary" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick="loadSample()">Load Sample</button></label>
        <textarea id="csv-input" placeholder="name,email,age
John Doe,john@example.com,30
Jane Smith,jane@example.com,25"></textarea>
      </div>
      <div class="panel">
        <label>JSON Output</label>
        <textarea id="json-output" placeholder="JSON will appear here..." readonly></textarea>
      </div>
    </div>
    
    <div class="options">
      <label class="checkbox-label">
        <input type="checkbox" id="header-row" checked>
        First row is header
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="array-output" checked>
        Output as array
      </label>
    </div>
    
    <div class="btn-row">
      <button class="btn" id="convert-btn">Convert</button>
      <button class="btn secondary" id="download-btn">Download JSON</button>
      <button class="btn secondary" id="copy-btn">Copy JSON</button>
    </div>
    <div class="hint" id="hint"></div>
    <div class="error" id="error"></div>
  </div>
  
  <script>
    const csvInput = document.getElementById('csv-input');
    const jsonOutput = document.getElementById('json-output');
    const headerRow = document.getElementById('header-row');
    const arrayOutput = document.getElementById('array-output');
    const hint = document.getElementById('hint');
    const error = document.getElementById('error');
    
    function parseCSV(text) {
      const lines = text.trim().split('\n').filter(l => l.trim());
      if (lines.length === 0) return { error: 'No data to convert' };
      
      const hasHeader = headerRow.checked;
      let headers = [];
      let startIndex = 0;
      
      if (hasHeader) {
        headers = parseCSVLine(lines[0]);
        startIndex = 1;
      }
      
      if (headers.length === 0) {
        headers = Array.from({ length: lines[startIndex]?.split(',').length || 0 }, (_, i) => `column${i + 1}`);
      }
      
      const data = [];
      for (let i = startIndex; i < lines.length; i++) {
        const values = parseCSVLine(lines[i]);
        const row = {};
        headers.forEach((h, idx) => {
          row[h] = values[idx] || '';
        });
        data.push(row);
      }
      
      return { data, count: data.length };
    }
    
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current.trim());
      return result;
    }
    
    function convert() {
      error.textContent = '';
      hint.textContent = '';
      
      if (!csvInput.value.trim()) {
        error.textContent = 'Please enter CSV data';
        return;
      }
      
      const result = parseCSV(csvInput.value);
      if (result.error) {
        error.textContent = result.error;
        return;
      }
      
      if (arrayOutput.checked) {
        jsonOutput.value = JSON.stringify(result.data, null, 2);
      } else {
        const obj = {};
        result.data.forEach((row, i) => {
          obj[`row${i + 1}`] = row;
        });
        jsonOutput.value = JSON.stringify(obj, null, 2);
      }
      
      hint.textContent = `${result.count} row(s) converted`;
    }
    
    function loadSample() {
      csvInput.value = `name,email,role,location
Alice Johnson,alice@example.com,Developer,San Francisco
Bob Smith,bob@example.com,Designer,New York
Carol White,carol@example.com,Manager,London`;
      convert();
    }
    
    function download() {
      if (!jsonOutput.value) {
        error.textContent = 'Nothing to download';
        return;
      }
      const blob = new Blob([jsonOutput.value], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'data.json';
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function copy() {
      if (!jsonOutput.value) {
        error.textContent = 'Nothing to copy';
        return;
      }
      navigator.clipboard.writeText(jsonOutput.value);
      hint.textContent = 'Copied!';
      setTimeout(() => hint.textContent = '', 2000);
    }
    
    document.getElementById('convert-btn').addEventListener('click', convert);
    document.getElementById('download-btn').addEventListener('click', download);
    document.getElementById('copy-btn').addEventListener('click', copy);
    headerRow.addEventListener('change', convert);
    arrayOutput.addEventListener('change', convert);
  </script>
</body>
</html>
