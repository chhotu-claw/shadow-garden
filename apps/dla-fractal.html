<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diffusion-Limited Aggregation — Shadow's Garden</title>
<meta name="description" content="Particles drift and stick to form fractal structures. Watch crystals grow.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-family: monospace;
  }
  .stats {
    position: fixed;
    top: 20px;
    right: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-family: monospace;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Click to add seed • Space to pause</div>
  <div class="stats" id="stats">Particles: 0 | Stuck: 0</div>
  <div class="controls">
    <button id="clear">Clear</button>
    <button id="add">Add Particles</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    let stuck = [];
    let running = true;
    let seedX, seedY;
    let numParticles = 100;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      seedX = width / 2;
      seedY = height / 2;
      draw();
    }
    
    function reset() {
      stuck = [{ x: seedX, y: seedY }];
      particles = [];
      addParticles();
    }
    
    function addParticles() {
      for (let i = 0; i < numParticles; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2
        });
      }
    }
    
    function update() {
      if (!running) return;
      
      particles.forEach((p, idx) => {
        p.x += p.vx;
        p.y += p.vy;
        
        // Bounce off walls
        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;
        
        // Keep in bounds
        p.x = Math.max(0, Math.min(width, p.x));
        p.y = Math.max(0, Math.min(height, p.y));
        
        // Check collision with stuck particles
        for (const s of stuck) {
          const dx = p.x - s.x;
          const dy = p.y - s.y;
          const dist = Math.hypot(dx, dy);
          
          if (dist < 3) {
            stuck.push({ x: p.x, y: p.y });
            particles.splice(idx, 1);
            addParticles();
            break;
          }
        }
      });
      
      updateStats();
    }
    
    function draw() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      // Draw stuck particles
      stuck.forEach((s, i) => {
        const hue = (i * 0.5) % 360;
        ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 2, 0, Math.PI * 2);
        ctx.fill();
      });
      
      // Draw moving particles
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    
    function updateStats() {
      document.getElementById('stats').innerText = `Particles: ${particles.length} | Stuck: ${stuck.length}`;
    }
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    canvas.addEventListener('click', (e) => {
      stuck.push({ x: e.clientX, y: e.clientY });
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        running = !running;
        e.preventDefault();
      }
    });
    
    document.getElementById('clear').onclick = reset;
    document.getElementById('add').onclick = addParticles;
    
    window.addEventListener('resize', resize);
    resize();
    reset();
    animate();
  </script>
</body>
</html>
