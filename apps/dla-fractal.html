<!DOCTYPE html> html>DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLA Fractal — Shadow's Garden</title>
<meta name="description" content="Diffusion-Limited Aggregation. Particles drift randomly until they collide and stick, forming fractal crystals.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a12; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-family: monospace;
  }
  .stats {
    position: fixed;
    top: 20px;
    right: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    font-family: monospace;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Particles drift randomly, stick on contact</div>
  <div class="stats" id="stats">Particles: 0 | Crystal: 0</div>
  <div class="controls">
    <button id="reset">Reset</button>
    <button id="add">Add Particles</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let crystal = [];
    let particles = [];
    let animating = true;
    const MAX_PARTICLES = 200;
    const PARTICLE_RADIUS = 2;
    const CRYSTAL_COLOR = '#4ecdc4';
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      reset();
    }
    
    function reset() {
      crystal = [];
      particles = [];
      
      // Start with seed in center
      crystal.push({ x: width / 2, y: height / 2 });
      
      // Spawn particles
      spawnParticles();
    }
    
    function spawnParticles() {
      while (particles.length < MAX_PARTICLES) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2
        });
      }
    }
    
    function update() {
      particles.forEach((p, idx) => {
        p.x += p.vx;
        p.y += p.vy;
        
        // Bounce off walls
        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;
        
        // Check collision with crystal
        for (const c of crystal) {
          const dx = p.x - c.x;
          const dy = p.y - c.y;
          const dist = Math.hypot(dx, dy);
          
          if (dist < PARTICLE_RADIUS * 3) {
            // Stick to crystal
            crystal.push({ x: p.x, y: p.y });
            particles.splice(idx, 1);
            particles.push({
              x: Math.random() * width,
              y: Math.random() * height,
              vx: (Math.random() - 0.5) * 2,
              vy: (Math.random() - 0.5) * 2
            });
            break;
          }
        }
      });
      
      document.getElementById('stats').innerText = `Particles: ${particles.length} | Crystal: ${crystal.length}`;
    }
    
    function draw() {
      ctx.fillStyle = '#0a0a12';
      ctx.fillRect(0, 0, width, height);
      
      // Draw crystal
      crystal.forEach(c => {
        const dist = Math.hypot(c.x - width/2, c.y - height/2);
        const hue = (dist * 0.5 + Date.now() * 0.01) % 360;
        ctx.fillStyle = `hsl(${hue}, 70%, 60%)`;
        ctx.beginPath();
        ctx.arc(c.x, c.y, PARTICLE_RADIUS, 0, Math.PI * 2);
        ctx.fill();
      });
      
      // Draw particles
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PARTICLE_RADIUS, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    
    function animate() {
      if (animating) {
        update();
        draw();
      }
      requestAnimationFrame(animate);
    }
    
    document.getElementById('reset').onclick = reset;
    document.getElementById('add').onclick = () => {
      for (let i = 0; i < 50; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2
        });
      }
    };
    
    window.addEventListener('resize', resize);
    resize();
    animate();
  </script>
</body>
</html>
