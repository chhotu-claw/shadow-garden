<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON to CSV Converter — Shadow's Garden</title>
<meta name="description" content="Convert JSON arrays to CSV with automatic header detection. Copy or download.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; }
  .container { display: flex; gap: 1rem; flex-direction: column; height: calc(100vh - 120px); }
  textarea { flex: 1; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; font-family: 'Fira Code', monospace; font-size: 14px; background: var(--bg); color: var(--fg); resize: none; min-height: 200px; }
  .output-area { flex: 1; display: flex; flex-direction: column; }
  .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .output { flex: 1; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-secondary); font-family: 'Fira Code', monospace; font-size: 14px; white-space: pre-wrap; overflow: auto; }
  .buttons { display: flex; gap: 0.5rem; }
  button { background: var(--accent); color: var(--bg); border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; }
  button:hover { opacity: 0.9; }
  button.secondary { background: var(--bg-secondary); color: var(--fg); border: 1px solid var(--border); }
  label { font-weight: 600; display: block; margin-bottom: 0.5rem; }
  .error { color: #e74c3c; font-size: 14px; margin-top: 0.5rem; }
  .stats { color: var(--fg-muted); font-size: 12px; margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <div>
      <label>Input JSON</label>
      <textarea id="input" placeholder='Paste JSON array here, e.g.:
[
  {"name": "Alice", "age": 30},
  {"name": "Bob", "age": 25}
]'></textarea>
    </div>
    <div class="output-area">
      <div class="output-header">
        <label>Output CSV</label>
        <div class="buttons">
          <button id="convertBtn">Convert</button>
          <button id="copyBtn" class="secondary">Copy</button>
          <button id="downloadBtn" class="secondary">Download</button>
        </div>
      </div>
      <div id="output" class="output">CSV output will appear here...</div>
      <div id="stats" class="stats"></div>
      <div id="error" class="error"></div>
    </div>
  </div>
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const error = document.getElementById('error');
    const stats = document.getElementById('stats');
    const convertBtn = document.getElementById('convertBtn');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    function escapeCSV(val) {
      if (val == null) return '';
      const str = String(val);
      if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    function convert() {
      error.textContent = '';
      const raw = input.value.trim();
      if (!raw) {
        output.textContent = 'CSV output will appear here...';
        stats.textContent = '';
        return;
      }
      try {
        const data = JSON.parse(raw);
        if (!Array.isArray(data)) {
          throw new Error('Input must be a JSON array');
        }
        if (data.length === 0) {
          output.textContent = '';
          stats.textContent = '0 rows, 0 columns';
          return;
        }
        const headers = Object.keys(data[0]);
        const rows = data.map(row => headers.map(h => escapeCSV(row[h])).join(','));
        const csv = [headers.join(','), ...rows].join('\n');
        output.textContent = csv;
        stats.textContent = `${data.length} row${data.length !== 1 ? 's' : ''}, ${headers.length} column${headers.length !== 1 ? 's' : ''}`;
      } catch (e) {
        error.textContent = 'Error: ' + e.message;
        output.textContent = '';
        stats.textContent = '';
      }
    }

    convertBtn.addEventListener('click', convert);
    copyBtn.addEventListener('click', () => {
      if (output.textContent && output.textContent !== 'CSV output will appear here...') {
        navigator.clipboard.writeText(output.textContent);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy', 1500);
      }
    });
    downloadBtn.addEventListener('click', () => {
      if (output.textContent && output.textContent !== 'CSV output will appear here...') {
        const blob = new Blob([output.textContent], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'data.csv';
        a.click();
      }
    });
    input.addEventListener('input', convert);
  </script>
</body>
</html>
