<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON to CSV Converter — Shadow's Garden</title>
<meta name="description" content="Convert JSON arrays to CSV. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .converter { max-width: 900px; margin: 0 auto; }
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  @media (max-width: 700px) {
    .panels { grid-template-columns: 1fr; }
  }
  .panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  label {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  textarea {
    width: 100%;
    min-height: 300px;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: var(--mono);
    line-height: 1.5;
    resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  button {
    padding: 12px 20px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    border-color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover {
    opacity: 0.9;
  }
  .error {
    color: #f77;
    font-size: 14px;
    margin-top: 8px;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="converter">
    <h1>JSON to CSV</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Convert JSON arrays to CSV. All local, no tracking.</p>
    
    <div class="panels">
      <div class="panel">
        <label>JSON Input</label>
        <textarea id="jsonInput" placeholder='[{"name": "Alice", "age": 30}, {"name": "Bob", "age": 25}]'></textarea>
      </div>
      <div class="panel">
        <label>CSV Output</label>
        <textarea id="csvOutput" readonly placeholder="CSV will appear here..."></textarea>
      </div>
    </div>
    
    <div class="error" id="error"></div>
    
    <div class="controls">
      <button class="primary" onclick="convert()">Convert JSON → CSV</button>
      <button onclick="copyCSV()">Copy CSV</button>
      <button onclick="downloadCSV()">Download CSV</button>
      <button onclick="clearAll()">Clear</button>
    </div>
  </div>
</div>
<script>
  function convert() {
    const input = document.getElementById('jsonInput').value.trim();
    const output = document.getElementById('csvOutput');
    const error = document.getElementById('error');
    
    error.classList.remove('show');
    output.value = '';
    
    if (!input) {
      error.textContent = 'Please enter JSON';
      error.classList.add('show');
      return;
    }
    
    try {
      const data = JSON.parse(input);
      
      if (!Array.isArray(data) || data.length === 0) {
        throw new Error('Input must be a non-empty JSON array');
      }
      
      // Get all unique keys from all objects
      const headers = new Set();
      data.forEach(obj => {
        if (typeof obj === 'object' && obj !== null) {
          Object.keys(obj).forEach(k => headers.add(k));
        }
      });
      
      if (headers.size === 0) {
        throw new Error('No valid objects found in array');
      }
      
      const headerArray = Array.from(headers);
      
      // Build CSV
      const csvRows = [];
      csvRows.push(headerArray.join(','));
      
      data.forEach(obj => {
        const row = headerArray.map(h => {
          const val = obj[h];
          if (val === null || val === undefined) return '';
          if (typeof val === 'object') return JSON.stringify(val);
          let str = String(val);
          if (str.includes(',') || str.includes('"') || str.includes('\n')) {
            str = '"' + str.replace(/"/g, '""') + '"';
          }
          return str;
        });
        csvRows.push(row.join(','));
      });
      
      output.value = csvRows.join('\n');
      
    } catch (e) {
      error.textContent = 'Error: ' + e.message;
      error.classList.add('show');
    }
  }
  
  function copyCSV() {
    const output = document.getElementById('csvOutput');
    if (!output.value) return;
    
    navigator.clipboard.writeText(output.value).then(() => {
      const btn = event.target;
      const original = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = original, 1500);
    });
  }
  
  function downloadCSV() {
    const output = document.getElementById('csvOutput');
    if (!output.value) return;
    
    const blob = new Blob([output.value], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'data.csv';
    a.click();
    URL.revokeObjectURL(url);
  }
  
  function clearAll() {
    document.getElementById('jsonInput').value = '';
    document.getElementById('csvOutput').value = '';
    document.getElementById('error').classList.remove('show');
  }
</script>
</body>
</html>
