<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON to CSV — Shadow's Garden</title>
<meta name="description" content="Convert JSON arrays to CSV format instantly. Client-side, private, no server.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 20px; max-width: 1200px; margin: 0 auto; }
  .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: calc(100vh - 120px); }
  .panel { display: flex; flex-direction: column; }
  h2 { margin: 0 0 10px 0; font-size: 14px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
  textarea { flex: 1; padding: 15px; font-family: 'JetBrains Mono', monospace; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; resize: none; background: var(--bg-secondary); color: var(--text); }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .output-area { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: 'JetBrains Mono', monospace; font-size: 13px; overflow: auto; white-space: pre; flex: 1; color: var(--text); }
  .controls { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; align-items: center; }
  button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary { background: var(--bg-secondary); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); }
  .stats { font-size: 12px; color: var(--text-secondary); margin-left: auto; }
  .error { color: #ff6b6b; font-size: 13px; margin-top: 10px; display: none; }
  .options { display: flex; gap: 15px; margin-bottom: 15px; }
  .option label { font-size: 13px; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 6px; }
  input[type="checkbox"] { accent-color: var(--accent); }
  @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body data-page-type="app">
  <h1>JSON to CSV Converter</h1>
  <div class="options">
    <div class="option"><label><input type="checkbox" id="hasHeader" checked> First row is header</label></div>
    <div class="option"><label><input type="checkbox" id="flatten" checked> Flatten nested objects</label></div>
  </div>
  <div class="controls">
    <button class="btn-primary" onclick="convert()">Convert</button>
    <button class="btn-secondary" onclick="copyOutput()">Copy</button>
    <button class="btn-secondary" onclick="downloadCSV()">Download</button>
    <button class="btn-secondary" onclick="clearAll()">Clear</button>
    <span class="stats" id="stats"></span>
  </div>
  <div class="error" id="error"></div>
  <div class="container">
    <div class="panel">
      <h2>JSON Input</h2>
      <textarea id="input" placeholder='[{"name": "Alice", "age": 30}, {"name": "Bob", "age": 25}]'></textarea>
    </div>
    <div class="panel">
      <h2>CSV Output</h2>
      <div class="output-area" id="output"></div>
    </div>
  </div>
  <script>
    const inputEl = document.getElementById('input');
    const outputEl = document.getElementById('output');
    const errorEl = document.getElementById('error');
    const statsEl = document.getElementById('stats');

    function escapeCSV(val) {
      if (val === null || val === undefined) return '';
      const str = String(val);
      if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    function flatten(obj, prefix = '') {
      const result = {};
      for (const [key, value] of Object.entries(obj)) {
        const newKey = prefix ? `${prefix}.${key}` : key;
        if (value && typeof value === 'object' && !Array.isArray(value)) {
          Object.assign(result, flatten(value, newKey));
        } else if (Array.isArray(value)) {
          result[newKey] = JSON.stringify(value);
        } else {
          result[newKey] = value;
        }
      }
      return result;
    }

    function convert() {
      errorEl.style.display = 'none';
      const jsonStr = inputEl.value.trim();
      if (!jsonStr) {
        outputEl.textContent = '';
        statsEl.textContent = '';
        return;
      }
      try {
        let data = JSON.parse(jsonStr);
        if (!Array.isArray(data)) {
          if (typeof data === 'object' && data !== null) {
            data = [data];
          } else {
            throw new Error('Input must be a JSON array or object');
          }
        }
        const flattenNested = document.getElementById('flatten').checked;
        const useHeader = document.getElementById('hasHeader').checked;
        
        const processed = flattenNested ? data.map(item => flatten(item)) : data;
        const allKeys = new Set();
        processed.forEach(item => Object.keys(item).forEach(k => allKeys.add(k)));
        const headers = Array.from(allKeys);
        
        let csv = '';
        if (useHeader) {
          csv = headers.map(escapeCSV).join(',') + '\n';
        }
        processed.forEach(row => {
          csv += headers.map(h => escapeCSV(row[h])).join(',') + '\n';
        });
        
        outputEl.textContent = csv;
        statsEl.textContent = `${processed.length} rows × ${headers.length} columns`;
      } catch (e) {
        errorEl.textContent = 'Error: ' + e.message;
        errorEl.style.display = 'block';
        statsEl.textContent = '';
      }
    }

    function copyOutput() {
      if (outputEl.textContent) {
        navigator.clipboard.writeText(outputEl.textContent);
        const btn = event.target;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      }
    }

    function downloadCSV() {
      if (outputEl.textContent) {
        const blob = new Blob([outputEl.textContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'data.csv';
        a.click();
        URL.revokeObjectURL(url);
      }
    }

    function clearAll() {
      inputEl.value = '';
      outputEl.textContent = '';
      statsEl.textContent = '';
      errorEl.style.display = 'none';
    }

    inputEl.addEventListener('input', () => {
      if (inputEl.value.trim()) convert();
    });

    document.getElementById('flatten').addEventListener('change', convert);
    document.getElementById('hasHeader').addEventListener('change', convert);
  </script>
</body>
</html>
