<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON to CSV Converter — Shadow's Garden</title>
<meta name="description" content="Convert JSON arrays to CSV format instantly. All local, no server.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 0; }
  .container { display: flex; flex: 1; overflow: hidden; }
  .panel { flex: 1; display: flex; flex-direction: column; padding: 1rem; overflow: hidden; }
  .panel:first-child { border-right: 1px solid var(--border); }
  h2 { margin: 0 0 1rem 0; font-size: 1.1rem; color: var(--fg-muted); }
  textarea { flex: 1; width: 100%; resize: none; border: 1px solid var(--border); border-radius: 8px; padding: 1rem; font-family: 'Fira Code', monospace; font-size: 14px; background: var(--bg); color: var(--fg); }
  textarea:focus { outline: none; border-color: var(--accent); }
  .actions { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; align-items: center; }
  button { background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 14px; }
  button:hover { background: var(--bg-secondary); }
  button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  button.primary:hover { opacity: 0.9; }
  .error { color: #e74c3c; font-size: 14px; margin-top: 0.5rem; }
  .success { color: #27ae60; font-size: 14px; margin-top: 0.5rem; }
  .options { display: flex; gap: 1rem; align-items: center; margin-left: auto; }
  label { display: flex; align-items: center; gap: 0.3rem; font-size: 14px; cursor: pointer; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <div class="panel">
      <h2>JSON Input</h2>
      <textarea id="jsonInput" placeholder='[{"name": "Alice", "age": 30}, {"name": "Bob", "age": 25}]'></textarea>
      <div class="actions">
        <button id="convertBtn" class="primary">Convert to CSV</button>
        <button id="sampleBtn">Load Sample</button>
        <button id="clearBtn">Clear</button>
        <div class="options">
          <label><input type="checkbox" id="headersCheck" checked> Include headers</label>
        </div>
      </div>
      <div id="message"></div>
    </div>
    <div class="panel">
      <h2>CSV Output</h2>
      <textarea id="csvOutput" placeholder="CSV will appear here..."></textarea>
      <div class="actions">
        <button id="copyBtn">Copy CSV</button>
        <button id="downloadBtn">Download .csv</button>
      </div>
    </div>
  </div>
  <script>
    const jsonInput = document.getElementById('jsonInput');
    const csvOutput = document.getElementById('csvOutput');
    const message = document.getElementById('message');
    const headersCheck = document.getElementById('headersCheck');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = type;
      setTimeout(() => { message.textContent = ''; message.className = ''; }, 3000);
    }

    function jsonToCsv(json, includeHeaders) {
      if (!Array.isArray(json) || json.length === 0) {
        throw new Error('Input must be a JSON array');
      }
      
      const keys = [...new Set(json.flatMap(obj => Object.keys(obj)))];
      const rows = [];
      
      if (includeHeaders) {
        rows.push(keys.map(k => `"${k.replace(/"/g, '""')}"`).join(','));
      }
      
      for (const obj of json) {
        const row = keys.map(k => {
          const val = obj[k] === undefined ? '' : String(obj[k]);
          return `"${val.replace(/"/g, '""')}"`;
        });
        rows.push(row.join(','));
      }
      
      return rows.join('\n');
    }

    document.getElementById('convertBtn').addEventListener('click', () => {
      try {
        const json = JSON.parse(jsonInput.value);
        const csv = jsonToCsv(json, headersCheck.checked);
        csvOutput.value = csv;
        showMessage('Converted successfully!', 'success');
      } catch (e) {
        showMessage('Error: ' + e.message, 'error');
      }
    });

    document.getElementById('sampleBtn').addEventListener('click', () => {
      jsonInput.value = JSON.stringify([
        { "name": "Alice Johnson", "age": 30, "city": "New York", "role": "Engineer" },
        { "name": "Bob Smith", "age": 25, "city": "San Francisco", "role": "Designer" },
        { "name": "Carol White", "age": 35, "city": "Austin", "role": "Manager" }
      ], null, 2);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      jsonInput.value = '';
      csvOutput.value = '';
      message.textContent = '';
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      if (!csvOutput.value) {
        showMessage('Nothing to copy', 'error');
        return;
      }
      navigator.clipboard.writeText(csvOutput.value).then(() => {
        showMessage('Copied to clipboard!', 'success');
      });
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      if (!csvOutput.value) {
        showMessage('Nothing to download', 'error');
        return;
      }
      const blob = new Blob([csvOutput.value], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'data.csv';
      a.click();
    });
  </script>
</body>
</html>
