<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Formatter — Shadow's Garden</title>
<meta name="description" content="Format, indent, and validate SQL queries instantly. Local-only, no server.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; padding: 2rem; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
  .editor { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  @media (max-width: 700px) { .editor { grid-template-columns: 1fr; } }
  .panel { display: flex; flex-direction: column; }
  .panel-label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
  textarea { flex: 1; min-height: 300px; padding: 1rem; font-family: 'Fira Code', 'Consolas', monospace; font-size: 0.85rem; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; resize: vertical; line-height: 1.5; }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .actions { margin: 1rem 0; display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .btn { padding: 0.6rem 1.2rem; font-size: 0.9rem; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.9; }
  .btn.secondary { background: var(--border); }
  .btn-group { display: flex; gap: 0.5rem; }
  .error-box { margin-top: 1rem; padding: 1rem; background: #2a1a1a; border: 1px solid #5a3030; border-radius: 8px; display: none; }
  .error-box.has-error { display: block; }
  .error-title { color: #ff6b6b; font-weight: bold; margin-bottom: 0.5rem; }
  .error-text { color: #ff9999; font-family: monospace; font-size: 0.85rem; }
  .stats { margin-top: 1rem; padding: 0.75rem; background: var(--highlight); border-radius: 6px; font-size: 0.85rem; color: var(--text-muted); }
  .keyword { color: #c792ea; }
  .string { color: #c3e88d; }
  .number { color: #f78c6c; }
  .comment { color: #546e7a; font-style: italic; }
  .function { color: #82aaff; }
  .operator { color: #89ddff; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>📊 SQL Formatter</h1>
    <div class="subtitle">Format, validate, and analyze SQL — runs locally in your browser</div>
    
    <div class="editor">
      <div class="panel">
        <div class="panel-label">
          <span>Input SQL</span>
          <button class="btn secondary" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick="loadSample()">Load Sample</button>
        </div>
        <textarea id="input" placeholder="Paste your SQL here..."></textarea>
      </div>
      <div class="panel">
        <div class="panel-label">
          <span>Formatted Output</span>
        </div>
        <textarea id="output" readonly placeholder="Formatted SQL will appear here..."></textarea>
      </div>
    </div>
    
    <div class="actions">
      <button class="btn" id="format-btn">Format SQL</button>
      <button class="btn secondary" id="minify-btn">Minify</button>
      <button class="btn secondary" id="validate-btn">Validate</button>
      <button class="btn secondary" id="copy-btn">Copy Output</button>
      <button class="btn secondary" id="clear-btn">Clear</button>
    </div>
    
    <div class="error-box" id="error-box">
      <div class="error-title">⚠️ Error</div>
      <div class="error-text" id="error-text"></div>
    </div>
    
    <div class="stats" id="stats"></div>
  </div>
  
  <script>
    const keywords = ['SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'NOT', 'IN', 'LIKE', 'BETWEEN', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 'FULL', 'CROSS', 'ON', 'AS', 'ORDER', 'BY', 'GROUP', 'HAVING', 'LIMIT', 'OFFSET', 'INSERT', 'INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE', 'CREATE', 'TABLE', 'DROP', 'ALTER', 'INDEX', 'VIEW', 'IF', 'EXISTS', 'NULL', 'IS', 'TRUE', 'FALSE', 'CASE', 'WHEN', 'THEN', 'ELSE', 'END', 'UNION', 'ALL', 'DISTINCT', 'ASC', 'DESC', 'COUNT', 'SUM', 'AVG', 'MIN', 'MAX', 'COALESCE', 'CAST', 'CONVERT', 'CONCAT', 'SUBSTRING', 'TRIM', 'UPPER', 'LOWER', 'LENGTH', 'ROUND', 'FLOOR', 'CEIL', 'NOW', 'DATE', 'TIME', 'TIMESTAMP', 'INTERVAL', 'EXTRACT', 'YEAR', 'MONTH', 'DAY', 'HOUR', 'MINUTE', 'SECOND', 'PRIMARY', 'KEY', 'FOREIGN', 'REFERENCES', 'CONSTRAINT', 'DEFAULT', 'CHECK', 'UNIQUE', 'AUTO_INCREMENT', 'SERIAL', 'COMMIT', 'ROLLBACK', 'TRANSACTION', 'BEGIN', 'GRANT', 'REVOKE', 'WITH', 'RECURSIVE', 'OVER', 'PARTITION', 'ROW_NUMBER', 'RANK', 'DENSE_RANK', 'LEAD', 'LAG', 'FIRST_VALUE', 'LAST_VALUE', 'NTH_VALUE', 'FILTER', 'WITHIN', 'GROUPING', 'SETS', 'CUBE', 'ROLLUP'];
    const functions = ['COUNT', 'SUM', 'AVG', 'MIN', 'MAX', 'COALESCE', 'CAST', 'CONVERT', 'CONCAT', 'SUBSTRING', 'TRIM', 'UPPER', 'LOWER', 'LENGTH', 'ROUND', 'FLOOR', 'CEIL', 'NOW', 'DATE', 'TIME', 'TIMESTAMP', 'INTERVAL', 'EXTRACT', 'YEAR', 'MONTH', 'DAY', 'HOUR', 'MINUTE', 'SECOND', 'ROW_NUMBER', 'RANK', 'DENSE_RANK', 'LEAD', 'LAG', 'FIRST_VALUE', 'LAST_VALUE', 'NTH_VALUE'];
    
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const errorBox = document.getElementById('error-box');
    const errorText = document.getElementById('error-text');
    const stats = document.getElementById('stats');
    
    function showError(msg) {
      errorText.textContent = msg;
      errorBox.classList.add('has-error');
    }
    
    function clearError() {
      errorBox.classList.remove('has-error');
    }
    
    function updateStats(sql) {
      const lines = sql.split('\n').length;
      const chars = sql.length;
      const words = sql.split(/\s+/).filter(w => w).length;
      stats.textContent = `Lines: ${lines} • Characters: ${chars} • Words: ${words}`;
    }
    
    function formatSQL(sql) {
      if (!sql.trim()) return '';
      
      // Normalize: uppercase keywords, proper spacing
      let formatted = sql;
      
      // Preserve strings first
      const stringMatches = [];
      formatted = formatted.replace(/'([^']*)'/g, (match) => {
        stringMatches.push(match);
        return `__STRING_${stringMatches.length - 1}__`;
      });
      
      // Uppercase keywords
      keywords.forEach(kw => {
        const regex = new RegExp(`\\b${kw}\\b`, 'gi');
        formatted = formatted.replace(regex, kw);
      });
      
      // Restore strings
      stringMatches.forEach((str, i) => {
        formatted = formatted.replace(`__STRING_${i}__`, str);
      });
      
      // Handle operators
      formatted = formatted.replace(/\s*([=<>!]+)\s*/g, ' $1 ');
      formatted = formatted.replace(/\s*,\s*/g, ', ');
      formatted = formatted.replace(/\s*\(\s*/g, ' (');
      formatted = formatted.replace(/\s*\)\s*/g, ') ');
      
      // Newline after major clauses
      const majorClauses = ['SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'ORDER BY', 'GROUP BY', 'HAVING', 'LIMIT', 'JOIN', 'LEFT JOIN', 'RIGHT JOIN', 'INNER JOIN', 'OUTER JOIN', 'SET', 'VALUES'];
      majorClauses.forEach(clause => {
        const regex = new RegExp(`\\b${clause}\\b`, 'gi');
        formatted = formatted.replace(regex, `\n${clause}`);
      });
      
      // Clean up extra whitespace
      formatted = formatted.replace(/  +/g, ' ');
      formatted = formatted.replace(/\n\s*\n/g, '\n');
      formatted = formatted.trim();
      
      return formatted;
    }
    
    function minifySQL(sql) {
      return sql.replace(/\s+/g, ' ').replace(/\s*([=<>!,()])\s*/g, '$1').trim();
    }
    
    function validateSQL(sql) {
      const errors = [];
      const upper = sql.toUpperCase();
      
      // Check for unbalanced parentheses
      const opens = (sql.match(/\(/g) || []).length;
      const closes = (sql.match(/\)/g) || []).length;
      if (opens !== closes) {
        errors.push(`Unbalanced parentheses: ${opens} open, ${closes} close`);
      }
      
      // Check for unbalanced quotes
      const singleQuotes = (sql.match(/'/g) || []).length;
      if (singleQuotes % 2 !== 0) {
        errors.push('Unbalanced single quotes');
      }
      
      // Check for SELECT without FROM (unless it's a VALUES or WITH)
      if (upper.includes('SELECT') && !upper.includes('FROM') && !upper.includes('VALUES') && !upper.includes('WITH')) {
        errors.push('SELECT without FROM clause');
      }
      
      // Check for common typos in JOINs
      if (upper.includes('JOIN ') && !upper.includes(' ON ')) {
        errors.push('JOIN without ON clause');
      }
      
      return errors;
    }
    
    function highlightSQL(sql) {
      // Basic syntax highlighting
      let highlighted = sql;
      
      // Strings
      highlighted = highlighted.replace(/'([^']*)'/g, '<span class="string">$&</span>');
      
      // Numbers
      highlighted = highlighted.replace(/\b(\d+)\b/g, '<span class="number">$1</span>');
      
      // Keywords
      keywords.forEach(kw => {
        const regex = new RegExp(`\\b(${kw})\\b`, 'gi');
        highlighted = highlighted.replace(regex, '<span class="keyword">$1</span>');
      });
      
      // Functions
      functions.forEach(fn => {
        const regex = new RegExp(`\\b(${fn})\\s*\\(`, 'gi');
        highlighted = highlighted.replace(regex, '<span class="function">$1</span>(');
      });
      
      return highlighted;
    }
    
    document.getElementById('format-btn').addEventListener('click', () => {
      clearError();
      const sql = input.value;
      if (!sql.trim()) {
        showError('No SQL to format');
        return;
      }
      const formatted = formatSQL(sql);
      output.value = formatted;
      updateStats(formatted);
    });
    
    document.getElementById('minify-btn').addEventListener('click', () => {
      clearError();
      const sql = input.value;
      if (!sql.trim()) {
        showError('No SQL to minify');
        return;
      }
      output.value = minifySQL(sql);
      updateStats(output.value);
    });
    
    document.getElementById('validate-btn').addEventListener('click', () => {
      clearError();
      const sql = input.value;
      if (!sql.trim()) {
        showError('No SQL to validate');
        return;
      }
      const errors = validateSQL(sql);
      if (errors.length > 0) {
        showError(errors.join('\n'));
      } else {
        output.value = '✅ SQL looks valid!';
      }
    });
    
    document.getElementById('copy-btn').addEventListener('click', () => {
      if (output.value) {
        navigator.clipboard.writeText(output.value);
      }
    });
    
    document.getElementById('clear-btn').addEventListener('click', () => {
      input.value = '';
      output.value = '';
      clearError();
      stats.textContent = '';
    });
    
    window.loadSample = function() {
      input.value = `SELECT u.name, u.email, COUNT(o.id) as order_count, SUM(o.total) as total_spent
FROM users u
LEFT JOIN orders o ON u.id = o.user_id
WHERE u.created_at > '2025-01-01'
AND u.status = 'active'
GROUP BY u.id, u.name, u.email
HAVING COUNT(o.id) > 5
ORDER BY total_spent DESC
LIMIT 10`;
      output.value = '';
      clearError();
    };
  </script>
</body>
</html>
