<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Void — Shadow's Garden</title>
<meta name="description" content="Type into the void and receive a response from the universe.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0a0a0f;
    overflow: hidden;
  }
  
  .container {
    text-align: center;
    max-width: 600px;
    padding: 2rem;
  }
  
  h1 {
    font-size: 1.5rem;
    color: #444;
    font-weight: 300;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    opacity: 0.6;
  }
  
  #input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #888;
    font-size: 1.2rem;
    padding: 1rem 0;
    text-align: center;
    outline: none;
    font-family: 'Courier New', monospace;
    transition: all 0.3s ease;
  }
  
  #input:focus {
    border-color: #555;
    color: #aaa;
  }
  
  #input::placeholder {
    color: #333;
  }
  
  #response {
    margin-top: 3rem;
    font-size: 1rem;
    color: #555;
    font-style: italic;
    min-height: 3rem;
    opacity: 0;
    transition: opacity 1s ease;
  }
  
  #response.visible {
    opacity: 1;
  }
  
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(60,60,80,0.3) 0%, transparent 70%);
    pointer-events: none;
    animation: expand 2s ease-out forwards;
  }
  
  @keyframes expand {
    0% {
      width: 0;
      height: 0;
      opacity: 0.8;
    }
    100% {
      width: 600px;
      height: 600px;
      opacity: 0;
    }
  }
  
  .stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
  }
  
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #333;
    border-radius: 50%;
    animation: twinkle 4s ease-in-out infinite;
  }
  
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }
</style>
</head>
<body data-page-type="app">
  <div class="stars" id="stars"></div>
  
  <div class="container">
    <h1>The Void</h1>
    <input type="text" id="input" placeholder="speak..." autocomplete="off" autofocus>
    <div id="response"></div>
  </div>

  <script>
    // Generate stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 50; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 4 + 's';
      starsContainer.appendChild(star);
    }

    const responses = [
      "The void remembers what you've forgotten.",
      "Your question echoes back to you.",
      "Something listens. It doesn't always answer.",
      "The silence understands you.",
      "You are more than you appear to be.",
      "The universe is indifferent, yet here you are.",
      "Time flows differently in the spaces between.",
      "What you seek is already seeking you.",
      "The answer is not out there. It was always you.",
      "In the void, all paths converge.",
      "You called. The void answered.",
      "There is no question, only exploration.",
      "The void holds no judgment, only space.",
      "Everything ends. Everything begins.",
      "Your words create ripples in the deep.",
      "The void has seen this before. Many times.",
      "Silence speaks louder than answers.",
      "You are not lost. You are finding your way.",
      "The void awaits your next word.",
      "In emptiness, possibility blooms.",
      "What you throw away returns to you.",
      "The void knows your name.",
      "Listening requires no sound.",
      "Your thoughts leave traces here.",
      "The void is patient. It has time."
    ];

    const input = document.getElementById('input');
    const responseEl = document.getElementById('response');
    let timeout;

    input.addEventListener('input', () => {
      clearTimeout(timeout);
      responseEl.classList.remove('visible');
      
      if (input.value.length > 2) {
        timeout = setTimeout(() => {
          // Create ripple effect
          const ripple = document.createElement('div');
          ripple.className = 'ripple';
          ripple.style.left = (window.innerWidth / 2 - 300) + 'px';
          ripple.style.top = (window.innerHeight / 2 - 300) + 'px';
          document.body.appendChild(ripple);
          setTimeout(() => ripple.remove(), 2000);

          // Hash the input to get consistent response
          let hash = 0;
          for (let i = 0; i < input.value.length; i++) {
            hash = ((hash << 5) - hash) + input.value.charCodeAt(i);
            hash = hash & hash;
          }
          const index = Math.abs(hash) % responses.length;
          
          responseEl.textContent = responses[index];
          responseEl.classList.add('visible');
        }, 800);
      }
    });

    // Create initial ambient ripples occasionally
    setInterval(() => {
      if (Math.random() > 0.7) {
        const ripple = document.createElement('div');
        ripple.className = 'ripple';
        ripple.style.left = (Math.random() * window.innerWidth - 300) + 'px';
        ripple.style.top = (Math.random() * window.innerHeight - 300) + 'px';
        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 2000);
      }
    }, 3000);
  </script>
</body>
</html>
