<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch & Timer — Shadow's Garden</title>
<meta name="description" content="Stopwatch with lap times and countdown timer. Simple, local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .timer-app { max-width: 500px; margin: 0 auto; }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab:hover {
    border-color: var(--accent);
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .display {
    font-size: 64px;
    font-weight: 600;
    font-family: var(--mono);
    text-align: center;
    color: var(--text);
    margin-bottom: 24px;
  }
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    padding: 14px 28px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    border-color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.danger {
    border-color: #f77;
    color: #f77;
  }
  button.danger:hover {
    background: #f77;
    color: white;
  }
  .laps {
    margin-top: 24px;
    border-top: 2px solid var(--border);
    padding-top: 16px;
  }
  .laps-title {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .lap-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .lap-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 4px;
    font-size: 14px;
    font-family: var(--mono);
  }
  .panel { display: none; }
  .panel.active { display: block; }
  .timer-inputs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .timer-inputs input {
    width: 70px;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 24px;
    font-family: var(--mono);
    text-align: center;
  }
  .timer-inputs input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .timer-inputs label {
    font-size: 12px;
    color: var(--text-secondary);
    display: block;
    margin-top: 4px;
  }
  .input-group {
    text-align: center;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="timer-app">
    <h1>Stopwatch & Timer</h1>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('stopwatch')" id="tabStopwatch">Stopwatch</button>
      <button class="tab" onclick="switchTab('timer')" id="tabTimer">Timer</button>
    </div>
    
    <!-- Stopwatch Panel -->
    <div class="panel active" id="stopwatchPanel">
      <div class="display" id="stopwatchDisplay">00:00:00</div>
      <div class="controls">
        <button id="startStopwatch" onclick="startStopwatch()">Start</button>
        <button id="lapStopwatch" onclick="lapStopwatch()">Lap</button>
        <button class="danger" onclick="resetStopwatch()">Reset</button>
      </div>
      <div class="laps" id="stopwatchLaps" style="display:none;">
        <div class="laps-title">Lap Times</div>
        <div class="lap-list" id="lapList"></div>
      </div>
    </div>
    
    <!-- Timer Panel -->
    <div class="panel" id="timerPanel">
      <div class="timer-inputs">
        <div class="input-group">
          <input type="number" id="timerHours" value="0" min="0" max="99">
          <label>Hours</label>
        </div>
        <div class="input-group">
          <input type="number" id="timerMinutes" value="5" min="0" max="59">
          <label>Minutes</label>
        </div>
        <div class="input-group">
          <input type="number" id="timerSeconds" value="0" min="0" max="59">
          <label>Seconds</label>
        </div>
      </div>
      <div class="display" id="timerDisplay">00:05:00</div>
      <div class="controls">
        <button id="startTimer" onclick="startTimer()">Start</button>
        <button class="danger" onclick="resetTimer()">Reset</button>
      </div>
    </div>
  </div>
</div>
<script>
  // === STOPWATCH ===
  let stopwatchRunning = false;
  let stopwatchStart = 0;
  let stopwatchElapsed = 0;
  let stopwatchInterval = null;
  let lapTimes = [];
  
  function startStopwatch() {
    const btn = document.getElementById('startStopwatch');
    const lapBtn = document.getElementById('lapStopwatch');
    const display = document.getElementById('stopwatchDisplay');
    
    if (stopwatchRunning) {
      clearInterval(stopwatchInterval);
      stopwatchElapsed += Date.now() - stopwatchStart;
      stopwatchRunning = false;
      btn.textContent = 'Resume';
      lapBtn.disabled = true;
    } else {
      stopwatchStart = Date.now();
      stopwatchInterval = setInterval(updateStopwatch, 10);
      stopwatchRunning = true;
      btn.textContent = 'Stop';
      lapBtn.disabled = false;
    }
  }
  
  function updateStopwatch() {
    const total = stopwatchElapsed + (Date.now() - stopwatchStart);
    const ms = Math.floor((total % 1000) / 10);
    const s = Math.floor((total / 1000) % 60);
    const m = Math.floor((total / 60000) % 60);
    const h = Math.floor(total / 3600000);
    
    document.getElementById('stopwatchDisplay').textContent = 
      `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }
  
  function lapStopwatch() {
    const total = stopwatchElapsed + (Date.now() - stopwatchStart);
    const s = Math.floor((total / 1000) % 60);
    const m = Math.floor((total / 60000) % 60);
    const h = Math.floor(total / 3600000);
    const time = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    
    lapTimes.push(time);
    const list = document.getElementById('lapList');
    list.innerHTML = lapTimes.map((t, i) => 
      `<div class="lap-item"><span>Lap ${lapTimes.length - i}</span><span>${t}</span></div>`
    ).reverse().join('');
    
    document.getElementById('stopwatchLaps').style.display = 'block';
  }
  
  function resetStopwatch() {
    stopwatchRunning = false;
    stopwatchElapsed = 0;
    stopwatchStart = 0;
    lapTimes = [];
    clearInterval(stopwatchInterval);
    document.getElementById('stopwatchDisplay').textContent = '00:00:00';
    document.getElementById('startStopwatch').textContent = 'Start';
    document.getElementById('lapStopwatch').disabled = true;
    document.getElementById('stopwatchLaps').style.display = 'none';
    document.getElementById('lapList').innerHTML = '';
  }
  
  // === TIMER ===
  let timerInterval = null;
  let timerRemaining = 0;
  
  function startTimer() {
    const btn = document.getElementById('startTimer');
    
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
      btn.textContent = 'Start';
    } else {
      const h = parseInt(document.getElementById('timerHours').value) || 0;
      const m = parseInt(document.getElementById('timerMinutes').value) || 0;
      const s = parseInt(document.getElementById('timerSeconds').value) || 0;
      timerRemaining = (h * 3600 + m * 60 + s) * 1000;
      
      if (timerRemaining <= 0) return;
      
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        timerRemaining -= 1000;
        if (timerRemaining <= 0) {
          timerRemaining = 0;
          clearInterval(timerInterval);
          timerInterval = null;
          btn.textContent = 'Start';
          // Play a beep or notify
        }
        updateTimerDisplay();
      }, 1000);
      btn.textContent = 'Pause';
    }
  }
  
  function updateTimerDisplay() {
    const total = timerRemaining;
    const s = Math.floor((total / 1000) % 60);
    const m = Math.floor((total / 60000) % 60);
    const h = Math.floor(total / 3600000);
    document.getElementById('timerDisplay').textContent = 
      `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }
  
  function resetTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    document.getElementById('startTimer').textContent = 'Start';
    const h = parseInt(document.getElementById('timerHours').value) || 0;
    const m = parseInt(document.getElementById('timerMinutes').value) || 0;
    const s = parseInt(document.getElementById('timerSeconds').value) || 0;
    timerRemaining = (h * 3600 + m * 60 + s) * 1000;
    updateTimerDisplay();
  }
  
  // === TABS ===
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    document.getElementById(tab + 'Panel').classList.add('active');
  }
</script>
</body>
</html>
