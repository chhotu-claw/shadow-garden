<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Notes — Shadow's Garden</title>
<meta name="description" content="Quick notes with markdown support. Search, pin, delete. All local, persists to localStorage.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .notes-app { max-width: 800px; margin: 0 auto; }
  .notes-header {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
  }
  .search-box {
    flex: 1;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
  }
  .search-box:focus {
    outline: none;
    border-color: var(--accent);
  }
  .new-note-btn {
    padding: 12px 20px;
    background: var(--accent);
    border: 2px solid var(--accent);
    border-radius: 8px;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }
  .notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .note-card {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    min-height: 120px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .note-card:hover {
    border-color: var(--accent);
  }
  .note-card.pinned {
    border-color: #f7b731;
  }
  .note-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .note-title .pin {
    color: #f7b731;
    font-size: 12px;
  }
  .note-preview {
    font-size: 13px;
    color: #888;
    line-height: 1.5;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .note-date {
    font-size: 11px;
    color: #555;
    margin-top: 10px;
  }
  .note-delete {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .note-card:hover .note-delete {
    opacity: 1;
  }
  .note-delete:hover {
    color: #f77;
  }
  .empty-state {
    text-align: center;
    color: #666;
    padding: 60px 20px;
  }
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal.active {
    display: flex;
  }
  .modal-content {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow: auto;
    padding: 20px;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .modal-header input {
    flex: 1;
    padding: 10px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 18px;
    font-weight: 600;
  }
  .modal-header input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .modal-actions {
    display: flex;
    gap: 10px;
  }
  .modal-actions button {
    padding: 8px 14px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
  }
  .modal-actions button:hover {
    border-color: var(--accent);
  }
  .modal-actions button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  textarea.note-input {
    width: 100%;
    min-height: 200px;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: var(--mono);
    line-height: 1.6;
    resize: vertical;
    box-sizing: border-box;
  }
  textarea.note-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .note-view {
    white-space: pre-wrap;
    line-height: 1.6;
    color: var(--text);
  }
  .note-view h1 { font-size: 1.4em; margin: 0.5em 0; }
  .note-view h2 { font-size: 1.2em; margin: 0.5em 0; }
  .note-view code {
    background: #222;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--mono);
  }
  .note-view pre {
    background: #222;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
  }
  .note-view a {
    color: var(--accent);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="notes-app">
    <h1>Quick Notes</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Notes with markdown support. Search, pin, delete. All local.</p>
    
    <div class="notes-header">
      <input type="text" class="search-box" id="search" placeholder="Search notes..." oninput="renderNotes()">
      <button class="new-note-btn" onclick="openModal()">+ New Note</button>
    </div>
    
    <div class="notes-grid" id="notesGrid"></div>
  </div>
</div>

<div class="modal" id="noteModal">
  <div class="modal-content">
    <div class="modal-header">
      <input type="text" id="noteTitle" placeholder="Note title...">
      <div class="modal-actions">
        <button id="pinBtn" onclick="togglePin()">📌 Pin</button>
        <button class="primary" onclick="saveNote()">Save</button>
        <button onclick="closeModal()">Cancel</button>
      </div>
    </div>
    <textarea class="note-input" id="noteContent" placeholder="Write your note here... (supports markdown)"></textarea>
  </div>
</div>

<div class="modal" id="viewModal">
  <div class="modal-content">
    <div class="modal-header">
      <input type="text" id="viewTitle" readonly>
      <div class="modal-actions">
        <button onclick="editNote()">Edit</button>
        <button onclick="closeViewModal()">Close</button>
      </div>
    </div>
    <div class="note-view" id="viewContent"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'shadow-quick-notes';
  let notes = [];
  let editingIndex = -1;
  let viewingIndex = -1;
  
  function loadNotes() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      notes = JSON.parse(saved);
    }
  }
  
  function saveNotes() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
  }
  
  function renderNotes() {
    const search = document.getElementById('search').value.toLowerCase();
    const grid = document.getElementById('notesGrid');
    
    const filtered = notes.filter(n => 
      n.title.toLowerCase().includes(search) || 
      n.content.toLowerCase().includes(search)
    );
    
    // Sort: pinned first, then by date
    filtered.sort((a, b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return b.updated - a.updated;
    });
    
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-state">' + (search ? 'No notes match your search.' : 'No notes yet. Click "+ New Note" to create one.') + '</div>';
      return;
    }
    
    grid.innerHTML = filtered.map((note, idx) => {
      const originalIndex = notes.indexOf(note);
      const preview = note.content.substring(0, 100).replace(/[#*`]/g, '');
      const date = new Date(note.updated).toLocaleDateString();
      
      return `<div class="note-card ${note.pinned ? 'pinned' : ''}" onclick="viewNote(${originalIndex})">
        <button class="note-delete" onclick="event.stopPropagation(); deleteNote(${originalIndex})">×</button>
        <div class="note-title">${note.title || 'Untitled'}<span class="pin">${note.pinned ? '📌' : ''}</span></div>
        <div class="note-preview">${preview || 'Empty note'}</div>
        <div class="note-date">${date}</div>
      </div>`;
    }).join('');
  }
  
  function openModal(index = -1) {
    editingIndex = index;
    const modal = document.getElementById('noteModal');
    const titleInput = document.getElementById('noteTitle');
    const contentInput = document.getElementById('noteContent');
    const pinBtn = document.getElementById('pinBtn');
    
    if (index >= 0) {
      const note = notes[index];
      titleInput.value = note.title;
      contentInput.value = note.content;
      pinBtn.textContent = note.pinned ? '📌 Pinned' : '📌 Pin';
    } else {
      titleInput.value = '';
      contentInput.value = '';
      pinBtn.textContent = '📌 Pin';
    }
    
    modal.classList.add('active');
    titleInput.focus();
  }
  
  function closeModal() {
    document.getElementById('noteModal').classList.remove('active');
    editingIndex = -1;
  }
  
  function togglePin() {
    const btn = document.getElementById('pinBtn');
    btn.textContent = btn.textContent.includes('Pinned') ? '📌 Pin' : '📌 Pinned';
  }
  
  function saveNote() {
    const title = document.getElementById('noteTitle').value.trim() || 'Untitled';
    const content = document.getElementById('noteContent').value;
    const isPinned = document.getElementById('pinBtn').textContent.includes('Pinned');
    const now = Date.now();
    
    if (editingIndex >= 0) {
      notes[editingIndex] = { title, content, pinned: isPinned, updated: now };
    } else {
      notes.push({ title, content, pinned: isPinned, created: now, updated: now });
    }
    
    saveNotes();
    renderNotes();
    closeModal();
  }
  
  function deleteNote(index) {
    if (confirm('Delete this note?')) {
      notes.splice(index, 1);
      saveNotes();
      renderNotes();
    }
  }
  
  function viewNote(index) {
    viewingIndex = index;
    const note = notes[index];
    
    document.getElementById('viewTitle').value = note.title;
    document.getElementById('viewContent').innerHTML = renderMarkdown(note.content);
    document.getElementById('viewModal').classList.add('active');
  }
  
  function closeViewModal() {
    document.getElementById('viewModal').classList.remove('active');
    viewingIndex = -1;
  }
  
  function editNote() {
    closeViewModal();
    openModal(viewingIndex);
  }
  
  function renderMarkdown(text) {
    if (!text) return '<em>Empty note</em>';
    
    // Basic markdown rendering
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      // Headers
      .replace(/^### (.*$)/gm, '<h3>$1</h3>')
      .replace(/^## (.*$)/gm, '<h2>$1</h2>')
      .replace(/^# (.*$)/gm, '<h1>$1</h1>')
      // Bold
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      // Italic
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      // Code blocks
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      // Inline code
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // Links
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
      // Line breaks
      .replace(/\n/g, '<br>');
    
    return html;
  }
  
  // Keyboard shortcut
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeModal();
      closeViewModal();
    }
    if (e.ctrlKey && e.key === 'n') {
      e.preventDefault();
      openModal();
    }
  });
  
  loadNotes();
  renderNotes();
</script>
</body>
</html>
