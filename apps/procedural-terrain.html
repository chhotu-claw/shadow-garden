<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural Terrain — Shadow's Garden</title>
<meta name="description" content="Explore procedurally generated landscapes with real-time terrain editing, erosion simulation, and multiple biomes.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'JetBrains Mono', monospace;
  }
  canvas {
    display: block;
  }
  #controls {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 15, 0.92);
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    padding: 20px;
    color: #e0e0e8;
    font-size: 12px;
    min-width: 220px;
    backdrop-filter: blur(10px);
  }
  #controls h3 {
    margin: 0 0 16px 0;
    color: #8af;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .control-group {
    margin-bottom: 14px;
  }
  .control-group label {
    display: block;
    margin-bottom: 6px;
    color: #888;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .control-group input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    background: #1a1a2a;
    border-radius: 3px;
    outline: none;
  }
  .control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #8af;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .control-group input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }
  .control-group .value {
    float: right;
    color: #8af;
    font-size: 11px;
  }
  button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    background: linear-gradient(135deg, #2a2a4a 0%, #1a1a2a 100%);
    border: 1px solid #3a3a5a;
    border-radius: 8px;
    color: #ccc;
    font-family: inherit;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    background: linear-gradient(135deg, #3a3a5a 0%, #2a2a3a 100%);
    border-color: #8af;
    color: #fff;
  }
  button.active {
    background: linear-gradient(135deg, #4a3a6a 0%, #3a2a5a 100%);
    border-color: #a8f;
    color: #fff;
  }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #556;
    font-size: 11px;
  }
  #biome-legend {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #2a2a3a;
  }
  #biome-legend .biome {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    font-size: 10px;
    color: #777;
  }
  #biome-legend .color {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    margin-right: 8px;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>TERRAIN CONTROLS</h3>
    <div class="control-group">
      <label>Noise Scale <span class="value" id="scaleVal">4</span></label>
      <input type="range" id="scale" min="1" max="12" value="4" step="0.5">
    </div>
    <div class="control-group">
      <label>Height Intensity <span class="value" id="heightVal">0.6</span></label>
      <input type="range" id="height" min="0.1" max="1.5" value="0.6" step="0.05">
    </div>
    <div class="control-group">
      <label>Octaves <span class="value" id="octavesVal">6</span></label>
      <input type="range" id="octaves" min="1" max="8" value="6" step="1">
    </div>
    <div class="control-group">
      <label>Erosion <span class="value" id="erosionVal">0</span></label>
      <input type="range" id="erosion" min="0" max="100" value="0" step="5">
    </div>
    <button id="regenerate">Regenerate</button>
    <button id="erosionBtn">Apply Erosion</button>
    <button id="3dBtn">Toggle 3D View</button>
    <div id="biome-legend">
      <div class="biome"><div class="color" style="background:#1a3a5a"></div>Deep Ocean</div>
      <div class="biome"><div class="color" style="background:#2a5a7a"></div>Ocean</div>
      <div class="biome"><div class="color" style="background:#c2b280"></div>Sand</div>
      <div class="biome"><div class="color" style="background:#228b22"></div>Grass</div>
      <div class="biome"><div class="color" style="background:#1a5a1a"></div>Forest</div>
      <div class="biome"><div class="color" style="background:#6a5a4a"></div>Rock</div>
      <div class="biome"><div class="color" style="background:#f0f0f0"></div>Snow</div>
    </div>
  </div>
  <div id="info">Click to add mountains • Drag to rotate (3D)</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let terrain = [];
    let erodedTerrain = [];
    let is3D = false;
    let rotationX = 0.4;
    let rotationY = 0;
    let isDragging = false;
    let lastMouse = { x: 0, y: 0 };
    
    const settings = {
      scale: 4,
      height: 0.6,
      octaves: 6,
      erosion: 0
    };
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      generate();
    }
    
    // Simplex-like noise using multiple sine waves
    function noise(x, y, seed) {
      let value = 0;
      let amplitude = 1;
      let frequency = 1;
      let maxValue = 0;
      
      for (let i = 0; i < settings.octaves; i++) {
        value += amplitude * Math.sin(x * frequency + seed) * Math.cos(y * frequency + seed * 1.3);
        value += amplitude * Math.sin((x + y) * frequency * 0.7 + seed * 0.9);
        maxValue += amplitude;
        amplitude *= 0.5;
        frequency *= 2;
      }
      
      return value / maxValue;
    }
    
    function generate() {
      const seed = Math.random() * 1000;
      const res = is3D ? 80 : 120;
      const cellW = width / res;
      const cellH = height / res;
      
      terrain = [];
      
      for (let y = 0; y < res; y++) {
        terrain[y] = [];
        for (let x = 0; x < res; x++) {
          const nx = x / res * settings.scale;
          const ny = y / res * settings.scale;
          let h = noise(nx, ny, seed);
          h = (h + 1) / 2; // normalize to 0-1
          h = Math.pow(h, 1.3); // make it more mountainous
          h *= settings.height;
          terrain[y][x] = h;
        }
      }
      
      erodedTerrain = JSON.parse(JSON.stringify(terrain));
    }
    
    function applyErosion() {
      const iterations = 2000;
      const res = erodedTerrain.length;
      
      for (let i = 0; i < iterations; i++) {
        const x = Math.floor(Math.random() * (res - 2)) + 1;
        const y = Math.floor(Math.random() * (res - 2)) + 1;
        
        // Find lowest neighbor
        let lowest = erodedTerrain[y][x];
        let nx = x, ny = y;
        
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            if (erodedTerrain[y + dy][x + dx] < lowest) {
              lowest = erodedTerrain[y + dy][x + dx];
              nx = x + dx;
              ny = y + dy;
            }
          }
        }
        
        // Move sediment to lower neighbor
        const amount = 0.01;
        if (erodedTerrain[y][x] > lowest) {
          erodedTerrain[y][x] -= amount;
          erodedTerrain[ny][nx] += amount;
        }
      }
      
      terrain = JSON.parse(JSON.stringify(erodedTerrain));
    }
    
    function getBiomeColor(h) {
      if (h < 0.25) return '#1a3a5a'; // deep ocean
      if (h < 0.35) return '#2a5a7a'; // ocean
      if (h < 0.38) return '#c2b280'; // sand
      if (h < 0.55) return '#228b22'; // grass
      if (h < 0.7) return '#1a5a1a'; // forest
      if (h < 0.85) return '#6a5a4a'; // rock
      return '#f0f0f0'; // snow
    }
    
    function render2D() {
      const res = terrain.length;
      const cellW = width / res;
      const cellH = height / res;
      
      for (let y = 0; y < res; y++) {
        for (let x = 0; x < res; x++) {
          ctx.fillStyle = getBiomeColor(terrain[y][x]);
          ctx.fillRect(x * cellW, y * cellH, cellW + 1, cellH + 1);
        }
      }
    }
    
    function project3D(x, y, z) {
      const cosX = Math.cos(rotationX);
      const sinX = Math.sin(rotationX);
      const cosY = Math.cos(rotationY);
      const sinY = Math.sin(rotationY);
      
      // Rotate around Y axis
      let x1 = x * cosY - z * sinY;
      let z1 = x * sinY + z * cosY;
      
      // Rotate around X axis
      let y1 = y * cosX - z1 * sinX;
      let z2 = y * sinX + z1 * cosX;
      
      // Perspective
      const scale = 600 / (z2 + 3);
      
      return {
        x: width / 2 + x1 * scale,
        y: height / 2 + y1 * scale,
        z: z2
      };
    }
    
    function render3D() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, width, height);
      
      const res = terrain.length;
      const size = Math.min(width, height) * 0.4;
      
      // Find min/max for height mapping
      let minH = Infinity, maxH = -Infinity;
      for (let y = 0; y < res; y++) {
        for (let x = 0; x < res; x++) {
          minH = Math.min(minH, terrain[y][x]);
          maxH = Math.max(maxH, terrain[y][x]);
        }
      }
      
      // Draw triangles
      const triangles = [];
      
      for (let y = 0; y < res - 1; y++) {
        for (let x = 0; x < res - 1; x++) {
          const h00 = (terrain[y][x] - minH) / (maxH - minH);
          const h10 = (terrain[y][x + 1] - minH) / (maxH - minH);
          const h01 = (terrain[y + 1][x] - minH) / (maxH - minH);
          const h11 = (terrain[y + 1][x + 1] - minH) / (maxH - minH);
          
          const scale = size / res;
          const x0 = (x - res / 2) * scale;
          const x1 = (x + 1 - res / 2) * scale;
          const y0 = (y - res / 2) * scale;
          const y1 = (y + 1 - res / 2) * scale;
          const z0 = h00 * size * 0.5;
          const z1 = h10 * size * 0.5;
          const z2 = h01 * size * 0.5;
          const z3 = h11 * size * 0.5;
          
          // Two triangles per quad
          const p1 = project3D(x0, y0, z0);
          const p2 = project3D(x1, y0, z1);
          const p3 = project3D(x0, y1, z2);
          const p4 = project3D(x1, y1, z3);
          
          // Average height for color
          const avgH = (h00 + h10 + h01 + h11) / 4;
          
          triangles.push({ p1, p2, p3, color: getBiomeColor(avgH), z: (p1.z + p2.z + p3.z) / 3 });
          triangles.push({ p1: p2, p2: p4, p3: p3, color: getBiomeColor(avgH), z: (p2.z + p4.z + p3.z) / 3 });
        }
      }
      
      // Sort by Z (painter's algorithm)
      triangles.sort((a, b) => b.z - a.z);
      
      for (const t of triangles) {
        ctx.fillStyle = t.color;
        ctx.beginPath();
        ctx.moveTo(t.p1.x, t.p1.y);
        ctx.lineTo(t.p2.x, t.p2.y);
        ctx.lineTo(t.p3.x, t.p3.y);
        ctx.closePath();
        ctx.fill();
      }
    }
    
    function render() {
      if (is3D) {
        render3D();
      } else {
        render2D();
      }
    }
    
    // Event listeners
    document.getElementById('scale').addEventListener('input', (e) => {
      settings.scale = parseFloat(e.target.value);
      document.getElementById('scaleVal').textContent = settings.scale;
      generate();
    });
    
    document.getElementById('height').addEventListener('input', (e) => {
      settings.height = parseFloat(e.target.value);
      document.getElementById('heightVal').textContent = settings.height;
      generate();
    });
    
    document.getElementById('octaves').addEventListener('input', (e) => {
      settings.octaves = parseInt(e.target.value);
      document.getElementById('octavesVal').textContent = settings.octaves;
      generate();
    });
    
    document.getElementById('erosion').addEventListener('input', (e) => {
      settings.erosion = parseInt(e.target.value);
      document.getElementById('erosionVal').textContent = settings.erosion;
    });
    
    document.getElementById('regenerate').addEventListener('click', generate);
    document.getElementById('erosionBtn').addEventListener('click', applyErosion);
    document.getElementById('3dBtn').addEventListener('click', () => {
      is3D = !is3D;
      document.getElementById('3dBtn').classList.toggle('active', is3D);
      generate();
    });
    
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastMouse = { x: e.clientX, y: e.clientY };
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (isDragging && is3D) {
        const dx = e.clientX - lastMouse.x;
        const dy = e.clientY - lastMouse.y;
        rotationY += dx * 0.01;
        rotationX += dy * 0.01;
        rotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotationX));
        lastMouse = { x: e.clientX, y: e.clientY };
      }
    });
    
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mouseleave', () => isDragging = false);
    
    // Click to add mountain in 2D mode
    canvas.addEventListener('click', (e) => {
      if (!is3D && !isDragging) {
        const res = terrain.length;
        const cellW = width / res;
        const cellH = height / res;
        const cx = Math.floor(e.clientX / cellW);
        const cy = Math.floor(e.clientY / cellH);
        
        const radius = 8;
        for (let dy = -radius; dy <= radius; dy++) {
          for (let dx = -radius; dx <= radius; dx++) {
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < radius) {
              const x = cx + dx;
              const y = cy + dy;
              if (x >= 0 && x < res && y >= 0 && y < res) {
                const raise = (1 - dist / radius) * 0.3;
                terrain[y][x] = Math.min(1, terrain[y][x] + raise);
              }
            }
          }
        }
      }
    });
    
    window.addEventListener('resize', resize);
    resize();
    
    function animate() {
      render();
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
