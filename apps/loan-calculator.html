<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate monthly payments, total interest, and view amortization schedule">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #6366f1;
    --accent-dark: #4f46e5;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 2rem;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
  }
  h1 {
    color: #fff;
    text-align: center;
    margin-bottom: 2rem;
  }
  .calculator {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 1rem;
    padding: 2rem;
  }
  .input-group {
    margin-bottom: 1.25rem;
  }
  label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  input, select {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  button {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 0.5rem;
    padding: 1rem;
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 1rem;
  }
  button:hover {
    background: var(--accent-dark);
  }
  .results {
    margin-top: 2rem;
    display: none;
  }
  .results.visible {
    display: block;
  }
  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .result-box {
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid var(--accent);
    border-radius: 0.5rem;
    padding: 1rem;
    text-align: center;
  }
  .result-box .label {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .result-box .value {
    font-size: 1.25rem;
    font-weight: bold;
    color: #fff;
  }
  .result-box.principal .value { color: #34d399; }
  .result-box.interest .value { color: #f87171; }
  .result-box.total .value { color: #fbbf24; }
  
  .schedule-toggle {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    margin-top: 1rem;
  }
  .schedule-toggle:hover {
    background: rgba(255,255,255,0.05);
  }
  .schedule {
    margin-top: 1.5rem;
    display: none;
    max-height: 300px;
    overflow-y: auto;
  }
  .schedule.visible {
    display: block;
  }
  .schedule table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .schedule th, .schedule td {
    padding: 0.5rem;
    text-align: right;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
  }
  .schedule th {
    color: rgba(255,255,255,0.5);
    font-weight: normal;
    text-transform: uppercase;
    font-size: 0.7rem;
  }
  .schedule th:first-child, .schedule td:first-child {
    text-align: left;
  }
  .schedule::-webkit-scrollbar {
    width: 6px;
  }
  .schedule::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
  }
  .schedule::-webkit-scrollbar-thumb {
    background: var(--accent);
    border-radius: 3px;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>💰 Loan Calculator</h1>
  
  <div class="calculator">
    <div class="input-group">
      <label>Loan Amount</label>
      <input type="number" id="amount" value="10000" min="0" step="100">
    </div>
    
    <div class="input-row">
      <div class="input-group">
        <label>Interest Rate (%)</label>
        <input type="number" id="rate" value="5" min="0" max="100" step="0.1">
      </div>
      <div class="input-group">
        <label>Loan Term</label>
        <input type="number" id="years" value="5" min="1" max="50">
      </div>
    </div>
    
    <div class="input-group">
      <label>Payment Frequency</label>
      <select id="frequency">
        <option value="12" selected>Monthly</option>
        <option value="26">Bi-weekly</option>
        <option value="52">Weekly</option>
      </select>
    </div>
    
    <button onclick="calculate()">Calculate</button>
    
    <div class="results" id="results">
      <div class="result-grid">
        <div class="result-box principal">
          <div class="label">Principal</div>
          <div class="value" id="principal">$0</div>
        </div>
        <div class="result-box interest">
          <div class="label">Interest</div>
          <div class="value" id="interest">$0</div>
        </div>
        <div class="result-box total">
          <div class="label">Total</div>
          <div class="value" id="total">$0</div>
        </div>
      </div>
      
      <div class="result-box" style="margin-bottom: 1rem;">
        <div class="label">Monthly Payment</div>
        <div class="value" id="payment" style="font-size: 1.75rem;">$0</div>
      </div>
      
      <button class="schedule-toggle" onclick="toggleSchedule()">View Amortization Schedule</button>
      
      <div class="schedule" id="schedule">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Payment</th>
              <th>Principal</th>
              <th>Interest</th>
              <th>Balance</th>
            </tr>
          </thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
function formatMoney(amount) {
  return '$' + amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function calculate() {
  const amount = parseFloat(document.getElementById('amount').value) || 0;
  const annualRate = parseFloat(document.getElementById('rate').value) || 0;
  const years = parseFloat(document.getElementById('years').value) || 1;
  const frequency = parseInt(document.getElementById('frequency').value);
  
  if (amount <= 0 || years <= 0) {
    alert('Please enter valid loan details');
    return;
  }
  
  const periods = years * frequency;
  const periodicRate = (annualRate / 100) / frequency;
  
  let payment;
  if (periodicRate === 0) {
    payment = amount / periods;
  } else {
    payment = amount * (periodicRate * Math.pow(1 + periodicRate, periods)) / (Math.pow(1 + periodicRate, periods) - 1);
  }
  
  const totalPaid = payment * periods;
  const totalInterest = totalPaid - amount;
  
  document.getElementById('principal').textContent = formatMoney(amount);
  document.getElementById('interest').textContent = formatMoney(totalInterest);
  document.getElementById('total').textContent = formatMoney(totalPaid);
  document.getElementById('payment').textContent = formatMoney(payment);
  
  // Generate schedule
  generateSchedule(amount, payment, periodicRate, periods, frequency);
  
  document.getElementById('results').classList.add('visible');
}

function generateSchedule(balance, payment, rate, periods, frequency) {
  const tbody = document.getElementById('scheduleBody');
  tbody.innerHTML = '';
  
  let remaining = balance;
  const viewMode = frequency === 12 ? 'yearly' : 'monthly';
  const displayPeriods = viewMode === 'yearly' ? Math.ceil(periods / 12) : periods;
  
  for (let i = 1; i <= displayPeriods; i++) {
    let periodPayment = payment;
    let periodPrincipal, periodInterest;
    
    if (viewMode === 'yearly') {
      // Aggregate to yearly
      periodPrincipal = 0;
      periodInterest = 0;
      const monthsInPeriod = Math.min(12, periods - (i - 1) * 12);
      for (let m = 0; m < monthsInPeriod; m++) {
        const interest = remaining * rate;
        periodInterest += interest;
        periodPrincipal += payment - interest;
        remaining -= periodPrincipal / monthsInPeriod;
      }
    } else {
      periodInterest = remaining * rate;
      periodPrincipal = payment - periodInterest;
      remaining -= periodPrincipal;
    }
    
    if (remaining < 0) remaining = 0;
    
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${i}</td>
      <td>${formatMoney(viewMode === 'yearly' ? payment * 12 : payment)}</td>
      <td>${formatMoney(periodPrincipal)}</td>
      <td>${formatMoney(periodInterest)}</td>
      <td>${formatMoney(remaining)}</td>
    `;
    tbody.appendChild(row);
  }
}

function toggleSchedule() {
  document.getElementById('schedule').classList.toggle('visible');
}

// Auto-calculate on Enter
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('keypress', e => {
    if (e.key === 'Enter') calculate();
  });
});
</script>
</body>
</html>
