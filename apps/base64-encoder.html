<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode Base64 strings instantly. All processing happens locally in your browser — nothing is sent to any server.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 2rem 1rem; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .mode-switch { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
  .mode-btn {
    padding: 0.6rem 1.2rem;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.95rem;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .mode-btn:hover { border-color: var(--accent); }
  .mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .io-group { margin-bottom: 1.5rem; }
  .io-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
  textarea {
    width: 100%;
    min-height: 150px;
    padding: 1rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.9rem;
    resize: vertical;
    background: var(--bg);
    color: var(--text);
    box-sizing: border-box;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
  .btn {
    padding: 0.7rem 1.4rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.95rem;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { opacity: 0.8; }
  .stats {
    margin-top: 1rem;
    padding: 0.8rem;
    background: var(--bg-secondary);
    border-radius: 6px;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }
  .error { color: #e74c3c; font-weight: 600; margin-top: 0.5rem; }
  .success { color: #27ae60; font-weight: 600; margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Base64 Encoder/Decoder</h1>
  <p>Encode plaintext to Base64, or decode Base64 back to plaintext. All processing is local — nothing leaves your browser.</p>
  
  <div class="mode-switch">
    <button class="mode-btn active" data-mode="encode">Encode</button>
    <button class="mode-btn" data-mode="decode">Decode</button>
  </div>
  
  <div class="io-group">
    <label id="inputLabel">Plaintext</label>
    <textarea id="input" placeholder="Enter text to encode..."></textarea>
  </div>
  
  <div class="actions">
    <button class="btn btn-primary" id="convertBtn">Convert</button>
    <button class="btn btn-secondary" id="swapBtn">Swap</button>
    <button class="btn btn-secondary" id="copyBtn">Copy Result</button>
    <button class="btn btn-secondary" id="clearBtn">Clear</button>
  </div>
  
  <div class="error" id="error"></div>
  <div class="success" id="success"></div>
  
  <div class="io-group" style="margin-top: 1.5rem;">
    <label id="outputLabel">Base64 Output</label>
    <textarea id="output" placeholder="Result will appear here..." readonly></textarea>
  </div>
  
  <div class="stats" id="stats"></div>
</div>

<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const inputLabel = document.getElementById('inputLabel');
  const outputLabel = document.getElementById('outputLabel');
  const error = document.getElementById('error');
  const success = document.getElementById('success');
  const stats = document.getElementById('stats');
  const modeBtns = document.querySelectorAll('.mode-btn');
  
  let mode = 'encode';
  
  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      modeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mode = btn.dataset.mode;
      updateLabels();
      clearMessages();
    });
  });
  
  function updateLabels() {
    if (mode === 'encode') {
      inputLabel.textContent = 'Plaintext';
      outputLabel.textContent = 'Base64 Output';
      input.placeholder = 'Enter text to encode...';
    } else {
      inputLabel.textContent = 'Base64 Input';
      outputLabel.textContent = 'Plaintext Output';
      input.placeholder = 'Enter Base64 to decode...';
    }
  }
  
  function clearMessages() {
    error.textContent = '';
    success.textContent = '';
  }
  
  document.getElementById('convertBtn').addEventListener('click', () => {
    clearMessages();
    const val = input.value.trim();
    if (!val) {
      output.value = '';
      stats.textContent = '';
      return;
    }
    
    try {
      if (mode === 'encode') {
        // Encode: text -> UTF-8 bytes -> Base64
        const encoded = btoa(unescape(encodeURIComponent(val)));
        output.value = encoded;
        showStats(val, encoded, 'encoded');
      } else {
        // Decode: Base64 -> UTF-8 bytes -> text
        const decoded = decodeURIComponent(escape(atob(val)));
        output.value = decoded;
        showStats(val, decoded, 'decoded');
      }
    } catch (e) {
      error.textContent = 'Invalid input: ' + e.message;
      output.value = '';
      stats.textContent = '';
    }
  });
  
  function showStats(inputVal, outputVal, operation) {
    const inputBytes = new Blob([inputVal]).size;
    const outputBytes = new Blob([outputVal]).size;
    stats.innerHTML = `
      Input: ${inputVal.length} chars (${inputBytes} bytes)<br>
      Output: ${outputVal.length} chars (${outputBytes} bytes)<br>
      Ratio: ${(outputBytes / inputBytes).toFixed(2)}x
    `;
  }
  
  document.getElementById('swapBtn').addEventListener('click', () => {
    const temp = input.value;
    input.value = output.value;
    output.value = temp;
    clearMessages();
    
    // Auto-convert in the new mode
    if (input.value.trim()) {
      document.getElementById('convertBtn').click();
    }
  });
  
  document.getElementById('copyBtn').addEventListener('click', () => {
    if (!output.value) return;
    navigator.clipboard.writeText(output.value).then(() => {
      success.textContent = 'Copied to clipboard!';
      setTimeout(() => success.textContent = '', 2000);
    });
  });
  
  document.getElementById('clearBtn').addEventListener('click', () => {
    input.value = '';
    output.value = '';
    clearMessages();
    stats.textContent = '';
  });
  
  // Auto-convert on input change
  input.addEventListener('input', () => {
    if (input.value.trim()) {
      document.getElementById('convertBtn').click();
    } else {
      output.value = '';
      clearMessages();
      stats.textContent = '';
    }
  });
</script>
</body>
</html>
