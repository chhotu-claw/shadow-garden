<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode Base64 strings instantly. Also convert files to base64. Clean, fast, client-side only.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg-secondary: #1a1a2e;
    --accent: #00d4aa;
    --accent-dim: #00a88a;
    --text: #e0e0e0;
    --text-muted: #888;
    --border: #2a2a4a;
  }
  
  body {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    background: var(--bg-secondary);
    min-height: 100vh;
    padding: 20px;
  }
  
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  
  h1 {
    color: var(--accent);
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
  }
  
  .subtitle {
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }
  
  .panel {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  
  label {
    display: block;
    color: var(--text);
    margin-bottom: 0.5rem;
    font-weight: 500;
  }
  
  textarea {
    width: 100%;
    min-height: 150px;
    background: #0d0d1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 1rem;
    resize: vertical;
    box-sizing: border-box;
  }
  
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  textarea::placeholder {
    color: var(--text-muted);
  }
  
  .options {
    display: flex;
    gap: 1rem;
    margin: 1rem 0;
    flex-wrap: wrap;
  }
  
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  
  .checkbox-label input {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
  }
  
  .buttons {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  
  button {
    background: var(--accent);
    color: #0d0d1a;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  button:hover {
    background: var(--accent-dim);
    transform: translateY(-1px);
  }
  
  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  
  button.secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: transparent;
  }
  
  .file-drop {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 1rem;
  }
  
  .file-drop:hover, .file-drop.dragover {
    border-color: var(--accent);
    background: rgba(0,212,170,0.05);
  }
  
  .file-drop p {
    color: var(--text-muted);
    margin: 0;
  }
  
  .file-drop .filename {
    color: var(--accent);
    margin-top: 0.5rem;
    font-weight: 500;
  }
  
  #fileInput {
    display: none;
  }
  
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--accent);
    color: #0d0d1a;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
  }
  
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  
  .error {
    color: #ff6b6b;
    font-size: 0.85rem;
    margin-top: 0.5rem;
    display: none;
  }
  
  .error.show {
    display: block;
  }
  
  .output-section {
    display: none;
  }
  
  .output-section.show {
    display: block;
  }
  
  .char-count {
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-top: 0.5rem;
  }
  
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  
  .stat {
    text-align: center;
  }
  
  .stat-value {
    color: var(--accent);
    font-size: 1.2rem;
    font-weight: 600;
  }
  
  .stat-label {
    color: var(--text-muted);
    font-size: 0.75rem;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Base64 Encoder/Decoder</h1>
  <p class="subtitle">Encode text, decode base64, or convert files — all client-side</p>
  
  <div class="panel">
    <label for="input">Input</label>
    <textarea id="input" placeholder="Enter text to encode OR base64 string to decode..."></textarea>
    <div class="char-count"><span id="charCount">0</span> characters</div>
    <div class="error" id="error"></div>
    
    <div class="options">
      <label class="checkbox-label">
        <input type="checkbox" id="urlSafe">
        URL-safe mode
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="noPadding">
        No padding (=)
      </label>
    </div>
    
    <div class="buttons">
      <button id="encodeBtn">Encode →</button>
      <button id="decodeBtn">← Decode</button>
      <button class="secondary" id="swapBtn">Swap ↕</button>
      <button class="secondary" id="clearBtn">Clear</button>
      <button class="secondary" id="copyBtn">Copy Output</button>
    </div>
  </div>
  
  <div class="panel output-section" id="outputSection">
    <label for="output">Output</label>
    <textarea id="output" readonly></textarea>
    <div class="char-count"><span id="outCharCount">0</span> characters</div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="encodedSize">-</div>
        <div class="stat-label">Encoded length</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="compressionRatio">-</div>
        <div class="stat-label">Size ratio</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="base64Chunks">-</div>
        <div class="stat-label">64-char chunks</div>
      </div>
    </div>
  </div>
  
  <div class="panel">
    <label>File to Base64</label>
    <div class="file-drop" id="fileDrop">
      <p>Drop a file here or click to browse</p>
      <div class="filename" id="fileName"></div>
    </div>
    <input type="file" id="fileInput">
    <div id="fileOutput" class="output-section" style="margin-top: 1rem;"></div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const urlSafe = document.getElementById('urlSafe');
  const noPadding = document.getElementById('noPadding');
  const error = document.getElementById('error');
  const outputSection = document.getElementById('outputSection');
  const toast = document.getElementById('toast');
  
  // Character count
  input.addEventListener('input', () => {
    document.getElementById('charCount').textContent = input.value.length;
  });
  
  function showError(msg) {
    error.textContent = msg;
    error.classList.add('show');
  }
  
  function hideError() {
    error.classList.remove('show');
  }
  
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
  
  function updateStats(inputStr, outputStr) {
    if (!outputStr) {
      outputSection.classList.remove('show');
      return;
    }
    
    outputSection.classList.add('show');
    document.getElementById('outCharCount').textContent = outputStr.length;
    document.getElementById('encodedSize').textContent = outputStr.length;
    
    // Compression ratio
    const ratio = inputStr.length > 0 ? (outputStr.length / inputStr.length).toFixed(2) : '-';
    document.getElementById('compressionRatio').textContent = ratio + 'x';
    
    // Chunk count
    const chunks = Math.ceil(outputStr.length / 64);
    document.getElementById('base64Chunks').textContent = chunks;
  }
  
  function encode() {
    hideError();
    const str = input.value;
    if (!str) {
      showError('Please enter some text to encode');
      return;
    }
    
    try {
      // Convert string to UTF-8 bytes
      const encoder = new TextEncoder();
      const bytes = encoder.encode(str);
      
      // Convert bytes to binary string
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      
      // Encode to base64
      let result = btoa(binary);
      
      // URL-safe mode
      if (urlSafe.checked) {
        result = result.replace(/\+/g, '-').replace(/\//g, '_');
      }
      
      // Remove padding
      if (noPadding.checked) {
        result = result.replace(/=+$/, '');
      }
      
      output.value = result;
      updateStats(str, result);
    } catch (e) {
      showError('Encoding failed: ' + e.message);
    }
  }
  
  function decode() {
    hideError();
    let str = input.value.trim();
    if (!str) {
      showError('Please enter a base64 string to decode');
      return;
    }
    
    try {
      // Restore padding if needed
      if (noPadding.checked) {
        const pad = str.length % 4;
        if (pad) str += '='.repeat(4 - pad);
      }
      
      // URL-safe mode
      if (urlSafe.checked) {
        str = str.replace(/-/g, '+').replace(/_/g, '/');
      }
      
      // Decode base64
      const binary = atob(str);
      
      // Convert binary string to bytes
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      
      // Decode UTF-8
      const decoder = new TextDecoder('utf-8');
      const result = decoder.decode(bytes);
      
      output.value = result;
      updateStats(str, result);
    } catch (e) {
      showError('Invalid base64 string: ' + e.message);
    }
  }
  
  function swap() {
    const temp = input.value;
    input.value = output.value;
    output.value = temp;
    document.getElementById('charCount').textContent = input.value.length;
    if (output.value) {
      outputSection.classList.add('show');
      document.getElementById('outCharCount').textContent = output.value.length;
    }
  }
  
  function clearAll() {
    input.value = '';
    output.value = '';
    document.getElementById('charCount').textContent = '0';
    outputSection.classList.remove('show');
    hideError();
  }
  
  function copyOutput() {
    if (!output.value) return;
    navigator.clipboard.writeText(output.value).then(() => {
      showToast('Copied!');
    });
  }
  
  // Event listeners
  document.getElementById('encodeBtn').addEventListener('click', encode);
  document.getElementById('decodeBtn').addEventListener('click', decode);
  document.getElementById('swapBtn').addEventListener('click', swap);
  document.getElementById('clearBtn').addEventListener('click', clearAll);
  document.getElementById('copyBtn').addEventListener('click', copyOutput);
  
  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 'Enter') {
        encode();
      }
    }
  });
  
  // File handling
  const fileDrop = document.getElementById('fileDrop');
  const fileInput = document.getElementById('fileInput');
  
  fileDrop.addEventListener('click', () => fileInput.click());
  
  fileDrop.addEventListener('dragover', (e) => {
    e.preventDefault();
    fileDrop.classList.add('dragover');
  });
  
  fileDrop.addEventListener('dragleave', () => {
    fileDrop.classList.remove('dragover');
  });
  
  fileDrop.addEventListener('drop', (e) => {
    e.preventDefault();
    fileDrop.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
  
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });
  
  function handleFile(file) {
    document.getElementById('fileName').textContent = file.name + ' (' + formatBytes(file.size) + ')';
    
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result;
      const resultDiv = document.getElementById('fileOutput');
      resultDiv.classList.add('show');
      resultDiv.innerHTML = `
        <label>Base64 Output</label>
        <textarea readonly>${base64}</textarea>
        <div class="buttons" style="margin-top: 0.5rem">
          <button class="secondary" onclick="navigator.clipboard.writeText('${base64}').then(() => showToast('Copied!'))">Copy</button>
        </div>
      `;
    };
    reader.readAsDataURL(file);
  }
  
  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }
</script>
</body>
</html>
