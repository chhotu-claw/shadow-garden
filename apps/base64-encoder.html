<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode Base64 strings instantly. Useful for API work, data transfer, and debugging.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-mono); }
  .container { max-width: 900px; }
  .panel { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-secondary); }
  textarea { 
    width: 100%; height: 140px; padding: 1rem; 
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--font-mono);
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .buttons { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
  button {
    padding: 0.6rem 1.2rem; border: none; border-radius: 6px;
    cursor: pointer; font-weight: 600; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary { background: var(--bg-secondary); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .status { padding: 0.5rem; border-radius: 4px; font-size: 0.9rem; margin-top: 0.5rem; }
  .status.error { background: #fee; color: #c00; }
  .status.success { background: #efe; color: #060; }
  .help { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Base64 Encoder/Decoder</h1>
  <p class="subtitle">Encode and decode Base64 strings instantly</p>
  
  <div class="panel">
    <label for="input">Input</label>
    <textarea id="input" placeholder="Enter text to encode/decode..."></textarea>
    <div class="buttons">
      <button class="btn-primary" onclick="encode()">Encode</button>
      <button class="btn-primary" onclick="decode()">Decode</button>
      <button class="btn-secondary" onclick="clearAll()">Clear</button>
      <button class="btn-secondary" onclick="copyOutput()">Copy Output</button>
    </div>
    <div id="status" class="status" style="display:none"></div>
  </div>
  
  <div class="panel">
    <label for="output">Output</label>
    <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
    <p class="help">Tip: You can also paste Base64 into the input and click Decode to convert back to plain text.</p>
  </div>
</div>

<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const status = document.getElementById('status');
  
  function showStatus(msg, type) {
    status.textContent = msg;
    status.className = 'status ' + type;
    status.style.display = 'block';
    setTimeout(() => status.style.display = 'none', 3000);
  }
  
  function encode() {
    try {
      const text = input.value;
      if (!text) { showStatus('Please enter some text', 'error'); return; }
      // Handle Unicode properly
      const encoded = btoa(unescape(encodeURIComponent(text)));
      output.value = encoded;
      showStatus('Encoded successfully', 'success');
    } catch (e) {
      showStatus('Error encoding: ' + e.message, 'error');
    }
  }
  
  function decode() {
    try {
      const text = input.value.trim();
      if (!text) { showStatus('Please enter Base64 to decode', 'error'); return; }
      // Handle Unicode properly
      const decoded = decodeURIComponent(escape(atob(text)));
      output.value = decoded;
      showStatus('Decoded successfully', 'success');
    } catch (e) {
      showStatus('Invalid Base64 string', 'error');
    }
  }
  
  function clearAll() {
    input.value = '';
    output.value = '';
    status.style.display = 'none';
  }
  
  function copyOutput() {
    if (!output.value) { showStatus('Nothing to copy', 'error'); return; }
    navigator.clipboard.writeText(output.value).then(() => {
      showStatus('Copied to clipboard', 'success');
    });
  }
</script>
</body>
</html>
