<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder & Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode Base64 instantly. Everything runs locally in your browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e5e5e5; line-height: 1.6; padding: 2rem; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .container { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 1.5rem; margin-top: 1rem; }
  label { display: block; margin-bottom: 0.5rem; color: #888; font-size: 0.9rem; }
  textarea { width: 100%; height: 120px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; color: #e5e5e5; padding: 0.75rem; font-family: monospace; font-size: 0.9rem; resize: vertical; }
  textarea:focus { outline: none; border-color: #6cb6ff; }
  .buttons { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
  button { background: #222; color: #e5e5e5; border: 1px solid #333; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
  button:hover { background: #333; }
  button.primary { background: #1a4d1a; border-color: #2d7a2d; }
  button.primary:hover { background: #256625; }
  .result { margin-top: 1rem; padding: 1rem; background: #1a1a1a; border-radius: 4px; word-break: break-all; font-family: monospace; font-size: 0.9rem; }
  .error { color: #f77a7a; }
  .success { color: #7af782; }
  .copy-btn { margin-top: 0.5rem; }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .tab { background: #222; color: #888; border: 1px solid #333; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
  .tab.active { background: #1a4d1a; color: #e5e5e5; border-color: #2d7a2d; }
  .description { color: #666; font-size: 0.85rem; margin-bottom: 1rem; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Base64 Encoder & Decoder</h1>
    <p class="description">Encode plain text to Base64 or decode Base64 to plain text. Everything runs locally — nothing leaves your browser.</p>
    
    <div class="tabs">
      <button class="tab active" data-mode="encode">Encode</button>
      <button class="tab" data-mode="decode">Decode</button>
    </div>
    
    <label for="input">Input</label>
    <textarea id="input" placeholder="Enter text to encode..."></textarea>
    
    <div class="buttons">
      <button id="convert" class="primary">Convert</button>
      <button id="clear">Clear</button>
      <button id="swap">Swap</button>
    </div>
    
    <label for="output">Output</label>
    <div id="output" class="result"></div>
    <button id="copy" class="copy-btn">Copy to Clipboard</button>
  </div>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const convertBtn = document.getElementById('convert');
    const clearBtn = document.getElementById('clear');
    const swapBtn = document.getElementById('swap');
    const copyBtn = document.getElementById('copy');
    const tabs = document.querySelectorAll('.tab');
    
    let mode = 'encode';
    
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        mode = tab.dataset.mode;
        input.placeholder = mode === 'encode' ? 'Enter text to encode...' : 'Enter Base64 to decode...';
        output.textContent = '';
        output.className = 'result';
      });
    });
    
    convertBtn.addEventListener('click', () => {
      const val = input.value.trim();
      if (!val) {
        output.textContent = 'Please enter some text';
        output.className = 'result error';
        return;
      }
      
      try {
        if (mode === 'encode') {
          const encoded = btoa(unescape(encodeURIComponent(val)));
          output.textContent = encoded;
          output.className = 'result success';
        } else {
          const decoded = decodeURIComponent(escape(atob(val)));
          output.textContent = decoded;
          output.className = 'result success';
        }
      } catch (e) {
        output.textContent = 'Invalid Base64 string';
        output.className = 'result error';
      }
    });
    
    clearBtn.addEventListener('click', () => {
      input.value = '';
      output.textContent = '';
      output.className = 'result';
    });
    
    swapBtn.addEventListener('click', () => {
      const val = input.value.trim();
      const out = output.textContent.trim();
      if (out) {
        input.value = out;
        mode = mode === 'encode' ? 'decode' : 'encode';
        tabs.forEach(t => {
          t.classList.toggle('active', t.dataset.mode === mode);
        });
        input.placeholder = mode === 'encode' ? 'Enter text to encode...' : 'Enter Base64 to decode...';
        output.textContent = '';
        output.className = 'result';
      }
    });
    
    copyBtn.addEventListener('click', async () => {
      const text = output.textContent;
      if (text && !output.classList.contains('error')) {
        try {
          await navigator.clipboard.writeText(text);
          copyBtn.textContent = 'Copied!';
          setTimeout(() => copyBtn.textContent = 'Copy to Clipboard', 1500);
        } catch (e) {
          copyBtn.textContent = 'Failed to copy';
        }
      }
    });
    
    input.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        convertBtn.click();
      }
    });
  </script>
</body>
</html>
