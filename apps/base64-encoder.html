<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode Base64. Simple, fast, client-side.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --preview-size: 120px;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }
  .card {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  label {
    display: block;
    font-weight: 600;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
  }
  textarea {
    width: 100%;
    min-height: 120px;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
    font-size: 0.9rem;
    resize: vertical;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .controls {
    display: flex;
    gap: 0.75rem;
    margin: 1rem 0;
    flex-wrap: wrap;
  }
  button {
    padding: 0.6rem 1.25rem;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: 0.9rem;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
  }
  .btn-primary:hover {
    filter: brightness(1.1);
  }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .stats {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }
  .error {
    color: #ef4444;
    font-size: 0.85rem;
    margin-top: 0.5rem;
    display: none;
  }
  .error.show {
    display: block;
  }
  .mode-toggle {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .mode-toggle button {
    flex: 1;
    padding: 0.5rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .mode-toggle button.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Base64 Encoder/Decoder</h1>
    <p class="subtitle">Encode and decode Base64. Everything runs in your browser.</p>

    <div class="mode-toggle">
      <button id="encodeMode" class="active" onclick="setMode('encode')">Encode</button>
      <button id="decodeMode" onclick="setMode('decode')">Decode</button>
    </div>

    <div class="card">
      <label id="inputLabel" for="input">Text to encode</label>
      <textarea id="input" placeholder="Enter text here..."></textarea>
      <div class="stats" id="inputStats"></div>
      <div class="error" id="error"></div>
    </div>

    <div class="controls">
      <button class="btn-primary" onclick="process()">Convert</button>
      <button class="btn-secondary" onclick="swap()">Swap</button>
      <button class="btn-secondary" onclick="copyOutput()">Copy</button>
      <button class="btn-secondary" onclick="clearAll()">Clear</button>
    </div>

    <div class="card">
      <label id="outputLabel" for="output">Base64 output</label>
      <textarea id="output" placeholder="Result will appear here..." readonly></textarea>
      <div class="stats" id="outputStats"></div>
    </div>
  </div>

  <script>
    let mode = 'encode';
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const error = document.getElementById('error');
    const inputLabel = document.getElementById('inputLabel');
    const outputLabel = document.getElementById('outputLabel');

    function setMode(newMode) {
      mode = newMode;
      document.getElementById('encodeMode').classList.toggle('active', mode === 'encode');
      document.getElementById('decodeMode').classList.toggle('active', mode === 'decode');
      inputLabel.textContent = mode === 'encode' ? 'Text to encode' : 'Base64 to decode';
      outputLabel.textContent = mode === 'encode' ? 'Base64 output' : 'Decoded text';
      output.value = '';
      error.classList.remove('show');
    }

    function process() {
      error.classList.remove('show');
      const value = input.value;

      if (!value) {
        output.value = '';
        return;
      }

      try {
        if (mode === 'encode') {
          // Encode text to Base64
          const encoder = new TextEncoder();
          const bytes = encoder.encode(value);
          let binary = '';
          bytes.forEach(b => binary += String.fromCharCode(b));
          output.value = btoa(binary);
        } else {
          // Decode Base64 to text
          const binary = atob(value);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
          }
          const decoder = new TextDecoder();
          output.value = decoder.decode(bytes);
        }
      } catch (e) {
        error.textContent = 'Invalid input: ' + e.message;
        error.classList.add('show');
        output.value = '';
      }
    }

    function swap() {
      const temp = input.value;
      input.value = output.value;
      output.value = temp;
      mode = mode === 'encode' ? 'decode' : 'encode';
      setMode(mode);
    }

    function copyOutput() {
      if (output.value) {
        navigator.clipboard.writeText(output.value);
      }
    }

    function clearAll() {
      input.value = '';
      output.value = '';
      error.classList.remove('show');
    }

    // Auto-update stats
    input.addEventListener('input', () => {
      const len = input.value.length;
      document.getElementById('inputStats').textContent = len ? `${len} characters` : '';
    });

    output.addEventListener('input', () => {
      const len = output.value.length;
      document.getElementById('outputStats').textContent = len ? `${len} characters` : '';
    });

    // Process on Ctrl+Enter
    input.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') process();
    });
  </script>
</body>
</html>
