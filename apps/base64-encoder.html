<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder/Decoder — Shadow's Garden</title>
<meta name="description" content="Encode and decode Base64 strings instantly. Bidirectional conversion with copy buttons.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
  textarea, input[type="text"] { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-family: monospace; font-size: 0.9rem; box-sizing: border-box; }
  textarea { min-height: 120px; resize: vertical; }
  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
  button { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.85rem; transition: background 0.2s; }
  button:hover { background: var(--border); }
  button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  button.primary:hover { opacity: 0.9; }
  .error { color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
  .error.show { display: block; }
  .mode-switch { display: flex; gap: 1rem; margin-bottom: 1rem; }
  .mode-switch label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-weight: normal; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Base64 Encoder/Decoder</h1>
  <div class="subtitle">Encode plain text to Base64 or decode Base64 back to text</div>
  
  <div class="panel">
    <div class="mode-switch">
      <label><input type="radio" name="mode" value="encode" checked> Encode</label>
      <label><input type="radio" name="mode" value="decode"> Decode</label>
    </div>
    <label id="inputLabel">Plain Text</label>
    <textarea id="input" placeholder="Enter text to encode..."></textarea>
    <div class="btn-row">
      <button class="primary" id="convertBtn">Convert</button>
      <button id="clearBtn">Clear</button>
      <button id="sampleBtn">Sample</button>
    </div>
    <div class="error" id="error"></div>
  </div>

  <div class="panel">
    <label id="outputLabel">Base64 Output</label>
    <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
    <div class="btn-row">
      <button id="copyBtn">Copy to Clipboard</button>
    </div>
  </div>
</div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const error = document.getElementById('error');
const modeRadios = document.querySelectorAll('input[name="mode"]');
const inputLabel = document.getElementById('inputLabel');
const outputLabel = document.getElementById('outputLabel');

function getMode() {
  return document.querySelector('input[name="mode"]:checked').value;
}

function updateLabels() {
  const mode = getMode();
  inputLabel.textContent = mode === 'encode' ? 'Plain Text' : 'Base64 Input';
  outputLabel.textContent = mode === 'encode' ? 'Base64 Output' : 'Decoded Text';
  input.placeholder = mode === 'encode' ? 'Enter text to encode...' : 'Enter Base64 to decode...';
}

modeRadios.forEach(radio => {
  radio.addEventListener('change', updateLabels);
});

document.getElementById('convertBtn').addEventListener('click', () => {
  error.classList.remove('show');
  const text = input.value;
  const mode = getMode();
  
  if (!text) {
    output.value = '';
    return;
  }
  
  try {
    if (mode === 'encode') {
      output.value = btoa(unescape(encodeURIComponent(text)));
    } else {
      output.value = decodeURIComponent(escape(atob(text)));
    }
  } catch (e) {
    error.textContent = 'Invalid Base64 string';
    error.classList.add('show');
    output.value = '';
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  input.value = '';
  output.value = '';
  error.classList.remove('show');
});

document.getElementById('sampleBtn').addEventListener('click', () => {
  const sample = "Hello, World! 🌍";
  input.value = sample;
  document.querySelector('input[name="mode"][value="encode"]').checked = true;
  updateLabels();
  document.getElementById('convertBtn').click();
});

document.getElementById('copyBtn').addEventListener('click', () => {
  if (output.value) {
    navigator.clipboard.writeText(output.value);
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy to Clipboard', 1500);
  }
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) {
    document.getElementById('convertBtn').click();
  }
});
</script>
</body>
</html>
