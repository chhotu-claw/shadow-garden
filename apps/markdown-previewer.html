<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Previewer — Shadow's Garden</title>
<meta name="description" content="Write Markdown, see it rendered in real-time. Split view with live preview, all local.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 0; }
  .header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; gap: 1rem; align-items: center; flex-shrink: 0; }
  .container { display: flex; flex: 1; overflow: hidden; }
  .editor, .preview { flex: 1; padding: 1rem; overflow-y: auto; }
  .editor { border-right: 1px solid var(--border); }
  textarea { width: 100%; height: 100%; border: none; resize: none; background: var(--bg); color: var(--fg); font-family: 'Fira Code', monospace; font-size: 14px; outline: none; }
  .preview { background: var(--bg-secondary); }
  .preview h1, .preview h2, .preview h3 { margin-top: 1em; }
  .preview h1:first-child { margin-top: 0; }
  .preview p { margin: 0.8em 0; line-height: 1.6; }
  .preview code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-family: 'Fira Code', monospace; font-size: 0.9em; }
  .preview pre { background: var(--bg); padding: 1rem; border-radius: 8px; overflow-x: auto; }
  .preview pre code { padding: 0; background: none; }
  .preview ul, .preview ol { padding-left: 1.5em; }
  .preview blockquote { border-left: 3px solid var(--accent); margin: 1em 0; padding-left: 1em; color: var(--fg-muted); }
  .preview a { color: var(--accent); }
  .preview img { max-width: 100%; border-radius: 8px; }
  .preview table { border-collapse: collapse; width: 100%; margin: 1em 0; }
  .preview th, .preview td { border: 1px solid var(--border); padding: 8px; text-align: left; }
  .preview th { background: var(--bg); }
  .toolbar { display: flex; gap: 0.5rem; }
  button { background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 14px; }
  button:hover { background: var(--bg-secondary); }
  .title { font-weight: 600; }
</style>
</head>
<body data-page-type="app">
  <div class="header">
    <span class="title">Markdown Previewer</span>
    <div class="toolbar">
      <button id="loadBtn">Load Sample</button>
      <button id="clearBtn">Clear</button>
      <button id="downloadBtn">Download HTML</button>
    </div>
  </div>
  <div class="container">
    <div class="editor">
      <textarea id="editor" placeholder="Type your Markdown here..."># Welcome

Start typing Markdown on the left, see it rendered on the right.

## Features
- **Bold** and *italic* text
- Code blocks with syntax
- Lists, blockquotes, links
- Tables and images

```javascript
// Code blocks work too
const greeting = "Hello, world!";
```

> This is a blockquote

| Feature | Status |
|---------|--------|
| Live preview | ✅ |
| Local only | ✅ |
</textarea>
    </div>
    <div class="preview" id="preview"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const loadBtn = document.getElementById('loadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    marked.setOptions({ breaks: true, gfm: true });

    function update() {
      preview.innerHTML = marked.parse(editor.value);
    }

    editor.addEventListener('input', update);

    loadBtn.addEventListener('click', () => {
      editor.value = `# Getting Started

Write **Markdown** on the left, see the result on the right.

## Quick Reference

### Text Formatting
- **Bold**: \`**text**\`
- *Italic*: \`*text*\`
- \`Code\`: \\\`code\\\`

### Lists
1. Ordered item
2. Another item

- Unordered item
- Another item

### Links & Images
[Link text](https://example.com)

### Blockquotes
> This is a blockquote

### Code
\`\`\`python
def hello():
    print("Hello!")
\`\`\`

---

*Start typing to see your Markdown rendered live!*
`;
      update();
    });

    clearBtn.addEventListener('click', () => {
      editor.value = '';
      update();
    });

    downloadBtn.addEventListener('click', () => {
      const html = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Exported</title></head>
<body>${preview.innerHTML}</body>
</html>`;
      const blob = new Blob([html], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'markdown-export.html';
      a.click();
    });

    update();
  </script>
</body>
</html>
