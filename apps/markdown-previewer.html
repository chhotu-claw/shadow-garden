<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Previewer — Shadow's Garden</title>
<meta name="description" content="Write markdown, see it render live. Split view with syntax highlighting.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --accent: #58a6ff;
    --code-bg: #0d1117;
  }
  
  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    height: 100vh;
    overflow: hidden;
  }
  
  .container {
    display: flex;
    height: 100vh;
    flex-direction: column;
  }
  
  header {
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }
  
  .actions {
    display: flex;
    gap: 10px;
  }
  
  button {
    background: var(--border);
    color: var(--text);
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: background 0.2s;
  }
  
  button:hover {
    background: var(--accent);
    color: #000;
  }
  
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  
  .editor, .preview {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .editor {
    border-right: 1px solid var(--border);
  }
  
  .label {
    padding: 8px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8b949e;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  
  textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: none;
    padding: 16px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    outline: none;
  }
  
  textarea::placeholder {
    color: #484f58;
  }
  
  .preview-content {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    background: var(--bg);
  }
  
  .preview-content h1,
  .preview-content h2,
  .preview-content h3,
  .preview-content h4,
  .preview-content h5,
  .preview-content h6 {
    margin: 20px 0 10px;
    color: #f0f6fc;
  }
  
  .preview-content h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .preview-content h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .preview-content h3 { font-size: 1.25em; }
  
  .preview-content p { margin: 12px 0; line-height: 1.7; }
  
  .preview-content a { color: var(--accent); }
  
  .preview-content code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
  }
  
  .preview-content pre {
    background: var(--panel);
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
  }
  
  .preview-content pre code {
    background: none;
    padding: 0;
  }
  
  .preview-content blockquote {
    border-left: 4px solid var(--accent);
    margin: 16px 0;
    padding-left: 16px;
    color: #8b949e;
  }
  
  .preview-content ul, .preview-content ol {
    padding-left: 24px;
    margin: 12px 0;
  }
  
  .preview-content li { margin: 6px 0; }
  
  .preview-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }
  
  .preview-content table {
    border-collapse: collapse;
    width: 100%;
    margin: 16px 0;
  }
  
  .preview-content th,
  .preview-content td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  
  .preview-content th {
    background: var(--panel);
  }
  
  .preview-content img {
    max-width: 100%;
    border-radius: 8px;
  }
  
  .toggle {
    display: none;
  }
  
  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .editor { border-right: none; border-bottom: 1px solid var(--border); }
    .toggle { display: block; }
    .editor, .preview { flex: none; height: 50%; }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <header>
      <h1>Markdown Previewer</h1>
      <div class="actions">
        <button id="copyBtn">Copy HTML</button>
        <button id="downloadBtn">Download</button>
        <button id="clearBtn">Clear</button>
      </div>
    </header>
    <div class="main">
      <div class="editor">
        <div class="label">Markdown</div>
        <textarea id="editor" placeholder="# Start writing markdown...

## Examples:
- **bold** and *italic*
- [links](https://example.com)
- `inline code`
- ```code blocks```
- > blockquotes
- Lists and more!"></textarea>
      </div>
      <div class="preview">
        <div class="label">Preview</div>
        <div class="preview-content" id="preview"></div>
      </div>
    </div>
  </div>

<script>
// Simple markdown parser
function parseMarkdown(text) {
  if (!text) return '<p style="color:#484f58">Preview will appear here...</p>';
  
  let html = text
    // Escape HTML
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    
    // Code blocks (must be before inline code)
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    
    // Headers
    .replace(/^###### (.+)$/gm, '<h6>$1</h6>')
    .replace(/^##### (.+)$/gm, '<h5>$1</h5>')
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    
    // Bold and italic
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/___(.+?)___/g, '<strong><em>$1</em></strong>')
    .replace(/__(.+?)__/g, '<strong>$1</strong>')
    .replace(/_(.+?)_/g, '<em>$1</em>')
    
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    
    // Images
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
    
    // Blockquotes
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    
    // Horizontal rules
    .replace(/^---$/gm, '<hr>')
    .replace(/^\*\*\*$/gm, '<hr>')
    
    // Unordered lists
    .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
    
    // Ordered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    
    // Line breaks (double newline = paragraph)
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  
  // Wrap list items
  html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');
  
  // Wrap blockquotes (merge consecutive)
  html = html.replace(/<\/blockquote>\s*<blockquote>/g, '<br>');
  
  return `<p>${html}</p>`;
}

const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

function update() {
  preview.innerHTML = parseMarkdown(editor.value);
  localStorage.setItem('md-preview-content', editor.value);
}

editor.addEventListener('input', update);

// Load saved content
const saved = localStorage.getItem('md-preview-content');
if (saved) {
  editor.value = saved;
  update();
}

// Clear button
document.getElementById('clearBtn').addEventListener('click', () => {
  editor.value = '';
  update();
});

// Copy HTML button
document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(preview.innerHTML).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy HTML', 1500);
  });
});

// Download button
document.getElementById('downloadBtn').addEventListener('click', () => {
  const blob = new Blob([preview.innerHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'markdown-export.html';
  a.click();
  URL.revokeObjectURL(url);
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    document.getElementById('downloadBtn').click();
  }
});
</script>
</body>
</html>
