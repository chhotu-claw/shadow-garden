<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure passwords with customizable length and character types">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .generator {
    max-width: 500px;
    margin: 0 auto;
    padding: 2rem;
  }
  .card {
    background: var(--card-bg, #1e1e2e);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border, #313244);
  }
  .password-display {
    background: var(--result-bg, #181825);
    padding: 1.25rem;
    border-radius: 8px;
    font-family: 'Fira Code', monospace;
    font-size: 1.25rem;
    word-break: break-all;
    min-height: 3.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .password-display:hover {
    background: var(--button-bg, #313244);
  }
  .password-display .copied {
    position: absolute;
    top: 0.5rem;
    right: 0.75rem;
    font-size: 0.75rem;
    color: var(--accent, #cba6f7);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .password-display.copied .copied {
    opacity: 1;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .control-group label {
    font-size: 0.9rem;
    color: var(--text-secondary, #a6adc8);
  }
  .slider-container {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  input[type="range"] {
    flex: 1;
    height: 6px;
    -webkit-appearance: none;
    background: var(--border, #313244);
    border-radius: 3px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: var(--accent, #cba6f7);
    border-radius: 50%;
    cursor: pointer;
  }
  .length-value {
    min-width: 2.5rem;
    text-align: center;
    font-weight: 600;
    color: var(--accent, #cba6f7);
  }
  .checkbox-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
  }
  .checkbox-item input {
    width: 18px;
    height: 18px;
    accent-color: var(--accent, #cba6f7);
    cursor: pointer;
  }
  .checkbox-item span {
    font-size: 0.9rem;
  }
  button {
    padding: 0.875rem;
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:hover {
    opacity: 0.9;
  }
  button:active {
    transform: scale(0.98);
  }
  .strength-meter {
    margin-top: 1rem;
  }
  .strength-bar {
    height: 6px;
    background: var(--border, #313244);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }
  .strength-fill {
    height: 100%;
    width: 0%;
    transition: width 0.3s, background 0.3s;
    border-radius: 3px;
  }
  .strength-label {
    font-size: 0.85rem;
    color: var(--text-secondary, #a6adc8);
    display: flex;
    justify-content: space-between;
  }
  .presets {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .preset-btn {
    padding: 0.5rem 0.75rem;
    font-size: 0.8rem;
    background: var(--button-bg, #313244);
    color: var(--text, #cdd6f4);
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .preset-btn:hover {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .history {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border, #313244);
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    font-size: 0.85rem;
    color: var(--text-secondary, #a6adc8);
    border-bottom: 1px solid var(--border, #313244);
  }
  .history-item:last-child {
    border-bottom: none;
  }
  .history-password {
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    word-break: break-all;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-copy {
    font-size: 0.75rem;
    color: var(--accent, #cba6f7);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
  }
  .clear-history {
    font-size: 0.8rem;
    color: var(--text-secondary, #a6adc8);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    margin-top: 0.5rem;
  }
</style>
</head>
<body data-page-type="app">
<div class="generator">
  <h1>🔐 Password Generator</h1>
  
  <div class="card">
    <div class="password-display" id="password-display" onclick="copyPassword()">
      <span class="copied" id="copied-text">Copied!</span>
      <span id="password-text">Click generate</span>
    </div>
    
    <div class="strength-meter">
      <div class="strength-bar">
        <div class="strength-fill" id="strength-fill"></div>
      </div>
      <div class="strength-label">
        <span>Strength</span>
        <span id="strength-text">-</span>
      </div>
    </div>
  </div>

  <div class="card controls">
    <div class="control-group">
      <label>Length: <span class="length-value" id="length-value">16</span></label>
      <div class="slider-container">
        <input type="range" id="length-slider" min="4" max="64" value="16">
      </div>
    </div>

    <div class="control-group">
      <label>Character Types</label>
      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" id="uppercase" checked>
          <span>ABC (uppercase)</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="lowercase" checked>
          <span>abc (lowercase)</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="numbers" checked>
          <span>123 (numbers)</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="symbols" checked>
          <span>!@# (symbols)</span>
        </label>
      </div>
    </div>

    <div class="presets">
      <button class="preset-btn" onclick="setPreset(8, false)">Short (8)</button>
      <button class="preset-btn" onclick="setPreset(12, true)">Standard (12)</button>
      <button class="preset-btn" onclick="setPreset(16, true)">Strong (16)</button>
      <button class="preset-btn" onclick="setPreset(24, true)">Very Strong (24)</button>
      <button class="preset-btn" onclick="setPreset(32, true)">Paranoid (32)</button>
    </div>

    <button onclick="generate()">Generate Password</button>
  </div>

  <div class="history" id="history-section" style="display:none">
    <h3>Recent Passwords</h3>
    <div id="history-list"></div>
    <button class="clear-history" onclick="clearHistory()">Clear History</button>
  </div>
</div>

<script>
  const CHAR_SETS = {
    uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lowercase: 'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };

  let history = JSON.parse(localStorage.getItem('pwdHistory') || '[]');
  let currentPassword = '';

  function setPreset(length, allTypes) {
    document.getElementById('length-slider').value = length;
    document.getElementById('length-value').textContent = length;
    document.getElementById('uppercase').checked = allTypes;
    document.getElementById('lowercase').checked = allTypes;
    document.getElementById('numbers').checked = allTypes;
    document.getElementById('symbols').checked = allTypes;
    generate();
  }

  function generate() {
    const length = parseInt(document.getElementById('length-slider').value);
    const useUpper = document.getElementById('uppercase').checked;
    const useLower = document.getElementById('lowercase').checked;
    const useNumbers = document.getElementById('numbers').checked;
    const useSymbols = document.getElementById('symbols').checked;

    let chars = '';
    let mustHave = [];
    
    if (useUpper) { chars += CHAR_SETS.uppercase; mustHave.push(CHAR_SETS.uppercase); }
    if (useLower) { chars += CHAR_SETS.lowercase; mustHave.push(CHAR_SETS.lowercase); }
    if (useNumbers) { chars += CHAR_SETS.numbers; mustHave.push(CHAR_SETS.numbers); }
    if (useSymbols) { chars += CHAR_SETS.symbols; mustHave.push(CHAR_SETS.symbols); }

    if (!chars) {
      alert('Select at least one character type');
      return;
    }

    // Generate password ensuring at least one char from each selected set
    let password = '';
    mustHave.forEach(set => {
      password += set[Math.floor(Math.random() * set.length)];
    });
    
    while (password.length < length) {
      password += chars[Math.floor(Math.random() * chars.length)];
    }
    
    // Shuffle
    password = password.split('').sort(() => Math.random() - 0.5).join('');
    
    currentPassword = password;
    document.getElementById('password-text').textContent = password;
    updateStrength(password);
    addToHistory(password);
  }

  function updateStrength(password) {
    let score = 0;
    const len = password.length;
    
    if (len >= 8) score++;
    if (len >= 12) score++;
    if (len >= 16) score++;
    if (len >= 24) score++;
    
    if (/[a-z]/.test(password)) score += 0.5;
    if (/[A-Z]/.test(password)) score += 0.5;
    if (/[0-9]/.test(password)) score += 0.5;
    if (/[^a-zA-Z0-9]/.test(password)) score += 1;
    
    const maxScore = 6;
    const percentage = Math.min(100, (score / maxScore) * 100);
    const fill = document.getElementById('strength-fill');
    const text = document.getElementById('strength-text');
    
    fill.style.width = percentage + '%';
    
    if (score < 2) {
      fill.style.background = '#f38ba8';
      text.textContent = 'Weak';
    } else if (score < 4) {
      fill.style.background = '#fab387';
      text.textContent = 'Fair';
    } else if (score < 5) {
      fill.style.background = '#f9e2af';
      text.textContent = 'Good';
    } else {
      fill.style.background = '#a6e3a1';
      text.textContent = 'Strong';
    }
  }

  function copyPassword() {
    if (!currentPassword) return;
    navigator.clipboard.writeText(currentPassword).then(() => {
      const display = document.getElementById('password-display');
      display.classList.add('copied');
      setTimeout(() => display.classList.remove('copied'), 1500);
    });
  }

  function addToHistory(password) {
    // Avoid duplicates
    if (history.length > 0 && history[0].pwd === password) return;
    
    history.unshift({ pwd: password, time: Date.now() });
    if (history.length > 10) history.pop();
    localStorage.setItem('pwdHistory', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('history-section');
    const list = document.getElementById('history-list');
    if (history.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';
    list.innerHTML = history.map((h, i) => `
      <div class="history-item">
        <span class="history-password">${h.pwd}</span>
        <button class="history-copy" onclick="copyFromHistory(${i})">Copy</button>
      </div>
    `).join('');
  }

  function copyFromHistory(index) {
    navigator.clipboard.writeText(history[index].pwd);
  }

  function clearHistory() {
    history = [];
    localStorage.setItem('pwdHistory', '[]');
    renderHistory();
  }

  // Update length display on slider change
  document.getElementById('length-slider').addEventListener('input', (e) => {
    document.getElementById('length-value').textContent = e.target.value;
  });

  renderHistory();
  generate();
</script>
</body>
</html>
