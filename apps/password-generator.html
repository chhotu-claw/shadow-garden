<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure passwords with customizable options — all local, no server.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .generator { background: var(--card-bg, #1a1a2e); padding: 2rem; border-radius: 12px; width: 100%; max-width: 480px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  h1 { margin: 0 0 1.5rem 0; font-size: 1.5rem; text-align: center; }
  .password-display { position: relative; margin-bottom: 1.5rem; }
  #password { width: 100%; padding: 1rem; font-size: 1.1rem; font-family: monospace; background: var(--input-bg, #0f0f1a); color: var(--text, #eee); border: 1px solid var(--border, #333); border-radius: 8px; text-align: center; letter-spacing: 0.05em; }
  .copy-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); padding: 0.4rem 0.8rem; background: var(--accent, #646cff); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
  .copy-btn:hover { opacity: 0.9; }
  .options { display: grid; gap: 1rem; }
  .option-row { display: flex; justify-content: space-between; align-items: center; }
  .option-label { font-size: 0.95rem; }
  .option-value { font-size: 0.9rem; color: var(--text-muted, #888); margin-left: 0.5rem; }
  input[type="range"] { width: 100%; margin-top: 0.5rem; accent-color: var(--accent, #646cff); }
  .checkboxes { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
  .checkbox-label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.9rem; }
  .checkbox-label input { accent-color: var(--accent, #646cff); }
  .strength-bar { height: 6px; background: var(--border, #333); border-radius: 3px; margin-top: 1rem; overflow: hidden; }
  .strength-fill { height: 100%; width: 0%; transition: width 0.3s, background 0.3s; border-radius: 3px; }
  .strength-label { font-size: 0.85rem; color: var(--text-muted, #888); margin-top: 0.5rem; text-align: center; }
  .generate-btn { width: 100%; padding: 1rem; margin-top: 1.5rem; background: var(--accent, #646cff); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: opacity 0.2s; }
  .generate-btn:hover { opacity: 0.9; }
  @media (max-width: 500px) { .generator { padding: 1.5rem; } .checkboxes { grid-template-columns: 1fr; } }
</style>
</head>
<body data-page-type="app">
  <div class="generator">
    <h1>🔐 Password Generator</h1>
    
    <div class="password-display">
      <input type="text" id="password" readonly value="">
      <button class="copy-btn" id="copy-btn">Copy</button>
    </div>
    
    <div class="strength-bar">
      <div class="strength-fill" id="strength-fill"></div>
    </div>
    <div class="strength-label" id="strength-label">Click generate</div>
    
    <div class="options">
      <div class="option-row">
        <span class="option-label">Length</span>
        <span class="option-value" id="length-value">16</span>
      </div>
      <input type="range" id="length" min="8" max="64" value="16">
      
      <div class="checkboxes">
        <label class="checkbox-label">
          <input type="checkbox" id="uppercase" checked> Uppercase (A-Z)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="lowercase" checked> Lowercase (a-z)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="numbers" checked> Numbers (0-9)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="symbols" checked> Symbols (!@#$)
        </label>
      </div>
    </div>
    
    <button class="generate-btn" id="generate-btn">Generate Password</button>
  </div>
  
  <script>
    const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lowercase = 'abcdefghijklmnopqrstuvwxyz';
    const numbers = '0123456789';
    const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
    
    const passwordEl = document.getElementById('password');
    const lengthEl = document.getElementById('length');
    const lengthValue = document.getElementById('length-value');
    const uppercaseEl = document.getElementById('uppercase');
    const lowercaseEl = document.getElementById('lowercase');
    const numbersEl = document.getElementById('numbers');
    const symbolsEl = document.getElementById('symbols');
    const generateBtn = document.getElementById('generate-btn');
    const copyBtn = document.getElementById('copy-btn');
    const strengthFill = document.getElementById('strength-fill');
    const strengthLabel = document.getElementById('strength-label');
    
    function getCharset() {
      let chars = '';
      if (uppercaseEl.checked) chars += uppercase;
      if (lowercaseEl.checked) chars += lowercase;
      if (numbersEl.checked) chars += numbers;
      if (symbolsEl.checked) chars += symbols;
      return chars || lowercase;
    }
    
    function generatePassword() {
      const length = parseInt(lengthEl.value);
      const charset = getCharset();
      let password = '';
      
      // Ensure at least one character from each selected type
      let guaranteed = [];
      if (uppercaseEl.checked) guaranteed.push(uppercase[Math.floor(Math.random() * uppercase.length)]);
      if (lowercaseEl.checked) guaranteed.push(lowercase[Math.floor(Math.random() * lowercase.length)]);
      if (numbersEl.checked) guaranteed.push(numbers[Math.floor(Math.random() * numbers.length)]);
      if (symbolsEl.checked) guaranteed.push(symbols[Math.floor(Math.random() * symbols.length)]);
      
      // Fill rest randomly
      for (let i = guaranteed.length; i < length; i++) {
        password += charset[Math.floor(Math.random() * charset.length)];
      }
      
      // Shuffle: add guaranteed chars then shuffle the whole thing
      password = (guaranteed.join('') + password).split('');
      for (let i = password.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [password[i], password[j]] = [password[j], password[i]];
      }
      password = password.join('');
      
      passwordEl.value = password;
      updateStrength(password);
    }
    
    function updateStrength(password) {
      let score = 0;
      const len = password.length;
      
      if (len >= 8) score += 1;
      if (len >= 12) score += 1;
      if (len >= 16) score += 1;
      if (len >= 24) score += 1;
      
      if (/[a-z]/.test(password)) score += 1;
      if (/[A-Z]/.test(password)) score += 1;
      if (/[0-9]/.test(password)) score += 1;
      if (/[^a-zA-Z0-9]/.test(password)) score += 2;
      
      // Penalty for repeating characters
      if (/(.)\1{2,}/.test(password)) score -= 1;
      
      // Penalty for sequential
      if (/abc|def|ghi|jkl|mno|pqr|stu|vwx|xyz/.test(password.toLowerCase())) score -= 1;
      
      score = Math.max(0, Math.min(10, score));
      
      let color, label, width;
      if (score <= 3) { color = '#ef4444'; label = 'Weak'; width = (score / 10) * 100; }
      else if (score <= 6) { color = '#f59e0b'; label = 'Medium'; width = (score / 10) * 100; }
      else { color = '#22c55e'; label = 'Strong'; width = (score / 10) * 100; }
      
      strengthFill.style.background = color;
      strengthFill.style.width = width + '%';
      strengthLabel.textContent = label + ' (' + score + '/10)';
    }
    
    lengthEl.addEventListener('input', () => { lengthValue.textContent = lengthEl.value; });
    generateBtn.addEventListener('click', generatePassword);
    
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(passwordEl.value);
      copyBtn.textContent = 'Copied!';
      setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
    });
    
    // Generate on load
    generatePassword();
  </script>
</body>
</html>
