<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure, customizable passwords. Length, character types, exclude ambiguous chars — all client-side.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 520px; margin: 0 auto; padding: 2rem 1rem; }
  .password-display {
    background: var(--bg-secondary);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.25rem;
    word-break: break-all;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    margin-bottom: 1rem;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .password-display:hover { border-color: var(--accent); }
  .password-display.copied { border-color: #22c55e; }
  .controls { display: flex; flex-direction: column; gap: 1rem; }
  .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
  .control-group label { font-weight: 500; color: var(--text-secondary); }
  .slider-container { display: flex; align-items: center; gap: 1rem; }
  input[type="range"] { flex: 1; accent-color: var(--accent); }
  .length-value { 
    background: var(--bg-secondary); 
    padding: 0.25rem 0.75rem; 
    border-radius: 4px; 
    font-weight: 600;
    min-width: 40px;
    text-align: center;
  }
  .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .checkbox-item { 
    display: flex; 
    align-items: center; 
    gap: 0.5rem; 
    cursor: pointer;
  }
  .checkbox-item input { accent-color: var(--accent); width: 18px; height: 18px; }
  .checkbox-item span { font-size: 0.9rem; }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn-secondary {
    background: var(--bg-secondary);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .strength-bar {
    height: 8px;
    border-radius: 4px;
    background: var(--bg-secondary);
    overflow: hidden;
    margin-top: 0.5rem;
  }
  .strength-fill {
    height: 100%;
    width: 0%;
    transition: width 0.3s, background-color 0.3s;
  }
  .strength-label {
    font-size: 0.85rem;
    margin-top: 0.25rem;
    font-weight: 500;
  }
  .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .entropy { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Password Generator</h1>
  <div class="password-display" id="passwordDisplay" title="Click to copy">
    Click generate
  </div>
  <div class="strength-bar">
    <div class="strength-fill" id="strengthFill"></div>
  </div>
  <div class="strength-label" id="strengthLabel"></div>
  <div class="entropy" id="entropy"></div>
  
  <div class="controls">
    <div class="control-group">
      <label>Length</label>
      <div class="slider-container">
        <input type="range" id="length" min="8" max="128" value="20">
        <span class="length-value" id="lengthValue">20</span>
      </div>
    </div>
    
    <div class="control-group">
      <label>Character Types</label>
      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" id="uppercase" checked>
          <span>ABC (uppercase)</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="lowercase" checked>
          <span>abc (lowercase)</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="numbers" checked>
          <span>123 (numbers)</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="symbols" checked>
          <span>!@# (symbols)</span>
        </label>
      </div>
    </div>
    
    <div class="control-group">
      <label>Options</label>
      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" id="excludeAmbiguous" checked>
          <span>Exclude 0O1lI</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="excludeSequential" checked>
          <span>No abc/123 sequences</span>
        </label>
      </div>
    </div>
    
    <button class="btn" id="generateBtn">Generate Password</button>
    <div class="actions">
      <button class="btn btn-secondary" id="copyBtn">Copy</button>
    </div>
  </div>
</div>

<script>
const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const lowercase = 'abcdefghijklmnopqrstuvwxyz';
const numbers = '0123456789';
const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
const ambiguous = '0O1lI';
const sequential = ['abcdefghijklmnopqrstuvwxyz', '0123456789', 'qwertyuiop', 'asdfghjkl', 'zxcvbnm'];

let currentPassword = '';

function getCharset() {
  let chars = '';
  if (document.getElementById('uppercase').checked) chars += uppercase;
  if (document.getElementById('lowercase').checked) chars += lowercase;
  if (document.getElementById('numbers').checked) chars += numbers;
  if (document.getElementById('symbols').checked) chars += symbols;
  
  if (document.getElementById('excludeAmbiguous').checked) {
    chars = chars.split('').filter(c => !ambiguous.includes(c)).join('');
  }
  
  return chars;
}

function calculateEntropy(password, charsetSize) {
  if (!password || charsetSize === 0) return 0;
  return password.length * Math.log2(charsetSize);
}

function getStrength(entropy) {
  if (entropy < 28) return { label: 'Weak', color: '#ef4444', width: '25%' };
  if (entropy < 36) return { label: 'Fair', color: '#f59e0b', width: '50%' };
  if (entropy < 60) return { label: 'Good', color: '#22c55e', width: '75%' };
  return { label: 'Strong', color: '#10b981', width: '100%' };
}

function removeSequential(str) {
  let result = str;
  for (const seq of sequential) {
    for (let len = 3; len <= seq.length; len++) {
      for (let i = 0; i <= seq.length - len; i++) {
        const subseq = seq.substring(i, i + len);
        const revseq = subseq.split('').reverse().join('');
        result = result.replace(new RegExp(subseq, 'gi'), '');
        result = result.replace(new RegExp(revseq, 'gi'), '');
      }
    }
  }
  return result;
}

function generate() {
  let charset = getCharset();
  const length = parseInt(document.getElementById('length').value);
  
  if (!charset) {
    document.getElementById('passwordDisplay').textContent = 'Select at least one character type';
    return;
  }
  
  let password = '';
  const excludeSeq = document.getElementById('excludeSequential').checked;
  
  // Generate password ensuring at least one char from each selected type
  const types = [];
  if (document.getElementById('uppercase').checked) types.push(uppercase);
  if (document.getElementById('lowercase').checked) types.push(lowercase);
  if (document.getElementById('numbers').checked) types.push(numbers);
  if (document.getElementById('symbols').checked) types.push(symbols);
  
  let filteredTypes = types;
  if (document.getElementById('excludeAmbiguous').checked) {
    filteredTypes = filteredTypes.map(t => t.split('').filter(c => !ambiguous.includes(c)).join(''));
  }
  
  // Add one character from each type
  for (const type of filteredTypes) {
    if (type) password += type[Math.floor(Math.random() * type.length)];
  }
  
  // Fill the rest
  while (password.length < length) {
    password += charset[Math.floor(Math.random() * charset.length)];
  }
  
  // Shuffle
  password = password.split('').sort(() => Math.random() - 0.5).join('');
  
  // Remove sequential if requested
  if (excludeSeq) {
    password = removeSequential(password);
    // Regenerate if too short after removal
    while (password.length < length && charset) {
      password += charset[Math.floor(Math.random() * charset.length)];
    }
  }
  
  // Trim to exact length
  password = password.substring(0, length);
  
  currentPassword = password;
  document.getElementById('passwordDisplay').textContent = password;
  
  // Update strength
  const entropy = calculateEntropy(password, charset.length);
  const strength = getStrength(entropy);
  document.getElementById('strengthFill').style.width = strength.width;
  document.getElementById('strengthFill').style.backgroundColor = strength.color;
  document.getElementById('strengthLabel').textContent = strength.label;
  document.getElementById('strengthLabel').style.color = strength.color;
  document.getElementById('entropy').textContent = `~${entropy.toFixed(1)} bits of entropy`;
}

function copyPassword() {
  if (!currentPassword) return;
  navigator.clipboard.writeText(currentPassword).then(() => {
    const display = document.getElementById('passwordDisplay');
    display.classList.add('copied');
    display.textContent = 'Copied!';
    setTimeout(() => {
      display.classList.remove('copied');
      display.textContent = currentPassword;
    }, 1000);
  });
}

document.getElementById('length').addEventListener('input', (e) => {
  document.getElementById('lengthValue').textContent = e.target.value;
});

document.getElementById('generateBtn').addEventListener('click', generate);
document.getElementById('copyBtn').addEventListener('click', copyPassword);
document.getElementById('passwordDisplay').addEventListener('click', copyPassword);

// Generate on any option change
document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', generate);
});

// Initial generate
generate();
</script>
</body>
</html>
