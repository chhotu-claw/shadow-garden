<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate random passwords with customizable length and character types. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .password-gen { max-width: 600px; margin: 0 auto; }
  .password-display {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    font-family: var(--mono);
    font-size: 22px;
    word-break: break-all;
    color: var(--text);
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (max-width: 500px) {
    .controls { grid-template-columns: 1fr; }
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  label {
    font-size: 14px;
    color: var(--text-secondary);
  }
  input[type="range"] {
    width: 100%;
    cursor: pointer;
  }
  .length-display {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
  }
  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .checkbox-item input {
    width: 18px;
    height: 18px;
    cursor: pointer;
  }
  .checkbox-item span {
    font-size: 15px;
    color: var(--text);
  }
  .buttons {
    display: flex;
    gap: 12px;
  }
  button {
    flex: 1;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    border-color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover {
    opacity: 0.9;
  }
  .strength {
    margin-top: 16px;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    font-weight: 500;
  }
  .strength.weak { background: rgba(247, 119, 119, 0.2); color: #f77; }
  .strength.fair { background: rgba(247, 183, 49, 0.2); color: #f7b731; }
  .strength.good { background: rgba(122, 242, 129, 0.2); color: #7af782; }
  .strength.strong { background: rgba(108, 182, 255, 0.2); color: #6cb6ff; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="password-gen">
    <h1>Password Generator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Generate random passwords. All local, no tracking.</p>
    
    <div class="password-display" id="passwordDisplay">Click Generate</div>
    
    <div class="controls">
      <div class="control-group">
        <label>Length: <span class="length-display" id="lengthDisplay">16</span></label>
        <input type="range" id="lengthSlider" min="4" max="64" value="16" oninput="updateLength()">
      </div>
      <div class="control-group">
        <label>Characters</label>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" id="useUppercase" checked>
            <span>Uppercase (A-Z)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="useLowercase" checked>
            <span>Lowercase (a-z)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="useNumbers" checked>
            <span>Numbers (0-9)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="useSymbols" checked>
            <span>Symbols (!@#$...)</span>
          </label>
        </div>
      </div>
    </div>
    
    <div class="buttons">
      <button class="primary" onclick="generate()">Generate</button>
      <button onclick="copyPassword()">Copy</button>
    </div>
    
    <div class="strength" id="strengthDisplay"></div>
  </div>
</div>
<script>
  const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
  
  function updateLength() {
    document.getElementById('lengthDisplay').textContent = document.getElementById('lengthSlider').value;
  }
  
  function generate() {
    const length = parseInt(document.getElementById('lengthSlider').value);
    const useUpper = document.getElementById('useUppercase').checked;
    const useLower = document.getElementById('useLowercase').checked;
    const useNums = document.getElementById('useNumbers').checked;
    const useSyms = document.getElementById('useSymbols').checked;
    
    let chars = '';
    if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
    if (useNums) chars += '0123456789';
    if (useSyms) chars += symbols;
    
    if (!chars) {
      chars = 'abcdefghijklmnopqrstuvwxyz';
    }
    
    let password = '';
    const array = new Uint32Array(length);
    crypto.getRandomValues(array);
    
    for (let i = 0; i < length; i++) {
      password += chars[array[i] % chars.length];
    }
    
    document.getElementById('passwordDisplay').textContent = password;
    updateStrength(password);
  }
  
  function updateStrength(password) {
    const display = document.getElementById('strengthDisplay');
    let score = 0;
    
    if (password.length >= 8) score++;
    if (password.length >= 12) score++;
    if (password.length >= 16) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[a-z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;
    
    display.className = 'strength';
    if (score <= 2) {
      display.textContent = 'Weak';
      display.classList.add('weak');
    } else if (score <= 4) {
      display.textContent = 'Fair';
      display.classList.add('fair');
    } else if (score <= 6) {
      display.textContent = 'Good';
      display.classList.add('good');
    } else {
      display.textContent = 'Strong';
      display.classList.add('strong');
    }
  }
  
  function copyPassword() {
    const password = document.getElementById('passwordDisplay').textContent;
    if (password === 'Click Generate') return;
    
    navigator.clipboard.writeText(password).then(() => {
      const btn = event.target;
      const original = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = original, 1500);
    });
  }
  
  // Generate on load
  generate();
</script>
</body>
</html>
