<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure random passwords with customizable length, character types, and options. All local.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; box-sizing: border-box; }
  .container { background: var(--bg-secondary); padding: 2rem; border-radius: 16px; width: 100%; max-width: 480px; }
  h1 { margin-top: 0; font-size: 1.5rem; text-align: center; }
  .output-container { position: relative; margin: 1.5rem 0; }
  #password { width: 100%; padding: 1rem; font-family: 'Fira Code', monospace; font-size: 1.1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); text-align: center; word-break: break-all; }
  .copy-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: var(--accent); color: var(--bg); border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; }
  .copy-btn:hover { opacity: 0.9; }
  .controls { display: flex; flex-direction: column; gap: 1rem; }
  .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
  .control-group label { font-weight: 600; font-size: 0.9rem; }
  .slider-container { display: flex; align-items: center; gap: 1rem; }
  input[type="range"] { flex: 1; }
  #lengthValue { min-width: 2rem; text-align: right; font-weight: 600; }
  .checkboxes { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .checkbox-item { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
  .checkbox-item input { width: 18px; height: 18px; }
  .checkbox-item span { font-weight: normal; }
  #generate { width: 100%; padding: 1rem; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; }
  #generate:hover { opacity: 0.9; }
  .strength { margin-top: 1rem; text-align: center; font-size: 0.9rem; padding: 0.5rem; border-radius: 6px; }
  .strength.weak { background: #fee; color: #c44; }
  .strength.fair { background: #ffc4a0; color: #c64; }
  .strength.good { background: #ffe4b3; color: #b8860b; }
  .strength.strong { background: #dfd; color: #282; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>🔐 Random Password Generator</h1>
    <div class="output-container">
      <div id="password">Click Generate</div>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Length: <span id="lengthValue">16</span></label>
        <div class="slider-container">
          <input type="range" id="length" min="4" max="64" value="16">
        </div>
      </div>
      <div class="control-group">
        <label>Character Types</label>
        <div class="checkboxes">
          <label class="checkbox-item"><input type="checkbox" id="uppercase" checked><span>ABC</span></label>
          <label class="checkbox-item"><input type="checkbox" id="lowercase" checked><span>abc</span></label>
          <label class="checkbox-item"><input type="checkbox" id="numbers" checked><span>123</span></label>
          <label class="checkbox-item"><input type="checkbox" id="symbols" checked><span>@#$</span></label>
        </div>
      </div>
      <div class="control-group">
        <label>Options</label>
        <div class="checkboxes">
          <label class="checkbox-item"><input type="checkbox" id="excludeSimilar"><span>Exclude similar (0O1lI)</span></label>
          <label class="checkbox-item"><input type="checkbox" id="excludeAmbiguous"><span>Exclude ambiguous</span></label>
        </div>
      </div>
      <button id="generate">Generate Password</button>
    </div>
    <div class="strength" id="strength"></div>
  </div>
  <script>
    const passwordEl = document.getElementById('password');
    const lengthSlider = document.getElementById('length');
    const lengthValue = document.getElementById('lengthValue');
    const uppercase = document.getElementById('uppercase');
    const lowercase = document.getElementById('lowercase');
    const numbers = document.getElementById('numbers');
    const symbols = document.getElementById('symbols');
    const excludeSimilar = document.getElementById('excludeSimilar');
    const excludeAmbiguous = document.getElementById('excludeAmbiguous');
    const generateBtn = document.getElementById('generate');
    const copyBtn = document.getElementById('copyBtn');
    const strengthEl = document.getElementById('strength');

    const similarChars = '0O1lI';
    const ambiguousChars = '{}[]()/\\\'"~`=<>,;:!@#$%^&*';
    const symbolChars = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    function generate() {
      let chars = '';
      if (uppercase.checked) {
        let upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if (excludeSimilar.checked) upper = upper.replace(/[OI]/g, '');
        if (excludeAmbiguous.checked) upper = upper.replace(/[{}[]()/\\]/g, '');
        chars += upper;
      }
      if (lowercase.checked) {
        let lower = 'abcdefghijklmnopqrstuvwxyz';
        if (excludeSimilar.checked) lower = lower.replace(/[lo]/g, '');
        chars += lower;
      }
      if (numbers.checked) {
        let nums = '0123456789';
        if (excludeSimilar.checked) nums = nums.replace(/[01]/g, '');
        chars += nums;
      }
      if (symbols.checked) chars += symbolChars;

      if (!chars) {
        passwordEl.textContent = 'Select at least one';
        strengthEl.className = 'strength';
        strengthEl.textContent = '';
        return;
      }

      const length = parseInt(lengthSlider.value);
      let password = '';
      for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
      }

      passwordEl.textContent = password;
      showStrength(password);
    }

    function showStrength(password) {
      const len = password.length;
      let hasUpper = /[A-Z]/.test(password);
      let hasLower = /[a-z]/.test(password);
      let hasNum = /[0-9]/.test(password);
      let hasSymbol = /[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]/.test(password);

      const types = [hasUpper, hasLower, hasNum, hasSymbol].filter(Boolean).length;

      if (len < 8 || types < 2) {
        strengthEl.className = 'strength weak';
        strengthEl.textContent = 'Weak';
      } else if (len < 12 || types < 3) {
        strengthEl.className = 'strength fair';
        strengthEl.textContent = 'Fair';
      } else if (len < 16 || types < 4) {
        strengthEl.className = 'strength good';
        strengthEl.textContent = 'Good';
      } else {
        strengthEl.className = 'strength strong';
        strengthEl.textContent = 'Strong';
      }
    }

    lengthSlider.addEventListener('input', () => {
      lengthValue.textContent = lengthSlider.value;
    });

    generateBtn.addEventListener('click', generate);

    copyBtn.addEventListener('click', () => {
      const text = passwordEl.textContent;
      if (text === 'Click Generate') return;
      navigator.clipboard.writeText(text).then(() => {
        const orig = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = orig, 1500);
      });
    });

    // Generate on load
    generate();
  </script>
</body>
</html>
