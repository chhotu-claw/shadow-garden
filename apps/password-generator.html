<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure random passwords with customizable options">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 500px;
    margin: 0 auto;
    padding: 2rem;
  }
  .card {
    background: var(--card-bg, #1e1e2e);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border, #313244);
  }
  h1 {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .password-display {
    background: var(--input-bg, #11111b);
    border: 1px solid var(--border, #313244);
    border-radius: 8px;
    padding: 1rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 1.2rem;
    text-align: center;
    word-break: break-all;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    position: relative;
  }
  .password-display.copied::after {
    content: 'Copied!';
    position: absolute;
    top: -10px;
    right: 10px;
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .btn-row {
    display: flex;
    gap: 0.5rem;
  }
  button {
    flex: 1;
    padding: 0.875rem;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:active {
    transform: scale(0.98);
  }
  .generate-btn {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .copy-btn {
    background: var(--button-bg, #313244);
    color: var(--text, #cdd6f4);
    flex: 0 0 auto;
    padding: 0.875rem 1.25rem;
  }
  .copy-btn:hover {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .options {
    margin-top: 1.5rem;
  }
  .option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--border, #313244);
  }
  .option:last-child {
    border-bottom: none;
  }
  .option label {
    color: var(--text, #cdd6f4);
    cursor: pointer;
  }
  .option input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: var(--accent, #cba6f7);
    cursor: pointer;
  }
  .slider-container {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .slider-container input[type="range"] {
    flex: 1;
    accent-color: var(--accent, #cba6f7);
  }
  .slider-value {
    min-width: 30px;
    text-align: center;
    font-weight: 600;
    color: var(--accent, #cba6f7);
  }
  .strength-bar {
    height: 6px;
    background: var(--border, #313244);
    border-radius: 3px;
    margin-top: 1rem;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s, background 0.3s;
  }
  .strength-weak { background: #f38ba8; width: 25%; }
  .strength-fair { background: #fab387; width: 50%; }
  .strength-good { background: #a6e3a1; width: 75%; }
  .strength-strong { background: #94e2d5; width: 100%; }
  .strength-text {
    text-align: center;
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: var(--text-secondary, #a6adc8);
  }
  .history {
    margin-top: 1rem;
  }
  .history-title {
    font-size: 0.9rem;
    color: var(--text-secondary, #a6adc8);
    margin-bottom: 0.5rem;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem;
    background: var(--input-bg, #11111b);
    border-radius: 6px;
    margin-bottom: 0.5rem;
    font-family: monospace;
    font-size: 0.85rem;
  }
  .history-item button {
    padding: 0.25rem 0.5rem;
    font-size: 0.75rem;
    flex: none;
    width: auto;
  }
  .clear-btn {
    background: none;
    border: none;
    color: var(--text-secondary, #a6adc8);
    font-size: 0.8rem;
    cursor: pointer;
    text-decoration: underline;
    width: auto;
    padding: 0;
  }
  .clear-btn:hover {
    color: var(--accent, #cba6f7);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>🔐 Password Generator</h1>
  
  <div class="card">
    <div class="password-display" id="password-display">Click generate</div>
    <div class="btn-row">
      <button class="generate-btn" onclick="generate()">Generate</button>
      <button class="copy-btn" onclick="copyPassword()">📋</button>
    </div>
    <div class="strength-bar">
      <div class="strength-fill" id="strength-fill"></div>
    </div>
    <div class="strength-text" id="strength-text"></div>
  </div>

  <div class="card">
    <div class="options">
      <div class="option">
        <label for="length">Password Length</label>
        <div class="slider-container">
          <input type="range" id="length" min="4" max="64" value="16" oninput="updateLength()">
          <span class="slider-value" id="length-value">16</span>
        </div>
      </div>
      <div class="option">
        <label for="uppercase">Uppercase (A-Z)</label>
        <input type="checkbox" id="uppercase" checked>
      </div>
      <div class="option">
        <label for="lowercase">Lowercase (a-z)</label>
        <input type="checkbox" id="lowercase" checked>
      </div>
      <div class="option">
        <label for="numbers">Numbers (0-9)</label>
        <input type="checkbox" id="numbers" checked>
      </div>
      <div class="option">
        <label for="symbols">Symbols (!@#$%^&*)</label>
        <input type="checkbox" id="symbols" checked>
      </div>
      <div class="option">
        <label for="exclude-ambiguous">Exclude ambiguous (0O1lI)</label>
        <input type="checkbox" id="exclude-ambiguous">
      </div>
    </div>
  </div>

  <div class="history" id="history-section">
    <div class="history-title">Recent Passwords</div>
    <div id="history-list"></div>
    <button class="clear-btn" onclick="clearHistory()">Clear history</button>
  </div>
</div>

<script>
  const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const lowercase = 'abcdefghijklmnopqrstuvwxyz';
  const numbers = '0123456789';
  const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
  const ambiguous = '0O1lI';

  let currentPassword = '';
  let history = JSON.parse(localStorage.getItem('passwordHistory') || '[]');

  function updateLength() {
    document.getElementById('length-value').textContent = document.getElementById('length').value;
  }

  function getCharset() {
    let chars = '';
    if (document.getElementById('uppercase').checked) chars += uppercase;
    if (document.getElementById('lowercase').checked) chars += lowercase;
    if (document.getElementById('numbers').checked) chars += numbers;
    if (document.getElementById('symbols').checked) chars += symbols;
    
    if (document.getElementById('exclude-ambiguous').checked) {
      for (const c of ambiguous) {
        chars = chars.replace(new RegExp(c, 'g'), '');
      }
    }
    
    return chars;
  }

  function generate() {
    const length = parseInt(document.getElementById('length').value);
    const charset = getCharset();
    
    if (!charset) {
      document.getElementById('password-display').textContent = 'Select at least one option';
      return;
    }
    
    let password = '';
    const array = new Uint32Array(length);
    crypto.getRandomValues(array);
    
    for (let i = 0; i < length; i++) {
      password += charset[array[i] % charset.length];
    }
    
    currentPassword = password;
    document.getElementById('password-display').textContent = password;
    updateStrength(password);
    addToHistory(password);
  }

  function updateStrength(password) {
    let score = 0;
    
    // Length score
    if (password.length >= 8) score++;
    if (password.length >= 12) score++;
    if (password.length >= 16) score++;
    
    // Character variety
    if (/[a-z]/.test(password)) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^a-zA-Z0-9]/.test(password)) score++;
    
    const fill = document.getElementById('strength-fill');
    const text = document.getElementById('strength-text');
    
    fill.className = 'strength-fill';
    if (score <= 2) {
      fill.classList.add('strength-weak');
      text.textContent = 'Weak';
    } else if (score <= 4) {
      fill.classList.add('strength-fair');
      text.textContent = 'Fair';
    } else if (score <= 5) {
      fill.classList.add('strength-good');
      text.textContent = 'Good';
    } else {
      fill.classList.add('strength-strong');
      text.textContent = 'Strong';
    }
  }

  function copyPassword() {
    if (!currentPassword) return;
    navigator.clipboard.writeText(currentPassword).then(() => {
      const display = document.getElementById('password-display');
      display.classList.add('copied');
      setTimeout(() => display.classList.remove('copied'), 1500);
    });
  }

  function addToHistory(password) {
    history.unshift({ password, time: new Date().toISOString() });
    if (history.length > 10) history.pop();
    localStorage.setItem('passwordHistory', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    const section = document.getElementById('history-section');
    
    if (history.length === 0) {
      section.style.display = 'none';
      return;
    }
    
    section.style.display = 'block';
    list.innerHTML = history.map((h, i) => `
      <div class="history-item">
        <span>${h.password.substring(0, 20)}${h.password.length > 20 ? '...' : ''}</span>
        <button onclick="copyFromHistory(${i})">Copy</button>
      </div>
    `).join('');
  }

  function copyFromHistory(index) {
    navigator.clipboard.writeText(history[index].password).then(() => {
      const display = document.getElementById('password-display');
      display.classList.add('copied');
      setTimeout(() => display.classList.remove('copied'), 1500);
    });
  }

  function clearHistory() {
    history = [];
    localStorage.setItem('passwordHistory', '[]');
    renderHistory();
  }

  // Generate on load
  generate();
  renderHistory();
</script>
</body>
</html>
