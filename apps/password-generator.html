<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure passwords with customizable options. Copy to clipboard with one click.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 540px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .app-title {
    font-size: 1.5rem;
    font-weight: normal;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  .password-display {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .password-text {
    flex: 1;
    font-size: 1.1rem;
    word-break: break-all;
    color: var(--text);
    font-family: var(--font);
  }

  .copy-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.5rem 0.9rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 600;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .copy-btn:hover {
    opacity: 0.85;
  }

  .copy-btn.copied {
    background: #fff;
  }

  .strength-bar {
    height: 6px;
    border-radius: 3px;
    background: var(--bg-surface);
    margin-bottom: 0.5rem;
    overflow: hidden;
  }

  .strength-fill {
    height: 100%;
    width: 0%;
    transition: width 0.3s, background 0.3s;
    border-radius: 3px;
  }

  .strength-fill.weak { width: 25%; background: #e44; }
  .strength-fill.fair { width: 50%; background: #ea4; }
  .strength-fill.good { width: 75%; background: #4c9; }
  .strength-fill.strong { width: 100%; background: #4a9; }

  .strength-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 1.5rem;
  }

  .controls {
    display: grid;
    gap: 1rem;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .control-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .length-display {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--bg-surface);
    border-radius: 3px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }

  .length-value {
    min-width: 2rem;
    text-align: right;
    font-size: 0.9rem;
    color: var(--text);
  }

  .checkbox-group {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.5rem;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  .checkbox-label input {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
  }

  .generate-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.95rem;
    font-weight: 600;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
  }

  .generate-btn:hover {
    opacity: 0.85;
  }

  .history-section {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border-subtle);
  }

  .history-title {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-surface);
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    font-size: 0.8rem;
  }

  .history-password {
    color: var(--text-secondary);
    font-family: var(--font);
    word-break: break-all;
  }

  .history-copy {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.25rem 0.5rem;
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.7rem;
    transition: all 0.2s;
  }

  .history-copy:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .empty-state {
    color: var(--text-muted);
    font-size: 0.8rem;
    font-style: italic;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1 class="app-title">Password Generator</h1>
    
    <div class="password-display">
      <span class="password-text" id="password">Click generate</span>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    
    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill"></div>
    </div>
    <div class="strength-label" id="strengthLabel">Generate a password</div>
    
    <div class="controls">
      <div class="control-group">
        <span class="control-label">Length</span>
        <div class="length-display">
          <input type="range" id="lengthSlider" min="8" max="64" value="16">
          <span class="length-value" id="lengthValue">16</span>
        </div>
      </div>
      
      <div class="control-group">
        <span class="control-label">Character types</span>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="uppercase" checked> Uppercase (A-Z)
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="lowercase" checked> Lowercase (a-z)
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="numbers" checked> Numbers (0-9)
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="symbols" checked> Symbols (!@#$)
          </label>
        </div>
      </div>
      
      <button class="generate-btn" id="generateBtn">Generate Password</button>
    </div>
    
    <div class="history-section">
      <div class="history-title">History (last 5)</div>
      <div class="history-list" id="historyList">
        <div class="empty-state">No history yet</div>
      </div>
    </div>
  </div>

  <script>
    const CHAR_SETS = {
      uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lowercase: 'abcdefghijklmnopqrstuvwxyz',
      numbers: '0123456789',
      symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
    };

    let currentPassword = '';
    let passwordHistory = JSON.parse(localStorage.getItem('passwordHistory') || '[]');

    const passwordEl = document.getElementById('password');
    const copyBtn = document.getElementById('copyBtn');
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');
    const lengthSlider = document.getElementById('lengthSlider');
    const lengthValue = document.getElementById('lengthValue');
    const generateBtn = document.getElementById('generateBtn');
    const historyList = document.getElementById('historyList');

    function generatePassword() {
      const length = parseInt(lengthSlider.value);
      const useUpper = document.getElementById('uppercase').checked;
      const useLower = document.getElementById('lowercase').checked;
      const useNumbers = document.getElementById('numbers').checked;
      const useSymbols = document.getElementById('symbols').checked;

      if (!useUpper && !useLower && !useNumbers && !useSymbols) {
        strengthFill.className = 'strength-fill';
        strengthLabel.textContent = 'Select at least one character type';
        return;
      }

      let charset = '';
      if (useUpper) charset += CHAR_SETS.uppercase;
      if (useLower) charset += CHAR_SETS.lowercase;
      if (useNumbers) charset += CHAR_SETS.numbers;
      if (useSymbols) charset += CHAR_SETS.symbols;

      let password = '';
      const array = new Uint32Array(length);
      crypto.getRandomValues(array);
      
      for (let i = 0; i < length; i++) {
        password += charset[array[i] % charset.length];
      }

      currentPassword = password;
      passwordEl.textContent = password;
      updateStrength(password);
      addToHistory(password);
    }

    function updateStrength(password) {
      let score = 0;
      
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (password.length >= 16) score++;
      
      const hasLower = /[a-z]/.test(password);
      const hasUpper = /[A-Z]/.test(password);
      const hasNumber = /[0-9]/.test(password);
      const hasSymbol = /[^a-zA-Z0-9]/.test(password);
      
      const types = [hasLower, hasUpper, hasNumber, hasSymbol].filter(Boolean).length;
      score += types;

      strengthFill.className = 'strength-fill';
      if (score <= 2) {
        strengthFill.classList.add('weak');
        strengthLabel.textContent = 'Weak';
      } else if (score <= 4) {
        strengthFill.classList.add('fair');
        strengthLabel.textContent = 'Fair';
      } else if (score <= 6) {
        strengthFill.classList.add('good');
        strengthLabel.textContent = 'Good';
      } else {
        strengthFill.classList.add('strong');
        strengthLabel.textContent = 'Strong';
      }
    }

    function addToHistory(password) {
      passwordHistory = [password, ...passwordHistory.filter(p => p !== password)].slice(0, 5);
      localStorage.setItem('passwordHistory', JSON.stringify(passwordHistory));
      renderHistory();
    }

    function renderHistory() {
      if (passwordHistory.length === 0) {
        historyList.innerHTML = '<div class="empty-state">No history yet</div>';
        return;
      }

      historyList.innerHTML = passwordHistory.map(p => `
        <div class="history-item">
          <span class="history-password">${escapeHtml(p)}</span>
          <button class="history-copy" onclick="copyHistory('${escapeHtml(p)}')">Copy</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 1500);
      });
    }

    window.copyHistory = function(password) {
      copyToClipboard(password);
    };

    copyBtn.addEventListener('click', () => {
      if (currentPassword) copyToClipboard(currentPassword);
    });

    generateBtn.addEventListener('click', generatePassword);

    lengthSlider.addEventListener('input', () => {
      lengthValue.textContent = lengthSlider.value;
    });

    generatePassword();
    renderHistory();
  </script>
</body>
</html>
