<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure passwords with customizable options">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --accent: #3fb950; }
  body { --bg: #0d1117; --fg: #c9d1d9; --border: #30363d; }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; }
  
  .password-display {
    background: #161b22;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    font-family: 'Fira Code', monospace;
    font-size: 1.1rem;
    word-break: break-all;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    margin-bottom: 1rem;
    position: relative;
  }
  
  .copy-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    background: #21262d;
    border: 1px solid var(--border);
    color: #8b949e;
    padding: 0.4rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: #30363d; color: var(--fg); }
  .copy-btn.copied { background: var(--accent); color: #0d1117; }
  
  .controls { background: #161b22; border: 2px solid var(--border); border-radius: 8px; padding: 1.5rem; }
  
  .control-group { margin-bottom: 1.25rem; }
  .control-group:last-child { margin-bottom: 0; }
  
  label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.85rem; color: #8b949e; }
  
  .length-slider { display: flex; align-items: center; gap: 1rem; }
  .length-slider input[type="range"] { flex: 1; height: 6px; -webkit-appearance: none; background: #21262d; border-radius: 3px; outline: none; }
  .length-slider input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent); border-radius: 50%; cursor: pointer; }
  .length-value { font-family: monospace; font-size: 1rem; min-width: 30px; text-align: center; }
  
  .checkbox-group { display: flex; flex-direction: column; gap: 0.75rem; }
  .checkbox-item { display: flex; align-items: center; gap: 0.75rem; }
  .checkbox-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  .checkbox-item span { font-size: 0.9rem; }
  .checkbox-item .char-set { color: #8b949e; font-size: 0.8rem; margin-left: auto; }
  
  .generate-btn {
    width: 100%;
    padding: 1rem;
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s;
    margin-top: 1.5rem;
  }
  .generate-btn:hover { transform: scale(1.02); }
  .generate-btn:active { transform: scale(0.98); }
  
  .strength-bar { margin-top: 1rem; }
  .strength-label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 0.5rem; }
  .strength-track { height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; }
  .strength-fill { height: 100%; transition: width 0.3s, background 0.3s; }
  
  .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .preset-btn { padding: 0.4rem 0.8rem; background: #21262d; border: 1px solid var(--border); border-radius: 6px; color: #8b949e; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
  .preset-btn:hover { background: #30363d; color: var(--fg); }
  
  .history { margin-top: 1.5rem; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .history-header span { font-weight: 600; font-size: 0.85rem; color: #8b949e; }
  .clear-history { background: none; border: none; color: #f85149; font-size: 0.8rem; cursor: pointer; }
  .history-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .history-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.75rem; background: #161b22; border-radius: 6px; font-size: 0.85rem; }
  .history-item .pwd { font-family: monospace; word-break: break-all; flex: 1; margin-right: 0.5rem; }
  .history-item .copy-h { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 0.8rem; }
  .history-item .copy-h:hover { color: var(--accent); }
  .history-item .delete-h { background: none; border: none; color: #f85149; cursor: pointer; font-size: 0.8rem; margin-left: 0.5rem; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Password Generator</h1>
    <p class="subtitle">Generate secure passwords locally</p>
    
    <div class="password-display">
      <span id="password">Click generate</span>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    
    <div class="presets">
      <button class="preset-btn" data-len="12" data-upper="true" data-lower="true" data-num="true" data-sym="true">Random 12</button>
      <button class="preset-btn" data-len="16" data-upper="true" data-lower="true" data-num="true" data-sym="true">Random 16</button>
      <button class="preset-btn" data-len="8" data-upper="false" data-lower="true" data-num="true" data-sym="false">PIN</button>
      <button class="preset-btn" data-len="20" data-upper="true" data-lower="true" data-num="true" data-sym="true">High Security</button>
    </div>
    
    <div class="controls">
      <div class="control-group">
        <label>Length: <span class="length-value" id="lengthValue">16</span></label>
        <div class="length-slider">
          <input type="range" id="length" min="4" max="64" value="16">
        </div>
      </div>
      
      <div class="control-group">
        <label>Character Types</label>
        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="uppercase" checked>
            <span>Uppercase</span>
            <span class="char-set">A-Z</span>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="lowercase" checked>
            <span>Lowercase</span>
            <span class="char-set">a-z</span>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="numbers" checked>
            <span>Numbers</span>
            <span class="char-set">0-9</span>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="symbols" checked>
            <span>Symbols</span>
            <span class="char-set">!@#$%^&*</span>
          </div>
        </div>
      </div>
      
      <div class="strength-bar">
        <div class="strength-label">
          <span>Strength</span>
          <span id="strengthText">—</span>
        </div>
        <div class="strength-track">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
      </div>
      
      <button class="generate-btn" id="generateBtn">Generate Password</button>
    </div>
    
    <div class="history" id="historySection" style="display: none;">
      <div class="history-header">
        <span>History</span>
        <button class="clear-history" id="clearHistory">Clear</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
  
  <script>
    const passwordEl = document.getElementById('password');
    const copyBtn = document.getElementById('copyBtn');
    const lengthSlider = document.getElementById('length');
    const lengthValue = document.getElementById('lengthValue');
    const uppercase = document.getElementById('uppercase');
    const lowercase = document.getElementById('lowercase');
    const numbers = document.getElementById('numbers');
    const symbols = document.getElementById('symbols');
    const generateBtn = document.getElementById('generateBtn');
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');
    const historySection = document.getElementById('historySection');
    const historyList = document.getElementById('historyList');
    const clearHistory = document.getElementById('clearHistory');
    
    const uppercaseChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lowercaseChars = 'abcdefghijklmnopqrstuvwxyz';
    const numberChars = '0123456789';
    const symbolChars = '!@#$%^&*()_+-=[]{}|;:,.<>?';
    
    let history = JSON.parse(localStorage.getItem('pwdHistory') || '[]');
    
    function updateHistory() {
      if (history.length === 0) {
        historySection.style.display = 'none';
        return;
      }
      historySection.style.display = 'block';
      historyList.innerHTML = history.map((pwd, i) => `
        <div class="history-item">
          <span class="pwd">${escapeHtml(pwd)}</span>
          <button class="copy-h" data-pwd="${escapeHtml(pwd)}">Copy</button>
          <button class="delete-h" data-index="${i}">×</button>
        </div>
      `).join('');
    }
    
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    function getCharSet() {
      let chars = '';
      if (uppercase.checked) chars += uppercaseChars;
      if (lowercase.checked) chars += lowercaseChars;
      if (numbers.checked) chars += numberChars;
      if (symbols.checked) chars += symbolChars;
      return chars || lowercaseChars;
    }
    
    function generatePassword() {
      const length = parseInt(lengthSlider.value);
      const charSet = getCharSet();
      if (!charSet) return;
      
      let password = '';
      const array = new Uint32Array(length);
      crypto.getRandomValues(array);
      
      for (let i = 0; i < length; i++) {
        password += charSet[array[i] % charSet.length];
      }
      
      passwordEl.textContent = password;
      updateStrength(password);
      
      // Add to history
      if (!history.includes(password)) {
        history.unshift(password);
        if (history.length > 10) history.pop();
        localStorage.setItem('pwdHistory', JSON.stringify(history));
        updateHistory();
      }
    }
    
    function updateStrength(password) {
      let score = 0;
      const len = password.length;
      
      if (len >= 8) score += 1;
      if (len >= 12) score += 1;
      if (len >= 16) score += 1;
      if (/[a-z]/.test(password)) score += 1;
      if (/[A-Z]/.test(password)) score += 1;
      if (/[0-9]/.test(password)) score += 1;
      if (/[^a-zA-Z0-9]/.test(password)) score += 1;
      
      const levels = [
        { threshold: 0, text: 'Very Weak', color: '#f85149' },
        { threshold: 2, text: 'Weak', color: '#ffa657' },
        { threshold: 4, text: 'Fair', color: '#f0883e' },
        { threshold: 5, text: 'Strong', color: '#3fb950' },
        { threshold: 7, text: 'Very Strong', color: '#238636' }
      ];
      
      let level = levels[0];
      for (const l of levels) {
        if (score >= l.threshold) level = l;
      }
      
      strengthText.textContent = level.text;
      strengthText.style.color = level.color;
      strengthFill.style.width = Math.min(100, (score / 7) * 100) + '%';
      strengthFill.style.background = level.color;
    }
    
    lengthSlider.addEventListener('input', () => {
      lengthValue.textContent = lengthSlider.value;
    });
    
    generateBtn.addEventListener('click', generatePassword);
    
    copyBtn.addEventListener('click', () => {
      const pwd = passwordEl.textContent;
      if (pwd && pwd !== 'Click generate') {
        navigator.clipboard.writeText(pwd);
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 1500);
      }
    });
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        lengthSlider.value = btn.dataset.len;
        lengthValue.textContent = btn.dataset.len;
        uppercase.checked = btn.dataset.upper === 'true';
        lowercase.checked = btn.dataset.lower === 'true';
        numbers.checked = btn.dataset.num === 'true';
        symbols.checked = btn.dataset.sym === 'true';
        generatePassword();
      });
    });
    
    historyList.addEventListener('click', (e) => {
      if (e.target.classList.contains('copy-h')) {
        navigator.clipboard.writeText(e.target.dataset.pwd);
        e.target.textContent = 'Copied!';
        setTimeout(() => e.target.textContent = 'Copy', 1000);
      }
      if (e.target.classList.contains('delete-h')) {
        history.splice(parseInt(e.target.dataset.index), 1);
        localStorage.setItem('pwdHistory', JSON.stringify(history));
        updateHistory();
      }
    });
    
    clearHistory.addEventListener('click', () => {
      history = [];
      localStorage.setItem('pwdHistory', '[]');
      updateHistory();
    });
    
    updateHistory();
  </script>
</body>
</html>
