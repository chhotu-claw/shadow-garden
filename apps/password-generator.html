<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure passwords locally in your browser. No tracking, no cloud, no nonsense.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .container { max-width: 500px; width: 100%; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }
  
  .password-display {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 1.1rem;
    word-break: break-all;
    min-height: 60px;
    display: flex;
    align-items: center;
    margin-bottom: 1rem;
    position: relative;
  }
  
  .password-display button {
    position: absolute;
    right: 0.5rem;
    top: 50%;
    transform: translateY(-50%);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.4rem 0.6rem;
    cursor: pointer;
    font-size: 0.8rem;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  
  .password-display button:hover { opacity: 1; }
  
  .controls { display: flex; flex-direction: column; gap: 1rem; }
  
  .control-group { display: flex; justify-content: space-between; align-items: center; }
  .control-group label { font-size: 0.9rem; }
  
  input[type="range"] {
    width: 150px;
    accent-color: var(--accent);
  }
  
  .length-value {
    font-family: monospace;
    background: var(--bg-secondary);
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-size: 0.85rem;
  }
  
  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding: 1rem 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
    cursor: pointer;
  }
  
  .checkbox-item input { accent-color: var(--accent); }
  
  .strength-bar {
    height: 6px;
    background: var(--bg-secondary);
    border-radius: 3px;
    margin-top: 1rem;
    overflow: hidden;
  }
  
  .strength-fill {
    height: 100%;
    transition: width 0.3s, background 0.3s;
    border-radius: 3px;
  }
  
  .strength-label {
    font-size: 0.8rem;
    margin-top: 0.3rem;
    text-align: right;
  }
  
  .generate-btn {
    width: 100%;
    padding: 1rem;
    font-size: 1rem;
    font-weight: 600;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  
  .generate-btn:hover { transform: scale(1.02); }
  .generate-btn:active { transform: scale(0.98); }
  
  .stats {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-muted);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Password Generator</h1>
  <p class="subtitle">Secure. Local. No tracking.</p>
  
  <div class="password-display">
    <span id="password">Click generate...</span>
    <button id="copyBtn">Copy</button>
  </div>
  
  <div class="controls">
    <div class="control-group">
      <label>Length</label>
      <span class="length-value" id="lengthValue">16</span>
      <input type="range" id="length" min="8" max="64" value="16">
    </div>
    
    <div class="checkbox-group">
      <label class="checkbox-item">
        <input type="checkbox" id="uppercase" checked>
        Uppercase (A-Z)
      </label>
      <label class="checkbox-item">
        <input type="checkbox" id="lowercase" checked>
        Lowercase (a-z)
      </label>
      <label class="checkbox-item">
        <input type="checkbox" id="numbers" checked>
        Numbers (0-9)
      </label>
      <label class="checkbox-item">
        <input type="checkbox" id="symbols" checked>
        Symbols (!@#$%^&*)
      </label>
    </div>
    
    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill"></div>
    </div>
    <div class="strength-label" id="strengthLabel"></div>
    
    <button class="generate-btn" id="generateBtn">Generate Password</button>
  </div>
  
  <div class="stats">
    <span id="entropy">Entropy: 0 bits</span>
  </div>
</div>

<script>
const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const lowercase = 'abcdefghijklmnopqrstuvwxyz';
const numbers = '0123456789';
const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';

const passwordEl = document.getElementById('password');
const lengthEl = document.getElementById('length');
const lengthValueEl = document.getElementById('lengthValue');
const uppercaseEl = document.getElementById('uppercase');
const lowercaseEl = document.getElementById('lowercase');
const numbersEl = document.getElementById('numbers');
const symbolsEl = document.getElementById('symbols');
const generateBtn = document.getElementById('generateBtn');
const copyBtn = document.getElementById('copyBtn');
const strengthFill = document.getElementById('strengthFill');
const strengthLabel = document.getElementById('strengthLabel');
const entropyEl = document.getElementById('entropy');

function getCharset() {
  let chars = '';
  if (uppercaseEl.checked) chars += uppercase;
  if (lowercaseEl.checked) chars += lowercase;
  if (numbersEl.checked) chars += numbers;
  if (symbolsEl.checked) chars += symbols;
  return chars || lowercase;
}

function calculateEntropy(password) {
  let charsetSize = 0;
  if (/[A-Z]/.test(password)) charsetSize += 26;
  if (/[a-z]/.test(password)) charsetSize += 26;
  if (/[0-9]/.test(password)) charsetSize += 10;
  if (/[^A-Za-z0-9]/.test(password)) charsetSize += 32;
  
  if (charsetSize === 0) return 0;
  return Math.round(password.length * Math.log2(charsetSize));
}

function getStrength(entropy) {
  if (entropy < 40) return { label: 'Weak', color: '#ef4444', width: '25%' };
  if (entropy < 60) return { label: 'Fair', color: '#f59e0b', width: '50%' };
  if (entropy < 80) return { label: 'Good', color: '#22c55e', width: '75%' };
  return { label: 'Strong', color: '#10b981', width: '100%' };
}

function generate() {
  const length = parseInt(lengthEl.value);
  const charset = getCharset();
  
  let password = '';
  const array = new Uint32Array(length);
  crypto.getRandomValues(array);
  
  for (let i = 0; i < length; i++) {
    password += charset[array[i] % charset.length];
  }
  
  passwordEl.textContent = password;
  
  const entropy = calculateEntropy(password);
  entropyEl.textContent = `Entropy: ${entropy} bits`;
  
  const strength = getStrength(entropy);
  strengthFill.style.width = strength.width;
  strengthFill.style.background = strength.color;
  strengthLabel.textContent = strength.label;
  strengthLabel.style.color = strength.color;
}

function copyToClipboard() {
  const password = passwordEl.textContent;
  if (!password || password === 'Click generate...') return;
  
  navigator.clipboard.writeText(password).then(() => {
    copyBtn.textContent = 'Copied!';
    setTimeout(() => copyBtn.textContent = 'Copy', 1500);
  });
}

lengthEl.addEventListener('input', () => {
  lengthValueEl.textContent = lengthEl.value;
  generate();
});

[uppercaseEl, lowercaseEl, numbersEl, symbolsEl].forEach(el => {
  el.addEventListener('change', generate);
});

generateBtn.addEventListener('click', generate);
copyBtn.addEventListener('click', copyToClipboard);

// Generate on load
generate();
</script>
</body>
</html>
