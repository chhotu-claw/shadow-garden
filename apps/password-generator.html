<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure passwords locally in your browser">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #f59e0b;
    --accent-dark: #d97706;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #1f1f1f 0%, #0f0f0f 100%);
  }
  .generator {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 1rem;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
  }
  h1 {
    color: #fff;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .password-display {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 1rem;
    margin-bottom: 1.5rem;
    position: relative;
  }
  #password {
    font-size: 1.25rem;
    color: #fff;
    word-break: break-all;
    min-height: 2rem;
    display: block;
  }
  .copy-btn {
    position: absolute;
    top: 50%;
    right: 0.5rem;
    transform: translateY(-50%);
    background: var(--accent);
    border: none;
    border-radius: 0.25rem;
    padding: 0.5rem 0.75rem;
    color: #000;
    font-size: 0.75rem;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }
  .copy-btn:hover {
    background: var(--accent-dark);
  }
  .copy-btn.copied {
    background: #10b981;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  label {
    color: rgba(255,255,255,0.8);
    font-size: 0.875rem;
  }
  input[type="range"] {
    width: 150px;
    accent-color: var(--accent);
  }
  .length-display {
    color: var(--accent);
    font-weight: bold;
    min-width: 2rem;
    text-align: right;
  }
  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  input[type="checkbox"] {
    width: 1.25rem;
    height: 1.25rem;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .generate-btn {
    background: var(--accent);
    border: none;
    border-radius: 0.5rem;
    padding: 1rem;
    color: #000;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 1rem;
  }
  .generate-btn:hover {
    background: var(--accent-dark);
  }
  .generate-btn:active {
    transform: scale(0.98);
  }
  .strength {
    margin-top: 1rem;
    padding: 0.75rem;
    border-radius: 0.5rem;
    text-align: center;
    font-weight: bold;
    font-size: 0.875rem;
  }
  .strength.weak { background: #ef4444; color: #fff; }
  .strength.fair { background: #f59e0b; color: #000; }
  .strength.good { background: #22c55e; color: #fff; }
  .strength.strong { background: #10b981; color: #fff; }
  .history {
    margin-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 1rem;
  }
  .history h3 {
    color: rgba(255,255,255,0.6);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.75rem;
  }
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 120px;
    overflow-y: auto;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.2);
    padding: 0.5rem;
    border-radius: 0.25rem;
    font-size: 0.75rem;
  }
  .history-password {
    color: rgba(255,255,255,0.8);
    word-break: break-all;
  }
  .history-copy {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
    padding: 0.25rem 0.5rem;
    border-radius: 0.25rem;
    cursor: pointer;
    font-size: 0.65rem;
  }
  .history-copy:hover {
    background: rgba(255,255,255,0.1);
  }
  .clear-history {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 0.65rem;
    cursor: pointer;
    margin-top: 0.5rem;
  }
  .clear-history:hover {
    color: #ef4444;
  }
</style>
</head>
<body data-page-type="app">
<div class="generator">
  <h1>🔐 Password Generator</h1>
  
  <div class="password-display">
    <span id="password">Click generate</span>
    <button class="copy-btn" onclick="copyPassword()">COPY</button>
  </div>
  
  <div class="strength" id="strength" style="display:none;"></div>
  
  <div class="controls">
    <div class="control-row">
      <label>Length</label>
      <input type="range" id="length" min="8" max="64" value="16">
      <span class="length-display" id="lengthDisplay">16</span>
    </div>
    
    <div class="checkbox-group">
      <div class="checkbox-row">
        <input type="checkbox" id="uppercase" checked>
        <label for="uppercase">Uppercase (A-Z)</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="lowercase" checked>
        <label for="lowercase">Lowercase (a-z)</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="numbers" checked>
        <label for="numbers">Numbers (0-9)</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="symbols" checked>
        <label for="symbols">Symbols (!@#$%^&*)</label>
      </div>
    </div>
    
    <button class="generate-btn" onclick="generate()">Generate Password</button>
  </div>
  
  <div class="history">
    <h3>Recent Passwords</h3>
    <div class="history-list" id="historyList"></div>
    <button class="clear-history" onclick="clearHistory()">Clear history</button>
  </div>
</div>

<script>
const lengthSlider = document.getElementById('length');
const lengthDisplay = document.getElementById('lengthDisplay');
const passwordDisplay = document.getElementById('password');
const strengthDisplay = document.getElementById('strength');
const historyList = document.getElementById('historyList');

const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const lowercase = 'abcdefghijklmnopqrstuvwxyz';
const numbers = '0123456789';
const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';

let history = JSON.parse(localStorage.getItem('passwordHistory') || '[]');

lengthSlider.addEventListener('input', () => {
  lengthDisplay.textContent = lengthSlider.value;
});

function generate() {
  let chars = '';
  if (document.getElementById('uppercase').checked) chars += uppercase;
  if (document.getElementById('lowercase').checked) chars += lowercase;
  if (document.getElementById('numbers').checked) chars += numbers;
  if (document.getElementById('symbols').checked) chars += symbols;
  
  if (!chars) {
    alert('Select at least one character type');
    return;
  }
  
  const length = parseInt(lengthSlider.value);
  let password = '';
  for (let i = 0; i < length; i++) {
    password += chars[Math.floor(Math.random() * chars.length)];
  }
  
  passwordDisplay.textContent = password;
  showStrength(password);
  addToHistory(password);
  
  // Save preferences
  localStorage.setItem('passwordPrefs', JSON.stringify({
    length: lengthSlider.value,
    uppercase: document.getElementById('uppercase').checked,
    lowercase: document.getElementById('lowercase').checked,
    numbers: document.getElementById('numbers').checked,
    symbols: document.getElementById('symbols').checked
  }));
}

function showStrength(password) {
  let score = 0;
  if (password.length >= 8) score++;
  if (password.length >= 12) score++;
  if (password.length >= 16) score++;
  if (/[a-z]/.test(password)) score++;
  if (/[A-Z]/.test(password)) score++;
  if (/[0-9]/.test(password)) score++;
  if (/[^a-zA-Z0-9]/.test(password)) score++;
  
  strengthDisplay.style.display = 'block';
  if (score <= 2) {
    strengthDisplay.className = 'strength weak';
    strengthDisplay.textContent = 'Weak';
  } else if (score <= 4) {
    strengthDisplay.className = 'strength fair';
    strengthDisplay.textContent = 'Fair';
  } else if (score <= 5) {
    strengthDisplay.className = 'strength good';
    strengthDisplay.textContent = 'Good';
  } else {
    strengthDisplay.className = 'strength strong';
    strengthDisplay.textContent = 'Strong';
  }
}

function copyPassword() {
  const password = passwordDisplay.textContent;
  if (!password || password === 'Click generate') return;
  
  navigator.clipboard.writeText(password).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'COPIED';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'COPY';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function addToHistory(password) {
  history.unshift({ password, time: Date.now() });
  history = history.slice(0, 10);
  localStorage.setItem('passwordHistory', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  historyList.innerHTML = history.map((item, i) => `
    <div class="history-item">
      <span class="history-password">${item.password}</span>
      <button class="history-copy" onclick="copyHistory(${i})">COPY</button>
    </div>
  `).join('');
}

function copyHistory(index) {
  navigator.clipboard.writeText(history[index].password);
}

function clearHistory() {
  history = [];
  localStorage.removeItem('passwordHistory');
  renderHistory();
}

// Load saved preferences
const prefs = JSON.parse(localStorage.getItem('passwordPrefs') || '{}');
if (prefs.length) lengthSlider.value = prefs.length;
if (prefs.uppercase !== undefined) document.getElementById('uppercase').checked = prefs.uppercase;
if (prefs.lowercase !== undefined) document.getElementById('lowercase').checked = prefs.lowercase;
if (prefs.numbers !== undefined) document.getElementById('numbers').checked = prefs.numbers;
if (prefs.symbols !== undefined) document.getElementById('symbols').checked = prefs.symbols;
lengthDisplay.textContent = lengthSlider.value;

renderHistory();
</script>
</body>
</html>
