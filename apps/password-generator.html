<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure passwords with real-time entropy visualization and strength analysis.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  * { box-sizing: border-box; }
  body { 
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 600px;
    width: 100%;
    background: var(--bg-secondary);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  h1 { 
    text-align: center; 
    margin-bottom: 24px;
    font-size: 1.8rem;
  }
  .password-display {
    background: var(--bg-primary);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    font-family: 'Courier New', monospace;
    font-size: 1.3rem;
    word-break: break-all;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .password-display:hover {
    border-color: var(--accent);
  }
  .password-display.copied::after {
    content: 'Copied!';
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 0.75rem;
    color: #4ade80;
    font-family: var(--font-body);
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .control-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .control-row label {
    font-weight: 500;
  }
  input[type="range"] {
    width: 150px;
    accent-color: var(--accent);
  }
  .length-value {
    font-weight: bold;
    min-width: 40px;
    text-align: right;
  }
  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
  }
  .generate-btn {
    background: var(--accent);
    color: var(--bg-primary);
    border: none;
    padding: 16px 32px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.1s, opacity 0.2s;
  }
  .generate-btn:hover {
    opacity: 0.9;
  }
  .generate-btn:active {
    transform: scale(0.98);
  }
  .entropy-display {
    margin-top: 24px;
    padding: 16px;
    background: var(--bg-primary);
    border-radius: 8px;
  }
  .entropy-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 12px 0;
  }
  .entropy-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s, background 0.3s;
  }
  .entropy-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  .strength-text {
    font-weight: bold;
    text-align: center;
    margin-top: 8px;
  }
  .strength-weak { color: #ef4444; }
  .strength-fair { color: #f59e0b; }
  .strength-good { color: #22c55e; }
  .strength-strong { color: #10b981; }
  .exclusion-hint {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>🔐 Password Generator</h1>
    
    <div class="password-display" id="passwordDisplay" title="Click to copy">
      Click generate
    </div>

    <div class="controls">
      <div class="control-row">
        <label>Length</label>
        <input type="range" id="lengthSlider" min="8" max="128" value="20">
        <span class="length-value" id="lengthValue">20</span>
      </div>

      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="useUppercase" checked>
          Uppercase (A-Z)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="useLowercase" checked>
          Lowercase (a-z)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="useNumbers" checked>
          Numbers (0-9)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="useSymbols" checked>
          Symbols (!@#$%^&*)
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="excludeAmbiguous">
          Exclude ambiguous (0O1lI)
        </label>
      </div>

      <button class="generate-btn" id="generateBtn">Generate Password</button>
    </div>

    <div class="entropy-display">
      <div class="entropy-label">
        <span>Entropy</span>
        <span id="entropyBits">0 bits</span>
      </div>
      <div class="entropy-bar">
        <div class="entropy-fill" id="entropyFill"></div>
      </div>
      <div class="entropy-label">
        <span>Strength</span>
        <span class="strength-text" id="strengthText">—</span>
      </div>
    </div>
  </div>

  <script>
    const display = document.getElementById('passwordDisplay');
    const lengthSlider = document.getElementById('lengthSlider');
    const lengthValue = document.getElementById('lengthValue');
    const generateBtn = document.getElementById('generateBtn');
    const entropyBits = document.getElementById('entropyBits');
    const entropyFill = document.getElementById('entropyFill');
    const strengthText = document.getElementById('strengthText');

    const checkboxes = {
      uppercase: document.getElementById('useUppercase'),
      lowercase: document.getElementById('useLowercase'),
      numbers: document.getElementById('useNumbers'),
      symbols: document.getElementById('useSymbols'),
      ambiguous: document.getElementById('excludeAmbiguous')
    };

    const chars = {
      lowercase: 'abcdefghijklmnopqrstuvwxyz',
      uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      numbers: '0123456789',
      symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?',
      ambiguous: '0O1lI'
    };

    function getPool() {
      let pool = '';
      let poolSize = 0;

      if (checkboxes.lowercase.checked) pool += chars.lowercase;
      if (checkboxes.uppercase.checked) pool += chars.uppercase;
      if (checkboxes.numbers.checked) pool += chars.numbers;
      if (checkboxes.symbols.checked) pool += chars.symbols;

      if (checkboxes.ambiguous.checked) {
        for (let char of '0O1lI') {
          pool = pool.replace(new RegExp(char, 'g'), '');
        }
      }

      return pool;
    }

    function calculateEntropy(password) {
      const pool = getPool();
      if (!pool || !password) return 0;
      return password.length * Math.log2(pool.length);
    }

    function getStrength(entropy) {
      if (entropy < 28) return { text: 'Very Weak', class: 'strength-weak', color: '#ef4444', width: '15%' };
      if (entropy < 36) return { text: 'Weak', class: 'strength-weak', color: '#f97316', width: '30%' };
      if (entropy < 60) return { text: 'Fair', class: 'strength-fair', color: '#f59e0b', width: '50%' };
      if (entropy < 80) return { text: 'Good', class: 'strength-good', color: '#22c55e', width: '75%' };
      return { text: 'Strong', class: 'strength-strong', color: '#10b981', width: '100%' };
    }

    function generate() {
      const pool = getPool();
      if (!pool) {
        display.textContent = 'Select at least one character type';
        return;
      }

      let password = '';
      const length = parseInt(lengthSlider.value);
      
      // Ensure at least one char from each selected type
      const required = [];
      if (checkboxes.lowercase.checked) required.push(chars.lowercase[Math.floor(Math.random() * chars.lowercase.length)]);
      if (checkboxes.uppercase.checked) required.push(chars.uppercase[Math.floor(Math.random() * chars.uppercase.length)]);
      if (checkboxes.numbers.checked) required.push(chars.numbers[Math.floor(Math.random() * chars.numbers.length)]);
      if (checkboxes.symbols.checked) required.push(chars.symbols[Math.floor(Math.random() * chars.symbols.length)]);

      // Fill the rest randomly
      const remaining = length - required.length;
      for (let i = 0; i < remaining; i++) {
        password += pool[Math.floor(Math.random() * pool.length)];
      }

      // Mix required chars and random chars, shuffle
      const all = [...required, ...password];
      for (let i = all.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [all[i], all[j]] = [all[j], all[i]];
      }
      password = all.join('');

      display.textContent = password;
      updateEntropy(password);
    }

    function updateEntropy(password) {
      const entropy = calculateEntropy(password);
      entropyBits.textContent = Math.round(entropy) + ' bits';
      
      const strength = getStrength(entropy);
      entropyFill.style.width = strength.width;
      entropyFill.style.background = strength.color;
      
      strengthText.textContent = strength.text;
      strengthText.className = 'strength-text ' + strength.class;
    }

    function copyPassword() {
      const text = display.textContent;
      if (text && text !== 'Click generate' && text !== 'Select at least one character type') {
        navigator.clipboard.writeText(text).then(() => {
          display.classList.add('copied');
          setTimeout(() => display.classList.remove('copied'), 1500);
        });
      }
    }

    // Event listeners
    lengthSlider.addEventListener('input', () => {
      lengthValue.textContent = lengthSlider.value;
    });

    generateBtn.addEventListener('click', generate);
    display.addEventListener('click', copyPassword);

    Object.values(checkboxes).forEach(cb => {
      cb.addEventListener('change', () => {
        if (!checkboxes.lowercase.checked && !checkboxes.uppercase.checked && 
            !checkboxes.numbers.checked && !checkboxes.symbols.checked) {
          checkboxes.lowercase.checked = true;
        }
      });
    });

    // Generate on load
    generate();
  </script>
</body>
</html>
