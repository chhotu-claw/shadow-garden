<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure passwords with customizable options — length, characters, copy to clipboard">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: var(--bg);
  }
  .generator {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }
  .output-group {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .output {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 1.1rem;
    color: var(--text);
    word-break: break-all;
    min-height: 52px;
    display: flex;
    align-items: center;
  }
  .copy-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .copy-btn:hover {
    filter: brightness(1.1);
    transform: translateY(-1px);
  }
  .copy-btn.copied {
    background: #22c55e;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .slider-group {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .slider-group label {
    flex: 1;
    color: var(--text-secondary);
    font-size: 0.95rem;
  }
  .slider-group input[type="range"] {
    flex: 2;
    height: 6px;
    -webkit-appearance: none;
    background: var(--border);
    border-radius: 3px;
    outline: none;
  }
  .slider-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .slider-group input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }
  .slider-value {
    min-width: 36px;
    text-align: right;
    font-weight: 600;
    color: var(--text);
  }
  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .checkbox-item input {
    width: 18px;
    height: 18;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .checkbox-item span {
    color: var(--text-secondary);
    font-size: 0.95rem;
  }
  .generate-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 1rem;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .generate-btn:hover {
    filter: brightness(1.1);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .strength-meter {
    margin-top: 1rem;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    font-weight: 600;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .strength-weak { background: #ef4444; color: white; }
  .strength-fair { background: #f59e0b; color: white; }
  .strength-good { background: #22c55e; color: white; }
  .strength-strong { background: #10b981; color: white; }
</style>
</head>
<body data-page-type="app">
  <div class="generator">
    <div class="output-group">
      <div class="output" id="password"></div>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <div class="strength-meter" id="strength"></div>
    <div class="controls">
      <div class="slider-group">
        <label>Length</label>
        <input type="range" id="length" min="4" max="64" value="16">
        <span class="slider-value" id="lengthValue">16</span>
      </div>
      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" id="uppercase" checked>
          <span>Uppercase (A-Z)</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="lowercase" checked>
          <span>Lowercase (a-z)</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="numbers" checked>
          <span>Numbers (0-9)</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="symbols" checked>
          <span>Symbols (!@#$%^&*)</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="excludeAmbiguous">
          <span>Exclude ambiguous (0O1lI)</span>
        </label>
      </div>
      <button class="generate-btn" id="generateBtn">Generate Password</button>
    </div>
  </div>
  <script>
    const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lowercase = 'abcdefghijklmnopqrstuvwxyz';
    const numbers = '0123456789';
    const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
    const ambiguous = '0O1lI';

    const lengthSlider = document.getElementById('length');
    const lengthValue = document.getElementById('lengthValue');
    const passwordEl = document.getElementById('password');
    const copyBtn = document.getElementById('copyBtn');
    const generateBtn = document.getElementById('generateBtn');
    const strengthEl = document.getElementById('strength');

    function getCharset() {
      let chars = '';
      if (document.getElementById('uppercase').checked) chars += uppercase;
      if (document.getElementById('lowercase').checked) chars += lowercase;
      if (document.getElementById('numbers').checked) chars += numbers;
      if (document.getElementById('symbols').checked) chars += symbols;
      
      if (document.getElementById('excludeAmbiguous').checked) {
        for (const c of ambiguous) {
          chars = chars.replace(new RegExp(c, 'g'), '');
        }
      }
      return chars;
    }

    function getStrength(password) {
      let score = 0;
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (password.length >= 16) score++;
      if (/[a-z]/.test(password)) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^a-zA-Z0-9]/.test(password)) score++;
      
      if (score <= 2) return { text: 'Weak', class: 'strength-weak' };
      if (score <= 4) return { text: 'Fair', class: 'strength-fair' };
      if (score <= 5) return { text: 'Good', class: 'strength-good' };
      return { text: 'Strong', class: 'strength-strong' };
    }

    function generate() {
      const length = parseInt(lengthSlider.value);
      const charset = getCharset();
      
      if (!charset) {
        passwordEl.textContent = 'Select at least one option';
        strengthEl.className = 'strength-meter';
        strengthEl.textContent = '';
        return;
      }

      let password = '';
      const array = new Uint32Array(length);
      crypto.getRandomValues(array);
      
      for (let i = 0; i < length; i++) {
        password += charset[array[i] % charset.length];
      }

      passwordEl.textContent = password;
      
      const strength = getStrength(password);
      strengthEl.className = 'strength-meter ' + strength.class;
      strengthEl.textContent = strength.text;
    }

    lengthSlider.addEventListener('input', () => {
      lengthValue.textContent = lengthSlider.value;
      generate();
    });

    copyBtn.addEventListener('click', async () => {
      const pwd = passwordEl.textContent;
      if (pwd && pwd !== 'Select at least one option') {
        await navigator.clipboard.writeText(pwd);
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 1500);
      }
    });

    generateBtn.addEventListener('click', generate);

    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', generate);
    });

    generate();
  </script>
</body>
</html>
