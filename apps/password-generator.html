<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure passwords with customizable options. No tracking, all local.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --text: #e0e0e0;
    --accent: #00d4aa;
    --accent-dim: #00a88a;
    --muted: #666;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: var(--card);
    padding: 32px;
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 8px 0;
    color: var(--accent);
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .password-display {
    background: var(--bg);
    padding: 20px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    word-break: break-all;
    min-height: 60px;
    display: flex;
    align-items: center;
    border: 2px solid #333;
    margin-bottom: 16px;
  }
  .password-display.copied {
    border-color: var(--accent);
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover {
    background: var(--accent-dim);
  }
  .btn-secondary {
    background: #333;
    color: var(--text);
  }
  .btn-secondary:hover {
    background: #444;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .option-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .option-label {
    font-size: 0.95rem;
  }
  input[type="range"] {
    width: 120px;
    accent-color: var(--accent);
  }
  .length-value {
    color: var(--accent);
    font-weight: 600;
    min-width: 40px;
    text-align: right;
  }
  .checkbox {
    width: 20px;
    height: 20px;
    accent-color: var(--accent);
  }
  .strength {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .strength-bar {
    flex: 1;
    height: 8px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    width: 0%;
    transition: width 0.3s, background 0.3s;
  }
  .strength-text {
    font-size: 0.85rem;
    color: var(--muted);
    min-width: 80px;
  }
  .copy-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #000;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .copy-toast.show {
    opacity: 1;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Password Generator</h1>
  <p class="subtitle">Secure, random, local</p>
  
  <div class="password-display" id="passwordDisplay">Click generate</div>
  
  <div class="controls">
    <button class="btn btn-primary" id="generateBtn">Generate</button>
    <button class="btn btn-secondary" id="copyBtn">Copy</button>
  </div>
  
  <div class="options">
    <div class="option-row">
      <span class="option-label">Length</span>
      <div style="display: flex; align-items: center; gap: 12px;">
        <input type="range" id="lengthSlider" min="8" max="64" value="20">
        <span class="length-value" id="lengthValue">20</span>
      </div>
    </div>
    
    <div class="option-row">
      <span class="option-label">Uppercase (A-Z)</span>
      <input type="checkbox" class="checkbox" id="uppercase" checked>
    </div>
    
    <div class="option-row">
      <span class="option-label">Lowercase (a-z)</span>
      <input type="checkbox" class="checkbox" id="lowercase" checked>
    </div>
    
    <div class="option-row">
      <span class="option-label">Numbers (0-9)</span>
      <input type="checkbox" class="checkbox" id="numbers" checked>
    </div>
    
    <div class="option-row">
      <span class="option-label">Symbols (!@#$%...)</span>
      <input type="checkbox" class="checkbox" id="symbols" checked>
    </div>
  </div>
  
  <div class="strength">
    <span class="strength-text" id="strengthText">Weak</span>
    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill"></div>
    </div>
  </div>
</div>

<div class="copy-toast" id="copyToast">Copied!</div>

<script>
  const passwordDisplay = document.getElementById('passwordDisplay');
  const generateBtn = document.getElementById('generateBtn');
  const copyBtn = document.getElementById('copyBtn');
  const lengthSlider = document.getElementById('lengthSlider');
  const lengthValue = document.getElementById('lengthValue');
  const copyToast = document.getElementById('copyToast');
  const strengthText = document.getElementById('strengthText');
  const strengthFill = document.getElementById('strengthFill');
  
  const uppercase = document.getElementById('uppercase');
  const lowercase = document.getElementById('lowercase');
  const numbers = document.getElementById('numbers');
  const symbols = document.getElementById('symbols');
  
  const uppercaseChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const lowercaseChars = 'abcdefghijklmnopqrstuvwxyz';
  const numberChars = '0123456789';
  const symbolChars = '!@#$%^&*()_+-=[]{}|;:,.<>?';
  
  function generatePassword() {
    let charset = '';
    if (uppercase.checked) charset += uppercaseChars;
    if (lowercase.checked) charset += lowercaseChars;
    if (numbers.checked) charset += numberChars;
    if (symbols.checked) charset += symbolChars;
    
    if (charset.length === 0) {
      passwordDisplay.textContent = 'Select at least one type';
      return;
    }
    
    let password = '';
    const length = parseInt(lengthSlider.value);
    const array = new Uint32Array(length);
    crypto.getRandomValues(array);
    
    for (let i = 0; i < length; i++) {
      password += charset[array[i] % charset.length];
    }
    
    passwordDisplay.textContent = password;
    updateStrength(password);
  }
  
  function updateStrength(password) {
    let score = 0;
    if (password.length >= 8) score++;
    if (password.length >= 12) score++;
    if (password.length >= 16) score++;
    if (password.length >= 20) score++;
    if (/[a-z]/.test(password)) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^a-zA-Z0-9]/.test(password)) score++;
    
    let percent = Math.min(100, (score / 8) * 100);
    let color, text;
    
    if (score <= 3) {
      color = '#ff4444';
      text = 'Weak';
    } else if (score <= 5) {
      color = '#ffaa00';
      text = 'Medium';
    } else if (score <= 7) {
      color = '#00d4aa';
      text = 'Strong';
    } else {
      color = '#00ff88';
      text = 'Very Strong';
    }
    
    strengthFill.style.width = percent + '%';
    strengthFill.style.background = color;
    strengthText.textContent = text;
    strengthText.style.color = color;
  }
  
  function copyPassword() {
    const password = passwordDisplay.textContent;
    if (!password || password === 'Click generate') return;
    
    navigator.clipboard.writeText(password).then(() => {
      passwordDisplay.classList.add('copied');
      copyToast.classList.add('show');
      setTimeout(() => {
        passwordDisplay.classList.remove('copied');
        copyToast.classList.remove('show');
      }, 2000);
    });
  }
  
  lengthSlider.addEventListener('input', () => {
    lengthValue.textContent = lengthSlider.value;
  });
  
  generateBtn.addEventListener('click', generatePassword);
  copyBtn.addEventListener('click', copyPassword);
  
  // Generate on load
  generatePassword();
</script>
</body>
</html>
