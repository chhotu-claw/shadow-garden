<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure, random passwords with customizable options. Copy instantly.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
  .password-display { font-family: 'SF Mono', Monaco, monospace; font-size: 1.1rem; padding: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; word-break: break-all; min-height: 60px; display: flex; align-items: center; }
  .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
  button { padding: 0.75rem 1.25rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
  button:hover { background: var(--border); }
  button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  button.primary:hover { opacity: 0.9; }
  .options { display: grid; gap: 0.75rem; }
  .option-row { display: flex; align-items: center; gap: 0.75rem; }
  .option-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
  .option-row label { cursor: pointer; flex: 1; }
  .option-row input[type="number"] { width: 70px; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); }
  .strength-bar { height: 6px; border-radius: 3px; background: var(--border); margin-top: 1rem; overflow: hidden; }
  .strength-fill { height: 100%; width: 0%; transition: width 0.3s, background 0.3s; }
  .strength-label { font-size: 0.8rem; margin-top: 0.5rem; color: var(--text-secondary); }
  .length-control { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
  .length-control label { font-weight: 500; }
  .length-control input[type="range"] { flex: 1; height: 6px; -webkit-appearance: none; background: var(--border); border-radius: 3px; }
  .length-control input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent); border-radius: 50%; cursor: pointer; }
  .length-value { font-weight: 600; min-width: 30px; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Password Generator</h1>
  <div class="subtitle">Generate secure, random passwords</div>

  <div class="panel">
    <div class="password-display" id="password"></div>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel">Click Generate</div>
    <div class="btn-row">
      <button class="primary" id="generateBtn">Generate</button>
      <button id="copyBtn">Copy</button>
    </div>
  </div>

  <div class="panel">
    <div class="length-control">
      <label>Length:</label>
      <input type="range" id="lengthSlider" min="8" max="64" value="16">
      <span class="length-value" id="lengthValue">16</span>
    </div>
    <div class="options">
      <div class="option-row">
        <input type="checkbox" id="uppercase" checked>
        <label for="uppercase">Uppercase (A-Z)</label>
      </div>
      <div class="option-row">
        <input type="checkbox" id="lowercase" checked>
        <label for="lowercase">Lowercase (a-z)</label>
      </div>
      <div class="option-row">
        <input type="checkbox" id="numbers" checked>
        <label for="numbers">Numbers (0-9)</label>
      </div>
      <div class="option-row">
        <input type="checkbox" id="symbols" checked>
        <label for="symbols">Symbols (!@#$%^&*)</label>
      </div>
    </div>
  </div>
</div>

<script>
const passwordDisplay = document.getElementById('password');
const lengthSlider = document.getElementById('lengthSlider');
const lengthValue = document.getElementById('lengthValue');
const strengthFill = document.getElementById('strengthFill');
const strengthLabel = document.getElementById('strengthLabel');

const charset = {
  uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lowercase: 'abcdefghijklmnopqrstuvwxyz',
  numbers: '0123456789',
  symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
};

function generate() {
  const length = parseInt(lengthSlider.value);
  let chars = '';
  let result = '';

  if (document.getElementById('uppercase').checked) chars += charset.uppercase;
  if (document.getElementById('lowercase').checked) chars += charset.lowercase;
  if (document.getElementById('numbers').checked) chars += charset.numbers;
  if (document.getElementById('symbols').checked) chars += charset.symbols;

  if (!chars) {
    passwordDisplay.textContent = 'Select at least one option';
    strengthFill.style.width = '0%';
    strengthLabel.textContent = 'No characters selected';
    return;
  }

  const array = new Uint32Array(length);
  crypto.getRandomValues(array);
  for (let i = 0; i < length; i++) {
    result += chars[array[i] % chars.length];
  }

  passwordDisplay.textContent = result;
  updateStrength(result);
}

function updateStrength(password) {
  let score = 0;
  if (password.length >= 8) score += 1;
  if (password.length >= 12) score += 1;
  if (password.length >= 16) score += 1;
  if (/[a-z]/.test(password)) score += 1;
  if (/[A-Z]/.test(password)) score += 1;
  if (/[0-9]/.test(password)) score += 1;
  if (/[^a-zA-Z0-9]/.test(password)) score += 1;

  const colors = ['#ef4444', '#f97316', '#eab308', '#84cc16', '#22c55e'];
  const labels = ['Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
  const idx = Math.min(Math.floor(score / 2), 4);
  
  strengthFill.style.background = colors[idx];
  strengthFill.style.width = ((score / 7) * 100) + '%';
  strengthLabel.textContent = labels[idx] + ' • ' + password.length + ' characters';
}

lengthSlider.addEventListener('input', () => {
  lengthValue.textContent = lengthSlider.value;
});

document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', generate);
});

document.getElementById('generateBtn').addEventListener('click', generate);

document.getElementById('copyBtn').addEventListener('click', () => {
  const pw = passwordDisplay.textContent;
  if (pw && pw !== 'Select at least one option') {
    navigator.clipboard.writeText(pw);
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  }
});

generate();
</script>
</body>
</html>
