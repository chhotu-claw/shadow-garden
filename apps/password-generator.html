<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Shadow's Garden</title>
<meta name="description" content="Generate secure passwords locally in your browser. Customizable length and character types.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --border: #334155;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 500px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    margin-bottom: 0.5rem;
    font-size: 1.75rem;
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.875rem;
  }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
  }

  .password-display {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-size: 1.25rem;
    text-align: center;
    word-break: break-all;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    position: relative;
  }

  .password-display.error {
    border-color: var(--danger);
    color: var(--danger);
  }

  .copy-btn {
    position: absolute;
    right: 0.5rem;
    top: 50%;
    transform: translateY(-50%);
    background: var(--primary);
    border: none;
    color: white;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.875rem;
    transition: background 0.2s;
  }

  .copy-btn:hover {
    background: var(--primary-hover);
  }

  .copy-btn.copied {
    background: var(--success);
  }

  .strength-meter {
    margin-bottom: 1rem;
  }

  .strength-bar {
    height: 8px;
    background: var(--bg);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }

  .strength-fill {
    height: 100%;
    transition: width 0.3s, background 0.3s;
    border-radius: 4px;
  }

  .strength-fill.weak { background: var(--danger); width: 25%; }
  .strength-fill.fair { background: var(--warning); width: 50%; }
  .strength-fill.good { background: #84cc16; width: 75%; }
  .strength-fill.strong { background: var(--success); width: 100%; }

  .strength-text {
    font-size: 0.875rem;
    text-align: center;
  }

  .strength-text.weak { color: var(--danger); }
  .strength-text.fair { color: var(--warning); }
  .strength-text.good { color: #84cc16; }
  .strength-text.strong { color: var(--success); }

  .control-group {
    margin-bottom: 1rem;
  }

  .control-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
    font-size: 0.875rem;
  }

  .control-label span:first-child {
    color: var(--text-muted);
  }

  .control-label span:last-child {
    color: var(--text);
    font-weight: bold;
  }

  input[type="range"] {
    width: 100%;
    height: 8px;
    background: var(--bg);
    border-radius: 4px;
    outline: none;
    -webkit-appearance: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    background: var(--primary);
    border-radius: 50%;
    cursor: pointer;
  }

  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    font-size: 0.9375rem;
  }

  .checkbox-label input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--primary);
  }

  .checkbox-label span {
    flex: 1;
  }

  .checkbox-label .hint {
    color: var(--text-muted);
    font-size: 0.75rem;
  }

  .btn {
    width: 100%;
    padding: 1rem;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
    font-size: 1.125rem;
    font-weight: bold;
  }

  .btn-primary:hover {
    background: var(--primary-hover);
  }

  .history {
    margin-top: 1.5rem;
  }

  .history h3 {
    font-size: 0.875rem;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    padding: 0.75rem;
    border-radius: 6px;
    font-size: 0.875rem;
  }

  .history-password {
    flex: 1;
    word-break: break-all;
    margin-right: 0.5rem;
  }

  .history-copy {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0.25rem;
    font-size: 1rem;
  }

  .history-copy:hover {
    color: var(--primary);
  }

  .clear-history {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.75rem;
    margin-top: 0.5rem;
  }

  .clear-history:hover {
    color: var(--danger);
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 0.875rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>🔐 Password Generator</h1>
    <p class="subtitle">Secure passwords, generated locally, never leave your browser.</p>

    <div class="card">
      <div class="password-display" id="password-display">
        <span id="password-text">Click generate</span>
        <button class="copy-btn" id="copy-btn" onclick="copyPassword()">Copy</button>
      </div>

      <div class="strength-meter">
        <div class="strength-bar">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
        <p class="strength-text" id="strength-text">—</p>
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Length</span>
          <span id="length-value">16</span>
        </div>
        <input type="range" id="length-slider" min="4" max="64" value="16">
      </div>

      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="uppercase" checked>
          <span>Uppercase</span>
          <span class="hint">A-Z</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="lowercase" checked>
          <span>Lowercase</span>
          <span class="hint">a-z</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="numbers" checked>
          <span>Numbers</span>
          <span class="hint">0-9</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="symbols" checked>
          <span>Symbols</span>
          <span class="hint">!@#$%^&*</span>
        </label>
      </div>
    </div>

    <button class="btn btn-primary" onclick="generatePassword()">Generate Password</button>

    <div class="history">
      <h3>Recent passwords</h3>
      <div class="history-list" id="history-list"></div>
      <button class="clear-history" onclick="clearHistory()">Clear history</button>
    </div>
  </div>

  <div class="toast" id="toast">Copied!</div>

  <script>
    const HISTORY_KEY = 'pwd_gen_history';
    const MAX_HISTORY = 10;

    const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lowercase = 'abcdefghijklmnopqrstuvwxyz';
    const numbers = '0123456789';
    const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    let currentPassword = '';

    function generatePassword() {
      let chars = '';
      if (document.getElementById('uppercase').checked) chars += uppercase;
      if (document.getElementById('lowercase').checked) chars += lowercase;
      if (document.getElementById('numbers').checked) chars += numbers;
      if (document.getElementById('symbols').checked) chars += symbols;

      if (!chars) {
        showToast('Select at least one character type');
        document.getElementById('password-display').classList.add('error');
        document.getElementById('password-text').textContent = 'Select character types';
        return;
      }

      const length = parseInt(document.getElementById('length-slider').value);
      let password = '';
      
      // Ensure at least one character from each selected type
      let guaranteed = [];
      if (document.getElementById('uppercase').checked) guaranteed.push(randomChar(uppercase));
      if (document.getElementById('lowercase').checked) guaranteed.push(randomChar(lowercase));
      if (document.getElementById('numbers').checked) guaranteed.push(randomChar(numbers));
      if (document.getElementById('symbols').checked) guaranteed.push(randomChar(symbols));

      // Fill the rest randomly
      const remaining = length - guaranteed.length;
      for (let i = 0; i < remaining; i++) {
        password += randomChar(chars);
      }

      // Add guaranteed chars and shuffle
      password += guaranteed.join('');
      password = shuffleString(password);

      currentPassword = password;
      document.getElementById('password-display').classList.remove('error');
      document.getElementById('password-text').textContent = password;
      
      updateStrength(password);
      addToHistory(password);
    }

    function randomChar(str) {
      const arr = new Uint32Array(1);
      crypto.getRandomValues(arr);
      return str[arr[0] % str.length];
    }

    function shuffleString(str) {
      const arr = str.split('');
      for (let i = arr.length - 1; i > 0; i--) {
        const arr2 = new Uint32Array(1);
        crypto.getRandomValues(arr2);
        const j = arr2[0] % (i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr.join('');
    }

    function updateStrength(password) {
      let score = 0;
      
      // Length score
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (password.length >= 16) score++;
      if (password.length >= 20) score++;

      // Character variety
      if (/[a-z]/.test(password)) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^a-zA-Z0-9]/.test(password)) score++;

      const fill = document.getElementById('strength-fill');
      const text = document.getElementById('strength-text');

      fill.className = 'strength-fill';
      text.className = 'strength-text';

      if (score <= 2) {
        fill.classList.add('weak');
        text.classList.add('weak');
        text.textContent = 'Weak';
      } else if (score <= 4) {
        fill.classList.add('fair');
        text.classList.add('fair');
        text.textContent = 'Fair';
      } else if (score <= 6) {
        fill.classList.add('good');
        text.classList.add('good');
        text.textContent = 'Good';
      } else {
        fill.classList.add('strong');
        text.classList.add('strong');
        text.textContent = 'Strong';
      }
    }

    function copyPassword() {
      if (!currentPassword) return;
      navigator.clipboard.writeText(currentPassword).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function getHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveHistory(history) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function addToHistory(password) {
      const history = getHistory();
      // Don't add duplicates
      if (history.includes(password)) return;
      
      history.unshift(password);
      if (history.length > MAX_HISTORY) history.pop();
      
      saveHistory(history);
      renderHistory();
    }

    function renderHistory() {
      const history = getHistory();
      const container = document.getElementById('history-list');
      
      if (history.length === 0) {
        container.innerHTML = '<p style="color: var(--text-muted); font-size: 0.875rem;">No recent passwords</p>';
        return;
      }

      container.innerHTML = history.map((pwd, i) => `
        <div class="history-item">
          <span class="history-password">${pwd}</span>
          <button class="history-copy" onclick="copyFromHistory(${i})" title="Copy">📋</button>
        </div>
      `).join('');
    }

    function copyFromHistory(index) {
      const history = getHistory();
      navigator.clipboard.writeText(history[index]).then(() => {
        showToast('Copied!');
      });
    }

    function clearHistory() {
      saveHistory([]);
      renderHistory();
      showToast('History cleared');
    }

    // Update length display
    document.getElementById('length-slider').addEventListener('input', (e) => {
      document.getElementById('length-value').textContent = e.target.value;
    });

    // Generate on load
    renderHistory();
    generatePassword();
  </script>
</body>
</html>
