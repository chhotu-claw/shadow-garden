<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker — Shadow's Garden</title>
<meta name="description" content="Check password strength in real-time. Analyzes length, complexity, common patterns, and estimates crack time.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { width: 100%; max-width: 500px; }
  h1 { margin-bottom: 0.5rem; }
  p { color: var(--text-secondary); margin-bottom: 1.5rem; }
  .input-box { width: 100%; }
  input[type="text"] { width: 100%; padding: 1rem; border: 2px solid var(--border); border-radius: 12px; background: var(--card); color: var(--text); font-size: 1.2rem; box-sizing: border-box; }
  input[type="text"]:focus { outline: none; border-color: var(--accent); }
  .strength-bar { height: 8px; background: var(--border); border-radius: 4px; margin-top: 1rem; overflow: hidden; }
  .strength-fill { height: 100%; width: 0%; border-radius: 4px; transition: width 0.3s, background 0.3s; }
  .strength-fill.weak { width: 25%; background: #ff4444; }
  .strength-fill.fair { width: 50%; background: #ffaa00; }
  .strength-fill.good { width: 75%; background: #88cc00; }
  .strength-fill.strong { width: 100%; background: #00cc66; }
  .score-text { margin-top: 0.5rem; font-weight: 600; }
  .checks { margin-top: 1.5rem; }
  .check-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; border-radius: 6px; margin-bottom: 0.25rem; }
  .check-item.pass { color: #00cc66; }
  .check-item.fail { color: #ff4444; opacity: 0.6; }
  .crack-time { margin-top: 1rem; padding: 1rem; background: var(--card); border-radius: 8px; text-align: center; }
  .crack-time strong { color: var(--accent); font-size: 1.2rem; }
  .warning { margin-top: 1rem; padding: 1rem; background: #442222; border: 1px solid #ff4444; border-radius: 8px; color: #ff8888; display: none; }
  .warning.show { display: block; }
  .toggle { margin-top: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
  .toggle input { width: auto; }
  .toggle label { font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Password Strength Checker</h1>
    <p>Check password strength in real-time</p>
    
    <div class="input-box">
      <input type="text" id="passwordInput" placeholder="Enter password to check..." autocomplete="off">
    </div>
    
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="score-text" id="scoreText">Enter a password</div>
    
    <div class="checks" id="checks"></div>
    
    <div class="crack-time" id="crackTime" style="display: none;">
      Estimated crack time: <strong id="crackValue">-</strong>
    </div>
    
    <div class="warning" id="warning">⚠️ This is a commonly used password. Change it.</div>
    
    <div class="toggle">
      <input type="checkbox" id="showPassword">
      <label for="showPassword">Show password</label>
    </div>
  </div>
  
  <script>
    const commonPasswords = ['password', '123456', '12345678', '123456789', 'qwerty', 'abc123', 'monkey', '1234567', 'letmein', 'trustno1', 'dragon', 'baseball', 'iloveyou', 'master', 'sunshine', 'ashley', 'bailey', 'passw0rd', 'shadow', '123123', '654321', 'superman', 'qazwsx', 'michael', 'football', 'password1', 'password123', 'welcome'];
    
    const input = document.getElementById('passwordInput');
    const fill = document.getElementById('strengthFill');
    const scoreText = document.getElementById('scoreText');
    const checksDiv = document.getElementById('checks');
    const crackTimeDiv = document.getElementById('crackTime');
    const crackValue = document.getElementById('crackValue');
    const warning = document.getElementById('warning');
    const showPassword = document.getElementById('showPassword');
    
    input.type = 'password';
    showPassword.addEventListener('change', () => { input.type = showPassword.checked ? 'text' : 'password'; });
    
    input.addEventListener('input', checkPassword);
    
    function checkPassword() {
      const pwd = input.value;
      if (!pwd) {
        fill.className = 'strength-fill';
        fill.style.width = '0%';
        scoreText.textContent = 'Enter a password';
        checksDiv.innerHTML = '';
        crackTimeDiv.style.display = 'none';
        warning.classList.remove('show');
        return;
      }
      
      let score = 0;
      const checks = [];
      
      // Length checks
      if (pwd.length >= 8) { score += 1; checks.push({name: 'At least 8 characters', pass: true}); }
      else checks.push({name: 'At least 8 characters', pass: false});
      
      if (pwd.length >= 12) { score += 1; checks.push({name: '12+ characters', pass: true}); }
      
      // Character diversity
      if (/[a-z]/.test(pwd)) { score += 1; checks.push({name: 'Lowercase', pass: true}); }
      else checks.push({name: 'Lowercase', pass: false});
      
      if (/[A-Z]/.test(pwd)) { score += 1; checks.push({name: 'Uppercase', pass: true}); }
      else checks.push({name: 'Uppercase', pass: false});
      
      if (/[0-9]/.test(pwd)) { score += 1; checks.push({name: 'Number', pass: true}); }
      else checks.push({name: 'Number', pass: false});
      
      if (/[^a-zA-Z0-9]/.test(pwd)) { score += 1; checks.push({name: 'Special character', pass: true}); }
      else checks.push({name: 'Special character', pass: false});
      
      // Common password check
      const isCommon = commonPasswords.includes(pwd.toLowerCase());
      if (isCommon) { score = 0; checks.push({name: 'Not a common password', pass: false}); }
      else checks.push({name: 'Not a common password', pass: true});
      
      // Sequential/repeated check
      const hasSeq = /(.)\1{2,}/.test(pwd) || /123|234|345|456|567|678|789|abc|bcd|cde|def|efg/.test(pwd);
      if (hasSeq) { score = Math.max(0, score - 1); }
      
      // Score display
      let strength = 'weak';
      if (score >= 6 && !isCommon) strength = 'strong';
      else if (score >= 4 && !isCommon) strength = 'good';
      else if (score >= 2) strength = 'fair';
      
      fill.className = 'strength-fill ' + strength;
      scoreText.textContent = strength.charAt(0).toUpperCase() + strength.slice(1);
      
      // Render checks
      checksDiv.innerHTML = checks.map(c => 
        `<div class="check-item ${c.pass ? 'pass' : 'fail'}">${c.pass ? '✓' : '✗'} ${c.name}</div>`
      ).join('');
      
      // Crack time estimation (rough)
      // Assuming 10 billion guesses/second
      const combos = Math.pow(94, pwd.length);
      const secs = combos / 1e10;
      crackValue.textContent = formatTime(secs);
      crackTimeDiv.style.display = 'block';
      
      warning.classList.toggle('show', isCommon);
    }
    
    function formatTime(secs) {
      if (secs < 1) return 'instantly';
      if (secs < 60) return Math.round(secs) + ' seconds';
      if (secs < 3600) return Math.round(secs/60) + ' minutes';
      if (secs < 86400) return Math.round(secs/3600) + ' hours';
      if (secs < 31536000) return Math.round(secs/86400) + ' days';
      if (secs < 31536000 * 100) return Math.round(secs/31536000) + ' years';
      if (secs < 31536000 * 1000000) return Math.round(secs/31536000) + ' centuries';
      return 'millions of years';
    }
  </script>
</body>
</html>
