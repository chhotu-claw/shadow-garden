<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Scratchpad — Shadow's Garden</title>
<meta name="description" content="A simple scratchpad that auto-saves everything to localStorage. No setup, no files, just type.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  .scratchpad-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 140px);
  }
  textarea {
    flex: 1;
    width: 100%;
    padding: 16px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 15px;
    line-height: 1.6;
    border: 1px solid #333;
    border-radius: 8px;
    background: #1a1a1a;
    color: #e0e0e0;
    resize: none;
  }
  textarea:focus {
    outline: 2px solid #4a9eff;
    border-color: #4a9eff;
  }
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    font-size: 13px;
    color: #666;
  }
  .status-bar .saved {
    color: #4ade80;
  }
  .status-bar .words {
    color: #888;
  }
  .shortcuts {
    font-size: 12px;
    color: #555;
  }
  kbd {
    background: #333;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: inherit;
  }
</style>
</head>
<body data-page-type="app">
  <div class="scratchpad-container">
    <div class="status-bar">
      <span class="shortcuts"><kbd>Ctrl+S</kbd> force save · auto-saves every keystroke</span>
      <span class="words" id="wordCount">0 words · 0 characters</span>
      <span class="saved" id="saveStatus">saved</span>
    </div>
    <textarea id="scratchpad" placeholder="Start typing... your notes save automatically."></textarea>
  </div>
  <script>
    const textarea = document.getElementById('scratchpad');
    const saveStatus = document.getElementById('saveStatus');
    const wordCount = document.getElementById('wordCount');
    const STORAGE_KEY = 'shadow-scratchpad-content';
    let saveTimeout;

    // Load saved content
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      textarea.value = saved;
    }
    updateCounts();

    // Auto-save on input
    textarea.addEventListener('input', () => {
      updateCounts();
      saveStatus.textContent = 'saving...';
      saveStatus.classList.remove('saved');
      
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        localStorage.setItem(STORAGE_KEY, textarea.value);
        saveStatus.textContent = 'saved';
        saveStatus.classList.add('saved');
      }, 500);
    });

    // Manual save
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        localStorage.setItem(STORAGE_KEY, textarea.value);
        saveStatus.textContent = 'saved';
        saveStatus.classList.add('saved');
      }
    });

    function updateCounts() {
      const text = textarea.value;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      const chars = text.length;
      wordCount.textContent = `${words} word${words !== 1 ? 's' : ''} · ${chars} character${chars !== 1 ? 's' : ''}`;
    }

    // Focus on load
    textarea.focus();
  </script>
</body>
</html>
