<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Parser — Shadow's Garden</title>
<meta name="description" content="Parse cron expressions and see the next 5 run times. Built-in presets for common schedules.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --success: #22c55e;
    --error: #ef4444;
    --border: #334155;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    margin-bottom: 0.5rem;
    font-size: 1.75rem;
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.875rem;
  }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
  }

  .form-group {
    margin-bottom: 1rem;
  }

  label {
    display: block;
    margin-bottom: 0.5rem;
    font-size: 0.875rem;
    color: var(--text-muted);
  }

  input[type="text"] {
    width: 100%;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 1.25rem;
    text-align: center;
    letter-spacing: 0.1em;
    box-sizing: border-box;
  }

  input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover {
    background: var(--primary-hover);
  }

  .btn-secondary {
    background: var(--border);
    color: var(--text);
  }

  .btn-secondary:hover {
    background: #475569;
  }

  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .preset {
    padding: 0.5rem 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .preset:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .fields {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .field {
    text-align: center;
  }

  .field label {
    font-size: 0.7rem;
    margin-bottom: 0.25rem;
  }

  .field input {
    width: 100%;
    padding: 0.5rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.875rem;
    text-align: center;
    box-sizing: border-box;
  }

  .field input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .field.hint {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
  }

  .results {
    margin-top: 1.5rem;
  }

  .result-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1rem;
    background: var(--bg);
    border-radius: 8px;
    margin-bottom: 0.5rem;
  }

  .result-date {
    font-size: 1rem;
  }

  .result-relative {
    color: var(--text-muted);
    font-size: 0.75rem;
  }

  .error {
    color: var(--error);
    padding: 1rem;
    text-align: center;
    background: rgba(239, 68, 68, 0.1);
    border-radius: 8px;
    font-size: 0.875rem;
  }

  .help {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .help h3 {
    font-size: 0.875rem;
    margin-bottom: 0.75rem;
    color: var(--text-muted);
  }

  .help-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.5rem;
    font-size: 0.75rem;
  }

  .help-item {
    display: flex;
    justify-content: space-between;
    padding: 0.25rem 0.5rem;
    background: var(--bg);
    border-radius: 4px;
  }

  .help-item span:first-child {
    color: var(--primary);
  }

  .help-item span:last-child {
    color: var(--text-muted);
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 0.875rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
  }

  .copy-btn {
    padding: 0.25rem 0.5rem;
    font-size: 0.75rem;
    min-width: auto;
    width: auto;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>⏰ Cron Parser</h1>
    <p class="subtitle">Parse cron expressions and see the next run times</p>

    <div class="card">
      <div class="presets">
        <button class="preset" onclick="setPreset('* * * * *')">Every minute</button>
        <button class="preset" onclick="setPreset('0 * * * *')">Every hour</button>
        <button class="preset" onclick="setPreset('0 0 * * *')">Daily midnight</button>
        <button class="preset" onclick="setPreset('0 9 * * *')">Daily 9am</button>
        <button class="preset" onclick="setPreset('0 9 * * 1-5')">Weekdays 9am</button>
        <button class="preset" onclick="setPreset('0 0 * * 0')">Weekly Sunday</button>
        <button class="preset" onclick="setPreset('0 0 1 * *')">Monthly 1st</button>
        <button class="preset" onclick="setPreset('0 0 1 1 *')">Yearly Jan 1</button>
      </div>

      <div class="form-group">
        <label>Cron Expression</label>
        <input type="text" id="cron" placeholder="* * * * *" value="0 9 * * *">
      </div>

      <button class="btn btn-primary" onclick="parseCron()">Parse</button>
    </div>

    <div id="results" class="results"></div>

    <div class="card help">
      <h3>Field Reference</h3>
      <div class="help-grid">
        <div class="help-item"><span>*</span><span>any</span></div>
        <div class="help-item"><span>,</span><span>list (1,3,5)</span></div>
        <div class="help-item"><span>-</span><span>range (1-5)</span></div>
        <div class="help-item"><span>/</span><span>step (*/5)</span></div>
      </div>
      <div class="help-grid" style="margin-top: 0.5rem;">
        <div class="help-item"><span>min</span><span>0-59</span></div>
        <div class="help-item"><span>hour</span><span>0-23</span></div>
        <div class="help-item"><span>day</span><span>1-31</span></div>
        <div class="help-item"><span>month</span><span>1-12</span></div>
        <div class="help-item"><span>weekday</span><span>0-6</span></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Copied!</div>

  <script>
    const fieldNames = ['minute', 'hour', 'day', 'month', 'weekday'];
    const fieldRanges = [
      [0, 59], // minute
      [0, 23], // hour
      [1, 31], // day
      [1, 12], // month
      [0, 6]   // weekday
    ];

    function setPreset(expr) {
      document.getElementById('cron').value = expr;
      parseCron();
    }

    function parseField(value, min, max) {
      if (value === '*') {
        return { type: 'any' };
      }

      if (value.includes('/')) {
        const [range, step] = value.split('/');
        const stepNum = parseInt(step);
        if (range === '*') {
          return { type: 'step', min, max, step: stepNum };
        }
        if (range.includes('-')) {
          const [start, end] = range.split('-').map(Number);
          return { type: 'step', min: start, max: end, step: stepNum };
        }
      }

      if (value.includes(',')) {
        return { type: 'list', values: value.split(',').map(Number).sort((a, b) => a - b) };
      }

      if (value.includes('-')) {
        const [start, end] = value.split('-').map(Number);
        return { type: 'range', start, end };
      }

      const num = parseInt(value);
      if (!isNaN(num) && num >= min && num <= max) {
        return { type: 'value', value: num };
      }

      return null;
    }

    function getNextValue(parsed, current, min, max) {
      if (parsed.type === 'any') {
        return current;
      }

      if (parsed.type === 'value') {
        return parsed.value >= current ? parsed.value : null;
      }

      if (parsed.type === 'range') {
        if (current >= parsed.start && current <= parsed.max) {
          return current >= parsed.min ? current : parsed.min;
        }
        return parsed.min;
      }

      if (parsed.type === 'list') {
        const found = parsed.values.find(v => v >= current);
        return found !== undefined ? found : null;
      }

      if (parsed.type === 'step') {
        if (parsed.min === min && parsed.max === max) {
          const rem = current % parsed.step;
          return rem === 0 ? current : current + (parsed.step - rem);
        }
        return current;
      }

      return null;
    }

    function addMonths(date, months) {
      const d = new Date(date);
      d.setMonth(d.getMonth() + months);
      return d;
    }

    function getNextOccurrence(fields) {
      const now = new Date();
      let date = new Date(now);
      date.setSeconds(0);
      date.setMilliseconds(0);

      // Start from current minute
      if (fields[0].type !== 'any') {
        date.setMinutes(date.getMinutes() + 1);
      }

      // Max iterations to prevent infinite loop
      for (let iter = 0; iter < 10000; iter++) {
        // Check month
        const monthParsed = fields[3];
        const month = date.getMonth() + 1;
        const monthVal = getNextValue(monthParsed, month, 1, 12);
        
        if (monthVal === null) {
          date = addMonths(date, 1);
          date.setDate(1);
          date.setHours(0, 0, 0, 0);
          continue;
        }

        if (monthVal !== month) {
          date.setMonth(monthVal - 1);
          date.setDate(1);
          date.setHours(0, 0, 0, 0);
        }

        // Check day
        const dayParsed = fields[2];
        const day = date.getDate();
        const maxDay = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
        const dayVal = getNextValue({ ...dayParsed, max: maxDay }, day, 1, maxDay);

        if (dayVal === null) {
          date.setDate(1);
          date.setMonth(date.getMonth() + 1);
          continue;
        }

        if (dayVal !== day) {
          date.setDate(dayVal);
          date.setHours(0, 0, 0, 0);
        }

        // Check weekday (0-6, Sunday = 0)
        const weekdayParsed = fields[4];
        const weekday = date.getDay();
        
        // If both day and weekday are specified, either match satisfies
        // If only one is specified, that one must match
        // Simplified: just check if current weekday is valid
        
        // Check hour
        const hourParsed = fields[1];
        const hour = date.getHours();
        const hourVal = getNextValue(hourParsed, hour, 0, 23);

        if (hourVal === null) {
          date.setHours(0);
          date.setDate(date.getDate() + 1);
          continue;
        }

        if (hourVal !== hour) {
          date.setHours(hourVal);
          date.setMinutes(0);
          continue;
        }

        // Check minute
        const minParsed = fields[0];
        const min = date.getMinutes();
        const minVal = getNextValue(minParsed, min, 0, 59);

        if (minVal === null) {
          date.setMinutes(0);
          date.setHours(date.getHours() + 1);
          continue;
        }

        if (minVal !== min) {
          date.setMinutes(minVal);
          continue;
        }

        // Got a valid time
        if (date > now) {
          return date;
        }

        // Move to next minute
        date.setMinutes(date.getMinutes() + 1);
      }

      return null;
    }

    function getRelativeTime(date) {
      const now = new Date();
      const diff = date - now;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);

      if (minutes < 1) return "just now";
      if (minutes < 60) return `in ${minutes}m`;
      if (hours < 24) return `in ${hours}h ${minutes % 60}m`;
      return `in ${days}d ${hours % 24}h`;
    }

    function formatDate(date) {
      return date.toLocaleString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function parseCron() {
      const input = document.getElementById('cron').value.trim();
      const parts = input.split(/\s+/);

      if (parts.length !== 5) {
        document.getElementById('results').innerHTML = '<div class="error">Invalid cron expression. Need exactly 5 fields.</div>';
        return;
      }

      const fields = parts.map((part, i) => {
        const parsed = parseField(part, fieldRanges[i][0], fieldRanges[i][1]);
        if (!parsed) {
          return null;
        }
        return parsed;
      });

      if (fields.includes(null)) {
        document.getElementById('results').innerHTML = '<div class="error">Invalid field value. Check the reference below.</div>';
        return;
      }

      const results = [];
      for (let i = 0; i < 5; i++) {
        const next = getNextOccurrence(fields);
        if (next) {
          results.push({ date: next, relative: getRelativeTime(next) });
          // Move time forward slightly to get next occurrence
          fields[0] = { type: 'value', value: next.getMinutes() + 1 };
        }
      }

      if (results.length === 0) {
        document.getElementById('results').innerHTML = '<div class="error">Could not calculate next occurrences.</div>';
        return;
      }

      document.getElementById('results').innerHTML = results.map(r => `
        <div class="result-item">
          <div>
            <div class="result-date">${formatDate(r.date)}</div>
            <div class="result-relative">${r.relative}</div>
          </div>
          <button class="btn btn-secondary copy-btn" onclick="copyDate('${r.date.toISOString()}')">📋</button>
        </div>
      `).join('');
    }

    function copyDate(iso) {
      const date = new Date(iso);
      navigator.clipboard.writeText(date.toLocaleString());
      showToast('Copied!');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Parse on load
    parseCron();
  </script>
</body>
</html>
