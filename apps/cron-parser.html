<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Expression Parser — Shadow's Garden</title>
<meta name="description" content="Parse, visualize, and understand cron expressions. See next run times instantly.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #10b981;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }
  .description {
    color: var(--muted);
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }
  .input-group {
    margin-bottom: 1.5rem;
  }
  label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--muted);
    font-size: 0.85rem;
  }
  input, select {
    width: 100%;
    padding: 0.75rem 1rem;
    font-size: 1.1rem;
    font-family: inherit;
    background: var(--card);
    border: 2px solid #334155;
    border-radius: 8px;
    color: var(--text);
    box-sizing: border-box;
    transition: border-color 0.2s;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .cron-input {
    font-size: 1.5rem !important;
    letter-spacing: 0.1em;
    text-align: center;
  }
  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .preset-btn {
    padding: 0.4rem 0.75rem;
    font-size: 0.8rem;
    background: var(--card);
    border: 1px solid #334155;
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .result-card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .result-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .result-value {
    font-size: 1.25rem;
    color: var(--accent);
    word-break: break-all;
  }
  .result-value.error {
    color: #ef4444;
  }
  .next-runs {
    display: grid;
    gap: 0.75rem;
  }
  .run-time {
    display: flex;
    justify-content: space-between;
    padding: 0.75rem;
    background: rgba(16, 185, 129, 0.1);
    border-radius: 6px;
    font-size: 0.9rem;
  }
  .run-time .date {
    color: var(--text);
  }
  .run-time .relative {
    color: var(--muted);
    font-size: 0.8rem;
  }
  .human-readable {
    line-height: 1.8;
    color: var(--text);
  }
  .human-readable .field {
    padding: 0.2rem 0.5rem;
    background: rgba(16, 185, 129, 0.15);
    border-radius: 4px;
    margin: 0 0.2rem;
  }
  .field-names {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.5rem;
    margin-bottom: 1rem;
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .copy-btn {
    padding: 0.5rem 1rem;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: var(--bg);
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .copy-btn:hover {
    opacity: 0.9;
  }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: var(--bg);
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .toast.show {
    opacity: 1;
  }
  @media (max-width: 600px) {
    .field-names {
      grid-template-columns: repeat(3, 1fr);
    }
    .run-time {
      flex-direction: column;
      gap: 0.25rem;
    }
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Cron Expression Parser</h1>
  <p class="description">Parse cron expressions and see exactly when they'll run next.</p>

  <div class="input-group">
    <label for="cron">Cron Expression (5-field: minute hour day month weekday)</label>
    <input type="text" id="cron" class="cron-input" value="*/5 * * * *" placeholder="* * * * *">
  </div>

  <div class="presets">
    <button class="preset-btn" data-cron="* * * * *">Every minute</button>
    <button class="preset-btn" data-cron="*/5 * * * *">Every 5 min</button>
    <button class="preset-btn" data-cron="*/15 * * * *">Every 15 min</button>
    <button class="preset-btn" data-cron="0 * * * *">Every hour</button>
    <button class="preset-btn" data-cron="0 0 * * *">Daily midnight</button>
    <button class="preset-btn" data-cron="0 9 * * *">Daily 9 AM</button>
    <button class="preset-btn" data-cron="0 9 * * 1-5">Weekdays 9 AM</button>
    <button class="preset-btn" data-cron="0 0 * * 0">Weekly Sunday</button>
    <button class="preset-btn" data-cron="0 0 1 * *">Monthly 1st</button>
    <button class="preset-btn" data-cron="0 0 1 1 *">Yearly Jan 1st</button>
  </div>

  <div class="field-names">
    <span>MINUTE</span>
    <span>HOUR</span>
    <span>DAY</span>
    <span>MONTH</span>
    <span>WEEKDAY</span>
  </div>

  <div class="result-card">
    <div class="result-label">Human Readable</div>
    <div class="human-readable" id="human"></div>
  </div>

  <div class="result-card">
    <div class="result-label">Next 10 Runs</div>
    <div class="next-runs" id="next-runs"></div>
  </div>

  <div class="result-card">
    <div class="result-label">Parsed Fields</div>
    <div id="parsed"></div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const fieldNames = ['minute', 'hour', 'day', 'month', 'weekday'];
const fieldRanges = [
  { min: 0, max: 59 },
  { min: 0, max: 23 },
  { min: 1, max: 31 },
  { min: 1, max: 12 },
  { min: 0, max: 6 }
];
const monthNames = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

function parseField(value, fieldIndex) {
  const range = fieldRanges[fieldIndex];
  const result = new Set();
  
  if (value === '*') {
    for (let i = range.min; i <= range.max; i++) result.add(i);
    return result;
  }
  
  if (value.includes('/')) {
    const [base, step] = value.split('/');
    const stepNum = parseInt(step);
    let start = base === '*' ? range.min : parseInt(base);
    for (let i = start; i <= range.max; i += stepNum) result.add(i);
    return result;
  }
  
  if (value.includes('-')) {
    const [start, end] = value.split('-').map(Number);
    for (let i = start; i <= end; i++) result.add(i);
    return result;
  }
  
  if (value.includes(',')) {
    value.split(',').forEach(v => {
      if (v.includes('-')) {
        const [s, e] = v.split('-').map(Number);
        for (let i = s; i <= e; i++) result.add(i);
      } else {
        result.add(parseInt(v));
      }
    });
    return result;
  }
  
  result.add(parseInt(value));
  return result;
}

function getFieldDescription(field, index) {
  const names = ['', '', '', monthNames.slice(1), dayNames];
  const descs = ['minutes', 'hours', 'days', 'months', 'weekdays'];
  
  if (field === '*') return `every ${descs[index]}`;
  if (field.startsWith('*/')) return `every ${field.slice(2)} ${descs[index]}`;
  if (field.includes('-')) {
    const [s, e] = field.split('-').map(Number);
    return `${names[index][s] || s} to ${names[index][e] || e}`;
  }
  if (field.includes(',')) {
    return field.split(',').map(v => names[index][v] || v).join(', ');
  }
  return `${names[index][field] || field}`;
}

function toHumanReadable(cron) {
  const parts = cron.trim().split(/\s+/);
  if (parts.length !== 5) return null;
  
  const [min, hour, day, month, wd] = parts;
  let desc = 'Runs ';
  
  // Time
  if (min === '*' && hour === '*') {
    desc += 'every minute';
  } else if (min === '0' && hour === '*') {
    desc += 'every hour';
  } else if (min.startsWith('*/')) {
    desc += `every ${min.slice(2)} minutes`;
  } else if (hour.startsWith('*/')) {
    desc += `every ${hour.slice(2)} hours`;
  } else if (hour === '*') {
    desc += `at minute ${min}`;
  } else {
    desc += `at ${hour.padStart(2, '0')}:${min.padStart(2, '0')}`;
  }
  
  // Day
  if (day !== '*') {
    if (day.startsWith('*/')) {
      desc += `, every ${day.slice(2)} days`;
    } else {
      desc += ` on day ${day}`;
    }
  }
  
  // Month
  if (month !== '*') {
    if (month.startsWith('*/')) {
      desc += `, every ${month.slice(2)} months`;
    } else {
      desc += ` in ${monthNames[month]}`;
    }
  }
  
  // Weekday
  if (wd !== '*') {
    if (wd === '0') desc += ' on Sunday';
    else if (wd === '1') desc += ' on Monday';
    else if (wd === '2') desc += ' on Tuesday';
    else if (wd === '3') desc += ' on Wednesday';
    else if (wd === '4') desc += ' on Thursday';
    else if (wd === '5') desc += ' on Friday';
    else if (wd === '6') desc += ' on Saturday';
    else if (wd === '1-5') desc += ' on weekdays';
    else if (wd === '0,6') desc += ' on weekends';
    else desc += ` on ${dayNames[wd]}`;
  }
  
  return desc;
}

function getNextRuns(cron, count = 10) {
  const parts = cron.trim().split(/\s+/);
  if (parts.length !== 5) return [];
  
  try {
    const [minField, hourField, dayField, monthField, wdField] = parts;
    const minSet = parseField(minField, 0);
    const hourSet = parseField(hourField, 1);
    const daySet = parseField(dayField, 2);
    const monthSet = parseField(monthField, 3);
    const wdSet = parseField(wdField, 4);
    
    const runs = [];
    const now = new Date();
    let current = new Date(now);
    current.setSeconds(0);
    current.setMilliseconds(0);
    
    // Move to next minute
    current.setMinutes(current.getMinutes() + 1);
    
    while (runs.length < count) {
      const m = current.getMonth() + 1;
      const d = current.getDate();
      const wd = current.getDay();
      const h = current.getHours();
      const min = current.getMinutes();
      
      if (monthSet.has(m) && daySet.has(d) && wdSet.has(wd) && hourSet.has(h) && minSet.has(min)) {
        runs.push(new Date(current));
      }
      
      // Increment by smallest unit
      current.setMinutes(current.getMinutes() + 1);
      
      // Safety: don't search forever
      if (current.getTime() - now.getTime() > 365 * 24 * 60 * 60 * 1000) break;
    }
    
    return runs;
  } catch (e) {
    return [];
  }
}

function formatRelative(date) {
  const now = new Date();
  const diff = date - now;
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(mins / 60);
  const days = Math.floor(hours / 24);
  
  if (mins < 1) return 'now';
  if (mins < 60) return `in ${mins}m`;
  if (hours < 24) return `in ${hours}h ${mins % 60}m`;
  return `in ${days}d ${hours % 24}h`;
}

function render() {
  const cron = document.getElementById('cron').value.trim();
  const parts = cron.split(/\s+/);
  
  const humanEl = document.getElementById('human');
  const nextRunsEl = document.getElementById('next-runs');
  const parsedEl = document.getElementById('parsed');
  
  if (parts.length !== 5) {
    humanEl.innerHTML = '<span class="error">Enter 5 fields (minute hour day month weekday)</span>';
    nextRunsEl.innerHTML = '';
    parsedEl.innerHTML = '';
    return;
  }
  
  const human = toHumanReadable(cron);
  if (human) {
    humanEl.textContent = human;
  } else {
    humanEl.innerHTML = '<span class="error">Invalid expression</span>';
  }
  
  const runs = getNextRuns(cron);
  if (runs.length > 0) {
    nextRunsEl.innerHTML = runs.map((date, i) => `
      <div class="run-time">
        <span class="date">${date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</span>
        <span class="relative">${i === 0 ? 'next' : formatRelative(date)}</span>
      </div>
    `).join('');
  } else {
    nextRunsEl.innerHTML = '<div class="error">Could not calculate next runs</div>';
  }
  
  // Parse each field
  parsedEl.innerHTML = fieldNames.map((name, i) => {
    const value = parts[i];
    const range = fieldRanges[i];
    let valid = true;
    let desc = '';
    
    try {
      const set = parseField(value, i);
      desc = Array.from(set).slice(0, 10).join(', ');
      if (set.size > 10) desc += ', ...';
    } catch (e) {
      valid = false;
      desc = 'Invalid';
    }
    
    return `<div style="display:flex; justify-content:space-between; padding:0.4rem 0; border-bottom:1px solid #334155;">
      <span style="color:var(--muted);">${name}</span>
      <span style="color:${valid ? 'var(--accent)' : '#ef4444'};">${value} (${desc})</span>
    </div>`;
  }).join('');
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

// Event listeners
document.getElementById('cron').addEventListener('input', render);

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('cron').value = btn.dataset.cron;
    render();
  });
});

document.getElementById('cron').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    navigator.clipboard.writeText(document.getElementById('cron').value);
    showToast();
  }
});

// Initial render
render();
</script>
</body>
</html>
