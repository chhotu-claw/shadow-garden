<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Expression Parser — Shadow's Garden</title>
<meta name="description" content="Parse cron expressions and see exactly when they'll run next. Visual calendar view with human-readable explanations.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-secondary); }
  input[type="text"] {
    width: 100%;
    padding: 0.75rem;
    font-size: 1.1rem;
    font-family: inherit;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { outline: none; border-color: var(--accent); }
  .explanation {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1.5rem;
  }
  .explanation h3 { margin: 0 0 0.5rem 0; font-size: 1rem; color: var(--accent); }
  .explanation p { margin: 0; color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; }
  .next-runs { margin-top: 1.5rem; }
  .next-runs h3 { margin-bottom: 1rem; font-size: 1rem; color: var(--text); }
  .run-item {
    display: flex;
    justify-content: space-between;
    padding: 0.75rem;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 0.5rem;
  }
  .run-time { color: var(--accent); font-weight: 600; }
  .run-relative { color: var(--text-secondary); font-size: 0.85rem; }
  .error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid #ef4444;
    color: #ef4444;
    padding: 1rem;
    border-radius: 8px;
    margin-bottom: 1rem;
  }
  .preset-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .preset-btn {
    padding: 0.4rem 0.8rem;
    font-size: 0.85rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.2s;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .quick-ref {
    margin-top: 2rem;
    padding: 1rem;
    background: var(--bg);
    border-radius: 8px;
    font-size: 0.85rem;
  }
  .quick-ref h4 { margin: 0 0 0.75rem 0; color: var(--text-secondary); }
  .quick-ref table { width: 100%; border-collapse: collapse; }
  .quick-ref td { padding: 0.3rem 0.5rem; border-bottom: 1px solid var(--border); }
  .quick-ref td:first-child { color: var(--accent); font-weight: 600; width: 80px; }
  .quick-ref td:last-child { color: var(--text-secondary); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Cron Expression Parser</h1>
  <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Enter a cron expression to see when it'll run next.</p>
  
  <div class="preset-buttons">
    <button class="preset-btn" data-cron="* * * * *">Every minute</button>
    <button class="preset-btn" data-cron="0 * * * *">Every hour</button>
    <button class="preset-btn" data-cron="0 0 * * *">Daily midnight</button>
    <button class="preset-btn" data-cron="0 9 * * 1-5">Weekdays 9am</button>
    <button class="preset-btn" data-cron="0 0 1 * *">Monthly</button>
    <button class="preset-btn" data-cron="0 0 * * 0">Weekly</button>
    <button class="preset-btn" data-cron="*/15 * * * *">Every 15 min</button>
  </div>
  
  <div class="input-group">
    <label for="cron-input">Cron Expression</label>
    <input type="text" id="cron-input" placeholder="* * * * *" value="* * * * *">
  </div>
  
  <div id="result"></div>
  
  <div class="quick-ref">
    <h4>Quick Reference</h4>
    <table>
      <tr><td>*</td><td>Any value</td></tr>
      <tr><td>,</td><td>Value list (1,3,5)</td></tr>
      <tr><td>-</td><td>Range (1-5)</td></tr>
      <tr><td>/</td><td>Step (*/2 = every 2)</td></tr>
    </table>
    <p style="margin-top: 0.75rem; color: var(--text-secondary);"><strong>Format:</strong> minute hour day-of-month month day-of-week</p>
  </div>
</div>

<script>
const fieldNames = ['minute', 'hour', 'day of month', 'month', 'day of week'];
const fieldRanges = [
  { min: 0, max: 59 },
  { min: 0, max: 23 },
  { min: 1, max: 31 },
  { min: 1, max: 12 },
  { min: 0, max: 6 }
];
const monthNames = ['', 'January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

function parseField(value, fieldIndex) {
  const range = fieldRanges[fieldIndex];
  const result = new Set();
  
  if (value === '*') {
    for (let i = range.min; i <= range.max; i++) result.add(i);
    return result;
  }
  
  if (value.includes('/')) {
    const [rangeVal, step] = value.split('/');
    const stepNum = parseInt(step);
    let start = range.min;
    let end = range.max;
    
    if (rangeVal !== '*') {
      if (rangeVal.includes('-')) {
        [start, end] = rangeVal.split('-').map(Number);
      } else {
        start = parseInt(rangeVal);
      }
    }
    
    for (let i = start; i <= end; i += stepNum) result.add(i);
    return result;
  }
  
  if (value.includes('-')) {
    const [start, end] = value.split('-').map(Number);
    for (let i = start; i <= end; i++) result.add(i);
    return result;
  }
  
  if (value.includes(',')) {
    value.split(',').forEach(v => {
      if (v.includes('-')) {
        const [start, end] = v.split('-').map(Number);
        for (let i = start; i <= end; i++) result.add(i);
      } else {
        result.add(parseInt(v));
      }
    });
    return result;
  }
  
  result.add(parseInt(value));
  return result;
}

function getNextRuns(cronStr, count = 10) {
  const parts = cronStr.trim().split(/\s+/);
  if (parts.length !== 5) return null;
  
  try {
    const fields = parts.map((p, i) => parseField(p, i));
    const runs = [];
    let date = new Date();
    date.setSeconds(0, 0);
    date = new Date(date.getTime() + 60000);
    
    for (let i = 0; i < count * 100 && runs.length < count; i++) {
      const minute = date.getMinutes();
      const hour = date.getHours();
      const day = date.getDate();
      const month = date.getMonth() + 1;
      const dow = date.getDay();
      
      if (fields[0].has(minute) && 
          fields[1].has(hour) && 
          fields[2].has(day) && 
          fields[3].has(month) && 
          fields[4].has(dow)) {
        runs.push(new Date(date));
      }
      date = new Date(date.getTime() + 60000);
    }
    
    return runs;
  } catch (e) {
    return null;
  }
}

function explainCron(cronStr) {
  const parts = cronStr.trim().split(/\s+/);
  if (parts.length !== 5) return null;
  
  const [min, hour, dom, month, dow] = parts;
  const explanations = [];
  
  if (min === '*' && hour === '*' && dom === '*' && month === '*' && dow === '*') {
    return 'Runs every minute';
  }
  
  if (min === '0' && hour === '*' && dom === '*' && month === '*' && dow === '*') {
    return 'Runs at the start of every hour';
  }
  
  if (dom === '*' && month === '*' && dow === '*') {
    if (min !== '*' && hour !== '*') {
      return `Runs at ${hour.padStart(2,'0')}:${min.padStart(2,'0')} every day`;
    }
  }
  
  if (dow !== '*' && dom === '*' && month === '*') {
    const days = dow.split(',').map(d => dayNames[parseInt(d)]).join(', ');
    if (min !== '*' && hour !== '*') {
      return `Runs at ${hour}:${min.padStart(2,'0')} on ${days}`;
    }
  }
  
  return `Custom schedule: ${min} ${hour} ${dom} ${month} ${dow}`;
}

function timeAgo(date) {
  const seconds = Math.floor((new Date() - date) / 1000);
  if (seconds < 60) return 'in less than a minute';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `in ${minutes} minute${minutes > 1 ? 's' : ''}`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `in ${hours} hour${hours > 1 ? 's' : ''}`;
  const days = Math.floor(hours / 24);
  return `in ${days} day${days > 1 ? 's' : ''}`;
}

function formatTime(date) {
  return date.toLocaleString('en-US', { 
    weekday: 'short',
    month: 'short', 
    day: 'numeric',
    hour: '2-digit', 
    minute: '2-digit'
  });
}

const input = document.getElementById('cron-input');
const result = document.getElementById('result');

function update() {
  const cron = input.value.trim();
  
  if (!cron) {
    result.innerHTML = '';
    return;
  }
  
  const runs = getNextRuns(cron);
  
  if (!runs) {
    result.innerHTML = '<div class="error">Invalid cron expression. Use format: minute hour day month weekday</div>';
    return;
  }
  
  const explanation = explainCron(cron);
  
  let html = `<div class="explanation"><h3>Schedule</h3><p>${explanation}</p></div>`;
  html += '<div class="next-runs"><h3>Next Runs</h3>';
  
  runs.forEach(run => {
    html += `<div class="run-item"><span class="run-time">${formatTime(run)}</span><span class="run-relative">${timeAgo(run)}</span></div>`;
  });
  
  html += '</div>';
  result.innerHTML = html;
}

input.addEventListener('input', update);

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    input.value = btn.dataset.cron;
    update();
  });
});

update();
</script>
</body>
</html>
