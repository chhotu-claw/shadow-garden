<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Parser — Shadow's Garden</title>
<meta name="description" content="Parse cron expressions and see the next scheduled run times. Supports standard 5-field cron syntax.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-mono); }
  .container { max-width: 700px; }
  h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--text-muted); }
  input[type="text"] {
    width: 100%;
    padding: 12px;
    font-size: 1.2rem;
    font-family: var(--font-mono);
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg-secondary);
    color: var(--text);
  }
  input[type="text"]:focus { outline: none; border-color: var(--accent); }
  .help-text { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; }
  .preset-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .preset-btn {
    padding: 6px 12px;
    font-size: 0.85rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font-mono);
  }
  .preset-btn:hover { background: var(--border); }
  .results { background: var(--bg-secondary); border-radius: 8px; padding: 1rem; }
  .results h3 { margin: 0 0 1rem 0; font-size: 1rem; color: var(--text-muted); }
  .run-time {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.95rem;
  }
  .run-time:last-child { border-bottom: none; }
  .run-time .time { font-weight: bold; color: var(--accent); }
  .run-time .relative { color: var(--text-muted); font-size: 0.85rem; }
  .error { color: #ff6b6b; padding: 1rem; background: rgba(255,107,107,0.1); border-radius: 8px; }
  .field-breakdown { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
  .field { background: var(--bg-secondary); padding: 0.5rem; border-radius: 4px; text-align: center; }
  .field-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
  .field-value { font-weight: bold; font-size: 0.9rem; }
  @media (max-width: 500px) {
    .field-breakdown { grid-template-columns: repeat(5, 1fr); font-size: 0.75rem; }
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Cron Parser</h1>
  <p style="color: var(--text-muted); margin-top: 0;">Enter a cron expression to see the next scheduled run times.</p>
  
  <div class="input-group">
    <label>Cron Expression</label>
    <div class="preset-buttons">
      <button class="preset-btn" onclick="setPreset('* * * * *')">* * * * *</button>
      <button class="preset-btn" onclick="setPreset('0 * * * *')">0 * * * *</button>
      <button class="preset-btn" onclick="setPreset('0 0 * * *')">0 0 * * *</button>
      <button class="preset-btn" onclick="setPreset('0 9 * * 1-5')">0 9 * * 1-5</button>
      <button class="preset-btn" onclick="setPreset('*/15 * * * *')">*/15 * * * *</button>
      <button class="preset-btn" onclick="setPreset('0 0 1 * *')">0 0 1 * *</button>
    </div>
    <input type="text" id="cronInput" placeholder="* * * * *" value="* * * * *">
    <p class="help-text">Format: minute hour day-of-month month day-of-week</p>
  </div>

  <div class="field-breakdown" id="fieldBreakdown"></div>

  <div class="results" id="results">
    <h3>Next 10 Runs</h3>
    <div id="runTimes"></div>
  </div>
</div>

<script>
const fieldNames = ['minute', 'hour', 'day', 'month', 'weekday'];
const fieldRanges = [
  [0, 59],   // minute
  [0, 23],   // hour
  [1, 31],   // day
  [1, 12],   // month
  [0, 6]     // weekday (0 = Sunday)
];
const monthNames = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

function setPreset(val) {
  document.getElementById('cronInput').value = val;
  parseAndRender();
}

function parseField(value, min, max) {
  const result = new Set();
  
  if (value === '*') {
    for (let i = min; i <= max; i++) result.add(i);
    return result;
  }
  
  const parts = value.split(',');
  for (const part of parts) {
    if (part.includes('/')) {
      const [range, step] = part.split('/');
      const stepNum = parseInt(step);
      let start = min, end = max;
      if (range !== '*') {
        if (range.includes('-')) {
          [start, end] = range.split('-').map(Number);
        } else {
          start = parseInt(range);
        }
      }
      for (let i = start; i <= end; i += stepNum) result.add(i);
    } else if (part.includes('-')) {
      const [start, end] = part.split('-').map(Number);
      for (let i = start; i <= end; i++) result.add(i);
    } else {
      result.add(parseInt(part));
    }
  }
  return result;
}

function getFieldName(idx, val) {
  if (idx === 2) return val; // day
  if (idx === 3) return monthNames[val] || val; // month
  if (idx === 4) return dayNames[val] || val; // weekday
  return val;
}

function expandFields(fields) {
  const expanded = [];
  const [minute, hour, day, month, weekday] = fields;
  
  for (const m of minute) {
    for (const h of hour) {
      for (const d of day) {
        for (const mon of month) {
          for (const wd of weekday) {
            expanded.push({ minute: m, hour: h, day: d, month: mon, weekday: wd });
          }
        }
      }
    }
  }
  return expanded;
}

function findNextRuns(cron, count = 10) {
  const parts = cron.trim().split(/\s+/);
  if (parts.length !== 5) return null;
  
  const fields = [];
  for (let i = 0; i < 5; i++) {
    const [min, max] = fieldRanges[i];
    fields.push(parseField(parts[i], min, max));
  }
  
  const expanded = expandFields(fields);
  if (expanded.length === 0) return null;
  
  const runs = [];
  const now = new Date();
  let current = new Date(now);
  current.setSeconds(0, 0);
  current.setMinutes(current.getMinutes() + 1);
  
  while (runs.length < count && runs.length < 1000) {
    const month = current.getMonth() + 1;
    const day = current.getDate();
    const weekday = current.getDay();
    const hour = current.getHours();
    const minute = current.getMinutes();
    
    const match = expanded.find(f => 
      f.month.has(month) &&
      f.day.has(day) &&
      f.weekday.has(weekday) &&
      f.hour.has(hour) &&
      f.minute.has(minute)
    );
    
    if (match) {
      runs.push(new Date(current));
    }
    
    current.setMinutes(current.getMinutes() + 1);
    if (current.getTime() - now.getTime() > 365 * 24 * 60 * 60 * 1000) break;
  }
  
  return runs;
}

function formatRelative(date) {
  const now = new Date();
  const diff = date.getTime() - now.getTime();
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(mins / 60);
  const days = Math.floor(hours / 24);
  
  if (mins < 1) return 'now';
  if (mins < 60) return `in ${mins}m`;
  if (hours < 24) return `in ${hours}h ${mins % 60}m`;
  return `in ${days}d ${hours % 24}h`;
}

function formatDate(date) {
  const d = date.getDate();
  const mon = monthNames[date.getMonth() + 1];
  const h = date.getHours().toString().padStart(2, '0');
  const m = date.getMinutes().toString().padStart(2, '0');
  return `${mon} ${d} ${h}:${m}`;
}

function parseAndRender() {
  const cron = document.getElementById('cronInput').value;
  const runTimesDiv = document.getElementById('runTimes');
  const breakdownDiv = document.getElementById('fieldBreakdown');
  
  if (!cron.trim()) {
    runTimesDiv.innerHTML = '<p style="color: var(--text-muted)">Enter a cron expression above</p>';
    breakdownDiv.innerHTML = '';
    return;
  }
  
  const parts = cron.trim().split(/\s+/);
  if (parts.length !== 5) {
    runTimesDiv.innerHTML = '<div class="error">Invalid cron expression. Need exactly 5 fields: minute hour day month weekday</div>';
    breakdownDiv.innerHTML = '';
    return;
  }
  
  // Show field breakdown
  breakdownDiv.innerHTML = parts.map((p, i) => `
    <div class="field">
      <div class="field-label">${fieldNames[i]}</div>
      <div class="field-value">${p}</div>
    </div>
  `).join('');
  
  const runs = findNextRuns(cron);
  
  if (!runs || runs.length === 0) {
    runTimesDiv.innerHTML = '<div class="error">Could not find any upcoming runs. Check your expression.</div>';
    return;
  }
  
  runTimesDiv.innerHTML = runs.map(r => `
    <div class="run-time">
      <span class="time">${formatDate(r)}</span>
      <span class="relative">${formatRelative(r)}</span>
    </div>
  `).join('');
}

document.getElementById('cronInput').addEventListener('input', parseAndRender);
parseAndRender();
</script>
</body>
</html>
