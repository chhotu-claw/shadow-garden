<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Parser — Shadow's Garden</title>
<meta name="description" content="Parse and visualize cron expressions. See next run times, human-readable descriptions, and what each field means.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .cron-input {
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 1.5rem;
    padding: 1rem;
    width: 100%;
    max-width: 400px;
    text-align: center;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    margin-bottom: 1rem;
  }
  .cron-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .field-labels {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 2rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .field-labels span {
    width: 52px;
    text-align: center;
  }
  .result {
    background: var(--bg-secondary);
    border-radius: 8px;
    padding: 1.5rem;
    margin-top: 1.5rem;
    text-align: left;
  }
  .result.invalid {
    border-left: 3px solid #ff6b6b;
  }
  .result.valid {
    border-left: 3px solid #51cf66;
  }
  .next-runs {
    margin-top: 1rem;
  }
  .next-runs li {
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 0.9rem;
  }
  .next-runs li:last-child {
    border-bottom: none;
  }
  .description {
    margin-top: 1rem;
    padding: 1rem;
    background: var(--bg);
    border-radius: 6px;
    font-size: 0.95rem;
    line-height: 1.6;
  }
  .help {
    margin-top: 2rem;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .help table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0.5rem;
  }
  .help td, .help th {
    padding: 0.5rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .help th {
    color: var(--text-muted);
    font-weight: normal;
  }
  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .preset-btn {
    padding: 0.4rem 0.8rem;
    font-size: 0.85rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
  }
  .preset-btn:hover {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .error-msg {
    color: #ff6b6b;
    margin-top: 0.5rem;
  }
</style>
</head>
<body data-page-type="app">
<div class="container" style="max-width: 600px;">
  <h1>Cron Parser</h1>
  <p class="subtitle">Parse cron expressions and see when they'll run</p>
  
  <div class="field-labels">
    <span>minute</span>
    <span>hour</span>
    <span>day</span>
    <span>month</span>
    <span>weekday</span>
  </div>
  
  <input type="text" id="cronInput" class="cron-input" placeholder="* * * * *" value="0 9 * * 1-5">
  
  <div class="presets">
    <button class="preset-btn" data-cron="* * * * *">every minute</button>
    <button class="preset-btn" data-cron="0 * * * *">every hour</button>
    <button class="preset-btn" data-cron="0 9 * * *">daily at 9am</button>
    <button class="preset-btn" data-cron="0 9 * * 1-5">weekdays at 9am</button>
    <button class="preset-btn" data-cron="0 0 1 * *">first of month</button>
    <button class="preset-btn" data-cron="*/15 * * * *">every 15 min</button>
    <button class="preset-btn" data-cron="0 9,17 * * *">twice daily</button>
    <button class="preset-btn" data-cron="0 0 * * 0">weekly on Sunday</button>
  </div>
  
  <div id="result" class="result"></div>
  
  <div class="help">
    <h3>Format</h3>
    <table>
      <tr><th>Field</th><th>Range</th><th>Special</th></tr>
      <tr><td>minute</td><td>0-59</td><td>* , - /</td></tr>
      <tr><td>hour</td><td>0-23</td><td>* , - /</td></tr>
      <tr><td>day</td><td>1-31</td><td>* , - / L W</td></tr>
      <tr><td>month</td><td>1-12</td><td>* , - /</td></tr>
      <tr><td>weekday</td><td>0-6</td><td>* , - / L #</td></tr>
    </table>
    <p style="margin-top: 0.5rem; font-size: 0.8rem;">0 = Sunday, 1 = Monday, ..., 6 = Saturday</p>
  </div>
</div>

<script>
  const cronInput = document.getElementById('cronInput');
  const result = document.getElementById('result');
  
  const fieldNames = ['minute', 'hour', 'day', 'month', 'weekday'];
  const fieldRanges = [
    { min: 0, max: 59 },
    { min: 0, max: 23 },
    { min: 1, max: 31 },
    { min: 1, max: 12 },
    { min: 0, max: 6 }
  ];
  
  const monthNames = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  
  function parseField(value, range) {
    const items = new Set();
    
    if (value === '*') {
      for (let i = range.min; i <= range.max; i++) items.add(i);
      return items;
    }
    
    if (value === '?') {
      return null;
    }
    
    const parts = value.split(',');
    for (const part of parts) {
      if (part.includes('/')) {
        const [rangePart, step] = part.split('/');
        const stepNum = parseInt(step);
        let start = range.min;
        let end = range.max;
        
        if (rangePart !== '*') {
          if (rangePart.includes('-')) {
            const [s, e] = rangePart.split('-').map(Number);
            start = s;
            end = e;
          } else {
            start = parseInt(rangePart);
          }
        }
        
        for (let i = start; i <= end; i += stepNum) items.add(i);
      } else if (part.includes('-')) {
        const [start, end] = part.split('-').map(Number);
        for (let i = start; i <= end; i++) items.add(i);
      } else if (part === 'L') {
        items.add('L');
      } else {
        items.add(parseInt(part));
      }
    }
    
    return items.size > 0 ? items : null;
  }
  
  function describeField(value, fieldIndex) {
    if (value === '*') return 'every ' + fieldNames[fieldIndex];
    
    const range = fieldRanges[fieldIndex];
    const items = parseField(value, range);
    if (!items) return value;
    
    const arr = Array.from(items).sort((a, b) => (a === 'L' ? 1 : a) - (b === 'L' ? 1 : b));
    
    if (arr.length === range.max - range.min + 1) return 'every ' + fieldNames[fieldIndex];
    
    if (arr.length <= 3) {
      return arr.join(', ');
    }
    
    const isStep = value.includes('/');
    if (isStep) {
      const step = value.split('/')[1];
      return 'every ' + step + ' ' + fieldNames[fieldIndex];
    }
    
    const isRange = value.includes('-') && !value.includes(',');
    if (isRange) {
      return value;
    }
    
    return value;
  }
  
  function getNextRuns(cron, count = 5) {
    const parts = cron.trim().split(/\s+/);
    if (parts.length !== 5) return null;
    
    const [min, hour, day, month, dow] = parts;
    
    const runs = [];
    const now = new Date();
    let date = new Date(now);
    date.setSeconds(0, 0);
    date.setMinutes(date.getMinutes() + 1);
    
    const maxIterations = 365 * 24 * 60;
    let iterations = 0;
    
    while (runs.length < count && iterations < maxIterations) {
      iterations++;
      
      const m = date.getMonth() + 1;
      const d = date.getDate();
      const wd = date.getDay();
      const h = date.getHours();
      const min_ = date.getMinutes();
      
      const minVals = parseField(min, fieldRanges[0]);
      const hourVals = parseField(hour, fieldRanges[1]);
      const dayVals = parseField(day, fieldRanges[2]);
      const monthVals = parseField(month, fieldRanges[3]);
      const dowVals = parseField(dow, fieldRanges[4]);
      
      if (!minVals || !hourVals || !monthVals) {
        date.setMinutes(date.getMinutes() + 1);
        continue;
      }
      
      const minMatch = minVals.has(min_);
      const hourMatch = hourVals.has(h);
      const monthMatch = monthVals.has(m);
      
      let dayMatch = false;
      if (dayVals && dowVals) {
        dayMatch = dayVals.has(d) || dowVals.has(wd);
      } else if (dayVals) {
        dayMatch = dayVals.has(d);
      } else if (dowVals) {
        dayMatch = dowVals.has(wd);
      }
      
      if (minMatch && hourMatch && monthMatch && dayMatch) {
        runs.push(new Date(date));
      }
      
      date.setMinutes(date.getMinutes() + 1);
    }
    
    return runs.length > 0 ? runs : null;
  }
  
  function formatDate(date) {
    const options = {
      weekday: 'short',
      year: 'numeric',
      month: 'short',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    };
    return date.toLocaleDateString('en-US', options);
  }
  
  function describeCron(cron) {
    const parts = cron.trim().split(/\s+/);
    if (parts.length !== 5) return null;
    
    const [min, hour, day, month, dow] = parts;
    
    let desc = '';
    
    const minDesc = describeField(min, 0);
    const hourDesc = describeField(hour, 1);
    const dayDesc = describeField(day, 2);
    const monthDesc = describeField(month, 3);
    const dowDesc = describeField(dow, 4);
    
    if (min === '*' && hour === '*' && day === '*' && month === '*' && dow === '*') {
      return 'Every minute';
    }
    
    if (min.includes('/')) {
      const step = min.split('/')[1];
      desc = `Every ${step} minutes`;
    } else if (hour.includes('/')) {
      const step = hour.split('/')[1];
      desc = `Every ${step} hours`;
    } else {
      desc = 'At ';
      
      if (min !== '*') {
        desc += min === '0' ? 'minute 0' : `minutes ${min}`;
      }
      
      if (hour !== '*') {
        desc += desc !== 'At ' ? ' ' : '';
        desc += hour === '0' ? 'hour 0' : `hours ${hour}`;
      }
      
      if (dow !== '*' && dow !== '?') {
        desc += desc !== 'At ' ? ', ' : '';
        if (dow === '1-5') desc += 'Mon-Fri';
        else if (dow === '0,6') desc += 'weekends';
        else desc += `weekdays ${dow}`;
      }
      
      if (day !== '*' && day !== '?') {
        desc += desc !== 'At ' ? ', ' : '';
        desc += `day ${day}`;
      }
      
      if (month !== '*') {
        desc += desc !== 'At ' ? ', ' : '';
        desc += `in ${monthNames[parseInt(month)] || month}`;
      }
    }
    
    return desc || 'Custom schedule';
  }
  
  function validate(cron) {
    const parts = cron.trim().split(/\s+/);
    if (parts.length !== 5) {
      return { valid: false, error: 'Expected 5 fields, got ' + parts.length };
    }
    
    for (let i = 0; i < 5; i++) {
      const val = parts[i];
      const range = fieldRanges[i];
      
      if (val !== '*' && val !== '?' && val !== 'L' && !val.match(/^[\d,\-\/]+$/)) {
        return { valid: false, error: `Invalid ${fieldNames[i]}: ${val}` };
      }
      
      if (val !== '*' && val !== '?' && val !== 'L') {
        const parsed = parseField(val, range);
        if (!parsed) {
          return { valid: false, error: `Invalid ${fieldNames[i]}: ${val}` };
        }
      }
    }
    
    return { valid: true };
  }
  
  function update() {
    const cron = cronInput.value.trim();
    
    if (!cron) {
      result.innerHTML = '';
      result.className = 'result';
      return;
    }
    
    const validation = validate(cron);
    
    if (!validation.valid) {
      result.className = 'result invalid';
      result.innerHTML = '<div class="error-msg">Invalid: ' + validation.error + '</div>';
      return;
    }
    
    const description = describeCron(cron);
    const nextRuns = getNextRuns(cron, 5);
    
    result.className = 'result valid';
    
    let html = '<div class="description">' + description + '</div>';
    
    if (nextRuns) {
      html += '<div class="next-runs"><strong>Next runs:</strong><ul>';
      for (const run of nextRuns) {
        html += '<li>' + formatDate(run) + '</li>';
      }
      html += '</ul></div>';
    }
    
    result.innerHTML = html;
  }
  
  cronInput.addEventListener('input', update);
  
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      cronInput.value = btn.dataset.cron;
      update();
    });
  });
  
  update();
</script>
</body>
</html>
