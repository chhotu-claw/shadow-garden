<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Parser — Shadow's Garden</title>
<meta name="description" content="Parse cron expressions and see when they run next">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #8b5cf6;
    --accent-dark: #7c3aed;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
  }
  .cron-parser {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 1rem;
    padding: 2rem;
    width: 100%;
    max-width: 560px;
  }
  h1 {
    color: #fff;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .input-group {
    margin-bottom: 1.25rem;
  }
  label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  input[type="text"] {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    color: #fff;
    font-size: 1.25rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
  }
  .presets {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }
  .presets button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.25rem;
    padding: 0.4rem 0.6rem;
    color: rgba(255,255,255,0.7);
    font-size: 0.7rem;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .presets button:hover {
    background: rgba(255,255,255,0.2);
  }
  .result {
    background: rgba(139, 92, 246, 0.1);
    border: 1px solid var(--accent);
    border-radius: 0.5rem;
    padding: 1.5rem;
    margin-top: 1.5rem;
  }
  .next-runs {
    color: #fff;
    font-size: 0.9rem;
    line-height: 1.8;
  }
  .next-runs div {
    padding: 0.25rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .next-runs div:last-child {
    border-bottom: none;
  }
  .field-reference {
    margin-top: 1.5rem;
    background: rgba(0,0,0,0.2);
    border-radius: 0.5rem;
    padding: 1rem;
  }
  .field-reference h3 {
    color: #fff;
    font-size: 0.8rem;
    margin: 0 0 0.75rem 0;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .fields {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.5rem;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.6);
  }
  .field {
    text-align: center;
    padding: 0.5rem;
    background: rgba(255,255,255,0.05);
    border-radius: 0.25rem;
  }
  .field span {
    display: block;
    color: var(--accent);
    font-weight: bold;
    margin-bottom: 0.25rem;
  }
  .error {
    color: #f87171;
    font-size: 0.85rem;
    margin-top: 0.75rem;
    display: none;
  }
  .error.show {
    display: block;
  }
</style>
</head>
<body data-page-type="app">
<div class="cron-parser">
  <h1>⏰ Cron Parser</h1>
  
  <div class="input-group">
    <label>Cron Expression</label>
    <input type="text" id="cronInput" placeholder="* * * * *" value="* * * * *">
    <div class="presets">
      <button onclick="setCron('* * * * *')">Every minute</button>
      <button onclick="setCron('0 * * * *')">Every hour</button>
      <button onclick="setCron('0 0 * * *')">Daily midnight</button>
      <button onclick="setCron('0 0 * * 0')">Weekly Sunday</button>
      <button onclick="setCron('0 0 1 * *')">Monthly 1st</button>
      <button onclick="setCron('0 9 * * 1-5')">Weekdays 9am</button>
      <button onclick="setCron('*/15 * * * *')">Every 15 min</button>
      <button onclick="setCron('0 */2 * * *')">Every 2 hours</button>
    </div>
  </div>
  
  <div class="result">
    <div class="next-runs" id="nextRuns">
      <div>Loading...</div>
    </div>
  </div>
  
  <div class="error" id="error">Invalid cron expression</div>
  
  <div class="field-reference">
    <h3>Field Order</h3>
    <div class="fields">
      <div class="field"><span>Minute</span>0-59</div>
      <div class="field"><span>Hour</span>0-23</div>
      <div class="field"><span>Day</span>1-31</div>
      <div class="field"><span>Month</span>1-12</div>
      <div class="field"><span>Weekday</span>0-6</div>
    </div>
  </div>
</div>

<script>
const cronInput = document.getElementById('cronInput');
const nextRunsDiv = document.getElementById('nextRuns');
const errorDiv = document.getElementById('error');

function setCron(val) {
  cronInput.value = val;
  parseCron();
}

function parseCron() {
  const expr = cronInput.value.trim();
  const parts = expr.split(/\s+/);
  
  if (parts.length !== 5) {
    showError('Cron expression must have exactly 5 fields');
    return;
  }
  
  try {
    const next = getNextRuns(parts, 5);
    if (next.length === 0) {
      showError('No valid runs found');
      return;
    }
    errorDiv.classList.remove('show');
    nextRunsDiv.innerHTML = next.map(d => `<div>${formatDate(d)}</div>`).join('');
  } catch (e) {
    showError(e.message);
  }
}

function showError(msg) {
  errorDiv.textContent = msg;
  errorDiv.classList.add('show');
  nextRunsDiv.innerHTML = '';
}

function getNextRuns(parts, count) {
  const results = [];
  const now = new Date();
  let date = new Date(now);
  date.setSeconds(0);
  date.setMilliseconds(0);
  
  // Parse each field
  const [minExpr, hourExpr, dayExpr, monthExpr, dowExpr] = parts;
  
  const mins = parseField(minExpr, 0, 59);
  const hours = parseField(hourExpr, 0, 23);
  const days = parseField(dayExpr, 1, 31);
  const months = parseField(monthExpr, 1, 12);
  const dows = parseField(dowExpr, 0, 6);
  
  // Find next 5 occurrences
  const maxIterations = 365 * 24 * 60; // 1 year of minutes max
  let iterations = 0;
  
  while (results.length < count && iterations < maxIterations) {
    date.setMinutes(date.getMinutes() + 1);
    iterations++;
    
    const m = date.getMonth() + 1;
    const d = date.getDate();
    const h = date.getHours();
    const min = date.getMinutes();
    const dow = date.getDay();
    
    if (months.includes(m) && days.includes(d) && mins.includes(min) && hours.includes(h) && dows.includes(dow)) {
      results.push(new Date(date));
    }
  }
  
  return results;
}

function parseField(expr, min, max) {
  if (expr === '*') {
    const arr = [];
    for (let i = min; i <= max; i++) arr.push(i);
    return arr;
  }
  
  const values = new Set();
  const parts = expr.split(',');
  
  for (const part of parts) {
    if (part.includes('/')) {
      const [range, step] = part.split('/');
      const stepNum = parseInt(step, 10);
      let start = min, end = max;
      
      if (range !== '*') {
        if (range.includes('-')) {
          [start, end] = range.split('-').map(Number);
        } else {
          start = parseInt(range, 10);
        }
      }
      
      for (let i = start; i <= end; i += stepNum) {
        values.add(i);
      }
    } else if (part.includes('-')) {
      const [start, end] = part.split('-').map(Number);
      for (let i = start; i <= end; i++) {
        values.add(i);
      }
    } else {
      values.add(parseInt(part, 10));
    }
  }
  
  return Array.from(values).filter(v => v >= min && v <= max).sort((a, b) => a - b);
}

function formatDate(d) {
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  
  const day = days[d.getDay()];
  const month = months[d.getMonth()];
  const date = d.getDate();
  const year = d.getFullYear();
  const h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hour12 = h % 12 || 12;
  
  return `${day}, ${month} ${date}, ${year} at ${hour12}:${m.toString().padStart(2, '0')} ${ampm}`;
}

cronInput.addEventListener('input', parseCron);

// Init
parseCron();
</script>
</body>
</html>
