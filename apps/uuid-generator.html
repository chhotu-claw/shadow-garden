<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID Generator — Shadow's Garden</title>
<meta name="description" content="Generate UUIDs in browser — v4 (random), v7 (time-ordered), v1 (timestamp). Click to copy, batch generate.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 700px; margin: 0 auto; padding: 2rem; }
  h1 { margin-bottom: 0.5rem; }
  .controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .control-group { display: flex; align-items: center; gap: 0.5rem; }
  select, button, input { padding: 0.5rem 1rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
  button { cursor: pointer; background: #333; color: white; border: none; }
  button:hover { background: #555; }
  button.secondary { background: #666; }
  .uuid-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .uuid-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; background: #f5f5f5; border-radius: 4px; cursor: pointer; }
  .uuid-item:hover { background: #eee; }
  .uuid-item.copied { background: #d4edda; }
  .uuid-text { font-family: monospace; font-size: 0.95rem; flex: 1; word-break: break-all; }
  .uuid-type { font-size: 0.75rem; color: #666; background: #ddd; padding: 0.2rem 0.5rem; border-radius: 3px; white-space: nowrap; }
  .count-input { width: 80px; }
  .hint { font-size: 0.85rem; color: #666; margin-top: 1rem; }
</style>
</head>
<body data-page-type="app">
  <h1>UUID Generator</h1>
  <p>Generate UUIDs in your browser. All client-side, no tracking.</p>
  
  <div class="controls">
    <div class="control-group">
      <label>Type:</label>
      <select id="uuidType">
        <option value="v4">v4 (Random)</option>
        <option value="v7">v7 (Time-ordered)</option>
        <option value="v1">v1 (Timestamp)</option>
      </select>
    </div>
    <div class="control-group">
      <label>Count:</label>
      <input type="number" id="count" class="count-input" value="1" min="1" max="100">
    </div>
    <button onclick="generate()">Generate</button>
    <button class="secondary" onclick="copyAll()">Copy All</button>
  </div>

  <div class="uuid-list" id="uuidList"></div>
  <p class="hint">Click any UUID to copy it.</p>

  <script>
    // UUID generation functions
    function generateV4() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function generateV7() {
      const timestamp = Date.now();
      const rand = new Uint8Array(10);
      crypto.getRandomValues(rand);
      const hex = timestamp.toString(16).padStart(12, '0') + 
        Array.from(rand).map(b => b.toString(16).padStart(2, '0')).join('');
      return hex.slice(0, 8) + '-' + hex.slice(8, 12) + '-7' + 
        hex.slice(12, 15) + '-' + (rand[0] & 0x0f | 0x8).toString(16) + 
        hex.slice(15, 20) + '-' + hex.slice(20);
    }

    function generateV1() {
      const now = Date.now();
      const ticks = (now - 12219292800000) * 10000;
      const clock = Math.floor(Math.random() * 16384) | 0;
      const node = new Uint6(6);
      crypto.getRandomValues(node);
      const nodeHex = Array.from(node).map(b => b.toString(16).padStart(2, '0')).join(':').replace(/:(.):/g, ':0$1:').replace(/:$/, '');
      const timeLow = (ticks & 0xffffffff).toString(16).padStart(8, '0');
      const timeMid = ((ticks >> 32) & 0xffff).toString(16).padStart(4, '0');
      const timeHi = ((ticks >> 48) & 0x0fff).toString(16).padStart(4, '0');
      return `${timeLow}-${timeMid}-1${timeHi.slice(1)}-${clock.toString(16).padStart(4, '0')}-${nodeHex}`;
    }

    // Simple version without node ID complexity
    function generateV1Simple() {
      const now = Date.now();
      const offset = 12219292800000;
      const timestamp = (now - offset) * 10000;
      const clock = Math.floor(Math.random() * 16384) | 0;
      const rand = new Uint8Array(6);
      crypto.getRandomValues(rand);
      
      const timeLow = (timestamp & 0xffffffff).toString(16).padStart(8, '0');
      const timeMid = ((timestamp >> 32) & 0xffff).toString(16).padStart(4, '0');
      const timeHi = ((timestamp >> 48) & 0x0fff).toString(16).padStart(4, '0');
      const clockSeq = clock.toString(16).padStart(4, '0');
      const node = Array.from(rand).map(b => b.toString(16).padStart(2, '0')).join('');
      
      return `${timeLow}-${timeMid}-1${timeHi.slice(1)}-${clockSeq}-${node}`;
    }

    function generate() {
      const type = document.getElementById('uuidType').value;
      const count = Math.min(100, Math.max(1, parseInt(document.getElementById('count').value) || 1));
      const list = document.getElementById('uuidList');
      list.innerHTML = '';
      
      for (let i = 0; i < count; i++) {
        let uuid;
        switch(type) {
          case 'v4': uuid = generateV4(); break;
          case 'v7': uuid = generateV7(); break;
          case 'v1': uuid = generateV1Simple(); break;
        }
        
        const item = document.createElement('div');
        item.className = 'uuid-item';
        item.innerHTML = `<span class="uuid-text">${uuid}</span><span class="uuid-type">${type}</span>`;
        item.onclick = () => copyOne(uuid, item);
        list.appendChild(item);
      }
    }

    function copyOne(text, el) {
      navigator.clipboard.writeText(text).then(() => {
        el.classList.add('copied');
        setTimeout(() => el.classList.remove('copied'), 1000);
      });
    }

    function copyAll() {
      const uuids = Array.from(document.querySelectorAll('.uuid-text')).map(el => el.textContent);
      navigator.clipboard.writeText(uuids.join('\n'));
    }

    // Generate on load
    generate();
  </script>
</body>
</html>
