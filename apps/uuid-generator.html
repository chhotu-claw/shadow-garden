<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID Generator — Shadow's Garden</title>
<meta name="description" content="Generate UUIDs v4 (random), v7 (time-ordered), or nil. One-click copy. Runs entirely in browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 2rem; max-width: 600px; margin: 0 auto; }
  .generator { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 1.5rem; margin-top: 1rem; }
  .uuid-display { 
    font-family: 'SF Mono', Monaco, 'Courier New', monospace; 
    font-size: 1.1rem; 
    background: #0d0d0d; 
    padding: 1rem; 
    border-radius: 6px; 
    word-break: break-all;
    color: #7aa2f7;
    min-height: 3.5rem;
    display: flex;
    align-items: center;
  }
  .controls { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
  button {
    background: #2d2d2d; border: 1px solid #444; color: #e5e5e5;
    padding: 0.6rem 1rem; border-radius: 6px; cursor: pointer;
    font-size: 0.9rem; transition: all 0.2s;
  }
  button:hover { background: #3d3d3d; border-color: #555; }
  button.primary { background: #1a1a2e; color: #7aa2f7; border-color: #3d5a80; }
  button.primary:hover { background: #2a2a4e; }
  .version-select { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .version-select label { 
    display: flex; align-items: center; gap: 0.4rem; 
    cursor: pointer; color: #888; font-size: 0.9rem; 
  }
  .version-select input:checked + span { color: #7aa2f7; }
  .count-select { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; }
  .count-select select {
    background: #2d2d2d; border: 1px solid #444; color: #e5e5e5;
    padding: 0.5rem; border-radius: 4px;
  }
  .copied { color: #7af782; font-size: 0.85rem; margin-left: 0.5rem; opacity: 0; transition: opacity 0.3s; }
  .copied.show { opacity: 1; }
</style>
</head>
<body data-page-type="app">
  <h1>UUID Generator</h1>
  <p style="color: #888; margin-bottom: 1rem;">Generate universally unique identifiers in your browser. Nothing leaves your device.</p>
  
  <div class="generator">
    <div class="version-select">
      <label><input type="radio" name="version" value="v4" checked><span>UUID v4 (random)</span></label>
      <label><input type="radio" name="version" value="v7"><span>UUID v7 (time-ordered)</span></label>
      <label><input type="radio" name="version" value="nil"><span>Nil UUID</span></label>
    </div>
    
    <div class="count-select">
      <label>Count:</label>
      <select id="count">
        <option value="1">1</option>
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="20">20</option>
      </select>
    </div>
    
    <div class="uuid-display" id="output"></div>
    
    <div class="controls">
      <button class="primary" onclick="generate()">Generate</button>
      <button onclick="copyAll()">Copy All <span class="copied" id="copied">✓ copied</span></button>
    </div>
  </div>

  <script>
    function generateUUIDv4() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function generateUUIDv7() {
      const timestamp = Date.now();
      const timestampHex = Math.floor(timestamp).toString(16).padStart(12, '0');
      const randomHex = 'xxxxxxxxxxxx4xxxyxxxxxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
      return timestampHex.slice(0, 8) + '-' + timestampHex.slice(8, 12) + '-7' + 
             randomHex.slice(3, 8) + '-' + randomHex.slice(13, 17) + '-' + randomHex.slice(18);
    }

    function generateNilUUID() {
      return '00000000-0000-0000-0000-000000000000';
    }

    function generate() {
      const version = document.querySelector('input[name="version"]:checked').value;
      const count = parseInt(document.getElementById('count').value);
      const output = document.getElementById('output');
      
      let uuids = [];
      for (let i = 0; i < count; i++) {
        if (version === 'v4') uuids.push(generateUUIDv4());
        else if (version === 'v7') uuids.push(generateUUIDv7());
        else uuids.push(generateNilUUID());
      }
      
      output.textContent = uuids.join('\n');
    }

    function copyAll() {
      const text = document.getElementById('output').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const copied = document.getElementById('copied');
        copied.classList.add('show');
        setTimeout(() => copied.classList.remove('show'), 2000);
      });
    }

    // Generate on load
    generate();
  </script>
</body>
</html>
