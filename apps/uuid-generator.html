<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID Generator — Shadow's Garden</title>
<meta name="description" content="Generate UUIDs v4. Copy individual or batch generate. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .uuid-gen { max-width: 600px; margin: 0 auto; }
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  button {
    padding: 12px 20px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    border-color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover {
    opacity: 0.9;
  }
  .count-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .count-control input {
    width: 60px;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    text-align: center;
  }
  .count-control input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .uuid-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .uuid-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
  }
  .uuid-text {
    flex: 1;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    word-break: break-all;
  }
  .copy-btn {
    padding: 8px 12px;
    font-size: 13px;
    white-space: nowrap;
  }
  .uppercase .uuid-text {
    text-transform: uppercase;
  }
  .lowercase .uuid-text {
    text-transform: lowercase;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="uuid-gen">
    <h1>UUID Generator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Generate UUID v4 (random). All local, no tracking.</p>
    
    <div class="controls">
      <button class="primary" onclick="generate()">Generate UUID</button>
      <div class="count-control">
        <label>Count:</label>
        <input type="number" id="count" value="1" min="1" max="100">
      </div>
      <button onclick="setCase('uppercase')">UPPERCASE</button>
      <button onclick="setCase('lowercase')">lowercase</button>
    </div>
    
    <div class="uuid-list" id="uuidList"></div>
  </div>
</div>
<script>
  let currentCase = 'lowercase';
  
  function uuidv4() {
    return '10000000-1000-4000-8000-100000000000'.replace(/[018]/g, c => {
      const v = crypto.getRandomValues(new Uint8Array(1))[0];
      return (c ^ v & 15 >> c / 4).toString(16);
    });
  }
  
  function generate() {
    const count = parseInt(document.getElementById('count').value) || 1;
    const list = document.getElementById('uuidList');
    list.innerHTML = '';
    list.className = currentCase === 'uppercase' ? 'uuid-list uppercase' : 'uuid-list lowercase';
    
    for (let i = 0; i < Math.min(count, 100); i++) {
      let uuid = uuidv4();
      if (currentCase === 'uppercase') uuid = uuid.toUpperCase();
      
      const item = document.createElement('div');
      item.className = 'uuid-item';
      item.innerHTML = `
        <span class="uuid-text">${uuid}</span>
        <button class="copy-btn" onclick="copy('${uuid}', this)">Copy</button>
      `;
      list.appendChild(item);
    }
  }
  
  function copy(uuid, btn) {
    navigator.clipboard.writeText(uuid).then(() => {
      const original = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = original, 1500);
    });
  }
  
  function setCase(caseType) {
    currentCase = caseType;
    generate();
  }
  
  // Generate one on load
  generate();
</script>
</body>
</html>
