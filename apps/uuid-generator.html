<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID Generator — Shadow's Garden</title>
<meta name="description" content="Generate UUIDs v4 and v7 instantly. Copy to clipboard.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --text: #e0e0e0;
    --accent: #00d4aa;
    --muted: #666;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: var(--card);
    padding: 32px;
    border-radius: 16px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 8px 0;
    color: var(--accent);
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .uuid-display {
    background: var(--bg);
    padding: 16px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    word-break: break-all;
    color: var(--accent);
    margin-bottom: 12px;
    border: 1px solid #333;
    min-height: 52px;
    display: flex;
    align-items: center;
  }
  .options {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 12px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
    flex: 1;
  }
  .btn-primary:hover {
    background: #00e6b8;
  }
  .btn-secondary {
    background: var(--bg);
    color: var(--text);
    border: 1px solid #333;
  }
  .btn-secondary:hover {
    border-color: var(--accent);
  }
  .btn-copy {
    background: var(--bg);
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-copy:hover {
    background: var(--accent);
    color: #000;
  }
  .btn-group {
    display: flex;
    gap: 8px;
  }
  .btn-group .btn {
    flex: 1;
  }
  .version-select {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .version-btn {
    padding: 8px 16px;
    background: var(--bg);
    border: 1px solid #333;
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
  }
  .version-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }
  .history {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #333;
  }
  .history h3 {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .history-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: #888;
    padding: 8px 0;
    border-bottom: 1px solid #222;
    word-break: break-all;
    cursor: pointer;
  }
  .history-item:hover {
    color: var(--accent);
  }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #000;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 0.9rem;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .toast.show {
    opacity: 1;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>UUID Generator</h1>
  <p class="subtitle">Generate UUIDs instantly</p>
  
  <div class="version-select">
    <button class="version-btn active" data-version="v4">UUID v4</button>
    <button class="version-btn" data-version="v7">UUID v7</button>
  </div>
  
  <div class="uuid-display" id="uuidDisplay">Click generate</div>
  
  <div class="btn-group">
    <button class="btn btn-primary" id="generateBtn">Generate</button>
    <button class="btn btn-copy" id="copyBtn">Copy</button>
  </div>
  
  <div class="history" id="history" style="display:none;">
    <h3>Recent</h3>
    <div id="historyList"></div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
  let currentVersion = 'v4';
  let currentUuid = '';
  const history = [];
  
  const display = document.getElementById('uuidDisplay');
  const generateBtn = document.getElementById('generateBtn');
  const copyBtn = document.getElementById('copyBtn');
  const versionBtns = document.querySelectorAll('.version-btn');
  const historyDiv = document.getElementById('history');
  const historyList = document.getElementById('historyList');
  const toast = document.getElementById('toast');
  
  function generateV4() {
    return '10000000-1000-4000-8000-100000000000'.replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
    );
  }
  
  function generateV7() {
    const timestamp = Date.now();
    const random = crypto.getRandomValues(new Uint8Array(10));
    const hex = Array.from(random).map(b => b.toString(16).padStart(2, '0')).join('');
    const timeHex = timestamp.toString(16).padStart(12, '0');
    return `${timeHex.slice(0,8)}-${timeHex.slice(8,12)}-${currentVersion === 'v7' ? '7' : '4'}000-${hex.slice(0,4)}-${hex.slice(4)}`;
  }
  
  function generate() {
    currentUuid = currentVersion === 'v4' ? generateV4() : generateV7();
    display.textContent = currentUuid;
    
    history.unshift(currentUuid);
    if (history.length > 10) history.pop();
    updateHistory();
  }
  
  function updateHistory() {
    if (history.length > 1) {
      historyDiv.style.display = 'block';
      historyList.innerHTML = history.slice(1).map(uuid => 
        `<div class="history-item" onclick="copyFromHistory('${uuid}')">${uuid}</div>`
      ).join('');
    }
  }
  
  function copyFromHistory(uuid) {
    navigator.clipboard.writeText(uuid);
    showToast('Copied!');
  }
  
  function copy() {
    if (!currentUuid) return;
    navigator.clipboard.writeText(currentUuid);
    showToast('Copied!');
  }
  
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  }
  
  versionBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      versionBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentVersion = btn.dataset.version;
    });
  });
  
  generateBtn.addEventListener('click', generate);
  copyBtn.addEventListener('click', copy);
  
  generate();
</script>
</body>
</html>
