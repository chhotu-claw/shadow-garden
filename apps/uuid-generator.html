<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID Generator — Shadow's Garden</title>
<meta name="description" content="Generate UUIDs v1, v4, and v7. Client-side, fast, free.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }
  .card {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  label {
    display: block;
    font-weight: 600;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
  }
  .uuid-display {
    font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
    font-size: 1rem;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    word-break: break-all;
    margin-bottom: 0.5rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .uuid-display:hover {
    border-color: var(--accent);
  }
  .uuid-display.copied {
    border-color: #22c55e;
  }
  .controls {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  button {
    padding: 0.6rem 1.25rem;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: 0.9rem;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
  }
  .btn-primary:hover {
    filter: brightness(1.1);
  }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .version-selector {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .version-btn {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-size: 0.85rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .version-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .version-btn:hover:not(.active) {
    border-color: var(--accent);
  }
  .info {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }
  .bulk-section {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .bulk-section label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  input[type="number"] {
    width: 80px;
    padding: 0.4rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
  }
  .bulk-output {
    font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
    font-size: 0.85rem;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>UUID Generator</h1>
    <p class="subtitle">Generate UUIDs instantly. All client-side.</p>

    <div class="card">
      <label>Version</label>
      <div class="version-selector">
        <button class="version-btn active" onclick="setVersion(4)">v4 (Random)</button>
        <button class="version-btn" onclick="setVersion(1)">v1 (Timestamp)</button>
        <button class="version-btn" onclick="setVersion(7)">v7 (Time-ordered)</button>
      </div>
      <div class="uuid-display" id="uuid" onclick="copyCurrent()" title="Click to copy"></div>
      <div class="info" id="info">Standard random UUID. Not sortable.</div>
      <div class="controls">
        <button class="btn-primary" onclick="generate()">Generate</button>
        <button class="btn-secondary" onclick="copyCurrent()">Copy</button>
      </div>
    </div>

    <div class="card bulk-section">
      <label>
        Bulk generate
        <input type="number" id="bulkCount" value="10" min="1" max="1000"> 
      </label>
      <div class="controls">
        <button class="btn-secondary" onclick="generateBulk()">Generate Bulk</button>
        <button class="btn-secondary" onclick="copyBulk()">Copy All</button>
      </div>
      <div class="bulk-output" id="bulkOutput"></div>
    </div>
  </div>

  <script>
    let currentVersion = 4;
    const uuidDisplay = document.getElementById('uuid');
    const infoDisplay = document.getElementById('info');

    const versionInfo = {
      1: 'Timestamp + MAC address. Sortable but leaks timing and machine info.',
      4: 'Standard random UUID. Not sortable. 122 bits of randomness.',
      7: 'Unix timestamp + random. Sortable, no info leakage. Best for databases.'
    };

    function setVersion(v) {
      currentVersion = v;
      document.querySelectorAll('.version-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes('v' + v));
      });
      infoDisplay.textContent = versionInfo[v];
      generate();
    }

    function generateUUIDv4() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function generateUUIDv1() {
      const timestamp = Date.now();
      const timeLow = (timestamp & 0xffffffff).toString(16).padStart(8, '0');
      const timeMid = ((timestamp >> 32) & 0xffff).toString(16).padStart(4, '0');
      const timeHi = ((timestamp >> 48) & 0x0fff).toString(16).padStart(4, '0');
      const clockSeq = Math.random() * 0x3fff | 0;
      const node = 'xxxxxxxxxxxx'.replace(/x/g, () => 
        Math.random() * 16 | 0).toString(16).padEnd(12, '0').slice(0, 12);
      
      return `${timeLow}-${timeMid}-1${timeHi.slice(1)}-${clockSeq.toString(16).padStart(4, '0')}-${node}`;
    }

    function generateUUIDv7() {
      const timestamp = Date.now();
      const timeHi = ((timestamp >> 16) & 0x0fff).toString(16).padStart(3, '0');
      const timeLoMid = (timestamp & 0xffff).toString(16).padStart(4, '0');
      const timeLo = ((timestamp >> 16) & 0xffff).toString(16).padStart(4, '0');
      
      const randA = Math.random().toString(16).padStart(3, '0').slice(0, 3);
      const randB = Math.random().toString(16).padStart(12, '0').slice(0, 12);
      
      return `${timeHi}${timeLoMid}-${randA}-7${randB.slice(1)}-${randB}`;
    }

    function generate() {
      let uuid;
      switch (currentVersion) {
        case 1: uuid = generateUUIDv1(); break;
        case 7: uuid = generateUUIDv7(); break;
        default: uuid = generateUUIDv4();
      }
      uuidDisplay.textContent = uuid;
    }

    function copyCurrent() {
      const uuid = uuidDisplay.textContent;
      navigator.clipboard.writeText(uuid);
      uuidDisplay.classList.add('copied');
      setTimeout(() => uuidDisplay.classList.remove('copied'), 1000);
    }

    function generateBulk() {
      const count = Math.min(Math.max(parseInt(document.getElementById('bulkCount').value) || 10, 1), 1000);
      const uuids = [];
      for (let i = 0; i < count; i++) {
        switch (currentVersion) {
          case 1: uuids.push(generateUUIDv1()); break;
          case 7: uuids.push(generateUUIDv7()); break;
          default: uuids.push(generateUUIDv4());
        }
      }
      document.getElementById('bulkOutput').textContent = uuids.join('\n');
    }

    function copyBulk() {
      const text = document.getElementById('bulkOutput').textContent;
      if (text) navigator.clipboard.writeText(text);
    }

    generate();
  </script>
</body>
</html>
