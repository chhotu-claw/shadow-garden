<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID Generator — Shadow's Garden</title>
<meta name="description" content="Generate UUIDs v1, v4, and v7. Copy to clipboard or download as text.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: var(--text-secondary);
    margin-bottom: 2rem;
  }
  .controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  select, button {
    padding: 0.6rem 1rem;
    font-size: 0.95rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
  }
  button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  button:hover {
    opacity: 0.85;
  }
  button.secondary {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .output {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  input[type="text"] {
    flex: 1;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
  }
  .history {
    margin-top: 2rem;
  }
  .history h3 {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.75rem;
    margin-bottom: 0.5rem;
    background: var(--bg-secondary);
    border-radius: 4px;
    font-family: monospace;
    font-size: 0.85rem;
  }
  .history-item span {
    color: var(--text-secondary);
    font-size: 0.75rem;
  }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: var(--bg);
    padding: 0.75rem 1.5rem;
    border-radius: 6px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .toast.show {
    opacity: 1;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>UUID Generator</h1>
    <p class="subtitle">Generate UUIDs v1, v4, and v7</p>
    
    <div class="controls">
      <select id="version">
        <option value="v4">UUID v4 (random)</option>
        <option value="v1">UUID v1 (timestamp)</option>
        <option value="v7">UUID v7 (Unix timestamp)</option>
      </select>
      <button id="generate">Generate</button>
      <button id="copy" class="secondary">Copy</button>
      <button id="download" class="secondary">Download</button>
      <button id="clear" class="secondary">Clear</button>
    </div>
    
    <div class="output">
      <input type="text" id="uuid" readonly>
    </div>
    
    <div class="history" id="historySection" style="display: none;">
      <h3>History</h3>
      <div id="historyList"></div>
    </div>
  </div>
  
  <div class="toast" id="toast">Copied!</div>
  
  <script>
    const uuidInput = document.getElementById('uuid');
    const versionSelect = document.getElementById('version');
    const historySection = document.getElementById('historySection');
    const historyList = document.getElementById('historyList');
    const toast = document.getElementById('toast');
    let history = [];
    
    // Load history from localStorage
    try {
      const saved = localStorage.getItem('uuid-history');
      if (saved) history = JSON.parse(saved);
      if (history.length) {
        historySection.style.display = 'block';
        renderHistory();
      }
    } catch (e) {}
    
    function uuidv4() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }
    
    function uuidv1() {
      const now = Date.now();
      const seq = Math.random() * 0x3fff | 0;
      const timeLow = (now & 0xffffffff) >>> 0;
      const timeMid = ((now >> 32) & 0xffff) >>> 0;
      const timeHiAndVersion = ((now >> 48) & 0x0fff) | (1 << 12);
      const clockSeq = (Math.random() * 0x3fff) | 0;
      const node = [0x00, 0x00, 0x00, 0x00, 
        Math.floor(Math.random() * 256),
        Math.floor(Math.random() * 256)];
      
      const hex = (timeLow.toString(16).padStart(8, '0')) + '-' +
        (timeMid.toString(16).padStart(4, '0')) + '-' +
        (timeHiAndVersion.toString(16).padStart(4, '0')) + '-' +
        (clockSeq.toString(16).padStart(4, '0')) + '-' +
        node.map(b => b.toString(16).padStart(2, '0')).join('');
      return hex;
    }
    
    function uuidv7() {
      const now = Date.now();
      const rand = Array(10).fill(0).map(() => Math.floor(Math.random() * 256));
      rand[0] = (now & 0xff);
      rand[1] = (now >> 8) & 0xff;
      rand[2] = (now >> 16) & 0xff;
      rand[3] = (now >> 24) & 0xff;
      rand[4] = (now >> 32) & 0xff;
      rand[5] = (now >> 40) & 0xff;
      rand[6] = ((now >> 48) & 0x0f) | 0x70;
      rand[8] = (rand[8] & 0x3f) | 0x80;
      
      const hex = rand.map(b => b.toString(16).padStart(2, '0')).join('');
      return hex.slice(0, 8) + '-' + hex.slice(8, 12) + '-' + hex.slice(12, 16) + '-' + hex.slice(16, 20) + '-' + hex.slice(20);
    }
    
    function generate() {
      const version = versionSelect.value;
      let uuid;
      switch (version) {
        case 'v1': uuid = uuidv1(); break;
        case 'v7': uuid = uuidv7(); break;
        default: uuid = uuidv4();
      }
      uuidInput.value = uuid;
      addToHistory(uuid, version);
    }
    
    function addToHistory(uuid, version) {
      history.unshift({ uuid, version, time: new Date().toLocaleTimeString() });
      if (history.length > 20) history = history.slice(0, 20);
      try {
        localStorage.setItem('uuid-history', JSON.stringify(history));
      } catch (e) {}
      historySection.style.display = 'block';
      renderHistory();
    }
    
    function renderHistory() {
      historyList.innerHTML = history.map((h, i) => `
        <div class="history-item">
          <span>${h.version.toUpperCase()}</span>
          <span>${h.uuid}</span>
          <span>${h.time}</span>
        </div>
      `).join('');
    }
    
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }
    
    document.getElementById('generate').onclick = generate;
    document.getElementById('copy').onclick = () => {
      if (!uuidInput.value) return;
      navigator.clipboard.writeText(uuidInput.value).then(() => showToast('Copied!'));
    };
    document.getElementById('download').onclick = () => {
      if (!uuidInput.value) return;
      const blob = new Blob([uuidInput.value], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'uuid.txt';
      a.click();
      URL.revokeObjectURL(url);
    };
    document.getElementById('clear').onclick = () => {
      history = [];
      try { localStorage.removeItem('uuid-history'); } catch (e) {}
      historySection.style.display = 'none';
    };
    
    // Generate on load
    generate();
  </script>
</body>
</html>
