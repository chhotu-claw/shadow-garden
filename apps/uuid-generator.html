<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID Generator — Shadow's Garden</title>
<meta name="description" content="Generate UUIDs v4, v7, and more. Copy to clipboard instantly.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  .uuid-display {
    font-family: 'SF Mono', Monaco, 'Courier New', monospace;
    font-size: 1.1rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    margin: 1rem 0;
    word-break: break-all;
    cursor: pointer;
    transition: all 0.2s;
  }
  .uuid-display:hover { border-color: var(--accent); }
  .uuid-display.copied { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); }
  .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  button {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  button.primary:hover { opacity: 0.9; }
  .label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
  select {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem;
    font-size: 0.9rem;
  }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #22c55e;
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .count-row { display: flex; align-items: center; gap: 0.5rem; margin: 1rem 0; }
  .count-row input { width: 60px; padding: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>UUID Generator</h1>
  <p class="desc">Generate UUIDs instantly. Click any UUID to copy.</p>
  
  <div class="label">Version</div>
  <div class="controls">
    <select id="version">
      <option value="4">UUID v4 (random)</option>
      <option value="7">UUID v7 (time-ordered)</option>
      <option value="1">UUID v1 (timestamp)</option>
    </select>
    <button onclick="generate()">Generate</button>
    <button class="primary" onclick="copyCurrent()">Copy</button>
  </div>

  <div class="count-row">
    <label class="label">Count:</label>
    <input type="number" id="count" value="1" min="1" max="100">
    <button onclick="generate()">Generate</button>
  </div>

  <div id="output"></div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
function generate() {
  const version = document.getElementById('version').value;
  const count = Math.min(100, Math.max(1, parseInt(document.getElementById('count').value) || 1));
  const output = document.getElementById('output');
  output.innerHTML = '';
  
  for (let i = 0; i < count; i++) {
    const uuid = generateUUID(version);
    const div = document.createElement('div');
    div.className = 'uuid-display';
    div.textContent = uuid;
    div.onclick = () => copy(uuid, div);
    output.appendChild(div);
  }
}

function generateUUID(version) {
  if (version === '4') {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      const v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  } else if (version === '7') {
    const time = Date.now();
    const timeHi = ((time & 0x0FFF) | 0x7000).toString(16);
    const timeLo = time.toString(16).padStart(13, '0');
    const rand = 'xxxxxxxxxxxx'.replace(/x/g, () => (Math.random() * 16 | 0).toString(16));
    return `${timeHi.slice(0,8)}-${timeHi.slice(-4)}-${rand.slice(0,4)}-7${rand.slice(4,7)}-${rand.slice(7)}`;
  } else if (version === '1') {
    const now = Date.now();
    const timeLow = (now & 0xFFFFFFFF).toString(16).padStart(8, '0');
    const timeMid = ((now >> 32) & 0xFFFF).toString(16).padStart(4, '0');
    const timeHi = ((now >> 48) & 0x0FFF).toString(16).padStart(4, '0');
    const clock = (Math.random() * 0x3FFF | 0x8000).toString(16).padStart(4, '0');
    const hex = 'xxxxxxxxxxxx'.replace(/x/g, () => (Math.random() * 16 | 0).toString(16));
    return `${timeLow}-${timeMid}-${timeHi}-${clock}-${hex}`;
  }
}

function copy(text, el) {
  navigator.clipboard.writeText(text);
  document.querySelectorAll('.uuid-display').forEach(d => d.classList.remove('copied'));
  el.classList.add('copied');
  showToast();
}

function copyCurrent() {
  const first = document.querySelector('.uuid-display');
  if (first) copy(first.textContent, first);
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

generate();
</script>
</body>
</html>
