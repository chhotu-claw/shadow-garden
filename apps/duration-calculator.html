<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duration Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate durations across multiple units simultaneously. See years, days, hours, minutes all at once.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-mono); }
  .calculator { max-width: 600px; margin: 0 auto; padding: 2rem; }
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--text-light); }
  input, select { 
    width: 100%; padding: 0.75rem; font-size: 1rem; 
    background: var(--bg-light); border: 1px solid var(--border);
    border-radius: 8px; font-family: inherit;
  }
  .results { 
    background: var(--bg-accent); padding: 1.5rem; 
    border-radius: 12px; margin-top: 2rem;
  }
  .result-row { 
    display: flex; justify-content: space-between; 
    padding: 0.5rem 0; border-bottom: 1px solid var(--border);
  }
  .result-row:last-child { border-bottom: none; }
  .result-label { color: var(--text-light); }
  .result-value { font-weight: bold; color: var(--accent); }
  .mode-toggle {
    display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
  }
  .mode-btn {
    flex: 1; padding: 0.75rem; border: 1px solid var(--border);
    background: transparent; border-radius: 8px; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--accent); color: var(--bg-dark);
    border-color: var(--accent);
  }
  .time-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
  .time-inputs input { text-align: center; }
  .time-inputs .unit { font-size: 0.75rem; color: var(--text-light); text-align: center; margin-top: 0.25rem; }
  h1 { text-align: center; margin-bottom: 2rem; }
</style>
</head>
<body data-page-type="app">
<div class="calculator">
  <h1>⏱️ Duration Calculator</h1>
  
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="duration">Duration → Units</button>
    <button class="mode-btn" data-mode="range">Date Range</button>
  </div>

  <div id="duration-mode">
    <div class="input-group">
      <label>Enter duration</label>
      <div class="time-inputs">
        <div><input type="number" id="years" min="0" placeholder="0"><div class="unit">years</div></div>
        <div><input type="number" id="days" min="0" placeholder="0"><div class="unit">days</div></div>
        <div><input type="number" id="hours" min="0" placeholder="0"><div class="unit">hours</div></div>
        <div><input type="number" id="minutes" min="0" placeholder="0"><div class="unit">min</div></div>
      </div>
    </div>
  </div>

  <div id="range-mode" style="display:none;">
    <div class="input-group">
      <label>Start Date</label>
      <input type="datetime-local" id="start-date">
    </div>
    <div class="input-group">
      <label>End Date</label>
      <input type="datetime-local" id="end-date">
    </div>
    <button class="mode-btn" onclick="useNow()" style="margin-top:0.5rem;">Use Now as End</button>
  </div>

  <div class="results" id="results">
    <div class="result-row"><span class="result-label">Total Days</span><span class="result-value" id="total-days">—</span></div>
    <div class="result-row"><span class="result-label">Total Hours</span><span class="result-value" id="total-hours">—</span></div>
    <div class="result-row"><span class="result-label">Total Minutes</span><span class="result-value" id="total-minutes">—</span></div>
    <div class="result-row"><span class="result-label">Total Seconds</span><span class="result-value" id="total-seconds">—</span></div>
    <div class="result-row"><span class="result-label">Weeks</span><span class="result-value" id="total-weeks">—</span></div>
    <div class="result-row"><span class="result-label">Business Days</span><span class="result-value" id="biz-days">—</span></div>
    <div class="result-row"><span class="result-label">Months (approx)</span><span class="result-value" id="total-months">—</span></div>
    <div class="result-row"><span class="result-label">Years (approx)</span><span class="result-value" id="total-years">—</span></div>
  </div>
</div>

<script>
  const modeBtns = document.querySelectorAll('.mode-btn[data-mode]');
  let currentMode = 'duration';

  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      modeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      document.getElementById('duration-mode').style.display = currentMode === 'duration' ? 'block' : 'none';
      document.getElementById('range-mode').style.display = currentMode === 'range' ? 'block' : 'none';
      calculate();
    });
  });

  function useNow() {
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('end-date').value = now.toISOString().slice(0, 16);
    calculate();
  }

  const inputs = ['years', 'days', 'hours', 'minutes'].map(id => document.getElementById(id));
  const dateInputs = ['start-date', 'end-date'].map(id => document.getElementById(id));

  inputs.forEach(input => input.addEventListener('input', calculate));
  dateInputs.forEach(input => input.addEventListener('input', calculate));

  function calculate() {
    if (currentMode === 'duration') {
      const y = parseFloat(document.getElementById('years').value) || 0;
      const d = parseFloat(document.getElementById('days').value) || 0;
      const h = parseFloat(document.getElementById('hours').value) || 0;
      const m = parseFloat(document.getElementById('minutes').value) || 0;

      const totalMinutes = (y * 365.25 * 24 * 60) + (d * 24 * 60) + (h * 60) + m;
      showResults(totalMinutes);
    } else {
      const start = new Date(document.getElementById('start-date').value);
      const end = new Date(document.getElementById('end-date').value);
      if (start && end && !isNaN(start) && !isNaN(end)) {
        const totalMinutes = (end - start) / 60000;
        if (totalMinutes >= 0) showResults(totalMinutes);
      }
    }
  }

  function showResults(minutes) {
    document.getElementById('total-days').textContent = (minutes / 60 / 24).toFixed(2);
    document.getElementById('total-hours').textContent = (minutes / 60).toFixed(2);
    document.getElementById('total-minutes').textContent = minutes.toFixed(0);
    document.getElementById('total-seconds').textContent = (minutes * 60).toFixed(0);
    document.getElementById('total-weeks').textContent = (minutes / 60 / 24 / 7).toFixed(2);
    document.getElementById('biz-days').textContent = (minutes / 60 / 24 * 5 / 7).toFixed(2);
    document.getElementById('total-months').textContent = (minutes / 60 / 24 / 30.44).toFixed(2);
    document.getElementById('total-years').textContent = (minutes / 60 / 24 / 365.25).toFixed(4);
  }

  // Initialize end date to now
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('end-date').value = now.toISOString().slice(0, 16);
  document.getElementById('start-date').value = now.toISOString().slice(0, 16);
  calculate();
</script>
</body>
</html>
