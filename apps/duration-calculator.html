<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duration Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate the duration between two dates in years, months, days, hours, minutes, and seconds.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 { margin-bottom: 0.5rem; }
  .subtitle {
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  .date-inputs {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1rem;
    align-items: end;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 500px) {
    .date-inputs {
      grid-template-columns: 1fr;
    }
  }
  .input-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: var(--text);
  }
  .input-group input {
    width: 100%;
    padding: 0.75rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    background: var(--bg);
    color: var(--text);
    box-sizing: border-box;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .arrow {
    font-size: 1.5rem;
    color: var(--muted);
    padding-bottom: 0.5rem;
  }
  button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.75rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
  }
  button:hover { opacity: 0.9; }
  
  .result {
    margin-top: 2rem;
    padding: 1.5rem;
    background: var(--card);
    border-radius: 12px;
    display: none;
  }
  .result.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .main-duration {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    margin-bottom: 1rem;
  }
  .breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
  }
  @media (max-width: 400px) {
    .breakdown { grid-template-columns: repeat(2, 1fr); }
  }
  .breakdown .item {
    background: var(--bg);
    padding: 0.75rem;
    border-radius: 8px;
    text-align: center;
  }
  .breakdown .value {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
  }
  .breakdown .label {
    font-size: 0.75rem;
    color: var(--muted);
  }
  
  .error {
    color: #e74c3c;
    margin-top: 1rem;
    display: none;
  }
  .error.show { display: block; }
  
  .swap-btn {
    background: none;
    border: 2px solid var(--border);
    color: var(--text);
    padding: 0.5rem;
    font-size: 1.2rem;
    margin-bottom: 0.5rem;
  }
  .swap-btn:hover { background: var(--border); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Duration Calculator</h1>
  <p class="subtitle">Find out exactly how much time between two dates.</p>
  
  <button class="swap-btn" onclick="swapDates()" title="Swap dates">⇅</button>
  
  <div class="date-inputs">
    <div class="input-group">
      <label for="startDate">From</label>
      <input type="datetime-local" id="startDate">
    </div>
    <div class="arrow">→</div>
    <div class="input-group">
      <label for="endDate">To</label>
      <input type="datetime-local" id="endDate">
    </div>
  </div>
  
  <button onclick="calculate()">Calculate Duration</button>
  
  <div class="error" id="error"></div>
  
  <div class="result" id="result">
    <div class="main-duration" id="mainDuration"></div>
    <div class="breakdown">
      <div class="item">
        <div class="value" id="years">0</div>
        <div class="label">Years</div>
      </div>
      <div class="item">
        <div class="value" id="months">0</div>
        <div class="label">Months</div>
      </div>
      <div class="item">
        <div class="value" id="days">0</div>
        <div class="label">Days</div>
      </div>
      <div class="item">
        <div class="value" id="hours">0</div>
        <div class="label">Hours</div>
      </div>
      <div class="item">
        <div class="value" id="minutes">0</div>
        <div class="label">Minutes</div>
      </div>
      <div class="item">
        <div class="value" id="seconds">0</div>
        <div class="label">Seconds</div>
      </div>
    </div>
  </div>
</div>

<script>
  function formatDateTimeLocal(date) {
    const d = new Date(date);
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const hours = String(d.getHours()).padStart(2, '0');
    const minutes = String(d.getMinutes()).padStart(2, '0');
    return `${year}-${month}-${day}T${hours}:${minutes}`;
  }
  
  // Set defaults: 1 year ago to now
  const now = new Date();
  const oneYearAgo = new Date(now);
  oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
  
  document.getElementById('startDate').value = formatDateTimeLocal(oneYearAgo);
  document.getElementById('endDate').value = formatDateTimeLocal(now);
  
  function swapDates() {
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    document.getElementById('startDate').value = end;
    document.getElementById('endDate').value = start;
  }
  
  function calculate() {
    const startInput = document.getElementById('startDate').value;
    const endInput = document.getElementById('endDate').value;
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');
    
    errorEl.classList.remove('show');
    resultEl.classList.remove('show');
    
    if (!startInput || !endInput) {
      errorEl.textContent = 'Please select both dates.';
      errorEl.classList.add('show');
      return;
    }
    
    const start = new Date(startInput);
    const end = new Date(endInput);
    
    if (start.getTime() === end.getTime()) {
      errorEl.textContent = 'Dates are the same. Try different times.';
      errorEl.classList.add('show');
      return;
    }
    
    // Ensure start is before end
    let diff = end - start;
    let from = start;
    let to = end;
    
    if (diff < 0) {
      diff = -diff;
      from = end;
      to = start;
    }
    
    const totalSeconds = Math.floor(diff / 1000);
    const totalMinutes = Math.floor(totalSeconds / 60);
    const totalHours = Math.floor(totalMinutes / 60);
    const totalDays = Math.floor(totalHours / 24);
    
    // Calculate Y/M/D breakdown
    let years = to.getFullYear() - from.getFullYear();
    let months = to.getMonth() - from.getMonth();
    let days = to.getDate() - from.getDate();
    let hours = to.getHours() - from.getHours();
    let minutes = to.getMinutes() - from.getMinutes();
    let seconds = to.getSeconds() - from.getSeconds();
    
    // Borrow from larger units
    if (seconds < 0) {
      seconds += 60;
      minutes--;
    }
    if (minutes < 0) {
      minutes += 60;
      hours--;
    }
    if (hours < 0) {
      hours += 24;
      days--;
    }
    if (days < 0) {
      const prevMonth = new Date(to.getFullYear(), to.getMonth(), 0);
      days += prevMonth.getDate();
      months--;
    }
    if (months < 0) {
      months += 12;
      years--;
    }
    
    // Format main display
    let mainText = '';
    if (years > 0) mainText += `${years} year${years !== 1 ? 's' : ''} `;
    if (months > 0) mainText += `${months} month${months !== 1 ? 's' : ''} `;
    if (days > 0 || (years === 0 && months === 0)) mainText += `${days} day${days !== 1 ? 's' : ''}`;
    mainText = mainText.trim() || '0 days';
    
    document.getElementById('mainDuration').textContent = mainText;
    document.getElementById('years').textContent = years;
    document.getElementById('months').textContent = months;
    document.getElementById('days').textContent = days;
    document.getElementById('hours').textContent = hours;
    document.getElementById('minutes').textContent = minutes;
    document.getElementById('seconds').textContent = seconds;
    
    resultEl.classList.add('show');
  }
</script>

</body>
</html>
