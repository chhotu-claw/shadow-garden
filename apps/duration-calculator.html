<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duration Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate the duration between two dates in years, months, days, hours, and more.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 { margin-bottom: 0.5rem; }
  .subtitle {
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 500px) {
    .input-grid { grid-template-columns: 1fr; }
  }
  .input-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: var(--text);
  }
  .input-group input[type="datetime-local"],
  .input-group input[type="date"] {
    width: 100%;
    padding: 0.75rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    background: var(--bg);
    color: var(--text);
    box-sizing: border-box;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .preset-btn {
    background: var(--card);
    color: var(--text);
    border: 2px solid var(--border);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .preset-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.75rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    width: 100%;
  }
  button.primary:hover { opacity: 0.9; }
  button.primary:active { transform: scale(0.98); }
  
  .result {
    margin-top: 2rem;
    padding: 1.5rem;
    background: var(--card);
    border-radius: 12px;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .result.show { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .main-duration {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    margin-bottom: 1.5rem;
  }
  
  .duration-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 1rem;
  }
  .duration-item {
    text-align: center;
    padding: 1rem;
    background: var(--bg);
    border-radius: 8px;
  }
  .duration-item .value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }
  .duration-item .label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }
  
  .error {
    color: #e74c3c;
    margin-top: 1rem;
    display: none;
  }
  .error.show { display: block; }
  
  .checkbox-group {
    margin-top: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .checkbox-group input {
    width: auto;
  }
  .checkbox-group label {
    margin: 0;
    font-weight: normal;
    cursor: pointer;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Duration Calculator</h1>
  <p class="subtitle">Calculate the time between two dates in various units.</p>
  
  <div class="input-grid">
    <div class="input-group">
      <label for="startDate">Start Date</label>
      <input type="datetime-local" id="startDate">
    </div>
    <div class="input-group">
      <label for="endDate">End Date</label>
      <input type="datetime-local" id="endDate">
    </div>
  </div>
  
  <div class="presets">
    <button class="preset-btn" onclick="setPreset('week')">Past Week</button>
    <button class="preset-btn" onclick="setPreset('month')">Past Month</button>
    <button class="preset-btn" onclick="setPreset('year')">Past Year</button>
    <button class="preset-btn" onclick="setPreset('decade')">Past Decade</button>
    <button class="preset-btn" onclick="setPreset('clear')">Clear</button>
  </div>
  
  <button class="primary" onclick="calculate()">Calculate Duration</button>
  
  <div class="error" id="error"></div>
  
  <div class="result" id="result">
    <div class="main-duration" id="mainDuration"></div>
    <div class="duration-grid">
      <div class="duration-item">
        <div class="value" id="years">0</div>
        <div class="label">Years</div>
      </div>
      <div class="duration-item">
        <div class="value" id="months">0</div>
        <div class="label">Months</div>
      </div>
      <div class="duration-item">
        <div class="value" id="weeks">0</div>
        <div class="label">Weeks</div>
      </div>
      <div class="duration-item">
        <div class="value" id="days">0</div>
        <div class="label">Days</div>
      </div>
      <div class="duration-item">
        <div class="value" id="hours">0</div>
        <div class="label">Hours</div>
      </div>
      <div class="duration-item">
        <div class="value" id="minutes">0</div>
        <div class="label">Minutes</div>
      </div>
    </div>
  </div>
</div>

<script>
  // Set defaults
  const now = new Date();
  const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  
  function toLocalISOString(date) {
    const offset = date.getTimezoneOffset() * 60000;
    return new Date(date.getTime() - offset).toISOString().slice(0, 16);
  }
  
  document.getElementById('endDate').value = toLocalISOString(now);
  document.getElementById('startDate').value = toLocalISOString(weekAgo);
  
  let activePreset = 'week';
  
  function setPreset(preset) {
    activePreset = preset;
    document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
    
    const now = new Date();
    let start;
    
    switch(preset) {
      case 'week':
        start = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        document.querySelector('.preset-btn:nth-child(1)').classList.add('active');
        break;
      case 'month':
        start = new Date(now.getFullYear(), now.getMonth() - 1, now.getDate());
        document.querySelector('.preset-btn:nth-child(2)').classList.add('active');
        break;
      case 'year':
        start = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());
        document.querySelector('.preset-btn:nth-child(3)').classList.add('active');
        break;
      case 'decade':
        start = new Date(now.getFullYear() - 10, now.getMonth(), now.getDate());
        document.querySelector('.preset-btn:nth-child(4)').classList.add('active');
        break;
      case 'clear':
        document.querySelector('.preset-btn:nth-child(5)').classList.add('active');
        document.getElementById('startDate').value = '';
        return;
    }
    
    document.getElementById('startDate').value = toLocalISOString(start);
    document.getElementById('endDate').value = toLocalISOString(now);
  }
  
  // Set initial active state
  setPreset('week');
  
  function calculate() {
    const startInput = document.getElementById('startDate').value;
    const endInput = document.getElementById('endDate').value;
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');
    
    errorEl.classList.remove('show');
    resultEl.classList.remove('show');
    
    if (!startInput || !endInput) {
      errorEl.textContent = 'Please select both start and end dates.';
      errorEl.classList.add('show');
      return;
    }
    
    const start = new Date(startInput);
    const end = new Date(endInput);
    
    if (start > end) {
      errorEl.textContent = 'Start date must be before end date.';
      errorEl.classList.add('show');
      return;
    }
    
    const diffMs = end - start;
    const diffSec = Math.floor(diffMs / 1000);
    const diffMin = Math.floor(diffSec / 60);
    const diffHour = Math.floor(diffMin / 60);
    const diffDay = Math.floor(diffHour / 24);
    const diffWeek = Math.floor(diffDay / 7);
    
    // Calculate years/months precisely
    let years = end.getFullYear() - start.getFullYear();
    let months = end.getMonth() - start.getMonth();
    let days = end.getDate() - start.getDate();
    
    if (days < 0) {
      months--;
      const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
      days += prevMonth.getDate();
    }
    
    if (months < 0) {
      years--;
      months += 12;
    }
    
    // Build main duration string
    let parts = [];
    if (years > 0) parts.push(`${years} year${years !== 1 ? 's' : ''}`);
    if (months > 0) parts.push(`${months} month${months !== 1 ? 's' : ''}`);
    if (days > 0 && years === 0 && months === 0) parts.push(`${days} day${days !== 1 ? 's' : ''}`);
    
    let mainText = parts.length > 0 ? parts.join(', ') : `${diffDay} days`;
    
    document.getElementById('mainDuration').textContent = mainText;
    document.getElementById('years').textContent = years;
    document.getElementById('months').textContent = months;
    document.getElementById('weeks').textContent = diffWeek;
    document.getElementById('days').textContent = diffDay;
    document.getElementById('hours').textContent = diffHour.toLocaleString();
    document.getElementById('minutes').textContent = diffMin.toLocaleString();
    
    resultEl.classList.add('show');
  }
</script>

</body>
</html>
