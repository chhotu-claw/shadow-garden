<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duration Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate the duration between two dates in human-readable format. Supports years, months, days, hours, minutes, seconds.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e5e5e5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
  .container { max-width: 600px; width: 100%; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 600; }
  .subtitle { color: #666; margin-bottom: 2rem; }
  .inputs { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem; }
  .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
  .input-group label { font-size: 0.9rem; color: #888; }
  .input-group input { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 0.75rem; color: #e5e5e5; font-size: 1rem; }
  .input-group input:focus { outline: none; border-color: #6cb6ff; }
  .buttons { display: flex; gap: 1rem; margin-bottom: 2rem; }
  button { background: #1a1a2e; color: #7aa2f7; border: 1px solid #333; border-radius: 6px; padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
  button:hover { background: #2a2a4e; border-color: #7aa2f7; }
  button.secondary { background: transparent; color: #666; border-color: #333; }
  button.secondary:hover { color: #888; border-color: #444; }
  .result { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 1.5rem; text-align: center; }
  .result.empty { color: #666; }
  .result-value { font-size: 1.25rem; font-weight: 600; color: #7af782; }
  .result-breakdown { margin-top: 1rem; font-size: 0.9rem; color: #888; }
  .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .preset-btn { background: #222; border: 1px solid #333; color: #666; padding: 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 4px; cursor: pointer; }
  .preset-btn:hover { border-color: #555; color: #888; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Duration Calculator</h1>
    <p class="subtitle">Calculate the time between two dates</p>
    
    <div class="presets">
      <button class="preset-btn" onclick="setNow()">Now → +1 hour</button>
      <button class="preset-btn" onclick="setToday()">Today → End of day</button>
      <button class="preset-btn" onclick="setWeek()">Now → +7 days</button>
    </div>

    <div class="inputs">
      <div class="input-group">
        <label>Start Date & Time</label>
        <input type="datetime-local" id="start">
      </div>
      <div class="input-group">
        <label>End Date & Time</label>
        <input type="datetime-local" id="end">
      </div>
    </div>

    <div class="buttons">
      <button onclick="calculate()">Calculate</button>
      <button class="secondary" onclick="clearAll()">Clear</button>
    </div>

    <div class="result" id="result">
      <p class="empty">Enter two dates to see the duration</p>
    </div>
  </div>

  <script>
    const startInput = document.getElementById('start');
    const endInput = document.getElementById('end');
    const resultDiv = document.getElementById('result');

    function setNow() {
      const now = new Date();
      const later = new Date(now.getTime() + 60 * 60 * 1000);
      startInput.value = formatForInput(now);
      endInput.value = formatForInput(later);
      calculate();
    }

    function setToday() {
      const now = new Date();
      const endOfDay = new Date(now);
      endOfDay.setHours(23, 59, 59, 999);
      startInput.value = formatForInput(now);
      endInput.value = formatForInput(endOfDay);
      calculate();
    }

    function setWeek() {
      const now = new Date();
      const weekLater = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
      startInput.value = formatForInput(now);
      endInput.value = formatForInput(weekLater);
      calculate();
    }

    function formatForInput(date) {
      return date.toISOString().slice(0, 16);
    }

    function calculate() {
      const start = new Date(startInput.value);
      const end = new Date(endInput.value);

      if (isNaN(start.getTime()) || isNaN(end.getTime())) {
        resultDiv.innerHTML = '<p class="empty">Please enter valid dates</p>';
        return;
      }

      if (end <= start) {
        resultDiv.innerHTML = '<p class="empty">End must be after start</p>';
        return;
      }

      const diff = end.getTime() - start.getTime();
      const totalSeconds = Math.floor(diff / 1000);
      const totalMinutes = Math.floor(diff / 60000);
      const totalHours = Math.floor(diff / 3600000);
      const totalDays = Math.floor(diff / 86400000);

      // Calculate breakdown
      let remaining = diff;
      const years = Math.floor(remaining / (365.25 * 86400000));
      remaining = remaining % (365.25 * 86400000);
      const months = Math.floor(remaining / (30.44 * 86400000));
      remaining = remaining % (30.44 * 86400000);
      const days = Math.floor(remaining / 86400000);
      remaining = remaining % 86400000;
      const hours = Math.floor(remaining / 3600000);
      remaining = remaining % 3600000;
      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);

      // Human readable
      const parts = [];
      if (years > 0) parts.push(`${years} year${years > 1 ? 's' : ''}`);
      if (months > 0) parts.push(`${months} month${months > 1 ? 's' : ''}`);
      if (days > 0) parts.push(`${days} day${days > 1 ? 's' : ''}`);
      if (hours > 0) parts.push(`${hours} hour${hours > 1 ? 's' : ''}`);
      if (minutes > 0) parts.push(`${minutes} minute${minutes > 1 ? 's' : ''}`);
      if (seconds > 0 || parts.length === 0) parts.push(`${seconds} second${seconds !== 1 ? 's' : ''}`);

      const humanReadable = parts.join(', ');

      resultDiv.innerHTML = `
        <div class="result-value">${humanReadable}</div>
        <div class="result-breakdown">
          ${totalDays} days · ${totalHours} hours · ${totalMinutes} minutes · ${totalSeconds} seconds
        </div>
      `;
    }

    function clearAll() {
      startInput.value = '';
      endInput.value = '';
      resultDiv.innerHTML = '<p class="empty">Enter two dates to see the duration</p>';
    }
  </script>
</body>
</html>
