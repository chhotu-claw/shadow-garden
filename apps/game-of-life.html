<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game of Life — Shadow's Garden</title>
<meta name="description" content="Conway's Game of Life — the classic cellular automaton. Draw patterns and watch them evolve.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background: #0a0a0f;
  }
  h1 {
    color: #f0e6d3;
    margin-bottom: 10px;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    padding: 8px 16px;
    border: 2px solid #333;
    background: #1a1a24;
    color: #f0e6d3;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s;
  }
  button:hover {
    background: #252535;
  }
  button.active {
    border-color: #ff6b35;
    background: #2a1a14;
  }
  canvas {
    border: 2px solid #333;
    cursor: crosshair;
    image-rendering: pixelated;
  }
  .info {
    color: #666;
    font-size: 12px;
    margin-top: 10px;
  }
  .stats {
    color: #888;
    font-size: 13px;
    margin-top: 8px;
  }
</style>
</head>
<body data-page-type="app">
  <h1>Game of Life</h1>
  <div class="controls">
    <button id="playBtn">Play</button>
    <button id="stepBtn">Step</button>
    <button id="clearBtn">Clear</button>
    <button id="randomBtn">Random</button>
    <button id="gliderBtn">Glider</button>
    <button id="pulsarBtn">Pulsar</button>
  </div>
  <canvas id="canvas" width="600" height="400"></canvas>
  <div class="stats">Population: <span id="pop">0</span> | Generation: <span id="gen">0</span></div>
  <div class="info">Click to toggle cells • Space to play/pause • C to clear</div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const SCALE = 8;
    const COLS = Math.floor(canvas.width / SCALE);
    const ROWS = Math.floor(canvas.height / SCALE);
    
    let grid = new Uint8Array(COLS * ROWS);
    let generation = 0;
    let isPlaying = false;
    let isDrawing = false;
    
    const popEl = document.getElementById('pop');
    const genEl = document.getElementById('gen');
    
    // Initialize
    randomize();
    
    // Controls
    document.getElementById('playBtn').addEventListener('click', togglePlay);
    document.getElementById('stepBtn').addEventListener('click', () => { step(); draw(); });
    document.getElementById('clearBtn').addEventListener('click', clear);
    document.getElementById('randomBtn').addEventListener('click', randomize);
    document.getElementById('gliderBtn').addEventListener('click', addGlider);
    document.getElementById('pulsarBtn').addEventListener('click', addPulsar);
    
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
      if (e.code === 'KeyC') clear();
    });
    
    function togglePlay() {
      isPlaying = !isPlaying;
      document.getElementById('playBtn').textContent = isPlaying ? 'Pause' : 'Play';
      if (isPlaying) loop();
    }
    
    function clear() {
      grid.fill(0);
      generation = 0;
      draw();
    }
    
    function randomize() {
      for (let i = 0; i < grid.length; i++) {
        grid[i] = Math.random() < 0.25 ? 1 : 0;
      }
      generation = 0;
      draw();
    }
    
    function addGlider() {
      const x = Math.floor(COLS / 2);
      const y = Math.floor(ROWS / 2);
      grid[y * COLS + x] = 1;
      grid[(y + 1) * COLS + (x + 1)] = 1;
      grid[(y + 2) * COLS + (x - 1)] = 1;
      grid[(y + 2) * COLS + x] = 1;
      grid[(y + 2) * COLS + (x + 1)] = 1;
      draw();
    }
    
    function addPulsar() {
      const x = Math.floor(COLS / 2) - 6;
      const y = Math.floor(ROWS / 2) - 6;
      // Horizontal bars
      for (let i = 0; i < 6; i++) {
        grid[(y + 1) * COLS + (x + i)] = 1;
        grid[(y + 1) * COLS + (x + 10 + i)] = 1;
        grid[(y + 6) * COLS + (x + i)] = 1;
        grid[(y + 6) * COLS + (x + 10 + i)] = 1;
        grid[(y + 8) * COLS + (x + 2 + i)] = 1;
        grid[(y + 8) * COLS + (x + 12 + i)] = 1;
        grid[(y + 13) * COLS + (x + 2 + i)] = 1;
        grid[(y + 13) * COLS + (x + 12 + i)] = 1;
      }
      // Vertical bars
      for (let i = 0; i < 6; i++) {
        grid[(y + i) * COLS + (x + 1)] = 1;
        grid[(y + 10 + i) * COLS + (x + 1)] = 1;
        grid[(y + i) * COLS + (x + 6)] = 1;
        grid[(y + 10 + i) * COLS + (x + 6)] = 1;
        grid[(y + i) * COLS + (x + 8)] = 1;
        grid[(y + 10 + i) * COLS + (x + 8)] = 1;
        grid[(y + i) * COLS + (x + 13)] = 1;
        grid[(y + 10 + i) * COLS + (x + 13)] = 1;
      }
      draw();
    }
    
    // Drawing
    canvas.addEventListener('mousedown', e => { isDrawing = true; drawCells(e); });
    canvas.addEventListener('mousemove', e => { if (isDrawing) drawCells(e); });
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);
    
    function drawCells(e) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / SCALE);
      const y = Math.floor((e.clientY - rect.top) / SCALE);
      if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
        grid[y * COLS + x] = grid[y * COLS + x] ? 0 : 1;
        draw();
      }
    }
    
    function step() {
      const newGrid = new Uint8Array(COLS * ROWS);
      let pop = 0;
      
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          let neighbors = 0;
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              const nx = x + dx;
              const ny = y + dy;
              if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
                neighbors += grid[ny * COLS + nx];
              }
            }
          }
          
          const cell = grid[y * COLS + x];
          if (cell === 1) {
            newGrid[y * COLS + x] = (neighbors === 2 || neighbors === 3) ? 1 : 0;
          } else {
            newGrid[y * COLS + x] = neighbors === 3 ? 1 : 0;
          }
          pop += newGrid[y * COLS + x];
        }
      }
      
      grid = newGrid;
      generation++;
      popEl.textContent = pop;
      genEl.textContent = generation;
    }
    
    function draw() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#4ade80';
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (grid[y * COLS + x]) {
            ctx.fillRect(x * SCALE, y * SCALE, SCALE - 1, SCALE - 1);
          }
        }
      }
      
      let pop = 0;
      for (let i = 0; i < grid.length; i++) pop += grid[i];
      popEl.textContent = pop;
      genEl.textContent = generation;
    }
    
    let lastTime = 0;
    function loop(timestamp) {
      if (!isPlaying) return;
      if (timestamp - lastTime > 100) {
        step();
        draw();
        lastTime = timestamp;
      }
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
