<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
title>Falling Sand — Shadow's Garden</title>
<meta name="description" content="Interactive falling sand particle simulation — draw elements and watch them interact">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background: #0a0a0f;
  }
  h1 {
    color: #f0e6d3;
    margin-bottom: 10px;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .element-btn {
    padding: 8px 16px;
    border: 2px solid #333;
    background: #1a1a24;
    color: #f0e6d3;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s;
  }
  .element-btn:hover {
    background: #252535;
  }
  .element-btn.active {
    border-color: #ff6b35;
    background: #2a1a14;
  }
  canvas {
    border: 2px solid #333;
    cursor: crosshair;
    image-rendering: pixelated;
  }
  .info {
    color: #666;
    font-size: 12px;
    margin-top: 10px;
  }
</style>
</head>
<body data-page-type="app">
  <h1>Falling Sand</h1>
  <div class="controls">
    <button class="element-btn active" data-elem="sand">Sand</button>
    <button class="element-btn" data-elem="water">Water</button>
    <button class="element-btn" data-elem="stone">Stone</button>
    <button class="element-btn" data-elem="fire">Fire</button>
    <button class="element-btn" data-elem="smoke">Smoke</button>
    <button class="element-btn" data-elem="eraser">Eraser</button>
    <button class="element-btn" id="clearBtn">Clear</button>
  </div>
  <canvas id="canvas" width="400" height="300"></canvas>
  <div class="info">Click and drag to draw • Elements interact with physics</div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    const SCALE = 4;
    const COLS = Math.floor(W / SCALE);
    const ROWS = Math.floor(H / SCALE);
    
    // Particle grid: 0 = empty, 1 = sand, 2 = water, 3 = stone, 4 = fire, 5 = smoke
    let grid = new Uint8Array(COLS * ROWS);
    let colors = {
      1: '#e8c170',
      2: '#4a9eff',
      3: '#666677',
      4: '#ff4422',
      5: '#888899'
    };
    
    let currentElement = 1;
    let isDrawing = false;
    let brushSize = 2;
    
    // Element buttons
    document.querySelectorAll('.element-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.id === 'clearBtn') {
          grid.fill(0);
          return;
        }
        document.querySelectorAll('.element-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const elem = btn.dataset.elem;
        const map = { sand: 1, water: 2, stone: 3, fire: 4, smoke: 5, eraser: 0 };
        currentElement = map[elem] || 1;
      });
    });
    
    // Drawing
    canvas.addEventListener('mousedown', e => { isDrawing = true; draw(e); });
    canvas.addEventListener('mousemove', e => { if (isDrawing) draw(e); });
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);
    
    function draw(e) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / SCALE);
      const y = Math.floor((e.clientY - rect.top) / SCALE);
      
      for (let dy = -brushSize; dy <= brushSize; dy++) {
        for (let dx = -brushSize; dx <= brushSize; dx++) {
          if (dx*dx + dy*dy <= brushSize*brushSize) {
            const px = x + dx;
            const py = y + dy;
            if (px >= 0 && px < COLS && py >= 0 && py < ROWS) {
              if (currentElement === 0) {
                grid[py * COLS + px] = 0;
              } else if (grid[py * COLS + px] === 0) {
                grid[py * COLS + px] = currentElement;
              }
            }
          }
        }
      }
    }
    
    function update() {
      const newGrid = new Uint8Array(grid);
      
      for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) {
          const i = y * COLS + x;
          const cell = grid[i];
          
          if (cell === 0 || cell === 3) continue; // Empty or stone
          
          // Fire rises and disappears
          if (cell === 4) {
            if (Math.random() < 0.3) {
              const nx = x + Math.floor(Math.random() * 3) - 1;
              const ny = y - 1;
              if (nx >= 0 && nx < COLS && ny >= 0 && newGrid[ny * COLS + nx] === 0) {
                newGrid[ny * COLS + nx] = 4;
                newGrid[i] = 0;
              } else if (Math.random() < 0.5) {
                newGrid[i] = 0;
              }
            }
            continue;
          }
          
          // Smoke rises
          if (cell === 5) {
            const nx = x + Math.floor(Math.random() * 3) - 1;
            const ny = y - 1;
            if (nx >= 0 && nx < COLS && ny >= 0 && newGrid[ny * COLS + nx] === 0) {
              newGrid[ny * COLS + nx] = 5;
              newGrid[i] = 0;
            } else if (Math.random() < 0.02) {
              newGrid[i] = 0;
            }
            continue;
          }
          
          // Sand and water fall
          const below = y < ROWS - 1 ? grid[(y + 1) * COLS + x] : 0;
          const belowL = y < ROWS - 1 && x > 0 ? grid[(y + 1) * COLS + (x - 1)] : 0;
          const belowR = y < ROWS - 1 && x < COLS - 1 ? grid[(y + 1) * COLS + (x + 1)] : 0;
          
          // Sand falls down, then diagonally
          if (cell === 1) {
            if (below === 0 || below === 2) { // Empty or water
              newGrid[(y + 1) * COLS + x] = 1;
              newGrid[i] = below === 2 ? 2 : 0;
            } else if (belowL === 0 || belowL === 2) {
              newGrid[(y + 1) * COLS + (x - 1)] = 1;
              newGrid[i] = belowL === 2 ? 2 : 0;
            } else if (belowR === 0 || belowR === 2) {
              newGrid[(y + 1) * COLS + (x + 1)] = 1;
              newGrid[i] = belowR === 2 ? 2 : 0;
            }
          }
          
          // Water falls and spreads
          if (cell === 2) {
            if (below === 0) {
              newGrid[(y + 1) * COLS + x] = 2;
              newGrid[i] = 0;
            } else if (belowL === 0) {
              newGrid[(y + 1) * COLS + (x - 1)] = 2;
              newGrid[i] = 0;
            } else if (belowR === 0) {
              newGrid[(y + 1) * COLS + (x + 1)] = 2;
              newGrid[i] = 0;
            } else {
              // Spread horizontally
              const left = x > 0 ? grid[y * COLS + (x - 1)] : 1;
              const right = x < COLS - 1 ? grid[y * COLS + (x + 1)] : 1;
              if (left === 0 && Math.random() < 0.5) {
                newGrid[y * COLS + (x - 1)] = 2;
                newGrid[i] = 0;
              } else if (right === 0 && Math.random() < 0.5) {
                newGrid[y * COLS + (x + 1)] = 2;
                newGrid[i] = 0;
              }
            }
          }
        }
      }
      
      grid = newGrid;
    }
    
    function render() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, W, H);
      
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const cell = grid[y * COLS + x];
          if (cell > 0) {
            ctx.fillStyle = colors[cell] || '#fff';
            ctx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
          }
        }
      }
    }
    
    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }
    
    loop();
  </script>
</body>
</html>
