<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description" content="Generate QR codes for URLs, text, WiFi, contacts, and more. Free, fast, no tracking">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem;
  }
  h1 {
    text-align: center;
    margin-bottom: 2rem;
  }
  .card {
    background: var(--card-bg, #1e1e2e);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border, #313244);
  }
  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .tab {
    padding: 0.6rem 1rem;
    background: var(--button-bg, #313244);
    border: none;
    border-radius: 8px;
    color: var(--text, #cdd6f4);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .tab-content {
    display: none;
  }
  .tab-content.active {
    display: block;
  }
  label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text-secondary, #a6adc8);
    font-size: 0.9rem;
  }
  input, textarea, select {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--border, #313244);
    border-radius: 8px;
    background: var(--input-bg, #11111b);
    color: var(--text, #cdd6f4);
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
    margin-bottom: 1rem;
  }
  textarea {
    min-height: 80px;
    resize: vertical;
  }
  button.generate-btn {
    width: 100%;
    padding: 0.875rem;
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button.generate-btn:hover {
    opacity: 0.9;
  }
  .result {
    margin-top: 1.5rem;
    text-align: center;
    padding: 1.5rem;
    background: var(--result-bg, #181825);
    border-radius: 12px;
  }
  #qrcode {
    display: inline-block;
    padding: 1rem;
    background: white;
    border-radius: 8px;
  }
  #qrcode canvas {
    display: block;
  }
  .download-btns {
    margin-top: 1rem;
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .download-btn {
    padding: 0.5rem 1rem;
    background: var(--button-bg, #313244);
    color: var(--text, #cdd6f4);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .download-btn:hover {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .error {
    color: #f38ba8;
    margin-top: 0.5rem;
    font-size: 0.9rem;
  }
  .hint {
    color: var(--text-secondary, #a6adc8);
    font-size: 0.8rem;
    margin-top: -0.5rem;
    margin-bottom: 1rem;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>📱 QR Code Generator</h1>
  
  <div class="tabs">
    <button class="tab active" onclick="switchTab('url')">URL</button>
    <button class="tab" onclick="switchTab('text')">Text</button>
    <button class="tab" onclick="switchTab('wifi')">WiFi</button>
    <button class="tab" onclick="switchTab('email')">Email</button>
    <button class="tab" onclick="switchTab('phone')">Phone</button>
  </div>

  <!-- URL Tab -->
  <div class="tab-content active" id="tab-url">
    <div class="card">
      <label>URL</label>
      <input type="url" id="url-input" placeholder="https://example.com">
      <button class="generate-btn" onclick="generateQR('url')">Generate QR Code</button>
    </div>
  </div>

  <!-- Text Tab -->
  <div class="tab-content" id="tab-text">
    <div class="card">
      <label>Text</label>
      <textarea id="text-input" placeholder="Enter any text..."></textarea>
      <button class="generate-btn" onclick="generateQR('text')">Generate QR Code</button>
    </div>
  </div>

  <!-- WiFi Tab -->
  <div class="tab-content" id="tab-wifi">
    <div class="card">
      <label>Network Name (SSID)</label>
      <input type="text" id="wifi-ssid" placeholder="MyWiFi">
      <label>Password</label>
      <input type="text" id="wifi-password" placeholder="Password">
      <label>Encryption</label>
      <select id="wifi-type">
        <option value="WPA">WPA/WPA2</option>
        <option value="WEP">WEP</option>
        <option value="nopass">No Encryption</option>
      </select>
      <button class="generate-btn" onclick="generateQR('wifi')">Generate QR Code</button>
    </div>
  </div>

  <!-- Email Tab -->
  <div class="tab-content" id="tab-email">
    <div class="card">
      <label>Email Address</label>
      <input type="email" id="email-address" placeholder="you@example.com">
      <label>Subject (optional)</label>
      <input type="text" id="email-subject" placeholder="Email subject">
      <label>Body (optional)</label>
      <textarea id="email-body" placeholder="Email body"></textarea>
      <button class="generate-btn" onclick="generateQR('email')">Generate QR Code</button>
    </div>
  </div>

  <!-- Phone Tab -->
  <div class="tab-content" id="tab-phone">
    <div class="card">
      <label>Phone Number</label>
      <input type="tel" id="phone-input" placeholder="+971501234567">
      <button class="generate-btn" onclick="generateQR('phone')">Generate QR Code</button>
    </div>
  </div>

  <div class="result" id="result" style="display:none">
    <div id="qrcode"></div>
    <div class="download-btns">
      <button class="download-btn" onclick="downloadQR('png')">Download PNG</button>
      <button class="download-btn" onclick="downloadQR('svg')">Download SVG</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
  let currentData = '';
  let canvasGenerated = false;

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById('result').style.display = 'none';
  }

  function generateQR(type) {
    let data = '';
    
    switch(type) {
      case 'url':
        data = document.getElementById('url-input').value.trim();
        if (!data) return showError('Please enter a URL');
        if (!data.startsWith('http://') && !data.startsWith('https://')) {
          data = 'https://' + data;
        }
        break;
      case 'text':
        data = document.getElementById('text-input').value;
        if (!data) return showError('Please enter some text');
        break;
      case 'wifi':
        const ssid = document.getElementById('wifi-ssid').value;
        const password = document.getElementById('wifi-password').value;
        const encryption = document.getElementById('wifi-type').value;
        if (!ssid) return showError('Please enter the network name (SSID)');
        data = `WIFI:T:${encryption};S:${escapeWifi(ssid)};P:${escapeWifi(password)};;`;
        break;
      case 'email':
        const email = document.getElementById('email-address').value.trim();
        const subject = document.getElementById('email-subject').value.trim();
        const body = document.getElementById('email-body').value.trim();
        if (!email) return showError('Please enter an email address');
        data = `mailto:${email}`;
        if (subject || body) {
          const params = new URLSearchParams();
          if (subject) params.set('subject', subject);
          if (body) params.set('body', body);
          data += '?' + params.toString();
        }
        break;
      case 'phone':
        data = document.getElementById('phone-input').value.trim();
        if (!data) return showError('Please enter a phone number');
        data = 'tel:' + data;
        break;
    }

    currentData = data;
    const qrContainer = document.getElementById('qrcode');
    qrContainer.innerHTML = '';
    
    QRCode.toCanvas(document.createElement('canvas'), data, {
      width: 250,
      margin: 2,
      color: {
        dark: '#000000',
        light: '#ffffff'
      }
    }, function(err, canvas) {
      if (err) {
        showError('Error generating QR code');
        return;
      }
      qrContainer.appendChild(canvas);
      canvasGenerated = true;
      document.getElementById('result').style.display = 'block';
    });
  }

  function escapeWifi(str) {
    return str.replace(/[\\;,":\n\r]/g, function(m) {
      return '\\' + m;
    });
  }

  function showError(msg) {
    alert(msg);
  }

  function downloadQR(format) {
    if (!currentData || !canvasGenerated) return;
    
    const qrContainer = document.getElementById('qrcode');
    const canvas = qrContainer.querySelector('canvas');
    
    if (format === 'png') {
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } else if (format === 'svg') {
      QRCode.toString(currentData, {
        type: 'svg',
        width: 250,
        margin: 2
      }, function(err, svg) {
        if (err) return;
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const link = document.createElement('a');
        link.download = 'qrcode.svg';
        link.href = URL.createObjectURL(blob);
        link.click();
      });
    }
  }
</script>
</body>
</html>
