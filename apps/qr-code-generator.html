<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description" content="Generate QR codes for text, URLs, or data. Download as PNG. Fast, local, private.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .meta { color: var(--muted); margin-bottom: 2rem; }
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
  textarea, input[type="text"] {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 1rem;
    background: var(--bg);
    color: var(--fg);
    box-sizing: border-box;
  }
  textarea { min-height: 100px; resize: vertical; }
  .options { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .options label { display: flex; align-items: center; gap: 0.5rem; font-weight: normal; }
  button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #result { margin-top: 2rem; text-align: center; }
  #result img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); }
  .download-btn { margin-top: 1rem; display: inline-block; text-decoration: none; }
  .error { color: #e74c3c; margin-top: 1rem; }
  .note { color: var(--muted); font-size: 0.875rem; margin-top: 1rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>QR Code Generator</h1>
  <div class="meta">Generate QR codes locally — no data leaves your browser</div>
  
  <div class="input-group">
    <label for="qr-content">Content (URL, text, or data)</label>
    <textarea id="qr-content" placeholder="Enter text, URL, or any data...">https://shadow-garden.github.io</textarea>
  </div>
  
  <div class="options">
    <label>
      Size:
      <select id="qr-size">
        <option value="128">128px</option>
        <option value="256" selected>256px</option>
        <option value="512">512px</option>
      </select>
    </label>
    <label>
      Error Correction:
      <select id="qr-error">
        <option value="L">Low (7%)</option>
        <option value="M" selected>Medium (15%)</option>
        <option value="Q">Quartile (25%)</option>
        <option value="H">High (30%)</option>
      </select>
    </label>
  </div>
  
  <button id="generate-btn">Generate QR Code</button>
  
  <div id="result"></div>
  <div class="note">All processing happens locally in your browser. Nothing is sent to any server.</div>
</div>

<script>
// Simple QR Code Generator using canvas

const ALIGNMENT_PATTERN = [[], [6, 18], [6, 22], [6, 26], [6, 30], [6, 34], [6, 22, 38], [6, 24, 42], [6, 26, 46], [6, 28, 50], [6, 30, 54], [6, 32, 58], [6, 34, 62], [6, 26, 46, 66], [6, 26, 48, 70], [6, 26, 50, 74], [6, 30, 54, 78], [6, 30, 56, 82], [6, 30, 58, 86], [6, 34, 62, 90], [6, 28, 50, 72, 94], [6, 26, 50, 74, 98], [6, 30, 54, 78, 102], [6, 28, 54, 80, 106], [6, 32, 58, 84, 110], [6, 30, 58, 86, 114], [6, 34, 62, 90, 118], [6, 26, 50, 74, 98, 122], [6, 30, 54, 78, 102, 126], [6, 26, 52, 78, 104, 130], [6, 30, 56, 82, 108, 134], [6, 34, 60, 86, 112, 138], [6, 30, 58, 86, 114, 142], [6, 34, 62, 90, 118, 146], [6, 30, 54, 78, 102, 126, 150], [6, 24, 50, 76, 102, 128, 154], [6, 28, 54, 80, 106, 132, 158], [6, 32, 58, 84, 110, 136, 162], [6, 26, 54, 82, 110, 138, 166], [6, 30, 58, 86, 114, 142, 170]];

const FORMAT_INFO = [
  [0x77C4, 0x72F3, 0x7DCA, 0x7D95, 0x77B5, 0x72E3, 0x7DCF, 0x7D99, 0x77B6, 0x72EE, 0x77FF, 0x72E8, 0x77FE, 0x72F8, 0x77FC],
  [0x5412, 0x5125, 0x5E7C, 0x5B4B, 0x45F9, 0x40CE, 0x4F97, 0x4AA0, 0x77C5, 0x72F4, 0x7DCB, 0x7D96, 0x77B7, 0x72EF, 0x7800],
  [0x77C2, 0x72F1, 0x7DC9, 0x7D93, 0x77B3, 0x72EB, 0x77FD, 0x72F7, 0x77C6, 0x72F5, 0x7DCC, 0x7D97, 0x77B8, 0x72F0, 0x7801],
  [0x77C1, 0x72EF, 0x7DC8, 0x7D92, 0x77B2, 0x72EA, 0x77FC, 0x72F6, 0x77C7, 0x72F4, 0x7DCD, 0x7D98, 0x77B9, 0x72EE, 0x7802]
];

const VERSION_INFO = [0, 0, 0, 0, 0, 0, 0, 0x007FC, 0x007C5, 0x00833, 0x008AD, 0x008BD, 0x009CF, 0x00A45, 0x00A7F, 0x00B32, 0x00B6C];

const ALIGNMENT_INFO = [0, 0x0D7, 0x0EB, 0x0F9, 0x0117, 0x012B, 0x013F, 0x0153, 0x0167, 0x017B, 0x018F];

const ALPHANUMERIC = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:';

const LOG_TABLE = new Array(256);
const EXP_TABLE = new Array(256);

function initTables() {
  let x = 1;
  for (let i = 0; i < 255; i++) {
    EXP_TABLE[i] = x;
    LOG_TABLE[x] = i;
    x = x << 1;
    if (x & 0x100) x ^= 0x11d;
  }
  for (let i = 0; i < 256; i++) {
    EXP_TABLE[255] = EXP_TABLE[0];
    LOG_TABLE[0] = 0;
  }
}

function glog(n) { return LOG_TABLE[n]; }
function gexp(n) { return EXP_TABLE[n % 255]; }

initTables();

function getErrorCorrectionCodewords(data, version, ecLevel) {
  const ecIdx = version * 4 + [0, 0, 1, 3, 2][ecLevel.charCodeAt(0) - 0x4C];
  return EC_CODEWORDS[ecIdx] || 0;
}

function encodeNumeric(str, version) {
  const encoded = [];
  for (let i = 0; i < str.length; i += 3) {
    const chunk = parseInt(str.substring(i, i + 3));
    if (chunk < 10) {
      encoded.push(chunk);
    } else if (chunk < 100) {
      encoded.push(Math.floor(chunk / 10));
      encoded.push(chunk % 10);
    } else {
      encoded.push(Math.floor(chunk / 100));
      encoded.push(Math.floor((chunk % 100) / 10));
      encoded.push(chunk % 10);
    }
  }
  return encoded;
}

function encodeAlphanumeric(str, version) {
  const encoded = [];
  for (let i = 0; i < str.length; i += 2) {
    const a = ALPHANUMERIC.indexOf(str[i]);
    const b = i + 1 < str.length ? ALPHANUMERIC.indexOf(str[i + 1]) : -1;
    if (b >= 0) {
      encoded.push(a * 45 + b);
    } else {
      encoded.push(a);
    }
  }
  return encoded;
}

function encode8Bit(str, version) {
  const encoded = [];
  for (let i = 0; i < str.length; i++) {
    encoded.push(str.charCodeAt(i));
  }
  return encoded;
}

function encodeData(data, ecLevel) {
  let mode = 'numeric';
  if (/^[0-9]*$/.test(data)) mode = 'numeric';
  else if (/^[A-Z0-9 $%*+\-./:]*$/i.test(data)) mode = 'alphanumeric';
  else mode = '8bit';

  const len = data.length;
  let encoded = [];
  
  if (mode === 'numeric') {
    encoded = [0b0001, ...encodeNumeric(data), 0];
  } else if (mode === 'alphanumeric') {
    encoded = [0b0010, ...encodeAlphanumeric(data.toUpperCase()), 0];
  } else {
    encoded = [0b0100, ...encode8Bit(data), 0];
  }

  let version = 1;
  while (true) {
    const capacity = [17, 32, 53, 78, 106, 134, 154, 192, 230, 271, 321, 367, 425, 458, 520, 586, 644, 718, 792, 858, 929, 1003, 1091, 1171, 1273, 1367, 1455, 1541, 1631, 1725, 1812, 1914, 1992, 2097, 2213, 2306, 2434, 2526, 2640, 2732, 2850, 2958, 3085, 3189, 3325, 3435, 3571, 3695, 3823, 3937, 4065, 4181, 4305, 4442, 4563, 4701, 4828, 4963, 5089, 5223, 5351, 5487, 5609, 5764, 5902, 6050][version - 1];
    const dataCodewords = Math.floor(capacity * 8 / 8 - getErrorCorrectionCodewords(null, version, ecLevel));
    if (encoded.length <= dataCodewords) break;
    version++;
    if (version > 40) break;
  }

  let bitString = '';
  for (let b of encoded) {
    bitString += b.toString(2).padStart(8, '0');
  }

  while (bitString.length < dataCodewords * 8) {
    bitString += '0';
    if (bitString.length < dataCodewords * 8) {
      bitString = bitString.slice(0, -4) + (parseInt(bitString.slice(-4), 2) === 0 ? '00010001' : '00010010');
    }
  }

  return { bitString, version, ecLevel };
}

function generateQRMatrix(data, version, ecLevel) {
  const size = version * 4 + 17;
  const matrix = Array(size).fill(null).map(() => Array(size).fill(null));
  const reserved = Array(size).fill(null).map(() => Array(size).fill(false));

  function setFinderPattern(row, col) {
    for (let r = -1; r <= 7; r++) {
      for (let c = -1; c <= 7; c++) {
        if (row + r < 0 || row + r >= size || col + c < 0 || col + c >= size) continue;
        let val = 0;
        if (r === -1 || r === 7 || c === -1 || c === 7) val = 0;
        else if (r === 0 || r === 6 || c === 0 || c === 6) val = 1;
        else if (r >= 2 && r <= 4 && c >= 2 && c <= 4) val = 1;
        else val = 0;
        matrix[row + r][col + c] = val;
        reserved[row + r][col + c] = true;
      }
    }
  }

  setFinderPattern(0, 0);
  setFinderPattern(0, size - 7);
  setFinderPattern(size - 7, 0);

  for (let r = 0; r < 6; r++) {
    for (let c = 8; c < size - 8; c++) {
      matrix[r][c] = ((r + c) % 2 === 0) ? 1 : 0;
      reserved[r][c] = true;
    }
  }
  for (let r = 8; r < size - 8; r++) {
    for (let c = 0; c < 6; c++) {
      matrix[r][c] = ((r + c) % 2 === 0) ? 1 : 0;
      reserved[r][c] = true;
    }
  }
  for (let r = 8; r < size - 8; r++) {
    for (let c = size - 6; c < size; c++) {
      matrix[r][c] = ((r + c) % 2 === 0) ? 1 : 0;
      reserved[r][c] = true;
    }
  }
  for (let r = size - 8; r < size; r++) {
    for (let c = 8; c < size - 8; c++) {
      matrix[r][c] = ((r + c) % 2 === 0) ? 1 : 0;
      reserved[r][c] = true;
    }
  }

  const alignment = ALIGNMENT_PATTERN[version - 2] || [];
  for (let a of alignment) {
    for (let b of alignment) {
      if ((a < 9 && b < 9) || (a < 9 && b > size - 9) || (a > size - 9 && b < 9)) continue;
      for (let r = a - 2; r <= a + 2; r++) {
        for (let c = b - 2; c <= b + 2; c++) {
          if (r >= 0 && r < size && c >= 0 && c < size && !reserved[r][c]) {
            matrix[r][c] = ((r + c) % 2 === 0) ? 1 : 0;
            reserved[r][c] = true;
          }
        }
      }
    }
  }

  for (let i = 0; i < 6; i++) {
    for (let j = 0; j < 6; j++) {
      reserved[i][j] = reserved[i][size - 1 - j] = reserved[size - 1 - i][j] = true;
    }
  }

  let dataBits = data.bitString;
  let bitIdx = 0;
  const direction = -1;
  let col = size - 1;
  let bit = 0;
  
  for (let row = size - 1; row >= 0; row--) {
    if (col === 6) col--;
    if (direction === 1) {
      for (let c = 0; c < size; c++) {
        if (!reserved[row][c]) {
          matrix[row][c] = dataBits[bitIdx++] === '1' ? 1 : 0;
        }
      }
    } else {
      for (let c = size - 1; c >= 0; c--) {
        if (!reserved[row][c]) {
          matrix[row][c] = dataBits[bitIdx++] === '1' ? 1 : 0;
        }
      }
    }
  }

  return { matrix, reserved, size };
}

function addMask(matrix, reserved, size, maskNum) {
  const mask = [
    (r, c) => (r + c) % 2 === 0,
    (r, c) => r % 2 === 0,
    (r, c) => c % 3 === 0,
    (r, c) => (r + c) % 3 === 0,
    (r, c) => (Math.floor(r / 2) + Math.floor(c / 3)) % 2 === 0,
    (r, c) => ((r * c) % 2) + ((r * c) % 3) === 0,
    (r, c) => (((r * c) % 2) + ((r * c) % 3)) % 2 === 0,
    (r, c) => (((r + c) % 2) + ((r * c) % 3)) % 2 === 0
  ];

  const maskFunc = mask[maskNum];
  const masked = matrix.map(row => [...row]);
  
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (!reserved[r][c] && maskFunc(r, c)) {
        masked[r][c] = 1 - masked[r][c];
      }
    }
  }
  
  return masked;
}

function calculatePenalty(matrix, size) {
  let penalty = 0;
  
  for (let r = 0; r < size; r++) {
    let count = 0;
    for (let c = 0; c < size; c++) {
      if (matrix[r][c] === 1) count++;
      else {
        if (count >= 5) penalty += count - 2;
        count = 0;
      }
    }
    if (count >= 5) penalty += count - 2;
  }
  
  for (let c = 0; c < size; c++) {
    let count = 0;
    for (let r = 0; r < size; r++) {
      if (matrix[r][c] === 1) count++;
      else {
        if (count >= 5) penalty += count - 2;
        count = 0;
      }
    }
    if (count >= 5) penalty += count - 2;
  }
  
  for (let r = 0; r < size - 6; r++) {
    for (let c = 0; c < size - 6; c++) {
      if (matrix[r][c] && matrix[r + 1][c + 1] && matrix[r + 2][c + 2] && 
          matrix[r + 3][c + 3] && matrix[r + 4][c + 4] && matrix[r + 5][c + 5] && matrix[r + 6][c + 6]) {
        if (r + 7 >= size || !matrix[r + 7][c + 7] || c - 1 < 0 || !matrix[r + 1][c - 1]) penalty += 3;
      }
    }
  }
  
  for (let r = 0; r < size - 6; r++) {
    for (let c = 0; c < size - 6; c++) {
      if (matrix[r][c] === 0 && matrix[r + 1][c] === 1 && matrix[r + 2][c] === 0 && 
          matrix[r + 3][c] === 0 && matrix[r + 4][c] === 1 && matrix[r + 5][c] === 0 &&
          (r < 1 || matrix[r - 1][c] !== 0 || c - 1 < 0 || matrix[r][c - 1] !== 0 ||
           r + 6 >= size || matrix[r + 6][c] !== 0 || c - 1 < 0 || matrix[r][c - 1] !== 0)) {
        penalty += 3;
      }
    }
  }
  
  const totalModules = size * size;
  const darkModules = matrix.flat().filter(m => m === 1).length;
  const percent = darkModules / totalModules * 100;
  const prev = Math.floor(percent / 5) * 5;
  const next = prev + 5;
  penalty += Math.min(Math.abs(percent - prev) / 5, Math.abs(percent - next) / 5) * 10;
  
  return penalty;
}

function addFormatInfo(matrix, size, ecLevel, maskNum) {
  const formatBits = FORMAT_INFO[0][maskNum];
  const formatString = formatBits.toString(2).padStart(15, '0');
  
  const positions = [];
  for (let i = 0; i < 6; i++) {
    positions.push([i, 8]);
    positions.push([8, i]);
  }
  positions.push([7, 8], [8, 7], [8, size - 8], [size - 8, 8]);
  
  for (let i = 0; i < 15; i++) {
    const [r, c] = positions[i];
    matrix[r][c] = formatString[i] === '1' ? 1 : 0;
    if (r < 8 && c < 8) matrix[c][r] = matrix[r][c];
  }
}

function addVersionInfo(matrix, size, version) {
  if (version < 7) return;
  
  const versionInfo = VERSION_INFO[version - 7].toString(2).padStart(18, '0');
  
  for (let i = 0; i < 18; i++) {
    const r = Math.floor(i / 3);
    const c = i % 3;
    const val = versionInfo[i] === '1' ? 1 : 0;
    matrix[size - 11 + r][c] = val;
    matrix[c][size - 11 + r] = val;
  }
}

function generateQR(dataText, size, ecLevel) {
  try {
    const data = encodeData(dataText, ecLevel);
    const { matrix, reserved, size: qrSize } = generateQRMatrix(data, data.version, ecLevel);
    
    let bestMask = 0;
    let bestPenalty = Infinity;
    
    for (let m = 0; m < 8; m++) {
      const masked = addMask(matrix, reserved, qrSize, m);
      const penalty = calculatePenalty(masked, qrSize);
      if (penalty < bestPenalty) {
        bestPenalty = penalty;
        bestMask = m;
      }
    }
    
    const final = addMask(matrix, reserved, qrSize, bestMask);
    addFormatInfo(final, qrSize, ecLevel, bestMask);
    addVersionInfo(final, qrSize, data.version);
    
    return final;
  } catch (e) {
    console.error(e);
    return null;
  }
}

function renderQR(matrix, size) {
  if (!matrix) return null;
  
  const qrSize = matrix.length;
  const moduleSize = Math.floor(size / qrSize);
  const actualSize = moduleSize * qrSize;
  
  const canvas = document.createElement('canvas');
  canvas.width = actualSize;
  canvas.height = actualSize;
  const ctx = canvas.getContext('2d');
  
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, actualSize, actualSize);
  
  ctx.fillStyle = '#000000';
  for (let r = 0; r < qrSize; r++) {
    for (let c = 0; c < qrSize; c++) {
      if (matrix[r][c] === 1) {
        ctx.fillRect(c * moduleSize, r * moduleSize, moduleSize, moduleSize);
      }
    }
  }
  
  return canvas.toDataURL('image/png');
}

document.getElementById('generate-btn').addEventListener('click', () => {
  const content = document.getElementById('qr-content').value;
  const size = parseInt(document.getElementById('qr-size').value);
  const errorLevel = document.getElementById('qr-error').value;
  const resultDiv = document.getElementById('result');
  
  if (!content.trim()) {
    resultDiv.innerHTML = '<p class="error">Please enter some content</p>';
    return;
  }
  
  const matrix = generateQR(content, size, errorLevel);
  if (!matrix) {
    resultDiv.innerHTML = '<p class="error">Failed to generate QR code. Try using less data.</p>';
    return;
  }
  
  const dataUrl = renderQR(matrix, size);
  resultDiv.innerHTML = `<img src="${dataUrl}" alt="QR Code"><br><a href="${dataUrl}" download="qrcode.png" class="download-btn"><button>Download PNG</button></a>`;
});
</script>
