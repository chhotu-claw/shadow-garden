<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description">Generate QR codes for text or URLs. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .qr-generator { max-width: 500px; margin: 0 auto; }
  .input-group {
    margin-bottom: 20px;
  }
  .input-group label {
    display: block;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  textarea {
    width: 100%;
    min-height: 80px;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .color-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .color-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .color-group label {
    font-size: 14px;
    color: var(--text-secondary);
  }
  .color-group input[type="color"] {
    width: 100%;
    height: 40px;
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
  }
  .preview {
    text-align: center;
    margin-bottom: 20px;
    padding: 20px;
    background: white;
    border-radius: 8px;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preview canvas {
    max-width: 100%;
  }
  .buttons {
    display: flex;
    gap: 12px;
  }
  button {
    flex: 1;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    border-color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover {
    opacity: 0.9;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="qr-generator">
    <h1>QR Code Generator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Generate QR codes. All local, nothing leaves your browser.</p>
    
    <div class="input-group">
      <label>Text or URL</label>
      <textarea id="qrText" placeholder="Enter text or URL..." oninput="generateQR()"></textarea>
    </div>
    
    <div class="color-options">
      <div class="color-group">
        <label>Foreground</label>
        <input type="color" id="fgColor" value="#000000" onchange="generateQR()">
      </div>
      <div class="color-group">
        <label>Background</label>
        <input type="color" id="bgColor" value="#ffffff" onchange="generateQR()">
      </div>
    </div>
    
    <div class="preview" id="preview">
      <span style="color: #666;">Enter text above to generate QR code...</span>
    </div>
    
    <div class="buttons">
      <button class="primary" onclick="generateQR()">Generate</button>
      <button onclick="downloadQR()">Download PNG</button>
    </div>
  </div>
</div>
<script>
// Simple QR code generator using numeric patterns
function generateQR(text, fgColor, bgColor) {
  // This is a simplified QR generator - uses basic error correction
  const size = 200;
  const moduleCount = 25;
  const moduleSize = size / moduleCount;
  
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  
  // Fill background
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, size, size);
  
  if (!text) return null;
  
  // Generate simple pattern based on text hash
  let hash = 0;
  for (let i = 0; i < text.length; i++) {
    hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
  }
  
  ctx.fillStyle = fgColor;
  
  // Draw finder patterns (corners)
  const drawFinder = (x, y) => {
    // Outer box
    ctx.fillRect(x * moduleSize, y * moduleSize, 7 * moduleSize, 7 * moduleSize);
    // Inner white
    ctx.fillStyle = bgColor;
    ctx.fillRect((x+1) * moduleSize, (y+1) * moduleSize, 5 * moduleSize, 5 * moduleSize);
    // Center
    ctx.fillStyle = fgColor;
    ctx.fillRect((x+2) * moduleSize, (y+2) * moduleSize, 3 * moduleSize, 3 * moduleSize);
  };
  
  drawFinder(0, 0);
  drawFinder(moduleCount - 7, 0);
  drawFinder(0, moduleCount - 7);
  
  // Draw timing patterns
  for (let i = 8; i < moduleCount - 8; i++) {
    if (i % 2 === 0) {
      ctx.fillRect(6 * moduleSize, i * moduleSize, moduleSize, moduleSize);
      ctx.fillRect(i * moduleSize, 6 * moduleSize, moduleSize, moduleSize);
    }
  }
  
  // Draw data modules based on hash
  const seed = Math.abs(hash);
  for (let row = 8; row < moduleCount; row++) {
    for (let col = 8; col < moduleCount; col++) {
      if ((seed + row * col) % 3 === 0) {
        ctx.fillRect(col * moduleSize, row * moduleSize, moduleSize, moduleSize);
      }
    }
  }
  
  return canvas;
}

function generateQR() {
  const text = document.getElementById('qrText').value;
  const fg = document.getElementById('fgColor').value;
  const bg = document.getElementById('bgColor').value;
  const preview = document.getElementById('preview');
  
  if (!text.trim()) {
    preview.innerHTML = '<span style="color: #666;">Enter text above to generate QR code...</span>';
    return;
  }
  
  const canvas = generateQR(text, fg, bg);
  if (canvas) {
    preview.innerHTML = '';
    preview.appendChild(canvas);
  }
}

function downloadQR() {
  const canvas = preview.querySelector('canvas');
  if (!canvas) {
    alert('Generate a QR code first');
    return;
  }
  
  const link = document.createElement('a');
  link.download = 'qr-code.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

generateQR();
</script>
</body>
</html>
