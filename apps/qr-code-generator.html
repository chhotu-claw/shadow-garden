<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description" content="Generate QR codes instantly — enter text or URL, customize size and colors">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --accent: #000; }
  body { background: #fafafa; }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; text-align: center; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
  
  .input-group { margin-bottom: 1.5rem; text-align: left; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.85rem; color: #444; }
  
  #content { width: 100%; padding: 0.75rem; font-size: 1rem; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
  #content:focus { outline: none; border-color: #333; }
  
  .options { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .option { flex: 1; min-width: 120px; }
  .option label { font-weight: 500; font-size: 0.8rem; }
  .option select, .option input { width: 100%; padding: 0.5rem; font-size: 0.9rem; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; }
  
  .btn { padding: 0.75rem 1.5rem; background: #222; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
  .btn:hover { background: #444; }
  .btn:active { transform: scale(0.98); }
  
  #output { margin-top: 2rem; display: none; }
  #output.show { display: block; }
  #qrcode { display: inline-block; padding: 1rem; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  #qrcode canvas { display: block; }
  
  .actions { margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center; }
  .btn-small { padding: 0.5rem 1rem; background: #eee; color: #333; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .btn-small:hover { background: #ddd; }
  
  .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .preset-btn { padding: 0.35rem 0.7rem; background: #eee; border: none; border-radius: 4px; font-size: 0.75rem; cursor: pointer; }
  .preset-btn:hover { background: #ddd; }
  
  .error { color: #d00; margin-top: 0.5rem; display: none; }
  .error.show { display: block; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>QR Code Generator</h1>
    <p class="subtitle">Generate QR codes instantly — no signup, no tracking</p>
    
    <div class="input-group">
      <label>Content</label>
      <div class="presets">
        <button class="preset-btn" data-content="https://example.com">URL</button>
        <button class="preset-btn" data-content="Hello, World!">Text</button>
        <button class="preset-btn" data-content="WIFI:T WPA;S:MyNetwork;P:password;;">WiFi</button>
        <button class="preset-btn" data-content="BEGIN:VCARD\nFN:John Doe\nTEL:1234567890\nEMAIL:john@example.com\nEND:VCARD">vCard</button>
      </div>
      <input type="text" id="content" placeholder="Enter text or URL..." autocomplete="off">
      <div class="error" id="error">Please enter some content</div>
    </div>
    
    <div class="options">
      <div class="option">
        <label>Size</label>
        <select id="size">
          <option value="128">128px</option>
          <option value="256" selected>256px</option>
          <option value="384">384px</option>
          <option value="512">512px</option>
        </select>
      </div>
      <div class="option">
        <label>Foreground</label>
        <input type="color" id="fgColor" value="#000000">
      </div>
      <div class="option">
        <label>Background</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
    </div>
    
    <button class="btn" id="generate">Generate QR Code</button>
    
    <div id="output">
      <div id="qrcode"></div>
      <div class="actions">
        <button class="btn-small" id="download">Download PNG</button>
        <button class="btn-small" id="copy">Copy as Image</button>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    const contentInput = document.getElementById('content');
    const sizeSelect = document.getElementById('size');
    const fgColorInput = document.getElementById('fgColor');
    const bgColorInput = document.getElementById('bgColor');
    const generateBtn = document.getElementById('generate');
    const output = document.getElementById('output');
    const qrcodeDiv = document.getElementById('qrcode');
    const errorDiv = document.getElementById('error');
    const downloadBtn = document.getElementById('download');
    const copyBtn = document.getElementById('copy');
    
    let currentCanvas = null;
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        contentInput.value = btn.dataset.content;
      });
    });
    
    generateBtn.addEventListener('click', generate);
    contentInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') generate();
    });
    
    function generate() {
      const content = contentInput.value.trim();
      if (!content) {
        errorDiv.classList.add('show');
        return;
      }
      errorDiv.classList.remove('show');
      
      const size = parseInt(sizeSelect.value);
      const color = {
        dark: fgColorInput.value,
        light: bgColorInput.value
      };
      
      qrcodeDiv.innerHTML = '';
      
      QRCode.toCanvas(content, {
        width: size,
        margin: 2,
        color: color,
        errorCorrectionLevel: 'M'
      }, (err, canvas) => {
        if (err) {
          errorDiv.textContent = 'Error generating QR code';
          errorDiv.classList.add('show');
          return;
        }
        currentCanvas = canvas;
        qrcodeDiv.appendChild(canvas);
        output.classList.add('show');
      });
    }
    
    downloadBtn.addEventListener('click', () => {
      if (!currentCanvas) return;
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = currentCanvas.toDataURL('image/png');
      link.click();
    });
    
    copyBtn.addEventListener('click', async () => {
      if (!currentCanvas) return;
      try {
        const blob = await new Promise(resolve => currentCanvas.toBlob(resolve, 'image/png'));
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy as Image', 2000);
      } catch (err) {
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => copyBtn.textContent = 'Copy as Image', 2000);
      }
    });
    
    // Generate default
    generate();
  </script>
</body>
</html>
