<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description" content="Generate QR codes for text, URLs, WiFi, and more. Fast, client-side, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
    --success: #22c55e;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    margin-bottom: 0.5rem;
    font-size: 1.75rem;
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.875rem;
  }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
  }

  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    background: var(--card);
    padding: 0.5rem;
    border-radius: 8px;
  }

  .tab {
    flex: 1;
    padding: 0.75rem;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.875rem;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--primary);
    color: white;
  }

  .tab:hover:not(.active) {
    background: var(--border);
  }

  .form-group {
    margin-bottom: 1rem;
  }

  label {
    display: block;
    margin-bottom: 0.5rem;
    font-size: 0.875rem;
    color: var(--text-muted);
  }

  input, textarea, select {
    width: 100%;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    box-sizing: border-box;
  }

  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--primary);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .row {
    display: flex;
    gap: 0.75rem;
  }

  .row .form-group {
    flex: 1;
  }

  .btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover {
    background: var(--primary-hover);
  }

  .btn-secondary {
    background: var(--border);
    color: var(--text);
  }

  .btn-secondary:hover {
    background: #475569;
  }

  .result {
    text-align: center;
    padding: 1.5rem 0;
  }

  #qr-canvas {
    display: inline-block;
    background: white;
    border-radius: 8px;
    padding: 1rem;
  }

  .download-btns {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 1rem;
  }

  .download-btns .btn {
    width: auto;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
  }

  .history {
    margin-top: 1rem;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem;
    background: var(--bg);
    border-radius: 8px;
    margin-bottom: 0.5rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .history-item:hover {
    background: var(--border);
  }

  .history-item .type {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-right: 0.5rem;
  }

  .history-item .preview {
    flex: 1;
    font-size: 0.875rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-item .del {
    background: none;
    border: none;
    color: #ef4444;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
    font-size: 1rem;
  }

  .hidden { display: none; }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 0.875rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
  }

  .info-text {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>⬜ QR Code Generator</h1>
    <p class="subtitle">Fast, client-side, no tracking.</p>

    <div class="tabs">
      <button class="tab active" data-tab="text">Text/URL</button>
      <button class="tab" data-tab="wifi">WiFi</button>
      <button class="tab" data-tab="email">Email</button>
      <button class="tab" data-tab="history">History</button>
    </div>

    <!-- Text/URL -->
    <div id="text-tab">
      <div class="card">
        <div class="form-group">
          <label>Content</label>
          <textarea id="text-content" placeholder="Enter text or URL..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="generateQR('text')">Generate QR Code</button>
      </div>
    </div>

    <!-- WiFi -->
    <div id="wifi-tab" class="hidden">
      <div class="card">
        <div class="form-group">
          <label>Network Name (SSID)</label>
          <input type="text" id="wifi-ssid" placeholder="MyNetwork">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="text" id="wifi-password" placeholder="Optional">
        </div>
        <div class="form-group">
          <label>Encryption</label>
          <select id="wifi-type">
            <option value="WPA">WPA/WPA2</option>
            <option value="WEP">WEP</option>
            <option value="nopass">None</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="generateQR('wifi')">Generate QR Code</button>
      </div>
    </div>

    <!-- Email -->
    <div id="email-tab" class="hidden">
      <div class="card">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email-to" placeholder="@example.com">
        </div>
        <div class="row">
          <div class="form-group">
            <label>Subject</label>
            <input type="text" id="email-subject" placeholder="Optional">
          </div>
        </div>
        <div class="form-group">
          <label>Body</label>
          <textarea id="email-body" placeholder="Optional message..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="generateQR('email')">Generate QR Code</button>
      </div>
    </div>

    <!-- History -->
    <div id="history-tab" class="hidden">
      <div class="card">
        <div id="history-list"></div>
        <p id="no-history" class="info-text" style="text-align: center; margin: 1rem 0;">No history yet</p>
      </div>
    </div>

    <!-- Result -->
    <div id="result-card" class="card hidden">
      <div class="result">
        <canvas id="qr-canvas"></canvas>
        <div class="download-btns">
          <button class="btn btn-secondary" onclick="downloadQR('png')">PNG</button>
          <button class="btn btn-secondary" onclick="downloadQR('svg')">SVG</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Copied!</div>

  <script>
    const HISTORY_KEY = 'qrcode_history';
    const MAX_HISTORY = 20;

    // QR Code library (minimal implementation)
    const QRCode = {
      generate: function(text, options) {
        options = options || {};
        const ecLevel = options.ecLevel || 'M';
        const moduleSize = options.moduleSize || 2;
        
        // Use qrcode-generator library from CDN
        return new Promise((resolve, reject) => {
          if (typeof qrcode !== 'undefined') {
            const qr = qrcode(0, ecLevel);
            qr.addData(text);
            qr.make();
            resolve({ qr, moduleSize });
          } else {
            // Load library dynamically
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';
            script.onload = () => {
              const qr = qrcode(0, ecLevel);
              qr.addData(text);
              qr.make();
              resolve({ qr, moduleSize });
            };
            script.onerror = reject;
            document.head.appendChild(script);
          }
        });
      }
    };

    let currentData = '';

    async function generateQR(type) {
      let data = '';
      
      if (type === 'text') {
        data = document.getElementById('text-content').value.trim();
        if (!data) return showToast('Please enter some text or URL');
      } else if (type === 'wifi') {
        const ssid = document.getElementById('wifi-ssid').value.trim();
        if (!ssid) return showToast('Please enter network name');
        const password = document.getElementById('wifi-password').value;
        const encryption = document.getElementById('wifi-type').value;
        data = `WIFI:T:${encryption};S:${escapeWifi(ssid)};P:${escapeWifi(password)};;`;
      } else if (type === 'email') {
        const to = document.getElementById('email-to').value.trim();
        if (!to) return showToast('Please enter email address');
        const subject = document.getElementById('email-subject').value;
        const body = document.getElementById('email-body').value;
        data = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      }

      currentData = data;

      try {
        const { qr, moduleSize } = await QRCode.generate(data);
        const canvas = document.getElementById('qr-canvas');
        const ctx = canvas.getContext('2d');
        
        const count = qr.getModuleCount();
        const size = count * moduleSize;
        canvas.width = size;
        canvas.height = size;

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = '#000000';

        for (let row = 0; row < count; row++) {
          for (let col = 0; col < count; col++) {
            if (qr.isDark(row, col)) {
              ctx.fillRect(col * moduleSize, row * moduleSize, moduleSize, moduleSize);
            }
          }
        }

        document.getElementById('result-card').classList.remove('hidden');
        
        // Save to history
        addToHistory(type, data);
      } catch (e) {
        showToast('Error generating QR code');
        console.error(e);
      }
    }

    function escapeWifi(str) {
      return str.replace(/[\\:;]/g, '\\$&');
    }

    function downloadQR(format) {
      if (format === 'png') {
        const link = document.createElement('a');
        link.download = 'qrcode.png';
        link.href = document.getElementById('qr-canvas').toDataURL('image/png');
        link.click();
      } else if (format === 'svg') {
        // Generate SVG
        const canvas = document.getElementById('qr-canvas');
        const ctx = canvas.getContext('2d');
        const size = canvas.width;
        const moduleSize = size / canvas.width; // Actually count
        
        // Get QR data again
        QRCode.generate(currentData).then(({ qr, moduleSize: ms }) => {
          const count = qr.getModuleCount();
          let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${count} ${count}">`;
          svg += `<rect width="${count}" height="${count}" fill="white"/>`;
          
          for (let row = 0; row < count; row++) {
            for (let col = 0; col < count; col++) {
              if (qr.isDark(row, col)) {
                svg += `<rect x="${col}" y="${row}" width="1" height="1" fill="black"/>`;
              }
            }
          }
          svg += '</svg>';

          const blob = new Blob([svg], { type: 'image/svg+xml' });
          const link = document.createElement('a');
          link.download = 'qrcode.svg';
          link.href = URL.createObjectURL(blob);
          link.click();
        });
      }
    }

    function addToHistory(type, data) {
      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      const entry = { type, data, time: Date.now() };
      
      // Don't duplicate
      const existing = history.findIndex(h => h.data === data);
      if (existing >= 0) history.splice(existing, 1);
      
      history.unshift(entry);
      if (history.length > MAX_HISTORY) history.pop();
      
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      const list = document.getElementById('history-list');
      const empty = document.getElementById('no-history');
      
      if (history.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = history.map((h, i) => `
        <div class="history-item" onclick="loadHistory(${i})">
          <span class="type">${h.type}</span>
          <span class="preview">${h.data.substring(0, 40)}${h.data.length > 40 ? '...' : ''}</span>
          <button class="del" onclick="event.stopPropagation(); deleteHistory(${i})">×</button>
        </div>
      `).join('');
    }

    function loadHistory(i) {
      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      const entry = history[i];
      
      if (entry.type === 'text') {
        document.getElementById('text-content').value = entry.data;
        switchTab('text');
      } else if (entry.type === 'wifi') {
        // Parse WIFI string
        const match = entry.data.match(/WIFI:T:([^;]*);S:([^;]*);P:([^;]*);;/);
        if (match) {
          document.getElementById('wifi-type').value = match[1];
          document.getElementById('wifi-ssid').value = match[2];
          document.getElementById('wifi-password').value = match[3];
        }
        switchTab('wifi');
      } else if (entry.type === 'email') {
        const url = new URL(entry.data);
        document.getElementById('email-to').value = url.pathname.substring(1);
        document.getElementById('email-subject').value = url.searchParams.get('subject') || '';
        document.getElementById('email-body').value = url.searchParams.get('body') || '';
        switchTab('email');
      }
      
      generateQR(entry.type);
    }

    function deleteHistory(i) {
      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      history.splice(i, 1);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      renderHistory();
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      document.querySelectorAll('[id$="-tab"]').forEach(t => {
        t.classList.toggle('hidden', t.id !== tab + '-tab');
      });
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Initial history render
    renderHistory();
  </script>
</body>
</html>
