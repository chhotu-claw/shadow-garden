<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description" content="Generate QR codes instantly — paste text or URL, get QR code. All client-side.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { max-width: 500px; width: 100%; }
  h1 { text-align: center; margin-bottom: 0.5rem; }
  .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2rem; }
  textarea {
    width: 100%; min-height: 100px; padding: 1rem; border: 2px solid var(--border);
    border-radius: 8px; font-size: 1rem; font-family: inherit; resize: vertical;
    background: var(--bg); color: var(--text);
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .controls { display: flex; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }
  select, button {
    padding: 0.75rem 1.5rem; border: 2px solid var(--border); border-radius: 8px;
    font-size: 1rem; cursor: pointer; background: var(--bg); color: var(--text);
  }
  button { background: var(--accent); color: white; border-color: var(--accent); font-weight: 600; }
  button:hover { opacity: 0.9; }
  #qrcode {
    margin: 2rem auto; padding: 1rem; background: white; border-radius: 8px;
    display: none; max-width: 100%; width: fit-content;
  }
  #qrcode.show { display: block; }
  #qrcode canvas { display: block; }
  .download-btn { display: none; margin: 1rem auto; }
  .download-btn.show { display: block; }
  .error { color: #e74c3c; text-align: center; margin: 1rem 0; display: none; }
  .error.show { display: block; }
  .char-count { text-align: right; color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>QR Code Generator</h1>
  <p class="subtitle">Generate QR codes instantly. Everything stays on your device.</p>
  
  <textarea id="input" placeholder="Paste text or URL here..."></textarea>
  <div class="char-count"><span id="count">0</span> characters</div>
  
  <div class="controls">
    <select id="size">
      <option value="128">128×128</option>
      <option value="256" selected>256×256</option>
      <option value="384">384×384</option>
      <option value="512">512×512</option>
    </select>
    <button id="generate">Generate QR</button>
  </div>
  
  <div id="qrcode"></div>
  <button class="download-btn" id="download">Download PNG</button>
  <p class="error" id="error"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
  const input = document.getElementById('input');
  const count = document.getElementById('count');
  const size = document.getElementById('size');
  const generate = document.getElementById('generate');
  const qrcode = document.getElementById('qrcode');
  const download = document.getElementById('download');
  const error = document.getElementById('error');
  
  input.addEventListener('input', () => {
    count.textContent = input.value.length;
    qrcode.classList.remove('show');
    download.classList.remove('show');
    error.classList.remove('show');
  });
  
  generate.addEventListener('click', async () => {
    const text = input.value.trim();
    if (!text) {
      error.textContent = 'Please enter some text or a URL';
      error.classList.add('show');
      return;
    }
    
    error.classList.remove('show');
    qrcode.innerHTML = '';
    
    try {
      const canvas = document.createElement('canvas');
      await QRCode.toCanvas(canvas, text, {
        width: parseInt(size.value),
        margin: 2,
        color: { dark: '#000000', light: '#ffffff' }
      });
      qrcode.appendChild(canvas);
      qrcode.classList.add('show');
      download.classList.add('show');
    } catch (e) {
      error.textContent = 'Error generating QR code: ' + e.message;
      error.classList.add('show');
    }
  });
  
  download.addEventListener('click', () => {
    const canvas = qrcode.querySelector('canvas');
    if (canvas) {
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  });
  
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.ctrlKey) {
      generate.click();
    }
  });
</script>
</body>
</html>
