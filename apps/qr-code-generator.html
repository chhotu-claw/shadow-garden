<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description" content="Generate QR codes instantly — paste a URL or text, get a QR code you can save or scan.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 2rem; max-width: 600px; margin: 0 auto; }
  .container { text-align: center; }
  textarea {
    width: 100%; height: 100px; padding: 1rem;
    border: 1px solid #333; border-radius: 8px;
    background: #1a1a1a; color: #e5e5e5;
    font-size: 1rem; resize: vertical;
    box-sizing: border-box;
  }
  button {
    margin-top: 1rem; padding: 0.75rem 2rem;
    background: #6cb6ff; color: #0d0d0d;
    border: none; border-radius: 6px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
  }
  button:hover { background: #8dc5ff; }
  #qr-output { margin-top: 2rem; }
  #qr-output canvas { max-width: 100%; }
  .download-link {
    display: inline-block; margin-top: 1rem; color: #6cb6ff;
  }
  .error { color: #f77; margin-top: 1rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>QR Code Generator</h1>
  <p style="color:#888;margin-bottom:1.5rem;">Enter text or a URL to generate a QR code</p>
  
  <textarea id="input" placeholder="https://example.com or any text..."></textarea>
  <button id="generate">Generate QR Code</button>
  
  <div id="qr-output"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
  const input = document.getElementById('input');
  const generateBtn = document.getElementById('generate');
  const output = document.getElementById('qr-output');

  function generate() {
    const text = input.value.trim();
    if (!text) {
      output.innerHTML = '<p class="error">Please enter some text</p>';
      return;
    }
    
    output.innerHTML = '';
    const canvas = document.createElement('canvas');
    QRCode.toCanvas(canvas, text, { 
      width: 256,
      margin: 2,
      color: { dark: '#e5e5e5', light: '#1a1a1a' }
    }, (err) => {
      if (err) {
        output.innerHTML = '<p class="error">Error generating QR code</p>';
        return;
      }
      output.appendChild(canvas);
      
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'qrcode.png';
      link.className = 'download-link';
      link.textContent = '⬇ Download PNG';
      output.appendChild(link);
    });
  }

  generateBtn.addEventListener('click', generate);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.ctrlKey) generate();
  });
  input.focus();
</script>
</body>
</html>
