<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description" content="Generate QR codes instantly. No accounts, no cloud, no nonsense. Type, generate, download.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .app { max-width: 600px; margin: 0 auto; padding: 2rem; }
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
  textarea, input[type="text"] {
    width: 100%; padding: 0.75rem; font-size: 1rem; border: 2px solid var(--border); border-radius: 8px;
    background: var(--bg-alt); color: var(--text); font-family: inherit;
  }
  textarea { min-height: 100px; resize: vertical; }
  .options { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .option { display: flex; align-items: center; gap: 0.5rem; }
  select {
    padding: 0.5rem 1rem; font-size: 1rem; border: 2px solid var(--border); border-radius: 8px;
    background: var(--bg-alt); color: var(--text);
  }
  .btn-row { display: flex; gap: 1rem; flex-wrap: wrap; }
  button {
    padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 600; border: none; border-radius: 8px;
    cursor: pointer; transition: transform 0.1s;
  }
  button:hover { transform: scale(1.02); }
  button:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-secondary { background: var(--border); color: var(--text); }
  #output { margin-top: 2rem; text-align: center; }
  #output canvas { max-width: 100%; border-radius: 8px; }
  .download-btn { margin-top: 1rem; }
  .error { color: #e74c3c; margin-top: 1rem; }
</style>
</head>
<body data-page-type="app">
<div class="app">
  <h1>QR Code Generator</h1>
  <div class="input-group">
    <label for="text">Content</label>
    <textarea id="text" placeholder="Enter URL, text, phone number, or any content..."></textarea>
  </div>
  <div class="options">
    <div class="option">
      <label for="size">Size:</label>
      <select id="size">
        <option value="128">128px</option>
        <option value="256">256px</option>
        <option value="512" selected>512px</option>
      </select>
    </div>
    <div class="option">
      <label for="level">Error Correction:</label>
      <select id="level">
        <option value="L">Low (7%)</option>
        <option value="M" selected>Medium (15%)</option>
        <option value="Q">Quartile (25%)</option>
        <option value="H">High (30%)</option>
      </select>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-primary" onclick="generate()">Generate QR Code</button>
    <button class="btn-secondary" onclick="clearOutput()">Clear</button>
  </div>
  <div id="output"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
  const textEl = document.getElementById('text');
  const sizeEl = document.getElementById('size');
  const levelEl = document.getElementById('level');
  const outputEl = document.getElementById('output');
  
  function generate() {
    const text = textEl.value.trim();
    if (!text) {
      outputEl.innerHTML = '<p class="error">Enter some content to generate a QR code.</p>';
      return;
    }
    const size = parseInt(sizeEl.value);
    const errorLevel = levelEl.value;
    
    outputEl.innerHTML = '<canvas id="qr-canvas"></canvas>';
    const canvas = document.getElementById('qr-canvas');
    
    QRCode.toCanvas(canvas, text, {
      width: size,
      margin: 2,
      errorCorrectionLevel: errorLevel,
      color: {
        dark: '#000000',
        light: '#ffffff'
      }
    }, function(error) {
      if (error) {
        outputEl.innerHTML = '<p class="error">Error: ' + error.message + '</p>';
        return;
      }
      // Add download button
      const btn = document.createElement('button');
      btn.className = 'btn-secondary download-btn';
      btn.textContent = 'Download PNG';
      btn.onclick = () => downloadPNG(canvas);
      outputEl.appendChild(btn);
    });
  }
  
  function downloadPNG(canvas) {
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
  
  function clearOutput() {
    textEl.value = '';
    outputEl.innerHTML = '';
  }
</script>
</body>
</html>
