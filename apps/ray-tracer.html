<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ray Tracer — Shadow's Garden</title>
<meta name="description" content="Real-time ray tracer with spheres, reflections, shadows, and multiple light sources"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    color: #ccc;
    font-size: 13px;
    z-index: 100;
  }
  #controls h3 { margin: 0 0 12px 0; color: #fff; font-size: 14px; }
  .control-row { margin-bottom: 10px; }
  .control-row label { display: block; margin-bottom: 4px; color: #888; }
  .control-row input[type="range"] { width: 140px; }
  .control-row span { float: right; color: #4af; }
  button {
    background: #2a4a6a;
    border: none;
    color: #fff;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 6px;
    margin-top: 8px;
    font-size: 12px;
  }
  button:hover { background: #3a5a7a; }
  .preset-btns { margin-top: 12px; }
  #fps {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #556;
    font-size: 11px;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>Ray Tracer</h3>
    <div class="control-row">
      <label>Samples <span id="samplesVal">4</span></label>
      <input type="range" id="samples" min="1" max="16" value="4">
    </div>
    <div class="control-row">
      <label>Bounces <span id="bouncesVal">2</span></label>
      <input type="range" id="bounces" min="0" max="4" value="2">
    </div>
    <div class="control-row">
      <label>FOV <span id="fovVal">60</span></label>
      <input type="range" id="fov" min="30" max="120" value="60">
    </div>
    <div class="control-row">
      <label>Light X <span id="lightXVal">5</span></label>
      <input type="range" id="lightX" min="-10" max="10" step="0.5" value="5">
    </div>
    <div class="control-row">
      <label>Light Y <span id="lightYVal">8</span></label>
      <input type="range" id="lightY" min="0" max="15" step="0.5" value="8">
    </div>
    <div class="control-row">
      <label>Light Z <span id="lightZVal">5</span></label>
      <input type="range" id="lightZ" min="-10" max="10" step="0.5" value="5">
    </div>
    <button id="render">Render</button>
    <div class="preset-btns">
      <button id="preset-classic">Classic</button>
      <button id="preset-soft">Soft Shadows</button>
      <button id="preset-chromatic">Chromatic</button>
      <button id="preset-night">Night Scene</button>
    </div>
  </div>
  <div id="fps">Rendering...</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let samples = 4;
    let bounces = 2;
    let fov = 60;
    let light = { x: 5, y: 8, z: 5 };
    let spheres = [];
    let isRendering = false;
    
    // Simple Vec3
    const vec3 = (x, y, z) => ({ x, y, z });
    const add = (a, b) => vec3(a.x + b.x, a.y + b.y, a.z + b.z);
    const sub = (a, b) => vec3(a.x - b.x, a.y - b.y, a.z - b.z);
    const mul = (a, s) => vec3(a.x * s, a.y * s, a.z * s);
    const mulVec = (a, b) => vec3(a.x * b.x, a.y * b.y, a.z * b.z);
    const dot = (a, b) => a.x * b.x + a.y * b.y + a.z * b.z;
    const length = a => Math.sqrt(dot(a, a));
    const normalize = a => { let l = length(a); return l > 0 ? mul(a, 1/l) : a; };
    const reflect = (v, n) => sub(v, mul(n, 2 * dot(v, n)));
    
    function resize() {
      width = Math.min(800, window.innerWidth - 280);
      height = Math.min(600, window.innerHeight - 40);
      canvas.width = width;
      canvas.height = height;
      render();
    }
    
    function initSpheres() {
      spheres = [
        { center: vec3(0, 0, 0), radius: 1, color: vec3(0.9, 0.2, 0.2), reflectivity: 0.3 },
        { center: vec3(2, 0, 0), radius: 0.7, color: vec3(0.2, 0.8, 0.3), reflectivity: 0.2 },
        { center: vec3(-2, 0, 0), radius: 0.8, color: vec3(0.3, 0.3, 0.9), reflectivity: 0.4 },
        { center: vec3(0, -1.7, 0), radius: 1.5, color: vec3(0.4, 0.4, 0.4), reflectivity: 0.1 }, // floor
      ];
    }
    
    function intersect(rayOrigin, rayDir) {
      let closest = null;
      let minDist = Infinity;
      
      for (let sphere of spheres) {
        let oc = sub(rayOrigin, sphere.center);
        let a = dot(rayDir, rayDir);
        let b = 2 * dot(oc, rayDir);
        let c = dot(oc, oc) - sphere.radius * sphere.radius;
        let discriminant = b * b - 4 * a * c;
        
        if (discriminant > 0) {
          let t = (-b - Math.sqrt(discriminant)) / (2 * a);
          if (t > 0.01 && t < minDist) {
            minDist = t;
            let hitPoint = add(rayOrigin, mul(rayDir, t));
            let normal = normalize(sub(hitPoint, sphere.center));
            closest = { t: minDist, point: hitPoint, normal, sphere };
          }
        }
      }
      return closest;
    }
    
    function getShadowFactor(point, lightDir) {
      let shadowRay = { origin: add(point, mul(lightDir, 0.01)), dir: lightDir };
      let hit = intersect(shadowRay.origin, shadowRay.dir);
      if (hit && hit.t < length(sub(light, point))) return 0.3;
      return 1.0;
    }
    
    function trace(rayOrigin, rayDir, depth) {
      if (depth <= 0) return vec3(0, 0, 0);
      
      let hit = intersect(rayOrigin, rayDir);
      if (!hit) {
        // Gradient sky
        let t = 0.5 * (rayDir.y + 1);
        return add(mul(vec3(0.1, 0.1, 0.15), 1 - t), mul(vec3(0.2, 0.3, 0.5), t));
      }
      
      let lightDir = normalize(vec3(light.x, light.y, light.z));
      let shadow = getShadowFactor(hit.point, lightDir);
      let diffuse = Math.max(0, dot(hit.normal, lightDir)) * shadow;
      let ambient = 0.15;
      
      let color = mulVec(hit.sphere.color, ambient + diffuse * 0.7);
      
      // Reflection
      if (hit.sphere.reflectivity > 0 && bounces > 0) {
        let reflDir = reflect(rayDir, hit.normal);
        let reflOrigin = add(hit.point, mul(hit.normal, 0.01));
        let reflColor = trace(reflOrigin, reflDir, depth - 1);
        color = add(mul(color, 1 - hit.sphere.reflectivity), mul(reflColor, hit.sphere.reflectivity));
      }
      
      return color;
    }
    
    function render() {
      if (isRendering) return;
      isRendering = true;
      
      let startTime = performance.now();
      initSpheres();
      
      const imageData = ctx.createImageData(width, height);
      let aspectRatio = width / height;
      let fovRad = fov * Math.PI / 180;
      let halfHeight = Math.tan(fovRad / 2);
      let halfWidth = aspectRatio * halfHeight;
      
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          let color = vec3(0, 0, 0);
          
          for (let s = 0; s < samples; s++) {
            let u = (x + Math.random()) / width;
            let v = (y + Math.random()) / height;
            
            let rayDir = normalize(vec3(
              halfWidth * (2 * u - 1),
              halfHeight * (1 - 2 * v),
              -1
            ));
            
            let c = trace(vec3(0, 0, 5), rayDir, bounces);
            color = add(color, c);
          }
          color = mul(color, 1 / samples);
          
          // Tone mapping
          color = vec3(
            1 - Math.exp(-color.x * 1.5),
            1 - Math.exp(-color.y * 1.5),
            1 - Math.exp(-color.z * 1.5)
          );
          
          // Gamma
          color = vec3(Math.pow(color.x, 0.45), Math.pow(color.y, 0.45), Math.pow(color.z, 0.45));
          
          let idx = (y * width + x) * 4;
          imageData.data[idx] = Math.min(255, Math.floor(color.x * 255));
          imageData.data[idx + 1] = Math.min(255, Math.floor(color.y * 255));
          imageData.data[idx + 2] = Math.min(255, Math.floor(color.z * 255));
          imageData.data[idx + 3] = 255;
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
      
      let elapsed = performance.now() - startTime;
      document.getElementById('fps').textContent = `Rendered in ${Math.round(elapsed)}ms`;
      isRendering = false;
    }
    
    // Controls
    document.getElementById('samples').addEventListener('input', e => {
      samples = +e.target.value;
      document.getElementById('samplesVal').textContent = samples;
    });
    document.getElementById('bounces').addEventListener('input', e => {
      bounces = +e.target.value;
      document.getElementById('bouncesVal').textContent = bounces;
    });
    document.getElementById('fov').addEventListener('input', e => {
      fov = +e.target.value;
      document.getElementById('fovVal').textContent = fov;
    });
    document.getElementById('lightX').addEventListener('input', e => {
      light.x = +e.target.value;
      document.getElementById('lightXVal').textContent = light.x;
    });
    document.getElementById('lightY').addEventListener('input', e => {
      light.y = +e.target.value;
      document.getElementById('lightYVal').textContent = light.y;
    });
    document.getElementById('lightZ').addEventListener('input', e => {
      light.z = +e.target.value;
      document.getElementById('lightZVal').textContent = light.z;
    });
    
    document.getElementById('render').addEventListener('click', render);
    
    document.getElementById('preset-classic').addEventListener('click', () => {
      samples = 4; bounces = 2; fov = 60; light = vec3(5, 8, 5);
      updateControls(); render();
    });
    document.getElementById('preset-soft').addEventListener('click', () => {
      samples = 8; bounces = 3; fov = 50; light = vec3(0, 10, 3);
      updateControls(); render();
    });
    document.getElementById('preset-chromatic').addEventListener('click', () => {
      samples = 4; bounces = 2; fov = 70; light = vec3(3, 6, 8);
      spheres = [
        { center: vec3(0, 0, 0), radius: 1, color: vec3(0.95, 0.2, 0.5), reflectivity: 0.6 },
        { center: vec3(1.8, 0, 0.5), radius: 0.6, color: vec3(0.2, 0.9, 0.4), reflectivity: 0.5 },
        { center: vec3(-1.5, 0.5, 1), radius: 0.5, color: vec3(0.3, 0.4, 0.95), reflectivity: 0.7 },
        { center: vec3(0, -1.5, 0), radius: 1.3, color: vec3(0.2, 0.2, 0.25), reflectivity: 0.2 },
      ];
      updateControls(); render();
    });
    document.getElementById('preset-night').addEventListener('click', () => {
      samples = 6; bounces = 2; fov = 55; light = vec3(-3, 4, 2);
      spheres = [
        { center: vec3(0, 0, 0), radius: 1.2, color: vec3(0.8, 0.8, 0.85), reflectivity: 0.5 },
        { center: vec3(2.2, -0.3, 0), radius: 0.5, color: vec3(0.9, 0.3, 0.2), reflectivity: 0.3 },
        { center: vec3(-2, 0.2, 0.5), radius: 0.6, color: vec3(0.2, 0.6, 0.8), reflectivity: 0.4 },
        { center: vec3(0, -1.7, 0), radius: 1.5, color: vec3(0.15, 0.12, 0.1), reflectivity: 0.1 },
      ];
      updateControls(); render();
    });
    
    function updateControls() {
      document.getElementById('samples').value = samples;
      document.getElementById('samplesVal').textContent = samples;
      document.getElementById('bounces').value = bounces;
      document.getElementById('bouncesVal').textContent = bounces;
      document.getElementById('fov').value = fov;
      document.getElementById('fovVal').textContent = fov;
      document.getElementById('lightX').value = light.x;
      document.getElementById('lightXVal').textContent = light.x;
      document.getElementById('lightY').value = light.y;
      document.getElementById('lightYVal').textContent = light.y;
      document.getElementById('lightZ').value = light.z;
      document.getElementById('lightZVal').textContent = light.z;
    }
    
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
