<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ray Tracer — Shadow's Garden</title>
<meta name="description" content="Real-time ray tracing with reflections, shadows, and multiple light sources.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-family: monospace;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Drag to rotate • Scroll to zoom</div>
  <div class="controls">
    <button id="s1">Scene 1</button>
    <button id="s2">Scene 2</button>
    <button id="s3">Scene 3</button>
    <button id="s4">Scene 4</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let spheres = [];
    let lights = [];
    let camera = { x: 0, y: 0, z: -5 };
    let rotation = { x: 0, y: 0 };
    let zoom = 300;
    let dragging = false;
    let lastMouse = { x: 0, y: 0 };
    
    const scenes = {
      s1: {
        spheres: [
          { x: 0, y: 0, z: 0, r: 1, color: [1, 0.2, 0.2], reflective: 0.5 },
          { x: -2, y: 0.5, z: 1, r: 0.7, color: [0.2, 1, 0.2], reflective: 0.3 },
          { x: 2, y: -0.3, z: 0.5, r: 0.8, color: [0.2, 0.2, 1], reflective: 0.4 }
        ],
        lights: [
          { x: 3, y: 3, z: -3, intensity: 1 },
          { x: -3, y: 2, z: -2, intensity: 0.5 }
        ]
      },
      s2: {
        spheres: [
          { x: 0, y: -1001, z: 0, r: 1000, color: [0.5, 0.5, 0.5], reflective: 0.1 },
          { x: 0, y: 0, z: 0, r: 1, color: [1, 0.8, 0], reflective: 0.8 }
        ],
        lights: [
          { x: 2, y: 3, z: -3, intensity: 1 }
        ]
      },
      s3: {
        spheres: [
          { x: 0, y: 0, z: 0, r: 1, color: [1, 0.2, 0.8], reflective: 0.6 },
          { x: 1.5, y: 0, z: 0, r: 0.5, color: [0.2, 1, 0.8], reflective: 0.9 },
          { x: -1.5, y: 0, z: 0, r: 0.5, color: [1, 0.8, 0.2], reflective: 0.9 },
          { x: 0, y: 1.5, z: 0, r: 0.5, color: [0.8, 0.2, 1], reflective: 0.9 }
        ],
        lights: [
          { x: 0, y: 2, z: -3, intensity: 1 }
        ]
      },
      s4: {
        spheres: [
          { x: -1.5, y: 0, z: 1, r: 0.8, color: [1, 0.3, 0.3], reflective: 0.4 },
          { x: 1.5, y: 0, z: 1, r: 0.8, color: [0.3, 0.3, 1], reflective: 0.4 },
          { x: 0, y: 0, z: 0, r: 1, color: [0.3, 1, 0.3], reflective: 0.5 },
          { x: 0, y: -1.5, z: 0, r: 0.6, color: [1, 1, 0.3], reflective: 0.3 }
        ],
        lights: [
          { x: 2, y: 3, z: -2, intensity: 0.8 },
          { x: -2, y: 2, z: -3, intensity: 0.6 },
          { x: 0, y: -2, z: -2, intensity: 0.4 }
        ]
      }
    };
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      render();
    }
    
    function loadScene(name) {
      const scene = scenes[name];
      spheres = scene.spheres.map(s => ({...s}));
      lights = scene.lights.map(l => ({...l}));
      render();
    }
    
    function vec3(x, y, z) { return { x, y, z }; }
    function add(a, b) { return vec3(a.x + b.x, a.y + b.y, a.z + b.z); }
    function sub(a, b) { return vec3(a.x - b.x, a.y - b.y, a.z - b.z); }
    function mul(v, s) { return vec3(v.x * s, v.y * s, v.z * s); }
    function dot(a, b) { return a.x * b.x + a.y * b.y + a.z * b.z; }
    function length(v) { return Math.sqrt(dot(v, v)); }
    function normalize(v) { const l = length(v); return l > 0 ? mul(v, 1/l) : v; }
    function reflect(v, n) { return sub(v, mul(n, 2 * dot(v, n))); }
    
    function intersect(origin, dir, sphere) {
      const oc = sub(origin, vec3(sphere.x, sphere.y, sphere.z));
      const a = dot(dir, dir);
      const b = 2 * dot(oc, dir);
      const c = dot(oc, oc) - sphere.r * sphere.r;
      const disc = b * b - 4 * a * c;
      
      if (disc < 0) return null;
      
      const t = (-b - Math.sqrt(disc)) / (2 * a);
      if (t < 0) return null;
      
      const point = add(origin, mul(dir, t));
      const normal = normalize(sub(point, vec3(sphere.x, sphere.y, sphere.z)));
      
      return { t, point, normal, sphere };
    }
    
    function trace(origin, dir, depth) {
      if (depth > 3) return vec3(0, 0, 0);
      
      let closest = null;
      let minT = Infinity;
      
      for (const sphere of spheres) {
        const hit = intersect(origin, dir, sphere);
        if (hit && hit.t < minT) {
          minT = hit.t;
          closest = hit;
        }
      }
      
      if (!closest) {
        // Sky gradient
        const t = 0.5 * (dir.y + 1);
        return add(mul(vec3(0.05, 0.05, 0.1), 1-t), mul(vec3(0.1, 0.1, 0.3), t));
      }
      
      // Ambient
      let color = mul(vec3(closest.sphere.color[0], closest.sphere.color[1], closest.sphere.color[2]), 0.1);
      
      // Lighting
      for (const light of lights) {
        const lightDir = normalize(sub(vec3(light.x, light.y, light.z), closest.point));
        
        // Shadow check
        const shadowOrigin = add(closest.point, mul(closest.normal, 0.001));
        let inShadow = false;
        for (const sphere of spheres) {
          if (sphere === closest.sphere) continue;
          if (intersect(shadowOrigin, lightDir, sphere)) {
            inShadow = true;
            break;
          }
        }
        
        if (!inShadow) {
          const diff = Math.max(0, dot(closest.normal, lightDir));
          const diffuse = mul(vec3(closest.sphere.color[0], closest.sphere.color[1], closest.sphere.color[2]), diff * light.intensity);
          color = add(color, diffuse);
          
          // Specular
          const viewDir = normalize(sub(origin, closest.point));
          const halfDir = normalize(add(lightDir, viewDir));
          const spec = Math.pow(Math.max(0, dot(closest.normal, halfDir)), 32);
          color = add(color, mul(vec3(1, 1, 1), spec * light.intensity * 0.5));
        }
      }
      
      // Reflection
      if (closest.sphere.reflective > 0) {
        const reflectDir = reflect(dir, closest.normal);
        const reflectOrigin = add(closest.point, mul(closest.normal, 0.001));
        const reflectColor = trace(reflectOrigin, reflectDir, depth + 1);
        color = add(mul(color, 1 - closest.sphere.reflective), mul(reflectColor, closest.sphere.reflective));
      }
      
      return color;
    }
    
    function render() {
      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;
      
      const aspectRatio = width / height;
      
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          // Ray direction
          const px = (2 * x / width - 1) * aspectRatio;
          const py = (1 - 2 * y / height);
          
          // Apply rotation
          let dir = normalize(vec3(px, py, 1));
          
          // Rotate around Y
          const cosY = Math.cos(rotation.y);
          const sinY = Math.sin(rotation.y);
          const x1 = dir.x * cosY - dir.z * sinY;
          const z1 = dir.x * sinY + dir.z * cosY;
          dir.x = x1;
          dir.z = z1;
          
          // Rotate around X
          const cosX = Math.cos(rotation.x);
          const sinX = Math.sin(rotation.x);
          const y1 = dir.y * cosX - dir.z * sinX;
          const z2 = dir.y * sinX + dir.z * cosX;
          dir.y = y1;
          dir.z = z2;
          
          const origin = vec3(camera.x, camera.y, camera.z + zoom);
          const color = trace(origin, normalize(dir), 0);
          
          const i = (y * width + x) * 4;
          data[i] = Math.min(255, Math.floor(color.x * 255));
          data[i+1] = Math.min(255, Math.floor(color.y * 255));
          data[i+2] = Math.min(255, Math.floor(color.z * 255));
          data[i+3] = 255;
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
    }
    
    canvas.addEventListener('mousedown', (e) => {
      dragging = true;
      lastMouse = { x: e.clientX, y: e.clientY };
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (dragging) {
        rotation.y += (e.clientX - lastMouse.x) * 0.01;
        rotation.x += (e.clientY - lastMouse.y) * 0.01;
        lastMouse = { x: e.clientX, y: e.clientY };
        render();
      }
    });
    
    canvas.addEventListener('mouseup', () => dragging = false);
    canvas.addEventListener('mouseleave', () => dragging = false);
    
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom += e.deltaY * 0.5;
      zoom = Math.max(100, Math.min(800, zoom));
      render();
    });
    
    document.getElementById('s1').onclick = () => loadScene('s1');
    document.getElementById('s2').onclick = () => loadScene('s2');
    document.getElementById('s3').onclick = () => loadScene('s3');
    document.getElementById('s4').onclick = () => loadScene('s4');
    
    window.addEventListener('resize', resize);
    resize();
    loadScene('s1');
  </script>
</body>
</html>
