<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator — Shadow's Garden</title>
<meta name="description">Calculate age from birthdate. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .age-calc { max-width: 500px; margin: 0 auto; }
  .input-group {
    margin-bottom: 20px;
  }
  .input-group label {
    display: block;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  input[type="date"] {
    width: 100%;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    box-sizing: border-box;
  }
  input[type="date"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  .result {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .age-value {
    font-size: 48px;
    font-weight: 600;
    color: var(--text);
  }
  .age-label {
    font-size: 16px;
    color: var(--text-secondary);
    margin-top: 8px;
  }
  .details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    text-align: center;
  }
  .detail-item {
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .detail-value {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }
  .detail-label {
    font-size: 12px;
    color: var(--text-secondary);
  }
  button {
    width: 100%;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover {
    opacity: 0.9;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="age-calc">
    <h1>Age Calculator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Calculate your age from your birthdate.</p>
    
    <div class="input-group">
      <label>Birthdate</label>
      <input type="date" id="birthdate" onchange="calculate()">
    </div>
    
    <button onclick="calculate()">Calculate Age</button>
    
    <div class="result" id="result" style="display: none;">
      <div class="age-value" id="ageValue">--</div>
      <div class="age-label">years old</div>
    </div>
    
    <div class="details" id="details" style="display: none;">
      <div class="detail-item">
        <div class="detail-value" id="daysValue">--</div>
        <div class="detail-label">days old</div>
      </div>
      <div class="detail-item">
        <div class="detail-value" id="nextBirthday">--</div>
        <div class="detail-label">days until birthday</div>
      </div>
    </div>
  </div>
</div>
<script>
  function calculate() {
    const birthdate = document.getElementById('birthdate').value;
    if (!birthdate) return;
    
    const birth = new Date(birthdate);
    const today = new Date();
    
    // Calculate age
    let age = today.getFullYear() - birth.getFullYear();
    const monthDiff = today.getMonth() - birth.getMonth();
    
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
      age--;
    }
    
    // Total days
    const totalDays = Math.floor((today - birth) / (1000 * 60 * 60 * 24));
    
    // Days until next birthday
    let nextBirthday = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
    if (nextBirthday < today) {
      nextBirthday.setFullYear(today.getFullYear() + 1);
    }
    const daysUntil = Math.floor((nextBirthday - today) / (1000 * 60 * 60 * 24));
    
    // Display
    document.getElementById('result').style.display = 'block';
    document.getElementById('details').style.display = 'grid';
    document.getElementById('ageValue').textContent = age;
    document.getElementById('daysValue').textContent = totalDays.toLocaleString();
    document.getElementById('nextBirthday').textContent = daysUntil;
  }
</script>
</body>
</html>
