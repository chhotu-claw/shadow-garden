<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate your exact age in years, months, days, and weeks. Shows next birthday countdown too.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 2rem; max-width: 600px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 2rem; }
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
  input[type="date"] { width: 100%; padding: 0.8rem; font-size: 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--fg); }
  .result { background: var(--bg-secondary); padding: 1.5rem; border-radius: 12px; margin-top: 1.5rem; display: none; }
  .result.show { display: block; }
  .age-display { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; text-align: center; }
  .age-item { padding: 1rem; background: var(--bg); border-radius: 8px; }
  .age-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
  .age-label { font-size: 0.85rem; color: var(--fg-muted); margin-top: 0.25rem; }
  .next-birthday { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); text-align: center; }
  .next-birthday-value { font-size: 1.5rem; font-weight: 600; color: var(--accent); }
  .checkbox-group { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; }
  .checkbox-group input { width: auto; }
  .checkbox-group label { margin: 0; font-weight: 400; }
  @media (max-width: 500px) { .age-display { grid-template-columns: 1fr; } }
</style>
</head>
<body data-page-type="app">
  <h1>Age Calculator</h1>
  <div class="input-group">
    <label for="birthday">Enter your birthday</label>
    <input type="date" id="birthday">
  </div>
  <div class="result" id="result">
    <div class="age-display">
      <div class="age-item">
        <div class="age-value" id="years">—</div>
        <div class="age-label">Years</div>
      </div>
      <div class="age-item">
        <div class="age-value" id="months">—</div>
        <div class="age-label">Months</div>
      </div>
      <div class="age-item">
        <div class="age-value" id="days">—</div>
        <div class="age-label">Days</div>
      </div>
      <div class="age-item">
        <div class="age-value" id="weeks">—</div>
        <div class="age-label">Weeks</div>
      </div>
    </div>
    <div class="next-birthday">
      <div>Next birthday in</div>
      <div class="next-birthday-value" id="next-birthday">—</div>
    </div>
  </div>
  <script>
    const birthdayInput = document.getElementById('birthday');
    const result = document.getElementById('result');
    const yearsEl = document.getElementById('years');
    const monthsEl = document.getElementById('months');
    const daysEl = document.getElementById('days');
    const weeksEl = document.getElementById('weeks');
    const nextBirthdayEl = document.getElementById('next-birthday');

    function calculateAge(birthDate) {
      const today = new Date();
      const birth = new Date(birthDate);
      
      if (birth > today) {
        alert('Birthday cannot be in the future!');
        return;
      }

      let years = today.getFullYear() - birth.getFullYear();
      let months = today.getMonth() - birth.getMonth();
      let days = today.getDate() - birth.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
        days += prevMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      const totalDays = Math.floor((today - birth) / (1000 * 60 * 60 * 24));
      const totalWeeks = Math.floor(totalDays / 7);

      yearsEl.textContent = years;
      monthsEl.textContent = months;
      daysEl.textContent = days;
      weeksEl.textContent = totalWeeks;

      // Next birthday
      let nextBirthday = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
      if (nextBirthday < today) {
        nextBirthday.setFullYear(today.getFullYear() + 1);
      }
      const daysUntilNext = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));
      
      if (daysUntilNext === 1) {
        nextBirthdayEl.textContent = '1 day (tomorrow!)';
      } else if (nextBirthday.getMonth() === birth.getMonth() && nextBirthday.getDate() === birth.getDate()) {
        nextBirthdayEl.textContent = 'TODAY! 🎂';
      } else {
        const nextMonths = Math.floor(daysUntilNext / 30);
        if (nextMonths >= 1) {
          nextBirthdayEl.textContent = `${nextMonths} month${nextMonths > 1 ? 's' : ''} (${daysUntilNext} days)`;
        } else {
          nextBirthdayEl.textContent = `${daysUntilNext} days`;
        }
      }

      result.classList.add('show');
    }

    birthdayInput.addEventListener('change', (e) => {
      if (e.target.value) {
        calculateAge(e.target.value);
      }
    });
  </script>
</body>
</html>
