<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fluid Simulation — Shadow's Garden</title>
<meta name="description" content="Interactive 3D fluid simulation with particle-based Navier-Stokes approximation">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background: #0a0a0f;
  }
  h1 { color: #f0e6d3; margin-bottom: 10px; }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button, select {
    padding: 8px 16px;
    border: 2px solid #333;
    background: #1a1a24;
    color: #f0e6d3;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
  }
  button:hover, select:hover { background: #252535; }
  canvas {
    border: 2px solid #333;
    cursor: crosshair;
  }
  .info { color: #666; font-size: 12px; margin-top: 10px; }
</style>
</head>
<body data-page-type="app">
  <h1>3D Fluid Simulation</h1>
  <div class="controls">
    <select id="presetSelect">
      <option value="smoke">Smoke</option>
      <option value="fire">Fire</option>
      <option value="ink">Ink</option>
      <option value="water">Water</option>
    </select>
    <button id="clearBtn">Clear</button>
    <button id="resetBtn">Reset</button>
  </div>
  <canvas id="canvas" width="600" height="400"></canvas>
  <div class="info">Click and drag to add fluid • Mouse position affects flow</div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    const SCALE = 4;
    const COLS = Math.floor(W / SCALE);
    const ROWS = Math.floor(H / SCALE);
    
    // Fluid density and velocity fields
    let density = new Float32Array(COLS * ROWS);
    let vx = new Float32Array(COLS * ROWS);
    let vy = new Float32Array(COLS * ROWS);
    let vx0 = new Float32Array(COLS * ROWS);
    let vy0 = new Float32Array(COLS * ROWS);
    
    const presets = {
      smoke: { color: '#aaaaaa', fade: 0.98, diffuse: 0.999, velocity: 0.3 },
      fire: { color: '#ff6622', fade: 0.95, diffuse: 0.99, velocity: 0.5 },
      ink: { color: '#4488ff', fade: 0.99, diffuse: 0.9995, velocity: 0.2 },
      water: { color: '#44aaff', fade: 0.97, diffuse: 0.998, velocity: 0.4 }
    };
    
    let currentPreset = presets.smoke;
    let isDrawing = false;
    let mouseX = 0, mouseY = 0;
    
    document.getElementById('presetSelect').addEventListener('change', e => {
      currentPreset = presets[e.target.value];
    });
    
    document.getElementById('clearBtn').addEventListener('click', () => {
      density.fill(0);
      vx.fill(0);
      vy.fill(0);
    });
    
    document.getElementById('resetBtn').addEventListener('click', () => {
      density.fill(0);
      vx.fill(0);
      vy.fill(0);
      vx0.fill(0);
      vy0.fill(0);
    });
    
    canvas.addEventListener('mousedown', e => { isDrawing = true; addFluid(e); });
    canvas.addEventListener('mousemove', e => { 
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
      if (isDrawing) addFluid(e); 
    });
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);
    
    function addFluid(e) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / SCALE);
      const y = Math.floor((e.clientY - rect.top) / SCALE);
      const radius = 3;
      
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          if (dx*dx + dy*dy <= radius*radius) {
            const px = x + dx;
            const py = y + dy;
            if (px >= 0 && px < COLS && py >= 0 && py < ROWS) {
              const i = py * COLS + px;
              density[i] = Math.min(1, density[i] + 0.5);
              vx[i] += (Math.random() - 0.5) * currentPreset.velocity;
              vy[i] -= currentPreset.velocity * 0.5;
            }
          }
        }
      }
    }
    
    function diffuse(b, x, x0, diff, dt) {
      const a = dt * diff * (COLS - 2) * (ROWS - 2);
      for (let k = 0; k < 4; k++) {
        for (let j = 1; j < ROWS - 1; j++) {
          for (let i = 1; i < COLS - 1; i++) {
            x[j * COLS + i] = (x0[j * COLS + i] + a * (
              x[(j-1) * COLS + i] + x[(j+1) * COLS + i] +
              x[j * COLS + (i-1)] + x[j * COLS + (i+1)]
            )) / (1 + 4 * a);
          }
        }
      }
    }
    
    function advect(b, d, d0, vx, vy, dt) {
      const dtx = dt * (COLS - 2);
      const dty = dt * (ROWS - 2);
      
      for (let j = 1; j < ROWS - 1; j++) {
        for (let i = 1; i < COLS - 1; i++) {
          let x = i - dtx * vx[j * COLS + i];
          let y = j - dty * vy[j * COLS + i];
          
          x = Math.max(0.5, Math.min(COLS - 1.5, x));
          y = Math.max(0.5, Math.min(ROWS - 1.5, y));
          
          const i0 = Math.floor(x);
          const i1 = i0 + 1;
          const j0 = Math.floor(y);
          const j1 = j0 + 1;
          
          const s1 = x - i0;
          const s0 = 1 - s1;
          const t1 = y - j0;
          const t0 = 1 - t1;
          
          d[j * COLS + i] = s0 * (t0 * d0[j0 * COLS + i0] + t1 * d0[j1 * COLS + i0]) +
                           s1 * (t0 * d0[j0 * COLS + i1] + t1 * d0[j1 * COLS + i1]);
        }
      }
    }
    
    function project(vx, vy, p, div) {
      const h = 1.0 / Math.max(COLS, ROWS);
      
      for (let j = 1; j < ROWS - 1; j++) {
        for (let i = 1; i < COLS - 1; i++) {
          div[j * COLS + i] = -0.5 * h * (
            vx[j * COLS + (i+1)] - vx[j * COLS + (i-1)] +
            vy[(j+1) * COLS + i] - vy[(j-1) * COLS + i]
          );
          p[j * COLS + i] = 0;
        }
      }
      
      for (let k = 0; k < 4; k++) {
        for (let j = 1; j < ROWS - 1; j++) {
          for (let i = 1; i < COLS - 1; i++) {
            p[j * COLS + i] = (div[j * COLS + i] +
              p[j * COLS + (i-1)] + p[j * COLS + (i+1)] +
              p[(j-1) * COLS + i] + p[(j+1) * COLS + i]) / 4;
          }
        }
      }
      
      for (let j = 1; j < ROWS - 1; j++) {
        for (let i = 1; i < COLS - 1; i++) {
          vx[j * COLS + i] -= 0.5 * (p[j * COLS + (i+1)] - p[j * COLS + (i-1)]) / h;
          vy[j * COLS + i] -= 0.5 * (p[(j+1) * COLS + i] - p[(j-1) * COLS + i]) / h;
        }
      }
    }
    
    function update() {
      const dt = 0.1;
      const visc = 0.00001;
      
      // Velocity step
      [vx, vx0] = [vx0, vx];
      diffuse(1, vx, vx0, visc, dt);
      [vy, vy0] = [vy0, vy];
      diffuse(2, vy, vy0, visc, dt);
      
      project(vx, vy, vx0, vy0);
      
      [vx, vx0] = [vx0, vx];
      [vy, vy0] = [vy0, vy];
      advect(1, vx, vx0, vx0, vy0, dt);
      advect(2, vy, vy0, vx0, vy0, dt);
      
      project(vx, vy, vx0, vy0);
      
      // Density step
      [density, vx0] = [vx0, density];
      diffuse(0, density, vx0, 0.0001, dt);
      advect(0, density, density, vx, vy, dt);
      
      // Fade density
      for (let i = 0; i < density.length; i++) {
        density[i] *= currentPreset.fade;
      }
    }
    
    function render() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, W, H);
      
      const imgData = ctx.getImageData(0, 0, W, H);
      const data = imgData.data;
      
      for (let j = 0; j < ROWS; j++) {
        for (let i = 0; i < COLS; i++) {
          const d = density[j * COLS + i];
          if (d > 0.01) {
            // Parse color
            const hex = currentPreset.color;
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            
            const brightness = Math.min(255, d * 255);
            
            for (let dy = 0; dy < SCALE; dy++) {
              for (let dx = 0; dx < SCALE; dx++) {
                const px = i * SCALE + dx;
                const py = j * SCALE + dy;
                if (px < W && py < H) {
                  const idx = (py * W + px) * 4;
                  data[idx] = Math.min(255, r * brightness / 255 + data[idx] * 0.3);
                  data[idx + 1] = Math.min(255, g * brightness / 255 + data[idx + 1] * 0.3);
                  data[idx + 2] = Math.min(255, b * brightness / 255 + data[idx + 2] * 0.3);
                  data[idx + 3] = 255;
                }
              }
            }
          }
        }
      }
      
      ctx.putImageData(imgData, 0, 0);
    }
    
    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }
    
    loop();
  </script>
</body>
</html>
