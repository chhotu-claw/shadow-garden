<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluid Simulation — Shadow's Garden</title>
<meta name="description" content="Real-time Navier-Stokes fluid simulation"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; cursor: crosshair; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 14px;
    color: #ccc;
    font-size: 12px;
    z-index: 100;
  }
  #controls h3 { margin: 0 0 10px 0; color: #fff; font-size: 13px; }
  .control-row { margin-bottom: 8px; }
  .control-row label { display: block; margin-bottom: 4px; color: #888; font-size: 11px; }
  .control-row input[type="range"] { width: 100%; }
  .control-row span { float: right; color: #4af; font-size: 11px; }
  button {
    background: #2a4a6a;
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 4px;
    margin-top: 6px;
    font-size: 11px;
  }
  button:hover { background: #3a5a7a; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #556;
    font-size: 11px;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>Fluid Simulation</h3>
    <div class="control-row">
      <label>Resolution <span id="resVal">128</span></label>
      <input type="range" id="res" min="32" max="256" step="16" value="128">
    </div>
    <div class="control-row">
      <label>Viscosity <span id="viscVal">0.0001</span></label>
      <input type="range" id="visc" min="0" max="0.001" step="0.0001" value="0.0001">
    </div>
    <div class="control-row">
      <label>Diffusion <span id="diffVal">0.0001</span></label>
      <input type="range" id="diff" min="0" max="0.001" step="0.0001" value="0.0001">
    </div>
    <div class="control-row">
      <label>Iterations <span id="iterVal">16</span></label>
      <input type="range" id="iters" min="4" max="32" step="4" value="16">
    </div>
    <button id="clear">Clear</button>
    <button id="preset-smoke">Smoke</button>
    <button id="preset-ink">Ink</button>
    <button id="preset-fire">Fire</button>
    <button id="preset-rainbow">Rainbow</button>
  </div>
  <div id="info">Click and drag to add fluid</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let N = 128;
    let iter = 16;
    let visc = 0.0001;
    let diff = 0.0001;
    let dt = 0.1;
    let mode = 'ink';
    
    let u, v, u_prev, v_prev;
    let dens, dens_prev;
    
    function IX(x, y) {
      return x + (N + 2) * y;
    }
    
    function addSource(x, s, dt) {
      for (let i = 0; i < (N + 2) * (N + 2); i++) {
        x[i] += dt * s[i];
      }
    }
    
    function set_bnd(b, x) {
      for (let i = 1; i <= N; i++) {
        x[IX(0, i)] = b === 1 ? -x[IX(1, i)] : x[IX(1, i)];
        x[IX(N + 1, i)] = b === 1 ? -x[IX(N, i)] : x[IX(N, i)];
        x[IX(i, 0)] = b === 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
        x[IX(i, N + 1)] = b === 2 ? -x[IX(i, N)] : x[IX(i, N)];
      }
      x[IX(0, 0)] = 0.5 * (x[IX(1, 0)] + x[IX(0, 1)]);
      x[IX(0, N + 1)] = 0.5 * (x[IX(1, N + 1)] + x[IX(0, N)]);
      x[IX(N + 1, 0)] = 0.5 * (x[IX(N, 0)] + x[IX(N + 1, 1)]);
      x[IX(N + 1, N + 1)] = 0.5 * (x[IX(N, N + 1)] + x[IX(N + 1, N)]);
    }
    
    function lin_solve(b, x, x0, a, c) {
      let cRecip = 1.0 / c;
      for (let k = 0; k < iter; k++) {
        for (let j = 1; j <= N; j++) {
          for (let i = 1; i <= N; i++) {
            x[IX(i, j)] = (x0[IX(i, j)] + a * (x[IX(i + 1, j)] + x[IX(i - 1, j)] + x[IX(i, j + 1)] + x[IX(i, j - 1)])) * cRecip;
          }
        }
        set_bnd(b, x);
      }
    }
    
    function diffuse(b, x, x0, diff, dt) {
      let a = dt * diff * (N - 2) * (N - 2);
      lin_solve(b, x, x0, a, 1 + 4 * a);
    }
    
    function advect(b, d, d0, velocX, velocY, dt) {
      let i0, i1, j0, j1;
      let x, y, s0, t0, s1, t1;
      let dt0 = dt * (N - 2);
      
      for (let j = 1; j <= N; j++) {
        for (let i = 1; i <= N; i++) {
          x = i - dt0 * velocX[IX(i, j)];
          y = j - dt0 * velocY[IX(i, j)];
          
          if (x < 0.5) x = 0.5;
          if (x > N + 0.5) x = N + 0.5;
          i0 = Math.floor(x);
          i1 = i0 + 1;
          
          if (y < 0.5) y = 0.5;
          if (y > N + 0.5) y = N + 0.5;
          j0 = Math.floor(y);
          j1 = j0 + 1;
          
          s1 = x - i0;
          s0 = 1 - s1;
          t1 = y - j0;
          t0 = 1 - t1;
          
          d[IX(i, j)] = s0 * (t0 * d0[IX(i0, j0)] + t1 * d0[IX(i0, j1)]) +
                        s1 * (t0 * d0[IX(i1, j0)] + t1 * d0[IX(i1, j1)]);
        }
      }
      set_bnd(b, d);
    }
    
    function project(velocX, velocY, p, div) {
      for (let j = 1; j <= N; j++) {
        for (let i = 1; i <= N; i++) {
          div[IX(i, j)] = -0.5 * (velocX[IX(i + 1, j)] - velocX[IX(i - 1, j)] + velocY[IX(i, j + 1)] - velocY[IX(i, j - 1)]) / N;
          p[IX(i, j)] = 0;
        }
      }
      set_bnd(0, div);
      set_bnd(0, p);
      lin_solve(0, p, div, 1, 4);
      
      for (let j = 1; j <= N; j++) {
        for (let i = 1; i <= N; i++) {
          velocX[IX(i, j)] -= 0.5 * N * (p[IX(i + 1, j)] - p[IX(i - 1, j)]);
          velocY[IX(i, j)] -= 0.5 * N * (p[IX(i, j + 1)] - p[IX(i, j - 1)]);
        }
      }
      set_bnd(1, velocX);
      set_bnd(2, velocY);
    }
    
    function vel_step(u, v, u0, v0, visc, dt) {
      addSource(u, u0, dt);
      addSource(v, v0, dt);
      u0 = u;
      v0 = v;
      diffuse(1, u, u0, visc, dt);
      diffuse(2, v, v0, visc, dt);
      project(u, v, u0, v0);
      u0 = u;
      v0 = v;
      advect(1, u, u0, u0, v0, dt);
      advect(2, v, v0, u0, v0, dt);
      project(u, v, u0, v0);
    }
    
    function dens_step(x, x0, u, v, diff, dt) {
      addSource(x, x0, dt);
      x0 = x;
      diffuse(0, x, x0, diff, dt);
      x0 = x;
      advect(0, x, x0, u, v, dt);
    }
    
    function init() {
      u = new Float32Array((N + 2) * (N + 2));
      v = new Float32Array((N + 2) * (N + 2));
      u_prev = new Float32Array((N + 2) * (N + 2));
      v_prev = new Float32Array((N + 2) * (N + 2));
      dens = new Float32Array((N + 2) * (N + 2));
      dens_prev = new Float32Array((N + 2) * (N + 2));
    }
    
    let mouseX = 0, mouseY = 0, mouseDown = false, prevMouseX = 0, prevMouseY = 0;
    
    function update() {
      // Add density and velocity from mouse
      if (mouseDown) {
        let i = Math.floor(mouseX / width * N) + 1;
        let j = Math.floor(mouseY / height * N) + 1;
        if (i > 1 && i < N && j > 1 && j < N) {
          u_prev[IX(i, j)] = (mouseX - prevMouseX) * 10;
          v_prev[IX(i, j)] = (mouseY - prevMouseY) * 10;
          
          if (mode === 'rainbow') {
            let hue = (Date.now() / 20) % 360;
            dens_prev[IX(i, j)] = 500;
          } else {
            dens_prev[IX(i, j)] = 500;
          }
        }
      }
      
      vel_step(u, v, u_prev, v_prev, visc, dt);
      dens_step(dens, dens_prev, u, v, diff, dt);
      
      // Clear previous
      for (let i = 0; i < (N + 2) * (N + 2); i++) {
        u_prev[i] = 0;
        v_prev[i] = 0;
        dens_prev[i] = 0;
      }
      
      render();
      requestAnimationFrame(update);
    }
    
    function render() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, width, height);
      
      let cellW = width / N;
      let cellH = height / N;
      
      for (let j = 1; j <= N; j++) {
        for (let i = 1; i <= N; i++) {
          let d = dens[IX(i, j)];
          if (d > 1) {
            let x = (i - 1) * cellW;
            let y = (j - 1) * cellH;
            
            let r, g, b;
            if (mode === 'rainbow') {
              let hue = (d * 0.5 + Date.now() / 50) % 360;
              r = Math.min(255, d * 0.5);
              g = Math.min(255, d * 0.5);
              b = Math.min(255, d * 0.5);
              ctx.fillStyle = `hsla(${hue}, 80%, 50%, ${Math.min(1, d / 255)})`;
            } else if (mode === 'fire') {
              r = Math.min(255, d);
              g = Math.min(255, d * 0.3);
              b = 0;
              ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${Math.min(1, d / 200)})`;
            } else if (mode === 'smoke') {
              r = g = b = Math.min(200, d * 0.8);
              ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${Math.min(1, d / 200)})`;
            } else {
              r = g = b = Math.min(255, d);
              ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${Math.min(1, d / 200)})`;
            }
            
            ctx.fillRect(x, y, cellW + 1, cellH + 1);
          }
        }
      }
    }
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    
    canvas.addEventListener('mousedown', e => {
      mouseDown = true;
      mouseX = e.clientX;
      mouseY = e.clientY;
      prevMouseX = mouseX;
      prevMouseY = mouseY;
    });
    
    canvas.addEventListener('mousemove', e => {
      prevMouseX = mouseX;
      prevMouseY = mouseY;
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    
    canvas.addEventListener('mouseup', () => mouseDown = false);
    canvas.addEventListener('mouseleave', () => mouseDown = false);
    
    document.getElementById('res').addEventListener('change', e => {
      N = +e.target.value;
      document.getElementById('resVal').textContent = N;
      init();
    });
    
    document.getElementById('visc').addEventListener('input', e => {
      visc = +e.target.value;
      document.getElementById('viscVal').textContent = visc;
    });
    
    document.getElementById('diff').addEventListener('input', e => {
      diff = +e.target.value;
      document.getElementById('diffVal').textContent = diff;
    });
    
    document.getElementById('iters').addEventListener('input', e => {
      iter = +e.target.value;
      document.getElementById('iterVal').textContent = iter;
    });
    
    document.getElementById('clear').addEventListener('click', () => {
      for (let i = 0; i < (N + 2) * (N + 2); i++) {
        u[i] = v[i] = dens[i] = 0;
      }
    });
    
    document.getElementById('preset-smoke').addEventListener('click', () => mode = 'smoke');
    document.getElementById('preset-ink').addEventListener('click', () => mode = 'ink');
    document.getElementById('preset-fire').addEventListener('click', () => mode = 'fire');
    document.getElementById('preset-rainbow').addEventListener('click', () => mode = 'rainbow');
    
    window.addEventListener('resize', resize);
    resize();
    init();
    update();
  </script>
</body>
</html>
