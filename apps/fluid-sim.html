<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluid Simulation — Shadow's Garden</title>
<meta name="description" description Real-time Navier-Stokes fluid simulation. Click and drag to add fluid.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a12; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-family: monospace;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Click and drag to add fluid</div>
  <div class="controls">
    <button id="smoke">Smoke</button>
    <button id="ink">Ink</button>
    <button id="fire">Fire</button>
    <button id="rainbow">Rainbow</button>
    <button id="clear">Clear</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let size = 128;
    let dt = 0.1;
    let diff = 0.0001;
    let visc = 0.000001;
    
    let u, v, u_prev, v_prev;
    let dens, dens_prev;
    let mode = 'smoke';
    
    function IX(x, y) {
      return x + y * size;
    }
    
    function addSource(x, s, dt) {
      for (let i = 0; i < size * size; i++) {
        x[i] += dt * s[i];
      }
    }
    
    function setBnd(b, x) {
      for (let i = 1; i < size - 1; i++) {
        x[IX(i, 0)] = b === 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
        x[IX(i, size - 1)] = b === 2 ? -x[IX(i, size - 2)] : x[IX(i, size - 2)];
        x[IX(0, i)] = b === 1 ? -x[IX(1, i)] : x[IX(1, i)];
        x[IX(size - 1, i)] = b === 1 ? -x[IX(size - 2, i)] : x[IX(size - 2, i)];
      }
      x[IX(0, 0)] = 0.5 * (x[IX(1, 0)] + x[IX(0, 1)]);
      x[IX(0, size - 1)] = 0.5 * (x[IX(1, size - 1)] + x[IX(0, size - 2)]);
      x[IX(size - 1, 0)] = 0.5 * (x[IX(size - 2, 0)] + x[IX(size - 1, 1)]);
      x[IX(size - 1, size - 1)] = 0.5 * (x[IX(size - 2, size - 1)] + x[IX(size - 1, size - 2)]);
    }
    
    function linSolve(b, x, x0, a, c) {
      const cRecip = 1.0 / c;
      for (let k = 0; k < 4; k++) {
        for (let j = 1; j < size - 1; j++) {
          for (let i = 1; i < size - 1; i++) {
            x[IX(i, j)] = (x0[IX(i, j)] + a * (x[IX(i + 1, j)] + x[IX(i - 1, j)] + x[IX(i, j + 1)] + x[IX(i, j - 1)])) * cRecip;
          }
        }
        setBnd(b, x);
      }
    }
    
    function diffuse(b, x, x0, diff, dt) {
      const a = dt * diff * (size - 2) * (size - 2);
      linSolve(b, x, x0, a, 1 + 4 * a);
    }
    
    function project(u, v, p, div) {
      for (let j = 1; j < size - 1; j++) {
        for (let i = 1; i < size - 1; i++) {
          div[IX(i, j)] = -0.5 * (u[IX(i + 1, j)] - u[IX(i - 1, j)] + v[IX(i, j + 1)] - v[IX(i, j - 1)]) / size;
          p[IX(i, j)] = 0;
        }
      }
      setBnd(0, div);
      setBnd(0, p);
      linSolve(0, p, div, 1, 4);
      
      for (let j = 1; j < size - 1; j++) {
        for (let i = 1; i < size - 1; i++) {
          u[IX(i, j)] -= 0.5 * (p[IX(i + 1, j)] - p[IX(i - 1, j)]) * size;
          v[IX(i, j)] -= 0.5 * (p[IX(i, j + 1)] - p[IX(i, j - 1)]) * size;
        }
      }
      setBnd(1, u);
      setBnd(2, v);
    }
    
    function advect(b, d, d0, u, v, dt) {
      const dt0 = dt * (size - 2);
      for (let j = 1; j < size - 1; j++) {
        for (let i = 1; i < size - 1; i++) {
          let x = i - dt0 * u[IX(i, j)];
          let y = j - dt0 * v[IX(i, j)];
          if (x < 0.5) x = 0.5;
          if (x > size - 1.5) x = size - 1.5;
          const i0 = Math.floor(x);
          const i1 = i0 + 1;
          if (y < 0.5) y = 0.5;
          if (y > size - 1.5) y = size - 1.5;
          const j0 = Math.floor(y);
          const j1 = j0 + 1;
          const s1 = x - i0;
          const s0 = 1 - s1;
          const t1 = y - j0;
          const t0 = 1 - t1;
          d[IX(i, j)] = s0 * (t0 * d0[IX(i0, j0)] + t1 * d0[IX(i0, j1)]) +
                        s1 * (t0 * d0[IX(i1, j0)] + t1 * d0[IX(i1, j1)]);
        }
      }
      setBnd(b, d);
    }
    
    function velStep(u, v, u0, v0, visc, dt) {
      addSource(u, u0, dt);
      addSource(v, v0, dt);
      const tmp = u0; u0 = u; u = tmp;
      diffuse(1, u, u0, visc, dt);
      tmp = v0; v0 = v; v = tmp;
      diffuse(2, v, v0, visc, dt);
      project(u, v, u0, v0);
      tmp = u0; u0 = u; u = tmp;
      tmp = v0; v0 = v; v = tmp;
      advect(1, u, u0, u0, v0, dt);
      advect(2, v, v0, u0, v0, dt);
      project(u, v, u0, v0);
    }
    
    function densStep(x, x0, u, v, diff, dt) {
      addSource(x, x0, dt);
      tmp = x0; x0 = x; x = tmp;
      diffuse(0, x, x0, diff, dt);
      tmp = x0; x0 = x; x = tmp;
      advect(0, x, x0, u, v, dt);
    }
    
    let tmp;
    
    function init() {
      u = new Float32Array(size * size);
      v = new Float32Array(size * size);
      u_prev = new Float32Array(size * size);
      v_prev = new Float32Array(size * size);
      dens = new Float32Array(size * size);
      dens_prev = new Float32Array(size * size);
    }
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    function update() {
      // Mouse input
      if (mouseDown) {
        const x = Math.floor(mouseX / width * size);
        const y = Math.floor(mouseY / height * size);
        if (x > 1 && x < size - 1 && y > 1 && y < size - 1) {
          u_prev[IX(x, y)] = mouseVelX * 10;
          v_prev[IX(x, y)] = mouseVelY * 10;
          if (mode === 'rainbow') {
            const hue = (Date.now() * 0.1) % 360;
            for (let dy = -2; dy <= 2; dy++) {
              for (let dx = -2; dx <= 2; dx++) {
                dens_prev[IX(x + dx, y + dy)] = 200;
              }
            }
          } else {
            for (let dy = -2; dy <= 2; dy++) {
              for (let dx = -2; dx <= 2; dx++) {
                dens_prev[IX(x + dx, y + dy)] = 150;
              }
            }
          }
        }
      }
      
      velStep(u, v, u_prev, v_prev, visc, dt);
      densStep(dens, dens_prev, u, v, diff, dt);
      
      // Fade density
      for (let i = 0; i < size * size; i++) {
        dens[i] *= 0.99;
      }
      
      // Clear prev arrays
      u_prev.fill(0);
      v_prev.fill(0);
      dens_prev.fill(0);
    }
    
    function draw() {
      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;
      const scaleX = width / size;
      const scaleY = height / size;
      
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const sx = Math.floor(x / scaleX);
          const sy = Math.floor(y / scaleY);
          const d = dens[IX(sx, sy)] || 0;
          
          let r, g, b;
          if (mode === 'fire') {
            r = Math.min(255, d * 2);
            g = Math.min(255, d * 1.5);
            b = d * 0.5;
          } else if (mode === 'ink') {
            r = g = b = d;
          } else if (mode === 'rainbow') {
            const hue = (d * 2 + Date.now() * 0.05) % 360;
            const s = 80;
            const l = Math.min(50, d * 0.3);
            // Simple HSL to RGB
            const c = (1 - Math.abs(2 * l / 100 - 1)) * s / 100;
            const x2 = c * (1 - Math.abs((hue / 60) % 2 - 1));
            const m = l / 100 - c / 2;
            let r1, g1, b1;
            if (hue < 60) { r1 = c; g1 = x2; b1 = 0; }
            else if (hue < 120) { r1 = x2; g1 = c; b1 = 0; }
            else if (hue < 180) { r1 = 0; g1 = c; b1 = x2; }
            else if (hue < 240) { r1 = 0; g1 = x2; b1 = c; }
            else if (hue < 300) { r1 = x2; g1 = 0; b1 = c; }
            else { r1 = c; g1 = 0; b1 = x2; }
            r = (r1 + m) * 255;
            g = (g1 + m) * 255;
            b = (b1 + m) * 255;
          } else {
            r = g = b = d;
          }
          
          const i = (y * width + x) * 4;
          data[i] = Math.min(255, r + 10);
          data[i + 1] = Math.min(255, g + 10);
          data[i + 2] = Math.min(255, b + 18);
          data[i + 3] = 255;
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
    }
    
    let mouseDown = false;
    let mouseX = 0, mouseY = 0;
    let mouseVelX = 0, mouseVelY = 0;
    let lastMouseX = 0, lastMouseY = 0;
    
    canvas.addEventListener('mousedown', (e) => {
      mouseDown = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      mouseVelX = e.clientX - lastMouseX;
      mouseVelY = e.clientY - lastMouseY;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });
    
    canvas.addEventListener('mouseup', () => mouseDown = false);
    canvas.addEventListener('mouseleave', () => mouseDown = false);
    
    document.getElementById('smoke').onclick = () => mode = 'smoke';
    document.getElementById('ink').onclick = () => mode = 'ink';
    document.getElementById('fire').onclick = () => mode = 'fire';
    document.getElementById('rainbow').onclick = () => mode = 'rainbow';
    document.getElementById('clear').onclick = () => { dens.fill(0); u.fill(0); v.fill(0); };
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    window.addEventListener('resize', resize);
    resize();
    init();
    animate();
  </script>
</body>
</html>
