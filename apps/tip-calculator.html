<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate tips and split bills. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .tip-calc { max-width: 500px; margin: 0 auto; }
  .input-group {
    margin-bottom: 20px;
  }
  .input-group label {
    display: block;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .input-group input {
    width: 100%;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 18px;
    box-sizing: border-box;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .presets {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .preset {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .preset:hover {
    border-color: var(--accent);
  }
  .preset.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .result {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  .result-amount {
    font-size: 36px;
    font-weight: 600;
    color: var(--text);
  }
  .result-label {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .split-control {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .split-btn {
    width: 40px;
    height: 40px;
    border: 2px solid var(--border);
    border-radius: 50%;
    background: var(--bg);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
  }
  .split-btn:hover {
    border-color: var(--accent);
  }
  .split-count {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    min-width: 40px;
    text-align: center;
  }
  .details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
  }
  .detail-item {
    text-align: center;
  }
  .detail-label {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .detail-value {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="tip-calc">
    <h1>Tip Calculator</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Calculate tip and split the bill.</p>
    
    <div class="input-group">
      <label>Bill Amount</label>
      <input type="number" id="billAmount" placeholder="0.00" step="0.01" oninput="calculate()">
    </div>
    
    <div class="input-group">
      <label>Tip Percentage</label>
      <div class="presets">
        <button class="preset" onclick="setTip(10, this)">10%</button>
        <button class="preset active" onclick="setTip(15, this)">15%</button>
        <button class="preset" onclick="setTip(18, this)">18%</button>
        <button class="preset" onclick="setTip(20, this)">20%</button>
        <button class="preset" onclick="setTip(25, this)">25%</button>
      </div>
    </div>
    
    <div class="split-control">
      <button class="split-btn" onclick="changeSplit(-1)">−</button>
      <span class="split-count" id="splitCount">1</span>
      <button class="split-btn" onclick="changeSplit(1)">+</button>
      <span style="color: var(--text-secondary); font-size: 14px;">people</span>
    </div>
    
    <div class="result">
      <div class="result-amount" id="tipAmount">$0.00</div>
      <div class="result-label">tip amount</div>
    </div>
    
    <div class="details">
      <div class="detail-item">
        <div class="detail-label">Total</div>
        <div class="detail-value" id="totalAmount">$0.00</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Per Person</div>
        <div class="detail-value" id="perPerson">$0.00</div>
      </div>
    </div>
  </div>
</div>
<script>
  let tipPercent = 15;
  let split = 1;
  
  function setTip(percent, btn) {
    tipPercent = percent;
    document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calculate();
  }
  
  function changeSplit(delta) {
    split = Math.max(1, split + delta);
    document.getElementById('splitCount').textContent = split;
    calculate();
  }
  
  function calculate() {
    const bill = parseFloat(document.getElementById('billAmount').value) || 0;
    const tip = bill * (tipPercent / 100);
    const total = bill + tip;
    const perPerson = total / split;
    
    document.getElementById('tipAmount').textContent = '$' + tip.toFixed(2);
    document.getElementById('totalAmount').textContent = '$' + total.toFixed(2);
    document.getElementById('perPerson').textContent = '$' + perPerson.toFixed(2);
  }
</script>
</body>
</html>
