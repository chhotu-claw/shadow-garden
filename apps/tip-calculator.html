<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Calculator & Bill Splitter — Shadow's Garden</title>
<meta name="description" content="Calculate tips and split bills with your group. No math required.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --text: #e0e0e0;
    --accent: #00d4aa;
    --accent-dim: #00a88a;
    --muted: #666;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: var(--card);
    padding: 32px;
    border-radius: 16px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 8px 0;
    color: var(--accent);
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .input-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type="number"], input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 1.2rem;
    background: var(--bg);
    border: 2px solid #333;
    border-radius: 8px;
    color: var(--text);
    box-sizing: border-box;
    transition: border-color 0.2s;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .quick-tips {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .tip-btn {
    flex: 1;
    padding: 10px;
    background: var(--bg);
    border: 2px solid #333;
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .tip-btn:hover {
    border-color: var(--accent-dim);
  }
  .tip-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .results {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid #333;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
  }
  .result-row.total {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--accent);
    border-bottom: 1px solid #333;
    margin-bottom: 8px;
    padding-bottom: 16px;
  }
  .result-label {
    color: var(--muted);
  }
  .result-value {
    font-weight: 500;
  }
  .per-person {
    font-size: 1.8rem;
    color: var(--accent);
  }
  .split-note {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    margin-top: 16px;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Tip Calculator</h1>
  <p class="subtitle">Split the bill, not the headache</p>
  
  <div class="input-group">
    <label>Bill Amount</label>
    <input type="number" id="bill" placeholder="0.00" step="0.01" min="0">
  </div>
  
  <div class="input-group">
    <label>Tip Percentage</label>
    <input type="number" id="tipPercent" value="15" step="1" min="0">
    <div class="quick-tips">
      <button class="tip-btn" data-tip="10">10%</button>
      <button class="tip-btn active" data-tip="15">15%</button>
      <button class="tip-btn" data-tip="18">18%</button>
      <button class="tip-btn" data-tip="20">20%</button>
    </div>
  </div>
  
  <div class="input-group">
    <label>Number of People</label>
    <input type="number" id="people" value="1" min="1">
  </div>
  
  <div class="results">
    <div class="result-row total">
      <span class="result-label">Total</span>
      <span class="result-value" id="totalAmount">$0.00</span>
    </div>
    <div class="result-row">
      <span class="result-label">Tip</span>
      <span class="result-value" id="tipAmount">$0.00</span>
    </div>
    <div class="result-row">
      <span class="result-label">Per Person</span>
      <span class="result-value per-person" id="perPerson">$0.00</span>
    </div>
  </div>
  
  <p class="split-note" id="splitNote">Enter bill amount to calculate</p>
</div>

<script>
  const billInput = document.getElementById('bill');
  const tipInput = document.getElementById('tipPercent');
  const peopleInput = document.getElementById('people');
  const tipBtns = document.querySelectorAll('.tip-btn');
  
  const totalDisplay = document.getElementById('totalAmount');
  const tipDisplay = document.getElementById('tipAmount');
  const perPersonDisplay = document.getElementById('perPerson');
  const splitNote = document.getElementById('splitNote');
  
  function formatMoney(amount) {
    return '$' + amount.toFixed(2);
  }
  
  function calculate() {
    const bill = parseFloat(billInput.value) || 0;
    const tipPercent = parseFloat(tipInput.value) || 0;
    const people = parseInt(peopleInput.value) || 1;
    
    const tipAmount = bill * (tipPercent / 100);
    const total = bill + tipAmount;
    const perPerson = people > 0 ? total / people : 0;
    
    tipDisplay.textContent = formatMoney(tipAmount);
    totalDisplay.textContent = formatMoney(total);
    perPersonDisplay.textContent = formatMoney(perPerson);
    
    if (bill > 0 && people > 1) {
      splitNote.textContent = `Split ${people} ways · ${formatMoney(perPerson)} each`;
    } else if (bill > 0) {
      splitNote.textContent = 'Add people to split the bill';
    } else {
      splitNote.textContent = 'Enter bill amount to calculate';
    }
  }
  
  billInput.addEventListener('input', calculate);
  tipInput.addEventListener('input', calculate);
  peopleInput.addEventListener('input', calculate);
  
  tipBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tipBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      tipInput.value = btn.dataset.tip;
      calculate();
    });
  });
  
  // Auto-focus bill input
  billInput.focus();
</script>
</body>
</html>
