<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate tips, split bills, figure out per-person amounts. No math required.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #f59e0b;
    --accent-dark: #d97706;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background: linear-gradient(135deg, #1f1f1f 0%, #2d2d2d 100%);
  }
  .calculator {
    background: #fff;
    border-radius: 1rem;
    padding: 1.5rem;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
  }
  h1 {
    color: #1f1f1f;
    font-size: 1.25rem;
    margin-bottom: 1.25rem;
    text-align: center;
  }
  .input-group {
    margin-bottom: 1rem;
  }
  label {
    display: block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #6b7280;
    margin-bottom: 0.4rem;
  }
  input[type="number"] {
    width: 100%;
    padding: 0.75rem;
    font-size: 1.25rem;
    border: 2px solid #e5e7eb;
    border-radius: 0.5rem;
    font-family: inherit;
    box-sizing: border-box;
    transition: border-color 0.2s;
  }
  input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  .presets {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .presets button {
    flex: 1;
    padding: 0.6rem 0.5rem;
    background: #f3f4f6;
    border: 2px solid transparent;
    border-radius: 0.5rem;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .presets button:hover {
    background: #e5e7eb;
  }
  .presets button.active {
    border-color: var(--accent);
    background: #fef3c7;
    color: var(--accent-dark);
  }
  .split-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .split-row input {
    width: 70px;
    text-align: center;
    font-size: 1rem;
  }
  .split-label {
    color: #6b7280;
    font-size: 0.9rem;
  }
  .results {
    background: #f9fafb;
    border-radius: 0.75rem;
    padding: 1rem;
    margin-top: 1.25rem;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    font-size: 0.95rem;
  }
  .result-row.total {
    border-top: 2px solid #e5e7eb;
    margin-top: 0.5rem;
    padding-top: 0.75rem;
    font-weight: bold;
    font-size: 1.1rem;
  }
  .result-row.per-person {
    color: var(--accent-dark);
  }
  .result-value {
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body data-page-type="app">
<div class="calculator">
  <h1>💸 Tip Calculator</h1>
  
  <div class="input-group">
    <label>Bill Amount</label>
    <input type="number" id="bill" placeholder="0.00" step="0.01" min="0">
  </div>
  
  <div class="input-group">
    <label>Tip %</label>
    <div class="presets">
      <button onclick="setTip(10)">10%</button>
      <button onclick="setTip(15)">15%</button>
      <button onclick="setTip(18)">18%</button>
      <button onclick="setTip(20)">20%</button>
      <button onclick="setTip(25)">25%</button>
    </div>
    <input type="number" id="tipPercent" value="15" min="0" max="100" step="1">
  </div>
  
  <div class="input-group">
    <label>Split Between</label>
    <div class="split-row">
      <input type="number" id="split" value="1" min="1" max="20">
      <span class="split-label">people</span>
    </div>
  </div>
  
  <div class="results">
    <div class="result-row">
      <span>Tip</span>
      <span class="result-value" id="tipAmount">$0.00</span>
    </div>
    <div class="result-row total">
      <span>Total</span>
      <span class="result-value" id="totalAmount">$0.00</span>
    </div>
    <div class="result-row per-person">
      <span>Per Person</span>
      <span class="result-value" id="perPerson">$0.00</span>
    </div>
  </div>
</div>

<script>
const billInput = document.getElementById('bill');
const tipInput = document.getElementById('tipPercent');
const splitInput = document.getElementById('split');
const tipDisplay = document.getElementById('tipAmount');
const totalDisplay = document.getElementById('totalAmount');
const perPersonDisplay = document.getElementById('perPerson');
const presetBtns = document.querySelectorAll('.presets button');

function setTip(percent) {
  tipInput.value = percent;
  presetBtns.forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.textContent) === percent);
  });
  calculate();
}

function calculate() {
  const bill = parseFloat(billInput.value) || 0;
  const tipPercent = parseFloat(tipInput.value) || 0;
  const split = parseInt(splitInput.value) || 1;
  
  const tipAmount = bill * (tipPercent / 100);
  const total = bill + tipAmount;
  const perPerson = total / split;
  
  tipDisplay.textContent = formatMoney(tipAmount);
  totalDisplay.textContent = formatMoney(total);
  perPersonDisplay.textContent = formatMoney(perPerson);
  
  // Save
  localStorage.setItem('tipCalc', JSON.stringify({
    lastTip: tipPercent,
    lastSplit: split
  }));
}

function formatMoney(amount) {
  return '$' + amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

// Load saved
const saved = localStorage.getItem('tipCalc');
if (saved) {
  try {
    const prefs = JSON.parse(saved);
    if (prefs.lastTip) {
      tipInput.value = prefs.lastTip;
      setTip(prefs.lastTip);
    }
    if (prefs.lastSplit) splitInput.value = prefs.lastSplit;
  } catch(e) {}
} else {
  setTip(15);
}

billInput.addEventListener('input', calculate);
tipInput.addEventListener('input', () => {
  presetBtns.forEach(btn => btn.classList.remove('active'));
  calculate();
});
splitInput.addEventListener('input', calculate);

// Auto-focus bill
billInput.focus();
</script>
</body>
</html>
