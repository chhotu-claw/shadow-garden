<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate tips easily — bill amount, tip percentage, split between people. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .calculator { background: var(--bg-secondary); padding: 2rem; border-radius: 16px; width: 100%; max-width: 400px; }
  h1 { margin: 0 0 1.5rem 0; font-size: 1.5rem; text-align: center; }
  .input-group { margin-bottom: 1rem; }
  label { display: block; margin-bottom: 0.5rem; color: var(--fg-muted); font-size: 0.9rem; }
  input[type="number"] { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--fg); font-size: 1.1rem; box-sizing: border-box; }
  input[type="number"]:focus { outline: none; border-color: var(--accent); }
  .presets { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  .presets button { flex: 1; padding: 0.5rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--fg); cursor: pointer; font-size: 0.9rem; }
  .presets button:hover { background: var(--bg-secondary); }
  .presets button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .results { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .result-row { display: flex; justify-content: space-between; margin-bottom: 0.75rem; font-size: 1.1rem; }
  .result-row.total { font-weight: 600; font-size: 1.3rem; margin-top: 1rem; }
  .result-value { color: var(--accent); }
  .split-toggle { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; }
  .split-toggle input { width: auto; }
</style>
</head>
<body data-page-type="app">
  <div class="calculator">
    <h1>Tip Calculator</h1>
    <div class="input-group">
      <label>Bill Amount</label>
      <input type="number" id="bill" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="input-group">
      <label>Tip Percentage</label>
      <input type="number" id="tipPercent" placeholder="15" value="15" min="0" max="100">
      <div class="presets">
        <button data-percent="10">10%</button>
        <button data-percent="15" class="active">15%</button>
        <button data-percent="18">18%</button>
        <button data-percent="20">20%</button>
        <button data-percent="25">25%</button>
      </div>
    </div>
    <div class="split-toggle">
      <input type="checkbox" id="splitEnabled">
      <label for="splitEnabled" style="margin: 0;">Split between</label>
      <input type="number" id="splitCount" value="1" min="1" style="width: 60px;">
      <label>people</label>
    </div>
    <div class="results">
      <div class="result-row">
        <span>Tip Amount</span>
        <span class="result-value" id="tipAmount">$0.00</span>
      </div>
      <div class="result-row total">
        <span>Total</span>
        <span class="result-value" id="totalAmount">$0.00</span>
      </div>
      <div class="result-row" id="perPersonRow" style="display: none;">
        <span style="color: var(--fg-muted);">Per Person</span>
        <span class="result-value" id="perPerson">$0.00</span>
      </div>
    </div>
  </div>
  <script>
    const billInput = document.getElementById('bill');
    const tipInput = document.getElementById('tipPercent');
    const splitEnabled = document.getElementById('splitEnabled');
    const splitCount = document.getElementById('splitCount');
    const tipAmountEl = document.getElementById('tipAmount');
    const totalAmountEl = document.getElementById('totalAmount');
    const perPersonEl = document.getElementById('perPerson');
    const perPersonRow = document.getElementById('perPersonRow');
    const presetButtons = document.querySelectorAll('.presets button');

    function calculate() {
      const bill = parseFloat(billInput.value) || 0;
      const tipPercent = parseFloat(tipInput.value) || 0;
      const split = splitEnabled.checked ? (parseInt(splitCount.value) || 1) : 1;

      const tip = bill * (tipPercent / 100);
      const total = bill + tip;
      const perPerson = split > 0 ? total / split : total;

      tipAmountEl.textContent = '$' + tip.toFixed(2);
      totalAmountEl.textContent = '$' + total.toFixed(2);
      perPersonEl.textContent = '$' + perPerson.toFixed(2);

      perPersonRow.style.display = splitEnabled.checked ? 'flex' : 'none';
    }

    billInput.addEventListener('input', calculate);
    tipInput.addEventListener('input', calculate);
    splitEnabled.addEventListener('change', calculate);
    splitCount.addEventListener('input', calculate);

    presetButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        presetButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tipInput.value = btn.dataset.percent;
        calculate();
      });
    });

    calculate();
  </script>
</body>
</html>
