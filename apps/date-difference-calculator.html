<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Difference Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate the difference between two dates in days, weeks, months, or years.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .calculator-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    max-width: 500px;
    margin: 0 auto;
  }
  .input-row {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .input-row label {
    font-weight: 500;
    color: var(--text-secondary);
  }
  .input-row input[type="date"] {
    padding: 0.75rem;
    font-size: 1rem;
  }
  .quick-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .quick-buttons button {
    padding: 0.5rem 0.75rem;
    font-size: 0.85rem;
  }
  .result-box {
    background: var(--bg-tertiary);
    border-radius: 8px;
    padding: 1.5rem;
    text-align: center;
  }
  .result-value {
    font-size: 2rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .result-detail {
    font-size: 0.9rem;
    color: var(--text-secondary);
  }
  .include-end {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .include-end input {
    width: auto;
  }
  .hero {
    text-align: center;
    padding: 2rem 0;
  }
  .hero h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }
  .hero p {
    color: var(--text-secondary);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="hero">
    <h1>Date Difference Calculator</h1>
    <p>Find the days between two dates</p>
  </div>
  
  <div class="calculator-card">
    <div class="quick-buttons">
      <button onclick="setToday()">Today</button>
      <button onclick="setDaysAgo(7)">7 days ago</button>
      <button onclick="setDaysAgo(30)">30 days ago</button>
      <button onclick="setDaysAgo(90)">90 days ago</button>
      <button onclick="setDaysAgo(365)">1 year ago</button>
    </div>
    
    <div class="input-row">
      <label>From Date</label>
      <input type="date" id="start-date" onchange="calculate()">
    </div>
    
    <div class="input-row">
      <label>To Date</label>
      <input type="date" id="end-date" onchange="calculate()">
    </div>
    
    <div class="include-end">
      <input type="checkbox" id="include-end">
      <label for="include-end">Include end date</label>
    </div>
    
    <div class="result-box">
      <div class="result-value" id="result-days">—</div>
      <div class="result-detail" id="result-detail">Enter two dates to see the difference</div>
    </div>
  </div>
</div>

<script>
  const startInput = document.getElementById('start-date');
  const endInput = document.getElementById('end-date');
  const includeEnd = document.getElementById('include-end');
  
  // Set default dates
  const today = new Date();
  const lastWeek = new Date(today);
  lastWeek.setDate(today.getDate() - 7);
  
  startInput.value = formatDate(lastWeek);
  endInput.value = formatDate(today);
  
  function formatDate(d) {
    return d.toISOString().split('T')[0];
  }
  
  function setToday() {
    endInput.value = formatDate(new Date());
    calculate();
  }
  
  function setDaysAgo(days) {
    const d = new Date();
    d.setDate(d.getDate() - days);
    startInput.value = formatDate(d);
    calculate();
  }
  
  function calculate() {
    const start = new Date(startInput.value);
    const end = new Date(endInput.value);
    const resultDays = document.getElementById('result-days');
    const resultDetail = document.getElementById('result-detail');
    
    if (isNaN(start.getTime()) || isNaN(end.getTime())) {
      resultDays.textContent = '—';
      resultDetail.textContent = 'Enter two dates';
      return;
    }
    
    let diffTime = end - start;
    let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    
    if (includeEnd.checked) {
      diffDays += 1;
    }
    
    diffDays = Math.abs(diffDays);
    
    resultDays.textContent = diffDays + ' day' + (diffDays !== 1 ? 's' : '');
    
    const weeks = (diffDays / 7).toFixed(1);
    const months = (diffDays / 30.44).toFixed(1);
    const years = (diffDays / 365.25).toFixed(2);
    
    let detail = '';
    if (diffDays >= 7) {
      detail += `${weeks} weeks`;
    }
    if (diffDays >= 30) {
      if (detail) detail += ' · ';
      detail += `${months} months`;
    }
    if (diffDays >= 365) {
      if (detail) detail += ' · ';
      detail += `${years} years`;
    }
    
    resultDetail.textContent = detail || `${diffDays * 24} hours`;
  }
  
  includeEnd.addEventListener('change', calculate);
  
  // Initial calculation
  calculate();
</script>
</body>
</html>
