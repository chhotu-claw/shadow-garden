<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Converter — Shadow's Garden</title>
<meta name="description" content="Convert between HEX, RGB, HSL. Pick colors, generate palettes, copy in any format.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-mono); }
  .container { max-width: 640px; }
  .converter { display: grid; gap: 20px; }
  .color-preview {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    border: 2px solid var(--border);
    box-shadow: var(--shadow);
  }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .input-group input {
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
  }
  .input-group input:focus { outline: none; border-color: var(--accent); }
  .formats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .format-btn {
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .format-btn:hover { border-color: var(--accent); }
  .format-btn.copied { background: var(--accent); color: white; }
  .palette { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .palette-color {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s;
  }
  .palette-color:hover { transform: scale(1.1); border-color: var(--text); }
  .palette-label { font-size: 11px; color: var(--text-dim); margin-top: 8px; text-align: center; }
  .picker-row { display: flex; gap: 12px; align-items: center; }
  input[type="color"] {
    width: 48px;
    height: 48px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    padding: 0;
  }
  .history { margin-top: 30px; }
  .history h3 { font-size: 14px; color: var(--text-dim); margin-bottom: 12px; }
  .history-items { display: flex; gap: 8px; flex-wrap: wrap; }
  .history-item {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid var(--border);
  }
  .history-item:hover { border-color: var(--accent); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Color Converter</h1>
  <div class="meta">HEX ↔ RGB ↔ HSL</div>
  
  <div class="converter">
    <div class="color-preview" id="preview"></div>
    
    <div class="picker-row">
      <input type="color" id="picker" value="#6366f1">
      <div class="input-group" style="flex:1">
        <label>HEX</label>
        <input type="text" id="hex" value="#6366f1" placeholder="#000000">
      </div>
    </div>
    
    <div class="formats">
      <div class="input-group">
        <label>RGB</label>
        <input type="text" id="rgb" value="rgb(99, 102, 241)" readonly>
      </div>
      <div class="input-group">
        <label>HSL</label>
        <input type="text" id="hsl" value="hsl(239, 84%, 67%)" readonly>
      </div>
      <div class="input-group">
        <label>CSS Var</label>
        <input type="text" id="cssvar" value="--color: #6366f1" readonly>
      </div>
    </div>
    
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="format-btn" data-copy="hex">Copy HEX</button>
      <button class="format-btn" data-copy="rgb">Copy RGB</button>
      <button class="format-btn" data-copy="hsl">Copy HSL</button>
      <button class="format-btn" data-copy="cssvar">Copy Var</button>
    </div>
    
    <div class="palette">
      <div class="palette-color" style="background:#6366f1" data-color="#6366f1"></div>
      <div class="palette-color" style="background:#ec4899" data-color="#ec4899"></div>
      <div class="palette-color" style="background:#10b981" data-color="#10b981"></div>
      <div class="palette-color" style="background:#f59e0b" data-color="#f59e0b"></div>
      <div class="palette-color" style="background:#3b82f6" data-color="#3b82f6"></div>
      <div class="palette-color" style="background:#8b5cf6" data-color="#8b5cf6"></div>
      <div class="palette-color" style="background:#ef4444" data-color="#ef4444"></div>
      <div class="palette-color" style="background:#06b6d4" data-color="#06b6d4"></div>
    </div>
    <div class="palette-label">Click to select</div>
    
    <div class="history">
      <h3>Recent</h3>
      <div class="history-items" id="history"></div>
    </div>
  </div>
</div>

<script>
const preview = document.getElementById('preview');
const picker = document.getElementById('picker');
const hexInput = document.getElementById('hex');
const rgbInput = document.getElementById('rgb');
const hslInput = document.getElementById('hsl');
const cssvarInput = document.getElementById('cssvar');
const historyDiv = document.getElementById('history');

let history = JSON.parse(localStorage.getItem('colorHistory') || '[]');

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? {
    r: parseInt(result[1], 16),
    g: parseInt(result[2], 16),
    b: parseInt(result[3], 16)
  } : null;
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) {
    h = s = 0;
  } else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
}

function updateAll(hex) {
  if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) return;
  
  const rgb = hexToRgb(hex);
  const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
  
  preview.style.background = hex;
  picker.value = hex;
  hexInput.value = hex;
  rgbInput.value = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
  hslInput.value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
  cssvarInput.value = `--color: ${hex}`;
  
  addToHistory(hex);
}

function addToHistory(hex) {
  if (!history.includes(hex)) {
    history.unshift(hex);
    history = history.slice(0, 12);
    localStorage.setItem('colorHistory', JSON.stringify(history));
    renderHistory();
  }
}

function renderHistory() {
  historyDiv.innerHTML = history.map(h => 
    `<div class="history-item" style="background:${h}" data-color="${h}" title="${h}"></div>`
  ).join('');
}

hexInput.addEventListener('input', (e) => {
  let val = e.target.value.trim();
  if (!val.startsWith('#')) val = '#' + val;
  if (/^#[0-9A-Fa-f]{6}$/.test(val)) updateAll(val);
});

picker.addEventListener('input', (e) => updateAll(e.target.value));

document.querySelectorAll('.palette-color').forEach(el => {
  el.addEventListener('click', () => updateAll(el.dataset.color));
});

document.querySelectorAll('.history-item').forEach(el => {
  el.addEventListener('click', () => updateAll(el.dataset.color));
});

document.querySelectorAll('.format-btn[data-copy]').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.copy;
    const val = type === 'hex' ? hexInput.value :
                type === 'rgb' ? rgbInput.value :
                type === 'hsl' ? hslInput.value : cssvarInput.value;
    navigator.clipboard.writeText(val);
    btn.classList.add('copied');
    btn.textContent = 'Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = 'Copy ' + type.toUpperCase();
    }, 1000);
  });
});

renderHistory();
updateAll('#6366f1');
</script>
</body>
</html>
