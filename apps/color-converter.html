<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Converter — Shadow's Garden</title>
<meta name="description">Convert between HEX, RGB, HSL. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .color-conv { max-width: 600px; margin: 0 auto; }
  .preview {
    height: 120px;
    border: 2px solid var(--border);
    border-radius: 8px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 18px;
  }
  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  .input-group input {
    width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-size: 16px; font-family: var(--mono); box-sizing: border-box;
  }
  .input-group input:focus { outline: none; border-color: var(--accent); }
  .output { display: grid; gap: 12px; }
  .output-item {
    display: flex; justify-content: space-between; align-items: center; padding: 12px;
    background: var(--bg); border: 2px solid var(--border); border-radius: 8px;
  }
  .output-label { font-size: 14px; color: var(--text-secondary); }
  .output-value { font-family: var(--mono); font-size: 14px; color: var(--text); }
  .copy-btn {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); color: var(--text); font-size: 12px; cursor: pointer;
  }
  .copy-btn:hover { border-color: var(--accent); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="color-conv">
    <h1>Color Converter</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Convert between HEX, RGB, HSL.</p>
    
    <div class="preview" id="preview" style="background: #6cb6ff;">#6cb6ff</div>
    
    <div class="input-group">
      <label>Enter a color (HEX, RGB, or HSL)</label>
      <input type="text" id="input" placeholder="#6cb6ff" oninput="convert()">
    </div>
    
    <div class="output">
      <div class="output-item"><span class="output-label">HEX</span><span class="output-value" id="hex">#6cb6ff</span><button class="copy-btn" onclick="copy('hex')">Copy</button></div>
      <div class="output-item"><span class="output-label">RGB</span><span class="output-value" id="rgb">rgb(108, 182, 255)</span><button class="copy-btn" onclick="copy('rgb')">Copy</button></div>
      <div class="output-item"><span class="output-label">HSL</span><span class="output-value" id="hsl">hsl(207, 100%, 71%)</span><button class="copy-btn" onclick="copy('hsl')">Copy</button></div>
    </div>
  </div>
</div>
<script>
  function convert() {
    const input = document.getElementById('input').value.trim();
    const preview = document.getElementById('preview');
    
    if (!input) return;
    
    // Try to create a color from input
    const ctx = document.createElement('canvas').getContext('2d');
    ctx.fillStyle = input;
    const computed = ctx.fillStyle;
    
    if (computed === '#000000' && input.toLowerCase() !== '#000000' && !input.startsWith('rgb')) {
      // Failed to parse
      return;
    }
    
    // Parse the computed color
    const r = parseInt(computed.slice(1, 3), 16);
    const g = parseInt(computed.slice(3, 5), 16);
    const b = parseInt(computed.slice(5, 7), 16);
    
    // Update preview
    preview.style.background = computed;
    preview.textContent = computed;
    
    // HEX
    document.getElementById('hex').textContent = computed;
    
    // RGB
    document.getElementById('rgb').textContent = `rgb(${r}, ${g}, ${b})`;
    
    // HSL
    const rNorm = r / 255, gNorm = g / 255, bNorm = b / 255;
    const max = Math.max(rNorm, gNorm, bNorm), min = Math.min(rNorm, gNorm, bNorm);
    let h = 0, s = 0, l = (max + min) / 2;
    
    if (max !== min) {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case rNorm: h = ((gNorm - bNorm) / d + (gNorm < bNorm ? 6 : 0)) / 6; break;
        case gNorm: h = ((bNorm - rNorm) / d + 2) / 6; break;
        case bNorm: h = ((rNorm - gNorm) / d + 4) / 6; break;
      }
    }
    
    h = Math.round(h * 360);
    s = Math.round(s * 100);
    l = Math.round(l * 100);
    
    document.getElementById('hsl').textContent = `hsl(${h}, ${s}%, ${l}%)`;
  }
  
  function copy(id) {
    const val = document.getElementById(id).textContent;
    navigator.clipboard.writeText(val).then(() => {
      event.target.textContent = 'Copied!';
      setTimeout(() => event.target.textContent = 'Copy', 1500);
    });
  }
</script>
</body>
</html>
