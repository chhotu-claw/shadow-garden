<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Converter — Shadow's Garden</title>
<meta name="description" content="Convert colors between HEX, RGB, and HSL formats with instant preview">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .converter {
    max-width: 500px;
    margin: 0 auto;
    padding: 2rem;
  }
  .color-preview {
    height: 120px;
    border-radius: 12px;
    margin-bottom: 1.5rem;
    border: 2px solid var(--border, #313244);
    transition: background-color 0.2s;
  }
  .format-group {
    margin-bottom: 1.25rem;
  }
  .format-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .format-label span {
    font-size: 0.85rem;
    color: var(--text-secondary, #a6adc8);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .input-row {
    display: flex;
    gap: 0.5rem;
  }
  input[type="text"], input[type="number"] {
    flex: 1;
    padding: 0.75rem;
    border: 1px solid var(--border, #313244);
    border-radius: 8px;
    background: var(--input-bg, #11111b);
    color: var(--text, #cdd6f4);
    font-size: 1rem;
    font-family: 'Fira Code', monospace;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    outline: none;
    border-color: var(--accent, #cba6f7);
  }
  .copy-btn {
    padding: 0 1rem;
    background: var(--button-bg, #313244);
    color: var(--text, #cdd6f4);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.2s;
  }
  .copy-btn:hover {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .copy-btn.copied {
    background: #a6e3a1;
    color: #11111b;
  }
  .sliders {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border, #313244);
  }
  .slider-group {
    margin-bottom: 1rem;
  }
  .slider-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.4rem;
    font-size: 0.85rem;
    color: var(--text-secondary, #a6adc8);
  }
  input[type="range"] {
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: var(--border, #313244);
    -webkit-appearance: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent, #cba6f7);
    cursor: pointer;
  }
  .picker-btn {
    width: 100%;
    padding: 0.875rem;
    margin-top: 1rem;
    background: var(--button-bg, #313244);
    color: var(--text, #cdd6f4);
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .picker-btn:hover {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .history {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border, #313244);
  }
  .history-title {
    font-size: 0.9rem;
    color: var(--text-secondary, #a6adc8);
    margin-bottom: 0.75rem;
  }
  .history-colors {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .history-swatch {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid var(--border, #313244);
    transition: transform 0.1s;
  }
  .history-swatch:hover {
    transform: scale(1.1);
  }
</style>
</head>
<body data-page-type="app">
<div class="converter">
  <h1>🎨 Color Converter</h1>
  
  <div class="color-preview" id="preview"></div>

  <div class="format-group">
    <div class="format-label">
      <span>HEX</span>
    </div>
    <div class="input-row">
      <input type="text" id="hex-input" placeholder="#cba6f7" value="#cba6f7">
      <button class="copy-btn" onclick="copyToClipboard('hex-input')">Copy</button>
    </div>
  </div>

  <div class="format-group">
    <div class="format-label">
      <span>RGB</span>
    </div>
    <div class="input-row">
      <input type="text" id="rgb-input" placeholder="rgb(203, 166, 247)">
      <button class="copy-btn" onclick="copyToClipboard('rgb-input')">Copy</button>
    </div>
  </div>

  <div class="format-group">
    <div class="format-label">
      <span>HSL</span>
    </div>
    <div class="input-row">
      <input type="text" id="hsl-input" placeholder="hsl(271, 89%, 81%)">
      <button class="copy-btn" onclick="copyToClipboard('hsl-input')">Copy</button>
    </div>
  </div>

  <div class="sliders">
    <div class="slider-group">
      <div class="slider-label"><span>Hue</span><span id="hue-val">271°</span></div>
      <input type="range" id="hue-slider" min="0" max="360" value="271">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Saturation</span><span id="sat-val">89%</span></div>
      <input type="range" id="sat-slider" min="0" max="100" value="89">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Lightness</span><span id="light-val">81%</span></div>
      <input type="range" id="light-slider" min="0" max="100" value="81">
    </div>
  </div>

  <button class="picker-btn" onclick="openPicker()">🎯 Open Color Picker</button>

  <div class="history">
    <div class="history-title">Recent Colors</div>
    <div class="history-colors" id="history"></div>
  </div>
</div>

<script>
  let currentColor = { h: 271, s: 89, l: 81 };
  let history = JSON.parse(localStorage.getItem('colorHistory') || '[]');

  const hexInput = document.getElementById('hex-input');
  const rgbInput = document.getElementById('rgb-input');
  const hslInput = document.getElementById('hsl-input');
  const preview = document.getElementById('preview');

  function hslToRgb(h, s, l) {
    s /= 100; l /= 100;
    const k = n => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
    return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
  }

  function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;
    if (max === min) {
      h = s = 0;
    } else {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
        case g: h = ((b - r) / d + 2) / 6; break;
        case b: h = ((r - g) / d + 4) / 6; break;
      }
    }
    return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
  }

  function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
  }

  function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? [parseInt(result[1], 16), parseInt(result[2], 16), parseInt(result[3], 16)] : null;
  }

  function updateAll(source) {
    if (source === 'hex') {
      const rgb = hexToRgb(hexInput.value);
      if (rgb) {
        const hsl = rgbToHsl(...rgb);
        currentColor = { h: hsl[0], s: hsl[1], l: hsl[2] };
        rgbInput.value = `rgb(${rgb.join(', ')})`;
        hslInput.value = `hsl(${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%)`;
      }
    } else if (source === 'rgb') {
      const match = rgbInput.value.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
      if (match) {
        const rgb = [parseInt(match[1]), parseInt(match[2]), parseInt(match[3])];
        const hsl = rgbToHsl(...rgb);
        currentColor = { h: hsl[0], s: hsl[1], l: hsl[2] };
        hexInput.value = rgbToHex(...rgb);
        hslInput.value = `hsl(${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%)`;
      }
    } else if (source === 'hsl') {
      const match = hslInput.value.match(/hsl\s*\(\s*(\d+)\s*,\s*(\d+)%?\s*,\s*(\d+)%?\s*\)/);
      if (match) {
        currentColor = { h: parseInt(match[1]), s: parseInt(match[2]), l: parseInt(match[3]) };
        const rgb = hslToRgb(currentColor.h, currentColor.s, currentColor.l);
        hexInput.value = rgbToHex(...rgb);
        rgbInput.value = `rgb(${rgb.join(', ')})`;
      }
    } else if (source === 'slider') {
      const rgb = hslToRgb(currentColor.h, currentColor.s, currentColor.l);
      hexInput.value = rgbToHex(...rgb);
      rgbInput.value = `rgb(${rgb.join(', ')})`;
      hslInput.value = `hsl(${currentColor.h}, ${currentColor.s}%, ${currentColor.l}%)`;
    }

    preview.style.backgroundColor = hexInput.value;
    document.getElementById('hue-slider').value = currentColor.h;
    document.getElementById('sat-slider').value = currentColor.s;
    document.getElementById('light-slider').value = currentColor.l;
    document.getElementById('hue-val').textContent = currentColor.h + '°';
    document.getElementById('sat-val').textContent = currentColor.s + '%';
    document.getElementById('light-val').textContent = currentColor.l + '%';
  }

  function copyToClipboard(id) {
    const input = document.getElementById(id);
    navigator.clipboard.writeText(input.value);
    const btn = input.nextElementSibling;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 1500);
  }

  function openPicker() {
    const input = document.createElement('input');
    input.type = 'color';
    input.value = hexInput.value;
    input.onchange = (e) => {
      hexInput.value = e.target.value;
      updateAll('hex');
      addToHistory(e.target.value);
    };
    input.click();
  }

  function addToHistory(hex) {
    if (!history.includes(hex)) {
      history.unshift(hex);
      if (history.length > 12) history.pop();
      localStorage.setItem('colorHistory', JSON.stringify(history));
      renderHistory();
    }
  }

  function renderHistory() {
    const container = document.getElementById('history');
    container.innerHTML = history.map(hex => 
      `<div class="history-swatch" style="background:${hex}" onclick="hexInput.value='${hex}';updateAll('hex');addToHistory('${hex}')" title="${hex}"></div>`
    ).join('');
  }

  hexInput.addEventListener('input', () => updateAll('hex'));
  rgbInput.addEventListener('input', () => updateAll('rgb'));
  hslInput.addEventListener('input', () => updateAll('hsl'));

  document.getElementById('hue-slider').addEventListener('input', (e) => {
    currentColor.h = parseInt(e.target.value);
    updateAll('slider');
  });
  document.getElementById('sat-slider').addEventListener('input', (e) => {
    currentColor.s = parseInt(e.target.value);
    updateAll('slider');
  });
  document.getElementById('light-slider').addEventListener('input', (e) => {
    currentColor.l = parseInt(e.target.value);
    updateAll('slider');
  });

  // Init
  updateAll('hex');
  renderHistory();
  preview.style.backgroundColor = hexInput.value;
</script>
</body>
</html>
