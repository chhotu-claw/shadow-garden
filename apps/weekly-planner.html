<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner — Shadow's Garden</title>
<meta name="description" content="A simple weekly planner to plan your week. Local-first, no accounts, just planning.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-body, system-ui, sans-serif); }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 20px; }
  .day { background: var(--bg-card, #fff); border: 1px solid var(--border, #ddd); border-radius: 8px; padding: 12px; min-height: 200px; }
  .day-header { font-weight: 600; font-size: 14px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border, #ddd); }
  .day.today .day-header { color: var(--accent, #0066cc); }
  .day-name { text-transform: uppercase; letter-spacing: 0.5px; }
  .day-date { font-size: 12px; color: #666; font-weight: normal; margin-top: 2px; }
  .task { background: var(--bg-hover, #f5f5f5); padding: 6px 8px; border-radius: 4px; font-size: 13px; margin-bottom: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .task:hover { background: var(--accent, #0066cc); color: white; }
  .task .delete { opacity: 0; font-size: 14px; padding: 2px 6px; }
  .task:hover .delete { opacity: 1; }
  .add-task { width: 100%; padding: 6px; font-size: 13px; border: 1px dashed var(--border, #ddd); background: transparent; border-radius: 4px; cursor: pointer; }
  .add-task:hover { border-color: var(--accent, #0066cc); color: var(--accent, #0066cc); }
  .empty-msg { color: #999; font-size: 12px; font-style: italic; }
  h1 { margin-bottom: 4px; }
  .subtitle { color: #666; margin-bottom: 20px; }
  @media (max-width: 768px) {
    .week-grid { grid-template-columns: 1fr; }
    .day { min-height: auto; }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container" style="max-width: 1200px;">
    <h1>Weekly Planner</h1>
    <p class="subtitle">Plan your week. Auto-saves to your browser.</p>
    
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <script>
    const weekGrid = document.getElementById('weekGrid');
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    
    function getWeekDates() {
      const today = new Date();
      const dayOfWeek = today.getDay();
      const startOfWeek = new Date(today);
      startOfWeek.setDate(today.getDate() - dayOfWeek);
      
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(startOfWeek);
        d.setDate(startOfWeek.getDate() + i);
        dates.push(d);
      }
      return dates;
    }
    
    function loadTasks() {
      const stored = localStorage.getItem('weekly-planner-tasks');
      return stored ? JSON.parse(stored) : {};
    }
    
    function saveTasks(tasks) {
      localStorage.setItem('weekly-planner-tasks', JSON.stringify(tasks));
    }
    
    function render() {
      const dates = getWeekDates();
      const tasks = loadTasks();
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      weekGrid.innerHTML = '';
      
      dates.forEach((date, idx) => {
        const dateKey = date.toISOString().split('T')[0];
        const isToday = date.getTime() === today.getTime();
        const dayTasks = tasks[dateKey] || [];
        
        const dayEl = document.createElement('div');
        dayEl.className = 'day' + (isToday ? ' today' : '');
        dayEl.innerHTML = `
          <div class="day-header">
            <div class="day-name">${days[idx]}</div>
            <div class="day-date">${date.getMonth() + 1}/${date.getDate()}</div>
          </div>
          <div class="tasks-list">
            ${dayTasks.length === 0 ? '<div class="empty-msg">No tasks</div>' : ''}
            ${dayTasks.map((t, i) => `
              <div class="task" data-date="${dateKey}" data-idx="${i}">
                <span>${escapeHtml(t)}</span>
                <span class="delete" onclick="deleteTask('${dateKey}', ${i})">×</span>
              </div>
            `).join('')}
          </div>
          <input type="text" class="add-task" placeholder="+ Add task" 
            onkeydown="if(event.key==='Enter'){addTask('${dateKey}', this.value);this.value='';}">
        `;
        
        weekGrid.appendChild(dayEl);
      });
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function addTask(dateKey, text) {
      text = text.trim();
      if (!text) return;
      
      const tasks = loadTasks();
      if (!tasks[dateKey]) tasks[dateKey] = [];
      tasks[dateKey].push(text);
      saveTasks(tasks);
      render();
    }
    
    window.deleteTask = function(dateKey, idx) {
      const tasks = loadTasks();
      if (tasks[dateKey]) {
        tasks[dateKey].splice(idx, 1);
        if (tasks[dateKey].length === 0) delete tasks[dateKey];
        saveTasks(tasks);
        render();
      }
    };
    
    render();
  </script>
</body>
</html>
