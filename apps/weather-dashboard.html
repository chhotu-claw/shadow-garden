<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard — Shadow's Garden</title>
<meta name="description" content="Current weather and 3-day forecast for any city. No signup, no API key, just weather.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0d1117;
    --fg: #c9d1d9;
    --accent: #58a6ff;
    --border: #30363d;
    --card-bg: #161b22;
    --sunny: #ffa657;
    --cloudy: #8b949e;
    --rainy: #58a6ff;
    --stormy: #a371f7;
    --snow: #7ee787;
  }
  .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; }
  
  .search-box { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
  #cityInput { flex: 1; padding: 0.75rem 1rem; background: var(--card-bg); border: 2px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 1rem; }
  #cityInput:focus { outline: none; border-color: var(--accent); }
  #searchBtn { padding: 0.75rem 1.5rem; background: var(--accent); border: none; border-radius: 8px; color: #0d1117; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  #searchBtn:hover { opacity: 0.9; }
  #searchBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
  .preset-btn { padding: 0.4rem 0.8rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; color: #8b949e; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
  .preset-btn:hover { background: #21262d; color: var(--fg); }
  
  .weather-card { background: var(--card-bg); borderpx solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .current-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
  .weather-icon { font-size: 3rem; line-height: 1; }
  .current-temp { font-size: 3rem; font-weight: 700; color: var(--fg); }
  .current-temp sup { font-size: 1.5rem; color: #8b949e; }
  .current-desc { font-size: 1.1rem; color: #8b949e; margin-left: auto; text-align: right; }
  .current-city { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.25rem; }
  .current-update { font-size: 0.8rem; color: #8b949e; }
  
  .details { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 1rem; }
  .detail { text-align: center; padding: 0.75rem; background: #21262d; border-radius: 8px; }
  .detail-value { font-size: 1.1rem; font-weight: 600; color: var(--fg); }
  .detail-label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; margin-top: 0.25rem; }
  
  .forecast { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
  .forecast-day { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
  .forecast-date { font-size: 0.85rem; color: #8b949e; margin-bottom: 0.5rem; }
  .forecast-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
  .forecast-temp { font-weight: 600; color: var(--fg); }
  .forecast-temp span { color: #8b949e; font-weight: 400; }
  .forecast-desc { font-size: 0.8rem; color: #8b949e; margin-top: 0.25rem; }
  
  .loading { text-align: center; padding: 3rem; color: #8b949e; }
  .error { background: rgba(248, 81, 73, 0.1); border: 1px solid #f85149; border-radius: 8px; padding: 1rem; color: #f85149; text-align: center; }
  
  @media (max-width: 500px) {
    .forecast { grid-template-columns: 1fr; }
    .current-header { flex-wrap: wrap; }
    .current-desc { width: 100%; text-align: left; margin-left: 0; margin-top: 0.5rem; }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Weather Dashboard</h1>
    <p class="subtitle">Current conditions and 3-day forecast for any city</p>
    
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
      <button id="searchBtn">Get Weather</button>
    </div>
    
    <div class="presets">
      <button class="preset-btn" data-city="Dubai">Dubai</button>
      <button class="preset-btn" data-city="London">London</button>
      <button class="preset-btn" data-city="New York">New York</button>
      <button class="preset-btn" data-city="Tokyo">Tokyo</button>
      <button class="preset-btn" data-city="Sydney">Sydney</button>
      <button class="preset-btn" data-city="Singapore">Singapore</button>
      <button class="preset-btn" data-city="Paris">Paris</button>
      <button class="preset-btn" data-city="Mumbai">Mumbai</button>
    </div>
    
    <div id="weatherContainer">
      <div class="weather-card">
        <div class="current-header">
          <div class="weather-icon">☀️</div>
          <div>
            <div class="current-city">Dubai</div>
            <div class="current-update">Updated just now</div>
          </div>
          <div class="current-temp">28<sup>°C</sup></div>
          <div class="current-desc">Sunny<br>Feels like 30°C</div>
        </div>
        <div class="details">
          <div class="detail">
            <div class="detail-value" id="humidity">45%</div>
            <div class="detail-label">Humidity</div>
          </div>
          <div class="detail">
            <div class="detail-value" id="wind">15 km/h</div>
            <div class="detail-label">Wind</div>
          </div>
          <div class="detail">
            <div class="detail-value" id="uv">6</div>
            <div class="detail-label">UV Index</div>
          </div>
          <div class="detail">
            <div class="detail-value" id="pressure">1013</div>
            <div class="detail-label">Pressure hPa</div>
          </div>
        </div>
      </div>
      
      <div class="forecast" id="forecast">
        <div class="forecast-day">
          <div class="forecast-date">Tomorrow</div>
          <div class="forecast-icon">⛅</div>
          <div class="forecast-temp">30<span>°</span> / 24<span>°</span></div>
          <div class="forecast-desc">Partly cloudy</div>
        </div>
        <div class="forecast-day">
          <div class="forecast-date">Thu</div>
          <div class="forecast-icon">☀️</div>
          <div class="forecast-temp">32<span>°</span> / 25<span>°</span></div>
          <div class="forecast-desc">Sunny</div>
        </div>
        <div class="forecast-day">
          <div class="forecast-date">Fri</div>
          <div class="forecast-icon">☀️</div>
          <div class="forecast-temp">33<span>°</span> / 26<span>°</span></div>
          <div class="forecast-desc">Sunny</div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const weatherContainer = document.getElementById('weatherContainer');
    
    const icons = {
      'sunny': '☀️', 'clear': '🌙', 'partly-cloudy': '⛅', 'cloudy': '☁️',
      'overcast': '☁️', 'mist': '🌫️', 'fog': '🌫️', 'rain': '🌧️',
      'light-rain': '🌦️', 'heavy-rain': '🌧️', 'thunderstorm': '⛈️',
      'snow': '🌨️', 'sleet': '🌨️', 'wind': '💨'
    };
    
    function getIcon(desc) {
      const d = desc.toLowerCase();
      if (d.includes('sun') || d.includes('clear')) return icons.sunny;
      if (d.includes('night')) return icons.clear;
      if (d.includes('partly')) return icons.partly-cloudy;
      if (d.includes('overcast')) return icons.overcast;
      if (d.includes('mist') || d.includes('fog')) return icons.mist;
      if (d.includes('thunder')) return icons.thunderstorm;
      if (d.includes('snow')) return icons.snow;
      if (d.includes('sleet')) return icons.sleet;
      if (d.includes('rain')) return icons.rain;
      return icons.cloudy;
    }
    
    async function fetchWeather(city) {
      searchBtn.disabled = true;
      searchBtn.textContent = 'Loading...';
      weatherContainer.innerHTML = '<div class="loading">Fetching weather data...</div>';
      
      try {
        const encodedCity = encodeURIComponent(city);
        const response = await fetch(`https://wttr.in/${encodedCity}?format=j1`);
        
        if (!response.ok) throw new Error('City not found');
        
        const data = await response.json();
        const current = data.current_condition[0];
        const today = data.weather[0];
        
        // Parse current conditions
        const tempC = current.temp_C;
        const feelsLike = current.FeelsLikeC;
        const desc = current.weatherDesc[0].value;
        const humidity = current.humidity;
        const wind = current.windspeedKmph;
        const uv = current.uvIndex || '0';
        const pressure = current.pressure;
        
        // Build forecast
        let forecastHTML = '';
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        
        for (let i = 1; i <= 3; i++) {
          const day = new Date();
          day.setDate(day.getDate() + i);
          const dayName = i === 1 ? 'Tomorrow' : days[day.getDay()];
          const dayData = data.weather[i];
          
          if (dayData) {
            const maxTemp = dayData.maxtempC;
            const minTemp = dayData.mintempC;
            const dayDesc = dayData.hourly[4]?.weatherDesc?.[0]?.value || 'Clear';
            const icon = getIcon(dayDesc);
            
            forecastHTML += `
              <div class="forecast-day">
                <div class="forecast-date">${dayName}</div>
                <div class="forecast-icon">${icon}</div>
                <div class="forecast-temp">${maxTemp}<span>°</span> / ${minTemp}<span>°</span></div>
                <div class="forecast-desc">${dayDesc}</div>
              </div>
            `;
          }
        }
        
        // Render
        const icon = getIcon(desc);
        weatherContainer.innerHTML = `
          <div class="weather-card">
            <div class="current-header">
              <div class="weather-icon">${icon}</div>
              <div>
                <div class="current-city">${city}</div>
                <div class="current-update">Updated just now</div>
              </div>
              <div class="current-temp">${tempC}<sup>°C</sup></div>
              <div class="current-desc">${desc}<br>Feels like ${feelsLike}°C</div>
            </div>
            <div class="details">
              <div class="detail">
                <div class="detail-value">${humidity}%</div>
                <div class="detail-label">Humidity</div>
              </div>
              <div class="detail">
                <div class="detail-value">${wind} km/h</div>
                <div class="detail-label">Wind</div>
              </div>
              <div class="detail">
                <div class="detail-value">${uv}</div>
                <div class="detail-label">UV Index</div>
              </div>
              <div class="detail">
                <div class="detail-value">${pressure}</div>
                <div class="detail-label">Pressure hPa</div>
              </div>
            </div>
          </div>
          <div class="forecast">${forecastHTML}</div>
        `;
        
        // Save to localStorage
        localStorage.setItem('lastCity', city);
        
      } catch (err) {
        weatherContainer.innerHTML = `<div class="error">${err.message === 'City not found' ? 'City not found. Try a different name.' : 'Failed to fetch weather. Check your connection.'}</div>`;
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = 'Get Weather';
      }
    }
    
    // Event listeners
    searchBtn.addEventListener('click', () => {
      const city = cityInput.value.trim();
      if (city) fetchWeather(city);
    });
    
    cityInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const city = cityInput.value.trim();
        if (city) fetchWeather(city);
      }
    });
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const city = btn.dataset.city;
        cityInput.value = city;
        fetchWeather(city);
      });
    });
    
    // Load last city
    const lastCity = localStorage.getItem('lastCity');
    if (lastCity) {
      cityInput.value = lastCity;
      fetchWeather(lastCity);
    } else {
      fetchWeather('Dubai');
    }
  </script>
</body>
</html>
