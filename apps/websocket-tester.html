<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebSocket Tester — Shadow's Garden</title>
<meta name="description" content="Test WebSocket connections: connect, send messages, view real-time responses. No account needed.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }
  
  .connection-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  
  .url-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  input[type="text"], input[type="url"] {
    flex: 1;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-input);
    color: var(--text);
    font-family: monospace;
    font-size: 0.9rem;
  }
  input:focus { outline: 2px solid var(--primary); outline-offset: -2px; }
  
  button {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-connect { background: var(--primary); color: white; }
  .btn-connect:hover { opacity: 0.9; }
  .btn-connect:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-disconnect { background: var(--danger); color: white; }
  .btn-send { background: var(--success); color: white; }
  
  .status-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    background: var(--bg);
    border-radius: 6px;
    margin-bottom: 1rem;
  }
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .status-dot.connected { background: #22c55e; }
  .status-dot.connecting { background: #f59e0b; }
  .status-dot.error { background: var(--danger); }
  .status-text { font-size: 0.85rem; color: var(--text-muted); }
  
  .message-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  
  .panel-header {
    padding: 0.75rem 1rem;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.85rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .message-count {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: normal;
  }
  
  .message-list {
    height: 350px;
    overflow-y: auto;
    padding: 0.5rem;
  }
  
  .message {
    padding: 0.5rem 0.75rem;
    margin-bottom: 0.5rem;
    border-radius: 4px;
    font-family: monospace;
    font-size: 0.8rem;
    word-break: break-all;
    background: var(--bg);
    border-left: 3px solid var(--primary);
  }
  
  .message.sent {
    border-left-color: var(--success);
    background: rgba(34, 197, 94, 0.1);
  }
  
  .message.received {
    border-left-color: var(--secondary);
    background: rgba(99, 102, 241, 0.1);
  }
  
  .message .meta {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-bottom: 0.25rem;
  }
  
  .send-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    margin-top: 1.5rem;
  }
  
  .send-row { display: flex; gap: 0.5rem; }
  textarea {
    flex: 1;
    min-height: 80px;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-input);
    color: var(--text);
    font-family: monospace;
    font-size: 0.9rem;
    resize: vertical;
  }
  
  .clear-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
  }
  .clear-btn:hover { background: var(--bg); }
  
  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 2rem;
    font-size: 0.85rem;
  }
  
  @media (max-width: 700px) {
    .message-panel { grid-template-columns: 1fr; }
    .url-row { flex-wrap: wrap; }
    .url-row input { min-width: 100%; }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>WebSocket Tester</h1>
    <p class="subtitle">Connect to WebSocket servers, send messages, inspect responses in real-time.</p>
    
    <div class="connection-panel">
      <div class="url-row">
        <input type="url" id="wsUrl" placeholder="wss://example.com/socket" value="wss://echo.websocket.org">
        <button class="btn-connect" id="connectBtn" onclick="toggleConnection()">Connect</button>
      </div>
      <div class="status-bar">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Disconnected</span>
      </div>
    </div>
    
    <div class="message-panel">
      <div class="panel">
        <div class="panel-header">
          <span>Sent Messages</span>
          <span class="message-count" id="sentCount">0</span>
        </div>
        <div class="message-list" id="sentMessages">
          <div class="empty-state">No messages sent yet</div>
        </div>
      </div>
      
      <div class="panel">
        <div class="panel-header">
          <span>Received Messages</span>
          <span class="message-count" id="receivedCount">0</span>
        </div>
        <div class="message-list" id="receivedMessages">
          <div class="empty-state">No messages received yet</div>
        </div>
      </div>
    </div>
    
    <div class="send-panel">
      <div class="send-row">
        <textarea id="messageInput" placeholder='{"type": "ping"}'></textarea>
        <button class="btn-send" onclick="sendMessage()" id="sendBtn" disabled>Send</button>
      </div>
    </div>
  </div>

  <script>
    let socket = null;
    let sentCount = 0;
    let receivedCount = 0;
    
    const wsUrlInput = document.getElementById('wsUrl');
    const connectBtn = document.getElementById('connectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const messageInput = document.getElementById('messageInput');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const sentMessages = document.getElementById('sentMessages');
    const receivedMessages = document.getElementById('receivedMessages');
    const sentCountEl = document.getElementById('sentCount');
    const receivedCountEl = document.getElementById('receivedCount');
    
    function updateStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
    }
    
    function toggleConnection() {
      if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
        socket.close();
      } else {
        connect();
      }
    }
    
    function connect() {
      const url = wsUrlInput.value.trim();
      if (!url) return;
      
      try {
        socket = new WebSocket(url);
        updateStatus('connecting', 'Connecting...');
        connectBtn.textContent = 'Connecting...';
        connectBtn.disabled = true;
        
        socket.onopen = () => {
          updateStatus('connected', 'Connected');
          connectBtn.textContent = 'Disconnect';
          connectBtn.disabled = false;
          connectBtn.className = 'btn-disconnect';
          sendBtn.disabled = false;
        };
        
        socket.onmessage = (event) => {
          receivedCount++;
          receivedCountEl.textContent = receivedCount;
          
          if (receivedCount === 1) {
            receivedMessages.innerHTML = '';
          }
          
          const msgDiv = document.createElement('div');
          msgDiv.className = 'message received';
          msgDiv.innerHTML = `<div class="meta">${new Date().toLocaleTimeString()}</div>${escapeHtml(event.data)}`;
          receivedMessages.insertBefore(msgDiv, receivedMessages.firstChild);
        };
        
        socket.onclose = (event) => {
          updateStatus('', 'Disconnected');
          connectBtn.textContent = 'Connect';
          connectBtn.disabled = false;
          connectBtn.className = 'btn-connect';
          sendBtn.disabled = true;
        };
        
        socket.onerror = () => {
          updateStatus('error', 'Connection error');
          connectBtn.textContent = 'Connect';
          connectBtn.disabled = false;
          connectBtn.className = 'btn-connect';
        };
        
      } catch (e) {
        updateStatus('error', 'Invalid URL');
      }
    }
    
    function sendMessage() {
      const msg = messageInput.value;
      if (!socket || socket.readyState !== WebSocket.OPEN || !msg) return;
      
      socket.send(msg);
      sentCount++;
      sentCountEl.textContent = sentCount;
      
      if (sentCount === 1) {
        sentMessages.innerHTML = '';
      }
      
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message sent';
      msgDiv.innerHTML = `<div class="meta">${new Date().toLocaleTimeString()}</div>${escapeHtml(msg)}`;
      sentMessages.insertBefore(msgDiv, sentMessages.firstChild);
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        sendMessage();
      }
    });
  </script>
</body>
</html>
