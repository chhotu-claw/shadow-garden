<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timestamp Converter — Shadow's Garden</title>
<meta name="description" content="Convert Unix timestamps to human dates and vice versa. Now, then, or any point in between.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .converter {
    max-width: 600px;
    margin: 0 auto;
  }
  .panel {
    background: var(--card-bg, #1a1a1a);
    border: 1px solid var(--border, #333);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .panel h2 {
    margin: 0 0 16px 0;
    font-size: 1.1rem;
    color: var(--text-muted, #888);
  }
  label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.9rem;
    color: var(--text-muted, #888);
  }
  input[type="text"],
  input[type="number"],
  input[type="datetime-local"] {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    font-family: var(--font-mono, monospace);
    background: var(--bg, #111);
    border: 1px solid var(--border, #333);
    border-radius: 6px;
    color: var(--text, #eee);
    box-sizing: border-box;
  }
  input:focus {
    outline: none;
    border-color: var(--accent, #646cff);
  }
  .result {
    margin-top: 12px;
    padding: 12px;
    background: var(--bg, #111);
    border-radius: 6px;
    font-family: var(--font-mono, monospace);
    word-break: break-all;
  }
  .result-label {
    font-size: 0.8rem;
    color: var(--text-muted, #666);
    margin-bottom: 4px;
  }
  .copy-btn {
    margin-top: 8px;
    padding: 8px 16px;
    font-size: 0.85rem;
    background: var(--accent, #646cff);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  .copy-btn:hover {
    background: var(--accent-hover, #535bf2);
  }
  .copy-btn:active {
    transform: scale(0.98);
  }
  .now-btn {
    margin-top: 8px;
    padding: 8px 16px;
    font-size: 0.85rem;
    background: transparent;
    color: var(--accent, #646cff);
    border: 1px solid var(--accent, #646cff);
    border-radius: 4px;
    cursor: pointer;
  }
  .now-btn:hover {
    background: var(--accent, #646cff);
    color: white;
  }
  .presets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .preset-btn {
    padding: 6px 12px;
    font-size: 0.8rem;
    background: var(--bg, #111);
    border: 1px solid var(--border, #333);
    border-radius: 4px;
    color: var(--text-muted, #888);
    cursor: pointer;
  }
  .preset-btn:hover {
    border-color: var(--accent, #646cff);
    color: var(--accent, #646cff);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="converter">
    <h1>Timestamp Converter</h1>
    
    <div class="panel">
      <h2>Unix Timestamp → Human Date</h2>
      <label>Enter timestamp (seconds or milliseconds):</label>
      <input type="text" id="ts-input" placeholder="e.g. 1776481458 or 1776481458000">
      <button class="now-btn" onclick="setNow()">Now</button>
      <div class="result" id="ts-result" style="display:none;">
        <div class="result-label">Result:</div>
        <div id="ts-output"></div>
        <button class="copy-btn" onclick="copyToClipboard(document.getElementById('ts-output').textContent)">Copy</button>
      </div>
    </div>
    
    <div class="panel">
      <h2>Human Date → Unix Timestamp</h2>
      <label>Select date and time:</label>
      <input type="datetime-local" id="date-input">
      <div class="result" id="date-result" style="display:none;">
        <div class="result-label">Timestamp (seconds):</div>
        <div id="date-output-sec"></div>
        <button class="copy-btn" onclick="copyToClipboard(document.getElementById('date-output-sec').textContent)">Copy seconds</button>
        <div class="result-label" style="margin-top:12px;">Timestamp (milliseconds):</div>
        <div id="date-output-ms"></div>
        <button class="copy-btn" onclick="copyToClipboard(document.getElementById('date-output-ms').textContent)">Copy milliseconds</button>
      </div>
    </div>
    
    <div class="panel">
      <h2>Quick Presets</h2>
      <div class="presets" id="presets"></div>
    </div>
  </div>
</div>

<script>
  const presets = [
    { label: 'Unix Epoch', ts: 0 },
    { label: '1 hour ago', ts: Math.floor(Date.now() / 1000) - 3600 },
    { label: '1 day ago', ts: Math.floor(Date.now() / 1000) - 86400 },
    { label: '1 week ago', ts: Math.floor(Date.now() / 1000) - 604800 },
    { label: '1 month ago', ts: Math.floor(Date.now() / 1000) - 2592000 },
    { label: '1 year ago', ts: Math.floor(Date.now() / 1000) - 31536000 },
    { label: '1 hour from now', ts: Math.floor(Date.now() / 1000) + 3600 },
    { label: '1 day from now', ts: Math.floor(Date.now() / 1000) + 86400 },
    { label: '1 week from now', ts: Math.floor(Date.now() / 1000) + 604800 },
    { label: '1 month from now', ts: Math.floor(Date.now() / 1000) + 2592000 },
    { label: '1 year from now', ts: Math.floor(Date.now() / 1000) + 31536000 },
  ];
  
  function formatDate(ts) {
    const date = new Date(ts * 1000);
    return date.toISOString() + ' UTC\n' + date.toLocaleString() + ' (' + date.toLocaleTimeString() + ')';
  }
  
  function isMilliseconds(ts) {
    return ts > 9999999999;
  }
  
  document.getElementById('ts-input').addEventListener('input', function(e) {
    const val = e.target.value.trim();
    if (!val) {
      document.getElementById('ts-result').style.display = 'none';
      return;
    }
    let ts = parseInt(val, 10);
    if (isNaN(ts)) {
      document.getElementById('ts-output').textContent = 'Invalid number';
      document.getElementById('ts-result').style.display = 'block';
      return;
    }
    if (isMilliseconds(ts)) {
      ts = Math.floor(ts / 1000);
    }
    document.getElementById('ts-output').textContent = formatDate(ts);
    document.getElementById('ts-result').style.display = 'block';
  });
  
  document.getElementById('date-input').addEventListener('input', function(e) {
    const val = e.target.value;
    if (!val) {
      document.getElementById('date-result').style.display = 'none';
      return;
    }
    const date = new Date(val);
    const tsSec = Math.floor(date.getTime() / 1000);
    const tsMs = date.getTime();
    document.getElementById('date-output-sec').textContent = tsSec;
    document.getElementById('date-output-ms').textContent = tsMs;
    document.getElementById('date-result').style.display = 'block';
  });
  
  function setNow() {
    const now = Math.floor(Date.now() / 1000);
    document.getElementById('ts-input').value = now;
    document.getElementById('ts-input').dispatchEvent(new Event('input'));
  }
  
  function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
  }
  
  const presetsContainer = document.getElementById('presets');
  presets.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = p.label;
    btn.onclick = function() {
      document.getElementById('ts-input').value = p.ts;
      document.getElementById('ts-input').dispatchEvent(new Event('input'));
    };
    presetsContainer.appendChild(btn);
  });
  
  // Set default date input to now
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('date-input').value = now.toISOString().slice(0, 16);
  document.getElementById('date-input').dispatchEvent(new Event('input'));
</script>
</body>
</html>
