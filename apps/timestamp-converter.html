<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unix Timestamp Converter — Shadow's Garden</title>
<meta name="description" content="Convert between Unix timestamps and human-readable dates instantly. Bidirectional conversion with timezone support.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .converter { background: var(--card-bg, #1a1a2e); padding: 2rem; border-radius: 12px; width: 100%; max-width: 480px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  h1 { margin: 0 0 1.5rem 0; font-size: 1.5rem; text-align: center; }
  .input-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted, #888); }
  input, select { width: 100%; padding: 0.75rem; font-size: 1rem; border: 1px solid var(--border, #333); border-radius: 8px; background: var(--input-bg, #0f0f1a); color: var(--text, #eee); font-family: monospace; }
  input:focus { outline: 2px solid var(--accent, #646cff); border-color: transparent; }
  .bidirectional { display: flex; gap: 1rem; align-items: flex-end; }
  .bidirectional > div { flex: 1; }
  .current-time { text-align: center; padding: 1rem; background: var(--highlight, #16213e); border-radius: 8px; margin-bottom: 1.5rem; }
  .current-time .label { font-size: 0.85rem; color: var(--text-muted, #888); }
  .current-time .value { font-size: 1.5rem; font-family: monospace; color: var(--accent, #646cff); font-weight: bold; }
  .results { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border, #333); }
  .result-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border, #333); font-family: monospace; font-size: 0.9rem; }
  .result-row:last-child { border-bottom: none; }
  .result-label { color: var(--text-muted, #888); }
  .result-value { color: var(--text, #eee); cursor: pointer; }
  .result-value:hover { color: var(--accent, #646cff); }
  .copy-hint { font-size: 0.75rem; color: var(--text-muted, #666); text-align: center; margin-top: 0.5rem; }
  .now-btn { width: 100%; padding: 0.75rem; margin-top: 1rem; background: var(--accent, #646cff); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: opacity 0.2s; }
  .now-btn:hover { opacity: 0.9; }
  @media (max-width: 500px) { .converter { padding: 1.5rem; } }
</style>
</head>
<body data-page-type="app">
  <div class="converter">
    <h1>🕐 Unix Timestamp Converter</h1>
    
    <div class="current-time">
      <div class="label">Current Unix Timestamp</div>
      <div class="value" id="current-ts">—</div>
    </div>
    
    <div class="bidirectional">
      <div class="input-group">
        <label>Unix Timestamp</label>
        <input type="number" id="ts-input" placeholder="e.g. 1704067200">
      </div>
      <div class="input-group">
        <label>or Date/Time</label>
        <input type="datetime-local" id="date-input">
      </div>
    </div>
    
    <button class="now-btn" id="now-btn">Use Current Time</button>
    
    <div class="results" id="results" style="display: none;">
      <div class="result-row">
        <span class="result-label">Unix (seconds)</span>
        <span class="result-value" id="res-seconds" title="Click to copy">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">Unix (milliseconds)</span>
        <span class="result-value" id="res-ms" title="Click to copy">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">UTC</span>
        <span class="result-value" id="res-utc" title="Click to copy">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">Local</span>
        <span class="result-value" id="res-local" title="Click to copy">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">ISO 8601</span>
        <span class="result-value" id="res-iso" title="Click to copy">—</span>
      </div>
      <div class="copy-hint">Click any value to copy</div>
    </div>
  </div>
  
  <script>
    const tsInput = document.getElementById('ts-input');
    const dateInput = document.getElementById('date-input');
    const results = document.getElementById('results');
    const nowBtn = document.getElementById('now-btn');
    
    function updateCurrentTime() {
      const now = Math.floor(Date.now() / 1000);
      document.getElementById('current-ts').textContent = now;
    }
    
    function convertFromTimestamp(ts) {
      if (!ts || isNaN(ts)) {
        results.style.display = 'none';
        return;
      }
      
      // Handle milliseconds vs seconds
      const ms = BigInt(ts);
      let date;
      if (ms > 10000000000000n) {
        date = new Date(Number(ms));
      } else {
        date = new Date(Number(ms) * 1000);
      }
      
      if (isNaN(date.getTime())) {
        results.style.display = 'none';
        return;
      }
      
      showResults(date, ts);
    }
    
    function convertFromDate(dateStr) {
      if (!dateStr) {
        results.style.display = 'none';
        return;
      }
      
      const date = new Date(dateStr);
      if (isNaN(date.getTime())) {
        results.style.display = 'none';
        return;
      }
      
      const ts = Math.floor(date.getTime() / 1000);
      showResults(date, ts);
    }
    
    function showResults(date, ts) {
      document.getElementById('res-seconds').textContent = ts;
      document.getElementById('res-ms').textContent = Math.floor(date.getTime());
      document.getElementById('res-utc').textContent = date.toUTCString();
      document.getElementById('res-local').textContent = date.toLocaleString();
      document.getElementById('res-iso').textContent = date.toISOString();
      results.style.display = 'block';
    }
    
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        // Brief visual feedback
        const el = event.target;
        const original = el.textContent;
        el.textContent = '✓ Copied!';
        el.style.color = 'var(--success, #4ade80)';
        setTimeout(() => {
          el.textContent = original;
          el.style.color = '';
        }, 1000);
      });
    }
    
    tsInput.addEventListener('input', () => {
      if (tsInput.value) {
        dateInput.value = '';
        convertFromTimestamp(parseInt(tsInput.value));
      }
    });
    
    dateInput.addEventListener('input', () => {
      if (dateInput.value) {
        tsInput.value = '';
        convertFromDate(dateInput.value);
      }
    });
    
    nowBtn.addEventListener('click', () => {
      const now = new Date();
      const ts = Math.floor(now.getTime() / 1000);
      tsInput.value = ts;
      dateInput.value = now.toISOString().slice(0, 16);
      showResults(now, ts);
    });
    
    document.querySelectorAll('.result-value').forEach(el => {
      el.addEventListener('click', () => copyToClipboard(el.textContent));
    });
    
    // Initialize
    setInterval(updateCurrentTime, 1000);
    updateCurrentTime();
  </script>
</body>
</html>
