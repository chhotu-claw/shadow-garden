<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timestamp Converter — Shadow's Garden</title>
<meta name="description" content="Convert Unix timestamps to human dates and vice versa. Supports timezones, milliseconds/seconds, copy to clipboard.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { width: 100%; max-width: 500px; }
  h1 { margin-bottom: 0.5rem; }
  .current-timestamp { font-size: 1.5rem; color: var(--accent); margin-bottom: 2rem; font-family: var(--mono); }
  .converter-box { background: var(--card); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .converter-box label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary); }
  .converter-box input { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 1rem; box-sizing: border-box; }
  .converter-box input:focus { outline: none; border-color: var(--accent); }
  .result { margin-top: 1rem; padding: 1rem; background: var(--bg); border-radius: 8px; font-family: var(--mono); word-break: break-all; }
  .result-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
  .result-value { font-size: 1.1rem; }
  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
  button { padding: 0.5rem 1rem; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
  button:hover { opacity: 0.9; }
  button.secondary { background: var(--border); color: var(--text); }
  .options { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .options label { display: flex; align-items: center; gap: 0.25rem; font-size: 0.9rem; cursor: pointer; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Timestamp Converter</h1>
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Convert Unix timestamps to human dates and vice versa</p>
    
    <div class="current-timestamp" id="currentTs">Loading...</div>
    
    <div class="converter-box">
      <label>Unix Timestamp</label>
      <input type="text" id="timestampInput" placeholder="e.g., 1776057600 or 1776057600000">
      <div class="btn-row">
        <button onclick="convertFromTimestamp()">Convert →</button>
        <button class="secondary" onclick="pasteTimestamp()">Paste</button>
      </div>
      <div class="result" id="timestampResult" style="display: none;">
        <div class="result-label">Result:</div>
        <div class="result-value" id="timestampResultValue"></div>
        <div class="btn-row">
          <button class="secondary" onclick="copyResult('timestampResultValue')">Copy</button>
        </div>
      </div>
    </div>
    
    <div class="converter-box">
      <label>Human Date</label>
      <input type="datetime-local" id="dateInput">
      <div class="options">
        <label><input type="radio" name="unit" value="seconds" checked> Seconds</label>
        <label><input type="radio" name="unit" value="milliseconds"> Milliseconds</label>
      </div>
      <div class="btn-row">
        <button onclick="convertFromDate()">Convert →</button>
      </div>
      <div class="result" id="dateResult" style="display: none;">
        <div class="result-label">Result:</div>
        <div class="result-value" id="dateResultValue"></div>
        <div class="btn-row">
          <button class="secondary" onclick="copyResult('dateResultValue')">Copy</button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast">Copied!</div>
  
  <script>
    // Update current timestamp every second
    function updateCurrentTimestamp() {
      const now = Date.now();
      const sec = Math.floor(now / 1000);
      document.getElementById('currentTs').textContent = `Now: ${sec} (sec) | ${now} (ms)`;
    }
    updateCurrentTimestamp();
    setInterval(updateCurrentTimestamp, 1000);
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    async function pasteTimestamp() {
      try {
        const text = await navigator.clipboard.readText();
        document.getElementById('timestampInput').value = text.trim();
        convertFromTimestamp();
      } catch (e) {
        showToast('Clipboard access denied');
      }
    }
    
    function convertFromTimestamp() {
      const input = document.getElementById('timestampInput').value.trim();
      if (!input) return;
      
      let ts = parseInt(input);
      if (isNaN(ts)) {
        showToast('Invalid timestamp');
        return;
      }
      
      // Detect if seconds or milliseconds
      // If less than 10000000000, assume seconds
      if (ts < 10000000000) {
        ts *= 1000;
      }
      
      const date = new Date(ts);
      const formatted = date.toLocaleString('en-US', { 
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        timeZoneName: 'short'
      });
      
      document.getElementById('timestampResultValue').textContent = formatted;
      document.getElementById('timestampResult').style.display = 'block';
    }
    
    function convertFromDate() {
      const input = document.getElementById('dateInput').value;
      if (!input) {
        showToast('Select a date');
        return;
      }
      
      const date = new Date(input);
      const unit = document.querySelector('input[name="unit"]:checked').value;
      
      const ts = unit === 'seconds' ? Math.floor(date.getTime() / 1000) : date.getTime();
      document.getElementById('dateResultValue').textContent = ts;
      document.getElementById('dateResult').style.display = 'block';
    }
    
    function copyResult(elementId) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => showToast('Copy failed'));
    }
  </script>
</body>
</html>
