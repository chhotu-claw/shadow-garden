<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timestamp Converter — Shadow's Garden</title>
<meta name="description" content="Convert between Unix timestamps and human-readable dates. Bidirectional, with copy buttons and timezone support.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg-secondary: #1a1a2e;
    --card-bg: #16213e;
    --accent: #0f3460;
    --highlight: #e94560;
    --text: #eaeaea;
    --text-muted: #a0a0a0;
  }
  body {
    font-family: 'Satoshi', 'DM Sans', system-ui, sans-serif;
    background: var(--bg-secondary);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  .container {
    max-width: 600px;
    width: 100%;
  }
  h1 {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
    font-weight: 700;
  }
  .subtitle {
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }
  .converter-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .input-group {
    margin-bottom: 1.5rem;
  }
  .input-group label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .input-row {
    display: flex;
    gap: 0.5rem;
  }
  input[type="number"], input[type="text"], select {
    flex: 1;
    padding: 0.75rem 1rem;
    border: 2px solid var(--accent);
    border-radius: 8px;
    background: var(--bg-secondary);
    color: var(--text);
    font-size: 1rem;
    font-family: 'JetBrains Mono', monospace;
    transition: border-color 0.2s;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--highlight);
  }
  button {
    padding: 0.75rem 1.25rem;
    background: var(--highlight);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s;
    white-space: nowrap;
  }
  button:hover {
    transform: translateY(-2px);
    opacity: 0.9;
  }
  button.secondary {
    background: var(--accent);
  }
  .result {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    color: var(--highlight);
    padding: 1rem;
    background: rgba(233, 69, 96, 0.1);
    border-radius: 8px;
    margin-top: 0.5rem;
    word-break: break-all;
  }
  .live-clock {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    background: var(--accent);
    border-radius: 12px;
    margin-bottom: 1.5rem;
  }
  .live-clock .time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
  }
  .live-clock .label {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .now-btn {
    margin-left: auto;
  }
  .formats {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .format-tag {
    font-size: 0.75rem;
    padding: 0.25rem 0.5rem;
    background: var(--accent);
    border-radius: 4px;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.2s;
  }
  .format-tag:hover {
    background: var(--highlight);
    color: white;
  }
  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .preset-btn {
    font-size: 0.8rem;
    padding: 0.4rem 0.8rem;
    background: var(--accent);
  }
  .copy-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }
  .copy-btn {
    font-size: 0.75rem;
    padding: 0.4rem 0.8rem;
    background: var(--accent);
  }
  .clear-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--text-muted);
  }
  .clear-btn:hover {
    border-color: var(--highlight);
    color: var(--highlight);
  }
  @media (max-width: 500px) {
    .input-row {
      flex-direction: column;
    }
    .live-clock {
      flex-direction: column;
      text-align: center;
    }
    .now-btn {
      margin: 0.5rem 0 0 0;
    }
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Timestamp Converter</h1>
  <p class="subtitle">Bidirectional conversion between Unix timestamps and human-readable dates</p>

  <div class="converter-card">
    <div class="live-clock">
      <div>
        <div class="label">Current Time</div>
        <div class="time" id="currentTime">--:--:--</div>
      </div>
      <div class="label" id="currentTs">--</div>
      <button class="now-btn" onclick="useCurrentTimestamp()">Use Now</button>
    </div>

    <div class="input-group">
      <label>Unix Timestamp (seconds)</label>
      <div class="input-row">
        <input type="number" id="timestampInput" placeholder="e.g. 1743356400" oninput="convertFromTs()">
        <button onclick="copyValue('timestampInput')">Copy</button>
      </div>
    </div>

    <div class="input-group">
      <label>Or enter a date string</label>
      <div class="input-row">
        <input type="text" id="dateInput" placeholder="e.g. 2026-03-30 15:56:00" oninput="convertFromDate()">
        <select id="timezone" onchange="convertFromDate()">
          <option value="+04">UTC+4 (Dubai)</option>
          <option value="+00">UTC+0</option>
          <option value="-05">UTC-5 (EST)</option>
          <option value="-08">UTC-8 (PST)</option>
        </select>
      </div>
    </div>

    <div class="input-group" style="margin-bottom: 0;">
      <label>Result</label>
      <div class="result" id="result">Enter a timestamp or date to convert</div>
      <div class="copy-row">
        <button class="copy-btn" onclick="copyResult('result')">Copy Result</button>
        <button class="copy-btn" onclick="copyResult('iso')">Copy ISO</button>
        <button class="copy-btn" onclick="copyResult('relative')">Copy Relative</button>
        <button class="clear-btn" onclick="clearAll()">Clear</button>
      </div>
    </div>
  </div>

  <div class="converter-card">
    <div class="input-group" style="margin-bottom: 0.5rem;">
      <label>Quick Presets</label>
      <div class="presets">
        <button class="preset-btn" onclick="presetTimestamp(0)">Unix Epoch</button>
        <button class="preset-btn" onclick="presetTimestamp(1000000000)">1B seconds</button>
        <button class="preset-btn" onclick="presetTimestamp(1609459200)">2021-01-01</button>
        <button class="preset-btn" onclick="presetTimestamp(1704067200)">2024-01-01</button>
        <button class="preset-btn" onclick="presetTimestamp(1735689600)">2025-01-01</button>
        <button class="preset-btn" onclick="presetTimestamp(1767225600)">2026-01-01</button>
      </div>
    </div>
  </div>

  <div class="converter-card">
    <div class="input-group" style="margin-bottom: 0;">
      <label>Common Formats (click to use)</label>
      <div class="formats">
        <span class="format-tag" onclick="useFormat('ISO')">ISO 8601</span>
        <span class="format-tag" onclick="useFormat('RFC')">RFC 2822</span>
        <span class="format-tag" onclick="useFormat('US')">MM/DD/YYYY</span>
        <span class="format-tag" onclick="useFormat('EU')">DD/MM/YYYY</span>
        <span class="format-tag" onclick="useFormat('SQL')">YYYY-MM-DD HH:MM:SS</span>
        <span class="format-tag" onclick="useFormat('REL')">Relative</span>
      </div>
    </div>
  </div>
</div>

<script>
let currentFormat = 'ISO';
let lastConvertedDate = null;

function updateClock() {
  const now = new Date();
  const ts = Math.floor(now.getTime() / 1000);
  document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-GB');
  document.getElementById('currentTs').textContent = 'ts: ' + ts;
}

function useCurrentTimestamp() {
  const ts = Math.floor(Date.now() / 1000);
  document.getElementById('timestampInput').value = ts;
  convertFromTs();
}

function convertFromTs() {
  const input = document.getElementById('timestampInput').value.trim();
  if (!input) {
    clearAll();
    return;
  }
  
  let ts = parseInt(input, 10);
  if (isNaN(ts)) return;
  
  // Handle millisecond timestamps (13 digits)
  if (input.length >= 13) {
    ts = Math.floor(ts / 1000);
  }
  
  const date = new Date(ts * 1000);
  if (isNaN(date.getTime())) {
    document.getElementById('result').textContent = 'Invalid timestamp';
    return;
  }
  
  lastConvertedDate = date;
  displayResult(date);
  document.getElementById('dateInput').value = formatDateTime(date);
}

function convertFromDate() {
  const input = document.getElementById('dateInput').value.trim();
  const tz = document.getElementById('timezone').value;
  
  if (!input) {
    clearAll();
    return;
  }
  
  // Try parsing the date
  let date = new Date(input);
  if (isNaN(date.getTime())) {
    // Try with timezone offset
    const offset = parseInt(tz) * 60 * 60 * 1000;
    date = new Date(input + ' ' + tz);
    if (isNaN(date.getTime())) {
      document.getElementById('result').textContent = 'Invalid date format';
      return;
    }
    date = new Date(date.getTime() - offset);
  }
  
  lastConvertedDate = date;
  const ts = Math.floor(date.getTime() / 1000);
  document.getElementById('timestampInput').value = ts;
  displayResult(date);
}

function displayResult(date) {
  const formatted = formatByType(date, currentFormat);
  document.getElementById('result').textContent = formatted;
}

function formatByType(date, type) {
  switch(type) {
    case 'ISO':
      return date.toISOString();
    case 'RFC':
      return date.toUTCString();
    case 'US':
      return date.toLocaleDateString('en-US');
    case 'EU':
      return date.toLocaleDateString('en-GB');
    case 'SQL':
      return formatSQL(date);
    case 'REL':
      return getRelativeTime(date);
    default:
      return date.toISOString();
  }
}

function formatSQL(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  const h = String(date.getHours()).padStart(2, '0');
  const min = String(date.getMinutes()).padStart(2, '0');
  const s = String(date.getSeconds()).padStart(2, '0');
  return `${y}-${m}-${d} ${h}:${min}:${s}`;
}

function formatDateTime(date) {
  return formatSQL(date);
}

function getRelativeTime(date) {
  const now = new Date();
  const diffMs = now - date;
  const diffSec = Math.floor(Math.abs(diffMs) / 1000);
  const suffix = diffMs > 0 ? ' ago' : ' from now';
  
  if (diffSec < 60) return diffSec + ' seconds' + suffix;
  if (diffSec < 3600) return Math.floor(diffSec / 60) + ' minutes' + suffix;
  if (diffSec < 86400) return Math.floor(diffSec / 3600) + ' hours' + suffix;
  if (diffSec < 2592000) return Math.floor(diffSec / 86400) + ' days' + suffix;
  if (diffSec < 31536000) return Math.floor(diffSec / 2592000) + ' months' + suffix;
  return Math.floor(diffSec / 31536000) + ' years' + suffix;
}

function presetTimestamp(ts) {
  document.getElementById('timestampInput').value = ts;
  convertFromTs();
}

function useFormat(fmt) {
  currentFormat = fmt;
  if (lastConvertedDate) {
    displayResult(lastConvertedDate);
  }
}

function copyValue(id) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.value);
}

function copyResult(type) {
  if (!lastConvertedDate) return;
  let text = '';
  switch(type) {
    case 'result':
      text = document.getElementById('result').textContent;
      break;
    case 'iso':
      text = lastConvertedDate.toISOString();
      break;
    case 'relative':
      text = getRelativeTime(lastConvertedDate);
      break;
  }
  navigator.clipboard.writeText(text);
}

function clearAll() {
  document.getElementById('timestampInput').value = '';
  document.getElementById('dateInput').value = '';
  document.getElementById('result').textContent = 'Enter a timestamp or date to convert';
  lastConvertedDate = null;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
