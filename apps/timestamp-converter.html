<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timestamp Converter — Shadow's Garden</title>
<meta name="description" content="Convert between Unix timestamps, ISO dates, and human-readable formats. See current time in multiple formats.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-mono, monospace); }
  .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
  .current-time { 
    background: var(--bg-secondary, #1a1a2e); 
    padding: 1.5rem; 
    border-radius: 8px; 
    margin-bottom: 2rem;
    border: 1px solid var(--border, #2a2a4e);
  }
  .time-display {
    display: grid;
    gap: 0.75rem;
    font-size: 0.95rem;
  }
  .time-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border, #2a2a4e);
  }
  .time-row:last-child { border-bottom: none; }
  .time-label { color: var(--text-muted, #888); }
  .time-value { 
    color: var(--accent, #00d9ff); 
    cursor: pointer;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .time-value:hover { background: var(--bg-hover, #252540); }
  .time-value.copied { color: #4ade80; }
  .converter {
    background: var(--bg-secondary, #1a1a2e);
    padding: 1.5rem;
    border-radius: 8px;
    border: 1px solid var(--border, #2a2a4e);
  }
  .converter h2 { font-size: 1.2rem; margin-bottom: 1rem; }
  .input-group { margin-bottom: 1rem; }
  .input-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted, #888); font-size: 0.9rem; }
  .input-group input, .input-group select {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--border, #2a2a4e);
    border-radius: 6px;
    background: var(--bg, #0f0f1a);
    color: var(--text, #eee);
    font-family: inherit;
    font-size: 1rem;
    box-sizing: border-box;
  }
  .input-group input:focus { outline: none; border-color: var(--accent, #00d9ff); }
  .result {
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--bg, #0f0f1a);
    border-radius: 6px;
    border: 1px solid var(--border, #2a2a4e);
  }
  .result-title { font-size: 0.85rem; color: var(--text-muted, #888); margin-bottom: 0.5rem; }
  .result-value { 
    font-size: 1.1rem; 
    color: var(--accent, #00d9ff); 
    word-break: break-all;
  }
  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .preset-btn {
    padding: 0.5rem 0.75rem;
    background: var(--bg-hover, #252540);
    border: 1px solid var(--border, #2a2a4e);
    border-radius: 4px;
    color: var(--text, #eee);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .preset-btn:hover { border-color: var(--accent, #00d9ff); }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--accent, #00d9ff);
    color: #000;
    padding: 0.75rem 1.5rem;
    border-radius: 6px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s ease;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .meta { color: var(--text-muted, #888); font-size: 0.9rem; margin-bottom: 2rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Timestamp Converter</h1>
  <div class="meta">Convert between Unix timestamps, ISO dates, and human-readable formats</div>
  
  <div class="current-time">
    <div class="time-display" id="currentTimes"></div>
  </div>
  
  <div class="converter">
    <h2>Convert Timestamp</h2>
    <div class="presets">
      <button class="preset-btn" data-ts="now">Now</button>
      <button class="preset-btn" data-ts="+1h">+1 hour</button>
      <button class="preset-btn" data-ts="+1d">+1 day</button>
      <button class="preset-btn" data-ts="+7d">+7 days</button>
      <button class="preset-btn" data-ts="+30d">+30 days</button>
      <button class="preset-btn" data-ts="+1y">+1 year</button>
    </div>
    <div class="input-group">
      <label>Input (Unix timestamp in seconds, milliseconds, or ISO date string)</label>
      <input type="text" id="inputValue" placeholder="e.g., 1773873396, 1773873396000, 2026-03-19T03:07:00Z">
    </div>
    <div class="input-group">
      <label>Input type</label>
      <select id="inputType">
        <option value="auto">Auto-detect</option>
        <option value="unix">Unix timestamp (seconds)</option>
        <option value="unix-ms">Unix timestamp (milliseconds)</option>
        <option value="iso">ISO 8601 date string</option>
      </select>
    </div>
    <div class="result" id="result">
      <div class="result-title">Result</div>
      <div class="result-value" id="resultValue">Enter a value to convert</div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const $ = id => document.getElementById(id);
const currentTimes = $('currentTimes');
const inputValue = $('inputValue');
const inputType = $('inputType');
const resultValue = $('resultValue');
const toast = $('toast');

function formatTime() {
  const now = new Date();
  const unix = Math.floor(now.getTime() / 1000);
  const unixMs = now.getTime();
  
  const formats = [
    { label: 'Unix (seconds)', value: unix.toString() },
    { label: 'Unix (milliseconds)', value: unixMs.toString() },
    { label: 'ISO 8601', value: now.toISOString() },
    { label: 'Local', value: now.toLocaleString() },
    { label: 'UTC', value: now.toUTCString() },
    { label: 'Relative', value: getRelativeTime(now) }
  ];
  
  currentTimes.innerHTML = formats.map(f => `
    <div class="time-row">
      <span class="time-label">${f.label}</span>
      <span class="time-value" data-clip="${f.value}" title="Click to copy">${f.value}</span>
    </div>
  `).join('');
  
  currentTimes.querySelectorAll('.time-value').forEach(el => {
    el.addEventListener('click', () => copyToClipboard(el.dataset.clip, el));
  });
}

function getRelativeTime(date) {
  const now = new Date();
  const diff = now - date;
  const abs = Math.abs(diff);
  
  const units = [
    [1000, 'second'],
    [60000, 'minute'],
    [3600000, 'hour'],
    [86400000, 'day'],
    [2592000000, 'month'],
    [31536000000, 'year']
  ];
  
  for (const [ms, unit] of units) {
    if (abs < ms * 2) {
      const val = Math.round(abs / ms);
      return `${val} ${unit}${val !== 1 ? 's' : ''} ${diff > 0 ? 'ago' : 'from now'}`;
    }
  }
  return date.toISOString().split('T')[0];
}

function parseInput(value, type) {
  if (!value.trim()) return null;
  
  if (type === 'auto') {
    if (/^\d{10,13}$/.test(value.trim())) {
      type = value.length === 13 ? 'unix-ms' : 'unix';
    } else {
      type = 'iso';
    }
  }
  
  let date;
  
  if (type === 'unix') {
    const ts = parseInt(value);
    date = new Date(ts * 1000);
  } else if (type === 'unix-ms') {
    const ts = parseInt(value);
    date = new Date(ts);
  } else if (type === 'iso') {
    date = new Date(value);
  }
  
  if (!date || isNaN(date.getTime())) return null;
  return { date, type };
}

function convert() {
  const parsed = parseInput(inputValue.value, inputType.value);
  
  if (!parsed) {
    resultValue.textContent = 'Enter a valid timestamp or date';
    return;
  }
  
  const { date } = parsed;
  const unixSec = Math.floor(date.getTime() / 1000);
  const unixMs = date.getTime();
  
  const results = [
    { label: 'Unix (seconds)', value: unixSec.toString() },
    { label: 'Unix (milliseconds)', value: unixMs.toString() },
    { label: 'ISO 8601', value: date.toISOString() },
    { label: 'Local', value: date.toLocaleString() },
    { label: 'UTC', value: date.toUTCString() },
    { label: 'Relative', value: getRelativeTime(date) }
  ];
  
  resultValue.innerHTML = results.map(r => `
    <div style="margin-bottom: 0.5rem;">
      <span style="color: var(--text-muted, #888); font-size: 0.85rem;">${r.label}:</span><br>
      <span style="cursor:pointer;" data-clip="${r.value}" class="copy-result">${r.value}</span>
    </div>
  `).join('');
  
  resultValue.querySelectorAll('.copy-result').forEach(el => {
    el.addEventListener('click', () => copyToClipboard(el.dataset.clip, el));
  });
}

function copyToClipboard(text, element) {
  navigator.clipboard.writeText(text).then(() => {
    element.classList.add('copied');
    showToast('Copied!');
    setTimeout(() => element.classList.remove('copied'), 1500);
  });
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const ts = btn.dataset.ts;
    const now = new Date();
    
    if (ts === 'now') {
      inputValue.value = Math.floor(now.getTime() / 1000).toString();
      inputType.value = 'unix';
    } else {
      const match = ts.match(/^([+-])(\d+)([hdmy])$/);
      if (match) {
        const [, sign, num, unit] = match;
        const mult = { h: 3600000, d: 86400000, m: 2592000000, y: 31536000000 }[unit];
        const ms = sign === '+' ? now.getTime() + num * mult : now.getTime() - num * mult;
        inputValue.value = Math.floor(ms / 1000).toString();
        inputType.value = 'unix';
      }
    }
    convert();
  });
});

inputValue.addEventListener('input', convert);
inputType.addEventListener('change', convert);

formatTime();
setInterval(formatTime, 1000);
</script>
</body>
</html>
