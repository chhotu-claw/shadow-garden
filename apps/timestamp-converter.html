<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unix Timestamp Converter — Shadow's Garden</title>
<meta name="description" content="Convert between Unix timestamps and human-readable dates. See current timestamp, convert between formats, support multiple timezones.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 {
    margin-bottom: 0.5rem;
  }
  .current-timestamp {
    background: var(--card);
    padding: 1.5rem;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 2rem;
  }
  .current-timestamp .label {
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .current-timestamp .timestamp {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    font-family: monospace;
  }
  .current-timestamp .date {
    font-size: 1rem;
    color: var(--text);
    margin-top: 0.5rem;
  }
  .converter-box {
    background: var(--card);
    padding: 1.5rem;
    border-radius: 12px;
    margin-bottom: 1.5rem;
  }
  .converter-box h2 {
    margin: 0 0 1rem 0;
    font-size: 1.2rem;
  }
  .input-group {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .input-group input {
    flex: 1;
    min-width: 150px;
    padding: 0.75rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    font-family: monospace;
    background: var(--bg);
    color: var(--text);
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .input-group select {
    padding: 0.75rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    background: var(--bg);
    color: var(--text);
  }
  .input-group button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
  }
  .input-group button:hover {
    opacity: 0.9;
  }
  .result {
    margin-top: 1rem;
    padding: 1rem;
    background: var(--bg);
    border-radius: 8px;
    display: none;
  }
  .result.show {
    display: block;
  }
  .result .label {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .result .value {
    font-family: monospace;
    font-size: 1.1rem;
    color: var(--text);
    word-break: break-all;
  }
  .copy-btn {
    background: var(--border);
    color: var(--text);
    border: none;
    padding: 0.4rem 0.8rem;
    font-size: 0.85rem;
    border-radius: 6px;
    cursor: pointer;
    margin-left: 0.5rem;
  }
  .copy-btn:hover {
    background: var(--muted);
  }
  .timezones {
    margin-top: 1rem;
  }
  .timezones h3 {
    font-size: 1rem;
    margin-bottom: 0.75rem;
  }
  .tz-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0.5rem;
  }
  .tz-item {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem;
    background: var(--bg);
    border-radius: 6px;
    font-size: 0.9rem;
  }
  .tz-item .tz {
    color: var(--muted);
  }
  .tz-item .time {
    font-family: monospace;
    color: var(--text);
  }
  .presets {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }
  .presets button {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.4rem 0.8rem;
    font-size: 0.85rem;
    border-radius: 6px;
    cursor: pointer;
  }
  .presets button:hover {
    background: var(--border);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Unix Timestamp Converter</h1>
  <p style="color: var(--muted); margin-bottom: 1.5rem;">Convert between Unix timestamps and human-readable dates.</p>
  
  <div class="current-timestamp">
    <div class="label">Current Unix Timestamp</div>
    <div class="timestamp" id="currentTimestamp">—</div>
    <div class="date" id="currentDate">—</div>
  </div>
  
  <div class="converter-box">
    <h2>Timestamp → Date</h2>
    <div class="input-group">
      <input type="number" id="tsInput" placeholder="Enter timestamp (e.g., 1734067200)">
      <select id="tsUnit">
        <option value="seconds">Seconds</option>
        <option value="milliseconds">Milliseconds</option>
      </select>
      <button onclick="convertTimestamp()">Convert</button>
    </div>
    <div class="presets">
      <button onclick="setNow()">Now</button>
      <button onclick="setTsPreset(0)">Unix Epoch (0)</button>
      <button onclick="setTsPreset(1734067200)">Jan 1, 2025</button>
      <button onclick="setTsPreset(1765603200)">Jan 1, 2026</button>
    </div>
    <div class="result" id="tsResult">
      <div class="label">Result:</div>
      <div class="value" id="tsResultValue"></div>
      <div class="timezones" id="tsTimezones"></div>
    </div>
  </div>
  
  <div class="converter-box">
    <h2>Date → Timestamp</h2>
    <div class="input-group">
      <input type="datetime-local" id="dateInput">
      <button onclick="convertDate()">Convert</button>
    </div>
    <div class="result" id="dateResult">
      <div class="label">Result:</div>
      <div class="value" id="dateResultValue"></div>
    </div>
  </div>
</div>

<script>
  // Update current timestamp every second
  function updateCurrentTimestamp() {
    const now = Math.floor(Date.now() / 1000);
    document.getElementById('currentTimestamp').textContent = now;
    document.getElementById('currentDate').textContent = new Date().toLocaleString();
  }
  updateCurrentTimestamp();
  setInterval(updateCurrentTimestamp, 1000);
  
  function convertTimestamp() {
    let ts = document.getElementById('tsInput').value;
    const unit = document.getElementById('tsUnit').value;
    const resultEl = document.getElementById('tsResult');
    
    if (!ts) {
      resultEl.classList.remove('show');
      return;
    }
    
    ts = parseInt(ts);
    if (unit === 'milliseconds') {
      ts = Math.floor(ts / 1000);
    }
    
    const date = new Date(ts * 1000);
    if (isNaN(date.getTime())) {
      document.getElementById('tsResultValue').textContent = 'Invalid timestamp';
      resultEl.classList.add('show');
      return;
    }
    
    document.getElementById('tsResultValue').innerHTML = `
      ${date.toLocaleString()} 
      <button class="copy-btn" onclick="copyText('${date.toISOString()}')">Copy ISO</button>
    `;
    
    // Show timezones
    const timezones = [
      { tz: 'UTC', offset: 0 },
      { tz: 'US/Pacific', offset: -8 },
      { tz: 'US/Eastern', offset: -5 },
      { tz: 'Europe/London', offset: 0 },
      { tz: 'Europe/Paris', offset: 1 },
      { tz: 'Asia/Dubai', offset: 4 },
      { tz: 'Asia/Tokyo', offset: 9 },
      { tz: 'Australia/Sydney', offset: 11 }
    ];
    
    let tzHtml = '<h3>Other Timezones:</h3><div class="tz-list">';
    timezones.forEach(z => {
      const tzDate = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
      tzDate.setHours(tzDate.getHours() + z.offset);
      tzHtml += `<div class="tz-item"><span class="tz">${z.tz}</span><span class="time">${tzDate.toLocaleTimeString()}</span></div>`;
    });
    tzHtml += '</div>';
    document.getElementById('tsTimezones').innerHTML = tzHtml;
    
    resultEl.classList.add('show');
  }
  
  function convertDate() {
    const dateInput = document.getElementById('dateInput').value;
    const resultEl = document.getElementById('dateResult');
    
    if (!dateInput) {
      resultEl.classList.remove('show');
      return;
    }
    
    const date = new Date(dateInput);
    if (isNaN(date.getTime())) {
      document.getElementById('dateResultValue').textContent = 'Invalid date';
      resultEl.classList.add('show');
      return;
    }
    
    const ts = Math.floor(date.getTime() / 1000);
    const tsMs = date.getTime();
    
    document.getElementById('dateResultValue').innerHTML = `
      Seconds: ${ts} 
      <button class="copy-btn" onclick="copyText('${ts}')">Copy</button><br>
      Milliseconds: ${tsMs}
      <button class="copy-btn" onclick="copyText('${tsMs}')">Copy</button>
    `;
    
    resultEl.classList.add('show');
  }
  
  function setNow() {
    const now = Math.floor(Date.now() / 1000);
    document.getElementById('tsInput').value = now;
    document.getElementById('tsUnit').value = 'seconds';
    convertTimestamp();
  }
  
  function setTsPreset(val) {
    document.getElementById('tsInput').value = val;
    document.getElementById('tsUnit').value = 'seconds';
    convertTimestamp();
  }
  
  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
      // Brief visual feedback
    });
  }
  
  // Set default date input to now
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('dateInput').value = now.toISOString().slice(0, 16);
</script>

</body>
</html>
