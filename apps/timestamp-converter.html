<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unix Timestamp Converter — Shadow's Garden</title>
<meta name="description" content="Convert Unix timestamps to human-readable dates and vice versa. All local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .converter {
    max-width: 600px;
    margin: 0 auto;
  }
  .panel {
    margin-bottom: 24px;
  }
  .panel h3 {
    margin-bottom: 12px;
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
  }
  .input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .timestamp-input {
    flex: 1;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    font-family: var(--mono);
  }
  .timestamp-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .convert-btn {
    padding: 14px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .convert-btn:hover {
    opacity: 0.9;
  }
  .result-box {
    padding: 16px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    font-family: var(--mono);
    min-height: 24px;
  }
  .result-box.empty {
    color: var(--text-secondary);
    font-style: italic;
  }
  .now-btn {
    padding: 14px 20px;
    background: transparent;
    color: var(--text);
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .now-btn:hover {
    border-color: var(--accent);
  }
  .formats {
    margin-top: 12px;
    padding: 12px;
    background: rgba(0,0,0,0.2);
    border-radius: 6px;
    font-size: 13px;
  }
  .formats p {
    margin: 6px 0;
    color: var(--text-secondary);
    font-family: var(--mono);
  }
  .formats span {
    color: var(--text);
  }
  .copy-btn {
    margin-top: 12px;
    padding: 8px 16px;
    background: transparent;
    color: var(--text);
    border: 2px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
  }
  .current-time {
    padding: 16px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    text-align: center;
  }
  .current-time .time {
    font-size: 32px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text);
    margin-bottom: 8px;
  }
  .current-time .timestamp {
    font-size: 14px;
    color: var(--text-secondary);
    font-family: var(--mono);
  }
  .live-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="converter">
    <h1>Unix Timestamp Converter</h1>
    <p style="color: var(--text-secondary); margin-bottom: 24px;">Convert between Unix timestamps and human-readable dates. All local, no tracking.</p>

    <!-- Current Time -->
    <div class="panel">
      <h3>Current Time</h3>
      <div class="current-time">
        <div class="time"><span class="live-indicator"></span><span id="currentTime">--:--:--</span></div>
        <div class="timestamp">Unix: <span id="currentTimestamp">--</span></div>
      </div>
    </div>

    <!-- Timestamp to Date -->
    <div class="panel">
      <h3>Timestamp → Date</h3>
      <div class="input-group">
        <input type="number" class="timestamp-input" id="tsInput" placeholder="Enter Unix timestamp (e.g., 1775268000)">
        <button class="convert-btn" onclick="tsToDate()">Convert</button>
        <button class="now-btn" onclick="useCurrentTimestamp()">Now</button>
      </div>
      <div class="result-box" id="tsResult">Enter a timestamp to see the date</div>
      <div class="formats" id="tsFormats" style="display:none;">
        <p><span>ISO:</span> <span id="isoResult">-</span></p>
        <p><span>UTC:</span> <span id="utcResult">-</span></p>
        <p><span>Relative:</span> <span id="relResult">-</span></p>
      </div>
    </div>

    <!-- Date to Timestamp -->
    <div class="panel">
      <h3>Date → Timestamp</h3>
      <div class="input-group">
        <input type="datetime-local" class="timestamp-input" id="dateInput">
        <button class="convert-btn" onclick="dateToTs()">Convert</button>
      </div>
      <div class="result-box" id="dateResult">Select a date to see the timestamp</div>
      <button class="copy-btn" id="copyTsBtn" onclick="copyTimestamp()" style="display:none;">Copy Timestamp</button>
    </div>

  </div>
</div>
<script>
  let currentTs = Math.floor(Date.now() / 1000);

  function updateCurrentTime() {
    currentTs = Math.floor(Date.now() / 1000);
    const now = new Date();
    document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US', { hour12: false });
    document.getElementById('currentTimestamp').textContent = currentTs;
  }

  setInterval(updateCurrentTime, 1000);
  updateCurrentTime();

  function tsToDate() {
    const input = document.getElementById('tsInput').value;
    if (!input) return;

    let ts = parseInt(input);
    // Handle seconds vs milliseconds
    if (ts < 1e11) ts *= 1000; // Likely seconds

    const date = new Date(ts);
    if (isNaN(date.getTime())) {
      document.getElementById('tsResult').textContent = 'Invalid timestamp';
      document.getElementById('tsResult').classList.add('empty');
      return;
    }

    document.getElementById('tsResult').classList.remove('empty');
    document.getElementById('tsResult').textContent = date.toLocaleString();
    document.getElementById('tsFormats').style.display = 'block';
    document.getElementById('isoResult').textContent = date.toISOString();
    document.getElementById('utcResult').textContent = date.toUTCString();
    document.getElementById('relResult').textContent = getRelativeTime(date);
  }

  function dateToTs() {
    const input = document.getElementById('dateInput').value;
    if (!input) return;

    const date = new Date(input);
    if (isNaN(date.getTime())) {
      document.getElementById('dateResult').textContent = 'Invalid date';
      document.getElementById('dateResult').classList.add('empty');
      return;
    }

    const ts = Math.floor(date.getTime() / 1000);
    document.getElementById('dateResult').classList.remove('empty');
    document.getElementById('dateResult').textContent = ts;
    document.getElementById('copyTsBtn').style.display = 'inline-block';
    document.getElementById('copyTsBtn').dataset.ts = ts;
  }

  function useCurrentTimestamp() {
    document.getElementById('tsInput').value = currentTs;
    tsToDate();
  }

  function copyTimestamp() {
    const ts = document.getElementById('copyTsBtn').dataset.ts;
    navigator.clipboard.writeText(ts);
    document.getElementById('copyTsBtn').textContent = 'Copied!';
    setTimeout(() => {
      document.getElementById('copyTsBtn').textContent = 'Copy Timestamp';
    }, 1500);
  }

  function getRelativeTime(date) {
    const now = new Date();
    const diff = now - date;
    const absDiff = Math.abs(diff);
    const seconds = Math.floor(absDiff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);
    const months = Math.floor(days / 30);
    const years = Math.floor(days / 365);

    const suffix = diff > 0 ? 'ago' : 'from now';

    if (seconds < 60) return `${seconds} seconds ${suffix}`;
    if (minutes < 60) return `${minutes} minutes ${suffix}`;
    if (hours < 24) return `${hours} hours ${suffix}`;
    if (days < 30) return `${days} days ${suffix}`;
    if (months < 12) return `${months} months ${suffix}`;
    return `${years} years ${suffix}`;
  }

  // Enter key support
  document.getElementById('tsInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') tsToDate();
  });
  document.getElementById('dateInput').addEventListener('change', dateToTs);
</script>
</body>
</html>
