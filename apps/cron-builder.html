<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Expression Builder — Shadow's Garden</title>
<meta name="description" content="Build cron expressions visually — select minute, hour, day, month, weekday with an interactive builder that shows next run times.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e5e5e5; min-height: 100vh; padding: 2rem; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .subtitle { color: #666; margin-bottom: 2rem; }
  .expression-display { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; text-align: center; }
  .expression { font-size: 2rem; font-family: 'SF Mono', Monaco, monospace; color: #7aa2f7; margin-bottom: 0.5rem; }
  .human-readable { color: #888; font-size: 0.9rem; }
  .field { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .field-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .field-label { font-weight: 600; color: #7aa2f7; font-size: 0.9rem; }
  .field-value { font-family: 'SF Mono', Monaco, monospace; color: #7af782; }
  .field-options { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .option-btn { background: #222; border: 1px solid #333; color: #888; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
  .option-btn:hover { border-color: #555; color: #ccc; }
  .option-btn.selected { background: #1a3a1a; border-color: #7af782; color: #7af782; }
  .next-runs { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 1rem; }
  .next-runs h3 { font-size: 0.9rem; color: #888; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .run-time { padding: 0.4rem 0; color: #ccc; font-size: 0.9rem; font-family: 'SF Mono', Monaco, monospace; }
  .copy-btn { background: #1a1a2e; border: 1px solid #7aa2f7; color: #7aa2f7; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-top: 1rem; }
  .copy-btn:hover { background: #2a2a4e; }
  .presets { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
  .preset-btn { background: #222; border: 1px solid #333; color: #888; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
  .preset-btn:hover { border-color: #555; }
  .input-option { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
  .input-option input { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 0.4rem; border-radius: 4px; width: 80px; font-family: 'SF Mono', Monaco, monospace; }
  .input-option label { color: #666; font-size: 0.8rem; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Cron Expression Builder</h1>
    <p class="subtitle">Build cron expressions visually — see human-readable text and next 5 run times instantly.</p>
    
    <div class="presets">
      <button class="preset-btn" data-cron="* * * * *">Every minute</button>
      <button class="preset-btn" data-cron="0 * * * *">Every hour</button>
      <button class="preset-btn" data-cron="0 0 * * *">Daily at midnight</button>
      <button class="preset-btn" data-cron="0 9 * * *">Daily at 9 AM</button>
      <button class="preset-btn" data-cron="0 0 * * 0">Weekly (Sunday)</button>
      <button class="preset-btn" data-cron="0 0 1 * *">Monthly</button>
    </div>

    <div class="expression-display">
      <div class="expression" id="expression">* * * * *</div>
      <div class="human-readable" id="humanReadable">Runs every minute</div>
      <button class="copy-btn" onclick="copyExpression()">Copy Expression</button>
    </div>

    <div class="field">
      <div class="field-header">
        <span class="field-label">Minute (0-59)</span>
        <span class="field-value" id="minuteValue">*</span>
      </div>
      <div class="field-options" id="minuteOptions">
        <button class="option-btn selected" data-value="*" data-field="minute">Every (*)</button>
        <button class="option-btn" data-value="0" data-field="minute">:00</button>
        <button class="option-btn" data-value="15" data-field="minute">:15</button>
        <button class="option-btn" data-value="30" data-field="minute">:30</button>
        <button class="option-btn" data-value="45" data-field="minute">:45</button>
        <div class="input-option">
          <input type="number" min="0" max="59" placeholder="N" id="minuteInput">
          <label>Specific minute</label>
        </div>
      </div>
    </div>

    <div class="field">
      <div class="field-header">
        <span class="field-label">Hour (0-23)</span>
        <span class="field-value" id="hourValue">*</span>
      </div>
      <div class="field-options" id="hourOptions">
        <button class="option-btn selected" data-value="*" data-field="hour">Every (*)</button>
        <button class="option-btn" data-value="0" data-field="hour">12 AM</button>
        <button class="option-btn" data-value="9" data-field="hour">9 AM</button>
        <button class="option-btn" data-value="12" data-field="hour">12 PM</button>
        <button class="option-btn" data-value="18" data-field="hour">6 PM</button>
        <div class="input-option">
          <input type="number" min="0" max="23" placeholder="N" id="hourInput">
          <label>Specific hour</label>
        </div>
      </div>
    </div>

    <div class="field">
      <div class="field-header">
        <span class="field-label">Day of Month (1-31)</span>
        <span class="field-value" id="dayValue">*</span>
      </div>
      <div class="field-options" id="dayOptions">
        <button class="option-btn selected" data-value="*" data-field="day">Every (*)</button>
        <button class="option-btn" data-value="1" data-field="day">1st</button>
        <button class="option-btn" data-value="15" data-field="day">15th</button>
        <div class="input-option">
          <input type="number" min="1" max="31" placeholder="N" id="dayInput">
          <label>Specific day</label>
        </div>
      </div>
    </div>

    <div class="field">
      <div class="field-header">
        <span class="field-label">Month (1-12)</span>
        <span class="field-value" id="monthValue">*</span>
      </div>
      <div class="field-options" id="monthOptions">
        <button class="option-btn selected" data-value="*" data-field="month">Every (*)</button>
        <button class="option-btn" data-value="1" data-field="month">Jan</button>
        <button class="option-btn" data-value="4" data-field="month">Apr</button>
        <button class="option-btn" data-value="7" data-field="month">Jul</button>
        <button class="option-btn" data-value="10" data-field="month">Oct</button>
      </div>
    </div>

    <div class="field">
      <div class="field-header">
        <span class="field-label">Day of Week (0-6)</span>
        <span class="field-value" id="weekdayValue">*</span>
      </div>
      <div class="field-options" id="weekdayOptions">
        <button class="option-btn selected" data-value="*" data-field="weekday">Every (*)</button>
        <button class="option-btn" data-value="0" data-field="weekday">Sun</button>
        <button class="option-btn" data-value="1" data-field="weekday">Mon</button>
        <button class="option-btn" data-value="2" data-field="weekday">Tue</button>
        <button class="option-btn" data-value="3" data-field="weekday">Wed</button>
        <button class="option-btn" data-value="4" data-field="weekday">Thu</button>
        <button class="option-btn" data-value="5" data-field="weekday">Fri</button>
        <button class="option-btn" data-value="6" data-field="weekday">Sat</button>
      </div>
    </div>

    <div class="next-runs">
      <h3>Next 5 Run Times</h3>
      <div id="nextRuns"></div>
    </div>
  </div>

  <script>
    const state = { minute: '*', hour: '*', day: '*', month: '*', weekday: '*' };
    const weekdayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

    function updateExpression() {
      const expr = `${state.minute} ${state.hour} ${state.day} ${state.month} ${state.weekday}`;
      document.getElementById('expression').textContent = expr;
      updateHumanReadable();
      updateNextRuns();
    }

    function updateHumanReadable() {
      let text = 'Runs ';
      const parts = [];

      if (state.minute === '*' && state.hour === '*' && state.day === '*' && state.month === '*' && state.weekday === '*') {
        text = 'Runs every minute';
      } else {
        if (state.weekday !== '*') {
          const day = weekdayNames[parseInt(state.weekday)];
          parts.push(`on ${day}`);
        }
        if (state.hour !== '*') {
          const h = parseInt(state.hour);
          const ampm = h >= 12 ? 'PM' : 'AM';
          const h12 = h % 12 || 12;
          parts.push(`at ${h12}:${state.minute === '*' ? '00' : state.minute.padStart(2, '0')} ${ampm}`);
        } else if (state.minute !== '*') {
          parts.push(`at minute ${state.minute}`);
        }
        if (state.day !== '*') {
          parts.push(`on day ${state.day}`);
        }
        if (state.month !== '*') {
          parts.push(`in ${monthNames[parseInt(state.month) - 1] || state.month}`);
        }
        text = 'Runs ' + (parts.length ? parts.join(' ') : 'according to schedule');
      }
      document.getElementById('humanReadable').textContent = text;
    }

    function getFieldValue(field) {
      const input = document.getElementById(field + 'Input');
      if (input && input.value) {
        return input.value;
      }
      return state[field];
    }

    function updateNextRuns() {
      const container = document.getElementById('nextRuns');
      container.innerHTML = '';
      
      const parts = [getFieldValue('minute'), getFieldValue('hour'), getFieldValue('day'), getFieldValue('month'), getFieldValue('weekday')];
      const now = new Date();
      let count = 0;
      let check = new Date(now);
      check.setSeconds(0, 0);
      check.setMinutes(check.getMinutes() + 1);

      while (count < 5) {
        const minute = check.getMinutes();
        const hour = check.getHours();
        const day = check.getDate();
        const month = check.getMonth() + 1;
        const weekday = check.getDay();

        const matchMinute = parts[0] === '*' || parseInt(parts[0]) === minute;
        const matchHour = parts[1] === '*' || parseInt(parts[1]) === hour;
        const matchDay = parts[2] === '*' || parseInt(parts[2]) === day;
        const matchMonth = parts[3] === '*' || parseInt(parts[3]) === month;
        const matchWeekday = parts[4] === '*' || parseInt(parts[4]) === weekday;

        if (matchMinute && matchHour && matchDay && matchMonth && matchWeekday) {
          const div = document.createElement('div');
          div.className = 'run-time';
          div.textContent = check.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
          container.appendChild(div);
          count++;
        }
        check.setMinutes(check.getMinutes() + 1);
        if (count === 0 && check.getTime() - now.getTime() > 86400000 * 30) break;
      }

      if (count === 0) {
        container.innerHTML = '<div class="run-time">No matches found in next 30 days</div>';
      }
    }

    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = btn.dataset.field;
        const value = btn.dataset.value;
        
        document.querySelectorAll(`[data-field="${field}"]`).forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        
        state[field] = value;
        updateExpression();
      });
    });

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const cron = btn.dataset.cron.split(' ');
        state.minute = cron[0];
        state.hour = cron[1];
        state.day = cron[2];
        state.month = cron[3];
        state.weekday = cron[4];
        
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        updateExpression();
      });
    });

    ['minute', 'hour', 'day'].forEach(field => {
      const input = document.getElementById(field + 'Input');
      if (input) {
        input.addEventListener('input', () => {
          state[field] = input.value || '*';
          document.querySelectorAll(`[data-field="${field}"]`).forEach(b => b.classList.remove('selected'));
          updateExpression();
        });
      }
    });

    function copyExpression() {
      navigator.clipboard.writeText(document.getElementById('expression').textContent);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Expression', 1500);
    }

    updateExpression();
  </script>
</body>
</html>
