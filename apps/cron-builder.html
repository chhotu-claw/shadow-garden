<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Expression Builder — Shadow's Garden</title>
<meta name="description" content="Build cron schedules visually. Select minute, hour, day, month, weekday — see the next 5 run times instantly.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .builder { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
  .field { background: var(--bg-secondary); padding: 16px; border-radius: 8px; }
  .field label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-muted); }
  .field select, .field input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-family: inherit; font-size: 0.9rem; }
  .field select { cursor: pointer; }
  .output { background: var(--bg-secondary); padding: 20px; border-radius: 8px; margin-bottom: 24px; }
  .output code { display: block; font-size: 1.4rem; color: var(--accent); font-family: monospace; margin-bottom: 16px; }
  .next-runs { margin-top: 8px; }
  .next-runs h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px; }
  .next-runs ul { list-style: none; padding: 0; margin: 0; font-size: 0.9rem; color: var(--text-light); }
  .next-runs li { padding: 4px 0; border-bottom: 1px solid var(--border); }
  .next-runs li:last-child { border-bottom: none; }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .presets button { padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; color: var(--text); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .presets button:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn { padding: 8px 16px; background: var(--accent); color: var(--bg) !important; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
  .copy-btn:hover { opacity: 0.9; }
  .explanation { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
  .explanation code { background: var(--bg-secondary); padding: 2px 6px; border-radius: 3px; }
  @media (max-width: 600px) { .builder { grid-template-columns: 1fr; } }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Cron Expression Builder</h1>
  <p class="explanation">Cron expressions schedule tasks. Format: <code>minute hour day month weekday</code>. Select each field below to build your schedule.</p>
  
  <div class="presets">
    <button onclick="applyPreset('* * * * *')">Every minute</button>
    <button onclick="applyPreset('0 * * * *')">Every hour</button>
    <button onclick="applyPreset('0 0 * * *')">Daily midnight</button>
    <button onclick="applyPreset('0 0 * * 0')">Weekly Sunday</button>
    <button onclick="applyPreset('0 0 1 * *')">Monthly 1st</button>
    <button onclick="applyPreset('0 9 * * 1-5')">Weekdays 9am</button>
  </div>

  <div class="builder">
    <div class="field">
      <label>Minute (0-59)</label>
      <select id="minute"><option value="*">Every minute (*)</option></select>
    </div>
    <div class="field">
      <label>Hour (0-23)</label>
      <select id="hour"><option value="*">Every hour (*)</option></select>
    </div>
    <div class="field">
      <label>Day (1-31)</label>
      <select id="day"><option value="*">Every day (*)</option></select>
    </div>
    <div class="field">
      <label>Month (1-12)</label>
      <select id="month"><option value="*">Every month (*)</option></select>
    </div>
    <div class="field">
      <label>Weekday (0-6)</label>
      <select id="weekday"><option value="*">Every weekday (*)</option></select>
    </div>
  </div>

  <div class="output">
    <code id="cron-display">* * * * *</code>
    <button class="copy-btn" onclick="copyCron()">Copy</button>
    <div class="next-runs">
      <h3>Next 5 runs (local time):</h3>
      <ul id="next-runs"></ul>
    </div>
  </div>
</div>
<script>
function populateSelect(id, values, labels) {
  const sel = document.getElementById(id);
  values.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = labels ? labels[i] : v;
    sel.appendChild(opt);
  });
}

// Populate selects
populateSelect('minute', ['*', '0', '15', '30', '45', '0,30', '0,15,30,45']);
populateSelect('hour', ['*', '0', '6', '9', '12', '18', '0,12']);
populateSelect('day', ['*', '1', '15', '1,15']);
populateSelect('month', ['*', '1', '3', '6', '9', '12', '1,4,7,10']);
populateSelect('weekday', ['*', '0', '1', '2', '3', '4', '5', '6', '1-5', '0,6']);

function getCron() {
  return [
    document.getElementById('minute').value,
    document.getElementById('hour').value,
    document.getElementById('day').value,
    document.getElementById('month').value,
    document.getElementById('weekday').value
  ].join(' ');
}

function parseCronField(field, max) {
  if (field === '*') return { type: 'any' };
  if (field.includes(',')) return { type: 'list', values: field.split(',').map(Number) };
  if (field.includes('-')) {
    const [start, end] = field.split('-').map(Number);
    return { type: 'range', start, end };
  }
  return { type: 'single', value: Number(field) };
}

function matches(value, parsed) {
  if (parsed.type === 'any') return true;
  if (parsed.type === 'single') return value === parsed.value;
  if (parsed.type === 'list') return parsed.values.includes(value);
  if (parsed.type === 'range') return value >= parsed.start && value <= parsed.end;
  return false;
}

function getNextRuns(cron, count = 5) {
  const parts = cron.split(' ');
  const parsed = parts.map(p => parseCronField(p, 60));
  const runs = [];
  let d = new Date();
  d.setSeconds(0, 0);
  d.setMinutes(d.getMinutes() + 1);
  
  while (runs.length < count && runs.length < 1000) {
    const minute = d.getMinutes();
    const hour = d.getHours();
    const day = d.getDate();
    const month = d.getMonth() + 1;
    const weekday = d.getDay();
    
    if (
      matches(minute, parsed[0]) &&
      matches(hour, parsed[1]) &&
      matches(day, parsed[2]) &&
      matches(month, parsed[3]) &&
      matches(weekday, parsed[4])
    ) {
      runs.push(new Date(d));
    }
    d.setMinutes(d.getMinutes() + 1);
  }
  return runs;
}

function updateOutput() {
  const cron = getCron();
  document.getElementById('cron-display').textContent = cron;
  const runs = getNextRuns(cron);
  const ul = document.getElementById('next-runs');
  ul.innerHTML = runs.map(r => `<li>${r.toLocaleString()}</li>`).join('');
}

function applyPreset(cron) {
  const parts = cron.split(' ');
  ['minute', 'hour', 'day', 'month', 'weekday'].forEach((id, i) => {
    const sel = document.getElementById(id);
    const val = parts[i];
    const opt = Array.from(sel.options).find(o => o.value === val);
    if (opt) sel.value = val;
    else {
      const newOpt = document.createElement('option');
      newOpt.value = val;
      newOpt.textContent = val;
      sel.appendChild(newOpt);
      sel.value = val;
    }
  });
  updateOutput();
}

function copyCron() {
  navigator.clipboard.writeText(document.getElementById('cron-display').textContent);
}

document.querySelectorAll('select').forEach(s => s.addEventListener('change', updateOutput));
updateOutput();
</script>
</body>
</html>
