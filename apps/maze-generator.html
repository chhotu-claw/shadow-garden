<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Generator — Shadow's Garden</title>
<meta name="description" content="Interactive maze generator with multiple algorithms — recursive backtracking, Prim's, Kruskal's. Watch solvers find the path.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    margin: 0;
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
  }
  .container {
    display: flex;
    height: 100vh;
  }
  .sidebar {
    width: 220px;
    background: linear-gradient(180deg, #12121a 0%, #0a0a0f 100%);
    border-right: 1px solid #2a2a3a;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  .sidebar h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #888;
    margin: 0 0 10px 0;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  select, button {
    background: #1a1a24;
    border: 1px solid #3a3a4a;
    color: #ccc;
    padding: 10px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  select:hover, button:hover {
    background: #252530;
    border-color: #5a5a6a;
  }
  button.primary {
    background: #2a4a6a;
    border-color: #4a6a8a;
  }
  button.primary:hover {
    background: #3a5a7a;
  }
  .info {
    font-size: 10px;
    color: #555;
    line-height: 1.6;
  }
  canvas {
    flex: 1;
    display: block;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="sidebar">
    <h2>Maze Generator</h2>
    <div class="controls">
      <label>Algorithm</label>
      <select id="algorithm">
        <option value="backtracking">Recursive Backtracking</option>
        <option value="prims">Prim's Algorithm</option>
        <option value="kruskals">Kruskal's Algorithm</option>
      </select>
      
      <label>Solver</label>
      <select id="solver">
        <option value="none">None</option>
        <option value="dfs">DFS (Depth-First)</option>
        <option value="bfs">BFS (Breadth-First)</option>
        <option value="astar">A* (A-Star)</option>
      </select>
      
      <label>Cell Size</label>
      <select id="cellSize">
        <option value="10">10px</option>
        <option value="15" selected>15px</option>
        <option value="20">20px</option>
        <option value="25">25px</option>
      </select>
      
      <button class="primary" onclick="generateMaze()">Generate Maze</button>
      <button onclick="solveMaze()">Run Solver</button>
      <button onclick="clearSolution()">Clear Solution</button>
    </div>
    
    <div class="info">
      <p><strong>Algorithms:</strong><br>
      Backtracking — long winding paths<br>
      Prim's — branching, natural<br>
      Kruskal's — uniform randomness</p>
      
      <p><strong>Solvers:</strong><br>
      DFS — explores deep, random path<br>
      BFS — finds shortest path<br>
      A* — guided shortest path</p>
    </div>
  </div>
  <canvas id="canvas"></canvas>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  let cellSize = 15;
  let cols, rows;
  let maze = [];
  let solution = [];
  let solving = false;
  let solveQueue = [];
  let currentSolveStep = 0;
  
  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    cols = Math.floor(canvas.width / cellSize);
    rows = Math.floor(canvas.height / cellSize);
  }
  
  window.addEventListener('resize', () => {
    resize();
    if (maze.length > 0) drawMaze();
  });
  
  resize();
  
  class Cell {
    constructor(col, row) {
      this.col = col;
      this.row = row;
      this.walls = { top: true, right: true, bottom: true, left: true };
      this.visited = false;
    }
  }
  
  function index(c, r) {
    if (c < 0 || r < 0 || c >= cols || r >= rows) return -1;
    return c + r * cols;
  }
  
  function generateMaze() {
    maze = [];
    solution = [];
    solving = false;
    
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        maze.push(new Cell(c, r));
      }
    }
    
    const algorithm = document.getElementById('algorithm').value;
    
    if (algorithm === 'backtracking') {
      backtracking();
    } else if (algorithm === 'prims') {
      prims();
    } else if (algorithm === 'kruskals') {
      kruskals();
    }
    
    drawMaze();
  }
  
  function backtracking() {
    let current = maze[0];
    current.visited = true;
    let stack = [current];
    
    while (stack.length > 0) {
      let next = getUnvisitedNeighbors(current);
      if (next) {
        next.visited = true;
        stack.push(current);
        removeWalls(current, next);
        current = next;
      } else {
        current = stack.pop();
      }
    }
  }
  
  function prims() {
    let visited = new Set();
    let edges = [];
    
    let start = maze[0];
    visited.add(index(start.col, start.row));
    addEdgeNeighbors(start, edges);
    
    while (edges.length > 0) {
      let randIdx = Math.floor(Math.random() * edges.length);
      let { from, to } = edges.splice(randIdx, 1)[0];
      
      if (visited.has(index(to.col, to.row))) continue;
      
      visited.add(index(to.col, to.row));
      removeWalls(from, to);
      addEdgeNeighbors(to, edges);
    }
  }
  
  function kruskals() {
    let edges = [];
    let sets = [];
    
    for (let i = 0; i < maze.length; i++) {
      sets.push(i);
    }
    
    for (let cell of maze) {
      if (cell.col < cols - 1) {
        edges.push({ a: index(cell.col, cell.row), b: index(cell.col + 1, cell.row), from: cell, to: maze[index(cell.col + 1, cell.row)] });
      }
      if (cell.row < rows - 1) {
        edges.push({ a: index(cell.col, cell.row), b: index(cell.col, cell.row + 1), from: cell, to: maze[index(cell.col, cell.row + 1)] });
      }
    }
    
    edges.sort(() => Math.random() - 0.5);
    
    function findSet(x) {
      if (sets[x] !== x) sets[x] = findSet(sets[x]);
      return sets[x];
    }
    
    for (let edge of edges) {
      let setA = findSet(edge.a);
      let setB = findSet(edge.b);
      
      if (setA !== setB) {
        sets[setA] = setB;
        removeWalls(edge.from, edge.to);
      }
    }
  }
  
  function addEdgeNeighbors(cell, edges) {
    let neighbors = getAllNeighbors(cell);
    for (let n of neighbors) {
      edges.push({ from: cell, to: n });
    }
  }
  
  function getUnvisitedNeighbors(cell) {
    let neighbors = [];
    let top = maze[index(cell.col, cell.row - 1)];
    let right = maze[index(cell.col + 1, cell.row)];
    let bottom = maze[index(cell.col, cell.row + 1)];
    let left = maze[index(cell.col - 1, cell.row)];
    
    if (top && !top.visited) neighbors.push(top);
    if (right && !right.visited) neighbors.push(right);
    if (bottom && !bottom.visited) neighbors.push(bottom);
    if (left && !left.visited) neighbors.push(left);
    
    if (neighbors.length > 0) {
      return neighbors[Math.floor(Math.random() * neighbors.length)];
    }
    return undefined;
  }
  
  function getAllNeighbors(cell) {
    let neighbors = [];
    let top = maze[index(cell.col, cell.row - 1)];
    let right = maze[index(cell.col + 1, cell.row)];
    let bottom = maze[index(cell.col, cell.row + 1)];
    let left = maze[index(cell.col - 1, cell.row)];
    
    if (top) neighbors.push(top);
    if (right) neighbors.push(right);
    if (bottom) neighbors.push(bottom);
    if (left) neighbors.push(left);
    
    return neighbors;
  }
  
  function removeWalls(a, b) {
    let dx = a.col - b.col;
    let dy = a.row - b.row;
    
    if (dx === 1) { a.walls.left = false; b.walls.right = false; }
    else if (dx === -1) { a.walls.right = false; b.walls.left = false; }
    else if (dy === 1) { a.walls.top = false; b.walls.bottom = false; }
    else if (dy === -1) { a.walls.bottom = false; b.walls.top = false; }
  }
  
  function drawMaze() {
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    for (let cell of maze) {
      let x = cell.col * cellSize;
      let y = cell.row * cellSize;
      
      ctx.strokeStyle = '#3a3a4a';
      ctx.lineWidth = 1;
      
      if (cell.walls.top) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + cellSize, y);
        ctx.stroke();
      }
      if (cell.walls.right) {
        ctx.beginPath();
        ctx.moveTo(x + cellSize, y);
        ctx.lineTo(x + cellSize, y + cellSize);
        ctx.stroke();
      }
      if (cell.walls.bottom) {
        ctx.beginPath();
        ctx.moveTo(x, y + cellSize);
        ctx.lineTo(x + cellSize, y + cellSize);
        ctx.stroke();
      }
      if (cell.walls.left) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y + cellSize);
        ctx.stroke();
      }
    }
    
    // Draw solution
    if (solution.length > 0) {
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(solution[0].col * cellSize + cellSize/2, solution[0].row * cellSize + cellSize/2);
      for (let i = 1; i < solution.length; i++) {
        ctx.lineTo(solution[i].col * cellSize + cellSize/2, solution[i].row * cellSize + cellSize/2);
      }
      ctx.stroke();
    }
    
    // Draw current solving position
    if (solving && solveQueue.length > 0) {
      let pos = solveQueue[currentSolveStep];
      if (pos) {
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(pos.col * cellSize + 2, pos.row * cellSize + 2, cellSize - 4, cellSize - 4);
      }
    }
    
    // Start and end
    ctx.fillStyle = '#00ff88';
    ctx.fillRect(2, 2, cellSize - 4, cellSize - 4);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect((cols - 1) * cellSize + 2, (rows - 1) * cellSize + 2, cellSize - 4, cellSize - 4);
  }
  
  function solveMaze() {
    if (maze.length === 0) return;
    
    const solver = document.getElementById('solver').value;
    if (solver === 'none') return;
    
    solution = [];
    solveQueue = [];
    currentSolveStep = 0;
    solving = true;
    
    if (solver === 'dfs') solveDFS();
    else if (solver === 'bfs') solveBFS();
    else if (solver === 'astar') solveAStar();
    
    animateSolution();
  }
  
  function solveDFS() {
    let start = maze[0];
    let end = maze[maze.length - 1];
    let visited = new Set();
    let path = [];
    
    function dfs(cell) {
      if (cell === end) {
        path.push(cell);
        return true;
      }
      
      visited.add(index(cell.col, cell.row));
      path.push(cell);
      
      let neighbors = getPassableNeighbors(cell);
      for (let n of neighbors) {
        if (!visited.has(index(n.col, n.row))) {
          if (dfs(n)) return true;
        }
      }
      
      path.pop();
      return false;
    }
    
    dfs(start);
    solveQueue = path;
  }
  
  function solveBFS() {
    let start = maze[0];
    let end = maze[maze.length - 1];
    let queue = [start];
    let visited = new Set();
    let parent = {};
    visited.add(index(start.col, start.row));
    
    while (queue.length > 0) {
      let current = queue.shift();
      
      if (current === end) {
        // Reconstruct path
        let path = [];
        let node = end;
        while (node) {
          path.unshift(node);
          node = parent[index(node.col, node.row)];
        }
        solveQueue = path;
        return;
      }
      
      let neighbors = getPassableNeighbors(current);
      for (let n of neighbors) {
        let key = index(n.col, n.row);
        if (!visited.has(key)) {
          visited.add(key);
          parent[key] = current;
          queue.push(n);
        }
      }
    }
  }
  
  function solveAStar() {
    let start = maze[0];
    let end = maze[maze.length - 1];
    let openSet = [start];
    let closedSet = new Set();
    let cameFrom = {};
    let gScore = {};
    let fScore = {};
    
    for (let cell of maze) {
      gScore[index(cell.col, cell.row)] = Infinity;
      fScore[index(cell.col, cell.row)] = Infinity;
    }
    
    gScore[0] = 0;
    fScore[0] = heuristic(start, end);
    
    while (openSet.length > 0) {
      openSet.sort((a, b) => fScore[index(a.col, a.row)] - fScore[index(b.col, b.row)]);
      let current = openSet.shift();
      
      if (current === end) {
        let path = [];
        let node = current;
        while (node) {
          path.unshift(node);
          node = cameFrom[index(node.col, node.row)];
        }
        solveQueue = path;
        return;
      }
      
      closedSet.add(index(current.col, current.row));
      
      let neighbors = getPassableNeighbors(current);
      for (let n of neighbors) {
        let key = index(n.col, n.row);
        if (closedSet.has(key)) continue;
        
        let tentativeG = gScore[index(current.col, current.row)] + 1;
        
        if (tentativeG < gScore[key]) {
          cameFrom[key] = current;
          gScore[key] = tentativeG;
          fScore[key] = tentativeG + heuristic(n, end);
          
          if (!openSet.includes(n)) {
            openSet.push(n);
          }
        }
      }
    }
  }
  
  function heuristic(a, b) {
    return Math.abs(a.col - b.col) + Math.abs(a.row - b.row);
  }
  
  function getPassableNeighbors(cell) {
    let neighbors = [];
    let top = maze[index(cell.col, cell.row - 1)];
    let right = maze[index(cell.col + 1, cell.row)];
    let bottom = maze[index(cell.col, cell.row + 1)];
    let left = maze[index(cell.col - 1, cell.row)];
    
    if (top && !cell.walls.top) neighbors.push(top);
    if (right && !cell.walls.right) neighbors.push(right);
    if (bottom && !cell.walls.bottom) neighbors.push(bottom);
    if (left && !cell.walls.left) neighbors.push(left);
    
    return neighbors;
  }
  
  function animateSolution() {
    if (solution.length > 0) {
      drawMaze();
      return;
    }
    
    if (currentSolveStep < solveQueue.length) {
      currentSolveStep++;
      drawMaze();
      setTimeout(animateSolution, 10);
    } else {
      solving = false;
      solution = [...solveQueue];
      drawMaze();
    }
  }
  
  function clearSolution() {
    solution = [];
    solving = false;
    solveQueue = [];
    drawMaze();
  }
  
  document.getElementById('cellSize').addEventListener('change', (e) => {
    cellSize = parseInt(e.target.value);
    resize();
    if (maze.length > 0) generateMaze();
  });
  
  // Generate initial maze
  generateMaze();
</script>
</body>
</html>
