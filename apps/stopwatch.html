<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch — Shadow's Garden</title>
<meta name="description" content="A simple, clean stopwatch with lap times — all local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
  }
  .stopwatch {
    text-align: center;
    padding: 3rem;
    background: var(--card-bg);
    border-radius: 1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .time-display {
    font-size: 5rem;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: -0.05em;
    margin-bottom: 2rem;
    color: var(--text);
  }
  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 2rem;
  }
  button {
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 0.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: var(--font-sans);
  }
  .btn-start {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-start:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }
  .btn-stop {
    background: #e74c3c;
    color: white;
  }
  .btn-reset {
    background: var(--border);
    color: var(--text);
  }
  .btn-lap {
    background: var(--tag-research);
    color: white;
  }
  .laps {
    max-height: 200px;
    overflow-y: auto;
    width: 100%;
    text-align: left;
  }
  .lap-item {
    padding: 0.5rem;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 0.9rem;
    display: flex;
    justify-content: space-between;
  }
  .lap-item:first-child {
    border-top: 1px solid var(--border);
  }
  h2 {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body data-page-type="app">
  <div class="stopwatch">
    <div class="time-display" id="display">00:00:00.00</div>
    <div class="controls">
      <button class="btn-start" id="startBtn">Start</button>
      <button class="btn-stop" id="stopBtn" style="display:none;">Stop</button>
      <button class="btn-lap" id="lapBtn" disabled>Lap</button>
      <button class="btn-reset" id="resetBtn">Reset</button>
    </div>
    <div class="laps-section" id="lapsSection" style="display:none;">
      <h2>Laps</h2>
      <div class="laps" id="laps"></div>
    </div>
  </div>

  <script>
    let startTime = 0;
    let elapsed = 0;
    let running = false;
    let interval = null;
    let lapCount = 0;

    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const lapBtn = document.getElementById('lapBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lapsSection = document.getElementById('lapsSection');
    const lapsContainer = document.getElementById('laps');

    function formatTime(ms) {
      const totalSec = Math.floor(ms / 1000);
      const hours = Math.floor(totalSec / 3600);
      const minutes = Math.floor((totalSec % 3600) / 60);
      const seconds = totalSec % 60;
      const centiseconds = Math.floor((ms % 1000) / 10);
      
      return [hours, minutes, seconds, centiseconds]
        .map(n => n.toString().padStart(2, '0'))
        .join(':');
    }

    function updateDisplay() {
      const current = running ? Date.now() - startTime + elapsed : elapsed;
      display.textContent = formatTime(current);
    }

    function start() {
      if (running) return;
      running = true;
      startTime = Date.now();
      interval = setInterval(updateDisplay, 10);
      startBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
      lapBtn.disabled = false;
    }

    function stop() {
      if (!running) return;
      running = false;
      elapsed += Date.now() - startTime;
      clearInterval(interval);
      startBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
      stopBtn.textContent = 'Resume';
      lapBtn.disabled = true;
    }

    function resume() {
      running = true;
      startTime = Date.now();
      interval = setInterval(updateDisplay, 10);
      stopBtn.textContent = 'Stop';
      lapBtn.disabled = false;
    }

    function reset() {
      running = false;
      clearInterval(interval);
      elapsed = 0;
      lapCount = 0;
      display.textContent = '00:00:00.00';
      startBtn.style.display = 'inline-block';
      stopBtn.style.display = 'none';
      stopBtn.textContent = 'Stop';
      lapBtn.disabled = true;
      lapsSection.style.display = 'none';
      lapsContainer.innerHTML = '';
    }

    function lap() {
      if (!running) return;
      lapCount++;
      const current = Date.now() - startTime + elapsed;
      const lapTime = current - (lapCount > 1 ? parseInt(lapsContainer.firstChild?.dataset.time || 0) : 0);
      
      const div = document.createElement('div');
      div.className = 'lap-item';
      div.dataset.time = current;
      div.innerHTML = `<span>Lap ${lapCount}</span><span>${formatTime(lapTime)}</span>`;
      lapsContainer.insertBefore(div, lapsContainer.firstChild);
      lapsSection.style.display = 'block';
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', () => {
      if (stopBtn.textContent === 'Stop') stop();
      else resume();
    });
    resetBtn.addEventListener('click', reset);
    lapBtn.addEventListener('click', lap);
  </script>
</body>
</html>
