<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch — Shadow's Garden</title>
<meta name="description" content="A clean stopwatch with lap times, split functionality, and large display. Runs entirely in-browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .stopwatch-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    padding: 2rem;
  }
  .time-display {
    font-size: clamp(3rem, 12vw, 6rem);
    font-weight: 200;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    letter-spacing: 0.05em;
    margin-bottom: 2rem;
    font-variant-numeric: tabular-nums;
  }
  .controls {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .btn {
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .btn-start {
    background: #2d5a2d;
    color: #7af782;
  }
  .btn-start:hover {
    background: #3d7a3d;
  }
  .btn-stop {
    background: #5a2d2d;
    color: #f77a7a;
  }
  .btn-stop:hover {
    background: #7a3d3d;
  }
  .btn-lap, .btn-reset {
    background: #2d2d2d;
    color: #aaa;
  }
  .btn-lap:hover, .btn-reset:hover {
    background: #3d3d3d;
  }
  .laps {
    width: 100%;
    max-width: 500px;
    max-height: 300px;
    overflow-y: auto;
    background: #0d0d0d;
    border-radius: 8px;
    padding: 1rem;
  }
  .laps h3 {
    font-size: 0.85rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }
  .lap-item {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    border-bottom: 1px solid #1a1a1a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
  }
  .lap-item:last-child {
    border-bottom: none;
  }
  .lap-number {
    color: #666;
  }
  .lap-time {
    color: var(--text);
  }
  .lap-split {
    color: #7aa2f7;
  }
  @media (max-width: 500px) {
    .controls {
      width: 100%;
    }
    .btn {
      flex: 1;
      min-width: 80px;
    }
  }
</style>
</head>
<body data-page-type="app">
  <div class="stopwatch-container">
    <div class="time-display" id="display">00:00:00.00</div>
    <div class="controls">
      <button class="btn btn-start" id="startBtn">Start</button>
      <button class="btn btn-stop" id="stopBtn" disabled>Stop</button>
      <button class="btn btn-lap" id="lapBtn" disabled>Lap</button>
      <button class="btn btn-reset" id="resetBtn" disabled>Reset</button>
    </div>
    <div class="laps" id="lapsContainer" style="display: none;">
      <h3>Laps</h3>
      <div id="laps"></div>
    </div>
  </div>
  <script>
    let startTime = 0;
    let elapsed = 0;
    let running = false;
    let interval = null;
    let lapTimes = [];
    
    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const lapBtn = document.getElementById('lapBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lapsContainer = document.getElementById('lapsContainer');
    const lapsEl = document.getElementById('laps');
    
    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      const centiseconds = Math.floor((ms % 1000) / 10);
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(centiseconds).padStart(2, '0')}`;
    }
    
    function update() {
      const now = performance.now();
      elapsed = now - startTime;
      display.textContent = formatTime(elapsed);
    }
    
    startBtn.addEventListener('click', () => {
      if (!running) {
        startTime = performance.now() - elapsed;
        interval = setInterval(update, 10);
        running = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        lapBtn.disabled = false;
        resetBtn.disabled = false;
      }
    });
    
    stopBtn.addEventListener('click', () => {
      if (running) {
        clearInterval(interval);
        running = false;
        startBtn.textContent = 'Resume';
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    });
    
    lapBtn.addEventListener('click', () => {
      if (running || elapsed > 0) {
        lapTimes.unshift(elapsed);
        const lapNum = lapTimes.length;
        const lapItem = document.createElement('div');
        lapItem.className = 'lap-item';
        const split = lapTimes.length > 1 ? lapTimes[0] - lapTimes[1] : elapsed;
        lapItem.innerHTML = `
          <span class="lap-number">Lap ${lapNum}</span>
          <span class="lap-time">${formatTime(elapsed)}</span>
        `;
        lapsEl.insertBefore(lapItem, lapsEl.firstChild);
        lapsContainer.style.display = 'block';
      }
    });
    
    resetBtn.addEventListener('click', () => {
      clearInterval(interval);
      running = false;
      elapsed = 0;
      lapTimes = [];
      display.textContent = '00:00:00.00';
      startBtn.textContent = 'Start';
      startBtn.disabled = false;
      stopBtn.disabled = true;
      lapBtn.disabled = true;
      resetBtn.disabled = true;
      lapsEl.innerHTML = '';
      lapsContainer.style.display = 'none';
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (running) {
          stopBtn.click();
        } else {
          startBtn.click();
        }
      }
    });
  </script>
</body>
</html>
