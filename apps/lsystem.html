<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L-System Generator — Shadow's Garden</title>
<meta name="description" content="Procedural plant generator using Lindenmayer systems. 6 presets included.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-family: monospace;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Drag to rotate • Scroll to zoom</div>
  <div class="controls">
    <button id="p1">Binary Tree</button>
    <button id="p2">Fern</button>
    <button id="p3">Weed</button>
    <button id="p4">Dragon Curve</button>
    <button id="p5">Sierpinski</button>
    <button id="p6">Koch Curve</button>
    <button id="regen">Regenerate</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let rotation = -Math.PI / 2;
    let zoom = 1;
    let dragging = false;
    let lastX, lastY;
    
    const presets = {
      p1: { axiom: 'F', rules: { F: 'FF+[+F-F-F]-[-F+F+F]' }, angle: 22.5, iterations: 4 },
      p2: { axiom: 'X', rules: { X: 'F+[[X]-X]-F[-FX]+X', F: 'FF' }, angle: 25, iterations: 5 },
      p3: { axiom: 'F', rules: { F: 'FF-[-F+F+F]+[+F-F-F]' }, angle: 22.5, iterations: 4 },
      p4: { axiom: 'FX', rules: { X: 'X+YF+', Y: '-FX-Y' }, angle: 90, iterations: 10 },
      p5: { axiom: 'F-G-G', rules: { F: 'F-G+F+G-F', G: 'GG' }, angle: 120, iterations: 6 },
      p6: { axiom: 'F', rules: { F: 'F+F-F-F+F' }, angle: 90, iterations: 4 }
    };
    
    let currentPreset = 'p1';
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      draw();
    }
    
    function generate(preset) {
      let { axiom, rules, angle, iterations } = presets[preset];
      
      for (let i = 0; i < iterations; i++) {
        let next = '';
        for (const char of axiom) {
          next += rules[char] || char;
        }
        axiom = next;
      }
      
      return { axiom, angle: angle * Math.PI / 180 };
    }
    
    function draw() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, width, height);
      
      const { axiom, angle } = generate(currentPreset);
      
      ctx.save();
      ctx.translate(width / 2, height);
      ctx.scale(zoom, zoom);
      ctx.rotate(rotation);
      
      const len = 8;
      
      ctx.strokeStyle = '#4ecdc4';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      
      let stack = [];
      
      for (const char of axiom) {
        if (char === 'F' || char === 'G') {
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(0, -len);
          ctx.stroke();
          ctx.translate(0, -len);
        } else if (char === '+') {
          ctx.rotate(angle);
        } else if (char === '-') {
          ctx.rotate(-angle);
        } else if (char === '[') {
          stack.push({ transform: ctx.getTransform() });
        } else if (char === ']') {
          if (stack.length > 0) {
            const state = stack.pop();
            ctx.setTransform(state.transform);
          }
        }
      }
      
      ctx.restore();
    }
    
    canvas.addEventListener('mousedown', (e) => {
      dragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (dragging) {
        rotation += (e.clientX - lastX) * 0.01;
        lastX = e.clientX;
        lastY = e.clientY;
        draw();
      }
    });
    
    canvas.addEventListener('mouseup', () => dragging = false);
    canvas.addEventListener('mouseleave', () => dragging = false);
    
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom *= e.deltaY > 0 ? 0.9 : 1.1;
      zoom = Math.max(0.1, Math.min(5, zoom));
      draw();
    });
    
    document.getElementById('p1').onclick = () => { currentPreset = 'p1'; draw(); };
    document.getElementById('p2').onclick = () => { currentPreset = 'p2'; draw(); };
    document.getElementById('p3').onclick = () => { currentPreset = 'p3'; draw(); };
    document.getElementById('p4').onclick = () => { currentPreset = 'p4'; draw(); };
    document.getElementById('p5').onclick = () => { currentPreset = 'p5'; draw(); };
    document.getElementById('p6').onclick = () => { currentPreset = 'p6'; draw(); };
    document.getElementById('regen').onclick = draw;
    
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
