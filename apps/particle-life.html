<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Life — Shadow's Garden</title>
<meta name="description" content="Particle life simulation — particles with virtual DNA interact and form emergent structures"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    color: #ccc;
    font-size: 13px;
    z-index: 100;
    max-width: 200px;
  }
  #controls h3 { margin: 0 0 12px 0; color: #fff; font-size: 14px; }
  .control-row { margin-bottom: 10px; }
  .control-row label { display: block; margin-bottom: 4px; color: #888; }
  .control-row input[type="range"] { width: 100%; }
  .control-row span { float: right; color: #4af; }
  button {
    background: #2a4a6a;
    border: none;
    color: #fff;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 4px;
    margin-top: 8px;
    font-size: 11px;
  }
  button:hover { background: #3a5a7a; }
  .preset-btns { margin-top: 10px; }
  .preset-btns button { margin-bottom: 4px; display: block; width: 100%; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #556;
    font-size: 11px;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>Particle Life</h3>
    <div class="control-row">
      <label>Particles <span id="countVal">1500</span></label>
      <input type="range" id="count" min="200" max="3000" value="1500">
    </div>
    <div class="control-row">
      <label>Species <span id="speciesVal">5</span></label>
      <input type="range" id="species" min="2" max="10" value="5">
    </div>
    <div class="control-row">
      <label>Interaction Radius <span id="radiusVal">60</span></label>
      <input type="range" id="radius" min="20" max="150" value="60">
    </div>
    <div class="control-row">
      <label>Speed <span id="speedVal">2</span></label>
      <input type="range" id="speed" min="0.5" max="5" step="0.5" value="2">
    </div>
    <div class="control-row">
      <label>Trail <span id="trailVal">0</span></label>
      <input type="range" id="trail" min="0" max="0.95" step="0.05" value="0">
    </div>
    <button id="regen">Regenerate</button>
    <div class="preset-btns">
      <button id="preset-cells">Cells</button>
      <button id="preset-predator">Predator/Prey</button>
      <button id="preset-solitons">Solitons</button>
      <button id="preset-random">Random</button>
    </div>
  </div>
  <div id="info">Click to add particles | Drag to interact</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    let numParticles = 1500;
    let numSpecies = 5;
    let interactionRadius = 60;
    let maxSpeed = 2;
    let trail = 0;
    let colors = [];
    let interactionMatrix = [];
    
    const speciesColors = [
      '#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181',
      '#aa96da', '#fcbad3', '#a8d8ea', '#ff9a3c', '#b8f2e6'
    ];
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    
    function initParticles() {
      particles = [];
      colors = [];
      for (let i = 0; i < numSpecies; i++) {
        colors.push(speciesColors[i % speciesColors.length]);
      }
      
      for (let i = 0; i < numParticles; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          species: Math.floor(Math.random() * numSpecies)
        });
      }
      
      initInteractionMatrix();
    }
    
    function initInteractionMatrix() {
      interactionMatrix = [];
      for (let i = 0; i < numSpecies; i++) {
        interactionMatrix[i] = [];
        for (let j = 0; j < numSpecies; j++) {
          interactionMatrix[i][j] = (Math.random() - 0.5) * 2;
        }
      }
    }
    
    function setInteractionPreset(preset) {
      initInteractionMatrix();
      if (preset === 'cells') {
        for (let i = 0; i < numSpecies; i++) {
          for (let j = 0; j < numSpecies; j++) {
            if (i === j) interactionMatrix[i][j] = -0.8;
            else interactionMatrix[i][j] = 0.3;
          }
        }
      } else if (preset === 'predator') {
        for (let i = 0; i < numSpecies; i++) {
          for (let j = 0; j < numSpecies; j++) {
            let diff = (i - j + numSpecies) % numSpecies;
            if (diff === 1) interactionMatrix[i][j] = -1;
            else if (diff === numSpecies - 1) interactionMatrix[i][j] = 1;
            else interactionMatrix[i][j] = 0;
          }
        }
      } else if (preset === 'solitons') {
        for (let i = 0; i < numSpecies; i++) {
          for (let j = 0; j < numSpecies; j++) {
            if (i === j) interactionMatrix[i][j] = -0.5;
            else interactionMatrix[i][j] = 0.2;
          }
        }
      }
    }
    
    function update() {
      const radiusSq = interactionRadius * interactionRadius;
      
      for (let p of particles) {
        let fx = 0, fy = 0;
        
        for (let other of particles) {
          if (p === other) continue;
          
          let dx = other.x - p.x;
          let dy = other.y - p.y;
          
          if (dx > width / 2) dx -= width;
          if (dx < -width / 2) dx += width;
          if (dy > height / 2) dy -= height;
          if (dy < -height / 2) dy += height;
          
          let distSq = dx * dx + dy * dy;
          
          if (distSq > 0 && distSq < radiusSq) {
            let dist = Math.sqrt(distSq);
            let force = interactionMatrix[p.species][other.species];
            
            // Attract or repel based on distance
            if (dist < interactionRadius / 3) {
              force *= -1; // Repel when very close
            }
            
            let f = (1 - dist / interactionRadius) * force;
            fx += f * dx / dist;
            fy += f * dy / dist;
          }
        }
        
        p.vx += fx * 0.05;
        p.vy += fy * 0.05;
        
        // Limit speed
        let speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (speed > maxSpeed) {
          p.vx = (p.vx / speed) * maxSpeed;
          p.vy = (p.vy / speed) * maxSpeed;
        }
        
        p.x += p.vx;
        p.y += p.vy;
        
        // Wrap around edges
        if (p.x < 0) p.x += width;
        if (p.x > width) p.x -= width;
        if (p.y < 0) p.y += height;
        if (p.y > height) p.y -= height;
      }
    }
    
    function render() {
      if (trail > 0) {
        ctx.fillStyle = `rgba(10, 10, 15, ${1 - trail})`;
        ctx.fillRect(0, 0, width, height);
      } else {
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, width, height);
      }
      
      for (let p of particles) {
        ctx.fillStyle = colors[p.species];
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function animate() {
      update();
      render();
      requestAnimationFrame(animate);
    }
    
    // Event listeners
    document.getElementById('count').addEventListener('input', e => {
      numParticles = +e.target.value;
      document.getElementById('countVal').textContent = numParticles;
      initParticles();
    });
    document.getElementById('species').addEventListener('input', e => {
      numSpecies = +e.target.value;
      document.getElementById('speciesVal').textContent = numSpecies;
      initParticles();
    });
    document.getElementById('radius').addEventListener('input', e => {
      interactionRadius = +e.target.value;
      document.getElementById('radiusVal').textContent = interactionRadius;
    });
    document.getElementById('speed').addEventListener('input', e => {
      maxSpeed = +e.target.value;
      document.getElementById('speedVal').textContent = maxSpeed;
    });
    document.getElementById('trail').addEventListener('input', e => {
      trail = +e.target.value;
      document.getElementById('trailVal').textContent = trail;
    });
    document.getElementById('regen').addEventListener('click', initParticles);
    document.getElementById('preset-cells').addEventListener('click', () => setInteractionPreset('cells'));
    document.getElementById('preset-predator').addEventListener('click', () => setInteractionPreset('predator'));
    document.getElementById('preset-solitons').addEventListener('click', () => setInteractionPreset('solitons'));
    document.getElementById('preset-random').addEventListener('click', initInteractionMatrix);
    
    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      for (let i = 0; i < 20; i++) {
        particles.push({
          x: x + (Math.random() - 0.5) * 30,
          y: y + (Math.random() - 0.5) * 30,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          species: Math.floor(Math.random() * numSpecies)
        });
      }
    });
    
    window.addEventListener('resize', resize);
    resize();
    initParticles();
    animate();
  </script>
</body>
</html>
