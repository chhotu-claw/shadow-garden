<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmark Manager — Shadow's Garden</title>
<meta name="description" content="Save, organize, and search your bookmarks with tags. Export anytime.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
    --success: #22c55e;
    --danger: #ef4444;
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1rem;
    margin: 0;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    margin: 0.5rem 0;
    font-size: 1.5rem;
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
    font-size: 0.8rem;
  }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
  }

  .form-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }

  input[type="text"],
  input[type="url"] {
    flex: 1;
    padding: 0.6rem 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
  }

  input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .btn {
    padding: 0.6rem 1rem;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover {
    background: var(--primary-hover);
  }

  .btn-secondary {
    background: var(--border);
    color: var(--text);
  }

  .btn-secondary:hover {
    background: #475569;
  }

  .btn-danger {
    background: var(--danger);
    color: white;
  }

  .btn-small {
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
  }

  .search-bar {
    width: 100%;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    margin-bottom: 1rem;
  }

  .tags-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .tag-btn {
    padding: 0.3rem 0.6rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tag-btn:hover, .tag-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }

  .bookmarks-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .bookmark-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 1rem;
    background: var(--card);
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .bookmark-item:hover {
    border-color: var(--primary);
  }

  .bookmark-content {
    flex: 1;
    min-width: 0;
  }

  .bookmark-title {
    font-weight: 600;
    margin-bottom: 0.25rem;
    word-break: break-word;
  }

  .bookmark-url {
    color: var(--text-muted);
    font-size: 0.8rem;
    text-decoration: none;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 0.5rem;
  }

  .bookmark-url:hover {
    color: var(--primary);
  }

  .bookmark-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
  }

  .bookmark-tag {
    padding: 0.15rem 0.5rem;
    background: var(--bg);
    border-radius: 3px;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .bookmark-actions {
    display: flex;
    gap: 0.35rem;
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 2rem;
  }

  .toolbar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .count {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 0.5rem;
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: white;
    padding: 0.6rem 1.25rem;
    border-radius: 6px;
    font-size: 0.8rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
  }

  .actions-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  @media (max-width: 600px) {
    .form-row {
      flex-direction: column;
    }
    .bookmark-item {
      flex-direction: column;
    }
    .bookmark-actions {
      align-self: flex-end;
    }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>🔖 Bookmark Manager</h1>
    <p class="subtitle">Save, tag, search, export. Your personal link library.</p>

    <div class="card">
      <div class="form-row">
        <input type="text" id="title" placeholder="Title">
        <input type="url" id="url" placeholder="https://example.com">
      </div>
      <div class="form-row">
        <input type="text" id="tags" placeholder="Tags (comma separated)">
        <button class="btn btn-primary" onclick="addBookmark()">Save</button>
      </div>
    </div>

    <div class="actions-row">
      <input type="text" class="search-bar" id="search" placeholder="Search bookmarks..." oninput="renderBookmarks()" style="margin-bottom: 0; flex: 1;">
    </div>

    <div class="tags-filter" id="tagsFilter"></div>

    <div class="toolbar">
      <button class="btn btn-secondary" onclick="exportBookmarks()">📤 Export JSON</button>
      <label class="btn btn-secondary" style="cursor: pointer;">
        📥 Import
        <input type="file" accept=".json" onchange="importBookmarks(event)" style="display: none;">
      </label>
      <button class="btn btn-secondary" onclick="clearAll()">🗑️ Clear All</button>
    </div>

    <div class="bookmarks-list" id="bookmarksList"></div>
    <p class="count" id="count"></p>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'bookmark_manager';

    let bookmarks = [];
    let activeTag = null;

    function getBookmarks() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveBookmarks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
    }

    function addBookmark() {
      const title = document.getElementById('title').value.trim();
      const url = document.getElementById('url').value.trim();
      const tagsStr = document.getElementById('tags').value.trim();

      if (!title || !url) {
        showToast('Title and URL required');
        return;
      }

      let urlToSave = url;
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        urlToSave = 'https://' + url;
      }

      const tags = tagsStr.split(',').map(t => t.trim().toLowerCase()).filter(t => t);

      bookmarks.unshift({
        id: Date.now(),
        title,
        url: urlToSave,
        tags,
        created: Date.now()
      });

      saveBookmarks();
      renderBookmarks();

      document.getElementById('title').value = '';
      document.getElementById('url').value = '';
      document.getElementById('tags').value = '';

      showToast('Bookmark saved!');
    }

    function deleteBookmark(id) {
      bookmarks = bookmarks.filter(b => b.id !== id);
      saveBookmarks();
      renderBookmarks();
      showToast('Deleted');
    }

    function renderBookmarks() {
      const search = document.getElementById('search').value.toLowerCase();
      const list = document.getElementById('bookmarksList');

      let filtered = bookmarks;

      if (search) {
        filtered = filtered.filter(b => 
          b.title.toLowerCase().includes(search) ||
          b.url.toLowerCase().includes(search) ||
          b.tags.some(t => t.includes(search))
        );
      }

      if (activeTag) {
        filtered = filtered.filter(b => b.tags.includes(activeTag));
      }

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state">No bookmarks yet. Add your first one!</div>';
        document.getElementById('count').textContent = '';
        return;
      }

      list.innerHTML = filtered.map(b => `
        <div class="bookmark-item">
          <div class="bookmark-content">
            <div class="bookmark-title">${escapeHtml(b.title)}</div>
            <a href="${escapeHtml(b.url)}" class="bookmark-url" target="_blank" rel="noopener">${escapeHtml(b.url)}</a>
            ${b.tags.length ? `<div class="bookmark-tags">${b.tags.map(t => `<span class="bookmark-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
          </div>
          <div class="bookmark-actions">
            <button class="btn btn-danger btn-small" onclick="deleteBookmark(${b.id})">×</button>
          </div>
        </div>
      `).join('');

      document.getElementById('count').textContent = `${filtered.length} bookmark${filtered.length !== 1 ? 's' : ''}`;
    }

    function renderTags() {
      const allTags = new Set();
      bookmarks.forEach(b => b.tags.forEach(t => allTags.add(t)));

      const container = document.getElementById('tagsFilter');
      const tagsArray = Array.from(allTags).sort();

      if (tagsArray.length === 0) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML = `
        <button class="tag-btn ${!activeTag ? 'active' : ''}" onclick="filterByTag(null)">All</button>
        ${tagsArray.map(t => `
          <button class="tag-btn ${activeTag === t ? 'active' : ''}" onclick="filterByTag('${escapeHtml(t)}')">${escapeHtml(t)}</button>
        `).join('')}
      `;
    }

    function filterByTag(tag) {
      activeTag = tag;
      renderTags();
      renderBookmarks();
    }

    function exportBookmarks() {
      const data = JSON.stringify(bookmarks, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bookmarks-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('Exported!');
    }

    function importBookmarks(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            bookmarks = [...imported, ...bookmarks];
            saveBookmarks();
            renderBookmarks();
            renderTags();
            showToast('Imported!');
          } else {
            showToast('Invalid format');
          }
        } catch {
          showToast('Failed to parse');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    function clearAll() {
      if (confirm('Delete all bookmarks?')) {
        bookmarks = [];
        saveBookmarks();
        renderBookmarks();
        renderTags();
        showToast('Cleared');
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Init
    bookmarks = getBookmarks();
    renderTags();
    renderBookmarks();
  </script>
</body>
</html>
