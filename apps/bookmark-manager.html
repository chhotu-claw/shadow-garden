<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmark Manager — Shadow's Garden</title>
<meta name="description" content="Save, organize, and search your bookmarks with tags">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #8b5cf6;
    --accent-dark: #7c3aed;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    background: linear-gradient(135deg, #1e1e2e 0%, #2d1b4e 100%);
    padding: 2rem;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  h1 {
    color: #fff;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .add-bookmark {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.75rem;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  input[type="text"], input[type="url"] {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    color: #fff;
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
  }
  input:focus {
    border-color: var(--accent);
  }
  .tags-input {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .tag-input {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.5rem 0.75rem;
    color: #fff;
    font-family: inherit;
    font-size: 0.85rem;
    width: 150px;
    outline: none;
  }
  .tag {
    background: var(--accent);
    color: #fff;
    padding: 0.4rem 0.75rem;
    border-radius: 0.25rem;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .tag button {
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    padding: 0;
    font-size: 1rem;
    line-height: 1;
    opacity: 0.7;
  }
  .tag button:hover {
    opacity: 1;
  }
  .btn {
    background: var(--accent);
    border: none;
    border-radius: 0.5rem;
    padding: 0.75rem 1.5rem;
    color: #fff;
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover {
    background: var(--accent-dark);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.1);
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.2);
  }
  .search-bar {
    margin-bottom: 1rem;
  }
  .search-bar input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    color: #fff;
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
  }
  .filters {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .filter-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.25rem;
    padding: 0.4rem 0.75rem;
    color: rgba(255,255,255,0.7);
    font-family: inherit;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .bookmarks-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .bookmark {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }
  .bookmark-info {
    flex: 1;
    min-width: 0;
  }
  .bookmark-title {
    color: #fff;
    font-size: 1rem;
    margin-bottom: 0.25rem;
    word-break: break-word;
  }
  .bookmark-url {
    color: rgba(255,255,255,0.5);
    font-size: 0.75rem;
    word-break: break-all;
    margin-bottom: 0.5rem;
  }
  .bookmark-tags {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .bookmark-actions {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }
  .bookmark-actions button {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 0.25rem;
    padding: 0.4rem 0.6rem;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
  }
  .bookmark-actions button:hover {
    background: rgba(255,255,255,0.2);
    color: #fff;
  }
  .bookmark-actions .delete:hover {
    background: #ef4444;
  }
  .empty-state {
    text-align: center;
    color: rgba(255,255,255,0.5);
    padding: 3rem;
  }
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .count {
    color: rgba(255,255,255,0.5);
    font-size: 0.8rem;
  }
  .export-import {
    display: flex;
    gap: 0.5rem;
  }
  .export-import button {
    font-size: 0.75rem;
    padding: 0.4rem 0.75rem;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>🔖 Bookmark Manager</h1>
  
  <div class="add-bookmark">
    <div class="input-row">
      <input type="text" id="titleInput" placeholder="Title">
      <input type="url" id="urlInput" placeholder="URL (https://...)">
    </div>
    <div class="tags-input">
      <input type="text" id="tagInput" placeholder="Add tag + Enter" class="tag-input">
      <div id="pendingTags"></div>
    </div>
    <button class="btn" onclick="addBookmark()">Add Bookmark</button>
  </div>
  
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search bookmarks..." oninput="renderBookmarks()">
  </div>
  
  <div class="filters" id="tagFilters"></div>
  
  <div class="toolbar">
    <span class="count" id="countDisplay">0 bookmarks</span>
    <div class="export-import">
      <button class="btn btn-secondary" onclick="exportBookmarks()">Export JSON</button>
      <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">Import JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBookmarks(event)">
    </div>
  </div>
  
  <div class="bookmarks-list" id="bookmarksList"></div>
</div>

<script>
let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
let pendingTags = [];
let activeFilter = null;

function save() {
  localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
}

function addBookmark() {
  const title = document.getElementById('titleInput').value.trim();
  const url = document.getElementById('urlInput').value.trim();
  
  if (!title || !url) {
    alert('Title and URL are required');
    return;
  }
  
  let finalUrl = url;
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    finalUrl = 'https://' + url;
  }
  
  const bookmark = {
    id: Date.now(),
    title,
    url: finalUrl,
    tags: [...pendingTags],
    created: new Date().toISOString()
  };
  
  bookmarks.unshift(bookmark);
  save();
  
  document.getElementById('titleInput').value = '';
  document.getElementById('urlInput').value = '';
  pendingTags = [];
  renderBookmarks();
  renderTagFilters();
}

function deleteBookmark(id) {
  if (confirm('Delete this bookmark?')) {
    bookmarks = bookmarks.filter(b => b.id !== id);
    save();
    renderBookmarks();
    renderTagFilters();
  }
}

function openBookmark(url) {
  window.open(url, '_blank');
}

function copyUrl(url) {
  navigator.clipboard.writeText(url);
}

function renderBookmarks() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('bookmarksList');
  
  let filtered = bookmarks;
  
  if (search) {
    filtered = filtered.filter(b => 
      b.title.toLowerCase().includes(search) ||
      b.url.toLowerCase().includes(search) ||
      b.tags.some(t => t.toLowerCase().includes(search))
    );
  }
  
  if (activeFilter) {
    filtered = filtered.filter(b => b.tags.includes(activeFilter));
  }
  
  document.getElementById('countDisplay').textContent = 
    `${filtered.length} bookmark${filtered.length !== 1 ? 's' : ''}`;
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">No bookmarks yet. Add one above!</div>';
    return;
  }
  
  list.innerHTML = filtered.map(b => `
    <div class="bookmark">
      <div class="bookmark-info">
        <div class="bookmark-title">${escapeHtml(b.title)}</div>
        <div class="bookmark-url">${escapeHtml(b.url)}</div>
        <div class="bookmark-tags">
          ${b.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
        </div>
      </div>
      <div class="bookmark-actions">
        <button onclick="openBookmark('${escapeHtml(b.url)}')">Open</button>
        <button onclick="copyUrl('${escapeHtml(b.url)}')">Copy</button>
        <button class="delete" onclick="deleteBookmark(${b.id})">×</button>
      </div>
    </div>
  `).join('');
}

function renderTagFilters() {
  const allTags = [...new Set(bookmarks.flatMap(b => b.tags))];
  const container = document.getElementById('tagFilters');
  
  container.innerHTML = `
    <button class="filter-btn ${!activeFilter ? 'active' : ''}" onclick="setFilter(null)">All</button>
    ${allTags.map(t => `
      <button class="filter-btn ${activeFilter === t ? 'active' : ''}" onclick="setFilter('${escapeHtml(t)}')">${escapeHtml(t)}</button>
    `).join('')}
  `;
}

function setFilter(tag) {
  activeFilter = tag;
  renderTagFilters();
  renderBookmarks();
}

function exportBookmarks() {
  const data = JSON.stringify(bookmarks, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bookmarks.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importBookmarks(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (Array.isArray(imported)) {
        bookmarks = [...imported, ...bookmarks];
        save();
        renderBookmarks();
        renderTagFilters();
        alert(`Imported ${imported.length} bookmarks`);
      }
    } catch (err) {
      alert('Invalid JSON file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Tag input handling
document.getElementById('tagInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target.value.trim()) {
    const tag = e.target.value.trim().toLowerCase();
    if (!pendingTags.includes(tag)) {
      pendingTags.push(tag);
    }
    e.target.value = '';
    renderPendingTags();
  }
});

function renderPendingTags() {
  const container = document.getElementById('pendingTags');
  container.innerHTML = pendingTags.map(t => `
    <span class="tag">
      ${escapeHtml(t)}
      <button onclick="removePendingTag('${escapeHtml(t)}')">×</button>
    </span>
  `).join('');
}

function removePendingTag(tag) {
  pendingTags = pendingTags.filter(t => t !== tag);
  renderPendingTags();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderBookmarks();
renderTagFilters();
</script>
</body>
</html>
