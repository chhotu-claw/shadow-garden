<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tab Manager — Shadow's Garden</title>
<meta name="description" content="Organize your browser tabs into groups, save sessions, and stay focused.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--text);
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  .groups {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .group {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: border-color 0.2s;
  }
  .group:hover {
    border-color: var(--accent);
  }
  .group-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .group-name {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
    border: none;
    background: transparent;
    padding: 4px 8px;
    border-radius: 4px;
    width: 200px;
  }
  .group-name:focus {
    outline: none;
    background: rgba(88, 166, 255, 0.1);
  }
  .group-actions {
    display: flex;
    gap: 8px;
  }
  .btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
    font-weight: 600;
  }
  .btn-primary:hover {
    background: #79b8ff;
    border-color: #79b8ff;
    color: #0d1117;
  }
  .btn-danger {
    color: var(--red);
  }
  .btn-danger:hover {
    border-color: var(--red);
    color: var(--red);
  }
  .tabs-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 40px;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(88, 166, 255, 0.1);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    max-width: 250px;
  }
  .tab-title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .tab-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    font-size: 1rem;
    line-height: 1;
  }
  .tab-close:hover {
    color: var(--red);
  }
  .add-tab {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .add-tab input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.85rem;
  }
  .add-tab input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .add-tab input::placeholder {
    color: var(--muted);
  }
  .add-group {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }
  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .stat-value {
    color: var(--accent);
    font-weight: 600;
  }
  @media (max-width: 600px) {
    .group-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }
    .group-name {
      width: 100%;
    }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>📑 Tab Manager</h1>
    <p class="subtitle">Organize tabs into groups. Works across sessions via localStorage.</p>
    
    <div class="stats">
      <span>Groups: <span class="stat-value" id="groupCount">0</span></span>
      <span>Tabs: <span class="stat-value" id="tabCount">0</span></span>
    </div>

    <div class="groups" id="groups"></div>

    <div class="add-group">
      <button class="btn btn-primary" onclick="addGroup()">+ New Group</button>
    </div>
  </div>

  <script>
    let groups = JSON.parse(localStorage.getItem('tabGroups') || '[]');

    function save() {
      localStorage.setItem('tabGroups', JSON.stringify(groups));
      render();
    }

    function render() {
      const container = document.getElementById('groups');
      const groupCount = document.getElementById('groupCount');
      const tabCount = document.getElementById('tabCount');
      
      groupCount.textContent = groups.length;
      tabCount.textContent = groups.reduce((sum, g) => sum + g.tabs.length, 0);

      if (groups.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>No groups yet. Create one to start organizing your tabs.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = groups.map((group, gi) => `
        <div class="group">
          <div class="group-header">
            <input type="text" class="group-name" value="${group.name}" 
              onchange="updateGroupName(${gi}, this.value)" placeholder="Group name...">
            <div class="group-actions">
              <button class="btn" onclick="openGroupTabs(${gi})">Open All</button>
              <button class="btn btn-danger" onclick="deleteGroup(${gi})">Delete</button>
            </div>
          </div>
          <div class="tabs-list">
            ${group.tabs.map((tab, ti) => `
              <div class="tab">
                <span class="tab-title" title="${tab.url}">${tab.title || tab.url}</span>
                <button class="tab-close" onclick="removeTab(${gi}, ${ti})" title="Remove">×</button>
              </div>
            `).join('')}
          </div>
          <div class="add-tab">
            <input type="text" placeholder="Paste URL to add..." 
              onkeydown="if(event.key==='Enter')addTab(${gi}, this.value); this.value=''">
          </div>
        </div>
      `).join('');
    }

    function addGroup() {
      groups.push({ name: 'New Group', tabs: [] });
      save();
    }

    function updateGroupName(gi, name) {
      groups[gi].name = name;
      save();
    }

    function deleteGroup(gi) {
      if (confirm(`Delete "${groups[gi].name}"?`)) {
        groups.splice(gi, 1);
        save();
      }
    }

    function addTab(gi, url) {
      if (!url) return;
      let finalUrl = url;
      if (!url.match(/^https?:\/\//)) {
        finalUrl = 'https://' + url;
      }
      try {
        new URL(finalUrl);
        groups[gi].tabs.push({ url: finalUrl, title: new URL(finalUrl).hostname });
        save();
      } catch(e) {
        alert('Invalid URL');
      }
    }

    function removeTab(gi, ti) {
      groups[gi].tabs.splice(ti, 1);
      save();
    }

    function openGroupTabs(gi) {
      groups[gi].tabs.forEach(tab => {
        window.open(tab.url, '_blank');
      });
    }

    render();
  </script>
</body>
</html>
