<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Filter — Shadow's Garden</title>
<meta name="description" content="Real-time image filters. Adjust brightness, contrast, saturation, and more.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a12; }
  canvas { display: block; margin: auto; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 10;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  label {
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    font-family: monospace;
  }
  input[type="range"] {
    width: 100px;
  }
  input[type="file"] {
    display: none;
  }
  .upload-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  .upload-btn:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="controls">
    <label class="upload-btn">
      Upload Image
      <input type="file" id="fileInput" accept="image/*">
    </label>
    <div class="slider-group">
      <label>Brightness</label>
      <input type="range" id="brightness" min="-100" max="100" value="0">
    </div>
    <div class="slider-group">
      <label>Contrast</label>
      <input type="range" id="contrast" min="-100" max="100" value="0">
    </div>
    <div class="slider-group">
      <label>Saturation</label>
      <input type="range" id="saturation" min="-100" max="100" value="0">
    </div>
    <div class="slider-group">
      <label>Hue</label>
      <input type="range" id="hue" min="0" max="360" value="0">
    </div>
    <div class="slider-group">
      <label>Blur</label>
      <input type="range" id="blur" min="0" max="20" value="0">
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let originalImage = null;
    let img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect fill="%234ecdc4" width="400" height="400"/><text x="200" y="200" fill="white" font-size="40" text-anchor="middle" dy=".3em">Click to upload</text></svg>';
    
    img.onload = () => {
      resizeAndDraw();
    };
    
    function resizeAndDraw() {
      const maxSize = Math.min(window.innerWidth - 40, window.innerHeight - 150);
      canvas.width = maxSize;
      canvas.height = maxSize * (img.height / img.width);
      if (canvas.height > maxSize) {
        canvas.height = maxSize;
        canvas.width = maxSize * (img.width / img.height);
      }
      applyFilters();
    }
    
    function applyFilters() {
      const brightness = document.getElementById('brightness').value;
      const contrast = document.getElementById('contrast').value;
      const saturation = document.getElementById('saturation').value;
      const hue = document.getElementById('hue').value;
      const blur = document.getElementById('blur').value;
      
      ctx.filter = `brightness(${100 + parseInt(brightness)}%) contrast(${100 + parseInt(contrast)}%) saturate(${100 + parseInt(saturation)}%) hue-rotate(${hue}deg) blur(${blur}px)`;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }
    
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          img = new Image();
          img.onload = resizeAndDraw;
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });
    
    ['brightness', 'contrast', 'saturation', 'hue', 'blur'].forEach(id => {
      document.getElementById(id).addEventListener('input', applyFilters);
    });
    
    window.addEventListener('resize', () => {
      if (img.width) resizeAndDraw();
    });
  </script>
</body>
</html>
