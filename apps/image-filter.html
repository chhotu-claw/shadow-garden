<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Filter — Shadow's Garden</title>
<meta name="description" content="Real-time image filter app with brightness, contrast, saturation, hue, blur, and more.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .sliders {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
  }
  input[type="range"] { width: 120px; }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-family: monospace;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Click to load image</div>
  <div class="sliders">
    <div class="slider-row">Brightness: <input type="range" id="brightness" min="-100" max="100" value="0"></div>
    <div class="slider-row">Contrast: <input type="range" id="contrast" min="-100" max="100" value="0"></div>
    <div class="slider-row">Saturation: <input type="range" id="saturation" min="-100" max="100" value="0"></div>
    <div class="slider-row">Hue: <input type="range" id="hue" min="0" max="360" value="0"></div>
    <div class="slider-row">Blur: <input type="range" id="blur" min="0" max="20" value="0"></div>
    <div class="slider-row">Invert: <input type="range" id="invert" min="0" max="100" value="0"></div>
    <div class="slider-row">Sepia: <input type="range" id="sepia" min="0" max="100" value="0"></div>
  </div>
  <div class="controls">
    <button id="load">Load Image</button>
    <button id="save">Save</button>
    <button id="reset">Reset</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let originalImage = null;
    
    const filters = {
      brightness: 0,
      contrast: 0,
      saturation: 0,
      hue: 0,
      blur: 0,
      invert: 0,
      sepia: 0
    };
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      if (originalImage) {
        applyFilters();
      } else {
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '20px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Click Load Image to get started', width/2, height/2);
      }
    }
    
    function applyFilters() {
      if (!originalImage) return;
      
      ctx.filter = `
        brightness(${100 + filters.brightness}%)
        contrast(${100 + filters.contrast}%)
        saturate(${100 + filters.saturation}%)
        hue-rotate(${filters.hue}deg)
        blur(${filters.blur}px)
        invert(${filters.invert}%)
        sepia(${filters.sepia}%)
      `.replace(/\s+/g, ' ').trim();
      
      // Calculate aspect ratio
      const imgRatio = originalImage.width / originalImage.height;
      const canvasRatio = width / height;
      
      let drawWidth, drawHeight, offsetX, offsetY;
      
      if (imgRatio > canvasRatio) {
        drawWidth = width;
        drawHeight = width / imgRatio;
        offsetX = 0;
        offsetY = (height - drawHeight) / 2;
      } else {
        drawHeight = height;
        drawWidth = height * imgRatio;
        offsetX = (width - drawWidth) / 2;
        offsetY = 0;
      }
      
      ctx.drawImage(originalImage, offsetX, offsetY, drawWidth, drawHeight);
      ctx.filter = 'none';
    }
    
    document.getElementById('load').onclick = () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const img = new Image();
          img.onload = () => {
            originalImage = img;
            applyFilters();
          };
          img.src = URL.createObjectURL(file);
        }
      };
      input.click();
    };
    
    document.getElementById('save').onclick = () => {
      const link = document.createElement('a');
      link.download = 'filtered-image.png';
      link.href = canvas.toDataURL();
      link.click();
    };
    
    document.getElementById('reset').onclick = () => {
      Object.keys(filters).forEach(key => filters[key] = 0);
      document.querySelectorAll('input[type="range"]').forEach(input => input.value = input.id === 'hue' ? 0 : input.min === '-100' ? 0 : 0);
      applyFilters();
    };
    
    document.querySelectorAll('input[type="range"]').forEach(input => {
      input.oninput = (e) => {
        filters[e.target.id] = +e.target.value;
        applyFilters();
      };
    });
    
    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
