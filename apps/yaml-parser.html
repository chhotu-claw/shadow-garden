<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAML Parser — Shadow's Garden</title>
<meta name="description" content="Parse, validate, and convert YAML instantly. All local, no server.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; padding: 2rem; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
  .panels { display: flex; gap: 1rem; height: 60vh; }
  .panel { flex: 1; display: flex; flex-direction: column; }
  .panel-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
  textarea { flex: 1; padding: 1rem; font-family: monospace; font-size: 0.9rem; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; resize: none; }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .actions { display: flex; gap: 0.5rem; margin: 1rem 0; }
  .btn { padding: 0.6rem 1.2rem; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.9; }
  .btn.secondary { background: var(--border); }
  .error { padding: 1rem; background: #3d1a1a; border: 1px solid #ff4444; border-radius: 8px; color: #ff6666; margin-top: 1rem; font-family: monospace; font-size: 0.9rem; display: none; }
  .error.show { display: block; }
  .stats { font-size: 0.85rem; color: var(--text-muted); }
  @media (max-width: 700px) { .panels { flex-direction: column; height: auto; } textarea { min-height: 200px; } }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>📄 YAML Parser</h1>
    <div class="subtitle">Parse, validate, and convert YAML — all local, no server</div>
    
    <div class="panels">
      <div class="panel">
        <div class="panel-label">
          <span>YAML Input</span>
          <span class="stats" id="yaml-stats"></span>
        </div>
        <textarea id="yaml-input" placeholder="Paste YAML here...
name: my-project
version: 1.0.0
dependencies:
  - react
  - express"></textarea>
      </div>
      <div class="panel">
        <div class="panel-label">
          <span>JSON Output</span>
          <span class="stats" id="json-stats"></span>
        </div>
        <textarea id="json-output" placeholder="JSON will appear here..." readonly></textarea>
      </div>
    </div>
    
    <div class="actions">
      <button class="btn" id="convert-btn">Convert YAML → JSON</button>
      <button class="btn" id="format-btn">Format YAML</button>
      <button class="btn secondary" id="clear-btn">Clear</button>
      <button class="btn secondary" id="copy-btn">Copy JSON</button>
    </div>
    
    <div class="error" id="error-msg"></div>
  </div>
  
  <script>
    const yamlInput = document.getElementById('yaml-input');
    const jsonOutput = document.getElementById('json-output');
    const errorMsg = document.getElementById('error-msg');
    const yamlStats = document.getElementById('yaml-stats');
    const jsonStats = document.getElementById('json-stats');
    
    // Simple YAML parser (no external deps)
    function parseYAML(str) {
      const lines = str.split('\n').filter(l => l.trim() && !l.trim().startsWith('#'));
      let result = {};
      const stack = [{ indent: -1, obj: result }];
      
      for (let line of lines) {
        const match = line.match(/^(\s*)(.*)$/);
        const indent = match[1].length;
        const content = match[2].trim();
        
        if (!content) continue;
        
        // Find parent with smaller indent
        while (stack.length > 1 && stack[stack.length - 1].indent >= indent) {
          stack.pop();
        }
        
        const parent = stack[stack.length - 1].obj;
        
        // Key-value pair
        const kvMatch = content.match(/^([^:]+):\s*(.*)$/);
        if (kvMatch) {
          const key = kvMatch[1].trim();
          const value = kvMatch[2].trim();
          
          if (value === '' || value === '|' || value === '>') {
            // Object or array container
            parent[key] = {};
            stack.push({ indent, obj: parent[key] });
          } else if (value.startsWith('"') || value.startsWith("'")) {
            parent[key] = value.slice(1, -1);
          } else if (value === 'true') {
            parent[key] = true;
          } else if (value === 'false') {
            parent[key] = false;
          } else if (value === 'null' || value === '~') {
            parent[key] = null;
          } else if (!isNaN(value)) {
            parent[key] = Number(value);
          } else if (value.startsWith('[') && value.endsWith(']')) {
            parent[key] = value.slice(1, -1).split(',').map(s => s.trim());
          } else {
            parent[key] = value;
          }
        } else if (content.startsWith('- ')) {
          // Array item
          const value = content.substring(2).trim();
          if (!Array.isArray(parent)) {
            // Start array on parent
            const keys = Object.keys(parent);
            const lastKey = keys[keys.length - 1];
            parent[lastKey] = [];
          }
          let arr = Array.isArray(parent) ? parent : parent[Object.keys(parent)[Object.keys(parent).length - 1]];
          if (typeof value === 'string' && (value.startsWith('"') || value.startsWith("'"))) {
            arr.push(value.slice(1, -1));
          } else if (value === 'true') {
            arr.push(true);
          } else if (value === 'false') {
            arr.push(false);
          } else if (!isNaN(value) && value !== '') {
            arr.push(Number(value));
          } else {
            arr.push(value);
          }
        }
      }
      
      return result;
    }
    
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }
    
    function clearError() {
      errorMsg.classList.remove('show');
    }
    
    function updateStats(input, output) {
      yamlStats.textContent = input ? `${input.split('\n').length} lines` : '';
      jsonStats.textContent = output ? `${output.split('\n').length} lines` : '';
    }
    
    document.getElementById('convert-btn').addEventListener('click', () => {
      clearError();
      const yaml = yamlInput.value.trim();
      if (!yaml) {
        showError('Paste YAML to convert');
        return;
      }
      
      try {
        const obj = parseYAML(yaml);
        const json = JSON.stringify(obj, null, 2);
        jsonOutput.value = json;
        updateStats(yaml, json);
      } catch (e) {
        showError('Parse error: ' + e.message);
      }
    });
    
    document.getElementById('format-btn').addEventListener('click', () => {
      clearError();
      const yaml = yamlInput.value.trim();
      if (!yaml) return;
      
      try {
        const obj = parseYAML(yaml);
        const json = JSON.stringify(obj, null, 2);
        // Re-parse as JSON to validate
        JSON.parse(json);
        yamlInput.value = yaml; // Already formatted by line-by-line parsing
        jsonOutput.value = json;
      } catch (e) {
        showError('Format error: ' + e.message);
      }
    });
    
    document.getElementById('clear-btn').addEventListener('click', () => {
      yamlInput.value = '';
      jsonOutput.value = '';
      clearError();
      updateStats('', '');
    });
    
    document.getElementById('copy-btn').addEventListener('click', () => {
      if (jsonOutput.value) {
        navigator.clipboard.writeText(jsonOutput.value);
      }
    });
    
    // Auto-convert on input with debounce
    let debounce;
    yamlInput.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => {
        const yaml = yamlInput.value.trim();
        if (yaml) {
          try {
            const obj = parseYAML(yaml);
            const json = JSON.stringify(obj, null, 2);
            jsonOutput.value = json;
            updateStats(yaml, json);
            clearError();
          } catch (e) {
            // Don't show error while typing
          }
        }
      }, 500);
    });
  </script>
</body>
</html>
