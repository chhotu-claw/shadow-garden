<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Dashboard — Shadow's Garden</title>
<meta name="description" content="Your morning command center. Time, focus, and quick access to everything.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #388bfd;
    --success: #3fb950;
    --warning: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  
  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .date-display {
    font-size: 1.1rem;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }
  .time-display {
    font-size: 3rem;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
  }
  .greeting {
    font-size: 1.5rem;
    color: var(--accent);
    margin-bottom: 1rem;
  }
  
  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem;
  }
  
  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    transition: border-color 0.2s;
  }
  .card:hover {
    border-color: var(--accent);
  }
  .card-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
  }
  
  /* Focus Card */
  .focus-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    color: var(--text);
    font-size: 1rem;
    font-family: inherit;
  }
  .focus-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .focus-input::placeholder {
    color: var(--text-dim);
  }
  .focus-saved {
    font-size: 0.8rem;
    color: var(--success);
    margin-top: 0.5rem;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .focus-saved.show {
    opacity: 1;
  }
  
  /* Quick Links */
  .quick-links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .quick-link {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .quick-link:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  
  /* World Clock */
  .world-clock-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .clock-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .clock-zone {
    color: var(--text-dim);
    font-size: 0.85rem;
  }
  .clock-time {
    font-size: 1.1rem;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  
  /* Clipboard Preview */
  .clipboard-preview {
    max-height: 120px;
    overflow: hidden;
    background: var(--bg);
    border-radius: 6px;
    padding: 0.75rem;
    font-size: 0.85rem;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-all;
  }
  .clipboard-empty {
    color: var(--text-dim);
    font-size: 0.85rem;
    font-style: italic;
  }
  .clipboard-link {
    color: var(--accent);
    font-size: 0.8rem;
    margin-top: 0.5rem;
    display: inline-block;
  }
  
  /* Quote Card */
  .quote-text {
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--text);
    font-style: italic;
  }
  .quote-author {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
    text-align: right;
  }
  
  /* Stats */
  .stats-row {
    display: flex;
    justify-content: space-between;
    padding: 0.25rem 0;
  }
  .stats-label {
    color: var(--text-dim);
    font-size: 0.85rem;
  }
  .stats-value {
    font-size: 0.85rem;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  
  /* Responsive */
  @media (max-width: 600px) {
    .time-display {
      font-size: 2.5rem;
    }
    .grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <div class="header">
      <div class="greeting" id="greeting"></div>
      <div class="date-display" id="dateDisplay"></div>
      <div class="time-display" id="timeDisplay"></div>
    </div>
    
    <div class="grid">
      <!-- Today's Focus -->
      <div class="card">
        <div class="card-title">Today's Focus</div>
        <input type="text" class="focus-input" id="focusInput" placeholder="What's your main focus today?">
        <div class="focus-saved" id="focusSaved">✓ Saved</div>
      </div>
      
      <!-- World Clock -->
      <div class="card">
        <div class="card-title">World Clock</div>
        <div class="world-clock-list" id="worldClock"></div>
      </div>
      
      <!-- Quick Links -->
      <div class="card">
        <div class="card-title">Quick Access</div>
        <div class="quick-links">
          <a href="clipboard-history.html" class="quick-link">📋 Clipboard</a>
          <a href="quick-notes.html" class="quick-link">📝 Notes</a>
          <a href="pomodoro-timer.html" class="quick-link">🍅 Pomodoro</a>
          <a href="timer-stopwatch.html" class="quick-link">⏱ Timer</a>
          <a href="password-generator.html" class="quick-link">🔐 Password</a>
          <a href="hash-generator.html" class="quick-link">#️⃣ Hash</a>
          <a href="regex-tester.html" class="quick-link">.* Regex</a>
          <a href="json-formatter.html" class="quick-link">{ } JSON</a>
          <a href="url-cleaner.html" class="quick-link">🧹 URL Clean</a>
          <a href="timestamp-converter.html" class="quick-link">🕐 Timestamp</a>
          <a href="emoji-picker.html" class="quick-link">😀 Emoji</a>
          <a href="color-converter.html" class="quick-link">🎨 Color</a>
        </div>
      </div>
      
      <!-- Clipboard -->
      <div class="card">
        <div class="card-title">Last Copied</div>
        <div class="clipboard-preview" id="clipboardPreview">
          <span class="clipboard-empty">Nothing in clipboard</span>
        </div>
        <a href="clipboard-history.html" class="clipboard-link">View full history →</a>
      </div>
      
      <!-- Daily Quote -->
      <div class="card">
        <div class="card-title">Daily Wisdom</div>
        <div class="quote-text" id="quoteText"></div>
        <div class="quote-author" id="quoteAuthor"></div>
      </div>
      
      <!-- Day Stats -->
      <div class="card">
        <div class="card-title">Day Progress</div>
        <div class="stats-row">
          <span class="stats-label">Day of week</span>
          <span class="stats-value" id="dayOfWeek"></span>
        </div>
        <div class="stats-row">
          <span class="stats-label">Day of year</span>
          <span class="stats-value" id="dayOfYear"></span>
        </div>
        <div class="stats-row">
          <span class="stats-label">Week of year</span>
          <span class="stats-value" id="weekOfYear"></span>
        </div>
        <div class="stats-row">
          <span class="stats-label">Days left this year</span>
          <span class="stats-value" id="daysLeft"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Time zones
    const timeZones = [
      { name: 'Dubai', tz: 'Asia/Dubai' },
      { name: 'London', tz: 'Europe/London' },
      { name: 'New York', tz: 'America/New_York' },
      { name: 'San Francisco', tz: 'America/Los_Angeles' },
      { name: 'Tokyo', tz: 'Asia/Tokyo' }
    ];
    
    // Quotes
    const quotes = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "Simplicity is the ultimate sophistication.", author: "Leonardo da Vinci" },
      { text: "Action is the foundational key to all success.", author: "Pablo Picasso" },
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
      { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
      { text: "Your time is limited, don't waste it living someone else's life.", author: "Steve Jobs" },
      { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins" },
      { text: "What you get by achieving your goals is not as important as what you become.", author: "Zig Ziglar" },
      { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe" },
      { text: "The secret of getting ahead is getting started.", author: "Mark Twain" }
    ];
    
    // LocalStorage keys
    const FOCUS_KEY = 'shadow-daily-focus';
    const CLIP_KEY = 'shadow-clipboard-history';
    
    function updateTime() {
      const now = new Date();
      
      // Main time
      document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('en-US', { 
        hour: '2-digit', 
        minute: '2-digit',
        hour12: true 
      });
      
      // Date
      document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      });
      
      // Greeting
      const hour = now.getHours();
      let greeting = 'Good morning';
      if (hour >= 12 && hour < 17) greeting = 'Good afternoon';
      else if (hour >= 17) greeting = 'Good evening';
      document.getElementById('greeting').textContent = greeting;
      
      // World clock
      const clockHtml = timeZones.map(z => {
        const time = now.toLocaleTimeString('en-US', { 
          timeZone: z.tz, 
          hour: '2-digit', 
          minute: '2-digit',
          hour12: true 
        });
        return `
          <div class="clock-row">
            <span class="clock-zone">${z.name}</span>
            <span class="clock-time">${time}</span>
          </div>
        `;
      }).join('');
      document.getElementById('worldClock').innerHTML = clockHtml;
      
      // Day stats
      const start = new Date(now.getFullYear(), 0, 0);
      const diff = now - start;
      const oneDay = 1000 * 60 * 60 * 24;
      const dayOfYear = Math.floor(diff / oneDay);
      const daysLeft = 365 - dayOfYear;
      
      document.getElementById('dayOfWeek').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });
      document.getElementById('dayOfYear').textContent = dayOfYear;
      document.getElementById('weekOfYear').textContent = Math.ceil(dayOfYear / 7);
      document.getElementById('daysLeft').textContent = daysLeft;
    }
    
    // Focus
    const focusInput = document.getElementById('focusInput');
    const focusSaved = document.getElementById('focusSaved');
    
    // Load today's focus (clear if different day)
    function loadFocus() {
      const saved = localStorage.getItem(FOCUS_KEY);
      if (saved) {
        const data = JSON.parse(saved);
        const today = new Date().toDateString();
        if (data.date === today) {
          focusInput.value = data.focus || '';
        } else {
          // Clear old focus from previous days
          localStorage.removeItem(FOCUS_KEY);
        }
      }
    }
    
    function saveFocus() {
      const today = new Date().toDateString();
      localStorage.setItem(FOCUS_KEY, JSON.stringify({
        date: today,
        focus: focusInput.value
      }));
      focusSaved.classList.add('show');
      setTimeout(() => focusSaved.classList.remove('show'), 2000);
    }
    
    focusInput.addEventListener('input', saveFocus);
    
    // Clipboard preview
    function updateClipboardPreview() {
      const clips = JSON.parse(localStorage.getItem(CLIP_KEY) || '[]');
      const preview = document.getElementById('clipboardPreview');
      
      if (clips.length > 0) {
        const latest = clips[0].text;
        const truncated = latest.length > 200 ? latest.substring(0, 200) + '...' : latest;
        preview.innerHTML = escapeHtml(truncated);
      } else {
        preview.innerHTML = '<span class="clipboard-empty">Nothing in clipboard</span>';
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Daily quote (same quote for the whole day based on date)
    function setDailyQuote() {
      const now = new Date();
      const seed = now.getFullYear() * 1000 + now.getMonth() * 100 + now.getDate();
      const idx = seed % quotes.length;
      const quote = quotes[idx];
      
      document.getElementById('quoteText').textContent = `"${quote.text}"`;
      document.getElementById('quoteAuthor').textContent = `— ${quote.author}`;
    }
    
    // Initialize
    loadFocus();
    updateTime();
    updateClipboardPreview();
    setDailyQuote();
    
    // Update every second
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
