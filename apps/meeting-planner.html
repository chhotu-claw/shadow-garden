<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Planner — Shadow's Garden</title>
<meta name="description" content="Find the best meeting times across time zones. See overlapping work hours instantly.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { --bg: #0d1117; --fg: #c9d1d9; --accent: #58a6ff; --border: #30363d; --good: #3fb950; --bad: #f85149; --warning: #d29922; }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
  
  .controls { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .btn { padding: 0.6rem 1.2rem; background: #21262d; border: 1px solid var(--border); border-radius: 6px; color: var(--fg); font-size: 0.9rem; cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: #30363d; }
  .btn.primary { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  .btn.primary:hover { background: #79b8ff; }
  
  .timezone-select { padding: 0.6rem 1rem; background: #161b22; border: 2px solid var(--border); border-radius: 6px; color: var(--fg); font-size: 0.9rem; min-width: 200px; }
  .timezone-select:focus { outline: none; border-color: var(--accent); }
  
  .tz-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
  .tz-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: #161b22; border: 1px solid var(--border); border-radius: 8px; }
  .tz-item select { flex: 1; padding: 0.5rem; background: #21262d; border: 1px solid var(--border); border-radius: 4px; color: var(--fg); font-size: 0.85rem; }
  .tz-remove { padding: 0.4rem 0.7rem; background: transparent; border: none; color: #8b949e; cursor: pointer; font-size: 1.2rem; }
  .tz-remove:hover { color: var(--bad); }
  
  .grid { display: grid; gap: 2px; background: var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; }
  .grid-row { display: grid; gap: 2px; }
  .grid-header { display: grid; background: #21262d; }
  .grid-cell { padding: 0.6rem 0.5rem; text-align: center; font-size: 0.8rem; background: #0d1117; }
  .grid-header .grid-cell { font-weight: 600; color: #8b949e; }
  
  .hour-good { background: var(--good) !important; color: #0d1117; }
  .hour-ok { background: #2d5a1e !important; color: #c9d1d9; }
  .hour-bad { background: #161b22; color: #484f58; }
  .hour-current { outline: 2px solid var(--accent); }
  
  .legend { display: flex; gap: 1.5rem; margin-bottom: 2rem; font-size: 0.85rem; }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; }
  .legend-color { width: 16px; height: 16px; border-radius: 3px; }
  
  .best-times { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
  .best-times h3 { margin: 0 0 0.75rem 0; font-size: 0.9rem; color: var(--accent); }
  .best-time { padding: 0.5rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .best-time:last-child { border-bottom: none; }
  .best-time-label { color: #8b949e; }
  .best-time-value { color: var(--good); font-weight: 600; }
  
  .local-now { text-align: center; padding: 1rem; background: #161b22; border-radius: 8px; margin-bottom: 2rem; }
  .local-now .time { font-size: 2rem; font-weight: 700; color: var(--accent); }
  .local-now .date { color: #8b949e; font-size: 0.9rem; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Meeting Planner</h1>
    <p class="subtitle">Find overlapping work hours across time zones</p>
    
    <div class="local-now">
      <div class="time" id="localTime">--:--</div>
      <div class="date" id="localDate">--</div>
    </div>
    
    <div class="controls">
      <button class="btn primary" id="addTimezone">+ Add Time Zone</button>
      <button class="btn" id="resetTimezones">Reset</button>
    </div>
    
    <div class="tz-list" id="tzList"></div>
    
    <div class="legend">
      <div class="legend-item"><div class="legend-color" style="background: var(--good)"></div><span>Great (9-17)</span></div>
      <div class="legend-item"><div class="legend-color" style="background: #2d5a1e"></div><span>Okay (7-9, 17-19)</span></div>
      <div class="legend-item"><div class="legend-color" style="background: #161b22"></div><span>Off hours</span></div>
    </div>
    
    <div class="grid" id="scheduleGrid"></div>
    
    <div class="best-times" id="bestTimes">
      <h3>Best Meeting Times (Your Time)</h3>
      <div id="bestTimesList"></div>
    </div>
  </div>
  
  <script>
    const commonTimezones = [
      { label: 'Dubai (GST)', tz: 'Asia/Dubai', offset: 4 },
      { label: 'London (GMT/BST)', tz: 'Europe/London', offset: 0 },
      { label: 'New York (EST/EDT)', tz: 'America/New_York', offset: -5 },
      { label: 'Los Angeles (PST/PDT)', tz: 'America/Los_Angeles', offset: -8 },
      { label: 'Tokyo (JST)', tz: 'Asia/Tokyo', offset: 9 },
      { label: 'Sydney (AEST/AEDT)', tz: 'Australia/Sydney', offset: 11 },
      { label: 'Singapore (SGT)', tz: 'Asia/Singapore', offset: 8 },
      { label: 'Mumbai (IST)', tz: 'Asia/Kolkata', offset: 5.5 },
      { label: 'Paris (CET/CEST)', tz: 'Europe/Paris', offset: 1 },
      { label: 'Berlin (CET/CEST)', tz: 'Europe/Berlin', offset: 1 },
      { label: 'San Francisco (PST/PDT)', tz: 'America/Los_Angeles', offset: -8 },
      { label: 'Chicago (CST/CDT)', tz: 'America/Chicago', offset: -6 },
      { label: 'Denver (MST/MDT)', tz: 'America/Denver', offset: -7 },
      { label: 'Toronto (EST/EDT)', tz: 'America/Toronto', offset: -5 },
      { label: 'Hong Kong (HKT)', tz: 'Asia/Hong_Kong', offset: 8 },
      { label: 'Seoul (KST)', tz: 'Asia/Seoul', offset: 9 },
      { label: 'Shanghai (CST)', tz: 'Asia/Shanghai', offset: 8 },
      { label: 'São Paulo (BRT)', tz: 'America/Sao_Paulo', offset: -3 },
      { label: 'Dublin (GMT/IST)', tz: 'Europe/Dublin', offset: 0 },
      { label: 'Amsterdam (CET/CEST)', tz: 'Europe/Amsterdam', offset: 1 }
    ];
    
    let timezones = [];
    
    function getOffset(tz) {
      const found = commonTimezones.find(t => t.tz === tz);
      return found ? found.offset : 0;
    }
    
    function formatOffset(offset) {
      const sign = offset >= 0 ? '+' : '-';
      const abs = Math.abs(offset);
      const hours = Math.floor(abs);
      const mins = (abs % 1) * 60;
      return `UTC${sign}${hours}${mins ? ':' + String(mins).padStart(2, '0') : ''}`;
    }
    
    function getHourInTz(localHour, tzOffset, localOffset) {
      let hour = localHour + (tzOffset - localOffset);
      if (hour < 0) hour += 24;
      if (hour >= 24) hour -= 24;
      return hour;
    }
    
    function getHourClass(hour, isCurrentHour) {
      let cls = '';
      if (hour >= 9 && hour < 17) cls = 'hour-good';
      else if ((hour >= 7 && hour < 9) || (hour >= 17 && hour < 19)) cls = 'hour-ok';
      else cls = 'hour-bad';
      if (isCurrentHour) cls += ' hour-current';
      return cls;
    }
    
    function render() {
      const tzList = document.getElementById('tzList');
      tzList.innerHTML = '';
      
      timezones.forEach((tz, i) => {
        const item = document.createElement('div');
        item.className = 'tz-item';
        item.innerHTML = `
          <select onchange="updateTimezone(${i}, this.value)">
            ${commonTimezones.map(t => `<option value="${t.tz}" ${t.tz === tz ? 'selected' : ''}>${t.label}</option>`).join('')}
          </select>
          <button class="tz-remove" onclick="removeTimezone(${i})">×</button>
        `;
        tzList.appendChild(item);
      });
      
      renderGrid();
      renderBestTimes();
    }
    
    function renderGrid() {
      const grid = document.getElementById('scheduleGrid');
      if (timezones.length === 0) {
        grid.innerHTML = '<p style="padding: 2rem; text-align: center; color: #8b949e;">Add time zones to see the schedule</p>';
        return;
      }
      
      const now = new Date();
      const localHour = now.getHours();
      const localOffset = -now.getTimezoneOffset() / 60;
      
      let html = '<div class="grid-row grid-header"><div class="grid-cell" style="flex: 0 0 60px;">Hour</div>';
      timezones.forEach(tz => {
        const offset = getOffset(tz);
        html += `<div class="grid-cell">${formatOffset(offset)}</div>`;
      });
      html += '</div>';
      
      for (let h = 0; h < 24; h++) {
        html += '<div class="grid-row">';
        html += `<div class="grid-cell" style="flex: 0 0 60px; font-weight: 600;">${String(h).padStart(2, '0')}:00</div>`;
        timezones.forEach(tz => {
          const offset = getOffset(tz);
          const hourInTz = getHourInTz(h, offset, localOffset);
          const isCurrent = h === localHour;
          const cls = getHourClass(hourInTz, isCurrent);
          html += `<div class="grid-cell ${cls}">${String(hourInTz).padStart(2, '0')}</div>`;
        });
        html += '</div>';
      }
      
      grid.innerHTML = html;
    }
    
    function renderBestTimes() {
      const list = document.getElementById('bestTimesList');
      if (timezones.length < 2) {
        list.innerHTML = '<p style="color: #8b949e; font-size: 0.85rem;">Add at least 2 time zones to find best times</p>';
        return;
      }
      
      const now = new Date();
      const localHour = now.getHours();
      
      let bestHours = [];
      for (let h = 0; h < 24; h++) {
        let score = 0;
        let valid = true;
        timezones.forEach(tz => {
          const offset = getOffset(tz);
          const hourInTz = getHourInTz(h, offset, -now.getTimezoneOffset() / 60);
          if (hourInTz >= 9 && hourInTz < 17) score += 2;
          else if ((hourInTz >= 7 && hourInTz < 9) || (hourInTz >= 17 && hourInTz < 19)) score += 1;
          else if (hourInTz < 6 || hourInTz >= 21) valid = false;
        });
        if (valid) bestHours.push({ hour: h, score });
      }
      
      score > 0 bestHours.sort((a, b) => b.score - a.score);
      bestHours = bestHours.slice(0, 5);
      
      if (bestHours.length === 0) {
        list.innerHTML = '<p style="color: #8b949e; font-size: 0.85rem;">No overlapping work hours found</p>';
        return;
      }
      
      list.innerHTML = bestHours.map(bh => {
        const timeStr = `${String(bh.hour).padStart(2, '0')}:00`;
        return `<div class="best-time"><span class="best-time-label">${timeStr}</span><span class="best-time-value">Score: ${bh.score}</span></div>`;
      }).join('');
    }
    
    function updateLocalTime() {
      const now = new Date();
      document.getElementById('localTime').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      document.getElementById('localDate').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    
    window.updateTimezone = function(i, tz) {
      timezones[i] = tz;
      render();
    };
    
    window.removeTimezone = function(i) {
      timezones.splice(i, 1);
      render();
    };
    
    document.getElementById('addTimezone').addEventListener('click', () => {
      const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      if (!timezones.includes(localTz) && timezones.length < 6) {
        timezones.push(localTz);
      } else if (timezones.length < 6) {
        const first = commonTimezones[0].tz;
        if (!timezones.includes(first)) timezones.push(first);
        else timezones.push(commonTimezones.find(t => !timezones.includes(t.tz))?.tz || commonTimezones[1].tz);
      }
      render();
      save();
    });
    
    document.getElementById('resetTimezones').addEventListener('click', () => {
      timezones = [];
      render();
      save();
    });
    
    function save() {
      localStorage.setItem('meetingPlanner_tz', JSON.stringify(timezones));
    }
    
    function load() {
      const saved = localStorage.getItem('meetingPlanner_tz');
      if (saved) {
        timezones = JSON.parse(saved);
      } else {
        const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        timezones = [localTz || 'Asia/Dubai', 'Europe/London', 'America/New_York'];
      }
    }
    
    load();
    updateLocalTime();
    setInterval(updateLocalTime, 1000);
    render();
  </script>
</body>
</html>
