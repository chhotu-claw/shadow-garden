<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description" content="Generate QR codes instantly. No tracking, all client-side.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --text: #e0e0e0;
    --accent: #00d4aa;
    --muted: #666;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: var(--card);
    padding: 32px;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 8px 0;
    color: var(--accent);
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .input-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type="text"], input[type="url"], input[type="email"], textarea {
    width: 100%;
    padding: 14px 16px;
    font-size: 1rem;
    background: var(--bg);
    border: 2px solid #333;
    border-radius: 8px;
    color: var(--text);
    box-sizing: border-box;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea {
    min-height: 100px;
    resize: vertical;
  }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--bg);
    padding: 4px;
    border-radius: 8px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .tab:hover {
    color: var(--text);
  }
  .tab.active {
    background: var(--card);
    color: var(--accent);
  }
  .tab-content {
    display: none;
  }
  .tab-content.active {
    display: block;
  }
  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  .generate-btn:hover {
    opacity: 0.9;
  }
  .qr-output {
    margin-top: 24px;
    text-align: center;
    padding: 24px;
    background: #fff;
    border-radius: 12px;
    display: none;
  }
  .qr-output.show {
    display: block;
  }
  .qr-output img {
    max-width: 200px;
    height: auto;
  }
  .download-btn {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 20px;
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 6px;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .download-btn:hover {
    background: var(--accent);
    color: #000;
  }
  .error {
    color: #ff6b6b;
    font-size: 0.85rem;
    margin-top: 8px;
    display: none;
  }
  .error.show {
    display: block;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>QR Code Generator</h1>
  <p class="subtitle">Turn anything into a QR code</p>
  
  <div class="tabs">
    <button class="tab active" data-tab="text">Text</button>
    <button class="tab" data-tab="url">URL</button>
    <button class="tab" data-tab="wifi">WiFi</button>
    <button class="tab" data-tab="vcard">Contact</button>
  </div>
  
  <div class="tab-content active" data-tab="text">
    <div class="input-group">
      <label>Text or Message</label>
      <textarea id="textContent" placeholder="Enter any text..."></textarea>
    </div>
  </div>
  
  <div class="tab-content" data-tab="url">
    <div class="input-group">
      <label>URL</label>
      <input type="url" id="urlContent" placeholder="https://example.com">
    </div>
  </div>
  
  <div class="tab-content" data-tab="wifi">
    <div class="input-group">
      <label>Network Name (SSID)</label>
      <input type="text" id="wifiSSID" placeholder="MyWiFi">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="text" id="wifiPassword" placeholder="Password">
    </div>
    <div class="input-group">
      <label>Encryption</label>
      <select id="wifiEncryption" style="width:100%;padding:14px 16px;background:var(--bg);border:2px solid #333;border-radius:8px;color:var(--text);font-size:1rem;">
        <option value="WPA">WPA/WPA2</option>
        <option value="WEP">WEP</option>
        <option value="nopass">None</option>
      </select>
    </div>
  </div>
  
  <div class="tab-content" data-tab="vcard">
    <div class="input-group">
      <label>Name</label>
      <input type="text" id="vcardName" placeholder="John Doe">
    </div>
    <div class="input-group">
      <label>Phone</label>
      <input type="tel" id="vcardPhone" placeholder="+1 234 567 8900">
    </div>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="vcardEmail" placeholder="john@example.com">
    </div>
  </div>
  
  <button class="generate-btn" id="generateBtn">Generate QR Code</button>
  <p class="error" id="error"></p>
  
  <div class="qr-output" id="qrOutput">
    <img id="qrImage" alt="QR Code">
    <br>
    <a class="download-btn" id="downloadBtn" download="qrcode.png">Download PNG</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
  const tabs = document.querySelectorAll('.tab');
  const tabContents = document.querySelectorAll('.tab-content');
  const generateBtn = document.getElementById('generateBtn');
  const qrOutput = document.getElementById('qrOutput');
  const qrImage = document.getElementById('qrImage');
  const downloadBtn = document.getElementById('downloadBtn');
  const error = document.getElementById('error');
  
  let currentData = '';
  
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const tabName = tab.dataset.tab;
      tabContents.forEach(c => {
        c.classList.toggle('active', c.dataset.tab === tabName);
      });
      qrOutput.classList.remove('show');
      error.classList.remove('show');
    });
  });
  
  function getQRData() {
    const activeTab = document.querySelector('.tab.active').dataset.tab;
    
    switch(activeTab) {
      case 'text':
        return document.getElementById('textContent').value;
      case 'url':
        return document.getElementById('urlContent').value;
      case 'wifi':
        const ssid = document.getElementById('wifiSSID').value;
        const password = document.getElementById('wifiPassword').value;
        const enc = document.getElementById('wifiEncryption').value;
        if (!ssid) return null;
        return `WIFI:T:${enc};S:${ssid};P:${password};;`;
      case 'vcard':
        const name = document.getElementById('vcardName').value;
        const phone = document.getElementById('vcardPhone').value;
        const email = document.getElementById('vcardEmail').value;
        if (!name) return null;
        return `BEGIN:VCARD\nVERSION:3.0\nN:${name}\nTEL:${phone}\nEMAIL:${email}\nEND:VCARD`;
    }
  }
  
  generateBtn.addEventListener('click', async () => {
    error.classList.remove('show');
    qrOutput.classList.remove('show');
    
    const data = getQRData();
    if (!data || data.trim() === '') {
      error.textContent = 'Please enter some content';
      error.classList.add('show');
      return;
    }
    
    try {
      const canvas = document.createElement('canvas');
      await QRCode.toCanvas(canvas, data, {
        width: 200,
        margin: 2,
        color: {
          dark: '#000000',
          light: '#ffffff'
        }
      });
      
      qrImage.src = canvas.toDataURL('image/png');
      currentData = data;
      downloadBtn.href = canvas.toDataURL('image/png');
      qrOutput.classList.add('show');
    } catch(e) {
      error.textContent = 'Error generating QR code';
      error.classList.add('show');
    }
  });
</script>
</body>
</html>
