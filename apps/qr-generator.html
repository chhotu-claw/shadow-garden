<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator — Shadow's Garden</title>
<meta name="description" content="Generate QR codes for URLs, text, WiFi, and more. Clean, fast, client-side.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 { margin-bottom: 0.5rem; }
  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .tab {
    padding: 0.5rem 1rem;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .tab:hover { background: var(--border); }
  .tab.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .panel { display: none; }
  .panel.active { display: block; }
  .input-group { margin-bottom: 1rem; }
  .input-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
  }
  .input-group input, .input-group textarea, .input-group select {
    width: 100%;
    padding: 0.75rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    background: var(--bg);
    color: var(--text);
    box-sizing: border-box;
  }
  .input-group textarea {
    min-height: 100px;
    resize: vertical;
    font-family: inherit;
  }
  .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .row {
    display: flex;
    gap: 1rem;
  }
  .row .input-group { flex: 1; }
  button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.75rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  button.secondary {
    background: var(--card);
    color: var(--text);
    border: 2px solid var(--border);
  }
  #qrcode {
    margin-top: 2rem;
    text-align: center;
    display: none;
  }
  #qrcode.show {
    display: block;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  #qrcode canvas {
    max-width: 100%;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  #qrcode img {
    max-width: 100%;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .download-btn {
    margin-top: 1rem;
    display: inline-flex;
    gap: 0.5rem;
  }
  .error {
    color: #e74c3c;
    margin-top: 1rem;
    display: none;
  }
  .error.show { display: block; }
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .checkbox-group input {
    width: auto;
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>QR Code Generator</h1>
  <p style="color: var(--muted); margin-bottom: 1.5rem;">Generate QR codes for URLs, text, WiFi, and more. Everything stays in your browser.</p>
  
  <div class="tabs">
    <button class="tab active" data-tab="url">URL</button>
    <button class="tab" data-tab="text">Text</button>
    <button class="tab" data-tab="wifi">WiFi</button>
    <button class="tab" data-tab="email">Email</button>
  </div>
  
  <!-- URL Panel -->
  <div class="panel active" id="panel-url">
    <div class="input-group">
      <label for="url-input">URL</label>
      <input type="url" id="url-input" placeholder="https://example.com">
    </div>
    <button onclick="generateQR('url')">Generate QR Code</button>
  </div>
  
  <!-- Text Panel -->
  <div class="panel" id="panel-text">
    <div class="input-group">
      <label for="text-input">Text</label>
      <textarea id="text-input" placeholder="Enter any text..."></textarea>
    </div>
    <button onclick="generateQR('text')">Generate QR Code</button>
  </div>
  
  <!-- WiFi Panel -->
  <div class="panel" id="panel-wifi">
    <div class="input-group">
      <label for="wifi-ssid">Network Name (SSID)</label>
      <input type="text" id="wifi-ssid" placeholder="MyWiFi">
    </div>
    <div class="input-group">
      <label for="wifi-password">Password</label>
      <input type="text" id="wifi-password" placeholder="Password">
    </div>
    <div class="input-group">
      <label for="wifi-encryption">Encryption</label>
      <select id="wifi-encryption">
        <option value="WPA">WPA/WPA2</option>
        <option value="WEP">WEP</option>
        <option value="nopass">None</option>
      </select>
    </div>
    <div class="input-group checkbox-group">
      <input type="checkbox" id="wifi-hidden">
      <label for="wifi-hidden">Hidden Network</label>
    </div>
    <button onclick="generateQR('wifi')">Generate QR Code</button>
  </div>
  
  <!-- Email Panel -->
  <div class="panel" id="panel-email">
    <div class="input-group">
      <label for="email-to">To</label>
      <input type="email" id="email-to" placeholder="person@example.com">
    </div>
    <div class="input-group">
      <label for="email-subject">Subject</label>
      <input type="text" id="email-subject" placeholder="Subject">
    </div>
    <div class="input-group">
      <label for="email-body">Body</label>
      <textarea id="email-body" placeholder="Message..."></textarea>
    </div>
    <button onclick="generateQR('email')">Generate QR Code</button>
  </div>
  
  <div class="error" id="error"></div>
  
  <div id="qrcode">
    <canvas id="canvas"></canvas>
    <div class="download-btn">
      <button class="secondary" onclick="downloadQR('png')">Download PNG</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      document.getElementById('qrcode').classList.remove('show');
    });
  });
  
  function showError(msg) {
    const err = document.getElementById('error');
    err.textContent = msg;
    err.classList.add('show');
  }
  
  function hideError() {
    document.getElementById('error').classList.remove('show');
  }
  
  function getQRData(type) {
    hideError();
    switch(type) {
      case 'url':
        const url = document.getElementById('url-input').value.trim();
        if (!url) { showError('Please enter a URL'); return null; }
        // Add https if missing
        if (!url.match(/^https?:\/\//i)) {
          return 'https://' + url;
        }
        return url;
      case 'text':
        const text = document.getElementById('text-input').value;
        if (!text) { showError('Please enter some text'); return null; }
        return text;
      case 'wifi':
        const ssid = document.getElementById('wifi-ssid').value.trim();
        if (!ssid) { showError('Please enter the network name (SSID)'); return null; }
        const password = document.getElementById('wifi-password').value;
        const encryption = document.getElementById('wifi-encryption').value;
        const hidden = document.getElementById('wifi-hidden').checked;
        let wifi = 'WIFI:T:' + encryption + ';S:' + ssid.replace(/[\\;,":]/g, '\\$&') + ';';
        if (password && encryption !== 'nopass') {
          wifi += 'P:' + password.replace(/[\\;,":]/g, '\\$&') + ';';
        }
        if (hidden) wifi += 'H:true;';
        wifi += ';';
        return wifi;
      case 'email':
        const to = document.getElementById('email-to').value.trim();
        if (!to) { showError('Please enter an email address'); return null; }
        let mailto = 'mailto:' + to;
        const subject = document.getElementById('email-subject').value.trim();
        const body = document.getElementById('email-body').value;
        const params = [];
        if (subject) params.push('subject=' + encodeURIComponent(subject));
        if (body) params.push('body=' + encodeURIComponent(body));
        if (params.length > 0) {
          mailto += '?' + params.join('&');
        }
        return mailto;
      default:
        return null;
    }
  }
  
  function generateQR(type) {
    const data = getQRData(type);
    if (!data) return;
    
    const canvas = document.getElementById('canvas');
    const qrDiv = document.getElementById('qrcode');
    
    QRCode.toCanvas(canvas, data, {
      width: 300,
      margin: 2,
      color: {
        dark: '#1a1a2e',
        light: '#ffffff'
      },
      errorCorrectionLevel: 'M'
    }, (error) => {
      if (error) {
        showError('Error generating QR code: ' + error.message);
        return;
      }
      qrDiv.classList.add('show');
    });
  }
  
  function downloadQR(format) {
    const canvas = document.getElementById('canvas');
    const link = document.createElement('a');
    link.download = 'qrcode.' + format;
    link.href = canvas.toDataURL('image/' + format);
    link.click();
  }
  
  // Generate on Enter
  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const panel = input.closest('.panel');
        const type = panel.id.replace('panel-', '');
        generateQR(type);
      }
    });
  });
</script>
</body>
</html>
