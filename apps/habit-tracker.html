<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker — Shadow's Garden</title>
<meta name="description" content="Track your daily habits with streaks, localStorage, and no account required">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .tracker {
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem;
  }
  h1 { text-align: center; margin-bottom: 2rem; }
  .add-habit {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  .add-habit input {
    flex: 1;
    padding: 0.75rem;
    border: 1px solid var(--border, #313244);
    border-radius: 8px;
    background: var(--input-bg, #11111b);
    color: var(--text, #cdd6f4);
    font-size: 1rem;
  }
  .add-habit button {
    padding: 0.75rem 1.25rem;
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
  }
  .habits-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .habit-card {
    background: var(--card-bg, #1e1e2e);
    border: 1px solid var(--border, #313244);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .habit-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .habit-name {
    font-size: 1.1rem;
    font-weight: 600;
  }
  .habit-streak {
    font-size: 0.9rem;
    color: var(--accent, #cba6f7);
  }
  .habit-delete {
    background: none;
    border: none;
    color: var(--text-secondary, #a6adc8);
    cursor: pointer;
    font-size: 1.2rem;
    padding: 0 0.5rem;
    opacity: 0.6;
  }
  .habit-delete:hover {
    opacity: 1;
    color: #f38ba8;
  }
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.5rem;
  }
  .day {
    aspect-ratio: 1;
    border-radius: 8px;
    background: var(--button-bg, #313244);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    color: var(--text-secondary, #a6adc8);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .day:hover {
    transform: scale(1.1);
  }
  .day.done {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .day.today {
    border: 2px solid var(--accent, #cba6f7);
  }
  .day-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    color: var(--text-secondary, #a6adc8);
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .stats-row {
    display: flex;
    justify-content: space-between;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border, #313244);
    font-size: 0.85rem;
    color: var(--text-secondary, #a6adc8);
  }
  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--text-secondary, #a6adc8);
  }
  .habit-row-header {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--text-secondary, #a6adc8);
  }
  .habit-row-header span {
    flex: 1;
    text-align: center;
  }
</style>
</head>
<body data-page-type="app">
<div class="tracker">
  <h1>🎯 Habit Tracker</h1>
  
  <div class="add-habit">
    <input type="text" id="new-habit" placeholder="New habit..." maxlength="50">
    <button onclick="addHabit()">Add</button>
  </div>

  <div id="habits-container" class="habits-list">
    <div class="empty-state">No habits yet. Add one above!</div>
  </div>
</div>

<script>
  let habits = JSON.parse(localStorage.getItem('shadowHabits') || '[]');

  function save() {
    localStorage.setItem('shadowHabits', JSON.stringify(habits));
    render();
  }

  function addHabit() {
    const input = document.getElementById('new-habit');
    const name = input.value.trim();
    if (!name) return;
    
    habits.push({
      id: Date.now(),
      name: name,
      completed: {}
    });
    input.value = '';
    save();
  }

  function deleteHabit(id) {
    if (!confirm('Delete this habit?')) return;
    habits = habits.filter(h => h.id !== id);
    save();
  }

  function toggleDay(habitId, dateStr) {
    const habit = habits.find(h => h.id === habitId);
    if (habit.completed[dateStr]) {
      delete habit.completed[dateStr];
    } else {
      habit.completed[dateStr] = true;
    }
    save();
  }

  function getStreak(completed) {
    let streak = 0;
    const today = new Date();
    for (let i = 0; i < 365; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const str = d.toISOString().split('T')[0];
      if (completed[str]) streak++;
      else if (i > 0) break;
    }
    return streak;
  }

  function getWeekDates() {
    const dates = [];
    const today = new Date();
    const start = new Date(today);
    start.setDate(today.getDate() - 6);
    for (let i = 0; i < 7; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      dates.push(d);
    }
    return dates;
  }

  function render() {
    const container = document.getElementById('habits-container');
    
    if (habits.length === 0) {
      container.innerHTML = '<div class="empty-state">No habits yet. Add one above!</div>';
      return;
    }

    const weekDates = getWeekDates();
    const todayStr = new Date().toISOString().split('T')[0];

    container.innerHTML = habits.map(habit => {
      const streak = getStreak(habit.completed);
      const total = Object.keys(habit.completed).length;
      
      return `
        <div class="habit-card">
          <div class="habit-header">
            <span class="habit-name">${habit.name}</span>
            <span class="habit-streak">🔥 ${streak} day streak</span>
            <button class="habit-delete" onclick="deleteHabit(${habit.id})">×</button>
          </div>
          <div class="habit-row-header">
            ${weekDates.map(d => `<span>${d.toLocaleDateString('en-US', {weekday:'short'})}</span>`).join('')}
          </div>
          <div class="week-grid">
            ${weekDates.map(d => {
              const str = d.toISOString().split('T')[0];
              const isDone = habit.completed[str];
              const isToday = str === todayStr;
              return `<div class="day ${isDone ? 'done' : ''} ${isToday ? 'today' : ''}" 
                           onclick="toggleDay(${habit.id}, '${str}')">${d.getDate()}</div>`;
            }).join('')}
          </div>
          <div class="stats-row">
            <span>Total completions: ${total}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  // Handle Enter key
  document.getElementById('new-habit').addEventListener('keypress', e => {
    if (e.key === 'Enter') addHabit();
  });

  render();
</script>
</body>
</html>
