<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker — Shadow's Garden</title>
<meta name="description" content="Simple habit tracker with streaks. Track daily habits, see your consistency, build momentum.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --success: #22c55e;
    --danger: #ef4444;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    margin-bottom: 0.5rem;
    font-size: 1.75rem;
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.875rem;
  }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
  }

  .date-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .date-nav button {
    background: var(--border);
    border: none;
    color: var(--text);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }

  .date-nav button:hover {
    background: #475569;
  }

  .date-nav .today {
    font-weight: 600;
    color: var(--primary);
  }

  .habit-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    background: var(--bg);
    border-radius: 8px;
    margin-bottom: 0.75rem;
    transition: all 0.2s;
  }

  .habit-row:hover {
    border-color: var(--primary);
  }

  .habit-checkbox {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .habit-checkbox:hover {
    border-color: var(--primary);
  }

  .habit-checkbox.checked {
    background: var(--success);
    border-color: var(--success);
  }

  .habit-checkbox.checked::after {
    content: '✓';
    color: white;
    font-size: 1rem;
  }

  .habit-info {
    flex: 1;
  }

  .habit-name {
    font-weight: 500;
    margin-bottom: 0.25rem;
  }

  .habit-streak {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .streak-fire {
    color: #f59e0b;
  }

  .habit-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1.25rem;
    padding: 0.25rem;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .habit-row:hover .habit-delete {
    opacity: 1;
  }

  .habit-delete:hover {
    color: var(--danger);
  }

  .add-habit {
    display: flex;
    gap: 0.5rem;
  }

  .add-habit input {
    flex: 1;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
  }

  .add-habit input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover {
    background: var(--primary-hover);
  }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 2rem;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .stat-box {
    background: var(--bg);
    padding: 1rem;
    border-radius: 8px;
    text-align: center;
  }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary);
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
  }

  .week-view {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.5rem;
    margin-top: 1rem;
  }

  .week-day {
    text-align: center;
    padding: 0.5rem 0.25rem;
    border-radius: 6px;
    font-size: 0.75rem;
  }

  .week-day.name {
    color: var(--text-muted);
    font-weight: 500;
  }

  .week-day.day {
    background: var(--bg);
    cursor: pointer;
  }

  .week-day.day:hover {
    background: var(--border);
  }

  .week-day.day.done {
    background: var(--success);
    color: white;
  }

  .week-day.day.missed {
    background: var(--danger);
    color: white;
  }

  .week-day.day.future {
    opacity: 0.3;
    cursor: default;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 0.875rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
  }

  .tab-buttons {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .tab-btn {
    flex: 1;
    padding: 0.75rem;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.875rem;
  }

  .tab-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }

  .hidden { display: none; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>✓ Habit Tracker</h1>
    <p class="subtitle">Build momentum, one day at a time.</p>

    <div class="tab-buttons">
      <button class="tab-btn active" data-tab="today">Today</button>
      <button class="tab-btn" data-tab="week">Week</button>
    </div>

    <div class="date-nav">
      <button onclick="changeDate(-1)">←</button>
      <span class="today" id="current-date"></span>
      <button onclick="changeDate(1)">→</button>
    </div>

    <!-- Today View -->
    <div id="today-view">
      <div class="card">
        <div id="habits-list"></div>
        
        <div class="add-habit" style="margin-top: 1rem;">
          <input type="text" id="new-habit" placeholder="New habit..." onkeypress="if(event.key==='Enter')addHabit()">
          <button class="btn btn-primary" onclick="addHabit()">Add</button>
        </div>
      </div>
    </div>

    <!-- Week View -->
    <div id="week-view" class="hidden">
      <div class="card">
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">Total Habits</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-done">0</div>
            <div class="stat-label">Done Today</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-streak">0</div>
            <div class="stat-label">Best Streak</div>
          </div>
        </div>

        <div class="week-view" id="week-grid"></div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 1rem;">All Habits</h3>
        <div id="all-habits"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const HABITS_KEY = 'habits_data';
    let currentDate = new Date();
    let habits = [];

    function getDateKey(date) {
      return date.toISOString().split('T')[0];
    }

    function loadHabits() {
      try {
        habits = JSON.parse(localStorage.getItem(HABITS_KEY)) || [];
      } catch {
        habits = [];
      }
    }

    function saveHabits() {
      localStorage.setItem(HABITS_KEY, JSON.stringify(habits));
    }

    function addHabit() {
      const input = document.getElementById('new-habit');
      const name = input.value.trim();
      
      if (!name) return;
      
      habits.push({
        id: Date.now(),
        name: name,
        created: getDateKey(new Date()),
        completed: {}
      });
      
      saveHabits();
      input.value = '';
      render();
      showToast('Habit added!');
    }

    function deleteHabit(id) {
      habits = habits.filter(h => h.id !== id);
      saveHabits();
      render();
      showToast('Habit deleted');
    }

    function toggleHabit(id) {
      const dateKey = getDateKey(currentDate);
      const habit = habits.find(h => h.id === id);
      
      if (habit) {
        if (habit.completed[dateKey]) {
          delete habit.completed[dateKey];
        } else {
          habit.completed[dateKey] = true;
        }
        saveHabits();
        render();
      }
    }

    function getStreak(habit) {
      let streak = 0;
      const today = new Date();
      
      for (let i = 0; i <= 365; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const key = getDateKey(d);
        
        if (habit.completed[key]) {
          streak++;
        } else if (i > 0) {
          break;
        }
      }
      
      return streak;
    }

    function getBestStreak(habit) {
      let best = 0;
      let current = 0;
      const dates = Object.keys(habit.completed).sort();
      
      if (dates.length === 0) return 0;
      
      let prevDate = new Date(dates[0]);
      
      for (const dateStr of dates) {
        const date = new Date(dateStr);
        const diff = Math.round((date - prevDate) / (1000 * 60 * 60 * 24));
        
        if (diff === 1) {
          current++;
        } else {
          current = 1;
        }
        
        best = Math.max(best, current);
        prevDate = date;
      }
      
      return best;
    }

    function render() {
      const dateKey = getDateKey(currentDate);
      document.getElementById('current-date').textContent = currentDate.toLocaleDateString('en-US', { 
        weekday: 'long', 
        month: 'short', 
        day: 'numeric' 
      });

      // Render habits for today
      const listEl = document.getElementById('habits-list');
      
      if (habits.length === 0) {
        listEl.innerHTML = '<div class="empty-state">No habits yet. Add one above!</div>';
      } else {
        listEl.innerHTML = habits.map(h => {
          const streak = getStreak(h);
          const isDone = h.completed[dateKey] || false;
          
          return `
            <div class="habit-row">
              <div class="habit-checkbox ${isDone ? 'checked' : ''}" onclick="toggleHabit(${h.id})"></div>
              <div class="habit-info">
                <div class="habit-name">${h.name}</div>
                <div class="habit-streak">${streak > 0 ? `<span class="streak-fire">🔥</span> ${streak} day streak` : 'No streak yet'}</div>
              </div>
              <button class="habit-delete" onclick="deleteHabit(${h.id})">×</button>
            </div>
          `;
        }).join('');
      }

      // Stats
      const todayKey = getDateKey(new Date());
      const doneToday = habits.filter(h => h.completed[todayKey]).length;
      const bestStreak = habits.reduce((best, h) => Math.max(best, getBestStreak(h)), 0);

      document.getElementById('stat-total').textContent = habits.length;
      document.getElementById('stat-done').textContent = doneToday;
      document.getElementById('stat-streak').textContent = bestStreak;

      // Week grid
      const weekEl = document.getElementById('week-grid');
      const days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
      const today = new Date();
      
      let weekHTML = days.map(d => `<div class="week-day name">${d}</div>`).join('');
      
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const key = getDateKey(d);
        const isToday = key === todayKey;
        const isFuture = d > today;
        const done = habits.length > 0 && habits.every(h => h.completed[key]);
        
        let classes = 'week-day day';
        if (isFuture) classes += ' future';
        else if (done) classes += ' done';
        
        weekHTML += `<div class="${classes}" onclick="${isFuture ? '' : `jumpToDate('${key}')`}">${d.getDate()}</div>`;
      }
      
      weekEl.innerHTML = weekHTML;

      // All habits list
      const allEl = document.getElementById('all-habits');
      allEl.innerHTML = habits.map(h => {
        const streak = getBestStreak(h);
        return `
          <div class="habit-row">
            <div class="habit-info">
              <div class="habit-name">${h.name}</div>
              <div class="habit-streak">Best streak: ${streak} days</div>
            </div>
            <button class="habit-delete" onclick="deleteHabit(${h.id})">×</button>
          </div>
        `;
      }).join('');
    }

    function changeDate(delta) {
      currentDate.setDate(currentDate.getDate() + delta);
      render();
    }

    function jumpToDate(dateStr) {
      currentDate = new Date(dateStr);
      document.querySelector('[data-tab="today"]').click();
      render();
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const tab = btn.dataset.tab;
        document.getElementById('today-view').classList.toggle('hidden', tab !== 'today');
        document.getElementById('week-view').classList.toggle('hidden', tab !== 'week');
        
        if (tab === 'today') {
          currentDate = new Date();
        }
        render();
      });
    });

    // Initialize
    loadHabits();
    render();
  </script>
</body>
</html>
