<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker — Shadow's Garden</title>
<meta name="description" content="Daily habit tracker with streaks, week view, and stats. Simple, local, no accounts.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #10b981;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #ef4444;
  }
  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--primary);
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.875rem;
    margin-bottom: 2rem;
  }
  .input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  input[type="text"] {
    flex: 1;
    padding: 0.75rem 1rem;
    border: 1px solid #334155;
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--primary);
  }
  button {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 8px;
    background: var(--primary);
    color: #fff;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:hover {
    opacity: 0.9;
  }
  button:active {
    transform: scale(0.98);
  }
  button.secondary {
    background: var(--card);
    border: 1px solid #334155;
  }
  .habits-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .habit-card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .habit-info {
    flex: 1;
    min-width: 200px;
  }
  .habit-name {
    font-weight: 600;
    font-size: 1.1rem;
    margin-bottom: 0.25rem;
  }
  .habit-stats {
    color: var(--muted);
    font-size: 0.8rem;
  }
  .streak {
    color: var(--primary);
    font-weight: 600;
  }
  .week-grid {
    display: flex;
    gap: 0.35rem;
  }
  .day {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: #334155;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .day:hover {
    background: #475569;
  }
  .day.done {
    background: var(--primary);
    color: #fff;
  }
  .day.today {
    border: 2px solid var(--primary);
  }
  .delete-btn {
    background: transparent;
    color: var(--danger);
    padding: 0.5rem;
    font-size: 1.2rem;
    line-height: 1;
  }
  .delete-btn:hover {
    background: rgba(239, 68, 68, 0.1);
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 3rem;
  }
  .total-stats {
    margin-top: 2rem;
    padding: 1.5rem;
    background: var(--card);
    border-radius: 12px;
  }
  .total-stats h3 {
    margin: 0 0 1rem 0;
    font-size: 1rem;
    color: var(--muted);
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
  }
  .stat-item {
    text-align: center;
  }
  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary);
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Habit Tracker</h1>
  <p class="subtitle">Track your daily habits. No accounts, no cloud. Just you and your streaks.</p>
  
  <div class="input-row">
    <input type="text" id="habitInput" placeholder="Enter a new habit..." maxlength="50">
    <button id="addBtn">Add Habit</button>
  </div>
  
  <div class="habits-list" id="habitsList"></div>
  
  <div class="total-stats" id="totalStats" style="display: none;">
    <h3>Overall Stats</h3>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="totalHabits">0</div>
        <div class="stat-label">Active Habits</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalDays">0</div>
        <div class="stat-label">Days Completed</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="avgStreak">0</div>
        <div class="stat-label">Avg Streak</div>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'shadow-habit-tracker';
const DAYS_TO_SHOW = 7;

function getToday() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function getDayName(dateStr) {
  const d = new Date(dateStr);
  return ['S','M','T','W','T','F','S'][d.getDay()];
}

function loadHabits() {
  const data = localStorage.getItem(STORAGE_KEY);
  return data ? JSON.parse(data) : [];
}

function saveHabits(habits) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
}

function getWeekDates() {
  const dates = [];
  const today = new Date();
  for (let i = DAYS_TO_SHOW - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}

function calculateStreak(completed) {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    if (completed[dateStr]) {
      streak++;
    } else if (i > 0) {
      break;
    }
  }
  return streak;
}

function renderHabits() {
  const habits = loadHabits();
  const list = document.getElementById('habitsList');
  const weekDates = getWeekDates();
  const today = getToday();
  
  if (habits.length === 0) {
    list.innerHTML = '<div class="empty">No habits yet. Add one above!</div>';
    document.getElementById('totalStats').style.display = 'none';
    return;
  }
  
  let totalDays = 0;
  let totalStreak = 0;
  
  list.innerHTML = habits.map((habit, idx) => {
    const streak = calculateStreak(habit.completed);
    totalDays += Object.values(habit.completed).filter(Boolean).length;
    totalStreak += streak;
    
    return `
      <div class="habit-card">
        <div class="habit-info">
          <div class="habit-name">${escapeHtml(habit.name)}</div>
          <div class="habit-stats">
            <span class="streak">🔥 ${streak} day streak</span>
          </div>
        </div>
        <div class="week-grid">
          ${weekDates.map(date => {
            const isDone = habit.completed[date];
            const isToday = date === today;
            return `<div class="day ${isDone ? 'done' : ''} ${isToday ? 'today' : ''}" 
                    data-habit="${idx}" data-date="${date}" title="${date}">${getDayName(date)}</div>`;
          }).join('')}
        </div>
        <button class="delete-btn" data-idx="${idx}" title="Delete habit">✕</button>
      </div>
    `;
  }).join('');
  
  // Update stats
  document.getElementById('totalStats').style.display = 'block';
  document.getElementById('totalHabits').textContent = habits.length;
  document.getElementById('totalDays').textContent = totalDays;
  document.getElementById('avgStreak').textContent = habits.length ? Math.round(totalStreak / habits.length) : 0;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function addHabit() {
  const input = document.getElementById('habitInput');
  const name = input.value.trim();
  if (!name) return;
  
  const habits = loadHabits();
  habits.push({
    name: name,
    completed: {},
    created: getToday()
  });
  saveHabits(habits);
  input.value = '';
  renderHabits();
}

function toggleDay(habitIdx, date) {
  const habits = loadHabits();
  if (habits[habitIdx].completed[date]) {
    delete habits[habitIdx].completed[date];
  } else {
    habits[habitIdx].completed[date] = true;
  }
  saveHabits(habits);
  renderHabits();
}

function deleteHabit(idx) {
  if (!confirm('Delete this habit?')) return;
  const habits = loadHabits();
  habits.splice(idx, 1);
  saveHabits(habits);
  renderHabits();
}

document.getElementById('addBtn').addEventListener('click', addHabit);
document.getElementById('habitInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') addHabit();
});

document.getElementById('habitsList').addEventListener('click', e => {
  const day = e.target.closest('.day');
  if (day) {
    const habitIdx = parseInt(day.dataset.habit);
    const date = day.dataset.date;
    toggleDay(habitIdx, date);
  }
  
  const delBtn = e.target.closest('.delete-btn');
  if (delBtn) {
    deleteHabit(parseInt(delBtn.dataset.idx));
  }
});

renderHabits();
</script>
</body>
</html>
