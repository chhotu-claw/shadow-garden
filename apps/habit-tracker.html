<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker — Shadow's Garden</title>
<meta name="description" content="Track daily habits and see your streaks. Simple, local-first habit tracker.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --success: #3fb950;
    --danger: #f85149;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.5rem;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }

  .add-habit {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .add-habit input {
    flex: 1;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 1rem;
  }

  .add-habit input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .add-habit button {
    padding: 10px 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
  }

  .add-habit button:hover {
    opacity: 0.9;
  }

  .habit {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .habit-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .habit-name {
    font-weight: 600;
    font-size: 1.1rem;
  }

  .habit-stats {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .streak {
    color: var(--success);
    font-weight: 600;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 4px 8px;
    opacity: 0.6;
  }

  .delete-btn:hover {
    opacity: 1;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    padding: 4px;
  }

  .day {
    aspect-ratio: 1;
    border-radius: 4px;
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    transition: background 0.15s;
  }

  .day:hover {
    background: var(--border);
  }

  .day.completed {
    background: var(--success);
    color: #000;
  }

  .day.today {
    border: 2px solid var(--accent);
  }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 40px;
    background: var(--card);
    border-radius: 8px;
    border: 1px dashed var(--border);
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Habit Tracker</h1>
    <div class="subtitle">Track daily habits. See your streaks. Built for consistency.</div>

    <div class="add-habit">
      <input type="text" id="habitInput" placeholder="Enter a new habit..." maxlength="50">
      <button id="addBtn">Add Habit</button>
    </div>

    <div id="habitsList"></div>
  </div>

  <script>
    const STORAGE_KEY = 'habit-tracker-data';
    const DAYS_TO_SHOW = 28;

    let habits = [];

    function load() {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        habits = JSON.parse(data);
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
    }

    function getDates() {
      const dates = [];
      const today = new Date();
      for (let i = DAYS_TO_SHOW - 1; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        dates.push(d);
      }
      return dates;
    }

    function formatDate(date) {
      return date.toISOString().split('T')[0];
    }

    function getDayName(date) {
      return ['S', 'M', 'T', 'W', 'T', 'F', 'S'][date.getDay()];
    }

    function calculateStreak(completedDates) {
      let streak = 0;
      const today = new Date();
      
      for (let i = 0; i < 365; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const dateStr = formatDate(d);
        
        if (completedDates.includes(dateStr)) {
          streak++;
        } else if (i > 0) {
          break;
        }
      }
      return streak;
    }

    function render() {
      const container = document.getElementById('habitsList');
      
      if (habits.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            No habits yet. Add one above to start tracking!
          </div>
        `;
        return;
      }

      const dates = getDates();
      const todayStr = formatDate(new Date());

      container.innerHTML = habits.map((habit, index) => {
        const streak = calculateStreak(habit.completed || []);
        
        return `
          <div class="habit">
            <div class="habit-header">
              <span class="habit-name">${habit.name}</span>
              <span class="habit-stats">
                <span class="streak">🔥 ${streak} day streak</span>
                <button class="delete-btn" onclick="deleteHabit(${index})">Delete</button>
              </span>
            </div>
            <div class="weekdays">
              ${dates.slice(-7).map(d => `<div class="day-label">${getDayName(d)}</div>`).join('')}
            </div>
            <div class="calendar">
              ${dates.map(date => {
                const dateStr = formatDate(date);
                const isCompleted = (habit.completed || []).includes(dateStr);
                const isToday = dateStr === todayStr;
                return `<div class="day ${isCompleted ? 'completed' : ''} ${isToday ? 'today' : ''}" 
                          onclick="toggleDay(${index}, '${dateStr}')">${date.getDate()}</div>`;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function addHabit() {
      const input = document.getElementById('habitInput');
      const name = input.value.trim();
      
      if (!name) return;
      
      habits.push({
        name: name,
        completed: []
      });
      
      input.value = '';
      save();
      render();
    }

    function deleteHabit(index) {
      if (confirm('Delete this habit?')) {
        habits.splice(index, 1);
        save();
        render();
      }
    }

    function toggleDay(habitIndex, dateStr) {
      const habit = habits[habitIndex];
      if (!habit.completed) habit.completed = [];
      
      const idx = habit.completed.indexOf(dateStr);
      if (idx > -1) {
        habit.completed.splice(idx, 1);
      } else {
        habit.completed.push(dateStr);
      }
      
      save();
      render();
    }

    document.getElementById('addBtn').addEventListener('click', addHabit);
    document.getElementById('habitInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addHabit();
    });

    load();
    render();
  </script>
</body>
</html>
