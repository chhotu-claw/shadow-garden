<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Beautifier — Shadow's Garden</title>
<meta name="description">Format and validate JSON with pretty print.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .json-beaut { max-width: 700px; margin: 0 auto; }
  textarea { width: 100%; min-height: 200px; padding: 14px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; font-family: var(--mono); resize: vertical; box-sizing: border-box; }
  textarea:focus { outline: none; border-color: var(--accent); }
  label { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  .buttons { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
  button { flex: 1; min-width: 100px; padding: 12px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: white; }
  button.primary:hover { opacity: 0.9; }
  .error { color: #f77; font-size: 14px; margin-top: 8px; display: none; }
  .error.show { display: block; }
  .stats { font-size: 14px; color: var(--text-secondary); margin-top: 12px; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="json-beaut">
    <h1>JSON Beautifier</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Format and validate JSON with pretty print.</p>
    <div><label>Input JSON</label><textarea id="input" placeholder='{"key": "value"}'></textarea></div>
    <div class="buttons">
      <button class="primary" onclick="beautify()">Beautify</button>
      <button onclick="minify()">Minify</button>
      <button onclick="copy()">Copy</button>
      <button onclick="clear()">Clear</button>
    </div>
    <div><label>Output</label><textarea id="output" readonly placeholder="Formatted JSON..."></textarea></div>
    <div class="error" id="error"></div>
    <div class="stats" id="stats"></div>
  </div>
</div>
<script>
  function beautify() {
    const input = document.getElementById('input').value;
    const out = document.getElementById('output');
    const err = document.getElementById('error');
    const stats = document.getElementById('stats');
    err.classList.remove('show'); out.value = ''; stats.textContent = '';
    if (!input) return;
    try {
      const obj = JSON.parse(input);
      out.value = JSON.stringify(obj, null, 2);
      stats.textContent = 'Valid JSON • ' + obj.length + ' items';
    } catch(e) { err.textContent = 'Invalid JSON: ' + e.message; err.classList.add('show'); }
  }
  function minify() {
    const input = document.getElementById('input').value;
    const out = document.getElementById('output');
    const err = document.getElementById('error');
    err.classList.remove('show'); out.value = '';
    try {
      const obj = JSON.parse(input);
      out.value = JSON.stringify(obj);
    } catch(e) { err.textContent = 'Invalid JSON: ' + e.message; err.classList.add('show'); }
  }
  function copy() { navigator.clipboard.writeText(document.getElementById('output').value); }
  function clear() { document.getElementById('input').value = ''; document.getElementById('output').value = ''; document.getElementById('error').classList.remove('show'); document.getElementById('stats').textContent = ''; }
</script>
</body>
</html>
