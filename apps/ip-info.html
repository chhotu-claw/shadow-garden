<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Address Info — Shadow's Garden</title>
<meta name="description">Get your IP address and location info.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .ip-tool { max-width: 500px; margin: 0 auto; }
  .result { background: var(--bg); border: 2px solid var(--border); border-radius: 8px; padding: 20px; margin-top: 20px; }
  .result-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .result-item:last-child { border-bottom: none; }
  .result-label { color: var(--text-secondary); font-size: 14px; }
  .result-value { font-family: var(--mono); color: var(--text); font-size: 14px; }
  button { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 8px; background: var(--accent); border-color: var(--accent); color: white; font-size: 16px; cursor: pointer; margin-top: 20px; }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="ip-tool">
    <h1>IP Address Info</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Get your IP address and location.</p>
    
    <button id="btn" onclick="getIP()">Get My IP</button>
    
    <div class="result" id="result" style="display:none;">
      <div class="result-item"><span class="result-label">IP Address</span><span class="result-value" id="ip">--</span></div>
      <div class="result-item"><span class="result-label">City</span><span class="result-value" id="city">--</span></div>
      <div class="result-item"><span class="result-label">Region</span><span class="result-value" id="region">--</span></div>
      <div class="result-item"><span class="result-label">Country</span><span class="result-value" id="country">--</span></div>
      <div class="result-item"><span class="result-label">ISP</span><span class="result-value" id="isp">--</span></div>
    </div>
  </div>
</div>
<script>
  async function getIP() {
    const btn = document.getElementById('btn');
    btn.textContent = 'Loading...';
    btn.disabled = true;
    
    try {
      const res = await fetch('https://ipapi.co/json/');
      const data = await res.json();
      
      document.getElementById('ip').textContent = data.ip || 'N/A';
      document.getElementById('city').textContent = data.city || 'N/A';
      document.getElementById('region').textContent = data.region || 'N/A';
      document.getElementById('country').textContent = data.country_name || 'N/A';
      document.getElementById('isp').textContent = data.org || 'N/A';
      
      document.getElementById('result').style.display = 'block';
    } catch(e) {
      alert('Could not fetch IP info');
    }
    
    btn.textContent = 'Get My IP';
    btn.disabled = false;
  }
</script>
</body>
</html>
