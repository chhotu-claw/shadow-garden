<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Address Info — Shadow's Garden</title>
<meta name="description" content="Get detailed info about your IP address — location, ISP, hostname, and network details.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { width: 100%; max-width: 600px; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 2rem; }
  .btn { padding: 0.75rem 1.5rem; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; margin-bottom: 1.5rem; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .info-grid { display: grid; gap: 1rem; }
  .info-card { background: var(--card); border-radius: 12px; padding: 1.25rem; }
  .info-card h3 { margin: 0 0 0.5rem 0; font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
  .info-card .value { font-size: 1.2rem; font-weight: 600; word-break: break-all; }
  .info-card .extra { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }
  .loading { text-align: center; color: var(--text-secondary); }
  .error { background: #ff3b3b20; border: 1px solid #ff3b3b; border-radius: 8px; padding: 1rem; color: #ff6b6b; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>IP Address Info</h1>
    <p class="subtitle">Get detailed info about your public IP address</p>
    
    <button class="btn" id="lookupBtn" onclick="lookupIP()">Look Up My IP</button>
    
    <div id="loading" class="loading" style="display: none;">Looking up...</div>
    <div id="error" class="error" style="display: none;"></div>
    
    <div class="info-grid" id="results" style="display: none;"></div>
  </div>
  
  <script>
    async function lookupIP() {
      const btn = document.getElementById('lookupBtn');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const results = document.getElementById('results');
      
      btn.disabled = true;
      loading.style.display = 'block';
      error.style.display = 'none';
      results.style.display = 'none';
      
      try {
        // Get IP info from ipapi.co (free, no key needed)
        const response = await fetch('https://ipapi.co/json/');
        if (!response.ok) throw new Error('Failed to fetch IP info');
        
        const data = await response.json();
        
        const fields = [
          { label: 'IP Address', value: data.ip, extra: data.version },
          { label: 'City', value: data.city, extra: data.region + ', ' + data.country_name },
          { label: 'ISP', value: data.org, extra: data.asn },
          { label: 'Network', value: data.network, extra: data.carrier?.name || '' },
          { label: 'Timezone', value: data.timezone, extra: 'UTC' + data.utc_offset },
          { label: 'Currency', value: data.currency, extra: data.currency_name },
          { label: 'Languages', value: data.languages, extra: '' }
        ].filter(f => f.value);
        
        results.innerHTML = fields.map(f => `
          <div class="info-card">
            <h3>${f.label}</h3>
            <div class="value">${f.value || 'N/A'}</div>
            ${f.extra ? `<div class="extra">${f.extra}</div>` : ''}
          </div>
        `).join('');
        
        results.style.display = 'grid';
      } catch (e) {
        error.textContent = 'Error: ' + e.message;
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }
  </script>
</body>
</html>
