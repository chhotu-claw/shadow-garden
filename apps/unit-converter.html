<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Shadow's Garden</title>
<meta name="description" content="Convert between length, weight, temperature, volume, area, time, speed, and data units. All local, all fast.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 500px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    margin-bottom: 0.5rem;
    font-size: 1.75rem;
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.875rem;
  }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
  }

  .category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    justify-content: center;
  }

  .category-tab {
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.75rem;
    transition: all 0.2s;
  }

  .category-tab.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .category-tab:hover:not(.active) {
    border-color: var(--primary);
    color: var(--text);
  }

  .converter {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .input-group {
    display: flex;
    gap: 0.5rem;
  }

  input[type="number"] {
    flex: 1;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
  }

  input[type="number"]:focus {
    outline: none;
    border-color: var(--primary);
  }

  select {
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.875rem;
    min-width: 120px;
    cursor: pointer;
  }

  select:focus {
    outline: none;
    border-color: var(--primary);
  }

  .result {
    background: var(--bg);
    padding: 1rem;
    border-radius: 8px;
    text-align: center;
    font-size: 1.25rem;
    border: 1px solid var(--border);
  }

  .result-value {
    color: var(--primary);
    font-weight: bold;
  }

  .swap-btn {
    align-self: center;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.5rem;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .swap-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .formula {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.75rem;
    margin-top: 0.5rem;
  }

  .hidden { display: none; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>⚖️ Unit Converter</h1>
    <p class="subtitle">8 categories. All local. No ads.</p>

    <div class="card">
      <div class="category-tabs" id="category-tabs">
        <button class="category-tab active" data-category="length">Length</button>
        <button class="category-tab" data-category="weight">Weight</button>
        <button class="category-tab" data-category="temperature">Temp</button>
        <button class="category-tab" data-category="volume">Volume</button>
        <button class="category-tab" data-category="area">Area</button>
        <button class="category-tab" data-category="time">Time</button>
        <button class="category-tab" data-category="speed">Speed</button>
        <button class="category-tab" data-category="data">Data</button>
      </div>

      <div class="converter" id="converter">
        <div class="input-group">
          <input type="number" id="input-value" placeholder="Enter value" step="any">
          <select id="from-unit"></select>
        </div>

        <button class="swap-btn" onclick="swapUnits()" title="Swap units">⇅</button>

        <div class="input-group">
          <input type="number" id="output-value" placeholder="Result" step="any" readonly>
          <select id="to-unit"></select>
        </div>

        <p class="formula" id="formula"></p>
      </div>
    </div>
  </div>

  <script>
    const units = {
      length: {
        name: 'Length',
        units: {
          m: { name: 'Meter', toBase: 1 },
          km: { name: 'Kilometer', toBase: 1000 },
          cm: { name: 'Centimeter', toBase: 0.01 },
          mm: { name: 'Millimeter', toBase: 0.001 },
          mi: { name: 'Mile', toBase: 1609.344 },
          yd: { name: 'Yard', toBase: 0.9144 },
          ft: { name: 'Foot', toBase: 0.3048 },
          in: { name: 'Inch', toBase: 0.0254 },
          nm: { name: 'Nautical Mile', toBase: 1852 }
        }
      },
      weight: {
        name: 'Weight',
        units: {
          kg: { name: 'Kilogram', toBase: 1 },
          g: { name: 'Gram', toBase: 0.001 },
          mg: { name: 'Milligram', toBase: 0.000001 },
          t: { name: 'Metric Ton', toBase: 1000 },
          lb: { name: 'Pound', toBase: 0.453592 },
          oz: { name: 'Ounce', toBase: 0.0283495 },
          st: { name: 'Stone', toBase: 6.35029 }
        }
      },
      temperature: {
        name: 'Temperature',
        units: {
          c: { name: 'Celsius', toBase: 1, special: true },
          f: { name: 'Fahrenheit', toBase: 1, special: true },
          k: { name: 'Kelvin', toBase: 1, special: true }
        }
      },
      volume: {
        name: 'Volume',
        units: {
          l: { name: 'Liter', toBase: 1 },
          ml: { name: 'Milliliter', toBase: 0.001 },
          m3: { name: 'Cubic Meter', toBase: 1000 },
          cm3: { name: 'Cubic Cm', toBase: 0.001 },
          gal: { name: 'Gallon (US)', toBase: 3.78541 },
          qt: { name: 'Quart (US)', toBase: 0.946353 },
          pt: { name: 'Pint (US)', toBase: 0.473176 },
          cup: { name: 'Cup (US)', toBase: 0.236588 },
          fl oz: { name: 'Fluid Oz (US)', toBase: 0.0295735 }
        }
      },
      area: {
        name: 'Area',
        units: {
          m2: { name: 'Square Meter', toBase: 1 },
          km2: { name: 'Square Km', toBase: 1000000 },
          cm2: { name: 'Square Cm', toBase: 0.0001 },
          ha: { name: 'Hectare', toBase: 10000 },
          ac: { name: 'Acre', toBase: 4046.86 },
          ft2: { name: 'Square Foot', toBase: 0.092903 },
          in2: { name: 'Square Inch', toBase: 0.00064516 },
          mi2: { name: 'Square Mile', toBase: 2589988.11 }
        }
      },
      time: {
        name: 'Time',
        units: {
          s: { name: 'Second', toBase: 1 },
          ms: { name: 'Millisecond', toBase: 0.001 },
          min: { name: 'Minute', toBase: 60 },
          h: { name: 'Hour', toBase: 3600 },
          d: { name: 'Day', toBase: 86400 },
          wk: { name: 'Week', toBase: 604800 },
          mo: { name: 'Month (30d)', toBase: 2592000 },
          yr: { name: 'Year (365d)', toBase: 31536000 }
        }
      },
      speed: {
        name: 'Speed',
        units: {
          'm/s': { name: 'm/s', toBase: 1 },
          'km/h': { name: 'km/h', toBase: 0.277778 },
          'mph': { name: 'mph', toBase: 0.44704 },
          'ft/s': { name: 'ft/s', toBase: 0.3048 },
          knots: { name: 'Knots', toBase: 0.514444 },
          'mach': { name: 'Mach', toBase: 343 }
        }
      },
      data: {
        name: 'Data',
        units: {
          B: { name: 'Byte', toBase: 1 },
          KB: { name: 'Kilobyte', toBase: 1024 },
          MB: { name: 'Megabyte', toBase: 1048576 },
          GB: { name: 'Gigabyte', toBase: 1073741824 },
          TB: { name: 'Terabyte', toBase: 1099511627776 },
          PB: { name: 'Petabyte', toBase: 1125899906842624 },
          bit: { name: 'Bit', toBase: 0.125 },
          Kbit: { name: 'Kilobit', toBase: 128 },
          Mbit: { name: 'Megabit', toBase: 131072 },
          Gbit: { name: 'Gigabit', toBase: 134217728 }
        }
      }
    };

    let currentCategory = 'length';

    function init() {
      populateUnits();
      
      document.getElementById('category-tabs').addEventListener('click', (e) => {
        if (e.target.classList.contains('category-tab')) {
          document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          currentCategory = e.target.dataset.category;
          populateUnits();
        }
      });

      document.getElementById('input-value').addEventListener('input', convert);
      document.getElementById('from-unit').addEventListener('change', convert);
      document.getElementById('to-unit').addEventListener('change', convert);
    }

    function populateUnits() {
      const category = units[currentCategory];
      const fromSelect = document.getElementById('from-unit');
      const toSelect = document.getElementById('to-unit');
      
      fromSelect.innerHTML = '';
      toSelect.innerHTML = '';

      Object.entries(category.units).forEach(([key, val]) => {
        fromSelect.add(new Option(val.name, key));
        toSelect.add(new Option(val.name, key));
      });

      // Set defaults
      if (currentCategory === 'temperature') {
        fromSelect.value = 'c';
        toSelect.value = 'f';
      } else if (currentCategory === 'data') {
        fromSelect.value = 'MB';
        toSelect.value = 'GB';
      } else {
        fromSelect.selectedIndex = 0;
        toSelect.selectedIndex = Math.min(1, Object.keys(category.units).length - 1);
      }

      convert();
    }

    function convert() {
      const val = parseFloat(document.getElementById('input-value').value);
      const from = document.getElementById('from-unit').value;
      const to = document.getElementById('to-unit').value;
      const output = document.getElementById('output-value');
      const formula = document.getElementById('formula');

      if (isNaN(val)) {
        output.value = '';
        formula.textContent = '';
        return;
      }

      let result;

      if (currentCategory === 'temperature') {
        result = convertTemperature(val, from, to);
        formula.textContent = getTempFormula(from, to);
      } else {
        const fromBase = units[currentCategory].units[from].toBase;
        const toBase = units[currentCategory].units[to].toBase;
        result = (val * fromBase) / toBase;
        
        // Format result
        if (Math.abs(result) < 0.0001 || Math.abs(result) > 1000000) {
          result = result.toExponential(4);
        } else {
          result = parseFloat(result.toFixed(6));
        }
        
        formula.textContent = `${val} × ${fromBase} / ${toBase}`;
      }

      output.value = result;
    }

    function convertTemperature(val, from, to) {
      let celsius;
      
      // Convert to Celsius first
      switch (from) {
        case 'c': celsius = val; break;
        case 'f': celsius = (val - 32) * 5/9; break;
        case 'k': celsius = val - 273.15; break;
      }

      // Convert from Celsius to target
      switch (to) {
        case 'c': return celsius;
        case 'f': return celsius * 9/5 + 32;
        case 'k': return celsius + 273.15;
      }
    }

    function getTempFormula(from, to) {
      const formulas = {
        'c-f': '°F = °C × 9/5 + 32',
        'f-c': '°C = (°F - 32) × 5/9',
        'c-k': 'K = °C + 273.15',
        'k-c': '°C = K - 273.15',
        'f-k': 'K = (°F - 32) × 5/9 + 273.15',
        'k-f': '°F = (K - 273.15) × 9/5 + 32'
      };
      return formulas[`${from}-${to}`] || '';
    }

    function swapUnits() {
      const from = document.getElementById('from-unit');
      const to = document.getElementById('to-unit');
      const temp = from.value;
      from.value = to.value;
      to.value = temp;
      convert();
    }

    init();
  </script>
</body>
</html>
