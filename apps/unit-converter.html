<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Shadow's Garden</title>
<meta name="description" content="Convert between units of length, weight, temperature, and data storage. Clean, local, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e5e5e5; padding: 2rem; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .category-select { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .category-btn { padding: 0.5rem 1rem; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #888; cursor: pointer; transition: all 0.2s; }
  .category-btn:hover { border-color: #555; color: #aaa; }
  .category-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #60a5fa; }
  .converter-section { display: none; }
  .converter-section.active { display: block; }
  .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: end; }
  @media (max-width: 600px) { .converter-grid { grid-template-columns: 1fr; } }
  .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
  label { font-size: 0.85rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select { padding: 0.75rem; background: #141414; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 1rem; }
  input:focus, select:focus { outline: none; border-color: #3b82f6; }
  .swap-btn { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 0.75rem; cursor: pointer; color: #666; font-size: 1.2rem; }
  .swap-btn:hover { border-color: #555; color: #aaa; }
  .common-values { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .common-values button { padding: 0.25rem 0.5rem; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; color: #666; font-size: 0.8rem; cursor: pointer; }
  .common-values button:hover { border-color: #555; }
  .result { font-size: 1.5rem; font-weight: 600; color: #4ade80; margin-top: 1rem; padding: 1rem; background: #0a1a0a; border-radius: 8px; }
</style>
</head>
<body data-page-type="app">
  <nav></nav>
  <h1>Unit Converter</h1>
  <p style="color:#666;margin-bottom:1.5rem;">Convert between units of length, weight, temperature, and data storage.</p>
  
  <div class="category-select">
    <button class="category-btn active" data-category="length">Length</button>
    <button class="category-btn" data-category="weight">Weight</button>
    <button class="category-btn" data-category="temperature">Temperature</button>
    <button class="category-btn" data-category="data">Data</button>
  </div>

  <div id="length" class="converter-section active">
    <div class="converter-grid">
      <div class="input-group">
        <label>From</label>
        <input type="number" id="length-from" value="1">
        <select id="length-unit-from">
          <option value="m">Meter</option>
          <option value="km">Kilometer</option>
          <option value="cm">Centimeter</option>
          <option value="mm">Millimeter</option>
          <option value="mi">Mile</option>
          <option value="yd">Yard</option>
          <option value="ft">Foot</option>
          <option value="in">Inch</option>
          <option value="nm">Nautical Mile</option>
        </select>
        <div class="common-values">
          <button onclick="setValue('length-from', 1)">1m</button>
          <button onclick="setValue('length-from', 100)">100m</button>
          <button onclick="setValue('length-from', 1609.34)">1 mile</button>
        </div>
      </div>
      <button class="swap-btn" onclick="swapUnits('length')">⇄</button>
      <div class="input-group">
        <label>To</label>
        <select id="length-unit-to">
          <option value="m">Meter</option>
          <option value="km">Kilometer</option>
          <option value="cm" selected>Centimeter</option>
          <option value="mm">Millimeter</option>
          <option value="mi">Mile</option>
          <option value="yd">Yard</option>
          <option value="ft">Foot</option>
          <option value="in">Inch</option>
          <option value="nm">Nautical Mile</option>
        </select>
        <div id="length-result" class="result">100 cm</div>
      </div>
    </div>
  </div>

  <div id="weight" class="converter-section">
    <div class="converter-grid">
      <div class="input-group">
        <label>From</label>
        <input type="number" id="weight-from" value="1">
        <select id="weight-unit-from">
          <option value="kg">Kilogram</option>
          <option value="g">Gram</option>
          <option value="mg">Milligram</option>
          <option value="lb">Pound</option>
          <option value="oz">Ounce</option>
          <option value="ton">Metric Ton</option>
        </select>
        <div class="common-values">
          <button onclick="setValue('weight-from', 1)">1kg</button>
          <button onclick="setValue('weight-from', 453.592)">1 lb</button>
        </div>
      </div>
      <button class="swap-btn" onclick="swapUnits('weight')">⇄</button>
      <div class="input-group">
        <label>To</label>
        <select id="weight-unit-to">
          <option value="kg">Kilogram</option>
          <option value="g" selected>Gram</option>
          <option value="mg">Milligram</option>
          <option value="lb">Pound</option>
          <option value="oz">Ounce</option>
          <option value="ton">Metric Ton</option>
        </select>
        <div id="weight-result" class="result">1000 g</div>
      </div>
    </div>
  </div>

  <div id="temperature" class="converter-section">
    <div class="converter-grid">
      <div class="input-group">
        <label>From</label>
        <input type="number" id="temp-from" value="0">
        <select id="temp-unit-from">
          <option value="c">Celsius</option>
          <option value="f">Fahrenheit</option>
          <option value="k">Kelvin</option>
        </select>
        <div class="common-values">
          <button onclick="setValue('temp-from', 0)">0°C</button>
          <button onclick="setValue('temp-from', 100)">100°C</button>
          <button onclick="setValue('temp-from', 32)">32°F</button>
          <button onclick="setValue('temp-from', -40)">-40°C</button>
        </div>
      </div>
      <button class="swap-btn" onclick="swapUnits('temp')">⇄</button>
      <div class="input-group">
        <label>To</label>
        <select id="temp-unit-to">
          <option value="c" selected>Celsius</option>
          <option value="f">Fahrenheit</option>
          <option value="k">Kelvin</option>
        </select>
        <div id="temp-result" class="result">0°C</div>
      </div>
    </div>
  </div>

  <div id="data" class="converter-section">
    <div class="converter-grid">
      <div class="input-group">
        <label>From</label>
        <input type="number" id="data-from" value="1">
        <select id="data-unit-from">
          <option value="b">Bytes</option>
          <option value="kb">Kilobytes</option>
          <option value="mb" selected>Megabytes</option>
          <option value="gb">Gigabytes</option>
          <option value="tb">Terabytes</option>
          <option value="pb">Petabytes</option>
        </select>
        <div class="common-values">
          <button onclick="setValue('data-from', 1)">1 MB</button>
          <button onclick="setValue('data-from', 1024)">1 GB</button>
        </div>
      </div>
      <button class="swap-btn" onclick="swapUnits('data')">⇄</button>
      <div class="input-group">
        <label>To</label>
        <select id="data-unit-to">
          <option value="b">Bytes</option>
          <option value="kb">Kilobytes</option>
          <option value="mb">Megabytes</option>
          <option value="gb" selected>Gigabytes</option>
          <option value="tb">Terabytes</option>
          <option value="pb">Petabytes</option>
        </select>
        <div id="data-result" class="result">0.001 GB</div>
      </div>
    </div>
  </div>

  <script>
    const conversionFactors = {
      length: {
        m: 1, km: 1000, cm: 0.01, mm: 0.001, mi: 1609.344, yd: 0.9144, ft: 0.3048, in: 0.0254, nm: 1852
      },
      weight: {
        kg: 1, g: 0.001, mg: 0.000001, lb: 0.453592, oz: 0.0283495, ton: 1000
      },
      data: {
        b: 1, kb: 1024, mb: 1048576, gb: 1073741824, tb: 1099511627776, pb: 1125899906842624
      }
    };

    function celsiusToFahrenheit(c) { return c * 9/5 + 32; }
    function celsiusToKelvin(c) { return c + 273.15; }
    function fahrenheitToCelsius(f) { return (f - 32) * 5/9; }
    function kelvinToCelsius(k) { return k - 273.15; }

    function convertTemperature(value, from, to) {
      let c;
      if (from === 'c') c = value;
      else if (from === 'f') c = fahrenheitToCelsius(value);
      else c = kelvinToCelsius(value);
      
      if (to === 'c') return c;
      else if (to === 'f') return celsiusToFahrenheit(c);
      else return celsiusToKelvin(c);
    }

    function convert(type) {
      let fromVal, fromUnit, toUnit, result;
      
      if (type === 'temp') {
        fromVal = parseFloat(document.getElementById('temp-from').value);
        fromUnit = document.getElementById('temp-unit-from').value;
        toUnit = document.getElementById('temp-unit-to').value;
        result = convertTemperature(fromVal, fromUnit, toUnit);
        document.getElementById('temp-result').textContent = result.toFixed(2) + ' ' + (toUnit === 'c' ? '°C' : toUnit === 'f' ? '°F' : 'K');
      } else {
        const factors = conversionFactors[type];
        fromVal = parseFloat(document.getElementById(type + '-from').value);
        fromUnit = document.getElementById(type + '-unit-from').value;
        toUnit = document.getElementById(type + '-unit-to').value;
        const baseValue = fromVal * factors[fromUnit];
        result = baseValue / factors[toUnit];
        
        let unitName = toUnit;
        if (type === 'length') unitName += ' (meter)';
        else if (type === 'weight') unitName += ' (kg)';
        else unitName += ' (bytes)';
        
        if (result >= 1000000) document.getElementById(type + '-result').textContent = result.toExponential(2) + ' ' + toUnit;
        else if (result < 0.0001) document.getElementById(type + '-result').textContent = result.toExponential(2) + ' ' + toUnit;
        else document.getElementById(type + '-result').textContent = result.toLocaleString(undefined, {maximumFractionDigits: 6}) + ' ' + toUnit;
      }
    }

    function swapUnits(type) {
      const suffix = type === 'temp' ? '' : '-' + type;
      const fromSelect = document.getElementById((type === 'temp' ? 'temp' : type) + '-unit-from');
      const toSelect = document.getElementById((type === 'temp' ? 'temp' : type) + '-unit-to');
      const temp = fromSelect.value;
      fromSelect.value = toSelect.value;
      toSelect.value = temp;
      convert(type);
    }

    function setValue(id, val) {
      document.getElementById(id).value = val;
      const type = id.split('-')[0];
      convert(type);
    }

    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.converter-section').forEach(s => s.classList.remove('active'));
        document.getElementById(btn.dataset.category).classList.add('active');
      });
    });

    ['length', 'weight', 'data'].forEach(type => {
      document.getElementById(type + '-from').addEventListener('input', () => convert(type));
      document.getElementById(type + '-unit-from').addEventListener('change', () => convert(type));
      document.getElementById(type + '-unit-to').addEventListener('change', () => convert(type));
    });

    ['temp-from', 'temp-unit-from', 'temp-unit-to'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => convert('temp'));
      document.getElementById(id).addEventListener('change', () => convert('temp'));
    });

    convert('length');
    convert('weight');
    convert('temp');
    convert('data');
  </script>
</body>
</html>
