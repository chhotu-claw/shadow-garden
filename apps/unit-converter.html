<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Shadow's Garden</title>
<meta name="description" content="Convert between length, weight, temperature, volume, area, time, speed, and data units">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --accent: #10b981; }
  body { font-family: 'JetBrains Mono', monospace; }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
  
  .category-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .tab { padding: 0.5rem 1rem; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; cursor: pointer; transition: all 0.15s; font-size: 0.85rem; }
  .tab:hover { background: #30363d; color: #c9d1d9; }
  .tab.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  
  .converter { background: #161b22; border: 2px solid #30363d; border-radius: 12px; padding: 1.5rem; }
  .input-group { margin-bottom: 1rem; }
  .input-group label { display: block; font-size: 0.75rem; color: #8b949e; text-transform: uppercase; margin-bottom: 0.5rem; }
  .input-row { display: flex; gap: 0.5rem; }
  .input-row input { flex: 1; padding: 0.75rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-family: inherit; font-size: 1rem; }
  .input-row input:focus { outline: none; border-color: var(--accent); }
  .input-row select { padding: 0.75rem; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-family: inherit; cursor: pointer; min-width: 120px; }
  
  .swap-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; margin: 0.5rem auto; background: #21262d; border: 1px solid #30363d; border-radius: 50%; color: #8b949e; cursor: pointer; transition: all 0.15s; font-size: 1.2rem; }
  .swap-btn:hover { background: #30363d; color: var(--accent); transform: rotate(180deg); }
  
  .result { background: #0d1117; border-radius: 8px; padding: 1rem; margin-top: 1rem; text-align: center; }
  .result-value { font-size: 1.5rem; color: var(--accent); font-weight: 600; }
  .result-unit { color: #8b949e; font-size: 0.9rem; }
  
  .formula { margin-top: 0.75rem; font-size: 0.8rem; color: #8b949e; }
  
  .quick-values { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
  .quick-btn { padding: 0.35rem 0.6rem; background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; font-size: 0.75rem; cursor: pointer; }
  .quick-btn:hover { background: #30363d; color: #c9d1d9; }
  
  .category { display: none; }
  .category.active { display: block; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Unit Converter</h1>
    <p class="subtitle">Convert between length, weight, temperature, volume, area, time, speed, and data</p>
    
    <div class="category-tabs" id="tabs"></div>
    
    <div class="converter" id="converter"></div>
  </div>
  
  <script>
    const categories = {
      length: {
        name: 'Length',
        units: [
          { name: 'Meters', symbol: 'm', toBase: 1 },
          { name: 'Kilometers', symbol: 'km', toBase: 1000 },
          { name: 'Centimeters', symbol: 'cm', toBase: 0.01 },
          { name: 'Millimeters', symbol: 'mm', toBase: 0.001 },
          { name: 'Miles', symbol: 'mi', toBase: 1609.344 },
          { name: 'Yards', symbol: 'yd', toBase: 0.9144 },
          { name: 'Feet', symbol: 'ft', toBase: 0.3048 },
          { name: 'Inches', symbol: 'in', toBase: 0.0254 },
          { name: 'Nautical miles', symbol: 'nmi', toBase: 1852 }
        ],
        presets: [1, 100, 1000, 1.609, 0.3048]
      },
      weight: {
        name: 'Weight',
        units: [
          { name: 'Kilograms', symbol: 'kg', toBase: 1 },
          { name: 'Grams', symbol: 'g', toBase: 0.001 },
          { name: 'Milligrams', symbol: 'mg', toBase: 0.000001 },
          { name: 'Metric tons', symbol: 't', toBase: 1000 },
          { name: 'Pounds', symbol: 'lb', toBase: 0.453592 },
          { name: 'Ounces', symbol: 'oz', toBase: 0.0283495 },
          { name: 'Stones', symbol: 'st', toBase: 6.35029 }
        ],
        presets: [1, 100, 0.453592, 2.205]
      },
      temperature: {
        name: 'Temperature',
        units: [
          { name: 'Celsius', symbol: '°C', toBase: 'celsius' },
          { name: 'Fahrenheit', symbol: '°F', toBase: 'fahrenheit' },
          { name: 'Kelvin', symbol: 'K', toBase: 'kelvin' }
        ],
        presets: [0, 100, -40, 32, 212, 273.15]
      },
      volume: {
        name: 'Volume',
        units: [
          { name: 'Liters', symbol: 'L', toBase: 1 },
          { name: 'Milliliters', symbol: 'mL', toBase: 0.001 },
          { name: 'Cubic meters', symbol: 'm³', toBase: 1000 },
          { name: 'Gallons (US)', symbol: 'gal', toBase: 3.78541 },
          { name: 'Quarts', symbol: 'qt', toBase: 0.946353 },
          { name: 'Pints', symbol: 'pt', toBase: 0.473176 },
          { name: 'Cups', symbol: 'cup', toBase: 0.236588 },
          { name: 'Fluid ounces', symbol: 'fl oz', toBase: 0.0295735 }
        ],
        presets: [1, 3.785, 0.236, 0.473]
      },
      area: {
        name: 'Area',
        units: [
          { name: 'Square meters', symbol: 'm²', toBase: 1 },
          { name: 'Square kilometers', symbol: 'km²', toBase: 1000000 },
          { name: 'Square centimeters', symbol: 'cm²', toBase: 0.0001 },
          { name: 'Hectares', symbol: 'ha', toBase: 10000 },
          { name: 'Acres', symbol: 'ac', toBase: 4046.86 },
          { name: 'Square feet', symbol: 'ft²', toBase: 0.092903 },
          { name: 'Square inches', symbol: 'in²', toBase: 0.00064516 },
          { name: 'Square miles', symbol: 'mi²', toBase: 2589988.11 }
        ],
        presets: [1, 100, 4046.86, 0.0929]
      },
      time: {
        name: 'Time',
        units: [
          { name: 'Seconds', symbol: 's', toBase: 1 },
          { name: 'Milliseconds', symbol: 'ms', toBase: 0.001 },
          { name: 'Microseconds', symbol: 'μs', toBase: 0.000001 },
          { name: 'Minutes', symbol: 'min', toBase: 60 },
          { name: 'Hours', symbol: 'h', toBase: 3600 },
          { name: 'Days', symbol: 'd', toBase: 86400 },
          { name: 'Weeks', symbol: 'wk', toBase: 604800 },
          { name: 'Years', symbol: 'yr', toBase: 31536000 }
        ],
        presets: [1, 60, 3600, 86400, 7]
      },
      speed: {
        name: 'Speed',
        units: [
          { name: 'Meters/second', symbol: 'm/s', toBase: 1 },
          { name: 'Kilometers/hour', symbol: 'km/h', toBase: 0.277778 },
          { name: 'Miles/hour', symbol: 'mph', toBase: 0.44704 },
          { name: 'Feet/second', symbol: 'ft/s', toBase: 0.3048 },
          { name: 'Knots', symbol: 'kn', toBase: 0.514444 },
          { name: 'Mach', symbol: 'M', toBase: 343 }
        ],
        presets: [1, 100, 60, 1.609, 0.514]
      },
      data: {
        name: 'Data',
        units: [
          { name: 'Bytes', symbol: 'B', toBase: 1 },
          { name: 'Kilobytes', symbol: 'KB', toBase: 1024 },
          { name: 'Megabytes', symbol: 'MB', toBase: 1048576 },
          { name: 'Gigabytes', symbol: 'GB', toBase: 1073741824 },
          { name: 'Terabytes', symbol: 'TB', toBase: 1099511627776 },
          { name: 'Bits', symbol: 'b', toBase: 0.125 },
          { name: 'Kilobits', symbol: 'Kb', toBase: 128 },
          { name: 'Megabits', symbol: 'Mb', toBase: 131072 }
        ],
        presets: [1, 1024, 1048576, 8]
      }
    };
    
    let currentCategory = 'length';
    
    function init() {
      renderTabs();
      renderConverter();
    }
    
    function renderTabs() {
      const tabs = document.getElementById('tabs');
      tabs.innerHTML = Object.keys(categories).map(cat => 
        `<button class="tab ${cat === currentCategory ? 'active' : ''}" data-cat="${cat}">${categories[cat].name}</button>`
      ).join('');
      
      tabs.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          currentCategory = tab.dataset.cat;
          renderTabs();
          renderConverter();
        });
      });
    }
    
    function renderConverter() {
      const cat = categories[currentCategory];
      const container = document.getElementById('converter');
      
      container.innerHTML = `
        <div class="input-group">
          <label>From</label>
          <div class="input-row">
            <input type="number" id="fromValue" value="1" step="any">
            <select id="fromUnit">${cat.units.map((u, i) => `<option value="${i}" ${i === 0 ? 'selected' : ''}>${u.name} (${u.symbol})</option>`).join('')}</select>
          </div>
        </div>
        
        <button class="swap-btn" id="swapBtn">⇅</button>
        
        <div class="input-group">
          <label>To</label>
          <div class="input-row">
            <input type="number" id="toValue" step="any" readonly>
            <select id="toUnit">${cat.units.map((u, i) => `<option value="${i}" ${i === 1 ? 'selected' : ''}>${u.name} (${u.symbol})</option>`).join('')}</select>
          </div>
        </div>
        
        <div class="result">
          <div class="result-value" id="resultValue">${cat.units[1].toBase}</div>
          <div class="result-unit" id="resultUnit">${cat.units[1].name}</div>
        </div>
        
        <div class="formula" id="formula"></div>
        
        <div class="quick-values">
          ${cat.presets.slice(0, 4).map(v => `<button class="quick-btn" data-val="${v}">${v}</button>`).join('')}
        </div>
      `;
      
      document.getElementById('fromValue').addEventListener('input', convert);
      document.getElementById('fromUnit').addEventListener('change', convert);
      document.getElementById('toUnit').addEventListener('change', convert);
      document.getElementById('swapBtn').addEventListener('click', swap);
      
      container.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById('fromValue').value = btn.dataset.val;
          convert();
        });
      });
      
      convert();
    }
    
    function convert() {
      const cat = categories[currentCategory];
      const fromVal = parseFloat(document.getElementById('fromValue').value) || 0;
      const fromIdx = parseInt(document.getElementById('fromUnit').value);
      const toIdx = parseInt(document.getElementById('toUnit').value);
      
      const fromUnit = cat.units[fromIdx];
      const toUnit = cat.units[toIdx];
      
      let result;
      let formula = '';
      
      if (currentCategory === 'temperature') {
        // Temperature needs special handling
        const celsius = toCelsius(fromVal, fromUnit.toBase);
        result = fromCelsius(celsius, toUnit.toBase);
        formula = `${fromVal}${fromUnit.symbol} → ${result.toFixed(4)}${toUnit.symbol}`;
      } else {
        // Standard conversion
        const baseValue = fromVal * fromUnit.toBase;
        result = baseValue / toUnit.toBase;
        
        // Build formula string
        if (fromUnit.toBase === toUnit.toBase) {
          formula = `${fromVal} ${fromUnit.symbol} = ${result.toFixed(6)} ${toUnit.symbol}`;
        } else {
          formula = `${fromVal} × ${fromUnit.toBase} ÷ ${toUnit.toBase} = ${result.toFixed(6)}`;
        }
      }
      
      document.getElementById('toValue').value = result.toPrecision(10).replace(/\.?0+$/, '');
      document.getElementById('resultValue').textContent = formatNumber(result);
      document.getElementById('resultUnit').textContent = toUnit.name;
      document.getElementById('formula').textContent = formula;
    }
    
    function toCelsius(val, type) {
      if (type === 'celsius') return val;
      if (type === 'fahrenheit') return (val - 32) * 5/9;
      if (type === 'kelvin') return val - 273.15;
    }
    
    function fromCelsius(val, type) {
      if (type === 'celsius') return val;
      if (type === 'fahrenheit') return val * 9/5 + 32;
      if (type === 'kelvin') return val + 273.15;
    }
    
    function formatNumber(n) {
      if (Math.abs(n) < 0.0001 || Math.abs(n) >= 1e10) {
        return n.toExponential(4);
      }
      return n.toPrecision(8).replace(/\.?0+$/, '');
    }
    
    function swap() {
      const fromSel = document.getElementById('fromUnit');
      const toSel = document.getElementById('toUnit');
      const fromVal = document.getElementById('fromValue');
      const toVal = document.getElementById('toValue');
      
      const tempIdx = fromSel.selectedIndex;
      fromSel.selectedIndex = toSel.selectedIndex;
      toSel.selectedIndex = tempIdx;
      
      fromVal.value = toVal.value || 1;
      convert();
    }
    
    // Load saved category
    const saved = localStorage.getItem('unitConverter_category');
    if (saved && categories[saved]) currentCategory = saved;
    
    init();
    
    // Save category on change
    document.getElementById('tabs').addEventListener('click', () => {
      localStorage.setItem('unitConverter_category', currentCategory);
    });
  </script>
</body>
</html>
