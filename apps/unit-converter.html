<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Shadow's Garden</title>
<meta name="description" content="Convert between length, weight, temperature, and volume units instantly">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .converter {
    max-width: 500px;
    margin: 0 auto;
    padding: 2rem;
  }
  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .tab {
    padding: 0.6rem 1rem;
    background: var(--button-bg, #313244);
    border: none;
    border-radius: 8px;
    color: var(--text, #cdd6f4);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .tab:hover {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .tab.active {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .card {
    background: var(--card-bg, #1e1e2e);
    border-radius: 12px;
    padding: 1.5rem;
    border: 1px solid var(--border, #313244);
  }
  .input-group {
    margin-bottom: 1rem;
  }
  label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text-secondary, #a6adc8);
    font-size: 0.85rem;
  }
  .input-row {
    display: flex;
    gap: 0.75rem;
  }
  input[type="number"] {
    flex: 1;
    padding: 0.75rem;
    border: 1px solid var(--border, #313244);
    border-radius: 8px;
    background: var(--input-bg, #11111b);
    color: var(--text, #cdd6f4);
    font-size: 1.1rem;
    font-family: inherit;
  }
  select {
    padding: 0.75rem;
    border: 1px solid var(--border, #313244);
    border-radius: 8px;
    background: var(--input-bg, #11111b);
    color: var(--text, #cdd6f4);
    font-size: 1rem;
    font-family: inherit;
    min-width: 120px;
  }
  .result {
    margin-top: 1.5rem;
    padding: 1.25rem;
    background: var(--result-bg, #181825);
    border-radius: 8px;
    text-align: center;
  }
  .result-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--accent, #cba6f7);
    word-break: break-word;
  }
  .result-unit {
    color: var(--text-secondary, #a6adc8);
    margin-top: 0.25rem;
    font-size: 0.9rem;
  }
  .swap-btn {
    display: block;
    margin: 1rem auto;
    padding: 0.5rem 1rem;
    background: transparent;
    border: 1px solid var(--border, #313244);
    border-radius: 6px;
    color: var(--text-secondary, #a6adc8);
    cursor: pointer;
    font-size: 1.2rem;
  }
  .swap-btn:hover {
    border-color: var(--accent, #cba6f7);
    color: var(--accent, #cba6f7);
  }
  .common-values {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .common-btn {
    padding: 0.35rem 0.6rem;
    font-size: 0.75rem;
    background: var(--button-bg, #313244);
    border: none;
    border-radius: 5px;
    color: var(--text-secondary, #a6adc8);
    cursor: pointer;
  }
  .common-btn:hover {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .hidden { display: none; }
</style>
</head>
<body data-page-type="app">
<div class="converter">
  <h1>🔄 Unit Converter</h1>
  
  <div class="tabs">
    <button class="tab active" data-type="length">Length</button>
    <button class="tab" data-type="weight">Weight</button>
    <button class="tab" data-type="temperature">Temperature</button>
    <button class="tab" data-type="volume">Volume</button>
  </div>

  <!-- Length -->
  <div class="card" id="length-panel">
    <div class="input-group">
      <label>From</label>
      <div class="input-row">
        <input type="number" id="length-value" placeholder="Enter value" oninput="convert('length')">
        <select id="length-from" onchange="convert('length')">
          <option value="mm">mm</option>
          <option value="cm">cm</option>
          <option value="m" selected>m</option>
          <option value="km">km</option>
          <option value="in">in</option>
          <option value="ft">ft</option>
          <option value="yd">yd</option>
          <option value="mi">mi</option>
        </select>
      </div>
    </div>
    <button class="swap-btn" onclick="swap('length')">⇅</button>
    <div class="input-group">
      <label>To</label>
      <div class="input-row">
        <input type="number" id="length-result" placeholder="Result" readonly>
        <select id="length-to" onchange="convert('length')">
          <option value="mm">mm</option>
          <option value="cm" selected>cm</option>
          <option value="m">m</option>
          <option value="km">km</option>
          <option value="in">in</option>
          <option value="ft">ft</option>
          <option value="yd">yd</option>
          <option value="mi">mi</option>
        </select>
      </div>
    </div>
    <div class="common-values" id="length-common"></div>
  </div>

  <!-- Weight -->
  <div class="card hidden" id="weight-panel">
    <div class="input-group">
      <label>From</label>
      <div class="input-row">
        <input type="number" id="weight-value" placeholder="Enter value" oninput="convert('weight')">
        <select id="weight-from" onchange="convert('weight')">
          <option value="mg">mg</option>
          <option value="g" selected>g</option>
          <option value="kg">kg</option>
          <option value="oz">oz</option>
          <option value="lb">lb</option>
          <option value="ton">ton</option>
        </select>
      </div>
    </div>
    <button class="swap-btn" onclick="swap('weight')">⇅</button>
    <div class="input-group">
      <label>To</label>
      <div class="input-row">
        <input type="number" id="weight-result" placeholder="Result" readonly>
        <select id="weight-to" onchange="convert('weight')">
          <option value="mg">mg</option>
          <option value="g">g</option>
          <option value="kg" selected>kg</option>
          <option value="oz">oz</option>
          <option value="lb">lb</option>
          <option value="ton">ton</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Temperature -->
  <div class="card hidden" id="temperature-panel">
    <div class="input-group">
      <label>From</label>
      <div class="input-row">
        <input type="number" id="temp-value" placeholder="Enter value" oninput="convert('temp')">
        <select id="temp-from" onchange="convert('temp')">
          <option value="C" selected>°C</option>
          <option value="F">°F</option>
          <option value="K">K</option>
        </select>
      </div>
    </div>
    <button class="swap-btn" onclick="swap('temp')">⇅</button>
    <div class="input-group">
      <label>To</label>
      <div class="input-row">
        <input type="number" id="temp-result" placeholder="Result" readonly>
        <select id="temp-to" onchange="convert('temp')">
          <option value="C">°C</option>
          <option value="F" selected>°F</option>
          <option value="K">K</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Volume -->
  <div class="card hidden" id="volume-panel">
    <div class="input-group">
      <label>From</label>
      <div class="input-row">
        <input type="number" id="volume-value" placeholder="Enter value" oninput="convert('volume')">
        <select id="volume-from" onchange="convert('volume')">
          <option value="ml" selected>ml</option>
          <option value="l">L</option>
          <option value="tsp">tsp</option>
          <option value="tbsp">tbsp</option>
          <option value="cup">cup</option>
          <option value="pt">pt</option>
          <option value="qt">qt</option>
          <option value="gal">gal</option>
        </select>
      </div>
    </div>
    <button class="swap-btn" onclick="swap('volume')">⇅</button>
    <div class="input-group">
      <label>To</label>
      <div class="input-row">
        <input type="number" id="volume-result" placeholder="Result" readonly>
        <select id="volume-to" onchange="convert('volume')">
          <option value="ml">ml</option>
          <option value="l" selected>L</option>
          <option value="tsp">tsp</option>
          <option value="tbsp">tbsp</option>
          <option value="cup">cup</option>
          <option value="pt">pt</option>
          <option value="qt">qt</option>
          <option value="gal">gal</option>
        </select>
      </div>
    </div>
  </div>

  <div class="result hidden" id="result-display">
    <div class="result-value" id="result-text"></div>
    <div class="result-unit" id="result-unit"></div>
  </div>
</div>

<script>
  // Conversion factors to base unit (m for length, g for weight, L for volume)
  const conversions = {
    length: {
      mm: 0.001, cm: 0.01, m: 1, km: 1000,
      in: 0.0254, ft: 0.3048, yd: 0.9144, mi: 1609.344
    },
    weight: {
      mg: 0.001, g: 1, kg: 1000, oz: 28.3495, lb: 453.592, ton: 907185
    },
    volume: {
      ml: 0.001, l: 1, tsp: 0.00492892, tbsp: 0.0147868, 
      cup: 0.236588, pt: 0.473176, qt: 0.946353, gal: 3.78541
    }
  };

  const tempConversions = {
    C: { F: (v) => v * 9/5 + 32, K: (v) => v + 273.15 },
    F: { C: (v) => (v - 32) * 5/9, K: (v) => (v - 32) * 5/9 + 273.15 },
    K: { C: (v) => v - 273.15, F: (v) => (v - 273.15) * 9/5 + 32 }
  };

  let currentType = 'length';

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentType = tab.dataset.type;
      
      document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
      document.getElementById(currentType + '-panel').classList.remove('hidden');
      document.getElementById('result-display').classList.add('hidden');
    });
  });

  function swap(type) {
    const from = document.getElementById(type + '-from');
    const to = document.getElementById(type + '-to');
    const temp = from.value;
    from.value = to.value;
    to.value = temp;
    convert(type);
  }

  function convert(type) {
    let value, fromUnit, toUnit, result;
    let displayType = type;

    if (type === 'temp') {
      value = parseFloat(document.getElementById('temp-value').value);
      fromUnit = document.getElementById('temp-from').value;
      toUnit = document.getElementById('temp-to').value;
      
      if (isNaN(value)) {
        document.getElementById('temp-result').value = '';
        return;
      }
      
      if (fromUnit === toUnit) {
        result = value;
      } else {
        result = tempConversions[fromUnit][toUnit](value);
      }
      
      document.getElementById('temp-result').value = Math.round(result * 10000) / 10000;
      displayType = 'temperature';
    } else {
      value = parseFloat(document.getElementById(type + '-value').value);
      fromUnit = document.getElementById(type + '-from').value;
      toUnit = document.getElementById(type + '-to').value;
      
      if (isNaN(value)) {
        document.getElementById(type + '-result').value = '';
        return;
      }
      
      // Convert to base unit, then to target
      const baseValue = value * conversions[type][fromUnit];
      result = baseValue / conversions[type][toUnit];
      
      document.getElementById(type + '-result').value = Math.round(result * 1000000) / 1000000;
    }

    // Show result below
    const unitNames = { 
      length: { mm: 'millimeters', cm: 'centimeters', m: 'meters', km: 'kilometers', 
                in: 'inches', ft: 'feet', yd: 'yards', mi: 'miles' },
      weight: { mg: 'milligrams', g: 'grams', kg: 'kilograms', oz: 'ounces', lb: 'pounds', ton: 'tons' },
      temperature: { C: '°C', F: '°F', K: 'Kelvin' },
      volume: { ml: 'milliliters', l: 'liters', tsp: 'teaspoons', tbsp: 'tablespoons', 
                cup: 'cups', pt: 'pints', qt: 'quarts', gal: 'gallons' }
    };
    
    const display = document.getElementById('result-display');
    display.classList.remove('hidden');
    document.getElementById('result-text').textContent = document.getElementById(type + '-result').value;
    document.getElementById('result-unit').textContent = unitNames[displayType][toUnit];
  }
</script>
</body>
</html>
