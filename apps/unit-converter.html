<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Shadow's Garden</title>
<meta name="description" content="Convert between units: length, weight, temperature, volume, area, time, speed, data">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #8b5cf6;
    --bg: #0f0f1a;
  }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    min-height: 100vh;
    padding: 2rem;
    color: #e2e8f0;
  }
  .converter {
    max-width: 600px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    margin-bottom: 2rem;
    color: #fff;
  }
  .category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 2rem;
    justify-content: center;
  }
  .tab {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.5rem 1rem;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .tab:hover {
    background: rgba(255,255,255,0.1);
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .input-group {
    display: flex;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .input-wrapper {
    flex: 1;
  }
  label {
    display: block;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  input, select {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    color: #fff;
    font-size: 1.1rem;
    font-family: inherit;
    box-sizing: border-box;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .swap-btn {
    background: var(--accent);
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    color: #fff;
    cursor: pointer;
    font-size: 1.25rem;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .swap-btn:hover {
    transform: rotate(180deg);
  }
  .result {
    background: rgba(139, 92, 246, 0.1);
    border: 1px solid var(--accent);
    border-radius: 0.75rem;
    padding: 1.5rem;
    text-align: center;
  }
  .result-value {
    font-size: 2rem;
    font-weight: bold;
    color: #fff;
  }
  .formula {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    margin-top: 0.75rem;
  }
  .quick-values {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }
  .quick-values button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.25rem;
    padding: 0.25rem 0.5rem;
    color: rgba(255,255,255,0.7);
    font-size: 0.7rem;
    cursor: pointer;
  }
  .quick-values button:hover {
    background: rgba(255,255,255,0.2);
  }
</style>
</head>
<body data-page-type="app">
<div class="converter">
  <h1>📏 Unit Converter</h1>
  
  <div class="category-tabs" id="tabs"></div>
  
  <div class="input-group">
    <div class="input-wrapper">
      <label>From</label>
      <input type="number" id="inputValue" value="1" step="any">
      <select id="fromUnit"></select>
    </div>
    <button class="swap-btn" onclick="swap()" title="Swap">⇅</button>
    <div class="input-wrapper">
      <label>To</label>
      <select id="toUnit"></select>
    </div>
  </div>
  
  <div class="quick-values" id="quickValues"></div>
  
  <div class="result">
    <div class="result-value" id="result">0</div>
    <div class="formula" id="formula"></div>
  </div>
</div>

<script>
const categories = {
  length: {
    name: 'Length',
    units: {
      m: { name: 'Meter', factor: 1 },
      km: { name: 'Kilometer', factor: 1000 },
      cm: { name: 'Centimeter', factor: 0.01 },
      mm: { name: 'Millimeter', factor: 0.001 },
      mi: { name: 'Mile', factor: 1609.344 },
      yd: { name: 'Yard', factor: 0.9144 },
      ft: { name: 'Foot', factor: 0.3048 },
      in: { name: 'Inch', factor: 0.0254 },
      nm: { name: 'Nautical Mile', factor: 1852 },
    },
    quick: [0, 1, 10, 100, 1000]
  },
  weight: {
    name: 'Weight',
    units: {
      kg: { name: 'Kilogram', factor: 1 },
      g: { name: 'Gram', factor: 0.001 },
      mg: { name: 'Milligram', factor: 0.000001 },
      lb: { name: 'Pound', factor: 0.453592 },
      oz: { name: 'Ounce', factor: 0.0283495 },
      st: { name: 'Stone', factor: 6.35029 },
      ton: { name: 'Metric Ton', factor: 1000 },
    },
    quick: [0, 1, 5, 10, 50, 100]
  },
  temperature: {
    name: 'Temperature',
    units: {
      C: { name: 'Celsius' },
      F: { name: 'Fahrenheit' },
      K: { name: 'Kelvin' },
    },
    quick: [-40, 0, 20, 37, 100, 212]
  },
  volume: {
    name: 'Volume',
    units: {
      l: { name: 'Liter', factor: 1 },
      ml: { name: 'Milliliter', factor: 0.001 },
      m3: { name: 'Cubic Meter', factor: 1000 },
      gal: { name: 'Gallon (US)', factor: 3.78541 },
      qt: { name: 'Quart (US)', factor: 0.946353 },
      pt: { name: 'Pint (US)', factor: 0.473176 },
      cup: { name: 'Cup (US)', factor: 0.236588 },
      floz: { name: 'Fluid Ounce (US)', factor: 0.0295735 },
    },
    quick: [0, 1, 5, 10, 100]
  },
  area: {
    name: 'Area',
    units: {
      m2: { name: 'Square Meter', factor: 1 },
      km2: { name: 'Square Kilometer', factor: 1000000 },
      cm2: { name: 'Square Centimeter', factor: 0.0001 },
      ha: { name: 'Hectare', factor: 10000 },
      acre: { name: 'Acre', factor: 4046.86 },
      ft2: { name: 'Square Foot', factor: 0.092903 },
      in2: { name: 'Square Inch', factor: 0.00064516 },
      mi2: { name: 'Square Mile', factor: 2589988.11 },
    },
    quick: [0, 1, 10, 100, 1000]
  },
  time: {
    name: 'Time',
    units: {
      s: { name: 'Second', factor: 1 },
      ms: { name: 'Millisecond', factor: 0.001 },
      min: { name: 'Minute', factor: 60 },
      h: { name: 'Hour', factor: 3600 },
      d: { name: 'Day', factor: 86400 },
      wk: { name: 'Week', factor: 604800 },
      mo: { name: 'Month (30 days)', factor: 2592000 },
      yr: { name: 'Year (365 days)', factor: 31536000 },
    },
    quick: [0, 1, 60, 3600, 86400]
  },
  speed: {
    name: 'Speed',
    units: {
      'm/s': { name: 'Meters/Second', factor: 1 },
      'km/h': { name: 'Kilometers/Hour', factor: 0.277778 },
      'mph': { name: 'Miles/Hour', factor: 0.44704 },
      'knot': { name: 'Knot', factor: 0.514444 },
      'ft/s': { name: 'Feet/Second', factor: 0.3048 },
    },
    quick: [0, 1, 10, 60, 100, 120]
  },
  data: {
    name: 'Data',
    units: {
      B: { name: 'Byte', factor: 1 },
      KB: { name: 'Kilobyte', factor: 1024 },
      MB: { name: 'Megabyte', factor: 1048576 },
      GB: { name: 'Gigabyte', factor: 1073741824 },
      TB: { name: 'Terabyte', factor: 1099511627776 },
      bit: { name: 'Bit', factor: 0.125 },
      Kbit: { name: 'Kilobit', factor: 128 },
      Mbit: { name: 'Megabit', factor: 131072 },
      Gbit: { name: 'Gigabit', factor: 134217728 },
    },
    quick: [0, 1, 1024, 1048576, 1073741824]
  }
};

let currentCategory = 'length';
const tabsEl = document.getElementById('tabs');
const fromUnitEl = document.getElementById('fromUnit');
const toUnitEl = document.getElementById('toUnit');
const inputEl = document.getElementById('inputValue');
const resultEl = document.getElementById('result');
const formulaEl = document.getElementById('formula');
const quickEl = document.getElementById('quickValues');

// Build tabs
Object.keys(categories).forEach(cat => {
  const tab = document.createElement('button');
  tab.className = `tab ${cat === currentCategory ? 'active' : ''}`;
  tab.textContent = categories[cat].name;
  tab.onclick = () => setCategory(cat);
  tabsEl.appendChild(tab);
});

function setCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.className = `tab ${Object.keys(categories)[i] === cat ? 'active' : ''}`;
  });
  
  fromUnitEl.innerHTML = '';
  toUnitEl.innerHTML = '';
  
  const units = categories[cat].units;
  Object.keys(units).forEach(u => {
    fromUnitEl.add(new Option(`${units[u].name} (${u})`, u));
    toUnitEl.add(new Option(`${units[u].name} (${u})`, u));
  });
  
  // Set defaults
  const keys = Object.keys(units);
  fromUnitEl.value = keys[0];
  toUnitEl.value = keys[1] || keys[0];
  
  // Quick values
  quickEl.innerHTML = '';
  if (categories[cat].quick) {
    categories[cat].quick.forEach(v => {
      const btn = document.createElement('button');
      btn.textContent = v === 0 ? '0' : v;
      btn.onclick = () => { inputEl.value = v; convert(); };
      quickEl.appendChild(btn);
    });
  }
  
  convert();
}

function convertTemp(value, from, to) {
  // Convert to Celsius first
  let celsius;
  if (from === 'C') celsius = value;
  else if (from === 'F') celsius = (value - 32) * 5/9;
  else celsius = value - 273.15;
  
  // Convert from Celsius to target
  if (to === 'C') return celsius;
  else if (to === 'F') return celsius * 9/5 + 32;
  else return celsius + 273.15;
}

function convert() {
  const value = parseFloat(inputEl.value) || 0;
  const from = fromUnitEl.value;
  const to = toUnitEl.value;
  const cat = categories[currentCategory];
  
  let result;
  let formulaText;
  
  if (currentCategory === 'temperature') {
    result = convertTemp(value, from, to);
    formulaText = `${value}°${from} → ${result.toFixed(4)}°${to}`;
  } else {
    const fromFactor = cat.units[from].factor;
    const toFactor = cat.units[to].factor;
    const baseValue = value * fromFactor;
    result = baseValue / toFactor;
    
    // Nice formula display
    if (from === to) {
      formulaText = `${value} ${from} = ${result} ${to}`;
    } else {
      formulaText = `1 ${from} = ${(toFactor / fromFactor).toFixed(6)} ${to}`;
    }
  }
  
  // Format result
  if (Math.abs(result) < 0.0001 || Math.abs(result) > 1000000) {
    resultEl.textContent = result.toExponential(4);
  } else {
    resultEl.textContent = result.toLocaleString(undefined, { maximumFractionDigits: 6 });
  }
  
  formulaEl.textContent = formulaText;
}

function swap() {
  const temp = fromUnitEl.value;
  fromUnitEl.value = toUnitEl.value;
  toUnitEl.value = temp;
  convert();
}

inputEl.addEventListener('input', convert);
fromUnitEl.addEventListener('change', convert);
toUnitEl.addEventListener('change', convert);

// Init
setCategory('length');
</script>
</body>
</html>
