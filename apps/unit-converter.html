<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Shadow's Garden</title>
<meta name="description" content="Convert between units of length, weight, temperature, volume, and area. Simple, no clutter, no ads.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; box-sizing: border-box; }
  .converter { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  h1 { margin: 0 0 1.5rem 0; font-size: 1.5rem; text-align: center; color: var(--text); }
  .category-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; justify-content: center; }
  .category-tab { padding: 0.5rem 1rem; border: 1px solid var(--border); background: transparent; color: var(--text-dim); border-radius: 6px; cursor: pointer; font-size: 0.875rem; transition: all 0.2s; }
  .category-tab:hover { border-color: var(--accent); color: var(--accent); }
  .category-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .converter-grid { display: grid; gap: 1rem; }
  .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
  .input-group label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
  .input-row { display: flex; gap: 0.5rem; }
  input, select { padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 1rem; }
  input { flex: 1; }
  select { min-width: 120px; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .swap-btn { display: flex; align-items: center; justify-content: center; padding: 0.5rem; background: transparent; border: 1px solid var(--border); border-radius: 50%; cursor: pointer; color: var(--text-dim); font-size: 1.25rem; margin: 0.5rem auto; transition: all 0.2s; width: 40px; height: 40px; }
  .swap-btn:hover { border-color: var(--accent); color: var(--accent); }
  .result-display { margin-top: 1.5rem; padding: 1rem; background: var(--bg); border-radius: 8px; text-align: center; font-size: 1.25rem; font-weight: 500; color: var(--text); min-height: 3rem; display: flex; align-items: center; justify-content: center; }
  .result-display.loading { opacity: 0.5; }
  @media (max-width: 480px) { .converter { padding: 1.5rem; } .input-row { flex-direction: column; } select { width: 100%; } }
</style>
</head>
<body data-page-type="app">
  <div class="converter">
    <h1>Unit Converter</h1>
    <div class="category-tabs" id="tabs"></div>
    <div class="converter-grid">
      <div class="input-group">
        <label>From</label>
        <div class="input-row">
          <input type="number" id="fromValue" placeholder="Enter value" step="any">
          <select id="fromUnit"></select>
        </div>
      </div>
      <button class="swap-btn" id="swapBtn" title="Swap units">⇅</button>
      <div class="input-group">
        <label>To</label>
        <div class="input-row">
          <input type="number" id="toValue" placeholder="Result" step="any" readonly>
          <select id="toUnit"></select>
        </div>
      </div>
    </div>
    <div class="result-display" id="result"></div>
  </div>
  <script>
    const categories = {
      length: {
        name: 'Length',
        units: {
          m: { name: 'Meter', toBase: 1 },
          km: { name: 'Kilometer', toBase: 1000 },
          cm: { name: 'Centimeter', toBase: 0.01 },
          mm: { name: 'Millimeter', toBase: 0.001 },
          mi: { name: 'Mile', toBase: 1609.344 },
          yd: { name: 'Yard', toBase: 0.9144 },
          ft: { name: 'Foot', toBase: 0.3048 },
          in: { name: 'Inch', toBase: 0.0254 }
        }
      },
      weight: {
        name: 'Weight',
        units: {
          kg: { name: 'Kilogram', toBase: 1 },
          g: { name: 'Gram', toBase: 0.001 },
          mg: { name: 'Milligram', toBase: 0.000001 },
          lb: { name: 'Pound', toBase: 0.453592 },
          oz: { name: 'Ounce', toBase: 0.0283495 },
          st: { name: 'Stone', toBase: 6.35029 }
        }
      },
      temperature: {
        name: 'Temperature',
        units: {
          C: { name: 'Celsius', toBase: 1, special: true },
          F: { name: 'Fahrenheit', toBase: 1, special: true },
          K: { name: 'Kelvin', toBase: 1, special: true }
        }
      },
      volume: {
        name: 'Volume',
        units: {
          l: { name: 'Liter', toBase: 1 },
          ml: { name: 'Milliliter', toBase: 0.001 },
          gal: { name: 'Gallon (US)', toBase: 3.78541 },
          qt: { name: 'Quart (US)', toBase: 0.946353 },
          pt: { name: 'Pint (US)', toBase: 0.473176 },
          cup: { name: 'Cup (US)', toBase: 0.236588 },
          fl oz: { name: 'Fluid oz (US)', toBase: 0.0295735 }
        }
      },
      area: {
        name: 'Area',
        units: {
          sqm: { name: 'Square meter', toBase: 1 },
          sqkm: { name: 'Square kilometer', toBase: 1000000 },
          sqcm: { name: 'Square centimeter', toBase: 0.0001 },
          ha: { name: 'Hectare', toBase: 10000 },
          acre: { name: 'Acre', toBase: 4046.86 },
          sqft: { name: 'Square foot', toBase: 0.092903 },
          sqyd: { name: 'Square yard', toBase: 0.836127 }
        }
      },
      time: {
        name: 'Time',
        units: {
          s: { name: 'Second', toBase: 1 },
          min: { name: 'Minute', toBase: 60 },
          h: { name: 'Hour', toBase: 3600 },
          d: { name: 'Day', toBase: 86400 },
          wk: { name: 'Week', toBase: 604800 },
          mo: { name: 'Month (30d)', toBase: 2592000 },
          yr: { name: 'Year (365d)', toBase: 31536000 }
        }
      }
    };

    let currentCategory = 'length';
    const tabsEl = document.getElementById('tabs');
    const fromValue = document.getElementById('fromValue');
    const toValue = document.getElementById('toValue');
    const fromUnit = document.getElementById('fromUnit');
    const toUnit = document.getElementById('toUnit');
    const swapBtn = document.getElementById('swapBtn');
    const result = document.getElementById('result');

    function renderTabs() {
      tabsEl.innerHTML = '';
      Object.keys(categories).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `category-tab ${cat === currentCategory ? 'active' : ''}`;
        btn.textContent = categories[cat].name;
        btn.onclick = () => { currentCategory = cat; renderTabs(); renderUnits(); convert(); };
        tabsEl.appendChild(btn);
      });
    }

    function renderUnits() {
      const units = categories[currentCategory].units;
      const fromOpts = Object.entries(units).map(([k, v]) => `<option value="${k}">${v.name}</option>`).join('');
      const toOpts = fromOpts;
      fromUnit.innerHTML = fromOpts;
      toUnit.innerHTML = toOpts;
      // Set defaults
      const keys = Object.keys(units);
      fromUnit.value = keys[0];
      toUnit.value = keys[1] || keys[0];
    }

    function convertTemp(value, from, to) {
      let celsius;
      if (from === 'C') celsius = value;
      else if (from === 'F') celsius = (value - 32) * 5/9;
      else celsius = value - 273.15;
      
      if (to === 'C') return celsius;
      if (to === 'F') return celsius * 9/5 + 32;
      return celsius + 273.15;
    }

    function convert() {
      const val = parseFloat(fromValue.value);
      if (isNaN(val)) { toValue.value = ''; result.textContent = ''; return; }
      
      const from = fromUnit.value;
      const to = toUnit.value;
      const cat = categories[currentCategory];
      
      let resultVal;
      if (currentCategory === 'temperature') {
        resultVal = convertTemp(val, from, to);
      } else {
        const baseValue = val * cat.units[from].toBase;
        resultVal = baseValue / cat.units[to].toBase;
      }
      
      // Format nicely
      if (Math.abs(resultVal) < 0.0001 || Math.abs(resultVal) > 1000000) {
        toValue.value = resultVal.toExponential(4);
      } else {
        toValue.value = Math.round(resultVal * 1000000) / 1000000;
      }
      
      result.textContent = `${val} ${cat.units[from].name} = ${toValue.value} ${cat.units[to].name}`;
    }

    fromValue.addEventListener('input', convert);
    fromUnit.addEventListener('change', convert);
    toUnit.addEventListener('change', convert);
    
    swapBtn.addEventListener('click', () => {
      const tempVal = fromValue.value;
      const tempUnit = fromUnit.value;
      fromValue.value = toValue.value;
      fromUnit.value = toUnit.value;
      toUnit.value = tempUnit;
      convert();
    });

    renderTabs();
    renderUnits();
  </script>
</body>
</html>
