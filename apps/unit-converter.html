<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Shadow's Garden</title>
<meta name="description" content="Convert between length, weight, temperature, volume, and area units instantly.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #22c55e;
  }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 {
    text-align: center;
    margin-bottom: 2rem;
  }
  .converter {
    background: var(--card-bg, #1a1a1a);
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .category-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .tab {
    padding: 0.5rem 1rem;
    border: none;
    background: var(--bg, #252525);
    color: var(--text, #e0e0e0);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }
  .conversion-row {
    display: grid;
    grid-template-columns: 1fr 40px 1fr;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1rem;
  }
  .unit-select {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #444;
    border-radius: 8px;
    background: var(--bg, #252525);
    color: var(--text, #e0e0e0);
    font-size: 1rem;
    cursor: pointer;
  }
  .value-input {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #444;
    border-radius: 8px;
    background: var(--bg, #252525);
    color: var(--text, #e0e0e0);
    font-size: 1.1rem;
    font-family: 'SF Mono', Monaco, monospace;
    box-sizing: border-box;
  }
  .value-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .swap-btn {
    width: 40px;
    height: 40px;
    border: none;
    background: var(--bg, #252525);
    color: var(--text, #e0e0e0);
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, background 0.2s;
  }
  .swap-btn:hover {
    background: var(--accent);
    color: #000;
    transform: rotate(180deg);
  }
  .result-display {
    text-align: center;
    padding: 1rem;
    background: var(--bg, #252525);
    border-radius: 8px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 1.3rem;
    color: var(--accent);
    min-height: 1.5rem;
  }
  .swap-values {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .swap-values label {
    font-size: 0.85rem;
    color: #888;
  }
  .swap-values input {
    width: auto;
    cursor: pointer;
  }
  @media (max-width: 500px) {
    .conversion-row {
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }
    .swap-btn {
      justify-self: center;
      transform: rotate(90deg);
    }
    .swap-btn:hover {
      transform: rotate(270deg);
    }
  }
</style>
</head>
<body data-page-type="app">
  <h1>Unit Converter</h1>
  <div class="converter">
    <div class="category-tabs" id="tabs"></div>
    <div class="conversion-row">
      <div>
        <select class="unit-select" id="fromUnit"></select>
        <input type="number" class="value-input" id="fromValue" placeholder="Enter value" step="any">
      </div>
      <button class="swap-btn" id="swapBtn" title="Swap units">⇄</button>
      <div>
        <select class="unit-select" id="toUnit"></select>
        <div class="result-display" id="result"></div>
      </div>
    </div>
    <div class="swap-values">
      <input type="checkbox" id="bidirectional">
      <label for="bidirectional">Convert both directions</label>
    </div>
  </div>

  <script>
    const categories = {
      length: {
        name: 'Length',
        units: {
          m: { name: 'Meter', toBase: 1 },
          km: { name: 'Kilometer', toBase: 1000 },
          cm: { name: 'Centimeter', toBase: 0.01 },
          mm: { name: 'Millimeter', toBase: 0.001 },
          mi: { name: 'Mile', toBase: 1609.344 },
          yd: { name: 'Yard', toBase: 0.9144 },
          ft: { name: 'Foot', toBase: 0.3048 },
          in: { name: 'Inch', toBase: 0.0254 },
          nm: { name: 'Nautical Mile', toBase: 1852 }
        }
      },
      weight: {
        name: 'Weight',
        units: {
          kg: { name: 'Kilogram', toBase: 1 },
          g: { name: 'Gram', toBase: 0.001 },
          mg: { name: 'Milligram', toBase: 0.000001 },
          t: { name: 'Metric Ton', toBase: 1000 },
          lb: { name: 'Pound', toBase: 0.453592 },
          oz: { name: 'Ounce', toBase: 0.0283495 },
          st: { name: 'Stone', toBase: 6.35029 }
        }
      },
      temperature: {
        name: 'Temperature',
        units: {
          C: { name: 'Celsius', toBase: 1, fromBase: 1, offset: 0 },
          F: { name: 'Fahrenheit', toBase: 0.555556, fromBase: 1.8, offset: -32 },
          K: { name: 'Kelvin', toBase: 1, fromBase: 1, offset: -273.15 }
        }
      },
      volume: {
        name: 'Volume',
        units: {
          l: { name: 'Liter', toBase: 1 },
          ml: { name: 'Milliliter', toBase: 0.001 },
          m3: { name: 'Cubic Meter', toBase: 1000 },
          cm3: { name: 'Cubic Centimeter', toBase: 0.001 },
          gal: { name: 'Gallon (US)', toBase: 3.78541 },
          qt: { name: 'Quart (US)', toBase: 0.946353 },
          pt: { name: 'Pint (US)', toBase: 0.473176 },
          cup: { name: 'Cup (US)', toBase: 0.236588 },
          fl oz: { name: 'Fluid Ounce (US)', toBase: 0.0295735 }
        }
      },
      area: {
        name: 'Area',
        units: {
          m2: { name: 'Square Meter', toBase: 1 },
          km2: { name: 'Square Kilometer', toBase: 1000000 },
          cm2: { name: 'Square Centimeter', toBase: 0.0001 },
          ha: { name: 'Hectare', toBase: 10000 },
          acre: { name: 'Acre', toBase: 4046.86 },
          ft2: { name: 'Square Foot', toBase: 0.092903 },
          in2: { name: 'Square Inch', toBase: 0.00064516 },
          mi2: { name: 'Square Mile', toBase: 2589988 }
        }
      },
      time: {
        name: 'Time',
        units: {
          s: { name: 'Second', toBase: 1 },
          ms: { name: 'Millisecond', toBase: 0.001 },
          min: { name: 'Minute', toBase: 60 },
          h: { name: 'Hour', toBase: 3600 },
          d: { name: 'Day', toBase: 86400 },
          wk: { name: 'Week', toBase: 604800 },
          mo: { name: 'Month (30 days)', toBase: 2592000 },
          yr: { name: 'Year (365 days)', toBase: 31536000 }
        }
      },
      speed: {
        name: 'Speed',
        units: {
          'm/s': { name: 'Meters per Second', toBase: 1 },
          'km/h': { name: 'Kilometers per Hour', toBase: 0.277778 },
          'mph': { name: 'Miles per Hour', toBase: 0.44704 },
          'ft/s': { name: 'Feet per Second', toBase: 0.3048 },
          knot: { name: 'Knot', toBase: 0.514444 }
        }
      },
      data: {
        name: 'Data',
        units: {
          B: { name: 'Byte', toBase: 1 },
          KB: { name: 'Kilobyte', toBase: 1024 },
          MB: { name: 'Megabyte', toBase: 1048576 },
          GB: { name: 'Gigabyte', toBase: 1073741824 },
          TB: { name: 'Terabyte', toBase: 1099511627776 },
          bit: { name: 'Bit', toBase: 0.125 },
          Kb: { name: 'Kilobit', toBase: 128 },
          Mb: { name: 'Megabit', toBase: 131072 },
          Gb: { name: 'Gigabit', toBase: 134217728 }
        }
      }
    };

    let currentCategory = 'length';
    let bidirectional = false;

    const tabsEl = document.getElementById('tabs');
    const fromUnitEl = document.getElementById('fromUnit');
    const toUnitEl = document.getElementById('toUnit');
    const fromValueEl = document.getElementById('fromValue');
    const resultEl = document.getElementById('result');
    const swapBtn = document.getElementById('swapBtn');
    const bidirectionalEl = document.getElementById('bidirectional');

    function initTabs() {
      tabsEl.innerHTML = '';
      Object.keys(categories).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `tab ${cat === currentCategory ? 'active' : ''}`;
        btn.textContent = categories[cat].name;
        btn.onclick = () => setCategory(cat);
        tabsEl.appendChild(btn);
      });
    }

    function initUnits() {
      const units = categories[currentCategory].units;
      fromUnitEl.innerHTML = '';
      toUnitEl.innerHTML = '';
      
      Object.keys(units).forEach(key => {
        const u = units[key];
        fromUnitEl.add(new Option(u.name, key));
        toUnitEl.add(new Option(u.name, key));
      });

      // Set defaults
      const keys = Object.keys(units);
      if (currentCategory === 'length') {
        fromUnitEl.value = 'm';
        toUnitEl.value = 'ft';
      } else if (currentCategory === 'temperature') {
        fromUnitEl.value = 'C';
        toUnitEl.value = 'F';
      } else {
        fromUnitEl.value = keys[0];
        toUnitEl.value = keys[1] || keys[0];
      }
    }

    function setCategory(cat) {
      currentCategory = cat;
      initTabs();
      initUnits();
      convert();
    }

    function convert() {
      const val = parseFloat(fromValueEl.value);
      const from = fromUnitEl.value;
      const to = toUnitEl.value;
      const units = categories[currentCategory].units;

      if (isNaN(val)) {
        resultEl.textContent = '';
        return;
      }

      let result;
      if (currentCategory === 'temperature') {
        // Special handling for temperature
        const fromU = units[from];
        const toU = units[to];
        
        // Convert to Celsius first
        let celsius;
        if (from === 'C') celsius = val;
        else if (from === 'F') celsius = (val - 32) * 5/9;
        else if (from === 'K') celsius = val - 273.15;
        
        // Convert from Celsius to target
        if (to === 'C') result = celsius;
        else if (to === 'F') result = celsius * 9/5 + 32;
        else if (to === 'K') result = celsius + 273.15;
      } else {
        // Standard conversion via base unit
        const baseValue = val * units[from].toBase;
        result = baseValue / units[to].toBase;
      }

      // Format result
      if (Math.abs(result) < 0.0001 || Math.abs(result) > 999999999) {
        resultEl.textContent = result.toExponential(4);
      } else if (Number.isInteger(result)) {
        resultEl.textContent = result.toLocaleString();
      } else {
        // Determine precision based on magnitude
        const precision = Math.abs(result) < 1 ? 6 : Math.abs(result) < 100 ? 4 : 2;
        resultEl.textContent = parseFloat(result.toPrecision(10)).toLocaleString(undefined, {
          maximumFractionDigits: precision
        });
      }

      // Bidirectional conversion
      if (bidirectional) {
        let reverseResult;
        if (currentCategory === 'temperature') {
          const fromU = units[to];
          const toU = units[from];
          
          let celsius;
          if (to === 'C') celsius = result;
          else if (to === 'F') celsius = (result - 32) * 5/9;
          else if (to === 'K') celsius = result - 273.15;
          
          if (from === 'C') reverseResult = celsius;
          else if (from === 'F') reverseResult = celsius * 9/5 + 32;
          else if (from === 'K') reverseResult = celsius + 273.15;
        } else {
          const baseValue = result * units[to].toBase;
          reverseResult = baseValue / units[from].toBase;
        }
        
        if (Math.abs(reverseResult - val) > 0.0001) {
          fromValueEl.value = parseFloat(reverseResult.toPrecision(10));
        }
      }
    }

    function swapUnits() {
      const temp = fromUnitEl.value;
      fromUnitEl.value = toUnitEl.value;
      toUnitEl.value = temp;
      convert();
    }

    // Event listeners
    fromValueEl.addEventListener('input', convert);
    fromUnitEl.addEventListener('change', convert);
    toUnitEl.addEventListener('change', convert);
    swapBtn.addEventListener('click', swapUnits);
    bidirectionalEl.addEventListener('change', () => {
      bidirectional = bidirectionalEl.checked;
    });

    // Initialize
    initTabs();
    initUnits();
    fromValueEl.focus();
  </script>
</body>
</html>
