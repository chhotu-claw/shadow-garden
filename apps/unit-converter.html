<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Shadow's Garden</title>
<meta name="description" content="Convert between units of length, weight, temperature, and data storage. All client-side, no tracking.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; }
  .converter { background: #1a1a2e; border-radius: 12px; padding: 1.5rem; margin: 1rem 0; }
  .category-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .category-tab { 
    background: #16213e; border: none; padding: 0.6rem 1.2rem; 
    border-radius: 8px; color: #aaa; cursor: pointer; transition: all 0.2s;
  }
  .category-tab:hover { background: #1f3460; color: #fff; }
  .category-tab.active { background: #0f3460; color: #e94560; }
  .input-group { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
  input, select { 
    background: #0f0f23; border: 1px solid #333; 
    padding: 0.8rem; border-radius: 8px; color: #fff; font-size: 1rem;
  }
  input { flex: 1; min-width: 150px; }
  select { min-width: 120px; }
  .result { 
    background: #0f3460; padding: 1rem; border-radius: 8px; 
    margin-top: 1rem; font-size: 1.2rem; color: #e94560;
  }
  .swap-btn {
    background: #e94560; border: none; padding: 0.8rem;
    border-radius: 8px; cursor: pointer; font-size: 1.2rem;
  }
  h1 { color: #e94560; margin-bottom: 0.5rem; }
  .desc { color: #888; margin-bottom: 2rem; }
  .unit-options { display: none; }
  .unit-options.active { display: flex; }
  @media (max-width: 600px) { input { width: 100%; } }
</style>
</head>
<body data-page-type="app">
  <h1>Unit Converter</h1>
  <p class="desc">Convert length, weight, temperature, and data storage units. All client-side.</p>
  
  <div class="category-tabs" id="tabs">
    <button class="category-tab active" data-cat="length">Length</button>
    <button class="category-tab" data-cat="weight">Weight</button>
    <button class="category-tab" data-cat="temperature">Temperature</button>
    <button class="category-tab" data-cat="data">Data</button>
  </div>

  <div class="converter">
    <div class="unit-options active" id="length">
      <div class="input-group">
        <input type="number" id="inputValue" value="1" placeholder="Enter value">
        <select id="fromUnit">
          <option value="meter" selected>Meter</option>
          <option value="kilometer">Kilometer</option>
          <option value="centimeter">Centimeter</option>
          <option value="millimeter">Millimeter</option>
          <option value="mile">Mile</option>
          <option value="yard">Yard</option>
          <option value="foot">Foot</option>
          <option value="inch">Inch</option>
          <option value="nauticalMile">Nautical Mile</option>
        </select>
        <button class="swap-btn" id="swapBtn">⇄</button>
        <select id="toUnit">
          <option value="kilometer">Kilometer</option>
          <option value="meter">Meter</option>
          <option value="centimeter">Centimeter</option>
          <option value="millimeter">Millimeter</option>
          <option value="mile">Mile</option>
          <option value="yard">Yard</option>
          <option value="foot">Foot</option>
          <option value="inch">Inch</option>
          <option value="nauticalMile">Nautical Mile</option>
        </select>
      </div>
      <div class="result" id="result">1 m = 0.001 km</div>
    </div>

    <div class="unit-options" id="weight">
      <div class="input-group">
        <input type="number" id="inputValueW" value="1" placeholder="Enter value">
        <select id="fromUnitW">
          <option value="kilogram" selected>Kilogram</option>
          <option value="gram">Gram</option>
          <option value="milligram">Milligram</option>
          <option value="pound">Pound</option>
          <option value="ounce">Ounce</option>
          <option value="ton">Metric Ton</option>
          <option value="stone">Stone</option>
        </select>
        <button class="swap-btn" id="swapBtnW">⇄</button>
        <select id="toUnitW">
          <option value="pound">Pound</option>
          <option value="kilogram">Kilogram</option>
          <option value="gram">Gram</option>
          <option value="milligram">Milligram</option>
          <option value="ounce">Ounce</option>
          <option value="ton">Metric Ton</option>
          <option value="stone">Stone</option>
        </select>
      </div>
      <div class="result" id="resultW">1 kg = 2.205 lb</div>
    </div>

    <div class="unit-options" id="temperature">
      <div class="input-group">
        <input type="number" id="inputValueT" value="0" placeholder="Enter value">
        <select id="fromUnitT">
          <option value="celsius" selected>Celsius (°C)</option>
          <option value="fahrenheit">Fahrenheit (°F)</option>
          <option value="kelvin">Kelvin (K)</option>
        </select>
        <button class="swap-btn" id="swapBtnT">⇄</button>
        <select id="toUnitT">
          <option value="fahrenheit">Fahrenheit (°F)</option>
          <option value="celsius">Celsius (°C)</option>
          <option value="kelvin">Kelvin (K)</option>
        </select>
      </div>
      <div class="result" id="resultT">0°C = 32°F</div>
    </div>

    <div class="unit-options" id="data">
      <div class="input-group">
        <input type="number" id="inputValueD" value="1" placeholder="Enter value">
        <select id="fromUnitD">
          <option value="byte" selected>Byte</option>
          <option value="kilobyte">Kilobyte (KB)</option>
          <option value="megabyte">Megabyte (MB)</option>
          <option value="gigabyte">Gigabyte (GB)</option>
          <option value="terabyte">Terabyte (TB)</option>
          <option value="bit">Bit</option>
          <option value="kilobit">Kilobit (Kb)</option>
          <option value="megabit">Megabit (Mb)</option>
        </select>
        <button class="swap-btn" id="swapBtnD">⇄</button>
        <select id="toUnitD">
          <option value="kilobyte">Kilobyte (KB)</option>
          <option value="byte">Byte</option>
          <option value="megabyte">Megabyte (MB)</option>
          <option value="gigabyte">Gigabyte (GB)</option>
          <option value="terabyte">Terabyte (TB)</option>
          <option value="bit">Bit</option>
          <option value="kilobit">Kilobit (Kb)</option>
          <option value="megabit">Megabit (Mb)</option>
        </select>
      </div>
      <div class="result" id="resultD">1 B = 0.001 KB</div>
    </div>
  </div>

  <script>
    // Conversion factors to base unit (meter, kilogram, byte)
    const lengthToMeter = {
      meter: 1, kilometer: 1000, centimeter: 0.01, millimeter: 0.001,
      mile: 1609.344, yard: 0.9144, foot: 0.3048, inch: 0.0254, nauticalMile: 1852
    };
    const weightToKg = {
      kilogram: 1, gram: 0.001, milligram: 0.000001,
      pound: 0.453592, ounce: 0.0283495, ton: 1000, stone: 6.35029
    };
    const dataToByte = {
      byte: 1, kilobyte: 1024, megabyte: 1048576, gigabyte: 1073741824, terabyte: 1099511627776,
      bit: 0.125, kilobit: 128, megabit: 131072
    };

    function convertLength(val, from, to) {
      const meters = val * lengthToMeter[from];
      return meters / lengthToMeter[to];
    }
    function convertWeight(val, from, to) {
      const kg = val * weightToKg[from];
      return kg / weightToKg[to];
    }
    function convertData(val, from, to) {
      const bytes = val * dataToByte[from];
      return bytes / dataToByte[to];
    }
    function convertTemp(val, from, to) {
      let celsius;
      if (from === 'celsius') celsius = val;
      else if (from === 'fahrenheit') celsius = (val - 32) * 5/9;
      else celsius = val - 273.15;
      
      if (to === 'celsius') return celsius;
      if (to === 'fahrenheit') return celsius * 9/5 + 32;
      return celsius + 273.15;
    }

    function formatNum(n) {
      if (Math.abs(n) < 0.0001 || Math.abs(n) > 999999999) return n.toExponential(4);
      if (Number.isInteger(n)) return n.toString();
      return n.toPrecision(6).replace(/\.?0+$/, '');
    }

    function getUnitLabel(unit) {
      const labels = {
        meter: 'm', kilometer: 'km', centimeter: 'cm', millimeter: 'mm',
        mile: 'mi', yard: 'yd', foot: 'ft', inch: 'in', nauticalMile: 'nmi',
        kilogram: 'kg', gram: 'g', milligram: 'mg', pound: 'lb', ounce: 'oz', ton: 't', stone: 'st',
        celsius: '°C', fahrenheit: '°F', kelvin: 'K',
        byte: 'B', kilobyte: 'KB', megabyte: 'MB', gigabyte: 'GB', terabyte: 'TB',
        bit: 'b', kilobit: 'Kb', megabit: 'Mb'
      };
      return labels[unit] || unit;
    }

    // Tab switching
    document.querySelectorAll('.category-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.unit-options').forEach(u => u.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.cat).classList.add('active');
      });
    });

    // Length
    const inpL = document.getElementById('inputValue'), fromL = document.getElementById('fromUnit'), toL = document.getElementById('toUnit');
    function updateL() {
      const r = convertLength(parseFloat(inpL.value) || 0, fromL.value, toL.value);
      document.getElementById('result').textContent = `${inpL.value} ${getUnitLabel(fromL.value)} = ${formatNum(r)} ${getUnitLabel(toL.value)}`;
    }
    [inpL, fromL, toL].forEach(el => el.addEventListener('input', updateL));
    document.getElementById('swapBtn').addEventListener('click', () => { [fromL.value, toL.value] = [toL.value, fromL.value]; updateL(); });

    // Weight
    const inpW = document.getElementById('inputValueW'), fromW = document.getElementById('fromUnitW'), toW = document.getElementById('toUnitW');
    function updateW() {
      const r = convertWeight(parseFloat(inpW.value) || 0, fromW.value, toW.value);
      document.getElementById('resultW').textContent = `${inpW.value} ${getUnitLabel(fromW.value)} = ${formatNum(r)} ${getUnitLabel(toW.value)}`;
    }
    [inpW, fromW, toW].forEach(el => el.addEventListener('input', updateW));
    document.getElementById('swapBtnW').addEventListener('click', () => { [fromW.value, toW.value] = [toW.value, fromW.value]; updateW(); });

    // Temperature
    const inpT = document.getElementById('inputValueT'), fromT = document.getElementById('fromUnitT'), toT = document.getElementById('toUnitT');
    function updateT() {
      const r = convertTemp(parseFloat(inpT.value) || 0, fromT.value, toT.value);
      document.getElementById('resultT').textContent = `${inpT.value}${getUnitLabel(fromT.value)} = ${formatNum(r)}${getUnitLabel(toT.value)}`;
    }
    [inpT, fromT, toT].forEach(el => el.addEventListener('input', updateT));
    document.getElementById('swapBtnT').addEventListener('click', () => { [fromT.value, toT.value] = [toT.value, fromT.value]; updateT(); });

    // Data
    const inpD = document.getElementById('inputValueD'), fromD = document.getElementById('fromUnitD'), toD = document.getElementById('toUnitD');
    function updateD() {
      const r = convertData(parseFloat(inpD.value) || 0, fromD.value, toD.value);
      document.getElementById('resultD').textContent = `${inpD.value} ${getUnitLabel(fromD.value)} = ${formatNum(r)} ${getUnitLabel(toD.value)}`;
    }
    [inpD, fromD, toD].forEach(el => el.addEventListener('input', updateD));
    document.getElementById('swapBtnD').addEventListener('click', () => { [fromD.value, toD.value] = [toD.value, fromD.value]; updateD(); });

    // Initial updates
    updateL(); updateW(); updateT(); updateD();
  </script>
</body>
</html>
