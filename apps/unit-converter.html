<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Shadow's Garden</title>
<meta name="description" content="Convert between length, weight, temperature, volume, area, time, speed, and data units.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --text: #cdd6f4;
    --muted: #6c7086;
    --accent: #89b4fa;
    --success: #a6e3a1;
  }
  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }
  .subtitle {
    color: var(--muted);
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }
  .category-select {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  .category-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .category-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .category-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .converter {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .input-group {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
    align-items: center;
  }
  .input-group label {
    color: var(--muted);
    font-size: 0.85rem;
    min-width: 60px;
  }
  input, select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 1rem;
    flex: 1;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .result {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    margin-top: 1rem;
    text-align: center;
  }
  .result-value {
    font-size: 1.5rem;
    color: var(--success);
    font-weight: bold;
  }
  .result-unit {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.25rem;
  }
  .formula {
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 0.75rem;
    font-family: monospace;
  }
  .swap-btn {
    background: var(--border);
    border: none;
    color: var(--text);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .swap-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }
  @media (max-width: 500px) {
    .input-group {
      flex-direction: column;
      align-items: stretch;
    }
    .swap-btn {
      align-self: center;
    }
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Unit Converter</h1>
  <p class="subtitle">Convert between units across 8 categories</p>
  
  <div class="category-select" id="categorySelect"></div>
  
  <div class="converter">
    <div class="input-group">
      <label>From</label>
      <input type="number" id="inputValue" placeholder="Enter value" step="any">
      <select id="fromUnit"></select>
    </div>
    
    <div class="input-group" style="justify-content: center;">
      <button class="swap-btn" id="swapBtn" title="Swap units">⇅</button>
    </div>
    
    <div class="input-group">
      <label>To</label>
      <input type="text" id="outputValue" readonly placeholder="Result">
      <select id="toUnit"></select>
    </div>
    
    <div class="result">
      <div class="result-value" id="resultValue">—</div>
      <div class="result-unit" id="resultUnit"></div>
      <div class="formula" id="formula"></div>
    </div>
  </div>
</div>

<script>
const categories = {
  length: {
    name: 'Length',
    units: {
      m: { name: 'Meter', toBase: 1 },
      km: { name: 'Kilometer', toBase: 1000 },
      cm: { name: 'Centimeter', toBase: 0.01 },
      mm: { name: 'Millimeter', toBase: 0.001 },
      mi: { name: 'Mile', toBase: 1609.344 },
      yd: { name: 'Yard', toBase: 0.9144 },
      ft: { name: 'Foot', toBase: 0.3048 },
      in: { name: 'Inch', toBase: 0.0254 },
      nm: { name: 'Nautical Mile', toBase: 1852 }
    }
  },
  weight: {
    name: 'Weight',
    units: {
      kg: { name: 'Kilogram', toBase: 1 },
      g: { name: 'Gram', toBase: 0.001 },
      mg: { name: 'Milligram', toBase: 0.000001 },
      t: { name: 'Metric Ton', toBase: 1000 },
      lb: { name: 'Pound', toBase: 0.453592 },
      oz: { name: 'Ounce', toBase: 0.0283495 },
      st: { name: 'Stone', toBase: 6.35029 }
    }
  },
  temperature: {
    name: 'Temperature',
    units: {
      C: { name: 'Celsius' },
      F: { name: 'Fahrenheit' },
      K: { name: 'Kelvin' }
    }
  },
  volume: {
    name: 'Volume',
    units: {
      l: { name: 'Liter', toBase: 1 },
      ml: { name: 'Milliliter', toBase: 0.001 },
      m3: { name: 'Cubic Meter', toBase: 1000 },
      cm3: { name: 'Cubic Centimeter', toBase: 0.001 },
      gal: { name: 'Gallon (US)', toBase: 3.78541 },
      qt: { name: 'Quart (US)', toBase: 0.946353 },
      pt: { name: 'Pint (US)', toBase: 0.473176 },
      cup: { name: 'Cup (US)', toBase: 0.236588 },
      floz: { name: 'Fluid Ounce (US)', toBase: 0.0295735 }
    }
  },
  area: {
    name: 'Area',
    units: {
      m2: { name: 'Square Meter', toBase: 1 },
      km2: { name: 'Square Kilometer', toBase: 1000000 },
      cm2: { name: 'Square Centimeter', toBase: 0.0001 },
      ha: { name: 'Hectare', toBase: 10000 },
      acre: { name: 'Acre', toBase: 4046.86 },
      ft2: { name: 'Square Foot', toBase: 0.092903 },
      in2: { name: 'Square Inch', toBase: 0.00064516 },
      mi2: { name: 'Square Mile', toBase: 2589988.11 }
    }
  },
  time: {
    name: 'Time',
    units: {
      s: { name: 'Second', toBase: 1 },
      ms: { name: 'Millisecond', toBase: 0.001 },
      min: { name: 'Minute', toBase: 60 },
      h: { name: 'Hour', toBase: 3600 },
      d: { name: 'Day', toBase: 86400 },
      wk: { name: 'Week', toBase: 604800 },
      mo: { name: 'Month (30 days)', toBase: 2592000 },
      yr: { name: 'Year (365 days)', toBase: 31536000 }
    }
  },
  speed: {
    name: 'Speed',
    units: {
      'm/s': { name: 'Meters per Second', toBase: 1 },
      'km/h': { name: 'Kilometers per Hour', toBase: 0.277778 },
      'mph': { name: 'Miles per Hour', toBase: 0.44704 },
      'knot': { name: 'Knot', toBase: 0.514444 },
      'ft/s': { name: 'Feet per Second', toBase: 0.3048 }
    }
  },
  data: {
    name: 'Data',
    units: {
      B: { name: 'Byte', toBase: 1 },
      KB: { name: 'Kilobyte', toBase: 1024 },
      MB: { name: 'Megabyte', toBase: 1048576 },
      GB: { name: 'Gigabyte', toBase: 1073741824 },
      TB: { name: 'Terabyte', toBase: 1099511627776 },
      PB: { name: 'Petabyte', toBase: 1125899906842624 },
      b: { name: 'Bit', toBase: 0.125 },
      Kb: { name: 'Kilobit', toBase: 128 },
      Mb: { name: 'Megabit', toBase: 131072 },
      Gb: { name: 'Gigabit', toBase: 134217728 }
    }
  }
};

let currentCategory = 'length';

function init() {
  const categorySelect = document.getElementById('categorySelect');
  categorySelect.innerHTML = '';
  
  Object.keys(categories).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'category-btn' + (cat === currentCategory ? ' active' : '');
    btn.textContent = categories[cat].name;
    btn.onclick = () => setCategory(cat);
    categorySelect.appendChild(btn);
  });
  
  populateUnits();
}

function setCategory(cat) {
  currentCategory = cat;
  init();
  convert();
}

function populateUnits() {
  const fromUnit = document.getElementById('fromUnit');
  const toUnit = document.getElementById('toUnit');
  const units = categories[currentCategory].units;
  
  fromUnit.innerHTML = '';
  toUnit.innerHTML = '';
  
  Object.keys(units).forEach(u => {
    fromUnit.add(new Option(units[u].name, u));
    toUnit.add(new Option(units[u].name, u));
  });
  
  // Set different default
  const unitKeys = Object.keys(units);
  if (unitKeys.length > 1) {
    toUnit.value = unitKeys[1];
  }
}

function convert() {
  const inputVal = parseFloat(document.getElementById('inputValue').value);
  const fromU = document.getElementById('fromUnit').value;
  const toU = document.getElementById('toUnit').value;
  
  const resultValue = document.getElementById('resultValue');
  const resultUnit = document.getElementById('resultUnit');
  const formula = document.getElementById('formula');
  
  if (isNaN(inputVal)) {
    resultValue.textContent = '—';
    resultUnit.textContent = '';
    formula.textContent = '';
    return;
  }
  
  let result;
  let formulaText = '';
  
  if (currentCategory === 'temperature') {
    // Special handling for temperature
    let celsius;
    // Convert to Celsius first
    if (fromU === 'C') celsius = inputVal;
    else if (fromU === 'F') celsius = (inputVal - 32) * 5/9;
    else if (fromU === 'K') celsius = inputVal - 273.15;
    
    // Convert from Celsius to target
    if (toU === 'C') result = celsius;
    else if (toU === 'F') result = celsius * 9/5 + 32;
    else if (toU === 'K') result = celsius + 273.15;
    
    formulaText = `${fromU} → ${toU}`;
  } else {
    // Standard conversion through base unit
    const fromBase = units[fromU].toBase;
    const toBase = units[toU].toBase;
    const baseValue = inputVal * fromBase;
    result = baseValue / toBase;
    
    formulaText = `${inputVal} × ${fromBase} ÷ ${toBase}`;
  }
  
  // Format result
  if (Math.abs(result) < 0.0001 || Math.abs(result) > 9999999999) {
    resultValue.textContent = result.toExponential(6);
  } else {
    resultValue.textContent = parseFloat(result.toPrecision(10)).toString();
  }
  
  resultUnit.textContent = categories[currentCategory].units[toU].name;
  formula.textContent = formulaText;
}

function swap() {
  const fromSel = document.getElementById('fromUnit');
  const toSel = document.getElementById('toUnit');
  const temp = fromSel.value;
  fromSel.value = toSel.value;
  toSel.value = temp;
  convert();
}

document.getElementById('inputValue').addEventListener('input', convert);
document.getElementById('fromUnit').addEventListener('change', convert);
document.getElementById('toUnit').addEventListener('change', convert);
document.getElementById('swapBtn').addEventListener('click', swap);

init();
</script>
</body>
</html>
