<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Shadow's Garden</title>
<meta name="description" description="Convert between length, weight, temperature, data, and time units. All local, no server.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { width: 100%; max-width: 500px; }
  h1 { margin-bottom: 0.5rem; }
  .tabs { display: flex; gap: 0.25rem; margin-bottom: 1.5rem; flex-wrap: wrap; justify-content: center; }
  .tab { padding: 0.5rem 1rem; background: var(--card); border: 2px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--text-secondary); transition: all 0.2s; }
  .tab:hover { border-color: var(--text-secondary); }
  .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .converter { display: none; }
  .converter.active { display: block; }
  .converter-box { background: var(--card); border-radius: 12px; padding: 1.5rem; }
  .converter-box label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary); }
  .converter-box input, .converter-box select { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 1rem; box-sizing: border-box; margin-bottom: 1rem; }
  .converter-box input:focus, .converter-box select:focus { outline: none; border-color: var(--accent); }
  .result { margin-top: 1rem; padding: 1rem; background: var(--bg); border-radius: 8px; font-family: var(--mono); }
  .result-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
  .result-value { font-size: 1.2rem; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Unit Converter</h1>
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Length, weight, temperature, data, time</p>
    
    <div class="tabs">
      <button class="tab active" onclick="showTab('length')">Length</button>
      <button class="tab" onclick="showTab('weight')">Weight</button>
      <button class="tab" onclick="showTab('temp')">Temp</button>
      <button class="tab" onclick="showTab('data')">Data</button>
      <button class="tab" onclick="showTab('time')">Time</button>
    </div>
    
    <!-- Length -->
    <div class="converter active" id="length">
      <div class="converter-box">
        <label>Value</label>
        <input type="number" id="lengthInput" placeholder="Enter value" oninput="convertLength()">
        <select id="lengthFrom" onchange="convertLength()">
          <option value="m">Meters</option>
          <option value="km">Kilometers</option>
          <option value="cm">Centimeters</option>
          <option value="mm">Millimeters</option>
          <option value="mi">Miles</option>
          <option value="ft">Feet</option>
          <option value="in">Inches</option>
          <option value="yd">Yards</option>
        </select>
        <select id="lengthTo" onchange="convertLength()">
          <option value="ft">Feet</option>
          <option value="m">Meters</option>
          <option value="km">Kilometers</option>
          <option value="cm">Centimeters</option>
          <option value="mm">Millimeters</option>
          <option value="mi">Miles</option>
          <option value="in">Inches</option>
          <option value="yd">Yards</option>
        </select>
        <div class="result">
          <div class="result-label">Result:</div>
          <div class="result-value" id="lengthResult">—</div>
        </div>
      </div>
    </div>
    
    <!-- Weight -->
    <div class="converter" id="weight">
      <div class="converter-box">
        <label>Value</label>
        <input type="number" id="weightInput" placeholder="Enter value" oninput="convertWeight()">
        <select id="weightFrom" onchange="convertWeight()">
          <option value="kg">Kilograms</option>
          <option value="g">Grams</option>
          <option value="mg">Milligrams</option>
          <option value="lb">Pounds</option>
          <option value="oz">Ounces</option>
          <option value="t">Metric Tons</option>
        </select>
        <select id="weightTo" onchange="convertWeight()">
          <option value="lb">Pounds</option>
          <option value="kg">Kilograms</option>
          <option value="g">Grams</option>
          <option value="mg">Milligrams</option>
          <option value="oz">Ounces</option>
          <option value="t">Metric Tons</option>
        </select>
        <div class="result">
          <div class="result-label">Result:</div>
          <div class="result-value" id="weightResult">—</div>
        </div>
      </div>
    </div>
    
    <!-- Temperature -->
    <div class="converter" id="temp">
      <div class="converter-box">
        <label>Value</label>
        <input type="number" id="tempInput" placeholder="Enter value" oninput="convertTemp()">
        <select id="tempFrom" onchange="convertTemp()">
          <option value="c">Celsius</option>
          <option value="f">Fahrenheit</option>
          <option value="k">Kelvin</option>
        </select>
        <select id="tempTo" onchange="convertTemp()">
          <option value="f">Fahrenheit</option>
          <option value="c">Celsius</option>
          <option value="k">Kelvin</option>
        </select>
        <div class="result">
          <div class="result-label">Result:</div>
          <div class="result-value" id="tempResult">—</div>
        </div>
      </div>
    </div>
    
    <!-- Data -->
    <div class="converter" id="data">
      <div class="converter-box">
        <label>Value</label>
        <input type="number" id="dataInput" placeholder="Enter value" oninput="convertData()">
        <select id="dataFrom" onchange="convertData()">
          <option value="b">Bytes</option>
          <option value="kb">Kilobytes</option>
          <option value="mb">Megabytes</option>
          <option value="gb">Gigabytes</option>
          <option value="tb">Terabytes</option>
          <option value="pb">Petabytes</option>
        </select>
        <select id="dataTo" onchange="convertData()">
          <option value="mb">Megabytes</option>
          <option value="b">Bytes</option>
          <option value="kb">Kilobytes</option>
          <option value="gb">Gigabytes</option>
          <option value="tb">Terabytes</option>
          <option value="pb">Petabytes</option>
        </select>
        <div class="result">
          <div class="result-label">Result:</div>
          <div class="result-value" id="dataResult">—</div>
        </div>
      </div>
    </div>
    
    <!-- Time -->
    <div class="converter" id="time">
      <div class="converter-box">
        <label>Value</label>
        <input type="number" id="timeInput" placeholder="Enter value" oninput="convertTime()">
        <select id="timeFrom" onchange="convertTime()">
          <option value="s">Seconds</option>
          <option value="min">Minutes</option>
          <option value="h">Hours</option>
          <option value="d">Days</option>
          <option value="w">Weeks</option>
          <option value="y">Years</option>
        </select>
        <select id="timeTo" onchange="convertTime()">
          <option value="h">Hours</option>
          <option value="s">Seconds</option>
          <option value="min">Minutes</option>
          <option value="d">Days</option>
          <option value="w">Weeks</option>
          <option value="y">Years</option>
        </select>
        <div class="result">
          <div class="result-label">Result:</div>
          <div class="result-value" id="timeResult">—</div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.converter').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab).classList.add('active');
    }
    
    // Length: convert to meters first
    const lengthFactors = { m: 1, km: 1000, cm: 0.01, mm: 0.001, mi: 1609.344, ft: 0.3048, in: 0.0254, yd: 0.9144 };
    function convertLength() {
      const val = parseFloat(document.getElementById('lengthInput').value);
      if (isNaN(val)) { document.getElementById('lengthResult').textContent = '—'; return; }
      const from = lengthFactors[document.getElementById('lengthFrom').value];
      const to = lengthFactors[document.getElementById('lengthTo').value];
      const result = (val * from) / to;
      document.getElementById('lengthResult').textContent = formatNumber(result);
    }
    
    // Weight: convert to grams first
    const weightFactors = { kg: 1000, g: 1, mg: 0.001, lb: 453.592, oz: 28.3495, t: 1000000 };
    function convertWeight() {
      const val = parseFloat(document.getElementById('weightInput').value);
      if (isNaN(val)) { document.getElementById('weightResult').textContent = '—'; return; }
      const from = weightFactors[document.getElementById('weightFrom').value];
      const to = weightFactors[document.getElementById('weightTo').value];
      const result = (val * from) / to;
      document.getElementById('weightResult').textContent = formatNumber(result);
    }
    
    // Temperature
    function convertTemp() {
      const val = parseFloat(document.getElementById('tempInput').value);
      if (isNaN(val)) { document.getElementById('tempResult').textContent = '—'; return; }
      const from = document.getElementById('tempFrom').value;
      const to = document.getElementById('tempTo').value;
      
      // Convert to Celsius first
      let celsius;
      if (from === 'c') celsius = val;
      else if (from === 'f') celsius = (val - 32) * 5/9;
      else celsius = val - 273.15;
      
      // Convert from Celsius to target
      let result;
      if (to === 'c') result = celsius;
      else if (to === 'f') result = (celsius * 9/5) + 32;
      else result = celsius + 273.15;
      
      document.getElementById('tempResult').textContent = formatNumber(result);
    }
    
    // Data: convert to bytes first (base 1024)
    const dataFactors = { b: 1, kb: 1024, mb: 1048576, gb: 1073741824, tb: 1099511627776, pb: 1125899906842624 };
    function convertData() {
      const val = parseFloat(document.getElementById('dataInput').value);
      if (isNaN(val)) { document.getElementById('dataResult').textContent = '—'; return; }
      const from = dataFactors[document.getElementById('dataFrom').value];
      const to = dataFactors[document.getElementById('dataTo').value];
      const result = (val * from) / to;
      document.getElementById('dataResult').textContent = formatNumber(result);
    }
    
    // Time: convert to seconds first
    const timeFactors = { s: 1, min: 60, h: 3600, d: 86400, w: 604800, y: 31536000 };
    function convertTime() {
      const val = parseFloat(document.getElementById('timeInput').value);
      if (isNaN(val)) { document.getElementById('timeResult').textContent = '—'; return; }
      const from = timeFactors[document.getElementById('timeFrom').value];
      const to = timeFactors[document.getElementById('timeTo').value];
      const result = (val * from) / to;
      document.getElementById('timeResult').textContent = formatNumber(result);
    }
    
    function formatNumber(n) {
      if (Math.abs(n) < 0.0001 || Math.abs(n) > 999999999999) return n.toExponential(4);
      if (Number.isInteger(n)) return n.toLocaleString();
      return n.toLocaleString(undefined, { maximumFractionDigits: 6 });
    }
  </script>
</body>
</html>
