<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter — Shadow's Garden</title>
<meta name="description" content="Convert between units of length, weight, temperature, volume, and area. Clean, fast, client-side.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --accent: #10b981;
  }
  body {
    font-family: 'IBM Plex Mono', monospace;
    background: #0a0a0a;
    color: #e5e5e5;
    min-height: 100vh;
    margin: 0;
    padding: 2rem 1rem;
  }
  .converter-container {
    max-width: 600px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 500;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }
  .subtitle {
    color: #666;
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  .category-tabs {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .category-tab {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #888;
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .category-tab:hover {
    border-color: var(--accent);
    color: #ccc;
  }
  .category-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .converter-box {
    background: #111;
    border: 1px solid #222;
    padding: 1.5rem;
  }
  .input-group {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .input-group input {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid #333;
    color: #e5e5e5;
    padding: 0.75rem;
    font-size: 1rem;
    font-family: inherit;
  }
  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .input-group select {
    background: #0a0a0a;
    border: 1px solid #333;
    color: #e5e5e5;
    padding: 0.75rem;
    font-size: 1rem;
    font-family: inherit;
    min-width: 120px;
  }
  .input-group select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .result-display {
    background: #0a0a0a;
    border: 1px solid #333;
    padding: 1rem;
    font-size: 1.25rem;
    color: var(--accent);
    min-height: 2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .copy-btn {
    background: transparent;
    border: 1px solid #333;
    color: #666;
    padding: 0.25rem 0.5rem;
    font-size: 0.7rem;
    cursor: pointer;
    margin-left: auto;
  }
  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .quick-presets {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .preset-btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #666;
    padding: 0.4rem 0.75rem;
    font-size: 0.7rem;
    cursor: pointer;
  }
  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body data-page-type="app">
<div class="converter-container">
  <h1>Unit Converter</h1>
  <p class="subtitle">Length · Weight · Temperature · Volume · Area</p>
  
  <div class="category-tabs">
    <button class="category-tab active" data-category="length">Length</button>
    <button class="category-tab" data-category="weight">Weight</button>
    <button class="category-tab" data-category="temperature">Temperature</button>
    <button class="category-tab" data-category="volume">Volume</button>
    <button class="category-tab" data-category="area">Area</button>
  </div>
  
  <div class="converter-box">
    <div class="input-group">
      <input type="number" id="inputValue" placeholder="Enter value" value="1">
      <select id="fromUnit"></select>
    </div>
    <div class="input-group">
      <input type="text" id="toValue" placeholder="Result" readonly>
      <select id="toUnit"></select>
    </div>
    <div class="result-display" id="resultDisplay">
      <span id="resultText">1 meter = 3.281 feet</span>
      <button class="copy-btn" id="copyBtn">COPY</button>
    </div>
    <div class="quick-presets" id="quickPresets"></div>
  </div>
</div>

<script>
const units = {
  length: {
    name: 'Length',
    units: {
      meter: { name: 'Meter', toBase: 1 },
      kilometer: { name: 'Kilometer', toBase: 1000 },
      centimeter: { name: 'Centimeter', toBase: 0.01 },
      millimeter: { name: 'Millimeter', toBase: 0.001 },
      mile: { name: 'Mile', toBase: 1609.344 },
      yard: { name: 'Yard', toBase: 0.9144 },
      foot: { name: 'Foot', toBase: 0.3048 },
      inch: { name: 'Inch', toBase: 0.0254 }
    },
    presets: [
      { from: 'meter', to: 'foot' },
      { from: 'kilometer', to: 'mile' },
      { from: 'inch', to: 'centimeter' }
    ]
  },
  weight: {
    name: 'Weight',
    units: {
      kilogram: { name: 'Kilogram', toBase: 1 },
      gram: { name: 'Gram', toBase: 0.001 },
      milligram: { name: 'Milligram', toBase: 0.000001 },
      pound: { name: 'Pound', toBase: 0.453592 },
      ounce: { name: 'Ounce', toBase: 0.0283495 },
      ton: { name: 'Metric Ton', toBase: 1000 }
    },
    presets: [
      { from: 'kilogram', to: 'pound' },
      { from: 'pound', to: 'kilogram' },
      { from: 'gram', to: 'ounce' }
    ]
  },
  temperature: {
    name: 'Temperature',
    units: {
      celsius: { name: 'Celsius (°C)', toBase: 'celsius' },
      fahrenheit: { name: 'Fahrenheit (°F)', toBase: 'fahrenheit' },
      kelvin: { name: 'Kelvin (K)', toBase: 'kelvin' }
    },
    presets: [
      { from: 'celsius', to: 'fahrenheit' },
      { from: 'fahrenheit', to: 'celsius' },
      { from: 'celsius', to: 'kelvin' }
    ]
  },
  volume: {
    name: 'Volume',
    units: {
      liter: { name: 'Liter', toBase: 1 },
      milliliter: { name: 'Milliliter', toBase: 0.001 },
      gallon: { name: 'US Gallon', toBase: 3.78541 },
      quart: { name: 'US Quart', toBase: 0.946353 },
      pint: { name: 'US Pint', toBase: 0.473176 },
      cup: { name: 'US Cup', toBase: 0.236588 },
      fluidounce: { name: 'US Fluid Ounce', toBase: 0.0295735 }
    },
    presets: [
      { from: 'liter', to: 'gallon' },
      { from: 'gallon', to: 'liter' },
      { from: 'cup', to: 'milliliter' }
    ]
  },
  area: {
    name: 'Area',
    units: {
      sqmeter: { name: 'Square Meter', toBase: 1 },
      sqkilometer: { name: 'Square Kilometer', toBase: 1000000 },
      sqfoot: { name: 'Square Foot', toBase: 0.092903 },
      sqinch: { name: 'Square Inch', toBase: 0.00064516 },
      acre: { name: 'Acre', toBase: 4046.86 },
      hectare: { name: 'Hectare', toBase: 10000 },
      sqmile: { name: 'Square Mile', toBase: 2589988.11 }
    },
    presets: [
      { from: 'sqmeter', to: 'sqfoot' },
      { from: 'acre', to: 'sqmeter' },
      { from: 'hectare', to: 'acre' }
    ]
  }
};

let currentCategory = 'length';

function convertTemperature(value, from, to) {
  let celsius;
  if (from === 'celsius') celsius = value;
  else if (from === 'fahrenheit') celsius = (value - 32) * 5/9;
  else if (from === 'kelvin') celsius = value - 273.15;
  
  if (to === 'celsius') return celsius;
  if (to === 'fahrenheit') return celsius * 9/5 + 32;
  if (to === 'kelvin') return celsius + 273.15;
}

function convert() {
  const value = parseFloat(document.getElementById('inputValue').value);
  const fromUnit = document.getElementById('fromUnit').value;
  const toUnit = document.getElementById('toUnit').value;
  const category = units[currentCategory];
  
  if (isNaN(value)) {
    document.getElementById('toValue').value = '';
    document.getElementById('resultText').textContent = 'Enter a number';
    return;
  }
  
  let result;
  if (currentCategory === 'temperature') {
    result = convertTemperature(value, fromUnit, toUnit);
  } else {
    const baseValue = value * category.units[fromUnit].toBase;
    result = baseValue / category.units[toUnit].toBase;
  }
  
  const formatted = Math.abs(result) < 0.0001 || Math.abs(result) > 10000000 
    ? result.toExponential(4) 
    : parseFloat(result.toFixed(6));
  
  document.getElementById('toValue').value = formatted;
  
  const fromName = category.units[fromUnit].name;
  const toName = category.units[toUnit].name;
  document.getElementById('resultText').textContent = `${value} ${fromName} = ${formatted} ${toName}`;
}

function populateUnits() {
  const category = units[currentCategory];
  const fromSelect = document.getElementById('fromUnit');
  const toSelect = document.getElementById('toUnit');
  
  fromSelect.innerHTML = '';
  toSelect.innerHTML = '';
  
  for (const [key, unit] of Object.entries(category.units)) {
    fromSelect.innerHTML += `<option value="${key}">${unit.name}</option>`;
    toSelect.innerHTML += `<option value="${key}">${unit.name}</option>`;
  }
  
  if (category.presets.length > 0) {
    document.getElementById('fromUnit').value = category.presets[0].from;
    document.getElementById('toUnit').value = category.presets[0].to;
  }
  
  populatePresets();
  convert();
}

function populatePresets() {
  const category = units[currentCategory];
  const presetsDiv = document.getElementById('quickPresets');
  presetsDiv.innerHTML = '';
  
  category.presets.forEach(preset => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    const fromName = category.units[preset.from].name.split(' ')[0];
    const toName = category.units[preset.to].name.split(' ')[0];
    btn.textContent = `${fromName} → ${toName}`;
    btn.onclick = () => {
      document.getElementById('fromUnit').value = preset.from;
      document.getElementById('toUnit').value = preset.to;
      convert();
    };
    presetsDiv.appendChild(btn);
  });
}

document.querySelectorAll('.category-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCategory = tab.dataset.category;
    populateUnits();
  });
});

document.getElementById('inputValue').addEventListener('input', convert);
document.getElementById('fromUnit').addEventListener('change', convert);
document.getElementById('toUnit').addEventListener('change', convert);

document.getElementById('copyBtn').addEventListener('click', () => {
  const result = document.getElementById('toValue').value;
  if (result) {
    navigator.clipboard.writeText(result);
    document.getElementById('copyBtn').textContent = 'COPIED';
    setTimeout(() => {
      document.getElementById('copyBtn').textContent = 'COPY';
    }, 1500);
  }
});

populateUnits();
</script>
</body>
</html>
