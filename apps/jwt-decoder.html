<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Decoder — Shadow's Garden</title>
<meta name="description" content="Decode and inspect JWT tokens — header, payload, signature. See expiration times, claims, and verify structure.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
  h1 { margin-bottom: 0.5rem; }
  .tagline { color: var(--text-muted); margin-bottom: 2rem; }
  .input-section { margin-bottom: 2rem; }
  textarea {
    width: 100%;
    height: 100px;
    padding: 1rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    resize: vertical;
  }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  button {
    padding: 0.5rem 1rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  button:hover { background: var(--border); }
  button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  button.primary:hover { opacity: 0.9; }
  .output { display: grid; gap: 1.5rem; }
  .section { background: var(--bg-secondary); border-radius: 8px; padding: 1.25rem; border: 1px solid var(--border); }
  .section h3 { margin: 0 0 1rem 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .section-header h3 { margin: 0; }
  .copy-btn { font-size: 0.75rem; padding: 0.25rem 0.5rem; }
  pre {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-all;
    font-size: 0.85rem;
    line-height: 1.5;
  }
  .error { color: #ff6b6b; padding: 1rem; background: rgba(255,107,107,0.1); border-radius: 6px; display: none; }
  .error.visible { display: block; }
  .claim { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
  .claim:last-child { border-bottom: none; }
  .claim-key { color: #c792ea; }
  .claim-value { color: #c3e88d; text-align: right; max-width: 60%; word-break: break-all; }
  .claim-value.expired { color: #ff6b6b; }
  .claim-value.valid { color: #6bff9e; }
  .expiry-badge {
    display: inline-block;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: bold;
    margin-left: 0.5rem;
  }
  .expiry-badge.expired { background: rgba(255,107,107,0.2); color: #ff6b6b; }
  .expiry-badge.valid { background: rgba(107,255,158,0.2); color: #6bff9e; }
  .empty-state { text-align: center; color: var(--text-muted); padding: 3rem; }
  .info-box { background: rgba(100,180,255,0.1); border: 1px solid rgba(100,180,255,0.3); border-radius: 6px; padding: 1rem; margin-bottom: 1rem; font-size: 0.85rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>🔐 JWT Decoder</h1>
  <p class="tagline">Decode and inspect JSON Web Tokens</p>

  <div class="input-section">
    <textarea id="jwtInput" placeholder="Paste your JWT token here (e.g., eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...)"></textarea>
    <div class="btn-row">
      <button class="primary" onclick="decodeJWT()">Decode</button>
      <button onclick="clearAll()">Clear</button>
      <button onclick="loadSample()">Load Sample</button>
    </div>
  </div>

  <div id="error" class="error"></div>

  <div id="output" class="output" style="display: none;">
    <div class="info-box" id="infoBox"></div>
    
    <div class="section">
      <div class="section-header">
        <h3>Header</h3>
        <button class="copy-btn" onclick="copySection('header')">Copy</button>
      </div>
      <pre id="header"></pre>
    </div>

    <div class="section">
      <div class="section-header">
        <h3>Payload</h3>
        <button class="copy-btn" onclick="copySection('payload')">Copy</button>
      </div>
      <div id="payloadClaims"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <h3>Signature</h3>
        <button class="copy-btn" onclick="copySection('signature')">Copy</button>
      </div>
      <pre id="signature" style="color: var(--text-muted);"></pre>
    </div>
  </div>

  <div id="emptyState" class="empty-state">
    <p>Paste a JWT token above to decode it</p>
  </div>
</div>

<script>
function decodeJWT() {
  const input = document.getElementById('jwtInput').value.trim();
  const errorEl = document.getElementById('error');
  const outputEl = document.getElementById('output');
  const emptyEl = document.getElementById('emptyState');
  
  errorEl.classList.remove('visible');
  errorEl.textContent = '';
  
  if (!input) {
    outputEl.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }

  const parts = input.split('.');
  if (parts.length !== 3) {
    errorEl.textContent = 'Invalid JWT format: expected 3 parts separated by dots (header.payload.signature)';
    errorEl.classList.add('visible');
    outputEl.style.display = 'none';
    return;
  }

  try {
    // Decode header
    const header = JSON.parse(base64UrlDecode(parts[0]));
    document.getElementById('header').textContent = JSON.stringify(header, null, 2);
    
    // Decode payload
    const payload = JSON.parse(base64UrlDecode(parts[1]));
    renderPayload(payload);
    
    // Show signature
    document.getElementById('signature').textContent = parts[2];
    
    outputEl.style.display = 'grid';
    emptyEl.style.display = 'none';
  } catch (e) {
    errorEl.textContent = 'Failed to decode: ' + e.message;
    errorEl.classList.add('visible');
    outputEl.style.display = 'none';
  }
}

function renderPayload(payload) {
  const container = document.getElementById('payloadClaims');
  const infoBox = document.getElementById('infoBox');
  let html = '';
  let expiryInfo = '';
  
  for (const [key, value] of Object.entries(payload)) {
    let displayValue = value;
    let valueClass = '';
    
    // Handle special claims
    if (key === 'exp' || key === 'iat' || key === 'nbf') {
      const date = new Date(value * 1000);
      displayValue = date.toLocaleString();
      const now = Date.now() / 1000;
      
      if (key === 'exp') {
        if (value < now) {
          valueClass = 'expired';
          expiryInfo = `<span class="expiry-badge expired">EXPIRED</span>`;
        } else {
          valueClass = 'valid';
          const remaining = value - now;
          expiryInfo = `<span class="expiry-badge valid">Expires in ${formatDuration(remaining)}</span>`;
        }
      } else if (key === 'iat') {
        displayValue += ` (${date.toLocaleTimeString()})`;
      } else if (key === 'nbf') {
        displayValue += ` (${date.toLocaleTimeString()})`;
      }
    } else if (typeof value === 'object') {
      displayValue = JSON.stringify(value);
    }
    
    html += `<div class="claim">
      <span class="claim-key">${key}</span>
      <span class="claim-value ${valueClass}">${displayValue}</span>
    </div>`;
  }
  
  container.innerHTML = html;
  
  // Info box
  let info = '';
  if (payload.iss) info += `Issuer: ${payload.iss}  `;
  if (payload.sub) info += `Subject: ${payload.sub}  `;
  if (payload.aud) info += `Audience: ${payload.aud}`;
  if (expiryInfo) info += expiryInfo;
  
  if (info) {
    infoBox.innerHTML = info;
    infoBox.style.display = 'block';
  } else {
    infoBox.style.display = 'none';
  }
}

function formatDuration(seconds) {
  if (seconds < 60) return `${Math.floor(seconds)}s`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)}h`;
  return `${Math.floor(seconds / 86400)}d`;
}

function base64UrlDecode(str) {
  // Replace URL-safe chars
  let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
  // Pad with =
  while (base64.length % 4) {
    base64 += '=';
  }
  return decodeURIComponent(atob(base64).split('').map(c => 
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
}

function copySection(section) {
  const el = document.getElementById(section);
  navigator.clipboard.writeText(el.textContent);
}

function clearAll() {
  document.getElementById('jwtInput').value = '';
  document.getElementById('output').style.display = 'none';
  document.getElementById('emptyState').style.display = 'block';
  document.getElementById('error').classList.remove('visible');
}

function loadSample() {
  // Sample JWT with common claims
  const header = btoa(JSON.stringify({ alg: "HS256", typ: "JWT" }));
  const payload = btoa(JSON.stringify({
    sub: "1234567890",
    name: "John Doe",
    iat: Math.floor(Date.now() / 1000),
    exp: Math.floor(Date.now() / 1000) + 3600,
    iss: "example.com",
    roles: ["admin", "user"]
  }));
  const signature = "SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c";
  document.getElementById('jwtInput').value = `${header}.${payload}.${signature}`;
  decodeJWT();
}

// Auto-decode on paste
document.getElementById('jwtInput').addEventListener('paste', () => {
  setTimeout(decodeJWT, 10);
});

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.shiftKey && e.key === 'J') {
    decodeJWT();
  }
});
</script>
</body>
</html>
