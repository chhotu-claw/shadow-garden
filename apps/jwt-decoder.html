<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Decoder — Shadow's Garden</title>
<meta name="description" content="Decode and inspect JWT tokens. See header, payload, and signature info.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { color: var(--accent); margin-bottom: 0.5rem; }
  .description { color: var(--text-muted); margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 6px; font-weight: 600; }
  textarea {
    width: 100%; height: 100px; padding: 12px; border: 2px solid var(--border);
    border-radius: 8px; background: var(--bg); color: var(--text);
    font-family: 'SF Mono', monospace; font-size: 13px; resize: vertical;
    box-sizing: border-box; margin-bottom: 16px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent); color: var(--bg); border: none;
    padding: 10px 20px; border-radius: 8px; cursor: pointer;
    font-weight: 600; font-size: 14px; margin-right: 12px; margin-bottom: 16px;
  }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--border); color: var(--text); }
  .result { 
    background: var(--bg-secondary); border: 2px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 16px;
  }
  .section-title { 
    color: var(--accent); font-weight: 600; margin-bottom: 12px; 
    font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  pre {
    margin: 0; white-space: pre-wrap; word-break: break-all;
    font-family: 'SF Mono', monospace; font-size: 13px; color: var(--text);
  }
  .error { color: #ff6b6b; margin-top: -12px; margin-bottom: 16px; }
  .warning { color: #e5c07b; font-size: 12px; margin-top: 8px; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; margin-right: 8px;
  }
  .badge-valid { background: rgba(0,212,170,0.2); color: #00d4aa; }
  .badge-invalid { background: rgba(255,107,107,0.2); color: #ff6b6b; }
  .badge-expired { background: rgba(255,107,107,0.2); color: #ff6b6b; }
  .claim { color: #c678dd; }
  .string { color: #98c379; }
  .number { color: #d19a66; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>JWT Decoder</h1>
  <p class="description">Decode and inspect JWT tokens. All processing happens client-side.</p>

  <label>JWT Token</label>
  <textarea id="jwt-input" placeholder="paste your token here..."></textarea>
  
  <button id="decode-btn">Decode</button>
  <button class="secondary" id="clear-btn">Clear</button>
  
  <div id="error" class="error"></div>
  
  <div id="output" style="display:none">
    <div class="result">
      <div class="section-title">Header</div>
      <pre id="header-output"></pre>
    </div>
    
    <div class="result">
      <div class="section-title">Payload</div>
      <div id="expiry-badge"></div>
      <pre id="payload-output"></pre>
      <div class="warning" id="expiry-warning"></div>
    </div>
    
    <div class="result">
      <div class="section-title">Signature</div>
      <pre id="signature-output"></pre>
      <div class="warning">Note: Signature verification requires the secret key.</div>
    </div>
  </div>
</div>

<script>
function base64UrlDecode(str) {
  // Replace URL-safe chars
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  // Pad with =
  while (str.length % 4) str += '=';
  // Decode
  const decoded = atob(str);
  // Convert to UTF-8
  return decodeURIComponent(decoded.split('').map(c => 
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
}

function formatJson(str) {
  try {
    const obj = JSON.parse(str);
    return JSON.stringify(obj, null, 2);
  } catch {
    return str;
  }
}

function highlightClaims(json) {
  return json.replace(/"([^"]+)":/g, '<span class="claim">"$1"</span>:');
}

function decodeJWT(jwt) {
  const parts = jwt.split('.');
  if (parts.length !== 3) {
    throw new Error('Invalid JWT format - expected 3 parts separated by dots');
  }
  
  const header = base64UrlDecode(parts[0]);
  const payload = base64UrlDecode(parts[1]);
  const signature = parts[2];
  
  return { header, payload, signature };
}

function checkExpiry(payload) {
  try {
    const obj = JSON.parse(payload);
    const now = Math.floor(Date.now() / 1000);
    
    if (obj.exp) {
      const expires = new Date(obj.exp * 1000);
      const isExpired = now > obj.exp;
      return { exp: obj.exp, expires, isExpired };
    }
    if (obj.nbf && now < obj.nbf) {
      return { nbf: obj.nbf, notBefore: new Date(obj.nbf * 1000), isNotYet: true };
    }
  } catch {}
  return null;
}

document.getElementById('decode-btn').addEventListener('click', () => {
  const jwt = document.getElementById('jwt-input').value.trim();
  const errorEl = document.getElementById('error');
  const outputEl = document.getElementById('output');
  
  errorEl.textContent = '';
  outputEl.style.display = 'none';
  
  if (!jwt) {
    errorEl.textContent = 'Please paste a JWT token';
    return;
  }
  
  try {
    const { header, payload, signature } = decodeJWT(jwt);
    
    document.getElementById('header-output').innerHTML = highlightClaims(formatJson(header));
    document.getElementById('payload-output').innerHTML = highlightClaims(formatJson(payload));
    document.getElementById('signature-output').textContent = signature;
    
    // Check expiry
    const expiry = checkExpiry(payload);
    const badgeEl = document.getElementById('expiry-badge');
    const warningEl = document.getElementById('expiry-warning');
    
    if (expiry) {
      if (expiry.isExpired) {
        badgeEl.innerHTML = '<span class="badge badge-expired">EXPIRED</span>';
        warningEl.textContent = `Token expired on ${expiry.expires.toLocaleString()}`;
      } else if (expiry.isNotYet) {
        badgeEl.innerHTML = '<span class="badge badge-invalid">NOT YET VALID</span>';
        warningEl.textContent = `Token not valid until ${expiry.notBefore.toLocaleString()}`;
      } else {
        badgeEl.innerHTML = '<span class="badge badge-valid">VALID</span>';
        warningEl.textContent = `Token expires on ${expiry.expires.toLocaleString()}`;
      }
    } else {
      badgeEl.innerHTML = '<span class="badge" style="background:rgba(255,255,255,0.1);color:var(--text-muted)">NO EXPIRY</span>';
      warningEl.textContent = '';
    }
    
    outputEl.style.display = 'block';
  } catch (e) {
    errorEl.textContent = 'Error decoding JWT: ' + e.message;
  }
});

document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('jwt-input').value = '';
  document.getElementById('output').style.display = 'none';
  document.getElementById('error').textContent = '';
});
</script>
</body>
</html>
