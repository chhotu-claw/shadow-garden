<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Decoder — Shadow's Garden</title>
<meta name="description" content="Decode and validate JWT tokens. See header, payload, signature. All local, nothing leaves your browser.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --accent: #6366f1; }
  body { padding: 1rem; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; }
  .section { margin-bottom: 1.5rem; }
  .label { font-weight: 600; margin-bottom: 0.5rem; display: block; color: var(--fg-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
  textarea, .output { width: 100%; box-sizing: border-box; padding: 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--fg); font-family: 'Fira Code', monospace; font-size: 14px; }
  textarea { min-height: 120px; resize: vertical; }
  .output { white-space: pre-wrap; word-break: break-all; min-height: 60px; }
  .valid { border-color: #22c55e; }
  .invalid { border-color: #ef4444; }
  .badge { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; margin-right: 0.5rem; }
  .badge-valid { background: #22c55e20; color: #22c55e; }
  .badge-invalid { background: #ef444420; color: #ef4444; }
  .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
  button { background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 14px; }
  button:hover { background: var(--bg-secondary); }
  .error { color: #ef4444; font-size: 0.9rem; margin-top: 0.5rem; }
  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; }
  .info-card { background: var(--bg); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); }
  .info-card h3 { margin: 0 0 0.5rem 0; font-size: 0.85rem; color: var(--fg-muted); text-transform: uppercase; }
  .info-card .value { font-family: 'Fira Code', monospace; font-size: 0.9rem; word-break: break-all; }
  .timestamp { font-size: 0.8rem; color: var(--fg-muted); }
</style>
</head>
<body data-page-type="app">
  <h1>JWT Decoder</h1>
  
  <div class="section">
    <label class="label" for="jwt">Paste your JWT token</label>
    <textarea id="jwt" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"></textarea>
    <div class="btn-group">
      <button id="decode">Decode</button>
      <button id="validate">Validate Structure</button>
      <button id="clear">Clear</button>
    </div>
    <div id="error" class="error"></div>
  </div>

  <div class="section" id="result" style="display:none;">
    <label class="label">Decoded Token</label>
    <div id="status"></div>
    <div class="info-grid">
      <div class="info-card">
        <h3>Header</h3>
        <div class="value" id="header"></div>
      </div>
      <div class="info-card">
        <h3>Payload</h3>
        <div class="value" id="payload"></div>
      </div>
      <div class="info-card">
        <h3>Signature</h3>
        <div class="value" id="signature"></div>
      </div>
    </div>
  </div>

  <div class="section" id="claims-section" style="display:none;">
    <label class="label">Token Claims</label>
    <div class="info-grid">
      <div class="info-card">
        <h3>Issuer (iss)</h3>
        <div class="value" id="iss"></div>
      </div>
      <div class="info-card">
        <h3>Subject (sub)</h3>
        <div class="value" id="sub"></div>
      </div>
      <div class="info-card">
        <h3>Audience (aud)</h3>
        <div class="value" id="aud"></div>
      </div>
      <div class="info-card">
        <h3>Expiration (exp)</h3>
        <div class="value" id="exp"></div>
      </div>
      <div class="info-card">
        <h3>Issued At (iat)</h3>
        <div class="value" id="iat"></div>
      </div>
      <div class="info-card">
        <h3>Not Before (nbf)</h3>
        <div class="value" id="nbf"></div>
      </div>
    </div>
  </div>

  <script>
    const jwtInput = document.getElementById('jwt');
    const decodeBtn = document.getElementById('decode');
    const validateBtn = document.getElementById('validate');
    const clearBtn = document.getElementById('clear');
    const resultSection = document.getElementById('result');
    const claimsSection = document.getElementById('claims-section');
    const errorDiv = document.getElementById('error');

    function base64UrlDecode(str) {
      str = str.replace(/-/g, '+').replace(/_/g, '/');
      while (str.length % 4) str += '=';
      try {
        return decodeURIComponent(atob(str).split('').map(c =>
          '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join(''));
      } catch (e) {
        return null;
      }
    }

    function decodeJWT(token) {
      const parts = token.trim().split('.');
      if (parts.length !== 3) {
        throw new Error('Invalid JWT format: expected 3 parts separated by dots');
      }
      const header = JSON.parse(base64UrlDecode(parts[0]));
      const payload = JSON.parse(base64UrlDecode(parts[1]));
      const signature = parts[2];
      return { header, payload, signature };
    }

    function formatTimestamp(ts) {
      if (!ts) return '-';
      const date = new Date(ts * 1000);
      return date.toLocaleString() + ' (' + date.toLocaleTimeString('en-US', { timeZoneName: 'short' }) + ')';
    }

    function showError(msg) {
      errorDiv.textContent = msg;
      resultSection.style.display = 'none';
      claimsSection.style.display = 'none';
    }

    function displayJWT(decoded) {
      errorDiv.textContent = '';
      resultSection.style.display = 'block';
      claimsSection.style.display = 'block';

      document.getElementById('header').textContent = JSON.stringify(decoded.header, null, 2);
      document.getElementById('payload').textContent = JSON.stringify(decoded.payload, null, 2);
      document.getElementById('signature').textContent = decoded.signature;

      const p = decoded.payload;
      document.getElementById('iss').textContent = p.iss || '-';
      document.getElementById('sub').textContent = p.sub || '-';
      document.getElementById('aud').textContent = p.aud ? (Array.isArray(p.aud) ? p.aud.join(', ') : p.aud) : '-';
      document.getElementById('exp').textContent = p.exp ? formatTimestamp(p.exp) + (new Date(p.exp * 1000) < new Date() ? ' — EXPIRED' : '') : '-';
      document.getElementById('iat').textContent = p.iat ? formatTimestamp(p.iat) : '-';
      document.getElementById('nbf').textContent = p.nbf ? formatTimestamp(p.nbf) : '-';
    }

    decodeBtn.addEventListener('click', () => {
      const token = jwtInput.value.trim();
      if (!token) {
        showError('Please paste a JWT token');
        return;
      }
      try {
        const decoded = decodeJWT(token);
        displayJWT(decoded);
        document.getElementById('status').innerHTML = '<span class="badge badge-valid">Decoded</span>';
      } catch (e) {
        showError(e.message);
      }
    });

    validateBtn.addEventListener('click', () => {
      const token = jwtInput.value.trim();
      if (!token) {
        showError('Please paste a JWT token');
        return;
      }
      try {
        const decoded = decodeJWT(token);
        const parts = token.split('.');
        
        // Check structure
        if (parts.length !== 3) {
          throw new Error('Invalid structure: ' + parts.length + ' parts, expected 3');
        }
        
        // Check expiration
        let status = '<span class="badge badge-valid">Valid Structure</span>';
        if (decoded.payload.exp) {
          if (new Date(decoded.payload.exp * 1000) < new Date()) {
            status += '<span class="badge badge-invalid">EXPIRED</span>';
          } else {
            status += '<span class="badge badge-valid">Not Expired</span>';
          }
        }
        
        // Check not-before
        if (decoded.payload.nbf) {
          if (new Date(decoded.payload.nbf * 1000) > new Date()) {
            status += '<span class="badge badge-invalid">Not Yet Valid</span>';
          }
        }
        
        document.getElementById('status').innerHTML = status;
        displayJWT(decoded);
      } catch (e) {
        document.getElementById('status').innerHTML = '<span class="badge badge-invalid">Invalid</span>';
        showError(e.message);
      }
    });

    clearBtn.addEventListener('click', () => {
      jwtInput.value = '';
      resultSection.style.display = 'none';
      claimsSection.style.display = 'none';
      errorDiv.textContent = '';
    });

    jwtInput.addEventListener('input', () => {
      errorDiv.textContent = '';
    });
  </script>
</body>
</html>
