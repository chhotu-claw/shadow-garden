<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Decoder — Shadow's Garden</title>
<meta name="description" content="Decode and inspect JWT tokens locally in your browser. See header, payload, and signature. Nothing leaves your device.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body {
    font-family: var(--font-mono);
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  h1 {
    font-family: var(--font-mono);
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: var(--text-muted);
    margin-bottom: 2rem;
  }
  textarea {
    width: 100%;
    height: 100px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    padding: 1rem;
    border-radius: 8px;
    resize: vertical;
    box-sizing: border-box;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .output-section {
    margin-top: 2rem;
    display: none;
  }
  .output-section.visible {
    display: block;
  }
  .section-title {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    margin-top: 1.5rem;
  }
  .section-title:first-of-type {
    margin-top: 0;
  }
  pre {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    line-height: 1.5;
    margin: 0;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .header { border-left: 3px solid #f43f5e; }
  .payload { border-left: 3px solid #8b5cf6; }
  .signature { border-left: 3px solid #10b981; }
  .error {
    background: rgba(244, 63, 94, 0.1);
    border-color: #f43f5e;
    color: #f43f5e;
  }
  .meta-info {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    font-size: 0.85rem;
  }
  .meta-item {
    background: var(--bg-secondary);
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    font-family: var(--font-mono);
  }
  .meta-label {
    color: var(--text-muted);
    margin-right: 0.5rem;
  }
  .valid {
    color: #10b981;
  }
  .expired {
    color: #f43f5e;
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>JWT Decoder</h1>
    <p class="subtitle">Decode JWT tokens locally. Your data never leaves your browser.</p>
    
    <textarea id="jwtInput" placeholder="Paste your JWT token here..."></textarea>
    
    <div id="output" class="output-section">
      <div class="meta-info" id="metaInfo"></div>
      
      <div class="section-title">Header</div>
      <pre id="headerOutput" class="header"></pre>
      
      <div class="section-title">Payload</div>
      <pre id="payloadOutput" class="payload"></pre>
      
      <div class="section-title">Signature</div>
      <pre id="signatureOutput" class="signature"></pre>
    </div>
  </div>

  <script>
    const input = document.getElementById('jwtInput');
    const output = document.getElementById('output');
    const headerOutput = document.getElementById('headerOutput');
    const payloadOutput = document.getElementById('payloadOutput');
    const signatureOutput = document.getElementById('signatureOutput');
    const metaInfo = document.getElementById('metaInfo');

    function base64UrlDecode(str) {
      str = str.replace(/-/g, '+').replace(/_/g, '/');
      const pad = str.length % 4;
      if (pad) str += '='.repeat(4 - pad);
      try {
        return decodeURIComponent(atob(str).split('').map(c =>
          '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join(''));
      } catch (e) {
        return atob(str);
      }
    }

    function formatJson(json) {
      return JSON.stringify(json, null, 2);
    }

    function formatTimestamp(ts) {
      return new Date(ts * 1000).toLocaleString();
    }

    function getExpiryStatus(payload) {
      if (!payload.exp) return null;
      const now = Math.floor(Date.now() / 1000);
      const diff = payload.exp - now;
      if (diff > 0) {
        return { valid: true, text: `Expires in ${formatDuration(diff)}` };
      } else {
        return { valid: false, text: `Expired ${formatDuration(-diff)} ago` };
      }
    }

    function formatDuration(seconds) {
      if (seconds < 60) return `${seconds}s`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h`;
      return `${Math.floor(seconds / 86400)}d`;
    }

    function decodeJWT() {
      const token = input.value.trim();
      
      if (!token) {
        output.classList.remove('visible');
        return;
      }

      const parts = token.split('.');
      if (parts.length !== 3) {
        output.classList.remove('visible');
        return;
      }

      try {
        const header = JSON.parse(base64UrlDecode(parts[0]));
        const payload = JSON.parse(base64UrlDecode(parts[1]));
        const signature = parts[2];

        headerOutput.textContent = formatJson(header);
        payloadOutput.textContent = formatJson(payload);
        signatureOutput.textContent = signature;

        // Build meta info
        let metaHTML = '';
        
        if (payload.iss) {
          metaHTML += `<div class="meta-item"><span class="meta-label">issuer:</span>${payload.iss}</div>`;
        }
        if (payload.sub) {
          metaHTML += `<div class="meta-item"><span class="meta-label">subject:</span>${payload.sub}</div>`;
        }
        if (payload.aud) {
          metaHTML += `<div class="meta-item"><span class="meta-label">audience:</span>${Array.isArray(payload.aud) ? payload.aud.join(', ') : payload.aud}</div>`;
        }
        if (payload.iat) {
          metaHTML += `<div class="meta-item"><span class="meta-label">issued:</span>${formatTimestamp(payload.iat)}</div>`;
        }
        if (payload.exp) {
          const status = getExpiryStatus(payload);
          if (status) {
            metaHTML += `<div class="meta-item ${status.valid ? 'valid' : 'expired'}"><span class="meta-label">expiry:</span>${status.text} (${formatTimestamp(payload.exp)})</div>`;
          }
        }

        metaInfo.innerHTML = metaHTML;
        output.classList.add('visible');
        
        headerOutput.classList.remove('error');
        payloadOutput.classList.remove('error');
      } catch (e) {
        output.classList.remove('visible');
      }
    }

    input.addEventListener('input', decodeJWT);
    decodeJWT();
  </script>
</body>
</html>
