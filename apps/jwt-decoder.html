<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Decoder — Shadow's Garden</title>
<meta name="description" content="Decode and inspect JWT tokens locally in your browser. View header, payload, and signature. Nothing leaves your device.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e5e5e5; line-height: 1.6; padding: 2rem; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 600; }
  .nav { display: flex; gap: 1.5rem; margin-bottom: 2rem; }
  .nav a { color: #666; text-decoration: none; }
  .nav a:hover { color: #6cb6ff; }
  textarea { width: 100%; height: 120px; background: #141414; border: 1px solid #333; border-radius: 6px; color: #e5e5e5; padding: 1rem; font-family: 'SF Mono', Monaco, monospace; font-size: 0.9rem; resize: vertical; }
  textarea:focus { outline: none; border-color: #6cb6ff; }
  .btn-group { display: flex; gap: 0.5rem; margin: 1rem 0; }
  button { background: #1a1a1a; border: 1px solid #333; color: #e5e5e5; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
  button:hover { border-color: #6cb6ff; }
  button.primary { background: #6cb6ff; color: #0d0d0d; border-color: #6cb6ff; }
  button.primary:hover { background: #5aa3ef; }
  .section { background: #141414; border: 1px solid #222; border-radius: 6px; padding: 1rem; margin: 1rem 0; }
  .section h3 { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .token-part { background: #0d0d0d; padding: 0.75rem; border-radius: 4px; font-family: 'SF Mono', Monaco, monospace; font-size: 0.85rem; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
  .header { border-left: 3px solid #f77; }
  .payload { border-left: 3px solid #7af7; }
  .signature { border-left: 3px solid #7af; }
  .error { background: #2e1a1a; border: 1px solid #f77; padding: 1rem; border-radius: 6px; color: #f77; }
  .info { color: #666; font-size: 0.85rem; margin-top: 0.5rem; }
  .claim { display: flex; justify-content: space-between; padding: 0.25rem 0; border-bottom: 1px solid #222; }
  .claim:last-child { border-bottom: none; }
  .claim-key { color: #888; }
  .claim-value { color: #e5e5e5; font-family: 'SF Mono', Monaco, monospace; }
  .expired { color: #f77; }
  .valid { color: #7af7; }
  pre { margin: 0; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
  <div class="nav">
    <a href="index.html">Home</a>
    <a href="index-writing.html">Writing</a>
  </div>

  <h1>JWT Decoder</h1>
  <p style="color:#888;margin-bottom:1.5rem;">Decode and inspect JWT tokens. Everything runs locally — nothing leaves your browser.</p>

  <textarea id="jwtInput" placeholder="Paste your JWT here (e.g., eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...)"></textarea>
  
  <div class="btn-group">
    <button class="primary" onclick="decode()">Decode</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="loadFromStorage()">Load Last</button>
  </div>

  <div id="error" class="error" style="display:none;"></div>

  <div id="result" style="display:none;">
    <div class="section">
      <h3>Header</h3>
      <div class="token-part header" id="headerOutput"></div>
    </div>
    
    <div class="section">
      <h3>Payload</h3>
      <div class="token-part payload" id="payloadOutput"></div>
      <div class="info" id="payloadInfo"></div>
    </div>
    
    <div class="section">
      <h3>Signature</h3>
      <div class="token-part signature" id="signatureOutput"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'last_jwt';

    function decode() {
      const input = document.getElementById('jwtInput').value.trim();
      const errorEl = document.getElementById('error');
      const resultEl = document.getElementById('result');
      
      if (!input) {
        errorEl.textContent = 'Please paste a JWT token';
        errorEl.style.display = 'block';
        resultEl.style.display = 'none';
        return;
      }

      const parts = input.split('.');
      if (parts.length !== 3) {
        errorEl.textContent = 'Invalid JWT format. Expected 3 parts separated by dots.';
        errorEl.style.display = 'block';
        resultEl.style.display = 'none';
        return;
      }

      try {
        const header = JSON.parse(base64UrlDecode(parts[0]));
        const payload = JSON.parse(base64UrlDecode(parts[1]));
        const signature = parts[2];

        document.getElementById('headerOutput').innerHTML = '<pre>' + JSON.stringify(header, null, 2) + '</pre>';
        document.getElementById('payloadOutput').innerHTML = '<pre>' + JSON.stringify(payload, null, 2) + '</pre>';
        document.getElementById('signatureOutput').textContent = signature;

        // Show payload info
        let info = [];
        if (payload.exp) {
          const expDate = new Date(payload.exp * 1000);
          const now = new Date();
          const isExpired = now > expDate;
          info.push(`exp: ${expDate.toLocaleString()} ${isExpired ? '(EXPIRED)' : '(valid)'}`);
        }
        if (payload.iat) {
          const iatDate = new Date(payload.iat * 1000);
          info.push(`iat: ${iatDate.toLocaleString()}`);
        }
        if (payload.nbf) {
          const nbfDate = new Date(payload.nbf * 1000);
          info.push(`nbf: ${nbfDate.toLocaleString()}`);
        }
        if (payload.sub) info.push(`sub: ${payload.sub}`);
        if (payload.iss) info.push(`iss: ${payload.iss}`);
        if (payload.aud) info.push(`aud: ${payload.aud}`);

        document.getElementById('payloadInfo').textContent = info.join(' | ');

        errorEl.style.display = 'none';
        resultEl.style.display = 'block';

        // Save to storage
        localStorage.setItem(STORAGE_KEY, input);

      } catch (e) {
        errorEl.textContent = 'Failed to decode: ' + e.message;
        errorEl.style.display = 'block';
        resultEl.style.display = 'none';
      }
    }

    function base64UrlDecode(str) {
      let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
      const padding = base64.length % 4;
      if (padding) {
        base64 += '='.repeat(4 - padding);
      }
      return decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    }

    function clearAll() {
      document.getElementById('jwtInput').value = '';
      document.getElementById('error').style.display = 'none';
      document.getElementById('result').style.display = 'none';
    }

    function loadFromStorage() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        document.getElementById('jwtInput').value = saved;
        decode();
      }
    }

    // Auto-decode on paste
    document.getElementById('jwtInput').addEventListener('paste', () => {
      setTimeout(decode, 10);
    });
  </script>
</body>
</html>
