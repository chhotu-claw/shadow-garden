<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Decoder — Shadow's Garden</title>
<meta name="description" content="Decode and inspect JWT tokens. See header, payload, and signature.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --muted: #8b949e; --border: #30363d; --warning: #d29922; }
  .jwt-input { width: 100%; min-height: 80px; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-family: monospace; font-size: 0.85rem; }
  .btn { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; background: var(--border); color: var(--text); margin-right: 0.5rem; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #0d1117; }
  .section { margin-top: 1.5rem; }
  .section-title { font-weight: 600; color: var(--accent); margin-bottom: 0.5rem; font-size: 0.9rem; }
  .token-part { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; color: var(--text); }
  .payload-field { display: flex; gap: 1rem; padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
  .payload-field:last-child { border-bottom: none; }
  .field-key { color: var(--accent); min-width: 120px; }
  .field-value { color: var(--text); }
  .error { color: #f85149; margin-top: 1rem; }
  .meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.5rem; }
  pre { margin: 0; white-space: pre-wrap; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>JWT Decoder</h1>
  <p style="color: var(--muted); margin-bottom: 1.5rem;">Paste a JWT token to decode and inspect its parts.</p>
  
  <textarea id="jwtInput" class="jwt-input" placeholder="Paste your JWT token here (eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...)"></textarea>
  
  <div style="margin-top: 1rem;">
    <button class="btn btn-primary" onclick="decodeJWT()">Decode</button>
    <button class="btn" onclick="clearAll()">Clear</button>
  </div>
  
  <div id="error" class="error"></div>
  
  <div id="headerSection" class="section" style="display:none;">
    <div class="section-title">HEADER</div>
    <div id="headerOutput" class="token-part"></div>
  </div>
  
  <div id="payloadSection" class="section" style="display:none;">
    <div class="section-title">PAYLOAD</div>
    <div id="payloadOutput" class="token-part">
      <div id="payloadFields"></div>
    </div>
    <div id="expiryInfo" class="meta"></div>
  </div>
  
  <div id="signatureSection" class="section" style="display:none;">
    <div class="section-title">SIGNATURE</div>
    <div id="signatureOutput" class="token-part" style="color: var(--muted);"></div>
  </div>
</div>

<script>
function base64UrlDecode(str) {
  // Replace URL-safe chars
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  // Pad with =
  while (str.length % 4) {
    str += '=';
  }
  // Decode
  return decodeURIComponent(atob(str).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
}

function formatJSON(str) {
  try {
    const obj = JSON.parse(str);
    return JSON.stringify(obj, null, 2);
  } catch {
    return str;
  }
}

function formatTimestamp(ts) {
  if (!ts) return null;
  const date = new Date(ts * 1000);
  const now = Date.now();
  const diff = date - now;
  const isExpired = diff < 0;
  const abs = Math.abs(diff);
  
  let human;
  if (abs < 60000) human = 'seconds';
  else if (abs < 3600000) human = Math.floor(abs/60000) + ' minutes';
  else if (abs < 86400000) human = Math.floor(abs/3600000) + ' hours';
  else human = Math.floor(abs/86400000) + ' days';
  
  const prefix = isExpired ? 'expired ' : 'expires in ';
  return date.toUTCString() + ' (' + prefix + human + ')';
}

function decodeJWT() {
  const input = document.getElementById('jwtInput').value.trim();
  const errorDiv = document.getElementById('error');
  const headerSec = document.getElementById('headerSection');
  const payloadSec = document.getElementById('payloadSection');
  const sigSec = document.getElementById('signatureSection');
  
  // Clear
  errorDiv.textContent = '';
  headerSec.style.display = 'none';
  payloadSec.style.display = 'none';
  sigSec.style.display = 'none';
  
  if (!input) {
    errorDiv.textContent = 'Please enter a JWT token';
    return;
  }
  
  const parts = input.split('.');
  if (parts.length !== 3) {
    errorDiv.textContent = 'Invalid JWT format. Expected 3 parts separated by dots.';
    return;
  }
  
  try {
    // Header
    const header = JSON.parse(base64UrlDecode(parts[0]));
    document.getElementById('headerOutput').textContent = formatJSON(JSON.stringify(header));
    headerSec.style.display = 'block';
    
    // Payload
    const payload = JSON.parse(base64UrlDecode(parts[1]));
    const fieldsDiv = document.getElementById('payloadFields');
    fieldsDiv.innerHTML = '';
    
    for (const [key, value] of Object.entries(payload)) {
      const row = document.createElement('div');
      row.className = 'payload-field';
      
      const keySpan = document.createElement('span');
      keySpan.className = 'field-key';
      keySpan.textContent = key;
      
      const valSpan = document.createElement('span');
      valSpan.className = 'field-value';
      
      if (typeof value === 'object') {
        valSpan.textContent = JSON.stringify(value);
      } else if (key === 'exp' || key === 'iat' || key === 'nbf') {
        valSpan.textContent = value + ' (' + formatTimestamp(value) + ')';
      } else {
        valSpan.textContent = value;
      }
      
      row.appendChild(keySpan);
      row.appendChild(valSpan);
      fieldsDiv.appendChild(row);
    }
    
    payloadSec.style.display = 'block';
    
    // Expiry info
    const expInfo = document.getElementById('expiryInfo');
    if (payload.exp) {
      expInfo.textContent = 'Token ' + formatTimestamp(payload.exp);
      expInfo.style.color = Date.now() > payload.exp * 1000 ? '#f85149' : 'var(--muted)';
    } else {
      expInfo.textContent = 'No expiration set';
    }
    
    // Signature
    document.getElementById('signatureOutput').textContent = parts[2];
    sigSec.style.display = 'block';
    
  } catch (e) {
    errorDiv.textContent = 'Error decoding token: ' + e.message;
  }
}

function clearAll() {
  document.getElementById('jwtInput').value = '';
  document.getElementById('error').textContent = '';
  document.getElementById('headerSection').style.display = 'none';
  document.getElementById('payloadSection').style.display = 'none';
  document.getElementById('signatureSection').style.display = 'none';
}
</script>
</body>
</html>
