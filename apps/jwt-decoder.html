<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Decoder — Shadow's Garden</title>
<meta name="description" content="Decode and inspect JWT tokens — see header, payload, and signature verification status">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: monospace; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .tagline { color: #666; margin-bottom: 2rem; }
  textarea {
    width: 100%;
    height: 120px;
    padding: 1rem;
    font-family: monospace;
    font-size: 14px;
    border: 2px solid #333;
    border-radius: 8px;
    background: #1a1a1a;
    color: #e0e0e0;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: #646cff; }
  .output { margin-top: 2rem; }
  .section {
    background: #1a1a1a;
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
    border: 1px solid #333;
  }
  .section h3 {
    margin: 0 0 0.5rem 0;
    font-size: 14px;
    text-transform: uppercase;
    color: #888;
  }
  .header-section { border-left: 3px solid #e06c75; }
  .payload-section { border-left: 3px solid #98c379; }
  .signature-section { border-left: 3px solid #61afef; }
  pre {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-all;
    font-size: 13px;
    line-height: 1.5;
  }
  .valid { color: #98c379; }
  .invalid { color: #e06c75; }
  .warning { color: #e5c07b; }
  .claim { color: #c678dd; }
  .label { color: #61afef; }
  .error { color: #e06c75; margin-top: 1rem; }
  .copy-btn {
    background: #333;
    color: #e0e0e0;
    border: none;
    padding: 0.3rem 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    margin-left: 0.5rem;
  }
  .copy-btn:hover { background: #444; }
  .btn-row { margin-top: 1rem; }
  .btn {
    background: #646cff;
    color: white;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .btn:hover { background: #535bf2; }
  .btn-clear { background: #333; margin-left: 0.5rem; }
  .btn-clear:hover { background: #444; }
  .info { font-size: 12px; color: #666; margin-top: 0.5rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>JWT Decoder</h1>
  <p class="tagline">Decode and inspect JWT tokens locally</p>
  
  <textarea id="tokenInput" placeholder="Paste your JWT token here..."></textarea>
  
  <div class="btn-row">
    <button class="btn" id="decodeBtn">Decode</button>
    <button class="btn btn-clear" id="clearBtn">Clear</button>
  </div>
  
  <div class="info">All decoding happens in your browser. No data is sent anywhere.</div>
  
  <div class="output" id="output"></div>
</div>

<script>
const input = document.getElementById('tokenInput');
const output = document.getElementById('output');
const decodeBtn = document.getElementById('decodeBtn');
const clearBtn = document.getElementById('clearBtn');

function base64UrlDecode(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  const pad = str.length % 4;
  if (pad) str += '='.repeat(4 - pad);
  try {
    return decodeURIComponent(atob(str).split('').map(c => 
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
  } catch (e) {
    return atob(str);
  }
}

function formatJson(json) {
  return JSON.stringify(JSON.parse(json), null, 2);
}

function highlightClaims(payload) {
  try {
    const obj = JSON.parse(payload);
    let formatted = JSON.stringify(obj, null, 2);
    
    // Highlight known claims
    const claims = ['iss', 'sub', 'aud', 'exp', 'nbf', 'iat', 'jti'];
    claims.forEach(claim => {
      if (obj[claim] !== undefined) {
        const regex = new RegExp(`"(${claim})"`, 'g');
        formatted = formatted.replace(regex, '"<span class="claim">$1</span>"');
      }
    });
    
    return formatted;
  } catch (e) {
    return payload;
  }
}

function formatTimestamp(ts) {
  if (ts > 1e12) ts = ts / 1000;
  const date = new Date(ts * 1000);
  return date.toISOString() + ' (' + date.toLocaleString() + ')';
}

function decodeJWT(token) {
  const parts = token.trim().split('.');
  if (parts.length !== 3) {
    return { error: 'Invalid JWT format: expected 3 parts separated by dots' };
  }
  
  const [headerB64, payloadB64, signatureB64] = parts;
  
  try {
    const header = base64UrlDecode(headerB64);
    const payload = base64UrlDecode(payloadB64);
    
    // Parse to check valid JSON
    JSON.parse(header);
    JSON.parse(payload);
    
    const payloadObj = JSON.parse(payload);
    
    // Check expiration
    let expStatus = '';
    if (payloadObj.exp) {
      const now = Math.floor(Date.now() / 1000);
      if (payloadObj.exp < now) {
        expStatus = '<span class="invalid">❌ Token expired</span>';
      } else {
        const remaining = payloadObj.exp - now;
        expStatus = `<span class="valid">✓ Valid (expires in ${formatDuration(remaining)})</span>`;
      }
    }
    
    // Check not before
    let nbfStatus = '';
    if (payloadObj.nbf) {
      const now = Math.floor(Date.now() / 1000);
      if (payloadObj.nbf > now) {
        nbfStatus = '<span class="warning">⚠ Not valid yet</span>';
      }
    }
    
    return {
      header: formatJson(header),
      payload: formatJson(payload),
      payloadHighlighted: highlightClaims(JSON.stringify(payloadObj, null, 2)),
      signature: signatureB64,
      expStatus,
      nbfStatus
    };
  } catch (e) {
    return { error: 'Failed to decode: ' + e.message };
  }
}

function formatDuration(seconds) {
  if (seconds < 60) return seconds + 's';
  if (seconds < 3600) return Math.floor(seconds / 60) + 'm';
  if (seconds < 86400) return Math.floor(seconds / 3600) + 'h';
  return Math.floor(seconds / 86400) + 'd';
}

function renderClaim(label, value) {
  if (value === undefined) return '';
  let displayValue = value;
  
  // Format timestamps
  if (['exp', 'nbf', 'iat', 'auth_time'].includes(label) && typeof value === 'number') {
    displayValue = formatTimestamp(value);
  }
  
  return `<div><span class="label">${label}:</span> <span class="claim">${displayValue}</span></div>`;
}

decodeBtn.addEventListener('click', () => {
  const token = input.value.trim();
  if (!token) {
    output.innerHTML = '<p class="error">Please enter a JWT token</p>';
    return;
  }
  
  const result = decodeJWT(token);
  
  if (result.error) {
    output.innerHTML = `<p class="error">${result.error}</p>`;
    return;
  }
  
  // Extract claims for summary
  const payloadObj = JSON.parse(result.payload);
  
  let html = `
    <div class="section header-section">
      <h3>Header</h3>
      <pre>${result.header}</pre>
    </div>
    
    <div class="section payload-section">
      <h3>Payload</h3>
      <pre>${result.payloadHighlighted}</pre>
    </div>
    
    <div class="section signature-section">
      <h3>Signature</h3>
      <pre>${result.signature}</pre>
      <p style="font-size:12px;color:#666;margin-top:0.5rem;">
        Note: Signature verification requires the secret key, which is not shown here.
      </p>
    </div>
  `;
  
  // Add timestamp info
  if (result.expStatus || result.nbfStatus) {
    html = '<div class="section" style="border-left:3px solid #e5c07b;">' +
      '<h3>Time Claims</h3>' +
      (result.expStatus ? `<div>${result.expStatus}</div>` : '') +
      (result.nbfStatus ? `<div>${result.nbfStatus}</div>` : '') +
      '</div>' + html;
  }
  
  output.innerHTML = html;
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  output.innerHTML = '';
});

// Auto-decode on paste
input.addEventListener('paste', () => {
  setTimeout(() => decodeBtn.click(), 100);
});
</script>
</body>
</html>
