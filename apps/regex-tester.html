<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regex Tester — Shadow's Garden</title>
<meta name="description" content="Test and debug regular expressions with real-time matching, highlights, and common patterns">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .regex-tester {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }
  .card {
    background: var(--card-bg, #1e1e2e);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border, #313244);
  }
  .input-group {
    margin-bottom: 1rem;
  }
  label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text-secondary, #a6adc8);
    font-size: 0.9rem;
  }
  input[type="text"], textarea {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--border, #313244);
    border-radius: 8px;
    background: var(--input-bg, #11111b);
    color: var(--text, #cdd6f4);
    font-size: 1rem;
    font-family: 'Fira Code', 'Consolas', monospace;
    box-sizing: border-box;
  }
  textarea {
    min-height: 120px;
    resize: vertical;
  }
  .regex-input-wrapper {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .regex-input-wrapper input {
    flex: 1;
    font-size: 1.1rem;
  }
  .flags {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }
  .flag-btn {
    padding: 0.4rem 0.75rem;
    border: 1px solid var(--border, #313244);
    border-radius: 6px;
    background: transparent;
    color: var(--text-secondary, #a6adc8);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .flag-btn.active {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
    border-color: var(--accent, #cba6f7);
  }
  .test-string {
    position: relative;
  }
  .test-string textarea {
    min-height: 150px;
  }
  .matches {
    margin-top: 1rem;
  }
  .match-count {
    font-size: 0.9rem;
    color: var(--text-secondary, #a6adc8);
    margin-bottom: 0.75rem;
  }
  .match-item {
    display: flex;
    gap: 1rem;
    padding: 0.75rem;
    background: var(--result-bg, #181825);
    border-radius: 8px;
    margin-bottom: 0.5rem;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 0.9rem;
  }
  .match-index {
    color: var(--accent, #cba6f7);
    font-weight: 600;
    min-width: 30px;
  }
  .match-text {
    color: var(--text, #cdd6f4);
    word-break: break-all;
  }
  .match-groups {
    color: var(--text-secondary, #a6adc8);
    font-size: 0.8rem;
    margin-top: 0.25rem;
  }
  .highlighted-text {
    padding: 1rem;
    background: var(--result-bg, #181825);
    border-radius: 8px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 0.95rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
  }
  .highlight {
    background: rgba(203, 166, 247, 0.3);
    border-radius: 3px;
    padding: 1px 2px;
  }
  .highlight.group1 { background: rgba(166, 227, 161, 0.3); }
  .highlight.group2 { background: rgba(137, 180, 250, 0.3); }
  .highlight.group3 { background: rgba(249, 226, 175, 0.3); }
  .error {
    color: #f38ba8;
    padding: 0.75rem;
    background: rgba(243, 139, 168, 0.1);
    border-radius: 8px;
    font-size: 0.9rem;
    margin-top: 0.5rem;
  }
  .common-patterns {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .pattern-btn {
    padding: 0.4rem 0.75rem;
    background: var(--button-bg, #313244);
    color: var(--text, #cdd6f4);
    border: none;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .pattern-btn:hover {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .tab-btn {
    padding: 0.5rem 1rem;
    background: transparent;
    border: 1px solid var(--border, #313244);
    border-radius: 6px;
    color: var(--text-secondary, #a6adc8);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
    border-color: var(--accent, #cba6f7);
  }
  .tab-content {
    display: none;
  }
  .tab-content.active {
    display: block;
  }
  .copy-btn {
    padding: 0.4rem 0.75rem;
    background: var(--button-bg, #313244);
    color: var(--text, #cdd6f4);
    border: none;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .copy-btn:hover {
    background: var(--accent, #cba6f7);
    color: var(--bg, #11111b);
  }
</style>
</head>
<body data-page-type="app">
<div class="regex-tester">
  <h1>🔍 Regex Tester</h1>
  
  <div class="card">
    <div class="input-group">
      <label>Pattern</label>
      <div class="regex-input-wrapper">
        <input type="text" id="regex-pattern" placeholder="Enter regex pattern...">
        <button class="copy-btn" onclick="copyPattern()">Copy</button>
      </div>
      <div class="flags">
        <button class="flag-btn active" data-flag="g" onclick="toggleFlag('g')">g — global</button>
        <button class="flag-btn active" data-flag="i" onclick="toggleFlag('i')">i — case insensitive</button>
        <button class="flag-btn active" data-flag="m" onclick="toggleFlag('m')">m — multiline</button>
        <button class="flag-btn" data-flag="s" onclick="toggleFlag('s')">s — dotall</button>
        <button class="flag-btn" data-flag="u" onclick="toggleFlag('u')">u — unicode</button>
      </div>
    </div>
    
    <div class="input-group">
      <label>Common Patterns</label>
      <div class="common-patterns">
        <button class="pattern-btn" onclick="setPattern('\\d+')">Digits</button>
        <button class="pattern-btn" onclick="setPattern('\\w+')">Word chars</button>
        <button class="pattern-btn" onclick="setPattern('[a-zA-Z]+')">Letters</button>
        <button class="pattern-btn" onclick="setPattern('\\s+')">Whitespace</button>
        <button class="pattern-btn" onclick="setPattern('^[\\w.-]+@[\\w.-]+\\.\\w+$')">Email</button>
        <button class="pattern-btn" onclick="setPattern('https?://[\\w.-]+(?:/[\\w./-]*)?')">URL</button>
        <button class="pattern-btn" onclick="setPattern('\\b\\d{3}[-.]?\\d{3}[-.]?\\d{4}\\b')">Phone</button>
        <button class="pattern-btn" onclick="setPattern('\\d{4}-\\d{2}-\\d{2}')">Date (YYYY-MM-DD)</button>
        <button class="pattern-btn" onclick="setPattern('#[0-9A-Fa-f]{6}')">Hex color</button>
        <button class="pattern-btn" onclick="setPattern('(\\w+)\\s*=\\s*([^&]*)')">URL param</button>
      </div>
    </div>
    
    <div class="input-group">
      <label>Test String</label>
      <textarea id="test-string" placeholder="Enter text to test against...">The quick brown fox jumps over the lazy dog.
Email: test@example.com
Phone: 555-123-4567
Date: 2026-03-13
Color: #cba6f7</textarea>
    </div>
  </div>
  
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('matches')">Matches</button>
      <button class="tab-btn" onclick="switchTab('highlighted')">Highlighted</button>
    </div>
    
    <div class="tab-content active" id="matches-tab">
      <div class="match-count" id="match-count"></div>
      <div class="matches" id="matches"></div>
    </div>
    
    <div class="tab-content" id="highlighted-tab">
      <div class="highlighted-text" id="highlighted"></div>
    </div>
  </div>
</div>

<script>
  let flags = { g: true, i: true, m: true, s: false, u: false };
  
  const patternInput = document.getElementById('regex-pattern');
  const testInput = document.getElementById('test-string');
  
  patternInput.addEventListener('input', runTest);
  testInput.addEventListener('input', runTest);
  
  function toggleFlag(flag) {
    flags[flag] = !flags[flag];
    document.querySelectorAll('.flag-btn').forEach(btn => {
      if (btn.dataset.flag === flag) {
        btn.classList.toggle('active', flags[flag]);
      }
    });
    runTest();
  }
  
  function setPattern(pattern) {
    patternInput.value = pattern;
    runTest();
  }
  
  function copyPattern() {
    navigator.clipboard.writeText(patternInput.value);
  }
  
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById(`${tab}-tab`).classList.add('active');
  }
  
  function runTest() {
    const pattern = patternInput.value;
    const testString = testInput.value;
    const matchesDiv = document.getElementById('matches');
    const matchCount = document.getElementById('match-count');
    const highlightedDiv = document.getElementById('highlighted');
    
    if (!pattern) {
      matchesDiv.innerHTML = '';
      matchCount.textContent = '';
      highlightedDiv.textContent = testString;
      return;
    }
    
    let flagStr = '';
    for (let f in flags) if (flags[f]) flagStr += f;
    
    try {
      const regex = new RegExp(pattern, flagStr);
      
      if (flagStr.includes('g')) {
        let match;
        let matches = [];
        while ((match = regex.exec(testString)) !== null) {
          matches.push({
            text: match[0],
            index: match.index,
            groups: match.slice(1)
          });
          if (match.index === regex.lastIndex) regex.lastIndex++;
        }
        
        renderMatches(matches, testString);
      } else {
        const match = regex.exec(testString);
        renderMatches(match ? [{ text: match[0], index: match.index, groups: match.slice(1) }] : [], testString);
      }
    } catch (e) {
      matchesDiv.innerHTML = `<div class="error">Error: ${e.message}</div>`;
      matchCount.textContent = '';
      highlightedDiv.textContent = testString;
    }
  }
  
  function renderMatches(matches, testString) {
    const matchesDiv = document.getElementById('matches');
    const matchCount = document.getElementById('match-count');
    const highlightedDiv = document.getElementById('highlighted');
    
    if (matches.length === 0) {
      matchesDiv.innerHTML = '<div class="match-count">No matches</div>';
      matchCount.textContent = '';
      highlightedDiv.textContent = testString;
      return;
    }
    
    matchCount.textContent = `${matches.length} match${matches.length === 1 ? '' : 'es'} found`;
    
    matchesDiv.innerHTML = matches.map((m, i) => `
      <div class="match-item">
        <span class="match-index">${i + 1}</span>
        <div>
          <span class="match-text">${escapeHtml(m.text)}</span>
          ${m.groups.length > 0 ? `<div class="match-groups">Groups: ${m.groups.map((g, gi) => `$${gi + 1}: "${g || ''}"`).join(', ')}</div>` : ''}
        </div>
      </div>
    `).join('');
    
    // Highlight in text
    let highlighted = testString;
    let offset = 0;
    matches.forEach((m, i) => {
      const before = highlighted.slice(0, m.index + offset);
      const match = highlighted.slice(m.index + offset, m.index + offset + m.text.length);
      const after = highlighted.slice(m.index + offset + m.text.length);
      highlighted = `${before}<span class="highlight">${escapeHtml(match)}</span>${after}`;
      offset += `<span class="highlight"></span>`.length - m.text.length;
    });
    highlightedDiv.innerHTML = highlighted;
  }
  
  function escapeHtml(text) {
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  
  // Initial run
  runTest();
</script>
</body>
</html>
