<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regex Tester — Shadow's Garden</title>
<meta name="description">Test regular expressions with live matching. All local, no tracking.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .regex-tool { max-width: 700px; margin: 0 auto; }
  .input-group { margin-bottom: 20px; }
  .input-group label { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  textarea {
    width: 100%; min-height: 100px; padding: 14px; border: 2px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-size: 14px; font-family: var(--mono); resize: vertical; box-sizing: border-box;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .flags { display: flex; gap: 8px; margin-bottom: 16px; }
  .flag-btn {
    padding: 8px 14px; border: 2px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer;
  }
  .flag-btn:hover { border-color: var(--accent); }
  .flag-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .matches { margin-top: 20px; }
  .match-item {
    padding: 10px 14px; background: var(--bg); border: 2px solid var(--border); border-radius: 8px; margin-bottom: 8px;
  }
  .match-text { font-family: var(--mono); font-size: 14px; color: var(--text); word-break: break-all; }
  .match-index { font-size: 12px; color: var(--text-secondary); }
  .no-matches { color: #666; font-size: 14px; padding: 20px; text-align: center; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="regex-tool">
    <h1>Regex Tester</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Test regular expressions with live matching.</p>
    
    <div class="input-group">
      <label>Regular Expression</label>
      <textarea id="regex" placeholder="e.g., \d+,[a-z]+"></textarea>
    </div>
    
    <div class="flags">
      <button class="flag-btn active" onclick="toggleFlag('g', this)">global (g)</button>
      <button class="flag-btn active" onclick="toggleFlag('i', this)">case-insensitive (i)</button>
      <button class="flag-btn" onclick="toggleFlag('m', this)">multiline (m)</button>
    </div>
    
    <div class="input-group">
      <label>Test String</label>
      <textarea id="test" placeholder="Enter text to test..." oninput="testRegex()"></textarea>
    </div>
    
    <div class="matches" id="matches"></div>
  </div>
</div>
<script>
  let flags = 'gi';
  
  function toggleFlag(flag, btn) {
    if (flags.includes(flag)) {
      flags = flags.replace(flag, '');
      btn.classList.remove('active');
    } else {
      flags += flag;
      btn.classList.add('active');
    }
    testRegex();
  }
  
  function testRegex() {
    const regex = document.getElementById('regex').value;
    const test = document.getElementById('test').value;
    const matchesDiv = document.getElementById('matches');
    
    if (!regex || !test) {
      matchesDiv.innerHTML = '';
      return;
    }
    
    try {
      const re = new RegExp(regex, flags);
      const matches = test.match(re);
      
      if (!matches) {
        matchesDiv.innerHTML = '<div class="no-matches">No matches found</div>';
        return;
      }
      
      matchesDiv.innerHTML = matches.map((m, i) => `
        <div class="match-item">
          <div class="match-text">${m}</div>
          <div class="match-index">Match ${i + 1}</div>
        </div>
      `).join('');
    } catch (e) {
      matchesDiv.innerHTML = '<div class="no-matches">Invalid regex: ' + e.message + '</div>';
    }
  }
</script>
</body>
</html>
