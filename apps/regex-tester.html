<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regex Tester — Shadow's Garden</title>
<meta name="description" content="Test and debug regular expressions with real-time matching, flags, and syntax highlighting — all local.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e5e5e5; padding: 2rem; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .subtitle { color: #666; margin-bottom: 2rem; }
  .section { margin-bottom: 1.5rem; }
  label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; }
  input[type="text"], textarea { width: 100%; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #e5e5e5; font-family: 'Monaco', 'Consolas', monospace; font-size: 0.95rem; }
  input[type="text"]:focus, textarea:focus { outline: none; border-color: #6cb6ff; }
  textarea { min-height: 120px; resize: vertical; }
  .flags { display: flex; gap: 1rem; margin-top: 0.5rem; }
  .flag label { display: inline; color: #e5e5e5; cursor: pointer; }
  .results { background: #141414; border: 1px solid #333; border-radius: 6px; padding: 1rem; min-height: 100px; }
  .match { background: #1a2e1a; color: #7af782; padding: 0.25rem 0.5rem; border-radius: 3px; margin: 0.25rem 0; display: inline-block; }
  .no-match { color: #666; }
  .error { color: #f77a7a; }
  .hint { font-size: 0.8rem; color: #666; margin-top: 0.5rem; }
  .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
  button { padding: 0.5rem 1rem; background: #1a1a2e; color: #7aa2f7; border: 1px solid #333; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
  button:hover { border-color: #7aa2f7; }
  .output-info { font-size: 0.85rem; color: #666; margin-bottom: 0.5rem; }
</style>
</head>
<body data-page-type="app">
  <div class="nav" style="margin-bottom: 2rem;">
    <a href="index.html">← Back</a>
  </div>
  
  <h1>Regex Tester</h1>
  <p class="subtitle">Test regular expressions with real-time matching</p>

  <div class="section">
    <label>Regular Expression</label>
    <input type="text" id="regex" placeholder="e.g., \b\w{4}\b" value="">
    <div class="flags">
      <span class="flag"><label><input type="checkbox" id="flag-g" checked> Global</label></span>
      <span class="flag"><label><input type="checkbox" id="flag-i"> Case Insensitive</label></span>
      <span class="flag"><label><input type="checkbox" id="flag-m"> Multiline</label></span>
    </div>
  </div>

  <div class="section">
    <label>Test String</label>
    <textarea id="testString" placeholder="Enter text to test against...">The quick brown fox jumps over the lazy dog.</textarea>
  </div>

  <div class="section">
    <div class="output-info" id="matchCount"></div>
    <div class="results" id="results"></div>
  </div>

  <div class="actions">
    <button onclick="testRegex()">Test</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <p class="hint">Pattern updates automatically as you type.</p>

  <script>
    const regexInput = document.getElementById('regex');
    const testInput = document.getElementById('testString');
    const resultsDiv = document.getElementById('results');
    const matchCountDiv = document.getElementById('matchCount');
    const flagG = document.getElementById('flag-g');
    const flagI = document.getElementById('flag-i');
    const flagM = document.getElementById('flag-m');

    function testRegex() {
      const pattern = regexInput.value;
      const testStr = testInput.value;
      
      if (!pattern) {
        resultsDiv.innerHTML = '<span class="no-match">Enter a pattern to test</span>';
        matchCountDiv.textContent = '';
        return;
      }

      try {
        let flags = 'g';
        if (flagI.checked) flags += 'i';
        if (flagM.checked) flags += 'm';
        
        const re = new RegExp(pattern, flags);
        const matches = testStr.match(re);
        
        if (matches) {
          let html = '';
          matches.forEach((m, i) => {
            html += `<span class="match">${escapeHtml(m)}</span>${i < matches.length - 1 ? ' ' : ''}`;
          });
          resultsDiv.innerHTML = html;
          matchCountDiv.textContent = `${matches.length} match${matches.length !== 1 ? 'es' : ''} found`;
        } else {
          resultsDiv.innerHTML = '<span class="no-match">No matches</span>';
          matchCountDiv.textContent = '0 matches';
        }
      } catch (e) {
        resultsDiv.innerHTML = `<span class="error">Error: ${escapeHtml(e.message)}</span>`;
        matchCountDiv.textContent = '';
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function clearAll() {
      regexInput.value = '';
      testInput.value = '';
      resultsDiv.innerHTML = '';
      matchCountDiv.textContent = '';
    }

    regexInput.addEventListener('input', testRegex);
    testInput.addEventListener('input', testRegex);
    flagG.addEventListener('change', testRegex);
    flagI.addEventListener('change', testRegex);
    flagM.addEventListener('change', testRegex);

    // Initial test
    testRegex();
  </script>
</body>
</html>
