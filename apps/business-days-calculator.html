<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Days Calculator — Shadow's Garden</title>
<meta name="description" content="Calculate business days between two dates. Excludes weekends and optionally US federal holidays.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .description { color: var(--muted); margin-bottom: 1.5rem; }
  .input-group { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .input-group > div { flex: 1; min-width: 140px; }
  .input-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text); }
  .input-group input { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; background: var(--bg); color: var(--text); box-sizing: border-box; }
  .input-group input:focus { outline: none; border-color: var(--accent); }
  .options { margin-bottom: 1.5rem; padding: 1rem; background: var(--card); border-radius: 8px; }
  .options label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
  .options input[type="checkbox"] { width: auto; }
  button { background: var(--accent); color: var(--bg); border: none; padding: 0.75rem 2rem; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; }
  button:hover { opacity: 0.9; }
  .result { margin-top: 2rem; padding: 1.5rem; background: var(--card); border-radius: 12px; display: none; }
  .result.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .result-value { font-size: 2.5rem; font-weight: 700; color: var(--accent); text-align: center; }
  .result-label { text-align: center; color: var(--muted); margin-top: 0.5rem; }
  .breakdown { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 1rem; text-align: center; }
  .breakdown .item .val { font-weight: 700; font-size: 1.2rem; }
  .breakdown .item .lbl { font-size: 0.85rem; color: var(--muted); }
  .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .presets button { padding: 0.5rem 1rem; font-size: 0.9rem; background: var(--card); color: var(--text); border: 2px solid var(--border); }
  .presets button:hover { background: var(--border); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Business Days Calculator</h1>
  <p class="description">Calculate working days between two dates. Excludes weekends by default.</p>
  
  <div class="presets">
    <button onclick="setPreset('week')">Past Week</button>
    <button onclick="setPreset('month')">Past Month</button>
    <button onclick="setPreset('quarter')">Past Quarter</button>
    <button onclick="setPreset('year')">Past Year</button>
  </div>
  
  <div class="input-group">
    <div>
      <label for="startDate">Start Date</label>
      <input type="date" id="startDate">
    </div>
    <div>
      <label for="endDate">End Date</label>
      <input type="date" id="endDate">
    </div>
  </div>
  
  <div class="options">
    <label>
      <input type="checkbox" id="excludeHolidays">
      Exclude US Federal Holidays
    </label>
  </div>
  
  <button onclick="calculate()">Calculate</button>
  
  <div class="result" id="result">
    <div class="result-value" id="businessDays">0</div>
    <div class="result-label">Business Days</div>
    <div class="breakdown">
      <div class="item"><div class="val" id="totalDays">0</div><div class="lbl">Total Days</div></div>
      <div class="item"><div class="val" id="weekends">0</div><div class="lbl">Weekends</div></div>
      <div class="item"><div class="val" id="holidays">0</div><div class="lbl">Holidays</div></div>
    </div>
  </div>
</div>

<script>
// US Federal Holidays (fixed dates and calculated dates)
function getFederalHolidays(year) {
  return [
    // New Year's Day (Jan 1)
    new Date(year, 0, 1),
    // MLK Day (3rd Monday in January)
    new Date(year, 0, getNthWeekday(1, 3, year)),
    // Presidents Day (3rd Monday in February)
    new Date(year, 1, getNthWeekday(1, 3, year)),
    // Memorial Day (last Monday in May)
    new Date(year, 4, getLastWeekday(1, year),
    // Independence Day (July 4)
    new Date(year, 6, 4),
    // Labor Day (1st Monday in September)
    new Date(year, 8, getNthWeekday(1, 1, year)),
    // Columbus Day (2nd Monday in October)
    new Date(year, 9, getNthWeekday(1, 2, year)),
    // Veterans Day (Nov 11)
    new Date(year, 10, 11),
    // Thanksgiving (4th Thursday in November)
    new Date(year, 10, getNthWeekday(4, 4, year)),
    // Christmas (Dec 25)
    new Date(year, 11, 25)
  ].map(d => d.getTime());
}

function getNthWeekday(month, n, year) {
  const date = new Date(year, month, 1);
  let count = 0;
  for (let d = 1; d <= 31 && date.getMonth() === month; d++) {
    if (date.getDay() === n) {
      count++;
      if (count === 4) return d;
    }
    date.setDate(date.getDate() + 1);
  }
  return 1;
}

function getLastWeekday(weekday, year) {
  const date = new Date(year, 11, 31);
  while (date.getDay() !== weekday) {
    date.setDate(date.getDate() - 1);
  }
  return date.getDate();
}

let cachedHolidays = {};

function calculate() {
  const startInput = document.getElementById('startDate').value;
  const endInput = document.getElementById('endDate').value;
  const excludeHolidays = document.getElementById('excludeHolidays').checked;
  const resultEl = document.getElementById('result');
  
  if (!startInput || !endInput) {
    alert('Please select both dates');
    return;
  }
  
  let start = new Date(startInput);
  let end = new Date(endInput);
  
  if (start > end) {
    [start, end] = [end, start];
  }
  
  // Normalize to midnight
  start.setHours(0, 0, 0, 0);
  end.setHours(0, 0, 0, 0);
  
  let businessDays = 0;
  let weekendDays = 0;
  let holidayDays = 0;
  
  const current = new Date(start);
  const endTime = end.getTime();
  
  // Get holidays for the year range
  const startYear = start.getFullYear();
  const endYear = end.getFullYear();
  let holidaySet = new Set();
  
  if (excludeHolidays) {
    for (let y = startYear; y <= endYear; y++) {
      if (!cachedHolidays[y]) {
        cachedHolidays[y] = getFederalHolidays(y);
      }
      cachedHolidays[y].forEach(h => holidaySet.add(h));
    }
  }
  
  while (current.getTime() <= endTime) {
    const dayOfWeek = current.getDay();
    const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
    const is Holiday = holidaySet.has(current.getTime());
    
    if (!isWeekend && !isHoliday) {
      businessDays++;
    } else if (isWeekend) {
      weekendDays++;
    } else if (isHoliday) {
      holidayDays++;
    }
    
    current.setDate(current.getDate() + 1);
  }
  
  const totalDays = Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;
  
  document.getElementById('businessDays').textContent = businessDays;
  document.getElementById('totalDays').textContent = totalDays;
  document.getElementById('weekends').textContent = weekendDays;
  document.getElementById('holidays').textContent = holidayDays;
  
  resultEl.classList.add('show');
}

function setPreset(type) {
  const end = new Date();
  const start = new Date();
  
  switch(type) {
    case 'week':
      start.setDate(start.getDate() - 7);
      break;
    case 'month':
      start.setMonth(start.getMonth() - 1);
      break;
    case 'quarter':
      start.setMonth(start.getMonth() - 3);
      break;
    case 'year':
      start.setFullYear(start.getFullYear() - 1);
      break;
  }
  
  document.getElementById('startDate').value = start.toISOString().split('T')[0];
  document.getElementById('endDate').value = end.toISOString().split('T')[0];
}

// Set default dates
const today = new Date();
const lastMonth = new Date();
lastMonth.setMonth(lastMonth.getMonth() - 1);

document.getElementById('startDate').value = lastMonth.toISOString().split('T')[0];
document.getElementById('endDate').value = today.toISOString().split('T')[0];
</script>
</body>
</html>
