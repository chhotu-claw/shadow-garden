<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area Converter — Shadow's Garden</title>
<meta name="description" content="Convert between sq ft, sq m, acres, hectares, and more. Instant area conversions.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .converter-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    max-width: 500px;
    margin: 0 auto;
  }
  .input-group {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .input-group input {
    flex: 1;
    min-width: 120px;
  }
  .input-group select {
    min-width: 140px;
  }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
  }
  .result-item {
    background: var(--bg-tertiary);
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
  }
  .result-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-bottom: 0.25rem;
  }
  .result-value {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
  }
  .hero {
    text-align: center;
    padding: 1.5rem 0;
  }
  .hero h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }
  .hero p {
    color: var(--text-secondary);
  }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="hero">
    <h1>Area Converter</h1>
    <p>Convert between sq ft, sq m, acres, hectares, and more</p>
  </div>
  
  <div class="converter-card">
    <div class="input-group">
      <input type="number" id="area-input" placeholder="Enter area" oninput="convert()" step="any">
      <select id="area-unit" onchange="convert()">
        <option value="sqm">Square meters (m²)</option>
        <option value="sqft">Square feet (ft²)</option>
        <option value="sqkm">Square kilometers (km²)</option>
        <option value="sqmi">Square miles (mi²)</option>
        <option value="acre">Acres</option>
        <option value="hectare">Hectares</option>
        <option value="sqin">Square inches (in²)</option>
        <option value="sqyd">Square yards (yd²)</option>
      </select>
    </div>
    
    <div class="results-grid">
      <div class="result-item">
        <div class="result-label">Square meters</div>
        <div class="result-value" id="r-sqm">—</div>
      </div>
      <div class="result-item">
        <div class="result-label">Square feet</div>
        <div class="result-value" id="r-sqft">—</div>
      </div>
      <div class="result-item">
        <div class="result-label">Acres</div>
        <div class="result-value" id="r-acre">—</div>
      </div>
      <div class="result-item">
        <div class="result-label">Hectares</div>
        <div class="result-value" id="r-hectare">—</div>
      </div>
      <div class="result-item">
        <div class="result-label">Square km</div>
        <div class="result-value" id="r-sqkm">—</div>
      </div>
      <div class="result-item">
        <div class="result-label">Square miles</div>
        <div class="result-value" id="r-sqmi">—</div>
      </div>
    </div>
  </div>
</div>

<script>
  const conversions = {
    sqm: 1,
    sqft: 10.7639,
    sqkm: 0.000001,
    sqmi: 0.000000386102,
    acre: 0.000247105,
    hectare: 0.0001,
    sqin: 1550.0031,
    sqyd: 1.19599
  };

  function format(num) {
    if (isNaN(num)) return '—';
    if (num === 0) return '0';
    if (num < 0.0001 || num > 10000000) {
      return num.toExponential(4);
    }
    if (Number.isInteger(num)) return num;
    const s = num.toString();
    if (s.length > 10) return num.toPrecision(6);
    return num;
  }

  function convert() {
    const val = parseFloat(document.getElementById('area-input').value);
    const unit = document.getElementById('area-unit').value;
    
    if (isNaN(val)) {
      ['sqm','sqft','acre','hectare','sqkm','sqmi'].forEach(id => {
        document.getElementById('r-' + id).textContent = '—';
      });
      return;
    }
    
    const sqm = val * conversions[unit];
    
    document.getElementById('r-sqm').textContent = format(sqm);
    document.getElementById('r-sqft').textContent = format(sqm * conversions.sqft);
    document.getElementById('r-acre').textContent = format(sqm * conversions.acre);
    document.getElementById('r-hectare').textContent = format(sqm * conversions.hectare);
    document.getElementById('r-sqkm').textContent = format(sqm * conversions.sqkm);
    document.getElementById('r-sqmi').textContent = format(sqm * conversions.sqmi);
  }
</script>
</body>
</html>
