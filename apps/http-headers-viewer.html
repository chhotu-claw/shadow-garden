<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTTP Headers Viewer — Shadow's Garden</title>
<meta name="description" content="Enter any URL to view all HTTP response headers. See content-type, caching, security headers and more.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-mono); }
  .input-section { margin-bottom: 2rem; }
  .url-input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 2px solid var(--color-border);
    border-radius: 8px;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-mono);
  }
  .fetch-btn {
    margin-top: 12px;
    padding: 12px 24px;
    background: var(--color-accent);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
  }
  .fetch-btn:hover { opacity: 0.9; }
  .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .headers-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .headers-table th, .headers-table td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--color-border);
  }
  .headers-table th {
    background: var(--color-bg-secondary);
    font-weight: 600;
  }
  .header-name { color: var(--color-accent); font-weight: 500; }
  .header-value { 
    word-break: break-all; 
    max-width: 400px;
  }
  .status-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 14px;
  }
  .status-2xx { background: #d1fae5; color: #065f46; }
  .status-3xx { background: #fef3c7; color: #92400e; }
  .status-4xx { background: #fee2e2; color: #991b1b; }
  .status-5xx { background: #fee2e2; color: #991b1b; }
  .status-other { background: #e5e7eb; color: #374151; }
  .error { color: #dc2626; padding: 16px; background: #fef2f2; border-radius: 8px; }
  .info-row { display: flex; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
  .info-item { font-size: 14px; }
  .info-label { color: var(--color-text-secondary); }
  .info-value { font-weight: 500; }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--color-text-secondary);
    margin: 24px 0 12px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .copy-all-btn {
    padding: 8px 16px;
    background: var(--color-bg-secondary);
    border: 1px solid var(--color-border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .copy-all-btn:hover { background: var(--color-border); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>HTTP Headers Viewer</h1>
  <p style="color: var(--color-text-secondary); margin-bottom: 24px;">Enter any URL to see all HTTP response headers. Useful for debugging, checking security headers, and understanding how servers respond.</p>
  
  <div class="input-section">
    <input type="text" id="urlInput" class="url-input" placeholder="https://example.com" value="https://">
    <br>
    <button id="fetchBtn" class="fetch-btn">Fetch Headers</button>
  </div>
  
  <div id="results"></div>
</div>

<script>
const urlInput = document.getElementById('urlInput');
const fetchBtn = document.getElementById('fetchBtn');
const results = document.getElementById('results');

function getStatusClass(status) {
  if (status >= 200 && status < 300) return 'status-2xx';
  if (status >= 300 && status < 400) return 'status-3xx';
  if (status >= 400 && status < 500) return 'status-4xx';
  if (status >= 500) return 'status-5xx';
  return 'status-other';
}

function formatHeaderValue(value) {
  if (!value) return '<span style="color: var(--color-text-secondary)">—</span>';
  return value;
}

async function fetchHeaders() {
  let url = urlInput.value.trim();
  if (!url) {
    results.innerHTML = '<p class="error">Please enter a URL</p>';
    return;
  }
  if (!url.startsWith('http')) {
    url = 'https://' + url;
  }
  
  fetchBtn.disabled = true;
  fetchBtn.textContent = 'Fetching...';
  results.innerHTML = '';
  
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);
    
    const response = await fetch(url, { 
      method: 'HEAD',
      signal: controller.signal,
      redirect: 'follow'
    });
    clearTimeout(timeout);
    
    const headers = [];
    for (const [name, value] of response.headers) {
      headers.push({ name, value });
    }
    
    const statusClass = getStatusClass(response.status);
    let html = `
      <div class="info-row">
        <div class="info-item">
          <span class="info-label">Status:</span>
          <span class="status-badge ${statusClass}">${response.status} ${response.statusText}</span>
        </div>
        <div class="info-item">
          <span class="info-label">URL:</span>
          <span class="info-value">${response.url}</span>
        </div>
      </div>
      <button class="copy-all-btn" onclick="copyAllHeaders()">Copy All Headers</button>
      <table class="headers-table">
        <thead>
          <tr>
            <th>Header</th>
            <th>Value</th>
          </tr>
        </thead>
        <tbody>
    `;
    
    const securityHeaders = ['content-security-policy', 'strict-transport-security', 'x-frame-options', 'x-content-type-options', 'referrer-policy', 'permissions-policy', 'x-xss-protection'];
    const cachingHeaders = ['cache-control', 'expires', 'etag', 'last-modified', 'age', 'vary', 'pragma'];
    const contentHeaders = ['content-type', 'content-length', 'content-encoding', 'content-language'];
    const otherHeaders = [];
    
    headers.forEach(h => {
      const lowerName = h.name.toLowerCase();
      if (securityHeaders.includes(lowerName)) {
        // handled separately
      } else if (cachingHeaders.includes(lowerName)) {
        // handled separately
      } else if (contentHeaders.includes(lowerName)) {
        // handled separately
      } else {
        otherHeaders.push(h);
      }
    });
    
    const security = headers.filter(h => securityHeaders.includes(h.name.toLowerCase()));
    const caching = headers.filter(h => cachingHeaders.includes(h.name.toLowerCase()));
    const content = headers.filter(h => contentHeaders.includes(h.name.toLowerCase()));
    
    if (security.length > 0) {
      html += `<tr><td colspan="2" class="section-title">Security Headers</td></tr>`;
      security.forEach(h => {
        html += `<tr><td class="header-name">${h.name}</td><td class="header-value">${formatHeaderValue(h.value)}</td></tr>`;
      });
    }
    
    if (content.length > 0) {
      html += `<tr><td colspan="2" class="section-title">Content Headers</td></tr>`;
      content.forEach(h => {
        html += `<tr><td class="header-name">${h.name}</td><td class="header-value">${formatHeaderValue(h.value)}</td></tr>`;
      });
    }
    
    if (caching.length > 0) {
      html += `<tr><td colspan="2" class="section-title">Caching Headers</td></tr>`;
      caching.forEach(h => {
        html += `<tr><td class="header-name">${h.name}</td><td class="header-value">${formatHeaderValue(h.value)}</td></tr>`;
      });
    }
    
    otherHeaders.forEach(h => {
      html += `<tr><td class="header-name">${h.name}</td><td class="header-value">${formatHeaderValue(h.value)}</td></tr>`;
    });
    
    html += `</tbody></table>`;
    results.innerHTML = html;
    
    window.lastHeaders = headers;
    
  } catch (error) {
    let errorMsg = 'Failed to fetch headers';
    if (error.name === 'AbortError') {
      errorMsg = 'Request timed out (10s). The server might be slow or blocking requests.';
    } else if (error.message.includes('Failed to fetch')) {
      errorMsg = 'CORS error or network issue. The server may not be allowing cross-origin requests. Try a different URL.';
    }
    results.innerHTML = `<p class="error">${errorMsg}</p>`;
  }
  
  fetchBtn.disabled = false;
  fetchBtn.textContent = 'Fetch Headers';
}

function copyAllHeaders() {
  if (!window.lastHeaders) return;
  const text = window.lastHeaders.map(h => `${h.name}: ${h.value}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-all-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy All Headers', 2000);
  });
}

fetchBtn.addEventListener('click', fetchHeaders);
urlInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') fetchHeaders();
});
</script>
</div>
</body>
</html>
