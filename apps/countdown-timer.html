<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer — Shadow's Garden</title>
<meta name="description" content="Count down to any date. Add multiple countdowns and see days remaining.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem; }
  .input-group { margin-bottom: 1rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
  input[type="text"], input[type="date"], input[type="datetime-local"] { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 1rem; box-sizing: border-box; }
  button { padding: 0.75rem 1.5rem; border: none; border-radius: 6px; background: var(--accent); color: var(--bg); cursor: pointer; font-size: 1rem; font-weight: 500; }
  button:hover { opacity: 0.9; }
  .countdowns { margin-top: 2rem; }
  .countdown-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
  .countdown-info { flex: 1; }
  .countdown-title { font-weight: 600; margin-bottom: 0.25rem; }
  .countdown-date { font-size: 0.85rem; color: var(--text-secondary); }
  .countdown-days { font-size: 1.5rem; font-weight: 700; color: var(--accent); min-width: 80px; text-align: right; }
  .countdown-days.overdue { color: #ef4444; }
  .delete-btn { background: transparent; color: var(--text-secondary); border: none; padding: 0.5rem; font-size: 1.2rem; cursor: pointer; margin-left: 0.5rem; }
  .delete-btn:hover { color: #ef4444; }
  .empty { text-align: center; color: var(--text-secondary); padding: 2rem; }
  .presets { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
  .preset-btn { padding: 0.4rem 0.8rem; font-size: 0.8rem; background: var(--border); color: var(--text); border-radius: 4px; border: none; cursor: pointer; }
  .preset-btn:hover { background: var(--text-secondary); }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Countdown Timer</h1>
  <div class="subtitle">Track days until important dates</div>

  <div class="input-group">
    <label>Event Name</label>
    <input type="text" id="eventName" placeholder="e.g., Vacation, Birthday, Deadline">
  </div>

  <div class="input-group">
    <label>Date & Time</label>
    <input type="datetime-local" id="eventDate">
    <div class="presets">
      <button class="preset-btn" onclick="setPreset(1)">Tomorrow</button>
      <button class="preset-btn" onclick="setPreset(7)">1 Week</button>
      <button class="preset-btn" onclick="setPreset(30)">1 Month</button>
      <button class="preset-btn" onclick="setPreset(365)">1 Year</button>
    </div>
  </div>

  <button onclick="addCountdown()">Add Countdown</button>

  <div class="countdowns" id="countdowns"></div>
</div>

<script>
const countdowns = JSON.parse(localStorage.getItem('countdowns') || '[]');

function save() {
  localStorage.setItem('countdowns', JSON.stringify(countdowns));
  render();
}

function setPreset(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  d.setHours(23, 59, 59, 999);
  document.getElementById('eventDate').value = d.toISOString().slice(0, 16);
}

function addCountdown() {
  const name = document.getElementById('eventName').value.trim();
  const dateStr = document.getElementById('eventDate').value;
  
  if (!name || !dateStr) {
    alert('Please enter event name and date');
    return;
  }
  
  countdowns.push({ name, date: dateStr, id: Date.now() });
  document.getElementById('eventName').value = '';
  document.getElementById('eventDate').value = '';
  save();
}

function deleteCountdown(id) {
  const idx = countdowns.findIndex(c => c.id === id);
  if (idx > -1) {
    countdowns.splice(idx, 1);
    save();
  }
}

function getDaysRemaining(dateStr) {
  const target = new Date(dateStr);
  const now = new Date();
  const diff = target - now;
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-US', { 
    weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
  });
}

function render() {
  const container = document.getElementById('countdowns');
  
  if (countdowns.length === 0) {
    container.innerHTML = '<div class="empty">No countdowns yet. Add one above!</div>';
    return;
  }
  
  const sorted = [...countdowns].sort((a, b) => new Date(a.date) - new Date(b.date));
  
  container.innerHTML = sorted.map(c => {
    const days = getDaysRemaining(c.date);
    const isOverdue = days < 0;
    const label = isOverdue ? 'days ago' : 'days left';
    return `
      <div class="countdown-card">
        <div class="countdown-info">
          <div class="countdown-title">${c.name}</div>
          <div class="countdown-date">${formatDate(c.date)}</div>
        </div>
        <div class="countdown-days ${isOverdue ? 'overdue' : ''}">${Math.abs(days)} ${label}</div>
        <button class="delete-btn" onclick="deleteCountdown(${c.id})">×</button>
      </div>
    `;
  }).join('');
}

render();
</script>
</body>
</html>
