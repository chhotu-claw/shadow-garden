<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer — Shadow's Garden</title>
<meta name="description" content="Countdown to any date or event. Track countdowns for birthdays, deadlines, trips, anything.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { font-family: var(--font-mono); }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .input-group { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  input, button { 
    padding: 0.75rem 1rem; 
    font-size: 1rem; 
    border: 2px solid var(--color-border);
    border-radius: 8px;
    background: var(--color-bg);
    color: var(--color-text);
  }
  input[type="text"], input[type="date"], input[type="time"] { flex: 1; min-width: 150px; }
  button { 
    background: var(--color-accent); 
    color: var(--color-bg); 
    border: none; 
    cursor: pointer;
    font-weight: 600;
  }
  button:hover { opacity: 0.9; }
  button.secondary { background: var(--color-border); }
  
  .countdowns { display: flex; flex-direction: column; gap: 1rem; }
  .countdown-card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .countdown-info { flex: 1; min-width: 200px; }
  .countdown-title { font-weight: 600; font-size: 1.1rem; margin-bottom: 0.25rem; }
  .countdown-date { font-size: 0.85rem; color: var(--color-muted); }
  .countdown-time { 
    font-size: 2rem; 
    font-weight: 700; 
    color: var(--color-accent);
    font-variant-numeric: tabular-nums;
  }
  .countdown-time.ended { color: var(--color-muted); font-size: 1.25rem; }
  .countdown-actions { display: flex; gap: 0.5rem; }
  .countdown-actions button { 
    padding: 0.5rem 0.75rem; 
    font-size: 0.85rem; 
  }
  .empty { 
    text-align: center; 
    color: var(--color-muted); 
    padding: 3rem 1rem;
  }
  .presets { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .presets button { background: var(--color-border); font-size: 0.85rem; padding: 0.5rem 0.75rem; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <h1>Countdown Timer</h1>
  
  <div class="input-group">
    <input type="text" id="eventName" placeholder="Event name (e.g., Birthday, Deadline)">
    <input type="date" id="eventDate">
    <input type="time" id="eventTime" value="00:00">
    <button onclick="addCountdown()">Add</button>
  </div>
  
  <div class="presets">
    <button onclick="preset(1)">+1 Day</button>
    <button onclick="preset(7)">+1 Week</button>
    <button onclick="preset(30)">+1 Month</button>
  </div>
  
  <div id="countdowns" class="countdowns"></div>
</div>

<script>
  let countdowns = JSON.parse(localStorage.getItem('countdowns') || '[]');

  function save() {
    localStorage.setItem('countdowns', JSON.stringify(countdowns));
    render();
  }

  function addCountdown() {
    const name = document.getElementById('eventName').value.trim();
    const date = document.getElementById('eventDate').value;
    const time = document.getElementById('eventTime').value || '00:00';
    
    if (!name || !date) {
      alert('Please enter event name and date');
      return;
    }
    
    const target = new Date(`${date}T${time}`);
    if (isNaN(target.getTime())) {
      alert('Invalid date');
      return;
    }
    
    countdowns.push({ id: Date.now(), name, target: target.toISOString() });
    countdowns.sort((a, b) => new Date(a.target) - new Date(b.target));
    
    document.getElementById('eventName').value = '';
    save();
  }

  function remove(id) {
    countdowns = countdowns.filter(c => c.id !== id);
    save();
  }

  function preset(days) {
    const d = new Date();
    d.setDate(d.getDate() + days);
    document.getElementById('eventDate').value = d.toISOString().split('T')[0];
  }

  function render() {
    const container = document.getElementById('countdowns');
    
    if (countdowns.length === 0) {
      container.innerHTML = '<div class="empty">No countdowns yet. Add one above!</div>';
      return;
    }
    
    container.innerHTML = countdowns.map(c => {
      const now = new Date();
      const target = new Date(c.target);
      const diff = target - now;
      
      let timeStr;
      if (diff <= 0) {
        timeStr = 'ENDED';
      } else {
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);
        
        if (days > 0) {
          timeStr = `${days}d ${hours}h`;
        } else if (hours > 0) {
          timeStr = `${hours}h ${mins}m`;
        } else {
          timeStr = `${mins}m ${secs}s`;
        }
      }
      
      const dateStr = target.toLocaleDateString('en-US', { 
        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
      
      return `
        <div class="countdown-card">
          <div class="countdown-info">
            <div class="countdown-title">${c.name}</div>
            <div class="countdown-date">${dateStr}</div>
          </div>
          <div class="countdown-time ${diff <= 0 ? 'ended' : ''}">${timeStr}</div>
          <div class="countdown-actions">
            <button class="secondary" onclick="remove(${c.id})">✕</button>
          </div>
        </div>
      `;
    }).join('');
  }

  setInterval(render, 1000);
  render();
</script>
</body>
</html>
