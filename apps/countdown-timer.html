<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer — Shadow's Garden</title>
<meta name="description" content="Set a target date and see exactly how much time remains. Days, hours, minutes, seconds. Also shows time since past dates.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 1rem; font-family: var(--font-mono); }
  .container { text-align: center; max-width: 600px; width: 100%; }
  h1 { font-size: 1.5rem; font-weight: 400; margin-bottom: 2rem; color: var(--fg-muted); }
  .input-group { margin-bottom: 2rem; }
  input, button { font-size: 1.1rem; padding: 0.8rem 1.2rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--fg); }
  input[type="datetime-local"] { font-family: var(--font-mono); }
  button { cursor: pointer; background: var(--bg-secondary); margin: 0.5rem; }
  button:hover { background: var(--border); }
  .display { font-size: clamp(2rem, 8vw, 4rem); font-weight: 600; margin: 2rem 0; line-height: 1.2; }
  .display .unit { font-size: 0.35em; font-weight: 400; color: var(--fg-muted); display: block; margin-top: 0.3em; }
  .display.counting-up { color: var(--accent); }
  .display.counting-down { color: var(--fg); }
  .event-name { font-size: 1.2rem; margin-bottom: 1rem; color: var(--accent); }
  .presets { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; }
  .presets button { font-size: 0.9rem; padding: 0.5rem 0.8rem; }
  .status { font-size: 0.9rem; color: var(--fg-muted); margin-top: 1rem; }
  .counting-up .status { color: var(--accent); }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Countdown Timer</h1>
    
    <div class="presets">
      <button data-days="1">Tomorrow</button>
      <button data-days="7">Week</button>
      <button data-days="30">Month</button>
      <button data-days="365">Year</button>
    </div>

    <div class="input-group">
      <input type="datetime-local" id="targetDate">
    </div>
    
    <div class="input-group">
      <input type="text" id="eventName" placeholder="Event name (optional)">
    </div>

    <button id="startBtn">Start Countdown</button>
    <button id="stopBtn" style="display:none;">Stop</button>
    <button id="resetBtn">Reset</button>

    <div id="display" class="display" style="display:none;">
      <div id="eventNameDisplay" class="event-name"></div>
      <div id="countdownDisplay">00d 00h 00m 00s</div>
    </div>
    
    <div id="status" class="status"></div>
  </div>

  <script>
    const targetDateInput = document.getElementById('targetDate');
    const eventNameInput = document.getElementById('eventName');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const display = document.getElementById('display');
    const eventNameDisplay = document.getElementById('eventNameDisplay');
    const countdownDisplay = document.getElementById('countdownDisplay');
    const status = document.getElementById('status');
    const presets = document.querySelectorAll('.presets button');

    let interval = null;
    let isCountingDown = true;

    // Set default to tomorrow
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(12, 0, 0, 0);
    targetDateInput.value = tomorrow.toISOString().slice(0, 16);

    presets.forEach(btn => {
      btn.addEventListener('click', () => {
        const days = parseInt(btn.dataset.days);
        const target = new Date();
        target.setDate(target.getDate() + days);
        target.setHours(12, 0, 0, 0);
        targetDateInput.value = target.toISOString().slice(0, 16);
      });
    });

    function update() {
      const target = new Date(targetDateInput.value);
      const now = new Date();
      const diff = target - now;

      isCountingDown = diff > 0;
      const absDiff = Math.abs(diff);

      const days = Math.floor(absDiff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((absDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((absDiff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((absDiff % (1000 * 60)) / 1000);

      countdownDisplay.innerHTML = `${String(days).padStart(2, '0')}d ${String(hours).padStart(2, '0')}h ${String(minutes).padStart(2, '0')}m ${String(seconds).padStart(2, '0')}s<span class="unit">${isCountingDown ? 'remaining' : 'ago'}</span>`;

      display.className = 'display ' + (isCountingDown ? 'counting-down' : 'counting-up');
      status.textContent = isCountingDown ? 'Counting down' : 'Time since';
    }

    function start() {
      if (!targetDateInput.value) return;
      
      const name = eventNameInput.value.trim();
      if (name) {
        eventNameDisplay.textContent = name;
      } else {
        eventNameDisplay.textContent = '';
      }

      display.style.display = 'block';
      startBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
      
      update();
      interval = setInterval(update, 1000);
      
      // Save to localStorage
      localStorage.setItem('countdown_target', targetDateInput.value);
      localStorage.setItem('countdown_name', eventNameInput.value);
    }

    function stop() {
      clearInterval(interval);
      startBtn.style.display = 'inline-block';
      stopBtn.style.display = 'none';
    }

    function reset() {
      stop();
      display.style.display = 'none';
      localStorage.removeItem('countdown_target');
      localStorage.removeItem('countdown_name');
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stop);
    resetBtn.addEventListener('click', reset);
    targetDateInput.addEventListener('change', update);

    // Restore from localStorage
    const savedTarget = localStorage.getItem('countdown_target');
    const savedName = localStorage.getItem('countdown_name');
    if (savedTarget) {
      targetDateInput.value = savedTarget;
      eventNameInput.value = savedName || '';
      start();
    }
  </script>
</body>
</html>
