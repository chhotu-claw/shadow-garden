<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer — Shadow's Garden</title>
<meta name="description" content="Track countdowns to events, birthdays, deadlines — simple, localStorage, live updates">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root { --accent: #f472b6; }
  body { --accent: #f472b6; }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
  
  .add-form { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 2rem; }
  .form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .form-row input { flex: 1; min-width: 150px; padding: 0.6rem 0.8rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 0.95rem; }
  .form-row input:focus { outline: none; border-color: var(--accent); }
  .form-row input[type="datetime-local"] { flex: 1; min-width: 200px; }
  .btn { padding: 0.6rem 1.2rem; background: var(--accent); border: none; border-radius: 6px; color: #0d1117; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  
  .countdowns { display: flex; flex-direction: column; gap: 1rem; }
  .countdown-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .countdown-info { flex: 1; min-width: 200px; }
  .countdown-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
  .countdown-date { font-size: 0.85rem; color: #8b949e; }
  .countdown-time { font-size: 1.5rem; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
  .countdown-actions { display: flex; gap: 0.5rem; }
  .btn-small { padding: 0.4rem 0.7rem; background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; font-size: 0.8rem; cursor: pointer; }
  .btn-small:hover { background: #30363d; color: #c9d1d9; }
  .btn-delete:hover { background: #f85149; border-color: #f85149; color: #fff; }
  
  .presets { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
  .preset-btn { padding: 0.35rem 0.7rem; background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; font-size: 0.75rem; cursor: pointer; }
  .preset-btn:hover { background: #30363d; color: #c9d1d9; }
  
  .empty { text-align: center; padding: 2rem; color: #8b949e; }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>Countdown Timer</h1>
    <p class="subtitle">Track days until events, birthdays, deadlines</p>
    
    <div class="add-form">
      <div class="form-row">
        <input type="text" id="eventName" placeholder="Event name (e.g., Birthday, Deadline)">
        <input type="datetime-local" id="eventDate">
        <button class="btn" onclick="addCountdown()">Add</button>
      </div>
      <div class="presets">
        <button class="preset-btn" onclick="addPreset(1, 'day')">+1 Day</button>
        <button class="preset-btn" onclick="addPreset(1, 'week')">+1 Week</button>
        <button class="preset-btn" onclick="addPreset(1, 'month')">+1 Month</button>
        <button class="preset-btn" onclick="addPreset(7, 'days')">+7 Days</button>
        <button class="preset-btn" onclick="addPreset(30, 'days')">+30 Days</button>
      </div>
    </div>
    
    <div class="countdowns" id="countdowns">
      <div class="empty">No countdowns yet. Add one above!</div>
    </div>
  </div>
  
  <script>
    let countdowns = JSON.parse(localStorage.getItem('countdowns') || '[]');
    
    function save() {
      localStorage.setItem('countdowns', JSON.stringify(countdowns));
      render();
    }
    
    function addCountdown() {
      const name = document.getElementById('eventName').value.trim();
      const date = document.getElementById('eventDate').value;
      
      if (!name || !date) return;
      
      countdowns.push({ id: Date.now(), name, date });
      document.getElementById('eventName').value = '';
      document.getElementById('eventDate').value = '';
      save();
    }
    
    function addPreset(value, unit) {
      const now = new Date();
      let target = new Date(now);
      
      if (unit === 'day') target.setDate(target.getDate() + value);
      else if (unit === 'week') target.setDate(target.getDate() + (value * 7));
      else if (unit === 'month') target.setMonth(target.getMonth() + value);
      else if (unit === 'days') target.setDate(target.getDate() + value);
      
      const name = unit === 'day' ? 'Tomorrow' : 
                   unit === 'week' ? 'Next Week' : 
                   unit === 'month' ? 'Next Month' : 
                   `${value} Days`;
      
      countdowns.push({ 
        id: Date.now(), 
        name, 
        date: target.toISOString().slice(0, 16) 
      });
      save();
    }
    
    function deleteCountdown(id) {
      countdowns = countdowns.filter(c => c.id !== id);
      save();
    }
    
    function getTimeRemaining(targetDate) {
      const now = new Date();
      const target = new Date(targetDate);
      const diff = target - now;
      
      if (diff <= 0) return { expired: true };
      
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);
      
      return { days, hours, minutes, seconds, expired: false };
    }
    
    function formatTime(t) {
      if (t.expired) return 'Event passed';
      
      const parts = [];
      if (t.days > 0) parts.push(`${t.days}d`);
      if (t.hours > 0 || t.days > 0) parts.push(`${t.hours}h`);
      if (t.minutes > 0 || t.hours > 0 || t.days > 0) parts.push(`${t.minutes}m`);
      parts.push(`${t.seconds}s`);
      
      return parts.join(' ');
    }
    
    function render() {
      const container = document.getElementById('countdowns');
      
      if (countdowns.length === 0) {
        container.innerHTML = '<div class="empty">No countdowns yet. Add one above!</div>';
        return;
      }
      
      countdowns.sort((a, b) => new Date(a.date) - new Date(b.date));
      
      container.innerHTML = countdowns.map(c => {
        const t = getTimeRemaining(c.date);
        const dateStr = new Date(c.date).toLocaleDateString('en-US', { 
          weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });
        
        return `
          <div class="countdown-card">
            <div class="countdown-info">
              <div class="countdown-title">${escapeHtml(c.name)}</div>
              <div class="countdown-date">${dateStr}</div>
            </div>
            <div class="countdown-time">${formatTime(t)}</div>
            <div class="countdown-actions">
              <button class="btn-small btn-delete" onclick="deleteCountdown(${c.id})">Delete</button>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    // Update every second
    setInterval(render, 1000);
    render();
  </script>
</body>
</html>
