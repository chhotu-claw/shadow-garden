<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Wells — Shadow's Garden</title>
<meta name="description" content="Interactive gravity well visualizer — particles orbit attractors you place"></meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; cursor: crosshair; }
  #controls {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 15, 0.9);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    color: #ccc;
    font-size: 13px;
    z-index: 100;
  }
  #controls h3 { margin: 0 0 12px 0; color: #fff; font-size: 14px; }
  .control-row { margin-bottom: 10px; }
  .control-row label { display: block; margin-bottom: 4px; color: #888; }
  .control-row input[type="range"] { width: 100%; }
  .control-row span { float: right; color: #4af; }
  button {
    background: #2a4a6a;
    border: none;
    color: #fff;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 6px;
    margin-top: 8px;
    font-size: 12px;
  }
  button:hover { background: #3a5a7a; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #556;
    font-size: 11px;
  }
  .stats {
    position: fixed;
    top: 20px;
    right: 20px;
    color: #445;
    font-size: 11px;
    text-align: right;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <h3>Gravity Wells</h3>
    <div class="control-row">
      <label>Particle Count <span id="particleVal">3000</span></label>
      <input type="range" id="particles" min="500" max="10000" step="100" value="3000">
    </div>
    <div class="control-row">
      <label>Gravity Strength <span id="gravityVal">1.0</span></label>
      <input type="range" id="gravity" min="0.1" max="5" step="0.1" value="1">
    </div>
    <div class="control-row">
      <label>Trail Length <span id="trailVal">0</span></label>
      <input type="range" id="trail" min="0" max="50" value="0">
    </div>
    <div class="control-row">
      <label>Particle Size <span id="sizeVal">1.5</span></label>
      <input type="range" id="size" min="0.5" max="4" step="0.5" value="1.5">
    </div>
    <div class="preset-btns">
      <button id="clear">Clear All</button>
      <button id="spiral">Spiral Galaxy</button>
      <button id="binary">Binary Stars</button>
      <button id="blackhole">Black Hole</button>
    </div>
  </div>
  <div class="stats" id="stats">FPS: 60</div>
  <div id="info">Click to add attractor | Right-click to add particle cluster</div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    let attractors = [];
    let numParticles = 3000;
    let gravityStrength = 1;
    let trailLength = 0;
    let particleSize = 1.5;
    let lastTime = Date.now();
    let fps = 60;
    
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    
    function initParticles(count) {
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          hue: Math.random() * 60 + 200
        });
      }
    }
    
    function update() {
      for (let p of particles) {
        let ax = 0, ay = 0;
        for (let a of attractors) {
          let dx = a.x - p.x;
          let dy = a.y - p.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 5) {
            let force = (a.mass * gravityStrength) / (dist * dist);
            ax += (dx / dist) * force;
            ay += (dy / dist) * force;
          }
        }
        p.vx += ax;
        p.vy += ay;
        p.x += p.vx;
        p.y += p.vy;
        
        if (p.x < 0) p.x = width;
        if (p.x > width) p.x = 0;
        if (p.y < 0) p.y = height;
        if (p.y > height) p.y = 0;
      }
    }
    
    function render() {
      if (trailLength > 0) {
        ctx.fillStyle = `rgba(0, 0, 0, ${trailLength / 100})`;
        ctx.fillRect(0, 0, width, height);
      } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, width, height);
      }
      
      for (let a of attractors) {
        let gradient = ctx.createRadialGradient(a.x, a.y, 0, a.x, a.y, a.mass * 3);
        gradient.addColorStop(0, '#fff');
        gradient.addColorStop(0.3, '#ffa500');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(a.x, a.y, a.mass * 3, 0, Math.PI * 2);
        ctx.fill();
      }
      
      for (let p of particles) {
        ctx.fillStyle = `hsl(${p.hue}, 80%, 60%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, particleSize, 0, Math.PI * 2);
        ctx.fill();
      }
      
      let now = Date.now();
      fps = 1000 / (now - lastTime);
      lastTime = now;
      document.getElementById('stats').textContent = `FPS: ${Math.round(fps)}`;
      
      requestAnimationFrame(() => {
        update();
        render();
      });
    }
    
    canvas.addEventListener('click', e => {
      attractors.push({
        x: e.clientX,
        y: e.clientY,
        mass: 50 + Math.random() * 50
      });
    });
    
    canvas.addEventListener('contextmenu', e => {
      e.preventDefault();
      for (let i = 0; i < 50; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = Math.random() * 3 + 1;
        particles.push({
          x: e.clientX + (Math.random() - 0.5) * 30,
          y: e.clientY + (Math.random() - 0.5) * 30,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          hue: Math.random() * 60 + 200
        });
      }
    });
    
    document.getElementById('particles').addEventListener('input', e => {
      numParticles = +e.target.value;
      document.getElementById('particleVal').textContent = numParticles;
      if (particles.length < numParticles) {
        while (particles.length < numParticles) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            hue: Math.random() * 60 + 200
          });
        }
      } else {
        particles = particles.slice(0, numParticles);
      }
    });
    
    document.getElementById('gravity').addEventListener('input', e => {
      gravityStrength = +e.target.value;
      document.getElementById('gravityVal').textContent = gravityStrength;
    });
    
    document.getElementById('trail').addEventListener('input', e => {
      trailLength = +e.target.value;
      document.getElementById('trailVal').textContent = trailLength;
    });
    
    document.getElementById('size').addEventListener('input', e => {
      particleSize = +e.target.value;
      document.getElementById('sizeVal').textContent = particleSize;
    });
    
    document.getElementById('clear').addEventListener('click', () => {
      attractors = [];
    });
    
    document.getElementById('spiral').addEventListener('click', () => {
      attractors = [{ x: width / 2, y: height / 2, mass: 100 }];
      particles = [];
      for (let i = 0; i < numParticles; i++) {
        let angle = i * 0.1;
        let radius = 50 + i * 0.5;
        let speed = Math.sqrt(100 / radius) * 2;
        particles.push({
          x: width / 2 + Math.cos(angle) * radius,
          y: height / 2 + Math.sin(angle) * radius,
          vx: -Math.sin(angle) * speed,
          vy: Math.cos(angle) * speed,
          hue: (i / numParticles) * 60 + 200
        });
      }
    });
    
    document.getElementById('binary').addEventListener('click', () => {
      attractors = [
        { x: width / 2 - 150, y: height / 2, mass: 80 },
        { x: width / 2 + 150, y: height / 2, mass: 80 }
      ];
      particles = [];
      for (let i = 0; i < numParticles; i++) {
        let angle = Math.random() * Math.PI * 2;
        let radius = 50 + Math.random() * 200;
        particles.push({
          x: width / 2 + Math.cos(angle) * radius,
          y: height / 2 + Math.sin(angle) * radius,
          vx: -Math.sin(angle) * 2,
          vy: Math.cos(angle) * 2,
          hue: Math.random() * 60 + 200
        });
      }
    });
    
    document.getElementById('blackhole').addEventListener('click', () => {
      attractors = [{ x: width / 2, y: height / 2, mass: 200 }];
      particles = [];
      for (let i = 0; i < numParticles; i++) {
        let angle = Math.random() * Math.PI * 2;
        let radius = 80 + Math.random() * 200;
        let speed = Math.sqrt(200 / radius) * 3;
        particles.push({
          x: width / 2 + Math.cos(angle) * radius,
          y: height / 2 + Math.sin(angle) * radius,
          vx: -Math.sin(angle) * speed,
          vy: Math.cos(angle) * speed,
          hue: Math.random() * 40 + 260
        });
      }
    });
    
    window.addEventListener('resize', resize);
    resize();
    initParticles(numParticles);
    render();
  </script>
</body>
</html>
