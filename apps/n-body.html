<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-Body Gravity — Shadow's Garden</title>
<meta name="description" content="Interactive N-body gravity simulation. Click to add bodies.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a12; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-family: monospace;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Click to add bodies</div>
  <div class="controls">
    <button id="solar">Solar System</button>
    <button id="binary">Binary Stars</button>
    <button id="cluster">Cluster</button>
    <button id="clear">Clear</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let bodies = [];
    const G = 0.5;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    class Body {
      constructor(x, y, mass, vx = 0, vy = 0, color = null) {
        this.x = x;
        this.y = y;
        this.mass = mass;
        this.vx = vx;
        this.vy = vy;
        this.radius = Math.sqrt(mass) * 2;
        this.color = color || `hsl(${Math.random() * 360}, 70%, 60%)`;
      }
      
      update() {
        for (const other of bodies) {
          if (other === this) continue;
          
          const dx = other.x - this.x;
          const dy = other.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist > this.radius + other.radius) {
            const force = G * this.mass * other.mass / (dist * dist);
            const ax = force * dx / dist / this.mass;
            const ay = force * dy / dist / this.mass;
            this.vx += ax;
            this.vy += ay;
          }
        }
        
        this.x += this.vx;
        this.y += this.vy;
      }
      
      draw() {
        const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
        gradient.addColorStop(0, this.color);
        gradient.addColorStop(1, 'transparent');
        
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        
        // Glow
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
    
    function update() {
      bodies.forEach(b => b.update());
    }
    
    function draw() {
      ctx.fillStyle = 'rgba(10, 10, 18, 0.2)';
      ctx.fillRect(0, 0, width, height);
      
      bodies.forEach(b => b.draw());
    }
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    canvas.addEventListener('click', (e) => {
      const mass = 10 + Math.random() * 40;
      bodies.push(new Body(e.clientX, e.clientY, mass));
    });
    
    document.getElementById('solar').onclick = () => {
      bodies = [];
      const cx = width / 2, cy = height / 2;
      bodies.push(new Body(cx, cy, 500, 0, 0, '#ffd700'));
      bodies.push(new Body(cx + 100, cy, 20, 0, 3, '#4ecdc4''));
      bodies.push(new Body(cx + 180, cy, 30, 0, 2.2, '#ff6b6b'));
      bodies.push(new Body(cx + 280, cy, 40, 0, 1.8, '#95e1d3'));
    };
    
    document.getElementById('binary').onclick = () => {
      bodies = [];
      const cx = width / 2, cy = height / 2;
      bodies.push(new Body(cx - 80, cy, 200, 0, -2, '#ff6b6b'));
      bodies.push(new Body(cx + 80, cy, 200, 0, 2, '#4ecdc4''));
    };
    
    document.getElementById('cluster').onclick = () => {
      bodies = [];
      const cx = width / 2, cy = height / 2;
      for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 100;
        const speed = Math.sqrt(500 / dist) * 0.3;
        bodies.push(new Body(
          cx + Math.cos(angle) * dist,
          cy + Math.sin(angle) * dist,
          5 + Math.random() * 20,
          -Math.sin(angle) * speed,
          Math.cos(angle) * speed
        ));
      }
    };
    
    document.getElementById('clear').onclick = () => { bodies = []; };
    
    window.addEventListener('resize', resize);
    resize();
    animate();
  </script>
</body>
</html>
