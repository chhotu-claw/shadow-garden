<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-Body Gravity — Shadow's Garden</title>
<meta name="description" content="Interactive N-body gravity simulation. Click to add bodies.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a12; }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .info {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    font-family: monospace;
  }
</style>
</head>
<body data-page-type="app">
  <canvas id="canvas"></canvas>
  <div class="info">Click to add bodies</div>
  <div class="controls">
    <button id="clear">Clear</button>
    <button id="solar">Solar System</button>
    <button id="binary">Binary Stars</button>
    <button id="cluster">Cluster</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let bodies = [];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    function addBody(x, y, mass, vx = 0, vy = 0) {
      bodies.push({ x, y, vx, vy, mass, hue: Math.random() * 360 });
    }
    
    function update() {
      for (let i = 0; i < bodies.length; i++) {
        for (let j = i + 1; j < bodies.length; j++) {
          const a = bodies[i];
          const b = bodies[j];
          
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy);
          
          if (dist > 5) {
            const force = a.mass * b.mass / (dist * dist) * 0.5;
            const ax = force * dx / dist / a.mass;
            const ay = force * dy / dist / a.mass;
            const bx = force * dx / dist / b.mass;
            const by = force * dy / dist / b.mass;
            
            a.vx += ax;
            a.vy += ay;
            b.vx -= bx;
            b.vy -= by;
          }
        }
      }
      
      for (const b of bodies) {
        b.x += b.vx;
        b.y += b.vy;
        
        // Wrap around
        if (b.x < 0) b.x = width;
        if (b.x > width) b.x = 0;
        if (b.y < 0) b.y = height;
        if (b.y > height) b.y = 0;
      }
    }
    
    function draw() {
      ctx.fillStyle = 'rgba(10, 10, 18, 0.2)';
      ctx.fillRect(0, 0, width, height);
      
      for (const b of bodies) {
        const size = Math.sqrt(b.mass) * 2;
        ctx.fillStyle = `hsl(${b.hue}, 80%, 60%)`;
        ctx.beginPath();
        ctx.arc(b.x, b.y, size, 0, Math.PI * 2);
        ctx.fill();
        
        // Glow
        ctx.shadowColor = `hsl(${b.hue}, 80%, 60%)`;
        ctx.shadowBlur = 15;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
    
    function animate() {
      update();
      draw();
      requestAnimationFrame(animate);
    }
    
    canvas.addEventListener('click', (e) => {
      addBody(e.clientX, e.clientY, 50 + Math.random() * 100);
    });
    
    document.getElementById('clear').onclick = () => { bodies = []; };
    document.getElementById('solar').onclick = () => {
      bodies = [];
      addBody(width/2, height/2, 500, 0, 0);
      for (let i = 0; i < 5; i++) {
        const dist = 50 + i * 40;
        const speed = Math.sqrt(500 / dist) * 2;
        addBody(width/2 + dist, height/2, 10, 0, speed);
      }
    };
    document.getElementById('binary').onclick = () => {
      bodies = [];
      addBody(width/2 - 80, height/2, 200, 0, 1);
      addBody(width/2 + 80, height/2, 200, 0, -1);
    };
    document.getElementById('cluster').onclick = () => {
      bodies = [];
      for (let i = 0; i < 30; i++) {
        addBody(
          width/2 + (Math.random() - 0.5) * 200,
          height/2 + (Math.random() - 0.5) * 200,
          20 + Math.random() * 40,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2
        );
      }
    };
    
    window.addEventListener('resize', resize);
    resize();
    animate();
  </script>
</body>
</html>
