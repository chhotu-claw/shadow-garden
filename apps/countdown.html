<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown — Shadow's Garden</title>
<meta name="description" content="Track countdowns to the events that matter. Birthdays, deadlines, holidays.">
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --danger: #f85149;
    --warning: #d29922;
    --success: #3fb950;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .add-form {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  input {
    flex: 1;
    min-width: 150px;
    padding: 0.75rem 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 1rem;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
  }
  button {
    padding: 0.75rem 1.5rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
  }
  button:hover {
    opacity: 0.9;
  }
  .countdowns {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .countdown-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
  }
  .countdown-info {
    flex: 1;
  }
  .countdown-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }
  .countdown-date {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .countdown-time {
    font-size: 1.25rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: right;
    min-width: 180px;
  }
  .countdown-time.urgent {
    color: var(--danger);
  }
  .countdown-time.soon {
    color: var(--warning);
  }
  .countdown-time.normal {
    color: var(--success);
  }
  .countdown-time.past {
    color: var(--muted);
    text-decoration: line-through;
  }
  .delete-btn {
    background: transparent;
    color: var(--muted);
    padding: 0.5rem;
    font-size: 1.25rem;
  }
  .delete-btn:hover {
    color: var(--danger);
    background: transparent;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 3rem;
  }
  @media (max-width: 500px) {
    .countdown-card {
      flex-direction: column;
      align-items: flex-start;
    }
    .countdown-time {
      text-align: left;
      font-size: 1rem;
    }
  }
</style>
</head>
<body data-page-type="app">
  <div class="container">
    <h1>⏱️ Countdown</h1>
    
    <div class="add-form">
      <input type="text" id="eventName" placeholder="Event name (e.g., Birthday, Deadline)" />
      <input type="date" id="eventDate" />
      <button onclick="addEvent()">Add</button>
    </div>
    
    <div class="countdowns" id="countdowns"></div>
  </div>

  <script>
    let events = JSON.parse(localStorage.getItem('countdown-events') || '[]');
    
    function save() {
      localStorage.setItem('countdown-events', JSON.stringify(events));
    }
    
    function addEvent() {
      const name = document.getElementById('eventName').value.trim();
      const date = document.getElementById('eventDate').value;
      
      if (!name || !date) {
        alert('Please fill in both fields');
        return;
      }
      
      events.push({ name, date, id: Date.now() });
      save();
      render();
      
      document.getElementById('eventName').value = '';
      document.getElementById('eventDate').value = '';
    }
    
    function deleteEvent(id) {
      events = events.filter(e => e.id !== id);
      save();
      render();
    }
    
    function formatCountdown(targetDate) {
      const now = new Date();
      const target = new Date(targetDate + 'T00:00:00');
      const diff = target - now;
      
      if (diff < 0) {
        return { text: 'Passed', class: 'past' };
      }
      
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);
      
      let timeStr = '';
      if (days > 0) timeStr += `${days}d `;
      timeStr += `${hours}h ${minutes}m ${seconds}s`;
      
      let cls = 'normal';
      if (days <= 1) cls = 'urgent';
      else if (days <= 7) cls = 'soon';
      
      return { text: timeStr, class: cls };
    }
    
    function render() {
      const container = document.getElementById('countdowns');
      
      if (events.length === 0) {
        container.innerHTML = '<div class="empty">No events yet. Add one above!</div>';
        return;
      }
      
      // Sort by date
      events.sort((a, b) => new Date(a.date) - new Date(b.date));
      
      container.innerHTML = events.map(e => {
        const countdown = formatCountdown(e.date);
        const dateObj = new Date(e.date + 'T00:00:00');
        const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        
        return `
          <div class="countdown-card">
            <div class="countdown-info">
              <div class="countdown-title">${e.name}</div>
              <div class="countdown-date">${dateStr}</div>
            </div>
            <div class="countdown-time ${countdown.class}">${countdown.text}</div>
            <button class="delete-btn" onclick="deleteEvent(${e.id})">×</button>
          </div>
        `;
      }).join('');
    }
    
    // Update every second
    setInterval(render, 1000);
    render();
  </script>
</body>
</html>
