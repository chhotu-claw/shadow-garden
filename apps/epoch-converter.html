<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epoch Converter — Shadow's Garden</title>
<meta name="description">Convert Unix timestamps to human dates and vice versa.</meta>
<link rel="stylesheet" href="../style.css">
<script src="../nav.js" defer></script>
<style>
  .conv { max-width: 500px; margin: 0 auto; }
  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  .input-group input { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 18px; font-family: var(--mono); box-sizing: border-box; }
  .input-group input:focus { outline: none; border-color: var(--accent); }
  .result { background: var(--bg); border: 2px solid var(--border); border-radius: 8px; padding: 20px; margin-top: 20px; text-align: center; }
  .result-date { font-size: 20px; font-family: var(--mono); color: var(--text); }
  .live { font-size: 14px; color: var(--text-secondary); margin-top: 12px; }
  .live span { font-family: var(--mono); color: var(--accent); }
  button { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 8px; background: var(--accent); border-color: var(--accent); color: white; font-size: 16px; cursor: pointer; margin-top: 16px; }
  button:hover { opacity: 0.9; }
</style>
</head>
<body data-page-type="app">
<div class="container">
  <div class="conv">
    <h1>Epoch Converter</h1>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Convert Unix timestamps to dates.</p>
    <div class="input-group">
      <label>Unix Timestamp (seconds)</label>
      <input type="number" id="ts" placeholder="1775500000" oninput="convert()">
    </div>
    <button onclick="convert()">Convert</button>
    <div class="result" id="result" style="display:none;">
      <div class="result-date" id="date">--</div>
      <div class="live">Now: <span id="now">--</span></div>
    </div>
  </div>
</div>
<script>
  function convert() {
    const ts = document.getElementById('ts').value;
    if (!ts) return;
    const d = new Date(parseInt(ts) * 1000);
    document.getElementById('date').textContent = d.toLocaleString();
    document.getElementById('result').style.display = 'block';
  }
  setInterval(() => document.getElementById('now').textContent = Math.floor(Date.now() / 1000), 1000);
</script>
</body>
</html>
